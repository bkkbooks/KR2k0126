body:
  text: 蜀中廣記卷三十九明曹學佺撰邉防記第九下川東道石砫宣撫司秦屬黔中郡漢置䍧牱郡晉析為夜郎郡寰宇記夜郎郡有且蘭縣漢武時使發南夷兵征南越且蘭不從乃反漢發巴蜀校尉擊破之遂平南夷以為䍧牱郡樂史註云今涪州之義泉郡也後周於石砫地置施州唐改為清江郡方輿勝覽施州東晉末旦兀誕竄太陽蠻中築城臨施水號施王城子孫襲王至後周保定初平之以其地置施州而清江郡𨽻焉州乃施王之餘址故以為名尋改為亭州又改為庸州又為清江郡恭帝復置施州土夷攷唐改施州為清江郡宋改清江為南賔縣按唐武徳二年分浦州武寧縣西界置南賔縣屬忠州也武寧今改巡檢司在司北百里外志云司東北百四十里有山形如張葢俗曰石凉傘即石幢之説也按寰宇記䍧州有建安縣漢䍧牱郡也有髙連石門四十九頭木𤓰諸山有古䍧牱郡城華陽國志云䍧牱郡上當天井故多雨潦今有古城在郡西即漢天復之時所保於此有石潼關華陽國志云且蘭縣西南有地名石潼闗柱蒲闗漢書亦云䍧牱郡有柱蒲闗石砫之名本此志云司治南百五十里大峯門山兩崖壁立中通行人有古壘按方輿勝覽東門山在歌羅寨西北五十里東即夜郎故地古來夷夏分界入貢之門戸也又云竹主祠在歌羅寨西北五十里東門山崇寧間賜靈恵廟額歌羅寨本夜郎縣唐置珍州乾徳四年蠻酋珍州刺史田景遷内附納土以酉江為界自是酉江以北所謂夜郎縣故地盡入施州矣竹王即夜郎侯也勝覽又云施州驛北有馬公泉未詳志云司西北二百里外有馬頭山山頂有馬黄廟祝馬伏波黄山谷處葢山谷入黔州安置取道施州故人慕而祠之其封域東至黔江縣界二百里西至酆都縣界南至武隆縣界各百七十里北至忠州界百二十里編戸三里其民悍而好鬭兵馬稱强間有所調遣輙踴躍趨赴輿地紀勝云施之地雖雜夷落猶近華風故鄉音則蠻夷巴漢言語相混其山岡砂石不通牛犂唯伐木燒畬以種五榖隆冬可單盛夏可裌矣方輿考云施州蠻者䕫路徼外熟夷葢唐彭水蠻也咸平中施蠻嘗入冦詔以鹽與之且許其以粟轉易蠻大悦自是不為邉患後因饑又以金銀倍實直質于官易粟官不能禁熈寧六年詔施州蠻以金銀質來者估實值加七年不贖則變易之著為令熊本經制淯井事蠻酋田現等内附施黔比近蠻子弟精悍戰鬭趫捷朝廷嘗團結為義勝軍其後瀘州淯井石泉蠻叛皆獲其用夣溪筆談忠萬間夷人祥符中嘗冦掠邉臣務懐來使人招其酋長祿之以劵粟自後有效而為之者不得已又以劵招之其間紛爭者至有自陳其人纔殺掠人遂得一劵凡殺兵民倍之互相計較為冦甚者則受多劵熈寧中㑹之前後凡計四百餘劵子孫相承世世不絶因其為盜悉誅鋤之罷其舊劵一切不與自是夷人畏服不復犯塞渝州志云宋景定中蠻酋大蟲馬什用同向士壁率師大敗元兵繼平九溪洞夷授鎮國上將軍領銅牌鐵印石砫安撫司大使世守其土元改石砫軍民府尋陞安撫使司後以生夷作亂為定虎什用獲受賞改陞石砫宣撫使司明玉珍僣據時為先納牌印授石砫安撫司國朝洪武七年克復安撫使馬克用出降次年陞石砫宣撫管轄土民世襲𨽻重慶嘉靖四十二年改𨽻䕫州土夷考云施州忠路安撫司本石砫馬氏姻戚因争邉界搆殺不休葢馬氏内不和於妻子外不睦於族人讐殺訐奏動尋干戈非一日矣近又與其同知陳思虞訐奏繫䕫獄中未結經畧志云重䕫二府所轄播酉石砫等土司及黔江武隆彭水忠涪建始奉節巫山雲萬等十州縣皆稱關徼與湖廣施州衛所轄散毛施南唐崖忠路忠建忠孝容美等土司之地鷄鳴相聞犬牙交制𢎞治元年於達州設兵備副使綂轄重䕫黔江等地及湖廣瞿塘施州等衛所正徳間藍鄢作亂調各土司征勦因而覘知蜀道險易居民村落不時出没行刼施衛官旗貪其子女財帛之遺相與表裏為姦違例婚媾故諸夷得逞焉嘉靖十年於黔江千戸所散毛宣撫司中界設立老膺等三闗五堡二十年川湖㑹題設九永守備官一員於施衛駐劄俾其約束兩省徼上夷司川湖守廵得胥節制之北史後周恭帝二年巴西人譙淹扇動羣蠻以附梁蠻帥向鎮侯向白虎等應之向五子王又攻䧟信州田烏度田唐等抄斷江路文子榮復據荆州之政陽郡自稱仁州刺史并隣州刺史蒲微亦舉兵逆命詔田􅒮賀若敦潘和李遷哲等討破之周武成初文州蠻叛州軍討定之尋而冉令賢向五子王等又攻䧟白帝殺開府楊長華遂相率作亂前後遣開府元契趙剛等總兵出討雖頗翦其族類而元惡未除天和元年詔開府陸騰督王亮司馬裔等討之騰水陸俱進次于湯口先遣喻之而令賢方增浚城池嚴設扞禦遣其長子西藜次子南王領其支屬於江南險要之地置立十城遠結涔陽蠻為其聲援令賢率其卒固守水邏城騰乃總集將帥謀進趣咸欲先取水邏然後經畧江南騰言於衆曰令賢内恃水邏金湯之險外託涔陽輔車之援兼復資糧充實器械精新以我懸軍攻其嚴壘脫一戰不剋更成其氣不如頓軍湯口先取江南剪其毛羽然後遊軍水邏此制勝之計也衆皆然之乃遣開府王亮率衆渡江旬日攻拔其八城凶黨奔散獲賊帥冉承公并生口三千人降其部衆一千戸遂簡募驍勇數道分攻水邏路經石壁城險峻四面壁立故以名焉唯有一小路緣梯而上蠻蜑以為峭絶非兵衆所行騰被甲先登衆軍繼進備經危阻累日乃得舊路且騰先任隆州總管雅知其路蠻帥冉伯犂冉安西與令賢有隙騰乃招誘伯犂等結為父子又多遺錢帛伯犂等悦遂為鄉導水邏側又有石勝城者亦是險要令賢使其兄龍真據之騰又密告龍真云若平水邏使其代令賢處之龍真大悦遣其子詣騰乃厚加禮接賜以金帛蠻貪利既深仍請立効乃謂騰曰欲翻所據城恐人力寡少騰許以三百兵助之既而遣二千人銜枚夜進龍真力不能禦遂平石勝城晨至水邏蠻衆大潰斬首萬餘級令賢遁走而獲之司馬裔又别下其二十餘城獲蠻帥并三公等騰乃積其骸骨於水邏城側為京觀後蠻蜑望見輙大哭自此狼戾之心輟矣時向五子王據石墨城令其子寳勝據雙城水邏平後頻遣喻之而五子王猶不從命騰又遣王亮屯牢坪司馬裔屯雙城以圖之騰慮雙城孤峭攻未可拔賊若委城遁散又難追討乃令諸軍周廻立柵遏其走路賊乃大駭於是縱兵擊破之禽五子王於石墨獲寶勝於雙城悉斬諸向首領生禽萬餘口信州舊居白帝騰更於昭烈故宫城南八陣之北臨江岸築城移置信州又以巫縣信陵秭歸並築城置防以為襟帶焉天和六年蠻渠冉祖憙冉龍驤又反詔大將軍趙閻討平之自此羣蠻懼息不復為冦蜀中廣記卷三十九
