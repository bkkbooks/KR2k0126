body:
  text: 蜀中廣記卷二十四明曹學佺撰名勝記第二十四川北道保寧府一閬中縣附郭閬中本秦舊縣張儀伐蜀所置通志云張儀城在城東二十里郡志云閬中縣東二十里白沙鎮是舊縣治國初徙入城按此則張儀城即舊縣矣通志云本府城漢末劉璋所築蜀漢巴西守張飛治此増修國初千戸滕貴拓之甃以石是前郡縣不同城也寰宇記云張飛冢在刺史大㕔東二十步髙一丈九尺碑目閬中有張桓侯與張遼書石刻漢文八分書方輿勝覽云唐魯王靈䕫滕王元嬰皆鎮是州以衙宇卑陋遂修飾宏大之擬于宫苑謂之隆苑其後避明皇諱改曰閬苑又云或謂閬苑仙有五城十二樓向但有五城而樓尚闕宋德之為守乃建碧玉樓於衙城之西南隅亦名十二樓以成閬苑之勝按杜甫詩嘉陵江色何所似石黛碧玉相因依樓名取此通志云東樓跨府城上形製尚古杜詩層城有髙樓制古丹雘存迢迢百餘尺豁達開四門勝覽云閬州江山奇秀聞天下直前據其㑹曰南樓唐滕王元嬰所建也宋太守李獻卿詩云三面江光抱城郭四圍山勢領烟霞馬鞍嶺上渾如錦繖葢門前半是花通志云㑹經樓在府治將相坊按華陽國志云巴有將蜀有相後因有閬苑三學士錦屏三狀元之盛故以將相名之樓元祐中建置經史子集三萬餘卷蘇軾題額蒲宗孟記勝覽云整暇堂在府治黄魯直記又云治平園宋治平初太守朱壽昌築于牙城東文與可嘗為賦十絶其錦屏閣詩云茂林斑若錦秀巘矗如屏底處供登覽闌干在杳𡨕清風臺云無時來見襲有地更臨髙坐客清談起紛紛落麈毛四照亭云畫箔褰何礙珍叢發已圓願公皆遍賞莫為一隅偏柳橋云挼風誇晩態垂雨怯春寒為問題芳意同誰倚畫欄曲池云水似珠璫入池如玉磬開臨流唯自適魚鳥莫相猜明月臺云微稜生海角圓魄到天心共上惟佳客無容照俗襟三角亭云合棟交生角迴欄互引牙由來因地勢不是故尖斜花塢云繚繞穿紅蕚斕斑踏紫苔誰將錦步障端為使君開藥欄云玉笋齊抽日金缸競列時自然俱可愛莫放畫簾垂郎中菴云已築環為堵仍裁月作床公來時隱几身世在羲皇按通志名宦載壽昌治閬有異政寰宇記云閬中山其山四合於郡故曰閬中名山志云閬中山多仙聖逰集之所志云即錦屏山在城外嘉陵江南與郡治相對兩峰壁立如屏又名寳鞍山方輿云山上有瑪瑙寺羅漢晝錦西橋三院後又築閬峰亭以眺望焉宋陸㳺詩城中飛閣連危亭處處軒窻對錦屏涉江親到錦屏上却對城郭如丹青喻汝礪詩暝色輕烟罩郡城漁舟燈火倒觀星寒山逺水江村暮自在粧成水墨屏按古咸安志火井令袁天綱題云此山磨滅英靈乃絶其下為海棠溪多海棠唐張元寳詩寒食清明倍惘然海棠風落小花鈿如今獨有孤魂在半落嘉陵半錦川李膺益州記云閬中盤龍山南有一石長四十丈髙五尺當中有戸有門若人之掩閉古老以為玉女房通志云在城東三里望如蟠龍之狀後魏盤龍郡以此山名唐貞觀中候氣者言西南千里外有王氣太宗令人入蜀次閬中果見山氣葱蔚後鑿破山脈水流如血今號鋸山咸亨初曾徙閬中縣于此即今之鋸山關也志又云蟠龍山前袁天綱嘗築臺于此以占天象寰宇記云仙穴山在縣東北十里周地圖云靈山峯多雜樹昔蜀王鱉靈登此因名靈山山東南隅有玉女擣練石頂有泉常清冽洞穴懸絶微有一小徑通天寳六年敇改為仙穴山志云一峰峭㧞介宋江嘉陵之間上有鱉靈墓元稹八月六日與僧如展前松滋主簿韋戴同㳺碧澗寺賦得扉字引云寺臨蜀江内有碧澗穿注兩廊又有龍女洞能興雲雨詩中噴字以平聲韻詩云空濶長江礙鐡圍髙低竹樹倚巖扉穿廊玉澗噴紅旭湧塔金輪接翠微草引風輕馴虎洞驅雲入毒龍歸他生莫忘靈山别滿壁人名後會稀玉臺山在城北七里杜詩閬州城北玉臺山有滕王亭杜詩君王臺榭枕巴山萬丈仙梯尚可攀即此地後有滕王墓古碑云閬之第四景為頤神石洞洞虚雙拱密邇玉臺昔滕王建亭于此古人詩文隱隱可辨勝覽云東嵓在城東有寺鑿山為嵓西嵓在城西有奪錦亭與錦屏山相對陸務觀詩奪錦軒中醉倚欄錦屏蒼翠挿雲端平生不喜言爭奪付與游人自在看南嵓在城南有大像山乃唐髙士安隱居之所志云一名台星嵓陳堯叟兄弟讀書于此有捧研亭輿地碑目云天聖九年本路運使司馬池來逰子光侍末云君實捧研勾龍亶請以捧研名亭北嵓在城北有繖蓋山髙僧宣什住持乃城中開元寺衲也謂之東寺即元稹題樂天詩于壁及文同寄詠澤師竹軒處矣什公博通經典魯王出鎮表而異之後居繖子山山上無水以杖叩岩浩然泉湧今為卓錫泉喻汝礪漱玉巖記云自古常言天不負人吾初不甚信曩游太學不啻六千三百日知古所謂屈原賈誼揚雄韓愈柳宗元輩亦頗識其面目及得一第則枯冷羞澁㡬笑破人口比來閬中持手板謁上官奔走匍匐作主簿少府模様燕居作樂則搖口吻弄語言以佞貴人而覔所謂舉狀者嗟乎其局促如此則天果不負人邪然飽聞閬奇山川而賢士大夫最多亦復把酒自慰一日登錦屏拏舟嘉陵江步至占星巖徘徊縱觀倚老松卧怪石往往摩腹一咲然是三境之逰須廢吾一日粮吾不得與女旦暮相從也惟母邱氏漱玉巖近在牆壁外乗興步履從小奚奴直謁主人脱衣散髪坐巖腹酌酒賦詩相與作物外笑樂酒醉發狂即呼天大呌曰天乎真不負喻汝礪矣吾常謂富貴之士不能放意於江山松竹之樂而山川怪奇烟雲竹石詩酒風月唯遺逸未遇之人始得兼而有之故天地間雄偉不凡之處天所以資賢人而舒其憂愁之思者也吾零落荒山鬱鬱無聊賴有錦屏嘉陵之雄偉占星漱玉之勝槩所謂閬之四奇者吾皆得而有之他日解官視吾破嚢無復新井縣一物駈老髯獨負四物以歸朋㳺故舊從吾覔閬中土物吾則與之飲酒取吾詩而歌之則是四景者不移足而在几席間矣通志云文城山在城東三十里峰巒聳列林木葱蒨一峰㧞出名𤣥都壇張道陵授符籙之所寰宇記云天目山在治東界一名天溪洞葛仙公修道之所赤烏七年勑置集靈觀先天二年改名天目觀中和二年改名福唐觀郡志云天目山在城東五十里唐杜光庭詩盤空躡翠到山巔竹殿雲樓勢逼天古洞草深微有路舊碑文滅不知年八州物象通簷外萬里烟霞在目前自是人間輕舉地何須蓬島訪真仙又云曾隨雲水此山遊行盡層峰更上樓九日登臨須有意七年岐路亦堪愁樹紅樹碧髙低影烟淡烟濃逺近秋暫爇爐香不須去佇陪天仗入神州寰宇記云嘉陵水一名西漢水又名閬中水周地圖云水源出秦州嘉陵因名嘉陵經閬中即閬中水又云閬中水亦曰渝水譙周三巴記云閬中有渝水賨鋭氣喜舞漢髙祖樂其猛鋭數觀其舞使樂人習之所謂巴渝舞也路史云太昊伏羲氏母華胥居于華胥之渚孕十有二嵗而降神生于仇夷長于起城註云所都國有華胥之淵乃閬中渝水地也通志云宋江源出漢中府舊㢘縣經蒼溪縣東流入嘉陵有白水源出階州亂山中至昭化縣北合嘉陵唐鄭谷詩蒼蒼白水下嘉陵是也漢地里志縣有彭道將池東西二里南北約五里文緯書䜟云巴西郡治有彭池大澤四夷述云城西南十里有郭池周約五十畆勝覽云彭池即今之南池也郭池即魚池也二地與漢志相符遁甲開山圖註云仇夷山四面絶立與彭池成紀皆西土是伏羲生處仇夷即仇池成起即成紀二字通用南池有漢髙祖廟杜詩崢嶸巴閬間所向盡山谷安知有蒼池萬頃浸坤軸劍南詩藁云唐長慶中南池新亭碑在漢髙帝廟側寰宇記云零星池在縣西北四里益部耆舊傳趙瑤為閬中令時西州遭旱瑤率掾吏齋戒於零星池歸咎自責稽首流血應時大雨侯鯖録云閬州有三雅池昔有人于此池得三銅器狀如杯盞上各有篆字一曰伯雅二曰仲雅三曰季雅按魏文典論云靈帝末斗酒直萬金劉表一子好飲乃製三爵大曰伯雅注一斗次曰仲雅注七升小曰季雅注五升今池所得乃劉氏酒器也通志云城東百廿里有譙𤣥廟漢書𤣥字君黄閬中人少好學能談春秋成帝時拜議郎歴奉谷令後舉繡衣使者王莽居攝易姓名竄歸公孫述僣號連聘不起予毒藥將服之其子瑛盡捐家貲錢贖建武十一年卒光武敕所在還𤣥家財策詔本郡祠以中牢古碑云汝南令神道闕在閬中縣末著人代郡守張晦辨云於東面得𨽻字十有二缺不可識有七輿地紀勝云唐貞觀碑在閬州太霄觀其石光瑩前後可鑒號透明碑本志唐漢州刺史房琯墓碑在縣城外杜詩他鄉復行役駐馬别孤墳近淚無乾土低空有斷雲碑目云唐道襲墓碑在城中報恩寺按蜀檮杌王建以道襲為閬中刺史改其鄉為烈士鄉又云崔善德政碑在衙門東按善武成中為刺史有惠政民人懷之蒼溪縣蒼溪於閬中為上㳺即臨嘉陵水也江㟁有放船亭杜詩送客蒼溪縣山寒雨不開只愁騎馬滑故作放船回後人因以名亭元稹蒼溪縣寄揚州兄弟詩蒼溪縣下嘉陵水入峽穿江到海流憑仗鯉魚将逺信鴈回時節到揚州劉滄宿蒼谿館詩孤館門開對碧岑竹牕燈下聽猿吟巴山夜雨别離夢秦塞舊山迢遞心滿地莓苔生近水㡬株楊柳自成隂空思知巳隔雲嶺鄉路獨歸春草深文同少泊蒼溪山寺詩正午風色髙遂泊蒼溪縣層崖抱林木有寺藏蔥蒨出船步危磴蔭密頗縈轉上到金僊家縁空列臺殿修篁掛懸溜坐覺炎暑變老僧晩經論言語何貫穿引我上髙閣闌干俯江面寥寥百里内山水盡奇觀誰謂覉旅中所見皆所願汀洲白鳥聚井邑清烟散樂此暮忘歸疎鐘起岩畔徙倚下松門尚怪舟人喚舊治在曲肘川去縣一里後周所設也源出玉女山東南流入嘉陵江曲折如肘其近山有小錦屏與錦屏相似其稍逺者縣南三十里為大獲山天池浸其中宋江環遶其下石城四周淳祐間余玠徙閬州治于此又逺之東八十五里有方山逺望如几案古方州城也宋嚴大猷居此因以方山名集矣其著者東南三十五里有雲臺山寰宇記云一名天柱山髙四百丈上方百里有魚池宜五榖無惡毒可度灾周地圖云漢末張道陵在此學道使弟子王長趙昇投身絶壑以取仙桃長等七試已訖九丹遂成郡國志曰雲臺山天柱巖下有一桃樹髙五尺皮是桃心肉似栢張道陵與王良趙昇試法于此樹四百餘年不朽小碑記之志云山有洞四曰麻姑芙蓉平仙峻仙巖二曰松根蟠桃池二曰浴丹玉魚山多榕栢大者空中可坐數人道經云永壽二年重九日道陵將諸品秘籙斬邪二劍玉冊玉印授其長子衡乃與夫人雍氏登峰絶頂白日昇天時百二十三嵗晉顧長康畫雲臺山記見畫苑碑目云唐元稹謫通州司馬曾逰雲臺山書行記于山之鐘樓枋上宋之問送田道士使蜀投龍詩云風馭忽泠然雲臺路㡬千蜀門峰勢斷巴字水形連人隔壺中地龍逰洞裏天願言迴馭日圖畫彼山川馬戴寄雲臺觀田秀才云雪壓松枝拂石窻幽人獨坐鶴成雙晩來漱齒敲冰渚閒讀僊書倚翠幢宋祁西州猥藁云予昔遊雲臺觀謁希夷先生陳摶祠堂緬想其人今追作此詩仙館三峰下年華百歳中夢休孤蝶往蜕在一蟬空蘂笈微言秘霄晨浩氣通丹遺䑛後鼎林遣御餘風市霧沉荒白飡霞委暗紅岷峨有歸約飛步與誰同元廖寥蜀望詩雲臺突出衆山低小徑縈紆上石梯古寺獨存人寂寂斷碑惟覆草萋萋滿空香散春蘭綻萬壑烟生曉樹迷為愛其間風景好登臨㡬度杖青藜志云蒼溪簿金極治道得石塜遺骸尚存有石銘云嵗月不須論車塵擁石門若逢金主簿移我上髙原迺改葬之相沿為金主簿墓不著年代南部縣南部本充國地漢末徙巴西郡于閬中有充國城在焉寰宇記云即今新井縣東北二十八里充國故城是也李雄亂後荒廢唐書趙彦昭舉進士少豪邁風骨秀爽嘗調南部尉與郭元振薛稷善往來吟詠不絶新井西水二廢縣皆接閬中通志云西水河在南部三十五里源出龍州後周西水縣以此名也勝覽云蘭登山在新井縣東二十里相傳嚴君平隱居于此有朝逰蓬漢暮宿蘭登之句三面峻絶俯臨西江本志唐開元中何渙為殿中侍御史知名家于西水明皇賜其鄉為栢臺鄉又云新井縣有二龍里唐任畹任疇之所居也姚合送任畹及第歸蜀詩子規啼欲死君聽固無愁闕下聲名出鄉中意氣逰東川横劍閣南斗近刀州神聖題前字千人看不休有嵓曰靈雲唐蒲景珣家於此岩前為居室至者不知其為嵓也在蟠龍山下有洞人入之履地作鐘聲李燾詩云路轉層岡十里餘武陵傳者亦難如昔年煉藥仙人室今日餐霞道士居洞外蟠桃開錦繡巖前石溜漱瓊琚猗與靈氣為時雨可惜圖經闕不書有樓曰清風宋蒲宗孟左丞建其家多書剏此樓以貯之嘗作訓戒子弟曰寒可無衣饑可無食書不可一日失有院曰慈光冦平仲過新井慈光院看海棠詩云暄風花雜滿欄香盡日幽吟歎異常翻笑牡丹虛得地玉階開落對君王縣東南與蓬州相接三十里為禹跡山志云禹治水所經也山頂平衍有小石泉鑿石為像層樓覆之宋紹興間何汝賢有禹跡山院記五十里為離堆山即古新政縣地蜀三離堆之一也唐顔真卿謫蓬州長史來逰作磨崖記謂此山斗入嘉陵江直上數百尺形勝縮矗上崢嶸而下洄洑不與衆山相聨屬故曰􅄐堆志云東西有石堂故京兆尹鮮于仲通與弟叔明所鑿堂北有盤石石上有九曲流杯池歐陽修集古録云新政縣磨厓記唐顔真卿撰併書以寳應年立碑有魯公祠宋馬存記云上元中顔真卿為建州長史過新政作離堆記四百餘言書而刻之石壁上字徑三寸雖頽壞剝裂之餘而典刑具在使人凜然元符三年予友强叔來尹是邑始為公作祠堂于其側求予文以為記輿地紀勝云新政縣大歴碑在江㟁之次顔魯公書碑傍有佛老孔子像像傍又有二小記皆大厯中物按此所謂三教院也碑目云鮮于氏兩神道碑一在三教院厓上一在墓田其文與書皆出顔魯公又有奬諭仲通碑亦在墓田志云新政縣十里對江報本院鮮于仲通叔明兄弟葬其傍有韓雲卿所撰墓碑猶存其字儼然無剝落按鮮于之後宋時皆家于此景祐間鮮于侁登第為轉運判官值行新法而民不擾司馬温公稱之曰子駿福星也又有十世孫元卿同知縣范百禄州掾任昱觀魯公刻題名其與􅄐堆相近曰仙鳯山志云在縣南五十里上有七曲臺始落成時地上土㾗成仙鳯二字大數丈碑目云宋新政令裴迪唐丞相晉公之後也因家于此尚收得晉公像及累任告身撰真賛並存廣元縣廣元蜀口古今所必爭之地宋寧武軍志云前接關表後據劍門烏奴山祠堂記云郡壤故錯羌氏與上庸百濮微髳彭盧俱寔一大都會也元改為廣元路碑云在易曰廣大配天地在春秋謂一為元以示張大之意縣治在烏奴山東晉壽綿谷二縣皆其處志云烏奴山一名烏龍山在廣元西二里嘉陵江岸峭壁如削有洞不可上昔李烏奴于此修寺因名按北史王元邈傳亡命李烏奴作亂梁部䧟白馬戍𤣥邈率東從七八百人討之不克慮不自保乃使人偽降烏奴告之曰王使君兵衆羸弱棄伎妾於城内㩦愛妾二人去已數日矣烏奴喜輕兵襲州城元邈設伏擊破之烏奴挺身走太祖聞之曰元邈果不負吾意遇也此烏奴之始矣今之臨清門川主廟即唐皇澤寺也九域志云利州都督武士彠生武后于此因賜寺刻其真容李商隱利州江潭詩註感孕金輪乃武則天事也詩云神劍飛來不是銷碧潭珍重駐蘭橈自攜明月移燈疾欲就行雲散錦遙河伯軒牕通貝闕水宫帷箔卷冰綃他時燕脯無人寄雨滿空城蕙葉彫葢后母感溉龍而有孕也縣北即黎州城梁大同置後魏之益州隋之義成郡皆理于此宋唐庚詩黎州酒貴如金汁解盡寒衣纔一吸南有刀環山益州記曰葭萌縣南十里有刀環山赤銅水出焉東即望鄉臺去縣三里武元衡送柳郎中詩望鄉臺下秦人去矣其見諸經傳者曰嶓冢山原為漾水即西漢水也曰潜水出綿谷之龍門山禹貢岷嶓既藝沱潜既道漢書注云潜水從漢中沔陽縣南流至梓潼漢壽縣入穴中通岡山下西南潜出今名複水舊説即禹貢潜水也曰𦙍山為平蜀廢縣即利州衞治史記𦙍侯爵𦙍山出舞衣曰丙穴地在沔水之南出魚肥美詩疏云沔南丙穴是也其見諸雜記者曰白馬山寰宇記云張平子仕漢為侍中少時學業于此曰明月峽晏殊類要云三峽謂巫峽巴峽明月峽也惟明月峽乃在此郡界曰滌溪事林廣記云天下十二溪有上真廟為聖真居之滌溪其一也在利州又云漢江水帝廟為真龍宫在漢坪石其驛路有曰問津志云昔孔明行師于此問津故名按即古嘉陵驛也在治西一里後魏嘉川縣設焉唐姚鵠嘉川驛樓晩望詩樓壓寒江上開簾對翠微斜陽諸嶺暮古渡一僧歸囱逈雲衝起汀遙鳥背飛誰言坐多倦目極自忘機文同嘉川道中寄周正孺詩云草木春深處山川雨過時清佳常滿目衰倦敢忘詩好尚舊若此飄零今比誰爭如畫堂上日日聽新詞又嘉川驛詩云嘉川之西過新棧㡬里朱欄繞青壁我行落月尚在水水影照人襟袖白繁英雜綴修蔓上綠錦纈帶垂百尺清香滿馬去未休賴爾春風慰行客鮮于侁為利州轉運使文與可有寄子駿運使詩云西鄉巴嶺下嶮道入孱顔使騎到荒驛野禽啼亂山問民青靄裏訪古白雲間㡬日南城路新詩滿軸還有靈溪寺在嘉川縣中碑目黄山谷紀行碑在嘉川縣靈溪寺是矣運使子駿題以五言曰桐軒竹軒栢軒巽堂山齋燕閒亭㑹景堂寳峰亭凡八景其詩略云金城環雉堞雲屋瞰闤闠雙林聳江右九隴覘天外按金城縣北四里金山是也滌溪環其右九隴者去邑西二十里山環九十九峰如劍㦸之排列昔漢祖駐䠋于此有漢王寨其時司馬君實范景仁文與可蘇子由皆和有詩温公年譜隨其父利州轉運使逰此有祠在焉南去有望喜驛今廢元稹詩云滿眼文書堆案邉眼昬侵得暫時眠子規驚覺燈又滅一道月光横枕邉李義山詩云嘉陵江水此東流望喜樓中憶閬州若到閬州還赴海閬州應更有髙樓其二云千里嘉陵江水色含烟帶月碧於藍今朝相送東流從猶自驅車更向南北為棧閣道劉禹錫山南西道新修驛路記云我之提封距右扶風觸劍閣千一百里自散關抵褒城次舍十有五自褒而南踰利州至于劍門十有七道塗次舍可見于此又云棧閣凌虛下臨􅞛砑層崕峭絶枘木絙鐡因而廣之限以鈎闌狹經深陘從而拓之方駕從容棧閣之制亦可想也歐陽詹棧道銘斜根玉壘旁綴青泥總庸蜀之道塗統岐雍之康莊其最險者為石欄橋方輿云自城北至大安軍界管橋欄閣共萬五千三百六十一間惟石欄龍洞二閣著名馮鈐幹田云其他閣道雖險然在山腰亦㣲有徑可以増置閣道惟此閣石壁斗立虚鑿石竅而架木其上比他處極險沈佺期過蜀龍門閣詩龍門非禹鑿詭怪乃天功西南出巴峽不與衆山同長竇亘五里宛轉復嵌空伏湍喣潜石瀑水生輪風流水無晝夜噴薄龍門中潭河勢不測藻葩垂彩虹我行當季月烟景共春融江關勤亦甚巘崿意難窮誓將息機事煉藥此山東岑參赴犍為經龍閣道詩云側逕轉月壁危梁透滄波汗流出鳥道膽碎窺龍窩驟闕二字溪谷歸雲網松蘿屢聞羌兒笛厭聽巴童歌江路險復永夢魂愁更多聖主幸典郡不敢嫌岷峩杜甫龍門閣詩清江下龍門絶壁無尺土長風駕髙浪浩浩自太古危塗中縈盤仰望垂線縷滑石欹誰鑿浮梁裊相拄目眩隕雜花頭風吹過雨百年不敢料一墜那得取本志北十里千佛崖即古龍門閣先是懸崖架木作棧而行後鑿石為千佛像成通衢矣唐蘇頲利州北題佛龕記云吾見夫山連岷嶓水合江沲山兮水兮路窮險鬱南望兮此情多吾又見像法住世于巖之阿百千萬億兮相觀我載琢載追兮吾匪他伊古昔兮焦吕不懼必忠信兮艱危若何故吾因空而即有孰不迴向以檀那行矣些陽景頽兮翠改色陰風起兮自增波小許公利州北佛龕前重于去歳題處作詩云重巖載看美分塔起層標蜀守經塗處巴人作禮朝地疑三界出空是六塵銷卧石鋪蒼蘚行塍覆緑條歳年書有記非為學題橋按龍門山亦云葱嶺山梁州記云葱嶺有石穴髙數十丈其狀如門號為龍門又云山東南有玉女山山上有一石穴中若房宇有玉女八人不出穴前修竹下有石壇風來動竹掃壇如箒又云山北有燕子谷中有好磬石即志所稱石燕山又北三十里有大小漫天嶺極髙峻羅隱詩云西去休言蜀道難此中危險已多端到頭未會蒼蒼色爭得禁他兩度漫髙駢詩云萬水千山音信稀空勞魂夢到京畿漫天嶺上頻回首不見虞封淚滿衣嶺上有寺元稹題漫天嶺智藏師蘭若云僧臨大道閱浮生來往憧憧利與名二十八年何限客不曾閒見一人行又漫天嶺贈僧詩云五上兩漫天因師懴業縁漫天無盡日浮世有窮年又北五十里為朝天嶺路徑險絶方輿云舊路在朝天峽棧閣後開此路人甚便之文與可朝天嶺詩嶺若畫屏隨峽勢水如衣帶轉嵓陰按今設有沙河驛亦沿江行其曰朝天者水驛也四十里為潭毒關志云潭下淵底有一鉄索見則兵動向有御前軍屯此以捍蜀口又二十里為神宣驛即古籌筆驛也相傳武侯出師駐此唐杜牧詩永安宫受詔籌筆驛沉思李義山詩魚鳥猶疑畏簡書風雲長為䕶儲胥是也神宣驛者世傳二郎神持劍逐蹇龍過此因名又八十里為九井驛志云琳瑯九井以琳瑯山出泉九處濺石若琳瑯也碑目云九井灘舊時有蝦蟆青牛青塠三巨石伏水為舟楫害淳熙間利路提刑張曩容募降人冉得者治械如桔橰狀冶鉄為杵重千五百斤抛擲半空而下三石俱碎化險為夷有碑刻剝落其上為七盤關乃秦蜀分界處唐沈佺期詩獨逰千里外髙卧七盤西山月臨窻近天河入戸低後人因立為天河閣顧非熊天河閣即事云萬壑褒中路何層不架虚徑雲和棧起樵徑帶畲餘嵓狖牽垂果湍禽接躍魚相逢維艇處塢裏有人居昭化縣葭萌地入廣元而其縣理在漢為漢壽晉為晉壽者則屬昭化本志云縣北百八十里施店驛即古葭萌驛驛即故縣址也未通保寧路時自秦入蜀罔有不由昭化者唐張説再使蜀道詩云𦕈𦕈葭萌道蒼蒼褒斜谷煙霞爭晦深雲山共重複古來風塵子同眩望鄉目芸閣有儒生軺車倦馳逐青春客岷嶺白露搖江服嵗月鎮羇孤山川俄反覆魚游戀深水鳥遷戀喬木如何别親愛坐去文章國蟋蟀鳴戸庭蠨蛸網琴筑北接廣元則龍門石櫃白水景谷之地彼此參錯海内東經云白水出蜀而東南注江郭景純註水微白濁今在梓潼白水縣源從臨洮之西傾來經沓中東流通陰平至漢壽縣入潜梁州記云城西南百八十里白水關即李固解印綬處也蜀志先主斬楊懐髙沛于此元和郡國志云景谷縣西南二十五里有白馬山孔明造木牛流馬處南接劍門則有大劍城元和志云即秦張儀司馬錯伐蜀所由路又謂之石牛道有小劍城注水經云小劍城去大劍城三十里連山絶險飛閣通衢故謂之劍閣也是唐益昌縣地矣又有小劍故城在益昌縣西南五十里其山截野横天犇峰倒地挾楚包漢呀秦擁蜀劉先主以閣道至險又置閣尉焉岑參和杜相公發益昌詩云相國臨戎别帝京擁麾持節逺横行朝登劍閣雲隨馬夜渡巴江雨洗兵山花萬朶迎征葢川柳千條拂去旌暫到蜀城應計日須知明主待持衡利州淳化帖䟦云慶元中四川總領權安節以淳化戲魚帖并釋文重刻石劍門寺内石今已不存權總江州德安人其家猶有當時墨本甚多釋文字畫較臨江帖為稍大云劒領中有馬鳴閣志云先主使陳戎絶馬鳴閣魏武聞之喜曰此閣過漢中之陰平乃咽喉之要路又有白衞嶺唐明皇幸蜀過此見𤣥元皇帝騎白衞而下示取禄山之兆遂封嶺神白衞公唐詩紀事載明皇幸蜀登白衞嶺眺覽良久歌李嶠山川滿目淚沾衣富貴榮華能㡬時不見只今汾水上惟有年年秋鴈飛詩曰李嶠真才子也有桔栢潭今昭化驛是驛有古栢土人呼為桔栢故以名潭志云桔栢渡舊傳其津有二魚負舟往往沉溺一道士求渡操舟者難之道人云吾乃葛仙翁命取石書符令舟人佩之至中流二魚果出擲符水中少頃浪息次日二魚死于龍爪灘下按唐書𤣥宗幸蜀次益昌縣渡桔栢江雙魚夾舟而迎從臣以為龍也杜甫桔栢渡詩云青𡨕寒江渡駕竹為長橋竿濕煙漠漠江永風瀟瀟連笮動嫋娜征衣颯飄颻急流鴇鷁散絶岸黿鼉驕西轅自兹異東逝不可要髙通荆門路濶㑹滄海潮孤光隱顧盻逰子悵寂寥無以洗心胷前登但山椒蜀中廣記卷二十四
