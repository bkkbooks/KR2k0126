body:
  text: 蜀中廣記卷一百五明曹學佺撰畫苑記第一成都周公禮殿聖賢圖考云殿在子城内南門之東前漢文翁學宫故址後漢獻帝興平元年甲戌太守高眹重立舊號周公禮殿殿制甚古低屋方柱柱上狹下廣與今異制殿有板龕䕶先聖像邱文播畫山水龕後有板壁黄筌畫湖灘邱畫今亡獨黄畫存殿之壁高下三方悉圖畫上古以來君臣及七十二弟子像世傳晉太康中太守張收之筆即銘劍閣張載父也宋嘉祐中王素命摹寫為七卷凡一百五十五人為成都禮殿聖賢圖紹興中席益又摹寫于石經堂凡一百六十八人案續記可辨識姓名者一百七十三人今貌像宛然者一百四十九人僅存髣髴者三十二人姓名存者六十五人今仍紀續記姓名于左盤古伏羲神農蒼頡沮誦黄帝少昊高陽祝融高辛堯舜禹咎繇稷契伯夷䕫湯伊尹高宗傅説太王王季太伯文王武王太顛閎夭散宜生南宫括太公周公召公宣王仲山甫管仲子産老子蘧瑗孔子顔囘閔損冉耕家語作冉有冉雍冉求端木賜卜商樂欬仲由有若宓不齊原憲商澤曽參南宫韜韜史記作括公冶長言偃公西箴箴家語作減顔高高家語作刻公西赤樊須宰予高柴任不齊漆雕開顔噲冉孺漆雕徒父家語無父字榮旂旂家語作祈奚容箴家語無容字澹臺滅明琴牢廉瑀施之常公伯寮秦商秦非后處后家語作石石作蜀作家語作子邽巽巽家語作選巫馬施施家語作期廉潔梁鱣燕伋孔忠商瞿上家語無上字鄭國曹䘏公晳哀晳家語作西壤西赤家語作穰駟赤顓孫師原元籍家語無元字公肩定家語無定字漆雕哆哆家語作侈曽㸃㸃史記作箴公祖勾兹家語無勾字步叔乗左人郢家語無人字顔無由由家語作繇司馬耕顔祖祖家語作相申儻儻家語作績秦祖伯虔顔幸鄔單家語作懸亶叔仲㑹公孫龍冉季秦冉公良孺狄黑李氷蕭何張良叔孫通陸賈漢文帝賈誼文翁漢武帝董仲舒公孫宏倪寛司馬相如王吉蕭奮戴勝匡衡王尊李彊莊君平劉向揚雄漢光武鄧禹張堪張湛桓温劉平鍾興第五倫廉范班固黄昌种暠馬融李膺高眹陳寔服䖍陳紀鄭𤣥諸葛亮龎統董和費詩譙周鍾繇王肅羊祜張華杜預王濬夏侯湛喬智明范廣王尊謝安桓石䖍已上元費著成都志所載其曰續紀者宋王剛中續成都古今記也今學宫惟存孔子及七十二子像又摹宋本而重刻云益州學館記云獻帝興平元年陳留高眹為益州太守更葺成都玉堂石室東别創一石室為周公禮殿其壁上所畫上古盤古李老等神及厯代帝王之像梁上畫仲尼七十二弟子及三皇以來名臣耆舊云是西晉太康中益州刺史張收筆古有益州學堂圖今已别重粧無舊迹矣齊永明十年成都刺史劉悛再修玉堂禮殿靈宇嚴肅悛弟瑱善畫性自天真時推妙手于殿畫仲尼四科十哲像并車服禮器張彦逺名畫記云益州學堂圖昔畫古聖帝賢臣七十子後代又増漢晉帝王名臣及蜀之賢相牧守似東晉時物王羲之與周益州書知有漢時講堂是漢何帝時立此知畫三皇五帝以來備有畫又精妙甚可觀也彼有能畫者不欲因摹取當可得否信具告郭若虛圖畫見聞志云漢文翁學堂在益州昔經頹廢後漢高眹復繕立併畫古人聖賢之像及瑞物於壁靖康初資縣令盧法初建惠逺堂摹禮殿人物圖繪堂中紹興中黔江學築東西序亦繪七十子像子壁俱本志威逺志云縣西十里伏羲洞石壁上鐫有伏羲神農等像旁有碑亦苔蝕不知何代物輿地紀勝云蘭登山洞中有嚴君平刻像此山在南部縣西四十里三面峻拔俯瞰西河嚴君平常隠此後於谷母岩上仙去曽有朝遊蓬漢暮宿蘭登之句桓譚新論曰蜀人掦子雲因衆儒之説天以為葢常左旋日月星辰隨而東西乃圖畫形體行度參以四時厯數昏明晝夜欲為世人立紀律以垂法後嗣張華博物志云蜀郡太守劉褒畫雲漢圖人見之覺熱又畫北風圖人見之覺涼褒漢桓帝時人劉涇王稚子石闕記石闕上下有衣冠鳥獸等像僅可辨氣韻精簡過於顧陸漢王稚子闕兩角有斗又作重屋四壁刻神像人物牛馬之類今已漫滅出新都縣志王渙墓二石闕高各丈餘望之儼一方柱但有觚稜與㢝覆頂耳毎面濶不及二尺上層人物下層牛馬有人控馭之盤旋繞柱宛若游龍皆凸欵也右闕漫滅殆盡左闕對墓一面正北存人物衣冠生動如天人者三其餘人馬花卉猶隠隠可辨忠州臨江縣巴王廟前有丁房雙闕對峙廟庭高可二尺上為層觀飛簷裴􅏆四旁多刻車馬人物左闕上為雙扉其一扉㣲啓有美人出半面而立皆極巧妙刻雖漫滅有漢丁房等字可認也出輿地碑目吳書曰劉先主前後見張松法正因問蜀中濶狹兵器府庫人馬衆寡及諸要害道里逺近松等具言之又畫地圖山川處所由是盡知益州虚實也華陽國志諸葛亮為南夷作圖譜先畫天地日月君長城府次畫神龍龍生夷及牛馬羊後畫部主吏乗馬幡葢巡行安䘏又畫牽牛負酒齎金寳詣之之象以賜夷夷甚重之毎刺史校尉至齎以呈詣葢南夷之俗徴巫鬼好詛盟投石結草官常以盟詛要之也蜀志亮子瞻字思逺善書畫為侍中僕射軍師將軍陸務觀跋漢栢圖云此圖予家舊藏予居成都七年屢至漢昭烈惠陵此栢在陵旁廟中忠武侯室之南所謂先主武侯同閟宫者與此略無少異則畫工亦當時名手也淳熈六年己亥識益州中興寺内墨池院有前漢揚子雲莊君平李仲元三賢畫像宋張俞賛出成都文類宋祁知益州占學宫之西作文翁祠肖像於宁又繪相如王褒揚雄於東西壁繪高眹蔣堂於宧漏以配之見文翁祠記東坡夢作司馬相如求畫賛其敘曰夜夢嚴君平司馬相如揚子雲合席而坐子雲曰長卿久欲求公作畫賛余辭以罪戾之餘久廢筆硯子雲懇祈不獲已為之既成子雲戲余曰三賦果足以重趙乎余曰三賦足以重趙則子之太𤣥果足以重趙乎為之一笑而散賛曰長卿有意慕藺之勇言還故鄉閭里是聳景星鳯凰以見為寵煌煌三賦可使趙重綿州志州西七里鳯嶺下仙雲觀葢揚雄别墅也壁刻子雲真像乃宋王助筆漢隠士段翳故宅有畫段隠君李真人二像出金堂志不知何代物益州耆舊傳漢嘉州孝女叔先雄自沉於江郡縣表上為圖像祠之碑目云雲陽縣有漢處士金廣延母子碑但刻人物初無文字益部耆舊傳曰益州刺史董榮圖畫譙周像於州學命從事李通頌之曰抑抑譙侯好古述儒寳道懷真覽世盈虛雅名美迹終始是書我后欽賢無言不譽攀諸前哲丹青是圖嗟爾來葉鑒兹顯謨河南憲幕何震得許旌陽傳令工倣其事蹟圖畫於德陽縣祠堂壁間祠亦何君所建也出虞集本祠記括異志成都畫師許姓者善傳神偶有弊衣憔悴人來求者許笑曰容狀如此而求寫耶其人解布囊出黄道服鹿皮冠白玉簮頂冠易衣危坐以手摩面則童顔矣已引其鬚應手而黒乃一美丈夫也許驚拜曰不知神仙降臨道士曰君傳吾象肆中有求售止取千錢後有識者曰此靈泉朱真人也求者輻輳許貪毎畫取二千夜夢道士曰汝福有限忽吾言妄取將促而壽也因批其頰既寤頭遂偏時人號曰許偏頭晉顧愷之畫雲臺山記曰山有面則背向有影可令慶雲西而吐於東方清天中凡天及水色盡用空青竟素上下以暎日西去山别詳其逺近發迹東基轉上未半作紫石如堅雲者五六丈夾岡乗其間而上使勢蜿蟺如龍因抱峰直頓而上下作積岡使望之蓬蓬然凝而上次復一峰是石東隣向者峙峭峰西連西向之丹崕下據絶磵畫丹崕臨澗上當使赫巘隆崇盡險絶之跡天師坐其上合所坐石及廕其磵中桃傍生石間畫天師瘦形而神氣逺據磵指桃囘面謂弟子弟子中有二人臨下倒身大怖流汗失色作王良穆然坐荅問而超昇神爽精詣俯盻桃樹又别作王趙趨一人隠西壁傾巖餘見衣裾一人全見室中使輕妙泠然凡畫人坐時可七分衣服彩色殊鮮㣲此正葢山高而人逺耳中段東面丹砂絶㠋及廕當使嵃㟞高巖孤松植其上對天師所壁以成磵磵可甚相近相近者欲令雙壁之内悽愴澄清神明之居必有與立焉可於次峰頭作一紫石亭立以象左闕之夾高巖絶㠋西通雲臺以表路路左闕峰以巖為根根下空絶并諸石重勢巖相承以合臨東磵其西石泉又見乃因絶際作通岡伏流潛䧏小復東出下磵為石瀨輸没于淵所以一西一東而下者欲使自欲為圖雲臺西北二面可一圖岡繞之上為雙碣石象左右闕石上作孤遊生鳯當婆娑體儀羽秀而翔軒尾翼以眺絶澗後一段赤圻當使釋弁如裂電對雲臺西鳯所臨壁以成磵磵下有流清其側壁外面作一白虎匍石飲水復為降勢而絶凡三段山畫之雖長當使畫甚促不爾不稱鳥獸中時有用之者可定其儀而用之下為磵物景皆倒作清氣帶山下三分居一以上使耿然成二重按此記自古相傳脱誤處不得善本校之出魏晉名流畫賛雲臺在今蒼溪縣界范蜀公跋醉僧圖云此本醉僧圖閻立本加冠巾者黄往道謂是顧凱之醉客圖或疑蜀公得之傳記往道以世所傳便謂然今考於畫記等書長康惟一西園圖世猶有傳摹得者與此異甚劉餗又謂閻令别作醉道圖而醉僧圖亦自見於世之二説者非也然衣服冠櫛尊器皆是晉隋間所尚疑亦當時人所為自是極致至於放浪沈湎遁於真逸似是竹林人亦嘗求於禮法不能約束而全縱蕩者耶此非真到醉鄉得酒中三昧亦不應知此其論筆力簡古得形神全者皆知畫糟粕爾不可謂真知畫趣者也出董逌畫跋龍門續志葛穉川像在蒼溪縣雲臺巖本志亦云書岩在雲臺山之東葛稚川讀書處有稚川像在焉嘉州志楚狂接輿像古繪於歌鳯臺中臺在三峨館今廢又云州治郭景純所定今凌雲巖上鐫繪璞像者二所圖畫聞見志李雄有舞鍾馗圖不知為誰瑩碧池在金堂縣石城山清脩寺傍梁張僧繇故居也僧繇毎畫滌硯於池至今水色猶黒挹之則清出蜀志補罅南史僧繇梁時為吳興太守值昭明太子偶患風恙醫不能效僧繇乃畫二獅子密懸於青宫禁門之上其夕太子即有起色費著名畫記唐滕王元嬰高祖子也善畫蝶武德年出鎮蜀中故王建宫詞有内中數日無呼喚搨得滕王蛺蝶圖之句酉陽襍爼曰滕王畫蛺蝶有數名江夏斑大海眼小海眼村裏來菜花子唐藝文志有滕王蛺蝶圖二卷又有嗣滕王湛然畫蜂蝶燕雀態巧之外曲盡情理見唐名畫錄陳後山賦宗室畫詩滕王蛺蝶江都馬一紙千金不當價酉陽襍爼云唐李衞公畫得峽中異蝶翅濶四寸餘深褐色毎翅上有二金眼按德裕於太和中為西川節度使渡峽有見而作盧照鄰相樂夫人檀龕讃并序相樂夫人韋氏者益州都督長史胡公之繼親也夫人寓跡蘭閨栖情香岫琢磨六行與三明而並驅馳騖四禪將十訓而齊駕粤以乾封紀嵗流火司辰敬造靈龕奉圖真相青蓮皓月爭華蚊睫之端寳樹天倡競爽鴻毛之際納須彌於纎芥嘗謂徒言置由旬於方丈今過其實重宣此義敢為讃云猗歟實相顯允神工規模鹿苑圖寫龍宫分身諦聽列坐談空羣天䬃纚衆寳玲瓏彫牕引月鏤網揺風一窺妙境高謝塵䝉蘇頲淨信變相讃云道之元尊洞照前刼身也淨信終成後業後業伊何暢我𤣥風𤣥風伊何俾我韋公頃發皇揆鎮于蜀國竭心為政盈耳頌德哿矣夫人繢兹羣真函遷副相欻夭如賔府署因脩庭除改製既丹既皜或轉或翳公則斯念余其載覿幕齊舍堂追魯壞壁金海珠樹清都碧虚魂歸自此像設如初禽鳥不入文翁是務神靈所扶文考是賦粤幽讃者老焉釋焉其信受者式䕶式傳歸以戀兮來以益現即前兮過為昔玉江流兮錦城闢嵗永永兮綿奕奕益州長史胡樹禮為亡女造畫盧照隣為之賛曰夫鎔金逞妙徒罄中人之産架寳崇奢未階大乗之化豈若圖徽紈素巻舒方丈之筵表裏丹青藻繪多林之色獨為先覺其在兹乎益州長史公道洽中孚履黄裳以貞吉寄隆分陜苴白茅而渉川猶為龜組相輝不離泡幻之域熊車結轍尚迷苦愛之津爰捨淨財幸求多福為亡女宇文氏敬造畫像等軸徵竒綃於水府採妙色於霞莊月面澄華疑金雲之夜敞蓮毫吐照狀珠浦之晨開花寳參差眺鶴林其非逺仙雲肹蠁登鷲巖其可望窮形盡相陋燕壁之含丹寫妙分容嗤吳屏之墜筆式揚顯福俾讃幽魂其詞曰正教東漸遺像西至化格三天功超十地偉歟大士𢎞兹逺致追慟幽途載營檀施皎潔霜紈照影丹素果發金口蓮生玉步地寳天花星羅雲布惠炬長設迷津永渡益州德陽縣善寂寺碑云佛堂東壁畫二聖僧丹青未畢大啓神光隣玉麈之崇輝發金龕之實相王勃之文也畫葢唐初名筆保寧志云利州城西北渡江二里吿成寺有唐高宗則天后真容倚巖為樓俗傳為阿武婆婆梳洗樓九域志武士彠為利州都督生則天於官今州西皇澤寺有武后真容殿黄休復益州名畫錄唐薛稷天后朝仕至太子少保文章學術名冠當時而好圖畫畫品錄云秘書省有薛少保畫鶴時稱一絶又聞蜀郡多有公畫盧求成都記云府衙院西㕔少保畫鶴與青牛并少保自眉州司馬遷移文記今改舊制無畫蹤矣杜甫通泉縣署屋壁後薛少保畫鶴詩薛公十一鶴皆寫青田真畫色久欲盡蒼然猶出塵佳此志氣逺豈惟粉墨新高堂未傾覆幸得慰嘉賔曝露墻壁外終嗟風雨頻益州畫錄云先是蜀人未嘗得見生鶴皆以薛少保所畫為竒物薛稷在普慧寺壁畫西方變相又自書寺額故少陵詩云少保有古風得之陜郊篇惜哉功名忤但見書畫傳我遊梓州東遺迹涪江邊畫藏青蓮界書入金牓懸又揮西方變發地扶屈椽惨淡壁飛動到今色未填屈一作屋碑目云在通泉壽聖寺葢宋改名胡氏亭畫記撿挍尚書司空員外郎賜緋魚袋郭圓撰藝游而至者則神傳焉神傳者國寳矣墨妙之於藝又加貴焉浮圖燄熾今國力不能迨也故藝之至者雖鴻德鉅儒亦伍於工徒矣唐故宰相薛公稷畫入神品以名之重時加貴之成都靜德精舍有壁二堵雜繪鳥獸人物態狀生動乃一時之尤者也吾后帝宇之五年汙叛帖夷萬方無事於是大去蠱人之疾以浮圖氏為最詔走御史監毁域内之祠凡雲構山峙之宇一時而壞百工之名跡隨去焉胡氏璩文而好古惜少保之跡不存於鄉迺􅍾斤挾黨力剟於頹坌之際得人三十七頭馬八足又於福勝祠獲展氏子䖍天樂二十五身及鄉之名工李氏感天樂十二色皆神傳異跡嵌于茅亭之壁於是長者之車益滿門矣任愚子若缺時寓蜀壯君好事之心亡其壓覆於是染醉毫紀其事于石㑹昌五年五月三日記今畫舊跡已没唯存石記在三學山廨院東北此院是胡璩故宅吳道𤣥者天賦勁毫幼抱神奥往往於佛寺畫壁縱以恠石崩灘若可捫酌明皇令其往嘉陵觀山水囘奏云臣無粉本乃記在心命圖之一日而成是時李將軍思訓亦善山川帝亦令貌數月方畢帝曰思訓數月之功道𤣥一日之跡並皆妙也出厯代畫斷朱景真名畫錄云明皇天寳中忽思蜀道嘉陵江山水遂假吳道子驛使令往寫貌及囘帝問其狀奏曰臣無粉本並記在心宣令於大同殿圖之嘉陵江三百餘里山水一日而畢鹽亭志縣有聖像碑吳道子筆趙子昂賛蜀萟文志唐吳道子畫聖像小影尚佐均有記東坡四菩薩閣記始吾先君於物無所好燕居如齊言笑有時顧嘗嗜畫弟子門人無以悦之則爭致其所嗜庶幾一解其顔故雖為布衣而致畫與公卿等長安有故藏經龕唐明皇帝所建其門四達八版皆吳道子畫陽為菩薩陰為天王凡十有六軀廣明之亂為賊所焚有僧忘其名於兵火中取其四版以逃既重不可負又迫於賊恐不能皆全遂竅其兩版以受荷西奔於岐而寄托於鳥牙之僧舍版留於是百八十年矣客有以錢十萬得之以示軾者軾歸其直而取之以獻諸先君先君之所嗜百有餘品一旦以是四版為甲治平四年先君没於京師軾自汴入淮泝於江載是四版以歸既免喪所嘗與往來浮屠人惟簡誦其師之言教軾為先君捨施必所甚愛與所不忍捨者軾用其説思先君之所甚愛軾之所不忍捨者莫若是版故遂以與之且告之曰此明皇帝之所不能守而焚於賊者也而況於予乎予觀天下之蓄此者多矣有能及三世者乎其始求之若不及既得惟恐失之而其子孫不以易衣食者鮮矣予惟自度不能長守此也是以與子子將何以守之簡曰吾以身守之吾眼可矐吾足可斮吾畫不可奪若是足以守之歟軾曰未也足以終子之世而已簡曰吾又盟於佛而以鬼守之凡取是者與凡以是予人者其罪如律若是足以守之歟軾曰未也世有無佛而蔑鬼者然則何以守之曰軾之以是予子者凡以為先君捨也天下豈有無父之人歟其誰忍取之若其聞是而不悛不惟一觀而已將必取之然後為快則其人之賢愚與廣明之焚此者一也全其子孫多矣而況能久有此乎且夫不可取者存乎子取不取者存乎人子勉之矣為子之不可取者而已又何加焉既以予簡簡以錢百萬度為大閣以藏之且畫先君像其上軾助錢二十之一期以明年冬閣成銘心絶品云遂寧客館鎮張衍知縣家有吳道子三教圖蜀僧智永房有道子慈氏菩薩圖順慶志府東三十里龍門寺宋嘉定中建上有魚藍觀音像臨唐吳道子筆今存大足志縣郭外北山沿崕里許皆刻佛像一維摩居士大類吳道子筆法李廌畫評云李用及能畫鬼神其體格雄贍筋力魁壯既無所羈束又不專詭怪凡為鬼神者多以面擬金剛身擬善神用及則不然獨宗呉生之筆曽同畫相國寺壁至今稱之元宗幸蜀姜皎以藩邸舊臣扈駕至綿州畫角鷹於督郵亭壁甚精妙一刺史模石䜿州堂後當時鷹隼不敢入城後守模換去載至城南舟壞没于潭乃嘆曰無功矣後人遂名其灘曰無功出本志按皎𤣥宗時太常卿善畫封楚國公寓綿州有所畫角鷹知名於時杜少陵詩楚公畫鷹鷹戴角殺氣森森到幽朔觀者貪愁掣臂飛畫師不是無心學此鷹寫真在左綿却嗟真骨遂虛傳梁間燕雀休驚怕尚未摶扶上九天陸務觀劍南詩稿云姜公角鷹在綿州錄參㕔唐明皇令畫工畫十眉圖一曰鴛鴦眉又名八字眉二曰小山眉又名逺山眉三曰五岳眉四曰三峰眉五曰垂珠眉六曰稜眉又名却月眉七曰分梢眉八曰涵煙眉九曰拂雲眉又名横煙眉十曰倒暈眉東坡詩成都畫手開十眉横雲却月爭新竒出丹鉛錄益州名畫錄唐韋偃京兆人寓止蜀川善畫馬韓幹之亞也杜甫歌云韋侯别我有所適知我憐君畫無敵戲拈禿筆掃驊騮歘見騏驎出東壁一匹齕草一匹嘶坐看千里當霜蹄時危安得真置此與人同生亦同死蜀中寺觀亦無筆迹唯好古者收得畫錄定為妙品又云偃畫山水竹樹人物等思高格逸居閒嘗以越筆㸃簇鞍馬人物山水雲煙千變萬態其為馬或騰或倚或齕或飲或驚或止或走或起或翹或跂其小者或頭一㸃或尾一抹山以墨斡水以手擦曲盡其妙宛然如真其高僧松石鞍馬人物可居妙上品山水人物等居能品偃畫松好作交枝屈鐵之勢古勁無倫杜少陵作偃雙松圖詩韋侯韋侯數相見我有一匹好東絹重之不減錦繡段已令拂拭光淩亂請君放筆為直榦葢戲之也董逌跋李太白畫像秋水為神春氷為質神鋒太儁逸氣震放葢玉在璞而流光金藏􅑭而著美凝脂㸃漆豈非神仙中人瓊枝瑶樹自是風塵外物此葢造化之元精含於渾淪而不得藏者且將見有而示人吾何足以明之䕫府卧龍寺有諸葛孔明畫像宋張震立祠時物也詩史堂有杜子美畫像王十朋詩何人作堂畫遺像收拾光芒榜詩史成都草堂有少陵像是䕫府别駕何宇度所刻陸務觀集云予以攝事漢嘉畫岑公參像于州壁成都古今記草堂寺有浣花夫人繪像按夫人姓任西川節度使崔旴妾也大厯時人封冀國新都志云冀國任夫人真像有靈在法圓寺後唐光啓中寺廢為荷澤院董逌跋資州今蜀道圖云顧長康愛嵇叔夜詩因為之圖而垂綸長川目送歸鴻等語灼灼在人耳目畫之不可已也如此此圖雲勢岫色林谷明藹皆有逸趣非嘗厯蜀道而知少陵詩意者未易迨此大觀四年二月日書蜀山水有圖杜少陵題嚴鄭公㕔詩日臨公館靜畫列地圖雄劒閣星橋北松州雪嶺東華夷山不斷呉蜀水相通興與烟霞㑹清尊幸不空盧楞伽者京兆人也善畫明皇駐蹕之日自汴入蜀名播蜀川當代名流咸伏其妙至德二載起大聖慈寺乾元初於殿東西廊下畫行道高僧數堵顔真卿題賛時稱二絶至乾寧元年王蜀先主於寺東廊起三學院不敢損之移一堵於院門南一堵於門北一堵於觀音堂後此三堵六身畫經二百五十餘年宛如也西廊下一堵馬鳴提婆像二軀雖遭粉飾猶未損其筆蹤餘者重粧皆昧前迹出益州名畫錄又云三學院舊名東厨院門兩畔畫東北二方天王兩堵蜀王建脩寺後移在院内北廊下亡失姓名按此楞伽之筆古寺名筆云成都西林院佛殿壁後彌陀佛及二菩薩彌勒羅漢極樂院殿内十六羅漢俱盧楞伽筆又云成都保福院佛殿内羅漢一堂亦盧楞伽筆舊記中不載葢自昭覺改神霄徙來之物成都記極樂院有盧楞伽畫跡蘇文忠同潁濵來觀題壁而去范至能峨眉行記牛心寺有唐人畫羅漢一版筆迹超妙眉目津津欲與人語蜀寺畫胡僧推盧楞伽為第一今見此板乃知楞伽源流所自國初牛心後寺此壁猶存但漫滅耳予得之萬年僧惟淨云銘心絶品云漢州何耕道夫類元家有楞伽小本十六羅漢圖辛澄者不知何許人也建中元年大聖慈寺南畔創立僧伽和尚堂請澄畫焉纔欲援筆遇一胡人云僕有泗州真本一見甚竒遂依様描寫及諸變相未畢蜀城士女瞻仰如雲供養無虛日今已重粧損矣普賢閣下五如來同坐一蓮花及鄰壁小佛九身閣裏如意輪菩薩並澄筆見存出益州畫錄畫品云成都大慈普賢閣外南壁畫佛㑹一堵五如來一堵八菩薩釋迦佛一堵并閣後壁文殊普賢北畔五髻文殊彌勒下生北方天王并堂内四柱上四天王並辛澄筆朱景元畫錄王宰家于西蜀貞元中韋令公以客禮待之畫山水樹石出于象外杜員外贈歌云十日畫一松五日畫一石能事不受相促迫王宰始肯留真迹景元曽於故席䕫舍人㕔見一圖幛畫臨江雙樹一松一栢古藤縈繞上盤空下著水千枝萬葉交植曲屈分布不雜或枯或榮或蔓或亞或植或倚葉疊千重枝分四面達士所珍凡目難辨又于興善寺見畫四時屏風若移造化風候雲物八節四時於一座内妙之至極也唐符載劒南西川幕府諸公寫真讃序云戊辰嵗尚書韋公授鉞之四年也初尚書以汧隴殊勲拜執金吾天子猶以為功重而報輕俾作鎮于蜀得自開幕府延納賢雋焉韋公虛中下禮愛敬士大夫故四方文行忠信豪邁倜儻之士奔走接武麇至幕下縉紳峩峩皆一時偉人時符子客於成都歎其盛美又咸得衆君子之歡而嘗思欲讃頌之事無由緣殆似行佞藴蓄浩思殊欝欝不快也適㑹有沙門義全者善丹青尤攻寫真諸公博雅好事皆使圖畫之山客由是得書曩意因述寫真讃十三章使士林才彦不獨仰大府得賢之盛抑亦欲屬詞比跡各明其為人也李洪度者蜀人也元和中府主相國武公元衡請於大聖慈寺東廊下維摩詰堂内畫帝釋梵王兩堵笙竽鼓吹天人姿態筆蹤妍麗時之妙手莫能偕焉㑹昌前諸寺圖畫多除毁惟餘此一處見益州畫錄又云浣花龍興寺成都記謂本正覺寺也中堂有前益州長史臨淮武公元衡并從事五人繪像俱朝服為淳化五年兵火殘燬南部志裴迪唐丞相晉公之後宋初為新政令因家焉藏有晉公遺像自撰真賛名畫記左全蜀人本儒家子工畫佛道人物多倣吳生之筆今大慈寺多寳塔地獄變相是也白樂天在忠州作荔枝圖以寄朝士自序云荔枝生巴蜀間樹團團如帷葢葉如冬青華如橘春榮實如丹夏熟朶如葡萄核如枇杷殻如紅繒膜如紫綃瓤肉潔白如氷雪漿液甘酸如醴酪若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣左全者蜀人也本自名家世傳畫蹟寳厯中於大聖慈寺中殿畫維摩詰變相獅子國王菩薩變相三學院門上三乗漸次脩行及降魔變相文殊閣東畔水月觀音千手眼大悲變相極樂院門兩邊金剛經驗及金光明經變相前寺南廊下行道二十八祖北廊下行道羅漢六十餘軀又於多寳塔下倣長安景公寺吳道元地獄變相葢當時吳生畫此地獄相都人咸觀懼罪脩善兩市屠沽經月不售云全塔畫至王蜀時令雜手重粧已損惟存大體大中初又於聖壽寺大殿畫維摩詰變相一堵樓閣樹石花雀人物冠冕畨漢異服皆得其妙今見存趙公祐者長安人也寳厯中寓蜀工畫人物尤善佛像天王神鬼賛皇公鎮蜀賔禮之自寳厯至開成于諸寺畫佛像甚多㑹昌中一例除毁唯存大聖慈寺文殊閣下天王三堵閣内東方天王一堵藥師院師堂内四天王并十二神前寺石經院天王部屬等蹟公祐天資神用筆奪化權應變無涯罔象莫測名高當代時無等倫數仞之墻用筆最尚風神骨氣唯公祐得之六法全矣已上二則益州畫錄名筆記中寺文殊閣畫阿彌陀佛大悲毘盧十大弟子四堵閣外壁大悲三十七尊法華經驗大悲菩薩四堵東南方天王西方天王及藥師院殿文殊普賢維摩無量壽西方天王十二神共九堵皆待詔趙公祐筆也名畫記趙公祐成都人工畫佛道鬼神大慈聖興兩寺皆有畫壁子温竒亦善畫成都寺觀多見其跡有孫德齊後亦知名温竒幼而頴秀長有父風父殁之後於大聖慈寺文殊閣内繼父之蹤畫北方天王及梵王帝釋大輪部屬天將堂天將部屬并梵王帝釋普賢閣下南方天王華嚴閣上東西二方天王梵王帝釋中興寺大殿文殊普賢及天王部衆並其筆見存出益州畫錄古寺名筆載大輪堂畫大輪部屬兩堵金剛二十四尊堂在保福院也待詔趙温竒筆又云保福院門屋畫天王二堵趙德齊筆成都古今記云府衙西北有畫前益州五長史真李太尉賛皇公記云益州草堂寺列畫前長史一十四人代稱絶跡余嘗于數公子孫之家獲見圖狀乃知草堂繢事靡不造真昔巖野旁求徒聞審像嵇山高謝唯上鎔金孰若托之丹青妙畫神照然楚國祠廟魯王宫室暨此邦文翁舊館皆圖厯代卿相粲然可觀唯有慕于前良曽莫究乎形似與夫年代既逺遺像猶存入虛室而煙霞暫披拂浮埃而瑶林斯覩余以精廬甚古畫壁將傾乃選其功徳尤著者五人模於郡之㕔所追惟二漢臺閣皆有畫寫黄霸于定國雖宰相名臣不得在畫像之列卓子師德行君子而居功臣之右今之所取其在兹乎采色既新光靈可想儼若神對吾將與歸因敘其事以貽來哲太和四年閏二月十八日劍南西川節度副大使知節度事銀青光祿大夫檢校兵部尚書兼成都尹御史大夫賛皇縣開國伯李德裕記按唐節度使不帶尹則帶長史銜非賔佐比也古寺名筆載成都華嚴閣上節度使杜悰像乃張逢畫亦知名者陳皓彭堅不知何許人也開成中與范瓊寓蜀大中年府主杜相公悰起淨衆等寺門屋知三人中范瓊年齒雖低手筆稱冠矣因請陳彭各畫天王一堵各令一客將伴之以幔幕遮蔽不令相見畫畢相國與諸府寮撤其幃幕南畔仗劒振威者彭筆北畔持弓奮赫者陳筆二人筆力相似觀者莫能昇降大約皆宗吳道元而傅采拂澹過之畫法一曰氣韻生動是也二曰骨法用筆是也三曰應物象形是也四曰隨類賦采是也五曰經營位置是也六曰傅彩模寫是也斯六法者名軰少該唯此三人俱盡其美范瓊不知何許人唐開成中與陳皓彭堅同時寓蜀皆善人物佛像三人同手於諸寺圖畫甚多㑹昌年皆除毁惟大聖慈者得存洎宣宗再興佛寺三人於聖壽聖興淨衆中興等寺自大中至乾符筆無暫釋圖畫墻壁二百餘間若天王佛像高僧經驗及諸變相名目雖同形狀各别自淳化五年及咸平三年兵火之餘得存三寺筆跡于後大聖慈寺南廊下藥叉大將和脩吉龍王鬼子母天女五堵謂之十七䕶神北廊下石經院門兩金剛東西方天王中寺大悲院門上阿彌陀佛及四菩薩院門兩畔觀音藥師石經板上七佛四仙人大悲變相天將堂兩畔南北二方天王文殊閣下北方天王及天王變相聖壽寺大殿釋伽像行道北方天王西方變相殿上小壁水月觀音浴室院旁西方天王大悲院八明王西方變相皆大中年畫也聖興寺大殿東北二方天王藥師十二神釋迦十弟子彌勒像大悲變相並咸通年畫也其中西方一堵甚著竒工極其精妙烏芻瑟磨兩堵設色未半筆蹤嚴然後之妙手終莫能繼而聖壽聖興兩寺純是范筆右二則益州名畫錄成都古今記藥師院連寺廊八門兩壁畫千眼大悲及北方天王大悲釋迦變相四堵天將院壁畫羅漢二軀北方天王及天將部屬并帝釋梵王共六堵中寺文殊閣彌勒釋迦西方變相北方天王變相極樂院門外壁㪚花天女俱范瓊筆張騰者不知何許人也武宗末年寓蜀於諸寺壁圖畫亦多㑹昌年除毁皆盡大中初佛寺再興於聖壽寺大殿畫文殊普賢彌勒下生共三堵浴室院北對范瓊舊壁畫持弓北方天王一堵大聖慈寺文殊閣下報身如來一堵見存常粲者雍京人也咸通年路侍中巖牧蜀粲自京師至路公禮待之善傳神雜畫有七賢像六逸像女媧伏羲神農像立釋伽像五天胡僧像孔子西周問禮像名醫下蠱像樗蒲圖龍樹驗丹圖至今好事者收之為後學師範又玉局化壁畫道門尊像甚多王蜀時修改亦頹損矣今大聖慈寺悟達國師真乃粲筆見存常重允者粲之子也僖宗幸蜀囘鑾之日蜀民請留御容于大聖慈寺時隨駕待詔盡皆操筆不體天顔府主陳太師敬瑄遂表進重允一寫而成内外官屬無不歎駭謂為僧繇後身復宣令於中和院壁寫隨駕臣寮真列爵名于左西川節度副大制置指揮諸道兵馬兼供軍使太師中書令成都尹頴川郡王陳敬瑄義成軍節度使中書令王鐸門下侍中韋昭度檢校司徒守太子太保鄭畋檢校司徒鄭延林翰林學士承㫖守兵部尚書樂朋龜翰林學士守禮部尚書杜讓能翰林學士户部侍郎崔凝翰林學士中書舍人沈仁偉翰林學士中書舍人侯䎖尚書左僕射裴璩禮部尚書兼太常禮儀使牛叢左散騎常侍楊堪右散騎常侍栁渉右㪚騎鄭瑣左諫議大夫李紹鰌右諫議大夫蕭説尚書左丞知中朝御史中丞盧澤給事中李輝給事中宋旦中書舍人鄭欣比部郎中知制誥蘇循尚書右丞判户部張褘尚書吏部侍郎張讀尚書刑部侍郎充集賢殿學士李燠尚書禮部侍郎知貢舉歸仁澤行在十軍司馬工部侍郎判度支秦韜玉已上二十七人寫在殿上御容前左神䇿軍觀軍容使䕶軍中尉田令孜右神䇿䕶軍中尉觀軍容使西門思恭内飛龍使知内侍省楊復恭内樞密使田匡禮内樞密使李順融宣徽南院使劉景宣宣徽北院使田獻銖左衞大將軍石守悰左金吾大將軍劉巨容行在諸軍馬步都虞候趙某及諸司使副一百餘員已上俱寫在御容後尋授駕前翰林待詔賜緋魚袋駕歸韋相國昭度為西川節制而陳太師與監䕶田軍容拒命據城王蜀先主時為行軍司馬攻圍三年乃以城降既克下王先主至寺拜僖宗御容觀繪壁唯不見陳田真因問寺僧對云拒扞王師近方塗抹先主曰某豈與丹青為參商遽命重寫重允乃挼皁莢水洗去而風姿宛然先主嘉賜之常公自言我畫梁爛摧之外雨淋水洗終無剝落者葢其設色與人殊也偽通王宗裕性多猜忌惑一媵嬖欲為寫貌而惡人久視謂常曰頗不熟視審可乎曰可頃之夫人至拜立斯須而退翌日貌其姿容短長無遺毫髮敏妙皆此類也又於玉局化寫王蜀先主為使相日真容後移在神興觀之壽昌殿矣今大聖慈寺興善院泗州和尚及華亭張居士真寳厯寺請塔天王寧蜀寺都官土地並其筆見存右三則益州畫錄按外史檮杌孟主往大慈寺觀明皇僖宗御容宴羣臣于華嚴閣下即此物也蜀中廣記卷一百五
