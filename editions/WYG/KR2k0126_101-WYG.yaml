body:
  text: 蜀中廣記卷一百一明曹學佺撰詩話記第一吕覽云禹行功見塗山氏之女禹未之遇而巡省南土塗山氏之女乃令其妾待禹于塗山之陽女乃作歌歌曰候人兮猗始作為南音文心雕龍南音始于候人此三言詩之始也詩大雅韓奕之篇曰奕奕梁山惟禹甸之有倬其道韓侯受命河圖括地象曰岷山之首江出其腹帝以㑹昌神以建福此四言之始也揚子雲蜀都賦兩江珥其市九橋帶其流諸葛孔明書去婦不顧門委韭不入園華陽國志稱姜士游感物寤靈禽堅精動殊俗此皆有似于詩者五言之始也若夫習習神風動澍雨潤乎苖我后䘏時務我民以優饒混混濁沼魚習習激清流溫溫亂國民業業仰前修以備諷刺何媿風雅禹玉牒詞祝融司方發其英沐日浴月百寳生司馬相如琴歌鳯兮鳯兮歸故鄉遨遊四海求其凰此七言之始也古逸詩綏山謡得綏山一桃雖不得仙亦足以豪華陽國志三秦亡范三侯我雖牧犢當得蜀此風謡之始也卓文君白頭吟皚如山上雪皎如雲間月聞君有兩意故來相決絶巴東女兒子歌巴東三峽猿鳴悲夜鳴三聲淚沾衣我欲上蜀蜀水難蹋蹀珂頭腰環環此閨情之始也漢書王襄為益州刺史命王褒作中和樂職選好事者依鹿鳴習而歌之時汜鄉侯何武為童子選在歌中西南夷傳益州刺史朱輔宣示漢德威懷逺夷自汶山以西前世所不至正朔所未加白狼槃木等百餘國皆舉踵稱臣白狼王唐菆作詩三章歌頌漢德輔使譯而獻之華陽國志巴渝人助武王伐紂前歌後舞及為漢前鋒陷陣銳氣喜舞帝善之令樂人習學之今所謂巴渝舞也英雄記曹公破袁譚馬上舞三巴此樂府歌舞之始也宋玉之高唐神女司馬相如之上林子虛揚子雲之蜀都此賦之始也西京雜記司馬相如為上林子虛賦意思蕭散不復與外事相闗控引天地錯綜古今忽然如睡煥然而興幾百日而後成其友人盛覽字長通牂柯名士嘗問以作賦相如曰合纂組以成文列錦繡而為質一經一緯一宫一商此賦之迹也賦家之心苞括宇宙摠覽人物斯乃得之於内不可得而傳覽乃作合組歌列錦賦而退終身不復敢言作賦之心矣又云相如賦時皆稱典而麗雖詩人之作不能加也揚子雲曰長卿賦不似從人間來其神化所至邪又云人問揚子雲作賦之法子雲曰熟讀千首賦則可入矣惟寂惟莫自投于閣爰清爰靜無作符命此譏子雲作也宋孫明復曰太𤣥一書乃明天人始終之理君臣上下之分葢疾莽而作也王介甫諸家以年數考之謂子雲與莽不相及上符命投閣恐係谷子雲事鑿鑿有據是何世人忍于汚衊賢者如此近日李本寧移書示予謂其在川西以此段書之墨池上乃與當時意見不合後竟入彈章噫不但賢者被誣即代辨誣之人亦被禍矣可一嘅歎桓譚新語雄作甘泉賦夢膓出收而納之卒秦宓蜀隠士後為益州别駕有逺游詩如虎則豹之兄鷹則鷂之弟大都荒唐謬悠之説猶對吳使天口天首之故智也然其博學多聞自有不可掩者及與王商論立祠堂書尤為典確予倣而行之並祠嚴李揚馬文表子勅于支機石劉巴零陵人仕蜀為尚書令蜀策命皆其筆也建武二年出鎮荆州卒葬于岳陽之郭西時人為之語曰生居三湘頭死葬三湘尾以巴墓在遂號岳陽為巴陵云出古今詩話左思别傳云思作三都賦疾中猶改蜀都賦云金馬電發于高岡碧山振翼而雲披鬼彈飛丸以礌礉火井騰光而赫曦今本無鬼丸句水經注瀘水傍瘴氣特惡氣中有物不見其形其作有聲中木則折中人則害名曰鬼彈又曰左思造張載問岷蜀事交接亦疎皇甫謐西州高士摯仲治宿儒知名非思倫匹劉淵林衞伯輿並蚤終皆未嘗為思序注凡諸注解悉思自為欲重其文故假借名姓也王逸少與周益州書司馬相如揚子雲有後否西京雜記載卓文君為相如作誄梁劉孝威詩君平子雲閴不嗣江漢英靈信已衰或亦俱寥寥也宋有逃禪子揚補之則自稱子雲後云晉惠帝時蜀中謡江橋頭闗下市成都北門十八子十八子李也其後李雄據蜀僭號按漢武元鼎二年立太城九門少城九門故有十八之稱古今樂錄曰王僧䖍技錄有蜀道行今不歌樂府解題曰蜀道難備言銅梁玉壘之阻與蜀國弦頗同按蜀國弦梁簡文作起句雖言銅梁之險後乃專敘錦城娛樂如豫章行吳趨曲之類巫山高本起于漢樂府吳韋昭宋何承天相沿此題但敘其山水之險阻而張侈其國家之功伐也齊王融劉繪始以陽臺雲雨入詠梁武帝沈約之倡和則竟為朝雲曲矣已後作者無慮數百家皆指朝雲王融巫山高烟華乍卷舒行芳時繼續今本行芳作猿鳥猿鳥字逺不及行芳也升菴詩話按詩紀煙華作烟霞行芳作衡芳豆子山打瓦鼔陽平山撒白雨此綿州巴歌也巴歌二字纔見此後劉禹錫之竹枝詞李紳之巴女詞皆其變體若常璩巴志所引川崕惟平維月孟春等篇則古詩者流非通俗之唱矣杜宇化子鵑蜀本紀華陽國志俱引之其作詩實起於鮑照行路難云中有一鳥名杜鵑言是古時蜀帝魂有兩揚雄兩李膺兩王褒漢揚雄成都人乃作太𤣥經者字從手漢王褒資中人作賢臣頌者晉李膺涪城人作益州記者已上皆土著也漢李膺為益州太守寰宇記云城西三里有李膺宅後周王褒同庾信從益州趙王出鎮之蜀褒詩有奉和趙王途中五韻峽路沙如月山峰石似眉錦城遥可望迴鞍念此時之句隋揚雄持節入蜀迎梁主蕭巋者字從木已上皆宦遊也庾信詩奉和趙王泛江喜雨送軍賚酒等篇不一而足想趙王自是作者惜不傳耳杜少陵寓蜀久毎以自況見諸篇什者曰清新庾開府曰庾信哀雖好曰庾信平生最蕭瑟暮年詞賦動江闗按庾信哀雖好子美在潼川作是時同漢中王游汎故以趙王喻漢中也江闗係䕫府庾信奉和泛江云春江下白帝畫舸向黄牛即此地酈道元水經注曰峨山縣東北有武陽龍尾山並仙者羽化之所於其處得遺詠雖神栖白雲屬想芳流藉念泉鄉遺詠在兹覽其餘誦依然息逺匪直邈想遐踪愛其文詠可念故端牘抽札以詮其詠略曰登武陽觀樂數峨嶺千㽔洋湖口命非螭駕白駒臨天水心踟蹰千載後不如此段本註遺失得古逸詩中道書所載平葢觀稠稉治皆武陽境公孫述改益州為庸部本牧誓庸蜀羌髳之文也晉傅𤣥樂府曰惟庸蜀僭號天一隅云蜀檮杌孟㫤遍栽芙蓉于錦城顧左右曰此真錦城也庸蜀蓉城兩有出處今簡牘中有稱蓉蜀者非梁簡文灔澦歌曰灔澦大如馬瞿塘不可下金沙浮轉多桂浦忌經過鄭樵云天下水之險者惟蜀之瞿塘百粤之桂浦此歌言行瞿塘者準灔澦行桂浦者準金沙也楊用修以為商估刺水行舟歌非簡文之作俗本改桂浦作桂楫尤非按灔澦一作淫預一作猶豫載各不同北史常景淹滯門下積嵗不至顯官以蜀司馬相如王褒嚴君平揚子雲皆有高才而無重位乃作四君賛以托意按宋鮑照仕亦不達有作蜀四賢詠但照合四賢為一篇景則人自為詠也陰鏗江津送劉光祿不及詩依然臨送渚長望倚江津鼓聲隨聽絶㠶勢與雲鄰泊處空餘鳥離亭已散人林寒正下葉釣晩欲收綸如何相背逺江漢與城闉舊志未及收之或以江津二字汎汎未必為蜀之江津也然此詩語意明係蜀中而江漢正蜀地耳蜀僧作詩起于隋智炫遊三學山一首智炫成都人三學山金堂地也炫自兩京歸隠于此唐太宗詠秋日詩有云還似成都望直見峩眉前攷唐史太宗葢嘗遥領益州神想所矚也王楊盧駱初唐稱四傑無不入蜀中者唐詩紀事稱高宗時王勃以檄雞文斥出沛王府既廢客劒南與盧照鄰邵大震九月九日登𤣥武山旅眺詩照鄰為新都尉大震同時人也子安送杜少府之任蜀州詩城闕輔三秦風烟望五津未下注脚不知也丹鉛餘錄云大江自湔堰至犍為有五津曰白華津萬里津江首津涉頭津江南津出華陽國志王勃詩風烟望五津盧照隣文予自江陽言歸五津皆指此然首句亦出華陽國志而用修未之引也成都本治赤里街張若徙置少城内廣營府舍脩整里闠市張列肆得與咸陽同制此即城闕輔三秦之義楊炯有入三峽詩及梓州官僚磨厓賛盧照隣詠懷蜀中古蹟如文翁講堂相如琴臺皆是其奉使還京宴别綿池諸作不但一尉而已駱賔王艷情代郭氏荅盧照隣長篇大似臨卭卓女之怨照隣豈能忘情于蜀者耶賔王入蜀亦以使事至疇昔篇中曽及之其曰地角天涯𦕈難測者成都有此二石也游宦紀聞云今之逺官及服賈者皆曰天涯海角葢俗譚也頃在成都聞有天涯海角石暇時訪古及閲志圖乃知天涯石在中興寺􅂄老傳云人坐其上則脚腫不能行至今人不敢踐履又有天涯石廟在大東門對昭覺寺石高六七尺今市入湯家園地角石廟在羅城内西北角高三尺餘王均之亂為守城者所壞今不復存矣賔王送鄭安陽詩彭山折坂外井絡少城隈九折坂在卭崍今百丈驛是與彭山同屬上川南相望不逺故云遺錦非前邑鳴琴即舊臺遺錦用後漢綿竹令閻憲事琴臺用相如事海客乗查度仙童馭竹迴一用君平事一用葛陂事寰宇記葛陂在温雙之境龍池寺是古人用事或顯或晦不同如此陳子昂别傳云幽人王適見其感遇詩曰是必為海内文宗矣按適蜀中旅懷詩有時須問影無事則書空棄置如天外平生似夢中别離同夜月愁思隔秋風老少悲顔駟盈虛悟翟公葢因入蜀而見子昂也獨異記載子昂初入京不為人知有賣胡琴者價百萬豪貴傳視無辨者子昻突出謂左右曰輦千緡市之衆驚問荅曰予善此樂皆曰可得聞乎曰明日可集宣陽里如期偕往酒肴畢具置胡琴于前食畢捧琴語曰蜀人陳子昂有文百軸馳走京轂碌碌塵土不為人知此樂賤工之役豈宜留心舉而碎之以其文軸遍贈㑹者一日之内聲華溢都盧藏用悼陳子昂詩云暮川罕停波朝雲無留色故人琴與詩可存不可識識心尚可親琴書非故人鳴臯初夢趙蜀國已悲陳按此則亦詠其碎琴事也殷璠詩品國初詞體尚沿徐庾侈靡之風陳拾遺横制頽波天下質文翕然一變蘇頲將赴益州題小園壁嵗窮惟益老春至却辭家可惜東園樹無人也作花宋璟鄭惟忠俱有詩送之亦絶句也小許公有長樂花賦即蜀之旌節花王右軍誓墓之後猶云奉使闗蜀無不從命與周益州書可想見也唐初尚此風味若徐安貞蘇許公劉希夷賈至張燕公張曲江王摩詰無不以冊使招諭至者孟襄陽則從左相幕中張九齡送宋休逺之蜀任詩色麗成都俗膏腴蜀水濵如何從宦子堅白共緇磷王維送崔興宗亦云江漢風流地遊人何處歸宋子京知益州朝議以成都喜遨遊子京性復奢侈恐無紀極今殊不然王維送李梓州詩萬壑樹叅天千山響杜鵑山中一夜雨樹杪百重泉楊用修詩林振秀作山中一丈雨潼川志作山中一半雨千山響杜鵑作春聲響杜鵑方輿勝覽作鄉音響杜鵑不知何所適從漢女輸橦布李周翰曰漢女蜀之美女也漢書曰秦置黔中郡漢興令大人輸布一疋小口二丈是謂賨布即今橦花布也十六國春秋云宕渠古賨國姓􅇗駱賔王詩迢迢芈路望芝田本此孟浩然途中晴詩已失武陵雨猶逢蜀坂泥天開斜景遍山出曉雲低餘濕猶霑草殘流尚入谿今宵有明月鄉思逺凄凄此曲盡蜀中之境非親到者不知除夜有懐迢逓三巴路羇危萬里身或收作孟浩然非此崔塗作也塗葢赴舉入蜀云詩史云韓襄客者漢安女子為歌詩知名江漢間孟浩然贈詩曰只為陽臺夢裡狂降來教作神仙客襄客閨怨詩曰連理枝前同設誓丁香樹下共論心先公熈寧中迓金使成堯錫見遺衣服刺此聯于裹肚上其下復刺丁香連理男女設誓之狀葢金人重此句為佳製云按此與梅聖俞春雪詩同漢安今内江縣後周名裴迪初與王維崔興宗同居終南天寳後王縉為蜀州刺史迪依之與杜甫友善寓新津昭覺寺有唱和天寳末𤣥宗甞乘月登勤政樓命梨園弟子歌數闋有唱李嶠詩云富貴榮華能幾時山川滿目淚沾衣不見祗今汾水上惟有年年秋鴈飛時上春秋已高問是誰詩或對曰李嶠因凄然泣下不終曲而起曰李嶠真才子也明年幸蜀登白衛嶺覽眺乆之又歌是詞復言李嶠真才子不勝感嘆時高力士在側亦揮涕乆之出本事詩雨淋鈴明皇自西蜀返樂人張野狐所製出教坊記明皇幸蜀劉長卿亦常侍從故有送史判官奏事之靈武兼寄巴西親故詩時肅宗權制靈武也閬中左綿皆得稱巴西長卿之親故有入蜀而未至成都者耳詩云獨有西歸心遙懸夕陽外田澄成都旅次云地富魚為米山芳桂是樵俗云魚米之地本此澄天寳上元間人杜工部贈田舍人云揚雄更有河東賦惟待吹嘘送上天蓋澄以舍人奉使入蜀也出紀事武擔平仄二音常璩云毗橋有一折石五丁力士擔土擔也上平而下仄矣蘇頲詩武擔獨蒼然予詩分司武擔南皆用仄音李白本末傳記所載不同唐史稱白興聖皇帝九世孫隋末以罪徙西域神龍初遁還客巴西既長隱岷山蘇頲為益州長史見白異之更客任城與孔巢父韓準裴政張叔明陶沔居徂徠山日沈飲號竹溪六逸天寳初南入㑹稽與吳筠善筠被召故白亦至長安往見賀知章知章見其文嘆曰子謫仙人也南部新書云李白山東人父為任城尉因家焉少與魯人隱徂徠山號竹溪六逸天寳初遊㑹稽因吳筠隱剡中俗稱蜀人非也今任城令㕔有白之祠尚存按唐范傳正誌白墓曰白涼武昭王九世孫昭王隴西人隋末子孫以罪徙碎葉神龍時白父客自西域逃居綿之巴西而白生焉唐魏顆李陽氷序其文劉全白撰墓碣皆曰廣漢人故論白者或曰隴西或曰山東或曰蜀陽氷云白既出翰林浪跡縱酒以自昏穢詠謌之際屢稱山東李白亦云以張垍䜛逐遊海岱間子美所謂汝與東山李白好蓋白自號也蜀道難或曰作于天寳初或曰作于天寳末此為房杜危之也陸暢去白未逺作蜀道易以美韋􅆏傳之當時而蜀道難之詞曰錦城雖云樂不如早還家其意必有所屬房杜之説葢近之矣白之父客于巴西故以客呼之東蜀楊天惠彰明逸事云元符二年春正月天惠補令於此竊從學士大夫求問逸事聞唐李白本邑人㣲時募縣小吏入令卧内嘗驅牛徑堂下令妻怒將加詰責太白亟以詩謝云素面倚簾鈎嬌聲出外頭若非是織女何得問牽牛令驚異不問稍親招引侍研席一日賦山火詩思軋不屬太白從傍綴其下句令詩云野火燒山去人歸火不歸太白繼云焰隨紅日出烟逐暮雲飛令慙止頃之從令觀漲有女子溺死江上令復苦吟太白輒應聲繼之令詩二八誰家女漂來倚㟁蘆鳥窺眉上翠魚弄口傍珠太白繼云綠鬂隨波散紅顔逐浪無因何逢伍相應是怨秋胡令滋不悦太白恐棄去隠居戴天大匡山往來旁郡依潼江趙徵君㽔亦節士任俠有氣善為縱横學著書號長短經太白從學嵗餘去遊成都賦春感詩云茫茫南與北道直事難諧榆莢錢生樹楊花玉糝街塵縈遊子面蝶弄美人釵却憶青山上雲門掩竹齋益州刺史蘇頲見竒之時太白齒方少英氣溢發諸為詩文甚多㣲類宫中行樂詞體今邑所藏百篇大抵皆格律也雖頗體弱然短羽䙰褷已有雛鳯態淳化中縣令楊逐為之引謂為少作是也遂江南人自名能詩累謫為令云始太白與杜甫相遇梁宋間結交歡甚久乃去客居魯徂徠山甫從嚴武成都太白益流落不能歸故甫詩又云匡山讀書處頭白好歸來然學者多疑太白為山東人又以匡山為匡廬皆非也今大匡山猶有讀書臺而清廉鄉故居遺地尚在廢為寺名隴西院有唐梓州刺史碑失其名及綿州刺史高柷記太白子曰伯禽女曰平陽皆去蜀後生有妹月圓前嫁邑子留不去以故葬邑下墓今在隴西院旁二百步外或傳院乃其所捨云李白開元中謁宰相封一版上題曰海上釣鰲客李白相問曰先生臨滄海釣巨鰲以何物為鈎線曰以風浪逸其情乾坤縱其志以虹霓為絲明月為鈎又曰何物為餌曰以天下無義氣丈夫為餌丞相竦然出侯鯖錄李白與人譚論皆成句讀如春葩麗藻粲于齒牙時號李白粲花之論出雲仙雜記李白前後三擬文選不如意悉焚之惟留恨别賦出瓊屑唐人言李白不能屈身以腰間有傲骨出䑕璞范傳正作李太白墓誌云白常欲一鳴驚人一飛冲天彼漸陸遷喬皆不能也及其謫退乃嘆曰千鈞之弩一發不中則當摧撞折牙而求息機安能効碌碌者蘇而復上哉用是脱屣軒冕釋羈韁鎖因肆性情大放于宇宙間意欲耗壯心而遣餘年此數語足以盡白之為人矣劉全白有李翰林墓碣記云太白廣漢人性倜儻知縱横術善賦詩才調逸邁往往興㑹屬詞恐古之善詩者亦不逮裴敬有李白墓碑曰白為詩格高㫖逺若在天上物外任華送李白之曹南序曰彼碌碌者徒見三河之遊倦百鎰之金盡乃議子于得失虧成之間曽不知才全者無虧成志全者無得失進與退於道德乎何有以上諸文附見李白集古本有之今不傳矣全白指太白為廣漢人葢唐世彰明縣属廣漢郡故獨舉郡為稱耳出詩話李太白初自蜀至京師舍于逆旅賀監知章聞其名首訪之既竒其姿復請所為文出蜀道難以示之讀未已稱歎者數四號為謫仙解金龜換酒與傾盡醉期不間日由是稱譽光赫賀又見其烏棲曲嘆賞苦吟曰此詩可以泣鬼神矣故杜子美贈詩及焉曲曰姑蘇臺上烏棲時吳王宫裡醉西施吳歌楚舞歡未畢西山欲銜半邊日金壺丁丁漏水盡起看秋月墜江波東方漸高奈樂何或言是烏夜啼二篇未知孰是故兩錄之烏夜啼曰黄雲城邊烏欲棲歸飛啞啞枝上啼機中織錦秦川女碧紗如煙隔忩語停梭向人問故夫欲説遼西淚如雨白才逸氣高與陳拾遺齊名先後合德其論詩云梁陳以來艷薄斯極沈休文又尚以聲律將復古道非我而誰與故陳李二集律詩殊少嘗言興寄深㣲五言不如四言七言又其靡也況使束于聲調俳優哉故戲杜曰飯顆山頭逢杜甫頭戴笠子日卓午借問别來太瘦生總為從前作詩苦葢譏其拘束也元宗問之召入翰林以其才藻絶人器識兼茂便以上位處之故未命以官嘗因宫人行樂謂高力士曰對此良辰美景豈可獨以聲伎為娛倘時得逸才詞人詠出之可以誇耀于後遂命召白時寧王邀白飲酒已醉既至拜舞頹然上知其薄聲律謂非所長命為宫中行樂五言律詩十首白頓首曰寧王賜臣酒今已醉倘陛下賜臣無畏始可盡臣薄技上曰可即遣二内臣掖扶命研墨濡筆以授之又令二人張朱絲欄于其前白取筆抒思晷不停綴十篇立就更無加㸃筆迹遒利鳯跋龍拏律度對屬無不精絶常出入宫中恩禮殊厚竟以踈縱乞歸上亦以非廊廟器優詔罷遣之後以不羈流落江外又以永王招禮累謫於夜郎及放還卒於宣城杜甫所贈二十韻備敘其事出本事詩高唐神女事宋蘇子瞻以為瑶姬天帝之女乃助禹治水而成功者本山海經然李太白感興詩曰瑶姬天帝女精彩化朝雲宛轉入宵夢無心向楚君則是已詠言之矣李白青山横北郭一首題云送友人作不知其為何人與何地也詩林振秀題下加新津作三字資縣志載此首連見説蠺叢路一首俱作送范金卿還資州作金卿即范崇凱獻花蕚樓賦者縣志復收白贈崇凱古風一首或亦有所本也太白渡金門詩仍連故鄉水萬里送行舟送人之羅浮詩爾去之羅浮余還憇峨眉又淮南卧病懷寄蜀中趙徵君㽔詩云國門遥天外鄉路逺山隔朝憶相如臺夜夢子雲宅皆寓懷鄉之意趙㽔梓州人字雲卿精于數學與白齊名蘇頲薦西蜀人才疏云趙㽔術數李白文章出丹鉛餘錄成都閭邱均在唐初與杜審言齊名杜子美贈其孫閭邱師詩云鳯藏丹穴暮龍去白水渾葢稱均之文也按成都文類均銅梁人武后朝為太常博士與杜審言同年均善書即所云世傳閭邱筆峻極逾崑崙者雪嶺多其碑碣甫時尚存僧在成都與甫通家來往舊唐書均成都人以文章著稱景龍中以安樂公主薦拜官太常博士及公主被誅均坐貶循州司倉卒嚴武年二十二為給事黄門郎明年擁旄西蜀杜甫乗醉言不謂嚴挺之乃有此子也武恚目久之曰杜審言孫子擬捋虎鬚合坐皆笑以彌縫之房太尉琯㣲有所誤憂怖成疾李太白作蜀道難為房杜危之也武字季鷹永泰初卒母哭之曰而今而後吾知免為官婢矣出詩話子美七言絶近百錦城妓女獨唱其贈花卿一首所謂錦城絲管日紛紛半入江風半入雲此曲只應天上有人間能得幾囘聞也蓋花卿在蜀頗僭用天子禮樂子美作此諷之意在言外最得詩人之㫖杜石笋行雨多往往得瑟瑟按華陽記開明氏造七寳樓以珍珠結成簾漢武帝時蜀郡火燒數千家樓亦以燼今人往往於砂土上獲真珠又趙清獻蜀都故事石笋在衙西門外二株雙蹲云真珠樓基也昔有胡人於此立寺為大秦寺其門樓十間皆以真珠翠碧貫之為簾後摧毁墜地至今基脚在毎有大雨其前後人多拾得珍珠瑟瑟金翠異物今謂石笋非為樓設而樓之建適當石笋附近耳葢大秦國多璆琳琅玕明珠金璧水道通益州永昌郡則寺疑此國人所建也杜田嘗引酉陽雜爼謂蜀少城飾以金璧珠翠桓温怒其太侈焚之事為證出能改齋四月十九日成都謂之浣花遨頭宴于杜子美草堂滄浪亭傾城皆出錦繡夾道自開嵗宴遊至是而止故最盛于它時予客蜀數年屢赴此集未嘗不晴蜀人云雖戴白之老未嘗見浣花日雨也杜少陵在成都有兩草堂一在萬里橋之西一在浣花皆見於詩中萬里橋故迹湮没不可見或云房季可園是也已上二則出老學菴筆記杜子美愁坐詩曰高齋常見野愁坐更臨門十月山寒重孤城水氣昬葭萌氐種逈左擔犬羊存終日憂奔走歸期未敢論葭萌左擔皆地名葭萌人知之左擔人罕知也注者或改作武擔又改作立擔皆可笑按太平御覽引李尤蜀記云蜀山自綿谷葭萌道徑險窄北來擔負者不容易肩謂之左擔道又李公允益州記云陰平縣有左擔道其路至險自北來者擔在左肩不得度右肩常璩南中志云自僰道至朱提有水步道水道有黑水及羊官水至險難行步道度三津亦艱阻故行者謡曰猶溪赤木盤蛇九曲盤羊烏櫳氣與天通庲䧏賈子左擔七里又有牛叩頭馬搏頰坂其險如此據三書是左擔有三綿谷一也陰平二也朱提三也義則一而已朱提今之烏撒雲貴往來之西路也蜀西南多雨名曰漏天杜子美詩鼔角漏天東又徑欲誅雲師疇能補天漏是也自秋分後遇壬謂之入霑吳下曰入液宋黄仁傑䕫州苦雨詩汃月不虚為朽月今年賴得是豐年汃音讀為怕平聲東方朔傳諧語云令壺齟老栢塗塗與汃同注云文加切其下解云塗者漸洳徑也亦雨濕泥濘之義爾雅十二月為畢塗月汃月之諺雖俗其音義字形亦遐而尚矣已上二則出升菴詩話子美題忠州龍興寺所居院壁詩云忠州三峽内井邑聚雲根今其驛名曰雲根驛有筆亦名雲根筆蜀江三峽中水波圓折者名曰盤盤音漩杜詩盤渦鷺浴底心性張蠙黄牛峽詩盤渦逆入嵌崆地斷壁高分繚繞天唐常徵君隠居開州永泰元年秋杜少陵自忠州至雲安徵君來訪之杜有别徵君詩云兒扶猶䇿杖卧病一秋强白髮少新洗寒衣寛摠長故人憂見及此别淚相忘各逐萍流轉來書細作行後又寄之詩有云開州入夏知涼冷不似雲安毒熱新故知徴君開人也覃山人大厯中居䕫杜少陵題其隠居詩有北山移文誰勒銘及悵望秋天虚翠屏之句則知山人亦出仕矣史失其名已上二則出本䕫志杜甫出瞿塘峽詩五雲高太甲六月曠摶扶注不解五雲之義嘗觀王勃益州夫子廟碑云帝車南指遁七曜于中階華葢西臨藏五雲于太甲酉陽雜爼謂燕公讀碑自帝車至太甲四句悉不解訪之一公一公言北斗建午七曜在南方有是之祥則無位聖人當出華葢以下卒不可悉愚謂老杜讀書破萬卷自有所據或入蜀見此碑而用其語也晉天文志華葢杠旁六星曰六甲分陰陽而配節候太甲恐是六甲一星之名然未有攷證以一行之䆳於星厯張燕公段柯古之殫見洽聞而猶未知焉姑闕疑以俟博識出困學紀聞杜少陵遊何將軍山林詩雨抛金鎖甲苔卧緑沉鎗竹坡周少隠詩話云甲抛于雨為金所鎖鎗卧于苔為綠所沉有將軍不好武之意此瞽者之言也薛氏補遺云綠沉精鐵也引隋書文帝賜張淵綠沉之甲趙德麟侯鯖錄綠沉為竹引陸龜䝉詩一架三百竿綠沉森杳冥雖少有據然亦非也予考之綠沉乃畫工設色之名鄴中記云石虎造象牙桃枝扇或綠沉色或木蘭色或紫紺色或欝金色王羲之筆經云有人以綠沉漆管見遺南史梁武帝西園食綠沉瓜是綠沉即西𤓰皮色也梁簡文詩吳戈夏服箭兾馬綠沉弓虞世南詩綠沉明月絃劉劭趙都賦弩有黄間綠沉若如薛與趙之説鐵與竹豈可為弓絃耶楊巨源詩吟詩白羽扇校獵綠沉鎗與杜少陵之句同皆謂以綠沉色為漆飾鎗柄耳杜子美何將軍山莊詩薰風啜茗時今本作春風非此詩十首皆一時作其曰千章夏木清紅綻雨肥梅皆夏景可證俱詩話補遺射洪陸使君廟以杜子美詩為籖亦驗予在蜀以淳熈戊戌春被召臨行遣僧則華往求籖得遣興詩曰昔者龎德公未曽入州府襄陽耆舊間處世節獨苦豈無濟時䇿終竟畏罔罟林茂鳥自歸水深魚知聚舉家隠鹿門劉表焉得取予讀之惕然顧迫貧從仕又十有二年負神之教多矣出老學菴杜工部有滕王亭詩王建詩有搨得滕王蛺蝶圖皆稱滕王湛然非元嬰也王勃序滕王閣則元嬰耳出醍醐杜少陵暮登四安寺鐘樓寄裴十即裴秀才迪也寺在新津昭覺山樓與雪峰相對是時王縉為蜀州守三人葢朝夕於斯云詩話云有疾瘧者子美曰吾詩可以療之病者曰云何曰夜闌更秉燭相對如夢寐誦之瘧猶是也杜曰更誦子章髑髏血模糊手提擲還崔丈夫其人從之果愈杜少陵冬日懷李白詩裋褐風霜入惟宋元本仍作裋今本皆作短裋音竪字見列子合璧事類載杜工部詩云三月雪連夜未應傷物華只緣春欲盡留着伴梨花此詩舊集不載又寒食少天氣春風多栁花又小桃知客意春盡始開花則今之全集遺逸多矣俱升菴詩話杜詩云江蓮揺白羽天棘夢青絲下句殊不可曉説者曰天棘栁也或曰天門冬也夢當作弄既無考據意亦短淺譚浚明嘗為余言此出佛書終南長老入定夢天帝賜以青棘之香葢言江蓮之香如所夢天棘之香耳此詩為僧齊已賦故引此事余甚喜其説然終未知果出何經近閲葉石林過庭錄亦言此句出佛書則浚明之言宜可信出寉林玉露杜子美𤣥都壇歌云子規夜啼山竹裂王母晝下雲旗翻説者多不曉王母或以為瑶池之金母也中官陳彦和言頃在宣和間掌禽苑四方所貢珍禽不可殫舉蜀中貢一種鳥狀如燕色紺翠尾甚多而長飛則尾開裊裊如兩旗名曰王母則子美所言乃此禽也葢遐方異種人罕識者子規夜啼山竹裂言其聲清越如竹裂也此墨莊漫錄所載余閲峨山記云漢竇誼放浪不羈月夜聞子規啼曰竹裂吾可歸峨眉是夕竹裂天明遁去武帝三徴之不起老杜引此竹裂與旗翻字對始不偏重焦氏筆乗杜子美本賣文為活翻令室倒懸言其無假借也而語意不露味之愈佳揚子雲家無儋石之儲其作法言蜀人有齎錢十萬願載其名子雲却之故以自況也潛居錄言雄以賣文自贍文不虛美人多惡之及卒其怨家取法言益之曰周公以來未有漢公之懿也勤勞則過于阿衡云云繕寫多行于世蘇東坡泊舟䕫峽聞有人吟江流石不轉遺恨失吞吳之句曰予杜子美也世人多誤解予詩謂先主伐吳不利以此為恨非也葢武侯之志在於中原欲結東吳為外援伐之轉失䇿耳武侯曰若法孝直在可免此行杜甫子宗武以詩示阮兵曹兵曹荅以石斧一具隨使併詩還之宗武曰斧父斤也兵曹使我呈父加斤削也俄而阮聞之曰誤矣欲子砍斷其手此手若存天下詩名又在杜家矣出雲仙雜記蜀中廣記卷一百一
