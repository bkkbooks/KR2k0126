body:
  text: 蜀中廣記卷三十明曹學佺撰名勝記第三十川北道潼川州二蓬溪縣縣有三興之號晉爲晉興又爲巴興唐爲唐興也有赤城山神君之跡著焉有青石山鄧芝之墓存焉有長江賈島之祠設焉按赤城山在治東一里中峰蔚然左右環拱上有七曲老人祠髙臺五層山皆赤土張神君解道徳經于此産九節菖蒲也蓬萊溪遶其下流入涪江縣以溪名唐天寳年置舊爲唐興矣青石山昔置青石縣即晉興縣也有祠甚嚴九州要記云天下青石無加扵此可爲鐘磬華陽國志曰鄧芝征涪陵見𤣥猿緣其山芝性好弩手自射猿中之猿子㧞其箭捲木葉塞其創芝嘆曰吾傷物之性其將死矣見此山之羙後遂葬焉李膺益州記云青石嶺有九折亦名九節嶺九嶺之溪水出焉碑目云青石縣九節鎮金地院有孝童孝女碑志云九節鎮在縣東南百里與合州聯界長江後魏置縣即巴興縣也賈島送僧詩云久住巴興寺如今始拂衣欲臨秋水别不向故園歸島葢主簿是縣者寄令狐相公云策枤馳山驛逢人問梓州長江那可到行客替生愁有明月山在縣西南二里島詩云言心俱好静廨署落暉空歸吏封宵鑰行蛇入古桐長江微雨後明月衆星中若任遷人去西溪與剡通志云浪仙有墓在焉杜荀鶴詩謫宦自麻衣銜寃至死時山根三尺墓人口數聨詩仙桂終無分皇天似有私暗松風雨夜空使老猿悲唐安錡詩倚恃才難斷昂藏貎不恭騎驢衝大尹奪卷悞宣宗馳譽超先軰吟詩下我儂司倉舊曹署一見一心忡曹松詩先生不折桂謫去抱何寃已葬離燕骨難招入剡魂旅墳低却草稚子哭勝猿冥漠如搜句宜邀賀監論薛能詩云賈子命堪悲唐人獨解詩左遷今已矣清絶更無之畢竟吾猶許商量衆莫疑嘉陵四十字一一是天資李洞詩一第人皆得先生豈不銷位卑終蜀土詩絶占唐朝旅葬新墳小魂歸故國遙我來因奠灑立石用爲標李頻詩秦樓苦吟夜南望只悲君一宦終遐徼千年隔旅墳恨聲流蜀魄寃氣入湘雲無限風騷句時來月下聞𢎞秀詩燕生松雪地蜀死葬山根詩僻降今古官卑悞子孫塜闌寒月色人哭苦吟魂暮雨滴碑字年年添蘚㾗崔塗詩云雕琢文章字字精我經此處倍傷情身從謫宦方沾祿才破椎埋更有聲過縣已無曾識吏到􅆹空見舊題名長江一曲年年水應爲先生萬古清劉滄詩云塵室寒窓我獨㸔别來人事㡬凋殘晝空蕭寺一僧去雪滿巴山孤客寒落葉堕巢禽自出蒼苔封砌竹成竿碧雲迢逓長江逺向夕苦吟歸思難鄭谷詩云水遶荒墳縣路斜耕人訝我久咨嗟重來兼恐無尋處日落風吹鼔子花黄滔詩云曾搜景象恐通神地下還應有主人若把長江比湘浦離騷不合自靈均張蠙詩云生為間代苦吟身死作長江一逐臣可是當時少知己不知知己是何人宋龔鼎賈浪仙祠堂記云唐韓退之善爲歌詩導性情一時相從者如孟郊張籍最號友善而浪仙學詩于劉乂晩得偕與二子㳺頗以才調相推髙雖然觀其風致清澹得之自然誠亦郊籍之儔故後世學者語騷雅之流裔孰敢外三子焉浪仙由長江徙官安岳而卒于㑹昌三年凢爲編次其詩者二人許彬者謂之小集而天仙寺浮屠無可謂之天仙集當時之人有可名者島俱請之讃天仙集傳之既久反以讃爲退之之辭然退之前後二集皆所不載及得李洞句圖序質之然後信其非也浪仙于舊史無傳邇來朝廷新其書遂得附名于退之後而頃嵗居官者署祠堂于蜀土神廟廡之次今伯氏實佐令長于是巴嘗議其堂雜與神居非所宜也而尉有西圃者在唐爲主簿之廨址誠得遷其舊構更以繪像無撓邑人於義何有既遂經畫而就之其屋不華而完其地不奥而清兩傍封植筠栢鬰然嗚呼浪仙没距今二百二十餘嵗矣名始著于史策而其遺貎又得宅于故處廼知士之能蹈善雖日用之逺必有爲黼黻其迹者今幸爾副其身後之所待措之無窮宜不復恨矣而伯氏逺以書諭俾文其實且使後人知改作之有由也碑目云招隱洞在長江縣南二十里内有唐貟半千題字可搨舊長江縣南二十里有唐磨厓金剛經圖又云長江覺苑寺有唐元和十二年遂州刺史張九宗撰鑄鐘記併書異物記云蓬溪西北長江縣界古有珠玉村其下爲珠玉溪又有火井在長江縣客館鎮之北二里伏龍山下地窪若池以火引之則有聲隱隱然發于池中少頃熾炎夏月積雨停水則㷔生水上水爲之沸而寒如故水涸則土上有熖觀者至焚其衣􅅂也舊唐興縣客館設于此杜甫記云中興之四年王潜爲唐興宰修厥政事始自鰥寡􅑏獨而和其封内非侮循循不畏險膚而行而壹咨于官属于羣吏于衆庶曰邑中之政庶㡬繕完矣惟賔館上漏下濕吾人猶不堪其居以容四方賔賔其謂我何改之重勞我其謂人何咸曰誕事至濟厥載則逹觀于大壯作之閈閎作之堂構以永令圖崇髙廣大踰越傳舎通梁直走嵬將墜壓素柱上承安若㤗山兩序旁開發洩霜露潜靚深矣歩櫩複霤萬瓦在後匪丹雘爲實踈逹爲迴廊南注又爲覆廊以容介行人亦如正館制度少劣直左階而東封殖修竹茂樹挾右階而南環廊又注亦可以行歩風雨不易謀而集事邑無妨工亦無匱財人不待子來定不待方中宿息井樹或相爲賔或與之毛天子之使至則曰有人焉某無以栗階州長之使至則曰某非敢賔也子無所用爼四方之使至則曰子貺某多矣敢辭贄或曰明府君之侈也何以爲人皆曰我之爲人也何以侈子徒見賔館之近夫厚不知其私室之甚薄噐物未備力取諸私室人民不知賦歛乃至于館之醯醢闕出于私厨使之乗駟闕辦于私廐君豈爲亭長乎是躬親也若館宇不修而觀臺榭是好賔至無所納其車我浩蕩無所措手足獲髙枕乎其誰不病吾人矣玼瑕忽生何以爲之是道也施舎不㡬乎先覺矣枤之朋友嘆曰羙哉是館也成而人不知人不怒廨署之福也府君之徳也府君曰古有之也非吾有也余何能爲是亦前州府君崔公之命也余何能為是日辛丑歲秋分大餘二小餘二千一百八十八杜氏之老記已中江縣眉山程建用與蘇子瞻書云中江扵東蜀號爲劇邑以衰拙臨之始至若無暇洎半年而滯獄清期年而庶事稍就叙乃謀葺亭臺池館之舊則西園之勝有環翠亭焉亭􅆕北而枕南相傳以薛公田所建也亭前兩株桐挺直無節目髙二丈餘枝葉扶踈亭後甃石爲山傍植紅蕉三􅆕控掩以墻墻間列詩碑皆厯公與其子球任本路憲日并歴政諸公之所作也袤百有五十丈曰養閒亭亭之後爲頥正堂夾堂植花菓堂之東爲潜閣閣之前牡丹數叢深紫色此蜀花之鮮有也閣後懸窓窓外竹百餘本紫如葚纎如笴森如束髙出簷際皆廖公子孟創植文公同爲之記其亭雄壯冠扵邑居西有臺髙丈餘榜曰觀風登臺倚欄其南北與西境山川歴歴可覩惟東則爲亭屋縣樓之所蔽西有棲妙山山有洞田眞人所名也今爲集虚觀古記云此地舊多惡䖝蛇唐廣徳中眞人自南陽來卜居其地遂絶此患南江自緜之神泉縣來衝山足已而東走百五十里至郡城下合涪江東江來自涪城歴馬橋鎮過五成山至𤣥武山下入扵南江二江之水冬或可渉夏秋積雨徃徃漲至數丈爲墊溺之患歴政禦以隄防惟廖公有碑亦與可之文也五成在邑之艮地山頭有二圎崖髙徑各丈餘俗號挺眼以邑民多頑悍禀賦扵是前令修堤命匠者塊之以爲堤址今無矣觀山之壯而詳其名則五成者取爲壇五成之義今以成爲城葢誤也𤣥武在邑東其山周囘三里六屈三起有龜蛇之象昔之邑名與山皆取於此僧寺枕其麓榜以大雄而𤣥武之象實寓其中其下有淵淵前後石大如拳小如弹連延五七里有龜甲之文者近年又有蛇蟠之形者濵江之民三四琢之以售於好事者此物理之不可考也觀風䑓之南有一亭亭壁塑亂山牓曰栩栩巖取夢蝶之義昔官於此者或譏其晝寢彼固以此爲名建用因而廣之以塑峩眉而致其意焉建用昔寓峩眉六七年歸吾鄉而卜居於北郊則又逺與之相直每春晴秋曉則夫蒼翠崷崪巍然當吾廬之門自從官於茲别是山也不爲不久而歸逰未有期故形於塑塑匠邑民也亡慮百餘人凡兩川釋官老廟之象與夫豪貴之家欲狀山川禽獸草木之􅁼莫不出於邑匠選其匠之尤者而指示以圖於是曲盡其妙自公之暇近而觀之由其足而循之以至於頂磴道橋閣相属如線僧寺山洞皆如其地蟄雷之穴光相之巖枯木飛瀑鮮不悉備恍然以爲昔年之旅寓也逺而觀之瑣碎不能分而大勢横抹天半忽然以爲出吾廬而倚衡門也嗟夫玩其塑以爲眞其迷可笑然窮其眞亦何異於塑而玩之者未能離形骸之内則眞與塑何所徃而非迷况區區之迹旅寓之年與夫去北郊之居逾二紀矣凄然傷齒􅄠之暮而彼崔嵬者不失其故不知𡨕𡨕中去者彼亦不得而遯此于道未明者之所爲豈可以累扵通人哉建用欲易栩栩之名而記其所以塑壁之意恨才力之不逮故舉一邑之大槩以似明公雖蕞爾之地不足以掛文翰亦願明公命一名撰一記使不才之人得以附諸末幸也東坡荅書云軾啓自别永久多難流落百事廢弛不復通問獨吾兄不忘疇昔時枉逺書感忭不可言讀别紙所記山水園亭之勝廢卷閉目如到其間所要亭記豈敢扵吾兄有所惜但多難畏人不復作文字惟時作僧佛語耳千萬體察非推辭也逺書不欲盡言所示自是一篇髙文大似把飯呌饑聊發千里一笑㑹合無期臨書悽然文同中江縣新堤記云縣爲江所環故名之按縣東西有二橋河水所經西橋河自緜州來者逕羅江縣至此始可舟古巴歌云豆子山打瓦鼔陽平山撒白雨下白雨取龍女織得絹二丈五一半属羅江一半属𤣥武即此水也志云西橋河邊有洗墨池水色如墨唐文如海註南華經扵此碑目云㳺遷觀老君碑田眞人殿記俱在中江縣西集虚觀蜀廣政六年立志云昔南陽田眞人寓栖妙山修煉每江漲徃來水上如履平地廣徳中於市南石橋上輕舉矣集虚觀在縣西一里宋縣尉車彦逺有記杜甫詩凱州城下湍水流凱州城隅多古邱集虚道人不復見白雲西北多悠悠方輿勝覽云勾溪廟即天齊王祠蘇子曕詩遙知勾溪路老稚相扶擁㸔畵古叢祠百恠朝幽拱通志云勾溪廟在中江治西祀隋凱州守李直之按直之字正叟本長安人刺史凱州興學設教化行俗羙末年上䟽乞骸骨隱銅官山童稚歌曰我知古凱州今日得李侯李侯切莫去此地可無憂東橋河自涪城來者即中江也李膺益州記云蜀漢五城縣立此水濵在三嵎山之東華陽國志云郡東南有水通于巴漢時置五倉發五縣民尉部主之後因以爲縣注水經云涪水又南枝水出焉西逕廣漢五城縣爲五城水是矣本志云城東寧國寺在廢五城縣側隋大夫趙才司功牟徳建宋秘書丞萬當世記併賛存焉東西二水至𤣥武山下合而東南流九州要記云𤣥武山一名赤雀山一名宜君山山有麈尾入貢又華陽國志云𤣥武山一名三嵎山在縣東二里其山六屈三起出龍骨傳云龍升其山值天門閉不逹死於此後没地中民掘取其骨入藥唐詩紀事王勃盧照隣邵大震九月九日登𤣥武山旅眺倡和絕句詳見詩話中盧照隣宿𤣥武山詩云方池開曉色圎月下清隂已乗千里興還撫一絃琴杜甫題𤣥武禪師屋壁詩何年顧虎頭粉壁畫滄洲赤日石林氣青天江海流錫飛常近鶴杯渡不驚鷗恍若廬山路眞隨惠逺逰本志云𤣥武山即大雄山也聖水泉出焉王勃集謂𤣥武山有聖泉焉浸淫歷數百千年乗巖泌湧接磴分流下瞰長江沙堤石岸咸古人遺跡也茲乃青蘋綠芰紫苔蒼蘚遂使江湖思逺寤寐寄託既而崇巒左披石壑前縈丹崿萬尋碧潭千頃松風唱響竹露熏空瀟瀟乎人間之難遇也方欲以林壑爲宫室琴罇爲日用嗟乎古今不改方深川上之悲少長同逰且盡山隂之樂盍題芳什共寫髙情得泉字詩曰披襟乗石磴别藉宴深泉蘭氣薫山酌松聲韻野絃響飄垂葉外香度落花前興盡林塘晩重巖起夕煙子安又有題𤣥武山道君廟詩序云吾之有生二十載矣雅厭城闕酷嗜江海嘗學仙經慱渉道記知軒冕可以理隔鸞鳯可以術待而事親多衣食之虞登朝有聲利之迫清識滯扵煩城仙骨摧扵俗境嗚呼阮籍意踈嵇康體放有自來矣常恐運促風火身非金石遂令林壑交䘮煙霞板蕩此僕所以懐泉塗而惴恐臨山河而歎息者也粤以勝友良暇相與逰於𤣥武西山廟葢蜀郡三靈峰也山東有道君廟古者相傳以名焉爾其丹壑藂倚𤣥崖紏合俯臨萬仭平視重𤣥乗杳㝠之絶境屬芬芳之暮節玉房跨霄而懸居瓊臺出雲而髙峙亦有野獸羣狎山鶯互囀崇松埒巨栢争隂積瀬與幽湍合響𦕈𦕈焉逸逸焉王孫何以不歸羽人何以長徃其𤣥都紫㣲之事耶方歛手鐘鼎息肩巖石絕視聴扵寰中置形骸扵度外不其然乎時預乎斯者濟隂鹿𢎞𦙍安陽邵令逺耳盍詩以言志不以韻數裁焉詩曰源水終無路山阿若有人駈羊前動石走兎欲投巾洞晩秋泉冷巖朝古樹新斜崖連鳥翅疊磴上魚鱗化鶴千齡早元龜六代春浮雲今可駕滄海遂成塵其二云振翮疲霜冷征月佇天潯囘鑣凌翠壑飛軫控青岑巖荒靈竈没澗毁石渠沉宫闕雲間近江山物外臨玉壇栖暮液珠洞結秋隂瀟瀟離俗影擾擾望鄉心誰憶山逰好徒傷人事侵又有逰廟山賦序云𤣥武山西有廟山東有道君廟葢幽人之别府也長蘿巨樹捎翳雲日王子馭風而逰泠然而善益懷霄漢之舉而忘城闕之戀矣思欲攀洪厓扵煙道邀羡門扵天路仙師不存壯志徒爾俄而泉石移景秋隂方積松栢羣吟悲聲四起背鄉闗者無復四時之策焉鳴呼有其志無其時則知林泉有窮路之嗟煙霞多後時之歎不其悲乎遂作賦曰陟彼山阿積石峩峩亭臯千里傷如之何啓松崖之密䕃攀桂岊之崇柯隔浮埃扵地絡披顥氣扵天羅爾其綠巖分徑蒼岑對室􅌲軒丹糺芝塲翠宻俯泉石之清泠臨風飈之瑟䫻仰紺臺而携手望𤣥都而容膝躡霞岡扵玉砌步雲岊扵金壇懷妙童扵眞女想青螭及碧鸞情恍恍而將逸心廻廻而未安見丹房之晩晦知紫洞之宵寒既而霧昬千嶂煙浮四野恨流俗之情多痛飛仙之術寡驅逸思於方外跼髙情於天下使蓬瀛可得而宅焉何必懷此都也亂曰已矣哉吾誰欺林壑逢地煙霞失時託宇宙兮無日俟鸞虬兮未期他鄉山水秪令人悲去縣五里内則爲火烽山通志云諸葛武侯嘗於此置烽火十里内則爲犂刅山李膺益州記云山長八里髙出衆峰形如鏵刅爲牟谷宋史牟焕中江人隱居讀書躬耕而食人勸之仕不可嘗有詩云日中還有昃月盈還有缺我心比日月晝夜常皎潔鑿石龕藏書銘之曰龕虚其中惟書之容忍枵爾腹萬卷而足此山峩峩人龕相磨書傳世久永親以壽至今名其地曰牟谷一舎内則爲覆船山十道録云堯時洪水州人維舟泊此覆于樹下因名覆船山又名泊山益州記云覆船山中十五里有七里坂一名羊腹坂屈曲壁立難昇之路百里内則爲銅山昔漢文帝時鄧通采鑄之所後立銅官大烏山小烏山大郪水小郪水皆出于其處也寰宇記云大飛烏山髙二里周迴二里又有小飛烏山髙一里周迴二里重巒峻削兩山相向如飛烏之狀隋唐飛烏縣鎭皆以此名又云郪江源出銅山赤㟁即故郪王城也流至飛烏合衆流入江小郪江源出蓮池鄉小山下東流六七十里合郪江王勃飛烏縣白鶴寺碑云白鶴寺者葢菩提寺之遺址梁武皇之所建也憑絶磴以圖規俯長溪而作固神明攸宅駕日月以長驅鸞鳯知歸撫雲霓而上出矣遂寧縣德陽舊壘石山名區初由縣而郡後乃以節鉞雄矣英華所載岑文本册遂州都督彭王元則文使持節督遂普果合四州諸軍事兼遂州刺史衘也白居易行刺史李繁制云遂居蜀之腴劉儀鳯南樓記平原沃野貫以涪江氣象寛舒爲東蜀之都㑹李石賦云山維東蜀如連如伏此貞觀之所以建督府而我宋之所以壯龍邸也水控内道或正或譎此劉裕之所以筞譙縱魯竒之所以抗閠孟也按五代史孟知祥兵圍東川唐節度使夏魯竒死守檄諸道文有城如斗有壁如金此之謂也知遂州軍事李騊忠節廟記略云方董孟連衡稱兵十萬突次明月池而公以騎卒二千勢不相軋乃堅壁清野坐困強敵始自戊寅迄于己巳不幸食盡勢窮義不茍生背裂血面竟以死謝騊守是邦追維前烈遂度地于東城之隅建廟請額刻之堅珉以風來世本志稱遂寧治後有忠井即故節度夏公魯竒死所每晴明霞彩上浮陳子昻遂州南江别諸親故詩楚江復爲客征棹方悠悠故人憫追送置酒此南洲平生亦何恨夙昔在林邱違此鄉山别長謡去國愁賈島處州使君改任遂州因寄贈云庭樹幾株隂入戸主人何在客聞蟬鑰開原上髙樓鏁瓶汲池東古井泉趂静野禽曽後到休吟隣叟始安眠仙都山水誰能憶西去風濤書滿船鄭谷將之瀘郡旅次遂州遇裴晤謫居於此話舊淒凉因寄二首云誰觧登髙問上元謫仙何事謫詩仙雲遮列宿離華省樹䕃澄江入野船黄鳥晩啼愁瘴雨青梅早發中蠻烟不知幾首南行曲留與巴兒萬古傳又昔年共照松溪影松折溪荒僧已無今日同思錦城事雪鋪花謝夢何殊亂離未定身俱老騷雅全休道甚孤我拜師門更南去荔枝春熟向渝瀘范成大遂寧府始見平川喜成短歌云峽之西遂之東更無平地二十里惟有髙山三萬重不知誰人鑿混沌獨此融結何其工我本呉江弄水月忽來踏徧西南峰不知塵界在何許但怪星辰浮半空直疑飛入蝶夢境此豈應有行人蹤今朝半逺見城郭云是東川軍府雄原田坦若㸔掌上沙路净如行鏡中芋區粟壠潤含雨楮林竹徑凉生風將士驩呼馬蹄快康莊直與錦里通半年﨑嶇得夷路一笑未暇憐飄蓬松栢之石昔著貞堅桃李之村今猶爛熳按輿地紀勝云宋建炎間轉運使衙後圃有松石外猶松栢而中化爲石又云近郭東北有村三十里許彌望皆桃李春時盛開爛熳如錦綺郡守春日講出郊故事於此碑目云蜀安國寺有碑在遂州羅城外永平二年立石志云城南報恩寺前有白塔一名白塔院舊傳隋煬帝公主隨夫謫蜀而建此塔中藏舍利一粒大如櫻桃今寺廢塔存嵗有鶴來巢其頂宋改今名寰宇記云梵雲山者三面懸絶東臨涪江西枕落星池志云在縣南三里又云東二里雲靈山與尋香山相連有飛來石二挺立巖隙有唐人吕嵓張九宗詩按尋香山本名血腥山唐刺史白子昉改今名碑目云縣東七里靈泉山壁間鐫七泉二字東坡筆王象之云隋開皇中靈泉山大霧晦㝠三日始㪚忽有釋迦石像立其所遂建聖佛寺即資聖院也方輿云資聖院在小溪靈泉山孫諤詩四山藏一寺方丈壓諸峰囬首坐禪處白雲深幾重紀勝云廣利寺在縣西五里巖壑之勝甲於一方雲厨之供香聞隔宿唐建中初建爲善濟院天祐改元爲再興寺宋乾寧爲廣利寺國朝爲廣德寺開山克幽禪師詳見髙僧傳中本志云宋釋者文易壁山人惟靖閬中人俱入廣利浮屠説法爲第三第四禪師矣予以壬子嵗過之遍摹碑刻有唐觀察支使朝議郎檢校尚書工部員外郎兼侍御史柱國賜緋李仁表撰敕賜遂州再興禪林寺記天祐改元甲子特進榮禄大夫禮部侍郎同平章丞相事侍御柱國賜紫鄭綮行牒宋元祐五年守普州知安岳縣事趙嗣業撰大唐克幽禪師塔記併書篆元豐八年乙丑金陵清谿逹叟李囘爲廣利寺文易記碑紹聖元年七月辛亥向眞净禪師煮茗此上南昌黄庭堅題尚書省牒奉敕賜善濟塔崇寧二年癸未勑戸部尚書右僕射蔡京行牒提舉榮州軍事推官馮世雄撰遂州廣利禪寺善濟塔碑瀛州防禦推官知湖州武康縣事充轉運司管勾帳司張康時書篆梓州路轉運司勾管文字賜緋孫詔通判遂州軍州兼管内勸農事權勾軍州事武騎尉賜緋何修輔梓州路轉運判官飛騎尉賜緋許安石梓州路轉運判官兼提舉學事飛騎尉謝瑾崇寧二年癸未立石尚書省牒奉勑宜賜圓覺慧應慈感大師牒至准勑故牒叅知政事鄭均右丞相缺乾道九年十二月御寳又有崇寧甲申大師忠惠秦國公何東劉懐逺詩云大士難知何代人克幽開創實艱辛細思筋骨相連理元是金剛不壊身廣利月華千古皎補陀潮水四時新可能得悟如來意使我靈䑓不染塵慶元丙辰二年中書省叅知政事何澹題云王事勤勞來去忙征鞍暫歇叩禪房幾經劫火福田固一入禪林心地凉塔下乆藏金鎻骨嶺頭長放玉毫光石頭路滑人難到我欲趨叅問大方寳慶丙戌僧隆粲賡云纔過溪橋眼力忙重重樓閣擁僧房千巖秀色諸縁斷一井清泉萬劫凉山上玉毫朝現瑞塔中金鎻夜垂光補陀殊勝歸南海誰信飛來墮此方慶元四年戊午四川都大茶馬官丁逄題云出城數里即青山路入蒼松白石間只合歩行尋曲徑不宜呵喝入松關碑目云縣西長慶院有浮螺亭又有卞髙五十六體篆字碑志云眞如院在東南十五里唐咸通中建石壇上有大寳幢髙二丈餘刻西方神咒又倚山起屋鐫石爲佛凡佛龕一百儀仗三千又云北二十五里蓮華寺一名崇善院隋袁使君别業也其相近法寳寺一名妙䑓宋陳志剛文彦修遊此有碑云自城中來飲切虚堂嵗晩江寒極目烟靄罷倦欲登妙臺更索照上座茗椀乃去寰宇記云龍頭山在州東五十里山有石勢如龍頭唐乾元二年奏置龍歸寺又云龍池寺故老相傳池側有柳樹大十圍周武帝天和初有龍自樹下升天士女共觀之自龍升後其樹乃枯池亦淺竭志云南五十里有花板寺元憲宗入蜀在此寺中生一子名辨都尋卒于此後每遇天雨隂晦見太子著赤袍行水上鄉人以爲神遂刻像立祠祀之志又云大佛寺在縣南一百里即古定明院在下遂寧縣南唐咸通中建前依巖石宋治平間賜額定明其崖上有石佛首靖康丙午道者王了知命工展開身像髙八十尺下俯江流寺前有石壁立色如黄羅故俗名黄羅帳其左有石磴緣巖人撫掌則鳴其聲如琴又有合掌石石左右向宛有指􅆶介扵湍流中方輿記云東蜀道院在郡治内晁子西爲記碑目云唐張九宗題記在城東崇𤣥觀其字圓勁有虞禇風骨本志云東十里嵩山觀有唐吕嵓詩云兩日行山興尚稠塵緣未斷且囘頭一天風雨吹凉閣四􅆕藤蘿伴客留著眼盡難爲業障平生無過是浮漚何須底死言名利尋得清閒即便休寰宇記云鶴鳴山在城東北二十里上有古觀松上嘗有鶴唳志云集虚觀在城北二十里廣山山極孤峭斗入江心涪江郪水㑹其下下有龍潭山常動搖有銅鑄明皇像殿柱上有葛璝題字削之愈明絶頂有葛仙洞碑目云遂寧廣山葛仙翁洞上有殘碑紀詩云儿字江頭鎻翠烟一峰挿立已參天我來直上無人識贏得清閒盡日眠一云城東八十里有崇眞觀在白鷺山嵓腹乃周隋間葛仙翁煉丹之所輿地紀勝云遂寧有上清觀祀董上仙像上仙唐小溪縣民女也神姿雅異一日紫雲垂布于庭天樂青童引之上升父母號泣呼之復下開元中詔迎入闗乞還未久竟仙去詔置像于上清觀志云又于此地建唐興館今唐興觀是也入蓬溪界已上山川俱見寺觀中鹽亭縣趙徵君㽔此縣人習術數之學隱居不仕著長短經李太白徃訪之縣有濯茟溪云太白從徵君習書處也廢永㤗縣文同與可生于其鄉丹淵集有北橋記自叙邑令郭君經請于其邑人文同者又有永㤗劉令清曦亭詩云木杪照初日捲簾知曉晴軒囱無限思圖史有餘清露下濛花重風來泛竹輕何須嫌五斗持此謝淵明與可有夏日閑書墨君堂壁詩云先人有弊廬涪水之東邉我罷漢中守歸此聊息焉是時五六月赤日烘遙天山川盡􅏫燥草木皆焦燃塵襟既暫解勝境乃獨專髙林抱深麓清䕃密右綿層巖敞户外淺瀬流窻前邀客上素琴留僧酌寒泉竹簟白石枕穩處只屢遷忽時乗髙風逺望立雲烟野興極浩蕩俗慮無一緣氣爽神自樂世故便可捐却憶爲吏時荷重常滿肩几案堆簿書區處忘食眠冠帶坐大暑顙汗常涓涓毎懼䝉深責取適敢自便安閒獲在茲怳若夢㳺僊行將佩守符復爾趨洋川山中豈不戀事有勢外牽尚子願未畢安能賦歸田其二歸來山中住便作山中人冠帶亦自閒累月不着身散髮層巖阿濯足清澗濵石蘚黏簡冊松風堕衣巾鄉里多舊逰不厭過從頻山肴與野釀待我如佳賔有召即走赴愛其愛我眞常恐禮數乖取問吾交親正此一夏樂忽茲遘蕭辰還愧擁千騎又走西道塵此葢石室先生所居處也杜甫行次鹽亭詩云馬首見鹽亭髙山擁縣青雲谿花淡淡春郭水泠泠丹淵集云縣既宫扵羣山其修隴茂麓逶迤曼衍分勢而住争㑹于左鯨偃鼇臥尾吻相屬谿溝澗谷蟠綰破斷葢荒源野溜瀵湧潨激夏洚秋潦相倚爲暴故郊圻之地少夷陸矣志云西負戴山則臨梓潼水從劍門來者隋張峻夫祠在焉東潺亭山則臨鹽亭水從閬州來者隋董叔祠在焉寰宇記云負戴山一名髙山廢髙渠郡城也其山龍蟠虎踞由劍門入當縣起伏四百餘里至此而蹲山有飛龍泉噴下南流入梓潼江水色清泠其味甘羙時以爲瓊漿水也嚴氏功徳碑云山南西道節度使移興元尹震震弟山南西道移東川節度使礪二墓俱在負戴山下神異記云隋張峻夫逰蜀至鹽亭遇一老嫗泣問之嫗曰地有井蠎每嵗祭以男女方汲今輪次當以某男女祭峻夫聞之愕然許以除害次日縳男女致祭蠎從井出將噬峻夫即杖劍投之蠎遁山洞滅迹峻夫登山洞口封以巨石書紫微仙洞四字蠎害遂除上帝命主此山爲神至今血食寰宇記云董叔山在縣東九十步髙一里隔瀰江水孤峰絶島峭壁千仭舊名潺亭山隋開皇四年縣令董叔封嘗逰宴於此後人思其徳政號曰董叔山十道記曰董政山隋開皇中縣令董叔封髙雅之士去官之後民咸思其徳因指此爲董政山寰宇記云鹽亭水源出閬州西水縣西南流入當縣鹽亭井故名鹽亭水去合梓潼水也碑目云李義府碑在永㤗縣北寰宇記云義府本此郡人武后時爲中書令後人立碑以旌餘烈眞徳秀云李義府奸臣也其子湛以忠義聞若湛者可謂能葢父之愆已安岳縣寰宇記梁普通中義州刺史臨汝侯賜羣獠金劵鏤書其文云今爲汝置普慈郡可率屬子弟奉官租以時輸送此立郡縣之始也普州三亭文同皆有詩一曰均逸亭詩云亭宇跨城端新苔磴道盤風灮晴水石烟景暮林巒簿領仍多暇賔從每盡歡何由掉塵鞅聊問借闌干一曰東溪亭詩云短約逶迤渡髙櫩夭矯沉波灮環堵净日色綵梁深萍荇翻金鯽蘭苕起翠禽主人公事簡時此照清襟一曰碧厓亭詩云斷巘綠溪邉危亭翠壁前軒囱誰是客詩酒自稱仙逺壑春藏雨長波晝起烟吏人休報事髙興正陶然圖經云城東南大成山世傳孔子經宿于此有古碑又云安岳城南樓杜老教授其上所爲南樓絃誦聲者也唐蘇絳賈島墓銘序云島字浪仙范陽人長材間氣超卓挺生属思五言孤絶之句記在人口罹謗責授遂州長江主簿自長江簿遷司倉㕘軍又遷普州司户㕘軍終焉有祠在城南三里碑目云此碑以㑹昌四年立馮賢書又云唐宣宗大中八年賜浪仙墓表曰於戲有唐詩流賈君之墓志云賈島墓在城南三里安泉山即田家嘴也集古錄云唐紫極宫碑樂闡撰賈島書樂彦融篆額𤣥元皇帝祠也碑以㑹昌元年立在普州又云唐西嵓禪師受戒序普州刺史韋忠開元十年建又云唐開元觀老君應見碑開元三十九年岳陽郡奉勑建大宋淳化二年重鐫又云唐棲嵓山寺賛銘開元戊辰前刺史𢎞農楊珪博陵崔克讓書刺史房公刻于山之石壁下半已剝落志云銕山者縣治之所枕也一名鳯凰山後二里曰大雲山方輿云鳯凰山在郡治後形如飛鳯福濟寺居其頂舞鳯亭當其咮州治據其􅆃左爲慈氏院右爲白馬廟延袤數里氣象雄勝唐獨孤及詩云鴈陣起秋雲雞聲滿林屋客思不可禁銕峰駐雕轂者此也方輿云銕山神姓姚諱萇字景徹隋文帝時普昌瀘三州夷作亂帝命神爲都統將兵討平之卒葬韓朋鎮石城山後人爲立廟嘉定乙卯紅巾作亂於益昌遂入普屯于廟山是夕暴風雷雨掀掲寨舎渠魁莫簡見空中神異謁廟謝過探籖得擒賊先擒王之句已而就擒志云有司每以十月十七致祭其誕日也方輿云大雲山在銕峰門外二里有棲嵓寺即李洞讀易處洞雍州人避朱泚之難入蜀扵大雲山鑿石爲洞讀易其中嘗師事賈島鄭谷哭進士李洞詩自聞東蜀病唯我獨闗情若近長江死想君勝在生瘴蒸丹旐濕燈隔素帷清塚樹僧栽後新蝉一兩聲方輿云岳陽溪在安岳縣天聖中郡守彭乗鑿石爲曲水後名翰林灘每嵗修禊事于此䨇溪在郡西七里與岳陽溪合而東按乗益州華陽人爲漢陽軍判官頋望鄉閭悵然曰親老矣乞歸侍養㓂凖薦之召爲集賢校理求便親得知普州舊制蜀人不許赴蜀官特恩自乗始慶厯中與歐陽文忠宋景文張文定同在翰林今東溪上曰翰林灘者公遺跡也志云岳陽溪即青竹溪又云南二里響水潭爲岳陽溪上流上下皆石水觸之聲如金鼔其洩如倒其澄如沚本志云破石井在城西其水清冽乃一巨石鑿開而得水云陳摶相地所開按李宗諤圖經謂陳摶字希夷普州崇龕人既長辭父母去學道或居亳爲亳人或居洛中爲洛人或居華山爲華山人舊普慈志云鉄山棗崇龕梨天池藕三者皆希夷所種也方輿云艮嵓在岳之清流鎮杜孝嚴嘗書艮卦彖辭其上又作杜氏寳田銘云昔我皇祖節範處士實居谿上題於石壁云忠孝二字吾家之田爲我子孫留此基銘舊屋改矣谿山自如􅆕溪背山新構吾廬山巘石壁可以大書乃作斯銘母忘厥初銘曰忠孝之寳出爾性天忠不待貴葵藿有尊孝不待富菽水盡歡茍能保此既羙且安經史之田在爾菑畬穗穋是格稂莠是除苦心立志斯爲良圖雖有饑饉必有豐餘光明之山韞玉初露卜築山根寳田所富此山不磨此寳長明此山不㓕此田長畊環堵既新勒山爲銘子子孫孫生生成成按杜孝嚴官試禮部尚書史稱安岳杜孟㳺太學見童蔡用事翻然引歸所謂節範處士也志云馮公墓碑在棲岩山字多剥落名不可攷按諸馮自唐馮宿之後爲彰明令因家于蜀在普有南宗北宗之别南宗有馮如晦能辦范純仁之誣獄馮宋與陳東同伏闕上書北宗則有馮光戬能戒大將楊瓊之殺降馮澥之忤蔡京遭貶皆著名當時樂至縣樂至池即治内池也㓂萊公爲縣令嘗讀書于此又有蓮池一名洗馬池舊傳勾侍郎所鑿治南有洞石刻小盤谷三字見存而龍洞龍潭皆可以禱雨此通志所載蜀中廣記卷三十
