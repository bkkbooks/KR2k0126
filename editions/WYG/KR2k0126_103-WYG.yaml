body:
  text: 蜀中廣記卷一百三明曹學佺撰詩話記第三孟蜀毎嵗除日諸宫門各給桃符書元亨利貞四字時昶子善書札取本宫策勲府符書云天垂餘慶地接長春乾德中伐蜀明年蜀除二月以兵部侍郎吕餘慶知軍府事以䇿勲府為治所太祖聖節又號長春此天垂地接之兆也出鑑戒錄古今詩話云宋太祖采聽明逺毎邊事纎悉必知有間者自蜀還上問劒外有何事間者曰但聞成都滿城誦朱山長苦熱詩曰煩暑鬱蒸無處避涼風清冷幾時來上曰此蜀民思吾伐也然予考睦台符岷山異事云梓潼山人李堯夫吟詠尚譏刺謁蜀相李昊昊戲曰何名之背時耶堯夫厲色對曰甘作堯時夫不樂蜀中相因是為昊所擯自吟苦熱詩云炎暑鬱蒸無處避涼風消息幾時來以是知此兩句乃李堯夫詩非朱山長也清冷兩字不逮消息逺甚堯夫又有大内盆池詩云向外疑無地其中别有天蜀平後贈滕白郎中詩云方外共推為道友闗中獨自占詩家譏滕入蜀詩家惟堯夫耳出能改齋漫錄蜀父老相傳岷山有焦夫子宋初人貌寢陋且恠修目而廣眉海口而蚪髯癭纍纍絡頷下性真率雖冠葢見之往往爬痒捫虱腰袴間忽為詩歌則竒言異句駭人觀聽有誦其一聯云兩輪日月磨興廢一合乾坤夾是非出舊誌建隆初有人泊舟巴峽夜聞人咏曰秋徑堆黄葉懸崖露草根猿聲一呌斷客淚數重痕通宵凡吟百過又有梁伯升者肄業廢宅中夢一女子綠裙紅袖呼梁君聽妾幽恨之句詩曰卜得上峽日秋來風浪多江陵一夜雨腸斷木蘭歌出縉紳脞説張乖厓公布衣時素善陳摶嘗因夜話謂摶曰某欲分先生華山一半住得無摶曰餘人則不可先輩則可及旦取别摶以宣毫十枝白雲臺墨一劑蜀牋一角為贈公謂摶曰㑹得先生意取某入閙處去曰珍重摶送公囘謂弟子曰斯人無情于物達則為公卿不達為王者師公常感之後尹蜀乗傳過華陰寄摶詩曰性愚不肯林泉住强要清流擬致君今日星馳劒南去囘頭慚愧華山雲出青箱雜記又云公席上贈官妓小英歌曰天教摶百媚相暎明如花住近桃花坊正面門庭掩暎如仙家美人宜稱言不得龍腦薰衣香入骨維揚軟縠如雲英亳郡輕紗似蟬翼我疑天上婺女星之精偷入筵中名小英又疑王母侍兒初失意謫向人間為歌妓不然何得膚如紅玉初碾成眼似秋波雙臉横舞態因風欲飛去歌聲遏雲長且清有時歌罷下香砌幾人魂魄遥相驚人看小英心已足我見小英心未足為我高歌送一杯我今贈汝新翻曲按公鐵石心人在蜀娶婢三年後歸其父猶然完璧此詩亦靖節閒情廣平梅花之意也然嵗華紀麗稱浣花小遊江起于公葢亦不厭游戲云方輿勝覽載公在蜀有錄曹叅軍老病廢事公責之曰何故不歸明日叅軍求去且以詩留别其畧云秋光多似宦情薄山色不如歸興濃公驚歎曰吾過矣同僚能詩而吾不知乃留而慰薦之蜀人魏野隠居不仕善為詩卜居陜州東門外有陜州平陸縣詩云寒食花藏縣重陽菊遶灣一聲離岸櫓數㸃别州山最為警句當世顯人多與之遊冦忠愍尤愛之嘗有贈忠愍詩云好向上天辭富貴却來平地作神仙後忠愍鎮北都召野置門下北都有妓女美色而舉止生硬土人謂之生張八因府㑹忠愍令乞詩于野野贈之詩曰君為北道生張八我是西州熟魏三莫道樽前無笑語半生半熟未相諳出夢溪筆談世傳野嘗從萊公遊陜府僧舍各有留題後復同游見萊公詩已用碧紗籠䕶而野詩獨否塵昏滿壁時有從行官妓頗慧黠即以袂就拂之野徐曰若得常將紅袖拂也應勝似碧紗籠萊公大咲出青箱雜記宋子京知成都帶唐書于本任刋修毎宴罷盥潄畢開寢門垂一簾燃二椽燭媵婢夾侍和墨伸紙逺近觀者皆知尚書修唐書望之若神仙焉景文作詩纎麗號西崑體而成都文類有咏海棠排律更佳趙清獻知成都日以一琴一鶴自隨及再至屏去龜鶴止一蒼頭執事張公裕作詩送之云馬諳舊路行來滑龜放長江不共來復觀王素聽運使閲道殿院撫琴詩亦云雷琴一張龜一隻惟將二物娛幽情可知清獻擕鶴之外又擕龜矣范成大新作官梅庄又有種竹了戲題愛山亭詩皆宣華廢苑又有雨後東郭排岸司申梅開及三分戲書小絶令一面開宴當時風味猶可想見范成大詩註蜀人鄉音極難解其為京洛音輒謂之虜語或是僣偽時以中國自居循習至今不改也既又諱之改為魯語尤可咲故就用其字云耳畔逢人無魯語演和尚云禪人囘到成都切須記取魯語文彦博慶厯間知益州多燕集有飛語至京師御史何郯聖從謁告歸里上遣伺察之張俞少愚潞公客也迎見聖從于漢州有營妓楊姓者善舞聖從喜之少愚因取項帕題詩曰蜀國佳人號細腰東臺御史惜妖嬈從今喚作陽臺栁舞盡春風萬萬條後數日聖從至成都頗嚴重一日潞公大作樂以宴之迎此妓雜府妓中歌少愚之詩以酌聖從毎為之醉及還朝潞公之謗乃息此與陶榖使江南事頗同鄭剛中鎮蜀眷妓曰閻玉所居富春坊忽民間遺火鄭公于火明中獲一旗上有詩乃借東坡海棠為之云火星飛入富春坊天恣風流此夜狂只恐夜深花睡去高燒銀燭照紅粧公一見曰必道山公子也楊曼倩古今詞語中亦有此詩出白獺髓范景仁鎮喜為詩年六十三致仕一朝思鄉里遂輕行入蜀故人李才元大臨知梓州景仁枉道過之歸至成都日與鄉人樂飲散財於親舊之貧者遂遊峨眉青城山下巫峽出荆門凡期嵗乃還京師在道作詩凡二百五篇其一聯云不學鄉人誇駟馬未饒吾祖泛扁舟此二事他人所不能用也出溫公詩話仁壽龍昌期初謁王荆公安石投刺稱詩人左右曰何物書生敢于丞相前稱詩人耶公揖之入值軍人運沙遂命賦此應聲云茫茫黄出塞漠漠白鋪汀鳥去風平篆朝囘日射星公大賞之出本志張安道與歐文忠素不相能慶厯初杜祁公韓富范四人在朝欲有所為文忠為諫官恊佐之而前日吕申公所用人多不然於是諸人皆以朋黨罷去而安道繼為中丞頗彈擊以前事二人遂交怨葢趣操各有主也嘉祐初安道守成都文忠為翰林蘇明允父子自眉州走成都將求知安道安道曰吾何足以為重其歐陽永叔乎乃為作書辦装使人送之京師謁文忠文忠得明允父子所著書大喜曰後來文章當在此即極力推譽天下于是高此兩人子瞻兄弟後出入四十餘年雖物議于二人各不同而亦未嘗敢有纎毫輕重子其間也出石林避暑錄老泉擕東坡潁濵謁文定公時方習制科業將應詔文定公忽出題令人持與坡潁云請學士擬試文定公于壁間窺之兩公得題各就坐致思潁於一題有疑指以示坡坡不言但舉筆倒敲几上云管子注潁濵疑而未決也又指其次東坡以筆勾去即擬撰出以納文定閲其文益喜勾去一題乃無出處文定欲試之也次日文定見老泉云二子皆天才長者明敏尤可愛然少者謹重成就或過之所以二公受知文定而潁濵感之尤深出瑞桂堂暇錄老泉布衣時初未有名雅安守劉太簡簡夫獨深知之以書薦於韓魏公歐陽文忠公張文定公辭甚切至文亦高雅今蜀人多傳其本而東坡潁濵二公獨無一語及太簡者老泉集中與太簡往來亦止有辭召試一書耳如與太簡請納拜蜀人至今傳集亦不載初疑偶然久之又得老蘇所作太簡墓銘亦不在集中乃知編集時有意刪去不知其意果何在也出老學菴續筆蘇明允至和間來京師既為歐陽文忠公所知其名翕然韓忠憲諸公皆待以上客嘗遇重陽忠憲置酒私第惟文忠與一二執政而明允乃以布衣參其間都人以為異禮席間賦詩明允有佳節屢從愁裏過壯心時傍醉中來之句其意氣尤不少衰明允詩不多見然精深有味語不徒發正類其文如讀易詩云誰為善相應嫌瘦後有知音可廢彈婉而不迫哀而不傷所作自不必多也出石林詩話東坡老翁泉詩井中老翁娛年華白沙翠石公之家公來無踪去無跡井面團露水生花翁今與世兩無與何事紛紛驚牧豎改顔易服與世同無使世人知有翁説家又載東坡圖書刻有老泉二字如此則老泉之號未應属明允也洪容齋隨筆言東坡慕白樂天因以為號慎按南賔志云東坡西坡皆白文公故迹樊漢炳詩曰忠黄江上兩東坡二老遺風凛不磨人得矜誇知地勝天教流落為才多以此驗之信然出丹鉛錄予嘗夢客有擕詩相過者覺而記其一詩云道惡賊其身忠先愛厥親誰知畏九折亦自是忠臣又有數句若銘賛者云道之所以成不害其耕德之所以修不賊其牛出志林東坡先生在嶺南言元祐中有見李白在酒肆中誦其近詩云朝披夢澤雲笠釣青茫茫此非世人語也少游嘗手錄其全篇敘云觀頃在京師有道人相訪風骨甚異語論不凡自云嘗與物外諸公往還口誦二篇云東華上清監清逸真人李白作也詩云人生燭上花光滅巧妍盡春風遶樹頭日與化工進昔我飛骨時􅆭見當塗墳青松靄朝霞縹緲山下村既死明月魄無復玻璃魂念此一脱洒長嘯登崑崙醉着鸞鳯衣星斗俯可捫又云朝披夢澤雲笠釣青茫茫尋流得雙鯉中有三元章篆字若月蛇逸勢如飛翔歸來問天姥妙義不可量金刀割青素靈文爛煌煌燕服十二環想見仙人房暮跨紫鱗去海氣侵肌涼龍子善變化化作梅花粧遺我纍纍珠靡非明月光勸我穿絳縷繫作裙間襠揖子以疾去談笑聞餘香出侯鯖錄子瞻嘗於淯井監得西南夷人所賣蠻布弓衣其文織成梅聖俞春雪詩一首朔風三日暗吹沙蛟龍卷起噴成花花飛萬里奪曉月白石爛堆愁女媧大明廣庭踏朝賀雉尾不掃粘官靴宫中才人承聖顔奉觴稱壽呼南山三公免責百姓喜斗酒十千誰復慳此詩在聖俞集中未為絶唱葢其名重天下一篇一詠傳落夷狄而異域之人貴重之如此耳子瞻以余尤知聖俞者得之因以見遺余家舊畜琴一張乃寳厯三年雷㑹所斷距今二百五十年矣其聲清越如擊金石遂以此布更為琴囊二物真余家之寳玩也出六一詩話東坡送戴䝉赴成都玉局觀詩云拾遺被酒行歌處野橋官栁西郊路聞道華陽版籍中至今尚有城南杜按費著氏族譜稱少陵之後者係宗武所傳予閲眉州志杜莘老青神人甫十三世孫坡後亦提舉玉局觀未赴東坡云吾昔自杭移高密與楊元素同舟而陳令舉張子野皆從予過李公擇於湖遂與劉孝叔俱至松江夜半月出置酒垂虹亭上子野年八十五以歌辭聞於天下作定風波令其畧云見説賢人聚吳興試問也應傍有老人星坐客歡甚有醉倒者此樂未嘗忘也去今又七年子野孝叔令舉皆為異物而松江橋亭今嵗七月九日海風駕潮平地丈餘蕩盡無復孑遺追思曩時真一夢爾按苕溪漁隠曰吳興郡圃今有六客亭即公擇子瞻元素子野令舉孝叔時公擇守吳興也東坡又云余昔與張子野劉孝叔李公擇陳令舉楊元素㑹於呉興時子野作六客辭其卒章云盡道賢人聚呉興試問也應傍有老人星凡十五年再過呉興而五人皆已亡矣時張仲謀與曹子方劉景文蘇伯固張秉道為坐客仲謀請作後六客辭云月滿苕溪照野堂五星聚處一老鬭光芒十五年間真夢裡何事長庚對月獨凄涼綠髮蒼顔同一醉還是六人吟嘯水雲鄉賔主談鋒誰得以看取曹劉今對兩蘇張出綿竹志元素綿竹人章詧字隠之本閩人遷於成都數世矣善属文不仕晩用太守王素薦賜號冲退處士一日夢有人寄書召之者云東岳道士書也明日與李士寧遊青城濯足水中詧謂士寧曰脚踏西溪流去水士寧荅曰手持東岳寄來書詧大驚不知其所自來也未幾詧果死士寧蓬州人也語黙不常葢得道者百嵗乃死常見予成都曰子甚貴當䇿舉首已而果然出志林東坡云趙伯成家有麗人僕忝鄉人不肯開樽徒吟春雪美句因次其韻一笑詩云朱簾綉户未曽開誰見梅花落鏡臺試問高吟三十韻何如低唱兩三杯莫嫌衰鬂聊相暎須得纎腰與共囘知道文君隔青瑣梁園賦客肯言才仍自注其末聊荅來句義取一人而已罪過罪過出古今詩話子由一字同叔東坡有還須畧報老同叔之語又元日立春云己夘嘉辰壽阿同元日己夘為子由本命出霏雪錄子瞻一字和仲見子由所作墓誌蘇小妹老蘇先生之女幼而好學慷慨能文適其母兄程濬之子之才先生有詩曰汝母之兄汝伯舅求以厥子來結姻鄉人嫁娶重母族雖我不肯將安云人言蘇子無妹却有此詩出蘇氏小抄東坡詩云清吟雜夢寐得句旋已忘固已竒矣晩謫惠州復出一聯云春江有佳句我醉墮𣺌莽則又加於少作一等近世詩人老而益嚴葢未有如東坡者也學者或以易心讀之何哉淳熈九年五月二十六日玉局祠吏陸游書于鏡湖下鷗亭文同與可蜀人與蘇子瞻厚為人靖深超然不嬰世故善畫墨竹作詩騷亦過人熈寧初時論既不一士大夫好惡紛然同在館閣未嘗有所向背時子瞻數上書論天下事退而與賔客言亦多以時事為譏誚同極以為不然毎苦口力戒之子瞻不能聴也出為杭州通判同送行詩云北客若來休問事西湖雖好莫吟詩及黄州之謫正坐杭州詩語人以為知言出石林詩話予在成都偶以事至犀浦過松林甚茂問馭卒此何處荅曰師塔也葢謂僧所葬之塔於是乃悟杜詩黄師塔前江水東之句已下三則俱老學菴筆記予遊大邑鶴鳴觀所謂張天師鶴鳴化也其東北絶頂又有上清宫壁間有文與可題一絶曰天氣陰陰别作寒夕陽林下動歸鞍忽聞人報後山雪更上上清宫上看漢嘉城西北山麓有一石洞泉出其間時聞洞中泉滴聲良久一滴清如金石黄魯直題詩云古人題作丁東水自古丁東直到今我為改名方響洞要知山水有清音紹聖二年四月甲申山谷以史事謫黔南道間作竹枝詞二篇題歌羅驛曰撑厓拄谷蝮蛇愁入箐攀天猿掉頭鬼門闗外莫言逺五十三驛是皇州浮雲一百八盤縈落日四十九渡明鬼門闗外莫言逺四海一家皆弟兄自書其後曰古樂府有巴東三峽巫峽長􅆐鳴三聲淚沾裳但以抑怨之音和為數叠惜其聲今不傳余自荆州上峽入黔中備嘗山川阻險因作二叠傳與巴娘今以竹枝歌之前一叠可和云鬼門闗外莫言逺五十三驛是皇州後一叠可和云鬼門闗外莫言逺四海一家皆弟兄或各用四句入陽闗小秦王亦可歌也是夜宿於驛夢李白相見於山間曰予往謫夜郎於此聞杜鵑作竹枝詞三叠世傳之不子細憶集中無有三誦而使之傳焉其詞曰一聲望帝花片飛萬里明妃雪打圍馬上胡兒那解聽琵琶應道不如歸竹竿坡面蛇倒退摩圍山腰猢孫愁杜鵑無血可續淚何日金雞赦九州命輕人鮓甕頭船日瘦鬼門闗外天北人墮淚南人笑青壁無梯聞杜鵑今豫章集所刋葢自謂夢中語也音響節奏似矣而不能揜其真亦寓言之流歟桯史史琰字炎玉好學嫺文州刺史張誾聘為冡子祺之配祺亦有才與炎玉酬唱成集題曰和鳴作字用禿筆體法古勁黄山谷與祺父有内親而祺弟祉亦以進士為青神尉山谷親來訪之炎玉致書嘗緘綠菜以贈山谷為之賛曰蔡䝉之下彼江一曲有茹生之可以為蔌蛙蠙之衣采采盈掬芼以辛鹹宜酒宜餗在吳則紫在蜀則綠其臭味同逺故不錄頒我㫖蓄史君炎玉出眉州志涪翁過瀘南瀘帥留府㑹有官妓盻盻帥嘗寵之涪翁贈浣沙溪詞曰脚上靴兒四寸羅唇邊朱麝一櫻多見人無語但迴波料得有心憐宋玉祗因無奈楚襄何今生有分向伊麽盻盻拜謝涪翁瀘帥令唱詞侑觴唱惜春容涪翁大喜醉飲而别出山堂肆考魯直詩序云覺範道人種竹於所居之東軒使君楊夢貺題其軒曰也足取古人但有嵗寒心兩三竿也足之句仍為之賦詩余輒次韻云道人手種兩三竹使君忽來唾珠玉不須客賦千首詩若是賞音一䕫足世人愛處但同流一絲不掛似太俗客來若問有何好道人優曇逺山綠按其地在簡池郡南一里景德觀魯直量移戎州丹稜楊素從之游魯直曰安得竒士而有力者盡刻杜子美在蜀所作使大雅之音復盈三巴耳哉素聞之欣然請攻堅珉募善工作華堂以宇之黄偉其言悉書子美詩遺之因以大雅名堂且為之記陸放翁之蜀宿一驛中見題壁云玉階蟋蟀閙清夜金井梧桐辭故枝一枕凄涼眠不得呼燈起作感秋詩放翁詢之驛卒女也遂納為妾方餘半載夫人逐之妾賦卜筭子云只知眉上愁不知愁來路窻外有芭蕉陣陣黄昏雨曉起理殘粧整頓教愁去不合畫春山依舊留愁住出隨隠漫錄放翁在蜀日有所盻嘗賦詩云碧玉當年未破𤓰學成歌舞入侯家如今顦顇蓬窻㡳飛上青天妬落花出蜀後毎懷舊游多見之賦詠有云金鞭珠彈憶春游萬里橋東罨畫樓夢倩晩風吹不斷書憑春雁寄無由鏡中顔髮今如此席上賔朋好在不篋有吳牋三百箇擬將細字寫春愁又云裘馬清狂錦水濵最繁華地作閒人金壺投箭消長日翠袖傳杯領好春幽鳥語隨歌處拍落花鋪作舞時茵悠然自適君知否身與浮名孰是親又以此詩櫽括作風入松云十年裘馬錦江濵酒隠紅塵黄金選勝鶯花海倚疎狂驅使青春吹笛魚龍盡出題詩風月俱新自憐華髮滿紗巾猶是官身鳯樓曽記當年語問浮名何似身親欲寫吳牋説與這囘真箇閒人出癸辛襍識韓駒詩題云仙泉虞童子郎使者聞諸朝三年不加考故作二絶以贈之歸七嵗瀾翻數萬言饑鷹引子望騰騫時人不識甘羅軰寂寞題詩歸故園不作西京童子郎時人何自識黄香還鄉再誦五千卷十八重來謁太常按此即漢時童子郎國初嘗有此選蜀中相傳成𢎞間新都楊文忠公亦在選列駒字子蒼仙井人今併入仁壽作詩法名陵陽正法眼吕仁作江西詩𣲖圖置駒其間而駒不悦右陵陽先生韓子蒼詩草一卷得之其孫籍先生詩擅名天下然反覆塗乙又厯疏語所從來其嚴如此可為後軰法矣予聞先生詩成既以予人久或累月逺或千里復追取更定無毫髮恨迺止則此草亦未必皆定本也大歇菴詩一章徐師川作而先生手錄之亦足見其無昔人爭名之病矣故附見卷中淳熈庚子四月二十二日笠澤陸游書唐子西嘗見桃李盛開而梅尚存數枝因作詩時張無盡天覺被召乃以詩投之云桃花能紅李能白春來何處無顔色不應尚有一枝梅可是東君苦留客向來開處當嚴冬桃李未在交游中只今已是文人行勿與少年爭春風無盡大加稱賞出墨庄漫錄兵部侍郎劉朝美儀鳯普州人性酷嗜書喜傳錄初以禮部郎兼攝秘書少監後即真凡秘府書籍傳寫殆遍如國史之類又置副本親自校酧至杜門絶交遷兵侍猶傳寫不已張持國為副端言其書癖至曠廢職事以是罷歸蜀詩人闗壽卿為著作佐郎以詩餞行曰公議久不作世無真是非祗因飜故紙不覺蹈危機東壁夢初斷西山蕨正肥十年成底事贏得載書歸出庚溪詩話李燾過成都淨名院曰觸目都似曽到問訊乃非也其自題龍鵠山房詩云已作清時鳥亂飛杜鵑更勸阿誰歸似嫌住處猶城郭不解擕家隠翠㣲極有風韻可想陳甲字升父隆州人紹興間為蜀帥李公璆之客館于雙竹齋夜見數婦笑語有吟兩絶句者因忽不見曉雨廉纎梅子黄晩雲卷雨月侵廊樹陰把酒不成飲説着無情更斷腸舊時衣服盡雲霞不到迎仙不是家今日樓臺渾不識秪因古木記宣華朱乗題雁入月新霜岸草枯數聲哀怨雁來初憑君試向沙汀看恐帶匈奴二帝書高宗聞之歎曰此人頗有愛君之心出保寧府誌蘇雲卿與張魏公浚友魏公既相雲卿隠豫章東湖鬻蔬自給公托漕帥聘之㣲服乃得見詰朝再至則閉闗矣啓之惟書與金在不啓封曽蒼山作歌云東湖湖面波𣺌瀰東湖岸上春土肥先生鋤雲明月曉種來蔬甲今成畦把茅蕭蕭環四壁此身不願人間識乾坤清夷那復知寸心杳緲黄塵隔故人子房今九雲交情不斷江湖濵江西使漕郤騶騎故作敲門問字人黄金百鎰牋一幅多謝春風到茅屋君為使者吾邦民見君容我更樵服故人與我情重哉君且歸矣明當來明朝啓扉人不見黄金不動書不開使者持書三太息封書徑上黄扉側翩翩鶴馭雲冥冥空向湖山訪行跡向來桐江嚴子陵曽得故人雙眼青芒鞋却踏金華路太史驚誇説客星先生得書掉頭去併此湖光不囘顧夢夫孀婦截鬂鬟亦有老大閨中女蒼山此歌可激貪鄙張世南遊宦紀聞載宋隠逸記蘇翁本末甚詳謝慧卿巴謝氏女也頗能詩雖不盡合亦一方之秀有竊仙自樂詩云尋得桃源可悟仙丹書惟恐鳯飛傳雨收峰頂雲歸洞風到池塘月滿天清脱可喜有閨餘集題咏甚富出河上楮談成都女郎張窈窕上任事者詩曰昨日買衣裳今朝賣衣裳衣裳都賣盡羞見嫁時廂有賣愁應緩無時心轉傷故園千里隔何處是蚕桑出鑑戒錄閬中壽聖院僧冲古者工於詩其挽光獻太后云昔補一天成大業晩扶雙日耀重離有詩五百餘篇題曰錦屏集又僧惟聰能詩曽賦春陰云好花分日少閒草占春多亦佳句也眉陽人見本志蜀僧號峨眉道者戒律甚嚴不下山二十年一日有布衣青裘昂然一偉人來與語良久期以明年是日復相見於此願少見待明年是日方午道者沐浴端坐而逝至暮偉人果來問道者安在曰亡矣偉人歎息良久書數語於堂側壁間絶高處語云落日斜西風冷幽人今夜來不來教人立盡梧桐影字畫飛動如翔鸞舞鳯非世間筆也或云吕洞賔作出竹坡詩話蜀僧希晝游雁蕩山云天長來月正木末度猿稀荅黄桂州云束書逢嵗嗣去梦厯峯危送廣漕云春生桂嶺外人在海門西送僧東歸云㠶雲先寒雁經聲隠暮潮宋承㫖林亭云雪溜垂危石棋燈射逺林贈僧云潄齒氷溪逺聞蟬雲屋深送人云玉繩天闕近金柝海城秋贈勾學士云曉天金馬路晩嵗石霜心寄人云山日秋光短江虹晩影低送新津尉云劍月啼猿苦江沙濯錦寒北宫書亭云花露盈䖝穴梁塵墮燕泥贈闗上人云寄禪闗樹老乞食塞城荒送僧歸新安云風泉舊聽僧窻改雲火曽行鳥徑殘春山云芳樹侵雲老孤泉落石危送人歸南海云落日横秋島寒濤兀夜船出談苑長和國使人布燮聽蜀妓洞雲歌詩云嵇叔夜鼓琴飲酒無閒暇若使當時聞此歌抛擲廣陵都不藉劉伯倫虛生浪死過青春一飲一石猶自醉無人為爾卜深塵出鑑戒錄漢州崇聖寺寒食日忽有朱衣一人紫衣一人氣貌甚偉驅殿僕馬極盛寺僧謂州官至奔出迎接皆非也與僧展揖甚恭唯少言語命筆各題一絶句于壁朱衣詩曰禁煙佳節同遊此正值荼醿夾岸香緬想十年前往事强吟風景亂愁腸紫衣詩曰䇿馬暫尋原上路落花芳草尚依然家亡國破一塲夢惆悵又逢寒食天題罷上馬疾去出松徑失其所在但覺異香經月不散其詩于今見存出玉堂閒話虞伯生先生集楊仲𢎞先生載同在京日楊先生毎言伯生不能作詩虞先生載酒請問作詩之法楊先生酒既酣盡為傾倒虞先生遂超悟其理繼有詩送袁伯長先生桷扈駕上都以所作詩介他人質諸楊先生先生曰此詩非虞伯生不能也或曰先生嘗謂伯生不能作詩何以有此曰伯生學問高余曽授以作詩法餘莫能及又以詣趙魏公孟頫詩中有山連閣道晨留輦野散周廬夜屬􅐤之句公曰美則美矣若改山為天野為星則尤美虞先生深服之故國朝之詩稱虞趙楊范揭焉范即德機先生梈揭即曼碩先生徯斯也嘗有問於虞先生曰仲𢎞詩如何先生曰仲𢎞詩如百戰徤兒德機詩如何曰德機詩如唐臨晉帖曼碩詩如何曰曼碩云美女簮花先生詩如何笑曰虞某漢廷老吏葢先生未免自負公論以為然出輟耕錄蜀中廣記卷一百三
