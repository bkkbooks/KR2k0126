body:
  text: 蜀中廣記卷七十六明曹學佺撰神仙記第六川北道神仙傳曰張道陵者沛國人也本太學書生博通五經晩乃歎曰此無益於年命遂學長生之道得黄帝九鼎丹法欲合之用藥須糜費錢帛陵家素貧欲治生營田牧畜非已所長乃不就聞蜀中人多純厚易於敎化且多名山乃與弟子入蜀住鶴鳴山著作道書二十四篇乃精思鍊要忽有天人下來乗萬騎金車羽葢驂龍駕虎不可勝數或自稱柱下史或稱東海小童乃授陵以新出正一盟威之道陵受之能治病於是百姓翕然奉事以為師弟子戸至數萬即立祭酒分領其戸有如官長使諸弟子隨事輪出綵絹器物紙筆樵薪什物等令人修復道路不修復者皆能疾病百姓斬草除溷無所不為皆出其意而愚者不知將為此文從天上下也陵又欲以㢘恵治人不喜使刑罰乃立條制使有病疾者皆䟽記生身已來所犯之罪乃首言投水中與神明共盟約不得復犯法將當以生死為約於是百姓計念邂逅病疾輒當首過一則得愈二使羞慙不敢重犯且畏天地從此之後所違犯者皆改為善矣陵乃多得財物以市其藥合丹丹成服半劑不願即昇天去乃能分形作數十人其所居門前水池陵常乗舟戲其中而諸道士賔客往來盈庭巷座上常有陵與賔客對談共食飲而真陵故在池中也其治病事皆採取𤣥素但改易其大較轉其首尾而大途猶同歸陵語諸人曰爾輩多俗態未除不能棄世正可得吾行氣𨗳引房中之事或可得服食草木數百嵗方耳其有九鼎大要唯付王長又言合有一人從東方來當得之此人必以正月七日日中到具説長短形狀至時果有趙昇從東方來生年未相見其形貌一如陵所説陵乃七度試昇皆過乃授昇丹經七試者第一試昇到門不為通使人罵辱四十餘日露宿不去乃内之第二試使昇於草中守黍驅獸暮遣美女非常託言遠行過寄宿與昇接牀明日又稱脚痛不去遂留數日亦復調戲昇昇終不失正第三試昇行道忽見遺金三十餅昇乃走過不取第四令昇入山採薪三虎交前咬昇衣服唯不傷身昇不恐顔色不變謂虎曰我道士耳少年不為非故遠千里來事神師求長生之道汝何以爾也豈非山鬼使汝來試我乎須臾虎乃起去第五試昇於市買十餘匹絹付直訖而絹主誣之云未得昇即捨去别脱已衣買絹而歸殊無恡色第六試昇守視田糓有一人來叩頭乞食衣裳破弊面目塵垢身體瘡膿臭穢可憎昇愴然為之動容解衣衣之以私糧設食又以私米遺之第七試陵將諸弟子登雲臺絶巖之上下有一桃樹如人臂傍生石壁下臨不測之淵桃有大實陵謂諸弟子曰有人能得此桃實當告以道要於時伏而窺之者二百餘人股戰流汗無敢久臨視之者莫不却退而還謝不能得昇一視乃曰神之所護何險之有聖師在此終不使吾死於石中耳師省敎者必是此桃有可得之理乃從上自擲正得投樹上足不蹉跌取桃實滿懷而石壁險峻無所攀縁不能得還乃以桃一一擲上正得二百二顆陵得而分賜諸弟子各一自食一留一以待昇陵乃以手引昇衆視之見陵臂加長二三丈昇忽然已來還乃以向所留桃與之昇食桃畢陵乃臨谷上戲笑而言曰趙昇自正心身投樹上足不蹉跌吾今欲自試投下當應大得桃也衆人皆諫唯昇與王長嘿然陵遂投空不落桃上失陵所在四方皆仰上則連天下則無底往來道路莫不驚歎悲涕唯昇長二人良久乃相謂曰師則父也自投於不測之崖吾何以自安乃俱投身而下正墮陵前而陵坐局脚牀斗帳中見昇長二人笑曰固知汝來乃授二人道畢三日乃還歸治舊舎諸弟子驚悲不息後陵與昇長三人皆白日冲天而去衆弟子仰視之久而乃没於雲霄也雲臺治中内錄曰太上老君傳授雲臺正治官圖治山竈鼎等得四十一代相承具人名代數於後第一代老君老君火山大丹治法傳授三百人惟王方平尹喜徐甲系代第二代王方平授三十人茅濛孫盈章震系代第三代章震授十七人若士李夫人名仙系代第四代若士士授五十二人李元君及白石先生李常在系代第五代李元君授七十二人王子喬許述成系代第六代諸仙别傳分散世絶系治官氣并治名老君於是再下平葢山授張陵為雲臺治付以火芝火仙之經方術變化長生不死之藥登昇雲天之道勑為第六代道外孫而東海小童君為陵保舉師太上老君為度師度雲臺治封陵為天師天師授三百人唯張申趙昇李忠系代第七代張申授三十三人唯李仲春李意期李𤣥系代第八代李仲春授十五人李少君魏伯陽系代第九代李少君授九十人欒巴李常存系代第十代欒巴授五人隂長生李宙先系代第十一代隂長生授八人張景霄王萬縉系代第十二代張景霄授五人唯劉馮系代第十三代劉馮授五人唯劉政系代第十四代劉政授五人孫博嚴光系代第十五代孫博授三人無可代者乃入林屋山中合龍虎大丹而昇天治法又絶於是太上老君命李仲甫出神仙之都以法授江南左慈元放令繼為十六代師第十六代左元放授八十人介象嚴光女季佗系代第十七代介象授四十人李延張授萬葛卿阮玉李用系代第十八代李延介談延談授十八人唯劉景系代第十九代劉景授四人東海郭延系代第二十代郭延授三十人唯靈壽光系代第二十一代靈壽光光本外國人授十八人唯何述系代第二十二代何述授十人羅先期系代第二十三代羅先期授二十人甘季仁甘孝先系代第二十四代甘孝先授五十一人唯石帆公系代第二十五代石帆公授十九人宫户系代一云宫中用戸字也第二十六代宫戸授八十人無可傳者乃入南嶽及天台山經八十五年世絶老君於是再降廬山勑左元放授施存葛𤣥第二十七代施存授七十人但皆地仙唯同學葛𤣥繼代第二十八代葛𤣥授十九人張秦仇真李用系代别出第二十九代老君命紫衣使者下於廬山授五人尹思尹軌系代傳治思授七十人唯女子樊忠和韋義山系代第三十代尹軌授十九人唯女仙李元一系代第三十一代女仙樊忠和授二人唯劉綱東陵母系代第三十二代女仙李元一授四十人無一可傳治法又絶第三十三代劉綱綱樊夫人弟子雖居官治又其夫也治法又絶第三十四代張秦秦葛𤣥弟子也𤣥見代絶乃令秦授十一人唯王列系代第三十五代王列授九人許遜胡少真系代第三十六代許遜授一百人無一可授系代又絶遜昇天後兩代人民征伐真志不傳第三十七代老君勅使三人於天台山令葛𤣥傳鄭思逺授十九人葛洪李淳風系代第三十八代李淳風授四十人有四人系代而未傳授者二人為李道興李靖後又隱於房公之山一百年後乃出授張常存李太虚李恵舉同太師神等四人第三十九代李恵舉張常存而各分代傳授皆稱三十九代孫恵舉授三十人唯三人可代李保真白𤣥中李太昌張常存授三十七人唯三人願系代孫張真應真孫道用第四十代李保真授二十四治共百人唯林通元李徳仁系代第四十一代林通元凡此以雲臺嗣法得並載梁州記曰聟水北聟鄉山有仙人唐公房祠有一碑廟北有大坑碑云是其舊宅處公房舉宅登仙故為坑焉馮真人漢車騎將軍馮緄子也修煉於岳門山一日辭父母謂當仙去㠯來晨鶴飛為候父登山望之果然宋直講黎錞詩少小厭塵土奮身避庭闈卜居托孤頂風雨在茅􅗔朝元夜無寐絶粒朝不飢功成帝宣至召起登太微按廣安志為五代將軍馮勝之子未知孰是靈驗記益州唐隆縣大通觀晉義熙元年乙巳置周末摧殘僅存基址武德中邑人吕細因過其地遇一道士乗青驢自天而下於觀基之内盤廻指畫良久昇天吕細與范仲良同受其教即日共出金帛特造觀宇有紫微閣髙八十餘尺尤為宏壯太尉南康王韋臯再加修餙其側有市城觀在縣西南八里有石像天尊一十三身髙一丈三尺每至齋月吉晨鐘或自鳴夜有神燈晝有仙人來往逺近共知焉抢朴子曰岷山道士張葢蹹及偶豪成二人精思於蜀雲臺山石室中忽有四人黄絹单衣葛巾往揖其前曰勞乎道士辛苦幽隱於是二人顧視鏡中乃鹿也范豺者巴西閬中人也久住枝江百里洲修太平無為之道臨日嘘漱頂有五色光起冬夏惟單布衣當桓温時頭已斑白至宋元嘉中狀貌不變其占吉凶雖萬里外事皆如指掌或問先生是謫仙邪云東方朔乃黠賊我小兒時數與之狡獪又云我見周武王伐紂洛城頭戰前歌後舞宋文帝召見豺答詔稱我或稱吾元兇初為太子豺從東宫過指宫門曰此中有博勞鳥奈何不知文帝惡之勑豺自盡江夏王使埋於新亭赤岸岡文帝令發其棺無屍乃悔越明年豺弟子陳忠夜起忽光明如晝見豺入門就榻坐又一老翁後至豺起迎之忠問是誰豺笑而不答須㬰俱出門豺問忠比復還東鄉善護我言訖不見按洞仙傳云范豺字子恭巴西閬中人宋元嘉中聚名香數十斛細擣煮以作湯朝用湯自浴正中湯盡不復聞聲侍者入看見豺還著故時布衣披㡌坐而無復氣江夏王令殯殮而不下棺葢四日尸不臭送還葬於新亭豺亡時年四十九膚貌顔色猶如初劉凝之為豺作傳書置道書部不傳於世隋程太虚西充人自㓜好道精修勤苦隱居南岷山絶粒有二虎侍左右九井十三峰皆其修煉處也一夕大風雨砌下得碧玉印每乞符祈年印以授之輒獲豐稔唐元和中解體後遷神於𤣥宫容貌不變宣宗命人求之過商山宿逆旅躡險有居第如公館青童引見一道士自稱程太虚祖居西充且囑曰明嵗君自蜀過南岷無忘我及至蜀熟視畫像與前見者無異宋賜號道太師王法進者劒州臨津縣人也孩孺之時自然好道家近古觀雖無道士居然其嬉戲未嘗輕侮於尊像見必歛手致敬若凜懼焉十餘嵗有女官自劒州厯外邑過其家父母託保護之與授正一延生籙名曰法進而専勤香火護持齋戒茹栢絶粒時有感降是嵗三川饑歉斛㪷翔貴死者十五六多採山芋野葛充饑忽有二青童降於其庭宣上帝命曰以汝宿稟仙骨歸心精誠不忘於道今以青童召汝受事於玉京也法進即隨青童騰身凌虚徑達大帝之所命以玉盃霞漿賜之飲訖帝謂曰人稟五行之大體天地之和氣得為人形復生中土甚不易也而天運四時之氣地稟五行之秀生五糓百果以養於人而人不知天地養育之恩輕棄五糓厭捨絲麻使耕農之夫紡織之婦身勤而不得飽力竭而不免寒徒施其勞曽不愛惜斯固神明所責天地不祐也近者地司嶽瀆日有奏言人厭賤米麥不貴衣食之本我已勅太華之府收五糓之神令所種不成下民饑餓因亦責罰以懲其心世愚悠悠曽未覺悟旋奉太上所勅以大道好生不可因彼惡民以害衆善雖天地神明罪之愚民亦不知過之所起永無懴請首原之路虛受其苦耳汝當為無上侍童入侍天府今且令汝下世告諭下民使其悔罪寳愛桑蠶貴敬農事惜五糓百果知大造之養人厚地之育物宗奉正道崇事神明至於水火之用不可厭棄衣食之養儉已約身皆能行此明戒天地愛之神明護之風雨順調家國安泰此乃増益汝之隂功也即命侍女披琅笈珠韞出靈寳清齋告謝天地法一卷付之傳行於世曰世人可相率幽嵓髙静之處置齋悔謝一年之内春秋兩建春則祈於年豐秋則謝於道力如此則宿罪可除糓父蠶母之神為置豊􅄛也龍虎之年復當召汝矣命青童送還其家已三箇月所受之書即今靈寳清齋告謝天地之法其法簡易與靈寳自然齋大率相類人間行之立成徴効茍或几席器物小有輕慢濁汚者營奉之人少有不公心者即飄風驟雨壞其壇筵迅霆吼雷毁其器用自是三川梁漢嵗皆崇事雖愚朴之士狂暴之夫罔不戰栗兢戒肅恭擎跽知奉其法焉或􅑺蝗旱潦害稼傷農之處衆誠有率勉於脩奉炷香告𤣥旦夕響應必臻其祐巴南謂之清齋蜀土謂之天功齋葢一揆矣法進以天寳十一年壬辰嵗雲鶴迎之而昇天此乃亦符龍虎之運云胡尊師名宗自稱曰孚郭切居梓州紫極宫嘗㳂江入峽道中遇神人授以昇仙之道辯博該贍文而多能齋醮之事未嘗不㝠心滌慮以祈感通梓之連帥賢相重徳幕下盡皆時英碩才如周相國李義山輩加敬致禮其志泊如也泊解化東蜀顯跡涪陵方知其蟬蛻得道延永爾梓益褒閬間自王法進受清齋之訣俗以農蠶所務每嵗祈糓必相率而脩焉至有白衣之夫緇服之侣往往冐科禁而藏事者固以為常矣有郡人劉崧慕師之道徳請於别地致齋師謂之曰夫嘯儔侣命儕友者猶須正席拂筵整籩洗爵恭敬以成禮嚴恪以致事尚懼其誚讓責其不勤況感降天真禱求福祐豈可􅈝然而賈罪乎俗之怠惰有自來矣子可訓朂於衆必精必䖍乃可為之崧承命誓衆潔已率先而撰香花備壇墠師然後往既昇壇展禮思神之際黒雲暴起旋飊入座拔其二柱飄其竹席投其鎗釡於千步之外而後卒事則融風熙熙祥氣亘野師詰所投之物其二柱嘗閣於豕圏之上竹席嘗蔽於産婦之室鎗釡嘗爨於縗絰之家師曰器物不潔神明惡之況爾心乎心茍有疵行茍有玷雖百牢陳於席九韶奏於庭適足以瀆神明延災禍爾人之修心必使言行相脗内外坦然明不媿於人幽不慙於鬼吾知其可爾反於是而欲神歆鬼饗不亦難哉唐王子蒙者養真於王望山手種樹大十圍者數株丹竈石床尚存遺跡按王望山在巴州之北岸自郡城絶江而登山髙二里許岩徑極險占一郡之勝相傳云王真人得道此山真人名蒙故名王蒙山舊志云唐𤣥宗控白騾至此山望見京闕曰此去京師不遠故名王望三洞珠囊曰謝自然女道士也果州人詞氣髙異其家在大方山下頂有古像老君其形自然因拜禮不願下山母從之乃遷居山頂自此常誦道徳經黄庭内篇於開元觀受紫虚寳經下金泉山居之山有石壇煙蘿修竹一十三年晝夜不寢兩膝上忽有印稍小於人門官印四壖若朱有古篆六字粲如白玉忽日金泉道塲有雲氣遮匝一川散漫彌久仙去其金泉碑畧曰天上有白玉壁上列真仙之名有人間壁亦仙名朱書注其字下曰降世為某官職又於所居堂東壁上書數字皆道徳之意真跡存焉按劉賔客嘉話録云果州謝真人上升前在金泉山道塲上帝錫以馬鞍使安其心也刺史李堅遺之玉念珠後問念珠在否云已在玉皇之前矣一日真人於紫極宫致齋金母下降郡郭處處有虹霓雲氣之狀至白晝輕舉萬目覩焉唐范傳正謝真人仙駕過舊山詩麾葢從仙府笙歌入舊山水流丹竈闕風起草堂闗白鹿行為衞青鸞舞自閒種松鱗未老移石蘚仍斑望路烟霄外迴輿嶺岫間豈惟遼海鶴空歎令威還夏方慶和云何年成道去綽約化童顔天上尋真侣人間憶舊山桑田今已變蘿蔓尚堪攀雲覆瑶壇净苔生丹灶閑逍遥看白石寂寞閉𤣥闗應是悲塵累思將羽駕還宋李宏過謝真人舊宅詩昔時謝女昇天處此日遺踪尚宛然蟬蛻舊衣留石室龍飛靈水湧金泉碑書故事封蒼蘚殿寫真容鎖翠烟薄暮松巔聽鶴唳猶疑彷彿下神仙傳竒云許栖巖下第長安欲市一馬有道士能易請筮之遇乾曰飛龍在天利見大人曰此馬龍種也栖巖入蜀至劒閣馬驚墜萬丈嵓底行出洞口見碧樹萬餘林二玉女曰爾何人遽至太乙元君之室元君召曰爾在人間何好曰好道多讀老莊黄庭經元君曰三書各得何句栖巖曰莊子云真人息之以踵老子云其精甚真黄庭云思一部夀無窮元君曰子近道矣命飲石髓曰嵇康不能得爾得之數也俄有道士來元君曰請筭三事擘太華何神也立海橋何鬼也道士布筭良久曰擘太華雖云巨靈實夸父之神也立海橋雖云醜恠乃五丁之鬼也元君曰筭吾今夕何為曰今夕東逰三萬里栖巖視道士乃昔日卜馬者謂栖巖乾卦今日中矣逡巡有仙童曰東皇君請今宵曲龍山橋翫月元君謂栖巖曰可同逰共跨鹿龍而去頃刻即至見危橋若長虹亘天勢連河漢深入滄溟東皇命酌醴鸞歌鳳舞響徹天外日輪潜湧命駕俱返元君曰爾飲石髓已得千嵗命牽栖巖馬來曰本吾洞之龍子因作怒傷稼責為負荷與君縁合耳若到人間解之渭濵玉女曰龍子回日虢縣田婆針寄少許來跨馬食頃逹虢縣舊莊詢田婆曰太乙家紫霄娣妹常寄信買針遂取針繫馬鬛放之渭濵化龍而去張英初拜儀隴縣尹過采石江遇一取水女子姿貌絶世謂英曰五百年夙約與君當㑹於大儀山英叱之至任㡬半載日夕聞機聲一日率部衆逐機聲而往行數里至大儀山上一石洞門鑰宛然門忽開前女出迎相携而入洞門即閉從吏哀號忽圓石一雙自門隙出衆取石歸近縣五里不能舉邑人建祠塑像置此石像腹至今祈禱輒應廟曰永濟王隱居棲妙山記云田真人諱大神自南陽來隱棲妙山觀中山峻林叢多蛇虺田有神術驅絶之修煉久一日值江漲溢岸乃逰水上若履坦途唐廣徳間登㑹仙橋上昇先是常與一道流奕撒碁於江人拾之甚竒異獻蜀主旋復不見後又得於玉局洞前石盤内自是江中産碁石至宋封為妙濟真人南江志云黄蓬石乃大蓬之仙者性顓蒙惟充薪水役偶汲於河見金瓶貯水乃飲水而置瓶是夕勞困卧藩籬間仙師應長官呼而授之丹曰賴子不取金瓶也因兹忽頴悟能詩與蓬之名士何正輔逰􅆳和至百餘篇句力愈徤何終不能出其右居頃之隱於大蓬不見見銅人觀碑刻夷堅志王杞字昌遇梓州人為獄吏日暮懷金與妻妻欲試之值遣婢餽食有失犯訊婢引伏而逐之將出門妻言曰君為推司日持錢歸我固疑為煆煉成獄姑以婢試耳安有是哉杞大悟取筆題壁曰枷拷推求只為金轉遭寃債㡬何深從今不願為刀筆放下歸來逰翠林乃棄吏居長平後遇異人授以仙訣詩百篇深契易理大中十三年九日舉家仙去郡人即其處祠祀之雨暘疾疫隨禱輒應大觀二年賜號保和真人按成都府東度人觀一名大道重陽觀云唐保和真人修煉處名山志云張守虚嘗賣藥梓州號落魄仙曽過縣之延禧山訪友爾朱氏後以九日飛昇現身於東方青雲之際人指其處為落魄山續仙傳大中十二年東川奏劒州梓潼縣道士馬自然白日上昇時於東川謂人曰我鹽官人也新羽化於浙西今又為玉皇所詔於此上昇以其事奏之遂勅浙西道杭州覆之發塜視棺乃一竹杖而已張笑桃者南江人相傳古清州知州王鶚子讀書於義陽山忽一女子至前自稱名曰張笑桃言罷題紅梅詩於壁上墨跡未乾遂不見詩云南枝向煖北枝寒一種春風有兩般頻上髙樓莫吹笛大家留取倚欄看野人閒話云利州南門外乃商賈交易之所一旦有道士羽衣襤縷來於稠人中賣葫蘆子種云一二年間甚有用處每一苗只生一顆盤地而成兼以白土畫様於地以示人其模甚大逾時竟無買者皆云狂人言不足聽道士又以兩手掩耳急走言風水之聲何太甚耶巷陌孩童競相隨而笑侮之時呼為掩耳道士至來年秋嘉陵江水一夕泛漲漂數百家水方𣺌瀰衆人遥見道士在水上坐一大瓢出手掩耳大呌水聲風聲何太甚耶泛泛而去莫知所之錄異記云蜀永平四年甲戍利州刺史王承賞奏深渡西入山二十里道長山楊謨洞在峭壁之中上下懸險人所不到洞中元有神仙或三人或五人服餙黄紫往往出見是時所見人數稍多詔道門威儀凝真太師黙鑒先生任可言内大徳施昭訓齎青詞御香與内使楊知淑同往醮謝又復出見如初詔改景谷縣為金仙縣道長山為𤣥都山楊謨洞為紫霞洞仍封𤣥都山主者為玉清公置紫霞觀以旌其事按文同利州綿谷縣羊摸谷仙洞記熙寧庚戍春余還朝過利州通判冦諲恭甫為余言近季按朝天驛人云去此七八里巖谷中有神仙常出見洞口因往觀之自龍洞閣具舟西下過小峽有山嶢然崛起萬仞翠壁如削中闢大門可五六丈時正晴日光下照有二童子先出㳄有一人白衣皂巾曳杖垂長髯襟帶隨風翩然往來下視久之左右數青衣從行有物若雞犬若虎若鹿者先後之又有執扇與繖者隱隱若繪畫甚可愛人之長者裁尺餘舉止詳緩如人行二十里許乃不見問其下居民云相傳五代時土人有王姓者種山下盡室歛穫於此因遣婦去求水婦汲還路有病僧創穢甚滿身腥腐不可近輒前索飲婦惡之且懼未始見弛擔走僧遽就器飲殆半遂去婦不能易之隱其事置水田上其家人無少長咸來飲盡之婦以故獨不霑口晩又俾婦致饟既至其所得飲僧餘水者盡飛入此洞婦既不見但號哭奔走嘂謼跳盪如狂人忽聞在洞中呼婦者婦仰應不得去懊恨至死自後蕘童牧叟常慣見不以為異近年每至天色開霽則出出必盡日就中山間花木盛發時出尤屢冦乃取畫圖示予余曰嚮嘗讀封禪記見祥符中利州路轉運使李允元表綿谷縣羊摸谷内山洞中有神仙見自言嘗往見凡三數人或立或行衣裾皆有異光至日暮方没葢此地爾因求其圖之别本以歸壬子秋余移守興元有新府從事賈君瑄自南榮訪余於陵陽見圖屏上乃言其向官洋州時常與太常博士陸丕考較進士於寧武亦聞之歸日與丕詣洞下同立良久其見果不妄指圖之澗􅊤巒嶺谿谷磴道曲折出沒一一盡如此俞侯之彦在座遂卷圖去命工摹之且俾余㳄其事列之圖上余為記此九月二十三日記普州圖經陳摶字圖南崇龕人方四嵗戲渦水側有青嫗抱懷中乳之聰悟日益既長辭父母去學道或居亳為亳人或居洛為洛人或居華山為華山人太宗令見真宗於夀邸及門而返曰王門厮役皆將相材也何必見王乃賜號希夷先生按安岳治西有破石井中分出水世傳希夷先生所鑿治北方池有手植蓮多喜山有丹爐石枕皆其遺跡宋羅晏閬中人兒時牧山下見二道人奕晏舍牧觀之道人出囊中物與食晏食已歸家覺腹中如燎因發狂累日自是惟飲水數日不一食稍稍預言禍福無不驗宋宣和中賜静應處士張浚延至軍中晏曰相公勿恐明日敵退果然加號太和冲夷先生蜀人相傳夀至一百八十云夷堅志云虞雍公自渠州守召至行在憇北郭外接待院因道中冐暑得疾瀉痢連月重九日夢至一處類神仙居一人被服如仙官延坐視壁間有韻語藥方讀之其詞曰暑毒在脾濕氣連脚不泄則痢不痢則瘧獨煉雄黄蒸餅和藥甘草作湯服之安樂别法治之醫家大錯如方服之遂愈張世南曰予在蜀中遍訪林下人求獨煉法鮮有能者忽一日得青城山道友傳授云丹經謂捉得龍伏得雄言雄黄見火則飛走為烟熖最難伏也其法用雄黄不拘多少研細乾鍋火内煅令通紅取出攛雌黄末熖硝末急用桃枝攪轉即成水矣急傾出瓦堞微側堞子則清者一邊俟凝取出去麤者研細以宿蒸餅為丸如菉豆大每服三丸至七丸如前法服雄黄末一兩大約用熖硝一錢此乃竈家秘法得之甚艱古人云施藥不如施方故詳紀之無著道君姓趙氏諱法應梓州飛烏人也宋寧宗慶元乙卯上已日生於縣之趙村埡其夕光燄燭天村中林木皆作金玉色有香雲芬馥天花布空之異七嵗讀經書以一覽輒盡弱冠出家於縣之雲臺山時則嘉泰丙寅之年矣攷志飛烏元時始併入中江縣山無雲臺名惟云中江南百七十里有飛烏山甚峻或即其地也道君既入山誅茆修煉逺近來學者日衆乃營一殿崇事𤣥帝土木已畢琢石粗具一夜椎鑿聲徹於空谷遲明視之瑶階忽成自天界地界至水陽界咸整齊焉已於本村設爐笵𤣥聖像髙丈二尺按劒長七尺二寸以應七十二候嵗癸酉告成筮迎𨗳之期曰重陽子時吉先一日道君躬行巡視位置畢謂門人曰觀名佑聖殿名普應可也㳄日辰時雲日開朗中隱隱有靈旗揺映香風襲人大衆歡閧之間道君忽然端坐而化偈云拓落一貧道謫凡十有九紀其歸去時在處重陽酒門人龕其蛻於殿西偏五百餘年乃遭火刼神光未泯締構加崇焉蜀中廣記卷七十六
