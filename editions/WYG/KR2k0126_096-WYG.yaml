body:
  text: 蜀中廣記卷九十六明曺學佺撰著作記第六地理志部山海經十八卷呉越春秋曰禹南巡登南岳得金簡玉字通水之理遂行四瀆所至使益疏而記之名山海經地理指掌圖一卷陳氏曰蜀人税安禮撰元符中欲上之朝未及而卒書肆所刋皆不著名書亦頗闕不備此蜀本有涪右任慥序言之頗詳輿地圖十六卷陳氏曰金華王象之撰輿地紀勝逐州為圖逐路為卷其捜求亦勤至四蜀諸郡尤詳其兄觀之漕䕫門時所得也眉山李説齋季允為之序蜀紀隋經籍志云漢揚雄撰載蠶叢以前洪荒之事下迄西漢有本紀有傳常璩李膺多引用之蜀都賦亦雄撰北齋司馬膺之註今無全篇僅存者萟文類聚所載一段耳蜀記後漢廣漢李尤伯仁撰太平御覽引之鄉俗記後漢漢中趙寗撰華陽國志蜀守陳留髙眹續文翁之後雅播文教太尉趙公瑶初為九卿適子寗還蜀眹命為文學撰鄉俗記三巴記巴中異物志並蜀漢譙周撰水經注寰宇記多引用之本蜀論蜀漢光禄大夫來敏撰酈道元注水經引之陳術益部耆舊傳蜀志術字申伯漢中人博學多聞位歴三郡太守又著釋問七篇臨卭鄭厪伯邑亦作耆舊傳陳夀益部耆舊傳十篇王獻之與人書益部耆舊傳今送想催驅寫取了慎不可過淹留常寛續耆舊作梁益篇又作後賢傳華陽國志十二卷晋常璩撰自序曰巴蜀厥初開國載在書籍或因文緯或見史記久逺隠没實多疎畧及周之世侯伯擅威雖與牧野之師希同盟要之㑹而秦資其富用兼天下漢祖階之奄有四海梁益及晋分益為寜司馬相如莊君平揚子雲陽成子𤣥鄭伯邑尹彭城譙常侍任給事等各集傳記以作本紀略舉其隅其次聖稱賢仁人志士言為世範行為表則者名挂史録而陳君承祚别為耆舊始漢及魏焕乎可觀然三州土地不復悉載地理志頗言山水歴代傳久郡縣分建地名改易於以居然辨物知方猶未詳備于時漢晋方隆官司星列提封圖簿嵗集司空故人君學士䕃髙堂翳帷幙足綜物土不必待本紀矣曩遭厄運函夏滔堙李氏據蜀兵連戰結三州傾墜生民殱盡府庭化為狐狸之窟城郭蔚為熊羆之宿宅遊雉鹿田棲虎豹平原鮮麥黍之苖千里蔑雞狗之響邱城蕪邑莫有名者嗟乎三州近為荒裔桑梓之域曠為長野反側惟之心若焚灼懼益遐棄城陴靡聞迺考諸舊紀先宿所傳并南裔志騐以漢書取其近是及自所聞以著斯篇又采公孫述蜀書及咸熙以來䘮亂之事約取耆舊士女英彦肇自開闢終乎永和三年凡十篇號曰華陽國志夫書契有五善達道義章法戒通古今表功勲而後旌賢能恨璩才短少無逺及不早援翰執素廣訪博咨流離困瘵方資腐帛於顛墻之下求餘光於灰塵之中劘滅者多故有所闕猶愈於遺忘焉蜀紀言三皇乘祗車出谷口秦宓曰今之斜谷也及武王伐紂蜀亦從行史記周貞王之十六年秦厲公城南鄭此谷道之通久矣而説者以為蜀王因石牛始通不然也本紀既以炳明而世俗間横有為蜀傳者言蜀王蠶叢之間周迴三千嵗又云荆人鼈靈死屍化西土後為蜀帝周萇宏之血變成碧珠杜宇之魄化為子鵑又言蜀椎髻左衽未知書文翁始知書學按蜀紀帝居房心決事參伐則蜀分野言蜀在帝議政之方帝不議政則王氣流於西故周失紀綱而蜀先王七國皆王蜀又稱帝此則蠶叢自王杜宇自帝皆周之叔世安得三千嵗且太素資始有生必死死終物也自古以來未聞死者能更生當世或遇有之則為怪異子所不言况能為帝王乎碧珠出不一處地之相距動數千里一人之血豈能致此鵑鳥今云是嶲或曰嶲周四海有之何必在蜀昔唐帝萬國時雍虞舜光宅八表大禹功濟九州后稷封殖天下井田之制庠序之教由來逺矣孔子曰述而不作信而好古竊比於我老彭則彭祖本生蜀為殷太史夫人為國史作為聖則仙自上世見稱在昔及周之末服事于秦首為郡縣雖濵戎夷亦有冠冕故蜀紀曰大人之鄉方大之國也至于漢興反當荒服而無書學乎漢書郡國之有文學因文翁始若然翁以前齊魯當無文學哉漢末時漢中祝元靈性滑稽用州牧劉焉談調之末與蜀士燕胥聊著翰墨當時以為極歡後人有以為惑恐此之類必起于元靈之由也惟智者辨其不然幸也綜其理數或以為西土嶮固襟帶易守世亂先違道治後服若呉楚然故逋迯必萃奸雄闚覦盖帝王者統天理物必居土中徳膺命運非可資能恃險以干常亂紀雖饕竊名號終於絶宗殄祀何者天命不可以詐詭而邀神器不可以僥倖而取也是以四岳三塗陽城太室九州之險而不一姓冀之北土馬之所産古無興國夫恃險憑危不階歴數而能傳國垂世所未有也故公孫劉氏以敗於前而諸李踵之覆亡於後天人之際存亡之術可以為永鍳也干運犯歴破家喪國可以為京觀也今齊之國志貫之一揆同見不臣所以防狂狡杜奸萌以崇春秋敗絶之道也而顯賢能著治亂亦以為奬勸也晋孫盛蜀世譜裴松之註三國志引之巴蜀志晋袁休明撰其畧云髙山嵯峨巖石磊落傾側縈迴下臨峭壑行者攀縁牽援帶索全書不傳此數語見酈道元水經注亦碎金殘璧也傅𤣥蜀都賦𤣥字休奕北地泥陽人博學善属文舉秀才晋武受禪以𤣥為諫官遷侍中司隷校尉卒追封清泉侯所著蜀都賦初學記多採之左思蜀都賦思字太冲作三都賦載筆自隨十年乃就蜀其一也其事物多得之張載載父収為蜀郡太守隨之任所作有劍閣銘及成都白莵樓詩補闕蜀都賦王逸少與周益州書云省疏具悉彼土山川之竒故知揚雄左太冲蜀都賦為不備宋蒼溪嚴大猷因之作補闕蜀都賦辨蜀都賦宋王騰著序略云予讀左思蜀都賦見其薄蜀陋呉謟魏以諛晋之君臣茍售一時之聲價而滅天下之忠義甚矣原思之詞似欲尊正統而黜偏方然不顧正氣之淪溺乃知蜀之被枉其所由來者豈朝夕哉故作辨蜀都賦以申蜀人之憤氣其商略土風採摭人物不該治亂興衰之變邪正是非之理者不在鋪列之限益州記二卷梁太僕卿涪城李膺公輔撰時為本州别駕樂史寰宇記常引用之按公輔一作公𦙍先是譙周任豫劉欣期各有益州記散見類書段氏逰蜀記錦里新聞三卷俱唐段成式著見寰宇記及宋史經籍志唐鄭暐蜀記二卷陳振孫曰雜記蜀事人物古跡寺觀之属人代未詳按蜀志補罅以暐為成都人復著有天寳西幸略云元澄蜀記一卷出宋史新編未詳人代唐盧求成都記五卷序曰蜀國自秦始通秦遺蜀王五羙女蜀亦遣五丁迎之到梓潼見一大蛇入山穴中一人掣其尾不能得五人相助大呼拽之山崩五丁及秦女皆死恵王遂遣張儀司馬錯従石牛道滅蜀因封公子通為蜀侯以陳莊為相置巴蜀郡遷秦人萬家實之民始能秦言以蜀令張若為太守前時蜀王開明尚納羙女為妃盖五都山之精也及死𦵏于城西北遣五丁擔其本山之土以為塚今有二石尚存古老言五丁擔土擔也陳莊既為秦公子相數年遂謀反殺秦公子秦伐蜀誅莊封子惲為蜀侯惲後母誣惲有罪賜劍自殺蜀人以其寃因為立祠又封子綰為蜀侯後復疑綰反誅死自此但置守而已後以李冰為蜀守冰始鑿三江引水以行舟楫岷山多梓栢大竹坐致材木又溉水稻田於是沃野千里號為陸海復置綿洛二水用便溉灌作石犀五以厭毒蛟命曰犀牛後更為耕牛二又作三石人立水中冰非常人也與江神約曰水竭不致足盛不没肩大鑿巖崖通沫水導江之龍大怒冰乃持刀入水與龍闘龍死遂無水害迄今䝉利蜀人稱郫繁為膏腴綿洛為浸沃云昭襄王時又有白虎為患意廩君之魂也歴四郡傷千二百人王乃募能殺之者邑萬家金帛稱是巴夷朐忍廖中藥何謝作白的弩於髙樓瞰而射之死王嫌其夷人乃刻石復頃田不租十妻不數傷人不論殺人不死與之盟曰秦人犯夷輸黄龍一䨇夷人犯秦償清酒一鍾其人安之遂號白虎夷其族又有濮賨賨尤武勇居渝水夾水以居為漢髙祖前鋒䧟陣善舞巴與蜀代為仇讎蜀嘗封弟葭萌於漢中號苴侯命其邑曰葭萌至漢髙六年始分置廣漢郡髙后城僰道開青衣文帝末以廬江文翁為郡守穿湔油口溉田千七百頃立文學選吏子弟皆就學令俊乂之士張叔等十八人東詣博士受七經還以教授於是岷絡之地學比齊魯孝景帝嘉歎遣天下郡國皆立文學自文翁始也文翁明天文灾異後以博士徵至侍中揚州刺史孝武帝置四部都尉俾立十八郭於是郡縣多城觀矣又分牂柯置益州是為南益州宣帝地節三年穿臨卭蒲塩井二十置塩鐵官自漢興至哀平牧守仁賢宣徳立教英偉命代之士其出如林璽書束帛交馳於梁益之地矣雖魯之洙泗齊之稷下未足多也且漢徵八士蜀預其四髙帝分蜀郡北鄙置廣漢武帝分南鄙為犍為遂有三蜀之號王莽改郡守為帥正以蜀郡為導江公孫述為帥正治臨卭述僭號後漢光武帝滅述還為蜀郡順帝即位復為益州郡名依舊州治大城郡治少城靈帝末以劉焉為牧及卒子璋偽嗣建安十九年璋迎漢左將軍劉備至遂滅璋稱帝繼漢號稱先主治成都魏末司馬昭平蜀復為益州晋受魏禪以州領郡武帝末以成都為國封子頴為其王後賨人李雄僭稱王晋穆帝永和初遣桓温滅之復為蜀郡譙縦反安帝命朱齡石討平之至梁分益州更置南北二益州以武陵王紀為刺史紀僭帝號領兵東下為湘東王所殺後魏廢帝前二年尉遲逈定益州置總管後逈舉義旗不受代為隋主堅所戮按史逈無舉義旗事恐是隋文帝若據益州不受代則王謙也隋開皇元年廢總管置行臺以蜀王秀為西南道行臺尚書令三年復為總管大業元年廢總管為州又改州為郡聖唐武徳元年復為總管三年置行臺改為益州以太尉秦王為益州道行臺總管又改為大都督府天后析益州置彭蜀漢三州開元二年始以齊景胄為劔南節度營田兼姚嶲等州處置兵馬使自此始有節度使也八年以李濬為使去兵馬以章仇兼瓊兼山南西道採訪使其後或兼或否亦無定制上元二年始分東西川廣徳二年復合為一大歴二年又分兩川至今不改天寳三載復為大都督府十四載𤣥宗皇帝巡幸車駕留五月至徳二年改為成都府置尹比東西二京號南京後復停大凡今之推名鎮為天下第一者曰揚益以揚益為首盖聲勢也人物繁盛悉皆土著江山之秀羅錦之麗管絃歌舞之多伎巧百工之富其人勇且譲其地腴以善熟較其要妙揚不足以侔其半况赤府畿縣與秦洛並故非上將賢相殊勲重徳望實為人所歸服者則不得居此况控帶蠻落阨戎限羗非文武寛猛包羅法度之君子則不能得中庸以是聖庭慎擇尤難其任凡使號有三節度觀察安撫先時南蠻六部不相臣服天子有恩賞各頒一詔呼六詔開元末節度使王昱受賄上奏合六為一乃封大酋帥越國公䝉歸義為雲南王始獨稱南詔至楊國忠遥領蜀郡太守兼採訪使遂擾邉閫希立功伐乃有瀘南不利之變貞元中韋令公臯為節帥招復雲南背蕃歸漢十一月八日置使安撫兼統押西山八國近界羌蠻等使是為三使韋令公本以竒勲秉旄鉞思立邊効又在鎮且嵗久南詔為其用拓地甚逺公既卒劉闢繼公後以兵守險為不順誅死家籍没後京兆杜公為節帥酷易軍政殊不以封域為念戍卒罔代邊蠻積忿至太和三年十二月䝉巔遂以兵剽掠至城下杜公填門不敢與爭㑹監軍使矯詔宣諭蠻人遂退工巧散失良民殱殄其耗半矣列政補完尚不克稱大中六年四月詔以丞相太原公有駈制羌戎之成績由邠寜節度司徒同平章事鎮蜀蜀為奥壤領州十四縣十一户百萬兵士五萬外壃接兩蕃人性勁勇易化以道難誣以智公至以儉約帥之以謹亷不伐臨之以刑賞法制平治之人歡且舞旦夕詠公之徳矣先是西蜀圖經甚備朝野之士多寄聲寫録主茲務者不勝其煩遂盡削而潛焚之長吏至即據顯者集為一軸以獻繇是百不書一大中八年户曺參軍藺𢎞宗甚好學且目覩司徒相國之異績願付以傳示于後然不以文自任剪截疎長蕪言不畧相國乃屬于小子令刋益之且曰不以淹徐疾速歸於流布以為不朽之事求受命震怖又不欲以圖經為目乃捜訪編簡目為成都記五卷經與圖附益之願終𢎞宗之職庶以此為助也大中九年八月五日叙續成都記一卷五代杜光庭著見宋史經籍志錦里耆舊傳五代進士張􅒷著見人物志續錦里耆舊傳陳振孫曰前應靈縣令平陽句延慶昌裔撰開寳二年秘書丞劉蔚知榮州得此傳其詞蕪穢請延慶修之改曰成都理亂記天成後别加編次起咸通九載迄乾徳乙丑平蜀之後朝廷命令官僚姓名及政事因革以至李順王均劉旰作亂之迹皆略載之知新繁縣太常博士張約序按延慶成都人蜀程記一卷五代韋莊著見宋史華陽記偽蜀廣政中荷澤院僧仁顯撰古今集記取之蜀江志十卷劔南風物録二十八種並宋東陽沈立撰慶歴間知洪雅縣事離􅕞志十卷見新編不知作者梁益志十卷晁公武曰任弁撰天禧申弁㳺宦于成都以蜀記數家言皆無據乃引書傳刋正其謬自為序蜀古今傳陵州志云宋續耆來守是州暇日作蜀古今傳趙清獻公成都古今集記實摭用之成都古今集記三十卷晁氏曰趙抃編抃自慶歴至熙寜凡四入蜀知蜀事為詳摭其故實以類相従分百餘門時熙寜七年也自序曰僕繇慶歴至今四入蜀凡蜀中利害情偽風俗好惡瞭然見之不疑嘗謂前世之士編摭記述不失於疎略則失於漫漶不失於鄙近則失於舛雜嚮治平末因取續耆舊傳而脩正之去年陳和叔翰林以書見貽俾僕著古今集别為一書此固僕之夙心而未有以自發也繇此參訪舊老周咨碩生緝以事類成三十卷不始乎蠶叢而始乎牧誓之庸蜀従經也従經則蠶叢不必書而書之于後何也揚雄紀之吾棄之不可也參取之而已矣事或至於數説何也久論之難詳也昔者齊太公仕於周司馬遷有三説焉疑以傳疑可也神怪死生之事不可以為教書之何也吾將以待天下之窮理者也書亂臣所以戒小人書寇盗所以警出没書蠻夷所以盡制禦之本末終之以伐蜀使萬世之下知蜀之終不可以茍竊也其間一事一物皆酌考衆書釐正譌謬然後落筆如關侯墓今荷聖寺闖然有榜而僧仁顯作華陽記云墓在草塲廟在荷聖此目撃之所當棄而従之者也若夫知之有未至編之有未及則亦一人之功不可以求備然竊意十得八九矣後之君子其亦有照於斯乎范百禄序曰成都蜀之都㑹厥土沃腴厥民阜繁百物浩麗見謂天府縑縷之賦數路取贍勢嚴望偉卓越佗郡朝廷席五聖之厚基萬齡之㤗明燭外遐愛均畿輔凡選建師長必一時名徳中外皆曰可然後以尹兹土其優馭西南之意槩古邈矣非獨隆於今也蜀之所以為重於天下雖窮隅鴂舌共知之而其可以文載而久者則往志蹐錯近事缺絶殆不足以彰其重熙寜壬子八月詔以參知政事趙公為資正殿大學士再蒞此府蜀之黔黎夙云易擾小異故常必厪上心是時天子方惻然矜之故不憚委公以逺公倍道而來下車之初釐所當恤亟即民心平紛觧累人乃説懌盡知明天子覆育逺方之意甚厚公亦自謂宜於蜀也㑹翰林學士陳公和叔寓之書曰蜀事可觀惜其墜落泯泯不耀公慨然留意毎政事閒隙延多學博識之士與之講求故實掇採舊聞若耳目所及參諸長老攷覆是非自開國權輿分野占象州部號名因革之别其鎮其浸岡聯派属之詳都城邑郭神祠佛廟府寺宫室學宫樓觀苑囿池沼建創之目門閭巷市道里亭館方面形勢至於神仙隠逸技藝術數先賢遺宅碑版名氏事物種種瓌譎竒詭纎嗇畢書繇秦漢已來凡為守令犖犖有風迹者若干人有唐迄今知府事居多閎碩端毅之望又若干人其行事暴於圖史不可勝述其始至若代去之年月序次昭然著矣厥生鉅人千古不乏澤我文化雋乂迭起科選徳進相踵于朝數百年間無一遺者物有其善雖毫釐云補實足以為一方盛觀自昔僭賊乗民凶菑事變不同久近亦異悉其致冦之由及王師夷難底平之迹與夫歴世蠻獠叛服不常中國所以驅除覊縻得失之故又足以為不虞不若之明鑒嗚乎既有政以孚其恵又為書以憲厥後公之於蜀可謂志得而道備矣書成凡若干篇以類相従為三十卷名曰成都古今集記令觀之者信蜀為重於天下非虚也哉續成都古今集記二十二卷陳氏曰知府事王剛中居正撰紹興三十年余嘗手寫洛陽名園記而題其後曰晋王右軍聞成都府有漢時講堂秦時城池門屋樓觀慨然逺想欲一逰目其與周益州帖盖數致意焉近時吕太史有感於宗少文卧逰之語凡昔人紀載人境之勝録為一編其奉祠亳社也自以為譙沛真源恍然在目而兗之太極嵩之崇福華之雲臺皆將卧逰焉噫嘻弧矢四方之志髙人達士之懐古今一也顧南北分裂蜀在境内雖逺患不往爾往則至矣亳兗嵩華視蜀猶邇封也欲往其可得乎然則太史之情其可悲也已余近得此記手寫一通與東京記長安河南志夣華録諸書並蔵而時自覽焉是亦卧逰之意云耳于時嵗在己丑蜀故無恙也後七年而有虜禍秦漢故迹焚蕩無遺今其可見者惟此二記耳而板本亦不可復得矣嗚呼悲夫自昔清獻公刪取張􅒷勾延慶鄭暐盧求周封等書為成都古今集記三十卷凡興廢遷徙及城郭宫府坊市庫厩儒宫佛室仙館神祠陵墓渠堰樓臺池苑之名數與風俗之好惡人物之臧否方伯監司之至去蠻夷寇盗之起滅木石之殊尤蟲魚之變怪靡不畢載其采獲貫穿亦勤且詳矣自熙寜訖今凡八十七年事當紀述者盖難遽數而舊記莫或踵繼見聞異辭日月寖久恐遂湮滅可不惜哉晋陵胡承公嘗命僚属論次未究端緒尋遷宣撫使事復中輟余來此將周嵗䝉國威憲邊堠幸帖息斯民亦安堵如故因以閒隙捜訪纂緝作續記二十二卷前記載古事往往有差誤則辨正之脱遺則補足之清獻所云知之有未至編之有未及者余固不免也其亦有待於後之君子乎成都古今丙記十卷宋淳熙制置知府范成大撰自序曰前記趙清獻公作於熙寜七年甲寅凡三十卷蜀之始封及分野梁益州劔南西川成都府屬郡縣得名之所自廢置因革之不同攷之詳矣後八十七年當紹興三十年庚辰王恭簡公續為之記有辨其差誤附益其未載者二記今皆具存續記之成距今纔十有八年雖事之當書者不至甚夥然恐自是日月䆮久來者難考乃蒐耳目所及者繼書之名曰丙記其二記已載者皆不重出云成都古今丁記二十五卷淳熙中制置胡元質長文撰自序曰成都古今記起自熙寜甲寅前帥趙閲道集之凡三十卷後八十七年當紹興庚辰王時亨復為續記二十二卷廢置因革纎悉巨細靡不載也又十有八年當淳熙丁酉范至能復為丙記十卷距時亨日未逺雖不至如前續記之多然二書之所不及者則加詳矣予以是年秋代匱帥蜀四路兵民之寄實在焉蜀久困於征輸𣙜酤之額雖減塩茗之課猶重其他邊防民政事所當行利興害去皆有端緒可覆而考也居三年綴為丁記二十五卷粗成一書惟沈黎畨部繹騷踰時方定變之所起以迄無事隨宜措畫本末具存姑俟論定别為一編合成都四記而觀之往事頓前得過半矣蜀人物志寳謨閣學士劉甲撰甲字師文淳熙進士嘉州人劔南廣記四十卷宋龍州助教郭友直撰宋成都志慶元中制置使建安袁説友序作者不知為誰按費著云全蜀郡志唯成都志有文類今文類五十卷為袁所集則志必出其手而自序矣元成都志至正中費著撰自序曰成都居全蜀上游其名稱自西漢始按禹貢蜀為梁州之分岷山導江東别為沱今導江與沱名縣鎮於成都此三代而上地志之見于書而不可誣者文王之化行乎江漢之域江有沱詠於二南之先然漢統於江以朝宗沱附於江以起興江首四瀆歴代祠其神於成都故成都為江之源而荆揚之江特其委爾考禹迹聲教之所被稽文王羙化之所行徵諸武王逖矣西土之誓言論全蜀而泝源於成都上游之導江則孰有逾於詩書之為可信而有據者哉謂三代而下秦恵伐蜀而後得與中國通文翁興學於成都而後得與齊魯比不端本於夫子刪定之經惟遷史之言是信亦學者之過也若曰周衰而諸侯叛蜀據阻自安職貢廢而文教弛秦恵伐之而後道路通文翁學而後風化復斯可矣捨詩書斷自秦漢以論蜀則未可也全蜀郡志無慮數十家惟成都志有文類兵餘版燬莫存蜀憲官佐搜訪百至得一二寫本迺參稽訂正僅就編帙凡郡邑沿革與夫人物風俗亦槩可考焉遂鳩工鋟梓以廣其傳若文類之詳則有待於後之好事者青城山甲記一卷晁氏曰偽蜀道士杜光庭賓聖撰集蜀水若山在青城者悉本道家之言青城山乙記一卷范仲立撰岷山異事三卷宋史句台符撰永康軍志今灌縣教授張増編茂州圖經郡守史憲序資中志今資縣扈自中編李折序金淵志今金堂縣郡守韓植序龍門志今龍安府楊熹序龍門續志宋之源序隂平縣記今青川所唐大中六年周茵撰嘉州志二卷本志序云宋吕勤為守命張開修峩眉志至吕昌朝以嘉州圖經増廣之為嘉州志二卷嘉定志郭公益編續志林潔已編峩眉志三卷晁氏曰張開撰郡守吕勤命開考圖經及傳記石刻綴緝成書析為十四門宋白呉中復詩文附于後峩眉山記一卷宋史新編此記次在盧鴻下榮州圖經今榮縣隆興元年李燾為守命教官勾演編武陽志十卷今彭山縣陳氏曰乾道六年教授葛元隲著太守廖遲元達序武陽志二十七卷何友諒著見宋經籍志眉州古志孫汝聴編通義志二十五卷今眉州宋經籍志趙善贑著通義記家安國編江鄉志亦眉州張伯虞編劉光祖序臨卭志二十卷補遺十卷今卭州宇文紹奕撰見經籍志雅安志今雅州李嗣文序沉黎志二十三卷今黎州宋史王寅孫撰戎州記今叙州府唐書李仁實撰頓邱人官至左史叙州圖經三十卷俞聞中撰見宋史瀘州地里書蒲江髙載著載為瀘州録事參軍州守吏部范君委修筆削周詳為時所重江陽志今瀘州教授李濬序江陽譜永嘉曺叔逺編江州圖經一卷今重慶府見新編不載作者江州事迹三卷宋史經籍志韓昱撰南平志今南川縣郡守趙彦邁序南平郡圖經一卷失作人名見新編涪陵記一卷今涪州宋史云馮忠恕撰古涪志十七卷宋經籍志云王寛夫撰龜陵志今涪州楊興序龜陵新志鄭鑑撰忠州圖經一卷新編載失名南賔志今忠州樊漢炳序平都山仙觀記二卷今酆都縣見宋經籍志未詳人代墊江志三十卷今合州郡守任逢編見宋史靖南志今榮昌縣太守黎伯巽序珍州圖經三卷今遵義府真安州見宋經籍志失名䕫州圖經故相國安陽公源乾曜參軍時修䕫舊圖經李國緯編䕫州圖經四卷宋經籍志劉徳禮撰䕫州志十三卷新編云馬導撰通川志十五卷今達州宋史馬景修著大寜監圖經六卷宋史云不知作者南浦志今萬縣趙善贛編萬州新志亦萬縣王子申序梁山軍圖經今梁山縣教授黄震仲編閬苑新記三十卷今保寜府新編載王震撰隆苑記亦保寜府宋陟文閬苑前記何求文閬苑續記曺無忌文保寜志云宋閬中何求以宋陟隆苑記疎略乃裒次三十卷為閬苑記其後同縣曺無忌又續為二十六卷其書自元符三年起修至紹興二十五年止寜武志今廣元縣鄒卿序楊炎正編清化前志今巴州教授劉甲編清化續志教授李鈞編果州圖經五卷今順慶府見宋史無作者名開漢志亦順慶府郡守朱繁序云紀將軍信加封詔詞有云實開漢業故建樓命名曰開漢郡志名編亦曰開漢廣安志嘉定改元郡守廖唐英序宕渠志二卷亦廣安州無編集人姓名及郡守題名仙釋詩文等類蓬州志五卷秘書少監劔門羅畸疇老撰凡十五門崇寜四年序梓潼古今記今潼川州淳熙間郪令孫汝聴作梓潼風俗譜元祐間教授石慶嗣作新潼川志劉甲序潼川府圖經十一卷宋史新編袁觀撰遂寜志馬崇文序普慈志三十卷今安岳縣宋郡守楊泰之撰青神人西南夷事狀二十卷西戎記二卷並唐韋臯撰西南備邊録十三卷陳氏曰唐宰相李徳裕文饒太和中鎮蜀所作録内州縣城鎮兵食之數大畧具焉李巽岩曰今存者只一卷與崇文總目相符豈嘉祐以前已亡逸乎徳裕之深謀逺慮雖至今可用也而所存止此可惜西南備邊志十二卷陳氏曰嘉定進士鄧嘉猷撰紹興末犍為有蠻擾邊初莫知其何種族也已而有能别識其為虚恨蠻者時蜀邊久無事既去而朝廷憂之詔有司經度嘉猷取秦漢以來訖于本朝凡史傳所載蠻事皆著于篇時乾道中也其為志九為圖一邊和録五卷陳氏曰承議郎河東陳伯彊撰載胡世將承公宣撫川陜事西南條著趙瞻著瞻知威州以威茂雜羣獠險而難守不若合之而建郡于汶川條著其詳為書後熙寜中經理西南就瞻取其書考焉益部方物畧記宋端明殿學士吏部侍郎知益州安陸宋祁子京撰序曰益為西南一都㑹左阻劍門右負夷番内坦夷數百里環以長江裹以複岑川陸盛氣礙而不得東逥薄蜿蜒還負一方為珍木為怪草為鳥魚芋稻之饒日𤾉雨雨嘘和吐妍層出雜見不可勝狀殆岷精緼靈示完富瓌璚於兹壤也嘉祐建元之明年予來領州得東陽沈立所録劔南方物二十八種按名索實尚未之盡故遍詢西人又益數十物列而圖之物為之贊圖視狀贊言生之所以然更名益部方物畧記凡東方所無及有而自異皆取之兾禆風土聚邱之遺云三川官下記二卷宋敏求撰見宋史經籍志續東京至益州地里圖若干卷宋史李常著常字公擇東坡友也峽程記一卷五代韋莊撰見宋史峽山履平集一卷司馬儼撰見宋經籍志峽山利渉集一卷潘子韶著見宋史蜀北路秦程記一卷宋史陳延禧撰呉船録一卷范成大至能撰公自蜀帥東歸紀逰取門泊東呉萬里船之句為名蜀中廣記卷九十六
