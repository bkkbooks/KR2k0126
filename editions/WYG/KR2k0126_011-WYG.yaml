body:
  text: 蜀中廣記卷十一明曹學佺撰名勝記第十一上川南道嘉定州水經曰江水至犍為武陽縣青衣水沬水從西南來合而注之酈道元註云江水又東南逕南安縣西有熊耳峽連山競險接嶺争髙河平中山崩地震江水逆流懸漑有灘名壘坻亦曰監溉李氷所平也縣治青衣江㑹襟帶二水矣華陽國志云青衣有沬水出濛山下伏行地中㑹江南安觸山脇溷崖水胍漂疾破害舟船厯代患之李氷發卒鑿平溷崖通正水道或曰氷鑿崖時水神怒氷乃操刀入水中與神鬬至今䝉福按漢書溝洫志蜀守李氷鑿離􅕞避沬水之患晉灼云􅕞古塠字即此寰宇記云青衣水發源自瀘山徼外東南流逕嚴道洪雅夾江至龍游與岷江合沬水發源大渡河一名峩水自陽山縣流入江按青衣沬水合流在州西十五里俗名尖山其下為紙房楮薄如蟬翼而質堅可久通志云嘉定州治在兩川合流之際晉郭璞所定治東有八卦井即璞所鑿水經注云蜀王開明故治也來敏本蜀論曰荆人鼈令死其尸隨水上荆人求之不得鼈令至汶山下邑復生起見望帝望帝者杜宇也從天下女子朱利自江源出為宇妻遂王於蜀號曰望帝望帝立鼈令以為相時巫山峽壅而蜀水不流帝使鼈令鑿巫峽通水蜀得陸處望帝自以徳不若遂以國禪號曰開明蜀記云古夜郎國傳為一女人浣溪有竹浮下而中啼聲取而視之則孩也及長呼為夜郎封竹溪王今治北三里有竹公溪矣按宋祁答勸農李淵宗嘉州江上見寄詩嘉月嘉州路牁峩接畫船山圍杜宇國江入夜郎天即詠此事又輿地廣記云漢武帝開夜郎置犍為郡漢書地里志夜郎故縣乃屬牂柯郡如此則今之嘉州犍為郡非夜郎故地矣後世徒見嘉州名犍為郡又領犍為縣遂以為夜郎國恐失真蜀志補罅云嘉州十五景唐貞觀中刺史盧士珵記曰望靈峰曰西嶺精舍曰石梁水曰後壑曰分溪塘曰桂竹汀曰梭原曰茗岡曰六度潭曰長林閣曰望山臺曰青蒨徑曰山梔園曰石壑院曰南洲草堂併賦詩刻之石上宋鄧諌從云天下山水窟有二曰嘉定曰桂林鮮于繪議道堂記云漢嘉背負三峩襟帶二江為西南州最清巋處海錄碎事載偽蜀歐陽彬得嘉州曰青山緑水中為二千石作詩飲酒為風月主人豈不佳哉其後太守吕昌朝以宋復古所畫八景圖皆天下名勝懸於州治與相映發蘇子瞻有八詠繼東呉之贈也蜀都賦云户有橘柚之園注曰出犍為南安縣華陽國志南安有柑橘官社出名茶寰宇記云有石碑山山上遍植海棠為郡守宴賞之地一名海棠山花譜云海棠有色無香惟蜀之嘉州者有香呉中復戒石云嘉州出荔枝輿地紀勝有荔枝樓愛日齋叢抄云乾道間陸放翁取家藏前輩筆札盡刻石置荔枝樓下方輿勝覽云梨花山過西津橋五里有梨花百餘樹人寒疾取此花食之即愈岑參過西津王判官所居詩勝迹不在逺愛君池館幽素懐茗中語宛得塵外遊通志云蓮花山在治東八里山陽有溪四時不涸産蓮花為盛樓臺亭榭雅與勝㑹者曰都督府唐于邵序云犀灘古地熊阜外虞長空青𠖇通波萬里曰郡齋平望江山岑參詩山光圍一郡江月照千家曰丁東院在州學前院有方響洞洞腹有水如環珮聲黄魯直詩古人題作丁東水自古丁東直至今我為更名方響洞信知山水有清音范成大詩隔凡水磵不可越衆真微步壺中月徙倚含風玉佩聲何須聴作㽔賔銕自注云漢嘉廣佛院中水洞有聲琅然莫知其所由来舊名丁東水山谷易今名且有詩也石介詩云萬樹芙蓉秋色裏千家方響月明中曰澄江樓在憲司左窺龍泓右瞰烏尤髙明爽塏得江山之趣淳祐間提刑程逄辰摹刻蘇子瞻書其外祖程公逸事於此曰明月樓在譙樓之右下瞰明月湖郭璞䜟云鬱姑鬱姑將州對洛都但看千載後變成明月湖後隋鬱姑將軍開此湖也洛都山名在州西五里曰壁津樓宋郡守逰仲鴻建魏了翁記在治東南跨城為樓下瞰江流三峩九頂森列左右曰萬景樓在髙標山上髙標一名髙望郡之主山也有𢎞明觀後周所剏隋大業末方製大殿塑飛天神王像無名氏記其神異甚詳樓為宋郡守吕由誠建宇文粹中記范成大云嘉州城中山上登覽勝絶殆冠西川予令畫工作圖以歸山谷山谷来游時但有安樂園未有此樓也後人立涪翁亭在此樓前曰月榭陸務觀詩試傾萬景湖亭酒来看半輪江月秋為同年王子蒼作也註云傍榭有一嵓景趣尤佳子蒼欲作樓未果曰碧雲亭在石筍之隙楊翬記云石挺出於山傍髙丈有二尺上鋭而下廣衆水滙於前左右視羣山之邐迤若覆盂於地此亭在其上也熊耳平羗據其上流寰宇記云熊耳水一名熊耳峽古老言武侯鑿山開道即熊耳峽東古道也又云平羗縣本漢平羗戍在榮州應靈縣界深谷戍是也周保定年置縣隋大業中獠叛移就大江唐寳厯中又移於開峽驛道書謂之平羗化山圖經云天下二十四化之一也有太白亭在焉相傳太白讀書於此黄魯直作亭其上蘇子瞻詩云峩眉山月半輪秋影入平羗江水流謫仙此語誰解道請君見月時登樓石闕堂溪環遶其趾郡國志云龍㳺縣有二石闕即漢武帝使唐䝉下夜郎置碑目云嘉州舊市鎮石闕上有唐李徳裕領重兵過此九字寰宇記云石堂溪水在縣東一里源岀溪泉流入明月湖亭退入流花橋㑹大江薛能石堂溪詩三面枕漁樵前門向郡橋岸沙崩橘柚山徑入茶苖夜擁軍烟合春浮妓舸邀此心無與醉花影莫相饒九頂烏尤傑立捍流方輿勝覽云九頂山在城左有九峰曰鳯集棲鸞靈寳就日丹霞祝融擁翠望雲兑説唐㑹昌已前峰各有寺今惟存凌雲一寺又名大像寺開元中僧海通於瀆江沬水濛水三江之合衝濤怒浪之濵鑿山為彌勒大像髙踰三百六十尺建七層閣以覆之至韋臯時積十九年而工始備臯有大像記墨莊漫錄云嘉州凌雲寺大像記韋臯文張綽書其碑甚豐字畫雄偉頃於潘義榮處見之岑參詩寺出飛鳥外青楓戴朱樓摶壁躋半空喜得登上頭始知宇宙濶下看三江流天晴見峩眉如向江上浮逈野烟景豁隂森棕柟稠願割區中緣永從塵外逰囘風吹虎穴片雨當龍湫僧房雲濛濛夏月寒颼颼廻合俯近郭寥落見逺舟發槩無端倪天宫可淹留一官詎足道欲去令人愁薛能詩像閣與山齊何人置石梯萬烟生聚落一崦露招提霽月人來下殘陽鶴去棲從邉亦已極􅇏火是沉黎司空曙詩春江古寺遶滄波石磴盤空鳥道過百丈金身開翠壁萬龕燈焰隔烟蘿雲生客到侵衣濕花落僧禪覆院多不與方袍同結社下歸塵世竟如何李習凌雲漫興云古寺臨江間碧波石梯深入白雲窠僧房寂寂無人跡滿地落花春又過薛濤寄題凌雲寺上韋相公詩聞説凌雲寺裏苔風髙日近絶塵埃横雲㸃染芙蓉壁是待詩人寳月来黄庭堅凌雲記游詩凌雲一笑見桃花三十年来始到家從此春風春雨後亂隨流水到天涯陸㳺凌雲禮佛詩山郭尋幽一笑新旋呼艇子截煙津不辭疾步登重閣聊欲今生識偉人泉鏡自涵螺髻緑浪花不犯寳趺塵始知神力無窮盡丈六金身小果身自註云一泉泓然正在髻下每歳水漲不能及佛足碑目云凌雲山麓有唐放生碑山頂有清音亭邵博記天下山水之勝在蜀蜀之勝在嘉州嘉州之勝在凌雲寺寺之南山又其勝也蘇子瞻名其亭曰清音又南山之勝也其下有治易洞東坡磨厓大字云聖作易晦其數劉傳呉識易祖盖宋郡守呉秘得之於劉牧耳紀勝云烏尤山一名離堆山在九頂山之左舊名烏牛突然水中作犀牛狀至山谷題涪翁亭始謂之烏尤又名烏龍碑目云郭璞移水記謂世主播遷兵戈滿地於是優游嘯傲放意山水間乃於嘉州城東百步烏龍山鑿書嵓而蘇子由詩亦指其注爾雅於此史謂璞無入蜀之文按移水記有嘉州二字則碑非手筆恐後人之附㑹耳盖嘉州之名始於後周而自周已前止曰漢嘉郡曰龍游縣耳安得有所謂嘉州哉子由詩云巉巉九頂峰可愛不可住飛舟過山足佛脚見江滸俄頃已不見烏牛在中渚移舟近山隂峭壁上無路云有古郭生此地苦箋註洗硯去殘墨遍水如黒霧至今江上魚頂有遺墨處提刑張方詩竹橋沙水度烏尤絶壁孤巖意氣驕故與凌雲分半坐僧窻假寐見金焦以其似金山焦山也青衣石峽循而東去東觀漢記曰元初二年五月青衣蠻唐律歸義注云地在大江青衣二水之㑹今嘉州龍游縣也寰宇記云青衣津在治南四十里有青衣神益州記云神號雷塠廟即華陽國志之雷垣也班固以為離堆下有石室名玉女房盖此神耳岑參上嘉州青衣山中峰題恵净上人幽居寄兵部楊郎中詩引云青衣山在大江之中屹然逈絶崖壁蒼峭周廣七里長波四匝有恵浄上人廬於山巔惟繩牀竹杖而已恒持蓮花經十年不下山予自公浮舟聊一登眺友人夏官𢎞農楊侯清淡之士也素工為文獨立於世與余有方外約每多獨往之意今者幽躅勝槩歎不得與此公俱爰命小吏刮磨石壁以識其事乃詩以逹楊友爾詩云青衣誰開鑿獨在水中央浮舟一躋攀側逕緣穹蒼絶頂詣老僧豁然登上方諸嶺一何小三江奔茫茫蘭若向西開峩眉正相當猿鳥樂鐘磬松蘿泛天香江雲入袈裟山月吐繩牀早知清净理久迺機心忘尚以名宦拘聿來夷獠鄉吾友不可見鬱為尚書郎早歳愛丹經留心向青囊𣺌𣺌雲智逺幽幽海懐長勝賞欲與俱引領遙相望為政愧無術分憂幸時康君子滿天朝老夫憶滄浪况值廬山逺抽簮歸法王或云青衣即烏尤山然烏尤之廣不能以七里計也方輿記云東巖在城東佛峽即聖岡山薛能詩古蹟是何王平身入石房逺林通後逕一郡隔前岡晝静惟禪客春来有女郎獨醒囘不得無事可焚香巖半有洞出泉冝釀東坡詩一時付與東巖酒即此陸務觀詩能仁院前有石像髙丈餘盖作大像時稿也詩云江閣欲開千尺像雲龕先定此規模斜陽徙倚空三歎嘗試成功自古無碑目云東津院有黄魯直草書圓照大師小碑其詩云赤旃檀塔六七級白菡蓞花三四枝禪客相逢以彈指此心能有㡬人知又云黄太史自叙南經此有所作墨竹記予觀嘉州新志城西一里有楊雄山石洞幽邃相傳以為子雲遊此有子雲草亭蔡楨詩云獨步城西路蕭條一草亭古苔環徑碧修竹遶軒青石鑿觀書所碑鐫陋室銘草𤣥今已矣千載想儀刑東北四十里有麻平河流出千佛崖與泥溪合王勃麻平曉行詩云百年懐士望千里倦遊情髙低循戍道逺近聴泉聲磵葉纔分色山花不辨名覉心何處盡風急暮猿清泥溪詩云弭棹臨奔壑低鞭躡峻岐江濤出岸險峰磴入雲危溜急船紋亂崖斜騎影移水煙籠翠渚山照落丹崖風生蘋浦葉露泣竹潭枝泛水雖云美勞歌誰復知峩眉縣任豫益州記云峩眉山在南安縣界兩山相對狀如峩眉張華博物志以為牙門山也本傳云昔善財禮徳雲比邱時佇立妙髙峰觀此山如初月現故稱峩眉李膺益州記云隋開皇九年立峩眉縣以山為名縣在南安之西峩眉之東唐乾元間獠叛移就峩眉觀東今縣理是也禹貢梁州之山四岷嶓蔡䝉西山皆岷北皆嶓南山皆䝉峩眉之在禹貢則䝉山之首也飛𤣥羽經曰峩眉之山金臺之室飛𤣥羽經秘其内稽神樞云句曲洞天西通峩眉皆大道也其間有小徑雜路阡陌抄㑹非一處華陽國志云峩眉山孔子地圖言有仙藥漢武帝遣使者祭之欲致其藥不能得碑目云宋太宗峩眉山普賢殿簡版書天真皇人論道之地楚狂接輿隠迹之鄊按雜花經云諸佛如来以大悲心而為體故因於衆生而起大悲因於大悲生菩提心因菩提心成等正覺故我世尊等正覺而有方所説經而有道塲普賢於道塲開化人天等衆故現相海於峩眉山中宻引世人而通菩提覺性三皇經云皇人者㤗帝之所使在峩眉山黄帝往受真一五牙之法費士戣歌鳯臺記云按晉皇甫謐髙士傳葛洪神仙傳宋劉孝標注世説皆以接輿為避楚入蜀隠於峩眉不知所終也寰宇記云中峩山在峩眉縣南二十里又名覆蓬山有葛仙洞入穴初纔容人行數里漸寛洞中蝙蝠大如箕小峩山在峩眉縣南三十里一名鏵刃山山有季仙洞是為三峩李膺益州記云龍門山在峩眉西十里兩崖峭峙其形如削仰視青天纔餘一罅又云峩眉山下有池廣袤十里號龍池方輿記云綏山廢縣在峩眉縣西四十里按列仙傳葛由周威王時人好刻木為牛賣之一日騎木牛見人蜀中王侯追之上綏山綏山在峩眉山西南其髙無極隨之者不復還皆得仙道諺曰得綏山一桃雖不得仙亦足以豪水經注云峩眉山有濛水即大渡水也水發䝉漢東南流與涐水合逕汶江道吕忱曰涐水出蜀許慎以為涐水也從水涐聲南至南安入大渡水大渡水又東入江通志云羅目河出峩眉山麓右溪自小天池以東左溪自黄毛坪以北至羅目廢縣界合二溪之委為江水石甚竒怪縣址去治西九十里唐麟徳置宋省入寰宇記云隴寧山在羅目縣東南七里神仙傳云宿山圖者隴西人也採藥此山服之羽化又云嘉樹在羅目縣東南三十里陽山江溉兩樹對植圍各三二尺上引横枝亘二丈相援連理隂庇百夫其名曰黄葛號嘉樹蘇子由詩予生雖江陽未省到嘉樹即此又云夷惜水在羅目縣東北五十里源出嶲州界中有嘉魚長三尺每年二月隨水而下八月逆水而上入穴蜀都賦云嘉魚出於丙穴是也予按名山記峩眉山周匝千里石龕百一十二大洞十二小洞二十八南北有臺凡遊大峩者自縣勝峰門出至華嚴院恰十五里前代於峩眉山剏寺六光相居山絶頂為遊山之底極華嚴居山之前峰為遊山之嚮導而白水寺居其中自白水至光相厯八十四盤山徑如線如是者六十里至峰頂即普賢示現處屋皆以板為之予以萬厯辛亥歳遊是山作記云出嘉州之西門為峩眉徑而峩愈用自逺遇津焉絶流者二掲衣者一既入縣縣田食堰水膏液雲油有沃益之稱遇嶺焉閣覆於上宋時建魏華父書也首坡名解脱以出山者釋危就坦至此而盡噫予惡知乎出解脱入解脫耶過此為華嚴寺即華嚴􅕤為純陽殿殿前頫溪有石如船水出灌堰石上龍門二字蘇子瞻書又過為中峰寺即乾明觀黄魯直居之為歌鳯䑓列仙傳所稱楚狂接輿隠於峩眉山中不知所終也陳希夷福夀字殊俗筆峩石神水亦亡謂又過為雙飛橋山中橋非一此可稱橋一橋受一水一水自一洞来有黑白之分若挾而舞若摶而赴勢不相下過橋始狎久之乃濟有石狀如牛心受水所激而成有前後牛心寺前者白水而後者黒水也謂之符文水孫思邈居於白水今之萬年寺即白水寺由山下至寺一舍而遙倍之而近如循牆自牖以逹堂窔每遇一嶺輒如止扉寺前為四逹而内則大宫也其地皆稻田塍埒俯仰隈隩氣候和暖不異於外有蒲氏村蒲人居之云漢蒲公之後盖權輿是山爾出寺至明月池俗名初喜亭其嶺蔓延行之無盡石磴難數始治終亂騎已絶輿用二十許人舁蹲處於内不能蔽軫劣似輿形者耳首十人不任輿以舟視輿背如弓䋲如絃猶不滿輿者意左右八人翼伸縮如猿臂莫知定向輿首者察路如察脉常苦眩次者如眩師或亟跳出輿外或佹入輿内或同前後左右為一井計二十人之形如鴻雁木葉偶成文字莫知所以又或作十數層如懸線或擁腫一處如木癭也輿不可以足代足不可以手代扶予行者不善地以善讓於予善在左則棄右者善在右則棄左者亦有時而下下不十上之一輿相詬厲彌甚首者拊不任輿者背如相瞽然留十數人後後者躡石石隨足下擊前者足驚全輿前者交平地欲趣後者未脱險不能從出初喜亭至化城寺俗名木皮殿徑一嶺狹束如溝水所流注多磊砢善脱足謂之滑石溝也由木皮殿至雷洞坪行者禁聲有禁聲碑輿二十人他輿者半共百五十人俱行筤篠灌莽中若不相顧若夣與人語而人不應其木連囷糾紛或寓或族或相切磨或自仆死或翹繚而句或無枝而檄每上一嶺不能半望若青天則有樹立於旁為客繇役而悝盱也木皮殿以上磴不能石疊木如馬齒雷洞坪以上樹不能枝向空如虎爪由雷洞坪至天門石路詰曲為八十四盤峭直纔減半梧丘當途或出其前或出其後又或出其左右而還之輿者實則輿向空久始實輿者空則輿趾礪地有聲而過門以外為娑羅坪娑羅其葉冬青其花薝蔔其色赤白木皮殿以上皆有之然有雜樹故不之稱稱天門天門樹娑羅三之二松居其一有一樹枯而復榮定者居之將合無迹也門内有橋曰天橋有井曰井絡有臺曰光相臺有鐡瓦殿昔建有銅殿今建有菴以棲禪者予登乎臺焉其穆穆肅肅者耶其明明斤斤者耶其見乎蒼蒼之色不在穹窿者耶其於世也悠悠洋洋者耶前之岷江大出而尾下也背之瓦屋上正而平章也逺之雪山瀐浮而汩沒也予何以知朱明之别於𤣥英又何以知臯且之别於辜涂何以知霾曀霡霂之相終始何以知螮蝀挈貳之自消息又何以知弇日覆雲之不為暈氣五采耶又何以知人世之雕繪而繡錯目眩而心亂者之有異乎此耶噫觀止矣學佺曰予遊名山多矣直上百里無所因緣則未之聞見也髙出五嶽秀甲九州天竺先生之言也楚人李維楨述於臺側李公本寧前予守西川也陳子昻感遇詩金鼎合神丹世人將見欺飛飛騎羊子胡乃在峩眉變化固非類芳菲能㡬時疲痾苦淪世憂悔日侵淄眷然顧幽褐白雲空涕洟又浩然坐何慕吾蜀有峩眉念與楚狂子悠悠白雲期時哉悲不㑹涕泣久漣洏夢登綏山穴南采巫山芝探元觀羣化遺世從雲螭婉孌時永矣感悟不見之李白峩眉山詩蜀國多仙山峩眉邈難匹周流試登覽絶怪安可悉青𠖇倚天開彩錯疑畫出泠然紫霞賞果得錦囊術雲間吹瓊簫石上弄寳瑟平生有微尚歡笑自此畢煙容如在顔塵累忽相失儻逄騎羊子􅂝手凌白日鄭谷峩眉山詩萬仞白雲端經春雪未殘夏消江峽滿晴照蜀樓寒造境知僧熟歸林認鶴難㑹須朝闕去祗有畫圖看賈島送譚逺上人下視白雲時山房掛樹皮垂枝松落子側頂鶴聴棋清浄從沙刼中終日未欹金光明本行同侍出峩眉釋皎然思遊峩眉寄林下諸友詩剛有峩眉念秋来錫欲飛㑹抛湘寺去便逐蜀帆歸難世堪言善閒人合見機殷勤别諸友莫厭楚江薇曹松送僧入蜀過夏詩師言結夏入巴峰雲水囘頭幾萬重五月峩眉須近火木皮嶺上祗如冬薛能咏峩眉聖燈詩莽莽空中稍稍鐙坐看迷濁變清澄須知火盡􅃄無益一夜闌邉説向僧予有前後峩眉二歌前峩眉山歌金陵為松谷上人作云峩眉山上月千里若為看峩眉山上雪萬古逼人寒山青如黛雪如粉明月鏡中何隠隠雙峰縹緲誰畫眉挂在長空不可盡西域雪山絶嶙峋此中應見西方人普賢菩薩行具足三千徒衆皆應真始信峩眉自惆悵不作巫山神女身八十四盤娑羅樹花開如繪復如素一間版屋千重嶺正值行人問山路登山路轉難投寺日已晩古苔如髮長新松學盖偃氷窟炊不成雷洞眠難穏真僧入定久行脚乞食逺鉢裏龍形小嵓前鳥聲囀雨氣沉如墨雲光疾似電應有千化身故作百寳現橋梁宛虹架樓䑓疑蜃變天竺皆騎象星光盡散燕奕奕九微燈棼棼五色線人人為攝受各各覩顔面欲知色是空色即空中滅世事如幻影詎必歎竒絶依舊峩眉山明月照清徹君来白門秋山月㡬圓缺浩浩江水流尚帶峩眉雪後遊峩眉歌云君不見太行誠險阻西蜀峩眉羞與伍又不見雪嶺長晶瑩來映峩眉一叚青禹貢䝉山此稱首梵語勝峰傳日久洞天列在位之七秀色甲乎州有九君不見軒轅氏跪謁皇人叩𤣥㫖又不見鬼谷子著書珞琭藏洞裏隴西仙人宿山圖採藥山中顔色殊葛由賣羊從此去接輿歌鳯胡為乎君不見子規啼處竇誼悲夜啼竹裂人不歸又不見崑崙伯仲未可分逸少曽詢周撫軍唐家子昻稱詞伯青蓮居士李太白徃徃見諸吟詠間白頭欲返青山宅豈是峩眉善妬人江水茫茫難問津我今来遊亦偶爾不然惆悵蜀國將三春三春花已謝木氷猶未嫁五月披重裘四時無一夏娑羅鬭雪開松枝受風亞仙僧如故常客子驚云乍乍見甚遲廻人生不再来足篆符文水身居光相臺井絡金莖下天門玉蘂開願言獻北極千秋萬歳杯夾江縣青衣水来遶縣界而飛水溪注之溪源出瀑布泉狀如素練李太白所謂瀑布天落半與銀河争流者耶而鳯凰天馬虎履伏龜諸山或舞或翥或蹲或處左右而挾持之過當縣城下稍平坦宋謝逹夫詩兩峰懐抱揖平川張孝芳詩平川麥穂藹如雲過此而東南三十里乃作簾鈎之狀晉張神君所謂日移紅影在簾鈎者此也道書云平岡化依鳯凰山亦謂之依鳯岡及桐梓林山下有石湫門及石筍雷柱可以禱雨在縣南十里通志云天馬山其勢飛騰似天馬一曰馬鞍山在縣東二十里形勝志云青衣水遶於南黒虎山峙於北福地記云伏龜山有仙掌洞相傳李阿真人所遺宋人書其壁云跨龍門飲蟹泉摩仙掌扣丹竈矣本志云治西二十五里南安鎮即漢南安縣治有鄧通宅故址前有瑪瑙溪中有磐石可以修褉寰宇記云夾江縣本漢南安縣地即封宣虎為侯之邑隋開皇中分龍游平羗二縣置於涇上臨江水故號夾江按涇水昔秦恵王得蜀移秦人萬家以實之秦人思故鄉水乃呼此水為涇水也唐天寳六年改為秦水史記年表宣虎以破臧荼功食邑於此碑目云漢和帝時開道碑在夾江縣西青衣越嶲道界中有永和七年永和八年等字又云漢楊宗楊暢墓在夾江縣東十里墓前兩闕其左右皆𨽻書縣按縣東二十里漢川縣界有亭亭内碑二通前立二石柱一云漢故益州太守楊府君諱宗字徳仲墓道一云漢故中宫令楊府君諱暢字仲普墓道皆𨽻書大字予按揚雄賦云五兀參差左太冲賦躡五屼之蹇滻本志以為縣之北隅五兀山後漢書費貽宅蓍草生焉常有五色雲氣覆其上貽盖不屈於公孫述者犍為郡之夾江人洪雅縣離堆川流東西屈曲百三十里而後入大江所謂洪雅川也碑目云古夷獠誓碑在洪雅縣市中又云漢靈帝時張道陵碑在洪雅之易俗鄉有嘉平二年三月一日等字此縣之十里修文山山即雅江所注驚湍怒濤名曰龍潭漁者不敢入又二十里其地多竹為竹箐山石甃梯磴盤折而上唐宋所設也又十里為隠䝉山晉處士龎居正字隠䝉隠此又二十里為花溪發源自瓦屋山與青衣合可望雪嶺積雪經年不化范忠宣詩雲堆雪嶺鋪銀界日射金仙照碧津又二十里思經山則與雅安分界矣山趾有廢嚴道縣基其上阿叱山瀑布千仭響撼山谷有巨石上鐫羅漢一百有八縣之東南有金釜山下臨平羗江古老相傳昔有主簿於此煉金丹故曰金釜山亦名主簿山犍為縣左思蜀都賦東越玉津註云江出璧玉故名華陽國志蜀有七津之一也今之犍為縣兼有玉津縣矣陸務觀舟過玉津詩玻瓈江上送殘春疊鼓催帆過玉津宋白為玉津令貽田表聖詩玉津縣裏三年悶金粟山前九月愁又云竹裏衙人吏花間押簿書今縣治在沉犀山上寰宇記云昔有犀牛渡到此上沉一名沉犀灘志云沉犀洞在沉犀山下上有赤壁數丈下有𤣥水千尺縣有石人蜀記云昔諸葛亮征蠻中十里刻一石人今黎巂之路尚有存者陳羽城下聞夷歌詩犍為城下牂柯路空冡灘西賈客舟此夜可憐江上月夷歌銅鼓不勝愁郭璞記云犍為縣北百里書樓山是孔子背書樓本志云子雲城在縣南三十里昔楊子雲避亂於此後人増築為城今水月寺是其故址俗譌為紫雲城碑目云孝女碑在犍為縣清溪口楊洪山下東漢永建初孝女叔先雄以父尼和墜湍水尸喪不歸於溺處自投水死後五日與父屍相持浮江上郡表言為雄立碑宋元祐中重立本志云清水溪在縣南十里流至孝女渡入江神異傳云趙昱嘗隠青城山隋煬帝起為嘉州太守時犍為潭中有老蛟為害昱率甲士千人夾江鼓譟持刀入水有頃江水盡赤昱左手執蛟首右手持刀奮波而出隋亂隠去不知所終後嘉州水漲人有見昱青霧中騎白馬從數獵者於波面過宋太宗封神勇大將軍廟食灌江口碑目云犍為縣東南四十里有唐大佛寺寺中菊坡二大字乃袁天綱筆通志云宋邵博墓在犍為縣博為制置司叅議卒葬於此本志云康節嘗言世亂惟蜀可居宣和末伯温􅂝家入蜀止於嘉州今犍為之紫雲城是其故業矣杜甫宿青谿驛奉懐張員外十五兄之緒詩漾舟千山内日入泊荒渚我生本飄飄今復在何許石根青楓林猿鳥聚儔侶月明遊子静畏虎不得語中夜懐友朋乾坤此深阻浩蕩前後間佳期付荆楚自註云青谿驛在嘉州犍為縣崔塗秋日犍為道中詩久客厭岐路出門吟且悲平生未到處落日獨行時芳草不長緑故人無重期那堪更南渡鄉國已天涯范成大犍為江樓詩河邉堵立看歸篷三老開頭暮欲東漲水稠灘連峽内淺山浮石似湘中無人驛路榛榛草有客江樓浩浩風種落塵消少公事賸裁新語寄詩筒蘇軾犍為王氏書樓詩樹林幽翠滿山谷樓觀突兀起江濵云是昔人藏書處磊落萬卷今生塵江邉日出紅霧散綺牕畫閣青氛氲山猿悲嘯谷泉響野鳥嘐戞巖花春借問主人今何在被甲逺戍長苦辛先登搏戰事斬馘區區何者為三墳書生古亦有戰陣葛巾羽扇揮三軍古人不見悲世俗囘首蒼山空白雲威逺縣縣有中峰峰巒峭拔又有中溪溪水幽清寰宇記云東十五里葛仙山古志相傳葛仙翁曽遊其地志云舊設觀仙臺碑刻剝落矣山居錄云威逺李圃淳熙中以忠州别駕歸隠白茅山中築秀發齋吟咏自適齋銘曰前山特秀入我牕戸朝来爽致起我幽趣望天宇之澄明何迷途之獨悟搘頥終日為蝶為周兩忘之矣聊舉扇以自障豈世塵之能汚行歌山中採其薇矣雲外飛鴻悠然来去而弋人何慕哉榮縣蜀地不冝松而榮州之松獨著紀勝曰榮黎松樹如龍盤陸游詩柟根横走松倒植故擅有其竒狀矣曰榮黎曰榮隠曰榮徳所謂三榮也寰宇記云榮黎山在州東十五里山上有龍池池邉有松如盤龍竹亦有如龍形者俗謂之羅漢杖碑目云榮黎山古寺碑唐元和禱雨碑俱在本山紀勝云榮隠山在州西三十里一名石筠無名氏石刻云筠山髙極入穹蒼人道虎為殃行人過此不曽傷咸陽宫闕在平地髙鹿食人無數計吁嗟苛政猛於虎斯言垂萬古古有榮隠先生修道於此石室猶存碑目有榮隠山修道觀石碑方輿云榮徳山在州東北四十二里州以此得名其山在谷中獨拔五百餘丈中有希夷觀老君祠刻石為像有小路至山巔以木為梯半山有唐刺史薛髙邱磨崖碑碑目云開元二十年刺史薛髙邱立多載仙靈事今已磨㓕本志云榮徳山為陳摶修真處又名希夷山有石室二十四及龍池千葉蓮唐劉兼初至郡詩嘉陵江畔接榮川兩岸旌旗下瀨船郡印已分炎瘴地朝衣猶惹御爐烟蓮塘小飲香隨艇月榭髙吟水壓天錦字莫嫌歸路逺華夷一統太平年又有去年今日詩云去年今日到榮州五騎紅塵入郡樓貔虎只知迎太守蠻夷不信是儒流奸豪已息時將㤗疲瘵全蘇歳又周聖主若容辭重禄便歸烟水狎羣鷗碑目有唐貞元二年建榮縣碑今移植於東橋有榮州院碑偽蜀司倉參軍茍延慶撰本志云蓮宇山在學宫後有宋人九域圖碑城東桂林山舊縣學有衡陽王書文明碑碑目又云真義侯碑在本廟唐元和二年遷舊經云即古蜀將獨孤白馬二人廟也又云大周聖徳勒石碑在州衙子城門外長安三年韋綨撰文劉兼登郡樓詩偶奉綸書蒞旭川郡樓佳致盡依然松欹鳥道雲藏寺月滿漁舟水浸天望帝古祠花簇簇錦城歸路草芊芊有時倚檻垂雙袂故國風光似眼前陸務觀自序其詞云三榮郡治之西因子城作樓觀曰髙齋下臨山村蕭然如世外予留十日被命參成都戎幙而去臨行徙倚竟日作桃源憶故人一首所謂衰翁老去踈榮利絶愛山城無事也城北有横溪閣務觀閣上小宴沁園春詞引云横溪閣者跨於雙溪之上也一自西来其水濁一自東来其水清二水合流於城下為閣以頫之其比鳯鳴山則黄魯直所題榮川祖無大師此君軒在焉紀勝云鳯鳴之竹多茂實言此竹結實有鳯来棲也魯直詩云王師學琴三十年響如清夜落澗泉有酒如澠客滿門不可一日無此君當時寺栽數寸碧聲挾風雨今連雲此君傾盖如故舊骨相竒怪清且秀程嬰杵臼立孤難伯夷叔齊采薇瘦霜鐘堂上弄秋月微風入絃此君説君家周彦筆如椽此君語意當能傳勝覽云龍洞在州東南四里真如院巖穴峭深洞左石壁竒聳巨栢老蒼洞右有石角立舊經以為孫登嘯臺三者乃榮之勝處陸㳺詩嘯臺載酒雲生履仙穴㝷梅雨墊巾碑目云嘯臺磨崖記宋隆興元年端午日榮守太史公李燾仁父書予攷諸傳記所載榮雖山谷間實為郡國一都㑹青陽門記云榮州有青陽洞以少昊國在其北門今正臨之故名按史黄帝子元囂封於青陽國為少昊金天氏少昊降居江水國於青陽以金徳王位在西方集覽云江水在蜀青陽是也宋崔仰之送人牧榮州詩山色臨巴㢠江流入漢清志云邑東榮川即古遯水河岸有竹王祠盖以祀夜郎王者蜀記云昔有女人於溪浣紗有大竹流水上觸之有孕後生一子自立為王以竹為姓漢武使唐䝉伐牂柯斬竹王土人不忘其本立竹王廟嵗必祠之不爾為人患薛濤題竹郎廟云竹郎廟前多古木夕陽沉沉山更綠何處江村有笛聲聲聲盡是迎郎曲漢地理志云縣有滇池周廻三百里水出駿馬日行五百里事同大宛又有馬鳴戍益州記云漢刺史韋拔夜過此地聞神馬嘶漢中馬嘶以應之故有此戍成都市九州要記云和義郡古夜郎之地武帝時開南中使􅈎道令通􅈎青衣道無功唐䝉將殺之令曰恨不見成都市而死䝉即立市如成都以殺之故曰成都市按和義郡本屬瀘州寰宇記云唐貞觀八年割屬榮州志云城西清富山有古榮王府按周榮公封國之後唐憲宗封其子幘宋真宗封子徳雍孝宗封子光宗寧宗封子曮俱曰榮王縣舊有綾錦村杏春村皆宋藩封故迹也朝野雜記天子即位嘗所領州鎮自防禦州而下皆陞軍名若節鎮州則建為府光宗自榮州刺史進封榮王而榮州不錫軍名盖中書之誤也南渡後始陞為紹興府宋名臣傳載李畋為國子直講求郡晨登講席諸生見畋巾兩焰火起是日報得榮州盖當時亦甚重之矣蜀中廣記卷十一
