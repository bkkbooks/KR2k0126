body:
  text: 蜀中廣記卷四明曹學佺撰名勝記第四川西道成都府四張詠創設記云按圖經秦惠王遣張儀陳軫伐蜀滅開明氏卜築蜀郡城方廣十里從周制也分築南北二少城以處商賈少城之跡今并湮没隋文封子秀為蜀王因附張儀舊城增築南西二隅通廣十里今之官署即蜀王秀所築之城東北也方輿勝覽云隋蜀王秀取土築廣子城因為池有胡僧見之曰摩訶宫毗羅盖梵語呼摩訶為大宫毗羅為龍謂此池廣大有龍耳又云摩訶池一名汙池陳人蕭摩訶所開也蜀檮杌王建武成元年改摩訶池為龍躍池王氏開國記云建将薨前兩月摩訶池有鶢鶋來集衍即位仍改龍躍池為宣華池渭南集云摩訶池入王蜀宫中舊時泛舟入此池曲折十餘里至宋世蜀宫後門已為平陸然猶呼為水門也按今此池填為蜀藩正殿西南尚有一曲水光漣漪隔岸林木蓊翳遊者寄古思焉唐杜甫晩秋陪嚴鄭公摩訶池泛舟得溪字詩云湍駛風醒酒船迴霧起隄髙城秋自落雜樹晩相迷坐觸鴛鴦起巢傾翡翠低莫教驚白鷺為伴宿青溪暢甫偶宴摩訶池詩云珍木鬱清池風荷左右披淺觴寜及醉慢舸不知移䕃簟林光冷照流簪影欹胡為獨羈者雪涕向漣漪薛濤摩訶池懷蕭中丞詩昔以多能佐碧油今朝同泛舊仙舟凄凉逝水頺波逺惟有碑前咽不流髙駢殘春遣興云畫舸輕橈柳色新摩訶池上醉青春不辭不為青春醉只恐鶯花也恠人孟昶避暑摩訶池玉樓春詞氷肌玉骨清無汗水殿風來暗香滿簾開明月獨窺人欹枕釵横雲鬢亂起來瓊戸啟無聲時見疎星渡河漢屈指西風幾時來只恐流年暗中换宋祁過摩訶池詩十頃隋家舊鑿池池平樹盡但迴隄清塵滿道君知否半是當年濁水泥又池邊不見帛闌船麥隴連雲樹繞天百歲興衰已如此爭教東海不為田陸游摩訶池詩摩訶古池苑一過一消魂春水生新漲煙蕪没舊痕年光走車轂人事轉萍根猶有宫梁燕銜泥入水門天寶逸事云明皇幸南京多以宫人自隨乃令成都畫手畫為十眉以賜之一曰鴛鴦眉又名八字眉二曰小山眉又名逺山眉三曰五岳眉四曰三峯眉五曰垂珠眉六曰月稜眉七曰分梢眉八曰函烟眉九曰排雲眉又名横烟眉十曰倒暈眉也李白上皇西巡南京歌云胡塵輕拂建章臺聖主西巡蜀道來劒壁門髙五千仭石為樓閣九天開其二九天開出一成都萬戸千門入畫圖草樹雲山如錦繡秦川得及此間無其三德陽春樹似新豐行入成都若舊宫柳色未饒秦地緑花光不減上陽紅其四誰道君王行路難六龍西幸萬人歡地轉錦江成渭水天迴玉壘作長安其五萬國同風共一時錦江何謝曲江池石鏡更明天上月後宫親得照蛾眉其六濯錦清江萬里流雲㠶龍舸下揚州北地雖誇上林苑南京還有散花樓其七錦水東流繞錦城星橋北挂象天星四海此中朝聖主峩眉山上列仙庭其八秦開蜀道置金牛漢水元通星漢流天子一行遺聖跡錦城長作帝王州其九水緑天青不起塵風光和暖勝三秦萬國煙花隨玉輦西來添作錦江春其十劒閣重闗蜀北門上皇歸馬若雲屯少帝長安開紫極雙懸日月照乾坤古今集記云王建初克蜀造有紅樓綵繪華侈初頴川人華洪隨之入蜀賜姓王與諸子連名曰宗至是造紅樓建以為應華洪之讖乃誅之王氏開國記云乾德四年秋紅樓肥遺見後蜀幸寅遜曰肥遺旱魃也張唐英引山經外傳肥遺有角蛇角上有火見則大旱非魃鬼也按魃鬼目生頂上矣檮杌云王衍即位之日即治宣華苑乾德三年苑成延袤十里有重光太清延昌㑹真之殿清和迎仙之宫降真蓬萊丹霞之亭土木之功窮極奢巧衍數於其中為長夜之飲嬪御襍坐舄履交錯焉衍宴宣華苑宫詞云輝輝赫赫浮五雲宣華池上月華新月華如水浸宫殿有酒不醉真癡人乃命宫人李玉簫歌之勸王宗壽酒也成都文類云李珣梓州人其妹為蜀王衍昭儀有詞藻即所稱李舜絃夫人矣洪邁絶句載舜𢎞蜀宫應制詩濃樹禁花開後庭飲筵中㪚酒微醒濛濛雨草瑶階濕鐘曉愁吟獨倚屏又釣魚不得詩云盡日池邊釣錦鱗芰荷香裏暗消魂依稀縱有尋香餌知是金鈎不肯吞又隨駕游青城詩云因隨八馬上仙山頓隔埃塵物象閒只恐西追王母宴却憂難得到人間此與徐太后太妃同作者后妃作詳見詩話中絕句又載羣仙降蜀宫六首其一后土夫人云偶引羣仙到世間薫風殿裏醉華筵等門貪賞不歸去愁殺韋郎一覺眠其二王母云滄海成塵幾萬秋碧桃花發長春愁不來便是數千載周穆漢皇何處遊其三麻姑云世間何事不澘然得失人情命不延適向蔡京㕔上飲回頭已是一千年其四上元夫人云思量徃事一愁容阿母曾邀到漢宫城闕不存人不見茂林荒草恨無窮其五弄玉云彩鳯飛來到禁闈便隨王母駐瑶池如今記得秦樓上偷見蕭郎惱妾時其六太真云春夢悠揚生下界一堪成笑一堪悲馬嵬不是無情地自遇蓬萊睡覺時盖亦附㑹杜光庭王氏男女仙傳而然矣蜀檮杌初王氏宫殿皆題匠人孟得姓名及知祥入蜀居之人以為先兆云長興五年正月白龜遊宣華苑苑即王氏所建孟氏呼為仙花苑盖音之訛或指仙人所進旌節花而名也明年七夕知祥宴丹霞樓觀宫人乞巧因寢疾而終孟㫤廣政三年上元觀燈于露臺舞娼李艷娘有姿容召入宫賜其家錢十萬六年春衍大選良家子以備後宫限年十五以上二十以下於是後宫有昭儀昭容昭華保芳保香保衣安宸安蹕安情修容修媛修娟十四號秩比公卿大夫士焉花蘂夫人者本青城費氏女以才色嬖于後宫吳曾漫録以為徐匡璋所納女拜貴妃别號花蘂夫人以其色似花蘂翾輕也又陞號慧妃喻其性也夫人嘗效王建作宫詞百首其一云五雲樓閣鳳城間花木長新日月閒三十六宫連内苑太平天子住崑山其二㑹真廣殿約宫墻樓閣相扶倚太陽淨甃玉堦横水岸御爐香氣撲龍牀其三龍池九曲逺相通楊柳牽絲兩岸風長似江南好風景畫船來徃碧波中其四東内斜將紫氣通龍池鳳苑夾城中曉鐘聲斷嚴粧罷院院紗窻海日紅其五殿庭新立號重光島嶼亭臺盡改張但是一人行從處黄金閣子鎻牙牀其六安排諸院接行廊水檻周迴十里强青錦地衣紅線毯盡鋪蘭麝鬱金香其七夾城門與内門通朝罷巡遊到苑中每日日髙祗候處滿隄紅艷立春風其八厨船進食簇時新侍坐無非列近臣日午殿頭宣索鱠隔花催喚打魚人其九立春日進内園花紅蘂輕輕漱淺霞跪到玉堦猶帶露一時分賜與宫娃其十三靣宫城盡夾墻苑中池水白茫茫直從獅子門前入旋見亭臺繞岸傍其十一離宫别院遶宫城金板輕敲合鳳笙夜夜月明花樹底傍池長有按歌聲其十二御製新翻曲子成六宫纔唱未知名盡將觱篥來抄譜先按君王玉笛聲其十三旋移紅樹劚青苔宣使龍池更鑿開展得綠波寛似海水心樓殿勝蓬萊其十四修儀承寵住龍池掃地焚香日午時等候大家來院裏看教鸚鵡念新詩其十五六宫官職總新除宫女安排入畫圖二十四司分六局御前相見錯相呼其十六才人出入每參隨筆硯相從遶曲池能向綵箋書大字忽防御製寫新詩其十七春風一靣曉粧成偷折花枝傍水行却被内監遥覷見故將紅豆打黄鶯其十八小毬塲近曲城頭宣喚勲臣試打毬先向畫廊排玉幄管絃聲動立浮油其十九棃園弟子簇池頭小樂携來候宴遊試炙銀笙先按拍海棠花下合梁州其二十殿前排宴賞花開宫女侵晨探幾回斜望苑門遥舉袖傳聲先喚近臣來其二十一供奉頭籌不敢爭上前専喚近臣名内人酌酒纔宣賜馬上齊呼萬歲聲其二十二殿前宫女總纖腰初學乘騎怯又嬌上得馬來纔似走幾回抛鞚抱鞍鞽其二十三自教宫娥學打毬玉鞍初跨柳腰柔上堋知是官家認遍遍長贏第一籌其二十四翔鸞閣外夕陽天樹影花光逺接連望見内家來徃處水門斜過罨樓船其二十五内人追逐採蓮時驚起鳬鷗兩岸飛蘭棹把來齊拍水並船相闘濕羅衣其二十六新秋女伴各相逢罨畫船飛别浦中旋折荷花伴歌舞夕陽斜照滿衣紅其二十七少年相逐採蓮回羅帽羅衣巧製裁每到岸頭長拍水競提纖手出船來其二十八早春楊柳引長條倚岸緣墻一靣高稱與畫船牽錦纜暖風搓出綵絲絛其二十九媫妤生長帝王家常近龍顔逐翠華楊柳岸長春日暮傍池行困倚桃花其三十月頭支給買花錢滿殿宫人近數千遇着唱名多不語含羞急過御床前其三十一太虛高閣淩波殿背倚宫墻靣枕池諸院各分娘子位羊車到處不教知其三十二寒食清明小殿傍綵樓雙夾闘雞塲内人對御分明看先賭紅羅滿擔床其三十三水車踏水上宫城寢殿簷頭滴滴鳴助得聖人髙枕興夜深長作逺灘聲其三十四平頭船子小龍床多少神仙立御傍旋刺篙竿令過岸滿池春水蘸紅粧其三十五苑東天子愛巡遊柳岸花堤枕碧流新教内人工射鴨長將弓箭遶池頭其三十六羅衫玉帶最風流斜挿銀篦慢裹頭閒向殿前騎御馬掉鞭横過小紅樓其三十七沉香亭子傍池斜夏日巡遊歇翠華簾畔越盆盛淨水内人手裏割銀瓜其三十八薄羅衫子透肌膚夏日初長板閣虚獨自憑欄無一事水風涼處讀文書其三十九金畫香臺出露盤黄龍雕刻遶朱欄焚修每遇三元日天子親簪白玉冠其四十六宫一例羅冠子新様交鐫白玉花欲試淡籹兼道服靣前宣與唾盂家其四十一二月櫻桃乍熟時内人相引看紅梔回頭索取黄金彈遶樹藏身打雀兒其四十二小小宫娥到内園未梳雲鬢臉如蓮自從配與夫人後不使尋花亂入船其四十三錦城上起凝煙閣擁殿遮樓一向髙認得聖人遥望見碧闌干映赭黄袍其四十四大臣承寵賜新莊梔子園東柳岸傍每日聖恩親幸到板橋頭是讀書堂其四十五舞頭皆着畫羅衣唱得新翻御製詞每日内庭聞教隊樂聲飛出躍龍池其四十六春早尋花入内園競傳宣㫖欲黄昏明朝隨駕遊蠶市暗使氊車就苑門其四十七半夜船遊載内家水門紅蠟一行斜聖人止在宫中飲宣使池頭旋折花其四十八春日龍池小宴開岸邊亭子號流杯沉檀刻作神仙女對捧金尊水上來其四十九慢梳鬟髻著輕紅春早爭求芍藥叢近日承恩移住處夾城裏面占新宫其五十别色宫司御輦家黄衫束帶臉如花深官内苑承恩慣常從金輿到日斜其五十一日髙房裏學圍棊等候官家未出時為賭金錢爭路數専憂女伴恠來遲其五十二摴蒲冷淡學投壺箭倚腰身約畫圖盡對君王稱妙手一人來謝一人輸其五十三慢揎羅袖指纖纖學釣池魚傍水簾忍冷不禁還自去釣竿長被别人拈其五十四宣徽院約池南畔粉壁紅籹畫不成總是一人行幸處徹長聞奏管絃聲其五十五丹霞亭浸池心冷曲沼門含水脚清傍岸鴛鴦皆有對時時出向淺沙行其五十六楊柳隂中引御溝碧梧桐樹擁朱樓金陵城共滕王閣畫向丹青也合羞其五十七晩來隨駕上城遊行到東西百尺樓回望苑中花柳色緑隂紅艷滿池頭其五十八牡丹移向苑中栽盡是藩方進入來未到末春縁地暖數般顔色一時開其五十九明朝臘日官家出隨駕先須㸃内人回鶻衣裝回鶻馬就中偏稱小腰身其六十盤鳳鞍韉閙色裝黄金腰胯紫游韁自從揀得真龍種别置東頭小馬坊其六十一翠輦每隨城畔出内人相次簇池隈嫩荷花裏揺船去一陣香風送水來其六十二髙燒紅蠟㸃銀燈秋晩花池景色澄今夜聖人新殿宿後宫相近覓祗承其六十三苑中排比宴秋宵絃管琤摐各自調日晩閣門傳聖㫖明朝盡放紫宸朝其六十四夜深飲散月初斜無限宫嬪挿亂花近侍媫妤先過水遥聞隔岸喚船家其六十五宫娥小小艷紅粧唱得歌聲遶畫梁縁是太妃新進入坐前頒賜小羅箱其六十六池心小様釣魚船入翫徧宜向晩天掛得綵帆教便放急風吹過水門邊其六十七傍池居住有漁家収網揺船到淺沙預進活魚供日料滿筐跳躍白銀花其六十八秋晩紅粧傍水行競將衣袖撲蜻蜓回頭瞥見宫中喚幾度藏身入畫屏其六十九御溝春水碧於天宫女尋花入内園汗濕紅粧行漸困岸頭相喚洗花鈿其七十昭儀侍宴足精神玉燭抽看記飲巡倚賴識書為録事燈前時復錯瞞人其七十一後宫阿監裹羅巾出入經過苑囿頻承奉聖顔憂誤失就中常怕内夫人其七十二管絃聲急滿龍池宫女藏鈎夜宴時好是聖人親捉得便將濃墨掃雙眉其七十三宻室紅泥地火爐内人冬日晩相呼今宵駕幸池頭宿排比椒房得暖無其七十四三清臺近苑墻東樓檻層層映水紅盡日綺羅人度曲管絃聲在半天中其七十五髙亭百尺立春風引得君王到此中床上翠屏開六扇折枝花綻牡丹紅其七十六内人承寵賜新房紅紙泥窻遶畫廊種得海柑才結子乞求自過與君王其七十七翡翠簾前日影斜御溝春水浸成霞侍臣向晩隨天步共看池頭滿樹花其七十八金碧闌干倚岸邊卷簾初聽一聲蟬殿頭日午揺紈扇宫女爭來玉座前其七十九嫩荷香撲釣魚亭水面文魚作隊行宫女競來池畔立倚簾呼喚勿髙聲其八十新翻酒令著詞章侍宴初聞意却忙宣使近臣傳賜本總教諸院遍抄將其八十一畫船花舫總新粧進入池心近島傍松栢鏤窻楠木板暖風吹過四圍香其八十二西毬塲裏打毬囘御宴先從苑内開宣索教坊諸伎樂傍池催喚入船來其八十三年初十五最風流新賜雲鬟使上頭按罷霓裳歸院裏畫樓雲閣總重修其八十四春來睡起曉粧成隨侍君王觸處行畫得自家梳洗様相憑女伴把來呈其八十五寢殿門前曉色開紅梔藥樹間花栽君王未起珠簾卷宫女更畨上直來其八十六海棠花發盛春天遊賞無時列御筵遶岸結成紅錦帳暖枝低拂畫樓船其八十七日晩宫人外按囘自牽驄馬出城隈御前接得高义手射得山鷄喜進來其八十八朱雀門高苑外開毬塲空濶淨塵埃預排白兎兼蒼狗等候君王按鶻來其八十九㑹仙觀裏玉清壇新㸃宫人作女冠每度駕來羞不出羽衣初著怕人看其九十老大初教作道人鹿皮冠子淡黄裙後宫歌舞全抛擲每日焚香事老君其九十一法雲寺裏中元節又是官家降誕辰滿殿香花爭供養内園先占得鋪陳其九十二酒庫新修近水傍潑醅初熟五雲漿殿前供御頻宣索進入花間一陣香其九十三白籐籠搯白銀花閣子門前寢殿斜近被宫中知了事每來隨駕使煎茶其九十四金章紫綬選髙班每每東頭近聖顔材藝足當恩寵别只堪供奉一塲間其九十五安排竹栅與笆籬養得新生鵓鴿兒宣受内家教餵飼花毛間著總皆知其九十六内人深夜學迷藏遍遶花叢水岸傍乘興忽來山洞裏大家尋覓一時忙其九十七小院珠簾著地垂院中排比不能知羡他鸚鵡能言語窻裏偷教鸜鵒兒其九十八島樹花低約浪痕苑中斜日已黄昏樹頭未刻雙飛鶴颺起晴空映水門其九十九小雨霏微潤緑苔石楠紅杏傍池開一枝挿向金缾裏捧進君王玉殿來其一百錦鱗躍水出浮萍荇草牽風翠帶横恰似金梭攛碧沼好題幽恨寫閨情劉希夷蜀城懐古詩云蜀土饒水竹吳天積風霜窮覽通表裏氣色何蒼蒼舊國有年代青樓思豔粧古人無嵗月白骨宜丘荒寂厯彈琴地幽流讀書堂𤣥龜埋卜室采鳳滅詞塲陣圖一一在栢樹雙雙行鬼神清漢廟鳥雀叅秦倉歎世已多感懷心益自傷賴䝉靈邱境時當明月光宋祁覽蜀宫故城有作云國破江山老人亡岸谷摧鴛飛今日瓦鹿聚向時臺故苑猶霏雪荒池但刼灰赬遺糊處壤記數殘枚恨月窺林下悲風覓隴來依城狐獨速失厦燕徘徊廢社纔存樹隂垣自上苔有情惟杜宇長為故王哀唐盧求成都記序略云蜀郡太守自秦惠王滅蜀始而李氷文翁其最著者益州刺史自漢武帝開疆始而王遵王襄其最著者始時寔一官也而興廢異焉劉先主于益州置牧蜀郡置守而官始分矣晉太康以刺史治太城郡守治少城而地亦分矣改益州為劍南節度使自唐天后始改蜀郡為成都尹自明皇西巡始其後州郡亦得相兼焉宋知成都府事者徃徃以宻直使相稱簡貴尊重淳化初雖降為州而體自若乃中興小厯所載則以蜀有都轉運使遂罷制置之設而張燾且得以成都行四川民事矣其公署邸閣留題碑記間者班班可考焉轉運署舊有燕思堂堂上爽西樓趙清獻再入蜀所建文同與可記之於前李石知幾記之于後矣轉運司園亦稱西園園中有西樓有錦亭一名翠錦亭章楶詩序云轉運西園是偽蜀權臣故宅爽塏清曠隨處足樂于是作為十詠羣公咸和之備録以志其盛云爾西園詩云古木鬱參天蒼苔下封路幽花無時歇醜石終朝踞水竹散清潤煙雲變晨暮何必憶山林直有山林趣玉溪堂詩云堂因水得名方沼當其後漪瀾蕩榱桷囱戸挹花柳蟲魚不避人鷗鷺若相友午枕夏簟涼此樂亦奚有雪峯樓詩云層構壓池塘不僭亦不偪影浮江水静寒逗雪山色撫檻接修竹連簷引蒼栢注目望長安無那濃雲隔海棠軒詩云珍葩寄幽島正對孤山植優游自俯仰紅緑若組織春酣晴日熏坐久濃香逼池面淨可鑒朝霞罩澄碧月臺詩云蜀地饒夜雨輕隂多蔽天見月月無幾築臺待嬋娟高凝桂影近俯視雲屋連顧盻已塵外欲挹瑶宫仙翠錦亭詩云楩楠百尺餘排列栱簷際畏日自成隂隆冬寜滅翠虚曠得寂理懶癖資濃睡誰知官府中獲此冲漠味潺玉亭詩云傍砌釃小渠迴環是流水石蜃吐珠涎清響醒人耳風微竹影碎月皎波光起颯爽無塵囂静適心所喜茅菴詩云竹間構圓菴所向自蕭灑珍禽弄巧舌宛是居山野嘿坐見真心萬縁盡虛假叨陋尋尺地兹焉息意馬水閣詩云架木浮水中略彴通孤島扶疎花影斜撥剌跳魚小風月所得多經營信云巧隠几寂無人朱欄萃幽鳥小亭詩云花邊二小亭雙跨清渠上規摹雖甚隘幽僻良可賞幸依嘉木隂未羨大厦廣不足延賞朋携笻常獨徃吳師孟和云十紀權臣第修城外臺宅喬木不知秋名花數逾百逺如山林幽近與塵埃隔惠政裕一方民猶以為窄又華構枕方塘使臺寂佳致二色真楠材輪奐極精緻花木四面圍如立復如侍一道仰澄清此是澄清地又西北有高樓梁棟雲常起簷牙挂連蜷欄影揺清泚爽氣雪山來一瞬極千里但欲攄逺懷無憂可銷弭又花溆對髙軒如用丹青彯錦水一匳紅玉臺千面笑松篁兩翠幄常䕶東西照子細看韶妍方知化工妙又雅意待蟾光煩襟期爽快無雲㸃太清逺覽周色界天宇淨琉璃露下真沆瀣勤渠諗後人宜葺不宜壞又東閣治臺政西堂備燕飲介于二堂間華構饒花品紅紫鎮長春四時如活錦公暇一繩床上有通中枕又至人泉石心俚耳便絲竹釃渠逗清泠朝夕淙寒玉試聽自然聲不減雲璈曲却返倒聞機五音常自足又結茅為圓屋環堵不開牖齋居如㕍堂廣長纔六肘深藏子猷竹不植陶濳柳勿起滅定心宴坐空諸有又形制似方橋島岸相連屬春和逗凉颸晝影浮淨緑佳人羅韈輕花時相步續澄瀾忽生暈下有雙鳬浴又尺水走庭除花木皆周匝雙亭正相值僅能容一榻公餘時獨來隠几聊嘘匼典謁或通名東榮有賓閣許將和云高牙負北郭芳園路西轉鳥鳴戀故木蘭茁歸新畹坐延花景深行倚笻杖穏翳然想林水㑹心不在逺又朱堂俯玉谿玉谿清且幽從公蹔息偃撫景空夷猶浮雲冠圓島白日回方流秪此有光碧何必崑崙洲又重樓起城隂乘髙望西極列峯横青天飛雪千里積疑是空素山冬夏海中白莫恠頻東向上有思歸客又海棠冠蜀花此軒花尤冠紅雲簇蘂細緑水照葉嫩倚粧宫粉聚疊綺霞光散雨淚㸃春風應懷上林怨又蜀地山四維益州平如掌累臺鬱臨風坐看月宵上稍出叢木末始發衆籟爽兹焉蹔遊目一攬天地廣又闌干竇溜長􅌄窱空埃静修林宻葱翠盡得錦城錦雲舒青青色風㪚搔搔影未為夜行人共此晝遊永又引泉注清渠潺潺漱寒玉側出閬風遲驟驚江雨速飛瀬乍颺白樛木細涵緑晝夜流不止肯效楚人哭又茨茆以為菴環堵蕭然虛内樂茍自足容膝亦有餘旁依修竹宻上翳青松疎勿言此中陋中有君子居又飛閣出方池修曲見空莽旁臨花塢近平覺春波長反景澄餘暉夕隂帶浮爽從容觀魚樂不減遊濠上又翩然溝上亭左右相映帶修柟列翠幄長松偃髙盖地褊景逾寛處約志彌泰誰知坐嘯間心遊萬物外豐稷和云仙化二十四境逺難遍探錦城使君園雅與雲洞參囘光試一覽紫翠絕西南池映金波淨花沾玉露甘又一水從何來應是崑山頂釃成緑玉池虛堂逗清影公退泠然賞了非心外境魚泳陽光動鳥啼春晝永又雪峯在何許樓倚青霄端每來注心目不覺生羽翰終藉好風力雲散銀闕攢隻履西歸客應笑空倚欄又文錦初動機晨霞欲敷照香傳雪樓濃影落玉溪倒子美不能賦春工一何妙惟有賞心人相逢秪微笑又石印魚在屏犀透星入角迺知明月光日用人不覺陟此百尺臺餘念坐消剥洞曉弦望機仙丹兹可學又簷外列修木凛凛正人氣有德必有文爛兮五色備豈同夭韶花弄春張繡被須信輪囷材堪為萬乗器又養源在西山如玉抱精白引之落錦渠厯耳不可擇風雨雜鳴球珠璣瀉雲液恰似偃谿聲醒悟迷途客又覆以潔白茅環以琅玕竹天籟傍鼓笙月沼對鋪玉借問清坐翁此外更何欲笑指博山鑪香飛栢子緑又長虹臥松江一葦航大河豈如此安穏無復畏風波幽香翠花島魚藻㫖且多徙倚小欄曲月色透薜蘿又東西對孤騫杖屨可休歇容光日月來矧此明四徹鱗木張幄翠蜃樓飛玉潔徃徃得意時宛在廣寒闕楊怡和云池臺宻相望曽是故侯宅賞心知幾人喬木已百尺低花拂烏帽古蘚駮蒼石欲問昔豪華秋風掃無迹又虛堂已深窈那復要營室使君寂無事閉閣臥終日臨池狎清泚養竹聽蕭瑟不為省春耕軺車肯輕出又翛翛樓下竹㶁㶁竹間水樓髙雖不見清響長在耳晨光露星崦積玉照窗紙崑閬亦何人當從跨金鯉又花如窈窕人宛在水中沚當軒有餘好終日玩芳蘤池清藻壓枝波動魚爭蘂錦帳想含春歸心浩然起又嘉木宻交隂月夕苦薈翳髙臺出林杪逺目望天際不厭清露寒秪恐輕雲蔽可但少陵翁能思斫仙桂又峩峩碧油幢矗矗羽葆盖燕居不廢嚴環竦布亭外濃隂生晝寒㣲吹發天籟隠几對凝香衣冠嗒如蛻又使君漱流心官府未始忘亭下玉溪水撲碎白玉璫清耳不待洗髙懐自滄浪安得援瑶琴寫此聲琅琅又緝茅如蝸廬容膝纔一丈規圓無四隅空廓含萬象繩牀每宴坐不與物俯仰惟許嵗寒君虛心環几杖又小閣平池陽危橋屬花嶼杖屨樂幽閒龜魚䕃深阻刻柱記新漲弄水滌煩暑物我久相忘珍禽近人語又方亭惟四柱對峙花竹間下有雪嶺水淙流日潺潺宛如雙綵舸纜向春波灣欲起江湖心而柰風濤艱杜敏求和云潭潭刺史府宛在城市中誰知園亭勝似與山林同幽鳥語晴晝好花嬌春風物情如有待賦詠屬詩翁又堂前對花柳堂後瞰沼沚賸有堂中人虚心湛如水煩暑當風囱中宵隠月几作詩紀勝槩詩與水清泚又西山最髙峯積雪連四季登樓試寓目八國有故地烽堠雖久息武經思豫備丈饒昔籌邊公意今無媿又東風開百花獨有海棠勝猩血染珠璣㸃綴枝頭賸日暖錦段新雨餘燕脂凝何時東閣梅方能動詩興又月從海上來皎皎入我牖何如登髙臺對月把尊酒問月月無言浩歌詩千首幾人知此樂此樂公所有又材大難為用嘗誇古栢篇亭前老楩楠黛色亦參天夏暑借清隂秋籟得自然有如愛庭楸朝暮東西偏又林亭幽且深砌下玉谿水淙琤環佩聲曉夕清心耳使君性所樂愛玩不少已方持利物心黙坐窮至理又深深竹林下圓菴最幽僻髙懷本恬曠野趣助閒適衆人奔名徒浮世榮物役豈知菴中樂道勝心自逸又方池導流水横閣上尋丈晨犧夜月光罩影相滉漾游魚時出沒飛鷗亦下上終朝倚欄干不見有風浪又二亭雖云小好在泉石間白石自齒齒清泉亦潺潺公府無留事暫來寄餘閒笻杖烏角巾一日幾徃還宋李良臣東園記云益州路兵馬鈐轄种湘治其後圃為池亭臺榭植佳華蓻美木館宇星陳欄檻翼翼舊有池焉泉竇湮塞涸為枯泥偶新泉破地而出從而導之則故泉繼發觱沸衍溢种公築堂其北命之曰雙泉挾以二軒一曰錦屏以海棠名一曰武陵以桃溪名梁池而南為亭曰寒香以梅名後為茅亭曰幽芳以蘭蕙名池東為大亭曰三雨以桃杏棃名池南兩亭東西對峙曰緑淨曰連碧雙亭之北有老栢數十株巨幹屹立為亭其中曰翠隂復樓其東曰朝爽西因垣而山曰五峯下曰五峯洞前為山館水繞環之宛如山間文同丹淵集云成都鈐轄東園有梅樹樹下有素芳亭慶厯中四方館使太原王公府尹程公賦詩刻石存焉後二十年太原之子道恭及趙閲道又飲于亭上賞梅賦詩俾與可序之詩詳見方物記中張詠剏設記曰王建孟知祥迭稱偽號乾德初王師弔伐申命㕘知政事吕餘慶知軍府事取偽冊勲府為治所淳化甲午降府為州至道丁酉歲詠始議改作東因孟氏文明㕔為設㕔廊有兩樓中門立㦸因王氏西樓為後樓樓前有堂堂有掖室室前迴廊南為暖㕔㕔屏有黄筌畫雙鶴花竹怪石在焉名曰雙鶴㕔次南為凉㕔㕔壁有黄氏畫湖灘山水雙鷺在焉名曰畫㕔凉暖二㕔便寒暑也凉㕔西有都㕔㕔在使院六十間之中所以便議公也院北有節堂堂北有正堂與後樓前為次西位也節堂西通兵甲庫所以示積藏也凉都二㕔南列四署同寮以居前門通衢後門通㕔所以便行事也公庫直室客位食㕔之列馬廐酒庫園菓疏流之次四面稱宜無不周盡疎篁奇樹香草名花所在有之不可殫記東挾戍兵一營南有軍資大庫改朝西門為衙西門去三門為一門凡得僭偽之迹屋大小七百四十間二營不在數張俞府衙新書堂詩引云虢略楊保臣由將作屬官隨侍于益府新闢書堂延儒者講文藝俞作新書堂詩以贈之云志士營道日築室養賢名鋤荒出幽邃掃室迴虛明山嶽凌墻壁谿塘瀉窗楹蘭蘅露景晩松桂秋風生琴瑟閑古奏樽罍湛寒清黙意馳萬象遊心覽八紘羣經互粲粲百氏紛營營禮樂立制作文章懸凖程唐虞化已逺周禮道尚行師友得正士講論無俗聲邪哆不可入紛華固難傾修辭力工巧厲學逾農耕天爵既自後人文取其榮元侯方作鎮列士爭獻成學校溢都市謳吟洽黎氓寧同稷下議飽食談縱横銅壺閣亦稱郡樓乖崖公鎮蜀時通夕宴坐郡樓上鼓畨漏水厯厯分明一刻差誤必詰之守籤者服為神明公謂鼓角為中軍號令不可不謹爾京鏜帥成都首訪兹閣屹然自若銅壺漸失實矣因詢其漏法則寅申己亥陟降其水者凡四既無所依據且其箭以七日半為等日升一刻必驟進之前郤頻數不無差忒知成都縣事臨卭宋朝英於是始更其法測午中之晷為升箭之初畢百刻而後易仍以厯象考七十二候初末昏明晝夜長短之數日異旬殊差布于箭乃為亭其下圖刻漏製鑱諸石且名以惜隂建安吳栻記云府門稍東垂五十步慶厯四年知府事蔣公堂作漏閣以直午門以八分大字題額曰銅壺巋然南向一府之冠也崇寧初閣灾政和元年栻承乏尹事始至府視閣故處累土如臺然問吏吏曰前尹蔣即臺為門治材略具朝廷亦嘗賜度牒售錢六百萬有奇尹去弗克成問錢與材今安在曰材為他所繕修輟用之錢則帑官専輙兑費矣栻曰午門者臺門也兹唯閣之宜奚臺之有即日便撤累土圖閣如慶厯時通閣上下一十有四間其髙一丈六尺有五寸廣十丈深五丈有六尺審曲靣勢丹堊是飾瓴覆甓甃厥有彛度中設關鍵闢闔惟謹閣成初置天聖中燕梓州肅所制蓮花漏於其下閣灾漏毁閲十載更六尹於兹而閣成漏悉如燕製匱一壺一泉一箭四十有八銅烏逼水而下金蓮浮箭而上氣二十四候七十二百刻十二辰率是箭而定云歲華紀麗天禧初趙稹為守三月三日開西樓亭榭俾士庶游觀自是每嵗寒食闢園張樂酒爐花市茶房食肆過于蠶市士女縱觀宋田况寒食開西園詩云春風寒食節夜雨晝晴天日氣薫花色韶光徧錦川臨流飛鑿落倚榭立鞦韆檻外游人滿林間飲帳鮮衆音方雜遝餘景更留連座客無辭醉芳菲又一年宋祁衆熙亭曉矚詩云長夏宜高明緩帶散煩窘憑軒一超然目與天俱盡山從雲端現日就林外隠風來草樹披煙生井閭近自公况多暇冲臆無留藴即此可宴居何須事遊軫西樓詩云炎氛隨日入岑寂坐遥帷倦鶩昏投浦驚蟬夜去枝桂華兼月破槎影帶星移珍重窻風好羲人即此時吳中復西園十詠詩序云成都西園樓榭亭池菴洞最勝者凡十所又於其間勝絶者西樓賞皓月眺岷山衆熙臨清池濯錦水志殊土之産有方物快䕃樾之風有竹洞雜花異卉四時遞開翠幹茂林蔽映軒戸足以㑹賓僚資燕息因題十詠以見登覽之盛也西樓詩云信美他鄉地登臨有故樓清風破大暑明月轉高秋朝暮岷山秀東西錦水流賓朋逢好景把酒為遲留衆熙堂詩云亭枕方塘上軒開四照新花涵清露曉風卷緑波春日暖眠汀鷺荷翻躍錦鱗熙熙遊宴地行樂慰西人竹洞詩云隂森過百步屈曲鎻莓苔翠色寒無改清風時自來葉籠蒼玉幹路入碧雲堆吏散無公事支笻到幾囘方物亭詩云草木蟲魚部披尋自古無飛沉天産異生植土風殊物色隨心匠形容記繢圖虚亭玩真意浩思滿江湖翠栢亭詩云衆木墜黄葉皴皮抱翠枝自然根性在不為雪霜移靈潤承多露清隂貫四時婆娑嵗寒意每到坐遲遲圓通菴詩云對此圓通境陶然勝静齋觀空無物我扣寂外形骸燕坐埋遺照虚名莫疚懷人間憂樂地所喪甚山崖琴壇詩云瀟灑琴壇上賢侯養道情無今亦無古求意不求聲林邃風初静雲収月乍明拂弦成一弄塵思浩然清流杯亭詩云結客乘公暇流觴逐浩歌亂峯晴倒影曲水宛迴波小海逢元已蘭亭記永和西州行樂事應比晉賢多喬柟亭詩云木占西園勝亭延上客過色無花卉妬堅為雪霜多幹有千年秀根含一氣和明堂求厚棟可得老巖阿錦亭詩云簾幕臨雕檻窗疎照爛霞園林初過雨風日猛催花香入遊人袖紅堆刺史家四時俱好景終不似春華唐書李德裕建籌邊樓于成都府治之西四壁圖蠻夷險要日與習邊事者籌畫其上女校書薛濤上籌邊樓詩云平臨雲鳥入窗秋壯壓西川四十州諸將莫貪羌族馬最高層處見邊頭宋陸游曰籌邊樓故基莫攷淳熙三年制置使知府范公成大重建卜地在子城西南隅樓既成公自作水調歌頭云萬里籌邊處形勝壓坤維恍然舊觀重見鴛瓦拂參旗夜夜東山銜月日日西山横雪白羽弄空暉人語半霄碧驚倒路傍兒分弓了看劍罷倚欄時蒼茫平楚無際千古鏁煙霏野曠岷嶓江動天闊崤函雲擁太白暝中低老矣漢都䕶却望玉闗歸按今籌邊樓在都院之東掖隨使節而遷者李燾云華陽縣主簿㕔有㑹昌中壁記乾符中柱刻㑹昌迄今三百年成都千門萬戸時遭焚裂求徃日之破甓斷檻殆尺寸莫獲而此㕔事獨存圬墁朱墨不改其舊是豈偶然耶為之記而刻諸梁上蜀中廣記卷四
