body:
  text: 蜀中廣記卷二十五明曹學佺撰名勝記第二十五川北道保寧府二巴州山曰大巴小巴世所稱九十巴山也志云大巴之險遇于棧道下逼漢中又云小巴之南即古巴國繫年録云巴之北境即米倉山下視興元出兵之孔道即今關堡相望矣輿地廣記云巴江源出大巴山至當州東南分為三流而中央横貫勢若巴字通志云清江源出廣元縣前通平鎮歴舊恩陽縣至州與巴江合寰宇記云清水一名白石水即向白石縣之所理也李白巴水歌云巴水急如箭巴船去若飛十日三千里郎行㡬嵗歸嚴武巴江喜雨詩云連夕霶􅑛類建瓴送將凉意滿郊埛江邉萬木大半緑天外一峰無限青却信神龍元解事豈容旱魃更爭靈從今懷抱如冰釋閉閣燒香伴六經鄭谷巴江避亂詩云亂來奔走巴江濵愁客多於江徼人朝醉暮醉雪開霽一枝兩枝梅探春詔書罪已方哀痛鄉縣徴兵尚苦辛鬢秃又驚逢獻嵗眼前渾不見交親華陽國志漢末劉璋以墊江以上為巴郡江州至臨江為永寧郡朐䏰至固陵為巴東郡而巴遂分矣志云此居其中為中巴宋洪邁丹梯書院記云今之巴非昔之巴也本志忠義廟祀漢嚴顔張飛名宦載王濬恐但沿巴之名然按碑目嚴將軍廟記在巴州城西門内唐貞元元年韋曾文則祀之亦非一日矣惟嚴武薛逢為巴州守則今之巴也杜甫寄馬巴州詩云勲業終歸馬伏波功曹非復漢蕭何扁舟繫纜沙邉久南國浮雲水上多獨把魚竿終逺去難隨鳥翼一相過知君未愛春湖色興在驪駒白玉珂嚴武巴嶺荅杜二見憶云卧向巴山落月時兩鄉千里夢相思可但步兵偏愛酒也知光禄最能詩江頭赤葉楓愁客籬外黄花菊對誰跂馬望君非一度冷猿秋鴈不勝悲鄭谷巴賨旅寓寄朝中從叔云驚秋思浩然信美向巴天獨倚臨江樹初聞落日蟬衰榮悲往事漂泊念多年未便甘休去吾宗盡見憐王周和杜運使巴峽地暖節物與中土異黯然有感詩云垂柳參差破緑芽此中依約欲飛花春光是處傷離思何况歸期未有涯其二云始看菊蘂開籬下又見梅花寄隴頭攬轡巴西官局冷㡬憑春酒沃鄉愁張褘巴州寒食晩眺云東望青天周與秦杏花榆葉故園春野寺一傾寒食酒晩來風景重愁人任約和巴州羊刺史韻云鄉關目斷隔咸秦又向巴江度一春可惜清明好時節看花空憶洛陽人治内有春風樓秦坦記云奇峰森列躍入青漢髙下眩轉隔閡風雨又有擊甌樓唐張褘詩駐旌元帥遺風在擊缶髙人逸興酣水轉巴文清溜急山連䝉岫翠光涵宋馮介詩坐上擊甌清似玉者此也碑目云擊甌樓唐中和四年尚書右丞相戸部張褘記賦在樓下按擊甌樓賦寔張曙作也序略云宋玉九辨悼余生之不時也甲申竄身巴南避許潰師郡刺史甚懽按眷一日登郡南樓下臨巴江饌酒簇樂以相為娛言間有馬處士攜善擊甌者至請即清讌爰騁妙絶處士審音以知聲余審樂以知化斯可以抑揚放淫頓挫匏竹運動節奏出鬼入神太守請余賦之余曰不圖為樂之至於斯酒酣䑛筆乃為賦云爾宋皇祐初知軍事馬預作記㠯為㕔壁有唐御史裴褘會昌四年記宋庶子創建東樓此其事也碑目云州内有紫極宫天王堂俱唐大中元年軍事判官進士蕭珦記有折柳亭宋嘉祐五年太守鄭淵賦折柳詩十絶句刻石有巴南十七景詩宋知閬州軍蘇欽以閬中望江南十首記郡景别駕彭永仍賦巴南十七景答之碑目又云唐會昌四年巴州刺史裴褘修廨宇記巴南新置屋宇什物石記俱在郡㕔城外東龕在字江東㟁巾子山下即唐兠率寺寺廢碑存西龕有古墨岩在懸崕上有壯觀二大字云是李太白筆有流觴亭在西龕寺碑目云唐乾元戊戌嚴鄭公武所創大厯間盜起地遂廢開成丙辰刺史唐元封復修葢取羊士諤流盃十四詠以自序為證又云有嚴侍御暮春五言刻亦在寺内有唐人題西龕櫻桃其名磨滅按州志城北三十里皷樓山之旁有玲瓏山山頂有泉出小石如櫻桃自然有竅可以穿縷村兒女以為瓔珞名曰櫻桃珠如此則西龕所詠為石為果未可知也嚴武題龍日寺西龕石壁詩云聖澤久潤物皇明常燭幽恩從祥風翺德與和氣遊報國建香刹開蠻臨僻州天長面緑水地逈起朱樓尋異遍衆壑坐禪逢一邱永懷根本玅誓以身心修奇色豔草滿珍名嘉樹稠逺江崩濤喧複澗微雨休嘹唳􅆐響谷參差峰入流碧烟曳篁徑白日懸沙洲泛海謝安石吟詩王子猷揚雄愛清靜山簡多優游性分固有適蓍龜何足求神閒孤臺月目送千里舟㩦手逸羣品浩歌邈悠悠山情慕禽尚詩格警曹劉旌能舉滯時選異㧞奇儔鼎食當自致巖棲難久留嗟余參符守漢主逺分憂往往行春到聞鐘散客愁朱尹㳺西龕詩朝出城南門循溪陟西嶺西嶺鬱岧嶤坳隱金僊境懸崖古墨存白日蛇龍煚嵐霏濕空濛泉澗咽清冷汲之㵸山茗數啜心魂醒城郭瞰在襟三墩聯九井四野各嬉煦犬䑕亦無驚豈曰予所能帝德實綱領獲兹簿書餘怡情對斯景任約題西龕詩門徑森寒栢小橋穿竹溪澄江朱檻北晩照碧巖西修竹清泉逗髙楠䆳閣齊虛廊面青壁危棧跨丹梯絶頂舒平席遙峰出半圭軒窻俯星斗襟袖拂雲霓甘露春膏浹濃嵐晝靄迷嶺猿悲夜嘯谷鳥響晴啼唐寺南龕近巴城東郭低杯流故池水崖刻古人題酷暑不能到清風如鎮㩦何年脱韁鎖來此養真棲自註今嵗甘露降于龕前松栢也南龕有廣福寺志云唐時建有乾元年間契書碑目云唐古佛龕石刻在城南二里大書乾元三年山南西道嚴武奏臣頃牧巴州其州南二里有古佛龕舊有鐫佛五百餘伏望特賜洪名勑以光福為額唐詩紀事載嚴武史俊楠木唱和詩碑目云刻在南龕又云郄昂陪嚴使君暮春五言二首在南龕詩甚典麗又云南龕題詩石刻在州南二里之廣福寺自唐迄今名公題詠皆存又云南山記唐中和四年尚書右丞相戸部張褘題圖經云定僧在南龕上以漆漆其真身龕置石壁不知何時人惟嚴武奏乞山南寺額表云願度有道行僧永以住持俾其修習意亦唐以前人也本州志云丹梯書院在南龕山因其山重疊聳秀有若丹梯而名舊志載杜甫曾讀書于此而建後經兵燹宋紹興二年知州趙彦戒重建元季復燬惟古碑尚存唐進士楊興義有和杜甫詩云莫嫌袍紫歸家阻且慶豐年雅俗安又題秋風詩云霜風一夜將紅葉換盡江頭萬木青通志云南龕有雲間閣杜甫寄嚴侍御詩遙知簇鞍馬回首雲間閣者此也宋權維重修雲間閣記云閣在南龕絶頂剏自李唐嵗久敝壞寺僧請易而新之不閲月間碧瓦朱甍雕梁畫楯突然聳出于羣山之表暇日置觴倚檻周覽巖壑萬狀雲烟出沒朝暮變熊曾無窮已則昔之隱狀晦藏而不見者今若神驅而出之皆離潜出幽吐奇露彩章章于目前也羊士諤遊南龕詩云物外真何事幽廊步不窮一登心法在三世影堂空山果青苔上寒蟬落影中歸來還閉閣棠樹㡬春風趙公碩和郭使君題南龕韻云南龕㡬百年古木闞雲崦崕傾千仞垂路懸一線險飛狖喜層巔羸驂怯虛塹楓葉紅斕斑松葢翠搖颭石皴風雨剥殿古丹青儼拂拭坐空巖摩挲觀翠琰江勢從何來斗起不以漸憑危意欲飛眺逺目驚覢鳥鳴山更幽緑淨衣好染烟際漾漁舠風前亂霜檿縱實有餘歡髙懷無一慊尺璧非所寳白圭焉受玷入蜀真可念得郡亦云忝雖逺長安日猶勝陽山貶平生足疎曠寧復事拘檢佳時方一來薄日已半晻雨餘烟草深月堕山樓黶珍重詩律髙詞獲神光閃民樂樂時康吾憂憂嵗歉殷勤謝呉霜歸鬢不堪㸃相連有美農臺志云在治南二里相傳昔梁太守桓宣於此勸農而築今廢址不存有唐太子賢墓志云在治南二里髙如一小阜唐史髙宗上元二年夏四月立雍王賢為太子永隆元年八月廢為庶人開耀元年冬十一月徙於巴州中宗嗣聖元年太后殺故太子賢太子嘗作黄𤓰臺辭云種𤓰黄臺下𤓰􅌻子離離一摘使𤓰好再摘令𤓰稀三摘尚云可四摘抱蔓歸當時有銘其墓者云斷一指得天下凡人不為殺愛子竊帝位武后行之噫嘻賢之遺隧萬世之元龜北龕志云在北山一里有白馬泉九州要記云即黄牛山有穴白馬奔出故名碑目云王望山舊名北山山半石壁隱出老君像唐人為賦北山老君影迹詩圖經云王望字子濛開元初嘗與𤣥宗遇俗傳為晉時人旦跨白驢入長安市暮復回勝覽云王望山在江之北岸自郡城絶江而登山髙二里許岩徑極險占一郡之勝相傳王真人得道此山真人名蒙故名王䝉山舊志云唐𤣥宗控白騾至此山望見京闕曰此去京師不逺故名王望志云龍洞在王濛山岩腹間楊羲仲記云左曰東洞門如鑱鑿髙㡬三百尺耀若太儀之庭兠率之宫又百餘步則空穴開明有琉璃洞及釋迦像石犬石烏凡石之詭形怪狀莫不畢獻又六七里適後山之根右曰西洞其奇怪亦亞于東洞楊虞仲逰王望山詩云白雲環其巔流水遶其趾古木與雲齊偃蹇龍蛇似飛仙𣺌何許風馭難慕企手種空流傳嵗月尚誰記化鶴空歸來其樹還可指僊凡隔咫尺世人謬千里丹竈空伏火河車爭挽水學僊僊益逺槁死空山裏我欲問真訣豈憚航一葦便當捐冠簮超然謝塵滓僊人拍手笑外物儻來耳有君子泉宋黄彛則銘云有冽者泉達於泉南浩然天中其流無窮于暑而涼于冬而温豈其矯耶有變者存州志云未詳所在惟治東四十里廢曾口縣西朝陽巖有之其泉自巖石流出清冽無比上鐫有君子泉三字宋人來官多逰于此石刻具存今附録于後嘉定壬申夏五月朔邑令會稽宋拱闕尉錦屏鮮于永清避暑來集拂巖雲弄泉玉倍有山水之樂所謂意不在酒也銅梁曹闕龍馮伯規何孚望古郫李忠父同逰此汎舟酌巖下日西乃歸淳熙己酉閏月十有二日巴州都監權縣尉義渠毛仲子中通江曾口縣巡檢崆峒王願天啟通江縣尉長安永延年仁叔淳熙八年十月二十一日同逰朝陽岩邑宰蓬池何渙之亨通邑尉漢中李元竦子莊以閏正月下澣日逰曾口故縣基野飲于修篁古木之下絶江少西息朝陽巖酌君子泉流連至􅊕而歸旹乾道九年也有几水方輿云水形如几奇章縣臨之志云舊其章縣在州東八十里陸游過竒章僧刹詩轉盡窮山入翠微松陰拂拂冷侵衣長天秋水自一色斷岫孤雲空四飛客路何年閒馬足蟠溪平昔負漁磯僧牕不得吟清晝又擁籃輿到夕暉有平梁城宋淳祐都統張實創築取掃平梁州之義也下有平梁洞妙通居士羅南仲所居有石床石灶按舊城記云平梁山頂有地數十畆居民數戸在上住種納税矣志云在州西二十里有化成縣輿地紀勝化成縣鳯谷山之上有要羊觀熙寧中通守楊黄中記云唐明皇與葉法靜神遊於羊䝉山忽思豢羊山靈遽以羊進詔于其地立觀今名廣福志云在州西四里唐喬琳巴州化成縣新移文宣王廟頌云殷之系聖周之斯文生我夫子世教之君周微唐興千祀于兹春秋祭菜爼豆其時維巴之南亦掲其宇盧公宰邑人之父母假我升堂陋彼環堵爰就爽塏長松之下公之志思人亦勤止變此夷俗參乎孔里學者行之造次于是矣有恩陽縣碑目云唐貞元石刻在恩陽縣南渡江登石梯數百級上義陽舊縣治石梯之側懸崖上有刻字云唐貞元四年十月二十日再修此路餘皆磨滅不可辨又云大厯初韋應物送令狐岫宰恩陽詩亦刻石于縣之驛亭小説摭遺云古靜州知州王鶚子讀書于義陽山忽一女子前自稱為張笑桃題紅梅詩于壁墨跡未乾遂不見人疑為梅仙以山屬平梁故志于此詩云南枝向暖北枝寒一種春風有兩般頻上髙樓莫吹笛大家留取倚欄杆按恩陽即義陽也詳見通釋又西北百里有大牟縣碑目云在恩陽縣西北百里有斷碑刻云南隆州大牟縣界十里北集州難江縣界五里縣令李昱立按曾口竒章化成恩陽俱梁普通年置大牟唐武徳置屬集州矣通江縣治在古壁州壁州者以城西南壁山為名志云壁山在縣南一里有嘉祐寺唐節度使鄭畋建至今人呼為鄭公山寺碑目云通江縣一里龍興寺碑唐壁州刺史鄭凝績之父鄭畋作乾符中凝績侍養其父畋于壁也又云壁州山寺記大唐中和嵗次癸卯丞相鄭畋撰略云壁山境勝之所鬱密喬樹葱蒨景態𤣥月澄日捜索竒秘得泉洞于西南維鑿石架篁繚繞登降髙縣旗旛䟽為泓沼峭壁危棧遂來商旅乃于蒨亭東隅建構佛宇召僧匡信主其事多出私財以益之為堂三間徘徊為門為廊二十六間髙下還合翬飛鱗次廊外為僧房庖厨數十間又立真室文之髙界為左右翼愚與凝績洎猶子昭允俱冩形于方丈中負山面江雄壓勝地日月先照風雨所交鐘梵松篁鑑鏘滿聽干家甍棟歴歴在眼晨煙夕艷輝燦户庭鷗鷺篙榜以資景物于時行朝卿士或寄寓于諸州給事中孫君儲秋曹正郎鄭君損皆柅車此地邀以同筵書琴棋畫隨後間作自仲春至于維夏也本志又載其碑陰云僕至郡觀舊碑三埋于㦸扉前之泥中遂飾役兵出而滌之其一斷而磨滅者乃唐鄭公台文修山寺記也始讀之文多訛缺及其完處令人愛嘆之不已而又得公進退之詳按僖宗紀并公傳各亦舛畧此公文是可信者矣惜其湮沒遂命筆正訛補缺離句綴意解凡六十七字斬石命僧守丕書之刻而立于州學庶㡬永永記成于唐中和甲辰孟秋二十有三日重刻于大宋之嘉祐癸卯孟秋中澣凡三甲子云太常博士俞瑊君玉序按此則嘉祐寺以重修得名者原名為龍興也本志又載鄭相遺踪在壁山下石澗中梯石齒披煙蘿入幽巖苔蘚間有字云檢校司徒守太子太保鄭畋門吏給事中賜紫金飛魚袋孫儲尚書刑部郎中賜紫金緋魚袋鄭損中和三年十二月八日收訪泉石偶題于此僧匡信看題傍又刻有畋明年孟秋念七日與姪昭允至此訪别一叚是其碎金斷璧尚有可尋者碑目云薛使君布政碑唐乾符年間壁州刺史裴寘辭作乾符間立又云壁州神廟石刻在今通江縣北四十步有元光三年制書本志云𤣥玅觀右星精石唐人刻篆甚多民間琢毁其半俱在治内唐推官鄭損星精亭詩云星沉萬古痕孤絶勢無隣地窄少留竹空多剩占雲釣篷和雨看樵斧帶霜聞莫惜尋常到清風不負人方輿云歌籟山與壁山相對上有石鼓聲聞數里連擊即雨通志云通江縣南有秋錦山隔江望之如錦與壁山相連也壁山之上有玉鞭池志云昔有人拾玉鞭于此池内因名按朱慶餘送壁州劉使君詩江分入峽路山見採鞭人即詠此事有鳴鹿祠五代史王建為壁州刺史後僣位永平三年麟見于壁山二鹿隨之此立祠之始也宋皇祐初太守胡俛記其事云朝廷有大詔令官屬有遷罷鹿必鳴鳴于山陽為福鳴于山陰為禍靈騐如符山下枕諾水諾水即宕水所激聲若呼諾後魏諾水縣以此得名也志云縣東南隅有公山隔江形如公字舊傳張道陵七世孫刺集州于此上昇絶頂有張康侯廟舊志載孫思邈濯藥于縣東十里石澗之畔名為孫氏池亭石灶丹臼尚存按碑目云孫氏園在通江縣二十里龍灘之側唐末監察御史盧重阜與壁州刺史辛巢父等六人分詠賦詩有石刻存宋米仲賢孫氏池亭詩云密林抱清溪微徑入煙靄亂流縈石轉浩浩兼萬𣲖披蘿出潭上結宇在竹外坐嘯孤雲還開軒遙相待奔崖臨絶壑幽趣驚盻睞渟滿泄其餘下注陰壑瀨道情留霜簡詩興延皂葢賞逐景物偏心期臨仙槩日低迴岡後鳥入寒林内暝色交殘光明滅羣木態後之視今日猶今視千載永懷滄洲人功成身將退符陽縣令陸干城和云斷崖青松林林下覆煙草一徑捫緑蘿數里尋芳藻巖開野人屋結構憑孤島石斷寒泉流亭幽翠巘繞攫挐龍虎狀宛若鬼神造隔崖聞湍聲當牕見夕照巴南絶境處勝似東溪好萬籟清心胸孤雲豁煩惱罇邀驄馬客冩物窮探討琴匣閒時開柴門不須鏁孰云造化工永與天地保長揖謝王侯塵紛徒浩𣺌本志又云西十里有古佛龕唐人題詠風雨剥蝕惟一碑粗可識乃龍朔中壁州參軍蔡洪剏又一碑乃阿彌陀佛龕也縣之洞有二一曰龍洞志云在西二百里呉埡鄉洞周圍二十餘丈髙三丈深七尺内有池殿清瑩湛然一曰蛇洞志云在北四百里南壩寺唐建也每嵗端陽前後有蛇自柱礎間出沿階滿室大小顔色非一種然不為害昔人傳三萬四千尾不可數也按此即巴蛇洞云磏有二一曰仙人磏志云在東三百里有石竇可容百人崖上刻公孫秀才讀書處年代不可攷有山茶髙數丈相傳是唐時樹一曰牛角磏志云在縣西三百里金溪有石室可容千人石笋數十自崖頂下綴望之稜稜如牛角俗呼為牛角磏按説文磏礪石也此以形似得名古墓有二一曰呉將軍甘寧墓志云在縣西百里通志云在通江縣西露浴溪上謂之甘谷一曰向佺墓志云東六十里大鐘山獨起萬山中如覆鐘其下即向佺墓左龍池山峭立挿漢蒼松偃蹇有石池龍湫注之古城關二一曰得漢城縣志云東北百里萬山中崛起塹崖四面峭絶獨西南二徑凌險轉折而上誠一夫當關之勢斷崖多前代遺踪可識舊志載漢髙帝據此以通餉道石壁刻云宋淳祐己酉季冬大使余學士親臨得漢城山視其形勢而授都統制張實躬率將士因險形壘儲糧建邑為恢復舊疆之規分任責者總管王昌金之福鈐路張虎臣司整杜淮王安杜時順徐斯李成劉文德劉清梁福陳寳賀山進李崇制領郭俊杜成周仙周一曰桐栢關志云在東北八十里與樗林關相對有關侯廟相傳神曾守此畊者往往得箭鏃南江縣寰宇記云南江縣後周天和五年置以江水難涉為名通志云國初始易為南江也南江出米倉山經當縣前下與巴江合碑目云唐難江公山威惠廟記天寳改元田彦識撰神乃漢張魯後又云唐李繼顔誥詞刻于郡㕔光化三年中書舎人錢珝行撰有城牙樓記圖經以為李楫文有舊碑二其一偽蜀廣政己未之記其一天聖乙丑之記碑目又云集州兩角山記唐集州刺史楊師謀書今在難江縣志云南三里孤雲兩角二山王子韶詩孤雲兩角去天一握有石刻蕭何追韓信處下有溪是名韓溪按孤雲兩角山及截賢嶺俱在棧道去縣二百餘里其碑刻則移近縣耳又有宋集州刺史張龜年回車院記道士蒲善從勒石縣之勝者有潭曰放生石刻放生潭三字水落方見意亦唐刻也其上鐫七佛龕圖經云乃唐張褘扈從僖宗入蜀時經此所鐫有峽曰石鼔碑目云趙寅為集州刺史有石鼓峽記在難江縣有石曰探梅志云縣東北五里探梅石亂石中有刻云宋人少華陳祉介卿浚儀潘士政執禮厭次來髙元敷㩦樽探梅靖康丙午閏四月㡬望有渡曰莎鼻碑目云在難江縣有唐集州刺史蘇味道題字有灘曰洋灘志云縣北洋灘楊侍郎墓碑字多蝕碑座是菜玉見存但不知何代人有澗曰菖蒲碑目云菖蒲澗記唐開成四年集州刺史蘇味道題跡志云菖蒲澗在縣北一里懸崖峻壁石室空曠有唐宋諸賢石刻云自潭北入澗行經此新開路東不啻三百步其間巨石礨倚嘉木交映空森復聳奇勢異狀緑苔青蒲印模履踪捫手探足無非蒼翠幽禽皓皓飛泉渥渥若有異人仙客鼓瑟吹簫于洞穴之中使人心逸神暢悦然忘歸斯實方外之佳賞也噫自有此澗杳無人蹤豈異夫浮世之事通塞有時耶今鑿崖為路梯石為徑連延扺于碧崖盤石之東究其澗分之所開成四年十月二十三日武功男子記僧宏真尋澗之迹藏諸山房古碑刻云有宋改元政和清明後一日權縣事長安杜德機元發訪菖蒲之溪薄尋其源言採其藥轉步而返則摳衣碧巖屏石而坐解帶古床幄雲而息然後歸頗恨得此之晩大宋改元政和辛夘嵗仲春月清明日縣吏馮子茂典職長楊子山邀同局中李二都王四都楊工四沿澗究菖蒲碑文兩日方返故題于碧巖三月十四日楊嵩岳山書記廣都蔣城吳大年古郫李椿秦亭權師雄大梁趙恂閬中馮時周谷米居約以紹興十八年九月十有四日訪古菖蒲澗觀唐人武功子石刻置酒碧巖溪效柳子序飲損其籌為一題名投之澗或洄或止或沉皆賞惟直前無沍滯則免坐客率三四十飲咲歌諧嬉日晡乃罷畢成記紹興庚辰上已㳺菖蒲澗飲于碧巖效晉人祓禊故事頴昌王芹宕渠韓慶孫開封喬嘉成都周瑞行男夏卿凡五人李異李國用楊義仲勾成允唐棟淳熙甲辰正月晦來逰時春日融明熏風和暢為蘭亭之飲以歸嘉定壬申仲春三城郭仲深攝事集山清明後一日逰菖蒲澗扳尋古嵒眉山扈才叔小益劉温叔潼上楊珍父同來有山曰十二峰方輿勝覽云十二峰在難江縣四十里馬盤灣巉巖聳秀最為竒觀有客題詩曰挿立翠屏峰十二為君喚作小巫山有水曰明水寰宇記云明水在難江縣北五十餘里水出硯屏林木山川之形隱于石間有古城曰平梁志云平梁城遺址在縣西三百里上有古寺龍池淳祐間都統制張實遵大使余龍學指授規畫率諸軍剏平梁山城云取掃平梁州之義坐據要地壁立萬仞天人助順漢中在掌握矣刻于石有橋曰五馬志云李虎仙者往來難江通江二縣縣人修五馬橋工匠數十虎仙于皮袋中出小釡可容三升以米麵食物納其中炊之以飼人人皆飽有寺曰栢院志云縣南六十里栢院寺唐髙宗末年建相傳為章懷太子修行之所有碑文剝蝕有宫曰紫微志云唐賈真人居難江縣之紫微宫白晝登仙留詩壁間云此後不知誰有分壁間留得上天梯有觀曰銅人志云縣南隔江銅人觀唐開元集州刺史李成裕奏設肖像皆銅初名紫極宫有殘碑數行開元二年兵部尚書牛仙客文宋集州守楊方平重立石又有碑刻載黄蓬石事畧云黄蓬石乃大蓬之仙者性顓蒙唯充薪水偶汲于寺見金瓶貯水乃飲水而置瓶是夕勞困卧藩籬間醒忽頴悟能詩蓬之名士無能出其右者頃乃隱于大蓬人不之見按玉堂閒話云興元之南有大竹路通于巴州其路則深谿峭巖捫蘿摸石一上三日而達于山頂行人止宿則以縆蔓繫腰縈樹而寢不然則墮于深澗若沈黄泉也復登措大嶺葢有稍平處徐步而進若儒之布武也其絶頂謂之孤雲兩角彼中諺云孤雲兩角去天一握淮陰侯廟在焉昔漢祖不用韓信信遁歸西楚蕭相國追之及于兹山故立廟貎王仁裕嘗佐褒梁帥王思同南伐巴人往返登陟留題于淮陰祠曰一握寒天古木深路人猶説漢淮隂孤雲不掩興亡䇿兩角曾懸去住心不是冕旒輕布素豈勞丞相逺追尋當時若放還西楚尺寸中華未可侵若其崎嶇險峻之狀未可殫言也蜀中廣記卷二十五
