body:
  text: 蜀中廣記卷四十七明曹學佺撰宦游記第一川西道屬秦李冰史失其鄉秦昭王時爲蜀郡守蜀土雖産竒貨金銀銅鐵然五穀尚少其時未通中土無賔旅徃來之費無軍師饋餉之煩政令省約禮文古朴民足蓋藏有以也秦人得蜀從斜谷輸輦于長安絡繹道路民始告病故守蜀者多難其人昭王乃用李冰冰能知天文地理至蜀相度岷江可以灌溉遂開郫流二江鑿離堆山濬湔腴口灌田數萬頃於是千里皆成沃野秦益富强兼并天下皆由於此時江神爲孽大爲民害冰乃使其子二郎作三石人及五石犀以厭其怪而蜀地至今無復水患相與神之以主蜀土西漢文翁者史失其名廬江舒人也少好學通春秋以郡縣吏察舉景帝末爲蜀郡守仁愛好教化見蜀地僻陋有蠻夷風欲誘進之乃選郡縣小吏開敏有才者張叔等十餘人親自飭勵遣詣京師受業博士或學律令減損少府用度買刀布蜀物齎計吏以遺博士數歲蜀生皆成就還歸文翁以爲右職用次察舉官有至郡守刺史者又修起學宫于成都市中招下縣子弟以爲學官弟子爲除更繇高者以補郡縣吏次爲孝弟力田常選學宫童子使在便坐受事毎出行縣益從學官諸生明經飭行者與俱使傳教令出入閨閣縣邑吏民見而榮之數年爭欲爲學官弟子富人至出錢以求之繇是大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡縣皆立學校官蓋自文翁爲之始云文翁治蜀數十年竟終于蜀吏民爲立祠堂歲時祭祀不絶至今巴蜀好文雅皆文翁之化也子孫亦家於蜀文氏遂爲著姓王襄益州刺史欲宣風化命王褒頌漢德作中和樂職宣布詩三篇選少年者以鹿鳴之聲歌之王尊字子贑涿郡高陽人也初爲美陽令著能聲擢安定太守威震郡中盜賊奔散遷益州刺史先是南陽王陽亦爲益州刺史行部至卭崍九折坂歎曰奉先人遺體奈何數乘此險後以病去及尊爲刺史至其阪問吏曰此非王陽所畏途耶吏對曰是叱其馭曰驅之王陽爲孝子王尊爲忠臣居部二歲懷來徼外蠻夷憚其威信俱就歸附博士鄭寛中奉使巡行風俗舉奏治狀遷東平相後爲京兆尹道不拾遺東漢呉漢字子顔南陽宛人也光武十一年春率征南大將軍岑彭等伐公孫述及彭破荆門長驅入江闗漢留夷陵裝露橈船遂將南陽兵及弛刑募士三萬人泝江而上㑹岑彭爲刺客所殺漢并將其軍十二年春與公孫述將魏黨公孫永戰於魚涪津大破之遂圍武陽述遣子壻史興將五千人救之漢迎擊興盡殄其衆因入犍爲界諸縣皆城守漢乃進軍攻廣都拔之遣輕騎燒成都市橋武陽以東諸小城皆降漢乃乘利遂自將步騎二萬餘人進逼成都去城十餘里阻江北爲營作浮橋使副將武威將軍劉尚將萬餘人屯於江南相去二十餘里述使其將謝豐袁吉將衆十許萬分爲二十餘營并出攻漢使别將萬餘人刼劉尚令不得相救漢與大戰一日兵敗走入壁豐因圍之漢乃召諸將勵之曰吾共諸君踰越險阻轉戰千里所在斬獲遂深入敵地至其城下而今與劉尚二處受圍勢既不接其禍難量欲潛師就尚於江南并兵禦之若能同心一力人自爲戰大功可立如其不然敗必無餘成敗之機在此一舉諸將皆曰諾於是饗士秣馬閉營三日不出乃多樹幡旗使煙火不絶夜銜枚引兵與劉尚合軍豐等不覺明日乃分兵拒江北自將攻江南漢悉兵迎戰自旦至晡遂大破之斬謝豐袁吉獲甲首五千餘級於是引還廣都留劉尚拒述自是漢與述戰於廣都成都之間八戰八克遂軍于其郭中述自將數萬人出城大戰漢使䕶軍高午唐邯將數萬鋭卒擊之述兵敗走高午奔陳刺述殺之旦日城降遂斬述首傳送洛陽明年正月漢振旅浮江而下十八年蜀郡守將史歆反於成都自稱大司馬攻太守張穆踰城走廣都歆遂移檄郡縣而宕渠楊偉朐䏰徐容等起兵各數千人以應之帝以歆昔爲岑彭䕶軍曉習兵事故遣漢率劉尚及大中大夫臧宫將萬餘人討之漢入武都乃發廣漢巴蜀三郡兵圍成都百餘日城破誅歆等漢乃乘桴沿江而下巴郡楊偉徐容等惶恐解散漢誅其渠帥二百餘徙其黨與數百家於南郡長沙而還來歙新野人以中郎將同蓋延馬成討公孫述乘勝進攻述大懼使刺客刺歙未殊延見歙因伏涕不敢仰視歙謂延曰虎牙何敢然今被刺自恨無以報國乃自書表畢遂引絶帝聞大驚省書攬涕乃賜䇿曰中郎將歙憂國忘家忠孝兼著今葬祭殊常念大功也高朕蜀郡太守念文翁爲政有法因禮殿頽圮遂修飾之續増一室以祀先聖先賢又作石室以祀文翁其治蜀政績不愧翁云岑彭字君然南陽棘陽人也建武十一年春彭與呉漢及誅虜將軍劉隆輔威將軍臧宫驍騎將軍劉歆發南陽武陵南郡兵又發桂陽零陵長沙委輸棹卒凡六萬餘人騎五千匹皆㑹荆門呉漢以三郡棹卒多費糧穀欲罷之彭以蜀兵盛不可遣上書言狀帝報彭曰大司馬習用步騎不曉水戰荆門之事一由征南公爲重而已彭乃令軍中募攻浮橋先登者上賞於是偏將軍魯竒應募時天風狂急彭竒船逆流而上直衝浮橋而櫕柱鉤不得去竒等乘勢殊死戰因飛炬焚之風怒火盛橋樓皆燼彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎而田戎亡保江州彭上劉隆爲南郡太守自率臧宫劉歆長驅入江闗令軍中無得虜掠所過百姓皆奉牛酒迎勞彭見諸耆老爲言大漢哀愍巴蜀久見虜役故興師逺伐以討有罪爲人除害讓不受其牛酒百姓皆大喜悦爭開門降詔彭守益州牧所下郡輒行太守事彭到江州以田戎食多難卒拔留馮駿守之自引兵乘利直指墊江攻破平曲收其米數十萬石公孫述使其將延岑吕鮪王元及其弟恢悉兵拒廣漢及資中又遣將侯丹率二萬餘人拒黄石彭乃多張疑兵使䕶軍楊翕與臧宫拒延岑等自分兵浮江下還江州泝都江而上襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽使精騎馳廣都勢若風雨所至皆奔散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也彭所營地名彭亡聞而惡之欲徙㑹日暮蜀刺客詐爲亡奴降夜刺殺彭彭首破荆門長驅武陽持軍整齊秋毫無犯卭穀王任貴聞彭威信數千里遣使迎降會彭已薨帝盡以任貴所獻賜彭妻子諡曰壯侯蜀人憐之爲立廟武陽歲時祠焉張堪字君游南陽宛人也早孤盡讓其父餘財于兄子年十六受業長安志美行厲諸儒號聖童來歙竒之薦於世祖召拜郎中使送委輸縑帛并領騎七千匹詣大司馬呉漢伐公孫述在道追拜蜀郡太守時漢止餘七日糧隂具船欲遁去堪聞之馳徃見漢説術必敗不宜退師之䇿乃示弱挑戰述果自出大戰中鎗死城下成都既抜堪先入據其城檢閲庫藏收其珍寳悉條列上言秋毫不私慰撫吏民蜀人大悦在郡二年遷漁陽太守後帝嘗召見諸郡計吏問其風土及前後守令賢否次至蜀郡其計掾樊進曰今漁陽太守張堪昔在蜀郡仁以惠下威能討奸前公孫述破滅珍寳山積捲握之物足富十世而堪去職之日乘折轅車布被囊而已帝聞嘆息良久即拜顯爲魚復長下詔徵堪擬超拜之而堪病卒帝深悼惜詔書褒美陳寵字昭公沛國汶人轉廣漢太守西川豪右并兼吏多奸貪訴訟日百數寵到顯用良吏王渙鐔顯等以爲腹心訟者日減郡中清肅先是洛縣城南每隂雨有哭聲聞於府中積數十年寵聞而疑其故使吏案行還言世衰亂時此下多死亡者而骸骨不得葬儻在於是寵愴然矜嘆即勅縣盡收斂之自是哭聲遂絶蔡茂字子禮河内懷人也遷廣漢太守有政績稱時隂氏賔客在郡界多犯吏禁茂輒糾案無所迴避茂初在廣漢夢坐大殿極上有三穗禾茂跳取得其中穗輒復失之以問主簿郭賀賀離席慶曰大殿者宫府之象也極而有禾人臣之上禄也取中穗中台之位也於字禾失爲秩雖曰失之乃所以得禄秩也衮職有闕君其補之旬月而茂徵焉乃辟賀掾亷范字叔度京兆杜陵人趙將頗之後也曽祖褒成哀間爲右將軍大父丹王莽時爲大司馬益部牧建初中爲蜀郡太守其俗好文辨相持短長范每勵以淳厚不受偷薄之説成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隱蔽燒者日屬范乃毁削先令但嚴使儲水而已百姓爲便乃歌之曰亷叔度來何暮不禁火民安作昔無襦今五絝在蜀數年稱平治清靜免歸鄉里黄昌字聖眞㑹稽餘姚人初爲宛令舉能遷蜀郡太守先太守李根年老多悖政百姓侵寃及昌到吏民訟者七百餘人悉爲斷理莫不得所捕盜帥一人脅使條諸縣强暴之人姓名居處乃分遣掩捕無有遺脱宿惡大奸皆奔走他境蜀郡大治初昌爲州書佐時其婦歸寧于家道間爲賊所掠遂流轉入蜀爲人妻生有子子犯罪母乃詣昌自訴昌疑此婦不似蜀人因問所由對曰妾本㑹稽餘姚戴次公女州書佐黄昌妻也因歸寧爲賊所畧遂至於此昌呼前謂曰黄昌有何識認耶曰左足心有黒子嘗自言當爲二千石昌乃出足示之即相持悲泣還爲夫婦治蜀四年遷陳相屢官大司農第五訪字仲謀京兆長陵人司空倫之族孫也仕郡爲功曹察孝亷補新都令政平化行三年之間隣縣歸之户口十倍种暠字景伯河南洛陽人爲益州刺史在職三年宣恩逺夷開曉殊俗岷山雜落皆懷漢德其白狼槃木唐菆卭僰諸國自前刺史朱輔卒後遂絶暠至乃復舉種向化時永昌太守冶鑄黄金爲文蛇以獻梁冀暠糾發逮捕馳傳上言而二府畏懦不敢案之冀由是銜怒於暠會巴郡人服直聚黨百餘人自稱天王暠與太守應承討捕不克吏人多被傷害冀因此陷之傳逮暠承太尉李固上疏救曰臣伏聞討捕所傷本非暠承之意實由縣吏懼法畏罪迫逐深苦致此不祥比盜賊羣起處處未絶暠承以首舉大奸而相隨受罪臣恐沮傷州縣糾發之意更共飾匿莫復盡心梁太后省奏乃赦暠承罪免官而已韋義字季節扶風平陵人初仕州郡太傅桓焉辟舉理劇爲廣都長政甚有績官曹無事牢獄空虚以兄順喪去官比辟公府不就廣都爲生立廟及卒三縣吏民爲義舉哀若喪考妣李膺字元禮潁川襄城人也蜀郡太守修庠序設條教明教令威恩並行朝廷舉能理劇及遭黨事膺詣詔獄拷死妻子徙邊門生故吏及其父兄並被禁錮時侍御史蜀郡景毅子顧爲膺門徒而未有錄牒故不及於譴毅乃慨然曰本謂膺賢遣子師之豈可以漏奪名藉茍安而已遂自表免歸時人義之劉龎廣漢人爲郫令郫有楊伯侯奢侈大起塚營龎初至官伯侯遂徙占成都及龎爲成都令伯侯復徙去成都大姓恣縱而濮陽太守趙子眞父子尤强横諸趙依附故多犯法龎執而數其罪莫不震肅張喬益州刺史旄牛夷叛喬與部都尉合兵擊破之於是分置蜀郡屬國領四縣延光三年牛種夷封離等叛蜀郡夷皆應之衆至千餘人破壞二十餘縣殺長吏剽掠百姓骸骨委積千里無人喬選從事楊竦等將兵討平之論功拜喬子湍爲太守夷人懽迎道路嘖嘖曰郎君貌類我府君後湍頗失民心有欲叛者耆老曉之曰當念先府君於是遂安閻憲爲綿竹令邑人夜行得遺錦平明送縣憲曰行得遺物是天賜也何爲將來曰縣有明府犯此則慚三國諸葛亮字孔明瑯琊陽都人建安十六年益州牧劉璋遣法正迎先主使擊張魯亮與闗侯鎭荆州先主自葭萌還攻璋亮與張飛趙雲等率衆泝江分定郡縣與先主共圖成都成都平以亮爲軍師將軍署左將軍府事先主外出亮常鎭守成都足食足兵二十六年羣下勸先主稱尊號先主未許亮説曰曹氏簒漢天下無主大王劉氏苗族紹世而起今即帝位乃其宜也士大夫隨大王久勤苦者亦欲望尺寸之功耳先主於是即帝位䇿亮爲丞相亮以丞相錄尚書事假節章武三年春先主於永安病篤召亮於成都屬以後事謂亮曰君才十倍曹丕必能安國終定大事若嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢不竭股肱之力効忠貞之節繼之以死先主又爲詔勅後主曰汝與丞相從事事之如父建興元年封亮武鄉侯開府治事頃之又領益州牧政事無巨細咸决於亮南中諸郡並皆叛亂亮以新遭大喪故未便加兵且遣使聘呉因結和親遂爲與國三年春亮率衆南征其秋悉平軍資所出國以富饒乃治戎講武以俟大舉五年率諸軍北駐漢中臨發上疏曰先帝創業未半而中道崩殂今天下三分益州疲弊此誠危急存亡之秋也然侍衞之臣不懈於内忠志之士忘身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺德恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱爲一體陟罰臧否不宜異同若有作奸犯科及爲忠善者宜付有司論其刑賞以昭陛下平明之理不宜偏私使内外異法也侍中侍郎郭攸之費褘董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以爲宫中之事事無大小悉以咨之然後施行必能禆補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵爲督愚以爲營中之事悉以咨之必能使行陣和睦優劣得所親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞良死節之臣願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕於南陽茍全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當世之事由是感激遂許先帝以驅馳後値傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹愼故臨終寄臣以大事也受命以來夙夜憂歎恐託付不效以傷先帝之明故五月渡瀘深入不毛今南方已定兵甲已足當奬率三軍北定中原庶竭駑鈍攘除奸凶興復漢室還于舊都此臣所以報先帝而忠陛下之職分也至于斟酌損益進盡忠言則攸之褘允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈責攸之褘允等之慢以彰其咎陛下亦宜自謀以諮諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕零不知所言遂行屯于沔陽六年春揚聲由斜谷道取郿使趙雲鄧芝爲疑軍據箕谷魏大將軍曹眞舉衆拒之亮身率諸軍攻祁山戎陣整齊賞罰肅而號令明南安天水安定三郡叛魏應亮闗中響震魏明帝西鎭長安命張郃拒亮亮使馬謖督諸軍在前與郃戰于街亭謖違亮節度舉動失宜大爲郃所破亮拔西縣千餘家還于漢中戮謖以謝衆上疏曰臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人恤事多闇春秋責帥臣職是當請自貶三等以督厥咎於是以亮爲右將軍行丞相事所總統如前冬亮復出散闗圍陳倉曹眞拒之亮糧盡而還魏將王雙率騎追亮亮與戰破之斬雙七年亮遣陳式攻武都隂平魏雍州刺史郭淮率衆欲擊式亮自出至建威淮退還遂平二郡詔䇿亮曰街亭之役咎由馬謖而君引愆深自貶抑重違君意聽順所守前年燿師馘斬王雙今歲爰征郭淮遁走降集氐羌興復二郡威震凶暴功勲顯然方今天下騷擾元惡未梟君受大任榦國之重而久自挹損非所以光揚洪烈矣今復君丞相君其勿辭九年亮復出祁山以木牛運糧與魏將張郃交戰射殺郃十二年春亮悉大衆由斜谷出以流馬運據武功五丈原與司馬宣王對於渭南亮每患糧不繼使己志不伸是以分兵屯田爲久住之基耕者雜於渭濵居民之間而百姓安堵軍無私焉相持百餘日其年八月亮疾病卒于軍時年五十四及軍退宣王案行其營壘處所曰天下竒才也亮遺命葬漢中定軍山因山爲墳冢足容棺斂以時服不須器物詔使持節左中郎將杜瓊贈亮丞相武鄉侯印綬諡爲忠武侯初亮自表後主曰成都有桑八百株薄田十五頃子弟衣食自有餘饒至於臣在外任無别調度隨身衣食悉仰於官不别治生以長尺寸若臣死之日不使内有餘帛外有贏財以負陛下及卒如其所言亮性長於巧思損益連弩木牛流馬皆出其意推演兵法作八陣圖咸得其要云亮言教書奏多可觀别爲一集景耀六年春詔爲亮立廟於沔陽亮弟均官至長水校尉亮子嗣爵法正字孝直右扶風郿人建安初入蜀依劉璋爲新都令後召署軍議校尉既不任用又爲其州邑俱僑客者所謗無行志意不得益州别駕張松與正相善松於荆州見曹公還勸璋絶曹公而自結先主璋曰誰可使者松乃舉正正既還爲松稱説先主有雄略密謀協規願共戴奉而未有緣後因璋聞曹公欲征張魯之有懼心也松遂説璋宜迎先主使之討魯復令正銜命正既宣指隂獻䇿於先主曰以明將軍之英才乘劉牧之懦張松州之股肱以響應於内然後資益州之殷富馮天府之險阻以此成業猶反掌也先主然之沂江而西與璋㑹涪北至葭萌南還取璋以正爲蜀郡太守揚武將軍外統都畿内爲謀主正説先主曰曹操一舉而降張魯定漢中不因此勢以圖巴蜀而留夏侯淵張郃屯守身遽北還此非其智不逮而力不足也必將内有憂偪故耳今䇿淵郃才略不勝國之將帥舉衆徃討則必可克克之之日廣農積榖觀釁伺隙上可以傾覆寇敵尊奬王室中可以蠶食雍凉廣拓境土下可以固守要害爲持久之計此蓋天以與我時不可失也先主善其䇿乃率諸將進兵漢中正亦從行先主自陽平南渡沔水緣山稍前於定軍興勢作營淵將兵來爭其地正曰可擊矣先主命黄忠乘高鼓譟攻之大破淵軍淵等授首曹公西征聞正之䇿曰吾故知𤣥德不辦有此必爲人所教也先主立爲漢中主以正爲尚書令䕶軍將軍明年卒先主爲之流涕者累日諡曰翼侯賜子邈爵闗内侯官至奉車都尉漢陽太守諸葛亮與正雖好尚不同以公義相取亮毎竒正智術先主既稱尊號將東征孫權以復荆州之恥羣臣多諫一不從大軍敗績還住白帝亮歎曰法孝直若在則能制主上令不東行就復東行必不傾危矣龎綂字士元襄陽人先主領荆州統以從事守耒陽令遷治中從事隨從入蜀益州牧劉璋與先主㑹涪統進䇿曰今因此㑹便可執之則將軍無用兵之勞而坐定一州也先主不從璋既還成都先主當爲璋北征漢中統復説曰隂選精兵晝夜兼道徑襲成都璋既不武又素無預備大軍卒至一舉便定此上計也楊懷高沛璋之名將各杖彊兵據守闗頭聞數有牋諫璋使發遣將軍還荆州將軍未至遣與相聞説荆州有急欲還救之並使裝束外作歸形此二子既服將軍英名又喜將軍之去計必乘輕騎來見將軍因此執之進取其兵仍向成都此中計也退還白帝連引荆州徐還圖之此下計也若沈吟不去將致大困不可久矣先主然其中計即斬懷沛還向成都所過輒克於涪大㑹置酒作樂謂統曰今日之㑹可謂樂矣統曰伐人之國而以爲歡非仁者之兵也先主醉怒曰武王伐紂前歌後舞非仁者耶卿言不當宜速起出於是統逡巡引退先主尋悔請還統復故位初不顧謝飲食自若先主謂曰向者之論阿誰爲失綂對曰君臣俱失先主大笑宴樂如初進圍雒縣統率衆攻城爲流矢所中卒時年三十六先主痛惜言則流涕追賜統爵闗内侯諡曰靖侯統子宏字巨師剛簡有臧否輕傲尚書令陳祗爲祗所抑卒於涪陵太守傅彤仕先主爲將軍先主伐呉猇亭之敗彤爲呉所得呉人逼之使降彤罵曰安有漢將軍而降者乎遂死之子僉爲都督守陽安闗鄧艾遣胡烈等攻闗僉格鬬而死吕乂字季陽南陽人先主定益州乂爲新都綿竹令乃心隱䘏百姓稱之遷巴西太守丞相諸葛亮連年出軍調發諸郡多不相救乂募取兵五千人詣亮慰喻檢制無逃竄者徙爲漢中太守兼領督農供繼軍糧亮卒累遷廣漢蜀郡太守蜀郡一都之㑹户口衆多又亮卒之後士伍亡命更相重冒姦巧非一乂到官爲之防禁開喻勸導數年之間漏脱自出者萬餘口後入爲尚書代董允爲尚書令衆事無留門無停賔乂歴職内外治身儉約謙靖少言爲政簡而不煩號爲清能然持法刻深好用文俗吏故居大官名聲損於郡縣延熙十四年卒蔣琬字公琰湘鄉人也從昭烈入蜀除廣都長昭烈遊觀奄至廣都見琬事不治時又沈醉將加罪戮諸葛亮請曰蔣琬社稷器非百里才政在安民不務修飾願主公加察昭烈雅敬亮遂不加罪頃之拜什邡令召入爲尚書郎建興元年丞相亮開府辟琬爲東曹掾亮駐漢中與長史張裔統留府事又代裔爲長史加撫軍將軍亮數出外琬常出兵食相供給每言公琰忠雅當與吾共贊王業密表後主曰臣若不幸後事宜以付琬亮卒以琬爲尚書令俄加都督假節領益州刺史遷大將軍錄尚書事封安陽亭侯時元帥新喪逺近危竦琬處羣僚之右無憂容無喜色衆漸服楊戲性簡畧琬與言多不應或欲搆戲于琬以爲慢琬曰面從後言古人所戒戲欲贊吾是則違其本心欲反吾言則顯吾過失是以黙然是戲之快也又督農楊敏曽毁琬曰作事憒憒不及前人或以白琬主者請推治琬曰吾實不如前人無可推也主者請推問憒憒狀琬曰茍其不如則事不當理事不當理即憒憒矣又何問耶後敏坐事繫獄人疑敏必死琬終免其重罪雅量服人如此駐漢中六年以病還住涪卒諡曰恭費褘字文偉江夏人昭烈立太子以褘爲庶子後主踐位擢黄門侍郎丞相亮南征還羣僚郊迎亮獨命褘同載褘奉命使呉呉主權性滑稽呉人諸葛恪羊衜論難鋒至褘辭順義篤終不能屈權甚器之還遷侍中參留府軍事建中八年轉中䕶軍時楊儀魏延交惡褘常諫諭各盡儀延之用亮卒進尚書令于時軍國多事褘識悟過人每讀書一目即了大意朝夕聽政延接賔客飲食嬉戲加之博弈必盡人驩事亦不廢蔣琬還涪以褘爲大將軍錄尚書事延熈七年封成鄉侯領益州刺史褘雅性謙素家不積財子惟布衣蔬食出入不從車騎無異凡人十六年元日大㑹賔客魏降人郭循刺褘而逃褘死子承嗣侯爲黄門侍郎次子恭尚公主許靖字文休平輿人劉璋招爲廣漢太守初南陽宋忠與蜀郡太守王商書曰文休倜儻瑰瑋有當世之具足下當奉爲指南商卒竟守廣漢昭烈不喜其爲人定蜀後益無意于靖孔明諫曰靖人望不可失也借其名以竦動宇内于是稍尊之尋拜司徒靖年已踰七十愛樂人物誘納後進清談不倦丞相亮亦爲致拜章武二年卒于成都孟光字孝裕河南洛陽人先主定益州拜爲議郎後主踐阼爲大司農延熈九年秋大赦光於衆中責大將軍費褘曰夫赦者偏枯之物非明世所宜有也衰弊窮極必不得已然後乃可權而行之耳今主上仁賢百僚稱職有何旦夕之危倒懸之急而數施非常之恩以惠姦宄之惡乎又鷹隼始擊而更原宥有罪上犯天時下違人理老夫耄朽不達治體竊謂斯法難以經久豈具瞻之高美所望於明德哉褘但遜謝踧踖光之指摘痛癢多如是類年九十餘卒鄧芝字伯苗義陽新野人先主定益州芝爲郫邸閣督先主出至郫與語大竒之擢爲郫令遷廣漢太守所在清嚴有治績入爲尚書先主薨於永安先是呉王孫權請和先主累相報答諸葛亮深慮權聞先主殂隕恐有異計芝見亮曰今主上幼弱初在位宜遣大使重申呉好亮即遣芝修好於權權果狐疑不時見芝芝乃自表請見權曰臣今來亦欲爲呉非但爲蜀也權乃見之語芝曰孤誠願與蜀和親然恐蜀主幼弱國小勢偪爲魏所乘不自保全以此猶豫耳芝對曰呉蜀二國四州之地大王命世之英諸葛亮亦一時之傑也蜀有重險之固呉有三江之阻合此二長共爲唇齒進可并兼天下退可鼎足而立此理之自然也大王今若委質於魏魏必上望大王之入朝下求太子之内侍若不從命則奉辭伐叛蜀必順流見可而進如此江南之地非復大王之有也權黙然良久曰君言是也遂自絶魏與蜀連和及亮北住漢中以芝爲中監軍揚武將軍亮卒遷前軍師前將軍領兖州刺史封陽武亭侯延熈九年就遷爲車騎將軍十四年卒芝爲大將軍二十餘年賞罰明斷善䘏卒伍身之衣食資仰於官不茍素儉然終不治私産妻子不免飢寒死之日家無餘財宗預字德豔南陽安衆人建興初丞相亮以爲主簿遷參軍右中郎將及亮卒呉慮魏或承衰取蜀増巴丘守兵萬人蜀聞之亦益永安之守預將命使呉孫權問預曰東之與西譬猶一家而聞西更増白帝之守何也預對曰臣以爲東益巴丘之戍西増白帝之守皆事勢宜然俱不足以相問權嘉其抗直遷爲侍中徙尚書延熈十年爲屯騎校尉後拜征西將軍王連字文儀南陽人劉璋入蜀爲梓潼令先主起事葭萌進軍來南連閉城不降先主義之不彊偪也及成都既平以連爲什邡令轉任廣都所居有績司鹽校尉較鹽鐵之利利入甚多有禆國用遷蜀郡太守興業將軍領鹽府如故建興元年拜屯騎校尉領丞相長史封平陽亭侯時南方諸郡不賔諸葛亮將自征之連諫以爲此不毛之地疫癘之鄉不宜以一國之望冒險而行亮慮諸將才不及己意欲必徃而連言輒懇至故停留者久之㑹連卒子山嗣官至江陽太守陳震字孝起南陽人先主入蜀震爲蜀郡北部都尉因易郡名爲汶山太守轉在犍爲建興三年入拜尚書遷尚書令奉命使呉七年孫權稱尊號以震爲衞尉賀權踐阼諸葛亮與兄瑾書曰孝起忠純之性老而益篤及其贊述東西歡樂和合有可貴者晉王濬字士治𢎞農人羊祜薦爲巴郡太守郡邊呉境兵士苦役生男多不養濬乃嚴其科條寛其徭役産育者皆與休復所全活數千人轉廣漢太守垂惠布政百姓賴之擢益州刺史濬懷輯殊俗待以恩信蠻夷徼外多來歸附徵拜右衞將軍除大司農車騎將軍羊祜雅知濬有才畧多竒算乃密表留濬於是重拜益州刺史武帝謀伐呉詔濬修舟艦太康元年濬發自成都先是濬守巴郡禁民棄孩所全育者不下千餘皆已壯大堪徭役供軍旅其父母誡之曰王府君生爾爾必勉之無愛死也衆共踴躍遂平呉周撫字道和廬江潯陽人父訪爲益州刺史撫彊毅有父風永和初桓温征蜀以撫督漢中巴西梓潼隂平四郡軍事鎭彭模温平蜀歸以撫掃清餘寇久之隗文鄧定求范長生子賁立爲帝復亂巴蜀有衆萬餘撫與龍驤將軍朱壽破斬之以功進爵建城縣公督䕶蕭敬作亂據涪城撫又破斬之傳首京師進鎭西將軍興寧三年卒劉秀之益州刺史爲政整肅逺近悦焉先是刺州者多營聚蓄多者數萬金所攜賔僚並都下貧子出爲郡縣皆以茍得自資秀之獨持清儉折留俸祿二百八十萬付梁州鎭此外蕭然毛璩字叔連以功爲益州刺史及桓𤣥簒位遣使加璩左將軍璩執𤣥使囚之傳檄列𤣥罪狀遣栁約之羅述甄季之擊破𤣥將栢􅛽等仍率衆次於白帝㑹𤣥敗謀走梁州璩姪修之時爲𤣥校尉誘使入蜀既而殺𤣥於舟中帝反正進璩都督梁益秦凉寧五州軍事以其弟瑾爲征虜將軍蜀郡太守瑗爲輔國將軍寧州刺史乃率之東擊桓振而蜀人不樂東行於是參軍譙縱因人情思歸遂反於五城水口還兵襲涪而害毛瑾凡毛氏之子姪在蜀者皆死後太尉劉裕遣將軍朱齡石伐譙縱誅之乃下詔曰故益州刺史璩西夷校尉瑾蜀郡太守瑗勤王忠烈事乖慮外葬送日近益懷惻愴可皆授先所賜官即以爲贈論討桓𤣥功封璩歸鄉公邑千五百户又以毛修之斬桓𤣥封夷道縣侯璩祖寳父穆之并璩三世擁旄將帥之家與潯陽周氏同盛而一旦夷於譙縱舉宗百口同死國難時人咸痛惜焉六朝沓龍超晉壽人永平中梁將樊文熾來寇益州刺史傅和孤城固守龍超時爲裨將每出戰輒破之攻圍既久糧矢且盡刺史遣龍超夜出請援漢中爲文熾所得許以封爵使告城中以無援宜降乃置龍超於攻樓上龍超乃告城中曰援軍數萬至矣文熾大怒以火炙殺之至死辭氣不撓裴文舉北魏齊公憲初開幕府以文舉爲司錄及憲出鎭劒南復以文舉爲總管府中郎武成二年就加便持節車騎大將軍儀同三司蜀土沃饒商販百倍或有勸文舉以利者文舉答之曰利之爲貴莫若安身身安則道隆非貨之謂是以不爲非惡財也憲矜其貧窶毎欲資給之文舉恒自謙遜辭多受少傅䜿眼清河人以軍功累遷益州刺史高肇伐蜀假䜿眼征虜將軍持節領步兵三萬先討巴北所至尅捷䜿眼性既清素不營産業衣食之外俸祿粟帛皆以饗賜夷酋振恤士卒撫蜀人以恩信爲本宣武甚嘉之明帝初屢請解州乃以元法僧徃代益州人追隨戀泣者數百里法僧既至大失人和梁遣其衡州刺史張齊進圍州城朝廷以西南爲憂乃驛徵䜿眼仍爲益州刺史加散騎常侍西征都督給銅印千餘須有假職者聽六品已下拔之䜿眼既出梁州梁軍所在拒塞䜿眼三日中轉戰二百餘里甲不出身頻致九捷蜀人聞䜿眼復爲刺史人人喜悦迎於路者日有百數䜿眼至州分遣諸將水陸討之大破其軍齊被重創奔退小劒大劒益州平靈太后璽書慰勞賜驊騮一匹寳劒一口尉遲迥字薄居羅代人也從周太祖復𢎞農破沙苑皆有功侯景既敗梁元帝稱號江陵内難方殷與周通好其弟武陵王在蜀稱帝率衆東下元帝請救于周周太祖令迥督開府元珍等六將軍伐蜀以魏廢帝二年春自散闗出白馬起晉壽開平林舊道前軍臨劒閣安州刺史樂廣先降梁州刺史楊乾運以兵迎入潼川六月迥于潼川大饗將士引之而西益州刺史蕭撝嬰城自守進軍圍之初紀至巴郡聞迥入蜀遣其將譙淹囘師爲撝外援迥分驍騎命元珍等迎破之淹降撝前後出戰皆敗乃與紀子宜都王肅及文武官屬詣軍門請見迥以禮接之其吏人等各令復業唯收僮隷儲積以賞將士號令明肅軍無私焉詔以爲大都督督益潼等十六州軍事益州刺史迥乃明賞罰布恩威綏輯新邦經畧未附夷夏懷而歸之迥性至孝身雖在外所得四時甘脆必先薦奉然後乃嘗太祖知其至性徵迥入朝以慰母意蜀人思之立碑頌德進封蜀公食邑萬户辛昻字進君狄道人尉遲迥伐蜀昻占募從軍蜀平尉遲迥表昻行成都令昻到縣便與諸生祭文翁學堂因共歡宴謂諸生曰子孝臣忠師嚴友信立身之要如斯而已若不事斯語何以成名各宜自勉克成令譽昻言切理至諸生等並深感悟歸而告父老曰辛君教戒如此不可違之於是井邑肅然咸從其化遷梓潼郡守入爲司𨽻上士時益州殷阜軍國所資經塗艱險毎苦刼盜詔昻使於益梁軍民之務皆委決焉昻撫導荒梗頗得寧靜使還屬巴州郡人萬榮反叛圍郡城昻於是遂募通開二州得三千人倍道兼行出其不意又令其衆皆作中國歌直趣賊壘謂有大軍赴救望風瓦解朝廷嘉其權以濟事詔梁州總管杞國公亮即於軍中賞昻奴婢二十口繒綵四百疋又以昻威信布于宕渠遂表爲渠州刺史轉通州推誠布信甚得夷獠歡心秩滿還京首領皆隨昻詣闕朝覲齊焬王憲字毘賀突性通敏有度量初封涪城縣公武平初除益州總管憲時年十六善於撫綏留心政術辭訟輻凑聽受不疲蜀人悦之元巖字君山河南洛陽人蜀王秀鎭益州巖到官法令明肅吏民稱焉蜀王性好奢侈嘗欲取獠口以爲閹人又欲生剖死囚取膽爲藥巖皆不奉教排閣切諫王輒謝而止憚巖爲人毎循法度蜀中獄訟巖所裁斷莫不悦服其有得罪者相謂曰平昌公與吾罪吾何怨焉上甚嘉之賞賜優洽十三年卒于官益州父老莫不隕涕衞𤣥益州總管長史仁壽初山獠作亂出爲資州刺史以鎭撫之𤣥單騎造其營謂羣獠曰我刺史銜天子詔安養汝等勿驚懼也諸賊莫敢動于是説以利害渠帥感悦解兵而去前後歸附者十餘萬口焬帝徵爲衞尉卿羣獠攀戀數百里揮涕而别唐皇甫無逸字仁儉安定人隋舊臣也時益部新開刑政未洽長吏横恣贓汚狼籍特遣無逸持節巡撫無逸宣揚朝化法令嚴肅蜀中賴之既返命高祖勞之曰公立身行已朕之所悉比多譛訴者但爲正直致邪佞所憎耳尋拜民部尚書累轉益州大都督府長史閉門自守不通賔客左右不得出門凡所貨物皆徃他州按部樵採不犯於人嘗夜宿人家遇燈炷盡主人將續之無逸抽佩刀斷衣帶以爲炷其亷介如此然過於審愼所上表奏懼有誤失必讀之數十遍仍於官屬再三披省使者就路又追而更審毎遣一使輒連日不得上道議者以此少之母在長安疾篤太宗驛召無逸無逸性至孝承問惶懼不能飲食因道病而卒贈禮部尚書謚曰良高儉字士亷渤海蓚人以侍中出爲益州大都督府長史蜀自夷獠亂後土俗薄惡畏鬼而惡疾父母病有危殆者多不親扶侍杖頭挂食遥以哺之士亷隨方訓誘風俗頓改秦守李冰導引汶江浸灌田疇士亷乃於故渠外别更疏決大獲其利又因暇日汲引辭人以爲文㑹兼命儒生講論經史勉厲後進蜀中學校粲然復興隱士朱桃椎者澹泊爲事不就徵聘士亷下車以禮致之及至降階與語桃椎不答直視而去士亷毎令存問蜀中以爲美談子履行顯慶元年爲益州大都督府長史亦有善政爲人吏所稱陳易從高宗時彭州長史大興水利溉九隴唐昌田民有去後之思爲立祠祀之張柬之字孟將襄州襄陽人也進士擢第累補青城丞永昌初賢良對䇿第一擢拜監察御史聖厯初累遷鳯閣舍人神功初出爲合州刺史尋轉蜀州刺史州舊例歲差兵募五百人徃姚州鎭守路越山險死者甚多柬之極疏諫止爲民請命則天后不納後以誅張易之功封漢陽王蘇頲京兆武功人開元八年知益州大都督府長史事前司馬皇甫恂破庫物織新様錦以進頲一切罷之或謂頲曰公今在逺豈得忤聖意頲曰明主不以私愛奪至公豈爲逺近間易忠臣節也竟奏罷之嶲州蠻酋苴院私與吐蕃連謀將爲内寇頲獲其間諜將士咸請出兵討之頲不從乃作書并間諜以送苴院苴院慙悔竟不敢入寇姚璹字令璋神龍初授益州大都督府長史蜀中官吏多貪暴璹屢有發摘姦無所容則天賜璽書勞之又嘗謂侍臣曰凡爲官長能清自身者甚易清得寮吏者甚難至於姚璹可謂兼之矣畢構河南偃師人少舉進士累官益州大都督府長史兼充劒南道按察使所歴州府咸著聲績在蜀中尤號清嚴睿宗聞而善之璽書勞曰卿孤潔獨行有古人之風自臨蜀川弊化頓易覽卿前後執奏何異破柱求姦諸使之中在卿爲最並能盡節似卿如此百郡何憂乎不理萬人何慮乎不安卿當益堅勿爲後顧朕喜卿直道今賜袍帶并衣一副尋拜户部尚書轉吏部尚書遙領益州大都督府長史李璬明皇第十三子封潁王讀書有文詞禄山反除蜀郡大都督劒南節度大使楊國忠爲副未之藩而明皇出幸令御史大夫魏方進充置頓使先至蜀託以潁王之國故儲供皆辦駕至馬嵬又令璬先赴郡以蜀郡長史崔圓副之璬性節儉渡綿江登舟見以綵縁席爲藉者顧曰此寢具也奈何踐之急命撤去視事踰月人便其寛圓以璬不加禮於己啣之奏罷還京嚴武字季鷹華隂人以巴州刺史遷東川節度使上皇合劒南爲一道擢武成都尹劒南節度使還拜京兆尹遷黄門侍郎復節度劒南破吐蕃七萬衆于當狗城遂取鹽川城加檢校吏部尚書封鄭國公永泰元年夏卒于官時年四十房琯河南人𤣥宗幸蜀琯時爲憲部侍郎獨馳劒路至普安郡謁見𤣥宗與語甚悦即日拜吏部尚書同中書門下平章事從幸成都加銀青光祿大夫上元元年改漢州刺史廣德元年卒于閬州僧舍韋倫監察御史劒南節度行軍司馬時𤣥宗幸蜀内官禁軍所在侵暴號爲難治倫獨清儉率身以化之蜀川咸賴其理高適字達夫渤海蓚人少濩落家貧客梁宋間年逾五十始留意詩什哥舒翰知之盛稱于𤣥宗拜左拾遺轉監察御史從翰守潼闗翰敗奔及行在於河池從至成都制以爲諫議大夫賜緋魚袋適負氣敢言權倖短之肅宗左授太子詹事未幾蜀中亂出適爲蜀州刺史遷彭州劒南自𤣥宗還京後於綿益各置一節度百姓疲敝適因出西山三城戍上言當省東川撤戍併力從事以紓成都彭漢蜀四州之困百姓賴之㑹梓州屯將叚子璋反適率州兵從崔光逺討平之而西川牙將花驚定大掠東川天子聞之罷光逺以適代爲成都尹充劒南節度觀察使廣德元年吐蕃取隴右適率兵出南鄙欲牽制其力遂失松維二州代宗乃勑嚴武兼代之未出蜀而卒杜甫字子美本籍襄陽曽祖爲鞏令家焉遂爲鞏人天寳之亂甫奔行在謁肅宗拜右拾遺及房琯罷相甫疏爭之忤㫖出爲華州參軍上元二年嚴武鎭成都甫徃依之奏爲節度參謀檢校尚書工部員外郎賜緋魚袋武與甫世舊待遇甚隆而甫性簡傲嘗醉登武牀瞪視武曰嚴挺之乃有此兒武雖急暴不以爲忤甫于成都浣花里種竹植樹結廬枕江縱酒嘯咏雖田夫野老亦與狎蕩至嚴武過之或有時不冠永泰元年乃遊東蜀依高適既至而適卒是夏武亦卒郭英又代之㑹崔旰殺英又楊子琳攻西川蜀中大亂甫挈家住䕫峽二年後入楚而卒崔寧一名旰貝州安平人嚴武奏爲漢州刺史吐蕃引雜羌寇西山破柘靜等州有詔收復於是武遣寧出既薄賊城皆壘石不得攻惟東南不合者丈餘諜知之乃爲地道以入再宿而拔賊走隨追之拔城堡數十拓地數百里虜衆驚相謂曰神兵也絶迹不敢復犯師還武大悦裝七寳舉迎入成都以寵之永泰元年武卒行軍司馬杜濟等表請郭英义爲節度使而寧與其軍又欲丐大將王崇俊奏方至而朝廷既用郭英义矣英义恨之始署事即誣殺王崇俊又遣使召寧寧恐託拒吐蕃不敢還英义乃自將討寧値大雨馬多凍死士心皆離遂敗而歸寧又聞英义損裁將卒廩賜及毁𤣥宗冶金像乃令軍中曰英义輒居先帝舊宫是反也乃進薄成都英义敗走爲下所殺劒南大擾楊子琳起于濬州與栢貞節連和討寧明年詔宰相杜鴻漸徃平其亂鴻漸入成都乃表栢貞節爲卭州刺史楊子琳爲濬州刺史以和解之又數薦寧節度西川大厯三年來朝留其弟寛守成都楊子琳率兵自瀘州乘間突入成都其麾下精騎數千襲據城府寛不能禦而逃寧妾任氏素驍果即出家財數十萬募勇士得千人設部隊自將以出子琳駭懼糧餉又盡會大雨城中水數尺乃引舟至庭亟乘而去至黄草峽守捉使王守􅋖伏兵擒之皆奉任氏之檄也朝廷命寧還鎭號任氏爲浣花夫人累加寧尚書左僕射栁公綽字起之京兆華原人貞元初爲開州刺史入爲副御史武元渝鎭蜀與裴度俱爲元渝判官尤相善先度入爲吏部郎中度以詩餞别有兩人同日事征西今日君先捧紫泥之句蜀丞相武侯祠碑中立撰文公綽書也張延賞蒲州猗氏人建中初爲檢校兵部尚書成都尹劒南西川節度觀察使先是兵革屢擾蜀土殘弊延賞薄賦約事動遵法度遂至富庶建中末駕在山南延賞奉供億頗竭忠力韋臯字城武京兆萬年人延賞之壻也婦在延賞所韋郎曽至蜀婦翁薄之臯拂衣去不數年代延賞先是南詔蠻與吐蕃合每入寇則南詔爲鄉導臯通雲南和六詔專攻吐蕃故出必有功凡破吐蕃四十八萬擒節度都督城主籠官千五百斬首五萬餘級獲牛羊二十五萬收器械六百二十萬其功烈爲西南大帥之最德宗美其功進檢校司徒兼中書令南康郡王自製紀功碑褒賜之年六十一贈太師諡忠武臯治蜀凡二十一年善拊士卒始斂民頗厚而民免吐蕃南詔之殘樂于輸將及府庫充足又爲除租三嵗一復臯卒民德之見其遺像必拜祀之崔從清河武城人西川節度韋臯開西南夷置兩路運糧使奏從掌西山運務從權知卭州事及臯薨副使劉闢阻命欲并東川以謀告從從書諭闢闢怒出兵攻之從嬰城拒守高崇文平蜀從事坐累多伏法惟從拒闢免子愼由太和十三年任川東節度使陸元方蘇州呉縣人爲益州大都督府長史仍爲劒南道按察使在官務以寛仁爲政司馬韋抱貞言曰望明公稍行杖罰以立威名不然下人怠惰無所懼也元方曰爲政者理則可矣何必嚴刑樹威損人益己恐非仁恕之道竟不從李晟字良器隴右臨洮人德宗即位吐蕃寇劒南時節度使崔寧朝京師三川震恐乃詔晟將神䇿兵救之授太子賔客晟乃踰漏天拔飛越廓清肅寧三城絶大渡河獲首虜千餘級虜乃引退因留成都數月而還高崇文其先渤海人徙幽州永貞初劉闢阻兵乃詔崇文檢校工部尚書左神䇿行營節度使討之始崇文在長武城練兵五千常若寇至至是夘漏受命辰巳出師器良械修無一不具乃西自閬中出郤劒門兵解梓潼之圍賊將邢泚退守梓州詔拜崇文東川節度使初闢陷東川執節度使李康不殺至是歸康丐雪已罪崇文數康失守罪斬之是日破賊於鹿頭山凡八戰皆捷賊心始摇其將李文悦以兵三千自歸仇良輔舉鹿頭二萬衆執闢子方叔壻蘇彊降遂趨成都餘兵皆面縳送欵闢走追擒之檻送京師崇文之入成都也師屯大逵市井不移民皆按堵珍寳如山無秋毫之犯止戮其大將邢泚餘無所問衣冠脇汙者詣牙門請命崇文爲條上皆得全活下令軍府一依南康故事其舊將佐皆禮而薦之獨謂段文昌曰君才器必爲將相非崇文所敢薦也闢有二妾皆殊色監軍請獻於朝崇文曰天子命我討平凶逆以撫百姓爲先遽獻婦人以求媚于上崇文義不爲此乃以配將吏之無妻者詔進檢校司空四川節度使南平郡王東川皆領焉治蜀期年謂監軍曰西川乃宰相􅂞翔之地崇文何敢自安乃上表請改鎭願得闗塞一隅之地扞禦羌戎或以效死于邊陲則臣之職分也朝廷重違其意乃加中書門下平章事邠寧節度使詔刻石紀功于鹿頭山子承簡亦累官邠寧節度使孫駢亦西川節度使時南詔屢寇城門晝閉駢入境謂諸將成都生靈百萬久閉必生瘴病即下令馳徃開城或曰賊如豕突何以禦之駢曰賊聞我至必不敢來久之乃改淮南節度使武元衡字伯蒼河南緱氏人先是高崇文平蜀因授以節度使崇文理軍有法而不知州縣之政上難其代者乃以元衡代崇文拜檢校吏部尚書兼門下侍郎平章事充劒南西川節度使將行上御安福門以臨慰之高崇文既發成都盡載其軍資金帛帟幕伎樂工巧以行元衡至則庶事節約務以便人比三年公私稍濟撫蠻夷約束明具不輒生事重愼端謹雖淡於接物而開府極一時之選八年徵還李德裕字文饒趙郡人太和中節度西川西川自杜元穎去後郭釗知軍府病不能事事民失職無聊生德裕至則除殘奮怯皆有條次成都既南失姚協西亡松維由清溪下沐川而左皆爲蠻有始韋臯招徠南詔復雋州傾内資結蠻好示以戰陣之法德裕以臯啓戎資盜其䇿非是養成癰疽苐未决耳至元穎時遇隙而發故長驅深入蹂躪千里蕩無孑遺今瘢夷方新非痛矯革不能雪一方恥乃建籌邊樓按南道山川險易與蠻出入者圖之左西道與吐蕃接者圖之右其部落衆寡饋餉逺邇曲折咸具乃招習邊事者與之指畫商訂凡敵之情僞盡知又料擇伏障舊獠與州兵之任戰者廢遣獰髦十三四士無敢怨又請甲人于安定弓人于河中弩人于浙西由是蜀之器械犀鋭率二百取一人使習戰貸勿事緩則農急則戰謂之䧺邊子弟其精兵曰南燕保義保惠兩河慕義左右連弩騎士曰飛星鷙擊竒鋒流雷霆聲突騎總十一軍築仗義城以制大渡青溪闗之阻作禦侮城以控榮經犄角之勢作柔逺城以扼西山吐蕃復卭崍闗徙雋州治臺登以奪蠻險舊制歲抄運内果以瞻黎雋而起嘉眉道陽山江達大渡河以分餉諸戍常以盛夏至戍所地苦瘴毒輦夫多死德裕變之名曰轉漕謂轉卭雅之粟以十月爲漕始先夏而至以佐陽山之運瘴毒多發於炎月而饋者避炎月不涉逺民從此安矣蜀民貧者多鬻女爲人婢妾德裕爲著科約凡十三而上執三年勞下者五歲及期則歸父母又毁屬下浮屠私廬以其地還農蜀先主祠旁有猱村其民剔髮若浮屠畜妻子自如德裕下令禁之妖物逺徙於是蜀風大變二蠻皆懼南詔許還所俘掠四千人吐蕃維州將悉怛謀以城降維距成都四百里因山爲固東北由率叢嶺而下二百里地無險走長川不三千里直吐蕃之牙異時戍之以制吐蕃者也德裕既得此城即發兵以守且陳出師之利牛僧孺居中阻其功命返悉怛謀于敵以信所盟德裕終身以爲恨㑹監軍使王踐言入朝盛言悉怛謀死拒逺人向化之意帝亦悔之後德裕相武宗追言此事請贈悉怛謀官爵從之段文昌字墨卿西河人韋臯在蜀表授校書郎長慶六年詔授西川節度使同中書門下平章事文昌素洽蜀人之情至是以寛政爲治嚴靜有斷蠻夷畏服太和四年移鎭荆南六年復爲劒南西川節度九年三月賜春衣中使至受宣畢無疾而卒贈太尉郭釗華州鄭縣人子儀孫曖子也偉姿儀身長七尺方口豐下沈黙寡言歴踐藩鎭以汾陽胄𦙍材能選用不獨憑椒房之勢敬宗即位徵爲兵部尚書左僕射明年出爲梓州刺史劍南東川節度使文宗即位加司空太和三年冬南蠻陷雋州遂寇西川杜元穎失於控禦蠻軍陷成都府外城朝廷未暇除帥乃以釗兼領西川節度時外援未至川軍寡弱不可令戰釗致書於蠻首領荖巓責以侵寇之意荖巓曰杜元穎不守疆場屢侵吾地以是修報也與釗修好而退朝廷嘉之授成都尹劒南西川節度使與南詔立約疆陲不擾以疾求代在道卒盧躭咸通中擢西川節度使時南詔入寇躭與瀘州刺史楊慶復盡力守禦募驍勇厚給糧餉以諭之曰汝輩皆軍中材勇年少平居無由自進今蠻寇憑陵乃汝輩取富貴之秋也可自已乎因試其能得精兵三千號曰突將蠻以梯衝四攻成都躭命突將以鉤環挽之不得近因投火沃油以焚之蠻遂夜遁宋曹彬字國華靈壽人太祖伐蜀彬爲都監攻下郡縣諸將咸欲屠城彬獨申令戢下所至悦服蜀平王全斌等晝夜宴飲不恤軍士部下漁奪無已彬屢請旋師不聽俄而全師雄等繼起彬復破之卒平蜀亂時諸將多取子女玉帛彬橐中唯圖書衣衾而已安守忠字信臣晉陽人宋初爲左衞將軍歴漢州刺史時寇難甫平使車旁午公帑不足守忠出私錢以給用太祖每遣使必戒之曰安守忠在蜀律己以正汝行見之當效其爲人也馬亮字叔明合肥人第進士爲西川轉運副使賊平主將邀功誅殺不已亮全活千餘人城中米斗千錢亮出廩米裁其價人賴以濟召問蜀事㑹械送詿誤者九十人至闕下執政欲盡誅帝以亮言宥之辛仲甫字之翰汾州人太祖問羣臣文武兼資者爲誰趙普以仲甫對授益州兵馬都監太宗時以刑部郎中知成都府政尚寛簡蜀人安之沈倫字順儀太康人王師伐蜀用爲隨軍水陸轉運使先是王全斌崔彦進入成都競取玉帛子女倫獨居佛寺飯蔬食東歸篋中圖書數卷與曹武惠相同馬知節字子元太宗時年十八監彭州兵衆憚之如老將知梓州李順之叛詔與劉繼恩同討賊繼恩惡知節不附己遣守彭州付以羸兵三百彭之舊卒悉召還成都賊衆十萬攻城知節力戰自晨抵晡士多死慨然嘆曰死賊手非壯夫也即横槊潰圍出遲明援兵至復鼓譟入賊遂潰去帝嘆曰賊衆我寡知節不易當也授益州鈐轄加益漢九州都巡檢使吕餘慶安次人蜀平太祖命知成都府時軍士恃功多驕盜賊四起大將王全斌等不能戢下餘慶以宰相治蜀威惠並行一日街吏馳報有軍校被酒持刃奪賈人物餘慶命捕至立斬之以狥軍中震懼民用安堵劉紹榮四川都巡檢使初兵馬鈐轄符昭壽驕恣殺虐軍卒趙延順謀作亂殺昭壽紹榮格鬬衆寡不敵叛卒無主欲奉紹榮紹榮曰我本燕人自㧞歸朝豈與爾同逆邪汝亟殺我我不負朝廷遂自經而死石普西川行營先鋒討叛賊李順遷西川都提舉順餘黨復叛僣稱卭南王民疑不安多附賊者普馳入對陳蜀亂由賦斂煩苛農夫失業宜少蠲減之使自爲生賊不兵而自平矣帝許之普即日還揭榜告諭民皆悦服盜賊止息文彦博字寛夫汾州人慶厯中知益州政有威嚴而克果斷會歲飢米價騰踊乃諭富室得米二萬斛以活飢民累官同平章事封潞國公張詠字復之鄄城人知益州時李順搆亂王繼恩上官正總兵攻討城中屯兵三萬人而無半月之食詠訪知鹽價素高而廩有餘積乃下其估聽民以米易鹽民爭趨之未踰月得米數十萬斛復檄繼恩分兵隣州不數日減城中兵半詠計軍食有二歲之備遂奏罷闗中糧餉及正頓師不進詠以言激之勉其親行仍盛爲供帳舉爵屬軍校曰爾曹䝉國厚恩此行當平蕩醜類若老師曠日即此地還爲爾死所矣正乃決行深入大致克捷寇略之際民多脇從詠移文諭以朝廷恩信使各歸田里且曰前日李順脅民爲賊今日吾化賊爲民不亦可乎大修荒政歲糴米六萬石以廣儲蓄蜀人賴之民間訛言有白頭翁午後食人兒女一郡囂然詠戮造訛者一郡帖息初蜀士不樂仕宦詠敦勉郡之賢者張及李畋張逵就舉三人悉登科士由是知勸丁外艱起復久之復命知益州㑹遣謝濤巡撫西蜀上因令傳諭詠曰得卿在蜀朕無西顧之憂矣歸朝卒于陳雷有終字道成以䕃補漢州司户參軍從擊李順功就拜右諫議大夫知益州俄兼同招安使賊平歴知并州遷給事中咸平三年益州神衞戍卒竊發害兵馬鈐轄符昭壽擁都虞候王均爲亂遂拜有終濬州觀察使知益州與供奉官楊懷忠等滅之加保信軍節度使張方平字安道南京人以侍講學士知益州或有扇言儂智高奔入南詔將率南詔寇蜀攝郡者恇擾亟調兵築城日夜不得息民大驚亂朝廷聞之發陜西步騎兵仗絡繹徃戍蜀詔趣方平行許以便宜從事方平曰此必妄也道遇戍卒皆遣歸他役盡罷適上元張燈城門三夕不閉得卭部譯人始造此語者梟首境上蜀人遂安方西鄙用兵兩蜀多所調發方平奏免横征四十萬減鑄錢十餘萬緡聞眉山蘇洵之賢請相見待以上客見其二子軾轍深器異之爲治裝游京師作書與歐陽修後蘇氏父子以文章擅天下皆方平之力也薛田字希稷河東人益州路轉運使民間以鐵錢重私爲劵以便交易謂之交子而富家專之數致爭訟田請置交子務以𣙜其出入未報及寇瑊守益州卒奏用其議蜀人便之楊日嚴字垂訓河南人知益州奏罷擾民之賦爲蜀人信愛遷勾當三班院知通進銀臺司聞後守者其政不便蜀人因進對猶從容言逺方所宜撫安無容變法以生事上嘉納之任中正字慶之濟隂人知梓州擢樞密直學士代張詠知益州凡五載遵詠條教蜀人便之趙抃字閲道衢州西安人初爲梓州路轉運使改益州蜀地逺民弱吏肆爲不法州郡公相饋餉抃以身率之治風爲變窮城小邑民或生而未識使者抃行部無不至父老喜相慰奸吏竦服召爲右司諫數年加龍圖閣大學士知成都抃向治蜀時有聚爲妖祀者繩以峻法及是復有此獄皆謂不免抃察其無他曰是特酒食過耳刑首惡而釋餘人足矣蜀民大悦㑹榮諲除轉運使英宗諭諲曰趙抃爲成都中和之政也爾徃資之治蜀數年神宗立召知諫院故事近臣還自成都者必大用不爲諫官大臣以爲疑帝曰吾賴其言耳茍欲用之無傷也及謝帝曰聞卿匹馬入蜀以一琴一鶴自隨爲政簡易亦稱是乎未幾擢參知政事㑹成都以戍卒爲憂遂以大學士復知成都召見勞之曰前此未有自政府徃者卿能爲朕一行乎對曰陛下有言即法也奚例之問因乞以便宜從事既至治益尚寛有卒長立堂下呼諭之曰吾與汝年相若吾以一身入蜀爲天子撫一方汝亦宜清謹畏戢以率衆比戍還得餘貲持歸爲室家計可也人喜轉相告語不敢爲惡蜀郡宴然劒州民私作僧度牒或以謀逆來告抃不畀獄吏以意決之悉從輕比謗者謂其過縱朝廷取獄具閲之皆與法合茂州夷剽境懼討乞降乃縳奴將殺之取血以受盟抃使易以牲皆懽呼聽命凡政用寛率此類也後以大子少保致仕元豐七年卒諡清獻贈太子少師田况字元均信都人慶厯中知益州治尚和易去苛細奬進儒素禁戢姦暴以德化人人不忍欺吕公弼字寳臣壽州人仁宗時知成都府治尚寛大人疑少威斷營卒犯法當杖扞不受曰寧以劒死公弼曰杖者國法劒汝自請杖而後斬之於是軍府肅然韓億字宗魏雍丘人仁宗時知益州爲政簡而嚴故事發粟六萬石賑貸貧民㑹歲大旱億倍數出粟先期與民民免饑饉又疏九井江口溉民田萬頃禮士勸學儒風丕振蜀人祠之程顥字伯淳河南人仁宗錄舊臣後以爲黄陂尉歴知漢州政先教化不事煩苛至今祠之張燾字子公德興人高宗時以寳文閣學士知成都兼本路安撫許以便宜燾至成都戢貪吏薄租賦撫蕃夷歲旱先時發粟民得不饑暇則修學校與諸生講論有詔令宣撫司納契丹降人燾爲宣撫胡世將言蜀地狹前朝常勝軍可以爲戒世將奏寢其事燾乞祠以李璆代之胡世將字承公晉陵人以樞密直學士出爲四川安撫制置使兼知成都府宣撫呉玠以軍無糧奏請踵至世將既被命入境約玠㑹議蜀之饟運遡嘉陵江千餘里半年始達於是奏用轉搬摺運之法軍儲稍充公私便之汪應辰字聖錫玉山人孝宗時以敷文閣直學士四川制置使知成都府既至免利路民餉運徙沿邊戍兵就糧内郡縱保勝義士復業存左藏所解白契二百萬以備不虞悉奉行之有謂蜀中綱木驛程由梁洋金房山路峻險宜浮江而下詔呉璘措置執政大將皆主其説應辰與䕫帥王十朋力言其不便遂得中止二税勘合毎貫取二十錢乾道詔㫖嘗減三之一有欲増之者應辰與兩漕臣列奏言勘合不以釵計而以貫石匹兩計是陽爲減而隂欲増之也以成都一路計之歲入三十萬今以所増爲六十萬計以四路不知幾倍雖非興利者所便而民受其賜多矣㑹總所委官覈四川匿契税應辰奏其不便者四曰防農廢業曰縱吏擾民曰違法害教曰長奸起訟比户部已令人自首收併已不少其未盡者有見行法令不宜爲此煩擾上罷止之蜀大旱詔問捄荒之䇿應辰奏利閬綿梓軍馬糧料隨民力均敷官雖支糴民不得半價若選官就歲熟處糴之可以寛民力第無錢束手乞給度牒上曰汪應辰治蜀甚有聲且留意民事如此給度牒四百永爲糴本賑濟遂移書諸路漕臣急圖捄荒且以綿劒和糴告之而全蜀䝉惠矣李璆字西美汴人以徽猷閣直學士四川安撫制置使璆至成都首命築城城畢大水民賴以安三江堰下灌眉州田百萬頃歲久荒廢璆率郡刺史合力修復至今享有成利眉人感之祠于堰所間遭歲饑開倉賑民存活百萬治蜀之政多可紀有清溪集王剛中字時亨饒州樂平人高宗時知成都府并制置四川時老將呉璘官閥尊重麾下姚仲王彦等亦建節各雄一方守帥以文治則玩于柔而號令不行以武競則窒于暴而下情不通惟剛中檢身以法示人以禮不立崖塹恩威並行羽檄紛沓從容裁决皆中機㑹敵騎度大散闗人情洶洶剛中跨一騎一日夜馳二百里起呉璘于帳中責之曰大將與國義同休戚臨敵安得高枕而卧璘大驚又以蠟書抵張正彦捄援西師大集金兵敗走方議報捷剛中倍道馳還謂其屬李燾曰將帥之功吾何有哉燾唶曰身督戰而功成不居過人逺矣成都萬歲池廣袤十里溉三鄉田歲久淤澱剛中疏之累土爲防上植榆栁表以石柱州人指曰王公之甘棠也府學禮殿東漢興平中建遭時多故日就傾圮乃屬九縣繕完悉仍其舊孝宗受禪進左朝奉大夫以足疾辭歸番陽丘崈字宗卿江隂人隆興元年進士以奎章閣學士知成都府制置四川時呉氏世將崈陛辭請便宜曰臣入蜀後呉挺脱至死亡兵權乞付他將挺果死崈即令總領楊輔就近節制諸軍朝廷更命張詔統之至韓侂胄還呉曦兵柄曦即叛人乃服崈先見劉隨字仲豫開封人爲永康軍判官轉運使李士衡記以事不從乃奏隨苛刻罷歸初西南夷市馬入官苦吏誅索隨爲繩按之及是夷人數百訴於轉運使曰吾父何在事聞乃得調蜀人號爲水晶燈籠馮京字當世江夏人熈寧中知成都蕃部寇鷄棕闗京出兵蕃懼乞降京請于朝爲禁侵掠給農器餉使歸夷人喜爭受盟願爲漢藩范純仁字堯夫歴官集賢院學士忤王安石出爲成都路轉運使以新法不便戒州縣未得遽行安石怒其沮格遣使欲攟摭私事卒莫能得左遷知和州張伸熈寧中守資州約已以儉接人以恭束吏以嚴撫民以寛爲西川治郡第一士民立祠祀之李景孠元豐中守資州代民輸免役錢四千萬蠲和糴米六千斛除無名之斂増養士之田瘞久暴之骨申放生之禁兵荒之後人皆歌舞頌德程堂知雙流聽斷明敏縣無留獄有蝗食苗堂曰吏奉天子命以養民蝗當食吏五臟勿食民食乃以泉水吞之蝗遂踰境吕大防字微仲藍田人知成都府政治尚寛與民同樂訟至立斷又修築堤堰以灌民田利賴無窮歐陽觀廬陵人咸平三年進士爲綿州推官有死獄當决者反覆推原歎曰求其生而不得則死者與我俱無憾也性亷潔好施子修生於公廨范成大字致能呉郡人以敷文閣待制爲四川制置使蜀士知名若孫松壽樊漢廣皆掛冠不仕成大表其節蜀士歸心劉叔寳治平中知新津倡化敷教隆恩屏害邑人繪像祀焉韓宗道熈寧初權成都府路轉運判官時行新法使者冠蓋相望於道宗道不務紛更不膠舊貫所究利害務適其平故蜀益視他路獨優宗道調停之力程珦知漢州嘗宴客開元僧舍酒方行人讙言佛光見觀者相騰踐珦安坐不動頃之遂定熈寧法行珦抗議指其未便時論韙之王騣知益州戍兵有夜爲亂者騣潜遣呉環營下令曰不亂者斂手出無所問衆皆出命軍校擒爲亂者十餘人戮之及旦人莫知也爲政尚大體不尚苛察蜀人愛之晁公武字子政乾道間爲四川安撫制置使時米價騰貴人民告饑公武以錢三萬餘貫糶米六萬石專充賑糶以備久逺民得無患趙汝愚字子直漢王元佐七世孫淳熈間以直學士制置四川兼知成都府諸羌祖挻爲邊患汝愚至以計分其勢遂平之趙不􅖊字仁仲系出太宗除知開州郡有鹽井以羨餘代民輸民絶鬬爭夜户不閉諸司交薦比諸古循吏轉䕫州轉運判官開人數千遮城門不得行改成都路轉運判官黎州青羌奴結兒反朝廷命攝制司不􅖊檄諸蕃部生獲吐蕃一人賞十縑殺一人二縑於是卭部川首領崖蠟合諸部落大破吐蕃於漢源斬夢束畜列首來獻凡十六日而平除成都提刑韓琦字稚圭安陽人寳元初任四川觀察使益州路饑蠲減賦税募人入粟招壯者爲廂軍一人充軍數口全活檄劒門闗民流移者勿禁簡州饑尤甚發常平庫糴錢六十餘户以給下户罷冗役饘饑民捕彭益之剽掠耆民德之立生祠以祀洪咨䕫字舜俞於潛人崔與之帥成都請於帝授咨䕫籍田令通判成都府與之爲制置使首檄咨䕫自近辭曰今當開誠心布公道合西南人物以濟國事乃一未有聞而先及門生故吏是示人私也卒不受惟以通判效職蜀人高之尋知龍州盡革科擾出官錢以償逋負後爲端明殿學士鄭剛中字亨仲金華人爲四川宣撫副使宣撫舊住河池饋餉不繼剛中乞移司利州自是省費百萬又欲移屯一軍大將楊政不從呼政語曰剛中雖書生不畏死聲色俱厲政即聽命都統每入謁必堂參然後就坐呉璘官至檢校少師語閽吏乞講鈞敵之禮剛中曰少師雖尊猶都統制耳倘變常禮是廢軍容也不可行禮如故奏蠲四川雜征又請減成都府路對糴及宣撫司激賞錢又於階成二州營田抵秦州界凡三千頃歲收十八萬斛先是川口屯兵十萬分𨽻三大將呉璘屯興州楊政屯興元郭浩屯金州皆建帥節而都統官知成州王彦知階州姚仲知西和州程峻知鳯州楊崇儀亦領沿邊安撫剛中請分利州爲東西路以興元府利閬洋巴劒州大安軍七郡爲東路命楊政爲安撫以興階成西和文隴鳯七州爲西路命呉璘爲安撫而金房開達則以郭浩爲安撫其諸禆將安撫者皆罷從之除䕫路酒禁復利州錢監爲紹興監時軍已移屯内郡剛中言逐路各有漕司都漕宜罷亦從之秦檜惡其專擅令御史奏置四川財賦總領官不𨽻宣撫司又令總領官私求剛中隂事因召剛中再責濠州團練副使復州安置竟死貶所崔與之字正子廣州人以煥章閣待制知成都府本路安撫使時安丙握兵柄久毎忌蜀帥自東南來者與之至獨推誠相與及丙卒詔盡獲四蜀開誠布公兼用呉蜀之士拊循將士人心悦服戎帥調和軍政始立與之以疾丐歸朝廷以鄭損代金人聞之縱兵大入與之力疾一臨邊金兵遂遁其去蜀也蜀人思之肖其像于成都仙遊閣以配張詠趙抃爲三賢歲時祀焉楊大異字同伯醴陵人四川制置司參議官嘉熈三年元兵入成都大異從制置使丁黼巷戰黼敗死大異被創死復蘇闔門皆遇難詰旦其部曲負以逃獲免召對極言時政得失迕宰相意出知澧州理宗曰是四川死節更生者楊大異耶論事剴切有用之材也何遽出之陳隆之闕人爲四川川制置使淳祐元年成都被圍部將田世顯乘夜開門元兵突入隆之舉家數百口皆死檻送隆之至漢州命諭守臣王䕫降隆之呼䕫語曰大丈夫死爾毋降也遂見殺黄疇若豐城人知成都府時有當徵積欠十餘萬疇若至亟命盡蠲之考官吏冗員非勑命差注者悉罷又糴米足廣惠倉又減他賦之重者民力遂寛初沈黎蠻屢犯邊疇若至則鏤榜曉以禍福青彌兩羌遂乞降㑹董蠻合部族入寇疇若亟調兵具設方畧捕之皆遁去疇若留蜀四年弊根蠧穴莫不悉除丁黼成都人制置使嘉熈三年北兵自新井入詐豎宋將李顯忠旂幢直趨成都黼以爲潰卒以旗招之既審知其非夜出城南迎戰死之大兵未至黼先遣妻子南歸自誓死守從黼者惟幕客楊大異及所信任數人俱死黼治蜀寛大蜀人思之爲立祠宋汝爲字師禹豐縣人建炎三年金人再至汝爲上陳邊事高宗嘉納特補修武郎假開州刺史奉國書副杜時亮使金汝爲行次壽春遇金完顔宗弼軍不克與時亮㑹獨馳入其壁將上國書宗弼怒刼而縳之欲加僇辱汝爲無懼色曰死固不辭但啣命出疆願達書吐一辭死未晩宗弼遂解縳延之曰此山東忠義之士也乃瀕死數四以至京師遂爲拘留授以通直郎同知曹州固辭不受因伺其機密遣人歸報朝廷久之亡歸獻恢復方畧是時秦檜當國罷不復問久之高宗憶其忠特轉通直郎復上兵事于丞相不聽後金人知汝爲逃歸洩其機事秦檜遂欲械送以解汝爲乃變名姓爲趙復徒步入蜀隱青城山預知死期將終神氣不亂汝爲俶儻尚氣節博物洽聞有忠嘉集行世蜀中廣記卷四十七
