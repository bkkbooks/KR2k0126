body:
  text: 蜀中廣記卷八十八明曹學佺撰高僧記第八川北道一觀音菩薩化身有宋元祐中守普州知安岳縣事趙嗣業記曰大唐克幽禪師俗姓李氏其先隴西人因官入蜀家于遂之長江縣幼玩世典有志於仕而緣在於佛因以得疾見猛焰相逼遂發志出家求無上道應念火滅疾亦尋愈往依成都淨衆寺無相大師金和尚而師資道合投針相契就削髮圓具無相即授以心要師亦靈根宿植言下頓悟無相謂師汝如香象渡河深通我願付法之最當在汝也遣往彭門白鹿山結庵而居無相一日謂衆曰東雷鳴矣衆莫之測會杜公濟節度東川果欽師道延請歸住持遂之石佛寺説法為人大厯七年忽現瑞相身坐圓光中逺近花卉變成蓮萼人皆異之刺史鮮于公曼皇叔李公樸深所信奉叅叩密㫖由是學徒雲集嘗曰汝等諸人勿學凡夫三乗外厭諸相而不了知相逐相生相繼無窮流浪生死凡受法者須具福智二門行住坐卧不離此心即六識清淨妙周沙界故經云所見色與欲等所聞聲與響等但心不生則諸法空寂其示人略如此先是資陽處寂禪師囑其衆曰吾示滅矣四十年後當有東來菩薩收吾舍利為吾造塔開元乙亥嵗寂入滅至大厯戊午厯嵗四十四而師遣門人昇岸等往為營建開壙獲記一如所言建中大旱井泉枯竭師遥指寺之西北隅往視卓錫焦崖水湧衆賴以濟今謂之聖水井貞元三年五月師吿衆曰吾此方緣盡不久將行刺史韋成武聞知帥衆詣寺請師久住濟度羣品師曰吾未嘗去但衆生緣盡耳九月十一日復升座曰時至矣趺坐而化報齡六十僧臈三十五韋公命其徒建塔於寺之南以葬全身㑹昌中寺廢塔毁地陷成池瑞蓮時出往取則無有天復年間相國瑯琊王公簡見一僧立府庭遣人逐之至池所而没因發掘其地得異骨如金色鈎鎖相連其教謂之菩薩骨也乃復建塔藏之併興其寺而五色圓光現谷中人以為觀音化身即於塔之側創一堂塑像莊嚴以表其事謂之聖觀音往往暁色開霽日出霧升團為圓相布為五色觀者堵立自見其形現光相中至今猶然太守馮公了達佛乗以外䕶之力謂禪師應化靈跡如此而舊記闕畧乃以其事畀嗣業輒緝拾始末可傳信者詳而書之以示後人按石佛寺今名廣德馮公名均愉時為朝請大夫兼遂寧縣軍府事也崇寧中封秦國太師劉懷逺慶元中叅知政事何澹寳慶中釋隆粲俱有詩碑言金骨化身之事宋釋法成涼州人不餌五穀唯食松栢脂孤居巖穴習禪元嘉中東海王懷素出守巴西聞風遣迎㑹於涪城夏坐講律事竟辭反因停廣漢復𢎞禪法後小疾便告衆云亡成常誦寳積經於是自力誦之始得半巻氣劣不堪乃令人讀之一遍纔竟合掌而卒侍疾十餘人咸見空中有紺馬背負金棺升空而逝宋釋僧慶姓陳巴西安漢人出家止義興寺淨修梵行願求見佛先捨三指末誓燒身漸絶糧粒唯服香油大明三年二月八日於蜀武擔寺西對其所造淨名像前焚身供養刺史張悦躬出臨視道俗耆舊觀者傾邑行雲為結苦雨悲零俄而晴景開明天色澄淨見一物如龍從􅚟升天時年二十三天水太守裴方明為收灰起塔宋元徽初有異僧亡名氏到梓州上牛頭寺主僧厚相禮待别去贈以木鑰曰後思見我當至中岩石筍扣之明年寺内低頭佛失珠主僧窘甚行至青神中岩以鑰扣石筍峯裂為三乃見昔僧曰盜取佛珠江濱我得之久矣主僧受珠而還見本志梁梓州牛頭寺釋明達其先康居人也童稚出家嚴持齋戒年及具足行業彌峻脇不著席日無再飯外儀軌則内樹道因廣濟為懷遊行在務以天監初來自西戎至於益部時巴峽蠻夷鼓行抄劫州郡徵兵克期誅討達獨行詣壘慰喻招引尚尒不悛俄而風雨晦冥雷霆震擊羣賊驚駭叩頭求哀乃教具㸃千燈祈誠三寳營辦始就昏霾立霽翕然望國並從王化襁負排藪獺獸前趨者其徒充澤遂使江路肅清往還無阻兵威不設而萬里坦然達之力也後因行役中路逢有人縳㹠在地聲作人語曰願上聖救我達即解衣贖而放之嘗於夜中索水洗脚弟子如言而泥竟不脱重以湯洗如前不去乃自以水灌之其脚便淨達曰此魚膏也更莫測其所從行至梓州牛頭山欲構浮圖精舍不訪材石直尋匠工道俗咸恠其言于時三月水中得一長材正堪刹柱長短合度引而竪焉至四月來涪水大溢木流翳江自泊村岸都無溜者達率合皂素通皆接取從横山積創修堂宇架塔九層逺近併力一時繕造役不逾時而成就矣達躬襲三衣並是麤布破便治補寒暑無革有時在定據于繩床赫然火起衆往撲滅唯覺清涼有沙門僧救者積患攣躄來從乞瘥達便授杖令行不移晷景驟步而返斯陰德顯濟功不可識其例若斯後隨始興王還荆州卒於江陵春秋五十有五梁釋寳淵姓陳巴西閬中人年二十三於成都出家居羅天宫寺欲學成實論乃下都住龍光寺從僧旻法師禀受五聚經涉數載義頗染神旻曰此君任性儁警智慮過人但恨迴惑不倫動靜險躁幸值通人優接當成一世名士若不遇時不得其死必當損辱大法矣淵不省因自建講筵貨財周贍篤勵辛勤有倍恒日毎言大丈夫當使人事我何能久侍人乃廣寫義疏緘封一簏有意西歸同寺慧濟謔之曰昔謝氏青箱不至不得作文章今卿白簏未來判無講理淵曰殊不然此乃打狗杖耳因帶帙西反還住舊寺標定義府道俗懷欽於是論筵頻建聽衆數百自重名行少賔知己沙門智訓遊學京華敷論通敏同還本壤投分與交淵弗之許也後寺庫犯官淵以身代當强悍不弭至於事成知當必敗以刃自刎時年六十一周釋寳彖姓趙氏本安漢人後居綿州昌隆之蘇溪年七嵗至巴西郡太守楊眺問云承兒大讀書因何名為老子彖曰始生頭白故也眺密異之年廿有志四方得出家即受具戒後還涪川開化道俗又抄集毉方療諸疾苦或報以金帛一無所受彖雖道張井絡風播岷峩見大集一經未𢎞蜀境為之䟽記欲使後學有歸忽感風疾不言久之命將欲絶私心發誓願諸佛䕶念作是念己忽然能語吾即當去合掌奄然卒於潼州光興寺即綿州振響寺也時保定元年周釋寳海姓龔閬中人出家有逺志時揚都佛法崇盛下峽至金陵依雲法師聽習成實亟發清譽引衆别講徒屬兼多及後還蜀住謝西寺武陵王紀作鎮井絡毎就海宿請談𤣥理乃忘晝夜至旦王將盥手日影初出王曰日暉粉壁狀似城中風動刹鈴方知寺裏其晨車葢迎王馬復嘶鳴海曰遥看葢動喜遇陳思忽聽馬鳴慶逢龍樹相與欣笑而出年八十謂門人法明曰吾死至矣一無前慮但悲去後圖塔湮滅耳當露屍以遺鳥獸及周建德果被除屏今院宇荒毁唯餘一堂容像存焉唐釋靈睿姓陳本惟頴川流寓蜀部益昌之陳鄉人也其母以二月八日設齋乞子夢見松林下坐有七寳鉢於樹顛飛來入口便覺有娠即不喜五辛諸味及其誕已設或食者母子頭痛於是遂斷八嵗二親將至道士所令誦步虚詞面孔血出遂不得誦還家入田遇見智勝法師便隨出家一夏之中大品暗通開皇初高麗印公入蜀講三論又為印之弟子後隨入京流聽諸法大業之末返蜀部住法聚寺武德二年安州暠公上蜀在大建昌寺講開大乗睿止法筵三年後還本住常𢎞此部經睿身相黒短止長五尺言令所及通悟為先及唐貞觀元年通州騫禪師作檀越盡形供給三百聽衆至七年八月二十五日夜睿夢有衣冠者來迎騫往西方去徒衆鉢中皆空無物至三十日寺鐘大小七口銅磬十餘一時皆鳴至三更據繩床跏坐而終睿自此後周流講唱傳化不絶至二十年八月二十四日三更大風忽起高聲言曰靈睿法師來年十月往南海大國光明山西阿觀世音菩薩所受生也至期十月三日合寺長幼道俗見旛華菩薩滿寺而下睿聞出看斂容立終堅住不倒扶卧房中三更忽起跏坐如生時年八十三然其潔清童稚過中不飲具盡報云唐釋惠主俗姓賈氏始州永歸人六嵗出家為斌法師弟子於黄安縣造寺七所梓潼縣造十寺武連縣造三寺欲受具足當境無人乃入京選德於甘露寺受戒唯聽四分餘義傍通夢見三日三夜天地闇㝠衆生無眼過此忽明眼還明淨覺已汗流一百日後周毁經道方知徵應即返故鄉南山藏伏唯食松葉異類禽獸同集無聲或有山神送茯苓甘松香獲此供養六時行道禽獸隨行禮佛誦經似如聽仰仍為幽顯受菩薩戒後有獼猴羣來治道主曰汝性躁擾作此何為曰時君異也佛日通也深怪其言尋爾更有龍飛獸集香氣充山祥異衆矣後有八人採弓材者甚大驚駭便慰主曰聖君出世時號開皇即將出山以事奏聞蒙預出家大業中勑還本州香林寺常𢎞四分為業武德之始陵陽公臨益州素少信心將百餘䭾物令於寺内講堂佛殿安置無敢違者主從莊還見斯穢襍即入房中取錫杖三衣出歎曰死活今日矣舉杖向驢騾一時倒仆如死兩手各擎一䭾擲弃坑中州縣官人驚怖執主狀申陵陽大喜一無所怪書曰弟子數病不逢害鬼䝉得律師破慳貪袋深為大利今附沉香十片細綾十段仰贈後還京日從受菩薩戒焉貞觀三年寺有明禪師者清卓不羣白日獨坐見無半身向衆述曰吾與律師建立此寺兩人同心忽失半身將無律師先去不者明其死矣尋爾午時主便無疾而逝春秋八十九隋釋善胄俗姓淮氏瀛州人少出家通敏易悟開皇末蜀王秀鎮部梁益擕與同行㑹文帝勑送舍利于梓州牛頭山華林寺嚴輿至州館夜發光明徹屋掘塔基深入丈餘得古瓷瓶有水清澄又堂内彌勒亦放眉間紫光前七度見者以為神異焉師大𢎞法席深習禪定以武德三年八月終於淨影寺春秋七十有一謂門人曰我一生正信在心不慮淨土不生向者阿彌陀佛來汝等見不語頃便卒葬于城南韋曲之北崖遵遺令也唐梓州沙門紹闍黎𤣥武人未出家前山行見一大䖝甚瘦將一子於澗中取蝦子蝦子又不可得紹乃歎曰此䖝應在深山今乃出路飢渴甚矣等是一死不如充此飢渴乃脱衣往卧䖝前䖝避去後方出家唯誦經行道而已更無異行大業之初汝州界䖝暴非常三五十人持杖不敢獨行紹乃往其處立茅苫而坐䖝皆逺徙道路清夷年一百九嵗乃見疾謂弟子曰我欲露屍乞諸䖝鳥而虎嫌我身生尚不食豈死能嘗可焚之無餘燼弟子等不忍依其言乃露屍月餘鳥獸不犯始收葬焉唐釋靖邁梓潼人也少孺矜持長高志操特於經論研覈造㣲氣性沉厚不妄交結遊必擇方抵于京輔貞觀中屬𤣥奘西囘勅於廣福寺翻譯遂召證義大德諳練大小乗經論為時所尊尚者得一十一人邁預其精選即居慈恩寺也同普光寺棲𤣥廣福寺明濬會昌寺辯機終南山豐德寺道宣執筆綴文皆推適變故得經心矣靖邁著譯經圖紀四卷編于藏唐梓州牛頭山寺釋智通姓陳八嵗出家為正道法師弟子後誦法華開講牛頭山常有雙鵝依時聽講講百餘遍兩度放光至貞觀二十三年十月十三日告衆吾造山寺可用十萬貫恨未用備今便永别言訖而卒春秋九十七合寺房堂皆動而作白色經一食頃唐梓州釋慧震姓龎住通泉寺聽暠師三論大領𤣥㫖福力所被蜀部遥推暠之還南得袈裟三百領以贈路首毎年正月轉藏經千人袈裟奉施無闕常𢎞三論聽衆百餘忽於高座似悶見人語曰西山頭好造大佛既覺下座領衆案行中堪造像兩邊泉流即命石工鐫鏨坐身高百三十尺貞觀八年周備成就四面都集道俗三萬慶此尊容其像口中放大白光逺近同奉先有一馬日行五百里曽經入陣餘馬並死唯此得還至十四年七月忽自嘶鳴不食三日震聞毛竪有一異僧名為十力語震曰馬與主别主當先行來年正月十五日日正中時應入湼槃法師須散財物無留於後於身何益言已而隠莫知其由先造藏經請僧常轉開大施門四逺悲敬來者皆給至終年初又請衆僧讀經行道作三七日俗緣昆季内外皆集至於八日香氣鬱勃充滿寺中傾邑道俗共聞異香捨㪚山積至十五日氣猶不歇從旦至午寺内樹木土地皆生蓮華震曰嘉相已現不容待滿便行䞋施早食訖手執香爐繞盧舍那三帀還於佛前胡跪正念大衆滿堂不覺已逝春秋六十有六停喪待滿香氣猶存兄弟三人各捨五十萬於墓所作僧德施及以悲田作石塔高五丈龕安繩床扶屍置上經百餘日猶不委仆道俗萬餘悲泣相繼焉唐梓州慧義寺清虚姓唐氏本州人也立性剛決桀黠難防忽迴心長誦金剛般若三業偕齊無有懈怠嘗於山林持諷有七鹿馴擾若傾聽焉聲息而去又鄰居失火連甍灰燼唯虚之屋猋燄飛過略無焦灼長安二年獨遊藍田悟真寺上方北院舊無井泉人力不及逺取於澗挈瓶荷甕運致極勞時華嚴法藏聞其持經靈驗乃請祈泉師入彌勒閣内焚香經聲達旦者三忽心中似見三玉女在閣西北山腹以刀子剜地隨便有水熟記其處趨起掘之果獲甘泉四年從少林寺坐夏山頂有一佛室甚寛敞人無敢到者云鬼神居宅焉師往彼如常誦經夜聞堂東有聲甚厲即念十一面觀音呪又持本經一契帖然相次影響皆絶自此居者無患神遂移去唐梓州慧義寺神清字靈庾俗姓章氏綿州昌明人也生于大安山下昆季相次三人出俗皆有名望清居乎仲母胎之際頓惡葷羶及為兒雖隨戲弄遇像禮足逢僧稽顙年十三受學於綿州開元寺辯智法師于是勅條嚴峻出家者但念經千紙方許落髮清即誦法華維摩楞伽佛頂等經有同再理時故相喬琳為綿郡太守驚其㓜俊躬為䧏禮請削染焉則大厯中也至年十七聽習粗通即講法華一經嵗滿慧義寺依如律師受具戒夏習尸羅依學新疏講導著述略無閒時以元和年中終於本寺峯頂遷神於白門蘭若即郪城北郭外也清貌古且竒晳白光瑩相國崔龜從時從事東川序真讃云與奘三藏道顔同攝特異時一體耳門人數多其出倫者義將也獨明俱捨兼善起信海内學人望風而至開成中北山俱舍宗不泯者清之餘素乎唐圭峯宗密姓何氏果州西充人也家本豪盛少通儒書欲干世以治生靈負俊才而隨計吏元和二年偶謁遂州圓禪師圓未與語密欣然而慕之乃從削染受教此年進具於極律師尋謁荆南張張曰汝傳教人也當宣導於帝都復見洛陽照禪師照曰菩薩人也誰能識之末見上都華嚴觀觀曰毗盧華藏能隨我遊者其唯汝乎初在蜀因齋次受經得圓覺十二章深達義趣誓傳是經在漢上因病僧付華嚴句義未嘗𨽻習即爾講之由是乃著圓覺華嚴及湼槃金剛起信唯識盂蘭盆法界觀行願經等䟽鈔及法義類例禮懴脩證圖傳纂略又集諸宗禪言為禪藏總而序之并酬荅書偈議論等又四分律䟽五卷鈔懸談二卷凡二百許卷圖六面皆本一心而貫諸法顯真體而融事理超羣有於對待㝠物我而獨運矣密累入内殿承問法要太和二年慶成節賜紫方袍為大德尋請歸山㑹昌元年正月六日坐滅於興福塔院儼若平日七日遷於函其月二十二日道俗等奉全身於圭峯二月十三日茶毗得舍利數十粒悉斂藏於石室俗齡六十二僧臘三十四遺誡令舁屍施鳥獸焚其骨玉勿得悲慕以亂禪觀毎清明上山必講道七日而後去其餘住持儀則當合律科違者非吾弟子長慶元和中官立功執政孔熾内外猜疑人主危殆時宰臣李訓酷重於師及開成中偽甘露發中官率禁兵五百人出閣遇者一皆屠戮王涯賈餗舒元輿方在中書㑹食聞難作奔入終南來投唯李訓欲求翦髮自匿從者止之訓改圖趨鳯翔時仇士良遣人捕師入左軍面數其不吿之罪師怡然曰貧道識訓年深亦知其反叛然本師教法遇苦即救不愛身命固死甘心中尉魚恒志嘉之奏釋其罪焉或曰密師為禪耶律耶經論耶對曰夫密者四戰之國也人無得而名焉可謂大智圓明自證利他大菩薩也是故裴休論譔云議者以師不守禪行而廣講經論遊名邑大都以興建為務乃為多聞之所役乎豈聲利之未忘乎噫議者焉知大道之所趣夫一心者萬法之總也分而為戒定慧開而為六度散而為萬行萬行未嘗非一心一心未嘗違萬行禪者六度之一耳何能總諸法哉且如來以法眼付迦葉不以法行故自心而證者為法隨願而起者為行未必常同也然則一心者萬法之所生而不屬於萬法得之者則於法自在矣見之者則於教無礙矣本非法不可以法説本非教不可以教傳豈可以軌迹而尋哉自迦葉至富那奢凡十祖皆羅漢所度亦羅漢馬鳴龍樹提婆天親始開摩訶衍著論釋經摧滅外道為菩薩唱首而尊者闍夜獨以戒力為威神尊者摩羅獨以苦行為道跡其他諸祖或廣行法教或專心禪寂或蟬蛻而去或火化而滅或攀樹以示終或受害而償債是乃法必同而行不必同也且循轍跡者非善行守規墨者非善巧不迅疾無以為大牛不超過無以為大士故師之道也以知見為妙門寂淨為正味慈忍為甲盾慧斷為劍矛破内魔之高壘陷外賊之堅陣鎮撫邪襍解釋縲籠遇窮子則叱而使歸其家見貧女則呵而使照其室窮子不歸貧女不富吾師恥之三乗不興四分不振吾師恥之忠孝不並化荷擔不勝任吾師恥之避名滯相匿我増慢吾師恥之故遑遑於濟拔汲汲於開誘不以一行自高不以一德自聲人有依歸者不俟請則往矣有來益者不俟憤則啓矣雖童幼不簡於應接雖驁狠不怠於叩勵其以闡教度生助國家之化也如此故親師之法者貪則施暴則斂剛則隨戾則順昏則開堕則奮自榮者慊自堅者化徇私者公溺情者義凡士俗有捨其家與妻子同入其法分寺而居者有變活業絶血食持戒法起家為近住者有出而修政理以救疾苦為道者有退而奉父母以豐供養為行者其餘憧憧而來欣欣而去揚袂而至實腹而歸所在甚衆不可以紀真如來付囑之菩薩衆生不請之良友其四依之人乎其十地之人乎吾不識其境界庭宇之廣狹深淺矣議者又焉知大道之趣哉按通志載圭峯禪師蓬州人昔人相傳鷺鶿山有井井側有巨人足跡母履其跡而孕生師棄諸野馬牛避弗踐鷺鶿以羽覆之母收以養及長奉佛於青蓮山講經其上青蓮湧出有八龍聽經今有八龍池塔曰青蓮塔焉唐釋懷空姓梁氏閬州人也㓜適本州耆闍山廣福院削染得戒之後遊方慕學於大寂禪法洸然明暢後至彭城安豐山拄錫㝠黙不數載間成大伽藍嘗有一僧乗空而至遶垣墻不息或躡蓮花或時履地人咸瞻覩數日之後禮辭空且曰我三五稔却來依附言訖不見空以興元元年滅度春秋八十八長慶元年二月方遷入塔云唐釋有緣俗姓馮東川梓潼人小學之年往成都福感寺事定蘭開士即宣宗之師也隨侍出入多在内中一旦宣召帝以筆書其衫背云此童子與朕有緣故稱有緣云大中九年遇白公敏中出鎮益部開戒壇即於淨衆寺具尸羅續游京輦聽習經律五臘後身披布褐手執墨勅海内遊行叅見小馬神照凡同時叢林禪祖無不禮謁者乃居滁州花山及南遊至武夷山時廉使李誨為築禪室乾符三年至縉雲龍泉立院因奏祠部給額號龍安天祐丁夘嵗六月朔日終報齡七十三臘五十二於寺南園茶毗散分舍利數百粒後收四十九粒并遺骨一缾􅄟于石塔晉開運年一泰律師撰碑唐閬州長樂寺法融姓嚴氏閬中人也稚齒好淨業父訓令秉筆便畫佛形像至於聚戲摶沙為塔所作無非佛事年甫十三見釋子摳其衣坐執經卷苦求出家依長樂寺慧休法師為弟子經誦偕通乃霑戒善開講南山律鈔後遊雲水見嵩嶽普寂禪道風行密付心印往弋陽福寧寺放蕩閒居學道者羣至以大和九年示疾而終春秋八十九唐法真禪師梓州人玅齡夙悟南遊見藥山道人次至嶺外大溈會下清苦練行溈深器之一日問曰闍黎在此不曽問一轉語師曰教某向甚麽處下口溈曰何不道如何是佛師作手勢掩為口溈嘆曰子真得其髓從此名傳天下還蜀寄錫天彭堋口山龍懷寺三年因往後山見一古院中有一樹圍四丈餘南開一門中空不假斤斧時人因號為木禪菴師居其下十餘載蜀主遣使屢徵皆辭不赴賜號神照大師傳燈錄云法真禪師僧問劫火洞然大千俱壞未審此箇還壞也無師曰壞僧曰恁麽即隨他去也師曰隨他去也師問僧什麽處去曰西山住菴去師曰我向東山頭喚汝汝還來得麽僧曰即不然師曰汝住菴未得問生死到來時如何師曰遇茶喫茶遇飯喫飯曰誰受供養師曰合取鉢盂師菴側有一龜僧問一切衆生皮裹骨者箇衆生骨裹皮如何師拈草履於龜邊着僧無語問如何是學人自己師云是我自己曰為什麽却是和尚自已師曰是汝自已問如何是無縫塔師云高五尺曰學人不㑹師曰鶻崙塼問和尚百年後法付何人師曰露柱火爐曰還受也無師曰火爐露柱問如何是和尚家風師曰赤土畫簸箕曰如何是赤土畫簸箕師曰簸箕有唇米不跳出一日衆僧叅次師口作患風勢云還有人毉得吾口麽僧俗聞之多送藥至師並不受七日後師自摑口令正乃云如許多時鼓者兩片皮至今無人毉得吾口指月錄云法真禪師上堂栁色含烟春光逈秀一峰孤峻萬卉爭芳白雲淡泞已無心滿目青山元不動漁翁垂釣一溪寒雪未曽消野渡無人萬古碧潭清似鏡賔中有主拄杖横挑日月輪主中有賔踏破草鞋赤脚走直得賓主互顯殺活自由理事混融正偏不滯入荒田不揀信手拈來草且道如何委悉塵中雖有隠身術爭似全身入帝鄉白孔六帖云東川解魔寺僧吉祥魁梧多力受飯五鉢日夜誦經九函池中養魚盡知其數以名召之皆出水面使去即没五代閬州光國院行遵福州閩王王氏之仲子後唐莊宗即位入洛進方物因留京邸同光末㑹明宗將入兵亂相仍乃自翦飾變服為僧竄身巴蜀逮晉開運中狀貌若七十餘然壯力不衰或詢其年臘則必杜黙于閬中寓光國禪院院徒以律法住持亦不知遵之能否有李氏子家命齋飲噉次􅘒起出門呌噪若有所責謂李曰今夜有火自東南至於西北鄰居咸令備之是夕果然煨燼無遺衆聚問其故曰昨一婦女衣紅秉炬而過老僧恨追不及耳又于趙法曹家指桃樹下云有如許錢不言其數趙乃召人發之畚鍤方興適遇客至為家僮所取喧爭之際盡化為青泥人各分得百餘後圬墁門壁往往而有焉遵或經人塜墓知其吉凶至於風角鳥獸聞見之間預言災福後必契合故州閭逺近咸以預言用為口實後終于晉安玉山傳燈錄云果州清居山浩昇禪師僧問師唱誰家曲宗風嗣阿誰師曰金雞啼石户得意逐波清曰未審是誰之子師曰謝汝就門罵詈蜀中廣記卷八十八
