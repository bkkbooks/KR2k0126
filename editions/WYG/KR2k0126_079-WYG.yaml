body:
  text: 蜀中廣記卷七十九明曹學佺撰神仙記第九附錄神明文昌神事跡真誥云顓頊生於蜀山為北帝先天本紀曰顓頊髙陽氏黄帝之孫也母蜀山氏所生有聖徳禺强者亦黄帝之𦙍與顓頊俱得道居北方為水神按史記𤣥囂降居江水昌意降居若水注云若水即江水之下流皆在蜀今禺强不可考或以為即𤣥囂是顓頊乃帝乾荒娶蜀山氏曰樞者所生即昌意之孫也又吕氏春秋顓頊作顓玉其言曰顓玉生自若水實處空桑載各不同曹子建賛曰昌意之子祖有軒轅始誅九黎水徳統天以國為號風化神宣威暢八極靡不祇䖍山海經曰岷山在蜀郡氐道縣大江所出其神狀馬身而龍首其祠毛用一雄鷄􅄟糈用稌文山勾禰風雨醜之山是皆冡也其祠之羞酒少牢具嬰毛一吉玉郭璞曰冡者神鬼之所舍也按茂州圖經江瀆神姜姓昔禹𨗳江神寔佐之漢郊祀志曰秦併天下立江水祠於蜀至今嵗祀焉邵氏聞見錄曰文潞公少時從其父赴眉州幕官過成都潞公入江瀆廟祠官接之甚勤且言夜夢神令洒掃祠庭明日宰相至公咲曰宰相非所望若為成都當使廟宇一新及慶厯間公以宻直知益州謁江瀆廟若有感焉即經營改造間忽江漲大木數千章蔽流而下取以為材廟成壯觀甲於天下在成都縣南四里杜光庭録異記云鄭君雄為遂州刺史一日晩忽見兵士旗隊若數千人在水東埧内屯駐旗幟帟幕人物喧闐與軍行無異意州内警備突來耳未曉差人宻探之大軍已去只三五人在後探者問之荅曰江瀆神也數年川府不安移在峽内今逺近胥安却歸川中差人視之有下營及火幕蹤跡一一可驗巫山有神曰夏耕無首操戈盾立山海經曰成湯伐桀於章山克之斬耕厥前耕既立無首走厥咎乃降于巫山郭璞註曰夏耕亦形天尸之類厥前頭亦在前者走咎逃避罪也降自竄也巫山今建平巫縣山海經曰夏後啓之臣曰孟涂是司神於巴人請訟于孟涂之所其衣有血者乃執之是請生居山上在丹山西丹山在丹陽南郭璞註曰司神聽巴人之獄訟為之神主也不直者則血見於衣請生猶言好生也今建平郡丹陽城秭歸縣東七里即孟涂所居世本曰昔巴蠻五姓未有君長俱事鬼神乃共擲劒於石穴約能中者奉以為君巴氏子務相中之又各令乗土舟約浮者君唯務相獨浮因共立之是為廪君乃乗土舟從夷水下至鹽陽鹽水有神女謂廪君曰此地廣大魚鹽所出願留共居廪君不許鹽神暮輒來宿旦化為蟲羣飛蔽日天地晦㝠積十餘日廪君伺便射殺之天乃開明廪君乗土舟下及夷城夷城石岸嶮曲其水亦曲廪君望之而歎山崖為崩上有平石方二丈五尺因立城其傍而居四姓臣之死精魂化而為白虎故巴氏以虎飲人血遂以人祀晉中興書賨者廪君之苗裔也巴氏子務相乗土船而浮衆異之立為廪君子孫列巴中秦併天下薄其稅賦人出錢四十巴人謂賦為賨遂因名焉後佐髙祖定天下喜歌舞所謂巴渝舞也成都記曰秦李冰為蜀郡守有蛟嵗為暴漂墊相望冰入水戮蛟已為牛形江神為龍躍冰不勝出選卒之勇者數百持强弓大箭約曰吾前者為牛江神今必亦為牛吾束白練以辨汝當射其無記者遂吼呼而入須臾雷風大起天地一色稍定有二牛鬬於上卒乃齊射其無記者江神遂斃從此蜀人不復為水所苦今大浪衝濤欲及公祠皆瀰瀰而去故春冬設有鬬牛之戲未必不由此也祠傍數千家邊江低圯雖甚秋潦亦不遷移有石牛在祠庭下唐太和五年洪水人見冰神為牛復與龍鬬於灌牛猶有白練水遂漂下左綿梓潼皆浮川溢峽没數十郡唯西蜀無害又云蜀守冰穿三江過郡下琢石犀五頭以厭水恠立石人二與江神約皆其子二郎之智也後人神其功號為川主處處祀焉灌縣志治西一里離堆北洪厓山有鬬鷄臺秦時二郎神與蹇龍鬬鷄於此世傳川主即二郎神衣黄彈射擁獵犬實蜀孟昶像也宋藝祖得花蕋夫人見其奉此像恠問之荅曰此灌口二郎神也乞靈者輒應因命傳之京師俾人得供奉葢花蕋不忘故君而託辭耳雲安軍圖經云漢扶嘉者其女出逰於溪畔恍惚有娠年餘生一物無手足眼目形像嘉怒擘為九段投之溪中須㬰化為九龍嘉異之禁雲安人不得於溪中取魚臨終有記云三牛對馬嶺不出貴人出鹽井没後其女示以井脉處所掘開遂得鹽水時民共祠嘉為井主宋初封為昭利廣濟王又錫九龍以王號今為九井之神岷山志云客神祠有三像曰金天順聖帝曰正順利澤王曰孚恵廣佑王按茶陵志載孚恵乃漢髙祖五世孫也其春秋祭賽與土主同簡州協濟廟在郡城外東隅舊郡土主梅使君記云神定州長陸人漢南昌尉梅福之裔為郡太守生則遺愛萬民死則享祀百世唐𤣥宗幸蜀夢一老人墜於梅井五子扶而出之見頂生肉角詔問得此錫爵土主太師昭慶啓澤侯遇水旱禱之輒應靈驗記云吳韜汴州開封人也家富為魏大將領兵三萬泝江入蜀至戎州值闗將軍總師五萬拒之與韜水陸大戰韜素好道常持黄帝隂符經是日陣敗告天曰吾聞持隂符者危急之日有隂靈助之喪敗如此願賜救護言訖有二白衣神謂韜曰汝自入峽縱意殺人幽魂咨怨致此亡敗速為寃魂告天發願請修黄籙大齋拔贖亡者當免失利韜如言即時發願闗將軍亦已收軍韜收合敗卒直至夷陵屯集乃修黄籙道場三日前二神復見曰寃魂並已託生汝亦沾此餘福神兵宻衞必得大勝慎勿殺人夫天地生萬物一草一葉尚欲其生長成遂況人命至重豈可非理致殺恣汝胷襟也古今名將不及三世者為其心計隂謀殺人利已雖立功為國亦須道在其間善分逆順使功過顯明則征伐有功神明祐助蜀亦不久敗亡矣旬月闗將軍復至夷陵交兵之㳄風雷震擊大雨忽至闗兵潰㪚韜開門納降得蜀兵三千擒其禆將闗兵却囘自兹蜀日削弱什邡志云縣東郭外有土主廟乃女神也相傳劉先主入蜀神有漂母一飯之恵先主徳之未報而先逝矣額云敕封土主善利夫人不知何代勅張桓侯益徳勁勇正直沒為明神川東北多廟祀之川北二處一在閬中侯守土也曽子固有記一在廣安道中侯破張郃所經也川東四處一在長夀樂温山下瞰大江安剛中有記一在涪州張士瓌有詩一為䕫府忠顯廟一在雲陽縣江南而雲陽者尤赫赫出峽入峽必禱焉故老言范張難作有獲侯元於忠萬間因是川東之人崇祀為多太平廣記云梓州有陽闗神即蜀車騎將軍西鄉侯張飛也靈應嚴暴州人敬憚之龍州軍判官王延鎬納成都美妓霞卿甚寵携之赴官經神祠前過霞卿暴卒一日傳靈語具云為陽闗神所録辭而得解從此又同寢處寫其貌而憑之至於盥漱飲食皆如生乃曰俟我嫁女方與君别葢霞卿將來一女非延鎬脉也已延鎬將更娶告之鬼亦許焉乃娶沈彦循女自是或女客列坐即有一黒蝴蝶翩翻掠筵席而過率以為常後延鎬為新津令方嫁其女資送甚備自是無聞野人閒話云梓州去城十餘里有張飛廟廟中有土偶衞士一夕感廟祝之妻經年遂生一女其髮如朱眉目手足皆如土偶狀育至長大凡蒞職梓州者謁廟則呼出驗之或遺以錢帛至今猶存按此或皆土木之祟託言侯者堂堂益徳豈作兒女妖耶齊永明二年蕭鑑刺益治園江南鑿得石冡有椁而無棺貯銅器數千種玉塵三斗金蠶虵數萬朱砂為阜水銀為池珍玩多所不識有篆文蠶叢氏之墓鑑責功曹何佇墳之一無所犯於上立神衣青衣即今成都青衣神也梁陸弼梓州人知瀘州徳澤及民卒於官櫬歸至射洪白厓山而覆瀘人思之立廟厓山名白厓廟至宋汴梁王獻可補之謫知瀘時過廟題詩有瀘州刺史非遷謫合是龍歸舊洞來之句意以已即陸後身也後補之以元祐黨謫死其子雲來知簡州州尉兩夢顯恵廟神自言吾乃守父也葢顯恵即白厓神云又西充有紫厓廟其神即雲也初獻可常慕南霽雲之忠名其子曰霽曰雲雲字子飛發運司解進士乙科崇觀間使髙麗歸進鷄林志帝嘉之擢守淮陽入為校書秘書省出知簡州後移陜西轉運使朝廷議復燕雲上書不宜輕動罷為提舉江州太平觀進刑部尚書金人來侵雲奉使回約割大河以北寢兵朝廷未之信謫知唐州金人果大入冦亟召雲使如前約金恠失期不肯退兵復從康王往為貭至磁州王遁去雲殿後為磁人所殺後三月神降西充附邑民王安曰吾有功國家當廟食於此人當呼我曰忠介王媪劉亦言神降於油井鎮觀者旁午又何仲方家見異蛇鱗爪金碧争奉香詣醖許為建祠蛇蜿蜒如塔衆為構廟紫崖距漢紀侯祠僅咫尺後髙宗詔於簡州建祠祀雲賜昭徳顯忠額諡云學士劉光祖紫厓利應廟記畧云西充縣紫厓山乃贈觀文殿學士忠介王公廟食之地也靖康丙午冬十一月公以資政殿學士兵部尚書副髙宗使女直急於紓國之難不暇擇利害至磁而殞身白刃髙宗遂得馳去猶顧見死也嗚呼天使公代髙宗之死於俄頃間與漢紀侯脱髙祖於滎陽事相類紫厓山者紀侯之鄉也公刺簡州家於開封没於磁而死之三月神降於紀侯之鄉英靈之氣殆若相從於千載之下萬里之逺廟食與侯祠咫尺何其異哉鐵山神祠在普州西神姓姚諱萇字景徹隋初為都統普昌瀘三州夷作亂討平之卒葬韓朋鎮石城山後人為立廟嘉定乙卯紅巾作亂於益昌遂入普屯於廟山是夕暴風雷雨掀掲寨舍賊首莫簡見空中神異謁廟謝過探籖得擒賊先擒王之句已而就擒集異記云天寳末崔圓在益州上巳日與賔客將校具舟楫㳺於江都人縱觀賔從肅如忽聞下流有絲竹笑語聲俄見樓船蔽江旌戈紛耀泝流而過圓令訪問隨行數里舟中言曰天子將幸巴劍蜀中諸望神祇遷移避駕幸無深恠圓駭愕因罷會時朝廷無事自此先為其備明嵗南狩故圓應猝無闕失焉雅州志五顯神有廟云神名嚞唐世嘗宰雲居同李泌平安史功成不見錄年二十三没而為神後入蜀與國禦大弭大患而得血食神降筆之文也唐太和中相國杜元頴鎮成都疆場不修闗戌失守為南詔侵軼沐源川路境上夷人𨗳誘蠻蜑分三道而來掩我不備將取嘉州去州四十餘里冦忽自驚奔潰而去州境稍安方設備禦有擒得夷人覘候者問既及境何驚而去荅云三路蠻本欲徑取嘉州謂州中無備去州四十里忽旗幟遍山兵士羅立不知其數有三五大將軍金甲持斧長三二丈聲如雷霆立二鬼之上麾諸山兵士齊為拒捍自量力不可敵驚奔而去是日蠻中主軍酋帥死者三人蠻國之法行軍有死傷及糞穢旋即瘞藏其日兵退不知酋帥瘞埋之所衆皆言是開元觀飛天神兵示現以全州境也又嘗有人下峽詣飛天求乞保護至瞿唐水方汎溢波濤甚惡同䑸三船一已損失二皆危懼忽見飛天立於岸上使二大鬼入水扶船鬼亦長丈餘船乃安定風濤亦止驚迫之際莫知所自徐而思之飛天所坐二鬼一赤一青形與開兀觀所塑無異南楚新聞咸通中有姓􅈛朱者家巫峽每嵗賈於荆益瞿唐之壖有白馬神祠􅈛朱常禱焉一日自蜀回復祀忽聞神語曰媿子頻年相知吾將捨兹境故明言與君别耳客驚問神安適邪曰吾當為湖南城隍神上帝以吾有薄徳於峽民致此昇擢耳然天下將亂今天子亦非久馭世也􅈛朱復驚詰之曰唐徳尚盛客固請神曰昨見天符但有雙日語竟不見是嵗懿皇升遐僖宗以晉王即位黔南軍校姓謇者不知其初名性梗直安貧所居鄰宣父廟家每食新必先薦之如是累年咸通二年蠻冦侵境㢘使閲兵擇將未獲謇忽夢一人冠服若王者謂曰吾則仲尼也媿君毎傾心於吾吾當助若可更名宗儒破賊自此富貴矣既覺喜而請行兼請易名是役人多難之忽聞自請遂遣之一戰而大破蠻冦餘孽皆遁黔帥表上其功授朗州刺史秩滿詣京師累遷司農卿龍州牛心山古人觀即大唐逺祖隴西李龍遷祠梁武陵王蕭紀理益州使遷築城於此居焉没塟於山側鄉里立祠號李古人廟武徳中改為觀其後武氏潜欲革命鑿斷山脉其崗斷處水色赤腥如血天寳末明皇幸蜀至劒門有老人蘇坦迎駕奏曰龍州牛心山國之祖墓因李古人之諱遂為州名古老相傳皆有靈應陛下今日䝉塵乃則天掘鑿所致請以御衣一襲藏於山脉斷處修築復舊如此則克復兩京回鑾有日矣明皇異其言即命内使齎御衣國信祭山修築刺史蘇邈准詔放近山四鄉百姓明年租稅併功修填還復如舊山果有聲如牛呴焉明年誅祿山復宫闕至徳二年十月二十八日詔曰江油舊壤境帶靈山自狩巴梁屢昭感應眷兹郡邑合有増崇可陞龍州為都督府賜號應靈郡長慶四年中使張士謙王元宥刺史尉遲銳修之寳厯元年三月内使閆文清又齎詔祈醮僖宗朝授宗子李特立龍州錄事參軍與内使髙品王彦忠就山修飾委東川節度使楊師立選髙法道士袁道常等開黄籙道場醮山祈福亦有牛呴之聲明年誅黄巢復京邑靈應如初中和二年詔陞江油為望縣其後東川修造將李賞嘗過山觀見貞松古栢皆可材用因修立廨署往彼採伐運載未及半日賞聞神明詬責之聲厯厯可辨禳謝未遑竟以贓賄發露為今相國瑯琊公斬於都市錄異記云合州巴川縣兵亂後官舎殘毁移居寨中稍可自固崔令在官日有徤卒盜拔寨木擒送鎮將斬之卒家元事壁山神乃與令為祟或見形往來或空中詬罵投擲火燭損破器物錢帛衣服無不遺失箱篋之中鎻閉如初其内衣服多皆剪碎求方術禳解都不能制令罷官還相去千里祟亦隨之日夕需飲食與人無異一家承事不敢有怠忽一旦舉家聞大鳥鼓翼之聲俯近屋上久之空中大呼曰我來矣一家大小皆迎事祟自穪大王曰我雍溪兄弟非理破除汝家損失財物作諸恠異計汝必甚畏之今並與發遣去矣汝災盡福生大王自來且借天蓬龕子中安下兼此天蓬様極好借上天去傳寫一本三五日即送來數日後挿天蓬於舎簷髙處並無汚損自此日夕往往召住人語話或令小大念詩賦作音樂一一能隨聲唱之所念文字或有錯呼必為改正言多勸人為善亦令人學鍊氣修道初邑中有羣鶴現神云數内只有兩隻真鶴我所騎來其餘皆常鳥耳自云姓張每日飲食與人無異亦有女名錦繡娘及妻妾僕使等食物所費亦甚不少大都見善人君子即肯言話稍近凶暴强惡之人即不與語忽有醉僧健卒三人來謁之言詞無度有所陵毁因即不語僧去之後徐謂人曰此僧餐狗肉飲酒兇暴無良不欲共語然人所行善惡災福吉凶了了知之言無不中至於小名第行一一皆知若子細問之即以他語為對未知是何神也井研縣北五百步鑊山形如覆鑊唐僖宗幸蜀有神呼萬嵗者三問何神曰井鑊之神也勅立廟其下或謂乃嚴顔鄧艾之神冥報記云成都龍興觀即後周至真觀也基址廣袤四面通街大殿講堂玉華宫碑碣皆在有王峯者事頴川王于小蠻坊創置私第使人劚觀門土墻及觀地取土數千車築基址土木未畢已數口凋亡一旦自衙歸宅於其門外見二黄衣人曰為觀中取土事要有對勘應荅之間下馬而卒其觀内有鐘樓曰靈響臺門樓宏壯制度精巧節度使吳行魯奏移門樓於天王寺拆其鐘樓遺蹤勝賞併為毁蕩矣頃年駕在蜀明道大師尹嗣𤣥云行魯之吏因疾入㝠數日復活言見行魯為鬼吏所驅搬運龍興材木鐵鏁繫械晝夜不休木纔積垜又却飛去如是搬運不知何年當得息爾欲求子孫為立觀門贖其罪子孫貧窘力不能為北夢𤨏言唐乾寧中劉昌美為䕫州刺史屬夏潦峽漲灎澦如馬行旅輟棹以候之學士李嶢挈家自蜀㳂流將之江陵昌美以水勢正惡止之不聽俄而舟覆一家溺死唯一乳嫗隔夜為駭浪推送江岸而蘇先是永安監竈戸陳小奴棹空船下瞿唐見崖下有一人裹四縫㡌著窄白衫青袴執鐵蒺䔧問嶢行程自云迎候及乳嫗既蘇亦言於刺史云學士至一宫署上事朱門白壁寮吏參賀有人言此行無乳嫗名遂送出來成都乾元觀在蠶市創制多年頃因用軍焚毁都盡三門之下舊有東華南極西靈北真四天神王依華清宫朝元閣様塑於外門之下竝金甲天衣門既隳壞而神王無損風雨飄清亦無所傷邑人相傳頗為靈應時蜀主既尅川蜀移軍收彭州久圍不克暫還成都方當暑月參從將吏所在取便而行大將杜克修先至神王之所見衆人聚觀塑像問其故云塑神皆動克修以器盛水致神手中果揺動而水溢出頃之蜀主至復祝而試焉曰若即克彭州更觀揺動之應良久而振動數四不逾月而尅州城殲殄大敵乃施金幣命本邑創制堂宇以崇飾之出靈驗記儆戒錄云金水主簿劉峭因逰雲頂山覩山廟盛飾一堂有土偶朱衣據案峭訝之詰於山主昭訥訥荅曰余三夕連夢見王語近辟一判官宜設堂宇塑朱衣一官而祀之故有此作峭不之信明年秩滿還成都遇都官員外孫逢吉言其事逢吉曰頃聞安仲古彌留之際語長㓜雲頂山王已具書馬聘禮辟吾作判官言絶儼然端坐長逝茅亭客話成都漆匠艾延祚甲午嵗為賊驅入郡署令造漆器五月六日忽聞鼓􅎏聲及南門火起乃天兵至郡也延祚因上樹匿於穠葉間見大軍往來摉捕殺戮至夜遂下樹於積尸中卧中宵聞數人傳呼聲頗類將吏但無燭炬竊視不見其形但聞按據簿籍稱㸃姓名僵屍聞呼一一應之北夢𤨏言進士鼎夫富於詞為時所稱頃嵗曽逰青城山過皂江同舟者約五十餘人至於中流遇暴風漂蕩其船值巨石傾覆於洪濤間同濟之人盡沉波底獨鼎夫似有物扶助既逹岸亦困頓矣遽見老人以杖接引且笑云元是鹽裡人本非水中物鼎夫未及謝旋失所之因作詩以記及歸成都話於所知終莫究鹽裡人之義後為權臣安思謙幕使判推鹽院事遇疾暴亡男女以屬分料鹽百餘斤囊束將上屬郊營塟至是鹽裡之言方驗鼎夫舊記詩曰青城山峭皂江寒欲度時時作等閒棹逆狂風梢近岸舟逢慳石碎前灣手携弱杖蒼惶處命出洪濤頃刻間今日深恩無以荅令人羞説雀啣環中書舍人髙元裕責授閬州刺史之嵗閬中大旱山川祠廟無不周禱忽於玉臺觀前瞻望山東叢林有異氣披榛徑往果有嵌竇懸泉在峭巖之曲喬木之下石壁間有自然老君狀前有玉童捧爐雙髻髙竦後有神王恭若聽命之形元裕焚香叩祈以崇葺為請還未及州甘雨大霔聯綿兩夕逺近告足乃翦薙蕪翳創為齋宫立碑以紀其事於懸泉下堰為方塘引水以注流杯小池植花木松竹遽成勝賞光啟年大駕還京光庭奏置𤣥元觀於此錄異記云遂州東岸唐村民言昔有神人寛衣大袖戴古冠幘立於道左語村人曰我鍾離大王也舊有廟在下流二十餘里因水摧壞今形像泝流而上將至矣汝可於此為我立廟村人異之詣江邊得一木人長數尺遂於所見處立廟號唐村神普州普應廟在鳳凰山神姓多名岳天彭人自孟蜀時授徒於普端拱間門人牟衮廷試第七自是儒科相踵岳卒衮率諸弟子塟之鳳凰山廣安石聖廟在州治東二百步祀五代義士何龍也龍讀書博雅積而能散秀屛山下濃洄鎮皆其産業賑貧濟乏多不責償周急婚䘮逺近無間後卒邦人思其徳於秀屏山下大石上刻像立廟祀之東向宋開寳二年朝議即濃洄鎮闢廣安軍治以控果合渠三州險逺守臣特繪山川形勢圖上請聖裁欲設公署於其廟左右難之太祖取御筆㸃曰此廟宜遷去是夕風雨雷震石像與廟俱徙於今所相去數十餘丈事聞詔封感應伯炳靈記資中趙逵生於南渡之後身矮面麻聰明質朴好讀書年八嵗隨父自内江徙之資中盤石縣北街居住夏月夜涼常遶街吹笛為戯是年時疫盛行一日吹笛至北街茶肆老嫗與逵言近有五人來店喫茶見吹笛過各迴避自後疫遂止人疑即五瘟使者又一秀士貌類炳靈神入茶店囑云趙逵有濟貧之心必獲善果言訖忽不見後日逵到店嫗又述此言逵聞徑赴廟謝空中云來年轉對大廷必魁天下三年後當入相後為嶽府尚書按資縣治南街有炳靈孚應祠宋李石記云蕭君玉建廟成屬石為記有以石未官為嫌者君玉具籌書有官者及石名質於神三禱皆得石名石以異議竟辭偶病寒夜夢神衣冠甚偉旗幟遶屋謂石曰而自恃與歐陽㕘政同學不為我作文耶既覺汗如注病亦愈記成君玉出片紙云此神事實也讀之則今碑中所載歐陽事在焉因㕘昨夢交歎久之石尋被奏殿廷唱名在第十四意不自滿或從傍曰此歐陽子科名何薄焉定命録云崔元綜任益州參軍日欲娶婦吉日已定忽假寐見人云此女非君婦君婦今日始生乃夢中相隨向東京履信坊十字街西道北入一宅内東行正見一婦人生一女子指云此是也崔既驚寤殊不信俄而所娶章女暴亡後官三品年五十八乃婚侍郎韋陟堂妹年始十九正在履信坊韋家宅上成親住東行屋下尋勘夢日其妻適生崔公年九十韋夫人與之偕老後四十年乃終前定錄云遂寧岳某與閬州李某將赴試各祈夢於梓潼祠有一執簿者曰汝二人皆貴但身與頭不相稱令一使運斧以易及醒歸其妻不識詰其家人始知之後俱甲試遷官錄異記云廣明辛丑嵗正月僖宗車駕已及左綿郫縣鎮使任時當晝假寢於㕔事忽夢巡街小吏告之曰大將軍迎駕合伺於道左即奔出見通衢側兵騎數千已直北而去旌旗部伍異常嚴整戈甲之盛首尾十餘里不絶久之介金曳地者千數擁白馬朱纓金甲一人五綵日月旗羅列以從任鞠躬兩食頃隊仗方絶問報者大將軍為誰云是法定寺後李將軍也既覺流汗浹體想其所覩猶厯然在目是嵗余奉詔青城修齋話其事北夢𤨏言孟蜀御史中丞牛希濟文學繁贍超於時輩自云早未出學院謂詞科可以俯拾一夕夢一人介金曰郎君分無科名四十五已上方有官祿覺而異之旋遇喪亂流寓於蜀依季父給事中嶠仍以氣直嗜酒為季父所責旅寄巴南旋聆開國不預勸進又以時輩所排十年不調為先主所知召對除起居郎累加至憲長野人閒話蜀宗正少卿孟徳崇燕王貽鄴之子也自恃貴族脱畧敖誕嘗太廟行事携妓而往夢一老人責之且取案上筆叱令開手大書九十字而覺翌日與賓客話及此事自言老人責我是悟我也書九十字賜我夀至九十也客有封璉戯之曰九十廼是行書卒字非吉徴也不旬日間果卒又云孟蜀工部侍郎劉義度判雲安日有押衙覃隲夢與友人胡鍼同在一官署㕔前見有數人引劉入身被五木孑然音㫖説理分解似有三五人執對久方退於行廊下坐見進食者皆是鮮血覃因問傍人荅曰公為斷刑錯誤所致追來數日矣遂覺及早見胡語之胡亦言昨夜所夢相同因共秘之劉公其日吟感懷十韻詩一篇今刻於石上其畧曰紫閣無心戀青山有意潜人皆訝其詩意不數日而卒王氏見聞錄王蜀時有朱少卿者不記其名貧賤客於成都因寢旅舍夢中有人扣扉覔朱少卿其聲甚厲驚覺訪之寂無影響復睡夢中又進呼之俄見一人手中執卷云少卿果在此朱曰吾姓則同少卿則不是其人遂捲文書兩頭只留一行以手遮上下果有朱少卿三字續有人自外牽馬直入云少卿領取朱視馬無前足步步側蹶匍匐而前其狀異常苦楚大驚覺惡之後蜀主開國以親知引薦累至司農少卿無何膝上患瘡雙足自膝下俱落痛苦經旬至五月五日殂乃馬夢之徴也野人閒話云孟蜀主母后之宫有衞聖神龍堂亦嘗修飾嚴㓗后言積世之家神也一旦議欲廣其殿宇因晝寢夢一青衣謂曰今神龍意欲出宫外居止宜於寺觀中安排可也醒欲從之而主未許又夢之因選昭覺寺廊廡間特建一廟土木既就繪事云畢遂宣教坊樂自宫中引出奏送神曲至新廟奏迎神曲其日𤣥雲四合大風振起及神歸位雨即滂沱或曰衞聖神龍出離宫殿是不祥也逾年而國亡玉堂閒話西蜀將王暉嘗任集州刺史城中無水泉民皆汲於野外值岐兵攻集絶其水路城内焦渇旬日之間頗有死者王公乃中夜祈告神祗及寐夢一老父曰州獄之下當有美泉言訖而去王亦驚寤遲明命畚鍤於所指處掘數丈乃有泉流居人得飲蒙活甚衆岐兵初知城中無水意將坐俟其斃公命汲泉水數十甖於城上揚而示之乃去去日神泉亦竭踈勒拜井之事固不虚耳王後致仕家於雍州嘗言之宋鄧桓夢殺牛記云宣和二年庚子吳公革來牧涪邦涪俗或殺牛以祀神戒弗止壬寅三月六日公夜夢一人蹙額敝衣貌類公吏持牒而似有所訴公曰誰何應以民間殺牛願檢察以救其苦既覺即於堂柱上書牛字以記之翌旦㑹部使者至未暇尋究越日忽見所記字登時下吏收捕遂獲於城門之西牛已四解悉令覆於江流仍坐殺牛者罪几上之肉固不可復生而神明之告殆若影響按摉神記云文昌神姓張名亞字霶夫本吳㑹間人生於周初後西晉末降生越之西嶲之南有道術為神廟在梓潼縣北八里七曲山唐廣明二年僖宗幸蜀神於利州桔柏津見封為濟順王親幸其廟解劒贈錫時太子少師王鐸扈從親覩其盛題詩云盛唐聖主解青萍欲振新封濟順名夜雨龍抛三尺匣春雲鳳入九重城劒門喜氣隨雷動玉壘韶光待賊平為報山東諸將相主天勲業賴隂兵注云時術士言來春駕還京也判度支蕭遇和云青骨祀吳誰讓徳紫華居越亦知名未聞一劒傳唐主長擁千山出蜀城斬馬威稜應掃蕩截蛟鋒刄俟昇平鄼侯為國新簫鼓堂上神籌更布兵志云七曲廟傍有風洞深狹嚴邃神家慶悉都其間殿有降筆亭中以金索懸五色飛鸞鸞口衘筆用金花箋數百幅常留筆下每降筆訖亭内銅鐘自鳴逆曦僣妄自具犧牲設爼豆詣殿陳祭甫欲行禮黒風驟起滅燭飛香震懼伏殿下須臾開明視祝版已碎作兩片矣案上有安丙二字及曦就戮寧皇親作御讃四頒慶府焉所謂鳳凰山者又在七曲之左辛卯天變雷杼不靈暫宅鰲山星未周紀而五未數厄當罹刼火移鸞仗於雲龍山之摩圍洞以駐神蹕文昌化書云予第二十二化在周宣王之世姓張名忠嗣字仲即詩所稱張仲孝友也宣王崩嗣王虐驟諫不聽賜之酖自惟生於斯世而堅守古道既有言而不用又獲罪焉魂無所歸情猶不已哭於宫闈者三日王聞之以為妖乃命庭氏率其屬以弓矢望聲而射之予無身矣射予何為於是望故家而靦甚辭王國以遨逰一意西方厯岷峨背井絡至蜀之西陲有山名飛越予以先世生於吳㑹與越為隣俯而察之名同俗異又望西極一山髙廣殆百餘里盛暑之時積雪凝寒非塵境也山神白輝曰此名雪山往昔多寳如來修行於此八年得道又西極真人久住於此因而證果大夫仙風凛然盍不留予聽而止焉無㡬帝有㫖以予為雪山大仙旋勅蜀門行化乃返鶴馭而來東北見萬峯青翠徘徊久之山神公元長等五人來謁予曰某等職𨽻於斯近見真官神丰俊嚴目有光芒謦欬之音震響岩谷天人乎此間自武王伐紂微盧彭濮諸國之長佐蜀覲王大軍北向實經於此逮今三百餘年路僻人稀未嘗有顯者來真官勢熖如此幸示其故予乃告之實山神曰某等亦厭人間逰於斯者也此山𨽻蜀帝所治名曰劒嶺其勢壮距終南西接岷峨南通卭徠東挹巴庸廣袤周匝殆千餘里自山王白峯主託孕為蜀王太子且百年矣居未有主真官既聖人之裔清明在躬積徳累行忠孝全節神逰於此行藏有數宜少休焉兼劒嶺之下近有白額大獸千餘嵗矣負此山嵎以人為食真官既嘗為天子大臣又奉玉音來此自可號召羣靈呼吸變化役遣幽隂驅除此虎亦助天好生之事也予信之乃矯宣帝㫖召集千里之内山川鬼神咸來聽命曰王㫖以白虎害人吾為此山主董爾衆靈誅滅之用命者世享血食否則天行威刑衆曰唯謹聽令予乃仰觀周覽現身與山等叱枯竹作長劒屛翳號風雨師清道揮劒一呼響震山谷虎亦怒氣成雲目光出電跳梁反覆吾身當之衆力併前斃於刄下又於血汙中獲一圓石狀如墜星公元長識之曰此虎威也予因佩之以懾百神功成奏帝先陳矯詔之愆㳄及集功之語帝因以予為蜀北門山王凡所部山川水旱豐凶妖祥功過皆得與聞而平治之青黎山神髙魚生部民孫滌女方婚之夕魚生拘其魂而亂之為鄰封白池龍神所察予覘之與女俱訊既伏其辜歸其魂女乃蘇鞭魚生背三百黜其職山下有故孝子吳宜肩嘗為父疾刺血寫楞伽經四卷夀終三年未有所授予因保奏以代魚生帝報曰可蜀主魚鳬封弟葭萌於苴是為苴侯久之苴遣使求賄蜀主不應於是遣人焚蜀府庫火勢孔熾予聞之命風師返火明言苴之無道須臾苴之行人皆死於火中自是苴蜀交攻者三年蜀主厭之遣莊蘇議平苴侯不聽莊蘇因言蜀之兵衆手指西隰予因現神兵而儆之苴侯疑其襲已遂乞盟焉夜者言之於王王為予立廟於都之北武都山精化為女子色美而艷蜀之所無有聞於王開明尚納以為妃未㡬物故王念之不已築墓使髙以示不忘武都長人費氏五丁從而媚王以大力負武都山土増壘之不日墓與山齊王名之曰武擔山謂妃死而懷土也既而王親信五丁日侍左右曽不暫捨王亦多力恃勇既得五丁自謂空拳可以格戈㦸奔走可以敵車騎於是不修邊備至撤亭障罷烽燧予既享其血食且彊秦接境慮有不測乃化一文士自稱北郭張生叩閽上書其畧曰臣聞専徳者昌専力者亡昔堯舜禹湯之治天下在廷之臣姓氏昭然未有以力為専者且匹夫之勇不可以為恃絶人之技不足以威敵惡來飛亷無救於啇辛羿射奡舟竟死於非命近世三狄長人多力卒加誅剿今邊隅費氏昆弟五人初無道徳以力為任主以其身材長大而賢之不修武備臣謂費氏之力一可當十若以百人為敵力無施矣置諸臺皂列為僕御俾其祼股肱執射御奔走從事則可以之折衝鄰國要其所至不過赤白長狄三者之如也願王謹先王之慶基嚴彊秦之邊備無以匹夫之勇而弛三軍之令幸甚王不恱曰汝諫吾謹武備而誚吾養材士是欲獵而廢鷹驚盗而廢犬也予力辯之時五丁在左右恃寵將來見辱予乃隱而不見五丁以為妖曰此殆北郭張仲子也於是毁予廟巴蜀交隙之後秦惠王用司馬錯計啟謀吞蜀而蜀道險甚行兵無路乃於秦蜀之境鐫石為牛置於草中又鎔黄金為餅置之尾下如此者五所隂使人伺之月餘金餅為人取去旋復置焉既頗聞於王使人臨蒞數月得金千餘斤乃命五丁開鑿險路興兵五千牽挽石牛以歸發兵日予復化形為儒者以仲弓子長為名詣闕請見王許之予乃言開路非便獲金非利王笑謂予天不愛道地不愛寳吾以社稷之靈石牛糞金自入吾境黄金至寳也可以富國可以强兵可以寛民先生疑鄰國之詐誠過計焉豈有捐金數千而設計乎先生少遲之石牛行且至矣予仰天而呼澘然出涕王以予為不祥命左右掖出焉石牛既至秦王曰此用之開路則可矣若牛歸而無金則吾計敗矣乃復遣人與蜀約婚曰秦與蜀鄰親仁善鄰國之寳也吾王有宗女五人請嫁王王大恱乃遣五丁迎女於境上王方日備千乗候於北郊以伺音容予乃於衞士中現儒生像上疏諫止王怒曰非北郭張仲子乎讒言見侮者三矣敕左右兵之予乃現忿怒之像衞士驚潰予獲免焉五丁既迎秦女以歸蜀人萬衆胥恱葢昧於禍機以非為是以殃為慶衆人之常見也予乃於劒嶺之陽化大身像横截於路意謂秦女畏駭可以迴轅秦蜀之人觀者駭異忽譊譊中聽有玉音若曰天之所廢不可以興蜀王是也天之所興不可以廢秦王是也子誠忠矣如天命何予乃收縮㑹五丁識之曰此必北郭仲子也我將摶而食之萬衆呼聲震動山川予乃經山腹行路成七曲將入洞穴為丁所及持予甚急予不得已化身百倍任其揺曳尋以首穿山頂迴光返顧以震蕩之山隨身動五丁與秦女俱至巖下山摧勢逼於是五丁五婦皆隨沉焉自後蜀併於秦矣予以蜀亡社稷變置百靈廢祀血食無歸神逰崆峒聊以休息忽雲衢中旌幢車騎過者三日山靈相謂曰景象如此殆有聖賢經過已而老氏將左右二真人自東而西予列拜於西嶽所部諸地祇中西嶽有令諸地祇皆拜送十程予在翼護數一日請悃於老氏且陳往昔在蜀功過老氏曰大道之行天下為公爾既公於心而三諫蜀爾之功也五丁五婦雖死於爾以公存心亦非過也今國號雖秦而井邑仍蜀爾宜永享蜀祀以慰斯民乃命徐甲取囊中藥一粒授予曰此大丹爾宜餌之大者與道合真丹者與心為一此後五通具足非夙昔比中原擾擾吾甚厭之今將入西域行化三百年後西方之教法盛行當來中國爾宜信之予敬受焉蜀青衣之水自西而東與岷江相㑹秦既并周九鼎西遷諸山之祇㑹於嶽諸川之龍朝於海者所以聽革命而效靈祉也二龍俱東相值於合江之中流争先以行氣不相下鬬於江淵二水俱壅波濤洶湧民居其滸者千有餘家一旦浸潰奔避無及怨苦之聲逹於四境予適見之先遣隂兵萬衆障其狂波又造水中解紛曰維新之命易我舊徳餘忿不忘百靈皆然何獨二君今以争道而鬬禍及居人向非吾兵障流則此邑之民靡有孑遺矣且上帝好生後悔何及二龍敬受教令既遣俱行且約歸而戒之及朝宗回予與之尸事仰天設誓指東西二大石叱之使起須臾兩石峙而立予復戒之曰二江之龍言歸於好天地為質斯言不渝若二石合而為一則今日之盟可寒訣别而退蜀併於秦中國文物之盛先王大道之風漸有習之者矣而淳厚之風未振囂浮之徒競起予恐傷風教意欲化之一日巴郡宕渠士人牟麟好學不厭而樂於教人守道㢘退非有大故不出户庭先郡守温瑀辟請為從事不起邑丞于扆往邀之接語移時所談皆安時順變善身避世之語扆欲致守之意而辭不得逹卒罷扆以告瑀瑀嘉其節蘇尚功者嘗學於麟未終其業立門受徒以師自任而性好奔競足跡不少安求請省問奴顔婢膝為麟薄之或以麟意逹之者尚功踵門逞辯麟亦自以為嘗教誨者乃執先覺之義而語之曰死生有命富貴在天子夏之言也求之有道得之有命是求無益於得孟子之言也子之所為吾實恥之尚功自恃年少拳勇擊麟予適見之乃化一儒士為之解紛顧衆而語之曰人之夀夭窮逹有命在焉非人為也奔競無恥不知命者也命之所無求之何益不當求之偶有所獲以為求則得之求益於得是不知道者也茍不知命且不知道則所守既喪放辟邪侈至於不義不忠不孝皆由此也二子所為氷炭君子小人之所以分也觀者駢闐或問予曰爾為誰荅曰予所謂張仲子也者衆驚愕相視間予隱形不見自是遠邇聞之若尚功之徒改行有醇厚之風焉渠人為予立廟卭有杜章者望帝友也生於富貴父祖好宴㑹習以為常凡烹割之事章躬親之及長自任門戸厨饌無虚日膾炙方離口刀杖已在手矣後以災禍相繼家道零替無以為生為人屠劊以就口食所取人財名過命錢又以飲啖兼人饕殄成疾纔方飽滿尋復中虚日常不足以罟取魚以弋彈雀所見飛走皆萌殺心中年生五子皆無指口累所迫過命之貲不足度日恓惶無聊尋有癩疾肌膚破裂膿血流潰見者掩鼻自以飢火所燒復受疾苦投井自盡為人所執極口詈辱於是仰天呼寃予問主者孫洪叔為言其詳又言此人祿雖盡而夀命尚有五年予既知其造業之由又憫其受苦之酷且嵗月尚遥怨怒天帝成何紀極乃遣功曹易其心志使之以手掲瘡皮自食又以指染膿血吮咀求味宣言於人曰毋作殺生業以我為戒如此逾年以凖未盡之數念斷而死諸子皆殍焉予當漢時托生赤帝之家是為趙王如意葢六十五化矣及罹吕禍之後神逰㝠漠又無職守嘗懷宿憤思欲報之已往修積不復問焉吕死拘幽㝠造業深重厯年甚多逮再生亦久遂訪西海之濵有邑名卭池邑令吕牟吕后之後身也邑人多吕氏葢宿業相尋諸吕造業之黨畢萃於窮荒予母夫人亦生於彼復為戚氏以前生享福太過至此而貧悴所嫁張姓年老無嗣夫婦以芟刈為業一日至野外相顧而語曰生身窘甚辛苦自養暮年力衰將不免於溝􅊤今六十而無子是天將殺之耶乃相與割臂出血􅅹於石凹中以石覆之拜天而祝曰人皆有子惟我獨無今氣血薄少不能施化儻此石下動物生焉亦遺軆也予識母心一念感之從而寓止明日二老復來掲石視之血化為蛇金色寸長予所為也母收養之踰年頂上出角腹下生足能變化每天欲雨予為助之身既長大腹量寛邁見羊豕犬馬輒食之邑令有馬色潔而駿牧於水際蹄傷吾禾因拘而噬之葢吕産之報身也邑人皆知予詳訪於予家而不獲逮予父母入囹圄責以三日求予無狀將見殺焉㳄日予化儒生謁令解之令曰張老夫婦家養妖蛇食人六畜久矣今又食吾馬吾將殺之為民去害張不見聽是彼自為妖也今必戮之予曰物命相償宿業所致遇彼吞噬亦非偶然今君為畜而殺人豈令尹之事乎令叱予使退予復語之曰君有死氣浮於面顔宜善自愛他日無悔語畢予隱形不見令之左右皆以予為妖予乃奏天稱寃陳以前世子母無辜死於諸吕今適逢之願與之較辭上而未報因變化風雷呼吸雲霧白晝而暝一邑之人相視而語曰汝頭那得為魚以手相捫頭面而泣一夕揚海水以為雨灌注城邑圍四十里皆䧟予以身載父母而出時在孝宣帝世今䧟河是其地予前以寃對奏帝未報而擅行之雖一時宿憤頓消及心定氣平良用深悔海神晁門劾予擅用海水䧟溺平民五百餘戸以口計之二千餘命除里域具予前身仇對八十餘人半在城隍半居附郭外其餘生齒皆係夭枉帝命賜譴以予為卭池龍而奪其神職且使天吏監臨不得干預雨澤羈囚於積水之下連年旱虐水復為泥身既廣大無穴可容烈日上臨内外熱惱八萬四千諸鱗甲中各生小蟲咂囓不已宛轉困苦不計春秋一日晨凉天光忽開五色雲氣浮空而過中有瑞相紺髮螺旋金容月瑩現諸勝妙希有光明山靈河伯萬衆稽首讃嘆歡喜聲動天地復有天香繚繞四合天花繽紛隨處春盎予乃耳目聰明鼻觀通徹心清口潤聲音發揚仰首哀號乞垂救度萬靈諸聖道衞先後咸謂予云此西方大聖正覺世尊釋迦文佛也今以教法流行東土隨教化身將往中國爾既遭逢宿業可改予遂起改悔心生悲愍念身自踴躍入天光中具陳往昔報應之理世尊畣言善哉帝子汝於向來孝家忠國作大饒益又復閔世生護持心因果未周仇敵相争以人我相肆興殘忍遷怒於物業債當償今復自悔欲求解脫汝於此時復有前生寃親之想與夫嗔恚愚痴念否予聞至理心地開明内外罄然如虚空住無人無我諸念頓息自顧其身隨念消滅復為男子聽佛宣説得灌頂智得大辯才得神通力得圓滿相龍天八部皆大欣悦予既離惡趣旋得受形章帝元和中為趙國張禹子仕清河令順帝永和中為郭林宗友浮沉里閭後主炎興中為鄧艾軍司馬從伐蜀卒於流矢下葢卭池之餘報云既滿前縁詔詣玉京洗除業籍鼎新神位俾予永福坤維帝又以所執之杖錫予曰咨爾孝仲萬靈之雄忠孝全節世資爾功賚汝斯杖無所不通杖葢如意也予契宿名欣然受之携以自隨無適不可因念前身西海之隅復經從焉越裳之西越嶲之南兩越之間有金馬山勝景清絶張老夫婦予累生之父母也於是生焉為七十一化時晉武帝太康八年嵗值丁未二月三日夜子刻以干支考之辛亥日也予既成長妻男具而孝敬不衰見鄉人以旱祈雨於土木笑之葢予嘗以夢報矣一日臨水自書官衘移文海神忽見海使告予爾有形以來迄此顯化七十二矣乃呼予為運判促上白驢風雨聲中頓失鄉地入大穴中宫庭明敞父母以享血屬皆在一夕雨澤大作徧沾全蜀之境以縁水府得逹自字曰霶夫焉時帝以予累世為儒刻意墳典命予掌天曹桂籍凡士之鄉舉里選大比制科服色祿秩封贈奏予乃至二府進退皆𨽻焉建興末為儒士稱謝艾跨白驢仕於張軌繼往闗中與姚萇為友以萇年少多謀畧又宿有契好故也久之予厭處凡世思歸蜀峯約萇曰苟富貴無相忘後萇以龍驤將軍使蜀至鳳山訪予予禮待之假以鐵如意曰麾此可致兵萇不信予為一麾旗幟蔽天戈盾戎馬萬餘列之平坡今試兵埧是也後萇繼苻堅稱帝國號秦予在隋唐之世為王通為張九齡頗多表見逮漁陽之亂明皇幸蜀予化儒生至萬里橋謁帝帝異予問非北郭張生乎予曰然臣聞元載孔昇天虚位久之以待陛下也帝黙然後肅宗收復京都韋見素迎帝歸闕封予為左丞相而予宻衞鑾輿至咸陽帝移大内安頤遂辟榖張皇后進櫻桃蔗漿等悉不食常玩一紫玉笛自吹數聲有雙鶴下徘徊於庭帝謂宫愛曰吾奉上帝命居元載孔昇天也令具湯沐復就寢而化乾符中嵗荒河南為盗者甚衆尚居長伏誅尚讓等作亂推黄巢為主長驅江陵渡江入淮北攻河南數十郡㳄䧟洛陽破潼闗僖宗播遷入蜀巢犯闕遣朱温等攻鳳翔至潼闗乗輿夜遁出鳳翔予以儒服見帝帝夜行馬駭予以所乗騎奉帝帝乗之予捧足控馬宻布彩雲衞帝騰空彌澷雲霧微開令帝下視見鳳翔軍與巢軍戰於龍虎坂若蟻陣焉帝曰此何所也予曰此乃空際帝驚嘆曰卿非北郭生張孝友乎予權辭以對至劒南缺疲甚欲少憇命予股以枕之熟眠林葉風聲帝忽躍起曰巢兵至耶何鼙鉦之近也久之從駕宿衞乃至始訝帝行之速有神助云帝至桔柏津約曰朕興唐公主最神慧奉卿箕箒可乎予曰臣幽也何敢奉承辭謝而去帝至七曲遂封予濟順王親至廟奠獻解劒為賜仗予勦賊後宋文通等斬巢首送成都帝還闕則興唐公主亦告殂矣予命隂兵迎公主歸七曲焉五季中進士孫樵者性剛介不與羣居詆斥佛老著無鬼論自隴之蜀過祠下侮辱無禮而去扺於山隂天忽昏晦風雨如撒行不可進投邸不及呼曰北郭生張君如果有靈則指涯涘如何予令佐神舉火一一示之樵尚笑曰廟奴誑我再呼曰神既在何不為我止風雨使克扺於平陸予笑樵所過神廟必狎以為妖今悔何及也示之以炬火數百山川明朗可辨行李須臾風雨頓止樵留記廟庭焉予方以海宇清寧為喜而淳化年間均順僣叛王師討之主帥王繼恩雷有終祝吾丐靈予命崔瑄李懋以隂兵助雷攻賊至利州賊負固不下忽一卒於軍中呼曰梓潼帝君遣二將助隂兵百千今奉天勅勦汝汝可速降而賊以勁弩一箭洞呼者腹卒自去箭無恙反厲聲自若預言賊䧟之期及叛平有恩榮以英顯之號上帝嘉予弭變能免殺戮俾専輪迴救苦之司開便宜都督之府總三界六天之隂兵焉予在隆興嵗奉玉音加秩若曰文昌者教化之本實傳列聖之業儒士者道徳之淵亦惟一徳之忠播告諸天亶孚有衆爾文昌司祿主者職貢舉真君衞民少傅靈應帝君張某徳被萬物威刑四方粤自有生顯從浩刼順考古道鑒觀人文照臨並日月之明發生賛乾坤之化教耕稼而民人育修禮樂而政事康干戈載戢隂陽常和水土既平休祥時格託之庶務試以諸艱皆濟濟以可觀每多多而益辦昔由水府今涖台衡尚持拔苦之心誓拯倒懸之念厥有成績巍乎難名察九十餘化之行藏命編諸冊著萬二千端之行節豈曰空文顛則持而危則扶惡以懲而善以勸下民允賴惟乃之休況復恢龍漢之圖書闡鸞臺之典則欲分身而顯化率諸聖以溷融萬梵開張三界均利宜加峻位俯叶輿情名躋南極之尊禮絶星聯之上於戯躋三階而下太乙允彰應物之符歛五福而錫庶民式賴師言之佐誰其能者汝往欽哉可特加金闕昊天太師糾察三界禍福事上天開化十九年下世大宋中元甲子紹熙六年正月初一日三清至尊在玉清聖境九霄梵􅉋之上大㑹九天十極考校功過無上至尊金闕昊天玉皇上帝總領三界羣真諸天列曜地水衆聖上朝三清爾時元始天尊登命金闕侍中九天司馬儲福定命真君開碧玉寳笈流露丹匡出萬天素威功過玉厯考校諸天諸地水界陽曹昇真得道以來功過大小以予自龍漢初刼化九光之始育𤣥黄之秀神一挺生已三十餘化迄於周武王之乙巳嵗乃符天徳降生於清河氏九十餘世之盡孝盡忠百千萬化之積功累行當㳄天帝之位於是諸天行舉三界惟尊頒降玉厯下示金闕乃命玉宸左侍瑶華内院翰林瓊章學士諸天真君撰製玉冊以是月十五日進封帝號曰無上大羅天開化十九年正月十五日金闕玉宸瑶華内院三天門下都省一􅉋分形化生四靈𤣥𤣥大道無形無名始清肇判挺生聖真乾坤並徳日月並明天上天下莫不孝欽惟昊天金闕太師糾察三界三教禍福事九天都督大使判桂祿嗣籍上仙元皇真人張某𤣥黄孕質炳靈張翼之精真􅉋通靈妙證虚皇之果植立古今之名教彌綸天地之璇綱全十華十徳之太𤣥朗八景八真之妙善分身應化不外乎忠孝之兩端救刼度人必本乎慈仁之一念九十生之功成行滿三千刼之道備徳髙坤維𢎞福惠之恩乾造賴賛襄之力善盈玉厯名煥瑶穹當位帝真式隆寵號敬遣金闕侍中玉宸左侍清𤣥學士無上上徳真君寗洪齎捧金書玉冊特上尊號進拜南極長生真三九天定元保生扶教開化主宰波羅尼蜜不驕樂育大帝抜劒大慈悲更生永命天尊極先天地道藴𤣥黄生一􅉋以化三才溷合空洞證十通而成萬行離相消塵扶教定元下制延康之浩刼保生開化俾超暉景之太霞位峻九天功超三界丕開慈悲之行大恢生化之原持檀熾香領蒼胡寳功髙莫議徳盛難踰合示嘉尊幸毋謙遜仍冀同符大道刧刧長存溥福生民巍巍其大龍章昭錫永秘𤣥都謹冊予以是日受徽號於玉宸金闕七寳瓊臺之上昊天至尊御殿典儀賜羽葆霓旌九龍玉輦九鳳瓊輿冠通天十二旈之冠服𤣥衮日月山龍華蟲之服秉𤣥圭而步朱履所居之宫一曰紫微垣文昌宫在赤明和陽虚明堂曜天之間一曰玉霄絳宫在波羅蜜不驕樂育天之上皆宫闕巍峩大暉華􅉋赤城丹臺金墉玉樹靈鳳自鳴紫雲常覆予欽奉冊命峻遷天真愈懷恐懼乃作慈憫而自誓曰下土衆生不知因果不識罪福多迷正道誤入邪宗展轉沉淪無由出離又值延康末劫魔鬼流行人民受禍剥爛生根誠可哀念乃以孔孟伊周之學道徳仁義之教綜以仙釋之靈通顯以柱錄之功用設為四科立為九等表吉凶悔吝之直彰善惡禍福之報或兆於夢或著於籖分身應化救劫保生嗣是之後文武醫卜士農工賈凡一民一物之榮枯貴賤皆隷予之造化焉延康末劫蜀有三卯之屯開禧丁卯逆曦僣扆予不忍生靈荼毒預禀天勅遣皛然山神降生為安丙同崇應帝削平此亂垂鑾之際顯示安名是以楊李諸人因予成事而禍不及民紹定辛卯蜀變甚􅃤皆人心不古有以召之予屢請玉陛天怒震動不允奏聞乃遣鳳凰土地生於余氏曰玠尹兹西陲以甦蜀困時號小康迨至乙夘世事日非數不可挽雷杼不可以復居矣遂有三潮之命悲夫予三潮宅真之地數罹劫變再奉天勅移鑾於黔遂以雲龍山摩圍後洞為寧親之宅以駐神蹕分遣仙官隨地炳靈為國宣勞不一而足趙定應以功業著夏貴以如意顯他如開州之復鵞灘之捷皆予隂相也又命曹光顔奕李白蘇軾黄庭堅諸仙假金蓮石葛傍嵓鑚火鎔雪烹茶讃經述儀開復古化出一十七書以夀衣冠之脉以植綱常之教以昌文儒之命以衍上帝一十七光之休而永億萬世之真傳焉帝君作紫府飛霞洞記云吾舊生越嶲間按越嶲為郡居天下之西南角得坤之用在漢時戸僅十四萬其俗多營窟版屋而息如上古穴居埜處之世其地則多土壙巖穴接黎之卭莋都雅之靈闗道自唐大斥土宇包夷荒而郡縣之民不堪命越嶲遂與中華壤斷土隔真人幸啟偃兵息民執玉斧而劃棄大渡之外越嶲遂淪嗚呼吾將安歸當以黎雅為鄉也黎之卭崍闗有靈應洞乃吾之變化所惟古䝉舊属漢嘉之青衣其俗醇厚簡古如周民好善堯屋可封其地襟帶巖巒如太華之磅礴岷峨之嶙峋吾常愛而居焉近奉帝命往來全蜀至則寓之以行化恨榛莾掩翳如小有清虚之所吾必久留邑下苟洙父子念此甚久吾知而直命之乃忻然於吾殿後斬荆棘去茅菅為一洞天費僅二十萬錢屋穴皆備吾掲為紫府飛霞葢本班固賦西都據坤靈之正位倣太紫之圓方與王勃記滕王閣彩徹雲衢霞鶩齊飛之義上以示吾不忘故鄉之意下以期有志於攀鱗者休哉蒙山之下亦有變化之所矣後之人有能自勵而期為汗漫㳺者乎然東山舊祠興自紹興丙寅逮今年丁卯始克有洞穴而洞穴不成於他人而成於苟洙父子亦有數也一日苟洙欲紀年月曰此事非神其誰宜為吾亦為之忻然親書於石開禧三年六月十八日也雋永錄云祥符中西蜀有二舉人同硯席既得舉貧甚干索旁郡乃能辦行嵗已迫始發鄉里懼引保後時窮日夜行至劒門張惡子廟號英顯王靈響震三川過者必禱焉二子過廟已昬晩大風雪苦寒不可行遂禱於神各占其得失以神夢為信草草就廟廡下席地而寢入夜風雪轉甚忽見廟中燈燭如晝肴爼甚盛人物紛然往來俄傳𨗳自逺而至聲震四山皆岳瀆貴人也既就席賔主勸酬如世人二子大懼已無可柰何潜起伏暗觀焉酒行忽一神曰帝命吾儕作來嵗狀元賦當議題一神曰以鑄鼎象物為題既而諸神皆分一韻且各刪潤雕改商確又久之遂朗誦曰吾召作狀元者魂魄授之確子黙然私相謂曰此正為吾二人發迨將曉見神各起致别傳呼出廟而去視廟中寂然如故二子素聰敏各盡記其賦亟寫於書帙後無一字忘於是拜賜鼓舞而行咲語欣然惟恐富貴之逼身也至京適及引保就試過省志氣洋溢益半驗矣至御試二子坐東西廊御題出是鑄鼎象物賦韻脚盡同東廊者下筆欲書懵然一字不能記間闗過西廊問之西廊望見東廊來者曰御題驗矣我乃不能記欲起問子幸無隱也東廊者曰正欲問子也於是二子交相疑曰臨利害之際乃見平生且此神賜而獨私以自用天其福爾耶各忿怒不得意草草信筆而出唱名二子皆被黜狀元乃徐奭也既見印賣賦比廟中所記者無一字異二子歎息遂皆罷入山不復事筆硯蜀中廣記卷七十九
