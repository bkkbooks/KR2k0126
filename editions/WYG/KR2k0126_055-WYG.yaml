body:
  text: 蜀中廣記卷五十五明曹學佺撰風俗記第一後漢蜀郡太守陳留髙眹雅播文教太尉趙公瑶初為九卿適子寗還蜀眹命為文學撰鄉俗記予倣之川西道屬禹貢華陽黒水惟梁州梁者彊也西方金氣彊梁之義春秋元命包云益州益者隘也言其氣急切而決烈也應劭風俗通云益者阨也言其地險阨而益廣也揚子雲方言蜀猶獨也不與外方同也又蜀賦云剛悍生其方風謡尚其武矣華陽國志云地稱天府原曰華陽其精靈則井絡垂耀江漢遵流其卦值坤故多斑采文章其辰值未故尚滋味徳在少昊故好辛香星應輿鬼故君子精敏小人鬼黠與秦同分故多悍勇在詩文王之化被乎江漢之域秦豳同詠故有夏聲也漢地里志云人食稻魚俗不愁苦而輕易淫佚然地沃人驕奢侈頗異人情物態别是一方蜀在有周之世限以秦巴雖奉王職不得與春秋盟㑹君長莫同書軌先有蜀王杜宇教民務農始稱帝曰望帝禪位於相開明帝升西山隱焉時適二月子鵑鳥鳴故蜀人悲子鵑鳥鳴也巴亦化其教而力農務迄今巴蜀民農時先祀杜主君秦孝文王時蜀守李冰壅江作堋穿郫江檢江别支流雙過郡下以行舟船岷山多梓栢大竹頺隨水流坐致材木功省用饒又溉灌三郡間稻田於是蜀沃野千里號為陸海旱則引水浸潤雨則杜塞水門故記曰水旱從人不知饑饉時無荒年謂之天府也應劭風俗通云李冰為蜀太守開成都兩江溉田萬頃江神毎嵗須童女二人不然為水災冰因自以女與神婚徑至神祠前勸酒酒杯常竭冰厲聲責之因不見良久有兩蒼牛鬬於江㟁有間冰還流汗謂官屬曰鬬大極當相助也若知南向腰中正白者即我也頃復鬬主簿因刺殺北面者江神從此絶患民思其恵今有祠存宋祁作廟碑云俗嵗擊羊豕雉魚伐鼓龡籥傾數十州之人奔走鼓舞以娛恱神漢文帝末年廬江文翁為蜀守穿湔江口溉灌繁田千七百頃是時世平道治民物阜康承秦之後學校陵夷俗好文刻翁乃立學選吏子弟就學遣雋士張叔等十八人東詣博士受七經還以教授學徒鱗萃蜀學比於齊魯巴漢亦立文學孝景帝嘉之令天下郡國皆立文學因翁倡其教蜀為之始也宋祁作廟碑云翁之治蜀開學校以詩書教人澡熨故俗長長少少親親尊尊百姓順而賴之按廬江舊志文翁名黨李知㡬詩註翁字仲翁蜀人不敢斥其名字故但稱文翁西漢王貢傳嚴君平卜筮於成都市以為卜筮者賤業而可以恵衆人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善從吾言者已過半矣後漢書成都俗尚文辯好相持短長建初中㢘范為太守毎勵以淳厚不受媮薄之說又民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隱蔽燒者日屬范乃毁削先令但嚴使儲水百姓便而歌之曰㢘叔度來何暮昔日無􅃭今五袴蜀志龎統說先主曰益州國富民殷戸口百萬寳貨無求於外今可權借以定大事先主入蜀諸葛亮為相治蜀以嚴有善必奬有過必罰人皆服其公明終蜀之世南征北伐徴調無虚日不敢出怨言亮死百姓遇節朔各私祭於道上勅止之不能禁東晉之後李雄煽亂衣冠殁於夷獠蕭紀僣號疆土析入凉魏開皇混一俗染猶存隋地理志云蜀地四塞山川重阻水陸所凑貨殖所萃蓋一都之㑹也風俗大抵與漢中不别其人敏慧輕急貌多蕞陋頗慕文學時有斐然多溺於逸樂少從宦之士或至耆年白首不離鄉邑人多工巧綾錦雕鏤之妙殆侔於上國貧家不務儲蓄富室重於趨利其處家室則女勤作業而士多自閒聚㑹宴飲尤足意錢之戲小人薄於情禮父子率多異居其邊野富人多規固山澤以財物雄役故輕為姦藏權傾州縣此亦其一厄也唐貞觀初髙儉士㢘為益州大都督隨方訓誘風俗頓更又於李冰所創故渠之外别加䟽決大獲其利乃因暇日汲引辭人以為文㑹擇令儒生講論經史勉勵後進蜀中文學燦然復興故王勃夫子廟碑云天帝㑹昌之國英靈輩出之鄉庠序由其糾合纓弁所以㑹同文翁之景化不渝智士之風猷自逺也二宗西巡疲於奔命王孟之季競為妖侈當王氏晩年俗作小帽僅覆其頂俛首即墮謂之危腦衍又好戴大帽毎微服出逰民間民間以大帽識之因令國中皆戴大帽又好褁尖巾其狀如錐而後宫皆戴金蓮花冠衣道士服酒酣免冠其髻髽然更施朱粉號醉粧國中之人皆效之劉纂疏曰下之從上如風偃草以仁義理法化之則為謹愿之行以驕奢淫佚化之則為狂薄之俗今一國之人皆效醉粧臣恐邦基頺然如人之醉而不可支持也五代史唐莊宗遣李嚴來聘衍與偕朝上清宫上清宫者衍建以祠周王子晉也於時蜀都闤闠士女簾帷珠翠夾道不絶嚴見其民物富盛衍又驕盈歸而獻伐蜀之策焉迨孟㫤末年婦女競治髮為髙髻號曰朝天未㡬而㫤入朝京師識者謂其先兆舊說成都不打晩衙鼓劉仲張潜夫皆云孟蜀多以晩鼓戮人埋毬場中毎鳴鼓則鬼祟必作自是承例不打晩衙鼓劉跂暇日所記也又蜀人質錢取息者毎將徙居必牓其門曰召主收贖葢周世宗累欲收蜀而不果至宋太祖乃收之是其應矣宋初李順之變反側不寧張詠知府導以王化嘗曰前日順脅民為賊今日吾當化賊為民也趙抃凡四入蜀以一琴一鶴自隨神宗聞之喜曰抃為政簡易亦稱是耳然俗好娛樂凡太守嵗時晏集騎從雜沓車服鮮華倡優鼓吹出入擁導四方竒技幻恠百變序進於前以從民樂嵗率有期謂之故事及期則士女闐道嬉逰以坐具列於廣庭謂之遨床謂太守為遨頭張趙二公雖持清嚴亦重拂其欲焉元祐二年臣蘇軾奉勅賜資政殿學士新差知成都府王安禮詔書銀合茶藥傳宣撫問口宣云卿西南之寄古今所難葢自祖宗以來式輟鈞衡之舊與衆同樂非卿孰宜也田况成都遨樂詩序云四方咸傳蜀人好㳺娭無時子始亦信然之逮忝命守益柅轅踰月即及春㳺毎與民共樂則作一詩以紀其事自嵗元徂景至止得古律長調短韻共二十一章其間上元燈夕清明重九七夕嵗至之類又皆天下之所共豈曰無時哉傳之者過矣蜀之士君子欲予詩聞於四方使知其俗故序以見懷子復取宋祁范成大陸㳺吳中復各詩註而附之以廣見聞元日登安福塔陸㳺詩註云俗名黒塔也按成都古今記唐大中間建塔十有三級李順之亂燬於火祥符間重建仍十有三級初取材岷山得青石中隱白畫浮圖像十有三級梁柱欄楯厯厯可觀邦人以其神異而禮敬之二日出城即東城也田况詩載邦人展墓事范成大詩初三日出東郊碑樓院故事祭東君因宴此院蜀人皆以此日掃墓廿八日謁生祿祠㳺浄衆寺宋祁詩注云州人以正月廿八日祠保夀侯及唐杜丞相悰祠堂二月二日㳺江㑹寳厯寺即小㳺江也始於張公詠十五日蠶市方輿勝覽云成都古蠶叢之國其民重蠶事故一嵗之中二月望日鬻花木蠶器於其所者號蠶市三月三日登學射山范成大詩云清明日試新火作牡丹㑹丹淵集載成都燕集用一春為常三日不修己云逺甚然各有定處惟上已學射山之㑹為盛山有通真觀祀張伯子其日兩蜀之人皆集從道士受秘籙以歸謂一年禍福率此日恭慢所致也二十一日㳺海雲寺王霽詩序云成都風俗嵗以三月二十一日㳺城東海雲寺摸石於池中以為求子之祥太守出郭建髙旟鳴笳鼓作馳騎之戱大讌賔從以主民樂觀者夾道百里飛蓋蔽山野讙謳嬉笑之聲雖田野間如市井其盛如此渤海吳公首作七言詩以冩勝賞席客吳中復范純仁韓宗道等更相酬和得十餘首四月十九日泛浣花谿即大㳺江也任正一㳺記云成都之俗以㳺樂相尚而浣花為特甚毎嵗孟夏十有九日都人士女麗服靚籹南出錦官門稍折而東行十里入梵安寺羅拜冀國夫人祠下退㳺杜子美故宅遂泛舟浣花溪之百花潭因以名其㳺與其日凡為是㳺者架舟如屋餙以繒綵連檣啣尾蕩漾波間簫鼓絃歌之聲喧闐而作其不能具舟者依㟁結棚上下數里以閲舟之往來成都之人於他㳺觀或不能皆出至浣花則傾城而往里巷閴然自旁郡觀者雖負販蒭蕘之人至相與稱貸易資為一飽之具陸務觀云予在蜀數年毎赴此㑹必遇晴明成都戴白之老云未嘗見浣花日雨也五日鬻香藥於觀街者號藥市鬻器用者號七寳市丹鉛錄云五月賣扇於街中謂之扇市伏日宴江瀆祠避暑因㳺江瀆池此㑹始於文潞公七月七日晩登大慈寺閣觀夜市即雪錦樓也九月初九日藥市京鏜有調洞仙歌按成都古今記王生聞樂言吉凶無不中者嘗逰藥市聞五門奏樂不知涕之無從出告人曰嚮淳化甲午年方罹冦難今兹樂聲又將有甲午之變至明年正月王均叛十二月十八日海雲寺賞山茶范成大有詩揚雄蜀都賦曰其俗迎春送冬百金之家千金之公何畊錄二叟語云立春日通天下郡邑設土牛而磔之謂之班春所從來舊矣其說蓋微見於吕令而詳於續漢禮儀志大抵先王謹農事之遺意也成都大都㑹自尹而下茗漕二使者之治所在焉將春前一日有司具旗旄金鼓俳優侏儒百伎之戱迎所謂芒兒土牛以獻二使者最後詣尹府遂安於班春之所黎明尹率掾屬相與祠勾芒環牛而鞭之三匝退而縱民磔牛民讙譁攫攘盡土乃已俗謂懷其土歸置之耕蚕之器之上則蠒孳而稼美故争得之雖一丸不忍棄嵗率以為常紹興丙子余往觀焉見二叟立牛側一叟撫牛而歎曰是孰象似汝孰丹堊汝孰引羣吏俎豆而羅拜汝方旗旄金鼓俳優侏儒百伎之戯雜然而前陳以導汝至此而空一府之人以觀汝也不亦榮而甚可樂歟俄而挺者競進擊者交下而汝始碎首折骨矣譟者奪者負者趍者而汝始蕩為㳺塵散為飄風矣嗚呼悲哉今夫富貴之家髙明之門倚勢而怙寵役物以自奉嘘吸生風雲叱吒為雷霆偃然自以為莫已若也有不似兹牛之始至者乎及其權移而運去大者隕身赤族小者觸刑抵罪雖三尺孺子莫不聞而哀之有不似兹牛之既磔者乎吾悲夫禍福之無常而慶弔之相躡於俛仰之間也吾又悲夫造物者之戯人胡為而至斯極也吾是以歎一叟局局然笑曰子何言之陋耶是安從生自土而為泥自泥而為牛土不知其為牛也自牛而遭磔磔而復為土土不知其非牛也彼既不知其為牛矣則雖象似之丹堊之爼豆而羅拜之與夫旗旄金鼓俳優侏儒百伎之戯迎而致之空一府而觀之彼且何榮而何喜乎哉彼既不知其非牛矣則雖擊之碎之敗之毁之彼且何懼而何戚乎哉牛固無所喜愠而世之人方且認外物以為己有其未得也挾術用數以致其必來而其既去則猶殫智極力以幸其少留也可不為之大哀乎其有愧於兹牛多矣而造物者初何與莊子曰適來時也適去順也安時而處順憂樂不能入也子無庸歎嘗試以是觀之余竦然異其言迫而問之若何為者也二叟皆不告而去蜀固多隱君子哉按成都又有鬬牛之戱為李冰事費著嵗華紀麗譜云成都逰賞之盛甲於西蜀蓋地大物繁而俗好娛樂凡太守嵗時宴集騎從雜㳫車服鮮華倡優鼓吹出入擁導四方竒技幻恠百變序進於前以從民樂嵗率有期謂之故事及期則士女櫛比輕裘袨服扶老携㓜闐道嬉㳺或以坐具列於廣庭㠯待觀者謂之遨床而謂太守為遨頭宋朝以益州重地嘗謀帥以命宋公祁宰相對曰蜀風奢侈祁喜逰宴恐非所宜宋朝不從卒遣之公先奉詔修唐書因以書局自隨至成都毎宴罷盥漱闢寢門垂簾燃二椽燭媵婢夾侍和墨伸紙望之者知公修唐書若神仙焉嘗宴於錦江偶微寒命索半臂諸妓各送一枚公視之慮有厚薄之嫌訖不服忍冷以歸舊俗傳誇以為談本田公况嘗為成都遨樂詩二十一章以紀其實而薛公奎亦作何處春逰好詩十章自號薛春逰㠯從其俗且欲以易尹京之舊稱公知府専以嚴為治成都人謂之薛出油此皆可以想承平之遺風也至清獻公為記乃曰曩時宴㑹皆牙校掌之蓋𣙜酤之利有餘人樂於為役公帑嵗入亡慮千萬貫有竒自新法頒行酒坊為官所鬻牙校雖得劵錢不足自贍乃者議置成都市易務方㳺觀時人情瞿然減常嵗之半今公使錢嵗給三萬貫常廪廪慮不足譬之巨人以狹衾寢覆趾則露肩擁左則闕右甚可笑也令盤饌比舊從省樂優之給亦復過殺設遂廢之則非天子所以付畀一隅恵保逺人之意而小民之鬻肴菓者但營慕供藉以為養此逰宴之不可廢也觀公此言則蜀人之貧富欣戚可以知政矣今以元日為始而第其事如左正月元日郡人曉持小綵幡逰安福寺塔粘之楹柱若鱗㳄然以為厭禳懲咸平之亂也塔上燃燈梵唄交作僧徒駢集太守詣塔前張宴晩登塔眺望焉二日出東郊早宴移忠寺舊名碑樓院晩宴大慈寺清獻公記云宴罷妓以新詞送茶自宋公祁始蓋臨卭周之純善為歌詞嘗作茶詞授妓首度之以奉公後因之五日五門蠶市蓋蚕叢氏始為之俗往往呼為蠶叢太守即門外張宴上元節放燈舊記稱唐明皇上元京師放燈甚盛葉法善奏曰成都燈亦盛遂引帝至成都市酒於富春坊又咸通十年正月二日街坊㸃燈張樂晝夜喧闐則放燈不獨上元也王孟時間亦放燈率無定日宋開寳二年命明年上元放燈三夜自是嵗以為常十四十五十六三日皆早宴大慈寺晩宴五門樓甲夜觀山棚變燈其歛散之遲速惟太守意也如繁雜綺羅街道燈火之盛以昭覺寺為最又為殘燈㑹㑹始於張公詠蓋燈夕二都監戎服分巡以察姦盜既罷故作宴以勞焉通判主之就宣詔亭或涵虚亭舊以十七日今無定日仍就府治専以宴監司也二十三日聖夀寺前蠶市張公詠始即寺為㑹使民鬻農器太守先詣寺之都安王祠奠獻然後就宴舊出萬里橋登樂俗園亭今則早宴祥符寺晩宴信相院二十八日俗傳為保夀侯誕出笮橋門即侯祠奠拜㳄詣浄衆寺邠國杜丞相祠奠拜畢事㑹食晩宴大智院二月二日踏青節初郡人逰賞散在四郊張公詠以為不若聚之為樂乃以是日出萬里橋為綵舫數十艘與賔僚分乗之歌吹前導號小逰江蓋指浣花為大逰江也士女駢集觀者如堵晩宴於寳厯寺公為詩有曰春㳺千萬家美人顔如花三三兩兩映花立飄飄似欲乗煙霞後以為故事及清獻公為記時綵舫増至數倍今不然矣八日觀街藥市早宴大慈寺之設㕔晩宴金繩院三月三日出北門宴學射山既罷後射弓蓋張伯子以是日即此地上升巫覡賣符於道逰者佩之以宜蠶辟災輕裾小蓋照爛山阜晩宴於萬嵗池亭泛舟池中九日觀街藥市早晩宴如二月八日二十一日出大東門宴海雲山鴻慶寺登衆春閣觀摸石蓋開元二十三年靈智禪師以是日歸寂邦人敬之入山逰禮因而成俗山有小池士女探石其中以占求子之祥既又晩宴於大慈寺之設㕔二十七日大西門睿聖夫人廟前蚕市初在小市橋田公以禱雨而應移於廟前太守先詣諸廟奠拜宴於浄衆寺晩宴大智院寒食出大東門早宴移忠院晩宴大慈寺設㕔曩時寒食太守先設酒饌於近郊祭鬼物之無依者謂之遥享後置廣仁院以葬死而無主者乃遣官臨祭之而民間上塜者各蟻集於郊外天禧三年趙公稹嘗開西樓亭榭俾士庶㳺觀自是毎嵗寒食闢園張樂酒爐花市茶房食肆過於蚕市士女縱觀太守㑹賔僚凡浹旬此最府庭逰宴之盛近嵗自二月即開園踰月而後罷以酒人利酒息或請於府展㡬日府尹亦許之四月十九日浣花佑聖夫人誕日也太守出笮橋門至􅆊安寺謁夫人祠就宴於寺之設㕔既宴登舟觀諸軍騎射倡樂導前泝流至百花潭觀水嬉競渡官舫民船乗流上下或幕帟水濵以事逰賞最為出郊之勝清獻公記云往昔太守分遣使臣以酒均給逰人隨所㑹之數以為斗升之節自公使限錢後乃以隨行公使錢釀酒畀之然不逮昔日矣五月五日宴大慈寺設㕔醫人鬻艾道士賣符朱索綵縷長命辟災之物筒飯角黍莫不咸在六月初伏日㑹監司中伏日㑹職官以上末伏日㑹府縣官皆就江瀆廟設㕔初文潞公建設㕔以伏日為㑹避暑自是以為常早宴罷泛舟池中復出就㕔晚宴觀者臨池張飲盡日為樂趙清獻公使限錢但為初伏㑹今因之七月七日晩宴大慈寺設㕔暮登寺門樓觀錦江夜市乞巧之物皆備焉十八日大慈寺散盂蘭盆宴於寺之設㕔宴已就華嚴閣下散盆八月十五日中秋玩月舊燕於西樓望月錦亭今宴於大慈寺九月九日玉局觀藥市宴監司賔僚於舊宣詔堂晩飲於五門凡三日官為幕帟棚屋以事㳺觀或云有恍惚遇仙者冬至節宴於大慈寺後一日早宴金繩寺晩宴大慈寺清獻公記云至前一日太守領客出北門石魚橋具樽豆觀樵已乃即天長觀晩宴蓋文潞公始為之後復罷已上附郭益部耆舊傳云楊統曽祖仲續舉河東方正授郫令甚有徳恵人為立祠樂其風俗於是居焉漢書揚雄之先揚季官至廬江太守元鼎間避仇遡江處岷山之陽曰郫有田一㙻有宅一區世世以農桑為業其俗之隩厚可知也温江故郫所分益州記云彭之土地肥良比於郫邑號小郫矣江原之地特好美田葛公云益州所需悉仰於蜀即此華陽國志稱其俗好歌舞危弦促管聲尤激切而陸㳺謂唐安有三千官栁四十琵琶也永康圖經其俗剛悍頗尚氣節而雜夷風縣西五十里有蠶崕闗以振西山之走集而邊徼從此分矣威茂古冉駹地土地剛鹵不生榖粟蔴菽惟以麥為質自古及今並無兩稅寰宇記云州本羌戎之人好弓馬以勇悍相髙詩禮之訓闕如也男子衣羯羊皮􅛘婦人多戴金花串以瑟瑟而穿懸珠為飾疊石為􅠼以居如浮圖數重門内以梯上下貨藏於上人居其中畜圂於下髙二三丈者謂之雞籠十餘丈者謂之碉亦有板屋土屋者自汶川以東皆有屋宇不立碉巢豹嶺以西皆織毛毯蓋屋如穹廬其地多冰寒盛夏凝凍不釋夷人冬則避寒入蜀傭賃自食夏則避暑反落嵗以為常故蜀人謂之作五百石子也西入松州苦寒特甚日耕野壑夜宿碉房刻木契以成交易炙羊膀以斷吉凶人人精悍習戰鬬矣簡州治陽安宋闗耆孫碑隂記云東普慈西成都有東之朴有西之文蓋嘗出磊落瑰竒之士焉紹興黎持道院記云陽安隣於㑹府而有江山之勝處於髙仰而有魚稻之饒民事獄訟比之旁郡十無一二凡隱於吏者樂趨焉人目之為西州道院寰宇記云郡有獽人言語與夏不同嫁娶但鼓笛而已遭喪乃以竿懸布置其門庭殯於别所至其體骸燥以木函盛置於山穴中按李膺云此四郡獽也而今則文質彬彬矣資中或治盤石或徙内江皆謂之中水也圖經云王褒起資中以文詞顯於是東梓為多士之國劉光祖記云蜀東十數郡山水之秀不敢與􅓵中抗文物亦然陵州以鹽井為業以道陵得名丹淵集云州在崎嶇山谷之中城壘邑屋與巒嶺澗􅊤相為上下所領縣四户口裁三萬稅錢止千三百緡租不滿萬石土田瘠鹵民頗善耕稼然其性椎質各守護本業不憙作訴訟事又郡縣志云俗愿慤而好静公議而無私有古淳質之風今亦恐漸訛矣漢益州或治廣漢或治綿竹古語云大旱不旱蜀有廣漢蜀記云浸以緜雒故廣漢謂之淵府也新都與成都廣都各為三都之一故號名城兼有金堂山焉綿竹以姜詩力孝宅曰汛鄉以任安教授俗侔洙泗徳陽有望秦之里彰明有㢘遜之泉皆以人重也郡國志云左綿界東西二川北負梁雍風氣所濡各得其偏故其俗文而不華淳而不魯剛而不狠柔而不弱三國志先主入涪宴於山上顧謂龎統曰此州之民其富樂乎陳谿唐昌草市記云諸葛武侯以蜀胜脆故令隣邑翊日而市意在習其筋力而俟之征徭又毎及上春以蠢為名因定日而有所往也寰宇記云龍州風俗與劒州同然山髙水峻人多瘤而癡聾蓋山水之氣使然酈道元曰廣柔縣有石紐鄉禹所生也今夷人共營之地方百里不敢居牧有罪逃野捕之者不逼能藏三年不為人得則共原之言大禹之神所祐也江油令許醇民謡序所向皆山石少平陸鮮榖稻人悉仰食於綿劒鄰邑舊經云岩居谷處多學道經罕有儒術已上外郡縣岑參招北客文云蜀之先曰蠶藂兮縱其目以稱王當周室陵頺兮亂無紀綱洎乎杜宇從天而降鼈靈泝江而上相禪而帝據有南國之九世蜀本南夷人也皆左其袵而椎其髻及通乎秦也始於恵王之代五牛琢而秦女至一蛇死而力士斃二江雙注羣山四蔽其地卑濕其風胜脆蠻貉雜處滇僰為隣地偏而兩儀不正寒薄而四氣不均花葉再榮秋冬如春暮夜多雨朝旦多雲陽景罕聞隂氣恒昏以暑以濕為瘵為癘氣浥熱以中人吾知虚膇之疾兮將嬰爾身蜀之不可往北客歸去來兮若乃髙山萬重峻極屬天西有崑崙其峯相連日月迴環礙於山巔巒崕盤嶔天壁夐絶陽和不入隂氣固閉千年層冰萬古積雪谿寒地㟁谷凍石冽夏月草枯春天木折蒼煙凝兮黒霧結人墮指兮馬傷骨江水噴激迴盤紆縈棧壁緣雲鉤連相撑繩梁嶫虚傍㳫杳㝠下不見底空聞波聲過者矍然亡魂喪精復引一索其名為笮人懸半空度彼城􅊤或如鳥兮或如玃倐往還來幸不落乃有豪豬千羣突出如牛修角鈍劒癯軀餓虓争肉吼怒闞闞不休復有髙崕墜石兮聲如雷之軒轟上敲下磕似火迸兮滿山流星磵谿忽兮倒流林㟁為之頺傾驚騰狖與過鳥駭木魅兮山精闕深榛努鬛射人寒熊孔碩登樹自擲見人則擘巨麋飛石壓人兮不可行西有犬戎與此山通行貌類人言語不同氊廬隆穹毳裘蒙茸啜酪啖肉持鎗挾弓依草及泉務戰與攻其聲如犬其聚如蜂中國之人兮或流落於其中豈知掘䑕茹雪以為食終當鈹其足而纍其胸泣漢月於西海思故鄉於北風蜀之西不可以往北客歸去來兮蜀中廣記卷五十五
