body:
  text: 蜀中廣記卷八十四明曹學佺撰高僧記第四川西道四昭覺克勤禪師彭州駱氏子兒時日記千言偶游妙寂寺見佛書三復悵然如獲舊物曰予殆過去沙門也即去家依自省祝髪從文照通講説又從敏行授楞嚴俄得病瀕死歎曰諸佛湼槃正路不在文句中吾欲以聲求色見宜其無以死也遂棄去至眞覺勝禪師席勝方刺臂出血指示師曰此曹溪一滴也師矍然良久曰道固如是乎即徒步出蜀首謁玉泉皓次依金鑾信大溈喆黄龍心東林度僉指為法器而晦堂稱他日臨濟一派屬子矣最後見五祖盡其機用祖皆不諾乃謂祖强移換人出不遜語忿然而去祖曰待你著一頓熱病打時方思量我在師到金山染傷寒困極以平日見處試之無得力者追繹五祖之言乃自誓曰我病稍間即歸五祖病痊尋歸祖一見而喜令即㕘堂便入侍者寮方半月㑹部使者解印還蜀詣祖問道祖曰提刑少年曽讀小艷詩否有兩句頗相近頻呼小王原無事祗要檀郎認得聲提刑應喏喏祖曰且子細師適歸侍立次問曰聞和尚舉小艷詩提刑㑹否祖曰他認得聲師曰秪要檀郎認得聲他既認得聲為甚麽却不是祖曰如何是祖師西來意庭前栢樹子聻師忽有省遽出見雞飛上闌干鼓翅而鳴復自謂曰此豈不是聲遂袖香入室通所得呈偈曰金鴨香消錦綉幃笙歌叢裏醉扶歸少年一段風流事祗許佳人獨自知祖曰佛祖大事非小根劣器所能造詣吾助汝喜徧謂山中耆舊曰我侍者㕘得禪也由此所至推為上首崇寧中還里省親成都帥翰林郭公知章請開法昭覺政和間復出峽南逰時張無盡寓荆南以道學自居少見推許師􅋈舟謁之劇談華嚴㫖要曰華嚴現量境界理事全眞初無假法所以即一而萬了萬為一一復一萬復萬浩然莫窮心佛衆生三無差别卷舒自在無礙圓融此雖極則終是無風匝匝之波公於是不覺促榻師遂問曰到此與祖師西來意為同為别公曰同矣師曰且得没交涉公色為之愠師曰不見雲門道山河大地無絲毫過患猶是轉句直得不見一色始是半提更須知有向上全提時節彼徳山臨濟豈非全提乎公乃首肯翌日復舉事法界理法界至理事無礙法界師又問此可説禪乎公曰正好説禪也師笑曰不然正是法界量裏在盖法界量未滅若到事事無礙法界法界量滅始好説禪如何是佛乾屎撅如何是佛麻三斤是故眞淨偈曰事事無礙如意自在手把猪頭口誦淨戒趂出婬坊未還酒債十字街頭解開布袋公曰羙哉之論豈易得聞乎於是以師禮留居碧岩復徙道林樞宻鄧公子常奏賜紫服師號詔住金陵蔣山學者無地以容勅補天寧萬夀上召見褒寵甚渥建炎初又遷金山適駕幸維揚入對賜圓悟禪師改雲居久之復領昭覺僧問雲門道須彌山意㫖如何師曰推不向前約不退後曰未審還有過也無師曰坐却舌頭問法不孤起仗境方生提坐具曰這個是境那個是法師曰却被闍梨奪却鎗問古人道楖栗横擔不顧人直入千峰萬峰去未審那裏是他住處師曰騰蛇纒足露布遶身曰朝看雲片片暮觀水潺潺師曰却須截斷始得曰此回不是夢眞個到廬山師曰高著眼問猿抱子歸青嶂後鳥銜花落碧岩前此是和尚舊時安身立命處如何是道林境師曰寺門高開洞庭野殿脚挿入赤沙湖曰如何是境中人師曰僧寶人人滄海珠曰此是杜工部底作麽生是和尚㡳師曰且莫亂道曰如何是奪人不奪境師曰山僧有眼不曽見曰如何是奪境不奪人師曰闍梨問得自然親曰如何是人境俱奪師曰收曰如何人境俱不奪師曰放問有句無句如如藤倚樹如何得透脱師曰倚天長劍逼人寒曰祗如樹倒藤枯溈山為甚麽呵呵大笑師曰愛他㡳著他㡳曰忽被學人掀倒禪床抝折拄杖又作箇甚麽伎倆師曰也是賊過後張弓問明歴歴露堂堂因甚麽乾坤收不得師曰金剛手裏八稜棒曰忽然一喚便回還當得活也無師曰鶖子目連無奈何曰不落照不落用如何商量師曰放下雲頭曰忽遇其中人時如何師曰騎佛殿出山門曰萬象不來渠獨語教誰拈手上高峰師曰錯下名言上堂通身是眼見不及通身是耳聞不徹通身是口説不著通身是心鑒不出直饒盡大地明得無絲毫透漏猶在半途據令全提且道如何是展演域中日月縱横挂一旦晴空萬古春上堂山頭鼓浪水㡳揚塵眼聽似震雷霆耳觀如張錦綉三百六十骨節一一現無邊妙身八萬四千毛端頭頭彰寶王刹海不是神通妙用亦非法爾如然茍能千眼頓開直是十方坐斷且超然獨脱一句作麽生道試玉須經火求珠不離泥上堂本來無形段那復有脣觜特地廣稱揚替他説道理且道他是阿誰上堂十五日已前千牛拽不回十五日已後俊鶻趂不及正當十五日天平地平同明同暗大千沙界不出當處可以含吐十虚進一步超越不可説香水海退一步坐斷千里萬里白雲不進不退莫道闍梨老僧也無開口處舉拂子曰正當恁麽時如何有時拈在千峰上劃斷秋雲不放高上堂十方同聚㑹本來身不昧個個學無為頂上用鉗鎚此是選佛場􅀷廣莫能量心空及第歸利劍不如錐龎居士舌拄􅆊天口包四海有時將一莖草作丈六金身有時將丈六金身作一莖草甚是竒特雖然如此要且不曽動著向上闗且如何是向上闗鑄印築高壇上堂有句無句超宗越格如藤倚樹銀山銕壁及至樹倒藤枯多少人失却鼻孔直饒收拾得來已是千里萬里祇如未有恁麽消息時如何還透得麽風暖鳥聲碎日高華影重上堂第一句薦得祖師乞命第二句薦得人天膽落第三句薦得虎口横身不是循途守轍亦非革轍移途透得則六臂三頭未透亦人間天上且三句外一句坐麽生道生涯祗在絲綸上明月扁舟泛五湖示衆云一言截斷千聖消聲一劍當頭横屍萬里所以道有時句到意不到有時意到句不到句能剗意意能剗句意句交馳衲僧把鼻若能恁麽轉去青天也須喫棒且道憑個甚麽可憐無限弄潮人畢竟還落潮中死示衆云萬仞崖頭撒手要須其人千鈞之弩發機豈為鼷鼠雲門睦州當面蹉過徳山臨濟誑謼閭閻自餘立境立機作窠作窟故是滅胡種族且獨脱一句作麽生道萬縁遷變渾閑事五月山房冷似氷紹興五年八月己酉示微恙趺坐書偈遺衆投筆而逝茶毘舌齒不壞舎利五色無數塔于昭覺寺之側謚眞覺禪師昭覺徹菴道元禪師綿州鄧氏子幼於降寂寺圓具東游謁大别道禪師因看廓然無聖之語忽爾失笑曰達磨元來在這裏道譽之往㕘佛鑑佛眼蒙賞識依圓悟於金山以所見告悟弗之許悟被詔住雲居師從之雖有信入終以鯁胸之物未去為疑㑹悟問㕘徒生死到來時如何僧曰香臺子笑和尚次問師汝作麽生師曰草賊大敗悟曰有人問你時如何師擬荅悟憑陵曰草賊大敗師即徹證圓悟以拳擊之師撫掌大笑悟曰汝見甚麽便如此師曰毒拳未報永劫不忘悟歸昭覺命首衆以師繼席焉昭覺紹淵禪師上堂曰鎔瓶盤釵釧作一金攪酥酪醍醐成一味如是賓主道合内外安和五位居臣齊透四種料㨂一串放行則細雨濛濛秋風䬃䬃把住則空空如也誰敢正眼覷著且道放行為人好把住為人好復曰等閒一似秋風至無意涼人人自涼又上堂舉僧問雲門樹凋葉落時如何云體露金風師曰要明陷虎之機須是本色衲子始得雲門大師具逸羣三昧擊節叩闗於閃電光中出一隻手與人解粘去縛拔楔抽釘不妨好手子細㸃檢將來大似與賊過梯昭覺即不然或有僧問樹凋葉落時如何只荅他道落霞與孤鶩齊飛秋水共長天一色且道與雲門是同是别復曰止止不須説我法妙難思又舉趙州初見南泉問如何是道南泉云平常心是道趙州云還假趣向也無南泉云擬向即乖趙州云不擬争知是道南泉云道不屬知不屬不知知是妄覺不知是無記若眞達不疑之道廓然如太虚空無有障礙師拈曰竒怪諸禪徳須是沙彌初入道一撥便轉豈不是靈利人南泉如善射者發箭箭箭中紅心若不是趙州也大難承當便向平常心是道處動著闗棙子去却胸中物喪却目前機頭頭上明物物上頭便能信脚行信口道等閒拈出著著有出身之路以何為驗豈不見僧問如何是祖師西來意荅云庭前栢樹子問萬法歸一一歸何處荅云我在青州作一領布衫重七斤問如何是趙州荅云東門西門南門北門與人解粘去縳抽釘拔褉坐斷天下人舌頭穿過天下人鼻孔豈不是平常心是道㡳闗棙子且不是飣餖㡳言語排疊㡳章句推人在死水裏者箇便是沙彌㡳樣子應當學作麽生承當乃曰欲行千里一步為初白日青天快著精彩成都正法灝禪師上堂舉永嘉到曹溪因縁乃曰要識永嘉麽掀飜海嶽求知已要識祖師麽撥動乾坤建太平二老不知何處去卓拄杖曰宗風千古播嘉聲昭覺辨禪師上堂毫釐有差天地懸隔隔江人唱鷓鴣詞錯認胡笳十八拍要㑹麽欲得現前莫存順逆五湖烟景有誰爭自是不歸歸便得昭覺佛果禪師住成都府崇寧萬夀禪寺初在昭覺受具六祖請拈帖示衆云幸自無事須要個䕶身符子作麽然禍不入愼家之門且作麽生斷這公案㑹麽兵隨印轉請維那剖露韶州南華知昺禪師蜀之永康人也上堂此事最希竒不礙當頭説東隣西舎翁隨例得一橛非唯貫聲色亦乃應時節若問是何宗八字不著撇擊禪床退上堂日日説時時舉似地擎山爭㡬許隴西鸚鵡得人憐大都祇為能言語休思惟帶伴侣智者聊聞猛提取更有一般也大竒猫兒偏解捉老鼠上堂以拄杖向空中攪曰攪長河為酥酪鰕蠏猶自眼搭眵卓一下曰變大地作黄金窮漢依前赤骨立為復自家無分為復不肯承當可中有個漢荷負得行多少人失錢遭罪再卓一下曰還㑹麽寶山到也須開眼勿使忙忙空手回上堂春光爛熳花爭發子規啼落西山月僑􅆊鉢提長吐舌㡳事分明向誰説嗄上堂迷不自迷對悟立迷悟不自悟因迷説悟所以悟為迷之體迷為悟之用迷悟兩無從箇中無别共無别共撥不動祖師不將來鼻孔千金重士珪禪師成都史氏子初依大慈宗雅心醉楞嚴逾五秋南遊謁諸尊宿始登龍門即以平時所得白佛眼眼曰汝解心已極但欠著力開眼耳遂俾職堂司一日侍立次問云絶對待時如何眼曰如汝僧堂中白椎相似師㒺措眼至晩扺堂司師理前話眼曰閒言語師於言下大悟政和末出世和之天寧屢遷名刹紹興間奉詔開山雁蕩能仁時眞歇居江心聞師至恐縁法未熟特過江迎歸方丈大展九拜以誘温人由是翕然歸敬未視篆其徒懼行規法深夜放火鞠為瓦礫之墟師竟就樹縛屋陞座示衆云愛閒不打鼓山鼓投老來看雁岩山傑閣危樓渾不見溪邊茅屋兩三間還有共山出手者麽喝一喝下座聽法檀施併力營建未㡬復成寶坊次補江心上堂曰萬年一念一念萬年和衣泥裏輥洗脚上床眠歴劫來事秖在如今大海波濤湧小人方寸深拈起拄杖曰汝等諸人未得個入頭須得個入頭既得個入頭須有出身一路始得大衆且作麽生是出身一路良久曰雪壓難摧澗㡳松風吹不動天邊月卓拄杖下座上堂萬機不到眼見色耳聞聲一句當陽頭戴天脚踏地你諸人祇知今日是五月初一殊不知金烏半夜忙忙去玉兔天明上海東以拂子擊禪床下座上堂明明無悟有法即迷諸人向這裏立不得諸人向這裏住不得若立則危若住則瞎直須意不停𤣥句不停意用不停機此三者既明一切處不須管帶自然現前不須照顧自然明白雖然如是更須知有向上事久雨不晴咄上堂一葉落天下秋欲窮千里目更上一層樓一塵起大地收嘉州打大像陜府灌銕牛明眼漢合作麽生良久曰久旱簷頭雨橋流水不流卓拄杖下座上堂見見之時見非是見見猶離見見不能及落花有意隨流水流水無情戀落花諸可還者自然非汝不汝還者非汝而誰長恨春歸無覔處不知轉入此中來喝一喝曰三十年後莫道能仁教壞人家男女上堂僧問如何是師曰東家㸃燈西家暗坐曰未審意㫖如何師曰馬便搭鞍驢便推磨僧禮拜師曰靈利衲僧祇消一個遂曰馬搭鞍驢推磨靈利衲僧祇消一個縱使東家明㸃燈未必西家暗中坐西來意㫖問如何多口阿師自招禍僧問如何是第一義師曰你問㡳是第二義問狗子還有佛性也無趙州道無意㫖如何師曰一度著蛇咬怕見斷井索問鷰子深談實相善説法要此理如何師曰不及雁銜蘆問如何是佛師曰華陽洞口石烏龜問魯祖面壁意㫖如何師曰金木水火土羅㬋計都星問有句無句如藤倚樹時如何師曰作賊人心虚曰國師三喚侍者又作麽生師曰打鼓弄猢猻鼓破猢猻走丙寅七月十八日召法屬長老宗範付後事次日沐浴聲鐘集衆就座泊然而逝茶毘日送者均獲舍利奉靈骨塔於皷山羅浮山顯如禪師益州人初到大陽陽問汝是甚處人曰益州陽曰此去㡬里曰五千里陽曰你與麽來還曽踏著麽曰不曽踏著陽曰汝解騰空耶曰不解騰空陽曰爭得到這裏曰步步不迷方通身無辨處陽曰汝得超方三昧邪曰聖心不可得三昧豈彰名陽曰如是如是汝應信此即本體全彰理事不二善自護持住後僧問如何是羅浮境師曰突兀侵天際巍峩鎭海涯曰如何是境中人師曰頂上白雲散足下黒煙生可宣禪師漢州人也壯為僧即出峽依瑯琊一語忽投羣疑頓息瑯琊可之未㡬令分座淨空居士郭功甫過門問道與厚及師領歸宗時功甫任南昌尉俄郡守恚師不為禮窘甚遂作書寄功甫曰某世縁尚有六年奈州主抑逼當棄餘喘託生公家願無見阻功甫閲書驚喜且頷之中夜其妻夢間見師入其寢失聲曰此不是和尚來處功甫撼而問之妻詳以告呼燈取書示之相笑不已遂孕及生乃名宣老期年記問如昔至三嵗白雲端禪師扺其家始見即曰吾姪來也雲曰與和尚相别㡬年宣倒指曰四年矣雲曰甚處相别曰白蓮莊上雲曰以何為驗曰爹爹媽媽明日請和尚齋忽聞推車聲雲問門外是甚麽聲宣以手作推車勢雲曰過後如何曰平地兩條溝果六周無疾而逝玉泉謂芳禪師蜀人僧問從上諸聖以何法示人師拈起拄杖僧曰學人不㑹師曰兩手分付僧擬議師便打慧日堯禪師僧問古者道我有一句待無舌人解語却向汝道未審意㫖如何師曰無影樹下好商量僧禮拜師曰瓦觧冰消漢州三聖繼昌禪師彭州黎氏子上堂木佛不度火甘露臺前逢達磨惆悵洛陽人未來面壁九年空冷坐金佛不度爐坐嘆勞生走道途不向華山圖上看豈知潘閬倒騎驢泥佛不度水一道靈光照天地堪羨𤣥沙老古錐不要南山要鼈鼻上堂舉趙州訪二菴主師曰五陵公子爭誇富百衲高僧不厭貧近來世俗多顚倒祇重衣衫不重人惟照禪師簡州李氏子幼超邁而惡俗一日授書至性相近也習相逺也遽曰凡聖本一體以習故差别我知之矣即趨成都師鹿苑清泰年十九剃染登具泰令聽起信於大慈師輒歸卧泰詰之師曰既稱正信大乗豈言説所能了乃虚心遊方謁芙蓉於大洪嘗夜坐閣道適風雪震薄聞警盜者傳呼過之隨有所得辭去大觀中芙蓉嬰難師自三吳欲趨沂水僕夫迷道師舉杖擊之忽大悟嘆曰是地非鼇山也邪比至沂芙蓉望而喜曰紹隆吾宗必子矣因留躬耕湖上累年智證成就出領招提遷甘露三祖宣和壬寅詔補圓通棄去復居泐潭上堂古佛道我初成正覺親見大地衆生悉皆成正覺後來又道深固幽逺無人能到因没見識漢好龍頭蛇尾便下座上堂過去諸佛已入湼槃了也汝等諸人不應追念未來諸佛未出於世汝等諸人不要妄想正當今日你是何人㕘上堂伯夷隘栁下惠不恭君子不由也二邊不立中道不安時作麽生拈拄杖曰鴛鴦繡出從君看不把金針度與人上堂太陽門下妙唱彌高明月堂前知音盖寡不免舟横江渚棹舉清波唱慶堯年和清平樂如斯告報普請承當擬議之間白雲萬里上堂本不自生今亦無滅是死不得㡳樣子當處出生隨處滅盡是含生受底規模大丈夫漢直須處生死流卧荆棘林俯仰屈伸隨機施設能如是也無量方便莊嚴三昧大解脱門蕩然頓開其或未然無量煩惱一切塵勞嶽立面前塞却古路問承師有言雲黯黯處獨秀峰挺出月朦䑃裏泐潭水光生豈不是寶峰境師曰若是寶峰境憑君子細看曰如何是境中人師曰看取令行時曰祇如承言須㑹宗勿自立規矩如何是和尚宗師曰須知雲外千峰上别有靈松帶露寒雪下僧問祖師西來即不問時節因縁事若何師曰一片兩片三四片落在眼中猶不薦建炎二年正月七日示寂闍維得舎利如珠琲舌齒不壞塔于寺之西峯法順禪師綿州文氏子依止佛眼聞普説舉傅大士心王銘云水中鹽味色裏膠青決定是有不見其形師於言下有省後觀寶藏迅轉頓明大法趨丈室作禮呈偈曰頂有異峰雲冉冉源無别派水泠泠游山未到山窮處終被青山礙眼睛眼笑而可之住後上堂好事堆堆疊疊來不須造作與安排落林黄葉水推去横谷白雲風卷回寒雁一聲情念斷霜鐘纔動我山摧白楊更有過人處盡夜寒爐撥死灰上堂我手何似佛手天上南星北斗我脚何似驢脚往事都來忘却人人盡有生縁個個足方頂圓大愚灘頭立處孤月影射深灣㑹不得見還難一曲漁歌過逺灘示衆染縁易就道業難成不了目前萬縁差别秖見境風浩浩凋殘功徳之林心火炎炎燒盡菩提之樹道念若同情念成佛多時為衆一似為已彼此事辦不見他非我是自然上敬下恭佛法時時現前煩惱塵塵解脱上堂雞鳴曉月狗吠孤村只可黙㑹難入思量看不見處動地放光説不到處天地𤣥黄撫城尺六狀紙原來出在清江大衆分明話出人難見昨夜三更月到忩上堂風吹茅茨屋脊漏雨打闍梨眼睛濕恁麽分明却不知却來這裏低頭立因病示衆久病未嘗推木枕人來多是問如何山僧據問隨縁對忩外黄鸝口更多只如七尺之軀甚處受病衆中具眼者試為山僧指出病源衆下語皆不契師自拊掌一下作嘔吐聲又云好個木枕子師律身清苦出入唯杖笠獨行後示寂闍維収舍利目睛齒舌數珠同靈骨塔于寺西法泰禪師蜀人姓李氏自幼業儒為文章有聲忽厭俗出家得度受具徧游樷林親近諸耆宿於五家宗派皆妙得其家風獨於圓悟得髓圓悟在道林蔣山皆命為首座出世説法於徳山示衆曰祖師道欲得現前莫存順逆釋迦老子是什麽破草鞋一大藏教是拭不淨㡳故紙達磨九年面壁瞌睡未惺汝等諸人皮下無血眼裏無筋更向這裏覔什麽椀各請歸堂去又曰法不爾而爾暗去明來道不然而然雷奔雨驟直得千江競注萬壑爭流山頭白浪滔天平地人魚共處莫問道芽増長如今頭上漫漫雖然水到渠成爭奈過猶不及幸而雲收雨散浪息波停杲日當空萬象同慶且道大功不宰一句作麽生道野老不知堯舜力鼕鼕打鼓祭江神又曰寶劍拈來便用豈有遲疑眉毛剔起便行更無回互一切處騰今焕古一切處截斷羅籠不犯鋒鋩亦非顧鑑獨超物外則且置萬機喪盡時如何八月秋何處熱又曰聞聲悟道未免著水耳中見色明心亦是撒沙眼裏直得纎毫無障礙空有等空平不絶已躬上無攀仰孤逈逈絶情塵峭巍巍離分别猶是那邊事且道這邊事又作麽生休戀寒潭無影樹且看六月雪花飛又曰動則影現覺則冰生不動不覺土木無殊衲僧到這裏須有轉身一路始得若也轉得分三成六唱九作十納須彌於芥子擲大千於方外若轉不得守他山鬼窟不免是精靈又曰達得人空法空未稱祖佛家風體得全用全照亦非衲僧要妙直須打破牢闗識取向上一竅如何是向上一竅春寒料峭凍殺年少又上堂曰湼槃無異路方便有多門拈起拄杖云看看山僧拄杖子一口吸盡西江水東海鯉魚􅛹跳上三十三天帝釋忿怒把須彌山一摑粉碎堅牢地神合掌讃嘆云諦觀法王法法王法如是以拄杖擊繩床下座又曰徳山入門便棒平地生堆臨濟入門便喝無風起浪俱胝只䜿一指未免頇雪峰輥出三毬小兒戲劇到這裏總用不著爭如六月三伏甘雨普滋水足東臯禾青南畆農夫鼓腹樵者高歌古佛家風儼然如在於斯㑹得共樂昇平脱或未然只知事逐眼前過不覺老從頭上來成都正法建禪師上堂兔馬有角牛羊無角絶毫絶氂如山如岳針鋒上獅子翻身藕竅中大鵬展翼等閒突過北俱盧日月星辰一時黒性空妙普菴主漢州人久依死心獲證乃抵秀水追船子遺風結茅青龍之野吹鐡笛以自娛多賦詠得之者必珍藏其山居曰心法雙亡猶隔妄色塵不二尚遺塵百鳥不來春又過不知誰是住菴人又警衆曰學道猶如守禁城晝防六賊夜惺惺中軍主將能行令不動干戈治太平又曰不耕而食不蠶衣物外清門適聖時未透祖師闗棙子也須存一著便宜又曰十二時中莫住工窮來窮去到無窮直須洞徹無窮底踏倒須彌第一峰建炎初徐明叛道經烏鎭肆殺戮民多逃亡師獨荷䇿而往賊見其偉異疑必詭伏者問其來師曰吾禪者欲抵宻印寺賊怒欲斬之師曰大丈夫要頭便斫取奚以怒為吾死必矣願得一飯以為送終賊奉肉食師如常齋出坐畢乃曰孰當為我文之以祭賊笑而不答師索筆大書曰嗚呼惟靈勞我以生則大塊之過役我以夀則陰陽之失乏我以貧則五行不正困我以命則時日不吉吁哉至哉賴有出塵之道悟我之性與其妙心則其妙心孰與為隣上同諸佛之眞化下合凡夫之無明纎塵不動本自圓成妙矣哉妙矣哉日月未足以為明乾坤未足以為大磊磊落落無罣無礙六十餘年和光混俗四十二臘逍遙自在逢人則喜見佛不拜笑矣哉笑矣哉可惜少年郎風流太光彩坦然歸去付春風體似虚空終不壞尚享遂舉筯飫飡賊徒大笑食罷復曰刦數既遭離亂我是快活烈漢如今正好乗時便請一刀兩段乃大呼斬斬賊方駭異稽首謝過令衛而出烏鎭之廬舎免焚實師之惠也道俗聞之愈敬有僧睹師見佛不拜故逆問曰既見佛為甚麽不拜師掌之曰㑹麽云不㑹師又掌曰家無二主紹興庚申冬造大盆穴而塞之修書寄雪竇持禪師曰吾將水葬矣壬戍嵗持至見其尚存作偈嘲之曰咄哉老性空剛要餧魚鼈去不索性去祇管向人説師閲偈笑曰待兄來證明耳令徧告四衆衆集師為説法要仍説偈曰坐脱立亡不若水葬一省柴燒二省開壙撒手便行不妨快暢誰是知音船子和尚高風難繼百千年一曲漁歌少人唱遂盤坐盆中順潮而下衆皆隨至海濱望欲斷目師取塞戽水而回衆擁觀水無所入復乗流而往唱曰船子當年返故鄉没蹤跡處妙難量眞風徧寄知音者䥫笛横吹作散場其笛聲鳴咽頃於蒼茫間見以笛擲空而没衆號慕圖像事之後三日於沙上趺坐如生道俗爭往迎歸留五日闍維舎利大如菽者莫計二鶴徘徊空中火盡始去衆奉舎利靈骨建塔于青龍文演禪師成都府楊氏子僧問如何是定林正主師曰坐斷天下人舌頭曰未審如何親近師曰覷著則瞎上堂當陽坐斷凡聖跡絶隨手放開天回地轉直得日月交互虎嘯龍吟頭頭物物耳聞目眎安立諦上是甚麽還委悉麽阿斯吒出昭覺道祖首座初見圓悟於即心是佛語下發明久之悟命分座一日為衆入室餘二十許人師忽問曰生死到來如何迴避僧無對師擲下拂子奄然而逝衆皆愕眙亟以聞悟悟至召曰祖首座師張目眎之悟曰抖擻精神透闗去師㸃頭竟爾趨寂成都范縣君􅄔居嵗久常坐而不卧聞圓悟住昭覺往禮拜請示入道因縁悟令看不是心不是佛不是物是個甚麽久無所契范泣告悟曰和尚有何方便令某易㑹悟曰却有個方便遂令祇看是箇甚麽後有省曰元來恁麽地近郍簡州南岩勝禪師上堂召大衆曰䕶生須是殺殺盡始安居㑹得個中意分明在半途且道到家一句又作麽生釋迦彌勒没量大看來猶祇是他奴僧問放行五位即不問把定三闗事如何師曰横安鏌鎁全正令曰把定三闗䝉指示放行五位事如何師曰太平寰宇斬癡頑曰恁麽則南岩門下土曠人稀師曰靈利衲僧祗消一㸃曰自古自今同生同死時如何師曰家賊難防曰今日學人小出大遇去也師便打曰須是老僧打你始得僧禮拜師曰切忌詐明頭漢州無為守縁禪師本郡人姓史氏生十二病目去依棲禪慧目能禪師圓具出峽至寶峰值峰上堂舉永嘉曰一月普現一切水一切水月一月攝師聞釋然領悟住後上堂曰以一統萬一月普現一切水㑹萬歸一一切水月一月攝展則彌綸法界收來毫髮不存雖然收展殊途此事本無異致但能於根本上著得一隻眼去方見三世諸佛歴代祖師盡從此中示現三藏十二部一切修多羅盡從此中流出天地日月萬象森羅盡從此中建立三界九地七趣四生盡從此中出没百千法門無量妙義乃至世間工巧諸伎藝盡現行此事所以世尊拈華迦葉便乃微笑達磨面壁二祖于是安心桃華盛開靈雲疑情盡淨擊竹作響香嚴頓忘所知以至盤山于肉案頭悟道彌勒向魚市裏接人誠謂造次顚沛必于是經行坐卧在其中既有如是竒特更有如是光輝既有如是廣大又有如是周徧你輩諸人因甚麽却有迷有悟要知麽幸無徧照處剛有不明時益州北院通禪師在夾山見示衆云坐斷主人翁不落第二見師乃出衆云須知有一人不合伴夾云猶是第二見師乃掀倒禪床夾云老兄作麽生師云待某甲舌頭爛即向和尚道靈隱道印禪師漢州人上堂大雄山下虎南山鼈鼻虵等閒撞著抱賞歸家若也不惜好手便與拔出重牙有麽有麽上堂五五二十五擊碎虚空鼓大地不容針十方無寸土春生夏長復何云甜者甜兮苦者苦中秋上堂舉馬大師與西堂百丈南泉翫月公案師云馬大師垂絲千尺意在深潭西堂振鬛百丈擺尾雖則衝波激浪未免上他鈎線南泉自謂躍過禹門誰知依前落在巨網即今莫有絶羅籠出窠臼底麽也好出來露箇消息貴知華藏門下不致寂寥其或未然此夜一輪滿清光何處無南康軍雲居徳昇禪師漢州何氏子二十得度習講久之辭謁文殊道禪師問佛法省要殊示偈曰契丹打破波斯寨奪得寶珠村裏賣十字街頭窮乞兒腰間挂個風流袋師擬對殊曰莫錯師退㕘三年方得㫖趣往見佛性機不投入閩至鼓山禮覲便問國師不跨石門句意㫖如何竹菴應聲喝曰閒言語師即領悟住後僧問應眞不借三界高超即不問如何是無位眞人師曰聞時富貴見後貧窮曰擡頭須掩耳側掌便飜身師曰無位眞人在甚麽處曰老大宗師話頭也不識師曰放你三十棒雲居自圓禪師綿州雍氏子年十九試經得度留教宛五祀出闗南下歴扣諸大尊宿始詣龍門一日于廊廡間覩繪胡人有省夜白高庵庵舉法眼偈曰頭戴貂鼠帽腰懸羊角錐語不令人㑹須得人譯之復筴火示之曰我為汝譯了也於是大法明了呈偈曰外國言音不可窮起雲亭下一時通口門廣大無邊際吞盡楊岐栗棘蓬庵遣師依佛眼佛眼謂口吾道東矣上堂舉僧問雲門如何是透法身句門曰北斗裏藏身師曰南北東西萬萬千乾坤上下兩無邊相逄相見呵呵笑屈指擡頭月半天智興禪師西川人出家受具後即造玉泉芳禪師法席發明心地初住漸源次遷黄梅龍華晩住延福師語不談𤣥行不修潔身不稟儀衆不喜見逝後靈異不測報應如響遺體塑飾祈禱尤盛真歇清了禪師左綿雍氏子襁褓入寺見佛喜動眉睫咸異之年十八試法華得度往成都大慈習經論領大意出蜀至沔漢扣丹霞之室問如何是空刦已前自已師擬對霞曰你閙在且去一日登鉢盂峰豁然契悟徑歸侍立霞掌曰將謂你知有師欣然拜之翌日霞上堂曰日照孤峰翠月臨溪水寒祖師𤣥妙訣莫向寸心安便下座師直前曰今日陞座更瞞某不得也霞曰你試舉我今日陞座看師良久霞曰將謂你瞥地師便出後㳺五臺之京師浮汴直扺長蘆謁祖照一語契投命為侍者踰年分座未㡬稱疾退閒命師繼席學者如歸建炎末游四明主補陁台之天封閩之雪峰詔住育王徙温州龍翔杭州徑山慈寧皇太后命開山臯寧崇先上堂我于先師一掌下伎倆俱盡覔個開口處不可得如今還有恁麽快活不徹底漢麽若無銜鉄負鞍各自著便上堂久黙斯要不務速説釋迦老子待要欵曲賣弄爭奈未出母胎已被人覷破且道覷破個甚麽瞞雪峰不得上孤峰頂過獨木橋驀直恁麽行猶是時人脚高脚低處若見得徹不出户身徧十方未入門常在屋裏其或未然趂涼搬取一轉柴上堂道得第一句不被拄杖子瞞識得柱杖子猶是途路中事作麽生是到地頭一句上堂處處覓不得止有一處不覓自得且道是那一處良久曰賊身已露上堂口邊白醭去始得入門通身紅爛去方知有門裏事更須走有不出門㡳乃曰喚甚麽作門僧問三世諸佛向火熖裏轉大法輪還端的也無師大笑曰我却疑著曰和尚為甚麽却疑著師曰野花香滿路幽鳥不知春問不落風彩還許轉身也無師曰石人行處不同功曰向上事作麽生師曰玅在一漚前豈容千聖眼僧禮拜師曰祗恐不恁麽師一日入厨看煑麫次忽桶底脱衆皆失聲曰可惜許師曰桶底脱自合歡喜因甚麽却煩惱僧曰和尚即得師曰灼然可惜許一桶麫上堂苔封古徑不堕虚凝霧鎖寒林肯彰風要鈎針穩宻孰云漁父栖巢祇麽承當自是平常快活還有具透闗眼底麽良久曰直饒聞早便歸去爭似從來不出門上堂乍雨乍晴乍寒乍熱山僧底個山僧自知諸人底個諸人自説且道雪峰口除喫飯外要作甚麽問僧琉璃殿上玉女攛梭明甚麽邊事曰回互不當機師曰還有斷續也無曰古今不曽間師曰正當不曽間時如何僧珍重便出上堂撼拄杖曰看看三千大千世界一時搖動雲門大師即得雪峰則不然卓拄杖曰三千大千世界向甚麽處去還㑹麽不得重梅雨秧苗爭見青上堂幻化空身即法身遂作舞云見麽見麽恁麽見得過橋村酒羙又作舞云見麽見麽恁麽不見隔岸野花香上堂還有不被𤣥妙汚染㡳麽良久曰這一㸃傾四海水已是洗脱不下僧問如何是空刦已前自已師曰白馬入蘆花上堂窮微喪本體妙失宗一句截流淵𤣥及盡是以金針宻處不露光鋩玉線通時潜舒異彩雖然如是猶是交互雙明且道巧拙不到作麽生相委良久曰雲蘿秀處青陰合巖樹高低翠鎖深上堂轉功就位是向去底人玉韞荆山貴轉位就功是却來底人紅爐片雪春功位俱轉通身不滯撒手亡依石女夜登機宻室無人掃正恁麽時絶氣息一句作麽生相委良久曰歸根風墮葉照盡月潭空師終于臯寧崇先塔于寺西華桐塢謚悟空禪師宋郭印超悟院記云成都大慈寺曰聖慈唐至徳初所建也合九十六院地居衝㑹百工列肆市聲如雷政和二年冬火其旁小院十有六府帥席公旦請于朝頒緡改建超悟宣􅆊嚴淨三刹使學禪者居超悟學律者居宣􅆊學講者居嚴淨而超悟則命僧文英主之英承灰燼之餘鳩工庀徒創建禪宇凡為屋千楹且闡龍宫以藏貝葉規模恢敞氣象雄特始成而旁院復火勢且延及師亟白府毁正寺之三門以絶之請後自建火乃止而三門復新師用力勤矣院始無田師合施者金錢且請廢寺之産於官成三百畆以備桑門之供師死嗣子義登義全各益以家田及誘福唐朱氏得百畝故能耽耽為大叢林無復異時囂塵煩汙之聲可喜也雖然院之廢興於佛何有昔持地菩薩平治險隘修作橋梁毘舎如來謂曰常平心地則世界地一切皆平師前知方寸之間具大寶刹巍巍堂堂鎭四天下火不能燒水不能没雖八萬四千浮屠寶塔之功有所不及亘閻浮提皆超悟矣師姓蘓氏泉州人往來商成都富鉅萬留意禪恱忽若有悟盡捐資移書别妻子祝髪於嘉祐院妻子萬里入蜀訪之師絶不復見堅坐一室歴三日寂無人聲妻子知師志不可奪棄去以故聲望愈高四坐道場住超悟二十餘年而没義登懼其師之功不彰求予記其事元智中國師彭縣人也生有異相年十二即禮月光禪師清修苦行晝夜不息後惠心授松潘都綱師隨行尋代其職時畨夷叛服不常師居邊撫化畨夷莫不投服天興間累加封國師仍賜勅誥降銀印師在邊四十餘年化行功著國朝成化二年已踰七十詔歸彌陀庵優老焉蜀中廣記卷八十四
