body:
  text: 蜀中廣記卷三十七明曹學佺撰邉防記第七上川東遵義道開府夜郎與總戎同城而居近以建南有事大將軍移鎮以游擊一員代其他材官將領各有差嵗抽通省民兵五千名歛其食餉而已説者謂蕩平既乆當以播供播勿煩内地為也然盈庭不决則任事之難耳漢書南夷君長以十數夜郎最大在蜀郡徼外其國臨將牁江江廣數里出畨禺城下按戰國時楚頃襄王將莊蹻從沅水伐夜郎君至且蘭㭬船于岸而步戰既滅夜郎國因留王滇池以且蘭有㭬船牂牁處乃改其名為牂牱牂牱繫船筏也武帝時使唐䝉通夜郎國於是以夜郎旁小邑立犍為郡戍轉相饟數嵗士罷餓離暑濕死者甚衆西南夷又數反發兵興擊耗費無功帝患之使公孫𢎞往視問焉還言其不便乃且罷獨置南夷兩縣一都尉元狩元年張騫言使大夏時見蜀布卭竹杖問所從來曰從東南身毒國可數千里得蜀賈人市或聞卭西可二千里有身毒國于是乃令王然于柏始昌等間出西南夷往身毒國至滇道皆為昆明所閉莫能通身毒及南越反上使發南夷兵且蘭君小邑乃與其衆反漢發巴蜀校尉擊破之遂平南夷為䍧牱郡夜郎侯始倚南越南越滅恐懼遂入朝封為夜郎王昭帝始元元年䍧牱談子同並等二十四邑凡三萬餘人皆反遣水衡都尉發蜀郡犍為兵擊䍧牱大破之後始繒葉榆人復反鉤町侯亡波率其人擊之有功漢立亡波為鉤町王至成帝和平中夜郎王興鉤町王禹漏卧侯俞更舉兵相攻䍧牱太守請發兵誅興等漢以道逺不可擊遣太中大夫張匡持節和解並不從杜欽説王鳯曰匡使和解蠻夷王侯不從不憚國威其效可見恐議者選愞復守和解太守察動靜有變迺以聞如此則復曠一時王侯得收獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂犯守尉逺藏濕暑毒草之地雖有孫呉將賁育士若入水火往必焦没智勇亡所設施屯田守之費不可勝量宜因其罪惡未成不疑國家加誅陰勅旁郡守尉練士馬大司農先調糓積要害處選任職太守以秋涼時入誅其王侯尤不軌者即以為不毛之地亡用之人信不勞中國宜罷郡放棄其人絶其王侯勿復通如以先帝所立累世之功不可隳壊亦因宜其萌芽早斷絶之及已成形然後興師則萬姓被害矣鳯于是薦陳立為䍧牱太守至䍧牱乃從吏數十人出行縣召興興將數千人往立數責因㫁興頭出曉其衆皆釋兵降興子邪務收餘兵迫脇旁二十二邑反立又擊平之華陽國志元鼎二年開䍧牱郡屬縣十七戸六萬及晉屬縣四户五千而已公孫述時三蜀大姓龍傳尹董氏與䍧牱功曹謝暹保郡聞世祖在河北使使由畨禺江出朝貢世祖嘉之號為義郎按遵義之名始此方輿云遵義軍俗以射獵伐山為業信巫鬼重謡祝好詛盟外癡内黠安土重舊凡交易刻木為書契結繩以為數其桀黠能言議屈服種人者謂之耆老其婚婣以銅器氊刀弩矢為禮其燕樂以銅鑼鼓横笛歌舞為樂其所居無城池之固架木為閣聨竹為壁開忩出箭以備不虞出入佩刀弩自衛至與華人交易畧無侵犯有禮義之風凡賓客聚㑹酋長以漢為貴其民端龎淳固以耕殖為業天資忠順悉慕華風矣寰宇記云西南諸夷漢䍧牱郡地唐置費珍莊琰播郎䍧夷等州按播州之名始此其地北距充州百五十里東距辰州二千四百里南距交州千五百里西距昆明九百里無城郭散居村落土熱多霖雨稻粟皆再熟無徭役隋大業末首領謝龍羽據其地勝兵數萬人四夷述云䍧牱蠻姓謝氏舊臣中國世為本土牧守隋末大亂遂絶唐武徳二年其酋領謝龍羽遣使朝賀授䍧州刺史封夜郎公勝兵戰士數萬于是列其地為䍧州屬黔中羈縻後為正郡寰宇記云䍧州轄三縣曰建安即州理曰賓化曰新興其地與播州同唐書武徳二年立充州因是置播䍧等郡梁氏十道志云開元初猶有此郡後之郡國記錄乃無此名寰宇又云充州䍧牱都尉居之縣有梓潼底水思王思渝厯代史云充州在䍧州北百十里開元二十五年其酋趙君道來朝王建僣偽不通中國首領五姓龍方張石羅而龍氏最大後唐天成二年䍧牱清州刺史宋朝化等來朝其後孟知祥據西川復不通乾徳三年平孟昶五年知西南夷南寧州蕃落使龍彦瑫等遂來貢詔授瑫歸徳將軍南寧州刺史蕃落使開寶四年瑫卒子漢瑭嗣詔襲父職太平興國五年夷王龍瓊琚遣子并諸州蠻七百四十四人以方物名馬來貢雍熈二年夷王龍漢濬自稱權南寧州事兼蕃落使遣䍧牱諸州酋長來獻方物名馬并上蜀孟氏所給符印授漢璿歸徳將軍南寧州刺史其後夷王龍漢興龍漢􅚜相繼遣使貢方物授􅚜寧逺大將軍封歸化王景徳四年西南蠻羅甕井都指揮使顔士龍等來貢士龍種落遐阻未嘗來朝今始至詔館餼賜予如高溪播州志云唐末南詔陷播州太原人楊端應募復之遂有其地四傳至楊眙無子維時宋益州刺史楊延昭之子充使廣西與眙通譜以其子貴遷後之從狄青南征楊文廣即延昭之孫也在播州者傳至粲而益大鑑乃其裔云四夷述云東謝蠻渠帥姓謝氏南蠻别種在黔州之西數百里地方千里有酋長即謝元深也其一族不能女自云高姓不可下嫁唐貞觀三年元深入朝冠烏熊皮冠若今之旄頭以金絡額披毛帔韋皮行縢而著履時中書侍郎顔師古奏言昔周武王天下太平逺國歸欵太史乃集其事為王㑹篇今萬國來朝至如此輩章服實可圖寫今請撰王㑹圖詔從之開其地為應州𨽻黔州都督府南謝首領謝疆與西謝蠻憐接與元深俱來朝拜為南夀州刺史後改為莊州是也其地宜五榖無文字刻木為契散則山谷倚樹為巢居無賦税之事皆自為生業刀劎不離其身男女椎髻以緋束之後垂向下冠熊皮披猛獸革南接守宫獠西連夷子北至白蠻按南夀州即分䍧牱所者或云楚威王時有莊蹻將甲士二萬人入䍧牱故取莊為州名開元十道記有此郡額後之志錄并廢元領縣八皆貞觀以來相次建置永徽以後併省其名曰石牛南陽輕水多樂樂安石城新安賓化四夷述又云西趙蠻在東謝之南并南蠻别種其界山洞深阻莫知里數南北十八日行東西二十三日行趙氏代為酋長有萬餘戸自古不臣中國唐貞觀三年遣使入朝至二十一年于此置明州其地東至夷子西至昆明南至西洱河土俗與東謝同唐史貞元十三年西南蕃大首領正議大夫檢校蠻州長史繼襲蠻州刺史資陽郡開國公宋鼎左右大首領朝散大夫前檢校卭州刺史謝汕右大首領繼襲攝蠻州巴江縣令宋萬傳界首子弟大首領朝散大夫䍧牱錄事叅軍謝文經黔中經界招討觀察使王礎奏前件刺史建中三年一度來朝賀貢方物自後不令隨例入朝今年懇訴稱與䍧牱同被聲教獨此排擯自慚恥謹隨䍧牱等朝賀伏乞特賜優諭兼同䍧牱刺史等授官其䍧牱蠻兩州户口殷盛人力强大鄰側諸畨悉皆敬憚請比二州每三年一度朝賀仍依䍧牱例輪還差定以才幹位望為衆所推者充之勅㫖宋鼎已改官訖餘並依奏寰宇記曰唐時黔州都督府管播州下五十三州曰南寧州本清溪鎮唐末置在黔州西南二十九日行從南寧州至羅殿王部落八日行與雲南接界曰充州曰琰州曰犍州曰莊州曰明州曰䍧州曰矩州曰清州凡九州毎年朝貢曰牱州襲州峩州蠻州邦州鶴州勞州羲州福州鼔州儒州鸞州令州郝州普寧州總州郍州勲州功州敦州侯州晃州茂龍州整州懸州樂善州契州添州延州雙城州訓州卿州撫水州思源州逸州殷州南平州盧州姜州稜州鴻州和武州暉州亮州凡四十四州洞内羈縻而已土夷考云東至偏橋衛南至養龍坑楚黔二省界西至瀘州合江縣北至重慶府綦江縣俱川省界此今之播州也明興楊鑑率衆歸附以其地為播州宣慰司授鑑宣慰使領播州餘慶白泥容山真州重安六長官司草塘黄平甕水三安撫司自鑑至相十世矣嘉靖十七年楊相父子爭職議勘相不敢入播客死水西萬厯元年楊應龍襲職即相之子也世有逆徳應龍淫殺無忌初黄平草塘白泥餘慶重安五司凡承襲表箋須宣慰司印文乃達往往索賄無厭此釁端所由起又其地有七姓之民應龍寄以腹心七姓又藉龍為奇貨縻費金錢累巨萬乆之龍覺其欺乃稍稍收其權遂交讐怨七姓叩閽鳴寃且反噬龍矣應龍娶妻張氏失寵其族弟瑞龍聘田氏應龍强委禽焉萬厯十五年田氏生子方彌月與應龍在室共語族弟繼龍偶入戸遁去應龍見而立斬之田氏曰妾非張何例視我應龍怒曰我不殺此奴今效尤耶乃立殺張首併剮張之母等張闔族奏應龍殺妻併妻母兄弟等命下川貴勘處應龍初亦抗拒不出已聞議撫乃俛首出聴勘勘龍革任罰贖金四萬免死㑹朝鮮告急應龍計以征倭贖前愆朝廷可其奏遂得解網然疑畏日甚進退維谷二十三年應龍子以贖金未完死渝州獄中應龍率蠻兵駈僧千餘至發喪二十六年托獻大木所過無不殘滅朝議應龍雖經勘問皆務姑息非鎮攝蠻夷之策於是天子赫然震怒命將興師大集三省之兵猛將謀臣星聚雲合而又特遣總制侍郎邢玠徃臨之貴州支可大撫湖廣江鐸撫偏橋李化龍總督川貴湖廣之師㑹軍重慶府二十七年正月進兵六月初六日破海龍囤二十一日俘入重慶死于途事平剖播為二四川遵義府屬三縣一州貴州平越府屬四縣一州改流設官詳平播全書中土夷攷又云播州長官司治附郭長官王姓其地左抵永安驛右抵海龍囤間雜楊氏腹裏播事訌長官王積祿甘為應龍死黨亦其勢不得不爾今多屬遵義縣夷漢民各半餘慶長官司在司南百六十里元至正間毛岊從宣慰楊加禛征蠻有功授校尉本部長官後改為餘慶州俾毛氏世為土知州本朝仍為長官司其地接連播州七牌苖巢左抵湄潭右抵雍水上達烏江下至岑黄於播最近楊氏不靖毛匪寧宇焉蕩平後改餘慶縣屬貴州平越府白泥長官司在司東南三百里宋景定中楊萬從征入播蠻有功授白泥長官元改為白泥州本朝復改長官司其地上抵草塘下抵偏橋鎮逺帶其左黄平列其右土田濶饒士馬强健實甲諸司與楊氏不睦七姓之一也容山長官司在司東三百二十里長官張姓其地界湖貴間於八司中獨為外服溪山荒曠土田鹵瘠中國商販不到其人以獵射為生以刼殺為業自嘉靖間為臻洞苗所殘破數十年來民夷鷔土田荒蕪長官不能治也舊有湄潭驛蕩平後改湄潭縣屬貴州平越府真州長官司今改真安州詳見名勝重安長官司在司東南四百里宋元黄平府地國初頭目張佛保招撫苗蠻有功授正長官馮鐸從宣撫楊鑑征麻哈有功授副長官多生苗去播最逺原屬黄平故知有黄平不知有播圖經其地東至宣化司界北至楊義司界各二十里南至凱里司界十里西至清平縣界五里草塘安撫司在司東二百二十里介甕水黄平之間其地環江土饒裕頗有華風宋咸淳間有雲南貴者商賈入滇因邊警投楊宣慰邦憲為頭目元世祖時雲貴孫邦佐有戰功授都匀軍民府知府始有草塘地國初宋顯威從楊鑑歸附改授安撫其地東至黄平司椒溪暖水界西至髙平甕水二司界南至平越衛界北至播州楊梅浪于界黄平安撫司在司東南三百里舊為黄平府實楊鎮子孫世守之元世祖時黄平蠻叛楊宣慰漢英討平其將羅季明功多遂以土授羅氏改𨽻播州洪武初羅鏞從楊鑑歸附授黄平安撫其地廣饒險固有城垣足據扼雲貴之門戸為諸司之襟帶葢西南一要境舊設通判一員摠轄諸司又設千户所駐劄司城聴通判調用城中夷漢雜處昔楊酋不道首與為難者也其地東至湖廣偏橋衛五十里西至貴州平越衛南至清平衛各三十里北至白泥司界百五十里蕩平改黄平州甕水安撫司在司東一百二十里宋紹興間開設長官猶姓景定中進士猶道明播人葢其族也洪武初猶恭歸附授安撫宻邇于播亦與楊酋交惡其地東至播四牌界二十里西至黄灘闗十五里南至水西界二十里北至麻子水界二十里蕩平改甕安縣屬平越府蜀中廣記卷三十七
