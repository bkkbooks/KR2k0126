body:
  text: 蜀中廣記卷九十八明曺學佺撰著作記第八集部鮮于伯圭集一卷宋鮮于懐字伯圭閬中人累舉不第嘗作揠愁詞時人稱之李宗諤贈詩云漢殿無人薦揚子滿朝空誦揠愁詞後與宗諤同年第四人登科趙普判秦州辟為觀察推官卒民士編一十九卷陳充字若虛成都人雍熙中甲科仕至刑部郎中知貢舉卒詞學典贍性曠達喜談謔澹於榮利自號中庸子民士云者盖其未仕已仕前後所著文也唐牛僧孺著善惡無餘論言堯舜伯鯀俱不能慶殃其子充因作論以反之朱台符文集三十卷宋史台符字拱正眉山人十嵗能屬辭常作黄山樓記為當時所稱太宗廷試以尺晷成一賦登進士甲科好學喜延譽後進景徳初為陕西轉運與時不合再出知洪州卒年四十二五龍山居詩謝全長江人居五龍山下以詩自娯其詩平澹有浪仙之風司馬池知小溪縣與之定交太平興國五年進士田表聖咸平集五十卷三朝奏議五卷田錫字表聖其先京兆人唐末徙于蜀宋初與胡旦何士宗齊名興國三年進士第知制誥終右諫議大夫范仲淹司馬光讀其書皆稱其直諒蘇軾以之比賈誼云牟君華文集牟袞字君華安岳人受學於多岳先生端拱間登進士第以文章名累官翰林學士有詩文行于世東觀集十卷華陽羅處約思純著知呉縣時王元之禹偁亦知長洲日與唱和蘇杭間多傳誦之淳化中受詔荆湖路廵撫欲以苛察立名所奏劾甚衆卒年三十三無後禹偁與蘇易簡收其文漁舟集一卷成都處士郭震希聲撰自稱汾陽山人李畋序稱其所作有孟郊風致淳化四年忽作詩曰朝出東門逰東門好春色青青原上草莫放征馬食詣闕獻書言蜀利病未幾順賊已作矣王嵒集一卷陳氏曰嵒集中有春日感懐上滕白郎中盖亦宋初人又有聖駕親征河東及甲午避寇全家欲下荆南之語則是李順亂蜀之嵗嵒盖蜀人也耶李建中集三十卷建中字得中其先京兆人祖稠仕於蜀遂為蜀人興國中進士甲科累官主客員外郎性簡靜風神雅秀恬於榮利前後三求掌西京留司御史臺愛洛中風土就構園池號曰靜居好吟詠毎逰山水多留題自稱巖夫民伯善脩養預校定道蔵卒建中善書扎行筆尤工多構新體草隷篆籀八分亦妙人多摹習嘗手寫郭忠恕汗簡集以獻皆科斗文字詔嘉奨之玉堂集二十卷蘇易簡著易簡字太簡銅山人弱冠舉進士太平興國五年狀元官翰林承㫖太宗書玉堂之署賜之故以名其集終叅知政事文房四寳五卷文選類要三卷易簡撰集古今筆硯紙墨四門繼以賦頌述作有徐鉉序又摘文選䨇字以類編集為類要三卷翰林續志二卷禁林宴㑹集三卷淳化編勅三十卷晁氏曰蘇易簡在北門最承太宗睠遇録元和以後至國朝翰林故事以續季肇之書太宗賜詩嘉之翰林雜志一卷其書不題撰人輯唐韋執誼故事元稹承㫖壁記韋采㣲新樓記杜元頴監院使記鄭璘視草亭記并李宗諤題名記為一篇或云易簡子耆采其父翰林續志所遺附益之滄浪集十五卷蘇舜欽撰舜欽字子美易簡之孫杜祁公衍之壻也景祐中進士累遷集賢校理監進奏院坐用故紙錢㑹客除名慷慨有大志好古工文章及廢居蘇州買水石作滄浪亭益讀書發其憤懣於歌詩其體豪放往往驚人又善草書醉酣落筆爭為人所傳翫舜欽報韓維書曰䝉開責以兄弟在京師不以義相就獨羇外數千里自取愁苦予豈無親戚之情豈不知㑹合之樂也安肯舍安逸而甘愁苦哉昨在京師不敢犯人顔色不敢論議時事隨衆上下心志蟠屈不開固亦極矣不幸適在嫌疑之地不能决然早自引去致不測之禍捽去下吏人無敢言友讎一波共起謗議被廢之後喧然未已更欲寘之死地然後為快來者往往鈎􅄨言語欲以傳播好意相恤者幾希矣故閉户不敢與相見如避兵寇偷俗如此安可久居其間遂超然逺舉羇泊於江湖之上不惟衣食之累實亦少避機穽也况血屬之多資入之薄持國見之矣常相團聚可乏衣食乎不可也可閉關常不與人接乎不可也與人接必與之言與之言必與之還往使人人皆如持國則可不迨持國者必加釀惡言喧布上下使僕不能自明則前日之事未為重也都無此事亦終日勞苦應接之不暇寒暑奔走塵土泥淖中不能了人事羸馬餓僕日栖栖取辱于都城使人指背譏笑哀憫亦何顔面安得不謂之愁苦哉比雖與兄弟親戚相逺而伏臘稍足居室稍寛無終日應接奔走之勞耳目清曠不設機關以待人心安閒而體舒放三商而眠髙舂而起靜院明窻之下羅列圖史琴樽以自愉悦有興則泛小舟出盤閶二門吟嘯覽古於江山之間渚茶野釀足以銷憂蓴鱸稻蟹足以適口又多髙僧隐君子佛廟勝絶家有園林珍花竒石曲池髙臺魚鳥留連不覺日暮昔孔子作春秋而夷呉又曰吾欲居九夷觀今之風俗樂善好事知予守道好學皆欣然願來過従不以罪人相遇雖孔子復生是亦必欲居此也以彼此較之孰為然哉人生内有自得外有所適固亦樂矣何必髙位厚禄役人以自奉養然後為樂今雖僑此亦如仕宦南北安可與親戚常相守耶予窘迫勢不得如持國意必使我尸轉溝洫肉餧虎而後以為安所義何其忍耶詩曰凡今之人莫如兄弟兄弟以恩急難必相拯救後章曰䘮亂既平既安且寜雖有兄弟不如友生謂友朋尚義安寜之時以禮義相琢磨予以持國外兄弟也急難不相救又於未安寜之際欲以義相琢磨雖古人所不能受予欲不報慮淺吾持國也按舜欽以父任補太廟齋郎調滎陽縣尉玉清昭應宫災舜欽年二十一詣登聞鼓院上疏范仲淹薦其才召試為集賢校理監進奏院所論議多侵權貴而其婦翁杜衍與富弼在政府多引用一時聞人欲更張庶事御史中丞王拱辰等不便其所為㑹進奏院祠神舜欽與右班殿直劉巽輙用鬻故紙公錢召妓樂閒宴㑹賔客拱辰亷得之諷其屬劾奏因欲揺動衍事下開封府劾治於是舜欽與巽俱坐自盜除名舜欽既廢寓呉中其友人韓維責以隔絶親交故報書云歐陽氏序曰斯文金玉也棄擲埋没糞土不能銷蝕其見遺於一時必有收而寳之于後世者雖其埋没而未出其精氣光怪已能常自發見而物亦不能揜也故方其擯斥摧挫流離窮厄之時文章已自行於天下雖其怨家讎人及嘗出力而擠之死者至其文章則不能少毁而揜蔽之也凡人之情忽近而貴逺子美屈於今世猶若此其伸於後世宜何如也公其可無恨予嘗考前世文章政理之盛衰獨恠唐太宗致治幾乎三王之盛而文章不能革五代之餘習後百有餘年韓李之徒出然後元和之文始復于古唐衰兵亂又百餘年而聖宋興天下一定晏然無事又幾百年而古文始盛于今自古治時少而亂時多幸時治矣文章或不能純粹或遲久而不相及何其難之若是歟豈非難得其人歟茍一有其人又幸而及出于治世世其可不為之貴重而愛惜之歟嗟吾子美以一酒食之過至廢為民而流落以死此其可以歎息流涕而為當世仁人君子之職位宜與國家樂育賢才者惜也子美之齒少予而予學古文反在其後天聖之間予舉進士于有司見時學者務以言語聲偶擿裂號為時文以相誇尚而子美獨與其兄才翁及穆叅軍伯長作為古歌詩雜文時人頗共非笑之而子美不顧也其後天子患時文之弊下詔書諷勉學者以近古由是其風漸息而學者稍趍古焉獨子美為於舉世不為之時其始終自守不牽世俗趍舍可謂特立之士也子美官至大理評事集賢校理而廢後為湖州長史以卒享年四十有一其狀貌竒偉望之昻然而即之温然久而愈可愛慕其才雖髙而人亦不甚嫉忌其撃而去之者意不在子美也才翁集一卷蘇舜元字才翁銅山人子美兄也有氣節能詩尤工草書所著有才翁集張少愚白雲集三十卷張俞字少愚㓜通悟於書無不該貫朝廷嘗以校書郎召表乞授其父隱於岷山之白雲溪凡六被徵召皆不起為文有西漢風嘗賦洛陽懐古蘇子美見而嘆曰優游感諷意不可盡吾不能也陳文恵公愚邱集三十卷陳堯佐字希元閬州人端拱初進士歴官太子太師致政年八十二卒號知餘子諡文恵堯佐屬辭尚古不牽世用喜為二韻詩詞調雋永又有湖陽野廬遣興等集皆自有序本傳文恵少好學及貴讀書不輟善古隷八分尤工詩金龜集十五卷文恵従子漸著漸與父堯封同廷試漸中第辭不就願擢其父許之自號金龜子澗上丈人詩二十卷陳恬叔易著堯叟裔孫也博學有髙志不従選舉躬耕陽翟與鮮于綽崔鶠齊名號陽城三士别號澗上丈人詩句豪健其苦離别詩記靖康亂離之事傳誦于時隠書三卷學古詩五十篇華陽梁鼎凝正著端拱進士獻聖徳徽號頌萬餘言遷殿中丞歴知數州磊落有氣節好學工篆籀任玠詩集玠成都人通五經緯候音律琴奕丹青皆得其妙真宗令試學士院玠撰詩一千二百首以進賜進士授汝州團練推官玠具野服捧告身詣登聞鼓院納還西歸書臺集三卷南隆處士朱有字大有自稱雲臺山人天禧中王晦叔守蜀以古風六十言遺之書臺者其所居坊名也郭長孺歌詩雜文十卷長孺不知何許人遷徙入蜀遂為成都人氣體夷粹遇人無貴賤磬折下之然其中挺㧞不倚終日劇談無雜嫚戱語生平惟好書丹鉛㸃勘不去手自經史百氏浮屠黄老隂陽地理醫卜吐納煆煉之術皆研精其妙有易解十卷書解七卷道徳經解三卷蔬食譜一卷又有孝行髙逸等圖各為之論述何通夫遺稿何羣字通夫西充人嗜古學喜激揚議論雖業進士非其好也入太學與人言未嘗下意曲従同舍目為白衣御史上書言後世以文辭取士害道者莫甚於賦請罷去不聴乃慟哭取其平生所為賦八百餘篇焚之絀太學而卒趙抃在蜀奏羣遺藁有益時政宜表章之不聴竹軒集陵州龍昌期起之著祥符中韓魏公使蜀奏授試國子四門助教慶歴中文潞公奏授校書即府學講説經義為太子洗馬致仕起之著書甚富以羽翼先儒汲引後學為己任時多譽之嘉祐中詔取其書昌期時年八十餘野服詣京師賜緋魚絹百疋歐陽公言其異端害道不當推奬奪所賜服罷歸卒按福州守陳絳嘗延昌期入閩為衆講易得錢十萬而歸絳由此坐罪遂自成都械昌期至後守永康胡則子正為之破械出俸錢代償館以賔禮昌期所著書時有詭誕穿鑿之説詆斥周公此所以得罪也虚舟子集李定著郫縣人好古力學志不願仕養二親以孝聞累舉孝亷不就以詩酒為樂自號虚舟子蜀中洊值兵火經籍不完天禧中詔訪天下書籍定率先投牒監中羣書多出其家于至詩文于至登大中祥符五年徐奭榜進士及第七嵗能屬文十七遊京師上書二十餘萬言是時文章襲五代餘風至自立機軸嘗作蓬萊宫賦冦萊公丁晋公皆重之有詩文行世小溪人陳公弼文集十卷青神陳希亮著公弼其字也幼孤好學其兄使治息錢希亮悉召逋家焚券使去天聖中舉進士以才幹剛直名卒官京東轉運使即季常之父彭秘書文集墨客揮犀十卷宋史彭乗字利建華陽人進士及第歴秘書丞集賢校理累遷翰林學士質重寡言聚書萬餘卷皆手自刋校蜀中所傳書多出於乗晩嵗厯典贊命而文詞少工云梅諫議詩集奏疏四十篇新繁梅贄公儀著贄進士起家慶歴中為御史嘗論張堯佐縁宫掖以進恐上累聖徳仁宗稱其言事有體性淳靜不為矯勵之行平居未嘗問生業喜為詩多警句廬江文集二十卷刀筆五卷奏議二十卷何郯著郯字聖從成都人仁廟朝為御史擢天章閣待制熙寜中以尚書右丞致仕天資好學殆廢寢食為詩章簡重淳淡有孟東野之風其仕臺諌知無不言頗有直聲鮮于子駿志其墓集有李邦直序華陽集一百卷岐公宫詞一卷王珪字禹玉其先成都人右補闕永之子也故號華陽後居開封少好學日誦數千言及長博通羣書慶歴二年廷試第二嘉祐初入翰林文章閎麗自成一家朝廷大典冊多出其手後拜相封岐國公卒年六十七諡文恭迂遺集十三卷安仁計用章著用章年十八登天禧進士第五人孫有功登慶歴進士著唐詩紀事行于世孫文懿集三十卷孫抃字夢得眉山人六世祖長孺喜蔵書以樓貯之蜀人號書樓孫家抃之従兄闢復於東山構屋三百楹號山學延成都何維翰為掌教以聚四方學者有公養之法范鎮石揚休蒲師孟皆執經其中闢卒門人私謚曰儒心先生抃天聖中進士累官叅知蘇明允嘉祐集十五卷蘇洵字明允眉山人至和中歐陽永叔得其書二十二篇大愛之以為賈誼劉向不過也以書獻除校書郎與姚子張同編太常因革禮百卷書方成而卒陳氏曰洵初入京師益帥張文定薦之歐陽公世皆知之而有雷簡夫者為雅州以書薦之張歐及韓魏公尤力張之知洵由簡夫世罕知之也簡夫書文亦慷慨偉麗可喜蘇文忠集四十卷後集二十卷内制十卷外制三卷軾字子瞻洵之長子也生十年其母授以書聞古今成敗輙能語其要比冠學通經史屬文日數千言嘉祐中歐陽公知貢舉欲以冠多士疑曽子固所為乃寘之第二後以書謝永叔見之語客曰老夫當避此人放出一頭地又以直言薦之荅䇿入上等英宗在藩邸聞其名欲以唐故事召入翰林宰相不可知湖州言者摘其謝表中語以為謗逮赴御史臺子瞻當王安石紛更之際見其事不便於民則賦詩以諷之故言者従而擠䧟欲寘之死神宗薄其過責置黄州温公相哲宗累擢中書舍人除翰林學士承㫖紹聖中坐草責吕恵卿制安置恵州徙昌化元符初北還卒于常州初軾好賈誼陸贄書論古今治亂不為空言既謫黄州杜門深居馳騁翰墨其文一變平生遇事所為詩騷銘記書札論譔率皆過人晩喜陶淵明詩和之幾徧為人英辯竒偉於書無所不通所作文章才落筆四海已皆傳誦下至閭閻田里外至夷狄莫不知名門下賔客亦皆一世豪傑其盛古今所未有也立朝知無不言世稱其忠義嘗自比范滂孔融議者不以為過在黄州日自號東坡居士世因不呼其名止目之為東坡云東坡别集四十六卷陳氏曰坡之曽孫給事嶠季貞刋家集于建安大畧與杭本同盖杭本當坡公無恙時已行於世矣麻沙書坊又有大全集兼載志林雜説之類亦雜以潁濱及小坡之文且間有訛偽勦入者有張某為吉州取建安本所遺盡刋之而不加考訂中載應詔䇿論盖建安本無應詔集也東坡儋耳手澤三卷艾子一卷陳氏曰今俗本大全集中所謂志林者也艾子相傳為東坡作亦未必然按艾子蜀中和􅃵之物字與藙同書名艾子取悦口云爾坡又有物類相感志十八卷東坡詞二卷黄山谷曰東坡居士曲世所見者幾百首或謂於音律小不諧然其辭横放傑出自是曲子内縛不住者後山詩話曰東坡以詩為詞如教坊擂木使舞雖極天下之工要非本色東坡奏議十卷陸㳺跋曰天下自有公論非愛憎異同所能奪也如東坡之論時事豈獨天下服其忠髙其辯使荆公見之其有不撫几太息者乎東坡自黄州歸見荆公於半山劇談累日不厭至約卜鄰以老焉公論之不可揜如此而紹聖諸人乃遂其忮心投之嶺海必死之地何哉烏臺詩話十三卷東坡詩話二卷陳氏曰蜀人朋九萬録東坡下御史獄公案附以初舉發章疏及謫官後表章書啓詩詞等又好事者集公雜書及詩為東坡詩話註東坡詩四十二卷年譜目録各一卷司諫呉興施元之徳初與呉郡顧景蕃共為之元之子宿且為年譜以傳於世陸游序曰近世蜀人任淵嘗註宋子京黄魯直陳無已三家詩頗稱詳贍若東坡先生之詩則援據閎博指趣深逺淵獨不敢為之説游頃與范公至能㑹於蜀因相與論東坡詩慨然謂予足下當作一書發明東坡之意以遺學者游謝不能他日又言之因舉二三事以質之曰五畆漸成終老計九重新掃舊巢痕遙知叔孫子已致魯諸生當若為解至能曰東坡􅇡黄州自度不復收用故曰新掃舊巢痕建中初復召元祐諸人故曰已致魯諸生恐不過如此耳游曰此㳺之所以不敢承命也昔祖宗以三館養士儲將相材及官制行罷三館而東坡盖嘗直史館者自謫為散官削去史館之職久矣至是史館亦廢故云新掃舊巢痕其用字之嚴如此而鳯巢西隔九重門則又李義山詩也建中初韓曽二相得政盡収用元祐人其不召者亦補大藩惟東坡兄弟猶領宫祠此句盖寓所謂不能致者二人意深語緩尤未易窺測至如車中有布乎指當時用事者則猶近而易見白首沉下吏緑衣有公言乃以侍妾朝雲嘗歎黄師是仕不進故此句之意戲言其上僭則非得於故老殆不可知必皆知此然後無憾至能亦太息曰如此誠難矣後二十五六年游告老居山隂澤中呉興施宿武子出其先人司諫公所註數十大編屬游作序司諫公以絶識博士名天下且用工深歴嵗久又助之以顧君景蕃之該洽則於東坡之意盖庶幾可以無憾矣游雖不能如至能所托而得序斯文豈非幸哉嘉㤗二年正月五日蘇子由欒城集五十卷後集二十四卷第三集十卷應詔集十二卷轍字子由洵之次子也年十九中進士第二十舉直言因所問極言得失䇿入或欲黜之仁宗不許擢商州推官以兄得罪従坐謫筠州監酒宣仁臨朝相温公擢中書舍人代子瞻為翰林學士未幾拜尚書左丞紹聖初責置雷州後北還凡居雷循七年居許十六年杜門理舊學于是詩春秋傳老子解古史書皆成自謂得聖賢遺意陳氏曰欒城真定府縣也蘇氏望趙郡欒城元魏時屬趙郡故云子由晩居潁上自號潁濵遺老故集或名潁濵東坡曰子由之文實勝僕而世俗不知乃以為不如其為人深不願人知之其文如其為人故汪洋澹泊有一唱三嘆之聲而其秀傑之氣終不可没作黄樓賦乃稍自振厲若欲以警發憒憒者而或者便謂僕代作此尤可笑是殆見吾善者機也蘇文定公遺言二卷周平園序略曰文定公晩居許昌避禍謝客罕與人言其聞緒論者子孫而止耳然諸子宦㳺惟長孫將作監丞籀年十有四才識卓然侍左右者九年記遺言百餘條未嘗増損一語既老以授其子郎中君詡郎中復以授其子道州使君森予嘗與道州同僚故請題其後龍川略志六卷别志四卷子由於元符二年夏居循州杜門閉目追惟平昔使其子逺書之紙凡四十事其秋復記四十七事龍川循州地名三蘇年表三卷陳氏曰右奉議郎孫汝聴撰汝聴當是蜀人所叙述甚詳三蘇遺文陸㳺跋曰此書蜀郡吕商隠周輔所編周輔入朝為史官得唐安守以歸未至家暴卒可悲也蘇過斜川集二十卷宋史初軾卒于常州過𦵏之汝州郟城小峨眉山遂家潁昌營湖隂水竹數畆名曰小斜川自號斜川居士且以名其集其思子賦􅄓風賦早行於時稱為小坡云陳氏曰蘇過字叔黨坐黨家不得仕進終於通判中山府晁以道誌墓稱其純孝給事中嶠其孫也九峯集四十卷太常少卿眉山蘇元老在廷撰東坡従孫也坡在海上嘗有書往來其罷奉常歸潁昌正坐元祐之黨未幾卒年四十七王子立文集王適子立撰蘇子由之壻也潁濵序略曰適従予為學長於詩騷予自南都謫居江南凡六年而歸未嘗一日不相従也既與予同憂患至於涵泳圖史浮屠老子之説亦未嘗不同之故聞道益深為文益髙而予觀之益久盖其于兄弟妻子嚴而有恩和而有禮未嘗有過故予嘗曰子非獨余親戚亦朋友也李方叔集三十卷濟南集二十卷李廌字方叔號月岩夾江人鄉貢進士東坡知貢舉得試卷以為方叔置之首選已而非也賦詩有平生謾説古戰場過眼還迷日五色之句後竟不第其母曰蘇公知舉而吾兒下第命也所著有師友聞見紀多子瞻淳夫之遺言木雁居士集鄭少㣲字明舉華陽人少孤力學登元祐進士第始就試禮部東坡知貢舉黄魯直與較藝得明舉由是赫然古郫楊天恵三嵎李新皆以文名時人號為三儁按少㣲在宣和間上書言時政坐廢家貧無田宅栖成都金繩院十五年不變其守學益古文益工晩號木雁居士有集行於世徳陽舊志載少㣲政和中知縣事云楊天恵文集六十卷通志云天恵郫縣人元豐進士後入黨籍按潼川志有楊天恵字祐甫登熙寜二年進士授䨇流知縣多善政文詞得西京體即著彰明逸事及彭山十事記者不知同是一人否元豐熙寜年號亦相連王君禮詩集楊天恵曰成都王君禮自宕渠佐轉官資中嘗跨巴馬従一野僮徑造余門持刺大呼我王某也聞子名久特來耳因為具留之信宿而去其詩祖騷宗選出没傳記為兒時已能賦有州里名晩年多出白語蘄曉流俗不以鐫琢為工二江先生文集十六卷元祐中䨇流宋承之著南部馬涓序稱其筆端馺㳫落紙皆可諷詠在官惟以簡編筆研吟咏度日常曰世間樂孰與此吾將終身焉三江集太平讜議達州王其昌著熙寜九年進士授黔江令元豐中景靈宫成其昌作賦獻之辭極雅麗得得居士戅草一卷陳氏曰右正言眉山任伯雨徳翁撰其論章惇蔡卞欲廢宣仁尤切故卞深恨之獨貶嶺外按史髙宗采其諌章追貶惇卞等明著誣宣仁事告天下詔贈伯雨官志云居諫省半年上一百八疏皆切國體文與可丹淵集四十卷文同字與可永泰人進士髙第以文學名操韻髙潔畫筆尤妙仕至太常博士集賢校理元豐初出守呉興至宛邱驛忽留不行沐浴衣冠正坐而逝東坡謂與可有四絶詩一楚詞二章草三畫四世少知者惟予一見識其妙處又有詩云斯人定何人㳺戲得自在詩鳴草聖餘兼入竹三昩他日觀其飛白復恨知與可之不盡也費東平詩集六卷文同序云嘉祐癸邜春東平先生以古律五七言詩共六帙因其甥朱景副書為示且屬余以序置其首余熟讀者累日甚愛之余居常數言唐人風調渉五代衰季已淪委而不振及見先生所作信遺音餘響久浮大空至治世而復下今又軋然發于先生之筆舌爾按先生閬中人少舉進士自勝冠走四方㳺名公鉅卿之門命既不偶退返林壑盡諱其他能而一従事於此凡四十年探深摘幽愈老益工大抵氣和平而意精新使人嗜之而不厭也近世文士以篇什自名者甚衆如使先生之言雜行于其中彼將左右顧揖相推以為先余恐先生所得者固多傲然而獨居其前矣是可傳布於天下也此文見丹淵集未著名氏無為子集四十卷楊繪元素著漢川緜竹人也幼警敏讀書一過輙誦至老不忘為文立就皇祐初擢進士第二仕天章閣待制知杭州嘗居無為山號無為子云李公敏集李誼伯字公敏緜州人皇祐五年進士幼孝謹長通六經歴威卭果漢四郡守贈金紫光禄大夫有詩賦三十卷雜文二十卷其子孟侯通直郎仲侯司理叅軍政績見神道碑銘頤堂集宋王灼字晦叔號頤堂遂寜人文詞古雅隠居不仕復著有碧鷄漫志十卷糖霜譜一卷鮮洪範長江詩集山谷䟦云余昔聞蜀人有魯三江者號稱能詩士大夫多宗之今觀閬州鮮長江詩不甚愧之也雖切磋琢磨之功少而渾厚之氣幾度其前矣昔方士袁天綱見閬州錦屏山題其石曰此山磨滅英靈乃絶然予在中朝唯聞陳文忠公家世出才士嘗疑山水之秀豈獨鍾於陳氏耶其沉淪草萊困頓州縣抱才器而與慶鹿共盡者可勝道哉今觀鮮長江之才所謂困頓州縣者也使之學不盡其才名不聞於世亦其鄉之先達士大夫之罪也盖道不明於天下則士不知擇術道不行於天下則民之毁譽不公豈獨士大夫之罪哉其所従來逺矣鮮氏唯以閬中為族姓其散漫於兩蜀者皆以閬中為祖今試問鮮氏所自出皆不能自言或云出於鮮于後去于而為鮮以余考之非是蜀李夀時司徒鮮明用事專廢立其鮮氏之祖歟鮮于諫議集三卷鮮于侁字子駿閬中人景祐初登進士乙科仕至諫議大夫侁治經術論著多出新意晩年為詩與楚詞尤精志稱子駿有詩傳六十卷東坡曰鮮于子駿九誦友屈宋于千載上堯祠舜祠二章氣格髙古東漢以來鮮及也張無盡集三十二卷張商英字天覺登第調官峽路章惇察訪巴蜀風采傾動西南峽中部使者憂之因求辯博之士以備燕談或以天覺姓名告檄召至䕫州惇杯酒間果以人材為問部使者即言之惇令召入天覺不冠服峨巾長揖徑就坐左惇負氣敢大言天覺輙吐詞壓之惇大喜歸而薦于朝由是召用元祐中為開封府推官出使河東紹聖初擢御史大觀四年長星見蔡京罷相乃拜右僕射盡反京之政召用元祐遷客天下翕然歸重期年去位靖康初遂與司馬温公范文正公同日降制加贈官爵賜諡文忠黄松子集十卷唐安張唐英次公著商英之兄也進士及第殿中侍御史蒲左丞集十卷蒲宗孟字傳正閬州新井人皇祐五年進士曽公亮薦除館職神宗謂宰相曰宗孟有史才乃召同脩國史入為翰林學士除尚書左丞卒年六十六宋史宗孟累遷翰林學士兼侍讀舊制學士唯服金帶宗孟入謝神宗曰學士職清地近非他官比而官儀未寵迺加佩魚遂著為令宗孟趣尚嚴整而性侈汰藏帑豐毎旦刲羊十豕十然燭三百入郡舍或請損之愠曰君欲使我坐暗室忍饑邪常日盥潔有小洗面大洗面小濯足大濯足之别每用婢十數人一浴至湯五斛他奉養率稱是嘗以書抵蘇軾云晩年學道有所得軾答曰聞所得甚髙然有二事相勸一曰慈二曰儉盖鍼其失也唐子西集十卷唐庚字子西眉山人登進士第早受知於張天覺天覺為相擢京畿提舉欲用為諫官㑹天覺去位貶惠州鴈湖李氏曰唐子西文采風流人謂之小東坡遯菴集丹稜唐文若著子西之子一江集三卷鄧至著雙流人綰之父也通六經學者従之甚衆每出入里中里中人皆拱立其尊敬之如此廬江集七十卷治道中術六卷十三篇南充何渉濟川著渉於六經百家山經地志醫卜之書無不讀景祐進士司封員外郎所著有春秋本㫖雖在軍中嘗為諸將講左氏春秋狄青之徒横經以聴司馬温公嘗言學者讀書少能自首卷讀至卷末往往或従中或従末隨意讀起又多不能終篇光性最専猶患如此従來惟見何渉學士案上惟置一書讀之自首至尾正錯校字以至終篇未終誓不他讀此學者所難也邉臣要略二十卷平戎䇿十五篇普州景泰周卿著進士起家歴尚書屯田員外郎忠州刺史有識鑒教二子相繼死王事蜀中廣記卷九十八
