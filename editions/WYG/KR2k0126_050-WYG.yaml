body:
  text: 蜀中廣記卷五十明曹學佺撰宦游記第四川北道屬東漢臧宫潁川郟人也將兵至中盧屯駱越是時公孫述將田戎任滿與征南大將軍岑彭相拒於荆門彭等戰數不利越人謀畔從蜀宫兵少力不能制㑹屬縣送委輸車數百乘至宫夜使鋸斷城門限令車聲囘轉出入至旦越人候伺者聞車聲不絶而門限斷相告以漢兵大至其渠帥乃奉牛酒以勞軍營宫陳兵大㑹擊牛釃酒饗賜慰納之宫與岑彭等破荆門别至垂鵲山通道出移歸至江州岑彭下巴郡使宫將降卒五萬從涪水上平曲公孫述將延岑盛兵於沅水時宫衆多食少轉輸不至而降者皆欲散畔郡邑復更保聚觀望成敗宫欲引還恐爲所反㑹帝遣謁者將兵詣岑彭有馬七百匹宫矯制取以自益晨夜進兵多張旗幟登山鼓噪右步左騎挾船而引呼聲動山谷岑不意漢兵卒至登山望之大震恐宫因從擊大破之斬首溺死者萬餘人水爲之濁流延岑奔成都其衆悉降盡獲其兵馬珍寳降者以十萬數軍至平陽鄉蜀將王元舉衆降進拔緜竹破涪城斬公孫述弟恢復攻拔繁郫與呉漢並滅公孫述帝以蜀新定拜宫爲廣漢太守三國張飛字益德涿郡人先主定蜀以飛領巴西太守曹操破張魯留夏侯淵張郃守漢川郃别督諸軍下巴西欲徙其民於漢中進軍宕渠䝉頭盪石與飛相拒五十餘日飛率精卒萬餘人從他道邀郃軍交戰山道迮狹前後不得相救飛遂破郃郃棄馬緣山獨與麾下十餘人從間道退引軍還南鄭巴土獲安先主爲漢中王拜飛爲右將軍假節章武元年遷車騎將軍領司𨽻校尉進封西鄉侯先主伐呉飛當率兵萬人自閬中㑹江州臨發其帳下將張達范疆殺飛持其首順流而奔孫權追諡飛曰桓侯霍峻字仲邈南郡枝江人先主以峻爲中郎將先主自葭萌南還襲劉璋留峻守葭萌城張魯遣將楊帛誘峻求共守城峻曰小人頭可得城不可得帛乃退去後璋將扶禁向存等帥萬餘人由閬水上攻圍峻且一年不能下峻城中兵纔數百人伺其怠隙選精鋭大破之即斬存首先主定蜀嘉峻之功乃分廣漢爲梓潼郡以峻爲梓潼太守禆將軍在官三年年四十卒還葬成都六朝栁儉字道約河東解人也隋文帝受禪擢拜水部侍郎封率道縣伯未幾出爲廣漢太守甚有能名俄而郡廢時帝勵精思政妙簡良能出爲牧宰儉以仁明著稱擢拜蓬州刺史獄訟者庭决遣之佐吏從容而已獄無繫囚蜀王秀時鎭益州列上其事遷卭州刺守在職十餘年人夷悦服蜀王秀之得罪也儉坐與交通免職及還鄉妻子衣食不贍見者咸嘆伏焉魯廣達陳巴州刺史太康初與儀同章昭達入峽口招定安蜀等諸州鎭時周將圖江左大造舟艦於蜀并運糧青泥廣達與錢道戢等掩襲縱火焚之仍還本轄廣達爲政簡要推誠任下吏人稱便秩滿皆詣闕表請乞留於是詔留二年董叔開皇四年爲鹽亭令勤課農桑首建學校德政著聞公餘遊鳯凰山後人思之號爲董叔山豆盧勣字定東大象二年拜利州總管時王謙作亂勣嬰城固守謙遣其將達奚惎等衆十萬攻之起土山鑿城爲七十穴堰江水以灌之勣時戰士不過二千晝夜相拒經四旬勢漸迫勣于是出竒兵擊之斬數千級降二千餘人梁睿軍且至賊因而解去唐顔眞卿字清臣瑯琊臨沂人李輔國惡之奏貶蓬州長史郭元振魏州貴鄉人舉進士授通泉尉任俠使氣不屑細務則天聞其名乃召與語甚奇之充使聘於吐蕃李元嬰封滕王與魯王靈䕫相繼爲閬州刺史務行寛大民甚懷之顔杲卿瑯琊臨沂人天寳初任遂州司法參軍賦性剛直涖事明濟後陞常山太守崔渙以尚書司門員外郎忤楊國忠出爲劒州刺史天寳十五載𤣥宗幸蜀渙迎謁於路抗詞忠懇皆究理體𤣥宗嘉之以爲得渙晩宰臣房琯又薦之即日拜黄門侍郎司中書門下平章事扈從成都府馮宿字拱之東陽人貞元中舉進士歴學士侍郎擢東川節度使完城郭增兵械十餘萬涪水數壞民廬舍宿修利防庸一方便賴疾革將斷重刑家人請宥之宿曰修短天也撓法以求宥吾不敢卒贈吏部尚書謚曰慤元稹字微之河南人也以監察御史奉使東蜀劾奏故劒南東川節度使嚴勵在州日没入平人資産八十餘家詔徵其贓復歸於民執政不悦以他事貶稹江陵府士曹參軍又十年量移通州司馬史謙恕果州刺史百姓歌之曰使君來何晩昔日無儲今有飯沈長源呉興初爲利州牧人安俗阜歐陽詹作益昌行曰驅馬至益昌倍驚風俗和耕夫壠上行負戴途中歌何易于嘗爲益昌令刺史崔朴嘗乘春自上游多從賔客歌酒泛舟東下直出益昌至則索民挽舟易于躬自腰笏引舟上下刺史驚問狀易于曰方春百姓不耕即蠶隙不可奪易于爲屬令當其無事可以充役刺史與賔客跳出舟偕騎還去益昌民多即山樹茶利私自入㑹鹽鐵官奏重𣙜筦詔下所在不得爲百姓匿易于視詔曰益昌不征茶百姓尚不可活矧厚其賦以毒民乎命吏剗去吏爭曰天子詔所在不得爲百姓匿今剗去罪愈重吏止死明府公寧免竄海裔耶易于曰吾寧愛一身以毒一邑民乎亦不使罪蔓爾曹即自縱火焚之觀察使聞其狀以易于挺身爲民卒不加劾邑民死喪子弱業破不能具葬者易于出俸錢使吏爲辦百姓入常賦有垂白僂杖者易于必召坐與食問政得失庭有競民易于皆親自與語爲指白枉直罪小者勸大者杖悉立遣之不以付吏治益昌三年獄無繫民民不知役盧宏宣元和中累官刑部侍郎拜劒南東川節度使時歲饑盜起酋豪自王僞署官吏發厫倉招亡命連蓬諸州蠻落搖亂宏宣下檄招諭賊黨稍平簡其桀黠者署軍中孱弱無能者還之農酋豪逃峽中令吏捕誅之薛逢字陶臣河東人爲巴州刺史既而同年進士楊收作相逢有詩云須知金印朝天客同是沙隄避路人威鳯偶時皆瑞聖潛龍無水謾通神收聞大銜之又出爲蓬州刺史栁仲郢字諭䝉大中年爲梓州刺史劒南東川節度使時有孔目吏邊章簡者以貨交近倖前後亷使無如之何仲郢因事决殺部内肅然不俟行法而自理在鎭五年美績流聞路岩字魯瞻陽平寇氏人咸通中劒南東川節度使時蠻盜寇邊岩力爲拊循置定邊軍於卭州扼大渡河由是西山八國來朝顔彦暉東川節度使賊來攻城援絶城陷彦暉不屈手殺妻子乃自刎諸將皆自殺高仁厚始爲西川押衙以討蜀盜阡能等有功進都招討指揮使東川楊師立反命仁厚討之賊夜掩諸營皆走仁厚大開營門設燭自帥兵伏道左右賊至見門開不敢入還去伏發擊之大敗追至城下圍之諸營皆走當死者衆仁厚乃召孔目張韶諭之曰汝速遣人分道追去者自以汝意諭之曰僕射幸不知宜速歸來可保其如常無憂也韶素長者衆信之皆還惟副使楊茂言走逺又爲欺罔乃斬以徇進圍梓州久不下仁厚乃射書城中曰不忍玉石俱焚爲諸君緩師十日至日四面俱進破城必矣諸君圖之於是將士遂斬師立出降授東川節度使宋馮瓚字禮臣歴城人乾德三年爲樞密直學士時劒外初平命瓚知梓州無何蜀軍校上官進率亡命三千餘人掠民數萬夜攻州城瓚曰賊乘夜奄至此烏合之衆以箠挺相擊必無固志正可持重以鎭之旦自潰矣密令促其更籌五鼓賊悉遁去因縱兵追之擒斬上官進陳升卿字光祖跨鼇人乾道中以御史出知劒州恤民隱修學校士民咸悦太守閻伯永即學宫之傍立祠祀之張雍德州人西川轉運使知梓州蜀州青城民王小波李順作亂衆至萬人雍訓練士卒募强勇守城輦綿州金帛以實帑藏督僚佐陳世卿等治戎器伐木爲竿銷鐘爲鏑紐布爲索賊設梯衝火車攻城急發機石碎之火箭雜下賊稍退復治攻具城西北隅雍紿曰軍士趣治裝吾將開東門擊賊陽遣步騎五百臨東門賊升牛頭山瞰城内信然伏精兵萬餘山之東隅以待雍即召敢死士百輩縋而下盡焚其攻具自午達申殆盡賊以爲神凶黨數乘城進戰皆不利一日北風晝晦賊乘風縱火急攻北門雍與盧斌等領兵據門立矢石間固守不動賊爲之少却長圍八十餘日㑹援兵至賊始潰去事聞手詔褒美焉王旦字子明大名人端拱間知蓬州清節著聞民被其澤後官至平章事卒諡文正襲鼎臣字輔之須城人知渠州事渠故僻陋無學者鼎臣建廟學選俊秀爲生徒日授講説立課嚴教自後始有登科者郡人繪像祀之張仕遜字順之隂城人進士令射洪以寛厚得民嘗禱雨使君祠須臾大雨仕遜立庭中雨足乃去後轉運使檄移治郪民遮馬首不得去因聽還射洪安撫使至梓州問屬吏能否張雍曰射洪令第一累官同中書門下平章事朱勇梓州統制時與金人戰於瓦亭寨被執臨死罵不絶口後人立廟祀之賜名忠節劉子羽字彦修崇安人金人窺蜀呉玠以經畧使戍河池王彦以鎭撫使戍金州二鎭皆饑興元帥臣閉糴二鎭病之皆願得子羽守漢中張浚乃承制拜子羽利州路經畧使兼知興元子羽至漢中通商輸粟二鎭遂安除寳文閣直學士是冬金人犯金州王彦失守退保石泉子羽急移兵守饒風嶺馳告玠玠大驚即越境而東一日夜馳三百里至饒風列營拒守金人仰攻死傷山集募死士由間道自柤溪闗入繞出玠後玠遽邀子羽去子羽不可而留玠固守玠難之遂西子羽焚興元退守三泉縣兵不滿三百取草芽木甲以食遺玠書訣别玠時在􅋖人闗愛將楊政大呼軍門曰節使不可負劉待制不然政亦舍節使去矣玠乃間道㑹子羽子羽留玠共守三泉玠曰闗外蜀之門户不可輕棄復徃守􅋖人闗以潭毒山形斗拔其上寛平有水乃築壁壘十六日而成金人已至距營十數里子羽據胡床坐于壘口諸將泣曰此非待制坐處子羽曰子羽今日死于此敵尋亦引去自金人入梁洋四蜀復大震張浚欲移潼川子羽遺浚書言已在此金人必不南浚乃止薩里罕由斜谷北去子羽謀邀之于武休不及既囘鳯翔遣十人持書旗招子羽子羽盡斬之而縱其一還曰爲我語彼欲來即來吾有死爾何可招也先是子羽預徙梁洋之積至是金人深入餽餉不繼又腹背爲子羽及玠所攻死傷十五六疫癘且作亟遁去子羽出師掩擊墮溪澗死者不可勝計餘不能自拔者皆降邵伯温字子文河南人除知果州擢提㸃成都路刑獄蜀人德之再除利路轉運副使提舉太平觀初伯温以父雍言世將亂惟蜀可居遂攜家入蜀免于靖康之難紹興四年卒趙士陴紹興中知遂寧府江水汎漲瀕江隄决士陴率士民塞之索胡床坐隄上左右請避不許須臾水落隄幸不壞時人以比王尊李樗知巴渠時有虎白晝入城樗爲文榜諸社廟越五日虎斃于郊陳咸字逢儒登進士第歴利路轉運判官開禧三年呉曦叛闗外四州繼没人情大駭咸留大安軍督軍糧檄守楊震仲賑流民備姦盜衆稍安曦謂咸名士欲脇之以令其餘初咸語人曰咸受國厚恩義當擊敵恨無兵權獨有下䇿削髮以全臣節㑹曦以書招之急咸答書勸其稟命既而欲親諭之遂行遇僞統領孟可道知曦已僭亂曰吾書不可用矣還至后􅌯入帳中以刀自斷其結披緇而出敵兵拘咸于岸曦聞怒甚安丙力爲救解乃得釋歸蜀中廣記卷五十
