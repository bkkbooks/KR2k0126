body:
  text: 蜀中廣記卷五十七明曹學佺撰風俗記第三上下川東道屬臣蘇軾撰燕若古知渝州詞頭云敕具官燕若古汝向以才選奉使東方官省而歸因以得郡蓋可謂異恩矣巴峽之嶮邑居褊陋負山臨谷以争尋常獨渝為大州水土和易商農㑹通賦役争訟甲於旁近毋以僻逺鄙夷其民欽哉華陽國志稱其民質直好義土風敦厚有先民之流故其詩曰川崕惟平其稼多黍㫖酒嘉榖可以養父野惟阜丘彼稷多有嘉榖㫖酒可以養母其祭祀之詩曰惟月孟春獺祭彼崕永言孝思享祀孔嘉彼黍既潔彼犧惟澤蒸命良辰祖考來格其好古樂道之詩曰日月明明亦惟朝夕誰能長生不朽難獲又曰惟徳實寳富貴何常我思古人令聞令望而其失在於重遲魯鈍素樸無造次辯麗之氣俗之送葬必髙墳瓮椁祭奠而羊豕夕牲贈禭兼加贈􅉠過禮焉漢桓時巴部太守但望上䟽曰郡治江州時有温風遥縣客吏多有疾病地勢剛嶮皆重屋累居數有火害又不相容結舫水居五百餘家承三江之㑹夏水漲盛壞散顛溺死者無數而江州以東濵江山險其人半楚姿態敦重墊江以西土地平敞精敏輕疾上下殊俗情性不同敢欲分為二郡一治臨江一治安漢也韓詩云嬥巴人歌也嬥嬥往來貌華陽國志云五教雍和秀茂挺逸英偉既多而風謡旁作矣宋眉山史用之崇徳廟碑文云巴俗故有鷄豚社予初入社中祝史以記請遂為之作云爾寰宇記云大凡蜀人風俗一同然邊蠻界鄉村有獠戸即異也今渝之山谷中有狼峱鄉俗構屋髙樹謂之閣闌不解絲竹惟坎銅鼓視木葉以别四時父子同諱夫妻共名祭鬼以祈福是所異也江津舊志云農勤􅅵畆士業詩書有石公恕之風而人多敦睦有杜莘老之風而士多剛直古墊江志表之以四山之環合中之以兩溪之襟帶田畆桑麻左右交映人生其間多秀異而喜習詩書按即今之合州屬縣地勝覽云州北五里有北嵓或附㑹為濮巖非也岩有栢數十章率圍八九尺有定林院正月九日郡守以故事設宴逰人盛集又毎嵗八月八日郡守率僚屬宴集於釣魚山山有巨人跡相傳異人坐其上投釣於江中云昌州昔治大足充静南軍使宋太守于保道院記云界介資普富義瀘合之間其俗朴厚又多秀民衣食之物資以養生者不及他郡雖無舟楫江沱之利而有桑麻黍稌之饒楊子謨顯恵廟記云静南山水竒秀士大夫避地者多居焉仙靈逸迹尚有董葛之遺風冷齋夜話載有人調官都下得昌守求易他郡淵才聞而往見之曰官欲易地誤矣静南佳郡也問何以稱佳淵曰海棠患無香獨静南者有香非佳郡而何故昌號海棠香國也宣和太守張唐民詩無訟正如髙隱地隆冬方似早春天州民富庶風光好誰信無憂滿二年按即今之榮昌大足永川地也官兹方者輒稱民不馴於法難以計治功何今昔頓殊乃爾真景元送南平江知軍序云南平故漢巴渝地至唐猶以獠名宋元豐中聲教逺浹始即其地置軍焉百三四十年間浸以道徳薫以詩書斌斌然與東西州等何麒軍學記云四民冠婚相襲耕桑被野蔚為中華也華陽國志涪陵山險水灘人性戇勇多獽蜑之民縣邑阿黨鬬訟必死無蠶桑少文學漢時赤甲軍常取其民蜀丞相亮亦發其勁卒三千人為連弩士其性質直雖徙他所風俗不變巴子之時陵墓多在枳其畜牧在沮今東突硤下畜沮是也又立市於龜亭北㟁今新市里是也龜陵志云風土煦煖五月半早稻已熟便可食新七八月間收割已畢故有樂温之號宋翰題涪陵郡詩錦繡洲猶在熊羆夢已無文風齊兩蜀仙洞接三都白石從天設青崕見地圖荔支妃子國不復曩時輸陸務觀詩官道近山多亂石人家避水半危樓水經注云平都縣有天師治兼建佛寺甚清靈縣有市肆四日一㑹南賔郡所轄也忠州題名記云有巴蔓子仗節死義之遺風故士頗尚氣有甘興霸文廣休任俠之餘烈故士多倜儻黄魯直四賢閣序云郡自開元以前訖於㑹昌劉士安陸敬輿李宏憲白樂天四君子者相繼出守凛然猶有生氣忠民每以此自負而郡守至者必矜式焉杜甫詩忠州三峽内井邑聚雲根小市常争米孤城早閉門空看過客淚莫覔主人恩淹泊仍愁虎深居賴獨園白居易詩山上巴子城山下巴江水中有窮獨人强名為刺史時時竊自哂刺史豈如是食粟餧家人黄縑裹妻子注云忠州刺史已下悉以畬田粟給祿食以黄絹支給充俸自古相傳風俗如是又郡中春宴詩薫草鋪坐席藤枝注酒尊蠻鼓聲坎坎巴女舞蹲蹲圖經云蜀地多山多種黍為酒民家亦飲粟酒地産藤枝長十餘尺大如指中空可吸謂之引藤屈其端置醅中注之如晷漏本夷俗所尚土人效之耳寰宇記云忠州有夷獠頗類黔中正月三日拜墳墓二月二日携酒郊外迎富除夜然燈照先祖墓也黔州圖經地近荆楚候如巴蜀五溪襟束為一都㑹路途濶逺亦無館舍凡至宿泊多倚溪岩就水造飱鑚木出火黄魯直與秦太虚書曰某屛棄不毛之鄉以禦魑魅耳目昬塞黔中一老農耳其作縣題名記云黔江縣治所蓋未聞黔中郡時歌羅蠻聚落也於今為縣二鄉七里戸千有二百其秋賦庸僱不登三十萬錢以地産役於公者八十有五其義軍二千九百招諭夷自將其衆者五百七十其役於公之人質野畏事大略與義軍夷將領不殊也使之非其義或跳梁不為用決訟失其情或擄掠以償直暗則小智者亦混疆畔而為欺懦則細黠吏亦能用其柄市麝臍以百計市蜂蠟以千計貧則夷以長吏為侮寛則以利㗖胥徒而茍免猛則鳥獸駭而奏箐中矣至令得其人櫛垢爬痒民以安堵而異時號為難治吾不知其說也已上重慶劉禹錫䕫州刺史壁記云源乾曜為州㕘軍修圖經言風俗甚備其别䕫州官吏詩云三年楚國巴城守一去揚州楊子津惟有九歌詞數首里中留與賽蠻神後黄魯直過䕫門書之臣蘇軾奉敕王公議䕫州路轉運使程髙䕫州路轉運判官等役法既復民知息肩矣然在官者皆農末也三峽之民刀耕火耘與鹿豕雜居正賴良使者察其侵寃使政煩而吏貪者此等豈能逺訴乎朕以大臣薦故擢用爾若逺民無告非獨汝咎將咎薦者可不勉哉丁謂移城記云州居髙唐上㳺即白帝舊址雉堞登降里閈重複倚山抱江逶迤數里而南北咫尺衝門比屋構之磴道往往編苫架竹家於洲渚隨波遷徙莫寧厥居無巷市無阡陌或人火為災則東西路絶撲滅無所層甍疊棟盡煨燼而後已故家至戸到毎穴地以藏産其為僻陋也如是本道轉運使薛顔知州侯延賞得郡民狀願遷於瀼西即永安故宫有唐之舊城也民樂新構如歸如趨旁瞻瞿唐下瞰陣磧通莊大道坦若棊布蚩蚩之氓出處平陸涵泳方洲於是乎始知土著之為適與杜少陵蜀先主廟詩蜀主窺吳幸三峽崩年亦在永安宫翠華想像空山裏玉殿虚無野寺中古廟杉松巢水寉嵗時伏臘走村童武侯祠屋長隣近一體君臣祭祀同圖經䕫人重諸葛武侯以人日傾城出逰八陣圖謂之踏磧逰婦人拾小石之可穿者貫以彩索繫於釵頭以為一嵗之祥府帥宴於磧上王梅溪詩今日為人日傾城出江臯遨頭老病守呼賔酌春醪陸務觀詩鬼門闗外逢人日踏磧千家萬家出常璩志郡與楚接人多勁勇少文學有將帥材宋何郯夫子殿記云䕫為州於巴東最大其風俗嗜好語言較荆楚不甚逺當列國時楚顯顯多良才䕫為楚疆至今未聞有用儒顯者民家子弟壯則逐魚鹽之利富有餘貲輒以奉事鬼神它則不暇知耳李貽孫都督府記云其人豪其俗信鬼其稅易征其民不偷也宋肇詩序䕫冬暖雪不到地惟山髙處白杜詩注云峽土磽确煖氣既逹故民燒地而耕謂之火耕范致能勞畬耕序硤民平生不識秔稻而未常苦饑陸㳺杜少陵故宅記云東屯之田可得百許頃稻米為蜀第一郡給諸官俸廩以髙下為差帥漕月得九斗故王龜齡詩云少陵别業古東屯一飯遺忠甽畆存我輩月叨官九斗須知粒粒是君恩杜甫引水行月峽瞿唐雲作頂亂石峥嶸俗無井雲安沽水奴僕悲魚復移居心力省白帝城西萬竹竿接筒引水喉不乾人生留滯生理難斗水何值百憂寛王龜齡詩䕫州苦無井俗癭殊可憐丁寧後來者莫負義名泉按趙不拙義泉記不知誰氏子告郡帥引三泉毎擔輒鬻十金入公帑大暑中烈日如灼細民操瓢遶舟傍徨嚥津欲涓滴潤喉有不可得自待制王公十朋始下令罷之易名為義泉任民取用一方大恱杜詩異俗吁可恠斯人難並居家家養烏鬼頓頓食黄魚沈括筆談曰峽中人呼鸕鷀為烏鬼温叟詩話以為豬元稹詩病賽烏蠻鬼巫占瓦代龜嚴端常藝苑雌黄亦曰烏蠻鬼吳虎臣漫錄曰老烏神也若養鸕鷀與豬則未為異俗可恠矣但養字當讀作去聲開州都梁南浦雲安皆漢朐䏰縣也注云其地下濕多胊䏰蟲故名此蟲為瘴善中人避之則吉盛山學記云士以繢文相髙有温造栁公綽之餘烈梁山軍題名其民未常造難聽之訟以溷有司守居蕭然閲旬無訟牒至㕔下軍西之田獨平衍可畊前涪後峽挾以䕫萬皆崇山還委南浦記云土地多泉民賴魚罟西魏於此置魚泉縣也唐啇真君飛昇記雲安風俗淳厚陶染真風如瞿法言楊雲外之徒繼出故琳宫秘館獨盛他處杜子美詩峽裏雲安縣江樓翼瓦齊兩邊山木合終日子規啼范致能詩雲安酒醲麥米賤家家扶得醉人歸通川圖經云水航於蜀陸肩於雍樓雉丹漆㕓用珠玉土居十萬戸水居三千戸九域志載男女不耕桑貨賣用雜物以代錢常氏馬鳴山志稱其持金易絲枲者不絶於道矣唐詩紀事元稹受通之初有習通者曰地墊濕卑褊人士希少邑無吏市無貨百姓茹草木刺史以下計粒而食大有虎豹蛇虺之患小有蟆蚋蜘蛛之類皆能鑚囓肌膚使人瘡痏夏多隂霪秋為痢瘧故其酧白樂天詩茅苫屋舍竹籬州虎怕偏蹄蛇兩頭暗蠱有時迷酒飲浮塵終日似波流沙含水弩多傷骨田仰畬刀少用牛知得共君相見否近來魂夢轉悠悠微之以詞人謫居牢騷之感或甚其詞者與大寧監圖經云一泉之利足以奔走四方吳蜀之貨盛萃於此監地接朐䏰多瘴土人以茱茰嚥茶飲之可辟嵐氣以其味辛名曰辣茶題名記大寧僻在東南軒冕者寡而封畛之内皆樂善之編氓也夫竹枝者閭閻之細響風俗之大端也四方莫盛於蜀蜀尤盛於䕫杜子美白帝詩云破甑蒸山麥長歌唱竹枝萬州圖經云正月七日鄉市士女渡江南蛾眉磧上作鷄子卜擊小鼓唱竹枝歌開州志云俗重田神男女皆唱竹枝巫山志云琵琶峯下女子皆善吹笛嫁時羣女子治具吹笛唱竹枝詞送之則䕫俗比比如是矣老杜䕫州歌八絶句即所稱遲回問風俗涕泗閔興衰也詩云中巴之東巴東山江水開闢流其間白帝髙為三峽鎮䕫州險過百牢闗白帝䕫州各異城蜀江楚峽混殊名英雄割據非天意霸主并吞在物情赤甲白鹽俱刺天閭閻繚繞接山巔楓林橘樹丹青合複道重樓錦繡懸瀼東瀼西一萬家江北江南春冬花背飛鶴子遺瓊蘂相趂鳬雛入蔣芽東屯稻畦一百頃北有澗水通青苗晴浴狎鷗分處處雨隨神女下朝朝蜀麻吳鹽自古通萬斛之舟行若風長年三老長歌裏白晝攤錢髙浪中閬風𤣥圃與蓬壺中有髙唐天下無借問䕫州壓何處峽門江腹擁城隅武侯祠堂不可忘中有松栢參天長干戈滿地客愁破雲日如火炎天凉劉禹錫竹枝詞九首序云四方之歌異音而同樂嵗正月余見建平里中兒聯歌竹枝吹短笛擊鼓以赴節歌者揚袂睢舞以曲多為賢聆其音中黄鐘之羽卒章激訐如吳聲雖傖獰不可分而含思宛轉有淇澳之豔昔屈原居沅湘間其民迎神詞多鄙陋乃為作九歌到於今荆楚歌舞之故余亦作竹枝九篇俾善歌者颺之附於末俾後之聽巴歈者知變風之自焉其詩云白帝城頭春草生白鹽山下蜀江清南人上來歌一曲北人陌上動鄉情山桃紅花滿上頭蜀江春水拍山流花紅易衰似郎意水流無限似儂愁江上朱樓新雨晴瀼西春水縠紋生橋東橋西好楊栁人來人去唱歌行日出三竿春霧消江頭蜀客駐蘭橈憑寄狂夫書一紙住在成都萬里橋兩㟁山花似雪開家家春酒滿銀杯昭君坊中多女伴永安宫外踏青來城西門前灎澦堆年年波浪不能摧懊恨人心不如古少時東去復西來瞿唐嘈嘈十二灘人言道路古來難長恨人心不如水等閒平地起波瀾巫峽蒼蒼烟雨時清猿啼在最髙枝箇裏愁人腸自斷由來不是此聲悲山上層層桃李花雲間煙火是人家銀釧金釵看負水長刀短笠去燒畬蘇子由竹枝詞云舟行千里不至楚忽聞竹枝皆楚語楚言啁唽安可分江中明月多風露扁舟日落駐平沙茅屋竹籬三四家連舂竝汲各無語齊唱竹枝如有嗟可憐楚人足悲訴嵗樂年豐爾何苦釣魚長江江水深耕田種麥畏狼虎俚人風俗非中原處子不嫁如等閒雙鬟垂頂髮已白負水採薪長苦艱上山採薪多荆棘負水入溪波浪黒天寒斫木手如龜水重還家足無力山深瘴暖霜露乾夜長無衣猶苦寒平生有似麋與鹿一旦白髪已百年江上乗舟何處客列肆喧嘩占平磧逺來忽去不記州罷市歸船不相識去家千里未能歸忽聽長歌皆慘悽空船獨宿無與語月滿長江歸路迷路迷鄉思𣺌何極長怨歌聲苦凄急不知歌者樂與悲逺客乍聞皆掩泣予以萬厯壬子嵗再過䕫門亦作竹枝詞九首詠之聊以見今昔之感而行路之難也詩云相公泉眼小於錢門外江流在眼前青鞵素足朝行汲來往人看似水仙早看東南暮看西蜀天只怕上頭低東邊日出純無用雲暗上頭三尺泥赤甲白鹽髙刺天東屯相接草堂邊杜陵老叟是何物口裏吟詩來課田君居北井妾南沱對面相看隔路多須趂漁舟過急峽還隨鳥翼上斜坡丞相行師說有神陣圖開處畫圖新新嵗踏青來磧上誰家潔白勝於人刺花黄白鬬妖嬌香氣聞過七里饒刺似儂針花似錦鬢邊様作手中挑吳船越艑富錢財銕鎻横江擅不開販鹽惡少截闗去不識瞿塘灧澦堆今日峰髙雲束腰平平一掌是明朝朝來出門又如是儂是好言郎莫焦君莫畏途途不危世途回首一看時人心屈曲如朐䏰瘴氣衝人人不知已上䕫州遵義圖經云其俗敦龎淳固以耕植為業鮮相侵犯天資忠順悉慕華風元史地里志云夷夏雜處遵文教守禮法夷椎髻披氊以射獵伐山為業信巫鬼好詛盟方輿勝覽云累世為婚姻以銅器氊刀弩矢為禮燕樂以鑼鼓横笛歌舞為樂㑹聚貴漢服出入負刀弩交易與華人不侵此亦屬縣之大較也蜀郡守李冰去其地殊逺闔郡嚴祀之以六月二十四日誕唐經畧安撫趙延之按部終於壁山亦遥祀焉以七月十二日誕真安州俗以元宵為年禮天神下享嵗飯尚與華别已上遵義岑參招北客文其東則大江沄沄下絶地垠百谷相吞出於荆門突怒吼劃附於太白渤湃硼砰㑹於滄􅈚跳噴浩淼上濺飛鳥蹙縮盤渦下漩黿鼉三峽兩壁亂峰如㦸槎枒屹崪􅐓洞劃拆髙干天霓雲外水積盡日無光其下黒窄瞿塘無底淺處萬尺啼猿哀哀腸斷過客復有千嵗老蛟能變其身好飲人血化為婦人􅃷服靚粧逰於水濵五月之間白帝之下洪濤塞峽不見灧澦翻天蹙地震吼雷怒亦有行舟突然而去人未及顧棹未及舉瞥見陽臺不辨雲雨千里一歇日未亭午須㬰之間黒風暴起拔樹震山石走沙飛波騰浪翻舟子失據摧檣折竿漩入九泉沒而不還支體糜散蕩入石間水族呀呀撥剌争飡蜀之東兮不可以往北客歸去來兮蜀中廣記卷五十七
