body:
  text: 蜀中廣記卷二十六明曹學佺撰名勝記第二十六川北道保寧府三劒州漢陽山州之主山也武功康海德涵劒州重陽亭記所云頫枕聞溪前對漢陽是矣碑目云劒州石柱文晉太元十八年刻東園聞泉賦唐貞元中蘓洪之刻開元寺重修中和極樂院銘大順三年劉崇望記宣詔亭碑蜀天成四年四月一日記宋髙宗籍田手詔碑皆治内之琳琅也碑目重陽亭大中八年太守蔣公侑始建李商隱序而銘之石刻在郡東山之陽志云東南一里東山又名鶴鳴山上有磨崕顔書元結中興頌蔣侑重陽亭在焉李義山記略侯講天子意三年大理乃大鏟險道緄石見土其平可容考工車四軌建為南北亭以便勞餞又亭東山號曰重陽以醉風日南北經貫若出平地無有噫嘻侯姓蔣氏名侑銘曰仁之為道隆磊英傑天簡其勞羨以事物惟君之缺撮取不窮有如武庫蔣之有世以仁為歸伯氏之宜仲氏之思厥弟承之䋲而不䊵以令為侯天子之德汝侯為理劒有盈昃君南臣北父坐子伏飲牛漚菅田訟以直市正獄清謁歸告休朝雨滂滂濕其帩頭民樂以康願有顯庸侯作南亭北亭是雙至于東山乃三其功摧險為夷大石是矼亦既三年民走乞留伯氏南梁重弓二矛古有魯衞惟我之曹惟仁之歸有世在下其攄其超尾馬鬛馬惟蔣之融由唐龎嘏惟是亭銘得其麤且大中八年九月一日太學博士河内李商隱撰宋閬州通判吳師孟記略東山一峰特竦千仭衆小山迤邐卑附如奔走如侍從茂林蒼崕煙靄蒙密有一亭焉冠於山椒碧瓦鱗差朱欄霞明長溪清潯流影不去乃唐刺史蔣侑所建重陽亭李商隱序而銘之者也權知州軍郭子臯題其碑後曰李義山記重陽亭曰作亭東山以醉風日而不記名亭之因予讀張平子西京賦有云集重陽之清澄釋云上為陽下為陰清澄亦為隂則斯亭也上據髙巘下瞰澄溪蔣公名亭之意其得之於此耶釋碑以告來者元豐六年題又康德涵記以為亭畔有石刻古重陽亭四字宋張珖筆按東山即卧龍山寰宇記卧龍山在縣東二里盤圍州市髙百丈其上為九龍山髙三百丈唐天寳六年敇改龍祠山山上曾置九龍祠也州北為故壘山益州記云山有姜維拒鍾㑹故壘其山峭壁俯臨絶澗又二十里即劒門關棧閣相望顔師古曰棧即閣也按史記蔡澤謂范雎曰今君相秦計不下席坐制諸侯棧道千里通于蜀漢華陽國志云諸葛亮相蜀鑿石架空始為飛閣以通行道如此則棧閣為二矣蜀漢以前曰石牛道史記秦欲伐蜀而不知道乃作五石牛以金置尾下言能糞金以遺蜀蜀王負力而貪使五丁開道引之秦因使張儀司馬錯尋路滅蜀唐李逺五丁力士開蜀門賦云在昔褒斜未通荒僰異域物産難究封疆罕測秦王將欲廣其南敓其北張儀因度其勢量其力假牛之計斯設饋女之功是克蜀王乃命力士闢髙山貪功饕餮忘情險難捫峰巒於日側扶虺蜮於雲間將以砥嶃崪等躋攀俄而白日蕩搖𤣥天忽霍鬼哭神怨風號霧廓怒髪森植雄心震躍灑珠汗以雹散瞪星眸而電落將欲斷煙靄排嵓崿謂巨靈之所拓蹂重林迴絶壑疑夏后之所鑿吁可畏哉江標峻棧之形呀然地裂闕鬭髙峰之色騞若天開已而後患方啓前心莫遂道路無阻關梁鮮備五丁死而蠻黨移一逕通而秦人至也輿地廣記曰石牛道者山有小石門穿山通道六丈餘漢永平中司𨽻楊厥又鑿而廣之諸葛孔明以大劒至此有隘束之稱乃立劒門縣復于閣道置尉以守之常璩云閣道三十里至險有閣尉桑下兵民也晉書李特入蜀至劒閣顧盻險阻曰劉禪有此地而面縳于人豈非庸才耶隋置閣之地皆有關官而于劒閣獨未置關至唐始置劒門關後又置大劒戍小劒戍五代董璋遣兵扼劒門關又為七砦按圖經云關官許令直受頒降詔赦亦許直行申發文字聖節月旦亦有表疏異時訓飭關吏至親洒宸翰所以重設險也周地圖云大劒山亦曰梁山山海經髙梁之山其上多堊其下多砥礪其木多桃枝鈎端有草焉狀如葵而赤華實白跗可以走馬王隱晉書張載隨父收入蜀作劍閣銘益州刺史張敏見其文乃表天子刻石於劒閣焉又有小劒山在西北三十里故此為大劒崔鴻十六國春秋苻堅使楊安伐蜀其將徐成破二劒是也東連莎鼻西接綿州凡二百三十一里故左太沖云緣以劒閣矣碑目云劒閣有魏太尉鄧公神廟記唐劒州刺史邢冊題又鄧衞聖侯碑唐刺史郭淮立石又有唐李復撰劒閣碑唐魯叔明劒門記貞元二年張允書唐劒門制置記廣明元年立俱在棄繻亭南百步寰宇記云隋始州銘在劒門縣二十里許有古州基自縣至彼攀木緣壁至此稍平一豐碑字名磨滅開皇三年李德林文土人謂之劒門縣葢隋時以此為始州也唐書元和元年令狐楚賀收劒門表云臣得上都進奏院官髙振報嚴礪下告捷官嚴公貺奏正月二十三日收復劒門破賊五千斬偽授劒州刺史武德昭訖碑目云唐韋表微劒閣銘在報國寺靈泉側昔唐僖宗巡幸至此有微恙飲其泉頓愈因名為報國靈泉今有石刻存焉又云唐清義何氏古碑在劒門縣登髙臺光宅中建所載有名幕者生四子孝弟義遜家八十口不異居儀鳯二年敇賜清義門又云劒門有修關石刻天成五年立又有五代敇牒甚多皆天成長興廣政間刻方輿勝覽云有玉女臺在大劒絶頂峭壁千仞下瞰古道行人如蟻有小石刻云玉女煉丹之所又有仙女觀圖經云在北崕頂唐先天二年置去觀一里渡仙女橋有煉丹臺岩畔有仙女影近代以來改為禪院有誌公殿劉竢記云劒閣之下有壽聖寺在石壁之西偏由益昌道中望之隱隱如行僧頂伽㡌毎秋時出或見光景陸㳺劒南詩藁云劒門東石壁間影有若僧負杖者杖端彷彿有刀尺拂子狀有梁山寺産茶亦為蜀中竒品東坡南行録詩有飛簷如劒寺之句其註云出劒門東望有一寺山巔樓閣隱隱可見有一二碑皆磨滅政唐碑也有龍嵓洞穴幽䆳雨雪亝小説云王建為盜朝廷捕之急逃於劒門巨石穴中即此洞口宋人隸書龍岩二字有思賢樓在水門上畫張孟陽李太白杜子美柳子厚像有文熖堂本記云按劒門題詩以太白子美為重而世未有並祠之者㑹從李參預壁所得所賜阜陵御書蜀道難又從李左史得趙忠定汝愚大書劒門詩因建祠刻二詩于側榜其堂曰文熖取韓退之詩語也按晉張載劒閣銘云巖巖梁山積石峩峩逺屬荆衡近綴岷嶓南通卭僰北達褒斜狹過彭碣髙踰嵩華惟蜀之門作固作鎮是曰劒閣壁立千仭窮地之險極路之峻世濁則逆道清斯順閉由往漢開自有晉秦得百二并吞諸侯齊得十二田生獻籌矧兹狹隘土之外區一人荷㦸萬夫趦趄形勝之地匪親勿居昔在武侯中流而喜山河之固見屈吳起興實在德險亦難恃洞庭孟門二國不祀自古迄今天命不易憑阻作昬鮮不敗績公孫既沒劉氏銜璧覆車之軌無或重跡勒銘山阿敢告梁益柳宗元劒閣銘曰井絡坤垠時以饒足喋血誓士𤣥機在握分命貔貅陳為犄角右逾崛山左直劒門攻出九地上披重雲攀天蹈空夷視阻艱破裂層壘殄殱羣頑内獲固圉外臨平原天兵徐驅卒乗嘽嘽大憝囚戮戎夏咸歡帝圖厥功惟梁是先開國進位南服于藩邦之清夷人以完安銘功鑒亂永代是觀歐陽詹劒門棧道銘云天覆地燾本亦備設大象難全或漏或闕損多益寡聖賢代工被雖有闕與無闕同惟北曰秦惟南則蜀地闕其間紳維不續斗起斷岸屹為兩區秦人路絶蜀火煙孤天實不通賢斯有造鑚堅剡勁無蹊以道若川匪舟若陸非車縁危轉虛步驟交如構雖在功存亦由德項怫劉怒從完以踣隋落我榮自顛而植地非革勢材不易林踣植之致惠怨之心勿謂斯道不常勿謂斯道可久禮不以禮可有而無恭不以恭可無而有創之之意如彼固之之理若兹彼知不易兹而易知勒銘道左其同我思李文饒集劒門銘註云劒門當中有一岑峻嶺横峙望若蕭屏此一峰最奇而説者未嘗及也故銘云羣山西來波積雲屯地險所會斯為蜀門層岑峻壁森若戈㦸萬壑奔東雙飛髙闕翠嶺中横黯然黛色樹若雄屏以衞王國梁張悰蜀道難詩云梁山鎮地險積石阻雲端深谷下寥廓層巖上鬱盤飛梁駕絶嶺棧道接危巒攬轡獨長息方知斯路難唐𤣥宗巡狩言歸駐蹕劒門詩云劒閣横空峻鸞輿出狩回翠屏千仭合丹嶂五丁開灌木縈旗轉仙雲拂馬來乗時方在德嗟爾勒銘才王勃普安建陰題壁云江漢深無極梁岷不可攀山川雲霧裏遊子㡬時還盧照隣大劒送别劉右史云金碧禺山逺關梁蜀道難相逢屬晩歳相送動征鞍地咽綿川泠雲凝劒閣寒倘逢忠孝所為道憶長安李頎送張諲入蜀云出門便為客惘然悲徒御四海維一身茫茫欲何去經山復歴水百恨將千慮劒閣望梁州是君斷腸處孤雲傷客心落日感君深夢裏蒹葭渚天邉橘柚林蜀江流不測蜀路險難尋木有相思號猿多愁苦音莫向禺山隱禺山地非近故鄉可歸來眼見芳菲盡岑參入劒門寄杜楊二郎中云不知造化初此山誰開坼雙崕倚天立萬仭從地劈雲飛不到頂鳥去難過壁速駕畏巖傾單行愁路窄平明地仍黑亭午日暫赤凜凜三伏寒巉巉五丁迹與時忽開閉作固或順逆磅礴跨岷峨巍蟠限蠻貊星當觜參分地處西南僻􅈝覺煙景殊杳將華夏隔劉氏昔顛覆公孫曾敗績始知德不修恃此險何益相公總師旅逺近罷金革杜母來何遲蜀人應更惜暫回丹青慮少用開濟策二友華省郎俱為幕中客良籌佐戎律精理皆碩畫髙文出詩騷奥學窮討賾聖朝無外戶寰宇被德澤四海今一家徒然劒門石杜甫劒門詩云惟天有設險劒門天下壯連山抱西南石角皆北向兩崖崇墉倚刻畫城郭狀一夫怒臨關百萬未可傍珠玉走中原岷峨氣悽愴三皇五帝前雞犬各相放後王尚柔逺職貢道已喪至今英雄人髙視見霸王并吞與割據極力不相讓吾將罪真宰意欲鏟疊嶂恐此復偶然臨風黙惆悵王維送崔五太守云長安厩吏來到門朱文露網動行軒黄花縣西九折坂玉樹宫南五丈原褒斜谷中不容幰唯有白雲當露冕子午山裏杜鵑啼嘉陵水頭行客飯劒門忽斷蜀川開萬井雙流滿眼來露中逺樹刀州出天際澄江巴字迴使君年紀三十餘少年白晳専城居欲持畫省郎官筆回與臨卭父老書李白蜀道難云噫吁戲危乎髙哉蜀道之難難于上青天蠶叢及魚鳬開國何茫然爾來四萬八千歳不與秦塞通人烟西當太白有鳥道可以横絶峨眉巔地崩山摧壯士死然後天梯石棧相鉤連上有六龍回日之髙標下有衝波逆折之迴川黄鶴之飛尚不得過猿猱欲度愁攀縁青泥何盤盤百步九折縈巖巒捫參歴井仰脇息以手撫膺坐長嘆問君西逰何時還畏途巉巗不可攀但見悲鳥號古木雄飛雌從繞林間又聞子規啼夜月愁空山蜀道之難難于上青天使人聽此凋朱顔連峰去天不盈尺枯松倒挂倚絶壁飛湍瀑流爭喧豗奔崖轉石萬壑雷其險也如此嗟爾逺道之人胡為乎來哉劒閣崢嶸而崔嵬一夫當關萬夫莫開所守或匪親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家蜀道之難難于上青天側身西望長咨嗟孫逖送靳十五侍御使蜀云天使出霜臺行人擇吏才傳車春色送離興夕陽催驛遶巴江轉關迎劒道開西南一何幸前後二龍來張喬送蜀客云劒閣縁空去西南第㡬州丹霄行客語明月杜鵑愁露帶山花落雲隨野水流相如曾醉地莫滯少年逰李端送鄭宥入蜀迎覲云寧親西陟險君去異王陽在世誰非客還家即是鄉劒門千轉盡巴字一支長請語愁猿道無煩促淚行李德裕題劒門云奇峰百仭懸清眺出嵐烟逈若戈回日髙疑劒倚天參差霞壁聳合沓翠屏連想是三刀夢森然在目前戎昱入劒門云劒門兵革後萬事盡堪悲鳥䑕無巢宂兒童話别離山川同昔日荆棘是今時征戰何年定家家有畫旗許棠送張員外西川從事云為郎不入朝自是赴嘉招豸角初離首金章已在腰劒横陰緑野棧響近丹霄迎驛應相續懸愁去路遙顧非熊送李廊侍御赴劒南云鳥道見狼烟元戎正急賢圖書借朋友吟詠入戈鋋山色城池近江聲鼓角連不應誇戰勝知在檄蠻篇李商隱題劒門寄上西蜀司徒杜公云峭壁横空限一隅劃開元氣建洪樞梯航百貨通邦計鍵閉諸蠻屏帝都西蹙犬戎威北狄南吞荆郢制東吳千年管鑰誰鎔範只自先天造化爐楊凝送客入蜀云劒閣迢迢夢想間行人歸路繞梁山明朝騎馬搖鞭去秋雨槐花子午闗于邵送穆司法赴劒亭序云决曹椽穆侯理行歸于劒十月寒矣艱哉是行休於嘉陵之陽日與樵牧為伍而吾子言涉江水至於室廬告軷之期不逺千里然則取諸羽翮擊彼風水時之來也鳴可驚人而愛親之道敬養為切安得擇仕而以三語為屈哉東江劒門又足助興地氣初閉河風稍嚴青𡨕為空黄落向盡感物論别者庶存乎歌詩其二云人謂穆子通於理者也褎然作掾榮問所致故隴之下清風可挹人能盡驩邵真知勉矣頃以令弟仕于劒太夫人就養適乎逺雖迫王事心馳倚閣朝辭府庭夕次郊郭不俟髙駕拂衣而南羣公錫類詎敢留心各以壺酒垂楊好陰金秋始交火雲猶赫指日獻壽在原增光送君遂行千萬無盡也劍門東南有七盤嶺㠯山曲折而七盤也方輿云武連縣在七盤山上按武連縣舊為武功縣故郭璞䜟云縣路翠武功貴縣路青武功榮其後青城何琰宰是邑遂刻石于縣門志云逍遙樓廢址在武連舊縣唐顔真卿書扁三大字碑刻在焉元改武連縣學為魏公書院以唐魏徴所生之地也學正王惠為之記有靈泉劒南詩藁云過武連縣安國院有二泉傳云唐僖宗幸蜀至此飲之而甘賜名靈泉其詩云滴瀝珠璣翠壁間異時曾得奉龍顔即此有都竹水寰宇記都竹水從武連縣流入普安縣南流至掌天山下入閬州益州記云掌天山在臨津縣山多柘堪為良弓雖檿絲燕角不能勝也志云柘溪水出柘谷山多生柘木有下辯城寰宇記廢下辯城即臨小潼水李膺益州記云宋元嘉二十九年以武都流人于下辯縣安置大明二年改為武連縣寰宇記小潼津發源京兆山分水嶺謂之京兆水也本志云武連縣九龍山有洞石壁如屋内有九井又云羣仙洞在武連縣洞中無他物惟石窟數間如堂宇有水自西向東不知所來山下長老云曾有數人耘苗見洞中聲樂嘹亮密覘於洞口見列坐如天人狀奏樂者無數欲進前觀之即不見自後人數見焉因名為羣仙洞按武連下辯二縣皆因秦人僑置者劒之西南有黄安縣晉置宋改為普成縣縣在跨鶴山一名駕空山山腹有紫霄觀崕上有僧懷素草書多缺落不可辨䟦云右懷素草字絳臺潘氏載入法帖誤綴張長史書末今潘氏墨本不可多得因刋于駕空山崖石與伯英草聖並列共傳永久隆興元年癸未季冬濃洄野叟識志云城南百二十里有漢王潭在黄安縣之東境上有漢王廟又云普成縣南一里紫霄觀舊名普成晉宋間有李隱君名普成者煉形其間與其弟普露普濟白日昇去是普成縣以仙名也縣傍有石麒麟每天旱土人諷經取水洗之即雨又南八十里有義津即古臨津縣地碑目唐盧照鄰悟本寺記在故臨津縣悟本寺内梓潼縣水經曰梓潼水出其縣北界西南入于涪註云故廣漢郡也公孫述改為梓潼郡昭烈嘉霍峻守葭萌之功又分廣漢以北别為梓潼郡以峻為守焉王勃梓潼南江泛舟序云咸亨二年六月癸巳梓潼縣令韋君以清湛幽凝鎮流靖俗境内無事艤舟於江潭縱觀於邱壑𣺌然有山林陂澤之思遂長懷悠想周覽極睇思其人則吕望藉茅於磻溪之隂屈平製芰於涔陽之浦覺瀛洲方丈森然在目於是間以投壺讐以妙論亦有嘉餚㫖酒鳴絃朗笛以補尋幽之致焉預於斯者若干人唐書天寳之亂左拾遺房琯獨馳蜀路至普安郡謁見𤣥宗與語大恱之即日拜吏部尚書門下平章事復次梓潼寰宇記云明皇過梓潼望見山上有一窟近臣奏云漢司馬相如讀書之窟遂勑名為長卿山志云山上有長卿寺下有漢侍御史李業石闕舊經云前漢侍御史李業葬此遭赤眉亂二闕以臨關俱破壞志又云縣東北有二石闕其一題曰漢沛國相范伯友墓其一題曰漢趙相國雍輔君之墓宋周必大曰予得光武時梓潼扈君墓甎先叙所歴之官末云千秋之闕模脱隸書而非鐫也搜神記云有神姓張名亞道術顯著廟在梓潼𤣥宗幸蜀著靈追封左丞相唐書廣明二年僖宗幸蜀神又見于利州桔栢津封為濟順王親幸其廟解劒以贈神也郡國志云濟順王本張亞子戰死而廟存昔亞子西至長安見姚萇謂曰却後九年君當入蜀若至梓潼七曲山幸當見尋至建元十二年萇隨楊安南伐將至七曲迷道逰騎賈君蒙忽見一鹿馳去逐至廟門鹿自死追騎共剝之有頃萇至悟曰此是張君為我設主客之禮烹食而去按此即世所奉祀梓潼帝君也唐判度支蕭遇和王鐸作張亞子廟詩云青骨祀吴誰讓德紫華居越亦知名未聞一劒傳唐主長擁千山作蜀城斬馬威稜應掃蕩截蛟鋒刃俟昇平鄼侯為國新簫鼔堂上神籌更布兵文同丹淵集出守陵州有祭梓潼神文梓潼又有百神廟在縣南四里咸通十一年盧耽除西川節度時蠻冦圍成都大將軍呉行魯統師過此見斷碑皆古卿相之名黙致禱焉既而王師大捷乾符三年行魯除東川節度遂於路側置百神之廟景福大順間廟遭兵火王氏僣號夢神人求祠宇稱是梓潼百神因重與置又有五婦山在縣北十二里髙四百二十丈按蜀記云梓潼縣有五婦山秦王遺蜀王美女五人蜀王遣五丁迎女至梓潼五丁蹋地大呼驚五女並化為石蜀王築臺而望之不來因名為五婦候臺漢書地里志云梓潼五婦山碑誌存有五婦神廟李膺又云梓潼有鳴湍折碑祠西臨潼水湍迅激流俗呼張湍祠亦呼為石碑祠又有隱劒泉在五丁力士廟西一十步古老云五丁開劒路迎秦女㧞虵山摧五丁與秦女俱斃於此餘劒隱在路傍忽生一泉又云此劒每庚申日現又有蛟龍神祠在縣東十九里兠鍪山上俗呼為兠鍪神古老相傳此神昔用生人祭之不則瘴疾水潦為害張道陵戒之遂絶又有葛山志云梓潼縣西南二十里葛山又名卧龍相傳武侯伐魏駐兵於此見虎豹蛇䖝勢惡自卧草中獸皆俯伏有古碑在此山之景福院蜀中廣記卷二十六
