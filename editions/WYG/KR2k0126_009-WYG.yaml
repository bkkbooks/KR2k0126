body:
  text: 蜀中廣記卷九明曹學佺撰名勝記第九川西道成都府九漢州古語云大旱不旱蜀有廣漢華陽國志所稱蜀之淵府浸以緜雒者也陳子昻為雒縣令張知古頌徳碑云此邦膏腴利在江浸陶翰送孟浩然入蜀序云廣漢城西三十里清江夤緣兩山如劍中有微徑可入岷峨括地志云郡在水南故曰漢陽寰宇記云湔陽故城在州南一里湔陽漢縣以其為湔水之所經矣圖經洛水在治東半里又名沉犀水水性剛宜淬刀與信州葛溪同雒字元從水漢火徳忌水故改從雒蔚宗後漢書曰洛城南每遇隂雨常有哭聲聞於府中和帝時陳寵為太守勅縣宰収葬骸骨哭聲遂絶三國志建安十九年先主攻雒城拔之襄陽馬良書詣諸葛亮曰承雒城已下尊兄配業光國􅅎兆斯見者也圖經雁江在治北半里李膺記云張任與劉璋子循守雒城任勒兵岀於雁橋戰敗即此雁橋東有嚴君平卜處土臺髙數丈宋郭印卜臺記云故老相傳州治形勢南髙而北下多火災真君鑿井廛問上憲七星杓指南方以厭勝之越千百年卜臺既已墮落而井之應輔星者亦多堙塞矣益州記云廣漢郡北一里半有犀橋即白魚水也志云河岀堋口有白魚岀焉在治東十里録異記云漢州赤水有湧泉水脉五六自山下湧出因成大池流三二百步可激碓磑滙為大溪志云治西五里石梯河源亦出堋口河岸甃石如階級有石梯橋下出緇土可代墨又云彌牟河在治西二十五里自灌口經州㑹金堂峽俗謂之三水闗矣常道將云廣漢郡本治繩鄉永和中隂平漢中羗反元初二年移涪後治雒城王莽改曰就都公孫述名曰子同益州以蜀郡廣漢犍為為三蜀土地沃美人士俊乂為一州稱望樂史云漢州有西伍城宋元嘉年於舊伍城立新都國乃于城南别置西伍城焉漢選廣漢太守每重徳髙俊表章禮物殊于諸郡前有趙䕶第五伯魚後有陳寵趙瑤皆公望也唐天寳初房琯以故相為是州有舊竹亭鳴琴其上公去已久而李文饒劉夢得過其地思之不置形於詠歌徳裕詩云流水音長在青霞意不傳獨悲形解後誰聴廣陵絃禹錫和云尚有竹問露永無棋下塵一聞流水曲重憶餐霞人鄭澣和云石室寒颷警孫枝雅器裁坐来山水操絃斷弔餘哀次律于治西鑿有西湖自題云髙流纒峻隅城下緬邱墟决渠信浩蕩潭島成江湖結宇依迴渚水中信可居三伏氣不蒸四達暑自徂同人千里駕鄰國五馬車月出共登舟風生隨所如舉麾指極浦欲極更盤紆繚繞多宛致夜盡情有餘遭亂意不開即理還暫祛安得長晤語使我憂更除杜甫陪王漢州留杜綿州泛房公西湖詩舊相恩追後春池賞不稀闕庭分未到舟楫有光輝豉化蓴絲熟刀鳴鱠縷飛使君雙皂盖灘淺正相依李徳裕月夕遊房太尉西湖詩云丞相鳴琴地何年閒玉徽偶因明月夕重敞故樓扉桃李蹊空在芙蓉客暫依誰憐濟川楫長與夜舟歸又云晩日臨寒渚微風發櫂謳鳯池波自閲魚水運難留亭古思宏棟川長憶夜舟想公髙世志祗似冶城遊劉禹錫和云太尉留琴地時移重可尋徽絃一掩抑風月助登臨榮駐清油騎髙張白雪音祇言酬唱美良史記王箴又云静對烟波夕猶思棟宇清卧龍空有處馴鳥獨忘情顧歩襟期逺參差物象横自宜雕樂石爽氣際青城鄭澣和云木落漢川夜西湖懸玉鈎旌旗還夜次舟楫泛中流目極思前事神交如舊遊瑤琴久已絶松韻息悲秋又云林端落照盡湖上逺風清水榭芝蘭室仙舟魚鳥情人琴久寂寞烟月似平生一泛釣璜處再吟鏘玉聲嚴公貺題漢州西湖詩鳯池才未盡餘思鑿西湖珍木羅修岸氷光映坐隅琴臺今寂寞竹島尚縈紆猶藴濟川志芳名終不渝薛能題漢州西湖詩西湖天下名可以濯吾纓况是攜家賞從妨半驛程嘗茶春味渇斷酒晩懐清盡得幽人趣猶嫌守吏迎重餐逢角暮百中喜詩成坐阻湘江謫誰為話政聲文同題房公湖詩一頃清波四面平宛然唐相舊經營髙秋林木形容老落日樓䑓綵繪明有景可㝷蘭櫂逺無幽不入竹橋横二年所得官居樂肯厭頻來緩帶行陸游題房公西湖詩房公一跌叢衆毁八年漢州為刺史繞城鑿湖一百頃島嶼屈曲三四里蘓轍題房湖詩酒壓郫筒不用酤花傳五老出新圖此行真勝成都尹直為房公百里湖魏了翁題漢州房公樓記略云成都宇文侯鎮廣漢之明年威行惠孚侯度聿修廼作樓於郡之西湖名曰房公於以申懐賢尚徳之意樓故金龜亭縁陂翠㶑横陳夾翼而亭宅于虹橋之左有樓其上端握要㑹矣華父又和宇文漢州乞房樓記詩云房公胷中妙刀尺剪刻玻璃貯寒碧今侯着樓於其上竹色荷光得良覿詩來殷勤問故侯别日雖賖情轉宻因思當年飛盖遊鷗鷺不驚濳鯉出春濃雪絮人影亂秋老雲松半天屹蘇公二十四橋月尚愛西湖風月夕江山好處餘戀繆縱不即人人自即况今簷橑雲與齊激楚髙歌朋友集向來寒乞翻自嗤詩掃黄泥已無迹功名老我後加鞭文字餘人先奪席欲搜萬象供刻畫自有此湖難此筆終當為君記所遊摹寫蒼顔真六一按金龜亭者偽蜀武成三年庚午六月五日癸亥廣漢太守孟彦暉奏西湖有金龜徑寸遊於荷葉之上畫圖以獻故以之名亭也丹淵集云聶侯友仲立漢州學制度宏侈為二蜀之冠當時不知何所得巨石置講堂之後質狀怪偉勢若飛動昔孟氏僣竊苑囿所蓄者皆寧武軍節度使顧璘所進昶既面縳是物亦散落民間余在成都往往見於好事家園館凡自璘許來者一一皆具欵勒此非耳而其完厚瓌詭上下可愛雖到茂灌牛竒章號為好事諒亦未嘗見此者也治平丙午秋余視郡進士試於此旦暮環繞其下歎惜之不足而為之銘其辭曰廣漢學宫後有竒石磥砢一抱嶔崟九尺怒蜃驤首狂龍轉脊拏空將飜壓地欲坼神乳溜腹老苔漬額堅包勁膂潤吐活脉誇殺羽人詠窮墨客敢告存䕶千古怪碧與可又有題漢州王氏林亭詩云短彴踈籬入野扄竹烟松露滿襟清奔湍激險飛寒響弱蔓穿深挂短英惜去更觀曽畫壁記來重注舊題名門前便是紅塵道誰肯同過洗俗纓亦皆韻事也什邡縣寰宇記云什邡本漢舊縣屬廣漢郡舊置在雍齒城今於城北四十步立縣雍齒即漢什邡侯也墓在縣南一里李膺記云雍齒墓髙四丈闊四畆有石麒麟二志云今縣治乃唐紫極觀地也㕔左衛真人墓在焉觀前舊有水西南流名老君洗腸溪真人乃衛元嵩雲笈七籖以為有舊碑刻存矣寰宇記云南陽郡故城在縣西二十三里李膺記云漢中李雄亂蜀遣李夀盡掠漢州五千餘家流寓於此晉太康元年立南陽郡後魏三年廢南陽郡南七里有新婦水故老傳云昔有新婦勤於侍奉負汲水逺不辭氷雪泉為之湧出故曰新婦木流合廉江水志云治北六十里髙境闗闗外即章烙山亦曰章山又曰洛通又曰楊村諸山物産出焉華陽國志謂大姓楊氏之所居矣山有風洞即之氣冷有火洞即之氣熱古老傳云符堅有子避難死於洛通山即此古碑云江水出髙境闗大郎廟前始大放分流十支又云自章山内合五溪而總名洛江出章山分洛江為十河縣之名即從起也華陽國志李氷導水於洛通山志云章山後厓有大冢碑云秦李氷葬所按開山記云什邡公墓化上有升仙臺為李氷飛昇之處古蜀記謂李氷功配夏后升仙在後城化藏衣冠於章山冢中矣方輿勝覽云治西五十里有大蓬山髙崖矗天而立瀑布飛落最為竒觀有保聖院紹興中謝中大蓬山記略曰嘗自紫微度綿水覺佳氣逼人竹木蕭蕭臺殿聳岌松根寒泉流注不竭懸崖萬仞瀑布如線山腰有大小白厓甚竒上有太子宫遺址僅存而事迹不可攷厓下有洞極深邃中有石柱撑之左右映出白龍十三蜿蜒如畫又自西越澗行一里有馬師井捫蘿陟磴至峰頂有石室可坐百人蝙蝠大如鳥所謂扁蝠洞者也北望龍居其狀如偃月有保聖寺唐天福中鏡鍠襌師誅茆之處其曰馬師即馬頭陀與師同時者本志云大蓬山朝雲初起日射圓光於山頂覩佛臺西澗光暈數重作青黄紅緑色稍升象王峰大徑百丈中有黒影彷彿佛像食頃方散山髙百里六月積雪不消國朝明本禪師因名為鎣華山髙僧傳馬祖什邡人志云北郭羅漢寺唐中宗時馬祖出家之處山門右有説法臺臺角有井皆祖所剏勝覽云龍居山在什邡縣有等慈院飛瀑千尺虚亭屹然橋横路轉髙栢擁翠志云龍居寺隋建旁有神龍潭其右為蜀王孟知祥墓也孟昶􅂝花蘂夫人至寺避暑寺僧水觀禪師先一月預知之因賜號為預知焉成都叅軍任愿蜀王廟記云什邡之西行十許里有古佛寺曰南陽宋大明中所建也後周沙汰寺廢隋文帝以皇子秀為蜀王王以暇日獵至廢寺有兔逸入壠中發壠得石像甚巨於是即其舊址復為寺以像寘其中時有進禪師者善水觀王異之從問道得大無碍今寺之左有王祠祠下有泉滙為陂浮於方亭逹出於雒其發源流百許里溉田數十萬頃雖大旱民不告病其為利可謂深且博已即泉之始則進禪師水觀之餘波也李白冷泉亭詩惜彼落日暮愛此寒泉清西暉逐流水蕩漾遊子情空歌望雲月曲盡長松聲志云亭在南陽寺矣徳陽縣地理志云東漢分綿竹置徳陽寰宇記云綿竹縣故城在縣北三十五里李膺益州記云石子頭二十里即故綿竹縣諸葛瞻埋人脚戰處也樊真公徳陽錄略曰邑西南石亭江畔有石亭寺江畔有石亭因以名江晉李特李流軍綿江趙廞遣費逺斷北道屯綿竹之石亭是也徳陽學宫有石版隂陽書缺根因石阜以庭宇跨飲江之鼇黿岌飛簷與鐡柱挿清江之􅞹淪眩古潭之百尺􅇽萬象於瑤崑耿月􅅎以終日湛天容之方春信蒼蒼之非色極深逺而自然疑貝闕與珠宫有玉函之老人予南征其萬里友魚鰕與蛭螾逝將去而反顧託江流以缺首末無顯名其字盈版字勢遒勁似王稚子墓前石闕漢人書法也繹其文意似為石亭而賦或三版四版今存一版斷文矣縣一名旌陽晉太康初許遜為旌陽令屬歳大疫死者十七八遜以神方拯治之符咒所及登時而愈蜀民為之謠曰人無盗竊吏無奸欺我君活人病無能為本志云東闗内有旌陽井許真君浴丹於此其水香冽暑飲尤宜半倚江岸漲減不崩治有三造亭李膺記云秦子勅之舊宅也太守夏侯纂三造門故以為名其宅綿水衝毁僅有餘跡南偏有善果寺晉㤗始中建唐名善寂寺王勃碑記以為梁武帝所建矣寰宇記云縣北五里有鹿頭山自綿州羅江縣來迤邐入縣界古老云昔漢有張鹿頭於此造闗因以為名杜甫鹿頭山詩云鹿頭何亭亭是日慰饑渇連山西南斷俯見千里豁遊子出京華劍門不可越及兹險阻盡始喜原野濶殊方昔三分覊氣曽間發天下今一家雲端失雙闕悠然想揚馬繼起名硉兀有文令人傷何處埋爾骨紆餘脂膏地慘澹豪俠客仗鉞非老臣宣風豈專逹冀公柱石姿論道邦國活斯人亦何幸公鎮踰嵗月其下有龜勝山道塲乃髙崇文破劉闢處初闢據鹿頭關髙與之對壘屯營有神龜由壁門來蹲於牙旗之下公命投之逺磵翌日復至議者以龜介蟲之長介胄斯服蜀有龜城其城是師果為受降之兆乃以龜勝名山立道場焉掌書記鄭宗經大唐乙酉明年六月記本志云治北十里秦中治天下第七治也上應箕水豹王逸少嘗欲遊焉石洞産九節菖蒲秦時韓仲修煉之所此雲笈七籖所載以為其山浮寰宇記云浮中山在縣北三十里益州記云南隂平鄉東有浮中山每芳春遊人登賞謂之迎春岡四面斷絶也録略云縣東南有鄧林禪院按邑人公孫輔記云吾鄉精藍之勝鄧林為第一其地葢起於緜洛之左宛若秦川隴坂髙下起伏北包靈龕南亘旌邑直走於鎣華之東南楓楠柞柏拔地倚天蔚為鄧林東山襟其前江水帶其中川原綺錯雲烟岀沒飛鳥上下農夫耕穫樵牧往來庭户間皆一覽而有也真公以名從大將軍鄧芝而起者非鄧芝欲居徳陽乃遂寧縣綿竹縣綿竹縣漢地理志云紫嵓山綿竹所出有綿水流注謂之綿堰口矣寰宇記云綿竹縣舊屬廣漢郡隋開皇三年徙晉熙郡城改為晉熙縣十八年改為孝水縣以境有姜詩泉焉髙僧傳南武都今之孝水縣也盖縣北三十里紫嵓山極髙大亦謂之綿竹山亦謂之武都山唐吳融綿竹山詩云綿竹東西隅千峰勢相屬崚嶒壓東巴連延羅古蜀方者露圭角尖者鑽箭鏃引者蛾眉彎歛者鳶肩縮尾蟉青蛇盤頸低𤣥兔伏横来突若奔直上森如束歳在作噩年銅梁搖蠆毒相國京兆公九命来作牧我提虎僕毛專奉狼頭纛行府寄精廬開牕對林麓是時重陽後天氣曠清肅兹山昏曉開一一在人目霜空正泬寥濃翠霏撲撲披海出珊瑚貼天堆碧玉俄然隂霾作城郭纔霡霂絶頂已凝雪晃朗開紅旭初疑崑崙下夭矯龍銜燭亦似蓬莱巔金銀臺疊蹙紫霞或旁映綺叚鋪繁縟晩照忽斜籠赤城差斷續又如煮呉鹽萬萬盆初熟又如濯楚練千千匹未軸又如水精宫蛟螭結川瀆又如鍾乳洞電雷開巖谷丹青畫不成造化供難足合有羽衣人飄颻曳烟躅合有五色禽呌嘯含仙曲根雖限劍門穴必通林屋方諸滄海隔欲去憂淪覆羣玉縹緲間未可量徃復何如當此境終朝曠遐瞩往往草檄餘吟哦思幽獨早晩掃欃槍笳鼓迎暢轂休飛霹靂車罷繫蝦蟇木勒銘燕然山萬代垂芳郁然後恣逍遙獨徃羣麋鹿不管安與危不問榮與辱但樂濠梁魚豈怨鍾山鵠紉蘭以圍腰採芝将實腹石􅇃須卧平一任閒雲觸綿竹山有鹿堂致即二十四化之第二化也漢元帝時老子偕張道陵遊此有仙基仙宫古人度世之處李膺記云山崖有隙出神泉若詣者精志則泉流奔湧其信道不篤便清源頓竭也又有庚除致為第六化方輿勝覽云山有二石室三國初有霽雲子者入洞中見樓臺金碧門者呵止之曰子凡骨可亟去不然及禍霽雲子出後再至遂迷路矣武都山有玉妃溪成都耆老傳載妃與五丁同生父母棄之溪後聞呱呱聲就視乃一女五男女即蜀妃男即五丁故華陽國志云武都山精化為美女也山下有嚴真觀乃君平父嚴子晞所剏楊天恵記之甚詳見神仙傳又有君平池古老傳云君平抜宅上昇基䧟而成池武都山有恵淨寺梁太清年建唐貞觀九年寺西院立七佛堂一僧舎王勃為之銘曰武都仙鎮靈虚奥域邑動香城山開淨國澗流百道峰雲五色谷暗藤斜山髙樹逼千楣鶴列萬栱星懸分林搆趾接磴開㕓臨階竹樹遶棟風烟龕前怪石塔下秋泉綠崖疏逕青岑拒室霧道相縈烟房互出葉濃磎淨花深嶂宻鳥度難㝷猨驚易失簷分石竇地絡金沙丹丘抗月碧洞棲霞松開野路桂列山家金爐栢葉寳座蓮花砌因巖曲橋隨峰返果出天厨香来仙苑玉鑄啓曙金鐺照晩谷思鍾長山悲鐸逺閭閻踐勝銅墨髙情聲飛别邑望動專城懸金道肆刻石山楹千載之後吁嗟令名又有響應寺在馬跪溪相傳隋蜀王秀妃患心疾召寺僧法進不往王怒親往加罪之所乗馬至溪邉而自跪若為之請者因名馬跪溪髙僧傳唐武徳初釋世瑜獨住此山有四猿供給山果等食初惟一泉後有三泉流出於下俗謂之三溪河也亦名射水河相傳蜀王秀營軍於此乏水王乃築臺望三溪山下發三矢有三泉從石竇出遂成河流又有馬尾河注之河出無為山宋淳熙間有碑云羣雁排空成無為二字因名有河水出焉流如馬尾因名馬尾河也志云錦竹故城有二其一為宋時築在郭外西南隅近龍頭橋即湖橋也魏華父湖橋記曰知縣宇文西叔峒度地飛鳬門外瀦為湖周廣六十有五丈伐石為四矼矼崇四尺架橋其上而屋之衡從合十丈以通南北車徒之往来盖紹定四年碑也其一為漢城即徳陽之西界華陽國志稱汎鄉有孝子姜詩田地宅是矣姜詩廟曰孝感鄭少微記略云漢州徳陽縣西北四十里有鎮東漢姜詩故宅在焉故號姜詩鎮治平中知綿竹縣事郭震謂士游行甚髙宜諱其名白部刺史易之鎮遂號孝泉然廟猶因俗為呼於是開州司理叅軍白夀朋與鄉之士民列於縣曰姜詩夫婦事跡最詳於漢史舎側湧泉至今不絶民賴灌溉或遇旱厲禱焉輒應其厚俗利人之功居多廟額獨未䝉賜敢請縣乃上之有㫖賜名孝感命至之日稚耋夾塗載舞踴躍争觀為人子若夫者咸欲詩之行在其身也為人女若婦者咸欲龎氏之行在其身也為人父母若舅姑者咸願有子如詩有女有婦如龎氏也則又相與詫於他州之民曰吾鄉雖僻幽而姜詩夫婦乃吾東家子也爾州曽有是耶方且侈上之賜以永稱厥名云爾綿州元和郡縣志云按州城理漢涪縣也去成都三百五十里依山作州東據天池西臨涪水形如北斗卧龍伏焉梁天監中張齊賢為太守更造樓櫓却敵有東西門東門久塞富樂山氣所衝門開則喪亂宋元嘉初太守王懐素開之果致喪敗爾後復塞輿地碑目云漢刺史李頓碣在綿州又云州治十賢堂繪涪翁龎統蒋琬杜微尹黙李白陳該蘇易簡王仲華歐陽修共十人又云綿州通判㕔有伐木堂鮮于子駿立文與可記陸務觀劍南詩藁云姜楚公畫鷹在綿州録叅㕔杜少陵有詩輿地紀勝云六一堂在司戸㕔舊為推官㕔昔歐陽文忠父鄭公觀嘗為推官公實生此地方輿勝覽云越王樓在城西北唐顯慶中太宗子越王貞為刺史建杜甫詩綿州州府何磊落顯慶年中越王作孤城西北起髙樓碧瓦朱甍照城郭樓下長江百丈清山頭落日半輪明君王舊迹今人賞轉見千秋萬古情刺史喬琳詩三蜀澄清郡政閒登樓􅂝酌日躋攀頓覺胸懐無俗事廻看掌握是人寰灘聲曲折涪州水雲影低銜富樂山行雁南飛似鄉信忽然西笑向秦闗唐詩紀事王鐸與綿州守于興宗登越王樓以詩寄朝士云謝眺題詩處危樓壓郡城雨餘江水碧雲斷雪山明錦繡来仙境風謠入帝京恨無青玉案何以報髙情刺史樊紹述越王樓詩序云綿之城帝猲掀明威瀰石硝馳涪瀨左陵淩紅䄺簮天地送行癸壬且掬跎踢於西北蟠紅頠青越王貞故為樓重軒疊飛門明牕䝉傘蹇蹇予始登謂日月昏曉可窺其背雷電合風雲遘霜辛露酸星辰介行神鬼變化草木顯繡髻銜蓑芰皆可察極既縈視其江帶又極視其土岡斷暴逺近山􅕑􅕑若閿之東皇天原開見荆山我其黄河瞷然為曲直淚雨落不可掩因口其心曰無害若其日杲星星過歸尚悲不能解重為詩以釋益不可顧謂郡中諸君能無有意綴以華艶其念蓄云詩曰危樓倚天門如星辰宫榱薄龍虎怪洄洄繞雷風徂秋試登臨大靄屯喬空不見西北路老懐益凋窮石瀨薄濺濺土山杳穹穹昔人愴為逝所適酡紅顔今我兹之来猶校成歳功輟田植科畆遊圃歌芳叢地財無聚厚人室安取豐既乏富庶能千萬慚文翁勝覽云江樓枕城之東隅上有唐時江亭記杜甫送嚴侍郎到綿州同登杜使君江樓宴詩野興每難盡江樓延賞心歸朝送使節落景惜登臨稍稍烟集渚微微風動襟重􅊑依淺瀨輕鳥度層隂檻峻背幽谷牕虚交茂林燈光散逺近月彩静髙深城擁朝来客天横醉後參窮途衰謝意苦調短長吟此㑹共能㡬諸孫賢至今不勞朱户閉自待白河沉文苑英華王勃綿州北亭羣公宴序云下官人間獨傲海内少徒志不屈於王侯身不縛於塵俗孤吟五嶽長嘯三山昔往東呉已有梁鴻之志今来西蜀非無張載之懐况乎踐名場攜勝友風月無㡬琴酒俄乖半面十年一别千里何少府故人攀桂撫金石而論心韓法曹新餞班荆臨江湖而執手離亭北望烟霞生故國之悲别館南開風雨積他鄉之思於時蒼雲寡色白日無光沙塵起而桂浦昏鳬雁下而蘆洲晩傍鄰蒼野霜飄橘柚之園斜枕碧潭日斷芙蓉之水既而登臨惜别驂駕少留季札何人親逄贈縞子荆不慜思掛傾城惆悵北梁揖琴臺而漸間徘徊東道思錦署以行遙嗟乎人事乖矣江山逺矣請命離前之筆為題别後之資五際飛文想羣公之不讓一言有贈知下筆之有神盧照鄰綿州官池贈别詩云輶軒遵上國仙珮下靈闗樽酒方無地聫綣喜暫攀離言欲贈䇿髙辯正連環野徑浮雲斷荒池春草斑殘花落古樹度鳥入澄灣欲叙他鄉别幽谷有綿蠻本志云巴字水在治西四里涪水自北經城西而析為二安水自東迤邐繞城東南滙之芙蓉溪成一巴字每江漲登山望之㸃畫天然甚肖也芙蓉溪即東津杜甫觀打魚歌是此處子美又有巴西驛亭觀江漲呈竇使君詩云宿雨南江漲波濤亂逺峰孤亭凌噴薄萬井逼舂容霄漢愁髙鳥泥沙困老龍天邉同客舎攜我豁心胸唐庚芙蓉溪詩云人間八月秋霜嚴芙蓉溪上春酣酣人間二月春光好溪上芙蓉迹如掃小兒造化誰能窮㡬回枯枿還芳叢只應人老不復少有酒且發衰顔紅李膺益州記云金山在涪縣東五十步東臨澗水光彩映川長七八里每夏淹雨金粟散出州東五里有靈山郡國志云昔有神女於此𢷬衣山南絶巖有方石明瑩謂之玉女𢷬練砧也周地圖記云富樂山髙廣為衆山之秀登之望見州内勝覽云在巴西縣東五里劉先主入蜀劉璋延於此山望見蜀之全盛飲酒樂故得是名又有石盆山迎真觀卧佛院洞靈觀俱在此山之麓雍有容詩當時四海一炎劉至此已堪悲失脚出語翻為樂國想是人止可徧方著大漢曽封龍凖翁聞道山河錦繡中安能鬱鬱久居此睥睨三秦日欲東唐子西詩富樂之名誰所留建安年中劉豫州擁兵入蜀萬􅆛貅孱璋送國来迎頭軍中釃酒椎千牛肉如巴山酒如涪酒酣握手登髙丘極目紫芋蹲春疇冉木震富樂山移文云星車熒熒駕風鞭霆出霧入雲回翔太清是為古富樂之英方劉豫州置酒髙㑹於吾山也升髙延佇虎視徜徉沃野綿亘鬱乎蒼蒼曰冨樂哉有徳易王其興勃然唐髙宗顯慶中建山上奠簡江臯瑞氣凝於翠嶺祥光燭於丹霄武宗㑹昌中投金鮫室沉璧龍淵雲鶴降以飄颻天光舞而蹁蹮石刻長存於今屹然碑目云富樂山有唐乾符間王助碑又有集古堂淳熙間史祁建悉舉近郭仆碑植於堂之左右而繪像於堂中渭川王讓記略云西絶涪水有山曰栢下諸葛公營壘在焉而喬木婆娑者蒋公琰萬秋之宅鍾士季之所嘗致敬也漢書郭玉傳涪翁者左綿人肥遯不出姓名所居處為漁父村玉從之受易焉本志州南四里有巖即涪翁山也宋别駕楊叔蘭書涪翁山三字刻於石併刻弔涪翁詞益州記云猿門山在涪縣之北二十五里上多猿其峰磔竪如門故曰猿門寰宇記云鹽泉縣漢涪縣地後魏於此置魏城縣唐武徳二年分魏城置鹽泉縣以地有鹽井民得採漉為四方賈售之地蜀都賦云家有鹽泉之井取此為名羅隠魏城逄故人詩一年兩渡錦江遊前值東風後值秋芳草有情皆礙馬好雲無處不遮樓山将别恨和心斷水帶離聲入夢流今日因君試回首淡烟喬木隔綿州成都文類魏城縣南五里有長嶺髙凉泉出焉其始至也則風於一山玉留潺湲衆籟成吟笙竽匪禁登之恍然如謁羣仙心意自殊若與道俱横石如隕匪塹匪鑿傍架絶壁根山不落上摩層霄屹然岧岧其間可俯而入焉則空峒博敞如堂如室苔駮古壮竒怪生妍旋開混元益偉造物然則始知乎山林獨得之士一邱自足窮年忘歸亦何必際耕夫於清泠送白日於昧谷然後為異也傍有舊銘隠磷餘字即久視元年崔司業融守涖兹邑髙禖致禱刻石斯存矣元和元年侍御史李汭記州南百里界於潼川四山如城涪水經乎其中漢設涪城縣於此三國志昭烈自葭萌襲蜀進據涪城是也杜甫涪城縣香積寺官閣詩云寺下春江深不流山腰官閣迥添愁含風翠壁孤雲細背日丹楓萬木稠小院回廊春寂寂浴鳬飛鷺晩悠悠諸天合在藤蘿外昏黒應須到上頭按李雄春秋巴蜀謠曰譙登治涪城文石在巴西張羅守合水巴氐那得前是涪城與巴西向為犄角之地予以萬厯壬子陽月過此有羅漢寺是舊縣址羅江縣寰宇記曰縣本廣漢涪地晉於梓潼水尾萬安故城置萬安縣李雄之亂移就潺亭今縣城是也註水經曰潺水出潺山厯潺亭而下注涪水今縣北二里有潺亭故址舊經云有唐開元二十四年立潺亭碑文字磨滅尚有潺亭二字碑隂有宋邑令太常博士宋彦嘉書云嘉祐三年予始署邑事明年訪古迹而潺亭廟有遺址存焉東南百步有碑仆於民田中其潺亭二字亦不復覩稽其址厯數百年廟與碑俱廢是神之祀於民者不亦闕乎且俟因官之美材而復廟貎未㡬里民請自修之次年廟成秋大旱晨禱而夕雨自是潺之民益靈其神相與輓碣掲之祠下時嘉祐五年也圖經唐明皇幸蜀至萬安驛歎曰一安尚不可况萬安乎乃廻輦宿於真明寺按驛在治西一里昔有碑書一安且不可句云是𤣥宗親筆今亦毁蝕宋張縯詩云勁兵重鎮付狂奴敺雀敺魚計自踈地入萬安知㡬許却憐此邑始回車志云元宗入蜀縣令造亭於北一里祗候土人呼為接王亭遺址猶存北三里又有企僊亭乃車岩上昇處宋師堯俞作記寰宇記云縣西南十里有羅山羅公逺隠居之處山下有洞號真人宫又有龍池山山上有池池有伏石如龍蟠也碑目有文鐸書龍洞仙踪壁刻云太白山道人李洞賔以太平興國五年龍集庚辰仲春乙丑朔越十二日奉勅賫内庫乳香二十斤詣靈山相度仙洞焚燒初抵劍門遘老人之告闕次離巴岸逄孤鶴以来迎及届洞中睹雙童之出入已臻巖下見玉輅之踪由又聆音樂凄清螺鈸竦越若非吾道神變其孰能與於此乎勒於洞門以為他年㑹語張本真誥云羅江大霍有洞臺中有五色隠芝陶註曰此洞為南真及司命所任之處志云大霍山在縣西南十里羅公逺修真處也上有羅真宫宋何彦真有記外志云大霍山麓有丈餘磐石耕者每宿其上輒夢云接引佛上可卧耶驚以告寺僧掘其下果得像若天成不事雕琢者碑目有元人庹琬東山寳明寺碑曰東山巔有景樂寺廼唐髙宗神龍中所建宋大中祥符初改今名相傳十三尊者遊戯之所也在縣東偏一里古蹟志馬馳寺有井在山谷中四時水溢可以灌田近日忽枯涸土人浚之得龍首骨及大珠如卵光同水晶閃爍奪目衆競視之忽然雷震珠復墜於井中寰宇記白馬闗在羅江西南十里與鹿頭闗相對志云山上平坦有小徑僅容車馬三國時營壘也其下名落鳯坡按鳯雛先生龎士元侍昭烈至此卒於流矢下其葬在鹿頭闗桃花溪東岸墓右有龍洞葬時人見白馬自洞中逸出舊有白馬闗廵司彰明縣寰宇記云縣治初在清廉鄉梁大同四年移於讓水鄉宋書范栢年梓潼人明帝語次問卿鄉土有貪泉否栢年曰臣梁益間有廉遜水不聞有貪泉帝嘉之即拜蜀郡太守按廉水在縣北平地出泉或云飲之生廉遜故名呉曽漫錄彰明縣清廉鄉有李白讀書堂後廢為隴西院盖以太白系出隴西云院後有太白像李翰林墓碑云白本宗室子其先避地客蜀居蜀郡之彰明太白生焉彰明邑有大小匡山大匡乃白讀書處圖經梓州刺史于邵作李白碑在縣之寧梵寺三門下志云碑在縣南二十里即白故宅按匡山在縣北三十里後改康山疑宋世避藝祖祖諱併杜詩而改之也杜甫寄李白詩不見李生久佯狂真可哀世人皆欲殺吾意獨憐才敏捷詩千首飄零酒一杯康山讀書處頭白早歸来一云宋改匡山為翰林山方輿勝覽大匡又名戴天山白集有訪戴天山道士詩犬吠水聲中桃花帶露濃樹深時見鹿溪午不聞鐘野竹分青靄飛泉掛碧峰無人知處所愁倚兩三松李膺益州記云自戴天山向西連接為石磬山週三十里山有石室口方丈三尺内有石牀四面髙一丈有懸石如磬擊之聲聞數里下有流泉甘冽可掬寰宇記曰孟津山在縣東南一里自十八隴山而来西魏自讓水鄉移縣於孟津里是也三洞羣仙錄黄奉先移家入蜀隠太華山山盛牡丹奉先栽蒔盈籬春時花開望之如錦幛然在治北五里杜光庭錄異記綿州昌明縣竇圌山真人竇子明修道之所也西接長岡猶可通車馬東臨峭壁陡絶一隅自西壁至東峰石笋如圌兩崖中斷相去百餘丈躋攀絶險人所不到其頂有天尊古宫不知建始年月古仙曽笮繩橋以通登覽而絙笮朽絶已積數年里中諺曰欲知修續者脚下自生毛如此相傳久矣咸通初山下居人有毛意歡者幼知道常持誦五千言不輟口着敝布褐日於市誦經乞酒醉而登山攀緣峭險以絶道為橋山頂多白松樹以繩繫之横亘中頂布板椽於繩上士女善者隨而度焉行及其半動搖将墮而其底不測莫敢俯視數年繩朽橋壊無復緝者咸通壬辰邑令與賔客醮山登西峰展禮時毛師他游人有謂令曰此峰側有小徑抱崖纔通人跡無所攀援意歡常從此去逾旬而出令疑其隠在穴中座上有廣陵郭頭陀者令請由徑往探之頭陀去久之始還驚眙不能語已曰此徑去約三十餘丈然後到一穴口纔三五尺下去平地猶數百尺穴内可坐十餘人中有巨木匱緘鎻極固其誦經處石面平滑有足膝㾗經卷在焉不知意歡所之意歡有一妻一女每持燈椀度繩橋山側居人見之以為非常山多毒蛇猛虎人莫敢獨往意歡雖夜歸亦無所畏常有二鴉棲巖下客将至鴉必飛鳴意歡乃整餙賔榻未畢客果至矣髙僧傳云綿州城西北四十里竇圌山梁大同中僧林所居也山北涪水之陽素来無猿自林師棲託便有兩頭依林而住有初見者云渡水来及後林出山門猿還泅渡如此非一年月淹久孳乳産生乃至數十有時送林至龍門口佇望而返方輿勝覽云猿門自縣北特起去縣二十里山多猿兒險固如門舊有猿門戍嫏嬛記云啼猿之地多蕨而縣於是有蕨山矣郡國志云彰明縣蕨山有鍾乳穴十九又西岸有自然石塞其下流水上有一縣石似磬擊之有聲寰宇記云彰明有附子山自松嶺闗東来去縣四十里山出附子其水亦名附子水勝覽云彰明縣有李膺墓西南去州四十里按膺涪城人梁時為益州大中正即撰益州記者安縣寰宇記云龍子山自漢州綿竹縣東入縣界亦謂之龍安山也志云縣北十里龍安山有蜀王秀避暑亭清泉修竹餘韻猶存矣元中統間升石泉軍為安州以神泉西昌為輔邑神泉即今神泉壩西昌即今花街鎮舊址尚可攷神泉者郡國志云縣西三十里有泉十四穴甘香異常痼疾飲之即差故曰神泉今有祠勝覽云銀線潭在神泉縣南山相傳白龍潛泳其間水面有銀線一㾗以物撓之即不見波定如故也西昌舊名益昌縣括地志云城西十里地名水柵有益昌縣者此矣唐永淳年以利州有益昌故改為西昌縣取西昌山在縣北山特起舊名馬鞍天寳六年勅為西昌山也蜀中廣記卷九
