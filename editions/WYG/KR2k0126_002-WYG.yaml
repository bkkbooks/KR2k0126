body:
  text: 蜀中廣記卷二明曹學佺撰名勝記第二川西道成都府二西門之勝張儀樓石筍街笮橋琴臺浣花溪青羊宫淨衆寺少陵草堂其最著者任豫益州記曰諸樓年代既久榱棟非昔惟西門一樓雖有補葺張儀時舊跡猶存古今集記云張儀樓高百尺初張儀築城雖因神龜然亦順江山之形以城勢稍偏故作樓以定南北李膺記曰成都有百尺樓後名為白莵樓也晉張載登成都白莵樓詩重城結曲阿飛宇起層樓累棟出雲表嶢櫱臨太虛高軒啟朱扉迴望暢八隅西瞻岷山嶺嵳峩似荆巫蹲鴟蔽地生原隰殖嘉蔬雖遇堯湯世民食恒有餘鬱鬱少城中岌岌百族居街術紛綺錯高甍夾長衢借問揚子宅相見長卿廬程卓累千金驕奢擬五侯門有連騎客翠帶腰吳鈎鼎食隨時進百和妙且殊披林採秋橘臨江釣春魚黒子過龍醢果饌踰蟹蝑芳茶冠六清溢味播九區人生茍安樂兹土聊可娛唐岑參張儀樓詩傳是秦時樓巍巍至今在樓南兩江水千古長不改曾聞昔時人嵗月不相待杜甫和嚴中丞西城晩眺詩云汲黯匡君切廉頗出將頻直辭才不世雄畧動如神政簡移風速詩清立意新層城臨暇景絕域望餘春旗尾蛟龍㑹樓頭燕雀馴地平江動蜀天濶樹浮秦帝念深分閫軍須遠算緡花羅封蛺蝶瑞錦送麒麟辭第輸高義觀圖憶古人征南多興緒事業暗相親段文昌晩夏登張儀樓呈院中諸公詩重樓窻戸開四望歛煙埃逺岫林端出清波城下迴乍疑蟬韻促稍覺雪風來併起鄉闗思銷憂在酒盃姚向和云秦相架羣材登臨契上台查從銀漢落江自雪山來儷曲親流火凌風洽小杯帝鄉如在目欲下盡徘徊温㑹和云危軒重疊開訪古上徘徊有舌嗟秦策飛梁認楚材雲霄隨鳯到物象為詩來欲和闗山意巴歌調更哀楊汝士和云從公城上來秋近絶纖埃樓古秦規在江分蜀望開遠山標宿雪末席接寒灰陪賞今為黍臨歡敢訴杯李敬伯和云層屋架城隈賓筵此日開文鋒摧八韻星分應三台望雪煩襟釋當歡遠思來披雲霄漢近蹔覺出塵埃姚康和云登覽值晴開詩從野思來蜀川新草木秦日舊樓臺池影揺中座山光接上台近秋宜晩景極目斷浮埃石經始末云錦官西樓有胡元質所鑱石經數板盖公得五代時墜刻于一二故家殘圭裂璧亦可寶也凡蔡中郎石經四千二百七十字有奇及古文篆𨽻三體石經遺字八百一十九黄山谷跋張載熙書卷尾云蘭亭禊飲詩叙二本前一本是都下人家用定武舊石刻摹入木板者一本以門下蘇侍郎所藏唐人臨冩墨跡刻之成都西樓中有數字極瘦勁不凡東坡謂此本乃絶倫也陸游跋東坡書髓帖云成都西樓下石刻東坡法帖十卷擇其尤奇逸者為一編號東坡書髓三十年間未嘗釋手去嵗都下脱敗甚乃再裝緝之嘉泰三年嵗在癸亥九月三日老學菴北囱手記常璩云蜀有五丁力士能移山舉萬鈞每王薨輙立大石長三丈重千鈞為墓志今石笋是也號曰笋里寰宇記云武擔石俗曰石笋在州城西門大街中益部耆舊傳云公孫述時武擔石折任文公歎曰西方智士死吾當應之嵗中卒庾信演連珠云竹杖扶危不能正武擔之石矣通志云雙石笋在興義門内即真珠樓基也按西門王建武成謂之興義門矣李膺記云開明氏造七寶樓以珍珠為簾其後蜀郡火民家數千與七寶樓俱燬趙清獻記曰真珠樓基在石笋街一説有大秦胡于其地起寺門樓十問皆飾以真珠翠碧貫之如簾寺即大秦寺也老杜石笋行君不見益州城西門陌上石笋雙髙蹲古來相傳是海眼苔蘚蝕盡波濤痕雨多徃徃得瑟瑟此事恍惚難明論註云成都子城西金容坊有石二株挺然聳峭高大餘耆舊傳云其名有六曰石笋曰蜀妃闕曰沈犀石曰魚鳬仙壇曰四海之眼曰五丁石門皆非也圖經云乃前寺之遺址諸葛亮掘之方騐有篆字曰蠶叢氐啟國誓蜀之碑以二石柱横埋連接鐵其中一南一北無所偏邪上有濁歜燭觸蠲五字時人莫曉蜀相范賢議曰亥子嵗濁字可記主水災寅卯嵗歜字可記主饑饉巳午嵗燭字可記主火災辰戌嵗觸字可記主兵災申酉嵗蠲字可記主稼穡富贍悉以年事推應符響矣徐康晉記桓温伐蜀戰于笮橋叅軍襲䕶戰没衆欲退而鼓吏誤鳴進鼓於是乘之遂入少城寰宇記云笮橋去州西四里名夷里橋以竹索為之因名笮橋李膺笮橋贊云複引一索飛絙杙閣其名曰笮人懸半空度彼絶壑也益州記曰市橋笮橋今各有一鐵椎大十許圍長六七十尺云初營橋引機運此椎以擊橋柱本有三今餘二南史宋大始初益州笮橋忽生一洲道士柳石見之曰當有貴王臨州必有王勝喜也及齊永明二年武帝遣始興王為益州勝喜者即始興反語蜀古蹟記曰笮橋邊有二石闕乃漢趙典墓矣王褒益州記曰司馬相如宅在州笮橋北百許步李膺云市橋西二百步得相如舊宅今海安寺南有琴臺故墟方輿勝覽云琴臺後為金花寺城内者非其舊也金花寺以晉胡僧持金花玉像住此故名按即今之金泉舖矣梁簡文登琴臺詩蕪階踐昔徑復想鳴琴遊音容萬春罷高名千載留弱枝生古樹舊石染新流由來逓相歎逝川終不収唐盧照隣相如琴臺詩聞有雍容地千年無四隣園院風煙古池臺松檟春雲疑作賦客月似聽琴人寂寂啼鶯處空傷遊子神杜甫詩茂陵多病後尚愛卓文君酒肆人間世琴臺日暮雲野花留寶靨蔓草見羅裙歸鳯求凰意寥寥不復聞高適同羣公秋登琴臺詩古跡使人感琴臺空寂寥静然顧遺塵千載如昨朝臨眺自兹始羣賢久相邀德與形神高孰知天地遥四時何倐忽六月鳴秋蜩萬象歸白帝平川横赤霄猶是對夏伏幾時有凉猋燕雀滿檐楹鴻鵠摶扶揺物性各自得我心在漁樵兀然還復醉尚握樽中瓢岑參詩相如琴臺古人去臺亦空臺上寒蕭條至今多悲風荒臺漢時月色與舊時同宋吕公弼詩煙樹重城側琴臺千古餘早為梁苑客晩向茂陵居賦給尚書筆歸乘使者車清風覿舊隠長日聳鄉閭宋祁詩故臺千古恨猶對舊家山半夜鸞凰去它年駟馬還死憂封禪晩生愛茂陵閒惟有飄飄氣仍存天地間歲華紀麗云正月念八日出笮橋門即拜保壽侯祠次詣淨衆寺拜杜邠公祠按杜邠公悰唐元和間帥蜀者又蘇明允集有張文定方平公祠碑記亦在淨衆寺矣高僧傳云僧無相新羅國人開元十六年至成都募化檀越造淨衆寺影堂在焉寺有一巨鐘重千鈞㑹昌例毁此鐘乃移入大慈大中復還寺衆以其鐘大隔江計功兩日始到方欲為齋辰去已集乃知神力所拽也相有塔號東海大師塔云唐鄭谷西蜀淨衆寺松溪八韻兼寄小華崔處士詩松因溪得名溪吹荅松聲繚繞能穿寺幽奇不在城寒烟齋後㪚春雨夜中平染岸蒼苔古翹沙白鳥明澄分僧影瘦光徹客心清帶梵侵雲響和鐘擊石鳴淡烹新茗爽暖泛落花輕此景吟難盡憑君畫入京又淨衆寺雜題水詩竹院松廊分數派不空清泚亦逶迤落花相逐去何處幽鷺獨來無限時洗鉢老僧臨岸久釣魚閒客卷綸遲晩晴一片連莎緑悔與滄浪有舊期七祖院小山詩小巧功成雨蘚斑軒車日日扣松闗峩眉咫尺無人去却向僧囱看假山忍公小軒詩松溪水色緑于松每到松溪聽暮鐘閒得心源秪如此問禪何必向雙峯傳經院壁畫松詩危根瘦盖聳孤峯珍重江僧好筆蹤得向游人多處畫却勝澗底作真松李洞宿成都松溪院詩松持節操溪澄性一炷嵐煙壓寺隅翡翠鳥飛人不見琉璃瓶貯水疑無夜聞子落真山雨曉汲波圓入畫圖塵擁蜀城抽鎻後此中猶夢在江湖宋范鎮淨衆寺新禪院詩金地西郊外一來煩念攄但逢是仙境鮮不屬僧居岸緑見翹鷺溪清無隠魚殘陽已周覽欲去幾躊躇田况正月二十八日謁生禄祠遊淨衆寺詩千騎出重闉嚴祠淨宇鄰映林沽酒斾迎馬獻花人豔日披江霧香飈起路塵韶華特明媚不似遠方春按淨衆寺宋改為淨因寺今謂之萬佛寺也蜀本記云老子為闗令尹喜著道德經臨别曰子行道千日後于成都郡青羊肆尋吾今為青羊觀也古今集記云老子乘青羊降其地有臺存觀中有白玉蟾書碑字徑半尺宋何耕詩云一再官錦城咫尺望琳宫未始得得來正墮役役中今朝弄晴雨策蹇隨春風頗愛意象古停驂少從容縹緲百尺臺突起凌半空憑欄俯修竹决皆明孤鴻信哉神僊宅不受塵垢䝉稽首五千言衆妙一以通靜觀萬物役豈假九轉功區區立訓詁亦哂河上公癡人慕羽化心外求鴻濛要騎白鶴背徃訪青羊蹤此詩刻石于臺前缺數字方輿勝覽云浣花溪在城西五里一名百花潭按吳中復冀國夫人任氏碑記云夫人微時以四月十九日見一僧墜汚渠為濯其衣頃刻百花滿潭因名曰百花潭按蜀志補遺浣花谿有石刻浣花夫人像三月三日為夫人生辰傾城出遊成都記云夫人姓任氏崔寜之妾按通鑑成都節度使崔旰入朝楊子琳乘虛突入成都旰妾任氏出家財募兵得數千人自帥以擊之子琳敗走朝廷加旰尚書賜名寜任氏封夫人也蜀檮杌乹德五年四月十九日王衍出遊浣花溪龍舟綵舫十里綿亘自百花潭至于萬里橋遊人士女珠翠夾岸日方午暴風起須臾雷電晦㝠有白魚自江心躍起騰空而去或云變為蛟牛嶠李珣有浣花詞云昨日西溪遊賞芳樹奇花千樣鎻春光金罇滿聽弦管嬌妓舞衫香暖不覺到斜暉馬䭾歸又云訪舊傷離欲斷魂無因重見玉樓人六街微雨鏤香塵早為不逢巫峽夢􅄼堪虛度錦江春遇花傾酒莫辭頻前調西溪子而後浣溪沙也宋祁浣花泛舟詩早夏清和在晴江㳂泝時岸風揺鼓吹波日亂旌旗醉帟牽緗蔓游鬟撲絳㽔樹來驚浦進山失悟舟移雅俗西南盛歸軺東北馳此歡那復得抛恨寄天涯又春日出浣花云側盖天長蕩暁霏暖風才滿使君旗水通江渚容魚樂草徧山梁報雉時塲雨滅塵盤馬疾樓雲礙曲進觴遲少陵宅畔吟聲歇柳碧梅青欲向誰田况四月十九汎浣花谿詩浣花溪上春風後節物正宜行樂時十里綺羅青盖宻萬家歌吹緑楊垂畫船疊鼔臨芳溆綵閣淩波汎羽巵霞景漸曛歸櫂促滿城懽醉待旌旗馬俌浣花谿詩浣花溪邊濯錦裳百花滿潭溪水香寶奩㪚盡買霜㦸草林匹馬不可當當時濯衣只偶爾豈似取履張子房烈烈遽能蔽此蜀喪亂懷爾徒悲傷年年春風媚楊柳綵纜㛪姌雲霞張溪邊遊冶紅粉娘了不識字空悠颺採花蕩漿不歸去暮隔煙水眠幽芳黄魯直浣花溪圖引云拾遺流落錦官城故人作尹眼為青碧雞坊西結茅屋百花潭水潔冠纓故衣未補新衣綻空蟠胸中書萬卷探道欲度羲皇前論詩未覺國風遠干戈崢嶸暗㝢縣杜陵韋曲無雞犬老妻稚子宜眼前弟妹飄零不相見此心樂易真可人園翁溪友肯卜鄰鄰家有酒邀皆去得意魚鳥來相親浣花酒船㪚車騎野墻無主看桃李宗文守家宗武扶落日蹇驢䭾醉起厭聞解鞍脱兠鍪老儒不用千户侯中原未得平安報醉裏眉攢萬國愁生綃鋪墻粉墨落平生忠義公寂寞兒孫不蘇驢失脚猶恐醒來有新作常使詩人拜畫圖煎膠續弦千古無杜甫卜居詩云浣花溪水水西頭主人為卜林塘幽已知出郭少塵事更有澄江銷客愁無數蜻蜓齊上下一雙鸂䳵對沈浮東行萬里堪乘興須向山隂上小舟此即草堂也楊慎引文選注云蕭齊周顒昔經在蜀以蜀草堂林壑可懷迺於鍾山雷次宗學館立寺因名草堂寺又云蜀人語草為茨成都令周顒既歸金陵乃倣蜀草堂寺遺意於鍾山之麓築草堂亦曰山茨不忘蜀也可知蜀之草堂寺著名久矣子美依其地而卜築題詠日多不具録其時軒盖過從有嚴中丞仲夏枉駕草堂兼携酒饌得寒字作有王十七侍御掄許携酒至草堂奉寄詩便請邀高三十五使君同到作有王十五司馬弟出郭相訪兼遺營茅屋貲作雖稍為是以破岑寂而要之非其好也當時有南隣北隣者其人皆不俗子美南隣詩云錦里先生烏角巾園収芋栗不全貧慣看賓客兒童喜得食階除鳥雀馴秋水纔添四五尺野航恰受兩三人白沙翠竹江村暮相送柴門月色新北鄰詩云明府豈辭滿藏身方告勞青錢買野竹白幘岸江臯愛酒晉山簡能詩何水曹時來訪老疾步履到蓬蒿又過南隣朱山人水亭詩云相近竹參差相過人不知幽花欹滿樹小水細通池歸客村非遠殘罇席更移看君多道氣從此數追隨斯盖遺世之士忘機之侣矣岑參草堂村尋人不遇詩數株垂柳色依依深巷斜陽暮鳥飛門前雪滿無行跡應是先生出未歸范鎮題曹山人墅居詩溪接浣花饒勝致山人高隠在其中一江絲竹喧天沸爭及松篁半日風亦皆彷彿其幽致也喻汝礪晩泛浣花遂宿草堂詩扣楫泛澄虛濯流睇幽芳晩霙襯奇樹夕霏媚疎篁歸鳥亦蹔閒夜魄動初凉忽焉衆星微天高月舒光昔也杜陵子澹然此茅堂客至酒自斟句得意已忘云何常念饑零落在道旁古來技入神一飽豈屑望吾輩天所窮慨歌淚霑裳邵愽同楊元澈遊草堂詩萬里橋西路幽居今尚存共來披草徑遠去問江村冉冉花扶屋蕭蕭竹眏門斯人隔今古此意與誰論劉望之草堂詩風月藏詩骨流離賦病骸不禁一飽死空遺百生懷樹秀天通隴山嬌客語淮壁間無半偈無乃望君厓捫膝先生又有草堂詩六首栩栩詩翁錦里西只縁詩好合窮栖竹鋪冷色雲連寺柳漾輕絲鳥過溪凝望不禁闗樹暗駐情應恨蜀山低離人苦怕春歸盡可忍紅英半着泥又云從教日日敞窓扉嫌怕風花入眼遲剩買芒鞋供看竹趂乘春雨去栽榿苦無賓客僧來後薄有生涯鶴下時聞道鄰翁酒初熟新篘一酌莫相違又云遠嶼曲洲縱復横沙邊繁鳥弄簫笙一軒簷冷松隂合十里林香藥草生路轉斷楂逢石坐風移深竹見僧行晩來冲抱更清曠時有幽人帶月耕又云亂後飄零歇此身風光無賴更清新客懷易感酒添病詩思苦慳花減春南枝北枝鶯舌巧前村後村雨脚匀暫借溪邊老為客花心柳眼莫撩人又云翠木揺艷溪之灣遊子失氣生愁酸誇力搏虎筋骨絶雙流迸巘道路難布衾多年窘夜雨土銼無火啼夕餐一生忠義老寂寞旋燒竹葉供春寒又云竹外清疎浸碧溪溪邊竹淡煙雨霏閒看雪嶺題詩罷醉向西郊信馬歸霄漢直愁雙闕迥夢魂長著五陵飛故園秀水又春色只恐歸去池臺非宋京補亡詩云君不見少陵草堂背西郭浣花溪水流堂脚竹寒沙白自淒凉莫問四松霜草薄入門好在鳥皮几公去不歸換鄰里西嶺千秋雪未消舍北泥融飛燕子秪今榿木平橋路籠竹和煙雜江霧野僧作屋號草堂不是柴門舊時處碑目云益州草堂寺列畫前長史一十四人代稱絶迹李文饒跋云余嘗於數公子孫之家獲見圖狀乃知草堂繪事靡不逼真者方輿勝覽云梵安寺在成都縣南與杜甫草堂相接每嵗四月中澣前一日太守宴集于此吕大防建草堂繪少陵像張燾盡取少陵詩勒石刻置焉何宇度益部談資云武侯工部二祠之中有寺一名草堂一名中寺前代為尼居名桃花寺隋文帝時始易以僧唐大厯中崔寜鎮蜀以冀國夫人任氏本浣花女遂重修之繪夫人真于中㑹昌亦在毁例夜聞女子啼泣之聲而止宋朝禱雨有騐乃賜名梵安寺也按高僧傳唐僧旭上居草堂寺惟以禪誦為業蜀土尤尚二月八及四月八日每至二時四方大集馳騁遊遨旭公獨端坐竹林泊然寂想四衆覩之如朝日初出因目之為旭上云東門之勝禹廟大慈寺㪚花樓合江亭薛濤井海雲寺其最著者張俞上蜀帥書俞再拜世言古之大聖人必曰三皇氏五帝氏犧農在上古其道不可復行故後世唯以堯舜為法厯百聖人莫之能易而學者遂傳禹尚不及堯舜俞謂堯舜承四聖至治之業在位七十載故能道德行於天地萬物陶乎無為其後洪水暴九州十有餘年生民流宕彛倫壞斁堯視天下之溺如已溺焉乃博咨衆工若臯陶之倫咸不克其事然後舉舜舜亦不能治然後舉禹禹果能治之遂成大功舜有天下乃美禹曰地平天成六府三事允治萬世永賴時乃功是知滔天之害雖堯舜之聖必待禹而治之茍當時不得禹也生民其如何後世其如何愚恐君臣父子不為魚鼈則九州萬國淪于海矣安有今日之治哉故謂開闢已來羣聖之功唯禹為大也百川之長有四瀆而江河為大江出蜀之西徼禹迺生于西羌石紐其地也今淫鬼無名饕蜀民之祀者迨將千百郡縣猶能存之而神禹為蜀人江漢為蜀望大功格天地利澤施萬世曾不得享蜀之祀若一淫鬼斯闕禮之甚者俞嘗恨焉伏惟明公治蜀滔滔江漢盡在土宇宜作禹廟用康斯民昔尹吉甫作詩美申伯則曰王命申伯式是南邦因是謝人以作爾庸又美仲山甫則曰德輶如毛民鮮克舉之維仲山甫舉之言政事甚易而人不能行維仲山甫獨能舉而行之明公有申伯法度南邦之德有仲山甫賦政于外之功蜀人愛戴期乎無窮若禹廟之作乃政之易者衆不能舉明公若能舉之可謂存乎聖而順乎民也豈挾太山超北海之為力哉俞近述南賓郡修禹廟碑文一首其道備其事直文雖浮濫理或庶幾方刻石以示後世謹録一通上獻謂狂夫之言而棄之不敢逃戾若謂斯言可采斯廟可成宜載事于金石則江漢無盡明公之德亦無盡按此禹廟立于成都之始也今在城東北之馬務街嵗久傾圯予以萬厯辛亥始克修復仍以蠶叢李氷二神配于東西廡按方輿勝覽蜀王蠶叢氏祠今呼為青衣神在聖壽寺昔蠶叢氏教人養蠶作金蠶數十家給一蠶後聚而弗給瘞之江上為蠶墓南史齊永明間始興王蕭鑑為益州刺史於州園得古冢有金為蠶數斗鑑一無取復為起冢立祠又按寰宇記秦李氷為蜀郡守有功於民舊祠在府西南三里及唐節帥李德裕重修今蠶叢祠巳不存李氷秪李觀察家作宗祠耳㑹詘時勢不能特舉乃告于神附庸之且以紹禹之績焉通志云大慈寺唐至德年建舊有肅宗書大聖慈寺四字盖勑賜也故㑹昌不在除毁之例碑目云唐僧大辯修功德碑元和十五年立在寺之文殊閣唐韋南康碑二並在寺之資福殿中集古録云大慈資福院記唐李德裕撰長慶二年立石成都記云大慈極樂院有至和丙申季春二十八日眉陽蘇軾與弟蘇轍來觀盧楞伽筆迹留題陸游跋中和院東坡帖云此一卷皆蘇仲虎尚書所藏鑒定精審無一帖可疑者刻石在成都大聖慈寺中和勝相院淳熙六年六月十七日也成都太守田况三月十四日大慈寺建乹元節道塲詩赤精流景鑠朱夏向清和紺宇修祠盛華封祝慶多簪裳千載遇鐘梵五天歌遠俗尤熙泰皇猷信不頗又七月六日晩登大慈寺閣觀夜市詩萬里銀潢貫紫虚橋邊螭轡待星姝年年巧若從人乞未省靈恩徧得無又七月十八日大慈寺觀施盂蘭盆詩飛閣穹隆軼翠煙盂蘭盛㑹衆喧闐且欣酷暑從兹減漸有凉風快夕眠又冬至朝拜天慶觀會大慈寺詩景至履佳辰朝祝著國令黄宫啟濳萌紫宇晨䕃映陽德比君子吾道實可慶矧丁皇運亨遇主堯舜聖坤維最遠方拙者此尸政雅俗舊儒文民牒少訟爭幸足宣上恩惟恐盭物性良時不易得行樂未為併高㑹縱嬉遨豐嵗愈繁盛與衆助驩欣寄情於俚詠范成大㑹慶節大慈寺茶酒詩霜輝催曉五雲鮮萬國懽呼共一天淡淡暖紅旗轉日浮浮寒碧瓦収煙銜盃樂聖千秋節擊鼓迎冬大有年忽憶捧觴供玉座不知身在雪山邊方輿勝覽云雪錦樓在大慈寺門元宵守帥遊賞于此李燾十五日同登大慈寺樓得遠字詩重樓得雲氣深穩戸牖誰能發關鍵樓下輪蹄渙㪚馳行人一顧不容返好遊獨是我輩閒褰衣直上相推挽層軒危檻倚欲遍更假胡床同息偃西南繁㑹惟此都昔號富饒今已損填城華屋故依然孰為君王愛基本茫茫八表聊縱目情知日近長安遠白雲浩蕩飛鳥没玉笙凄凉紅粉晩梁王吹臺得李杜黄公酒壚醉嵇阮高風千載凛莫扳與世相濁徒混混荷衣蕙帶芙蓉裳野服猶堪敵華衮去梯孰復共君謀殺馬毁車從此遁勝覽云成都古蠶叢之國其民重蠶事故一嵗之中二月望日鬻花大蠶器號蠶市五月鬻香藥號藥市冬月鬻器用者號七寶市俱在大慈寺前宋祁大慈寺前蠶市詩蜀雖云樂土民勤過四方寸壤不容隟僅能充嵗糧間或容墮爛曷能備凶痒所以農桑具市易時相望野氓集廣􅆵衆賈趨寶坊惇本誠急務戒其靡愆常兹㑹良足喜後賢無忽忘田况大慈寺前蠶市詩高閣長廊門四開新晴市井絶纎埃老農肯信憂民意又見笙歌入寺來蜀檮杌云孟知祥明德元年六月幸大慈寺避暑觀明皇僖宗御容已宴羣臣於華嚴閣下孟㫤廣政元年上已遊大慈宴從官于玉溪院賦詩通志云解玉溪在華陽大慈寺南韋南康所鑿也溪中細沙可以解玉蘇子瞻集成都玉溪之上有清風閣文慧大師應符所建因為之記矣方輿勝覽云諸葛井在大慈寺西里許自上窺之秪見其三邊更一邊不知其際涯也昔孔明鑿此以通井絡王氣俗傳有人入井聞其中有雞聲又云興福寺即昭覺院相對有天涯石按即今之寶光寺矣天涯石詳見詩話中東城樓即㪚花樓也李白登錦城㪚花樓詩日照錦城頭朝光㪚花樓金牕夾繡户珠箔縣瓊鈎飛梯緑雲中極目㪚我憂暮雨向三峽春江繞雙流今來一登望如上九天遊按輿地紀勝㪚花樓隋開皇建乃天女㪚花之處蜀檮杌云孟㫤有國宫苑城上盡種芙蓉謂左右曰真錦城也唐武元衡中秋夜錦樓望月分韻詩得東字玉輪初滿空迥出錦城東相向秦樓鏡分飛碣石鴻桂香隨窈窕珠綴隔玲瓏不及前秋見團圓鳯沼中王良㑹得清字德星揺此夜珥月滿重城香靄煙嵐色飄颻碪杵聲令行秋氣爽樂感素風輕共賞千年聖長歌四海清柳公綽得濃字此夜年年月偏宜此地逢近看江水淺遥辨雪山重萬井金花肅千林玉露濃不唯樓上思飛盖亦陪從張正一得蒼字高秋今夜月皓皓正蒼蒼逺水澄如練孤鴻迥帶霜旅人方積思繁宿稍沉光末濫叨陪賞尤宜清漏長徐放得來字玉露中秋夜金波碧落開雀驚初泛濫鴻思共徘徊遠目清光徧高空爽氣來此時陪永望更得上燕臺崔備得前字清景同千里寒光盡一年竟天多鴈過通夕少人眠照别江樓上添愁野帳前隋侯恩未報猶有夜珠圓又得秋字四時皆有月一夜獨當秋照耀初含露徘徊正滿樓遥連雪山淨迥入錦江流願以清光末年年許從遊溫庭筠錦城曲云蜀山攢黛留晴雪笋蕨牙縈九折江風吹巧剪霞綃花上千枝杜鵑血杜鵑飛入巖下藂夜呌思歸山月中巴水漾情情不盡文君織得春機紅怨魄未歸芳草死江頭學種相思子樹成寄與望鄉人白帝荒城五千里張承吉錦城詩錦江城外錦城頭回望秦川上軫憂正值血魂來夢裏杜鵑聲在㪚花樓高駢錦城春望詩蜀江波影碧悠悠四望煙花匝郡樓不㑹人家多少錦春來盡挂樹梢頭卓英英錦城春望詩和風粧㸃錦城春細雨如絲壓玉塵漫把詩情訪奇景艷花濃酒屬閒人眉娘和云蠶市初開處處春九衢明艶起香塵世間總有浮華事爭及仙山出世人斯二作皆女郎也又顧雲有濯錦江秋澄倒碧㪚花樓晩掛殘紅之句並稱警秀矣括地志云大江一名汶江西南自溫江縣來郫江一名永平江西北自新繁縣來昔李氷穿二江城中皆可行舟合於城之東南岸曲有合江亭唐符載云一都之奇勝也是亭鴻盤如山横架赤霄廣埸在下砥平雲截而東南西北夐然矣宋吕大防合江亭記云沱江自岷而别張若李氷之守蜀始作堋以揵水而闢溝以釃之大溉蜀郡廣都之田用以富饒今成都二水此江沱支流來自西北而滙于府之東南乃所謂二江雙流者也沱舊循南湟與江並流以東唐高駢斥廣其穢遂塞糜棗故瀆始鑿新渠繚出府城之北然猶合於舊渚舊渚者合江故亭唐人宴餞之地名士題詩徃徃在焉久茀不治余始命葺之以為船官治事之所俯而觀之滄波修濶渺然數里之遠東山翠麓與煙林篁竹列峙于其前鳴瀨抑揚鷗鳥上下商舟漁艇錯落游衍春朝秋夕置酒其上亦一府之佳觀也按即今之錦官驛矣宋周燾合江亭詩云共思赤脚踏層氷聊適江臯興自清昨夜雨聲驅濁暑曉來烟水快新晴山疑九疊張雲勢灘激千巖落布聲巾屨從來在丘壑願陪閒日此閒行其二却暑追隨水上亭東郊乘曉戴殘星餘歌咽管來幽浦薄霧疎烟入畫舲興發江湖馳象魏情鍾原隰詠飛鴒故溪何日垂綸去天末遥岑寸寸青和者為田望吳栻孫竢諸君子惟竢有舊聞蜀地四時雨今快岷山千里晴之句可謂得驪珠矣楊甲合江泛舟詩云莫踏街頭塵寜飲城東水江頭放船去葦間問漁子岸深魚有家鳬鴈在中沚得酒可以歌得樹可以艤年年舟中客顔色不相似風波無前期遊者亦如此短篙醉時策逺山醉時几我老不柰醒日落西風起晁公遡合江舟中詩云雲氣昏江樹春流没釣磯何如連夜漲似欲送人歸亂石水聲急片㠶風力微舟師且停櫓白鷺畏人飛白麟合江探梅詩云艇子飄揺喚不回半溪清影漾疎梅有人隔岸頻招手和月和霜剪取來何耕自合江亭過渡觀趙穆仲園亭詩喚舟芳草渡繫馬緑楊隂步入莓苔徑門開花竹林王孫隨蹀逺婺女隠雲深想見西南望悠悠空賞心陸務觀有遊東郭趙氏園詩清晨呼馬出馭吏請所之錦城浩如海我亦無與期有花即入門莫問主人誰下馬據胡牀傲睨忘訶譏人言白頭翁胡為尚兒癡老翁故不癡借花發吾詩詩句帶花香東風不敢吹徘徊雙蛺蝶許汝鼻端知此二園者亦與錦江相左右也薛濤井舊名玉女津在錦江南岸水極清冽濤詩序云濤字洪度本長安良家女父鄖因官寓蜀而卒母孀居濤及筓以詩聞外又能掃眉塗粉與士族不侔客有竊與之燕語時韋中令臯鎮蜀召令侍酒賦詩僚佐多士為之改觀朞嵗中令議以校書郎奏請之䕶軍曰不可遂止濤出入幕府自臯至李德裕凡厯事十一鎮皆以詩受知其間與濤倡和者元稹白居易牛僧孺令狐楚裴度嚴綬張籍杜牧劉禹錫吳武陵張祐餘皆名士記載凡二十人競有酬和濤僑止百花潭躬撰深紅小彩牋裁書供吟獻酬賢傑時謂之薛濤牋晩嵗居碧雞坊剏吟詩樓偃息于上後叚文昌再鎮成都太和嵗濤卒年七十五文昌為撰墓誌題曰西川校書薛洪度之墓按濤錦江春望詞云花開不同賞花落不同悲欲問相思處花開花落時其二檻草結同心將以遺知音春愁正斷絶春鳥復哀吟其三風花日將老佳期猶𣺌𣺌不結同心人空結同心草其四那堪花滿枝翻作兩相思玉箸垂朝鏡春風知不知王建寄之詩云萬里橋邊女校書枇杷花裏閉門居掃眉才子知多少管領春風總不如海雲山在錦江下流十里有海雲寺鴻慶院諸勝呉中復游海雲寺唱和詩王霽序云成都風俗嵗以三月二十一日遊城東海雲寺摸石於池中以為求子之祥太守出郊建高旟鳴笳鼔作馳騎之戲大讌賓從以主民樂觀者夾道百重飛盖蔽山野讙謳嬉笑之聲雖田野間如市井其盛如此渤海吳公下車朞月簡肅無事從俗高㑹于海雲酒既中顧謂寮屬曰一觴一詠古人之樂事也首作七言詩以寫勝事席客亦有以詩獻者更相酧和得一十三篇廼命幕下吏㑹稽王霽為之序霽斐薄不能文恐愧勉從公命夫俳倡絲竹其樂外也吟詠情性其樂内也充諸内則能遺外之樂流於外則内有所喪今公既推内之樂以樂賓又盡外之樂以樂民可謂得其樂矣中復詩云錦里風光勝别州海雲寺枕碧江頭連郊瑞麥青黄秀遶路鳴泉深淺流彩石池邊成故事茂林坡上憶前遊緑罇好伴衰翁醉十日殘春不少留范純仁和云東郊行樂冠西州古寺岧嶤翠嶺頭化俗文翁傳愷悌尋山謝傅繼風流天涯罇酒欣相遇劒外三春得共遊雅興直須窮勝賞年光難使隙駒留韓宗道和云茂林修竹翠煙収寺枕清江最上頭好鳥啼春知客恨落花浮水近人流政閒不廢登臨賞意適直成汗漫遊紫陌紅塵歸路逺夕陽回首重遲留勾士良和云佛土依山福逺州春行繡騎上雲頭補天彩石盈池在朝海清江繞寺流四國仰煩郇伯勞羣生翹望謝安遊早知為礪為霖意惟有西民欲暫留薛繗和云寺上靈峯更近州喧闐騶從錦纒頭歌鐘乍奏晴雷殷戈甲急趨春水流幾處醉眠方枕藉一城謡俗重嬉遊賢侯惠意民知否幾刻嚴闉為爾留宋祁集海雲鴻慶院詩地勝祠仍古春餘物徧華山雲時抱石佛雨不萎花嶺挾樓梯峻巖牽殿墄斜淙谿雜環珮怪蔓走龍蛇供座僧飛鉢香園客戲沙吾遊真草草深意寄烟霞趙抃遊海雲山詩縹緲齊雲閣喧闐摸石池物華春己盛人意樂無涯羅綺一山徧旌旗十里隨遨棚夾歸路驍騎看星馳蘇寀和云笙歌揭虛閣帷幕匝春池且與民同樂都忘天一涯舊遊嗟倐忽故步喜追隨陌上人如堵歸鞍莫載馳邢夢臣和云使旌駈近郭民宴列芳池洩洩春臺上沉沉暮海涯鴻驚人宛轉電激騎追隨此㑹經年至須防日似馳霍交和云山深藏古寺傍枕舊芳池鼓響揭雲外石探從水涯使旌遊不倦瑞麥獻相隨事簡民同樂歸心莫競馳韓綘遊鴻慶寺詩久旱雨初足樂遊春正深喧闐觀士女清曠入山林佛界雲成寶僧園地布金方塘探于石高閣㑹賓簪沙水通溪白松筠逐徑隂紛華從滿目幽寂自虛心印組端為累巖扄得暫尋晩風吹緑野歸騎已駸駸呉師孟和云十里東郊道兹遊嵗月深參僚從行府高㑹適叢林穉子喧沽玉春姬笑予金咳珠僧獲寶醉弁客遺簪天賜連宵澤民歡畢晝隂分明造物手自在出塵心非相雖無住殘芳尚可尋都人望旋斾車馬又駸駸范成大十一月海雲賞山茶詩門尸懽呼十里村臈前風物已知春兩年池上經行處萬里天邊未去人客鬢花身俱嵗晩粧光酒色且時新海雲橋下溪如鏡休把冠巾照路塵十二月海雲賞山茶詩追趂新晴管物華馬蹄鬆快帽簷斜天南臈盡風晞雪氷下春來水漱沙已報主林催市柳仍從掌故問山茶豐年自是驩聲沸更着衙前晝鼓撾喻汝礪遊海雲山詩𣺌𣺌天宇初便復有此山清晨及兹游遐想百代前來者幾何人當時各為歡淑質揚妙舞哀絲遞清彈樂事坐如昨芳嵗已屢殫向來所游人落葉不復還逈然㪚逺目感之為長歎竹逕非舊所鵲巢豈昔眠念誰當久存而不住所縁破涕聊一怡山川却萋妍未知後世士誰復當來旋蜀中廣記卷二
