body:
  text: 蜀中廣記卷一明曹學佺撰名勝記第一川西道成都府一成都華陽二縣附郭華陽國志蜀之為國肇於人皇與巴同囿至黄帝為其子昌意娶蜀山氏之女生子髙陽是為帝嚳封其支庶於蜀世為侯伯歴夏商周武王伐紂蜀人與焉尚書牧誓庸蜀羌髳是也有周之世限以秦巴雖奉王職不得與春秋盟㑹君長莫同書軌周失綱紀蜀先稱王有蜀侯蠶叢其目縱始稱王次王曰柏灌次王曰魚鳬又次後有王曰杜宇始稱帝號曰望帝更名蒲卑治郫邑或治瞿上後傳位于其相開明開明位號曰叢帝叢帝生盧帝盧帝生保子帝九世始傳開明尚焉開明尚自夢郭移乃徙治成都揚雄蜀本紀云蜀王據有巴蜀之地本治廣都樊鄉徙居成都者也巴與蜀讐求救于秦秦惠王二十七年遣張儀與司馬錯等滅蜀遂置蜀郡儀築成都以象咸陽修整里闠市張列肆規制廣備故左思蜀都賦云金城石郭兼匝中區既麗且崇實號成都矣其地東接于巴南接于越北接于秦西奄峨嶓地稱天府原曰華陽漢武帝元朔二年以新啟犍為牂柯越嶲三郡疆壤益廣始稱益州初治廣漢之雒縣後乃徙此李固與弟圄書曰固今年五十七鬢髪已白所謂容身而遊滿腹而去周觀天下獨未見益州耳昔嚴夫子常言經有五渉其四州有九遊其八欲類此子矣王莽簒盗改天下郡守為率正又改蜀郡為導江遷公孫述為導江率正治臨卭後據成都稱帝具置百官造十層赤樓東觀漢記曰公孫述造十層赤樓也于是改益州為司𨽻蜀郡為成都尹矣建武光復二百餘載迄于孝靈王室多故劉焉求益州牧以避世難始治綿竹後徙成都先主代劉璋而有之即位于武擔之南典畧曰𤣥德于是起館舍築亭障從成都至白水關四百餘區也後主建興二年以丞相亮開府領益州牧亮卒拜尚書令蔣琬為大將軍領益州刺史蜀亡晉太康初乃屬王國號曰成都内史永嘉之難没于夷獠成都記云府治北三里許有李特所築赤塗城十六國春秋曰李雄定成都以嚴檉為蜀郡太守及即位遷檉益州刺史是矣桓温西伐李勢出降劉義慶世説云宣武平蜀集叅僚置酒于李勢殿巴蜀縉紳莫不來萃桓既素有雄情爽氣加爾日音調英發叙古今成敗由人存亡繫才其狀磊落一坐歎賞焉永和之際周撫為蜀郡太守四十餘年境土粗安王逸少與周益州書云省足下别疏具彼土山川諸奇揚雄蜀都左太冲三都殊為不備悉彼故為多奇益令其遊目意足也可得果當吿卿求迎少人足耳至時示意遲此期真以日為歲但言此心已馳于彼矣又云吾有七兒惟一小者未婚過此便得至彼得果此縁一段奇事也梁武陵王始封入蜀元帝與之書云蜀中斗絶易動難安弟可鎮之吾自當滅賊又别紙云地擬孫劉各安境界情深魯衛書信常通良所託重也蕭紀反戈東下以地降于西魏再折入周至隋開皇始定之封其子秀作鎮于茲營侈宫室成都記曰隋蜀王秀嘗造一殿飛鳥不止其上此其凡耳後竟被徵唐初開國太宗以秦王建益州臺遥領之而已貞觀十年分成都縣之東偏置蜀縣在郭下明皇西幸駐蹕成都始改蜀縣為華陽而成都華陽二縣從此分矣按今成華二縣與蜀邸䕶衛尺籍繡錯不能細為分析大較西門者屬成都東門者屬華陽而南北門則成都有三分之二華陽居其一焉予觀揚子雲答劉子駿書有少時所作成都城四隅銘則今之東西南北四門頗為近古西門者古之宣明門也南門者古之江橋門也東門者古陽城門北門者古咸陽門也李膺益州記云最東曰陽城門次西曰宣明門蜀時張儀樓即宣明門樓也重閣複道跨陽城門故太冲賦云結陽城之延閣飛觀榭乎雲中矣江橋者大江水所經也稍西為市橋曰市橋門以漢舊州市在此橋南橋下即石犀所濳淵亦曰石牛門故曰少城南面有三門焉咸陽門者秦惠王二十五年蜀侯惲賜死封其子綰為蜀侯初蜀人𦵏惲郭外綰聞惲無罪乃使使迎喪入𦵏之郭内喪車至城北門忽䧟入地中蜀人因名北門曰咸陽門矣成都縣本治赤里街秦守張若徙入少城内少城者子城也惟西南北三壁東即大城之西墉故蜀都賦云亞以少城接于其西矣周地圖記云初張儀築城城屢壞不能立忽有大龜出于江周行旋走巫言依龜行處築之城乃得立所掘處成大池龜乃伏于中龜每出則州境有賊刺史或病即此城也漢元鼎二年大城立九門少城立九門故有十八郭之稱而郡縣多城觀矣太城者今南門城也李石詩序云張儀司馬錯所築太城自秦惠公乙巳嵗至紹興壬午一千四百七十八年雖頹圯所存如斷壁峭立亦學舍一奇觀云學舍在南則太城可知矣少城者西南之間今之錦江樓也古今集記錦樓在龜城上前臨大江下瞰井邑西眺雪嶺東望長松白敏中嘗賦詩于其上舊記謂路巖所建非也巖在敏中之後矣范成大詩註云少城張儀所築子城也土甚堅橫木皆朽有穿眼土相着不解㪚予按王右軍法帖徃在都見諸葛顒曾見問蜀中事云成都城門屋樓觀皆是秦時司馬錯所修令人遠想慨然具示為廣異聞華陽國志張儀張若城成都周迴十二里高七丈造作下倉上皆有屋而置樓觀射圃又營廣府舍置鹽銕市官并長丞皆與咸陽同制更于夷里橋南立錦官錦官者猶合浦之有珠官也西又有車官城其城東西南北皆有軍營壘城焉按此皆從西南隅論耳蜀漢昭烈即位于武擔之南當在城之正中今蜀藩是也隋之摩訶池偽蜀之宣華苑皆在其内昔諸葛武侯以丞相開府領益州牧故晉益州刺史治太城其制因之亦唐節度使宋制置使所稱建牙交㦸地矣蜀太守治少城故昔之郡治因焉西門直街鼓樓即宋銅壺閣也陸游記云閣南直西川門西北距府五十步乃蔣堂知益州伐江瀆廟材所創吳栻范成大相繼而侈張之為成都巨觀書於史又吳師孟修西樓記云西樓直府寢之北毎春月花時大帥置酒高㑹叅佐於其下五日復縱民遊觀宴嬉西園以為歲事然止得造其廡序而已合此二説則府治為西門無疑相沿蜀郡太守之故址也今乃益遜而北盖不敢與藩邸抗于是斥北城之地以居故武擔山昔在城外而今在城内陸務觀有游武擔村落詩可証矣轉運使今之藩司也鈐轄使今之閫司也運司昔在城東有玉溪堂即偽蜀權臣故宅今藩司在城北閫司相沿如故若提刑漕使即今之守巡使者㪚在諸路是其職居位置皆有不同如此南門之勝如石室石犀嚴真觀江瀆池七星橋昭烈武侯祠其最著者華陽國志云始文翁立文學精舍講堂作石室一作玉室在城南永初後堂遇火太守陳留高眹更修立又增造二石室李知幾云西為文翁稍南為高眹比文翁石室差大皆有石像矣樂史寰宇記云文翁學堂一名周公禮殿方輿勝覽云前代以周公為先聖至唐貞觀始從房𤣥齡等議更祀孔子開元冊謚文宣王位南嚮自是號文宣王殿矣而周公之祀遂廢然舊像猶存帥袁説友乃為殿祀之按上南志以武侯征西南夷而夢見周公故勅所在祀周公也任豫益州記云禮殿其欒櫨節制猶古建南基高六尺厦屋三間通皆圖畫古人之像及禮器瑞物堂西有二石室繫年録云紹興六年成都教授范仲殳奏疏言本府學殿建于東漢之初平漢人以大𨽻記其修築嵗月刻于東楹至今九百四十三年盖天下棟宇之古無過于此者按歐陽修集古録以周公禮殿記蔡邕所書也范鎮云其柱鍾㑹𨽻書刻其上李知幾十詠詩説㑹與鄧艾同入蜀在咸熙元年甲申距漢獻興平元年甲戌凡七十一年矣㑹盖追丈翁高君之美而書也趙明誠金石録跋云右漢周公禮殿記者今成都府學有漢時所建舊屋柱皆正方上狹下濶此記刻在柱上靈帝初平五年立距今盖千年矣而字畫完好可讀當時石刻在者徃徃磨滅此記託于廡楹乃與金石爭壽亦異矣記有云甲午年故府梓潼文君增造吏舍二百餘間按華陽國志有文參字子奇梓潼人平帝用為益州太守不從王莽公孫述光武嘉之疑此記所載即其人也盖光武建武十年嵗次甲午云唐盧照隣文翁講堂詩錦里淹中館岷山稷下亭空梁無燕雀古壁有丹青槐落猶疑市苔深不辨銘良哉二千石江漢表遺靈岑參詩文公不可見空使蜀人傳講席何時㪚高臺豈復全豐碑文字滅㝠漠不知年裴鉶詩文翁石室有儀刑庠序千秋播德馨古栢尚留今日翠高岷猶藹舊時青人心未肯抛羶蟻弟子依前學聚螢更歎沲江無限水爭流祗願到滄溟宋李石詩來為人所愛去為人所思君看文與高慈惠蜀之師至今室中像凛凛建立時知非伯有石定是桐鄉祠蜀人愛二公遠與千載期宋京蜀事補亡詩君不見西漢文翁為蜀守蜀學不居齊魯後諸生競欲保翁名石室鐫磨貴難朽東漢高公又幾時為作石室還如兹至今二室堅且乆文公高公名不衰喻汝礪謁文公堂詩緑荻負幽隱髙槐泛輕凉各誇一時好披風互低昂詎知五月中微隂忽催黄我行魯侯宫獨謁文翁堂若人骨已朽道在斯不亡遂令蜀文章照耀日月傍世事俱腐臭斯文真久長靡頽能幾時蕭條翳墟荒富貴豈不好千載同一傷三歎為何人撫已涕自滂寰宇記云石室司馬相如教授于此從者數千人按秦宓引地里志文翁倡其教相如為之師漢家得士盛于其世矣金石録云石室又有左右生題名碑或云江陽寜蜀遂寜晉原以晉志攷之江陽蜀漢置此郡寜蜀遂寜晉原皆是宣武平蜀後置范蜀公云西漢時諸生姓名文學祭酒典學從事各一人司儀主事各一人左生七十三人右生三十人可攷者僅百許人按集古録謂為晉宋間碑矣王象之輿地碑目云大周總管太學碑益州刺史齊國公宇文憲立益州州學廟堂頌唐神龍二年史燾撰益州館學廟堂記永徽元年賀公亮撰益州孔子廟堂碑開元中周灝撰唐明皇追謚孔子冊文宋太平興國五年府尹辛仲甫立石又云石室贊大厯十年維州刺史鄭藏休撰殿中侍御史李樞篆益州文宣王廟碣㑹昌五年裴儋撰趙明誠唐益州學館廟堂記跋云成都縣令顔有意書撰人題法曹陳玉文學太子詹事待詔𢎞文館陵州長史而姓名殘缺不可辨集古録直以為有意撰非也碑隂載當時官僚姓名後人題云此記賀公亮撰未知果否繫年録云宋高宗皇帝御書大成殿榜紹興六年賜成都府學從教授范仲殳所請也成都記云偽蜀孟㫤有國其相毋昭裔刻孝經論語爾雅周易尚書周禮毛詩禮記儀禮左傳凡十經于石其書丹則張德釗楊鈞張紹文孫逢吉朋吉周德貞也石凡千數盡依大和舊本厯八年乃成公榖則有宋田元均時刻古文尚書則晁公武所補也胡元質宗愈作堂以貯之名石經堂在府學按已上諸刻今皆不存所存者孔門七十二子像又近時摹宋本而刻者人物衣褶差有古意石經禮記數段流落在合州賓館中李陽氷篆書之碑隂予友范汭見而為予言之石犀寺一名石牛寺華陽國志周顯王之世蜀王有褒漢之地因獵谷中與秦惠王遇惠王以金二笥遺蜀王王報以珍玩之物物化為土惠王怒羣臣賀曰天奉我矣王將得蜀土地惠王喜乃作石牛五頭朝瀉金其後曰牛便金有養卒百人蜀人悦之使使請石牛惠王許之乃遣五丁迎石牛既不便金怒遣還之乃嘲秦人曰東方牧犢兒秦人笑之曰吾雖牧犢當得蜀也輿地志云鄧艾廟南有石牛即秦惠王遺蜀王者水經註西南石牛門曰市橋吳漢入蜀自廣都令輕騎先徃焚之橋下謂之石犀淵李氷昔作石犀五頭以厭水精穿石犀渠于南江命之曰犀牛里後轉犀牛二頭在府中一頭在市橋一頭沈之于淵也今寺正殿階左有石蹲處狀若犀然額曰聖壽寺古之龍淵寺也迺晉王羽宅後捨為寺改名龍淵佛殿有水眼如井云與海通高僧傳晉惠持到蜀止金淵精舍是矣其後改名空慧隋賜蜀王秀竹園六十頃此地屬焉唐儀鳯二年勑天下七寺建塔立石柱二度僧嘗七百人此其一也㑹昌中廢至大中元年李回重建摹萬里橋南元和聖壽寺額監此故曰聖壽寺字則僖宗御書也寺有尊勝呪石幢高七尺圍四尺太和中馬季武行書我明嘉靖中掘地得之唐岑參石犀詩江水初蕩潏蜀人幾為魚向無爾石犀安得有邑居始知李太守伯禹亦不如杜甫石犀行君不見秦時蜀太守刻石立作三犀牛自古雖有厭勝法天生江水向東流蜀人矜誇一千載泛溢不近張儀樓今年灌口損戸口此事或恐為神羞終藉隄防出衆力高擁木石當清秋益州記曰鴈橋東有嚴君平卜處土臺高數丈祝穆方輿勝覽云龜城水中出金㕍因謂之㕍橋也錦里耆舊傳曰嚴君平宅卜肆之井猶存今為嚴真觀道教靈騐記云成都卜肆支機石即海客攜來自天河所得織女令問嚴君平者也太尉燉煌公好奇尚異命工人鐫取支機一片欲為器用椎琢之際忽若風瞀墜于石側如此者三公知其靈物乃已之至今所刻之迹在焉復令穿掘其下則風雷震驚咫尺昏曀遂不敢犯唐張九齡送姚評事入蜀賦得卜肆詩云蜀嚴化己久沈㝠空所思嘗聞賣卜處猶憶下簾時驅傳應經此懷賢儻問之歸來説徃事歴歴偶心期岑參卜肆詩君平曾賣卜卜肆蕪已久至今杖頭錢時時地上有不知支機石還在人間否鄭世翼君平古井詩嚴平本高尚遠蹈古人風賣卜成都市流名大漢中舊井改人世寒泉久不通年多既罷汲無禽乃遂空如何屬秋氣惟見落雙桐宋吕光弼詩卜肆垂簾地依然門徑開沈㝠時已徃思慕客猶來鳥啄虛簷壊狐穿古井摧空餘舊機石嵗嵗長春苔喻汝礪游嚴真觀見壁上有記古鼎丹砂事因述以詩云古木共幽意長廊亦肅如於焉步逍遥且復散衣裾塵慮颯已空道心頗閎舒不知度世人去此歲幾徂云何有丹砂尚爾留庭隅支機亦悠哉誰復訂有無我知此公意慨彼元鼎初繼之五鳳間斯民斃刀鋸聊欲謝世網歘以道自娛抱獨理自㑹曠懷遺所拘初匪逃世人而世自我疎含黙念斯理起我憂患餘宋京補亡詩云君不見莊遵賣卜成都市市中仙隠無人值百錢度日復何求猶有沈㝠見文字不因問着牛女星下世安能知姓名雲中雞犬拔家去舊宅寂寞秋蕪平搘機石在年年長藥鼎空留閉黄瓖前時發掘篆籀新明水神丹光滉瀁金㕍橋邊臺觀存神仙遺事𣺌難論安得先生為我卜俗骨庶可窺天閽括地志云江瀆祠在成都縣南上四里漢郊祀志云秦并天下立江水祠於蜀至今嵗祀之按廣雅江神謂之竒相江記云帝女也卒為江神矣漢舊儀云祭四瀆用三牲圭沈有車馬紺盖以夏之日觴焉按陸游江瀆廟碑云成都自唐有江瀆廟其南臨江及後節度使高駢大城成都廟與江始隔馮浩設㕔記云廟前臨清池有島嶼竹木之勝紅蕖夏發水碧四照為一州之觀田况成都遨樂詩伏日宴江瀆祠避暑因遊江瀆池此會起于文潞公也宋祁集江瀆池詩云五月追涼地滄江剩素漣林煙昏岸日樓影壓池天篠宻工迷徑荷欹巧避船機忘更何事魚鳥亦留連又飛檻枕溪光歡言客徧觴暫雲銷樹影驟雨發荷香辛臼橙虀熟庖刀鱠縷長蘋風如有意盈衽借浮涼又溪淺容篙短舟移覺岸長烟稠芰荷葉霞熟茘支房技疊三撾鼓杯寒十饋漿便成逃暑醉官事底相妨又九月十日宴江瀆亭詩節去歡猶在賓來賞更延悠揚非短日凄𦂳乍寒天霽沼元非漲秋花自少妍蟻留新獻酎蕙續不殘烟戲鰋衝餘藻游龜避折蓮流芳真可惜從此遂凋年華陽國志云蜀江衆多作橋故蜀立里多以橋為名西南兩江有七橋直西門郫江中冲治橋西南石牛門曰市橋城南曰江橋南渡流曰萬里橋西上曰夷里橋亦曰笮橋橋從冲治橋西出折曰長昇橋揚雄蜀記云星橋上應七星也李氷所造按七星橋者一長星橋今名萬里二員星橋今名安樂三璣星橋今名建昌四夷星橋今名笮橋五尾星橋今名禪尼六冲星橋今名永平七曲星橋今名昇仙此李膺所記矣今南門江洲中有金沙寺其處俗呼為七星灘也後漢書世祖謂吳漢曰安軍宜在七橋連星間按漢自廣都乘勝進逼成都與其副劉尚南北相望夾江為營浮橋相對公孫述使謝豐揚軍市橋出漢後襲破漢墜馬落水縁馬尾得出入壁命將夜濳渡江就尚擊豐斬之於是水之隂焉今正南門外者乃江橋耳水經注云南江橋亦曰安樂橋在城南二十五步宋孝武以橋為安樂寺改名安樂橋十六國春秋李特將起童謡云江頭橋闕下李成都北門十八子即此橋也南上為萬里橋亦名篤泉橋橋之南有篤泉矣蜀使費禕聘吳丞相亮祖之歎曰萬里之行始於今日故曰萬里橋唐岑參萬里橋詩成都與維揚相去萬里地滄江東流疾帆去如鳥翅楚客過此橋東看盡垂淚江都陸肱賦云萬里兮蜀郡隋都二橋兮地角天隅東土為揚西邦曰益架長虹于兩地客思迢迢浩積水於千秋江流脉脉結構應似途程甚偏飾丹雘以雖同彼臨淮海度軒車而既易此對銅梁正用揚益相望事也寰宇記云惠陵蜀先主陵也今有祠存號曰惠陵祠周地圖云先主祠在府西南八里惠陵東七十步齊高帝夢益州有天子鹵簿詔刺史傳覃修立而規制卑小至唐相國李囘在鎮更改置守陵户四時祭祀岑參先主廟詩先主與武侯相逢雲雷際感通君臣分義激魚水契遺廟空蕭然英靈貫千嵗張儼詩雄名垂竹帛荒陵壓阡陌終古更何聞悲風入松栢劉夢得詩天下英雄氣千秋尚凛然勢分三足鼎業復五銖錢得相能開國生兒不象賢凄凉蜀故妓來舞魏宫前宋晁逈詩天地収覇氣丘原餘閟宫野人相指似旁有若唐封當時大耳兒甚似隆凖公夫豈忘故都崎嶇巴蜀中劃然成三分正爾扼兩雄武侯抱遺恨秦隴竟莫通獨憐晉昌明千載時始逢坐看五胡亂蕭條河洛空碑目云先主廟碑貞元四年蘇端撰又云昭烈廟有裴中立武侯碑栁公綽書今存又有段尹石為樵者敲斷陳薦作詩紀之又有臨淮公武元衡碑楊嗣復祠祭畢觀碑感舊有作寄楊汝士和焉按元和初元衡鎮蜀中立為節度推官汝士先亦曾作文昌掌管也酉陽雜俎成都有唐平南蠻碑開元十九年劍南節度副大使張敬忠所立時南蠻大酋長樂浪州刺史楊盛顛為邊患明皇遣内常侍高守信為南道招慰處置使以討之拔其九城此事新舊唐書及野史皆不載按碑目以此為蕭晉用撰在昭烈廟中矣能改齋漫録蜀先主祠在成都錦官門外西夾即武侯祠東夾即後主祠蔣公堂帥蜀以禪不能保有土宇因去之大慈寺有蜀後主王衍銅像程公堂繼帥毁以鑄鐘蜀語曰任是兩王難當二堂樂史云關張二公祠俱在惠陵左右宋廬陵王立按今昭烈祠左右侍側者後主北地王諶諸葛丞相亮亮子瞻及闗張兩侯俱合為一祠也蜀志國降之日北地王諶率其官屬哭于先主廟以妻子自焚是矣酉陽雜俎云近有羣盜發蜀先主墓入穴見兩人張燈對奕侍衛十餘盜驚懼拜謝一人顧曰爾飲乎乃各飲以一杯兼乞與玉腰帶數條命速出盜至外口已漆矣帶乃巨蛇也視其穴己如舊成都記云蜀先主祠旁有猱村其民皆剔髪事浮屠而畜妻子自如及李德裕下令嚴禁乃肅如也方輿勝覽云武侯廟在府西南二里今為乘煙觀孔明表云薄田十頃桑八百株即此地孔明初亡百姓遇節朔各私祭於道上李雄稱王始為廟於少城内桓温平蜀夷少城獨存孔明廟後封武興王廟至今祠祀不絶寰宇記云諸葛亮相蜀築臺以集諸儒兼待四方賢士號曰讀書臺在章城門路西今為乘煙觀杜光庭録異記云成都書臺坊武侯宅南乘煙觀内有古井井内有魚長六七寸徃徃游于井上水必騰涌相傳其井有龍矣杜甫詩丞相祠堂何處尋錦官城外栢森森映堦碧草自春色隔葉黄鸝空好音三顧頻煩天下計兩朝開濟老臣心出師未㨗身先死長使英雄淚滿襟武少儀詩執簡焚香入廟門武侯神像儼如存因機定蜀延衰漢以計連吳振弱孫欲盡智能傾僭盜善持忠節輔庸昏宣王請戰貽巾幗始見才吞亦氣吞楊汝士詩古栢森然地修嚴蜀相祠一過榮異代三顧盛當時功德流何遠馨香薦未衰敬名探國志飾像慰甿思昔謁從征盖今聞擁信旗固宜光寵下有淚刻前碑陳薦詩建安綱紀如綫微高光基業春氷危姦豪拔劍將羣盜駈龍控虎爭雄雌武侯當日臥南陽韜稜晦角隂營為高吟梁甫比管樂胸中造化無人知東吳北魏至强大不肯逆德為其師先主歘聞元直語三徃咨求當世宜勤勤陳説扶漢室慷慨感義許驅馳一説孫權敗曹操劉氏遂肇中興基申明號令鼓雷電朂勵士卒獰蛟螭分留猛將控荆渚翼戴昭烈來坤維獻皇遘害首勸進應天嗣位開羣疑本謀憑藉蜀富庶養威用作并吞資大勲未集昭烈崩遵守顧命如周伊均平賞罰重恩信比屋道路皆熙熙七擒孟獲除後患至今南詔崇靈祠東征直據五丈原欲復咸鎬綏華夷上成先帝創業意下副四海蒼生思推忠仗順氣百倍俯視敵衆真嬰兒流星落帳芒角惡暴然不起軍如癡仲達雖走禪終虜人謀不可違天時精魂埋没已千嵗柰無英傑齊高䂓朔方男子過廟下秋天寥落霜風悲林梢脱葉響颯颯煙頭暮雨寒絲絲妖狐恠兔穴壞壁饑鵶餓鵲啼枯枝樵兒敲斷段尹石苔蘚斕斑裴相碑手植勁栢尚蒼翠疑有神靈濳䕶持睟容昏剥堂廡陋龍祠神廟窮珍奇吾心切切慕風槩灑淚踟蹰成此詩宋京詩云君不見孔明書臺遺廟旁古書不見臺荒凉臥龍未起蜀天遠茅廬日日空南陽赤符光寒白水涸秣陵王氣猶能作璋若嬰兒操虎狼脱去荆州殊不惡十倍奇才安用書此臺昔時知有無蜀人思君識故處未若江水存兵圖黄冠所居門第改秪有坊名今尚在安得臺邊見古人秋草重生類書帶蜀古蹟記云宋曹彬建隆二年為都監伐蜀謁武侯祠視宇第雄觀頗有不平謂左右曰孔明雖忠于漢然疲竭蜀之軍民不能復中原萬一何得為武當因其頺敗者折去之止留其中以祀香火左右皆諫不可俄報中殿摧塌有石碑出土尺許彬逕視之其刻字宛若新書題云測吾心腹事惟有宋曹彬讀訖下拜曰公神人也小子安能窺測哉遂令蜀守新其祠宇為文祀之而去按此古昔武侯祠也天社任淵記云昭烈廟西偏少南又有别廟忠武侯在焉老栢叅天氣象甚古詩人嘗為賦之是矣今武侯祠在百花潭與草堂並列者不知何代增設蜀中廣記卷一
