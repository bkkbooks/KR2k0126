body:
  text: 蜀中廣記卷六十九明曹學佺撰方物記第十一印璽尚書璇璣鈐曰禹開龍門導積石決岷山治九貢出𤣥珪上刻曰延喜玉受德尺錫佩王子年拾遺記曰昔伯禹入穴乃至一空裏有人身而蛇鱗口吐玉簡以授禹長十有二寸以量度天地後漢書岑彭臧宫伐公孫述拔地至繁郫前後收得節五印綬千八百枚蜀志太傅許靖等上言前闗侯圍襄陽襄陽男子張嘉王體獻玉璽璽潛漢水伏於淵泉暉景燭耀靈光徹天赤牘清裁以為雲長進璽詞雲谷雜記紹興中洞庭漁人獲一印方僅二寸其制甚古紐有連環四兩兩相貫上有一大環總之葢所以佩也漁者以為金競而訟于官辨其文乃壽亭侯印四字闗侯嘗封於漢壽亭疑必侯物遂留長沙官庫守庫吏見印上時有光焰因白于官乃遣人送荆門軍侯祠中光怪遂絶容齋隨筆云復州寳相院以建炎二年因伐木於三門大樹下土中深四尺餘得一印其環并背俱有文云漢建安二十年壽亭侯印今留於左藏庫邵州守黄沃叔啓慶元二年復買一紐於郡人張氏其文正同只欠五絲環耳予以謂皆非真漢物且漢壽乃亭名既以封雲長不應去漢字又其大比它漢印幾倍之聞嘉興王仲言亦有其一侯印一而已安得有四雲長以四年受封當即刻印不應在二十年尤非也是特後人為之以奉廟祭其數必多今流落人間者尚如此予今嵗在渝州武陵楊進士文弱以廣文分考蜀闈事竣見過損惠漢章方寸文曰闗小侯印魏景元末年滅蜀雍州兵於成都縣獲玉璧玉印各一印文似成信字獻之衞瓘瓘依周成王歸禾之義以上相國府司馬氏宣示百官而後藏之葢公孫述起成都自號成家也瓘得印時梓潼太守向充曰吾聞之譙周先帝諱備其訓具也後主諱禪其訓授也劉已具矣當授人也今中撫軍名炎而漢年極於炎興瑞出成都而藏之於相國府此天意也南齊志永明元年冬日寧蜀廣漢縣村民張慶宣陶瓦作屋見瓦間有光照屋内外以告令孔休先乃共發視獲玉璽一紐璧方八分上有鼻文曰帝真蜀檮杌武成二年獲玉璞於田令孜之故第以為國璽其文曰有德承天其祚永昌孟蜀廣政十四年冬十月望彭山副將頭楊富獲一銅印於江岸有六面方各寸許皆有篆文兩面共通一竅竅中三虚一實其直可貫其圓有規六面篆文共八十二十分夾其竅六十均在四傍各成文章印過雕鏤有竅面各一十字無竅面各十五字以印進上嚴築作瑞篆記今載其篆文於左一上召吾拜無為太昊通天下治氣同璽十五字也按此當是漢張道陵時物輿地紀勝靖康元年遂州浚城隍得方寸古銅印其文曰廣漢侯印洪邁夷堅志宣和中䕫人龍澄曽於府東大瀼水中獲玉印其文非世間篆籀恍見天神立於傍曰此印乃上帝所寳守䕶不謹遂落於此俄而不見澄懼乃奉印投元處古今丁集建炎初盧法原修治羅城役夫得小金印以獻公因㑹鄉老出而薄觀有識其文者曰漢破虜羌侯五字字分作三行漢字居其一觀畢以寄於帑紹興十年胡公世將捷於剡家灣張公壽一因取為獻按漢土德故印章以五成此先漢時物也但不知封侯者為何人又虜羌二字連稱亦史冊所未有黎州志蠻部内有渥洼池産馬其處首領號鬼王有印篆文曰武犍水軍蜀檮杌云永平二年八日什邡縣人獲銅牌以獻上有六十二字建命嗣子更名元膺字昌美以符銅牌膺昌之䜟且為文誡之長寧軍北半里西溪北岸有桃源洞宋嘉定中太守張公市民田以種桃李立亭榭掘地得銅牌刻詩云綽約去朝真仙源萬木春要知竊桃客定是㑹稽人國朝宣德中耕者于洞前復得銅牌廣一寸長二寸厚一分半金色鮮明刻詩同前華陽國志諸葛亮賜南夷鐵劵毎刺史校尉至夷輙齎以呈詣費著氏族譜蜀郭氏衆多家於北城者號北郭自敘出汾陽藏有汾陽王丹書鐵劵成都古今記云唐鐵劵二葢昭宗以賜陳敬瑄田令孜者劵形方如半甑縱長尺餘横廣不及二尺以金為字今在軍資庫但金剝落無餘字益澷滅間有不可識者敬瑄以中和三年十月受賜令孜以四年十一月受賜僖宗猶在成都明年僖宗還京師後此八年當景福六年四月二人俱為王建所殺據新唐書葢同日死令孜與敬瑄實斲喪唐室何功之有雖冒受此劵卒不可用天道果昭昭乎今劵字益就澷滅可惜錄其槩左方敬瑄劵文承㫖樂朋龜作其略曰􅖒巨鰲者鼎大於滄海斬長鯨者劒倚於青天既立異勲克膺殊寵李晟免其十死子儀成其九功鎮以金鏞賜其鐵劵後來繼者豈在他人又曰致朕身安由卿忠藎前封公爵後錫郡王詢於衆情未愜羣望今賜卿鐵劵赦卿十死其􅈗臣姓名澷滅不可復識田令孜鐵劵文略曰人臣之績古今莫儔爵位不足以荅元勲竹帛不足以紀大節式遵盛典用表殊庸宣賜駱谷扈從定難中興社稷功臣仍恕十死其宰臣裴澈兵器漢書南越反以楊僕為樓船將軍有功東越反上欲復使將為其伐前勞以書勅責之曰君欲請蜀刀問賈幾何對曰率數百夫武庫日出兵而陽不知挾偽干君過也陶𢎞景刀劒錄曰闗侯為先主所重不惜身命自採武都山鐵為二刀銘曰萬人及侯敗旹刀没於水張益德初受新亭侯自命匠鍊赤珠山鐵為一刀銘刃曰新亭侯蜀帝大將也後范張偷以入吳又曰黄忠從先主定南郡得一刀赤如血於漢中擊夏侯淵軍一日之中手刃數百蒲元傳曰君性多竒思於斜谷為諸葛亮鑄刀三千口刀成自言漢水鈍弱不任淬蜀江爽烈是大金之元精天分其野乃命人於成都取江水以淬刀既至君言水雜不可用取水者捍言不雜君以刀畫水言雜八升取水者叩頭云實於涪津渡覆水懼怖遂以涪水八升益之咸共驚伏及刀成試以竹筒納鐵珠滿中舉刀斷之應手虚落今屈耳環者乃其遺範陶𢎞景刀劒錄曰蜀主備令蒲元造刀五千口皆連環及刃口刻七十二鍊柄中通之兼有二字矣陶隠居曰後蜀李雄晏平元年造騰馬刀五百口有隷字北史太和中特賜高允蜀刀一口後漢書肅宗嘗賜諸尚書以寳劒手自署名者三人郅壽其一也署壽劒曰蜀漢文時論以壽明逹有文章故得是劒雲笈七籖云天師劒狀若生銅五節連環之柄上有隠起符文星辰日月之象重八十一兩嘗用誅制鬼神降翦兇醜昇天之日誓曰我世有一子傳印劒及都功籙頂上有朱髮十數莖以表竒相于今二十一世矣劒時有異光或聞吟吼乍存乍亡至十六世師毎借人供養以祛疾苦鄰家夜産性命危切借去有神光如燭閃然一室之中劒墮地而折經數十年十八世孫惠欽時有人挈布囊入雲錦山仙居觀周行廊廡之下云解磨鏡釘鉸師問曰有折劒銲綴得乎請看之曰可須别掃一室炭數斤以巨石為碪熾炭鎚擊反扄其門聲聞於外門人皆憂此劒淬於其手師殊不為慮頃之鎚鍛聲絶執劒以呈果完綴如舊但銲處㣲有黒痕如絲髮耳師以錢半千酬之致於老君前負囊而去出門數歩尋失所在刀劒錄曰蜀章武元年辛丑採金牛山鐵鑄八鐵劒各長三尺六寸一備自佩一與太子一與梁王理一與魯王永一與諸葛亮二與張飛闗侯一與趙雲並是亮書作風角處所又曰蜀後主禪延熈二年造大金劒長一丈二尺鎮劒口山往往輝光上燭後人處處求覔不得晉許遜令旌陽日有斬蛟第三劒至唐復出漁者網而獲之隋禮儀志侍御有左右夾轂蜀客楯劒格獸羽林八雲仙雜記成都朱善存家世寳一劒毎生神芝則天下晏清如安史黄巢之亂劒皆吐黒焰屬天不差毫釐老杜詠番劒詩虎氣必騰上龍身寧久藏元稹書劒詩渝工劒刃皆歐冶巴吏書蹤盡子雲唯我心知有來處泊船黄草夜思君王氏見聞錄偽蜀王承協幼承廕有文武才通于章律門下常養一術士授其戰陣之法人莫知也蜀主講武於星宿山下承協呈一鐵鎗重三十餘斤請試許之由是介馬盤槍星飛電轉萬人觀之咸服神異及入城又請盤城門下鐵闗五十餘斤用兩人舁致馬上當街馳之疾如電閃主大悦擢為龍捷指揮使承協於諸家兵法三令五申懸之口吻主以其年幼終不柄用焉諸葛亮教曰作部作匕首五百枚以給騎士又曰勅作部皆作十折矛以給之李膺益州記云掌天山在臨津縣山多柘堪為良弓雖檿絲燕角不能勝也今巴州地禹貢梁州厥貢砮磬華陽國志臺登縣有砮石火燒出鐵剛利蜀都賦註碧砮生越嶲㑹無縣可作箭鏃魏氏春秋曰亮作八務七戒六恐五懼皆有條章以訓勵臣子又損益連弩謂之元戎以鐵為矢矢長八寸一弩十矢皆發神僧傳云梁將王綝與陸法和守巫峽軍次白帝法和謂人曰諸葛孔明可謂名將吾自見之此城旁有其埋弩箭鏃一斛許因挿表令掘之如其言三國志蜀孟幹至吳皓欲殺之宥而將徙諸臨海幹以吳人愛蜀側竹弩言能作之皓留付作部復逃至京師唐詩品彚蘇渙少喜剽盜善白弩巴蜀商人苦之稱白蹠以比莊蹻後折節讀書登第戰國䇿曰蜀地之甲乗船浮於汶乗夏水而下江五日而至郢漢中之甲乗船出於巴乗夏水而下漢四日而至五渚沈約宋書云太祖賜孝武以諸葛亮滿袖鎧鐵帽隋書太子勇好飾蜀鎧宋史戎州鬼主有羅鬼甲葢漆生革為之其堅過于鐵出都掌夷中釋名云盾遯也跪其後避刃以隠遯也大而平者曰吳魁本出於吳為魁帥者所持也隆者曰須盾本出於蜀須所持也或曰羌盾言出於羌也諸葛亮軍令曰始出營􅆆矛㦸舒旛旗鳴皷角行三里辟矛㦸結旛旗鳴皷角未至營三里復􅆆矛㦸舒旛旗鳴皷角至營復結旛旗上皷角違令者髠音樂志漢高祖自漢中歸巴渝之兵執仗而舞既非正典悉罷不用涪陵志宋大觀間掘地得印及佩鈎刁斗上刻張飛二字因立桓侯廟隋書丹陽人耿詢以罪配給蜀王秀有巧思作馬上刻漏後秀廢詢以親信又當誅因其技巧得免蜀中廣記卷六十九
