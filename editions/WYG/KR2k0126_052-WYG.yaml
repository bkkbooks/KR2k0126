body:
  text: 蜀中廣記卷五十二明曹學佺撰蜀郡縣古今通釋第二上川南道屬嘉定州直隷管六縣漢犍為郡之南安縣地也治青衣江㑹應劭注漢書曰順帝改青衣縣為漢嘉以公孫述稱帝青衣人不賔光武嘉之也後魏於此立眉州尋改青州葢取峨眉青衣水之義矣宇文改嘉州也宋寧宗潜邸陞嘉定府今仍其名為州寰宇記云嘉州治龍游縣隋開皇初伐陳有龍見江水引軍故名又云州治對江四十里有平羌縣本漢平羌戍也周保定置縣今州之逓運所是龍游縣址平羌驛是平羌縣址青衣舖是青衣縣址峨眉縣兩山相對狀如峨眉後周所置也青衣平羗舊理此隋之綏山唐之羅目二縣入焉縣西四十里即綏山址葛由賣木羊處也縣南三十里即羅目址本羅蒙山訛為羅目也今之木羊鎮羅目街是洪雅縣界有洪雅川源出離堆離即雅也後周立洪雅鎮隋改為縣或謂葛洪寓居縣之花溪上昇故名夾江縣隋於夾江戍置縣葢分龍游平羌之地亦曰涇上志引山海經云夾水出於其隂也漢為南安縣今之南安鄉是史記年表宣虎以破臧荼功食邑於此犍為縣漢武置犍為郡治鄨今之馬湖平夷司是保乾圖曰鄨有乾山形如牛後周於沉犀山下置沉犀郡隋於大鹿山下置犍為縣志古也玉篇曰犍似豹人首一目為即猴大篆為作兩猴隋之玉津唐之應靈入焉縣治上流即璧玉津也界大牢鎮即古應靈也榮縣周十亂榮公之采地其後夷公之墓在焉又曰古有榮隱先生居此唐置榮州治旭川縣榮旭之義通矣宋光宗潜邸陞為紹熙府今復縣名榮也志云縣南八十里有公井故城即唐之公井縣址縣西八十里有銕山即晉之資官縣址皆併當縣威逺縣隋於威逺戍置縣取威撫逺人之義國初省入榮後復割榮之益昌鄉以益之眉州直𨽻管三縣地在峨眉山隂以之名州自西魏始實治嘉州若梁之齊通郡隋之通義郡唐之别置眉州則今理矣宋時陞為防禦使治眉山蘇子瞻所謂眉州眉山共一城者也晉置西江陽郡子由詩子生雖江陽指此彭山縣秦之武陽梁之靈石也漢昭帝已後及晉宋犍為郡皆理於此隋曰隆山縣屬陵州唐貞觀中以縣屬眉因界之彭女山為名又曰取彭亡山岑彭所惡也隆彭皆髙大之稱義或本此青神縣本南安縣地後周置今縣以青衣江所注也蠶叢衣青而教蠶事蜀人神之故曰青神又曰水濯衣即青丹稜縣齊之齊樂郡也後周洪雅縣地隋析出為丹稜取多稜川之名矣寰宇記多稜川有獠居焉即此卭州直𨽻管二縣漢臨卭地以臨乎卭崍矣廢火井縣隋大業置博物志云臨卭火井諸葛亮觀之轉盛是也廢依政縣後魏時置寰宇記云即秦之蒲陽縣也今州南二十五里有火井壩巡檢司州東七十里有依政縣故址蒲江縣漢宣帝地節中穿蒲江鹽井増鹽鐵官西魏始置縣又立蒲陽郡以統之今縣南八十步湧泉方丈蒲草生焉古蒲頓也大邑縣寰宇記唐咸亨中分益州之晉原縣置其壤廣大因以為名有霧中山是號霧邑雅州直𨽻管三縣取雅安山為名李冰所鑿離堆在其地也離音雅坤元錄郡國志通鑑釋文皆言之秦滅楚遷嚴王之族於此曰嚴道矣西魏置蒙山郡隋改今名名山縣漢青衣嚴道二縣界西魏始置縣謂之蒙山域中有蔡蒙也隋以二山著名禹貢改蒙曰名終唐世皆曰漢源宋乃仍舊今縣東北七十里之百丈驛則唐百丈縣焉圖經云山有一穴口圓百尺深百丈漢王陽所畏道也榮經縣唐武徳初始置縣於榮經水口戍榮經二水名也乾符中曽改為金湯軍宋初復舊蘆山縣漢之靈闗道也界有盧奴山於衆山特小隋煬帝始以名縣國初加草字以山出葭蘆矣黎州安撫司漢誅莋侯於莋都立沉黎郡以水沉黒名也後周與宋皆曰黎州元始外為土司國朝因之増置大渡河千戸所漢旄牛都尉隋登州及漢源縣皆置於此天全六畨招討司蠻獠之墟三代為氐羌西魏始陽縣地也在唐羈縻屬雅州都督五代土人高曩閣藏等歸附置碉門黎雅長河西魚通寧逺六安撫司元於碉門置六畨小溪置天全二招討國初合而為一所轄部落有馬蘇金楊隴東西碉六村謂之六畨髙姓世招討使楊姓副之建昌道屬建昌衛漢越嶲郡隋唐之嶲州也咸通中蒙氏設建昌府元置路國初改府尋廢為衞仍設行都司以統之領禮州昌州等千戸所及長官司禮州所在建昌北六十里漢蘇示縣也隋曰蘇祇唐曰蘇祁元曰禮州國初置後中二所吐蕃號為龍麽城徳昌所在建昌南六十里漢卭都縣地元置徳昌路國初改府尋廢宋時號阿屈部打中河中前二所在建昌西百四十里亦卭都地唐曰沙野城元為瀘州地河源出吐蕃下流合金沙江一名黒恵又名納夷昌州司在建昌南二百里蠻名阿屈部元始置州國初棄為長官司威龍司在建昌東南四百十里夷名巴翠部元始置州洪武中棄為長官司普濟司在建昌西南二百四十里夷名圩甸元始置州洪武中棄為長官司越嶲衛漢郡名卭都國闡縣治也應劭注漢書界有嶲水謂越此水置郡以章休盛也元為卭部州國初立衞廢為長官司矣衞在建昌北二百八十里司在衞東寧畨衛在建昌北百九十里卭都國地也元為蘇州亦取蘇示之名國初因之為衞後以地當諸畨之衝改易今名領冕山橋千戸所在衞東百二十五里山在橋東狀如冠冕㑹川衛在建昌東南五百里漢㑹無縣唐㑹同府也蒙氏呼㑹川邏若漢語安樂城然國初立府領武安永昌麻龍等州縣麻龍又曰麻泥若漢語黄土城也尋改為衞領迷易千戸所在衞西八十里鹽井衛元置閏鹽縣有黒白鹽井矣國初因之又於此立栢興州尋改今名在建昌西三百里漢之定莋縣也蒙氏為香城郡宋時名賀頭甸元初為落蘭部領打冲河所及馬剌長官司在衞南五百里下川南道屬叙州府古僰國所謂僰道縣也西漢犍為郡理梁命先鐵定夷獠於此乃立戎州宋徽宗政和中改今名取西戎即叙之義按西漢犍為理此元光已後始移武陽宜賓縣唐之義賔縣也取其慕義來賔矣宋政和年改義為宜後周曰外江以水名蜀漢曰􅛿䣕以山名慶符縣界有集慶迎祥二山宋政和中與祥州同置實唐之撫夷縣也寰宇記曰石門路即隋史萬嵗南征道志云宋有來附縣亦與當縣同置者今來復舖是富順縣漢江陽縣地有鹽井之利後周立富世縣唐避諱改富義矣宋廢縣立監始改今名亦諱也治平中復為縣元時為安撫又為州南溪縣漢晉南廣縣以拓地於夷也梁立六同郡言六合所同矣後周曰南武隋曰龍源皆稱戍仁夀中始改今名葢地居僰溪之南云龍源戍今龍騰驛是長寧縣輿地紀勝曰漢陽縣今長寧軍也按漢書漢陽縣犍為都尉治所葢夷徼云唐置州曰長寧宋改為軍立武寧縣隷之其曰鹽泉縣曰淯州曰淯井監皆以鹽名漢陽者謂自漢武南征此縣之南皆漢地矣髙縣古夜郎地唐之高州也界有宋水即宋州矣高宋舊皆羈縻州筠連縣漢定川寨唐之符連二州也元合為一隷永寧路天后時拓邊又置定州供輸紫竹縣以此名珙縣西南夷部羅計羅星地也唐為羈縻薩鞏二州鞏音近珙故名或曰珙𤣥玉也有石似之興文縣西南夷部界有晏山唐儀鳳中拓地以為州名元立大壩府繼陞戎州國初之戎縣也萬厯元年平九絲改今名取偃武修文之意隆昌縣古昌州地也隆慶改元置理隆橋驛二義兼取矣建武千户所在宋為九絲山都掌地國初隷戎縣萬厯元年討平以其山都六鄉置所對興文也城曰武寧馬湖府管屏山一縣四長官司漢牂牁郡地也界有龍湖中潜龍馬晉以之名縣矣唐始置羈縻四州於此曰馴騁浪滈元立馬湖土府國初因之𢎞治八年改流屏山縣萬厯十七年置於附郭取寳屛山為名泥溪長官司唐長慶中縣名也界有此溪平夷長官司漢之平夷縣也其半為鄨縣地晉曰平夷郡蠻夷長官司至元初宣撫司之名後以宣撫為馬湖路仍立今司沐川長官司唐髙駢平沐川寨築城於此故址尚存瀘州直𨽻管三縣江受瀘水也州在梁時治馬湖江口故遥取之宋淳祐中余玠徙治神臂山元徙今理在江之南漢曰江陽有江陽祠唐曰瀘川即瀘川驛納溪縣瀘川縣地宋初於納谿口置軍寨唐羈縻有納州以納水所自出也置縣始在紹定中元移治江北合江縣漢符縣東漢符節縣地也梁稱安樂戍後周取合符之義始置縣安樂戍故址在縣東五里安樂山江安縣本江陽地晉平漢安獠置縣於此曰漢安矣隋取二義而改今名廢綿水縣在綿水溪口今為綿水鄉瀘州衛國初調長安衞官軍征滇回駐守州治成化初山水都掌亂遷於宋江渡水源出夷界宋州永寧宜撫司介江安合江二縣境古蠻夷地也漢屬益州郡晉始置永寧縣屬雲南郡唐元和初立祖叱來彌為酋長改縣曰藺州宋廢州移治於魚漕溪口稱永寧路元改今司領筠連州騰川縣國初割筠連入叙府騰川廢為司地領太平九姓二長官司鎮雄府古號屈流大雄甸芒部所居宋始置都大巡檢司名西南畨部元稱芒部路𨽻雲南國朝仍舊名為軍民府嘉靖初土官隴政兄弟争立改流易名夷語謂凉為雄石為硌鹿為砌界有硌砌雄山謂山石類鹿而髙聳清涼也今仍為土府而印文無土字東川軍民府古東川甸也烏蠻居之南詔蒙世隆始置東川郡元改萬戸府國初牟仲由之裔祿設姑歸附改今官楊用修引樊綽雲南記云界有蒙樂山出比翼鳥即蔡蒙旅平之蒙山也未詳烏䝉軍民府古竇地甸漢牂柯郡地也唐時烏蠻阿統居此其裔名烏蒙者部落强大號烏蒙部宋世封烏蒙王元為路隷雲南本朝改軍民府土官祿姓夷語謂首為烏烏撒軍民府古名的巴甸烏蠻居之宋時其裔有析怒者拓地自强部號烏撒元季置招討司尋改軍民總管府復改宣慰司以烏蒙東川芒部𨽻焉國初改軍民府𨽻雲南洪武六年後改𨽻本省蜀中廣記卷五十二
