body:
  text: 蜀中廣記卷七十一明曹學佺撰神仙記第一川西道一華陽國志曰蜀之為國肇自人皇洛書曰人皇始出繼地皇之後兄弟九人分理九州為九囿人皇居中州制八輔華陽之壤梁岷之域是其一囿矣名號厯刧記云人皇之後五龍氏興焉天真皇人降下開明之國以靈寳真文三皇内經各十四篇授之五龍氏得此經以道治世萬二千嵗白日登仙爾時蒼生于中化生是後運動陰陽作為五行四㣲世欲生死之業于是而起人乃任性混朴茹毛飲血男女無别夏則巢居冬則穴處三十六萬嵗後神人氏興焉按開明氏蜀古國號也都南安今之嘉定州是國初蜀獻王感五龍氏之靈迎自嘉州立廟于錦官志云竇禹鈞之五子者乃俗説也史記云黄帝有子五人號五龍氏而世次則又不同當以杜天師所載為正厯劫記云神人氏生其狀神異若盤古真人亦號盤古即是無刧蒼生萬物之所承也以己形狀類象分别天地日月星辰陰陽四時五行九宫八卦六甲山川河海不能決定故以天中元景元年七月一日上登太極啓元始太上天尊更授神寳三皇内經并靈寳五符經下世則按經圖分畫天地名前劫高真更新造化按地理坤鑑云盤古龍首人身今成都有廟祀路史曰吾於廣都得盤古之祀焉杜光庭錄異記曰廣都縣盤古三郎廟頗著靈異逺近畏而敬之縣人楊知遇者嘗受正一盟威籙一夕醉甚將還其家路迷月黒過廟門因大呼曰余正一弟子也願得神力示以歸路俄有一炬火自廟門出前引之比至其家二十餘里雖狹橋細路略無蹉跌火炬亦無見矣廣都今雙流縣地元和圖經成都縣東三十里盤古祠即此䕫門亦有盤古廟太守王十朋盤古廟詩曰盤古千千古江頭遺像存伏羲猶後軰禮殿盡諸孫不屋昔非陋有祠今未尊東鄰二郎廟巫覡醉朝昏路史云鉅靈氏之在天下也握大象持化權乗太極而蹠灝淑立乎無間行乎無窮揣丸變化而與物相弊出於汾脽揮五丁之士驅陰陽反山川正流並生神化夭凝惟无恒處或云治蜀葢以其迹躔焉先天本紀黄帝南至青城山禮中皇丈人問真一之道丈人曰子既居有海内復求長生不亦貪乎頻相反覆而後授道按山海經有中皇之山即此道教靈驗經曰黄帝詣青城甯先生受龍蹻經封先生為五嶽丈人戴葢天之冠著朱光之袍佩三庭之印與灊山司命廬山使者並稱五嶽上司勑五岳神月再朝焉虛中洒水以代晷漏今名六時水是也按甯先生名封居青城之大面山黄帝禮之見玉匱經上清及青城等記劉向列仙傳以甯封子為黄帝陶正能作五色烟積火而自燔云唐僖宗中和元年辛丑七月望日詔内臣袁易簡刺史王兹縣令崔正規詣山脩醮封五岳丈人為希夷真君時縣境亢旱封醮之夜龍吟於觀側溪中風雨大至枯苖再茂縣以事聞編于國史茅君内傳云大天之内有地之洞天三十六所乃真仙所居其第五為青城之洞周迴二十里名曰寳僊九室之天司馬紫㣲天地宫府圖云青城山洞十大洞天之第五也名曰寳仙九室洞天青城丈人治之亦曰甯國丈人也司馬紫㣲七十二福地書曰大面山第五十福地仙人栢成子治之綿竹山第六十四福地瓊華夫人治之漢州滉山第六十七福地赤須先生治之仙傳拾遺云蠶女者當高辛氏世蜀地未立君長無所統攝其人聚族而居逓相侵噬廣漢之墟有人為鄰土掠去已逾年唯所乗之馬猶在其女思父語馬若得父歸吾將嫁汝馬遂迎父歸乃父不欲踐言馬跑嘶不齕父殺之曝皮於庖中女行過其側馬皮蹶然而起卷女飛去旬日見皮栖於桑樹之上女化為蠶食桑葉吐絲成繭父悔恨念之不已忽見女乗流雲駕此馬侍衞數十人自天而下謂父母曰太上以我孝能致身心不忘義授以九官仙嬪居長生屏天矣無復憶念也仍冲虛而去按唐乗異集云蜀中寺觀多塑女人披馬皮謂之馬頭娘以祈蚕事今有蠶女冡在什邡綿竹德陽三縣界而新繁蠶叢祠中舊亦塑女像皆本此云乗異一作集異遁甲開山圖曰禹得道仙人也古有大禹乃女媧十九代孫壽三百有六十入九嶷山仙去後三千六百嵗堯理天下洪水既甚人民墊溺大禹念之乃化生於石紐山泉女狄暮汲水得石子如珠愛而吞之有娠十四月生子及長能知泉源代父鯀理洪水三年功成堯知其功如古大禹知水源乃賜號禹按周公夢書曰禹夢乗舟自月中過葢翩翩然仙矣集仙錄曰李八百名脱蜀郡人居金堂山龍橋峯下修道蜀人厯代見之約其往來八百餘年因號曰李八百焉初以周穆王時來居廣漢栖𤣥山合九華丹成去遊五岳十洞後二百餘年於海上遇飛陽君授水玉之道還歸此山煉之藥成又去數百年或隠或顯遊於市朝復登龍橋峯作金鼎九丹丹成年已八百矣三於此山學道故世人號為三學山亦號為栖賢山初八百丹成試抹於岩石之上頑石化玉光彩瑩潤或有鑿崖取之即風雷迅變按蜀志補遺八百於什邡仙居山白日昇天為三月初八日也唐時賜號紫陽真人符載厚之八百洞詩云太極之年混沌坼此山亦是神仙宅後世何人來飛昇紫陽真人李八百集仙錄曰蜀郡李真多八百妹也隨兄修道居緜竹山中古跡尚在或來往浮山之側今之真多化即古浮山也亦如肺得水而浮矣真多幼挺仙姿躭尚𤣥理八百授以朝元黙真之要行之數百年狀如二十許人神氣莊肅風骨英偉異於女弱之態人或見之不敢正視其後太上老君與𤣥古三師降而度之先於八百得道白日昇天化側有澤其水常赤古神仙煉丹泉也㠯此浮山亦名萬安山上有二師井飲者愈疾按蜀志補罅真多觀在舊新都之栖賢山山有巨松常見一嬰兒出没其傍真多跡之得茯苓餌服既久身輕登巨柟而仙去足之所履有七竅如斗狀號曰星柟唐賜號妙應真人神仙傳云懷安軍真多化女人發之治是其處神仙傳曰昔李八百知唐公房有志而不遇明師欲教授之乃先往試為公房作傭客驅使任意過於他人公房甚愛之後八百詐病困劣欲死公房為命醫合藥費用數十萬錢不以為損憂念之意形於顔色八百又轉作惡瘡周身潰爛臭不可近公房乃流涕曰汝為吾家勤苦厯年而得篤疾但能愈汝無所恡惜而今正爾當奈汝何八百曰吾瘡欲愈須得人䑛公房令三婢䑛之八百曰婢䑛不能便愈若得君䑛應愈耳公房即自䑛之八百曰君䑛尚不能愈須得君妻䑛之公房又使其妻䑛之八百曰吾差矣欲得三十斛㫖酒以沐浴公房即為具酒置器中浴瘡即愈體如凝脂亦無餘痕乃告公房曰吾是仙人聞子有至心故來相試子定可教也今真相授度世之訣矣使公房夫妻及䑛瘡三婢以其浴餘酒澡洗即皆更少顔色美悦乃以丹經一卷授公房使入雲臺山合煉丹成服之仙去按梁州記曰唐公房祠在聟水北聟鄉山祠北有大坑漢碑尚在言是其舊宅公房舉宅昇去故為坑焉其地産易腸鼠束廣㣲所謂唐䑕也真誥曰帝之保命府有四丞其一人是西山唐公房矣宋史魏漢津者本蜀黥卒也自言師事唐仙人李良號八百者授以鼎樂之法嘗過三山龍門聞水聲謂人曰其下有玉即没水抱石而出果玉也崇寧初恊考鐘律召見獻樂議言得黄帝夏禹聲律身度之説且請先鑄九鼎次鑄鐘器鼎成賜號冲顯處士大晟樂成加虛和冲顯寳應先生漢津死後即鑄鼎之所建寳成殿祀黄帝夏禹成王周召以李八百漢津配食諡漢津為嘉晟侯已上二則因八百附見來敏本蜀論曰蠶叢始王蜀八萬四千嵗蠶叢死次王曰栢灌栢灌次王曰魚鳬魚鳬王田於湔上忽得仙道蜀人思之為立祠於湔上按今温江縣北十里魚鳬城是其上昇處李昊羊馬城記亦云魚鳬羽化於湔山也蜀本紀杜宇自天而降為蜀人主稱望帝號曰天隳言自天而隳也今成都北三十里天囘山是其處囘隳音同復禪位于鼈靈乃之西山得道上昇詳見方物杜鵑下蜀記曰老子西度函谷闗為闗令尹喜著道德經臨别謂曰千日後於成都青羊肆尋吾及期喜往果見於大官李氏之家授喜玉冊金文名之曰文始按今成都西南五里青羊宫是其處有青銅鑄成羊其大如麋嵗二月二十有五日四方來集以為老君與喜相遇日也成都古今集記云鴟夷子范蠡扁舟浮汎三江五湖間已而入蜀居湔上之治今有煉丹井存按開山記曰彭州漓沅化張天師二十四治之一也戰國之世於越范蠡來主此治秦韓仲為祖龍採藥使者既而入蜀煉丹于德陽之秦中觀遇京兆劉根授以神方五道乃服九節菖蒲十二年體生白毫以端午日騎白鹿上仙按真誥曰廣漢郡綿竹縣東九里有山昔韓衆於上得仙有大石銅為誌又云易遷館協辰夫人名景華得韓終所授岷山丹服而得仙夫人為漢司空黄瓊女也劉向列仙傳云王老者慕道人也一日飲道士浸瘡酒正方打麥忽風動雲蒸拔宅輕舉至空中猶聞打麥之聲按今新繁縣東二十里有打麥場是其舊蹟搜神記曰益州之西有神祠刻石為室自稱黄公相傳即張良所受黄石公之靈也清淨不殺諸祈禱者持一百錢一雙筆一丸墨詣石室前請乞先聞室中有聲須臾問來人何欲既言便具語吉凶甚凖但不見其形至今如此真誥云司馬季主漢人也得道尸解留枕席以代形粗似其身不異家人乃葬之於蜀昇盤山之南諸葛亮為之碑賛按道迹經曰德陽縣東二十里𨽻上治季主先生學道飛仙之所治應女宿司馬相如將獻賦而未知所為夢一黄衣翁謂之曰可為大人賦言神仙之事賦成以獻帝大嘉賞拜為孝文園令其辭曰世有大人在乎中州宅彌萬里曽不足以少留悲世俗之迫隘朅輕舉而逺遊垂絳幡之素霓戴雲氣而上浮建格澤之脩竿總光曜之采旄垂旬始以為幓曵彗星而為髾絶少陽而登大陰與真人乎相求屯余車而萬乗綷雲葢而樹華旗厯唐堯於崇山過虞舜於九疑朅度九江越五河時若曖曖將混濁召屏翳誅風伯刑雨師排閶闔而人帝宫載玉女而與之歸登閬風而遥集亢鳥騰而一止吾乃今日覩西王母皓然白首戴勝而穴處亦幸有三足烏為之使遺屯騎於𤣥闕軼先驅於寒門下崢嶸而無地上寥廓而無天視眩泯而無見聽敞怳而無聞乗虛旡而上遐超無友而獨存宋楊師魯嚴真觀碑略云君平父名子晞卜地創觀於武都山陰開基得碑乃知古已有上清之號觀成而君平生時漢武帝後元元年也君平長而學道煉丹成仙時成帝和平元年也傳載君平創樓以降真有神相焉嵗久樓不復存大宋紹興己丑知富順監計洵美率邑士合力重修成都塑工雷姓者遇君平於夢中起而像之得其真形今羽服而坐於新宫者是也道傍雙􅇅曰蜀莊真人正名以從其本也遊者從雙闕徑而行漢栢叅雲雁行而立古意森然於蒼翠中行數百步憇息虛橋曵杖而入孰不曰西蜀一洞天耶栢老而中虛其間可容六人圍坐鼓琴而奕棋人稱君平餌丹以餘粒埋栢樹下夜或有光恒數百年云列仙傳云赤斧者巴戎人為碧雞祠缺作水澒煉丹與硝石服之三十年反如童子毛髮皆赤後數十年上華山餌禹餘糧又蒼梧滇江間人累世見之手掌中紋有赤斧故以為號按漢書宣帝時方士言益州有碧雞金馬之神可祀而致帝遣王褒乗傳往祭之褒内傳云褒引見太上丈人着流霞袍冠芙蓉或即赤斧仙也一説王褒為碧雞使赤斧為主簿班圓文云朱軒之使鳯舉于金碧之岩本此列仙傳云崔文子泰山人世好黄老事居灊山下後作黄老丸成賣藥都市自言三百嵗民有疫炁死者萬計長吏吿之請救文子擁朱旛繫黄散以巡民間飲者即愈所愈亦萬計後去蜀賣黄藥故世寳崔文赤丸散洞仙傳云蔡長孺蜀郡人夫妻共服十精丸體氣充盈年九十生一男名度世百五十嵗復生一男名無極至三百嵗視之如少童神仙傳云李常在者蜀郡人也少治道術百姓累世奉事計其年已四五百恒無五十許家有二男一女皆已嫁娶乃去去時從其弟子曽孔二家各請一小兒年皆十七八二家亦不知何以即遣送之常在以青竹杖度二兒身遣歸置其家所卧處云徑來勿與家人語二兒承敕以杖歸家家人了不見兒去後乃見兒死在床上二家哀泣各殯埋之百餘日它弟子過郫縣逢常在將此二兒俱行二兒各附書到家發棺視之唯青竹杖耳後三十餘年居地肺山更娶婦有先婦兒來尋未至前十日常在謂後妻曰吾兒欲來見尋吾當去可將金餅與之兒至求父所在婦以金與之兒曰父捨我去數十年日夜思戀昨聞在此故來覲省不求財也更止三十日乃謂母曰父不還我去矣至外藏於草間常在還與婦曰此兒詐言當即還汝語之兒長不復須我我去不復與兒相見乃去少頃兒果來母語之如此乃泣涕而去後七十餘年常在忽去弟子見在虎壽山下居復娶妻有少子世世見之如故故號曰常在雲笈七籖云析象字伯式廣漢人也少好黄老之業後師東平先生虞叔雅亦得道者篤尚養生𤣥黙無言家世豐財散千金以賑貧苦或諫之象曰昔竇子文有言我之施物乃逃禍非避時也知者咸服焉自刻亡日尸解如蟬蜕按白帖折象自知亡日召九族燕飲辭訣乃死雲臺治中錄曰施存魯人夫子弟子學大丹之道三百年十鍊不成唯得變化之術後遇張申為雲臺治官常懸一壺如五升器大變化為天地中有日月如世間夜宿其内自號壺天人謂曰壺公因之得道在治中按懸壺處在蜀都北門見古今記費長房東漢時為市掾從壺公學仙後辭歸與一竹杖曰騎此任所之既至可投葛陂中又為作一符曰以此主地上鬼神長房乗杖須㬰來歸自謂去家旬日而已十餘年所投陂中杖顧視之已化為龍矣按葛陂在雙流西十五里之龍池寺近温江界神仙傳沈羲者吳郡人也學道於蜀中代人消災除患功德感天天神識之羲與妻賈氏共載詣子婦卓孔家還道逢白鹿車一乗青龍車一乗白虎車一乗從騎數十人皆朱衣仗矛帶劒輝赫滿道問羲曰君是道士沈羲否羲愕然不知何等答曰是也騎曰羲有功於民心不忘道從生以來履行無過受命不長壽將盡矣黄老特遣仙官下迎耳侍郎薄延白鹿車是也度世君司馬生青龍車是也送迎使者徐福白虎車是也須臾有三仙人羽衣持節以白玉版青玉界丹玉字授羲羲不能讀遂載昇天爾時道間耕鋤人皆見之不知何等須㬰大霧霧解失其所在但見羲所乗車牛在田中食苖後四百餘年羲還鄉里推求得數十世孫名懷懷喜曰聞先人相傳有祖仙去今果然矣因欵留羲數十日為説初上天時不見天帝但見老君老君東向坐左右敕羲不得謝但嘿坐而已宫殿鬱鬱有如雲氣五色𤣥黄不可名字侍從數百多女少男庭中有珠玉之樹衆芝叢生龍虎辟邪遊戲其間但聞琅琅如銅鐵聲四壁熠熠有符書著之老君身長一丈被髮文衣身體有光須㬰數變玉女持金案玉盃盛藥賜羲曰此是神丹飲者不死夫妻各得一刀圭吿言飲畢拜而不謝服藥後賜脯五寸又棗二枚大如雞子老君乃賜符遣去曰可還人間與百姓救苦若欲來上界書此符懸之竿杪吾當迎接仍以仙方一首賜羲羲奄忽如睡已在地上今人尚有傳其符者神仙傳欒巴者蜀郡成都人也少好道不修俗事時蜀守躬詣巴屈為功曹它日問巴有神術寧可試見一竒乎巴曰唯即平坐却入壁中去冉冉如雲氣狀須㬰失巴所在壁外人見巴化成一虎人並驚虎徑還功曹舍復為人後舉孝廉除郎中遷豫章太守廬山廟有神能於帳中共外人語飲酒投杯空中又能使宫亭湖中分風舉㠶船行相逢巴至郡往廟中便失神所在巴曰廟魅詐為天官損百姓日久罪當誅乃以郡事付功曹自行捕逐云若不時討恐游行天下枉病良民所至推問山川社稷求魅踪跡此魅於是走至齊郡化為書生美談五經太守即以女妻之巴表請解郡徃捕既至謂太守曰賢壻非人也請見之太守駭甚召壻不出巴曰出之甚易請太守筆硯奏案作符符成長嘯空中若有人將符去一坐皆驚須㬰壻自齎符至庭見巴不敢前巴叱曰老魅何不復尒形應聲即變為一狸叩頭乞活巴敇殺之人見空中刀下狸頭墮地太守女已生一兒復化為狸亦殺之巴乃還豫章豫章舊多魅及獨足鬼為百姓病從此消滅後徵為尚書郎正旦大㑹巴到已有酒容上賜百官酒巴不飲而西南向噀之有司奏巴不敬詔問巴巴曰臣鄉里以臣能治鬼䕶病生為臣立廟今旦有耆老皆至廟中享臣不能早委之是以有酒容臣適見成都市上火起故潄酒為爾救之非敢不敬詔發驛書問成都已奏言正旦食後失火須㬰有大雨三陣從東北來火乃止雨著人皆作酒氣按後漢書巴字叔元順帝世以宦者給事掖庭補黄門令遷桂陽豫章二郡太守有罪禁錮靈帝即位大將軍竇武太傅陳蕃輔政徵拜議郎蕃武被誅巴以其黨復讁永昌太守以功自劾辭病不行上書極諫理陳竇之寃帝怒下詔切責收付廷尉巴自殺予讀劒經欒巴昔作兵解去入林慮山中積十三年而後還家今在鵠鳴赤石山中註云巴下獄死是用靈丸解去也蜀中廣記卷七十一
