body:
  text: 蜀中廣記卷四十三明曹學佺撰人物記第三川南道周尹吉甫江陽人仕為卿士成康既沒周室寖衰八世而厲王暴虐周人逐之出居于彘玁狁內侵逼近京邑王崩子宣王靖即位命吉甫帥師伐之有功而歸詩人作歌以敘其事宣王所以勵精圖治修文武之舊業諸侯復宗周者吉甫匡正調護之力也後宣王倦勤頗疏黃髮命仲山甫城齊意在逺之吉甫作蒸民之詩以送其行見大雅伯竒者吉甫之子有賢行性至孝幼而失母繼母妬之譖于吉甫吉甫大怒欲殺伯竒裸其衣冠而逐之於是伯竒編水荷而衣採楟花而食朝而履霜自傷無罪見逐乃援琴而歌履霜之操曲終投河而死其尸逆流上至嚴道九折坂之曲於是土人哀之相與葬於其處而祠祀焉後吉甫知其寃乃築思子之臺而出其後妻西漢林閭字公儒臨卭人善古學古者天子有輶車之使自漢興以來劉向之徒但聞其官不詳其職惟閭與嚴君平知之曰此使考八方之風雅通九州之異同主海內之音韻使人主居髙堂知天下風俗也楊雄聞而師之因作方言閭隱遁世莫聞也陳立字少遷臨卭人成帝時牂牁有亂王鳯薦立為太守克平禍亂徙巴郡又徙天水皆為天下最帝賜黃金四十斤入為左衛護軍楊莾字翁君武陽人辟犍為功曹刺史王尊當之州移書諸郡不得遣迎惟犍為遣莾尊大怒莾前對曰使君不使奉迎謙也太守承迎敬也謙敬上下之節不可廢也尊乃悅請辟别駕舉茂才官至揚州刺史趙敦字建侯武陽人初為新都令三司及大將軍梁冀纍辟終不詣而冀辟書不絶後冀自殺使者監守不使人吊問敦獨往吊祭訖自拘有司天子赦之隗相字叔通僰道人事毋至孝母欲飲江中正流相冬夏汲之一朝忽生橫石於正流中時以為孝感所致哀帝世察孝平帝世為郎吳順字叔和僰道人事母至孝赤烏巢其門甘露降其户察孝亷為永昌太守任永字君業犍為僰道人長厯數王莽時托目青盲公孫述據蜀纍徴不詣子溺井中死見而不言婢淫于前而不怒及述平乃曰世適平目即明婢乃自殺光武徴之以年老不詣朱遵字孝仲武陽人公孫述僭號遵為犍為郡功曹領軍拒戰於六水門衆小不敵乃埋車輪絆馬必死為述所殺光武嘉之追贈復漢將軍郡縣為立祠費貽字奉君南安人也公孫述時漆身為厲𦍕狂避世述破為合浦守蜀中歌之曰節義至仁費奉君不仕亂世不避惡名修身於蜀紀名亦足後世為大族趙松字君橋武陽人為童子數咨問費貽貽當公孫述時陽狂避世松密與周旋終不露之述平舉茂才為上黨太守李磬字文寺嚴道人也為長章表主簿旄牛夷叛入攻縣表倉卒走鋒刃交至磬傾身捍表謂賊曰乞殺我活我君賊乃殺之表得免太守嘉之圖象府庭東漢張晧字叔明武陽人六世祖良髙帝時封留矦晧少遊學京師永元中歸仕州郡辟大將軍鄧隲府五遷至尚書僕射職事八年出為彭城相永寧元年徵拜廷尉晧雖非法家而留心刑斷數與尚書辨正疑獄多以詳當見從時安帝廢皇太子為濟隂王晧與太常桓焉太僕來厯廷爭之不能得退而上疏曰昔賊臣江充造搆讒逆至今戾園興兵終及禍亂後壼關三老一言上乃覺悟雖追前失悔之何逮今皇太子春秋方始十嵗未見保傅九德之義宜簡賢輔就成聖質書奏不省及順帝即位拜晧司空在事多所薦達天下稱其推士時清河趙騰上言災變譏刺朝政章下有司收騰繫考所引黨輩八十餘人皆以誹謗當伏重法晧上疏諌曰臣聞堯舜立敢諌之鼓三王樹誹謗之木春秋採善書惡聖主不惡芻蕘騰等雖干上犯法所言本欲盡忠正諌如當誅戮天下杜口塞諌爭之源非所以昭德示後也帝乃悟減騰死罪一等餘皆司寇四年以隂陽不和䇿免陽嘉元年復為廷尉其年卒官時年八十三遣使者弔祭賜葬地於河南縣子綱張綱字文紀少明經學雖為公子而厲布衣之節舉孝亷不就司徒辟髙第為御史時順帝委縱宦官有識危心綱常感激慨然嘆曰穢惡滿朝不能奮身出命歸國家之難雖生吾不願也退而上書曰詩曰不愆不忘率由舊章大漢初隆及中興之世文明二帝德化尤盛觀其為理易循易見但恭儉守節約身尚德而已中官常侍不過兩人近幸賞賜裁滿數金惜費重人故家給人足夷狄聞中國優富任信道德所以姦謀自消而和氣感應頃者以來不遵舊典無功小人皆有官爵冨之驕之而復害之非愛人重器承天順道者也伏願陛下少留聖思割損左右以奉天心書奏不省漢安元年選遣八使徇行風俗皆耆儒知名多厯顯位唯綱年少官次最微餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐狸遂奏曰大將軍冀河南尹不疑蒙外戚之援荷國厚恩以芻蕘之資居阿衡之任不能敷揚五教翼讚日月而專為封豕長蛇肆其貪叨甘心好貨縱恣無底多樹諂諛以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者書御京師震竦時冀妹為皇后內寵方盛諸梁姻族滿朝帝雖知綱言直終不忍用時廣陵賊張嬰等衆數萬人殺刺史二千石寇亂揚徐間積十餘年朝廷不能討冀乃諷尚書以綱為廣陵太守因欲以事中之前遣郡守率多求兵馬綱獨請單車之職既到乃將吏卒十餘人徑造嬰壘以慰安之求得與長老相見申示國恩嬰初大驚既見綱誠信乃出拜謁綱延置上坐問所疾苦乃譬之曰前後二千石多肆貪暴故致公等懷憤相聚二千石信有罪矣然為之者又非義也今主上仁聖欲以文德服叛故遣太守思以爵祿相榮不願以刑罰相加今誠轉禍為福之時也若聞義不服天子赫然震怒荆揚兖豫大兵雲合豈不危乎若不料強弱非明也棄善取惡非智也去順效逆非忠也身絶血嗣非孝也背正從邪非直也見義不為非勇也六者成敗之幾利害所從公其深計之嬰聞泣下曰荒裔愚人不能自通朝廷不堪侵枉遂復相聚偷生若魚遊釡中喘息須臾間矣今聞明府之言乃嬰等更生之晨也既陷不義實恐投兵之日不免拏戮綱約之以天地誓之以日月嬰深感悟乃辭還營明日將所部萬餘人與妻子面縛歸降綱乃單車入嬰壘大會置酒為樂散遣部衆任從所之親為卜居宅相田疇子弟欲為吏者皆引召之人情悅服南州晏然朝廷論功當封梁冀遏絶乃止天子嘉美徵欲擢用綱而嬰等上書乞留乃許之綱在郡一年年三十六卒百姓老幼相携詣府赴哀者不可勝數綱自被病吏人咸為祠祀祈福皆言千秋萬嵗何時復見此君張嬰等五百餘人制服行喪送到犍為負土成墳詔曰故廣陵太守張綱大臣之苗剖符統務正身𨗳下班宣德信降集劇賊張嬰萬人息干戈之役濟黎庶之困未升顯爵不幸早卒嬰等縗杖若喪考妣朕甚愍焉拜綱子續為郎中楊渙字孟文武陽人也以清秀博厯臺郎相稍遷尚書中郎司𨽻校尉甚有嘉聲美稱陽姬武陽人生自寒微父坐事閉獄是時楊渙為尚書郎告歸郡縣敬重之姬為處女乃遮道扣渙馬訟父罪言辭慷慨涕泣渙異之為告郡縣出其父因為子文方聘之後文方為漢中太守以趙宣為賢將察孝亷函封未定病卒姬祕不發喪先遣孝亷上道乃發喪宣得進姬之力也孝女叔先雄者犍為人也父泥和永建初為縣功曹縣長遣泥和拜檄謁巴郡太守乘船墮湍水物故尸喪不歸雄感念怨痛號泣晝夜心不圖存常有自沈之計所生男女二人並數嵗雄乃各作囊盛珠環以繫兒數為訣别之辭家人每防間之經百許日後稍懈雄乃乘小船於父墮處慟哭遂自投水死弟賢其夕夢雄告之曰却後六日當共父同出至期伺之果與父相持浮于江上郡縣表言為雄立碑圖象其形進揚武陽楊氏女大匠廣漢王堂長子博妻也博後母有母儀之德進揚則其教為行閨門雍穆牂柯太守李禕家亦假係每不和歎恨徒冨貴學問不及博家也助陳臨卭陳氏女犍為楊鳯圭妻也鳯圭亡養遺生子守節兄弟必欲改嫁乃引刀割咽宗族駭之幾死遂全其義周度僰道人也相登妻十九登亡中牟令吳厚因人求之斷髮以誓志後人猶欲求之乃割其鼻養子早亡其妻在亦年十九遂俱守世感歎婦姑之貞專其節操也曹敬姬南安人也周紀之妻十七出適十九紀亡遺生子元餘服闋父母以許孫賓詒母病迎還知之自投水人赴之氣已絶一日一夜乃蘇息送依紀弟居訓導元餘號為女學士年九十卒黃帛僰道人張貞妻也貞受易於韓子方去家二十里船覆死貞弟求喪經月不得帛乃自往沒處躬訪不得遂自投水中大小驚睨積十四日持夫手浮出時人為語曰符有先絡僰道帛求其夫天下無有其偶縣長韓子冉嘉之召帛子幸之為縣股肱韓薑僰道人尹仲讓妻也二十讓亡服除資中董臺因從事王為表弟求薑不許臺門生左習王蘇以為薑可奪教薑家言母病迎還韓氏因逼成婚薑聞故自殺太守巴郡龔楊哀之殺習蘇以報薑死謝姬南安人武陽儀成妻也成死以已年壯無子將葬乃預作殯殮具毒藥須夫棺入墓拊棺吞藥而死遂同葬縣以表郡郡言州州上尚書天子咨嗟下書每大赦賜家帛四匹蜀榖二石三國伍梁字德山南安人也儒學雅尚州選迎牧諸葛為功曹遷五官中郎將常璩贊曰德山耽學德以光時楊洪字季休武陽人先主定蜀太守李嚴命為功曹嚴欲徙郡治舍洪固諫不聽遂辭請退嚴復薦洪為蜀郡從事先主爭漢中急書發兵軍師諸葛亮以問洪洪曰漢中乃益州咽喉存亡之機會若無漢中則無蜀矣此家門之禍也方今之事男子當戰女子當運發兵何疑時蜀郡太守法正從先主北行亮於是表洪領蜀郡太守衆事皆辦遂使即真頃之轉為益州治中從事先主既稱尊號征吳不克還駐永安漢嘉太守黃元素為諸葛亮所不善聞先主疾病懼有後患舉郡反燒臨卭城時亮東行省疾成都單虛是以元益無所憚洪即啓太子遣其親兵使將軍陳曶鄭綽討元衆議元若不能圍成都當由越嶲據南中洪曰元素性凶暴無他恩信何能辦此不過乘水東下詣主上平安面縛歸死如其有異奔吳求活耳勑曶綽但於南安峽口遮即便得矣曶綽承洪言果生獲元建興元年賜爵關內矦復為蜀郡太守忠節將軍後為越騎校尉領郡如故五年丞相亮北征漢中欲用張裔為留府長史問洪何如洪對曰裔天姿明察長於治劇才誠堪之然性不公平恐不可專任不如留向朗朗情偽差少裔隨從目下效其器能於事兩善初裔少與洪親善裔流放在吳洪臨蜀郡裔子郁給郡吏微過受罰不特原假裔後還聞之深以為恨與洪情好有損及洪見亮出至裔許具説所言裔答洪曰公留我了矣明府不能止時人或疑洪意自欲作長史或疑洪知裔自嫌不願裔處職典後事也後裔與司鹽校尉岑述不和至於忿恨亮與裔書曰君昔在柏下營壞吾之用心食不知味後流迸南海相為悲嘆寢不安席及其來還委付大任同奬王室自以為與君古之石交也石交之道舉讐以相益割骨肉以相明猶不相謝也况吾但委噫于元儉而君不能忍邪論者由是明洪無私洪少不好學問而忠清欵亮憂公如家事繼母至孝六年卒官費詩字公舉南安人先主領益州牧以詩為督軍從事出為牂牱太守還為州前部司馬先主為漢中王遣詩拜關侯為前將軍侯聞黃忠為後將軍怒曰大丈夫終不與老兵同列不肯受拜詩謂侯曰夫立王業者所用非一昔蕭曹與髙祖少小親舊而陳韓亡命後至論其班列韓最居上未聞蕭曹以此為怨今漢王以一時之功隆崇於漢室然意之輕重寧當與君侯齊乎且王與君侯譬猶一體同休等戚禍福共之愚謂君侯不宜計官號之髙下爵祿之多少為意也僕一介之使銜命之人君侯不受拜如是便還但相為惜此舉動恐有後悔耳侯大感悟遽即受拜後羣臣意欲推漢中王稱尊號詩上疏曰殿下以曹操父子逼主篡位故乃羈旅萬里糾合士衆將以討賊今大敵未克而先自立恐人心疑惑昔髙祖與楚約先破秦者王及屠咸陽獲子嬰猶懷推讓况今殿下未出門庭便欲自立耶愚臣誠不為殿下取也由是忤旨左遷部永昌從事建興三年隨丞相亮南征歸至漢陽降人李鴻來詣亮見鴻時蔣琬與詩在坐鴻曰間過孟逹許適見王沖從南來言往者達之去就明公切齒欲誅達妻子賴先主不聽耳達言諸葛亮見顧有本末終不爾也盡不信沖言委仰明公無復已已亮謂琬詩曰還都當有書與子度相聞詩進曰孟達小子昔事振威不忠後又背叛先主反覆之人何足與書邪亮默然不答亮欲誘逹以為外援竟與逹書蔣琬秉政以詩為諌議大夫卒于家張翼字伯恭武陽人髙祖司空晧曽祖廣陵太守綱皆有名迹先主定益州翼為書佐纍遷至廣漢蜀郡太守建興九年為庲降都督綏南中郎將翼性持法嚴不得殊俗歡心耆率劉胄背叛作亂翼舉兵討胄胄未破會被徵當還羣下咸以為宜便馳騎即罪翼曰不然吾以蠻夷蠢動不稱職故還耳然代人未至吾方臨戰場當運糧積榖為滅賊資豈可以黜退之故而廢公家之務乎於是統攝不懈代到為發馬忠因其成基以破殄胄丞相亮聞而善之亮出武功以翼為前軍都督領扶風太守亮卒拜前領軍追論討劉胄功賜爵關內矦延熙元年入為尚書稍遷督建威假節進封都亭侯征西大將軍十八年與衛將軍薑維俱還成都維議復出軍唯翼庭爭以為國小民勞不宜黷武維不聽將翼等行進翼位鎮南大將軍維至狄道大破魏雍州刺史王經經衆死於洮水者以萬計翼曰可止矣不宜復進進或毁此大功維大怒曰為蛇畫足維竟圍經於狄道城不能克自翼見異論維心與翼不善然常牽率同行翼亦不得已而往景耀二年遷左車騎將軍領冀州刺史六年與維咸在劔閣共詣降鍾會于涪明年正月隨會至成都為亂兵所殺楊戲字文然武陽人少與巴西程祁巴郡楊汰蜀郡張表並知名丞相亮深識之戲年二十餘從州書佐為督軍從事職典刑獄論法決疑號為平當府辟為屬主簿亮卒為尚書右選部郎刺史蔣琬請為治中從事史琬以大將軍開府又辟為東曹掾遷南中郎參軍副二庲降都督領建寧太守有疾徵還成都拜護軍監軍出領梓潼太守入為射聲校尉所在清約不煩延熙二十年隨大將軍薑維出軍漢中戲素心不服維酒後言笑每有傲弄之辭維外寬內忌竟不能堪軍還有司承旨奏戲免為庶人後景耀四年卒戲性簡惰未嘗以甘言加人過情接物書符指事希有盈紙然篤於舊故居誠存厚與巴西韓儼黎韜童幼相親厚後儼痼疾廢頓韜無行見捐戲經紀振恤恩好如初又時人謂譙周無當世才少歸敬者唯戲重之嘗稱曰吾等後世終自不如此長兒也有識者以此貴戲戲以延熙四年著季漢輔臣贊王謀字元泰漢嘉人有容止操行劉璋時為巴郡太守先主定益州以為别駕及為漢中王謀為缺府賜爵關內侯遷太常後大將軍蔣琬問張休曰漢嘉前輩有王元泰今誰繼者休對曰至於元泰州里無繼况鄙郡乎其見重如此衛繼字子業嚴道人兄弟五人繼父為縣功曹縣長張君無子乞繼為子繼敏逹夙成學識通博而兄弟四人各無堪當世者父恆言已之將衰張明府將盛也會法禁以異姓為後故為復衛氏纍官奉車都尉大尚書鍾會之亂遇害成都晉李宓字令伯武陽人祖父光朱提太守父早亡母何更行宓養于祖母治春秋左氏傳博覽五經多所通涉機警辨捷辭義響起事祖母以孝聞宓在蜀漢時本州辟從事尚書郎大將軍主簿太子洗馬奉使聘吳吳主問蜀馬多少對曰官用有餘民間自足吳主與羣臣泛談謂寧為人弟宓曰願為人兄問何故曰養親之日長吳王稱善蜀平後鄧艾請為主簿致書欲與相見不往武帝立徵為太子洗馬詔書屢下郡縣逼遣宓上表陳情乞養祖母武帝覽表嘉其誠款賜奴婢二人下郡縣供其祖母奉膳及祖母卒服終從尚書郎為河內溫縣令教化嚴明初中山諸王每過溫縣必責求供給吏民患之及宓至中山上箋諸王引漢髙祖過沛賓禮老幼桑梓之供一無煩擾伏惟明王孝思惟則動識先戒本國望風式歌且舞誅求之辟所未聞命自後諸王不敢有煩而貴勢憚其公直宓去官為州大中正宓性方直不曲意勢位後失荀勗張華旨左遷漢中太守帝命朝官餞之酒酣賦詩以詞涉譏諷為有司所奏罷官諸王多以為寃子賜李賜字宗碩宓之長子少善屬文嘗作玄鳥賦詞義甚美辟州别駕舉秀才未行而卒弟興字雋石亦富文才刺史羅尚辟為别駕及尚為李雄所攻使興詣鎮南將軍劉宏求救兵宏許之宏聞興有文學因至諸葛孔明隆中觀其故宅立碣表閭命興為文又立碣於羊叔子峴山皆興之筆楊邠字岐之武陽人少好學志古澡厲名行纍官汶山太守值夷復讐徙廣漢永嘉初進衡陽內史遇流民叛亂攻沒長沙湘東邠輒救助賊衆轉盛遂破郡城獲邠欲以為主邠不許賊晝夜執守邠候其少怠夜急走收其餘衆軍重欲投湘州刺史荀眺共圖進取會眺降賊邠孤軍固城賊攻圍之勢死不移遂卒城中事聞贈淮南內史楊稷武陽人泰始初為交趾太守平九真鬱林日南四郡斬吳交州刺史劉俊大將軍修則武帝方授交州會孫皓遣大將軍薛珝陶璜十萬人來攻被圍凡八月救援不至遂為珝璜所獲嘔血而死追贈交州刺史侯馥字世明江陽人察孝亷寧州刺史王遜表馥為江陽太守李雄征東大將軍李恭己在江陽舉衆來攻馥衆寡不敵為恭所獲送雄雄必欲屈之使馥同郡人張迎喻曉馥怒罵迎曰吾等國亡不能存大難不能死低睂海內何面目相見也且王寧州以吾有桑梓之恥故遣吾討義受命之日實忘寢食但牽揣不及為他所先當滅身以謝不及冀上不負日月下不愧王侯吾豈茍生如卿兒女之人乎迎還白雄雄義而赦之費立字建熙南安人學義沖邃玄靜沈默察孝亷王國中尉王年少好輕行遊觀立常正色匡諌出為成都令以性公亮入為州大中正歷益梁寧三州都督兼尚書封關內侯南北朝任果字靜鸞南安人也世為方隅豪族仕于江左祖安東伯父褒各為蜀中郡守刺史果性勇決志在立功西魏廢帝元年率所部來附周太祖宇文泰嘉其逺至待以優禮果因面陳取蜀之䇿即授大將軍儀同三司封南安縣公邑一千户及尉遲逈以益州未下復令果乘傳歸南安率鄉兵二千人從逈征蜀尋授驃騎大將軍開府儀同三司蕭紀遣趙拔扈等率衆三萬來援成都果從大軍擊破之及成都平除始州刺史在任未久果請入朝太祖許之以其方隅首望早立忠節乃進爵安樂郡公賜以鐡劵聽世相傳襲並賜路車駟馬及儀衛等以光寵之後為刺客所害年五十六唐先汪合江人七嵗日誦萬言貞元中舉神童為本縣令尋退居安樂山以九經教授弟子梁震卭州人僖宗時登進士第見天下亂乃不授官還蜀過荆州為節度使髙季昌所留欲奏為判官恥之去則又恐及禍遂稱唐進士以終身季昌資其謀稱曰先輩是時唐莊宗滅梁威震天下季昌懼欲自入朝問于震震曰沙陀虎狼之國也其志欲削平海內久矣公乃自投虎口耶唐主雖英特然非永世之器不久其國必亂公但保境恤民無失事大之禮彼已驕縱不過十年事當反覆矣季昌不從及至唐羣臣屢勸留之季昌行賂於嬖幸乃得歸見震握手泣曰不聽先生言幾不相見遂繕城積粟為戰守之備季昌死子從誨立以兄事震省刑薄斂境內乂安震曰先王待我以布衣交以嗣王屬我今王能自立吾不復事人矣遂築室土州自稱荆臺處士以夀終蘇祐刺史蘇味道之後家于眉山自少極力問學頴悟過人嘗至成都遇一道士有異術謂之曰吾能變化百物將以授子祐固辭道士笑曰是果有以過人矣子果以施豫顯名果子序讀書通大義為詩逹志教子淡渙洵皆有成楊義方眉山人舉進士仕蜀長於詩自以其才過唐羅隱云蜀中廣記卷四十三
