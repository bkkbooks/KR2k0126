body:
  text: 蜀中廣記卷九十一明曺學佺撰著作記第一經部石本九經容齊隨筆云孟昶時所刻其書淵世民三字皆闕畫蓋唐髙祖太宗諱也王象之碑目云在成都府學范成大石經始末記云石經已載前記朝子止乃作考異考異之作大抵以監本參校互有得失其間顛倒缺訛所當辨正然古今字畫雖少不同而實通用耳考異并序凡二十一碑具在石經堂中子止之序曰鴻都石經自遷徙鄴雍遂茫昧于人間唐太和中復刻十二經立石國學後唐長興中詔國子博士田敏與其僚校諸經鏤之板故今世太學之傳獨此二本爾按趙清獻公成都記僞蜀相母昭裔捐俸金取九經琢石于學宫而或又云毌丘裔依太和舊本令張德釗書皇祐中田元均補刻公羊榖梁二傳然後十二經始全至宣和間席升獻又刻孟子參焉今考之僞相實毋昭裔也孝經論語爾雅廣政甲辰嵗張德釗書周易辛亥嵗楊鈞孫逢吉書尚書周德貞書周禮孫朋吉書毛詩禮記儀禮張紹文書左氏傳不志何人書而祥字闕其畫亦必為蜀人所書然則蜀之立石蓋十經其書者不獨德釗而能盡用太和本固已可嘉凡歷八年其石千數昭裔獨辦之尤偉然也公武异時守三榮嘗對國子監所模長興板本讀之其差誤蓋多矣昔議者謂太和石本授寫非精時人弗之許而世以長興板本為便國初遂頒布天下收向日民間寫本不用然有訛舛無由參校判知其謬猶以為官既刋定難於獨改由是而觀石經固脫錯而監本亦難盡從公武至少城寒暑一再易節暇日因命學官讎校之石本周易說卦乾健也以下有韓康伯注略例有邢璹注禮記月令從唐李林甫改定者監本皆不取外周易經文不同者五科尚書十科毛詩四十七科周禮四十二科儀禮三十一科禮記三十二科春秋左氏傳四十六科公羊傳二十一科榖梁傳一十三科孝經四科論語八科爾雅五科孟子二十七科其傳注不同者尤多不可勝紀獨計經文猶三百二科迹其文理雖石本多誤然如尚書禹貢篇夢土作又毛詩日月篇以至困窮而作是詩也左氏傳昭公十七年六物之占在宋衛陳鄭乎論語述而篇舉一隅示之衛靈公篇敬其事而後食其祿之類未知孰是先儒有改尚書無頗為無陂改春秋郭公為郭亡者世皆譏之此不敢决之以臆姑兩存焉亦鐫諸樂石附于經後不誣方將必有能考而正之者子止又刻古文尚書于堂而為之序曰秦更前代法制以來凡曰古者後世寥乎無聞書契之作固始於伏羲然變狀百出而不彼之若者亦已多矣尚書一經獨有古文在豈非得於壁間以聖人舊藏而天地亦有所護不忍使之絶滅中雖遭漢巫蠱唐天寶之害終不能晦蝕今猶行於人間者豈無謂耶况孔氏謂尚書以其上古之書也當時科斗既不復見其為隸古定此實一耳雖然聖人逺矣而文字間可以概想則古書之傳不為浪設豫抵少城作石經考異之餘因得此古文全編於學宫乃延士張倣吕氏所鏤本書丹刻諸石是不徒文字足以貽世若二典曰若奧之類學者可不知歟嗚呼信而好古學于古訓乃有獲蓋前牒所令方將配孝經周易經文之古者附於石經之列以故弗克第述一二以示後之好竒字者識又安知世無揚子雲時乾道庚寅仲夏望日胡元質跋云石經云者恐俗儒穿鑿經籍疑誤後學而立也漢靈帝時博士試甲乙科爭第髙下至有行賂改蘭臺漆書經字者諸儒受詔於熹平成刻於光和俾天下咸取則焉碑髙一丈廣四尺水經云立石太學其上悉刻蔡雍名隋志有一字石經七種其論云漢鐫七經皆蔡雍書史亦稱雍自書丹使工鐫刻其書畫超詣要非中郎不能到也然至今存者體各不同雖中郎兼備衆體而篇章之富未必能辦於一人之手傳稱雍與堂溪典楊賜馬日磾張馴韓說單揚等正定諸經意者當時諸儒同涉筆於其間不可知也歷年多更變故久陵遷谷變煨燼剝蝕之餘甚至取為柱礎為炮石者唐初魏鄭公首訪求之十得其一况於今哉兹來少城得墜刻於一二故家雖間斷不齊然殘圭裂璧亦可寶也因以鑱之錦官西樓庶幾補古之缺文云爾張縯跋云石經本末丞相洪公論載於隸釋詳矣洪公所未及者今粗見於此唐章懷太子引洛陽記注范曄漢書稱石經凡四十六碑及髙澄遷石經於鄴通鑑所書為五十二碑自東漢歷魏晉宋數百年間洛陽數被兵此碑當有毁者其遷於鄴乃視洛陽記多六焉疑洛陽記未詳也碑製髙一丈廣四尺六經丈多必非四十六碑所能盡者宋常山公河南志稱石經凡七十三碑常山公博物洽聞歐陽文忠每以古今疑事咨之河南所書必有據依矣後周伐齊毁碑以為炮石方髙緯昏亂兩陳勝負之頃猶需孽婦一觀遂以其國輸後周復何有於石經則此碑之殘毁亦宜也貞觀稽古止得石經數段其傳於今者亦可知其無幾矣蔡雍本傳稱雍自書丹於碑不言為何體書今世所傳皆為隸體至儒林傳序則云為古之篆隸三體書法以相參檢注言古文謂孔氏壁中書以縯考之孔壁所藏皆科斗文字孔安國當武帝時已稱科斗書無能知者其承詔為尚書五十九篇作傳為隸古定不復從科斗古文雍獨安能具三體書法於安國之後二百年哉漢建武際杜林避地河西得古文尚書一軸諸儒共傳寶之一軸已為世所珍如此熹平距建武又幾載乃謂六經悉能為古文非事情也或者雍以三體參檢其文而書丹於碑則定為隸亦如孔安國之書傳耶儒林傳序疑字有誤者初雍正定六經與堂溪典等數人同受詔今六經字體不一當是時書丹者亦不獨雍也姑識其末以俟博識君子宇文紹奕跋云側置給事內翰胡公每以天下自任推六經精微寓諸日用至於屋壁所藏殘編斷刻收拾無遺常歎石經隸書最古旁摉博訪合諸家所藏得蔡中郎石經四千二百七十字有竒以楷書釋之又得古文篆隸三體石經遺字八百一十九並鑱諸石永貽不朽按史稱蔡雍自書丹使工鐫刻酈道元注水經亦云光和六年立石太學其上悉刻蔡雍名則一字石經出於雍筆似無可疑若夫三體石經以儒林傳考之其書已出於東漢時水經乃云刻之魏正始中意者魏刻殆以補漢刻遺亡耳周商瞿易史記孔子傳易於商瞿瞿本魯人又云蜀人雙流縣志載瞿上城是其生處班固曰商瞿子木受易孔子以授橋庇子庸漢之施讎孟喜梁丘賀焦延夀京房諸易家皆本之漢趙賓易漢書蜀人趙賓好小數書後為易飾易文以為箕子明夷隂陽氣亡箕子者萬物方荄滋也賓持論巧慧易家不能難皆曰非古法也云受孟喜喜為名之後賓死莫能持其說易奧集後漢景鸞撰益部耆舊傳云景鸞字漢伯少隨師學經涉七州之地作易說及詩解文句兼取河洛以類相從名為奧集李撰古文易蜀志撰字欽仲梓潼涪人也父仁字德賢與同縣尹默俱遊荆州從司馬徽宋忠等學撰具傳其業仕後主為右中郎將著古文易尚書詩禮左傳指歸皆依準賈馬異於鄭𤣥與王氏殊隔初不見其所述而意歸多同隋何妥周易講疏三卷北史妥字棲鳳西城人父細腳胡通商入蜀遂家郫縣八嵗遊太學十七以伎巧事湘東王時使誦書左右江陵平入周為太學博士隋文帝受禪加通直散騎常侍進爵為公卒官國子祭酒諡曰肅唐李鼎祚周易集解十卷朝氏曰鼎祚資中人其書皆避唐諱又取序卦冠于逐卦之首所集有子夏孟喜京房馬融荀爽鄭𤣥劉表何晏宋衷虞翻陸績干寶王肅王弼姚信王廙張璠向秀王凱冲侯果蜀才翟𤣥韓康伯劉巘何妥崔憬沈麟士盧氏崔覲孔頴逹三十餘家又引九家易乾鑿度義所謂蜀才者人多不知按顔之推云范長生也其序云自卜商之後傳注百家唯王鄭相沿頗行於代鄭則多參天象王乃全釋人事易之道豈偏滯於天人哉而天象難尋人事易習折楊黃華學徒多從之今集諸家刋輔嗣之野文輔康成之逸象以貽同好蓋宗鄭學者也隋書經籍志所録易類六十九部公武今所有五部而已關朗不載于目乾鑿度自是緯書焦贛易林又屬卜筮子夏書或云張弧僞為然則隋志所録捨王弼書皆未得見也獨鼎祚所集諸家之說時可見其大㫖唐録稱鼎祚書十七卷今所有止十卷而始末皆全無所亡失豈後人併之耶陳氏曰隋唐以前易家諸書逸不傳者賴此書猶見其一二而所取於茍虞者尤多九家者漢淮南王所聘明易者九人荀爽嘗為之集解陸氏釋文所載說卦逸象本於九家易趙㽔注關朗易㽔梓州人李白嘗師事之所謂趙徵君也朗字子明元魏孝文時人㽔云恨其書亡半隨文詮解才十一篇而已石經周易周易指略例共十一卷僞蜀廣政辛亥孫逢吉書說卦乾健也以下有韓康伯注略例有邢璹注此與國子監本不同以蜀中印本校邢璹注不同者又百餘字詳其意義似石經誤而無它本訂正姑兩存焉易軌一卷僞蜀滿乾貫撰専言流演其序云可以知否泰之原察延促之數蓋數學也周易聖斷七卷宋鮮于侁子駿著取衆言淆亂折諸聖之義也陳振孫云其書本於王弼劉牧而時辨其非又乾坤卦不解爻象欲學者觀彖象文言而自得之易義海一百卷巴郡房審權著陳振孫云書只四卷近時江都李衡彥平稍加刪削而益以東坡伊川漢上之說為撮要十卷所稱百卷未之見也朝氏曰其書集鄭𤣥至王安石凡百家取其専明人事者彚為一編或諸家說有異同輒加評議附之篇末易樞五卷江陽李見著見嘗讀易于神龜山天禧中令附驛以聞不起乃終隱焉陳摶易龍圖序原夫龍馬負圖出于羲皇之代在太古之先今存已合之位猶或疑之况更陳其未合之數耶然則何以知之答曰于仲尼三陳九卦之義探其㫖所以知之也且天之垂象的如貫珠少有差忒則不成次序故自一至于盈萬皆纍纍然如絲之縷也使龍圖本合則聖人不得見其象矣所以天意先未合而形其象聖人觀象而明其用是龍圖者天散而示之伏羲合而陳之仲尼默而形之者也其未合也惟五十五數上二十五天數也中貫三五九外包十五盡天三天五天九并五十之用後形一六元位又顯二十四之為用也兹所謂天垂象矣下三十地數也亦分五位皆明五之用也十分而為六形地之象焉六分而幾四象地六不配在上則一不用形二十四在下則六不用亦形二十四其既合也天一居上為道之宗地六居下為氣之本天三幹地二地四為之用三若在陽則避孤隂在隂則避寡陽大矣哉龍圖之變岐分萬途今略述其梗槩焉西蜀崇龕陳摶序見安嶽志蘇軾易傳十一卷子由為子瞻志銘云先君晚嵗讀易玩其爻象得其剛柔逺近喜怒逆順之情以觀其詞皆迎刃而解乃作易傳未完疾革命公述其志公泣受命卒以成書然後千載之微言煥然可知也朝氏曰東坡自言其學出於父洵且謂卦不可爻别而觀必先求其所齊之端則六爻之義無有不貫者未嘗鑿而通之也毗陵先生易傳跋此本先君宣和中入蜀時所得也時方禁蘇氏學故謂之毗陵先生云紹熙辛亥七月二十日陸遊識陳希亮制器尚象論十二篇辨鉤隱圖五十四篇宋史希亮字公弼青神人天聖八年進士季常慥之父也卒官太常少卿傅耆同人卦說按耆遂寧人有俊才十四薦于鄉朱晦菴常屬門人杜正訪其家求同人卦說詳見濓溪年譜及性理書篐桶翁賣漿薛翁易學程頤兄弟侍父游成都至大慈寺見治篾篐桶者挾一冊就視之易也篾者曰若嘗學此乎因指未濟男之窮以發問二程遜謝篾者曰三陽皆失位也兄弟恍然有省翌日再過之則去矣後閩人袁滋問易頤曰易學在蜀盍往求之滋入蜀訪問久無所遇已而見賣漿薛翁於眉卭間與語大有所得不知所得何語也郭載易義譙定字天授涪州人嘗受易于羌夷中郭載得見乃謂之象與擬議以成變化諸義郭之先本蜀人其學傳自嚴君平云定嘗過武侯廟觀八陳圖謂其法本於易又嘗見伊川先生于涪伊川欲與同修易書不果周易通變七書魏鶴山云吾鄉觀物張先生行成文饒頗得易數之詳有通變經世述衍翼𤣥通靈等凡七書而大意謂理者太虛之實義數者太虛之定分未形之初因理而有數因數而有象既形之後因象以推數因數以知理今不可論理而遺數也其書惜不傳而世亦罕知者易則十卷薛紱著紱龍游人廷對極言韓托胄之姧坐劾去與魏了翁講明易學號符溪子馮時行易傳渝州人字當可嘗言易之象在畫易之道在用號縉雲先生其學傳于李舜臣李舜臣易本傳三十三卷舜臣仙井人字子思嘗曰易起于畫理事象數皆因畫以見畫從中起乾坤中畫為誠敬坎離中畫為誠明推本此義而著易傳如捨本卦而論他卦及某卦來者皆所不取洪景盧為之序其子心傳著學易編五卷朱文公每為學者稱之易解十卷郭長孺撰不知何許人僑居成都見隱逸志易解及雜說十卷綿竹張浚撰張敬夫栻其子也又作太極圖說周易折衷元潼川趙采德亮著其書以程朱傳義為主而附以已見間采先儒象數變互以相發明自序曰俗士口易賢者體易聖人忘易孟氏著書未嘗及易邵子以為易道存焉且以為善用易人能用易是知易矣嗚呼韋編三絶企東家之無過蠧簡百年慨西伯之有憂愚雖衰老願就有道而正焉夏書禹貢記禹敷土奠川及九州之田賦與貢道所經凡千百九十餘言尚書大傳曰禹貢可以觀事荀子注曰大禹生于西羌學于西王國西王國者西羌之賢人也路史作西王悝石經尚書十三卷朝氏曰僞蜀周德貞書經文祥字民字皆闕其畫蓋孟氏未叛唐時所刋也以監本校之禹貢雲土夢作又倒土夢字盤庚若網在綱皆作網字按沈括筆談云雲土夢作乂太宗時得古本始改正尚書廣疏僞蜀馮繼先撰以孔穎達正義為本少加已意洪範圖論一卷蘇洵明允撰朝氏曰是書三論皆援經以繫傳斥末以歸本二圖一指劉歆之謬一以形其意或云非洵作蘇軾書傳十三卷志銘云公最後居海南作書傳推明上古之絶學多先儒所未達朝氏曰熙寧以後専用王氏之說進退多士此書駁異其說為多陳氏曰坡傳𦙍征以為羲和二於羿而忠於夏康誥以釋衰服冕為非禮曰豫於書見聖人之所不取而猶存者有二可謂卓然獨見於千載之後者又言昭王南征不服穆王初無憤恥哀痛之語平王當傾覆祻敗之極其書與成康之世無異有以知周德之衰而東周之不復興也嗚呼其論偉矣楊繪書九意一卷繪字元素綿竹人自序云詩書春秋同出於史而仲尼或刪或修莫不有筆法焉詩春秋先儒皆言之書獨無其法耶故作斷堯舜書夏書禪讓稽古商書周書費誓泰誓意凡九篇雅詩大雅嵩髙韓奕江漢蒸民四篇尹吉甫作也吉甫周宣王時人以太師為大將薄伐玁狁有功詩人美之曰文武吉甫萬邦為憲宣王入淮吉甫以卿士兼內史掌䇿命尋復文武之境土㑹諸侯于東都中興之功吉甫為盛蜀紀華陽國志皆稱吉甫江陽人杜撫韓詩章句後漢書撫字叔和犍為武陽人少有髙才受業於薛漢定韓詩章句後歸鄉里教授沈靜樂道舉動必以禮弟子千餘人後為東平王蒼所辟及蒼就國掾史悉補王官屬未滿嵗皆自劾歸時撫為大夫不忍去蒼聞賜車馬財物遣之其所作詩題約義通學者傳之曰杜君法云有趙曄者字長君㑹稽山隂人少嘗為縣吏當奉檄迎督郵恥於厮役遂棄車馬到犍為資中詣撫受詩究竟其術積二十年絶問不還家為發喪制服卒業乃歸杜瓊韓詩章句蜀志瓊字伯瑜成都人仕至大鴻臚太常少受學於任安精究其術譙周問當塗髙之䜟答曰魏闕名也當塗而髙聖人取類而言耳周未達瓊又曰古者名官職不言曺自漢以來名官盡言曺吏言屬曺卒言侍曺殆天意也著韓詩章句十餘萬言不教諸子內學無傳業者石經毛詩二十卷僞蜀張紹文書與禮記同時刻石蘇子由詩解二十卷朝氏曰其說以毛詩序為衛宏作非孔氏之舊止存其首一言餘皆刪去按司馬遷曰周道缺而關雎作揚雄曰周康之時頌聲作乎下關雎作乎上與今毛詩序之意絶不同則知序非孔子之舊明矣雖然若去序不觀則詩之辭有溟涬而不可知者不得不存其首之一言也毛詩統論二十卷郭友直撰按文同作墓志云友直字伯龍下第在成都學舍教導凡三十年蜀士大夫與四方從宦者于伯龍無不識也家藏書至萬餘卷謄寫校對盡為佳本伯龍無不讀人有問之伯龍無不知也所以人多與之游治平中詔求遺書伯龍所上凡千餘卷盡祕府之未有者通考云熙寧七年命三館祕閣編詳成都府進士郭友直及其子大亨所獻書三千七百七十九卷內五百零三卷乃祕閣所無詔大亨官將作監主簿漢張叔春秋章句華陽國志孝文帝末年文翁為蜀守遣雋士張叔等十八人東詣博士受七經叔明天文災異始作春秋章句官至侍中揚州刺史張寬春秋章句十五篇漢書張寬武帝時為侍中即第七車所知天乳星者春秋外傳十二篇改定章句十五萬言漢楊終著益部耆舊傳曰楊終徙於北地望松縣而母於蜀物故終自傷被罪充邊乃作晨風之詩以舒其憤按終成都人有兄鳯為郡吏太守亷范為州所考遣鳯候終終為范游說坐徙其後終作贊頌黃龍鳯皇之瑞凡十五章奏上詔貰還故郡張氏春秋二十萬言漢書張霸蜀郡成都人七嵗通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字曰伯饒就長水校尉樊倏受嚴氏公羊春秋遂博覽五經諸生孫林劉固段著等慕之各市宅其傍以就學焉朱雲卿春秋益部耆舊傳朱倉字雲卿什邡人從處士張寧受春秋糴小豆十斛屑之為糧閉户精誦寧矜之斂得米二十斛倉不受一粒饑則吞紙寒則抱犬春秋名號歸一圖二卷崇文總目僞蜀馮繼先撰以春秋官諡名字表附初名之左巽嚴李氏曰昔左丘明傳春秋於列國君臣之名字不一其稱多者或至四五始學者蓋病其紛錯難記繼先集其同者為一百六十篇音同者附之於左氏抑亦微有所助云宋大夫莊堇秦右大夫詹據傳未始有父字而繼先輒增之所見異本若子韓晢者蓋齊頃公世系族譜與傳同而繼先獨以為韓子晢與楚鄭二公孫黑共篇者誤也左傳引帖新義僞蜀進士蹇尊品撰擬唐禮部試進士帖經舊式敷經具對石經左傳三十卷朝氏曰不載書丹人亦無年月諱缺祥字當是孟蜀僣號後刻石石經榖梁傳十二卷朝氏曰亦無年月書丹人姓名缺恆字當在真宗以後田况時刻石經公羊傳十二卷皇祐初田况知成都日刻石宋史藝文志云僞蜀刻五經備注傳為世所稱以此觀之不應無公榖豈初有之後散毁耶潁濵春秋集傳十二卷子由以世人多師孫復不復信史故盡棄二傳全以左氏為本至其不能通者始取二傳及啖趙參考之自熙寧謫居髙安至元符初凡十數年暇日輒有改定卜居龍川而書始成王氏春秋列國諸臣傳六十三卷眉山王當效司馬遷史記所作凡一百三十有四人十萬餘言春秋經解本例例要共十七卷陳氏曰涪陵崔子方彥直撰紹聖中罷春秋取士子方三上書乞復之不報遂不應進士舉黃山谷稱曰六合有佳士曰崔彥直其人不游諸公然則賢而有守可知矣其學辨三傳之是非而専以日用為例則正蹈其失而不悟也三傳分國紀事本末夾江勾龍傳撰後溪劉氏曰傳字明甫精於春秋三傳博習詳考分國而紀之自東周而下大國次國特出小國滅國附見不獨紀其事與文而兼著其義凡采其說者數十家蓋嗜古尊經之士確乎其能自信者也黎氏春秋經解十二卷廣安黎錞希聲撰歐陽公之館客曰經解者言以經解經也其後又為統論附焉春秋分記九十卷陳氏曰卭州教授眉山程公說伯剛撰以春秋經傳倣司馬遷書為年表世譜律厯天文五行地理禮樂征伐官制諸書自周魯而下及諸小國夷狄皆彚次之時有所發明成一家之學公說積學苦志早年登科值逆曦亂憂憤以死年才三十七兄弟三人皆以科第進中書舍人公許其季也春秋得法忘例論三十卷陳氏曰晋原主簿遂寧馮正符信道撰正符二上禮部不第教授梓遂間十年著此書及詩易論語解蜀守何郯首以其春秋論上其書首辨王魯素王之說及杜預三體五例何休三科九㫖之妄皆正論也巽岩李氏曰信道當熙寧九年用御史鄧文約薦召試舍人院賜出身文約尋謫守虢略信道亦坐附㑹奪官歸故郡後又得馮允南所為墓銘信道實事安逸處士何羣其學蓋得之羣者羣學最髙國史有傳其師友淵源如此則謂信道附㑹進取或以好惡言之耳王荆公當國廢春秋不立學官而信道經學顧於春秋特詳鄧御史嚴事荆公不敢異同乃先以得法忘例論言於朝初不曰宰相不喜此也此亦可見當時風俗猶淳厚士各行其志不専以利祿輟作御史殆加於人一等矣信道無子孫鬻書者擅易其姓名屬諸李陶陶字唐夫嘗學于溫公號通經李氏而得法忘例實非唐夫所論也不知者妄託之春秋古經十二篇潼川謝疇撰眉山李氏序曰漢藝文志有春秋古經十二篇經十一卷隋唐志同古經十二篇十一卷者本公羊榖梁二家所傳吳士燮始為之注隋氏載焉又有賈逵春秋三家經訓詁十二卷宋及三家經二卷唐志又有李鉉春秋二傳異同十二卷李氏三傳異同例十三卷馮伉三傳異同三卷元和國子監修定春秋加減一卷士燮賈逵宋及李馮元和諸書今皆不存獨抱遺經者莫適為正蓋公羊得立學官最先榖梁次之左氏最後故士燮但注二家不及左氏賈逵既立左氏始通三家逵燮并宋以下異同加減文字悉已亡佚莫知其所舉措何也隋未唐初左學特盛二家寖微自杜預集解左氏合經傳為一貞觀十二年孔頴逹承詔修疏永徽四年長孫無忌等重上正義丘明傳學愈益盛矣而仲尼遺經無復單行學者或從杜解抄出獨存左氏擯落二家幸陸德明與頴達同時於太學自落音義兼存二家本書仍各注左氏别字顧亦無決擇惟貞元末陸淳纂例列三傳經文差謬凡二百四十一條自言考校從其有義理者然往往亦言未知孰是兼恐差謬不止二百四十一條惜啖趙集傳今俱失墜無從審覆余患苦此久矣嘗欲即三家所傳純取遺經心以為是者則大書之仍細書其不然者於其下數十年間遊走東西志弗獲就㑹潼川謝疇元錫來從余遊其治春秋極有功因付以斯事居三月而書成旁搜逺引不一而足反說以約厥功彌著余撫其書喜甚亟刻板與學者共之昔司馬遷言春秋文成數萬張晏曰春秋才萬八千字遷誤也今細數之更闕一千四百二十八字數最易見者尚爾錯誤何况聖人筆削之㫖乎余鄉所謂心以為是者衆未必以為是也亦獨纂例考校從其有義理者云耳既心以為是則于證據操舍必具成說其說自當别出兹第刻春秋純經庶學者相與盡心焉仍用漢志舊名題曰春秋古經十二公各為一篇不復分為十一卷蓋卷第於經義初無當也繹聖傳十二卷眉山任伯雨撰朝氏曰解經不甚通例如桓十三年公㑹紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績取榖梁戰稱人敗績稱師重衆之說殊不知齊人伐衛衛人及齊人戰衛人敗績何獨不重衆耶馮氏春秋通解十二卷普州馮山允南撰澥之父也小戴禮注四十九篇後漢董鈞文伯撰犍為資中人禮略月令章句後漢書廣漢景鸞撰禮內外記號曰禮略唐仲子陵禮記子陵嘉州人讀書峩眉山中尤精后蒼戴氏之業舉賢良方正為太常博士議祧廟諸儒不能詘當大歷時啖助趙康陸質以春秋施士丐以詩子陵袁彛韋彤韋茞以禮蔡廣成以易强䝉以論語名専門而士丐子陵尤勝石經禮二十卷朝氏曰僞蜀張紹文書丹不載年月不闕唐諱當是孟知祥僭位後刻石首以月令題云御刪定蓋明皇也林甫等注蓋李林甫也其餘篇第仍舊議者謂經禮三百曲禮三千毋不敬一言足以蔽之故先儒以為首孝明肆情變亂甚無謂也石經周禮十二卷朝氏曰僞蜀孫朋吉書以監本是正其字或羡或脫或不同至千數丁丑三禮辨二十三卷中興藝文志仙井李心傳撰其書以儀禮之說與鄭氏辨者八十四周禮之說與鄭氏辨者二百二十六皆有據大戴之書疑者三十小戴之書疑者百九十八鄭氏之注疑者三百七十五亦各辨其所以異而詳識之鶴山周禮折衷二卷陳氏曰魏了翁門人房審權所録條例經文附以傳注鶴山或時有所發明止於天官而已禮記經學十二卷宋廣安遊桂著桂號畏齊隆興進士官四川制置大全注採入者十七條太常因革禮百篇眉山蘇洵撰㕍湖李氏曰其書以開寶通禮為本而以儀注例冊附見之且參以實録封禪記鹵簿記大樂記及他書經禮曲禮於是兩備張文定謂其事業不得舉而措之於天下獨新禮百篇今為太常施用者此也嘉祐諡法三卷朝氏曰蘇明允撰其書取周公春秋廣諡及沈約賀琛扈䝉六家諡法外采今文尚書汲冡師春蔡雍獨斷凡古人論諡之書收其所長加以新意得一百六十八諡芟去百九十有八又為論四篇以叙去取之意釋奠儀注元灌縣張䇓著即所稱導江先生也自序曰禮皮辨祭菜示敬道也禮書殘缺釋奠釋菜名義徒存儀文無可考者唐開元禮倣佛儀禮饋食篇節文為詳朱文公謂政和新儀差錯獨於開元禮有取申明至于再三竟格不下身沒之後郡邑放而行之能通其義者鮮矣中原文物肇開四方取則舍魯奚適闕里昔罹兵革宫室荆榛蓋二十年牲殺器皿衣服不偹勢使然也而儀章度數固多可議者象設非古也開元禮猶云設席是無象也髙臺巍坐而席地之禮不可見帶劍秦漢冠服之飾也開元禮朝㑹猶有解劍之席冕服挾劍未之有聞二者之失所從來久矣神位西坐東向尸位也配位東坐西向主人位也自尸禮廢禮家謂自內出者無匹不行自外至者無主不止故立神以配而為主焉開元以後遷神位南面配位猶故也進顔孟南向參列如浮圖老子宫者孔氏祖庭廣記謂金大定四十年所行何所稽乎楹間兩階五齊三酒以四代之器為備物之享也列數瓦缶果為何說尸尊不就洗禮也登罍爵於牀洗者以尸尊自居犧象不錯諸地主人遂不坐實爵簡亦甚矣幣之未薦置諸神位之左示不敢䙝陳之階庭與主人俱升則不嚴矣蓋事由草創未之講也豫典教于兹思有以正之顧不學雜服不能安禮而雖善無徵無徵不信乃取朱文公所考訂自儀禮開元禮而下裒為一編命學徒肄習且與講說義數使之入耳著心既知義理之安將不期改而自改併附社稷風雨雷之祀庶幾好禮者有取焉抑禮有本有文是書所載文也習禮之士因文而究其本知交於神明不徒籩豆之事微之顯誠之不可掩也如此則可謂知禮矣若夫器樂冠服之度則又博採諸家之說從其是者訂其失者與此編并藏孔氏俾後來之文獻有足徵云隋何妥樂要一卷隋書妥既入隋文帝勑於太常寺修正古樂作樂要一卷其詩曰大樂遺鐘鼓至樂貴忘情俗久淳和變年深禮教生嶰谷調孤管崙山學鳯鳴浮雲成舞曲白雪作歌名聞詩六義辨觀樂八風平肅穆皇威暢淪漣河水清鈞天動絲竹刮地響錞鉦盡美兼韶濩威德總咸英寥亮鳬鐘徹飄揚翟羽輕小臣屬千載時幸豫簪纓行欣負蒼璧衢聽九成宋房庶樂書補亡三卷益州進士房庶曉音律宋祁田況咸薦之上其樂書召詣闕庶自言嘗得古本漢志云度起於黃鐘之長以子榖秬黍中一黍之起積一千二百黍之廣度之九十分黃鐘之長一為一分今文脫之起積一千二百黍八字故自前世以來纍黍為尺以製律是律生於尺尺非起於黃鐘也且漢志一為一分者蓋九十分之一後儒誤以一黍為分其法非是當以秬黍中者一千二百實管中黍盡得九十分為黃鐘之長九寸加一以為尺則律定矣直祕閣范鎮是之乃為言曰李照以縱黍纍尺管空徑三分容黍千七百三十胡瑗以橫黍纍尺管容黍一千二百而空徑三分四釐六毫是皆以尺生律不合古法今庶所言以律生尺誠衆論所不及乃詔王洙與鎮同於修制所如庶說造進帝召輔臣觀庶所進律尺籥頗竒之又令庶自陳其法且問律吕旋相為宫事俾撰圖以進其說以五正二變配五音迭相為主衍之成八十四調舊以宫徵商羽角五音次第配七聲然後加變宫變徵二聲以足其數推以旋相生之法謂五行相戾非是當改變徵為變羽易變為閏隨音加之則十二月各以其律為宫而五行相生終始無窮詔以其圖送詳定所又言樂府五音今無正徵國家以火德王而亡本音為非是景仁亦力主其說時胡瑗阮逸制樂方用纍黍尺已有定議乃補庶試祕書省校書郎遣之鎮為論於執政曰今律之與尺所以不得其直纍黍為之也纍黍為之者史之脫文也古人豈以難曉不合之法書之於史以為後世惑乎殆不然也執政不聽范鎮樂論八篇自叙曰臣昔為禮官從諸儒難問樂之差謬凡十餘事厥初未習不能不少抵牾後考周官王制司馬遷書班氏志得其法流通貫穿悉取舊書去其抵牾掇其要作為八論其略曰古人以有形之物傳其法俾後人參考之秬黍也律也尺也籥也釜也斛也算數也權衡也鐘也磬也是十者必相合而不相戾然後為得今皆相戾而不相合則為非是矣謹條十者非是之驗按詩誕降嘉種維秬維秠誕降者天降之也許慎云秬一稃二米又云一秬二米後漢任城縣産秬黍二斛八斗實皆二米史官載之以為嘉瑞今秬黍取之民間者動至數百斛皆一米河東之人謂之黑米此秬黍為非是一也古者以竹圍為律竹形本圓今以方分置算此律之為非是二也又按漢書分寸尺丈引本起黃鐘之長又云九十分黃鐘之長者據千二百黍而言也千二百黍之施於量則曰黃鐘之籥施於權衡則曰黃鐘之量施於尺則曰黃鐘之長今遺千二百之數而以百黍為尺又不起於黃鐘此尺之為非是三也又按漢書言籥其狀似爵謂爵盞其體正圓故籥當圓徑九分深十分今籥乃方一寸深八分一釐是亦以方分置算者此籥之非是四也又按周禮釜法方尺圓其外深尺容六斗四升方尺者八寸之尺也深尺者十寸之尺也何以知尺有八寸十寸之别按周禮璧羡度尺好三寸以為尺璧羡之制長十寸廣八寸同謂之度尺以為尺則八寸十寸俱為尺矣又王制云古者以周尺八尺為步今以六尺四寸為步八尺者八寸之尺也六尺四寸者十寸之尺也同謂之周尺者是周用八寸十寸尺明矣故知八寸尺為釜之方十寸尺為釜之深今釜方尺積十寸此釜之非是五也又按漢書斛法方尺圓其外容十斗旁有庣焉隋書載其銘曰審律嘉量斛方尺圓其外庣旁九釐五毫羃百六十二寸深尺容一斛今斛方尺深一尺六寸二分此斛之非是六也又按算法圓分謂之徑圓方分謂之方斜所謂徑三圍九方五斜七是也今圓分而以方法算之此算數非是七也又按權衡者起千二百黍而立法也周之釜其重一鈞聲中黃鐘漢之斛其重二鈞聲中黃鐘釜斛之制有容受有尺寸又取其輕重者欲見薄厚之法以考其聲也今黍之輕重未真此權衡為非是八也又按鳬氏為鐘大鐘十分其鼓間之以其一為之厚小鐘十分其鉦間之以其二為之厚今無大小厚薄而一以黃鐘為率此鐘之非是九也又按磬氏為磬倨句一矩有半其博為一股為二鼓為三蓋各以其律之長短為法也今亦黃鐘為變而無長短厚薄之别此磬之非是十也請以臣章下有司論定然後制籥合升斗釜斛以校其容受容受合然後下詔以求真黍真黍至然後可以為量為鐘磬量與鐘磬合於律然後可以為樂也詔送詳定所鎮自謂得古法司馬光每論難不相合而楊傑著元祐樂議破其說禮部太常亦言鎮一家之學難以參用而樂如舊制范蜀公樂書一卷朝氏曰景仁論樂宗房庶潛心四十餘年出私財鑄樂器元祐中上之按元豐初年詔徵祕書監致仕劉几議樂以户部侍郎致仕范鎮與几參考得失鎮曰定樂當先正律帝然之鎮圖往昔籥合升斗豆區釜斛上之又乞訪求真黍以定黃鐘而几之議律主於人聲不以尺度求合其樂大抵即李照之舊而加四清聲遂奏樂成詔罷局第加恩賚而鎮謝曰此劉几樂也臣何預焉乃復上奏臣頃造律內外有損益其樂和又與古樂合今若將臣所造尺律依大小編次太常鎛鐘可以成一代大典又太常無雷鼓靈鼓路鼓而以散鼓代之不應經義又八音無匏土二音不可謂備樂不報及哲宗立鎮復請太府銅鑄律逾年樂成上樂章三鑄律十二編鐘十二鎛鐘衡一尺一斛一響石為編磬十二特磬一簫笛塤箎巢笙和笙各二刑書及圖法帝與太皇太后御延和殿詔執政侍從皆往觀賜詔褒之太樂演義三卷巴郡房審權撰庶之子也范蜀公元祐初所奏新樂實用其說魏漢津樂指法二篇按徽宗崇寧元年宰臣蔡京置講議司更定大樂博求知音士而魏漢津邪說遂獲售焉漢津年九十餘本剩員兵士自言居西蜀師事唐仙人李良授鼎樂之法皇祐中同房庶被薦既至黍律已成為阮逸所非後逸樂不用庶與漢津議指尺作書二篇敘述指法漢津嘗陳於太常皆不主其說或謂漢津舊執役於范鎮見其制作略取之蔡京神其說而託諸李良云石經論語十卷朝氏曰僞蜀張德釗書闕唐諱立石當在知祥未叛前其文脫兩字誤一字又述而第七舉一隅下有而示之三字三人行必有我師焉上又有我字衛靈公第十五敬其事而後其食作後食其祿與李鶚本不同者此也蘇軾論語解五卷通考作十卷蘇轍論語拾遺一卷潁濵自序豫少為論語解子瞻謫居黃州作論語說盡取以往今見於書秖十之二三也大觀丁亥閒居潁川為孫籀簡筠講論語於子瞻之說有所未安時為改正者凡二十七章謂之拾遺中山先生論語解藺敏修龍遊人幼穎悟博通羣書紹興中進士官至朝奉郎著論語解時號中山先生石經孟子十四卷朝氏曰宣和中知成都府席旦刋置于學宫云僞蜀時刻六經于石而獨無孟子經為未備夫經大成於孔氏豈有闕耶其論既謬又多誤字如以頻顣為類不可勝紀宋㬊淵孟子注涪志淵字亞夫號蓮蕩晋中郎將㬊靖之後世居襄陽後徙居蜀家涪坪山受學於晦庵嘗言淳熙四年文公年四十八注孟子子産聽鄭國之政章謂成周改嵗首而不改月則晚年之確論也嘗欲更注而其書已行於世以時令考之戌亥之月未甚寒猶可褰裳以涉也子丑之月涸隂沍寒當此之時而以乘輿濟民民能免於病涉乎橋梁道路可以觀政九月成杠十月成梁戒事之辭也十一月徒杠成十二月輿梁成序事之辭也國語有戒備之意孟子就凍極之時言之皆夏時云潁濵孟子解一卷陳氏曰次公少時所作凡二十四章蘇過孔子弟子别傳過字叔黨東坡子也年十九以詩賦解兩浙路隨父謫英惠儋耳以至廉永凡生理晝夜寒暑所須一身百為不知其難初至海上為文曰志隱軾覽之曰吾可以安于島夷矣因命作孔子弟子别傳希顔録一卷陳氏曰張栻取經傳中凡言及顔子者録為一編元包十卷後周成都衛元嵩撰知什邡縣事楊楫序云大觀庚寅夏六月余被命來宰兹邑涖官之三日恭謁衛先生祠顧瞻廟貌覽古石刻先生實髙士也既而邑之前進士張升景初擕元包見遺曰是經先生所作也自後周歷隋唐迄今五百餘載世莫得聞頃因楊元素內翰傳祕閣本俾鏤板以遺諸同志然妙用所寄竒字居多大率類揚雄凖易非深於道者不能知豫觀斯文竊謂易之興也伏羲畫卦文王重爻孔子作翼更三聖人而後備故曰加我數年五十以學易可以無大過矣包之為書其學易之至者歟辭簡義奧殆未可以象數盡也觀唐蘇源明李江等傳注作經之意思過半矣非先生之獨智不能造易之妙非蘇李之絶學不能探包之㫖茍非其人道不虛行豈謂是耶先生名元嵩益州成都人少不事家産潛心至道明隂陽厯算時人鮮知之獻䇿後周賜爵扶節蜀郡公武帝尊禮不敢臣之塋域在縣廨東偏邑人崇奉至今不絶先生有傳在北史恐讀是經者未知其出處之大致故為之序云政和元年十月望日元包舊序所稱景初即洸之先君子也家藏此書常以貽好事者然字古理奧而難通好之者鮮洸來宰臨卭得同年張公文饒所為疏義及邑士韋漢卿校正舊本隨卦附釋音于下因併鏤板合為一編庶幾觀者得其門而入焉則好之矣紹興三十一年南陽張洸跋崇文總目曰元包以坤為首因八純之宫以生變極於六十四自繫其辭言外卦體不列爻位以謂易首乾尚文色首坤尚質夏連山商歸藏周易唐包其實一也雖欲馳騁而放言趍理僅止易家之區鄙云援神鉤命解誥十二篇漢杜真撰益部耆舊傳曰杜真字孟宗廣漢綿竹人也少有孝行習易春秋誦說日萬言兄事同郡翟酺後酺繫獄真上檄章救亦繫獄笞六百竟免酺難京師莫不壯之綈袠祕記後漢楊春卿著三國志春卿廣漢新都人善圖䜟學為公孫述將漢兵平蜀春卿自殺臨命戒子統曰吾綈袠中有先祖所傳祕記為漢家用爾其修之統感父遺言服闋辭家從犍為周循學習先發又就同郡鄭伯山受河洛書及天文推步之術內䜟解說二卷楊統著益部耆舊傳曰統字仲通曽祖父仲續舉河東方正拜郫令甚有德惠人為立祠樂益部風俗因留家新都代修儒學以夏侯尚書相傳建初中為彭城令益州大旱統推隂陽消伏縣界䝉澤太守宗湛使統為郡求雨亦即降㴻自是朝廷災異多以訪之統作家法章句及內䜟二卷解說位至光祿大夫為國三老年九十卒周易正義題識宣室志云故刑部尚書沛國劉遵古太和四年節度東蜀軍先是蜀人有富蓄羣書者劉嘗假其數百篇然未盡詳閲明年夏涪江大泛突入壁壘潰里中廬舍劉之圖書盡行沾濕歷數日水退始命列於庭曝之於羣書中得周易正義一軸筆勢竒妙非近代書也卷末有識云上元二年三月十一日因讀周易看此正義從兹易號十二三嵗至一人八千口當有大水漂溺因得舒轉晒曝衡陽道人李德初識劉閲其題歎異久之諦視即所假蜀人書也於是召賔椽觀之所謂易號十二三嵗至一人八千口者一人八千口蓋大和字也自上元歷寶應廣德永泰大厯建中興元貞元元和長慶寶厯至大和凡更號十有三矣與其記果相契然不知李德初何人耳古三墳書一卷蜀中張商英得之北陽民家墳皆古文而傳乃隸書所謂三墳者山氣形也七略隋志皆無其名世以為天覺贋著者爾雅音略三卷僞蜀母昭裔撰爾雅舊有釋智騫及陸朗釋文昭裔以一字有兩音或三音後生疑于呼讀及釋其文義最明者為定蜀中廣記卷九十一
