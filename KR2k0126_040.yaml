body:
  text: 蜀中廣記卷四十明曹學佺撰邉防記第十川北板楯蠻華陽國志秦昭襄王時白虎為害自秦蜀巴漢患之秦王乃重募國中有能煞虎者邑萬家金帛稱之於是夷朐䏰廖仲藥何射虎秦精等乃作白竹弩於髙樓上射虎巾頭三節白虎常從羣虎瞋恚盡摶煞羣虎大詬而死秦王嘉之曰虎厯四郡害千二百人一朝患除功莫大焉欲如要王嫌其夷人乃刻石為盟要復夷人頃田不租十妻不算傷人者論煞人者顧死倓錢盟曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之漢興與閬中范目從髙祖定秦有功髙祖因復之專以射白虎為事戶歲出賨錢口四十故世號白虎復夷一曰板楯蠻今所謂弜頭虎子者也順桓之世板楯數反太守蜀郡趙溫恩信降服於是宕渠出九穗之禾朐䏰有連理之木光和二年板楯復叛攻害三蜀漢中州郡連年苦之遣御史中丞蕭瑗督益州兵討之連年不克天子欲大出軍時征役疲弊問益州計曹考以計略益州計曹椽程包對曰板楯七姓以射白虎為業立功先漢本為義民後除徭役但出賨錢口嵗四十其人勇敢能戰昔羌數入漢中郡縣破壞不絶若線後得板楯來虜彌盡號為神兵羌人畏忌傳語種輩勿復南行後建寧二年羌復入漢牧守遑遑復賴板楯破之若微板楯則蜀漢之民為左衽矣前車騎將軍馮緄南征雖授丹陽精兵亦倚板楯近益州之亂朱龜以并凉徑卒討伐無功太守李顒以板楯平之忠功如此本無惡心長吏鄉亭更賦至重僕役過於奴婢箠楚隆於囚虜至乃嫁妻賣子或自剄割陳寃州郡牧守不理去闕庭遙逺不能自聞含怨呼天叩心窮谷愁於賦役困乎刑酷邑役相聚以致叛戾非有深謀至計僣號不軌但選明能牧守益其資榖安便賞募從其利隟自然安集不煩征伐也昔中郎將尹就伐羌擾動益部百姓諺云寇來尚可尹將殺我就徵還後羌自破退如臣愚見權之遣軍不如任之州郡天子從之遣太守曹謙宣詔降赦一朝清戢按此蠻北道巴渠間常有之寰宇記云漢末天下亂自巴西之宕渠遷于漢中楊車坂抄掠行旅號為楊車巴魏武剋漢中李特祖將五百家歸之魏武又遷于略陽北復號之為巴氐也後漢書云板楯蠻其在黔中五溪長沙間則為盤瓠之後其在峽中巴梁間則為廩君之後按杜光庭録異記李特字元休廩君之後昔武落鍾離山崩有石穴二所一赤如丹一黑如漆有人出於赤穴者名務相姓巴氏有出於黑穴者凡四姓皥氏焚氏柏氏鄭氏五姓偕出爭長於是務相約以劍刺穴能著者為廩君四姓莫著而務相之劍懸焉又以土為船雕畫之而浮水中曰若其船浮者為廩君務相船又獨浮於是遂稱廩君乘其土船將其徒卒當夷水而下至於鹽陽鹽水神女子止廩君曰此魚鹽所有地又廣大與君俱生可止無行廩君曰我當為君求廩地不能止也鹽神夜從廩君宿旦輒去為飛蟲諸神皆從其飛蔽日廩君欲殺之不可别又不知天地東西如此者十日廩君即以青縷遺鹽神曰嬰此宜之與汝俱生不宜將去汝鹽神受而嬰之廩君至碭石上望膺有青縷者跪而射之中鹽神鹽神死群神與俱飛者皆去天乃開𤣥廩君復乘土船下及夷城夷城石岸曲泉水亦曲望之如穴狀廩君歎曰我新從穴中出今又入此奈何岸即為摧廣三丈餘階級相承廩君登之岸上有平石長五尺方一丈廩君休其上投䇿計算皆著石焉因立城其旁而居之其後種類遂繁秦并天下以為黔中郡薄賦斂之嵗出錢四十萬巴人呼賦為賨因謂之賨人也王維送李梓州詩賨女輸橦布本此獠蓋南蠻之别種初出自梁邑之間自漢中達于卭筰川洞之間所在皆有俗多不辨姓氏又無名字往往推一酋帥為主亦不能逺相統攝父死則子繼若中國之貴族也獠王各有鼓角一雙使其子弟自吹擊之按蜀本無獠李勢時諸獠始出巴西渠川廣漢陽安資中犍為梓潼山谷間十餘萬落攻破郡縣為益州大患自桓元子破蜀之後力不能制又蜀人東流山險之地多空獠遂挾山傍谷與夏人參居近者頗輸租賦在深山者仍不為編戶至梁武帝梁益二州嵗嵗伐獠以自禆潤公私頗藉為利後魏正始初梁將夏侯道遷舉漢中附魏魏遣尚書邢巒為梁益二州刺史以鎮之其後以梁益二州控攝險逺乃立巴州以統諸獠後以巴酋帥嚴始興為刺史又立隆城鎮管獠二十萬戶所謂北獠是也嵗輸租布魏明帝孝昌中據城叛梁益二州遣將討之攻陷巴州執始興斬之後梁益入梁自此又屬梁矣後周武帝平梁益之後令所在撫慰其與華人雜居者亦頗從賦役然天性暴亂旋致擾動每嵗命隨近州鎮出兵討之獲其人以充賤𨽻謂之壓獠焉復有商旅往來亦資以為貨公卿逮於民庶之家有獠口者多矣然其種類滋蔓保據巖壑依林走險若履平地性又無知殆同禽獸諸夷之中最難以道義招懷也依樹積木以居其上名曰干欄干欄小大隨其家口之數好相殺害多仇怨不敢逺行性同禽獸至于忿怨父子不相避惟手有兵刃者先殺之若殺其父走避于外求得一狗以謝其母然後敢歸毋得狗謝不復嫌恨若報怨相攻擊必殺而食之遞相劫掠不避親戚賣猪狗而已亡失兒女一哭便止親戚比鄰指授相賣避賣者啼呌不服逃竄避之乃將買人捕逐若亡叛獲便縳之但經縳者即服為賤𨽻不敢更稱良矣執楯持矛不識弓矢用竹為簧羣聚鼓之以為音節能為細布色至鮮淨大狗一頭買一生口性尤畏鬼鬼所殺之人美鬚髯者必剝其面皮籠之于竹及燥號之曰鬼鼓舞祀之以求福利俗尚淫祀至有賣其昆季妻拏盡者乃自賣以供祭焉鑄銅為器大口寬腹名曰銅㸑甚薄且輕易于熟食酉陽雜俎獠婦七月生子死則豎棺埋之木耳夷舊牢西好鹿角為器其死則屈而燒之埋耳後小骨類人黑如漆小寒則梧沙自處但出其面焉續博物志曰寧國論云蜀中本無獠晉末李雄之亂山谷洞中壤壤而出轉轉漸大自為夫婦而益多夫土乾則生蚤地濕則生蚊積榖則生蠧腐肉則生蛆蛆化為蠅蠅又自生蛆蛆又自生蠅豈有窮乎蜀中廣記卷四十
