body:
  text: 蜀中廣記卷三十一明曹學佺撰邊防記第一川西一松潘漳臘小河松潘道開府松潘衛與副總兵官一員分城而居參將一員舊駐小河千戶所今移駐龍安城遊擊將軍一員駐劄漳臘堡守備都指揮一員駐劄平畨堡其餘把守練兵官各有差按後漢書建武九年司徒掾班彪上言舊制涼州部置護羌校尉持節領護理其怨結嵗時巡行問所疾苦又數遣驛徒通導動靜使塞外羌夷為吏耳目州郡因此可得警備今松潘備兵即古護羌使者之職也尋江源縣記云松州平康縣羊膊山下有二神湫乃大江始發之所自羊膊嶺散漫始未濫觴東南百餘里至白馬嶺回行二千餘里至龍涸水障始於是也志曰江發源于臨洮之木塔山至山頂分東西流者即岷江也由草地甘松嶺八百里至漳臘其水漸大臘由鎌刀灣達松潘于下水關入紅花屯達壘溪至穆肅堡黑水從南合之入深溝經茂州南至於威汶轉銀嶺合草坡河至蠶岩入灌口分道而下由威至玉壘山為玉輪江至汶為皂江至灌為沫江志又曰衛北三舍有龍潭四序淵澄其深莫測有嶺謂之小分水嶺又有大分水嶺山高峻而水派流在衛北二百里外四夷傳曰西羌之本出自三苗其先為伯夷甫炎帝之裔帝母育于姜水而以姜為姓故諸羌亦姓姜其國始近南嶽及舜徙之三危今河關之西南羌地是也濵於賜支至乎河首綿地千里賜支者析支也王政修則臣伏德教失則冦亂本無君長夏末及商周之際或從侯伯征伐有功天子爵之以為藩服羌爰劍者秦厲公時為秦所執以為奴隸羌人謂奴為無弋故號為無弋爰劍後得亡歸將其種人南出賜支河其後子孫各自為種或為氂牛種越雋羌是也或為白馬種廣漢羌是也或為參狼種武都羌是也至爰劍曽孫忍及弟舞獨留湟中忍生子研故羌中號其後為研種漢景帝時研種留何求守隴西塞於是徙留何等於狄道安故及武帝西逐諸羌乃渡河湟築令居塞始置護羌校尉從爰劍鍾五世至研研最豪健以研為種號十三世至燒當復豪健其子孫更以燒當為種號滇良者燒當之𤣥孫時王莽末四夷內侵及莽敗衆羌還據西海光武之世以牛邯為護羌校尉即此地也及燒當至滇良世居河北大允谷種小人貧而先零卑湳並皆强富數侵犯之滇良父子積怒從大榆中入掩擊先零卑湳大破之掠取財畜奪居其地大榆中由是始强滇良死子滇吾立附落轉盛常雄諸羌在晉內附以其地屬汶山郡宋齊亦得之後為西魏所有焉魏書鄧至傳王像舒治者並白水羌也常為羌豪自稱鄧至王其子舒彭遣使內附拜龍驤將軍益州刺史甘松縣開國子鄧至王請以封爵授子彭奮高祖許之拜奮建忠將軍甘松縣開國子即為小藩朝貢相繼關中亂乃絶後魏末平鄧至畨始統有其地後周保定五年於此置龍涸防天和元年改置扶州領龍涸郡隋初廢州郡以其地併入汶山同昌二郡唐武德元年置松州貞觀二年置都督府松踞懿嵯濶鄰雅聚可逺奉嚴諾峩彭軌盍直肆位玉璋祐臺橋序等二十五羈縻州永徽之後生羌相繼服叛不常儀鳯二年復加整比督文扶當柘靜翼六州都督羈縻研州劍州探郍州忋州毗州河州幹州瓊州犀州拱州龕州陪州如州麻州霸州䃹州光州至涼州蠶州煜州梨州邏州思帝州眺州戍州統州榖卭州樂容州達違州卑州慈州凡三十一州據天寶之載薄松州都督府督一百四州其二十五州有額戶口頗多但羈縻逃散餘七十九州皆生羌部落或臣或否無州縣户口矣天寶初改松州為交川郡乾元初復為松州按貞觀之時分十道松文扶當悉拓靜等州屬隴右道永徽之後割屬劍南道也寰宇記云松州治嘉城縣按嘉城縣即後魏白水羌像舒治所據也其子舒彭遣使朝貢拜龍驤將軍始置甘松縣矣後周之龍涸防及改置扶州皆治于此隋曰嘉城唐曰嘉城則為松州之所治也志云甘松嶺在衛西北三百里州以此名按山海經云甘松嶺亦謂之松葉嶺即江水發源於此土人謂之松子嶺也又有石門水自龍州石門山連亘經郡界合江故曰石門水矣寰宇記曰松州屬縣有平康交川按平康縣晉屬汶川郡隋屬㑹州後廢唐垂拱元年割交川及當州通軌翼斜三縣置平康縣屬當州交川縣後周天和中置隋屬㑹州唐改屬當州志云平康交川二廢縣俱在衛治西通志曰潘州者唐廣德初年松州陷于吐蕃五代諸羌各據其地宋崇寧取邦潘疊三州初屬吐蕃首領潘羅支此潘州之名所由起也元屬吐蕃宣慰司國初洪武十一年御史大夫平羌將軍丁玉克復其地設松州潘州二衛後併為松潘衛鎮守兹土者二十年後復改松潘等處軍民指揮使司隸四川都司屬川西道領守禦千户所曰小河安撫司四曰八郎曰麻兒匝曰阿角曰芒兒志曰八郎山在衛北三十里山下為八郎安撫司也長官司十七曰占藏先結曰蠟匝曰白馬路曰山洞曰阿昔曰白定曰麥匝曰者多曰牟力結曰班班曰祈命曰勒都曰包藏曰上阿昔曰思曩兒曰阿用曰潘幹寨各降符印列為守土焉復立畨僧二人為國師曰商巴曰綽領二人為禪師曰黎巴曰完卜亦皆佩銀章也西邊記云國師商巴佛教也禪師黎巴道教也其寺觀散居寨落以主化導畨夷丁大夫時設鑄金銀錠有足或無足者賞給諸畨畨呼曰丁大夫寶重五六兩者畨價值三五十兩其家有一二錠遂名為財主錠發夜光稱神異矣龍涸志云男曰安達女曰白麻多種青稞圓根好用羶羊麥粉宋史云松畨之俗日耕野壑夜宿碉房刻木契以成交易炙羊膀以斷吉凶人精悍善戰閗也志云其地廣六百七十里袤千六十里編户通二十一里東至龍州界一百九十里西至牟力結吐蕃草地界四百八十里南至疊溪守禦千户所界二百里北至陜西洮州衛界八百六十里距成都七百六十里雪嶺面于東洮州界其西雪嶺其色如銀俗呼為寶頂山蠶崖路險人跡罕到即老杜所稱松州雪嶺東也洮河發源岷山北流入陜為臨洮府南入川與江漢㑹矣三邊志曰金蓬山在東南五里羌金蓬者居之山下石崖鐫永泉二字正統初都督李安以劍斫崖而得二水亦名文武水紅花牛心二山各去衛十五里峰巒圓秀者牛心也紅花有屯田是名紅花屯矣又東四十里為火焰山山無草木其色如赭志云城西有大悲寺唐天寶間僧智廣所創也國初設僧綱司以僧惠心為都綱掌其事景泰改元吐蕃猖獗纍欲發兵剿討嗣都綱智中往撫諭之番乃革心向化事聞升智中為崇化禪師賜以銀印冠帽袈裟藏經之屬智中浙之仁和人姓姜氏别號一天赤松觀在古松之南世傳三皇時雨師隨風雨上下莫知其跡於此地飛升後人立祠焉元鼎失馭兵燹之餘其跡尚存開國己卯錢塘羽士顧道升來棲於此游神清淨人向往之於是觀宇為之一新落成道升詣蜀獻王請額時荆南道士劉虛丹進赤松子畫像及中戒經正展覽間而道升適至王偉其誠遂命教授張景辰隸古赤松觀四字及所進經像以歸道升復於後殿築玉皇閣金碧輝煌殆與雪山相掩映也四夷考云宣德二年松潘千户錢宏聞有交址之役憚於逺征乃誘蠻族入冦譸張奏報得留不遣蠻自是煽禍攻圍城堡調官軍五千討之至威州黃土鋪失利道遂不通三年命總兵都督陳懷等帥西軍四萬由洮州入松潘解圍猶弗克靖八年復調川貴官軍協力從事始克成功正統四年都指揮趙諒誘執蠻酋國師商巴以犯邊聞遣都督李安征之尋誅諒誣妄蠻乃服然猶二三十四年始設松潘巡撫都御史一員以都御史冦深及侍郎羅綺相繼臨之咸有成績綺還京提督文臣不復更置但以備兵使者整飭之而已天順五年蠻截我糧道入龍安石泉等處成化十三年勢益猖獗復敕撫臣張瓚調漢土官兵五萬由東南二路分進剿滅白羊嶺鵝飲溪等二十一寨斬蠻首級四百餘顆於是商巴等二十六族詣軍門獻馬納欵各諭以利害遣之十四年正月復攻黃頭復水諸寨前後殺獲男婦七百餘人赭其碉房九百墜崖死者不可勝計亦一大創矣𢎞治間跳梁如故南路梗阻正德二年副總兵楊宏誘殺綽嶺寺國師雪郎王出自後本寺小宛卜等動稱報讐松城之外不敢晝牧嘉靖十一年敕副總兵何卿來節制諸軍相機𠞰討烏都等十一寨皆次第平而詣軍門送欵者日至矣卿家視松州諸所繕緝百廢俱興籓籬以固兵威亦震百蠻喘息不敢動垂五十年來生齒日繁復萌戎心時出殺人剽掠行旅萬厯八年兵使者楊一桂是以有三寨之役又雪山國師喇嘛等四十八寨勾敵為患邊氓岌岌十四年都御史徐元泰是以有㑹剿之役及丙申九月秋高敵騎突由寒盻黃勝草場分道馳入圍漳臘守備張良賢率兵破之斬首六級又攻鎮虜百戶杜世仁死戰斬首四級城得保全世仁死焉又攻制虜臺前後斬首十一級敵遁去良賢追至思答弄又大破之斬首十六級敵乃失利去初敵之入也襲我無備偵者不知其數及遁去巡視營疊不下五千餘灶未幾有畨婦逃回言所斬敵級中有大落赤之姪小王子在焉敵以此必欲報讐故昔之松潘重在畨今之松潘重在敵矣四夷考曰松潘西至流沙關相連天竺西南達紅土坡生畨多係敵人出沒地勢遼絶非可限域惟是南通叠茂威灌東通小河龍安北通漳臘墩臺守禦凡八十七所戍守主客官軍舍餘遊兵一萬一千六百八十餘人嵗額坐邊倉一十六處糧九萬九千三百八十餘石而增設之處不與焉東路經略志云松潘以東望山關雪欄關風洞關松林堡紅崖關三舍堡鎮逺堡小關子堡松丫堡三路堡師家堡四望堡凡十二處抵小河千户所四崖絶壁一線之逼附近水牛毛公羊洞諸畨未甚猖獗今以三舍關為始苐其里次三舍者去衛城九十里而遙也為小河適中地有把守指揮一員管轄上至望山下至四望共十三關堡羊腸鳥徑峭壁危湍嶮巇萬狀番夷往往潜伏而窺伺焉三舍上十里為伏羌堡伏羌上十里為紅崖關紅崖上十五里為松林堡志云黑松林關在治東七十里松林上九里為風洞關志云風洞關在治東五十里洞深不可測多惡風午輒大作作則灰沙蔽天人馬皆辟易寒氣襲人觸之多橫死否亦喘息旬日蓋山嵐鬱蒸之氣所發也關北鹽井墩即古鹽廢縣風洞上五里為雪欄關志云治東三十里雪欄山四時積雪不消俗呼為寶頂山關在山下雪欄上十二里為望山關關上八里即松州也三舍下十里為鎮逺堡鎮逺下八里為小關堡志云小關子在治東百二十里小關下八里為松埡堡松埡七里為三路堡三路下八里為師家堡師家下八里為四望堡又二里為小河所矣南路經略志云松潘以南紅花屯熊楨屯西寧關小屯堡安化關鎮華堡新塘關艾蒿堡歸化關北定關蒲江關平夷堡金瓶堡鎮平堡鎮畨堡靖夷堡平定堡凡十有七處抵疊溪界四夷考曰南路自西寧關起以至平定堡河東大姓屬牛毛土官管轄河西小姓屬羊毛土官管轄即志所謂牛腦羊腦也不服冠帶不受約束喜則同部落席地歡飲怒則持刃彼此相擊尊卑之序蕩然矣萬厯初年河東頗肆憑陵十四年征之搗其巢穴斬首二千餘級焚碉房千餘座始傾心向化埋奴誓願認守地方迄今不敢犯河西恃有長江之阻逆我文告其時亦震讋移遁深箐隔岸羅拜乞降許之有國師喇嘛灣仲者潜獻皮幣于敵人乞師伏於鐡爐溝以牽制我乘便邀擊事覺就擒其謀始破而膽落也歸化關志云在司南百里寰宇記蜀州有歸化縣置在移村各有部落主持無徵科務雖失故處而關名實因之地形險要上至西寧下至鎮江關堡凡九把守指揮一員以龍溪等寨大小橫梁為諸畨所出沒也歸化上七里為龍韜堡龍韜上十里為新鎮堡新鎮上十里為百勝堡百勝上五里為安化關安化上七里為雲屯堡雲屯上八里為西寧關志云在治南三十里西寧上八里為雄溪屯則南路之首也鐡爐溝諸夷在其界矣歸化下十二里為北定關志云北定關有祠祀二邊史劉方五將正德六年畨僧雪欄王出謀為不軌守將指揮邊輔史寬百户劉賢方捷攖鋒死戰輔寬遇害於黃土坡賢捷被執至寨縳柱將剖其心二將罵不絶口而亡事聞與子孫進一級承襲輔弟輪承兄職嘉靖七年巡南路至北定關遇橫梁茹兒等畨輪率其僕邊永興軍餘史卜匝等數人與戰已取勝值天雨溪泛諸畨四集輪被傷永興負輪行數十步至崖不能進執刃亂揮知不可支乃伏於輪身主僕俱被害事聞贈輪都指揮僉事永興百戶史卜匝等俱厚賚優恤焉北定下十有一里為鎮江關别拓大小耳别等寨在其界內寰宇記云歸化縣有大聾山小聾山在霸州西北一十里號苻堅城又云於小聾山上村置牙利縣或即大小耳之故迹也鎮江下四里為平畨堡平畨下八里為平夷堡其地寬平僅容千騎為四十八寨飲盟插血之地即黃沙壩矣萬厯十四年建城堡設守備一員把總練兵官一員管轄自西寧關至平定堡焉鎮平關上七里為金瓶堡金瓶上六里為平夷堡鎮平下七里為鎮畨堡鎮畨下八里為靖夷堡靖夷下八里即平定堡也平定下八里為永鎮堡係茂松二鎮交界處鎮平堡則指揮一員守之北路經略志云松潘以北穀粟屯高屯子羊裕屯唐舍屯談屯漳臘屯以上凡七堡抵吐畨洮河界四夷考云漳臘堡設在河東去城三十八里松州之背也舊制駐劄守備一員管轄上下關堡為寒盻口上中潘州上下羊洞等隘口自漳臘北去遼廓幽逺一望無際蓋萬騎可從容矣近改設遊擊一員以鎮壓之良審所重也漳臘上十五里為鎮虜堡在河東元山子上志云堡在漳臘東北十里堡後天險墩堡前觀化墩河東于襄臺河西制虜臺聲勢相望然直北為敵壩舊掘品字賺坑數百中置鋒刃木簽口覆芭土以掩其形又北去三里曰城牆岩東臨河畔西抵山麓掘壕寬深丈許橫截六百餘丈明斷彼路河西川盻溝壕塹之制亦如之越溝二十里登阿玉嶺之巔可瞷黃勝草場志云黃勝在漳臘西南十里也場之東有阿玉口凡二十里透嶺出川盻則可南可北惟所馳驅議者于天險觀化二墩充拓寬廣石砌墻垣一周外掘壕塹以防衝突亦庶幾扼其吭云鎮虜堡上二十里之柏木橋即界外矣漳臘下七里為虹橋關係松城北隘志云松州北二十里有落虹橋長二十丈餉道所必經也虹橋下七里為談屯談下七里為塘舍屯塘舍下六里為羊裕屯羊裕下六里即松城又虹橋下八里為高屯子高屯下七里為穀粟屯穀粟下十里亦即松城也離松十四里為流沙關乃敵人經由地每秋防必加意焉松城下五里為紅花屯紅花下七里為雄溪屯雄溪左十三里為東勝堡嵗熟畨受賞可稱無事惟是虹橋西北十五里為絶塞墩北界黃山尖殺鹿塘黃勝草場等處路通洮岷先年陳懷率兵由此道入解松圍今為敵騎間阻以其往來射獵于斯也下潘州白利等畨挾牛羊氊毳來或由阿玉嶺或由鐡門墩出抵寒盻祈命諸寨貿易茶斤嵗以為常稍失防範釁端輒起且阻絶長溝救援難及形勢孤懸所最當籌度議者于墩前石砌聮城一座直抵河下以通水道又依山掘壕絶其乘高則於覆壓乎何有古蹟志云潘州故城在衛北七百五十里漢武帝時逐諸羌渡河湟居塞外築此城置護羌校尉以禦之宋時分上下中潘三州今阿失寨即上潘州班班簇即下潘州界二州之間則中潘州也其地愈北山愈平夷舊漳臘之設在下潘州侍郎羅綺漳臘新記云距松衛治之北百里曰漳臘即古潘州也城之故趾尚在其下有巖穴空洞幽邃廣可容列騎深亦不知幾許旁有玻璃泉冬夏淵然不涸其土地膏腴山川秀麗蓋自唐盛時所開拓雖隸版圖而土蕃酋長猶然竊據所謂但羈縻之而已洪武十一年王師始下潘州入與編民賦役無殊乃於其地建置屯堡使士卒且耕且守纍數十年足食足兵邊人安堵宣德丁未守將失馭氐羌蜂起梗我餉道燹我關塞而潘州復為所據者凡二十有八年景泰辛未豫奉命來鎮兹土不揣思欲平復之乃大集諸酋陳以逆順禍福無不稽顙聽命於是復增置城池樓櫓凡戰守之具視昔有加焉不殫一石之粟不勞一人之力而數千百頃沃饒之地遂復為我有又晏然置城於其間俾兵農雜居纍嵗豐獲邊人安枕實朝廷威德所及豫何功之與焉或者以潘州之城與唐世籌邊樓相頡頏後先豫亦豈敢多讓景泰六年記曹學佺曰今之漳臘去松州一舍而遙非百里外之漳臘矣前張後弛勢所然也豫以庚戌署藩司事料松邊兵食聞敵人住牧於漳臘城內有百五六十帳殊駴聽聞乃檄漳臘遊擊何奮武得回牒云謹按漳臘一鎮五隘九屯一十八墩堡延袤二百餘里襟帶山河雜居種落所由來矣前不具論萬厯二十四年火落赤入冦彼時內有守備張良賢救應以截其鋒外有合壩犄角以牽其勢雖敵衆攻圍鎮虜三晝夜而不能破于時掌堡百戶杜世仁也豈異人任而其父子督軍兵數百人乃能射死小王子斬首數十級松漳卒賴以無事而合壩遂因之住牧焉續在三十三年廢將李宗望代庖漳臘又有合兒頓奪咱毛兒扛等韃接踵投居㑹治兵使者亦署官也侈然有張伐之意輒撫賞安插牛馬羊隻布滿山溪毛帳氊房星列草地猶肘腋間眠虎豹門庭內牧犬羊逐之恐釁端自此發也聽之恐禍本無所終也彼其往來漳松之間豈惟共我水草利我鹽茶凡倉庫之虛實軍兵之强弱道路之衝要無不盡知萬一生心何以制而禦之惟是高屯堡者在虹橋之內禦冦之下談之西正適中要地實乃松鎮以北之藩屏也議設把守一員撥唐順等軍五十名以耀威武而坐扼其吭焉誠為長䇿矣苐當展築屯基寬包隙壩貫路於中不惟容衆且可據險緣由到司覆看得松潘者蜀西之門户漳臘者松潘之咽喉也自土韃合壩合兒頓等住牧其中氊房毳室以百五六十計犬羊之性馴擾無常非我族類其心必異豈非他日之隱憂哉昔者隋唐之禍可鑒已但既來之則安之可以理而諭也方來者所當拒可以勢而禁也惟是漳臘之鎮虜堡原設把守一員地方遼濶勢本孤懸今且伏戎在內萬一有變聲息不相聞何暇左右顧議者以高屯堡要害之處添設把守以遏其衝且與漳臘為犄角誠䇿之善者也該堡事務仍令本官兼攝巡視軍兵即在各營抽選亦無所糜費矣若夫整行伍除戎器綢繆未雨有備無患此該道將之事也時當事者如議行之小河千户所國初洪武十一年與松潘衛同置在衛東百九十里宣德四年調成都前衛後所官軍實治之仍隸松潘按小河之地古名涪陽以水出松潘分水嶺入涪江也地在涪水之陽矣志云所北二十里師家山一名文山宋時師文二大姓居之山麓有文山關又有師家鋪則界于龍州也東有獅峯西有象嶺各離一里許有靈泉焉出獅峯下經略志云松潘又東為堡七曰蜂崖葉棠馬營水進鎮夷鐡龍乃抵龍安四夷考曰小河之下鐡龍之上惟葉棠為要隘有葉棠把守官轄之東通白馬毛公西逼竹頭野猪白草諸寨上六里為峯崖堡峯崖上十里即小河也下四里為馬營堡馬營下七里為水進堡水進下八里為鎮夷堡鎮夷下十里為乾坤堡乾坤下二十里為鐡龍堡堡有兩山對峙峭壁萬仞二水㑹流深不可測上為鐡索橋索凡六條各長一十五丈引于河之西岸繫以鐡柱中道板蕩行者戒心焉嘉靖間龍州宣撫薛兆乾作亂斬鐡橋以拒官兵旬日松州米貴如金矣鐡龍下十五里即龍安府云唐史太宗置松州都督府督羈縻二十五州為踞州貞觀元年置領縣二江源洛稽懿州五年置西吉州八年改為懿州領縣二濶涼洛吳麟州五年置西麟州八年去西字領縣七硤州和善斂具硤源王交利恭東陵雅州五年置西雅州八年去西字領縣三新城三泉石隴藂州三年置領縣五都流寧逺臨泉臨河其餘厥調凑殷匐器邇率鍾並諸羌部落遙立之而已可州四年置西義州八年改為可州里領縣三義誠清化靜方逺州四年置領縣二羅水小部川奉州三年置西仁州八年改為奉州領縣三奉德思安永慈巖州五年置西金州八年改為巖州領縣三金池甘松丹巖諾州五年置領縣三諾川歸德籬渭蛾州五年置領縣二常平郍川彭州三年置洪州七年改為彭州領縣四洪川歸逺臨津歸正軌州都督府二年置領縣四通川王城金源俄徹盍州四年置西唐州八年改為盍州領縣四湘水河唐曲嶺祐川直州五年置西集州八年改為直州領縣二集川新川肆州五年置領縣四歸唐芳藂鑒水磨山位州四年置西鑒州八年改為位州領縣二位豐西使玉州五年置領縣二玉山帶河嶂州四年置領縣四洛平顯川桂川顯平祐州四年置領縣二廓川歸定臺州六年置西滄州八年改為臺州橋州六年置序州十年置嵯州闊州十年置右俱貞觀之時招慰党項羌者舊屬隴右道改隸松州都督府永徽已後或叛或臣制置不一今並廢省聊備古跡而已唐書吐谷渾西羌名正益州西北去青海二十五里古析支之地漢西羌之别種也魏晉以降西羌微弱周滅宕昌鄧至之後党項始强南雜舂桑迷桑等羌北連吐谷渾其種每姓别自為部落一姓之中復分為一小部落大者萬餘其小者數千騎不相統一有細封氏費聽氏往利氏頗超氏野辭氏房當氏米禽氏拓拔氏最為强族貞觀五年詔遣使開其河曲地為六十州內附者三十萬口有羌酋拓拔赤詞者甚為渾主伏允所䁥與之結婚屢抗官軍後與其從子思頭並率服與諸首領歸欵列其地為懿嵯麟可等三十二州以松州為都督府羈縻存撫之拜赤詞為西戎州都督賜姓李氏自是從河首積石以來並為中國之境後吐蕃强盛拓跋氏漸為所逼遂請內徙聽移部落於慶州因置靜邊等州以處之故地陷於吐蕃不去者為其役吐蕃謂之弭藥又有黑党項在赤水之西李靖之擊吐谷渾也渾主伏允奔于黑党項居以空閒之地及吐谷渾舉國內屬其黑党項首領號孰善王亦貢方物其雪山党項姓破丑氏居雪山之下貞觀初亦嘗朝貢又有白狗舂桑白蘭等諸羌自龍朔以後並為吐蕃所破而服屬焉有附國者在蜀郡西北二千餘里即漢之西南夷也嘉良夷即其東部所居種姓自相率領不屬統一隋大業五年附國王遣其弟子宜林率嘉良夷等六十人朝貢嘉良有水濶六七十丈附國水濶一百丈並南流以皮為船而濟南有薄緣夷風俗亦同西有東女國東北連山綿亘數千里接党項及諸羌界其地南北八百里東西千五百里無城柵近川谷傍山險俗好復仇故壘石為巢而居以避患其巢高至十餘丈下至五六丈每級以木隔之基方三四步􅠼上方二三步狀似浮圖于下級開小門從內上通夜必關閉有二萬餘家俗有重罪止于罰牛妻其羣母及嫂兒弟死父兄亦納其妻好歌舞鼓簧吹笛死者無服制置尸于髙床上沐浴衣服被以牟甲覆以獸皮子孫不哭帶甲舞劍而呼云我父為鬼所取我欲報寃殺鬼其人輕捷便擊劍漆皮為牟甲為弓長六尺以竹為弦以皮為帽形圓如鉢或戴羃䍦衣多毛毼全剝牛腳皮為靴項繫鐡錢手貫鐡釧王與酋帥金為首飾胸前懸一金花徑三寸其土高氣候涼多風少雨土宜小麥青梁山出金銀多白雉水有嘉魚長四尺而鱗細東女國者西羌之别種也以西海中復有女國故曰東以别之俗以女為王東與茂州党項接東南與雅州接界隔羅女蠻及白狼夷有八十餘城王之所居名康延川中有弱水南流亦用牛皮為船以渡户四萬餘衆女王號為賔就有女官曰高霸平議國事在外官僚並男夫為之其王侍女數百人五日一聽政女王死國中多斂金錢動至數萬更于王族求令女二人立之大者為王次為小王若大王死則小王嗣立或姑死而婦繼並無篡奪所居皆重起屋王至九重國人至六重王服青色綾裙下領衫其袖委地重婦人輕丈夫文字同于天竺以十一月為正每至正月令巫者賫酒殽詣山中散糟麥于空大咒呼鳥俄時有鳥如雞飛入巫者懷中因剖其腹視之有一穀來嵗必登若有霜雪必多災異其俗因之名為鳥卜隋大業中蜀王秀遣使招之拒而不受唐武德中女王湯傍氏始遣使貢方物自永徽七年至于天寶元載朝貢不絶其後復以男子為王貞元九年其王湯立悉與哥鄰國王董卧庭白狗國王羅陀忽逋租國王弟鄧吉知南水國王姪薛尚悉曩弱水國王董辟和悉董國王湯悉贊清逺國王蘇唐磨咄霸國王董藐蓬各詣劍南西川乞內附其哥鄰等國皆散居西山弱水王即唐初女國之弱水部落其悉董國在弱水西故亦謂之弱水西悉董王舊皆分隸邊郡祖父例授將軍中郎果毅等官自中原多故皆為吐蕃所役屬其部落大者不過三二千户各置縣令十數人理之土有絲絮嵗輸于吐蕃至是悉與之同盟相率獻欵兼賫天寶中國家所賜官誥二十九道以進節度使韋臯處其衆于維霸保等州給以糧種耕牛咸樂生業立悉等數國王自來朝召見於麟德殿授立悉銀青光祿大夫歸化州刺史鄧吉知試太府少卿兼丹州長史薛尚悉曩試少府少監兼霸州長史董卧庭行至綿州卒贈武德州刺史命其子利羅為保寧都督府長史襲歌鄰王立悉妹乞悉漫頗有才智從其兄來朝封和義郡夫人其大首領董卧卿等皆授以官俄又授國王兄湯厥銀青光祿大夫試太府卿青逺王弟蘇歷顚銀青光祿大夫試衛尉卿南國王薛莫庭及湯悉贊董藐蓬女國唱後使湯佛庭美王鉢南郎唐并授銀青光祿大夫試大僕卿其時西山松州生羌等二萬餘口相繼內附其黏信部落主夢葱龍諾部落主辟葱皆授試衛尉卿立悉等并赴明年元㑹訖賜以金帛各遣還至八月召韋臯統押羌蠻及西山八國使其部落至今猶代襲刺史等官然亦潜通吐蕃故謂之兩面羌也陳子昻上蜀中軍事曰臣伏見劍南諸州緣通軌軍屯在松潘等州千里運糧百姓困弊臣不自恤竊為國家惜之伏以國家富有巴蜀是天府之藏也自隴右及河西諸州軍國所資郵驛所給商旅莫不取足於蜀又京都府庫嵗月珍貢尚在其外亦不資矣今邊郡主將乃通軌一軍徭役之弊使百姓貧窮國用不贍河西隴右資給亦減臣伏惟松潘諸軍自屯鎮以來於今相繼百十餘年竟未聞盜賊大侵而有尺寸之效今國家甘心竭力以事之臣不知其故伏惟念惜臣在蜀時傳聞潘松等州屯軍數不逾萬計糧給餉年不過七萬餘石可盈足邊郡主將不審支度乃每嵗向役十六萬夫夫擔糧輪送一斗之米價錢四百使百姓老弱未得息肩比年以來多所逃亡臣伏以吐蕃未忍即滅松潘屯兵未可廢散若准此賦斂每年以十六萬夫運糧臣恐更三年吐蕃未殄滅劒南百姓不堪此役恐非聖神制敵安人富國彊兵之神算也愚臣竊聞蜀中耆老評議劒南諸州比來以夫運糧者且一切並停請為九等稅錢以市騾馬差州縣富户各為屯駐稅錢者以完腳價各次第四畨運輦不用一年夫運之費可得數年軍食盈足比如常運減省二十餘倍蜀川百姓永得休息通軌軍人保安邊鎮京臺府庫河西軍馬得利供輸臣伏審計便宜體大非一二狀具盡中大夫曰陳拾遺論蜀西邊事而首及糧運誠知所先務也豫署司事因治兵使者議買畨米回檄開府云松潘重鎮控馭畨寇緩急時有積儲宜先今該道酌議買米萬石以備不虞誠未雨綢繆之計思患預防之道也苐轉運事宜尚有未盡者茲採之輿論參之臆見開列數欵于後一均民運何則松茂邊糧自崇慶郫灌新繁崇寧溫江六州縣此南路也自綿州彰明江油平武梓潼五州縣此東路也南路者灌縣買米起運而威茂驗糧通判督之東路者于江油縣買米起運而龍安驗糧同知督之其法非不犁然具也但領買者為店户即包攬之别名領運者為腳户即逋逃之淵藪店與腳合則通同為奸店與腳分則彼此推調積缺盈萬追併虛文邊儲匱乏職此之由今南路者已議起𣲖各州縣矣均之一餉也東路獨不可倣而行之乎應照例酌𣲖綿州彰明江油平武各州縣而梓潼土瘠穀稀又與餉道偏左特令裁去以安縣代之蓋安縣首建此議當不辭難耳說者曰江灌領運者此腳頭也各州縣領運者亦此腳頭也法更人故能保無弊蓋事不擇人貴行之有法以二驗糧官之事而散之十一州縣無獨任之難以各州縣之米而自徵自解又責成之易何不舍其難以就所易者乎一定㑹計何則松茂各倉有長中短之别焉自南路言之在西寧安化等一十五處者謂之長倉每石腳價自一兩一錢二分以至一兩五錢五分在疊溪普安等八處者謂之中倉每石腳價自七錢八分以至一兩在茂州廣備等一十二處者謂之短倉每石腳價自三錢四分以至七錢四分自東路言之在松潘漳臘等一十二處者謂之長倉每石腳價自六錢二分以至一兩四錢三分其先年固自有經制也嗣謂彼中官軍消長不齊故逐年㑹計雖云詳愼之一端要亦約其大槩耳豈斤斤於計口而食數米而炊者哉州縣藉口於劄付之未到而徵發愆期腳户垂涎於價值之有餘而趨避易起甚至中途減運進退維谷長倉詮次折乾獨多是邊與民兩病之矣須聽本司㑹同該道將各倉應運米石即以萬厯三十七年備供三十八年之數為則長短相兼均派二路刻定書冊永為定規倘糧米有剩餘不妨存貯以備用官軍有增益即於流積內接支惟登報循環明白無紊庶乎人易遵守餉可尅期一愼稽查何則往嵗邊儲本司只管徵發該道只管收貯而中間遲速完缺未之盡聞精神氣脈殊不貫串且於江灌起腳之地即為查驗米未就道而復歸家矣聽憑糧官閒暇之時始行給發士久待哺而何以應急乎宜早備行運米各州縣九月開徵頭運不得過十一月二運不得過次年正月先儘長倉中短次之每赴本司支給腳價即以該運倉口米石數目報驗本司仍給限票二張一給該州縣一另發緊要地方如東路則江油小河之類南路則灌縣茂州之類遇某州縣糧到該地方官即以本司原票馬上遞報倘不如期如數者行該州縣查究其完納一倉即取一倉硃串申繳不必拘泥一州縣全完致病守候一酌畨米何則畨米之說自萬厯二十二年起至今止或行或否迄無定規議復議寢有同聚訟大抵職邊防者欲有備而無患司出入者恐額外之不敷均為地方計也今據該道該將買米萬石以備緩急仍以五年為率每年於正數內減運二千在目前雖似驟發在日後無損絲毫是邊儲與財用兩得之矣每米一石腳價共銀一兩八錢六分計一萬石該銀一萬八千六百兩備行松潘道差官赴司支領前數其委買員役派頓倉口與乎稽核完缺數目俱聽該道酌行即以三十七年備供三十八年額內減運二千石至第五年預買扣除悉仍舊貫時大中丞俱可其議但以東路糧米改派綿彰等州縣徑運一節苐不知人情樂就否須再一查議務使小民稱便經久可行隨移㑹該道牒稱行據綿州申稱行據彰明縣申拘集四鄉里老楊希賢等訴稱本縣每年額徵大糧四千餘兩每年除存留支給官吏師生俸廩并兌買賞番布匹共去銀八百四十六兩零解司大糧尚有三千二百有竒如將前項大糧盡徵本色十分便益且貧民毫無生理得領腳價往來度日誠為便益該本縣看得坐派糧米民情之樂從已無疑矣即以本縣應解大糧注定米價盡數派成米石九月秋成徵收入倉領腳價募夫起運不易之䇿也又據平武回稱本縣原係土司改流並無解司糧餉其本縣應買之數照依舊則徑赴本司請發米腳價銀下縣僉令殷實買米雇腳赴倉完納徑取通關銷繳倘有違誤本縣敢任其責等因到州該攝州事羅江縣知縣夏之鳯查看得邊糧關係甚重腳頭貽害已深不一改絃而易轍非惟於邊無濟抑於民有纍也祗為奸猾資耳本州頗産穀米比照南路一例徵解可近無纍于民而逺有禆于邊矣即腳頭垂涎盤據難以准從又該本道看得買運松潘東路糧米俱係各州縣市棍營充腳頭領銀隨費遂致邊儲日虧逋缺日甚今改議各州縣糧米徵收本色赴領腳價徑運該倉誠為妥當既經行據各州縣回報民皆樂從但平武縣不産五穀或發銀令該縣僉報殷實承買准此又該本司看得輸邊重務也改革難言也茍非小民之所樂從則不可行即行矣亦不可久寧為愼重勿失鹵莽長䇿也但江綿地方頗皆産米米價每石五錢者其常也松邊之米定價五錢三分倉斛又縮於市斗焉此在百姓享什一之利而司帑省出入之煩也且米但徵之民耳非即民運也州縣赴司而領腳價仍舊雇腳譬如商販然分運者以母錢付託經紀買貨隨手花費而貨不可必得徑運者買成貨物雇腳盤運可計程而扺舍矣此無論東路即南路亦然既經覆查前來相應備行該道轉行綿州江油彰明二縣遵照自三十八年為始照坐定糧米於各州縣大糧起派每石照例折銀五錢三分平武縣原無大糧照舊赴司領價其年例腳價俱聽本司請發行各掌印官董理雇腳起運及照梓潼縣僻逺又非産米之處應行裁革安縣詳允之後願由南路姑聽其便容本司額坐倉口刋刻書冊通行遵照右有買運邊糧書冊刻在藩司杜甫代渝州王使君進論巴蜀安危表臣某言伏自陛下平山東收燕薊洎海隅萬里百姓感動喜王業再造瘡痏蘇息陛下明聖社稷之靈以至於此然河南河北貢賦未入江淮轉輸異於曩時唯獨劔南自用兵以來稅斂則殷都領不絶瓊林諸庫仰給最多是蜀之土地膏腴物産繁富足以供王命也近者賊臣惡子頻有亂常巴蜀之人橫被煩費猶自勸勉充備百役不敢怨嗟吐蕃今下松維等州成都已不安矣楊琳師再脅普合顒顒兩川不得相救百姓騷動未知所裁况臣本州山南所管初置節度庶事草創豈暇力及東西川哉伏願陛下聽政之餘料巴蜀之理亂審救援之得失定兩川之異同問分管之可否度長計大速以親賢出鎮哀罷人以安反仄犬戎侵軼郡盜窺伺庶可遏矣而三蜀大府也徵取萬計陛下忍坐見其狼狽哉不即為之臣竊恐蠻夷得恣屠割耳實為陛下有所痛惜今梁州既置節度與成都足以久逺相應矣東川更分管數州於內幕府取給破弊滋甚若兵馬悉付西川梁州益坦為聲援是重斂之下免出多門西南之人庶幾有活望焉必以戰伐未息勢資多軍應須遣朝廷任使舊人授之使節留後之寄綿歷嵗時非所以塞衆望也臣於所守封界連接梓州正可為成都東鄙其中别作法度亦不足成要害徒擾人為伏惟明主裁之敕天下徵收赦文減省軍用外諸色雜賦名目伏願損之又損劍南諸州亦因而復振矣將相之任內外交遷西川分閫以仗賢俊請愼擇重臣有臨危制變之明者觀其樹勳庸于當時扶泥塗於已墜借如犬戎俶擾臣素知之臣兄承訓自沒番以來長望生還僞親信於贊普探其深意意者報復摩彌青海之役决矣同謀誓衆於前後沒落之徒曲成翻動陰合應接積有嵗時每漢使回蕃使至帛書隱語纍嘗懇論臣皆封進上聞屢達臣兄承訓憂國家緣邊之急願亦勤矣况臣本隨兄在蜀向二十年兄既辱身蠻夷相見無日臣比未忍離蜀者望兄消息時通所以戮力邊隅纍踐班秩補拙之分淺待罪之日深蜀之安危敢竭聞見萬一少禆聖慮逺人之福也愚臣之幸也天寶元年孫逖為宰相賀隴右破吐畨表云臣等先在城中因奏事陛下謂臣等曰朕料至重陽已來諸軍必頻尅捷臣等欽承聖㫖詎測神功近者隴右果奏斬獲莽布支并生擒蘇毗王及鑾駕將回劍南節度使章仇兼瓊又奏西山將士分為五道破吐蕃城堡鎮柵等四十餘所四鎮節度馬靈察又奏破吐蕃不可勝數并開護密識慝等數國共為邊捍者數旬之間三方告捷應如影響合若符契禁暴如武盡決如宸衷知來似神更超於繫表斬級獲醜陷陳隳城分南方之五將舉無遺䇿道西城之諸蕃仍為外蔽百戰百勝以夷攻夷高居九重懸料萬里所以彰睿略之天贊知犬戎之日蹙臣等忝陪巡幸預奉德音踴躍之誠實倍恆品無任欣慶之至謹奉表陳賀以聞大厯十年常衮賀劍南破西畨表云臣某言今日伏見劍南西川節度使崔寧所奏露布十一月七日於劍南大破吐蕃斬首八千五百級生擒九百四十二人獲牛馬器械一千萬計者陛下以西戎負恩連嵗設備近興武旅逺鑠王師故隴上無虞卭南每捷事同符契謀動鬼神凡在臣庶不勝慶快伏以西蜀一隅犬戎乘隙聖謀潜運藩帥龔行以我同力出其不意故得邊兵無遺鏃之費狂冦有輿尸之凶名王首將既充俘馘要塞堅城亦入封守神武之德莫測掃除之勢足徵天聲一臨風動萬國則方隅不擾候我綏懷夷夏大同期於指掌臣等覩兹大捷愧乏嘉謀慶躍之誠實倍恆品貞元元年韋臯破吐蕃露布云尚書兵部臣韋臯等言臣聞天討有罪兵應者勝義者王夷不亂華師直為壯曲為老多助之至四極爰輳貞觀則同羅擊延陀開元則九姓殄默啜曰商莫不來享犯漢雖逺必誅德風鴹乎河源武節憺乎月率寧人之有指先元戎以啓行信用威光祖宗不以賊遺君父恭惟皇帝陛下宣昭義問數寧武功纘八葉之鴻圖奮四征之雄略懷梟鴟銷䘲沴稟仰太和剪鯨鯢清郊原掃除羣穢王猷允塞我武惟揚竒幹善芳各修貢職條支若木咸順㫖令遡積石之遐陬有吐蕃之醜類侵敗王略倍奸齊盟乘邊將之騁兵瞰戎亭之虛候為蛇豕食上國盡盜河湟帥蝥賊搖我疆再驚畿甸騎􅙟致於深入鑾蹕至於親屯􅏌然授兵協以謀我尚納汚而含垢姑通事以結和清水之盟未乾好畤之師已聚指涇靈而徼賂闖鹽夏以搗虛夷德無厭弗悔衽金之禍楚氛甚惡輒興衷甲之謀蠢爾為讎整居匪茹維時南詔慕化中朝先零之質諸羌雄嘗并力麋人之率百濮罔不離心頓顙於邊受命於吏斷胸奴之右臂羈南粵以長纓燕貉輸致騎之勤晉戎成犄鹿之勢彼既失鐡橋之險我遂克峨和之郛盍竄匿於龍堆復䖍劉乎鱗塞戕我守將墮我陴隍修戈矛而與同仇靡室家不遑寧處臣等請奮其旅以殱乃讎鳯翔振武靈武之騎獵其西邠寧太原涇源之兵震其北率山南熊羆之校暨東川貙虎之師烏蠻撓其腹心回鶻搗其肘腋衆素飽矣一大治之諸將陳洎等統五萬軍出十一道濟師西皓之半䇿勛北陸之初蕩平七城斬馘萬級獲鎧械五十萬計燔堡壘百七十餘遂賈勇而圍昆明將決勝而定青海為東境五節度大使論莽熱釋朔方之衆援維州之城九攻九却之計窮七縱七擒之威速連連執訊矯矯獻囚不然我薪而自焚有如破竹之立解拂廬魚潰甌脫兔奔谷靜山空行就焉耆之僇區殫域滅訖聞聖智之降斯皆廟謨淵深神斷天造明見萬里運竒堂上之兵守在四夷制勝目中之虜勒功滇池之柱植表赤領之碑一怒安民文之勇也三軍用命克何力焉臣等承帝之明敵王所愾開逺門揭候坐收西極之舊封紫微殿受俘重覩昆丘之茂績臣等無任慶快激切屏營之至謹遣某官奉露布以聞令狐楚賀劍南奏破吐蕃表臣某言當道進奏院狀報六月某日劍南節度使韋臯狀奏破吐蕃五千餘衆生擒大酋官七人陳上殺一百五十餘人收獲牛馬四百餘頭匹器械一千五百餘事者吉語逺及歡聲相接中賀臣聞順實臣道伏順者至柔而全禮為天經無禮者雖衆必敗陛下君臨萬國天覆兆人恩覃於幽微澤及乎荒逺蠢兹蕃醜假息西陲惟天地含宏之心未能剪滅以豺狼貪戾之性輒肆陸梁爰整其師不攻而取此皆降睿略於天下頒明謀於閫外制士之死命得人之歡心所以殪戎如羊破虜如蝨驅彼牛羊獲其侯王威加于殊域武暢乎羣動自然赤山之壤可蹈清淫之波可涉必當封土刻石以垂天聲戎臣司武獲覩其慶不勝歡抃之至權德輿賀雲南軍破吐蕃劍山保定城表云臣某言伏見劍南西川節度使某官某所奏兵馬使宋晃前月十八日與雲南軍合勢攻破吐蕃劍山保定城當日斬城使者伏以聲教所被遐邇大同蠢兹西戎尚有遺類或犯亭障且稽靈誅陛下靈算無窮天威逺震以夷裔感恩之衆佐藩隅制勝之臣取以多方纍獻戎捷事皆前定必稟聖謨斬將搴旗出於料外堅城便地書落彀中通荒服會朝之途絶餘孽窺覦之隙奉威懷之命以律而藏兼夷夏之師在和而克此皆陛下神武潜運妖氛永清由是成擒自當盡敵臣等謬當樞近愧乏廟謀幸覩成功不勝大慶無任欣抃之至謹奉表陳賀以聞宋羅泌蜀山世紀論曰嗚呼山川設險此天地之所以限疆界也嗟人之生雖聖且智其精神固有限劑而動地之不可極今古同也奈何多欲之君溪心壑志貪以取敗然後百罅啓而天地閉矣豫讀揚雄蜀紀而感夫蜀之所以通中國者夫蜀之為國富羡饒沃固自一天壤也西畨東漢北秦南廣一障之隔自生民以來君君世紹蜀不知有中國而中國亦莫知有蜀五帝以來羈縻服外蜀固不為中國少而中國亦不為蜀不足也周衰之時蜀王貪婪求欲無厭故秦惠得以圖之飾妖嬈之子劖怪誕之牛以誘其衷而後褒斜之路棧矣以故秦入得蜀之資而遂併天下自是蜀山不閉莫有其有至于今為中州則貪求之所致也一自中國之有蜀也故不可謂之無利也豫既讀蜀紀而感夫蜀之所以通中國者及讀陳子昂之疏而又幸蜀之不通於吐蕃也夫吐蕃之於蜀猶昔日之秦於蜀也方其拿唐之兵大戰則大勝小戰則小勝幾十載矣未嘗亡一旅也以薛仁貴郭待封彪武之將屑十萬衆於大非之川一甲不歸以李敬元劉審禮廊廟之宰辱十八萬衆於青海之上竟不能俘一醜而關隴為墟可謂彊矣然其涎垂全蜀之珍如是之久而不得食者徒以山川之阻絶而障塞之不通也胡為議者欲以梁鳯巴蜓之兵開蜀道繇雅州以討生羌而襲吐蕃夫羌人固未易討而昔者東漢之所繇喪敗者也嗚呼其亦幸而不成歟萬一生羌可破而蜀道遂開則蜀之瑤庫自此轉而西矣使我而得吐蕃其財固不足以裕國其地固不足以穡也而徒戮無辜之民竭有常之帑以徇之爾其或得之而得以穡亦何異於釋近孰而創逺業乎又何異於舍已之田而藝人之田者也况已之田舍矣而他人之田未及藝邪昔者漢之武帝好大而喜功使者張騫乃反誇以西域之富於是嘬丘以爭之四十年間中都之財賦夏國之生靈略盡於西域矣非不得其地也得朔方之郡而自不能以耕也非惟不能耕也得朔方之生而棄上谷遼陽之熟以此故矣其所以危士臣以締怨者得大宛良馬數十而已使齊楚之巨擘怨而交訟所爭亦不啻是一何默邪嗟乎武之轍既覆於前矣而隋之裴矩又以西域之圖蕩煬帝之侈心於是親出玉門置伊吾且末而關右蕭然始恃盛彊卒歸狼狽此魏公之所以傷之者也顧不韙歟豫常言之溟渤洪漲此天地之所以限東徼也惡溪沸海此天地之所以限南徼也陷河懸度之設乎西瀚海沙子之設乎北此天地之所以遮西而制北者也徼障霧於東維界黑水於南極泄流沙於西陲決弱水於北滅此天地之所以界四維也請試舉一隅以憲之方升明之二年委王奉表以條其祖之勛謂東西之所服者二百九十有六國是固海東之國也倭王之所服者也其所不服者幾什伯君其盡制歟支顯西遊道其所記亦數百國此于甸以西國也支顯之所知者也其不知者又不知其幾也知猛法盛之録曇勇道安之傳審至之國不下三四五百大延四域之使魏氏四道之賔所奏之國亦不下三四五百此世之未嘗聞者也是數千國者固俱樂土也其地可謂逺矣而其人亦未嘗有能道天之涯地之角者惡乎貪而不知已邪慮亂者穿其頤志逺者賴其目黃帝堯舜非不能服逺也而所守者域服之外一無所事其在周公亦不過曰詰爾戎兵陟禹之迹而已夫禹聲教暨於四海而其制中國若是截也伊尹四方之令狗國豹胡亦不過三十有六國來者不可拒往者不爾追又曷嘗勞吾氓宣吾府而奉之哉噫先王之政教其施於中國者蓋詳矣推先王之政教以治中國則禹之所制不為少矣不繇先王之政教則禹之所制猶將不異於域外彼以逺略誇後世而不詳乎其內者是豈禹之心也哉末世之君不知古者之所以為國而以貪求速敗豈禹反惑邪嗚呼其亦不聞蜀漢隋氏之事則已矣少有所知有不為之寒心哉陳子昻感遇詩丁亥嵗云暮西山事甲兵贏糧匝卭道荷㦸爭羌城嚴冬陰風徑窮岫泄雲生昏曀無晝夜羽檄復相驚拳局競萬仞奔騰走九𡨕籍籍峯壑裏哀哀氷雪行聖人御宇宙聞道泰階平肉食謀何失藜藿緬縱橫自注云天寶六載丁亥吐蕃圍松州也杜甫西山詩辛苦三城戍長防萬里秋煙塵侵火井雨雪閉松州風動將軍幕天寒使者裘漫山賊營壘回首得無憂嚴武軍城早秋詩昨夜秋風入漢關朔雲邊月滿西山更催飛將追驕虜莫遣沙場匹馬還杜甫和云秋風嫋嫋動高旌玉帳分弓射虜營已收滴博雲間戍欲奪蓬婆雪外城薛濤罰赴邊有懷上韋令公詩聞道邊城苦今朝到始知羞將門下曲唱與隴頭兒其二蕃寇猶違命烽烟直北愁却教嚴譴妾不敢向松州我明楊愼雪關謠云雪關謠者途人思何將軍也雪山關雪風起十二月斷行旅霧為箐氷為苔馬毛縮鳥鳴哀將軍不重來西路何時開按將軍名卿字藎臣合肥人成都前衛指揮僉事弱冠即戎正德戊辰守備威茂庚午征流賊手刃數人值東蠻出劫安綿警連大印落魄蠻圍壩底城二旬卿出竒破之又報捷於土門威名大振庚辰論功晉指揮使擢都指揮視閫篆嘉靖壬午充小河參將未幾芒部亂遷永寧參將擒隴政支等繕城署建學校瀘人多繪像祀之丙戍擢松潘總兵時南路梗塞數十年矣公至悉圖恢復改河修堡鑿險為夷於是始通癸巳奉命專征茂州五寨殊死戰奪虎頭崖等險克平十一寨進中府都督僉事仍領松鎮得節制東南大修長安馬路師家永平等堡於善地增修禦冦靖虜諸墩以扼險儲薪利用鑿泉便汲隨處賴之復裁省各路每年安班番賞以萬計沿邊建營為間二萬有竒夾路邊垣障蔽一千餘里丙申渾水溝等蠻復叛一鼓平之庚子進都督同知癸卯用言官議以名將徵入本兵㑹推總督禁營力遜避乙巳奉敕提督東官㕔聽征總兵官㑹蜀白草蠻叛撫臣疏請大征兵擬三萬有竒糧擬四十萬石時值大饑公至惻然兵減三分之二糧減十分之九因敵為糧用降為導直搗巢穴盡殱渠魁餘黨請降獻地輸貢皆其力也公為人清心寡欲號令嚴明恩威兼濟動中機宜平時涉獵書史咨訪邊務身先儉孫以風武辨邊氓父老謂丁大夫之後一人而已蜀中廣記卷三十一
