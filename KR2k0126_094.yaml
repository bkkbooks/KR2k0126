body:
  text: 蜀中廣記卷九十四明曺學佺撰著作記第四子部老子指歸漢書嚴君平博覽亡不通依老子嚴周之指著書十餘萬言嚴君平注老子其文竒世多未見如云肝膽為胡越眉目為齊楚又云生不枉神死不幽志又云天地億萬而道王之衆靈赫赫而天王之倮者穴處而聖人王之羽者翔虛而神鳯王之毛者跖實而麒麟王之鱗者水居而神龍王之介者澤處而靈龜王之百川並流而江海王之又云言為禍匠默為害工進為妖式退為㜸容嘗鼎一臠可知其味也出丹鉛餘録注老子指歸十三卷朝氏曰其章句頗與諸本不同如以曲則全章末十七字為後章首之類按唐志有嚴遵指歸四卷馮廓注指歸十三卷此本卷數與廓注同題谷神子而不顯名姓疑即廓也三十家注老子八卷唐岷山道士張君相集河上公嚴遵王弼何晏郭象鍾㑹孫登羊祜羅什盧裕劉仁㑹顧歡陶隱居松羅仙人裴處思杜弼節解張憑張峒成𤣥靜大孟小孟竇略宋文明禇柔劉進喜秦子晃成𤣥英車惠弼等注君相稱三十家而列名止二十有九蓋君相自以為一家言并數之耳君相不知何時人而謂成𤣥英為皇朝道士則唐天寶後人也以絶學無憂一句附絶聖棄知章末以唯之與阿别為一章與諸本不同道德經廣義三十卷崇文總目唐青城賜紫道士杜光庭撰以明皇注疏演其義道德經疏節解上下各二卷崇文總目僞蜀喬諷撰諷為諫議大夫知制誥奉詔以唐明皇注疏杜光庭義綴其要附以己意解釋之道德經解二卷宋隱居郭長孺撰志云不知何許人流寓入蜀遂為成都人頗知黃老吐納之學蘇子由注老子二卷子由調官筠州頗與學浮屠者游而有所得於是解老子嘗曰中庸喜怒哀樂之未發謂之中發而皆中節謂之和致中和天地位焉萬物育焉此蓋佛法也六祖謂不思善不思惡則喜恕哀樂之未發也蓋中者佛法之異名而和者六度萬行之總目致中極和而天地萬物生於其間非佛法何以當之天下無二道而所以治人則異古之聖人忠信行道而不毁世法以此耳故解老子亦時有與佛法合者其曰是謂襲明以為釋氏傳燈之類東坡跋曰使戰國有此書則無商鞅韓非使漢初有此書則孔老為一使晋宋間有此書則佛老不為二劉巨濟注老子二卷陽安劉涇字巨濟篤志于學文詞竒偉早登子瞻之門號前溪子南華經疏二卷隋何妥棲鳯著爵里見前南華正義唐劍南道士文如海著宋太平興國八年成都道士任奉古鋟諸木嵗久不傳元𤣥學講師錢大中翻刻之吳澄序東坡廣成子解一卷朝氏曰蘇子瞻取莊子中黃帝問道於廣成一章為之解景迂嘗難之其序略曰某晚玷先生薦賢中安敢與先生異論然先生許我不茍同按杜光庭有廣成子一百卷不係此書珞琭子鬼谷先生著大峨志云山有鬼谷洞相傳先生於其中著珞琭子而上升去通考以為即今祿命之書無盡居士注素書一卷朝氏曰商英稱素書凡六篇按漢書黃石公圮上授子房世人多以三略為是蓋誤也晋亂有盜發子房冢玉枕中獲此書商英之言世未有信之者荀子校勘二十卷宋廣安黎錞希聲著揚子法言十三卷朝氏曰漢揚雄撰晋祠部郎中李軌注雄好古學見諸子各以其知舛駁不與聖人同是非頗謬於經故人時有問雄者常用法言應之撰此以象論語號曰法言每篇復為序贊以發其大意然雄之學自得者少其言務擬聖人靳靳然若影之守形既鮮所發明又往往違其本指正古人所謂畫者謹毛而失貌者也殊言十五卷宋經籍志作方言十四卷雄答劉歆書又敕以殊言十五卷君何由知之謹歸誠底裏不敢違信雄少不師章句亦於五經之訓所不解常聞先代輶軒之使奏籍之書皆藏於周秦之室及其破也遺棄無見之者獨蜀郡有嚴君平臨卭林閭翁孺者深好訓詁猶見輶軒之使所奏言翁孺與雄外家牽連之親又君平過誤有以私遇少而與雄也君平財有千言耳翁孺梗槩之法略有翁孺往數嵗死婦蜀郡掌氏子無子而去而雄始能草文先作縣邸銘玉珥頌階闥銘及成都城四隅銘蜀人有楊莊者為郎誦之於成帝成帝好之以為似相如雄遂以此得外見此數者皆都水君常見故不復奏雄為郎之嵗自奏少不得學而心好沈博絶麗之文願不受三嵗之奉且休脫直事之繇得肆心廣意以自克就有詔不可奪奉令尚書賜筆墨錢六萬得觀書於石渠如是後一嵗作繡補靈節龍骨之銘詩三章成帝好之遂得盡意故天下上計孝亷及內郡衛率㑹者雄常把三寸弱翰齎油素四尺以問其異語歸即以鉛摘次之於槧二十七嵗于今矣而語言或交錯相反覆方論思詳悉集之燕其疑張伯松不好雄賦頌之文然亦有以竒之常為雄道言其父及其先君喜典訓屬雄以此篇目頗示其成者伯松曰是縣諸日月不刋之書也又言恐雄為太𤣥經由鼠坻之與牛場也如其用則實五稼飽邦民否則為抵糞棄之于道矣而雄獻之伯松與雄獨何德慧而君與雄獨何譖隙而當匿乎其不勞戎馬髙車令人君坐幃幕之中知絶遐異俗之語典流於昆嗣言列于漢籍誠雄心之所志極至精之所想遘也仗聖朝逺照之明使君求此契君之意誠雄散之㑹也死之日則今之榮也不敢有二不敢有愛少而不以行立於鄉里長而不以功顯于縣官者訓此於帝籍但言詞情覽翰墨為士誠欲崇而就之不可以遺不可以忘即君必欲脅之以威陵之以武欲令入之於此此又未定未可以見今君又終之則縊死以從命也且寬假延期必不敢有愛雄之所為得使君輔貢於明朝則雄無恨何敢有匿唯執事圖之謹因還使雄叩頭叩頭太𤣥經三卷漢書揚雄作太𤣥覃思渾天參摹而四分之極于八十一旁則三摹九据極之七百二十九贊亦自然之道也故觀易者見其卦而名之觀𤣥者數其畫而定之𤣥首四重者非卦也數也其用自天元推一夜隂陽數度律歷之紀九九大運與夭終始故𤣥三方九州二十七部八十一家二百四十三表七百二十九贊分為三卷卷首有陸績述𤣥一篇太𤣥指歸三國涪人李撰著爵里見前比齊司馬膺之好讀太𤣥經注揚雄蜀都賦每云我欲與揚子雲周旋太𤣥發隱三篇巽巖李氏曰章察撰察有太𤣥講疏四十九卷其說甚備發隱之作蓋在講疏以前章氏太𤣥經注十四卷講疏三十卷東坡志林云察本閩人遷于蜀者數世遂為成都人博通五經尤長易與太𤣥王素趙抃守蜀皆賔禮之賜號冲退處士素所請也察將死其鄉人夢察以小童自隨投謁告别曰此間囂塵非修行地吾歸閬苑矣察蓋明術數得道者云太𤣥經疏十八卷朝氏曰郭元亨撰元亨謂雄之作𤣥傳于侯芭後獨有張衡桓談張華見而稱歎吳郡鄒伯岐求本不能得宋𠂻為訓陸績為解范叔明王涯亦注之皆未明白元亨在蜀自淳化末迄于祥符八年僅三十年撰成今疏又云太𤣥潤色於君平未知何所據而然孫明復曰揚子雲太𤣥非準易乃明天人始終之理君臣上下之分蓋疾莾而作也桓談曰是書也可與大易準班固曰經莫大于易故作太𤣥使子雲被僭經之名二子之過也出丹鉛録王長文通𤣥經四卷晋書長文字德睿廣漢郪人著書四卷擬易名曰通𤣥經有文言卦象可用卜筮時人比之太𤣥同郡馬秀曰揚雄作太𤣥惟桓談以為必傳後世晚遭陸績𤣥道遂名長文通𤣥經未遭公紀君山耳陳漸演𤣥十五篇宋史漸字鴻漸堯佐從子也少以文學知名淳化中與其父堯封皆以進士試廷中擢第不就願讓其父太宗許之好太𤣥經著書十五篇號演𤣥潛虛司馬光著自序曰𤣥以凖易虛以擬𤣥𤣥且覆瓿而况虛乎其棄必矣然子雲曰後世復有揚子雲必知𤣥吾於子雲雖未能知固好之矣安知後世復無司馬君實乎墨子祕書梁陳方慶梓州射洪人好道術得墨子五行祕書及白虎七變之法隱於郡之武東山大同中仕至新城郡司馬即子昻逺祖也見本集日華子蜀志補遺射洪陳子良撰即子昻之兄也詩工樂府見文苑英華兼精醫術著日華子行于世文中子十卷隋王通著通初為蜀郡司户書佐草創是書長短經十卷北夢瑣言云趙𬎼著𬎼梓州鹽亭人博學韜鈐長於經世夫婦俱有隱操不應辟召其書論王霸機權正變之術第十卷載隂謀家言本缺今存者六十四篇黃帝隂符五十六萬七千言成都古今集記綿竹鄭山古授之軍校黃承真者其字一㸃一畫皆以五行屬配實竒書也五代孫光憲猶及見之仁夀龍昌期後乃作注𤣥成子一卷唐成都袁天綱著補履書十卷唐通泉李浦德川著本孟軻揚雄之㫖世號補履先生德宗幸褒中丞相張延賞表薦之拜右拾遺不就再詔見賜緋衣正色執辭當朝敬懾炙轂子三十卷唐進士王睿著六經得失史冊差謬無不針其膏而藥其肓焉按張君房七籖載睿卒於彭山道中年八十後人又見之于成都市及樂溫縣云贅隅子歔欷瑣微論十卷蜀人黃晞撰贅隅子晞自號也序曰贅隅者持物之名歔欷者兼歎之聲瑣微者述之之謂故以名書其略云腐薪不可以撻兵涣泥不可以膠物莊周韓非終日求道德而智巧入焉終日求真實而浮僞入焉古之譁人也凡將篇藝文志云漢興閭里書師合蒼頡爰歷博學三書斷六十字為一章併名蒼頡篇武帝時司馬相如作凡將篇無復字若史游之急就李長之元尚皆蒼頡正字也按桞玭訓序言其在蜀時嘗閲書肆字書小學率雕板印紙則字學在蜀尤謹訓纂漢書元始中徵天下通小學者以百數各令記字于庭中揚雄取其有用者作訓纂一篇以續蒼頡又易蒼頡中重復之字凡八十九章林氏小說三卷五代成都林罕著古今記云罕與孫逢吉同郡同時俱擅文學著說文二千篇目曰林氏小說附石經刻于學宫朝氏曰書凡五百四十一字以說文部居隨字出文以定偏傍其說頗與許慎不同而互有得失仁宗時邵必進禮記石經陛對帝問罕之書如何必曰雖有所長而微好怪說文歸字從堆從止從帚以堆為聲罕云從追於聲為近此長於許氏矣說文哭從吅從獄省罕乃云象犬嘷此怪也有石刻在成都公武嘗從數友就觀之其解字殊可駭笑不疑好怪之論誠然釋貫休重集許氏說文僞蜀宰相王鍇作讚云曇域戒學精微篆文雄健重集叔重說文見行于蜀唐氏字說解一百二十卷朝氏曰知卭州唐耜撰紹聖以來用字說程試諸生解者甚衆耜集成此書頗注其用事所出一時稱之在卭州日奏御陳伯英教書元青神陳瑛著吳澄序略曰秦隸興而篆書廢漢四百年莫有能者觀於漢代碑刻可見矣三國六朝間亦無聞焉唐三百年李當塗一人而已自秦丞相迄宋初蓋千年僅有徐騎省以篆學自許何寥寥也最後魏文靖留心於此學者稱之陳伯英為文靖鄉人所書千文字體整潔可以上希文靖其先世少師公於蘇文忠大父行參政公當南渡之際以詩名家咸淳省試春秋第一人其季父也伯英今受朝命為郡教授一家文學之傳如此韻英十卷唐翰林學士元庭堅罷遂州參軍讀書郊外有人身而鳥首者衆鳥隨之詣元曰願教君以字音及鳥語庭堅不之怪與往來嵗餘盡傳音律清濁之㫖至隂陽術數無不通達在翰林日著韻英十卷未施行而西京陷賊庭堅亦卒出游宦紀聞書林韻㑹一百卷陳氏曰無名氏蜀書坊所刻規摹韻類題選而加詳焉按韻㑹乃蜀孟昶敕史館編進楊用修云在京師及見此書有聲無字韻一卷宋史句中正字坦然華陽人孟昶時授崇文館校書郎復舉進士及第歸朝太平興國二年獻八體書召入授著作佐郎直史館被詔詳定篇韻復與徐鉉校定說文太宗問凡有聲無字者幾何中正退條為一卷以獻上曰朕亦得二十一字可并録之也又與吳鉉楊文舉同撰定雍熙廣韻一百卷特拜虞部員外郎淳化中纍遷屯田郎中杜門守道以文翰為樂嘗以大小篆八分三體書孝經摹石咸平三年表上之真宗召見便殿賜坐問所書幾許時曰臣寫此書十五年方成上嘉歎賜金紫命藏于祕閣卒年七十四中正喜藏書家無餘財王知微韻篇王著字知微成都人僞蜀明經及第赴闕授隆平主簿太宗以字書訛舛欲令學士刪定少通習者轉運使侯陟以著名聞改衛寺丞史館祗候委以詳定篇韻加著作佐郎五音韻補丹稜李燾著自序曰漢和帝永元十二年太尉祭酒許叔重始為說文解字十四篇凡五百四十部其文九千三百五十三晋東萊弦令吕忱繼作字林五卷以補叔重所闕遺者于叔重部叙初無移徙忱書甚簡顧為他說糅亂且傳寫訛脫學者鮮通今往往附見說文蓋莫知自誰氏始陳左將軍顧野王更因說文造玉篇三十卷梁武帝大同末獻之其部叙既有所升降損益其文又增多于叔重唐上元末處士孫强復修野王玉篇愈增多其文今行于俗間者强所修也叔重専為篆學而野王雜以隸書用世既久故篆學愈微野王雖曰推本叔重而追逐世好非復叔重之舊自强以下固無譏焉大歷間李陽氷獨以篆學得名時稱中興更刋定說文仍祖叔重然頗出私意以為詆訶學者恨之南唐徐鍇著書四十篇總名繫傳蓋尊許氏若經也惜其書未布而鍇亡本朝雍熙三年鍇兄鉉初承詔與句中正葛湍王惟恭等詳校說文今三十卷內繫傳往往錯見豈其同源果無異派歟鍇亡恙時鉉苦許氏偏旁奧密不可意知因令鍇以切韻譜其四聲庶幾檢閲力省功倍鉉又為鍇篆名曰說文韻譜其書當與繫傳並行今韻譜或刻諸學官而繫傳訖莫光顯余搜訪嵗久僅得其七八闕卷訛字無所是正每用太息蓋嘗謂小學放絶久矣欲崇起之必以許氏為宗而鉉鍇兄弟最其親近者如李陽氷林罕郭忠恕等輩俱當收拾採掇聚為一書使學者復覩純全似非小補顧力有所不及耳韻譜仍便於檢閲然局以四聲則偏旁要未易見乃因司馬光所上類篇依五音先後悉取說文次第安排使若魚貫然開編即可了也說文所無而類篇新入者皆弗取若有重音則但舉其先而略其後雖許氏本在上去入聲而類篇在平聲亦移在平聲大抵皆以類篇為定類篇者司馬光治平末所上也先是景祐初宋祁鄭戬建言見行廣韻乃陳彭年丘雍等修繁省失當有誤科試乞别刋定即詔祁戬與賈昌朝同修而丁度李淑典領之書成賜名集韻度等復奏集韻添字極多與彭年雍等前所修玉篇不相參協乞别為類篇即以命洙洙尋卒命胡宿代之宿奏委掌禹錫張次立同加校讎宿遷命范鎮代之鎮出而光代之書乃成自集韻類篇列於學官而廣韻玉篇微矣然小學放絶講習者寡猶幸其書具存耳所謂廣韻則隋陸法言撰唐郭知𤣥附益之者時號切韻天寶末陳州司馬孫愐者以切韻為繆略復加刋正别為唐韻之名大中祥符元年改賜新名曰廣韻今號集韻則又寶元改賜也切韻廣韻皆莫如集韻詳故司馬光因之以修類篇嗚呼學無小而古謂字書之學為小何哉亦以志學者當由此始云爾凡物雖微必有理存何况斯文幼而講習磨礲浸灌之久逮其長也于窮理乎何有不則躐等凌節君子不貴矣今學者以利祿之路初不假此遂一切棄捐不省喜字書者求其心畫端方已絶不可得但肆筆趂姿媚耳偏旁橫竪且昏不知矧其文理邪先儒解經固未始不用此匪獨王安石也安石初是說文覃思頗有所悟故其解經合處亦不為少獨恨求之太鑿所失更多不幸驟貴附和者益衆而鑿愈甚蓋字有六義而彼乃一之雖欲不鑿得乎科試競用其說元祐嘗禁之學官導諛紹聖復用嗜利祿者靡然風從鑿說橫流汩喪道真此吾蘇氏所以力攻之而不肯置也若一切置此弗道則又非是今國家既不以此試士為士者可以自學矣乃未嘗過而問焉余竊哀之雖老矣猶欲與後生共講習此故先為此五音韻譜且叙其指意云魏了翁答遂寧李侍郎書巽巖先生初作五音譜以許叔重部叙為之後在遂寧出視虞仲房乃改用徐楚金韻譜老先生雖勉從之終弗愜也故後序及跋語既云要自别行又云要須各行大抵始一終亥其行也始東終法其聲也許氏元無反切後人漸加附益至徐鼎臣始以孫愐唐韻音切為定自音切行人以為便於檢閲而不知字之本乎偏旁故老先生謂偏旁一切都置則字之有形無聲者豈不愈難檢閲蓋不以韻譜為然也聞韻譜今已不存或使府别為刋元本五音譜置之學中以廣其傳亦是一事不知台意以為何如字通一卷彭山李肩吾從周撰䝉求二卷成都范鎮景仁著取通鑑編為四言以訓初學事韻擷英元江西路教授西蜀張夀翁撰吳草廬曰昔歐陽公蘇老泉王荆國諸人以黯然銷魂惟别而已八字分韻賦詩送裴吳江老泉得而字曰談詩究字而荆國就席作二首曰風作鱗之而曰兩忘我與而一座駭服宋以前詩和意不和韻至荆國東坡山谷始以用韻竒險為工蓋其胸中蟠萬卷書隨取隨有愈出愈巧故得以相矜尚也倘記覽不及前賢則不得不資檢閲於是乎有詩韻等書矣荆國嘗謂晏元獻用事的切後見其類稿乃知其有自來纂輯之書亦不為無補也夀翁所編韻皆竒險而無陳腐之字置一袠座右則人人皆荆國蘇黃之巨公矣太初歷漢洛下閎著史記索隱引耆舊傳云閎字長公明曉天文隱于洛下武帝徵待詔太史于地中轉渾天改顓頊歷作太初歷曰後八百嵗此歷差一日當有聖人定之歷書曰今上即位招致方士唐都分其天部而巴洛下閎運算轉歷然後日辰之度與夏正同桓子新論云揚子雲好天文問洛下黃閎以渾天之說閎曰我少作其事不曉達其意到今年七十始知其理然則洛下其隱處黃其姓也續通歷一卷五代孫光憲撰永昌正象歷僞蜀胡秀林撰北夢瑣言初王衍以唐襲宅建上清宫於老君殿列唐十八帝真備法駕謁之識者以為拜唐乃歸命之先兆也先是司天監胡秀林進厯移閠在丙戌年正月有向隱者亦進歷用宣明法閏在乙酉年十二月既有異同彼此紛訴仍於界上取唐國歷日改閏十二月街衢賣歷者云只有一月也其年十二月二十八日國竟滅秀林本唐朝司天少監仕蜀别造永昌正象歷推步之妙天下一人然移閠之事不爽歷議常人未可輕非之本天歷宋史端宗即位海上命禮部侍郎鄧光薦與蜀人楊某等作歷賜名本天其法與奉元㑹天二歷並亡通書十卷往事龜鑑十卷宋鄧至著雙流鄧綰之父也亦本歷書而作興道一篇後漢景鸞抄風角雜書列其占驗所作卦法一卷漢嚴遵著見宋志十二時風雲氣候一卷諸葛亮著見宋經籍志萇𢎞兵法十五篇周大夫萇𢎞也資中人見白氏六帖陳圖祕訣一卷陳氏曰昭武謝淵得之於瀘州蓋武侯八陳法也為之釋而傳於世兵雲圖益部耆舊傳云楊由有兵雲圖時竇憲將兵在外太守髙安遣工從由寫圖以進憲由口授以成圖行兵法五卷將苑一卷並諸葛武侯著見宋史兵書十二篇眉山王當撰𤣥女墜金法一卷袁天綱著見宋志陸氏集驗方五十卷唐書陸贄字敬輿蘇州嘉興人為裴延齡所譖貶忠州别駕在州十年閉關靜處人不識其面復避謗不著書家居瘴鄉人多癘疫乃抄撮方書為陸氏集驗方五十卷行於代産寶二卷唐咱殷撰殷蜀人武宗大中初白敏中守成都其家有因免乳死者訪問明醫或以殷對敏中迎之殷集備驗方藥三百七十八首以獻其後周頲又作三論附焉纂集本草經後蜀孟昶輯舊本草經止一卷藥三百六十五種陶隱居增名醫别録亦三百六十五種因注釋為七卷唐顯慶又增一百十四種廣為二十卷謂之唐本草至昶又增益之謂之蜀本草葉石林曰顯慶中蘇恭請重修本草上命長孫無忌等廣為二十卷自是僞蜀韓保升諸術家各自補緝辨證者不一焉治蠱方書皇祐初趙尚寬守忠州俗故有畜蠱殺人乃揭方書於衢教人服藥造毒者悉捕殺之由是乃息虞庶注難經五卷庶仁夀人寓居漢嘉少為儒已棄其業習醫為此書以補吕楊所未盡黎泰辰治平間序之靈樞經音注二十四卷紹興中成都史嵩校正本文九卷八十一篇增修音釋轉運司為之詳定以送祕書省自為序隂陽雜證論述宋郭長孺撰夷堅志類編方四川總領陳曄日華取夷堅志中所載書文藥方類為一編指南方二卷陳振孫曰蜀人史堪載之撰凡三十一門門各有論嚴悟射訣一卷朝氏曰唐王思永學射於成都工曺嚴悟成射法十篇每篇首必稱師云益州名畫録三卷成都黃休復纂自唐乾元初至宋乾德嵗録其圖畫之精者五十八人品以四格陳氏曰中興書目以為李畋撰而謂休復書今亡按此書有景祐三年序不著名氏而叙休復所録明甚又有休復自為後序則固未嘗亡也未知題李畋者與此同異茅亭客話十卷黃休復撰茅亭其所居也暇日賔客話言及虛無變化謡俗卜筮雖異端而合道㫖屬懲勸者皆録之多是蜀事酉陽雜爼十卷唐段成式隨其父節度使文昌入蜀所著以二酉山多藏竒書而蜀在大酉之陽也今酉陽土司隸重慶云其書亦多紀蜀事有一卷專言般若感應蓋文昌嘗誦此經續事始五卷僞蜀馮鑑廣唐孝孫而作小名録三卷文正倫濟道著括諸書重復者為之名號録二十卷朝氏曰馬永易明叟編古今殊異名號如銅馬帝無愁天子之類頃嘗見近世人增廣其名曰賔實録亦殊該博陳氏曰馬永易撰蜀人勾龍材校正文彪增廣刻之本書三十卷後集三十卷義取名者實之賔也蠶書三卷陵陽孫光憲著牧豎閒談三卷蜀人景渙纂十九事為篇又著野人閒話五卷諸老紀聞宋中江吳昌裔著燕語考異十卷陳氏曰成都宇文紹奕撰舊聞汪玉山嘗駁燕語之誤而未之見也文㑹談叢一卷陳氏曰題華陽上官融撰不知何人天聖五年序蜀中廣記卷九十四
