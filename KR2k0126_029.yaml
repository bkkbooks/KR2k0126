body:
  text: 蜀中廣記卷二十九明曹學佺撰名勝記第二十九川北道潼川州一漢郪縣三國志云先主入蜀攻劉璋遣諸葛亮等分定州郡略地至郪百姓以牛酒犒師於會軍堂山即此地東廣漢郡後主置也十道記云廣漢之地有鹽井銅山之富蔬食果實之饒宋劉甲人物志序唐以前凡稱梓潼者即今之隆慶稱涪者即今之綿州惟稱郪及廣漢縣乃潼川也楊炯送梓州周司功詩御溝一相送征馬屢盤桓言笑方無日離憂獨未寬舉杯聊勸酒破涕暫為歡别後風清夜思君蜀路難盧照鄰送梓州髙參軍還京詩京洛風塵逺褒斜煙霧深北遊君似智南飛我異禽别路琴聲斷秋山猿鳥吟一乖青巖酌空佇白雲心王維送梓州李使君詩萬壑樹參天千山響杜鵑山中一夜雨樹杪百重泉漢女輸橦布巴人訟芋田文翁翻教授不敢倚先賢司空曙送崔校書赴梓幕詩碧峯天柱下鼓角鎮南軍管記催飛檄蓬萊輟校文棧霜朝似雪江霧晚成雲想出褒中望巴庸方路分李洞送東川髙僕射詩油幢影裏拜清風十里貔貅一片雄三印鎖開霜滿地四門關定月當空泉浮山葉人家過詔惹爐香鳥道通新起畫樓攜客上絃歌筵內海榴紅李義山梓州罷吟寄同舍詩不揀花朝與雪朝五年從事霍嫖姚君緣接座交珠履我為分行近翠翹楚雨含情皆有託漳濵多病竟無憀長吟逺下燕臺去唯有衣香染未鎖元稹詩序元和四年三月七日豫以監察御史使東川往來鞍馬間賦詩凡三十二章祕書省校書郎白行簡為豫手寫為東川卷云唐梓州參軍蘇榮丞相味道之父到職授書鄉人曰頃注吏部州參子號縣帶郪名由來不涉老身併是婦兒官職孫光憲北夢瑣言云西川人言梓州者我東門之草市也柳仲郢為東川節度使美績流聞嘗語人曰吾仕朝廷三十年清華備歷今日始與西川作市令耶人皆以為善謔州治名世堂畫司馬相如王褒揚雄嚴君平屈原陳子昻李太白蘇子瞻八人皆蜀産而秭歸在蜀漢時為建平郡故三閭得兼收之東坡送周正孺知東川詩為公掃棠溪畫像或相繼自注云蜀中太守賢者無不畫像矣元和郡國志州城宋元嘉中築舊潼川志云州之子城上紅樓董璋時建碑目云後唐武信軍軍衙記廣政間歐陽炯撰蓮花漏天聖中燕肅為守日置以候昏曉仍自為記也杜甫春日梓州登城樓詩行路難如此登樓望欲迷身無却少壯迹有但羈棲江水流城郭春風入鼓鞞雙雙新燕子依舊已銜泥孫樵梓潼移江記云涪繚于郪迫城如幡淫漲秋狂突堤蕩廬榮陽公始至則思所以洗民患乃鑿江東壖地别為新江東北注流使水道與城相逺百姓利賴之魏了翁潼川府新城銘云嘉定中永嘉曹君奉使按刑乃建治城隍且包牛峰移西溪為久逺之計矣通典云左帶涪水右挾中江水經涪水出廣漢涪縣西北南至小廣魏與梓潼水合注云小廣魏即廣漢縣地王莽更名曰廣信也經又云梓潼水出其縣北界西南入于涪又西南至小廣魏南入于墊江注云昔岑彭與臧宫伐公孫述從涪水而上即此亦謂之內水也鄭谷東蜀春晚詩如此浮生更别離可堪長慟送春歸潼江水上楊花雪剛逐孤舟繚繞飛方輿勝覽云城東三里有東山寺一名普惠寺寺有蘇公泉臨川門下瞰涪江志云隔江修阜如長城有蘇公泉暨石塔在焉杜甫陪章梓州王閬州蘇蓬州李果州四使君登惠義寺詩春日無人境虛空不住天鶯花隨世界樓閣倚山巔遲暮身何得登臨意惘然誰能解金印瀟灑共安禪魏了翁臨發潼上許侍郎奕提刑餞於東山賦詩留别云人生出處亦何常又到涪江江上鄉山色如逢故人語松聲仍作去年香紅裳大舶滿清鏡翠瀲白沙明夕陽未省此歡何日竟擬邀明月照昏黃李膺益州記云桃花溪在東三十里從涪城縣南流入涪水也本志云西郊有亭宋蒲規記以為蜀相髙平公所建杜甫有郪城西原送李判官兄武判官弟赴成都詩寰宇記云牛頭山在郪縣西南二里髙一里形似牛頭四面孤絶俯臨州郭上有長樂寺樓閣煙花為一方之勝槩方輿勝覽云郪江源出銅山縣赤岸溪繞牛頭山足入涪水亦謂之中江水也又云石谷溪源出當州杜山下亦繞牛頭而入中水九州要記云牛頭山葛仙翁多遊於此今立寺與白獸山相連秦時有白獸為害夷人射之因刻石於此山今遺像尚存圖經云牛頭山永福寺據其頂廣化寺據其岡羅漢院據其麓本志云永福寺梁武賜名長樂唐名靈瑞宋名永福也杜甫上牛頭寺詩青山意不盡滚滚上牛頭無復能拘礙真成浪出遊花濃春寺靜竹細野池幽何處啼鶯切移時獨未休李洞秋宿牛頭寺詩月去簷三尺川雲入寺樓靈山頓離衆列宿不多稠篆字焚初闕翻經誦若流窗間二江泠簾捲半空秋話散松梢别碁終竹節收靜增雙闕念髙並五翁遊鶴夢生紅日雲門鎖梓州望空工部眼搔亂廣文頭石室僧調馬銀河客問牛曉樓歸下界大地一浮漚柳公綽題牛頭寺云一出西城第二橋兩邉山木晚蕭蕭井花淨洗行人耳留聽溪聲入夜潮按靈瑞寺有浮圖隋開皇建王勃碑略云牛頭山者廣漢之名峰也圓裔幾乎數里直上逾乎百仞蒼岑隱嶙旁分玉砌之階碧洞逶迤下趣金陵之苑因危立戶跨險分榮又于山頂别立浮圖每至兩江春返四野晴初山川霽而風景涼林窗清而雲霧絶賞因時并筆為神驅有情君子誰為捨乎神僧傳云牛頭山半有洞人傳八百里與眉州通曾有避罪者匿其中後於青神中巖見之碑目云洞門寺一名天寧在牛頭山麓舊鐫洞門宇于嵓側本志云西五里三臺山下有魯交洞交讀書於此即宋仁宗手録其清夜吟者盧照鄰集云梓州城南池亭者長史張公聽訟之别所也觀其巖嶂回復州流灌注雲窗綺閣負繡堞之逶迤澗戶山樓帶金隍之繚繞信巴蜀之奇觀矣圓潭寫鏡光浮落日之津雜樹開帷彩綴飛煙之路藤蘿杳靄挂疏陰以送秋鳬鴈參差結流音而將夕百年之歡不再千里之會何常下客悽惶暫停歸轡髙人賞玩豈輟斯文咸請賦詩六韻成章云爾照鄰得池字詩曰二條開勝迹大隱叶沖規亭閣分危岫樓臺繞曲池長薄秋煙起飛梁古蔓垂水鳥翻荷葉山蟲咬桂枝遊人惜將晚公子愛忘疲願得回三舍琴樽長若斯杜甫宴章梓州水亭詩云城晚通雲霧亭深到芰荷吏人橋外少秋水席邊多近屬淮王至髙門薊子過荆州愛山簡吾醉亦長歌勝覽云兜率寺在南山一名長壽亦隋開皇建即東坡詩所稱牛頭與兜率雲木蔚堆壠也林泉紏合之勢山川表裏之形抽紫巖而四絶疊丹峰而萬變連溪拒壑所以控引太虛蒸雲駕雨所以蕩泄元氣此見諸王勃本寺浮圖碑矣杜甫上兜率寺詩云兜率知名寺真如會法堂江山有巴蜀棟宇自齊梁庾信哀雖久何顒好不忘白牛車逺近且欲上慈航文同題兜率寺云簿領迷人喜暫間聊尋古寺陟孤巒柏藏一徑中間窄雲斂千峰四面寬逺目已將飛鳥過寸心更乞老僧安若為借得禪房宿卧看龕燈一點殘寺內有文冢銘云文塜者長沙劉蛻復愚為文不忍棄其草聚而封之也蛻愚而不鋭於百工之技天不工蛻也而獨文蛻焉故飲食不忘於文晦冥不忘于文悲戚怨憤疾病嬉遊羣居行役未嘗不以文之為懷也適當無事而天下將以文為貴號文明代生植明晦皆效文用故日月星辰文乎旗常魚蟲鳥獸文乎彛器徐方之土文於侯社夏翟之羽文於旗旄登龍於章升玉於藻百工婦人雕礱染練以供宗廟祭祀之用豈獨蛻也生知效用不及時文哉然而意嘗獲助於天不獲助於人故其窮雖窮無憾也當勤意之時不敢嚏不敢咳不敢唾不敢跂倚嗜欲躁競忘之於心其祗祗畏畏如臨上帝故有粲如星光如貝氣如蛟宫之水又有黯如屯雲如久陰如枯腐熬燥之色則有如春陽如華川逶逶迤迤則有如運海如震怒動蕩怪異夫十為文不得十如意少如意則豈非天助乎常欲使天下聞之而必行勸之而必蹈散之茫洋以為道演之浸潤以及物然後為農文之使風雨以時兵文之使戎虜以順文於野文於市使得其所幽隱之士以出口者使之言材者使之用然而自振者無力終知者甚稀豈非不獲於人助乎嗚呼十五年矣實得一千一百八十紙有塗者乙者有注楷者有覆背者有珠墨圍者於是以周易筮之遇復之同人筮者曰鳴於地中殷殷隆隆七日不復復來其天下昭融乎它日更召龜而令之將聽襲吉卜於火如秦兆惟曰不吉卜於水不成乎河洛兆則亦惟曰不吉卜於木而悶悶土叶吉纍纍為冢則汲之兆乎峭峭為壁則魯之兆乎且其占曰土之文為阿山為英華將不崩不竭為滋味而傳乎結為丘陵為其設險乎融為川瀆率其朝宗乎華為百榖以潔祭祀之粢盛乎不然使其速腐為墟壤生芻稿以食牛羊乎化為泥塗甄陶以作器乎將塊為五色而分封茅社乎流為樂為土鼓為木槎以泄其和聲乎夷為都邑以興宫廟坎為汙池以澤生植乎祀為壇竈乎窽為井墓乎吾皆不得而知也嘗既不得為吾用惟速化為百工之用慎母朽為芝菌以怪人自媚慎母堅為金鐵以作貨起爭慎母潏為釀泉以味乎諂口慎母禱為城社以狐鼠憑妖慎母聳為良材以雕斫傷性慎母萌為蘭茝以佩服見褻嗚呼介而為石使之服言舒而為蚓使之飲泉既而他年遊魂之未返者亦命巫以巾三招之號曰在几閣而來歸兮視不汝醜在口吻而來歸兮譽不汝久噫筆絶之年而麟見祟文其無含乎含非珠玉斂無裙襦後世詩禮之儒無驚吾之幽墟其塜也在莽蒼之野大塊之邱時大唐大中之丁卯而戊辰之季秋銘云文乎文乎有鬼神乎風水維貞將利其子孫乎按蛻字復愚唐懿宗朝為左拾遺上書言令狐綯之子滈不宜為言官貶山陽令後寓居潼川又北夢瑣言云劉蛻桐廬人早以文學進士其父嘗戒之曰任汝舉進取窮之與達不望於汝吾沒後慎勿祭祀乃乘扁舟以漁釣自娛竟不知其所適蛻後登華貫出典商於霜露之思於是乎止臨終亦戒其子如先考之命蜀禮部尚書纂即其息也常為同列言之益部談資云文冢庭前古柏數百株皆虬枝而龍幹矣通志云州南五里印臺山趾方而頂圓故名其右三四里有落馬崖昔有易玄子乘馬至此馬化為龍躍入江輿地紀勝云州南七里有鶴林寺杜詩牛頭望鶴林梯徑繞幽深春色浮山外天河宿殿陰傳燈無白日布地有黃金休作狂歌客回看不住心碑目云王勃庾信護聖寺碑在城北本寺內又云唐護聖寺鐘銘龍紀二年節度使顧彥暉鑄有銘又云護聖寺水陸淨土巖北有甘泉亭碑李潮八分書又云甘泉寺誓犀碑李雍書又云護聖寺彌勒崖佛頌唐大中年東川判官李商隱文髙僧傳云梓州城北有白門蘭若在長平山即北山也山長而平故名碑目云梓州官僚磨崖贊唐武后時司法參軍楊炯作在北崖字十六七磨滅不可讀炯又為北山惠義寺銘曰長平山兮建重閣上穹隆兮下磅礴紛被麗兮駢交錯儼靈相兮沖寂寞誰所為兮天匠作杜甫惠義寺送王少尹赴成都分得峰字詩云苒苒谷中寺娟娟林表峰闌干上處逺結構坐來重騎馬行春徑衣冠起晚鐘雲門春寂寂此别惜相從射洪縣李膺益州記云婁僂灘東六里有射江土人語訛以江為洪後周從俗因改射洪矣注水經云涪江水又東南合射江志云縣東十五里射江源自劍州歷梓至獨坐山下與涪江合流也楊用修雜字韻寶云谼大壑也俗省作洪川中之射洪徐州之吕梁洪義皆取此其言不知何據然按寰宇記云萬頃澤田在通泉縣東北二十二里澤內方萬頃則亦與大壑之義近矣通泉今併當縣陳子昻故宅在東武山下本集云子昻四世祖陳方慶好道隱於此有唐朝道觀址而真諦寺在其左有暉上人者子昻與之往還本集酬暉上人夏日林泉詩云聞道白雲居窈窕青蓮宇嵒泉流雜樹石室千年古林卧對軒窗山陰滿庭户方釋塵勞事從君襲蘭杜又酬暉上人秋夜山亭有贈詩云皎皎白林秋微微翠山靜禪居感物變獨坐開軒屏風泉夜聲絶月露宵光冷多謝忘懷人塵憂未能整又酬暉上人獨坐山亭有贈詩云鐘梵經行罷香牀坐入禪巖庭交雜樹石瀨瀉鳴泉水月心方寂雲霞思獨玄寧知人世裏疲病苦攀緣又暉上人房餞齊少府使入京府序云永淳二年四月孟夏東海齊子宦于此州雖黃綬位輕而青雲器重故能委邦君而坐嘯屈刺史而知名屬乎鑾駕巡方諸侯納貢將欲對揚天子命我行人執玉帛而當朝擁驂駢而戒道指途河渭發引岷嵎粵以丙丁之日次於暉公别舍蓋言離也爾其巖泉列坐竹樹交筵吐青藹於軒窗栖白雲於左右參差池榭亂山水之清陰繚繞階庭雜峰崖之異勢入禪林而避暑肅風景於中庭開水殿而追涼徹氛埃於戶外瑤琴合奏翠斚時行談窈窕於天人極留連於晷刻既而歡樂極良晨征攀白日而不回唱浮雲而告别山光黯黯凝緑樹之將曛嵐氣沉沉結蒼雲而遂晚雖同交未阻風月可留岐路方乖關山咸恨嗟乎朝廷子入期富貴於崇朝林嶺吾棲學神仙而未畢青霞路絶朱紱途遙言此會之何時願相逢而誰代永懷千古豈知仁者之交凡我三人盍崇不朽之迹斯文未喪題之此山同疏六韻云爾碑目云陳拾遺故宅有趙彥昭郭元振題壁杜甫過陳拾遺故宅詩云拾遺平昔居大屋尚修椽悠揚荒山日慘淡故園煙位下曷足傷所貴者聖賢有才繼騷雅哲匠不比肩公生揚馬後名與日月懸同遊英俊人多秉輔佐權彥昭超玉價郭振起通泉到今素壁滑灑翰銀鉤連盛事會一時此堂豈千年終古立忠義感遇有遺編圖經載陳拾遺建德碑大厯六年趙儋代梓州鮮于刺史作豫過縣之東門闤闠中榜曰唐拾遺陳公宗祠想必其後遷徙入城者子昻讀書在金華山志云上拂霄漢下瞰涪江有玉京觀在本山上方輿云東晉陳勳學道山中白日仙去梁天監中建觀有唐明皇所鑄老君像陳拾遺祠中有盧藏用祭文陸魯望云枝峰蔓壑秀氣磅礴不啻神仙登臨也觀至有宋治平二年賜號玉京延祐元年道士陳若海重修二年歲次乙卯九月丙午朔重九日甲寅前渠州學正杜文炳記本集春日登金華觀詩云白玉仙臺古丹邱别望遙山川亂雲日樓榭入煙霄鶴舞千年樹虹飛百尺橋還疑赤松子天路坐相邀杜甫冬到金華山觀因得故拾遺陳公學堂遺迹云涪右泉山內金華紫崔嵬上有蔚藍天垂光抱瓊臺繫舟接絶壁杖策窮瀠洄四顧俯層巔淡然川谷開雲嶺日色死霜鴻有餘哀焚香玉女跪露裏仙人來陳公讀書堂石柱仄青苔悲風為我起激烈傷雄材盧藏用贊曰岷山導江回薄萬里浩瀚鴻溶東注滄海靈光氛氲上薄紫雲其瑰寶所育則生異人於戲才可兼濟屈而不伸行通神明困於庸豎子曰道之將喪也命矣夫其相近者為黃溪志云在縣北一里即黃初平叱石成羊處為上方寺志云北關外唐有釋氏文公知名杜甫贈之詩云野寺隱喬木山僧髙下居俯視萬家邑煙塵對階除吾師雨花外不下十年餘長者自布金禪龕只晏如為石鏡寺志云在縣北二里金華山之側盧照鄰詩古墓芙蓉塔神銘松柏煙鸞沉仙鏡底花沒梵輪前銖衣千古佛寶月兩重圓隱隱香塵夜鐘聲徹九天按寺宋淳熙間復建至今成化三年僧繼圓于草莽中得古碑字漫滅不可考惟存一詩云昔日朱輪守經過野寺家柱間留墨迹泉下隔年華雲去空雕檻風來捲碧沙江山雖似畫每到動吁嗟繼圓因遺址重修其稍逺者益部談資云射洪北三十里山巖回合梯磴逶迤谷口石刻風磴雲門四字乃唐何將軍山林也杜少陵與鄭廣文同逰處矣少陵早發射洪縣南詩寒日出霧遲清江轉山急蓋指通泉路也子昻之墓在獨坐山寰宇記云山在縣東南二十五里周回一里髙一百丈卓然孤峻南枕涪梓二水志云此山似人巍然獨坐故名在縣南十五里盧藏用題曰道喪千載而得陳君子昻郭廷謂詩魂逐東流水墳依獨坐山按此山東北有公成山唐時梓潼官吏掘得石龕龕中有尊像一真人六獅子昆侖各二于時王維為留司表賀略云是聖祖見於萬春鄉語絳都人而指其處也周流六虛言於晉而驗於蜀混成一氣出於有而入於無未達齋心初迷三里之霧既符真氣俄成五色之雲山腹洞開仙容儼若萬物今覩千劫未逢矣其近者為懸巖山寰宇記云在縣南一十五里逺望懸崖皎如白雪舊名白崖山天寶三年勑改梓州志白崖即玉屏山下有陸使君祠使君諱弼梁代謫瀘州刺史卒於官櫬過射洪之玉屏山而舟覆瀘人哀之為立廟於此土人呼曰白崖廟宋世賜號顯惠梁書有傳即陸放翁所云以杜詩為籖譜往往有驗者詳見詩話中為龍門洞志云在卧龍山右里許宋艮菴先生隱處紫岩張公嘗訪之大書龍門二字左有紫岩叟圖書又其下題云淳熙戊申仲冬十三日秦國張煜自翠麓縱步艮菴龍門獲覩先公大師魏國忠獻遺迹江山增重矣煜敬拂塵不勝感慨為全真觀志云縣南二十五里全真觀有古柏形如卧龍又名木龍觀逺之為乾明寺志云治南五十里唐貞觀間僧慧悟開山宋熙寧中僧居信建王安石贈以詩云如今别我去成都始覺吾師道更殊坐看空中雲與鴈五湖明月一輪孤寺中有御書閣其下為堂庭可容百人柱皆連抱兩山盤礴檜柏森然此知軍州事陳鵬所記矣已上是通泉西界髙僧傳云通泉縣西山有大佛像髙百三十尺兩邊泉流唐貞觀慧震所鐫也有歸雲洞志云在縣南五十里洞深四丈五尺廣八尺餘其髙如廣之度中有石榻二石龕二茶竈石棊局各一宋岑象求先生讀書處按象求通志稱中江人第進士官至侍講出將指使入侍經筵存心制行為士所矜式也又逺之百里則沉水出焉為昔通泉縣治矣黃滸名川大浸名寺皆取流泉交注之義也寰宇記云沉水在通泉縣北即漢臧宫破公孫述將延岑處又云通泉山在縣西北二十里東臨涪江絶壁二百餘丈水從山頂湧出下注涪江湧泉郡故城在此老杜通泉驛詩驛樓衰柳側縣郭輕煙畔一川何綺麗盡日窮壯觀楊天惠連鰲閣記通泉為梓名邑江山秀潤土田平夷蓋俱詠歎其美也碑目云晉雲南太守假宗仲德政碑在通泉縣碑在墓下又云唐薛稷書慧普寺三字方徑三尺筆畫雄徑在通泉壽聖寺聚古堂按慧普寺梁大同中建初造彌勒下生一座相好端足唐貞觀年放光戶牖皆明燭人稱異焉王勃頌曰長江舊域廣漢遺區川分潼峽塞接岷渝閭閻四會亭障咸紓爰開寶地實控名都霞牆百雉雲甍四注紫闕尋煙頳樓結霧波流虹起雷奔蠖步網罩星鶉璫栖月兔靈機藻綷禪室安間雕金範玉舉翠浮丹神功不夜虛室長寒光超有色貺出無端清露花徑飛泉葉戶澗緑苔秋山蒼樹古茫茫庶類巍巍淨土鶖鷺同歸華夷共聚第一義諦寥廓法門迹離生滅思舉乾坤情迷則復道在為尊唯名與器萬古長存張彥逺名畫記云薛稷畫鶴在通泉縣署屋壁後老杜詩薛公十一鶴皆寫青田真即此處也唐詩紀事郭元振神龍間尉通泉任俠使氣不事小節武后召欲詰問既與語奇之索所為文章上寶劍篇后覽之嘉歎杜甫過代公宅詩豪傑初未遇其迹或脫略代公尉通泉放意何自若及夫登衮冕直氣森帷薄磊落見異人豈伊常情度我行得遺迹池館皆疏鑿髙詠寶劍篇神交付冥漠志云郭代公墓在通泉縣東按普惠寺小園有代公姬薛氏殯地陳子昻為志銘矣豫觀李知幾義冢偈信達者之言也併録之偈云佛子初出母胎時云何便有人我相布施慳貪分兩種是義不義相對治恩怨一墮於有情親愛路人生異見我今施汝大屋宅與汝普懴諸有情同丹胡越遇黑風忽然得此大洲島熙熙于于相勞問語笑相接如一家佛子便當具正見此本無情而相聚不作思惟能相忘此義廣大無情故彈指贊歎諸佛子願如流水大池魚同日上生忉利天受諸天子大快樂長者亦以無情施是故不名為義者淳熙二年九月己卯朔朝散郎前成都府路轉運判官李石撰右方舟先生所述射洪雍氏義冢記邑士髙君喻持以相示乃為記曰骨肉斃於下陰為野土其氣發揚於上為昭明此神之著也夫生於土歸於土雖物理之常要其死而不忘者其神存也若専𡨕漠之中輪轉且久一旦得塊土掩骼所托何厚若猶有知而不昧歸趣吾將以觀其復而為生生化化之候淳熙丙申甲寅迪功郎潼川府射洪縣主簿管學事韓南杞謹跋蜀中廣記卷二十九
