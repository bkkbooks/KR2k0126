body:
  text: 蜀中廣記卷七十明曹學佺撰方物記第十二樂器南齊書建元中涪陵郡蛋民田健所住巖間常留雲氣有聲響徹若龍吟求之積嵗莫有見者其年四月黑夜岩中忽見雙光起至明掘之獲古鐘一枚及錞于一面至永明元年十一月寧蜀廣漢縣人墾地又獲古鐘一枚高三尺八寸圍四尺七寸懸柄長一尺二寸合高五尺四面各九乳雲笈七籖渝州南平縣道昌觀有古鐘作二獅子對立捧花座蛟螭為鼻蛟尾分繞獅之足盤於鐘上鐘形再殺三成如盩厔古鐘之狀於其殺處作細花文五條當中一條黃色明淨纍纍若珠貫焉次珠條外作花片之狀屈曲相營又外一重雲葉纒繞殆非人工此外周身有花不可細記云是湘東王貽陶隱居物夔府志云昔人掘地得一鐘形如戽斗匾而長一面凸為十八乳一陰一陽總為九乳古詩春鐘九乳鳴疑此鐘應春宫律也一面古篆七十餘字人不能識惟夔字可辨水經注云夔鄉觀此可信閬州譙樓上鐘是唐開元間物徙自巴州者營山縣開元寺鐘重千五百斤上鑄開元九年字兵燹時沉潭中每隱隱見于重淵之下元豐中忽如雷震聲躍出砂磧上得之巴州舊恩陽縣治右廣福觀銅鐘上有景龍庚戌四字俱見本志七籖云施州清江郡開元觀有鐘麟鼻而系於簴狀若懸匏扣之清越聞於數里不知何代物先是有郡民牧牛城南田間忽聞異聲自地中發驚走辟易其後民病夢一青襦丈夫曰遷我于開元觀民不悟它日到田間聞其聲如前以白于守守封君以為不急叱去之是夕又夢青襦者曰吾委迹于地下有年矣汝不速出必有大咎覺而懼與其子偕往鑿地丈餘得之色青如所夢因再白守置于開元觀是日辰時不擊自鳴震響極逺守以其事聞詔編於國史復命宰臣李林甫頒其奏以示天下今建始縣地也靈驗記青城山宗玄觀古銅鐘三千餘斤隱花文飛仙幢節之狀工甚精好劉闢據成都取管內銅像大鐘鑄兵器及錢此鐘在焉挽拽下山以巨石捶擊終不能損至江干拽以竹筏力敵萬斤不動縣申狀闢異之令還故處只須二三人牽上若一二百斤然青城志縣之聖塔寺相傳有仙塔飛來寺之古鐘朔望有聲隱隱若自鳴以為至人所鑄成都方輿天慶觀在城北有唐元和銅鐘千斤溫江縣太平觀有任尊師者日於市中户乞一錢鑄鐘萬斤鐘成尊師年已八十餘作大齋表讃扣鐘數百下辭決而去即大厯年中也至劉潼僕射擁旄西川令觀寺鐘上皆鐫陀羅尼呪忽見任歸領巧工於呪邊刻云觀家銅鐘不合刻佛呪别立誓詞數句人見其狀貌益少壯於當時云黔南人砌鹽井得古鐘長三四尺中細而實如腰鼓瓦腔之狀兩頭圓厚扣之皆有竒音與常鐘異在鹽井多年益加光膩無毁蝕處時起金色晶明異常節度使僖公留鎮府庫焉開州龍興觀鐘七八千斤無樓懸於殿上州有􅔯敓遺失諍訟不決之事沉滯抑屈之情焚香扣鐘立便分雪余頃駐泊觀中忽見官吏押領囚徒至鐘前焚香告誓援槌將擊之際有人抑止之更令取款如是數四不擊鐘而訟已得理矣問其故云纍有公案不決者擊此鐘旬日之內有誣罔寃抑于人必暴病死相傳雲安白鶴鐘亦然已上俱杜廣成所記成都文類魏了翁嘉定府延祥觀鐘銘曰二五之運徵為五聲周疏相濟混緩相成人於天地稟氣受形蓋與聲律一本而生故為大鏞以首八音夙夜聽之和平其心是謂天合匪石匪金樂廢禮壞聲謝器沈二氏之宫僅存於今制雖戾古所發亦深尚敬爾聰上帝汝臨漢書成帝綏和五年得古磬十六枚于河濱今犍為之玉磬池是其處即玉津縣也名曰漢水又曰寶磬洲彚雅云明堂位特懸者名離磬即大磬曰毊磬也毋句氏及伶倫所製則編磬也第編磬止十二枚以應十二律漢成帝時犍為水濱得石磬十六枚此乃後世工師傅會二少二變之説鄭康成亦從之誤矣寰宇記綿谷縣東山之北有燕子谷中産磬石方輿青石山在青石縣有祠甚嚴九州要記言天下青石無佳於此可以為鐘磬酉陽雜爼蜀軍將皇甫直别音律擊陶器能知時月好彈琵琶元和中常造一調乘涼臨水池彈之本黃鐘而聲入㽔賓因更絃再奏之聲猶㽔賓也甚惑之以為不祥隔日又奏於池上聲如故試彈於他處則黃鐘也直因切調㽔賓夜復彈於池上覺近岸波動有物激水如魚躍及下絃則沒矣直遂集客車水竭池窮泥索之數日泥下丈餘得鐵一片乃方響㽔賓鐵也陳祥道樂書什邡人段祖獲錞于獻益州刺史始興王蕭鑑高三尺六寸六分圍三尺四寸形圓如筒銅色如漆質甚薄上有銅馬以繩貫之令去地尺餘灌之以水又用器盛水於下以芒莖當心跪注錞于以手振芒則其聲清亮如雷良久乃絶按古以錞于節樂稱禮器也益部談資諸葛鼓乃銅鑄面廣一尺七寸高一尺八寸邊有四獸腰束下空旁有四耳花文甚細色澤如瓜皮重三十餘斤縣於水上用梄木槌擊之聲極圓潤乃孔明擒孟獲時所製昔伐九絲城得十餘面今在成都府庫中一名錞于鼓遊梁雜紀諸葛鼓其形圓上寬而中束下則敞口大約若今楂斗之倒置也面有四水獸四周有細花文其色不甚碧緑擊之彭彭聲如鼓云置于水擊之其聲更巨上南志銅鼓有剝蝕聲響者為上易牛千頭次者七八百頭遞有差等夷人藏至二三面者即得雄視一方父老云諸葛製以鎮蠻者鼓去則蠻運終理或然也戎州志銅鼓旁範八卦及四蟾蜍狀似覆盤懸而擊之下映以水其聲非鐘非鼓都掌夷所寶相傳為諸葛亮鑄者直數十鎰次者數鎰珙縣志銅鼓如筒高一尺腰有四耳以備懸上下絙以花鳥一面臨造間有四幕者面中花瓣十二以擊久蠡瓣多者為龍師所鑄直踰千金黔江志太宗雍熙元年黔南言溪洞夷獠每疾病輒擊銅鼓以祀神鬼乞釋其銅禁詔從之南部志舊新井縣銅鐸觀有一銅鐸乃晉譙縱舊物青神志大江東北石鼓寺下沙中昔人得石鼓一高三尺圍六尺許形制殆類岐鼓狀但無款識今在寺廡下寺以得名羯鼓録云代宗朝宰相杜鴻漸能羯鼓永泰中以副元帥節度西川前雙流丞李琬薦一削羯鼓杖者見且以二枝為獻鴻漸喜曰此杖當貯衣衾中積時者尤物也匠言於脊溝中養者十年矣公厚賞之而去及被召回至嘉陵驛頗有山水其夜月色又佳乃與從事楊炎輩登驛樓望江月觴宴命取羯鼓以所得杖酣打數曲四山猿鳥皆驚飛噭走從事悉異之公曰比於華嚴閣擊此初見羣羊牧於川下忽數頭躑躅不已及止鼓羊亦止復鼓之復然遂以疾徐高下節之羊無不應聲而舞旋有二犬走吠羣羊至近聞聲則仰首若有所聽少選宛頸搖尾亦從而變態是知百獸率舞之書固無難矣初李琬以調集至長安居務本里夜聞羯鼓曲頗工於月下步尋至一家門户極卑叩門入謂曰君所擊豈非耶婆娑雞乎而無尾何也其人驚異曰君知音耶某太常工人也祖傳此曲近因張儒入長安家人流散父沒河西今但按舊譜數本尋之竟無結尾故夜夜求之也琬曰曲下意盡乎工曰盡琬曰意盡即曲盡又何索焉工曰奈聲不盡何琬曰可與言矣夫曲有如此者惟以他曲解之方可盡其聲耶婆娑雞當用屈柘急遍解如柘枝用渾解甘州用吉了解之類也工如教鼓之果相協聲意皆盡感泣而謝即言於寺卿徵為主簿後纍官太常少卿宗正卿鹽鐵論曰貴人之家中山索女撫流徵於堂上鳴鼓巴渝交作於堂下杜氏通典曰巴渝舞曲有矛渝安臺弩渝行辭四篇其辭既古莫能曉其句度昔漢高作巴渝舞長沙王舞袖不回舉上問之對曰臣地狹不足以回轉韋臯鎮西川教奉聖樂曲將進之先令舞人曲譜到京於晉邸按閲教坊數人潛窺因得先進索賞又僖宗乾符中綿竹樂工王生有巨力每遇府中饗軍宴客先呈百戲王生腰背一船船中載十二人舞河傳一曲略無困乏教坊記曰僖宗幸蜀時戲中有劉真者善弄假婦人後乃隨駕還京籍于教坊弄婆羅談賔録云開元中中官白秀貞使蜀回得琵琶以獻其槽邏缺檀為之溫潤如玉光耀可鑒有金縷紅文影成雙鳯楊妃每抱此器奏於梨園音韻凄清飄如雲外而諸王貴主洎虢國已下號為貴妃琵琶弟子每受曲畢皆廣有進獻玄宗又令皇甫詢於益州製琵琶捍撥以太守蘇頲不奉詔乃停故寰宇記云益州舊貢琵琶捍撥也北夢瑣言僖宗末京師樂工有琵琶石潨者號石司馬尤為相國令狐綯見賞俾與諸子渙渢連水邊作名亂後入蜀不隸樂籍多遊諸大官家皆以賓客待之一日會軍校數員飲酒潨以胡琴擅場在坐非别音者喧譁語笑殊不傾聽潨乃撲檀槽而詬曰潨曽為中朝宰相供奉今日與健兒彈而不我聽何其苦哉于時識者歎訝之教坊記咸通中第一部有張小子忘其名彈弄箜篌冠于今古今在西蜀教坊雖有三十人能者一兩人而已白樂天夜聞箏彈瀟湘送神曲詩云縹眇巫山女歸來七八年殷勤湘水曲留在十三絃苦調吟還出深情咽不傳萬重雲水思今夜月明前西京雜記司馬相如作玉如意賦梁王悅之賜以緑綺之琴文木之几夫餘之珠琴銘曰桐梓合精其後擕緑綺遊臨卭以琴心挑卓女作為琴歌詞曰鳯兮鳯兮歸故鄉遨遊四海求其凰時未遇兮無所將何悟今夕升斯堂有豔淑女在閨房室邇人遐毒我腸何緣交頸為鴛鴦相頡頏兮共翺翔又曰鳯兮鳯兮從我栖得託孳尾永為妃交情通體心和諧中夜相從知者誰雙翼俱起翻高飛無感我思使余悲及唐張祐又為琴歌以和相如曰鳯兮鳯兮非無凰山重水濶不可量梧桐結陰在朝陽濯羽弱水鳴高翔梁簡文帝蜀國弦詩銅梁指斜谷劒道望中區通星上分野作固下為都雅歌因良守妙舞自巴渝陽城嬉樂盛劔騎鬱相趨五婦行難至百兩好遊娛牲祈望帝祀酒酹蜀侯誅江妃納重聘卓女愛將雛停弦時繫爪息吹治脣硃脫衫湔錦浪回扇避陽烏聞君握節返賤妾下城隅隋盧思道蜀國弦詩西蜀稱天府由來擅沃饒雲浮玉壘夕日映錦城朝南尋九折路東上七星橋琴心若易解令客豈難要嘉話録云蜀王楊秀常造千面琴散在人間志林云唐雷氏琴自開元至開成間世有人然其子孫漸志於利投世好而失家法故以最古者為佳非貴逺而賤近也豫家有一琴其中銘云開元十年造雅州靈關村雷家記八日合未曉八日合為何等語也廬山處士崔成老彈之以為絶倫云元豐六年十月初四日書教坊記貞元中成都雷生善斫琴至今尚有孫息不墜其業精妙天下無比也西溪叢語滕達道蓄雷威琴中題云石山孫枝樣剪伏羲將扶大隱永契神機徐浩書字類石經今歸居氏矣又云嘗見一琴中題云唐大厯三年仲夏十二日西蜀雷威於雜花亭合又云伊南田店篔簹谷隱士趙彥安獲一琴斷文竒古真蛇蚹也聲韻雄逺中題云霧中山三字人莫曉也後得蜀郡草堂間話中載云雷氏斷琴多在峩眉無為霧中三山方知為雷琴矣益部談資世傳雷威作琴不必皆桐遇大風雪之日酣飲著蓑笠獨往峩眉深松中聽其聲連延悠揚者伐之斫以為琴有愛重者以松雪名之故世稱雷威琴也唐桂府王推官出蜀匠雷氏金徽琴請薑宣彈小胡笳引時有為作歌者云雷氏金徽琴王君寶重輕千金三峽流中將得來明窗拂席幽匣開朱絃宛轉盤鳯足驟擊數聲風雨回哀笳慢指董家本薑宣得之妙思忖泛徽胡雁咽蕭蕭繞指轆轤圓衮衮吞恨含情乍輕激故國關山心厯厯潺湲疑是舞鸊鵜砉騞如聞發鳴鏑流宫變徵漸幽咽别寉欲飛猿欲絶秋霜滿樹葉辭風寒雛墜地烏啼血哀絃已罷春恨長恨長何如懷我鄉我鄉安在長城窟聞君虜奏心飄忽何時窄袖短貂裘胭脂山下彎明月岑參秋夕聽羅山人彈三峽流泉云皤皤岷山老抱琴鬢蒼然衫袖拂玉徽為彈三峽泉此曲彈未半高堂如空山石林何颼飀忽在窗户間繞指弄嗚咽青絲激潺湲演漾怨楚雲紆徐韻秋煙疑兼陽臺雨似雜巫山猿幽引鬼神聽靜令耳目便楚客腸欲斷湘妃淚斑斑誰裁青桐枝絙以朱絲絃能含古人曲遞與今人傳知音難再逢惜君方老年曲終月已落惆悵東齋眠李季蘭聽從叔彈三峽流泉歌云妾家本住巫山雲巫山流泉嘗自聞玉琴彈出轉寥敻直似當時夢裏聽三峽迢迢幾千里一時流入幽閨裏巨石崩崖指下生飛泉走浪絃中起初疑噴怒含雷風又似嗚咽流不通回湍曲瀨勢將盡時復滴􅅹平沙中憶昔阮公為此曲能令仲容聽不足一彈既罷還一彈願似流泉鎮相續李白聽蜀僧濬彈琴詩蜀僧抱緑綺西下峩眉峰為我一揮手如聽萬壑松客心洗流水餘音入霜鐘不覺碧山暮秋雲暗幾重李義山詠蜀桐絶句玉壘高桐拂玉繩上含非霧下含氷枉教紫鳯無棲處斫作秋琴彈廣陵孟浩然贈道士參寥詩蜀琴久不弄玉匣細塵生絲脆絃將斷金徽色尚榮知音徒自惜聾俗本相輕不遇鍾期聽誰知鸞鳯聲元微之黃草峽聽柔之琴詩胡笳夜奏塞聲寒是我鄉音聽漸難料得小來辛苦學又應知向峽中彈又别鶴凄清覺露寒離聲漸咽命雛難憐君伴我涪州宿猶有心情徹夜彈宋王素聽運使閲道殿院撫琴詩中臺御史誰得名卓然閲道持直聲首冠豸角身衣繡端想正色霜稜稜上書言事語激切表率百辟有典刑前年乞守桐廬去衆口稱屈嗟沉英朝家惜才久難滯東西兩漕來誇榮銅梁巨屏實都會邊禦蠻夷州養兵生齒繁盛版賦錯嵗餘百萬輸王庭賢哉閲道不聚斂抑暴損重咸使輕山園好茶甚比苑佳釀珍果豪相矜皇皇州縣交贈遺途路馳走常縱橫供須勞擾擔負苦罔恤民力無時停呵守責宰悉廢罷嚴於軍令威連營人士歡聲雜和氣晝夕遍覆全蜀城姦夫貪吏縮手腳一道震懾今澄清我與閲道略識面傾蓋若舊都忘形士之忠義共所守必能感格推至誠切磋博約日蒙益迭相遜避無已能閲道志節極徑挺表裏瑩徹冬壺氷舉族萍寓甬橋上騰裝單騎趨此行雷琴一張鶴一隻唯將二物娛幽情耽耽公屏大道左閴如隱者真禪扄聯鑣曉入淨衆寺煙雲收拾初開晴青松修竹緑陰合其間瀟灑誰構亭從容取琴撫數弄斂襟拱手斜耳聽數按慢舉别得法盡出意外皆研精曲名流水本宫調碧溜潄玉寒琤琤坐中五月汗似雨忽覺桐葉秋風生閲道學琴有高趣心惡鄭衛方鏗鈜惜茲南薰存舊譜千載之下猶分明欲禆吾君踵舜德追鑒古曲歸升平趙抃和王仲儀知府聽琴詩云洪惟至樂生太初一鼓萬類和以蘇咸章杳默不再得南風解愠歌有虞霈恩協氣塞天下推心置腹充肌膚四門悅豫比物化至今法度存諸書嗟哉道逺朴散漫遺音寂寞俄榛蕪文侯聽古唯恐卧仲尼嫉世倡優誅伯牙絶絃遂空默季札審樂徒嘻吁喧譁焦殺雜然起非音僻調衆耳娛夭絲促柱日誇尚正聲順氣誰持扶天心厭物窮且變澆醇欲判如秦吳本根直使鬼神護嶧陽茂育寒桐孤鳴泉怪石並左右敲風撼雪孫枝疏老雷一顧落斤斧絃朱軫玉徽珊瑚形模三尺韻鐘磬價高直恐連城無兹琴得傳數百載敝囊古匣藏吾廬擕之造次不暫捨兩川萬里隨單車自憐指下得古趣古人不見如合符不知誰人達公聽招琴曉出遊浮圖松筠颯灑塵壒絶羣喧屏息堂廡虛更張疾徐鼓流水清風瀝瀝生襟裾曲終四座悄無語賞音公獨勤咨諏公歸三嘆意未已大句落落投瓊珠遂令巾衍益氣焰況是黼繡增名譽愚今以琴比公治得之輿頌非敢誣公來西州未五月教條一出民歡呼善人得路惡失冗飢者稻粱寒袴襦竄排寇姦抑僥幸損削浮費清庖厨平刑決獄甚破竹以身率下如氷壺公政中和召協氣斯民樂易琴與俱報言坤維永安堵九重西顧何憂乎清獻又有月夜聽僧化宜彈琴詩云蜀國有良工孫枝斫古桐逢師寫流水為我益清風淡恐時心厭幽蘄靜耳聰坐來明月滿無語訟庭空鹽亭文與可有古琴以示眉山蘇軾軾為之銘曰攫之幽然如水赴谷醳之蕭然如葉脫木按之噫然應指而長言者似君置之枵然遺形而不言者似僕栁宗元謝李西川薦琴石詩逺師騶忌鼓鳴琴去和南風愜舜心從此他山千古重殷勤曽是奉徽音吕溫詠蜀客石琴枕云可憐他山石幾度負貞堅推遷強為用雕斫傷自然文含巴江浪色起青城煙更聞餘玉聲時入朱絲絃張祐聽李簡上人吹蘆管詩蜀國僧吹蘆一枝隴西遊客淚先垂至今留得新聲在却為中原人不知其二細蘆僧管夜沉沉越鳥巴猿寄恨吟吹到耳邊聲盡處一條絲斷碧雲心其三月落江城樹繞鴉一聲蘆管是天涯分明西國人來説赤佛堂西是漢家薛濤聽僧吹蘆管詩曉蟬嗚咽暮鶯愁言語殷勤十指頭罷閲梵書聊一弄散隨金磬泥清秋蜀中廣記卷七十
