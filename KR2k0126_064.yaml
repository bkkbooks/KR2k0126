body:
  text: 蜀中廣記卷六十四明曹學佺撰方物記第六食饌山海經曰西南黒水之間有都廣之野后稷葬焉爰有膏黍膏稷補註云蜀人種稷於深山中以釀郫筒酒間以作飯也揚雄益州箴曰有稉有稻自京徂畛民攸温飽其蜀都賦則云五榖馮戎瓜瓠饒多矣華陽國志曰綿竹縣劉焉初所治綿與雒各出稻稼畝收三十斛有至十五斛又曰江州縣北有稻田出御米賈逵曰梁香米也蜀本梁州出香米謂之竹根黄按穀名有榿木紅蔬名有老鶯菌者皆蜀中之佳號戎菽蜀人所謂胡豆也志云蜀人得種於羌戎故名又云即蚕豆多食傷腎而面黒黄山谷戎州荅李任道謝分豆粥詩云豆粥能驅晩瘴寒與公同味更同餐安知天上養賢鼎且作山中煮菜看益州方物略曰佛豆粒大而堅農夫不甚種唯圃中蒔之以鹽漬食小兒所嗜也贊曰豐粒茂苗豆别一類秋種春斂農不常蒔又云紅豆花白實若大紅豆葉如冬青蜀人以爲果飣贊曰葉圓以澤素蘤春敷子生莢間纍纍綴珠陸游云豌豆之不實者其葉名巢菜蜀以爲蔬廣志曰朱提有秬豆花紫苗似小豆可爲麫云巴志三峽兩厓土石不分之處皆種燕麥春夏之交黄遍山谷土民賴以充食蜀人言食燕麥後嚥水能令下泄一名油麥漂之可作麫宋皇祐初彭山縣上瑞麥圖仁宗曰朕嘗禁四方獻瑞今得西川麥秀圖可謂真瑞矣其賜田夫束帛以勸淳熙九年䕫州進士陳謙亨進瑞麥其穗二十六有三岐者太守閩中林栗圖而贊之曰淳熙天子御圖三七協氣所鍾嘉禾乃出巴䕫之山亘連阡陌或兩其岐或六其脊惟是西門近郊所植六六同穎函三爲一兹誠剏見圖寫漏逸乃知人爲不逮天力上方寅畏擯華務實臣不敢獻私志於室采詩之官汗青之筆編諸詩書示此其質范成大東郊觀麥苗詩去歲秋霖麥下遲臘殘一雪潤無泥相將飽喫滹沱飰來聽林間快活啼揚雄蜀都賦有芍藥之羮甘馥之和方輿勝覽廣安軍有十似若所謂金羮玉飯非溢美也王隱晉書郪縣王長文字德叡州辟别駕佯狂不就乃微服竊出至成都市中蹲地囓胡餅白傅忠州寄胡餅與楊萬州詩胡麻餅様學京都麫脆油香新出爐寄與飢饞楊大使嘗看得似輔興無王蜀時有趙雄武者號趙大餅出典名郡爲一時富豪嚴潔奉身精於飲饌居常不使膳夫六局之中各有二婢執役當厨者十餘輩皆著窄袖鮮潔衣粧事一食邀一客必水陸俱備雖王侯之家不得相倣能造大餅每三年麫擀一所大如數間屋或大内宴聚或豪家有廣筵多於獨盛内獻一所裁割用之皆有餘矣雖懿親密分莫知擀造之法以此得名少陵詩西歴青羌坂南留白帝城於菟侵客恨粔籹作人情註云峽人以蜜煎餅謂之粔籹江南謂之膏環也山谷年譜紹聖三年五月弟知命攜一妾一子及山谷子相相之母將抵黔南山谷與書云初五日宿大浩初六日可來趂疊石早飯又云今日甚思汝輩同剥粽子也又有帖云昨仲牖過此盛稱亞室之秀慧纎濃合度笑語不可忘女紅尤妙公濟來又言作瓠羹極道地故奉麫一石作瓠羹也一􅛐按此帖在戎州見本志蜀都賦曰麫有桄榔寰宇記播州㽛町縣有桄榔木可以爲麫百姓資之宋新繁梅摰登成都普賢閣觀桄榔詩曰他年薄宦守西甌一瞬流光二十秋今見桄榔兩嘉樹恍如重到海邊遊太守王素和云聞説桄榔南海頭移來西蜀屢經秋自緣賦得詩情苦不覺攀條憶舊遊古記云大饑不饑蜀有蹲鴟史記蜀卓氏之先趙人秦破趙遷卓氏夫婦推輦而行曰吾聞岷山沃野下有蹲鴟乃求逺遷致之臨卭揚雄蜀都賦曰聞蹲鴟之沃野則以爲世濟陽九注云濟人飢也葉似蹲鴟華陽國志曰汶山郡都安縣有大芋如蹲鴟諺曰富何卒耕水窟貧何卒耕水窟言芋田能貧能富也顔氏家訓梁有權貴讀蜀都賦注解蹲鴟芋也以爲羊字後有餉羊肉者即答書云損惠蹲鴟舉朝驚駭不解事義寰宇記雲安有瓜疇芋區區以薯蕷疇以貫瓜皆伏草根也瓜疇芋區本於左賦方物略云蜀芋多種以赤鸇爲最俗號赤鸇頭形長而圓但子不繁衍又有蠻芋亦美其形圓而子蕃人多蒔之最下爲搏果芋搏接也言可接果山中人多食之本草有青紫白真蓮禪野六種惟野不堪食贊曰芋種不一赤鸇則貴民儲于田可用終歲范蜀公詩白巖霜重紅梨曉銀礫烟深紫芋秋按銀礫村名在犀浦出芋圓而佳與他産異東坡詩朝行犀浦催收芋是矣廣志曰蜀漢既繁芋民以爲資凡十四等君子芋大如斗魁又如杵草殻芋鋸子芋勞巨芋青浥芋此四等多子淡善芋魁大如瓶少子葉如繖蓋紺色紫莖長丈餘可作羮臛微澁得飲乃下蔓芋緣枝生大者次二三升鷄子芋色黄百果芋魁大子繁畝收百斛種一百畝以養彘早芋七月熟九面芋大而不美象空芋大而弱食易飢青芋素芋皆不可食揚雄蜀都賦五肉七菜勝飫腥臊故梁昭明啓曰呉愧千里之蓴蜀慚七菜之賦也劉賔客嘉話云諸葛所止令兵士種蔓菁取其纔出甲可生㗖也葉稍舒可煮食也久居隨以滋長也棄去不足惜也囘則易尋而採之也冬有根可斸食也比諸蔬屬其利不亦溥乎三蜀人今呼爲諸葛菜高力士感巫縣薺菜詩兩京作斤賣五溪無人採夷夏雖有殊氣味終不改本草益州有苦菜乃是苦即龍葵也寰宇記益州舊貢龍葵桐君藥錄曰苦菜三月生扶疎六月花從葉出莖直花黄八月實黒實落而根復生凌冬不枯方物略真珠菜戎瀘等州有之生水中石上翠縷纎蔓首如貫珠蜀人以蜜熬食之或以醯煮可行數千里不腐也贊曰植根水中端若串珠皿而瀹之可以代蔬本草蜀人謂薇爲巢菜蔓生莖葉氣味皆似豌豆其藿作蔬入羮皆宜東坡元脩菜詩序菜之美有吾鄉之巢故人元脩嗜之元脩云使孔北海見當復云吾家菜耶因謂之元脩菜余去鄉十五年思而不得見元脩適自蜀來見予於黄乃作詩使致其子種之東坡之下摠志巢菜葉似槐而小子如小豆夏時種以糞田其苗可食齊民要術云蜀芥蕓薹取其葉者皆七月半種地欲糞熟蜀芥一畝蕓薹一畝種法與蕪菁同既生亦不鋤之十月後足霜乃收取其子者則二三月好雨澤時種旱則畦種水澆五月熟而採之益州記云綿竹東武山有江池出白蓴冬夏帶絲肥美爲一州最地圖記云是諸葛亮池中物宋元嘉中刺史陸巖嘗取以獻高僧傳云綿州凈慧寺僧惠寛出家在寺其寺近池人多捕魚爲業寛與授戒且曰爾輩不當如此爲給吾能令汝所得不失於舊因指其池畔盡生菌蕈漁人採之省力得利與魚同後人因呼爲和尚蕈也蜀都賦樊以蒩圃蒩草名廣蒼云蕺者蒩也文選注云土茄覆地而生根可食蜀人謂之香蒩黄魯直謝楊履道送銀茄四首藜藿盤中生精神珍蔬長蔕色勝銀朝來鹽醯飽滋味已覺瓜瓠漫輪囷又君家水茄白銀色殊勝壩裏紫彭亨蜀人生疎不下箸吾與北人俱眼明又白金作顆非椎成中有萬粟嚼輕冰戎州夏畦少蔬供感君來飯在家僧又畦丁收盡埀露實葉底猶藏十二三待得銀包已成穀更當乞種過江南天社任淵註云椎成漢劒名蓋借用耳茄之老者其子堅黒如穀漢犍爲郡不狼山出鄨水入沅有野生薜可食按司馬相如傳薜莎註云薜藾蒿也水草名瑯嬛記云猿啼之地蕨乃多有每一聲遽生萬莖今峽人以爲粉用作餅飥東坡送蜀僧去塵詩拄杖挂經須倍道故鄉春蕨已闌干丹鉛錄云黄山谷有蕨牙初長小兒拳以爲竒句然太白詩已有不知行徑下初拳幾枝蕨之句矣廣志曰蜀地温食瓜至冬熟有秋泉瓜秋種亦冬熟齊民要術云取白米一斗䥶中熬之以作糜下鹽使鹹淡適口調其寒熱拭瓜以投其中蜜塗甕此蜀人方美好陸機瓜賦云桂髓起于巫山矣寰宇記巂州有斯難樹生子如瓜味酸可生食别錄曰五木耳生犍爲山谷六月多雨時采即暴乾山海經曰崍山其草多薤韭酉陽志云邑梅長官司南八里韭山昔有遺韭種于山頂長丈餘四時茁茂夷人刈食之何少卿子應詩梁山薤黄妙天下玉筯金釵盈大把其色鮮黄味美脆巴南山川記有石蒜石葱馬湖志元時馬湖蠻貢獨本葱吕氏春秋曰和之美者蜀郡楊樸之薑註云楊樸地名梁山志治北十五里高梁山壤黄而腴其人業樹薑衣食取給焉漢書武帝使唐䝉諷曉南越食蒙以蒟醤謂從西北䍧牱江來故曰感蒟醤竹杖則開䍧牱越巂也正義曰蒟似榖葉如桑以葉作醤酸美顔師古曰亦名浮留似蓽撥嶺南取葉和㯽榔食之嵇含南方草木狀云蒟醤蓽茇也大而紫曰蓽茇小而青曰蒟可以調食故曰醤丹鉛錄云今永昌人猶以蓽茇爲豉方物略蒟出渝瀘茂威等州葉如王瓜厚而澤實若桑椹緣木蔓生子熟時外黒中白長三四寸以蜜藏而食之辛香能温五藏或用作醤善和食味贊曰蔓附本生實若椹纍或曰浮留南人謂之和以爲醬五味告宜按蜀記曰扶留木根大如箸又似栁根有蛤名古賁生水中燒以爲灰曰牡蠣粉先以㯽榔著口中又取扶留藤一寸古賁灰少許同嚼除胸中惡氣韻府蒟葉如桑子如甚玩之近是但今人不解爲醬而以爲麯寰宇記有蒟醤山在故都濡縣今之彭水也常璩巴志云蔓有辛蒟園有芳蒻蜀都賦其圃則有蒟蒻茱萸註云蒻草也其根名蒻頭大者如斗其肌正白以灰汁煮則凝以苦酒淹食之蜀人是珍本草蒟蒻出蜀中施州亦有之呼為鬼頭益州記云蜀人以冬月取蒻莖舂碎炙之水淋一宿為葅禮記註藙音藙煎茱萸也爾雅謂之榝色八切廣雅榝欓越椒茱萸也一名藙根東南行者勝子至九月九日氣烈而熟故俗至是日折以辟惡氣又有名食茱萸者其本髙大至百尺餘枝莖青黄上有小白㸃葉類油麻花黄蜀人呼其實爲艾子即藙音之訛也戎州志土人以艾子爲油樹高數丈子如茱萸糜之而取其汁烹蔬筍味辛香方物略艾子實正綠味辛蜀人每進羮臛以一二粒投之少選香滿盂醆或曰作爲膏尤良按揚雄蜀都賦作藙藙艾同音云贊曰綠實若萸味辛香苾投粒羮臛椒桂之匹本草卭州有醋林子類櫻桃而蔕短其葉味酸采得入鹽和魚鱠食云勝用醋也廣志曰蜀名梅爲䕩大如雁子梅䕩皆可以爲油黄梅以熟䕩作之䕩音老按周禮饋食之籩其食乾䕩食經曰蜀中藏梅法取梅極大者剥皮隂乾勿令得風經二宿去鹽汁内蜜中月許更易蜜經年如新也任淵云眉之野人或食虴蜢史應之嘗爲童子師落魄無檢喜作鄙語人以屠儈目之山谷先生至眉以詩戲之云先生早擅屠龍學袖有新硎不試刀歲晩亦無鷄可割庖蛙煼蜢薦松醪一本煼蜢作煎鱔前輩詩來朝爲送先生飯一夜沿溪捉鱔魚蓋以館師及屠儈爲嘲耳魏略云新城孟太守道蜀猪豚鷄鶩味皆淡故蜀人作食喜煮飴蜜以助味太守孟達也陸游云某族伯父彦逺言少時識仲殊長老東坡爲作安州老人食原闕食皆蜜也豆腐麫觔牛乳之類皆用蜜漬客多不能下筯惟東坡亦酷嗜蜜能與之共飽劉孝儀謝東宫賚橘啓亦云豈如蜀食待飴蜜而成甜也蜀都賦云蜜房郁毓被其阜山圖采而得道華陽國志宕渠縣有石蜜宿山圖所采也本草石蜜出益州及西戎煉砂餹爲之成餅塊有黄白色寰宇記茂集達三州産蜜資州産甘蔗容齋隨筆云糖霜之名唐以前無所見自古食蔗者始爲蔗漿宋玉招魂所謂胹鼈炰羔有柘漿是也其後爲蔗餳孫亮使黄門就中藏吏取交州獻甘蔗餳是也後又爲石蜜南中八郡志曰笮甘蔗汁曝成飴謂之石蜜本草亦云煉糖和乳爲石蜜是也後又爲蔗酒唐赤土國用甘蔗作酒雜以紫瓜根是也唐太宗遣使至摩揭陁國取熬糖法即詔揚州上諸蔗榨瀋如其劑色味愈於西域逺甚然只是今之沙糖蔗之技盡於此不言作霜然則糖霜非古也歴世詩人模竒寫異亦無一章一句言之唯東坡過金山寺作詩送遂寜僧圓寳云涪江與中冷共此一味水冰盤薦琥珀何似糖霜美黄魯直在戎州作頌答梓州雍熙長老寄糖霜云逺寄蔗霜知有味勝於崔子水晶鹽正宗掃地從誰説我舌猶能及鼻尖則遂寧糖霜見於文字者實始二公甘蔗所在皆植獨福唐四明番禺廣漢遂寧有糖冰而遂寧爲冠四郡所産甚微而顆碎色淺味薄纔比遂之最下者亦皆起於近世唐大厯中有鄒和尚者始來小溪之繖山教民黄氏以造霜之法繖山在縣北二十里山前後有蔗田者十之四糖霜户十之三蔗有四色曰杜蔗曰西蔗曰艻蔗本草荻蔗也曰紅蔗本草崑崙蔗也紅蔗止堪生噉艻蔗可作沙糖西蔗亦可作霜色淺土人不甚貴杜蔗紫嫩味極厚專用作霜凡蔗最困地力今年爲蔗田者明年改種五穀以息之霜户器用曰蔗削曰蔗鎌曰蔗凳曰蔗碾曰榨斗曰榨牀曰漆甕各有制度凡霜一甕中品色亦自不同堆疊如假山者爲上團枝次之甕鑑次之小顆塊次之沙脚爲下紫爲上深琥珀次之淺黄又次之淺白爲下宣和初王黼創應奉司遂寧常貢外歲别進數千斤是時所産益竒牆壁或方寸應奉司罷乃不再見當時因之大擾敗本業者居半久而未復遂寧王灼作糖霜譜七篇且載其説予采取之以廣聞見按遂寧志唐有鄒和尚者乘白驢來寓遂寧傘子山山之民素以種蔗凝糖爲業驢常食其蔗民苦之告于師師曰汝知蔗之爲糖而不知糖之爲霜也因教以爲糖霜世稱絶品藥石司馬相如凡將篇有烏喙桔梗芫華欵冬貝母木蘗蔞芩草芍藥桂漏蘆蜚亷雚菌荈託白歛白芷菖蒲芒硝莞椒茱萸譙周巴蜀異物志文章草贊曰文章作酒能成其味以金買草不言其貴北堂書鈔云異物志楊孚作未詳按文章草即今五加皮也本草惟蜀産者佳一名白棘顛一名文章草陶隱居云釀酒益人東華真人煮石經云舜登蒼梧之山曰厥金玉之香草朕庸偃息正道此也又名金鹽母王屋山人王常曰欲得長久何不食石蓄金鹽母諺曰若得一把五加不用金珠滿車今蜀人呼爲白茨葉蜀都賦蘼蕪布濩於中阿本草芎藭出蜀中者爲川芎宋祁方物略曰芎蜀中處處有之葉名蘼蕪楚辭所謂江蘺也其根爲芎似雀腦者善成都九日藥市芎與大黄如積香溢于廛或言其大若胡桃者不佳人多蒔於園檻葉落時可用作羮蜀少寒莖葉不萎今醫家最貴川芎川大黄云贊曰柔葉美根冬不隕零采而掇之可糝于羮蜀都賦云或蕃丹椒注曰岷山多藥草椒尤好異于天下寰宇記黎州産紅椒即丹椒也入貢本草茂州椒其殻一開一合爲佳即岷山界又云蜀椒生於巴郡八月采實隂乾范子計然曰蜀椒出武都山赤色者佳爾雅檓木椒按叢生實大者爲檓樹如茱萸有刺葉堅而滑澤蜀人作茶皆合煮其葉以爲香寰宇記巴豆嘉眉戎皆有之眉州入貢本草云樹高一二丈葉如櫻桃而厚初生色青後漸黄赤四月舊葉落盡新葉生齊花成穗色微黄五六月結實作房至八月熟類白豆䓻漸漸自落乃收之一房二瓣一子或三子子有殻戎州出者殻上有縱文隱起如線一道或兩三道土人呼爲金線巴豆雷公云使巴與豆及剛子須詳認誤則殺人巴顆小緊實色黄豆則顆有三稜色黒剛子顆小似棗核兩頭尖則巴與豆又二物也又蜀都賦有巴菽巴㦸廣雅曰巴菽即巴豆巴㦸者巴㦸天也寰宇記果劒巴䕫忠皆産劒州者貢志云龍州宣撫司南十里藥叢山上産巴㦸本草羌活出蜀漢者佳春生苗葉如麻六月開花作叢結實時葉黄者是夾石中生葉青者是土脉中生寰宇記翼保威榮威悉當松諸州皆産宋史載威州者貢志云威茂之間有羌活山昔用兵時於此放羌戎數百其後山谷中産皆因以爲名蜀漆者常山之苗裔本草常山生益州山谷二八月采其根隂乾用寰宇記渠縣産常山本草附子生犍爲山谷及廣漢冬月采春采則爲烏頭寰宇記梓州舊進兩熟烏頭能改亝漫錄載綿州十子附子是其一也方物略云附子生彰明縣有重及一兩者花色紫本草言附子無正種附烏頭而生然則與烏頭天雄共一物耳陶𢎞景以天雄烏頭附子皆出建平謂之三建唐人非之以綿龍二州所生爲良今則彰明者佳贊曰附堇而生翠莖紫㽔生蜀者良三建則非寰宇記龍安縣松嶺闗之東四十里有山出附子因名附子山附子水出焉又云龍州産附子宋史政州者貢即龍州也本草金櫻子蜀人熬作膏入酒補治有殊効又云續隨子蜀郡處處有之苗如天㦸一名百兩金寰宇記陵州今貢續遂子以端午采者佳又云巂州出五味子汶山縣東十八里有五味山以藥名也開州志唐貢車前子張籍答韋開州詩云開州五月車前子作藥人皆道有神慚愧使君憐病眼三千餘里寄閒人蘇文忠集青城山老人村有見五世孫者道極險逺生不識鹽醯而溪中多枸杞根如龍蛇飲其水故壽近歲道稍通漸能致五味而壽亦益衰本草藥子蜀中多有之忠萬者勝寰宇記巴渝集達皆産或稱黄藥或白藥或苦藥或木藥不同按大厯中黎榦爲京尹奏忠州有苦藥子性寒解一切熱毒撰方以進於是爲常貢焉文獻通考合州巴川郡唐時貢藥子二百顆永貞二年皆停宋史萬合二州梁山縣仙井監皆貢藥子蜀都賦風連延蔓於蘭臯註云風連出岷山及廣都漢末李當之本草黄連惟取蜀郡黄肥而堅者爲良寰宇記榮雅渠忠利五州皆産宋子京云大黄蜀山多有之苗根長盈二尺予在藥市所見大者形似牛舌而𦂳緻有紫地錦文可治爲枕唐人以爲産蜀者佳贊曰葉大莖赤根若巨皿治疾則多方家所詺寰宇記果瀘恭當拓五州皆産蜀本草圖經黄蘗樹高數丈葉似呉茱萸又如紫椿經冬不凋皮外白裏深黄色其根結塊如茯苓出䕫合州山谷中益州張詠進豨薟丸表云切以餐石飲水可作充腸之饌餌松含栢亦成救病之功是以療飢者不在於珍羞愈病者何煩於異術不恥管窺輒干天聽臣因換龍興觀掘得一碑上刻修養術并藥方二件依方訪問采覔其草金稜銀線素莖紫荄對節而生形同蒼耳不費登高歴險每常求少獲多急採非難廣收甚易倘勤久服旋見神功臣自進百服而眼目清明千服而髭鬚烏黒筋力輕健效驗多端本州有都押衙羅守一因中風墜馬失瘖不語臣與十服其病立瘥又和尚智嚴年七十忽患偏風口眼喎斜臣與十服亦便得痊謹合一百劑差職吏史元奏進寰宇記天麥門冬忠州出宋史新編普州順慶皆貢天門冬梁簡文謝賚益州天門冬啓建自星橋見珍玉壘本草稱其輕身延壽實爲上藥姬晉之重丹桂曹丕之愛落英一䝉恩賜竊幸徃代張世南游宦紀聞向在蜀見製麥門冬法古用湯泡少時則易去心今只以銀石銚火上微烙隨手漸剥極易爲力又不漬去藥味又乳香没藥最難研若作丸以乳鉢研略細入酒或水研之頃刻如泥更無滓脚酒糊則用酒研麫糊則用水用力省而不飛耗寰宇記閬翼威當悉恭拓諸州皆出當歸宋史威州貢本草當歸川蜀畦種肥好多脂不以平地山中爲等差峽人謂之文無按崔豹古今注云古人相贈以芍藥相招以文無文無當歸也芍藥一名將離孫盛雜記曰初姜維詣諸葛亮與母相失後得母書令求當歸維答書曰良田百頃不在一畝但有逺志不在當歸神僧傳唐𤣥宗問一行國祚幾何有留難否對曰鑾輿有萬里之行帝驚問其故不答退以小金合進署曰至萬里即開帝一日發合視之蓋當歸少許及禄山亂駕幸成都至萬里橋乃悟未幾果歸方物略燖麻劒南處處有之觸其葉則如蜂螫以溺濯之即解莖有刺葉或青或紫治風腫贊曰葉能螫人有花無實冐冬弗悴可以祛疾按杜工部有除􅣪草詩􅣪音燖蜀名􅣪麻寰宇記麻山有麻能解瘴毒本草升麻生益州山谷寰宇記出茂戎彭雅之間方物略金星草峩眉青城山俱有之葉似萱其背有㸃雙行相偶黄澤類金星故名亦云金釧草醫家以傅疽創甚良贊曰長葉叢生背㸃星布高醫近識傅疽可愈按此草解􅏴疽及丹石毒與喉生乳蛾搗水飲之即愈本草以戎州者爲上喜生背隂石上凈處及竹箐中少日色處或生大木下及古瓦屋中初出深緑色葉長一二尺至冬背生黄星㸃子兩兩相對色如金無花實凌冬不凋其根盤屈如竹根而細折之有觔如豬馬騣本草夏枯草生蜀郡川谷冬至後始葉似旋覆三四月開花作穗紫白色似丹參花結子亦作穗五月便枯今蜀人用以煎水盥面不皺彰明志縣東二十九里有豆萆山九州記云山有北芒神生豆萆草新津志縣南八里有山生稠稉草服之長生本草經曰合歡味甘平生益州川谷安五臟和心志令人歡樂無憂久服輕身明目寰宇記果州有鷄父草五月採山大豆八月採豆療急風傷寒草治因産破血二藥本草不書也本草山豆根以忠萬者爲佳苗蔓如豆葉青經冬不凋寰宇記遂嘉二州有紫葛根宋史嘉州者貢按本草葛根生汶山山谷中本草伏牛花生蜀地葉青細似黄蘗而不光莖有刺花色淡黄穗似杏花而小又云蜜䝉花蜀中州郡皆有之樹高丈餘葉似冬青而厚背白有毛寰州記紅花紫草蜀州皆有之今崇慶州也又云嘉州古貢紅花通考牡丹皮唐時巴川郡歲貢十斤寰宇記廣安軍渝合皆出渝合者貢巴川𨽻合州也又云蜀州貢木蘭皮蜀都賦云菌桂臨崖本草菌桂圓如竹爲衆藥通使一名菌薫葉曰蕙根曰薫水經注巴東舊郡治故陵溪西二里故陵村即永谷也地多木爪樹有子大如甒白黄實甚芬香爾雅之所謂楙也資州圖經曰生瓜菜産平田隂畦間苗長三四寸叢生葉青圓似莧花葉白實細黒味作生瓜氣取莖葉自然汁傅胎腫毒及治走注傷寒利胸膈方物略石瓜生峩眉山樹端挺葉肥滑如冬青椹似桑花色淺黄實長不圓殻解而子始見以其形似瓜故名煮爲液治痺贊曰脩榦澤葉結實如綴膚解核零可用治痺本草􅮴菜一名白英味甘寒生益州山谷治寒熱久服輕身延年􅮴音谷寰宇記松州有松桑嶺其上多甘松松潘志甘松嶺在治西北三百里産甘松處也蜀都賦鬱金生蜀地及西戎苗似薑黄花白質紅未秋出莖心而無實其根黄赤寰宇記資州産高良薑通志戎州出黄精薑韋應物餌黄精詩靈藥出西川服食採其根九蒸換凡骨經著上世言候火起中夜馨香滿南軒齋居感衆靈藥術啓妙門自懷物外心豈與俗士論終期脱印綬永與天壤存南充志縣北二十里清山亦名小龍門懸崖上有草謂之堯韭可以瘳疾方物略海芋高四五尺葉似芋而有榦及根皮不可食方士家號隔河仙可用變金或云止瘧贊曰木榦芋葉擁踵盤戾農經弗載可用治癘文與可有子平寄惠希夷先生所傳唐福山藥方戲作長歌謝之歌云蜀江之東山色盡如赭有道人云此是丹砂伏其下煙雲光潤若洗濯澗谷玲瓏如刻畫我聞神仙草藥不在凡土生是中當有靈苗異卉之根莖果然人言所出山芋爲第一西南諸郡有者皆虚名就中唐福衆稱賞肥實甘香天所養有時嵓頭倒垂三尺壯士臂忽然洞口直舉一合仙人掌土人入冬農事閒千篝萬鍤來此山可憐所鬻不甚貴著價即售曽不慳徃年子瞻爲余説言君部内此物尤竒絶後復寄書勸我當餌之滿紙親題華嶽先生訣予因購之不惜錢依方服餌將二年其功神聖久乃覺筋牢體溢攴節堅自問丹霄幾時上早生兩翅教高颺敘志州西北二里仙侣山有一泉五洞上産仙茅宋楊道人昇仙于此名楊仙洞南江志縣南二里菖蒲澗産九節菖蒲寰宇記雅安産石菖蒲禮含文嘉曰夏以姒祖感薏苡而生按岷山多薏苡近石泉界也本草石香葇生蜀郡陵榮資簡巖石縫中二八月采苗莖花實俱可用又云三稜狀如烏梅而稍大體輕有鬚相連蔓延作漆色蜀人織以爲器一名䔷范成大詠蜀紫荷車詩綠英吐弱線翠葉抱脩莖矗如青旄節草中立亭亭根有却老藥鱗皴友松苓長生不暇學聊冀病身輕博物志曰胡蕙本出洛中有驅羊入蜀者著子于毛蜀人取而種之因名羊負來本草羊泉生蜀郡山谷俗名漆姑葉似菊花紫色子類枸杞根如逺志無心有糝又云鹿藿生於汶山寰宇記導江縣貢藥有紫背龍牙白背龍牙大鶴仙小鶴仙嘉州有金毛狗脊有丁公藤夾江志地出王不留行稽聖賦云竹布實而根苦蕉舒花而株槁蕉甘蕉也蜀人謂之天苴即天麻史記巴蜀寡婦清之先得丹穴擅其利數世家亦不貲華陽國志涪陵巴之南鄙出丹漆又云丹興縣出名丹蜀都賦丹砂赩熾出其坂註丹興漢葭二縣並出本草丹砂生符陵山谷光色如雲母陶隱居云符陵是涪州志林云爾朱道士晩客於眉山自言受記於師云汝後遇白石浮當飛仙去爾朱雖以此語人自亦莫識所謂後客涪州愛其地産丹砂雖瑣細而皆矢鏃狀瑩徹不雜土石遂止鍊丹數年竟於涪州白石仙去長老道其事甚多然不記名字可恨通考云唐黔州黔中郡貢朱砂十斤寰宇記黔州出水銀本草言水銀生涪陵平土而出於丹砂也華陽國志梓潼郡涪縣有陽泉出石丹范子計然曰空青出於巴郡本草空青生益州山谷久服輕身能化銅鉛作金又云蜀名山縣有銅處曽青出其陽青者銅之精也又云空青生越巂山有銅處銅精熏則生空青其腹中空梁江淹空青賦曰夫赤瓊以照燎爲光碧石以葳㽔爲色咸見珍於東國並被貴於西極况空青之麗寳挺山海之不測於是寫雲圖氣學靈狀仙寳波麗水華峯豔山晹谷之樹崦嵫之泉西海之草炎州之煙曲帳畫屏素女綵扇錦色雰鬱綺質蔓延㸃拂濃薄如隱如見山水萬象丹青四變咸百鎰而可珍亦千金而不賤故淹作扇上彩畫賦有空青出峩眉之岨雌黄出嶓冢之隂華陽國志越巂㑹無縣山色青碧蜀都賦所稱碧砮出此本草扁青生朱提繪畫家用之青翠不渝珙縣志落榦里麻窖中出青大如筯初掘其色淡乘風始變青所謂土青也寰宇記空青出銅山縣賴應山又云梓州貢空青曽青石碌也山海經數歴之山楚水出焉其中多白珠郭注云今蜀郡平澤出青珠按寰宇記蜀州晉原縣有豐平澤青珠是出本草石闌干生蜀郡平澤蜀都賦所稱青珠黄環者也註云黄環出蜀郡華陽國志㑹無縣其穴多碧珠人不可取取之不祥或即青珠也呉百官錄云劉蜀主得賜雲母車一乘唐閭丘均爲蜀州刺史第八息進武后雲母粉表伏按雲母者千二百玉石之精七十二氣霧之英體華而光不爲水毁不爲火煆夫萬物之精者神氣所㑹未有不化神而能長久者也是以服食者則翺翔自任役使百靈臣肌性虚羸少嬰疾苦務求攝理驗討方書品丹石之名徵草木之氣前聖所錄粗知其體即味消邪厲力輔神年類非難得之珍價無兼金之重觸疾則愈莫若兹物伏惟越古金輪聖神皇帝陛下福德所符天祚攸久豈假上藥方固南山然一日萬幾或煩聖慮色力營衞必有相資臣從西山野人得其良者其色多白乃是雲液臣不揆拙昧輒採古仙要方量事施藝翦棄粗類收聚輕英開潔清之所逺淹穢之迹浸以茅露洮以東流曠日彌時然後功就果得光潤融爛質理研微試之柔膚隨手化滅皆云所見未始相侔臣意其精殊倘涉靈秘豈以凡妄所敢飡嘗謹詣朝堂敢冒死封進伏希陛下兼愛博物受其區區不以凡人忽棄神寳無任下情雲安縣舊圖經縣北三十里白玉池産太乙元精石張華博物志蜀牙門山東峯有石穴深數里出鍾乳郡國志曰彰明縣黄蕨山有鍾乳穴十九珙縣東五里鳯頭山有石磧中出石燕石螺石筍石蜉蝣等形晴日久曝雷雨偶作則石燕各彚脱出俗謂乘雨飛動止復爲石也按石燕能治目固齒寰宇記渝合二州出石膽華陽國志五成縣山出龍骨云龍升其山値天門閉不達墮死於此後没地中故掘取得龍骨寰宇記𤣥武山一名三嵎山在本縣東二里六屈三起多龍骨寰宇記茂州今貢麝臍霸松恭拓當悉靜諸州皆有之有顆麝散麝之分蜀都賦有碧砮芒硝註芒硝出蜀都廣陽山本草朴硝出益州汶山蠶陵二縣界山崖上色青白亦有雜黒斑者寰宇記益州舊貢雪山朴硝色白如玉又云茂州産馬牙硝悉州亦産威逺志縣出土硝居民以之糞田焉方物略云水硫黄出資榮山磵中秋潦已收布茅水上取其聚沫熬之復投于水即成號真珠黄以淺黄者爲上其用次於海舶來者贊曰厥生在石水蕩其液觸梗凝體品亞南舶榮縣志北十里有硫黄嶺圖經所稱威榮出硫黄處也蜀中廣記卷六十四
