body:
  text: 蜀中廣記卷八十二明曹學佺撰高僧記第二川西道二唐僧晃姓馮氏綿竹涪城西昌人形長八尺顔貌都偉鷹眼虎身鵞行象步聲氣雄亮志略宏逺綱維法任有柱石焉故使岷巴領補咸所推仰昔年在志學文才博達時共聲譽常夢手擎日月大虚中坐便晃然厭俗欣慕出家私即立名為僧晃也父母未之許拘械兩足牢繫屋柱決意已絶誓心無改不移旦夕鏁自然解乃嘆曰夫志之所及也山岳以之轉江河以之絶城臺以之崩瀛海以之竭日月為之潜光須彌為之崩頽星辰為之改度嘉樹為之藏摧况復金木之與桎梏奚足以語哉二親顧其𡨕感任從道化依彖法師出家受業學通大小夙夜匪懈㑹梁末周初佛法淆濫行多浮略迂誕毗尼晃具戒未聞而超然異表少能精苦性自矜持卒非師友所成立也衆皆挹其神宇宻相高尚及昇壇之後偏攻十誦數年劬勞朗鑒精熟研㣲造盡彬鬱可崇周保定後更業長安進學僧祗討其幽㫖有難必究是滯能通又於曇相禪師稟受心法觀道圓淨又於開禪師方等行道洞入時倫無與相映自此罕得而傳者由多營福業勞事有為是以隱墜世不稱也既而遐邇諷徳聲聞天庭武帝下勅延於明徳殿言議開闡彌遂聖心乃授本州三藏大隋啟祚面委僧正匡御本邑而剛決方正賞罰嚴肅綿益欽風貴賤遐奉前後州主十有餘人皆授戒香斷惡行善開皇十五年又於寺中置頭陀衆僧事蠲免以引墮者仁夀已後重率寺衆共轉藏經周而復始初不斷絶供給䞋錫一出俗縁皆晃指授故福報所至如泉不窮僧業茂盛方類推舉以武徳冬初終於所住之振響寺春秋八十五矣初未終前佛堂蓮花池自然枯竭池側慈竹無故凋死寺内薔薇非時發花曄如夏月衆以榮枯兩端不無生滅之懷徳異常倫故感應所期耳唐綿州大施寺釋世瑜姓陳氏住台州父母早亡傭作取濟身形偉壮長八尺三寸希向佛理無由自達大業十二年往綿州震響寺倫法師所出家一食頭陁勤苦相續又往利州入籍住寺後入益州綿州縣響應山獨住多年四猿供給山果等食有信士母家生者負糧來送驚訝深山常燒薫陸沈木香等既還山半路見兩人形甚青色貌狀希世各負蓮花蔗芋而上云我供給禪師去也然其山居三年之中食米一石七升六時行道以猿鳥為侣初惟一泉後有三泉流出於下貞觀元年夢有四龍來入心眼既覺大悟三論宗㫖遂往靈睿法師講下所聞詞理宛若舊尋則而覆述便往綿州住大施寺至十九年四月八日往崇樂寺言欲逰方去或有喻曰只此寺者是都方也因還大施本房香氣滿室坐處之地涌三金錢合衆尋香至瑜房見師跏坐而化手上執鑪刺史劉徳威慶所未聞作龕坐之三年不倒唐初蜀川沙門慧岸者未詳何人面鼻似胡言同蜀漢往來市里黙言無准人不之異武徳三年科租至岷州程期甚促蜀人初不聞謂在天外人有僦購科索方錢轉更驚急謂往鬼國被去者皆為死計岸於新繁市大笑曰但去必見歡喜捉負租抝折數枚衆人去至鹿頭道逢勅停此前言之騐也武徳六年輒復悲泣不能自禁曰誰能見煩惱因没水求死衆人爭入水接之乃端坐水底已卒卒後其年亢旱不收疫死衆矣唐智詵禪師俗姓周資陽縣人武徳元年資陽麒麟雙出江水逆流金粟呈祥白蓮瑞彩此詵生也七嵗能言天性明悟談論異凡初自丹山志甘苦空身處寂寞一日山神告曰此非高僧所居棲神山近在州境城北五里真福地也詵欣然起錫山神以石炬火前導既至棲神乃繹高僧名經即山建寺額曰徳純武則天詔赴内道場因辨幕内珠光天子重禮賜號寶修禪師辭乞歸山傳燈録云五祖既傳法六祖而又别傳智詵詵傳處寂住于資中時人謂之唐和尚唐釋逞者不知姓氏益州人州有甘亭神威力嚴惡殃福立應祈禱血食牛羊難紀忽下巫語欲逞授戒逞設佛像廟中神自移影向佛下坐為授戒訖又往先主廟授戒神亦隨從所以蜀川神廟逞行至者皆為授戒道俗歸依發言風靡又於綿竹郫縣造三百尺大像今並成就凡所祈求為無不遂以顯慶四年終於本寺春秋八十五道俗哀慕送往放生池於路三度大雨雨皆白色恰至葬所天地清明唐益州多寶寺道因姓侯氏濮陽人也七嵗丁内艱嗌粒絶漿殆乎滅性免喪之後思酬罔極乃出家詣靈巖寺求師誦習曽不浹旬通涅槃經二帙落髮已來砥礪其行揣摩義章即講涅槃宿齒名流咸所歎服後隱泰嶽凡經四秋將詣洛中屬昏季陵夷法網嚴峻僧無徒侣弗許逰方於是杖錫出山孑焉超邁恐罹刑憲靜念觀音少選之間有僧歘至皓然白首請與偕行迨至銅街暨於金地俯仰之際莫知所在咸謂善逝之力有感斯見未㡬避難三蜀居多寶寺開論維摩聽者千數時有寶暹法師東海人也殖藝該洽尤善大乗昔在隋朝英塵久播學徒來請接武摩肩暹公傲爾其間仰之彌峻每至因席肅然改容沈吟久之方用酬遣因抗音馳辯雷驚波注盡妙窮微藏牙折角益州總管鄧國公竇璡行臺左僕射賛國公竇軌長史申國公高士廉范陽公盧承慶及前後首僚西南嶽牧共籍芳聲俱申䖍仰乃於彭門山寺習道安居往經廢毁院宇凋敝因慨然營緝蔚成淨場又以九部微言三界式仰緬惟法盡將翳龍宫遂於寺之北巖刻書經典窮多羅之秘袠盡毗尼之正文縱堯世之洪水襄陵任趙簡之北山燎狩必無他慮與劫齊休既而清猷逺暢峻業遐昭遂簡宸衷追赴京邑止大慈恩寺與𤣥奘法師翻譯梵本兼充證義奘師偏奬賞之每有難文同加㕘酌焉慧日寺主楷法師者聰爽温贍聲藹鴻都首建法筵請開奥義帝城緇俗具來諮稟欣焉相顧得所未聞因研㡬史籍尤好老莊咀其菁華含其腴潤包四始於風律綜五聲於文緒故所講訓内外該通其專業者涅槃華嚴大品維摩法華楞伽等經十地地持毗曇智度攝大乗對法佛地等論及四分等律其攝論維摩仍著章疏已而能事畢矣示疾終于長安慧日寺則顯慶三年三月十一日也春秋七十二越明年正月旋神座于益部二月八日窆于彭門光化寺石經之側龍朔中中臺司藩大夫李儼製碑歐陽通書唐釋道積蜀人住益州福感寺誦通涅槃生常恒業凡有宣述必洗滌身穢淨衣法座然後開之立性沈審慈仁總務諸有癘疾洞爛者其氣彌復鬱勃衆咸掩鼻而積與之供給身心無貳或同器食或為補浣時有問者積云清淨臭處心増愛也吾豈一其神慮耶寄此陶練耳衆皆慕其為行而患不能及之以貞觀初年五月終于住寺春秋七十餘矣時屬炎夏而不腐臭經停百日跏坐如初唐益州福夀寺釋寶瓊馬姓綿竹人少年出家清貞儉素讀誦大品兩日一遍為常途業歴逰邑落無他方術但勸信向尊敬佛法晩移州治住福夀寺率勵坊郭邑義為先毎結一邑必三十人合誦大品人别一卷月營齋集各依次誦如此義邑乃盈千計四逺聞者皆蒙造欵瓊乗機授化望風靡服而卑弱自持先人後徳經行擁衲下道相避言問酬對怡聲謙敬斯實量也不媚於時今邑連比什邡諸縣並是道民尤不奉佛僧有投寄無容施者致使老幼之徒於沙門像不識者衆瓊雖桑梓習俗難改徒有開悟莫之能受李氏諸族正作道㑹邀瓊赴之來既後至兀然而坐僉謂不禮天尊非法也瓊曰邪正道殊所事各異天尚不禮何况老君衆議紜紜頗相陵侮瓊曰吾禮非所禮恐貽辱耳遂禮一拜道像并座動搖不安又禮一拜連座返倒崔殘在地道民相視謂是風鼓競來周正既安又禮依前崩倒合衆驚懼舉掌禮瓊一時迴信從受歸戒焉縣令高達者素有誠敬承風敷道更於州寺召僧𢎞講合境傾味自此而繁以貞觀八年終於所住唐蜀都寶園寺𤣥續姓桑成都人出家既久經論道業涅槃成實所學之宗常講法華導引蒙曉然風彩高峻容止方複通達外書工草隷時吐篇什繼美前修又能折節下人僮少道俗有才調者命來與語愛而狎之至於侯王雄伯名儒大徳便傲然特立不以介意焉梓州東曹椽蕭平仲者梁高之孫也博學機闗當時絶偶往㕘談叙獨見欽尚平仲從容曰仰承高懷蔑諸貴等今蒙禮顧深愧非人續曰諸貴驕蹇須以驕蹇對之明公汎愛故以汎愛相答仲曰法師從來不爾今日忽然疑是虚談恐非實録答曰貧道待公之虚實亦如公遇續之虚實耳相與驩笑嘗為寶園寺製碑銘中有彈老莊曰老稱聖者莊號哲人持螢比日用岳方塵常見人述莊子鵬鷃之喻便嘆曰莊蒙以小大極於此矣豈知須彌不容金翅世界入于鄰虚井蛙之智穢人耳目後疾甚召僧集已罄捨都盡曰生死常耳願各早為津濟其夜命終唐釋慧暠安陸人幼入道門即懷逺量年方登立便昇法座談撝一指衆侣諠譁聞岷雒三巴尚昬時網欲以法𢎞導逺化未聞隋大業年泝流江峽雖遭風浪厲志無前既達成都大𢎞法務或就綿梓隨方開訓故使來往去思詠歌滿路後旋途南指道出荆門既返安州方等寺講説相續以貞觀七年卒於所住春秋八十有七自暠一位僧伍日止一飡隨得便噉無待營求所以蜀部鄷都芳著兼列焉唐釋慧稜姓申屠氏西隆人胎中父亡惟母鞠育八嵗其母又終獨詣邑西檀溪寺誕律師出家後逐安州暠師入蜀凡有法輪皆令覆述吐言質樸談理入微時人同號得意稜也及暠下獄稜亦同繩身被桎梏於成都縣一獄囚徒請講三論周於五遍勑還釋放便逐暠還貞觀八年又還襄州須彌寺講論不輟至十四年有感通寺昶師曰夢見閻王請稜公講三論如何稜曰善哉慧稜發願常處地獄教化衆生既有此徵斯願畢矣至十月半黄昏時告弟子曰吾五臟已崩無有痛所言未訖外有大聲呼曰法師早起焚香閻羅王使人即到須㬰異香忽來稜斂容便卒即十四年十月十六也春秋六十有五云唐釋道興姓劉本住秦州八九嵗時常念出家二親不許年十九決意詣大光寺剃落時天下大亂賊寇交横母為賊掠將去離城六十里興没命尋逐至已被傷未絶賊見曰此僧誠為至孝逐母至此便不盡命負母還城城中咸怪賊路兇險何因得返避難投蜀年滿進具常行蘭若頭陀乞食智舜律師當衢講匠依聽五遍便能覆述舜深竒之自舜没後接構律筵每年講席極為稽引三十二十度來請者方許開宗每嘆曰佛法漸替輕慢日増余不敢輕所以為重法故耳于時官府急切不許客住諸寺無停者來即安撫寺主曰官制不許何得停之興曰官不許容針私容車馬豈不聞耶寺主憤恚還房眼看袈裟不見又往三門王家㑹受飯自見是血食人喻之竟不信返寺向興懴悔怪遂止貞觀中青城戴令來慕欲與興同房宿夜中眠驚走出房外云見一赤衣僧執杖打背云因何在此宿以火照背如三指大隱軫赤色因求悔過興嘗得疾聞室中音樂聲自念我所求本在佛果不願人天言已聲滅自此便瘥常禮千佛日别一遍永徽三年元奘法師送舎利令供養興獲已於房内立道場發正願曰若一生傳法如契聖心請放光明須㬰一室並為金色以顯慶四年月日終於福勝春秋六十有七興自在道晝夜恒坐曽不偃亞自乞食之外不出寺門不乗畜生益部五衆咸敬而重之唐益州草堂寺旭上者不知何許人少居草堂惟以禪誦為業餘無所營蜀土尤尚二月八日四月八日每至二時四方大集馳騁遊遨諸僧忙遽無一閒者而旭端坐竹林泊然寂想瓶水自溢鑪香自然諸人城西看了相從㕘之旭儼然不動等同金石三日之後方復如常四衆敬而異之如覩朝日之初出因共目之為旭上也年九十八唐釋惠寛姓楊氏綿竹孝水人生有異徵臂垂過膝性恒香潔不近腥臊年五六嵗與姊信相學坐禪二親怪問荅曰佛來為説般若聖智界入等法門共姊評論耳法相父是異道不解其言附口録得二百餘紙龍懷寺㑹師至其所父以示之㑹曰並合佛經無所㕘參有異禪師於淨慧寺入火光三昧召彼女來及至不入云是火聚神師曰何不以水滅之女即作水觀滅火而入禪師驗知深入諸定勸令出家時蜀王秀在益請入城内妃為造精舎鎭恒供養嘗出於路人有疑者尼曰莫於三寶所生異心自受罪苦彼人悔過有造功徳須物者燒香祈請掘地獲金無不充足至於食飲欲食便食不食乃經嵗序時人目之聖尼即今本寺猶號聖尼寺也寛年十三常樂獨坐面無怒相言常謙下依空慧寺允禪師龍懷寺㑹闍梨所隨聞經律一覽無遺未聞之經曽不知義有難問者皆為通之初造龍懷寺㑹有徒屬二百餘人並令在役唯放於寛有怨及者㑹曰斯人是吾本師何得使作昔周滅法依相禪師隱於南山及隋興教辭師還蜀嘗受囑云汝還蜀土大有徒衆有名惠寛可將攝也衆憶此事計師死日當寛受生無得致怪自爾在山依閒業定年三十還綿竹教化四逺父母亦背道歸佛捨宅為寺于今見在綿竹諸村皆為立寺堂殿院宇百有餘所年常大齋道俗咸㑹正月令節成都等七十縣競迎供侍有大功徳須得經營但請寛至施物山積貞觀中有僧名䇿持呪有驗於雒縣忽死見閻王曰比獄中罪人多應為誦呪并請寛師講地獄經䇿蘇已即從雒縣往綿竹至寛所正集轉經告䇿曰昨所住處大為勞苦為衆生者不得辭苦即令䇿登座誦呪大衆聞皆流汗寛仍集衆講地獄經焉有什邡縣陳家者捨邪信佛以竹園為寺寛指授分劑爾許可為僧院中間一分堪為佛堂即斷一竹上豎標云此分劑處欲造佛寺當時生竹自乾佛堂斷竹泉水上涌尋掘數尺獲大石石下金瓶舎利七粒寛禮拜更請遂放光乃盛滿合四逺又集寺今見在永徽四年夏六月二十五日春秋七十卒於淨慧寺未終一月有五百神人長丈餘服天衣持花香及紫金花臺從西方來迎寛辭不堪發遣令去又於終日放羊從市向房悲數十聲至夜索水沐浴新衣跏坐執爐已命打無常鐘聲遍郭聞合郭咸集曰闍梨涅槃去空中哭聲寺内光明莫測其來入定氣乃知永逝葬後縣内道俗七嵗已上著服泣臨如是三年爾後綿竹凡設㑹家皆設兩座一擬聖僧一擬寛也唐資州山北蘭若處寂姓周氏蜀人也師事寶修禪師服勤寡欲與物無競居山北行杜多行天后聞焉詔入内賜摩納僧伽梨辭乞歸山涉四十年足不到聚落坐一胡床宴黙不寐常有虎蹲伏座口如家畜類由是頗形竒異如無相大師自新羅國將來謁詵禪師寂預誡衆曰外來之賔宜洒掃以待之明日果有海東賔至焉開元初新除太守王曄本黄冠也景雲中來刺是郡終于釋氏包藏禍心上任處分令境内應是沙門追集唯寂久不下山或勸寂往㕘免為厲階寂謂弟子曰汝雖出家猶未識業吾之未死王曄其如吾何迨王公上官三日緇徒畢至或曰唯處寂蔑視藩侯弗來致賀曄㣲怒諸僧升㕔坐已將啟怒端問寂違拒之由愠色勃興僧皆股慄曄俄然仆地左右扶掖歸宅至㕔事後屏樹如被摑頰聲尋爾氣絶資人益崇仰之以開元二十二年正月示滅享年八十七同時若長松馬祖及王頭陀趙頭陀皆其門人唐釋大川不知何許人於漢川棲賢寺行四聖種法綿竹之人無夙少率皆宗奉及乎終也卧於寺外白衣具牀榻相率舁歸寺中務營䘮禮方當屍舉無何雙鹿引前若騶導焉大厯初北山變成黄金色上有樓閣菩薩行道斯須之間萬形千狀川素居此寺與地俱靈留影供養如事靈祠焉唐開元中成都萬嵗池傍有僧誦法華經每夜見一老叟來聽僧怪問之曰我池中龍也僧曰今方旱何不降雨叟曰凡雨須天符不爾天誅之今當為師降雨師其葬我是夕大雨質明池邊見一大蛇斬為兩段僧取焚之為立塔呼為龍壇焉唐高僧智浩嘗於成都中興寺誦法華經鄰有龍女祠龍毎夜聽之一夕施一寶珠浩曰僧家無用龍以神力化大圓石榴而去今以水澆之則龍宫石寶四字隱隱可見此二則方輿勝覽所載王維大薦福寺道光禪師塔銘云禪師諱道光本姓李綿州巴西人在諸兒時神獨不偶去詣鄉校見周孔書曰世教耳誓苦行求佛道入山林割肉施鳥獸鍊指燒臂入般若道場百日晝夜經行遇五臺寶鑑禪師宻授頓教得解脱知見舎空不域即動無朕不觀攝見順有離覺毛端族舉佛刹掌上斷置世界不覩非咎應度方知得其門者寡矣開天二十七年五月二十三日涅槃薦福僧坊門人明空等建塔於長安城南畢原人天㑹葬涕泗如雨其世行遺教如一切賢聖維十年座下俯伏受教欲以毫末度量虚空無有是處誌其舎利所在而已銘曰鳴呼人天尊全身舎利在畢原唐釋靈著姓劉氏綿州巴西人也年逮志學方遂出家登戒尋師不下千里年四十精毘尼道兼講涅槃一律一經勤于付授晩嵗請問大照禪師領悟宗風守志彌篤後講長安誕敷禪法慕道求師者不減千計若魚龍之㑹淵澤也以天寶五載四月十一申時示滅于安國寺石楞伽經院享夀五十六僧夏三十六唐成都靜衆寺僧無相新羅國人也是彼土王第三子以開元十六年至中國𤣥宗召見𨽻於禪定寺後入蜀資中謁智詵禪師入深谷嵓下坐禪毎入定多是五日為度忽雪深有二猛獸來相自洗拭躶卧其前願以身施食二獸從頭至足嗅匝而去往往夜間坐牀下搦虎鬚毛既而山居頗久衣破髮長獵者疑是異獸將射之而止復構精舎於亂墓間屬明皇違難入蜀迎相入内殿供禮時成都縣令楊翌疑其妖惑命徒二十許人曳之變怪卒起楊乃叩頭拜伏遂勸檀越造淨衆大慈等寺相至成都忽有一力士稱捨力伐柴供僧厨用相之弟本國新為王矣懼其却回將遣刺客來屠之相已𡨕知忽曰供柴賢者暫來今夜有客曰灼然又曰莫傷佛子至夜薪者持刀挾席坐禪座側逡巡覺壁上似有物下遂躍起以刀一揮巨胡身首分於地焉質明相召伐柴者謝之已不見矣以至徳元年建午月十九日無疾示滅春秋七十七先是武宗廢教成都止留大慈一寺淨衆例從除毁其寺巨鐘迺移入大慈洎乎宣宗中興釋氏元鐘却還淨衆以其鐘大隔江計功兩日始到方欲為齋辰去迎取巳時已到推挽之勢直若飛焉爾時相之真形面目流汗乃知其神力所曳也後號東海大師塔唐釋天竺亡名未詳何印度人也其貌惡陋纒乾陀色縵條衣穿革屣曳鐡錫化行于京輦當韋南康臯生纔三日其家召僧齋此僧不速自來以敝席坐於庭中既而齋畢韋氏令乳母負嬰兒出請衆僧祝願梵僧先從座起攝衣升階視之曰别久無恙乎嬰兒若有喜色相認之意衆皆異之韋君曰此子纔生三日耳吾師何言别久也梵僧曰此非檀越所知韋君固遠之梵僧曰此子乃諸葛亮之後身耳武侯鼎國時為蜀丞相君所知也蜀人受其賜且久今降生於世將為蜀帥必福坤維之人吾往在劍門與此子為善友故不問而來此子他日作劒南節度二十年官極貴中書令太尉此外非我所知也父然之因以武字焉後韋臯自少金吾節制劒南軍果遷太尉兼中書令在蜀二十一年末塗甚崇釋氏恒持數珠誦佛名所養鸚鵡教令念經及死焚之有舎利又歸心南宗禪道學心法於淨衆寺神㑹禪師云唐漢州開照寺鑑源不知何許人也素行甄明範圍律道苾芻表率何莫由斯後于三學山講華嚴經號為勝集日供千人倉簟中米粟纔數百斛取之不竭沿夏涉秋未嘗告匱其𡨕感如此有慧觀禪師見三百餘僧提蓮燈凌空而去歴歴如流星焉開元中崔冀公寧疑其妖妄躬自入山禁之山四方面各三十里火光至第三夜有百餘支燈現兼紅光可千尺餘冀公蹷然作禮歎未曽有時松間出金色手長七尺許有二菩薩黄白金色閃爍然復庭前栢樹上晝見一燈其明如日横布玻山可三里所寶珠一顆圓一丈熠爚可愛西嶺山門懸大虹橋橋上梵僧老叟童子間出有二炬爛然空中如相逢迎交過之狀下有四菩薩兩兩偶立放通身光可高六七十尺復見大松林後忽有寺額篆書三學字又燈下垂繡帶二條東林之間夜出金光月當於午金銀二色燈列於智炫師墳側韋南康臯每三月就寺設三百菩薩大齋菩薩現形捧燈僧持香燈引挹之鑪在寺門矣白中令敏中覩瑞興立此寺大中八年改額曰開照弟子傳講東川所宗也唐成都大雲寺徐果師者混物韜光人罕詳測或入三昧不失律儀或示狂癡語事多中坤維四衆往往稱之為徐果師徐姓也果名也師通稱也此亦彊練誌公之倫類矣不知其終云唐簡州慈雲寺釋待駕俗姓王氏金水縣人冲孺出家作為詭異其父立名待駕當天寶末也練行精進時號頭陁及𤣥宗巡幸果自詣府剃髪為僧待駕得度其言信矣駕去縣邑二十里開逕芟茅獨居山頂後成一寺此山絶多靈跡初名石城迨明皇至劒門山神現形迎駕稱姓李氏勑賜有𤣥孫之稱後陟武擔東臺逺望祥雲紫氣盤結空界問左右曰此何處對曰石城山乃悟山神䕶衛之意因改雲頂寺為慈雲焉待駕後卒於此寺唐郫縣法定寺惟忠少孺為僧勵精自行在乎羣等莫不宗焉出家法定寺此寺後漢永平佛法始流中國便有置徳淨伽藍神光屢現至宋釋惠持誓化岷蜀來居寺中屬譙縱不道令數輩操刃欲屠持持乃彈指其衆驚奔僵仆隋開皇四年因改名法定焉寺有彌勒聖像唐武徳中忽爾枯查沿江而至夜發光明雕作像首貞觀中竇軌為長史佛首光見引達于府竇公令人迎取數百人亦不能勝乃令祝之任欲何往問言可就法定否乃一人能舉竇遂造佛身長史高士廉盖殿以安之後有僧汎愛樹其浮圖獲一巨蟹身長二尺餘是塔頗多靈異人或將酒肉乗醉詣聖佛前立見災禍矣忠於天寶中在寺愈加精苦無何塔為霆震拔其塔心柱出外忽有小木承代之意衆咸怪之罔測厥由忠乃叩磕於聖彌勒像告訴天龍合加畏重何輒震擊奪塔心柱耶一日迅雷烈風還同前震覆覩之乃龍神送舊柱安置如故當其易柱陰雲四合有四神人以身扶翼立與塔齊忠之感物也若此㑹昌拆寺之前舎利七粒出相輪上白光滿空向西飛去衆所目覩將倒之時赤光見於半天又此寺有大棗樹毁寺之年其樹枯瘁及大中再置棗始重榮也忠後終於寺白居易東都奉國寺禪徳大師照公塔銘云大師號神照姓張氏蜀州青城人也始出家於智凝法師受具戒於惠萼律師學心法於惟忠禪師忠一名南印第六祖之法曽孫也大師祖達磨宗神㑹而父南印其教之大㫖以如然不動為體以妙然不空為用示真寂而不記斷滅破計著而不壞假名師既得之掲以行化出蜀入洛月開六壇僅三十載隨根説法言下多悟由是裂疑網投惑箭漸離人我相者日月有焉起正信見本覺頓發菩提心者時時有焉其餘退惡進善隨分而増上者不可勝紀夫如是可不謂煩惱病中師為醫王乎生死海中師為船師乎嗚呼病未盡而醫王去海方涉而船師失粤以開成三年冬十二月示滅於奉國寺禪院以是月遷葬於龍門山報年六十三僧夏四十四明年傳教主院上首弟子沙門清閑糾門徒合財施與服勤弟子志行等營度䘮事卜兆於寶應寺荷澤祖師塔東若干步窆而塔焉示不忘其本也其諸升堂入室得心要口訣者有宗實在襄復儼在洛道益在鎭知逺在徐曰建在晉道光在潤道威在潞雲真在磁雲表在汴歸忍在越㑹幽齊經在蔡智全景𤣥紹明在秦各於一方分作佛事咸鼓鐘鳴吼龍象蹴踏斯皆吾師之教力也不其盛歟衆以余忝聞法門人結菩提之縁甚熟請於塔石序而銘曰伊之西北洛之南東法祖法孫歸全於中舊塔㑹公新塔照公亦如世禮祔于本宗唐成都福感寺定光者不知何許人也爰從入法厥性弗拘糲食斷中麤襦卒嵗方於庸蜀化導有縁俄遭武宗毁廢例反儒宗及乎佛日重暉僧倫咸序光同締構寺宇因鑄大鐘計赤金萬餘斤爾日鼓籥灰飛投鑪火熾有祥煙兩道自浮圖相輪最高處出冉冉射上若虹蜺焉萬人引望五色騰凌相感如然信鼓斯應其塔是阿育王藏舎利之所太和初南蠻蒙傞顚剽入益城分蠻卒舎於寺内廊廡烹炙熏灼僧皆奔迸時塔頂出四道濃煙分穗直上空虚至夜蠻蜑覩此竒異乃禁止汙穢此塔先在西北四十餘步天寶末長史章仇兼瓊赴任至劒門見一人長丈餘持㦸當路兼瓊驚問對曰某是大石寺䕶塔神故來奉迎且有少事咨祈大夫也縁大石寺在西南未為極善今請移東北四十二步望便掘石此下以鎭舎利兼瓊曰此易耳到府數日乃令量其地處先掘果得巨石其深無際促石匠數十人鏨鑿之至夜輒填滿遣人潜伺人見有白彘數十以喙推石末塞之隨以舌䑛其堅如鐡銅矣章仇令止勿鑿遂移塔於今所即金光舊寺基也光鐘亦移入新寺焉唐釋道一姓馬氏漢州什邡人也華以喻性不植於高原浪以辯識發明於溟海生而凝重虎視牛行舌過鼻凖足文大字根塵雖同於法體相表特異於幻形既云在凡之境亦應隨機之教年方稚孺厭視塵躅脱落愛趣逰步恬曠削髮於資州唐和尚受具於渝州圓律師示威儀之㫖曉開制之端浣衣鍛金觀門都錯大龍香象羈絆則難權變無方機縁有待聞衡嶽有讓禪師即曹溪六祖之前後也於是出岷峨玉壘之深阻詣靈桂貞篁之幽寂一見讓公泯然無際頓門不俟於三請作者是齊於七人以為法離文字猶傳蠧露聖無方所亦寄清源遂詣臨川棲南康龔公二山所遊無滯隨攝而化先是此峯岫間魑魅叢居人莫敢近犯之者災釁立生嘗一宴息於是有神衣紫𤣥冠致禮言捨此地為清淨梵場語終不見自爾猛鷙毒螫變心馴擾沓貪背憎即事廉讓郡守河東裴公家奉正信躬勤諮稟降英明簡貴之重窮智術慧解之能每至海霞歛空山月凝照心與境寂道隨悟深自明者在乎周物普施者期乎濟衆居無何裴公移典廬江夀春二牧於時進修惟勤率化不墜大厯中聖恩溥洽隷名於開元精舎其時連率路公聆風景慕以鍾陵之壤巨鎭奥區政有易絃人同湊轂禪宗戾止降祥則多順而無違居僅十祀日臨扶桑髙山先照雲起膚寸大雨均霑建中有詔僧如所𨽻將歸舊壤元戎鮑公宻留不遣至戊辰嵗舉措如常而請沐浴訖儼然跏趺歸寂享年八十僧臘五十先於建昌石門環以絶巘呀為洞壑平坦在中幽偏自久是謀薪火塵劫之㑹非議岡阜地靈之吉亞相觀察使隴西李公藩寄嚴厲素所欽承于以率徒依歸緬懷助理爰用營福道在觀化情存飾終輟諸侯之旌旗資釋子之幢蓋其時日變明晦人萃遐邇檝覆水而為陸炬通宵而成晝山門子來財施如積邑里僧供飯香普熏自昔華嚴歸眞於嵩陽善導瘞塔於梵嶺禮視齊斬人傾國城哀送之盛今則三之初於林中經行座下開示平等垂法不標於四科安恬告盡刻期於二月此明一知終之先兆也示疾云逝俾葬逺山凡有攀援願留近郭終遂窮僻式遵理命此又明一晦跡之素誠也將歸靈龕爰泝淺瀨人力未盡舟行為遲膏雨驟下於逺空窮溪遄變於深涉此又明一通神之應感也知眞在空無我於有是二俱離假一為乗示生死者人能作佛辨邪正者魔亦似聖現身不留於大士負手俄萎於哲人弟子智藏鎬英宗泰等奉其喪紀憲宗追謚大寂禪師丹陽公包佶為碑紀述權徳輿為塔銘今海昏縣影堂存焉傳燈録載師一日上堂謂衆曰汝等諸人各信自心是佛此心即是佛心達磨大師從南天竺國來躬至中華傳上乗一心之法令汝等開悟又引楞伽經文以印衆生心地恐汝顚倒不自信此心之法各各有之故楞伽經云佛語心為宗無門為法門又云夫求法者應無所求心外無别佛佛外無别心不取善不捨惡淨穢兩邊俱不依怙達罪性空念念不可得無自性故故三界唯心森羅萬象一法之所印凡所見色皆是見心心不自心因色故有心汝但隨時言説即事即宜都無所礙菩提道果亦復如是於心所生即名為色知色空故生即不生若了此心乃可隨時著衣喫飯長養聖胎任運過時更有何事汝受吾教聽吾偈曰心地隨時説菩提亦只寧事理俱無礙當生即不生僧問和尚為什麽説即心即佛師云為止小兒啼僧云啼止時如何師云非心非佛僧云除此二種人來如何指示師云向伊道不是物僧云忽遇其中人來時如何師云且教伊體㑹大道僧問如何是西來意師云即今是什麽意龐居士問如水無筋骨能勝萬斛舟此理如何師云這裏無水亦無舟説什麽筋骨一日師上堂良久百丈收却面前席師便下堂百丈問如何是佛法㫖趣師云正是汝放身命處師問百丈汝以何法示人百丈豎起佛子師云只這箇為當别有百丈抛下佛子僧問如何得合道師云我早不合道僧問如何是西來意師便打乃云我若不打汝諸方笑我也有小師行脚回於師前畫箇圓相就上禮拜了立師云汝莫欲作佛否云某甲不解涅目師云吾不如汝小師不對鄧隱峰辭師師云什麽處去對云石頭去師云石頭路滑對云竿木隨身逢場作戲便去才到石頭即繞禪牀一匝振錫一聲問是何宗㫖石頭云蒼天蒼天隱峰無語却回舉似師師云汝更去見他道蒼天汝便嘘嘘隱峰又去石頭一依前問是何宗㫖石頭乃嘘嘘隱峰又無語歸來師云向汝道石頭路滑有僧於師前作四畫上一長下三短問云不得道一長三短離此四字外請和尚答師乃畫地一畫云不得道長短答汝了也有一講僧來問云未審禪宗傳持何法師却問云坐主傳持何法彼云忝講得經論二十餘本師云莫是獅子兒否云不敢師作嘘嘘聲彼云此是法師云是什麽法云獅子出窟法師乃黙然彼云此亦是法師云是什麽法云獅子在窟法師云不出不入是什麽法無對遂辭出門師召云坐主彼即迴首師云是什麽亦無對師云這鈍根阿師洪州廉使問云弟子喫酒肉即是不喫即是師云若喫是中丞禄不喫是中丞福益州應天和尚問人人有佛性如何是和尚佛性師曰汝喚什麽作佛性曰恁麽即和尚無佛性也師乃呌快活快活蜀中廣記卷八十二
