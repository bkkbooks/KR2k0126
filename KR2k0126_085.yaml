body:
  text: 蜀中廣記卷八十五明曹學佺撰高僧記第五川南道一楞嚴經圓通品普賢菩薩白佛言我與恒沙如來為法王子十方如來教其弟子菩薩根者修普賢行從我立名我用心聞心遍十方若於恒沙界外有一衆生發明普賢行者我於尒時乗六牙白象分身百千擁䕶安位此是普賢自唱本因故現相海於峩眉山中密引世人而通菩提覺性心王菩薩曰西南方有山名曰光明現有菩薩名曰賢勝三千眷屬常在其中而演説法也周烈王三十二年有寳掌和尚名曰千嵗始生時手掌有印文為記來禮普賢設像供養人所不識常歎此山曰高出五嶽秀甲九州漢氏永平中癸亥六月一日有蒲公者採藥於雲窩見一鹿而竒異之追至絶頂無踪乃見威光煥赫紫霧騰涌聯絡交輝成光明網駭然歎曰此之祥瑞世所希有非天上耶逕投西來千嵗和尚而吿之荅曰此是普賢祥瑞於末法中守䕶如來相教現相於此化利一切衆生汝可詣騰法二師急頂禮而究之遂甲子逩洛陽白馬寺叅謁二師盡以所見為吿師曰善哉希有汝等得見普賢真善知識昔我世尊在法華㑹上以四法而付之曰一者為諸佛䕶念二者植重德本三者入正定聚四者發究一切衆生之心菩薩依本願而現相於峩眉山也名峩眉者昔善財禮德雲比邱時竚立妙高峯而觀此山如初月現故稱峩眉也峩眉厯代耆宿西域聖僧名阿婆多尊者來禮峩眉而觀山水環合同於西域化城寺地形依此而建道塲山高無瓦埴復雨雪寒嚴而凍裂不堅故以木皮葢殿因呼為木皮殿云惠通和尚江陵人也遊峩眉望黒水山峯竒異古有肇公道塲欲履之不覺溪水泛阻自念曰我欲往而何往耶偶感一虎至通即騎虎跳過溪流而入華藏寺隋智者老人於龜子石建呼應庵日遊神水夜宿于斯三年徐步威儀不鈌内淨其心外淨其行一日入定内外皆空了無一物出三昧已乃見一老人曰余從西域䕶持如來教法師從㑹來惟願大師受戒於我後日師離此山於玉泉建道塲偶病中思神水飲倐爾之間見一老人自稱龍王送水至師曰吾有鉢盂錫杖寄彼中峯同與俱來乃可信也龍王遂引勝水浮鉢杖於玉泉洞口流出出之不逺復入於地師曰為道者可以漏盡使鬼神莫測如我一思被龍王趣破去在吾佛有言神有五通羅漢有六通菩薩十通若不漏盡何以超越鬼神神水者言水從西域而來隋茂真尊者日遊呼應夜宿棊盤二處古跡見存唐三藏法師履西域至峩眉九老洞偶值聖真化一老僧言窮西域所有境界而説偈曰付汝般若舟慈悲度一切普賢行願深廣利無邊衆仙人洞右有月仙窟𤣥奘法師授經於此唐昌福達道和尚眉州人初叅晦機囘峩眉住華嚴寺僧問學人來問則對不問時意指如何曰謝師兄指示曰本來則不問如何是今日事曰師足這問大好曰學人不㑹時如何曰謾得即得曰國有寳刀誰人得見曰師兄逺來不易曰此刀作何形狀師兄要也道不要也道曰請師道荅曰師兄難逢難遇曰普賢云何駕石舡荅曰師是這箇亘古亘今本州叅學西禪和尚問佛是摩耶䧏未審和尚是誰家子師曰水上問如何是宻室中人師曰非男女相問國内按劍者誰師曰昌福曰忽遇尊貴時如何師曰不遺趙州禮峩眉於放光臺不登寳塔頂僧問和尚云何不到至極處州云三界之高禪定可入西方之曠一念而至惟有普賢法界無邊黄蘖老人禮峩眉至覩佛臺霧氣澄霽曰云何不見僧問不見甚麽蘖云不見普賢南泉老人禮峩眉而觀白雲光紫曰還有這㸃霞氣在僧問和尚是那一㸃泉云東則東北則北僧便禮拜唐靈龕和尚成都人叅陜西青峯禪師囘峩眉住靈岩寺僧問如何是諸佛出身處曰處處非干佛春來草自青又問碌碌地時如何曰試進一步看僧曰不知前進處師曰步步踏着峩眉古佛坪下有賢勝窟是其悟道處唐白水和尚初叅夾山善㑹禪師囘峩眉居白水庵僧問如何是西來大意曰四溟無窟宅一滴潤乾坤又問曹溪一路合譚何事曰澗松千載鶴來聚月中香桂鳯凰歸唐洞溪和尚初叅樂普曰月樹無根枝覆蔭普曰森羅秀處事不相依淥水千波孤峯各異師有省一日普問曰為甚麽被虵吞去也師曰幾度扣闗拈不出持錫便行普曰善哉去一普賢迴峩眉觀音寺居唐澄照大師初叅投子迴蜀住白水寺毎日六時朝禮普賢大士僧問諸佛有難向火燄裏藏身衲僧有難向甚麽處師曰水晶石上起波文大地衲僧都在裏許又問云何是初生月曰大半人不見七寳臺下有金剛窟始悟頓和尚於此入淨土三昧後出定已演大彌陀經西方境界如對目前是宋初時事西禪和尚本州人昔叅曹山曰佛是摩耶䧏未審和尚那家子山曰石頭漂在水裏曰三十六路和尚阿郍一路最妙山曰不出第一手曰忽被出頭時如何山曰脊着地也不難慧覺禪師謁台州勝光和尚值光在繩床上坐師直到身邊叉手立光問什麽處來師云猶待客話在便下去光乃拈拂子下僧堂前見師提起拂子問云闍棃喚這箇作什麽師云敢死喘氣光低頭便歸方丈師初叅羅山纔禮拜起山云甚處來師云逺離西蜀近發開元却近前云即今事作麽生山揖云喫茶去師擬議間山云秋氣稍暖出去師到法堂上自嘆云我在西川峩眉山脚下拾得一枝蓬蒿箭擬撥亂天下今日到福建道陳老師寨裏弓折箭盡去也休休山明日升堂師又出問豁開户牖當軒者誰山便喝師無對山云羽毛未備翼稍未全且去後還蟠龍寺住中峯寺明果大士化道於此雜集論云明果資州人自幼出家於龍遊山後居峩眉中峯寺正性和尚住華嚴寺前朝古廟一所重修之以旋篆結頂至今呼為雲篆殿羅漢和尚初叅香林澄逺禪師囘峩眉延福院右邊住一小洞常現禪定僧問如何是西來大意師曰井中紅燄日裏浮漚曰如何領會師曰揺指扶桑日那邊曰如何是羅漢境界師曰地連香積水門對勝峯山曰既是羅漢為甚麽却被人轉動師曰換却眼睛轉却髑髏布水嚴和尚昔叅曹山曰寳劍未磨時如何曰用不得磨後何如曰觸不得又問如何是西來大意曰一步踏着火光飛於此有省囘峩眉白嵓寺居黄龍繼達禪師昔叅晦機囘峩眉住光相寺僧問如何是衲師作用處曰横鋪四世界竪葢一乾坤問道滿來時如何曰要羮與羮要飯與飯問黄龍出世金翅鳥滿空飛時如何曰我問伱金翅疾得飽否僧無對黒水和尚本縣人因禮峩眉叅黄龍曰雪覆蘆花時如何曰猛烈又曰不猛烈黄便打師有省自爾契緣遊黒水峯下而㞐有人來禮和尚尊號曰汝㸔山峯喚作什麽大乗和尚青神人初叅雲門囘峩眉住龍池四面峯僧問如何是勝峯曰直聳煙嵐際曰向上事何如曰入地三尺五曰如何是佛法大意曰興義門前鼕鼕鼓曰學人不㑹朝打三千暮打八百東汀和尚本縣人初叅曹山依峩眉棋盤寺居僧問如何是却去底人曰石女紡麻纑如何是却來底人曰扇車闗良計斷以上出峩眉本傳昔普惠大師生於西漢姓吳氏掛錫䝉頂之上清峰中鑿井一口植茶數株此舊碑圖經所載為䝉山茶之始矣師一日拉侍者登䝉頂觀茶山忽隠没於池中侍者解衣投水持抱乃得一石像負至本堂中安置因號甘露大師邑人嵗以四月二十四為師隠化之日咸集於寺薦香設供焉宋淳熈十三年邑進士喻大中奏師功德及民孝宗累加封普惠妙濟大師而七曲神君鸞筆記師法名理真云按像在今縣西十五里智炬寺南齊高何二師不著名氏延興中自明州象山别其師遊蜀師曰遇明則住二師到卭升高逺覽夜見羣峰火雲四起赫然有光因訪父老則曰四明山也始悟遇明而止矣遂卓錫於山陰披榛薙草經始卜築有石佛示現光相從地湧出化為泉今之䕶國院瑞佛及湧泉在焉院有白岩孤石聳立高踰百尺鶴巢其上故二僧所建道塲號鶴林寺後世因謂之白鶴山齊釋法琳姓樂臨卭人少出家止蜀郡裴寺專好戒品研心十誦隠公至蜀琳乃剋已握錐以日兼夜諸郡毘尼洞盡心曲後止靈建寺祈心安養毎誦無量壽及觀音經輒見一沙門形甚殊大常在琳前建武二年寢疾注念西方禮懴不息見諸賢聖皆集目前乃向弟子述其所見令死後焚身言訖合掌而卒齊釋曇慿姓楊犍為南安人少遊京師學轉讀止白馬寺音調甚工而過且自任時人未之推也於是專精規矩更加研習晩遂出羣翕然改觀誦三本起經尤善其聲後還蜀止龍淵寺巴漢學者皆崇其聲範毎梵音一吐輒象馬悲鳴行途住足因製造銅鐘願於未來當有八音四辯庸蜀之銅鐘始於此隋瀘州等行寺釋童進姓李綿州人周時出家不拘禮度唯樂飲酒謂之曰此可以灌等身也來去酣醉遺尿臭穢衆共非之有逺識者曰此賢愚難識會周武東征云須毒藥勅瀘州營造置監吏力科獠採藥蝮頭鐵猩􅑄根大蜂野葛鴆羽等數十種釀以鐵瓮藥成着皮衣琉璃障眼方得近之不尒氣衝成瘡致死藥著人畜肉穿洞見童進聞之往彼監所官人弄曰能飲一盃豈非酒士進曰得一升解酲亦要官曰任飲多少何論一升便取鐵杓於藥瓮中取一杓飲之言謔自如都不為患道士等聞皆來看進又舉一杓以勸之皆逺走避或曰此乃故殺人何得無罪進曰無所苦藥進自飲有誰相勸乃噫曰今日得一醉卧方石上俄尒遺尿所著石皆碎良久睡覺精爽如常隋初得度配等行寺年九十餘終唐釋道會姓史武陽人太宗時出家益州嚴逺寺器宇高簡雅調逸羣四方道俗旦夕叅候猶以蜀門小隘聞見非廣乃入京師詢訪十餘年經論史籍博究宗領還蜀欲𢎞釋教導引後鋭時屬亂離不果心術㑹唐運初興招撫詹俊李衮首圖巴蜀㑹上䟽曰㑹資性不肖家風失墜封爵雖除詔勅猶在即日劍門雖啓巫峽負固㑹躬率徒𨽻振錫啓途折簡宣威開懷納款軍無矢石之勞主有待成之逸此一時之利也惟公圖之有嫉者表奏反又述法㑹覘候消息遂被拘執身雖在獄言笑如常為諸在獄講釋經論自春至冬諸僧千數衣服藍縷不勝寒酷京師有無盡藏恒施為事㑹致書曰自如來潛影西國千有餘年正法東流百五許載雖復青眼赤髭大開方便之門白脚漆身廣示皈依之路猶未出乎苦海尚陸沉于險道況五衆名僧四禪家首頭陀聚落惟事一餐宴坐林中但披三衲加以施無緣之慈相升錘以代鴿履不輕之行思振錫以避䖝今有精勤法子清淨法門横被囚拘實非其罪遂使重闗早落覩獄吏而魂飛清室曉開見刑官而思盡嚴風日洒穿襟而清露俱飄繁霜夜零寒心與死灰同殪若竟不免溝壑抑亦仁者所恥書達即送裘鞋給之及事釋還鄉三輔名生送出都門㑹與諸逺僧别有詩曰去住同為客分悲損道情共作無期别時能訪死生道俗聞者皆墮淚焉時益州法曹裴希仁自矜門學會與相見輕有譏誚㑹曰蜀川雖小賢德如林漢朝八俊同出惟張綱埋輪東雒嘆曰豺狼當道安問狐狸奏誅梁冀威懾四海者犍為武陽人也漢時有問揚子雲者李仲元何如曰隠不違親貞不負俗天子不臣諸侯不友者資中人也巴西閬中百王之仰戢益州郫縣名振於華夷眀公庶可虚心待國士豈得以土地拘於人哉言訖而出希仁媿謝既返謂人曰江漢多靈其斯人也以貞觀末年卒年七十唐成都尹南康郡王韋臯大佛記云惟聖立教惟賢啓聖用大而利博功成而化神即於空開塵刦之迷垂其像濟天下之險嘉州凌雲寺古石像可以觀其㫖也神用潛運風濤密移肸蠁幽晦孰原其故在昔岷江拔日漂山東至犍為與涼山鬭突怒哮吼雷霆百里縈繳觸崖蕩為厱空舟隨波去人亦不存惟蜀雄都控引吳楚痛兹淪溺日月繼及開元初有沙門海通者哀此習險厥惟天艱皈命能仁迴彼造物以此山淙流激湍峭壁萬仞謂石可改而下江或損而平若廣開慈容廓輪相好善因可作衆力可集由是崇未來因作古佛像俾前刦後刦修之無窮乃為規廣長圖堅久頂圍百尺目廣二丈其餘相好一以稱之民惟子來財則檀施江湖淮海珎貨畢至債帥金工亦㒺不臻於是人夫競力千鎚齊奮大石雷墜伏螭潛駭巨谷將盈水恠亦空時積日競月將嵗就不數載而聖容儼然岧岧亭亭岌嶷青冥如現大身滿虚空界驚流怒濤險自砥平蕭蕭空山寂照煙月由内及外觀心類境則八風澄而愛河靜也余以為人之生也違道好徑故哲聖因其所欲示之以進修其行滿於此而福應在彼理甚昭矣至於奪天險以慈力易暴浪為安流何哉詳彼萬緣本生於妄知妄本空萬緣皆空空有尚無險夷安在至聖寂照非空非有隨感則應誰識淺深化於無源奚不有變非天下之至神其孰能平斯險也彼海上人發誠之至救物之𢎞時有郡吏將求賄於禪師師曰自目或剜佛財難得吏發怒曰嘗試將來師乃自抉其目捧盤致之吏因大驚奔走祈悔夫專誠一意至忘其身雖迴山轉日可也況𢎞我聖道勵兹羣心安彼暴流俾於寧息其應速宜矣而功巨因廣雖費億萬金全身未畢禪師去世於戲力善歸仁為可繼也日後有連帥章仇兼瓊者持俸錢二十餘萬以充經費開元中詔賜麻鹽之税實資修營事感夫人之克遵前志諒禪師經始之謀大慮終之智朗茍利物以便人期億刦以同濟貞元初聖天子命余守兹土㝢乃謀匠石籌厥工庸從蓮花座上乃至於膝功未就者幾乎百尺貞元五年有詔郡國伽藍修舊起廢遂命工徒以俸錢五十萬為助焉或丹采以章之或金寳以嚴之至今十九年而趺足成形蓮花出水如自天降如從地湧象設備矣相好具矣爰記本末用昭厥功唐釋知𤣥字後覺姓陳氏眉州洪雅人也母夣月入懷因而載誕雖乳哺見佛像僧形必含喜色甫及五嵗祖令詠花不數步云花開滿樹紅花落萬枝空惟餘一朶在明日定隨風祖吟嘆不懌曰吾見孺子志矣必從空門也七嵗果遇法泰法師在寧夷寺講湼槃經一聆法語若覩前因是夕夣佛手摩其頂寤啓祖父乞為勤䇿觀其必不可奪故聽之年十一削髮隨師詣唐興邑西安寺授大經四十二卷逺公義疏誓空師圓㫖共一百二十五萬言皆囊括深奥矣年十三丞相杜公元頴迎請升座講于大慈寺普賢閣下黒白日計萬許人注耳傾心駭歎無已自此蜀人弗斥其名號陳菩薩葢𤣥前身為知炫漢州三學山講十地經感地變瑠璃焉𤣥於淨衆寺辯貞律師所受具戒纔聽毘尼續通俱舍乃從本師下三峽厯荆襄抵于神京資聖寺文宗皇帝宣入顧問大惬皇情後學惟識論於安國信法師又研習外典經籍百家之言無不該綜𤣥毎恨鄉音不堪講貫乃于象耳山誦大悲呪夢神僧截舌換之明日俄變秦語云有楊茂孝者鴻儒也就𤣥叅學直欲效謝康樂注湼槃經執卷問疑隨為剖判致書云方今海内龍象非師而誰常一日宴坐見茂孝披紫服戴碧冠三禮畢乗空而去𤣥令人偵問茂孝是夕誡其子曰吾常欲落髮披緇汲瓶挈屨侍𤣥公所累者簮冕也吾葢棺時殮以紫袈裟碧芙蓉冠至是方驗先見矣武宗御宇初尚欽釋氏後納蠱議望祀蓬萊山築高臺以祈羽化雖諫官抗䟽莫迴上意因德陽節緇黄㑹麟德殿獨詔𤣥與道門敵言神仙為可學不可學耶𤣥乃陳帝王理道教化根本神仙之術乃山林匹夫獨擅高尚之事而又必資宿因非王者所宜聞者為之股慄左䕶軍仇士良内樞密楊欽義惜其才辯恐將有斥逐之命乃密諷貢祝堯詩𤣥立成五篇闕自生天未必求仙便得仙鶴背傾危龍背滑君王且住一千年帝覽詩㣲解亦不罪之𤣥即歸巴岷舊山扁舟入湖湘間時楊給事漢公廉問桂嶺延止開元佛寺属宣宗龍飛楊公以冊定功高請復興天竺教奏乞訪𤣥聲迹𤣥復挂壞衣歸上國寳應寺属壽昌節講讃賜紫袈裟署為三教首座帝以舊藩邸造法乾寺詔𤣥居之大中三年誕節詔諫議李貽孫給事楊漢緇黄鼎列論義稱㫖因勅天下廢寺基各許重建𤣥有力焉命畫工圖形於禁中其優重如是與相國裴公休友善同激揚中興教法事八年上章乞歸故山廣明二年春僖宗違難西蜀遣郭遵泰齎璽書肩輿詔赴行在帝接談論欲旌其美令諸學士撰𤣥師號皆未愜然乃揮御翰云朕以開示悟入法華之宗㫖也悟者覺也明也悟達大道悟佛知見又云悟者一刹那不悟河沙刦所以悟者真乗了然成佛之義今賜悟達國師為號雖曰强名用表朕意𤣥陳讓不遂仍乞歸九隴舊廬於正月二十一日卧内見所曽遊厯聖境名跡皆現在前二月七日聞空聲曰必生淨土乃訊云孰之語也空又譍曰佛也七月中聞户外有格鬬之聲逡巡一菩薩降于庭漸迫近𤣥身丁寧讃喻勿以此苦為累也言訖而没又于一夕有一珠自𤣥左足下流出苦楚萬端諦視其珠中明有晁錯二字乃知身是袁盎因七國反奏斬錯以謝吳楚諸王故為嬰撓耳召弟子慈燈附口上遺表囑令棄屍半飼魚腹半啗鳥獸吾久與西方淨土有期如斯諈諉訖右脇面西而逝享年七十三僧臈五十四𤣥堅守禁戒過中不食蔬菓服惟布褐卧則蒭秆而六時行道夜卧一更餘則禪坐等視衆生無貴賤少長待之如一嘗為導江玉壘山神李氷廟益昌北郭龍門神借受戒法罷其血食時李商隠方從事河東栁公梓潼幕以弟子禮事𤣥偶苦眼疾慮嬰昏瞽寄天眼偈三章讀終疾愈迨乎義山卧病語僧錄僧徹曰某志願削染為𤣥弟子臨終寄書偈決别後鳯翔府寫𤣥真作義山執拂侍立焉唐雅州開元寺智廣姓崔氏不知何許人也德瓶素完道根惟固化行洪雅特顯竒蹤凡百病者造之則以片竹為杖指其痛端無不立愈乾寧初王氏始定成都雅郡守羅某罷任擕廣來謁呼為聖師先是咸通中南蠻王及怛綽來圍成都府幾陷時天王現沙門形高五丈許眼射流光蠻兵即退故蜀人於城北寳厯寺立五丈僧相後為牛尚書預毁次兵火相仍頽圮殆盡王氏乃與廣曰郎之異術道德動人乗此可料理否往呉尚書行魯曽夣令修吾像方事經營除書忽到請法力成之廣唯其命徙就天王閣下居一隅小榻而已翌日病者填噎其門日收所施二十萬至三十萬錢又發言勸人出材木浹旬咸備令三綱掌管焉光化元年修完厥工乃循江瀆池呪食飼魚經夜其魚二尺以上萬億許皆浮水面而殞聊躡流水救十千魚生忉利同也釋永安眉州洪雅人大中八年詣成都造謁府帥白公敏中請奏本管寺額歇聖壽寺中十日人未嘗見其登圊旋溺呼為無漏師而内外飲食亦與常人同焉奏額到日便辭歸眉郡永安身材么麽而色黧䵟判官盧求見之謂為小沙彌不知師已八十餘矣宋卭州大邑靈鷲山寺㸃指師者不知何許人也孟氏廣政中隠卭南大邑山寺多遊鄽肆中雖事削染恒若風狂或與人接必指㸃而言因是稱焉有命齋食者酒肉不問率以為常俚人亦不之厭也毎至日夕輒市黄白麻紙筆墨寘懷袖以歸行數里沉酣至暝所居之室雖有扉户且無四壁入後闔扉人不得造有鄰僧小童躡足伺之見秉燭箕踞陳紙筆於前訶責大書莫曉其文字往往咄嗟如決斷處置久之明闇間熟視閃爍若有人森列狀如曹吏而襦裳非世之服飾觀者怖懼而退詰旦㣲詢其事怒而弗荅居數載卬笮之人咸神異之不知其終大邑縣崇壽禪師卭州蒲頓人自毁齒趣尚便高逺家嘗作佛事則汛洒供獻恭勤精愿不敕之而自率常恐若不能如法者父母異之乃俾隷大邑靜林僧籍以仁普為師年十六遂落髮二十受具戒來成都大慈寺聽講大乗諸經盡通曉奥義後七年還舊居其所止悉流落不治但腐椽破壁欹邪罅漏陳屋數間而已師恬然安一榻處其中無厭色鄉人有胡昭甫惟岳者高世之士善吟詩其最深處雖唐人葢亦有未能到者師師之入室矣師嘗以詩見邑宰秘書丞滕喬喬一讀重之來謝師見庭廡壞裂殆不可坐起倡邑人為修之未幾臺殿樓觀一一完具師之德業自此愈逺聞閭里之人皆欽嚮之師是後不復他出掃靜室據古几宴坐一食遇物感興時亦作詩其句度夷澹清粹不若其徒之所為者與人語和輭未嘗輒迕人出入縣中六十年亦未嘗以愛惡置利害於其間衆皆稱之師素堅强少疾狀貌修偉慈恕温裕縣人無少長咸願見之見必拜伏欣喜丁寧留連師誨諭慰滿而後去一日忽召其弟子慕安等前曰人既生理當有死死常事非異事吾無死生且久矣汝等當體吾之所以無死生者慎勿戚戚如衆人乃不累吾今日之所咐囑爾慕安等泣曰師胡為是言有何所緣耶師曰吾之神光一道去矣留此無數刻汝當奉吾所戒曰惡不宜為善不宜失語已躡足趺坐疊手瞑目而逝揺挽不動嶷如塑刻享年八十六治平元年十月二十三日也逺近緇素來赴哭者殆千人衆謂宜以師之真身建浮屠而扄藏之使來者觀相起善芟去三毒囘面正法不墮惡道亦師之不言之教也慕安等遂從其謀風神凝然愈久不壞見者謹畏如侍諸側余往年嘗居郡幕識師甚熟後復來權州事師則已化矣歸日枉道過邑詣師塔下旋遶瞻禮悲悼歎息雖然師之面目如生而師之語言已不聞矣嗚呼熈寧五年余知陵州師之孫慕真來詣余求文以銘師之塔余昔既聞道於師也辭將云何乃銘曰是身如浮雲倐生而忽滅形質本何有聚散俱為幻夫人而昧此演起無量法從一十百千乃至萬億兆譬如蚕吐絲纒縳身自獄既倮而復羽孳種無由斷出此而入彼輪迴豈知覺師有大智鏡初誰為磨拂光明發虚空淨無一塵染大曜滿法界欲照誰能執收斂付諸匣乃是所假者示現於世人師以願力故師之所非相真實不思議凡所見聞者依以為漸入由此登佛地其則固不逺書以吿諸後咸願起正信見文與可集師俗姓仇名惟已字亞休禪惠大師名山人屢舉不第元符間郡守吕由誠以僧勑戯之師即削髮明日往天寧為僧舊老叩以佛法不許乗馬師曰文殊駕獅子普賢跨象王新來一箇佛騎馬也何妨或問瓦屋道坊何以木皮葢師曰錦府豈從機上織劍門寧自匣中藏其機敏不一有禪惠語錄行世東坡寳月大師塔銘云寳月大師惟簡字宗古蘇氏眉山人於余為無服兄九嵗事成都中和勝相院慧悟大師十九得度二十九賜紫三十六賜號其同門友文雅大師惟慶為成都僧統所治萬餘人鞭笞不用中外肅伏慶博學通古今善為詩至於持律總衆酬酢事物則師密相之也凡三十餘年人莫知其出於師者師清亮敏達綜練萬事端身以律物勞已以裕人人皆高其才服其心凡所欲為趨成之更新其精舍之在成都與郫者凡一百七十三間經藏一盧舍那阿彌陀彌勒大悲像四塼橋二十七皆談笑而成其堅緻可支一世師於佛事雖若有為譬之農夫畦而種之待其自成不數數然也故余嘗以為修三摩鉢提者蜀守制使皆一時名公卿人人與師善然師罕見寡言務自却逺葢不可得而親疎焉喜施藥所活不可勝數少時瘠黒如梵僧既老而晳若復少者或曰是有陰德發於面壽未可涯也紹聖二年六月九日始得㣲疾即以書告於往來者勑其子孫皆佛法大事無一語私其身至二十二日集其徒問日蚤暮及辰曰吾行矣遂化年八十四是月二十六日歸骨於城東智福院之壽塔師少與蜀人張隠少愚善吾先君宫師亦深知之曰此子才用不減澄觀若仕當有立於世為僧亦無出其右者已而果然余謫居惠州其徒孫法舟實來請銘銘曰大師寳月古字簡名出趙郡蘇東坡之兄自少潔齊老而彌剛領袖萬僧名聞四方壽八十四臘六十五瑩然摩尼歸真于土錦城之東松柏森森子孫如林蔽芾其陰陸游别峯禪師塔銘云南山自長安秦中西南馳為嶓為岷東行紆餘起伏厯蠻夷中跨軼且千里然後秀偉特起為三峰摩星辰蓄雲雨龍蟠鳯翥是名峩眉山通義犍為二郡實在其下人鍾其氣為秀民傑士出而仕者固多以功業文章擅名古今至於厭薄紛華棄捐衣冠木食澗飲自放於塵垢聲利之外而不幸為人知不能遂其隠操亦卒至於光顯榮耀者如别峰禪師是也師名寳印字恒寂生惟龍游李氏子世居峩眉之麓少而竒警日誦千言然不喜在家迺從德山院清逺道人得度自成童時已博通六經及百家之説至是復從華嚴起信諸名師窮源探頥不高出同學不止論説雲興泉湧衆請主講席謝不可圓悟克勤禪師有嗣法上首安民號密印禪師説法於中峯道塲迺挈一笠往從之一日密印舉僧問巖頭起滅不停時如何巖頭叱曰是誰起滅師豁然大悟自是室中鋒不可觸密印恨相得之晩㑹圓悟自南歸成都昭覺乃遣師往省因隨衆入室圓悟舉從上諸聖㠯何法接人師舉起拳圓悟曰此是老僧用者孰為從上諸聖用者師即揮拳圓悟亦舉拳相交大笑而罷圓悟歎異曰是子他日必類我師留昭覺三年密印猶在中峰以堂中第一座致師師辭密印大怒曰我以法得人人不我傳尚何以説法為欲棄衆去衆惶恐亟趨昭覺羅拜致懇圓悟亦助之請始行道望日隆學者爭歸之雖悟印二師不能揜也久之南遊見溈山佛性奉福巖月菴果竦山草堂清皆目擊而契或以第一座留之師潛遯以免最後至徑山見大慧杲大慧問曰上座從何處來師曰西川來大慧曰未出劍門闗與汝三十棒了也師曰不合起動和尚時徑山衆千七百雖耆宿名衲以得棲笠地為幸顧為師獨掃一室堂中皆驚大慧南遷師亦西歸焉始住臨卬鳯凰山舉香嗣密印厯住廣漢崇慶武信東禪成都龍華眉山中巖復還成都住正法道既盛行士大夫亦喜從之遊築都不㑹菴松竹幽邃暇日名勝畢集聞師一言皆自謂意消稍或間濶輒相語曰吾軰鄙吝萌矣其道德服人如此俄復下峽抵金陵徙京口金山金山自兵亂後雖屢葺莫能成至是始復大興潭帥張公孝祥延以大溈山師與張公雅故念未有以郤而京口之人自郡守以降力爭之卒返潭使魏惠憲王牧四明虚雪竇來請師度不可辭乃入東凢住四年樂其山林有終老之意而名益重被敕住徑山淳熈七年五月也七月至行在所壽皇召入禁中以老病足蹇賜肩輿於東華門内賜食於觀堂引對於選德殿特賜坐勞問良渥師因舉古宿云透得見聞覺知受用見聞覺知不墮見聞覺知上悦曰此誰語師曰祖師皆如此提倡亦非别人語上為㣲笑時秋暑方熾師再欲起上再留使畢其説迺退後十餘日又命開堂於靈隠山中十年二月上製圓覺經注遣使馳賜且命作序師老益厭住持事門人相與築菴於山北今上在東宫書别峯二大字榜之紹熈元年冬十一月忽往見住山智䇿吿别䇿問行日師曰水到渠成歸取幅紙大書曰十二月七日夜雞鳴時如期而化奉蜕質返寺之法堂留七日顔色精明鬚髮皆長頂温如沃湯是月十四日葬於别峯之西崗壽八十有二臘六十有四得法弟子梵牟宗性道竒智周慧海宗璨等得度弟子智穆慧宗等百四十有七人有慧綽者山陰陸氏子當以蔭得官辭之從師祝髮上為敕有司定諡曰慈辯且名其塔曰智光説法數十年所至門人集為語錄三年三月法孫宗愿走山陰鏡湖屬游銘師之塔游與師交最久嘗相約還蜀結茅青衣喚魚潭上今雖老病義不可辭銘曰圓悟再傳是為别峯坐十道塲心法之宗淵識雄辯震驚一世矯乎人中龍也海口電目旄期稱道卓乎澗壑松也叩而能應應已能黙渾乎金鐘大鏞也師之出世如日在空升於暘谷不為生隠於崦嵫其可以為終乎按高僧傳師再出峽住保寧金山雪竇徑山開堂陞座曰世尊初成正覺於鹿野苑中轉四諦法輪憍陳如比邱最初悟道後來真淨禪師初出洞山拈云今日新豐洞裏秪轉個拄杖子遂拈拄杖着左邊云還有最初悟道者麽若無丈夫自有衝天志莫向如來行處行遂喝一喝下座若是印上座則不然今日向鳯凰山裏初無工夫轉四諦法輪亦無氣力轉拄杖子秪教諸人行須緩步語要低聲何故欲得不招無間業莫謗如來正法輪上堂三世諸佛以一句演百千萬億句收百千萬億句秪在一句祖師門下半句也無秪恁麽合喫多少痛棒諸仁者且道諸佛是祖師是若道佛是祖不是祖是佛不是取捨未忘若道佛祖一時是佛祖一時不是顢頇不少且截斷葛藤一句作麽生道大䖝裹紙帽好笑又驚人復舉僧問巖頭浩浩塵中如何辦主頭云銅砂鑼裏滿盛油師曰大小巖頭打失鼻孔或有人問保寧浩浩塵中如何辦主秪對他道天寒不及卸帽上堂六月初一燒空赤日十字街頭雪深一尺掃除不暇迴避不及凍得東村廖胡子半夜着靴水上立上堂將心除妄妄難除即妄明心道轉迂桶底趯穿無忌諱等閒一歩一芙蕖玉泉承皓禪師姓王氏眉州丹稜人依大力院出家受具後游方叅北塔發明心要得大自在三昧製犢鼻裩書厯代祖師名字乃曰惟有文殊普賢較些子且書於帶上故樷林目為皓布裩元豐間首衆於襄陽谷隠有鄉僧亦效之師見而詬曰汝具何道理敢以為戲事耶嘔血無及耳㝷於鹿門如所言而逝張無盡奉使京西南路就謁之致開法於郢州大陽時谷隠主者私為之喜師受請陞座曰某在谷隠十年不曽飲谷隠一滴水嚼谷隠一粒米汝若不㑹耒大陽為汝説破擕拄杖下座傲然而去㝷遷玉泉有示衆曰一夜雨霶烹打倒蒲萄棚知事頭首行者人力拄底拄撐底撐撐撐拄拄到天明依舊可憐生自賛云粥稀後坐窄床先卧耳聵愛高聲眼昏宜字大冬至示衆曰晷運推移布裩赫赤莫恠不洗無來換替僧入室次狗子在室中師叱一聲狗便出去師曰狗却㑹伱却不㑹師示疾門人圍繞師笑曰吾年八十一老死舁屍出兒郎齊著力一年三百六十日言畢而逝舒州龍門清逺佛眼禪師臨卭李氏子嚴正寡言十四圓具依毘尼究其説因讀法華經至是法非思量分别之所能解持以問講師講師莫能荅師嘆曰義學名相非所以了生死大事遂卷衣南游造舒州太平演禪師法席因丐於廬州偶兩足跌仆地煩懣閒聞二人交相惡罵諫者曰你猶自煩惱在師於言下有省及歸凡有所問演即曰我不如你你自會得好或曰我不㑹我不如你師愈疑遂咨決於元禮首座禮乃以手引師之耳繞圍爐數帀且行且語曰你自㑹得好師曰有兾開發乃爾相戲耶禮曰你他後悟去方知今日曲折耳太平將遷海㑹師慨然曰吾持鉢方歸復叅隨往一荒院安能究決已事耶遂作偈告辭之蔣山坐夏邂逅靈源禪師日益厚善從容言話間師曰比見都下一尊宿語句似有緣靈源曰演公天下第一等宗師何故捨而事逺遊所謂有緣者葢知解之師與公初心相應耳師從所勉徑趨海會後命典謁適寒夜孤坐撥爐見火一豆許恍然自喜曰深深撥有些子平生事只如此遽起閲几上傳燈錄至破竈墮因緣忽大悟作偈曰刁刁林鳥啼披衣終夜坐撥火悟平生窮神歸破墮事皎人自迷曲淡誰能和念之永不忘門開少人過圓悟因詣其寮舉青林般土話驗之且謂古今無人出得你如何會師曰也有甚難悟曰秪如他道鐵輪天子寰中㫖意作麽生師曰我道帝釋宫中放赦書悟退語人曰且喜逺兄便有活人句也自是隠居四面大中菴屬天下一新崇寧萬壽寺舒守王公渙之命師開法次補龍門道望尤振後遷和之褒禪樞密鄧公洵武奏賜師紫衣上堂臺山路上過客全稀破竈堂前感恩無地雪埋庭栢氷鎖偃谿雖在南方火爐頭不入他家韲甕裏㸔㸔臘月三十日便是孟春猶寒你等諸人各須努力向前切忌自生退屈上堂卓拄杖曰圓明了知不由心念抵死要道墮坑落塹畢竟如何乃倚拄杖下座上堂千説萬説不如親面一見縱不説亦自分明王子寳刀喻衆盲摸象喻禪學中隔江招手事望州亭相見事逈絶無人處事深山巖崖處事此皆親面而見之不在説也上堂蘇武牧羊辱而不屈李陵望漢樂以忘歸是在外國在本國佛諸弟子中有者雙足越坑有者聆箏起舞有者身埋糞壤有者呵罵河神是習氣是妙用至於擎叉打地竪拂敲床睦州一向圎門魯祖終年面壁是為人是不為人信知一切凡夫埋没寳藏殊不丈夫諸人何不能擺柂張帆抛江過岸休更釘樁揺艣何日到家既作曹溪人又是家裏漢還見家裏事麽師嘗題語於龍門延壽壁間曰佛許有病者當療治容有將息所也禪林凡有數名或曰湼槃見法身常住了法不生也或曰省行知此違緣皆從行苦也或曰延壽欲得慧命扶持色身也其實使了人生死處多見少覺㣲恙便入此堂不強支吾便有補益及乎久病思念鄉閭不善退思滅除苦本先聖云病者衆生之良藥若善服食無不瘥者宣和初以病辭歸蔣山之東堂二年書雲前一日飯食訖趺坐謂其徒曰諸方老宿臨終必留偈辭世世可辭耶且將安往迺合掌怡然趨寂門人函骨歸龍門塔於靈光臺側嘉州九頂清素禪師本郡郭氏子於乾明寺剃染徧扣禪扄晩謁五祖聞舉首山荅西來意語倐然契悟述偈曰顛倒顛顛倒顛新婦騎驢阿家牽便恁麽太無端囘顧不覺布衫穿祖見迺問百丈野狐話又作麽生師曰來説是非者便是是非人祖大悦久之辭歸住清溪次遷九頂太守吕公來瞻大像問曰既是大像因甚麽肩負兩楹師曰船上無散工至閣下覩觀音像又問彌勒化境觀音何來師曰家富小兒嬌守乃禮敬紹興乙夘四月二十四日得㣲疾書偈遺衆曰木人備舟鐵人備馬丙丁童子穏穏登喝散白雲歸去也竟爾趨寂嘉州志云九頂寂惺禪師有僧問心迷法華轉心悟轉法華是何意㫖師曰風煖鳥聲碎日高花影重昔日雲門有三句禪謂函葢乾坤截斷衆流隨波逐浪也九頂亦有三句謂饑來喫飯寒即向火困來打睡也蜀中廣記卷八十五
