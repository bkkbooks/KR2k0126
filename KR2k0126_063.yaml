body:
  text: 蜀中廣記卷六十三明曹學佺撰方物記第五荔枝蜀都賦曰旁挺龍目側生荔枝布緑葉之萋萋結朱實之離離迎隆冬而不凋常曄曄以猗猗南齊孔稚圭謝賜生荔枝啓曰緑葉雲舒朱實星映離離昔聞曄曄今睹信西岷之佳珍諒東鄙之未識也華陽國志江州縣有荔枝園至熟二千石常設厨膳命士大夫共會樹下食之南裔志曰龍眼荔枝出朱提南廣縣犍為僰道縣隨江東至巴郡江州縣往往有荔枝樹高五六丈常以夏生其實赤可食龍眼似荔枝其實亦可食方輿云學士山在石照縣東五里直郡治之江樓山西北張氏有荔枝異本合幹唐文若曲端嘗賦之焉寰宇記涪州縣地頗産荔枝其味尤勝嶺表相傳城西十五里有妃子園多荔枝當太真時以馬遞馱載七日夜至京人馬多斃於路百姓苦之故杜牧之過華清宫詩云長安回望繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔枝來又朝説之詩荔枝一騎紅塵後便有漁陽萬騎來謂此也然蜀中荔枝瀘敘之品為上涪州次之合州又次之涪州徒以妃子得名其實不如瀘敘耳涪州圖經云州至長安有便路不七日可到昔宋景文作方物略言荔枝生嘉戎等州以去長安差近疑即為妃所取蓋不知涪有妃子園又自有便路也按蜀志補云高都山在梁山縣北山中民以種薑為業有古驛路乃天寶貢荔枝所經也郡國志云僰人在施夷中最仁古所謂僰僮之富多以荔枝為業園植萬株歲收百五十斛敘州圖經云荔枝廳即倅廳有名萬朵紅最為佳品又一本在尉廳一株四柯西南一柯獨肉厚而味甘又云峯巖在宜賔西百里山坡荔枝連袤多屬廖氏宋時此州因出荔枝煎老學菴云遊參成都議幕攝事漢嘉及見荔子熟時凌雲山安樂園皆盛處糾曹何豫元立法曹蔡逮肩吾皆佳士日與槃桓憶唐薛許昌亦嘗以成都幕來攝郡未久罷去故其荔枝詩曰歲杪監州曽見樹時新入座但聞名蓋恨不及時也每與二君誦之而為致慨杜甫詩憶過瀘戎摘荔枝青楓隱映石逶迤京華應見無顔色紅顆酸甜只自知又詩草閣柴扉星散居浪翻江黑雨飛初山禽引子哺紅果溪女得錢留白魚張籍詩錦江近西煙水緑新雨山頭荔枝熟萬里橋邊多酒家遊人愛向誰家宿鄭谷詩二京曽見畫圖中數本芳菲色不同孤棹今來巴徼外一枝煙雨思無窮夜郎城近含香瘴杜宇巢低起暝風腸斷渝瀘霜霰薄不教葉似灞陵紅又平昔誰相愛驪山遇貴妃枉教生處逺愁見摘來稀曉奪江霞色晴欺瘴日威南荒何所戀為爾即忘歸白傅種荔枝詩紅顆珍珠誠可愛白鬚太守亦何癡十年結子知誰在自向庭前種荔枝又荔枝樓對酒詩荔枝新熟雞冠色燒酒初開琥珀香欲摘一枝傾一盞西樓無客共誰嘗又題郡中荔枝寄楊萬州云竒果標南土芳林對北堂素華春漠漠丹實夏煌煌葉捧低垂户枝擎重壓牆始因風弄色漸與日爭光夕訝條懸火朝驚樹點粧深於紅躑躅大較白檳榔星綴連心朵珠排耀眼房紫羅裁襯殼白玉裹填瓤早歲曽聞説今朝始摘嘗嚼疑天上味嗅異世間香潤勝蓮生水鮮逾橘得霜胭脂掌中顆甘露舌頭漿物少尤珍重天高若渺茫已教生暑月又使阻遐方粹液靈難駐妍姿嫩易傷近南光景熱向北道途長不得充王賦無由寄帝鄉唯君堪擲贈面白似潘郎又重寄荔枝與楊使君時聞使君欲種植故落句戲之云摘來正帶凌晨露寄去須憑下水船映我緋衫渾不見對公銀印最相鮮香連翠葉真堪畫紅透青籠實可憐聞道萬州方欲種愁君得喫是何年又荔枝圖序云荔枝生巴峽間樹形團團如帷蓋葉如冬青花如橘而春榮實如丹而夏熟朵如蒲桃核如枇杷殼如紅繒膜如紫綃瓤肉潔白如氷雪漿液甘酸如醴酪大略如彼其實過之若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣蔡君謨譜云荔枝之於天下唯閩粵南粵巴蜀有之漢初南粵王尉他以之備方物於是始通中國司馬相如賦上林云答遝離支蓋夸言之無有是也唐天寶中妃子尤愛嗜涪州歲命驛致時之詞人多所稱詠張九齡賦之以託意白居易刺忠州既形於詩又圖而序之雖髣佛顔色而甘滋之勝莫能著也洛陽取於嶺南長安來於巴蜀雖曰鮮獻而傳置之速腐爛之餘色香味之存者亡幾矣是生荔枝中國未始見之也今廣南州郡與夔梓之間所出大率早熟肌肉薄而味甘酸其精好者僅比東閩之下等趙清獻詠提刑邢夢臣度支連理荔枝詩嘉陽天逺被薰風荔子呈祥郡館中庇本莫將慈竹較媚時寧與瑞蓮同並柯晝聳煙光動異幹霄空月影通竒木幸逢真賞筆誰誇丹實一庭紅文與可謝任瀘州師中寄荔枝詩有客來山中云附瀘南信開門得君書歡喜失鄙吝筠籢包荔子四角具封印童稚瞥聞之羣來立如陳競言此佳果生眼不識認相煎求拆觀顆顆紅且潤衆手攫之去爭奪遞追趂貪多乃為得亷恥曽不論喧閙俄頃間咀嚼一時盡空餘皮與核狼籍入煨燼黃魯直次韻李任道食荔枝有感三首一錢不直程衛尉萬事稱好司馬公白髮永無懷橘日六年怊悵荔枝紅今年荔子熟南風莫愁留滯太史公五月照江鴨頭緑六月連山柘枝紅舞女荔枝熟雖晚臨江照影自惱公天與蹙羅粧寶髻更挼猩血染殷紅天社任淵云山谷有戎州鎖水磨崖留題云元符三年五月戊寅太守劉廣之率賔僚來賞鎖江荔枝此詩當同時所作曰六年怊悵者自紹聖二年至是凡六見荔枝矣又詩王公權家荔枝緑廖致平家緑荔枝試傾一杯重碧色快剝千顆輕紅肥潑醅蒲萄未足數堆盤馬乳則同時誰能兼此勝絶味唯有老杜東樓詩又詞憶昔謫巴蠻荔子親攀冰肌照映柘枝冠日擘輕紅三百顆一味甘寒重入鬼門關也似人間一雙和葉插雲鬟賴得清湘燕玉面同倚欄干右調挂金索又謝曹使君伯達書伏承手誨分惠荔子色香動人眼鼻誠與山煙溪露俱來乃知夔峽荔枝尤勝嶺南珍香眷與之意無以為喻也元古杭徐昌緑荔亭記云敘南之西安邊里有銅山銅山巨族為廖氏其先世徙自蜀郡詩書行義為鄉人所敬交遊婚媾率顯者也家有荔枝兩株莫究所自植古老相傳約百數十年物其盤骫偃蹇凌霄漢蔽日月就下屚望之蒼然如垂天之雲傍有一亭夏暑煽爐實熟葉密香聞數里廖氏耆耋以其暇率族人聚樂其間布席列俎折實於盤少者以次奉觴為壽畢則拱侍聽長者之訓歡洽之至禮度不踰然世雖有荔枝未有實緑而味甘者逮宋太史黃公食之驚異而有廖致平家緑荔枝之句今尚見於豫章集中鄉里因名其亭曰緑荔廖君樞童稚時與豫同學京師今皆將五十矣持譜求豫為斯亭記余見其歷世宦學相承治行尤著斯亭殆將有聞於逺哉廖之後世子孫其尚培而葺之於無窮可也按志亭在敘府西六十里徐為中善左丞方物略云隈枝生卭州山谷中樹高丈餘枝修弱花白實似荔枝肉黃膚甘可食大若爵卵贊曰挺幹既修結花滋白戟外澤中甘可以食魏鶴山萬州魯池觀荔枝詩曰分隨猿鶴老隈枝趨詔重來兩鬢絲邂逅一觴莫辭醉能禁二十載差池則荔枝亦可以名隈支矣梅唐張説正朝折梅詩蜀地寒猶暖正朝發早梅偏驚萬里客已復一年來時奉使在蜀也杜甫答裴迪登蜀州東亭送客逢早梅相憶見寄詩東閣觀梅動詩興還如何遜在揚州此時對雪遙相憶送客逢春可自由幸不折來傷歲暮若為看去亂鄉愁江邊一樹垂垂發朝夕催人自白頭子美亦好種梅于江岸草堂間東坡詩云拾遺被酒行歌處野梅官栁城西路當時猶及見之趙閲道於鈐兵王閣使素芳亭賞梅詩素蕚清香並酒巵主人勤意囑留詩為逢蜀國新開日却憶江南舊賞時春密未通桃李信臘殘都放雪霜姿先公舊植亭欄外肯構重來見本枝公又於鈐兵李左藏廳賞梅詩曰歲晏珍林發素葩樽前竒賞著詩誇驚逢臘去已三日喜見春初第一花照水冷容酥點綴搖風香片雪紛拿主賔莫作尋常看錦里名園只兩家注云成都此花惟東西鈐廳為盛也黃山谷戎州與人帖昨日市中已見臘梅開者數枝矣有詞曰疏蘂幽香禁不過晚寒愁絶那更是巴東江上楚山千疊欹帽間尋西瀼路嚲鞭笑向南枝説恐使君歸去侍鑾坡孤風月青鏡裏悲華髮山驛外溪橋側悽然回首處鳯凰城闕憔悴如今誰領略飄零已是無顔色問行厨何日喚賔僚猶堪折右調滿江紅自注與夔州崔三伯禮侍御同作偽蜀王建梅苑有一老梅其大可庇一畝屈盤如龍豫訪之亦在草堂之西四十年前此梅尚在而今亡矣宋馮時行梅林分韻詩即此梅也序云紹興庚辰十二月既望縉雲馮時行從諸朋舊凡十有五人攜酒具出西梅林林本王建梅苑樹老其大可庇一畝中間風雨剝裂仆地上屈盤如龍孫枝叢生直上尤怪古者凡三四酒行以舊時愛酒陶彭澤今作梅花樹下僧為韻分題賦詩客既占韻立者倚樹行者環繞仰者承薌俯者拾英吟態不一皆可圖畫是行也余被命造朝行事薄遽重以大府衣冠謁報主人饋勞酬對奔馳形神為之俱敝諸公導以斯遊江流如碧玉平野秀潤竹塢桑疇連延彌望民家十十五五籬落雞犬比閭相親不愁不嗟余散䇿其間蓋不知向之疲薾厭苦所在也昔人謀于野則獲間暇清曠有爽於精神思慮遊不可廢如此哉又况所與遊皆西州名俊喜事者耶詩成次第不以長少以所得韻之後先聮成軸客十有五韻止十四吕義父别以詩字為韻又有首眩詩不成者缺樹字一韻余過沈犀樊允南監鎮稅語允南補之諸公又屬時行為之序十五人者成都楊仲約施子一吕周輔義父智父澤父宇文德濟吕默夫杜少訥房仕成楊舜舉綿竹李無變潼川于伯永正法寶印老云楊仲約得舊字竹村喜紆徐江雲迷昏晝踟蹰馬上語嫩寒入衣袖天公惜梅花破臘開未就端待使君來春風本依舊一尊既相屬勿辭作詩瘦明年用和羮請為使君壽李流謙得時字巾冠墮城府桔橰無停時胸脾貯黃埃非復林壑姿涎流方外勝秦人望軒羲萬金買間日駕言一舒眉冒踏衆俊場更從百代師食魚得河魴熊蹯佐其滋靉靉煙雨村霜條出冰㽔烏鵲噪寒暝玉立山差差置尊扶踈下老幹虬蛟馳落蘂不動塵初無犀駭雞羞我木石姿鬬公瓊琚詞深酌起自勸滕莒吾封圻公行對宣溫雲霧生攀躋能來玩墟落匹馬却蓋麾蟠胸萬螮蝀區寰眇毫絲以兹接羣動白羽坐指撝笑彼豢外者組紱為之鞿它年駟馬還梅花當十圍識此黃公壚下車挽客衣未覺邈山河一醉也大竒吕及之得愛字去城十里南郊外突兀老梅餘十輩玉雪為骨冰為魂氣象不與凡木對我來窮冬煙雨晦把酒從公對公酹人言此實升廟堂埋沒荒村今幾歲清芳不為無人改捐棄何妨本根在瑰章妙語今得公國色天香真有待歸路從公巾倒戴俗物汚人非所愛我公行向日邊歸此段風流入圖繪宇文師獻得酒字平生慕英遊望公真山斗一見開心誠已落諸人後龍門豈甄擇大小俱容受聮轡尋勝踐春風倚尊酒惟公對江梅端若同志友玉色洗塵沙幽姿出藜莠命客花下坐相與沃醇酎非公無此客譬諸草木臭向晚入深巷蒼根欹甕牖始知水西頭卧梅勝卧栁有客三嘆息此樹警老醜一笑客誠癡萬法要經久竒卉如尤物過眼不必有惠我終日香重來香在否但從此理悟那復長搔首念公捧召節修名當不朽艤舟未忍去招尋訪林藪中心湛虛明外慕厭紛糾杖屨循古岸細話猶開誘再拜誦公詩一洗芻豢口楊大光得陶字蟠根寄荒絶擢幹空橚槮鄉來聞妙語剪拂到兒曹垂老猶叵堪開落幾徒勞不謂勤杖屨惠然排蓬蒿尚能領諸生相就醉澄醪真賴旁輝映併覺標韻高酒闌興未已分韻看揮毫籍湜俱可人冥搜爭過褒乃知天地間一等為賢豪橫飛與陸沈亦各係所遭再煩起窮邊國柄行當操盡期如此花曉夕幸甄陶得備和羮用寧不出伊咎百年幾春風勿令心忉忉于格得彭字庭柯卧蒼虬閲世如𥅆彭朔風破檀蘂零露滋玉英江空人響絶影落千丈清今代文章籙縉雲主齊盟躍馬覘春色觴客江上亭三嗅韻勝華霜霰飽曽經及時剝其實可用佐大烹幸因輶軒使錫貢充廣庭王明儻豫燭和羮登簋鉶僧寶印得澤字江路歲崢嶸酸風更蕭瑟發興訪梅花主盟得詩伯孤芳有餘妍初不帶脂澤香度竹籬短影搖溪水碧同時飲中仙著我林下客春槽沸滴紅滿坐喧舉白澆胸獨茗碗臭味曽不隔公今日邊去陛下正前席請看枝頭春中有和羮實反騷試與提不礙心鐵石楊舜舉得今字蘭亭久陳迹修竹空自隂龍山亦凄涼鮮花誰與簮英遊曠千載盛事新梅林四海馬黎州未妨鐵石心提攜到諸子遍賞江之潯房亭姑射仙玉立何森森謝氏六君子對飲香滿襟西鄰訪老龍竒怪尤可欽宛然如先生高卧歲月侵從兹飽薰風佳實共鼎􅑄正味悅天下妙用無古今去去好著鞭江南春已深吕商隱得作字一樹知獨秀十里方出郭江流浩清泠露氣凝凄薄胡為此行色疲馬亦踴躍玄冥正擅令植物困搖落身心縱未改佳意久已惡喜見南北枝粲然秀􅖅壑千林色輝映百畝香旁礴首破春風荒獨傲清雪虐坐令芳信傳芬菲到羣蕚如一君子信茹連俱有託相期飲此意浩蕩放柸酌更應護攀拗嘉實須若若終收調鼎功傅巖真可作持問縉雲老一尊笑相酢馮時行得梅字霜朝馬蹄無纎埃錦城城西江之隈金蘭合沓俱朋來白沙𥻘𥻘江水洄梅花傍江高崔嵬人言猶是王建栽豪華過眼浮雲哉下馬酌酒聊徘徊飛英送香來酒杯酒酣疾呼竹籬開走尋屋角如龍梅梅龍雖多此其魁睡龍屈盤肘承胲風皴雨皵封蒼苔孫枝迸出誰胚胎天公撫摩春為回慎勿變化隨風雷年年開花照尊罍我欲結茅買芋煨與梅周旋送衰頽吕凝之得花字出郭豈憚逺滿城無此花新枝開玉雪老樹卧龍蛇臨冰互蔥蒨傍籬忽橫斜詩聲寫竒怪畫本出槎牙老子晉彭澤諸公賈長沙不尋桃李盟來嗅霜露華杖屨穿茒舍壺觴倩酒家飢餐香馥郁醉藉影參差月白雁成字江清魚可義風流一時勝野意十倍加秪恐天上去迹陳錦江涯歸來馬蹄疾驚飛滿林鴉樊廣漢曰沈黎使君與客飲王建梅林分韻作詩過沈犀以詩相示闕樹字令廣漢補之云牆頭冉冉新陽露忽作玲瓏玉千樹老蛟偃蹇獨避人卷回飛雪江臯暮何處鳴禽來好音四月枝垂起黃霧摧折霜餘初不懼笑看春光等間度百年夢幻欲無言吹落吹開豈風故時來薦鼎真偶爾小住疏籬非不遇我知天意絶茫茫無為展轉獨多慮為花悽斷却回頭爾亦微酸苦難茹施晉卿得下字郊原宿雨餘雪重雲垂野春信初動搖欲往豈無駕使君早著鞭問路逢耕者深尋煙雨村共作詩酒社庭荒六老樹氣象自儼雅一笑呼酒來大盆注老瓦最後看枯株何意當大厦夭矯待風雲有年天實假須知羮鼎調嘉實係用捨我欲壽使君樽罍更傾瀉明朝得楚騷健甚無屈賈君今有賜環詔落九天下蜀江雪浪來棹趂船人把留滯以諸生斯文要陶冶惟應郢中歌倡絶和自寡更聞督熊兒夜賦燭餘灺它年看無雙聲譽出江夏却笑昌黎公阿買字能寫張積曰馮先生訪梅于成都西郊同遊十五人分韻哦詩而積不與翊日先生分僧字屬積作之云春回九地陽潛升南枝破臘如酥凝疏籬度香竹梢短寒沙倒影溪流澄魁然老株忽駭目雪鱗矯矯雙龍騰天公一叱因仆地掀髯弄爪高曲肱長林望斷千百株奮首直欲青雲凌黎州太守和羮手十里往看車呼登西江破曉郊路淨盍簪者誰金蘭朋歡笑藉草飛大白行厨載酒多於澠風花飄搖落杯面漱齒澆􅎍如嚼冰湘流之清峴山瘦千古邂逅一笑興却踏東風急回首侵夜霜月寒生稜入門未坐亟相詫曰今見之生未曽成都勝事多四蜀我欲問津雲水僧先生功成早丐身未老重來醉倚藤吕宜之得詩字寒梅如高人冰雪凜風期霜威凌萬木孤芳綴疏枝古來歲寒心肯與時節移家家浣溪南橫斜映疏籬老樹更崛竒矯矯蛟龍姿中有調鼎味幾年江之湄征衫十里寒霜蹄快追隨先生羊叔子到處英名垂對花有妙想豪氣無百巵興來屬湛輩同出春容詩潼川楊甲臘日遊梅龍以雪後園林才半樹為韻得樹字年年看梅水西路白頭溪翁眼如故重來笑龍老不死我亦風埃憶歸去酒酣百怪入我腸夜半恍惚與龍遇醉騎一尾天上歸陳迹江頭不知處梅花勸汝一杯酒千歲一寒真旦暮欲將老大要風雪穴蟻窠蟲已無數成都萬事更竒古石笋猶疑卿相墓孔明廟前柏千尺神物翛翛泣幽樹它時滅壞亦同趣人生誰能一長顧浮雲天地不須論但願人間有詩句庚寅再遊詩云霜郊馬頭鞭影西欲尋逺梅無舊蹊但聞草木皆有香未到已識花前溪艤舟登岸入梅處竹樹煙火茅茨低百年死樹蟲蘚暗鱗甲漠漠僵橫霓老翁鼻祖頭雪白下見兒女方勝笄數株無力已仆地強起放春花滿畦瘦龍夭矯欲仙去脊尾一半埋沙泥雷公幾時獵幽蟄夜半刀斧來刳刲野人往往多再拜疑有鬼物憑其栖問樵訪牧不知歲髫齓已見今耄倪故人同遊六七輩或似醉阮林中嵇繞樹覔花不識路東邊犬吠西號雞榼中但有酒清濁寒具野擔勤攜齎引之各各坐香樹醉中採擷欲滿提誰言猶是蜀梅苑破丘斷壟生高藜種花滿地作癡計隨手變化空塵翳只餘老樹香不滅力戰風雨猶堅犀云何身稿心尚在花氣鬱鬱連雲霓但印此香可飲酒笑取身世如稗稊竹寒沙碧夜來語回首千載餘幽題榮枯過眼如一夢世網忽挂如牢狴何時江村一曲路與子共賦歸來兮陸放翁曰成都城南有故蜀主宣華苑多梅皆百餘年物也作詞云斜陽廢苑朱門閉弔興亡遺恨淚痕裏淡淡宫梅也依然點酥翦水凝愁處似憶宣華舊事行人别有凄涼意折幽香誰與寄千里佇立江臯杳難逢隴頭歸騎音塵逺楚天危樓獨倚又詩云十里溫香撲馬來江頭逺見去年梅喜開剩欲邀明月愁落先教掃緑苔跌宕放翁新醉墨凄涼廢苑舊歌臺盛衰自古無窮事莫向昆明歎劫灰又於浣花溪賞梅詩老子人間自在身插梅不惜損烏巾春回積雪層冰裏香動荒山野水濵帶月一枝低弄影背風千片逺隨人石家樓上貪吹笛肯放朝朝玉樹新又看梅歸馬上作詩云本為梅花判獨飲却嗔梅花消宿酲日欲落時始上馬青羊宫前聞發更范石湖在成都雨後東郭排岸司申梅開及三分戲書小絶令一面開燕詩云雨入南枝玉蘂皴合江雲冷凍芳塵司花好事相邀勒不著笙歌不肯春又西郊尋梅詩西郊梅花矜絶豔走馬獨來看不厭似羞流落蒙市塵寧墮荒寒傍茅店翛然自是世外人過去生中差一念淺顰常鄙桃李學獨立不容鶯蝶覘山􅈨水仙晚角出大是春秋吳楚僣餘花豈無好顔色病在一俗無由砭朱欄玉砌渠有命斷橋流水君何欠嗟豫相與頗同調身客劒南家在剡凄涼萬里歸無日蕭颯二毛衰有漸尚能作意晚相從爛醉不辭杯瀲灩又於合江亭隔江望瑤林莊梅盛開過江訪之馬上哦詩云何處春能早疏籬浪激湍竹間煙雪迥馬上晚香寒喚渡聊相覔巡簷得細看極知含雨意未許日烘殘竹揚雄蜀都賦其竹則鍾龍䇣野篠棼鬯宗生族攢俊茂豐美夾江緣山尋卒而起若此者方乎數十百里左思賦云卭竹緣嶺又云卭杖傳節於大夏之邑山海經云卭崍山出卭竹杖又云卭都高節竹可為杖所謂卭竹也拾遺録云老子當周之末居山與世人絶迹惟有黃髮友五人手杖青笻之杖出入室中與老子談漢書張騫使大夏時見卭竹杖問所從來曰從東身毒國可數千里得蜀賈人市之蜀記曰騫奉使尋河源得高節竹植於卭山號曰卭竹今緣山皆是可為杖矣戴凱之竹譜曰卭竹高節實中狀如人剡俗謂之扶老竹山海經補注云龜山多扶竹卭竹也高節實中中杖亦名扶老竹歸去來詞䇿扶老以流憩即此晉王右軍與周益州書去夏得足下致卭竹杖皆至此土人多有尊老者皆即分布令知足下逺惠又云周益州送此卭竹杖鄉尊長或須今送亦取扶老之意也晉蘇彥卭竹杖銘曰安不亡危任在所杖秀矣雲竹徑直篠簜節高質貞霜雪彌亮圓以應物直以居當巧妙無功竒不待匠君子是扶逍遙神王傅咸卭竹杖銘曰嘉兹竒竹質徑體直立比高節示世矜式北周庾開府卭竹杖賦云沈冥子遊巴山之岑取竹于北隂㛹娟高節寂歷無心霜風古色露染斑深每與龍鍾之族幽翳沈沈文不自殊質而見賞藴諸鳴鳯之律制以成龍之杖拔條徑直璘斌色滋和輪人之不重待羽客以相貽青春欲暮白雲來遲謀于長者操以從之執末而獻無因自持諸蔗雖甘不可以倚彼藜雖實不可以美未若處不材之間當有用之始魯分以爵漢錫以年昔尚爾齒今優我賢書橫几玉塵筵函之以後拂之以前爾其摘芳林沼行樂軒除間尊卑之垂悅隨上下之遊娛夫寄根江南渺渺幽潭傳節大夏悠悠廣野豈比夫接君堂上之履為君座右之銘而得與綺紳瑤珮出芳房于蕙庭哉宋黃庭堅笻竹杖贊云厲亷隅而不劌故竊比於彭聃之壽屈曲而有直體能獨立於雪霜之後伯夷食薇而清陳仲咽李而瘦涪翁晝寢蒼龍挂壁涪翁履危心如鐵石窮山獨行解兩虎爭終不使卞莊乘間而孺子成名又笻竹杖頌云偉卭崍之美竹初發迹於牂柯有山而不險有水而無波金聲而玉節故貫四時而不改其柯郭子遺我扶余澗阿坐則倚胡牀棐几行則隨青笠緑蓑吾衰也久矣視爾畏友豫琢豫磨百世以俟聖人而不惑則涪皤不負笻竹危而不扶顛而不持惟卭竹之負涪皤也巴國志竹木之璝則有靈壽桃枝桃枝竹屬也竹譜云桃枝竹皮滑而黃可以為席今渝瀘合三州有桃竹簟即此物杜甫桃竹杖贈章留後詩江心蟠石生桃竹蒼波噴浸尺度足斬根削皮如紫玉江妃水仙惜不得梓潼使君開一束滿堂賔客皆歎息憐我老病贈兩莖出入爪甲鏗有聲老夫復欲東南征乘濤鼓枻白帝城路幽必為鬼神奪拔劒或與蛟龍爭重為告曰杖兮杖兮爾之生也甚正直慎物見水踴躍學變化為龍使我不得爾之扶持滅迹於君山湖上之青峯噫風塵澒洞兮豺虎咬人忽失雙杖兮吾將曷從益州方物略云慈竹性叢産根不外引其密間不容笴笋生夏秋閲歲枝葉乃茂别有數種節間容八九寸者曰籠竹一尺者曰苦竹篛稍垂地者曰釣絲竹或取節修膚緻者用為簟笠贊曰根不他引是得慈名中實外堅筍不時萌末或下垂苒弱緣縈元微之和東川李相公十二韻詩慈竹不外長密比青瑤華矛攢有森束玉立無蹉跎纎粉妍膩質細瓊交翠柯亭亭霄漢近靄靄雨露多冰碧寒夜聳簫韶風晝羅煙含朧朧影月泛鮮鮮波鸞鳯一已顧燕雀永不過幽姿媚庭實皓氣爽天涯峻節高轉露貞筠寒更佳託身仙壇上靈物神所呵時與天籟合日聞陽春歌應憐孤生者摧折成病痾唐吳筠慈竹賦云廣漢山谷有竹名慈生必向內示不離本修莖巨葉攢根沓柢叢之大者或至百千株而縈結踰乎咫步好事君子徙為瑎庭之玩焉吁嗟非此土所有乃有厭流俗之譏動鄉關之思者蓋撫高節而興感覽佳名而思歸遂為賦曰有竹猗猗生于髙陂左連瑤帶右雜瓊枝恨幽客之方賞嗟君侯之不知徙蔚丹谷遷榮緑池氣凜凜而猶在色蒼蒼而未離屈巖壑之容貌充階庭之羽儀爾其劃地分域駢隂抗趾疊幹龍回攢根鳯峙防碧落於霄末翳紅光於夕始崇柯振而煙靄生繁葉動而風飇起擁涼砌之晨肅屏炎扄之晝滓至若白藏載謝玄英肇切塞北河堅江南地裂觀衆茂之咸悴驗貞輝之獨潔抽徑緑以垂霜總嚴青而負雪蓋同類之常稟非殊方之異節若乃宗生族茂天長地久萬柢爭盤千株競糾如母子之鈎帶似閨門之悌友恐孤秀而成危每羣居而自守何美名之天屬而和氣之冥受嗟乎道之存矣物亦有之不背仁以貪地不藏節以遁時故其貞不自炫用不見疑保夷險之無易哂榮枯之有期俄蓬轉於岷徼遂萍流於江汜分兄弟於兩鄉隔晨昏於萬里撫貞容而骨愧伏嘉號而心死庶因感而長懷遂䇿情而勵已唐喬琳慈竹賦云維竹稱慈幾乎有知九族敦敘孝友威儀是竹必滋五服相殘骨肉攜離是竹必衰茍自家而刑國亦觸類而增思苯䔿固護檀欒櫛比如束之稠如插之密徑節中聳攢根內實聲唯戛風影不透日類宗族之親比同朋友之造膝至若暮歲窮律霜凝雪霏陶鈞無發生之理松柏有後凋之期是竹也叢篁劈開牙筍怒長紫籜連披青筠紛上有偕老之情感饋親之養如受制於籬界不旁侵於土壤雨露之澤謝爾衆芳細葉未吐貞心已長恥高標而迥出斯裊曲而不揚匪趨時於律候寧隨韻於笙簧保無用而以道自將愧不才而與物俱昌茍成隂於隙地作盛景之清涼重曰夫綿綿瓜􅚩兮知有子母雍雍鴻鴈兮如次弟兄於家則疏附禦侮於國則磐石維城田氏不分庭之荆陳家則應天之星莫不鬱映棠棣急難鶺鴒斯竹也共根連茹一本千莖年深轉密歲晚彌榮一可以厚骨肉一可以敦友生於靈臺而莫非信性彰慈孝而感通神靈吳曽云國初樂史子正慈竹詩數十韻首云蜀中何物靈有竹慈為名一叢濶數步森森數十莖高低相倚賴渾如長幼情余按任昉述異記南中生子母竹今之慈竹也乃知不獨蜀中杜少陵從韋二明府續處覔綿竹三數叢詩華軒藹藹他年到綿竹亭亭出縣高江上舍前無此物幸分蒼翠拂波濤黃魯直對青竹賦云余楚産也閲東南之竹多矣未嘗聞對青竹者也嘉州僧從之苞封見貽藝之而成乃初識之惟範圍之內有知之物一無窮無知之物一無窮一耳一目不能遍攬也况六合之外者乎感而賦之云爾竹之美於東南以節不以文也其在楚之西鬱鬱蔥蔥連山繚雲也會稽之竒材任矢石蘄春之澤夏簟簫笛沅湘淚血卭崍高節慈竹相守孝竹冬茁慈姥嶰谷笙竽笆篁長石之山一節可航猶未極其瑰怪不常也故吳楚無竹工非無竹工婦能織緝之器兒能雞鶩之籠也今夫筥筐籝笲榱􅎉翰藩巴船百丈下漢為笪貴之則律吕汗簡賤之則箕帚蒸薪唯所逢遭盡於斧斤美哉斯竹黃質墨章如出杼軸織文自當解甲稅枯金碧其相歲寒在躬又免斫烹彼其文章之種性不可致詰刳心而求之不可得劚根而求之不可得匪人匪天有物有則惟其與蓬蒿共盡而無憾余亦不知白駒之過隙按長春競辰稿此竹謂之黃金嵌碧玉云益州方物略云方竹者圓衆方寡而方者最貴差少贊曰竹箇皆圓此獨方形厚倍于竅緗節稜稜又云紫竹蜀諸山中尤多園池亦種為玩然生二年色乃變三年而紫贊曰竹生三歲色乃變紫伐幹以用西蜀之美梁天監起居注云十六年連理竹生益州郫縣王家園外連理並幹涪州志黃葛峽有相思崖昔有童子丱女相悅交贈今竹有桃叉之形笋有柔麗之異崖曰相思崖竹曰相思竹嘉州志産月竹月生笋故名淳熙十一年十二月夔州帥永嘉劉公猶子某夜夢庭生瑞竹旦起見問道堂之東十節而上岐然雙幹與夢合符公因為之賦勸農事陳季習為記又作巴曲九章以歌之此皆竹之異也詩義疏云筍皆四月生惟巴竹笋八月生盡九月成都有之篃冬夏生始數寸可煮以苦酒浸之可下酒及食又可采藏及乾以待冬月也本草四川敘州宜賔長寧所出苦笋彼人重之癸辛雜識曰涪翁喜苦筍嘗從黃斌老乞之有詩云南園苦筍味勝肉籜龍稱寃莫採録煩君更致蒼玉束明日風雨吹成竹又和坡翁春菜詩云公如端為苦筍歸明日青衫誠可脫坡得詩戲語坐客云吾固不愛作官魯直遂欲以苦筍硬差致仕聞者絶倒其苦筍賦有忠諫活國之語放翁又從而奬之云我見魏徵珠嫵媚約束兒童勿多取於是世以諫筍目之殊不知翁嘗自跋云余生長江南里人喜食苦笋試取而嘗之氣苦不可於鼻味苦不可於口故嘗屏之未始為客一設及來黔中黔人各掘苦笋萌於土中才一寸許味如蜜蔗初春則不食惟僰道人食苦筍四寸餘日出土尺餘味猶甘苦相半以此觀之涪翁所食乃取其甘非貴乎苦也魯直苦笋賦云僰道苦筍冠冕兩川甘脆愜當小苦而反成味溫潤縝密多啖而不疾人蓋苦而有味如忠諫之可活國多而不害如舉士而皆得賢是其鍾江山之秀氣故能探雨露而避風煙食肴以之開道酒客為之流涎彼桂班之夢永又安得與之同年蜀人曰苦筍不可食食之動痼疾令人萎而瘠豫亦未嘗與之言蓋上士不談而喻中士進則若信退若炫焉下士信耳而不信目其頑不可鐫故李太白謂但得醉中趣勿為醒者傳方物略云棕竹性亦叢産葉似棕有刺徑不三二寸或曰桃竹未得其詳贊曰葉棕身竹族生不蔓有皮無枝實中而幹左思蜀都賦棕丫楔樅注云棕丫出蜀郡其皮可作繩履杜甫枯棕詩蜀門多棕櫚高者十八九其皮割剝甚雖衆亦易朽徒布如雲葉青青歲寒後交橫集斧斤凋喪先蒲栁傷時苦軍之一物官盡取嗟爾江漢人生成復何有有同枯棕木使我沈歎久死者即已休生者何自守啾啾黃雀啅側見寒蓬走念爾形影乾摧殘沒藜莠文彥博詩哆熾風葉張囷皴雨皮厚叢橑列蓋端攢旄注旗首物以稀見珍材緣怪忘醜東坡云棕筍狀如魚剖之得魚子味如苦筍而加甘芳蜀人以饌佛僧甚貴之而南方不知也笱生膚毳中蓋花之方朵者正二月間可剝取過此苦澀不可食矣取之無害於木而宜於飲食法當蒸熟所施略與筍同蜜煮酢浸可致千里外今以餉殊長老詩曰贈君木魚三百尾中有鵝黃子魚子夜義剖癭欲入甘籜龍藏頭敢言美願隨蔬果得自用勿使山林空老死問君何事食木魚烹不能鳴固其理方物略海棕大抵棕類然不皮而幹葉叢于杪至秋乃實似楝子今城中有四株緻而堅風雨不能撼贊曰棕皆裭皮此獨自幹攢葉于顛纛首披散秋華而實其植則罕杜甫海棕行左綿公館清江濆海棕一株高如雲龍鱗犀甲相錯落蒼稜白皮十道文自是衆木亂紛紛海棕焉知身出羣移栽北辰不可得時有西域胡僧識趙清獻咏府庭海棕詩云海棕根幹出栟櫚雙勢凌空劒外無長鎖荆榛嗟廟柏不禁風雨笑庭梧胡僧過識已千歲蜀守來觀只兩株離立峩峩同壯士側身東望拱皇都蜀中廣記卷六十三
