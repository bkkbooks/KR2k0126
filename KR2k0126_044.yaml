body:
  text: 蜀中廣記卷四十四明曹學佺撰人物記第四川北道西漢范目閬中人果毅多方略髙帝既滅秦為漢王王巴蜀目知帝必有天下說帝為募發賨民要與共定秦目有恩信賨人從之秦地既定封目為長安建章鄉侯帝將討關中賨民皆思歸帝嘉其功而重傷其意遂聽還巴詔目曰富貴不歸故鄉如衣繡夜行耳徙封閬中慈鄉侯目固辭乃封渡沔縣侯故世謂三秦亡范三侯也目於是復民羅朴咱鄂度夕龔七姓不供租賦紀信西充人髙祖王漢中信從定三秦有功拜將軍髙祖與楚相持滎陽欲取敖倉粟乃築甬道屬之河軍得無乏項王惡之侵奪甬道漢軍食盡楚軍晝夜攻圍城將陷信曰事急矣臣請誑楚漢王不忍信強取漢王袍服著之王泣羣臣皆泣遂行乘王車黃屋左纛遣人前語曰漢兵食盡王出降楚軍皆呼萬嵗開東門出楚軍盡往東城觀漢王漢王得從數十騎自西開門出而逸去楚人焚信死紀通者張晏以為紀信之子城晉灼曰紀信焚死不見其後功臣表云紀信之子城以將軍從擊破秦入漢定三秦戰好畤死子通襲封襄平侯太尉周勃誅諸吕欲入北軍不得入紀通尚符節乃令持節矯內勃北軍洛下閎閬中人武帝時應聘定太初厯常氏巴志曰其德操仁義文學政幹若洛下閎任文公等皆播名立事言行表世者也譙隆閬中人為上林令諫沮武帝廣苑囿仕至侍中子𤣥譙𤣥字君黃少好學能說易春秋仕於州郡成帝永始二年有日食之災乃詔舉敦朴遜讓有行義者各一人州舉𤣥詣公車對䇿髙第拜議郎帝始作期門數為微行立趙飛燕為皇后專寵懷忌皇太子多橫夭折𤣥上書諫曰臣聞王者承天繼宗統極保業延祚莫急𦙍嗣故易有幹蠱之義詩詠衆多之福今陛下聖嗣未立天下屬望而不惟社稷之計專念微行之事愛幸用於所惑曲意留於非正竊聞後宫皇太子産而不育臣聞之怛然痛心傷剝竊懷憂國不忘須臾夫警衛不修則患生非常忽有醉酒狂夫分爭道路既無尊嚴之儀豈識上下之别此為冦讐起於轂下而賊亂發於左右也願陛下念天下之至重愛金玉之身均九女之施存無窮之福天下幸甚時數有災異𤣥輒陳其變既不省納故久稽郎官後遷太常丞以弟服去職平帝元始元年日食又詔公卿舉敦朴直言大鴻臚左咸舉𤣥詣公車對䇿復拜議郎遷中散大夫四年選明逹政事能班化風俗者八人時並舉𤣥為繡衣使者持節與太僕任惲等分行天下觀覽風俗所至專行誅賞事未及終而王莽居攝𤣥於是縱使者車變易姓名間竄歸家因以隱遁後公孫述僣號於蜀連聘不詣述乃遣使者備禮徵之若𤣥不肯起便賜以毒藥太守乃自齎璽書至𤣥廬曰君髙節已著朝廷垂意誠不宜復辭自招凶禍𤣥仰天歎曰唐堯大聖許由恥仕周武至德伯夷守餓彼獨何人我亦何人保志全髙死亦奚恨遂受毒藥𤣥子瑛泣血叩首於太守曰方今國家東有嚴敵兵師四出國用軍資或不常充足願奉家錢千萬以贖父死太守為請述許之𤣥遂隱藏田野終述之世時兵戈纍年莫能修尚學業𤣥獨訓諸子勤習經書建武十一年卒明年天下平定𤣥弟慶以狀詣闕自陳光武美之䇿詔本郡祠以中牢勑所在還𤣥家錢子瑛善說易以授顯宗為北宫衛士令文齊一名瀕字子竒梓潼人孝平末為益州太守造開稻田民咸賴之公孫述時拒郡不服述拘其妻子以公侯招之不應乃遣使由交趾貢獻河北述平世祖封成義侯南中咸為立祠李業字巨游梓潼人少有操介習魯詩師博士許晃元始中舉明經除為郎㑹王莽居攝業以病去官杜門不應州郡之命太守劉咸強召之業乃載病詣門咸怒出教曰賢者不避害譬猶彀弩射市薄命者先死聞業名稱故欲與之為治而反托疾乎令詣獄養病欲殺之客有說咸曰趙殺鳴犢孔子臨河而逝未聞求賢而脅以牢獄者也咸乃出之因舉方正王莽以業為酒士病不之官遂隱藏山谷絶匿名迹終莽之世及公孫述僣號素聞業賢徵之欲以為博士固疾不起數年述乃使大鴻臚尹融持毒酒以劫業若起則受公侯之位不起賜之以藥融譬㫖曰方今天下分崩孰知是非而以區區之身試於不測之淵乎朝廷貪慕名德曠官缺位于今七年四時珍御不以忘君宜上奉知己下為子孫身名俱全不亦優乎今數年不起猜疑冦心凶禍立加非計之得者也業乃嘆曰危國不入亂國不居親於其身為不善者義所不從君子見危授命何乃誘以髙位重餌哉融見業辭志不屈復曰宜呼室家計之業曰大丈夫斷之於心久矣何妻子之為遂飲毒而死述聞業死大驚又恥有殺賢之名乃遣使弔祠賻贈百匹子翬逃辭不受蜀平光武下詔表其閭圖畫形象翬建武中察孝廉為遂久令馮信字季誠郪人郡三察孝亷州舉茂才公府十辟公車再徵不赴公孫述時託目青盲侍婢姦其前佯為不覺述亡以年老不出東漢楊仁字文義閬中人習韓詩仕郡為功曹舉孝廉除郎太常上仁經中博士仁自以年未五十不應舊科上府讓選顯宗特詔補北宫衛士令引見問當世政迹仁對以寬和任賢抑黜驕戚為先又上便宜十二事帝嘉之賜以縑錢帝崩諸馬貴盛各爭欲入宫仁被甲持㦸嚴勒門衛莫聽輕進者肅宗既立諸馬共譛仁刻俊帝知其忠愈善之拜什邡令寬惠為政勸課掾史弟子悉令就學其有通明經術者顯之右署或貢之朝由是義學大興墾田千餘頃行兄喪去官後辟司徒桓虞府掾同僚有宋章者貪奢不法仁終不與交言同席時人畏其節後為閬中令卒於官景鸞字漢伯梓潼人少隨師學經涉七州之地能理齊詩施氏易兼受河洛圖緯作易說及詩解文句兼取河洛以類相從名為交集又撰內外記號曰禮略又抄風角雜書列其占驗作興道一篇及作月令章句凡所著述五十餘萬言數上書陳災異及弭救之術朝廷不省其後州郡辟命一切不受終于布衣鄭純字長伯郪人為益州西部都尉處地金銀琥珀犀象翠羽所出作此官者皆富及十世純獨清廉毫毛不犯夷漢歌歎表聞三司及京師貴重多薦美之明帝嘉之乃改西部為永昌郡以純為太守在官十年卒列畫頌東觀王堂字敬伯郪人初舉光祿茂才遷榖城令治有名迹永初中西羌冦巴郡為民患詔書遣中郎將尹就攻討連年不尅三府舉堂治劇拜巴郡太守堂馳兵赴賊斬虜千餘級巴庸清靜舉孝子嚴永隱士黃錯及張璊陳髦吏民生為立祠刺史張喬表其治能遷右扶風安帝西巡阿母王聖中常侍江京等並請屬於堂堂不為用掾史固諫之堂曰吾蒙國恩豈可為權寵阿意以死守之即日遣家屬歸閉閣上病果有誣奏堂者㑹帝崩京等悉誅堂以守正見稱永建二年徴入為將作大匠四年坐公事左轉議郎復拜魯相政存簡一至數年無辭訟遷汝南太守搜才禮士不茍自專乃教掾史曰古人勞於求賢逸於任使故能化清於上事緝於下其憲章朝右簡核才職委功曹陳蕃匡政理務拾遺補闕任主簿應嗣庶循名責實察言觀效焉自是委誠求當不復妄有辭教郡內稱治時大將軍梁商及尚書令袁湯以求屬不行並恨之後廬江賊迸入弋陽界堂勒兵追討即便奔散而商湯猶因此風州奏堂在任無警免歸家年八十六卒遺令薄斂瓦棺以葬子稚清行不仕曽孫商益州牧劉焉以為蜀郡太守有治聲王稚字叔起堂幼子也屢拒孝亷公府十五辟公車徵及授二千石太常終不詣年八十一卒門人録其本行諡曰憲父癸未詔書以安車聘請㑹已亡陳禪字紀山安漢人仕郡功曹舉善黜惡遂為邦內所畏察孝廉州辟治中從事時刺史為人所上受納贓賂禪當傳考他無所齎但持喪斂之具而已及至笞掠無算五毒畢加禪神意自若辭對無變事遂散釋車騎將軍鄧隲聞其名而辟焉舉茂才時漢中蠻夷反以禪為漢中太守賊素聞其名即時降服遷左馮翊入拜諌議大夫永寧元年西南夷撣國王獻樂及幻人能吐火自攴解易牛馬頭明年元㑹作之於庭安帝與羣臣共觀大竒之禪獨離席舉手大言曰夾谷之㑹齊作侏儒之樂仲尼誅之又曰放鄭聲逺佞人帝王之庭不宜設外裔之伎尚書陳忠劾奏禪曰古者合歡之樂舞於堂四夷之樂陳於門故詩云以雅以南韎任朱離今撣國越流沙踰縣渡萬里貢獻非鄭衛之聲佞人之比而禪廷訕朝政請劾禪下獄有詔勿收左轉為𤣥莵候城障尉詔敢不之官上妻子從者名禪既行朝廷多訟之㑹北胸奴入遼東追拜禪遼東太守胡憚其威強退還數百里禪不加兵但使吏卒往曉慰之單于懷服遺以胡中珍貨而去及鄧隲誅廢禪以故吏免復為車騎將軍閻顯長史順帝即位遷司𨽻校尉明年卒于官子澄有清名官至漢中太守禪曽孫寶亦剛壯有祖風為州别駕從事馮煥宕渠人安帝時為幽州刺史疾忌奸惡數致其罪建元元年怨者乃詐作璽書譴責煥賜以歐刀又下遼東都尉使速行刑煥欲自殺子緄疑詔文有異止煥使以事自上煥乃上書自訟果詐者所為㑹煥病死獄中帝愍之賜錢千萬馮緄字鴻卿少學春秋司馬兵法家富好施賑赴窮急為鄉里所歸初舉孝亷七遷為廣漢屬國都尉徵拜御史中丞順帝末年以緄持節督揚州諸郡軍事與中郎將滕撫擊破羣賊遷隴西太守後鮮卑寇邊以緄為遼東太守曉諭降集虜皆弭散徵拜京兆尹轉司𨽻校尉所在立威刑遷廷尉太常時長沙蠻冦益陽屯聚積久至延熹五年衆轉盛而零陵蠻賊復反應之合二萬餘人攻燒城郭殺傷長吏又武陵蠻夷悉反冦掠江陵間荆州刺史劉度南郡太守李肅並奔走荆南皆沒於是拜緄為車騎將軍將兵十餘萬討之時天下饑饉帑藏虛盡每出征伐常減公卿奉祿假王侯租賦前後所遣將帥宦官輒陷以折耗軍資往往抵罪緄性烈直不行賄賂懼為所中乃上疏曰勢得容姦伯夷可疑茍曰無猜盜跖可信願請中常侍一人監軍財費尚書朱穆奏緄以財自嫌失大臣之節有詔勿劾緄軍至長沙賊聞悉詣營道乞降進擊武陵蠻夷斬首四千餘級受降十餘萬人荆州平定詔書賜錢一億固讓不受振旅還京推功於從事中郎應奉薦以為司𨽻校尉而上書乞骸骨朝廷不許監軍使者張厰承宦官㫖奏緄將傅婢二人戎服自隨又輒於江陵刻石紀功請下吏案理尚書令黃雋奏議以為罪無正法不合致紏㑹長沙賊復起攻桂陽武陵緄遂䇿免頃之拜將作大匠轉河南尹上言舊典中官子弟不得為牧人職帝不納復為廷尉時山陽太守單遷以罪繫獄緄考致其死遷故車騎將軍單超之弟中官相黨遂共誹章誣緄坐與司𨽻校尉李膺大司農劉祐俱輸左校應奉上疏理緄等得免後拜屯騎校尉復為廷尉卒于官緄弟允清白有孝行能理尚書善推步之術拜降虜校尉終于家馮皓字叔宰郪人少師事楊仲植及蜀郡張光超後又事東平虞叔雅初為謁者威儀濟濟為成都令時太守京兆劉宣法令不一皓奏治之相地開稻田百頃實户口萬八千立文學生徒至八百人遷越嶲太守所在著稱為梁冀所不善冀風州追之隱居作易章句及刺奢說修黃老恬然終日羊朞字仲魚郪人父為交州刺史卒官朞迎喪不取官舍一物郡三察孝廉公府辟州别駕皆不應太守尹奉棄刑名行禮樂請為功曹刺史必欲借朞自佐不得已為别駕王祐字平仲郪人少與雒縣張浮齊名不應州郡之命撰三子五篇及卒東觀郎李勝為作誄比之顔子列畫學宫楊充字盛國梓潼人少好學求師遂業受古學於扶風馬季長吕叔公南陽朱明叔頴川白仲職精究七經其朋友則頴川荀慈明李元禮京兆羅叔景漢陽孫子夏山陽王叔茂皆海內名士還以教授州里常言圖緯空說去事希略疑非聖不以為教察孝亷為郎卒冦祺字宰朝梓潼人與邑子侯蔓俱學凉州蔓後為勃海王象所殺祺仗劒至象家值象病象謝曰君子不掩人無備安有為友報讐而殺病人也祺乃還久之復往殺象由是察孝廉為灞陵令濟隂相季姜梓潼文氏女將作大匠廣漢王敬伯夫人也少讀詩禮敬伯前夫人有子博女紀流二人季姜生康稚芝女始示凡前後八子撫育恩愛親繼若一堂祖母性嚴子孫雖見官二千石猶杖之婦跪受罰於堂下堂厯五郡祖母隨之官後以年老不願逺鄉里姜亦常侍左右紀流出適分己侍婢給之博好寫書姜手為作表於是內門紀化動行推讓博妻犍為楊進及博子遵婦蜀郡張叔紀服姑之教皆有賢訓號之三異堂亡姜敕康稚芝婦事楊進如舅姑中外則之皆成令德季姜年八十二卒四男棄官行服四女亦從官舍交赴內外冠冕百有餘人當時榮之三國程畿字季然閬中人劉璋時為漢昌長縣有賨人種類剛猛巴西太守龎羲以天下擾亂郡宜有武衛頗招合部曲有讒于璋言羲欲叛璋因疑之羲聞甚懼將謀自守遣畿子郁宣㫖索兵自助畿報曰郡合部曲本不為叛雖有交搆要在盡誠若必以懼遂懷異志非畿之所間并敕郁曰我受恩當為州牧盡節汝為郡吏當為太守效力不得以吾故有異志也羲使使告畿曰爾子在郡不從太守家將及禍畿答曰昔樂羊為將飲子之羔非父子無恩大義然也今雖復羔子吾必飲之羲知畿必不為己乃因厚陳謝于璋以致無咎璋聞之遷畿江陽太守昭烈領益州牧辟為從事祭酒後敗績子吳泝江而還或告之曰後追已至解船輕去乃可以免畿曰吾在軍未習為敵走况從天子而見危哉吳人追及死之李邈字漢南郪人劉璋時為牛鞞長先主領州牧邈為從事正旦行酒因讓先主曰振威以將軍宗室肺腑委以討賊元功未效先冦而滅邈以將軍之取鄙州甚為不宜先主曰知其不宜何不助之邈曰非不敢也力不能足耳有司將殺之諸葛亮為請得免弟朝字永南邵字偉南皆有文才時號三龍羣下立先主為漢中王文永南筆也馬忠字德信巴西閬中人少養外家姓狐名篤後乃復姓改字忠初為郡吏建安末舉孝廉除漢昌長先主東征敗績猇亭巴西太守閻芝發諸縣兵五千人以補遺闕遣忠送往先主已還永安見忠與語謂尚書令劉巴曰雖亡黃權復得狐篤此為世不乏賢也建興元年丞相亮開府以忠為門下督三年亮入南拜忠牂柯太守郡承朱褒叛亂之後忠撫育恤理甚有威惠八年召為丞相參軍副長史蔣琬署留府事又領州治中從事明年亮出祁山忠詣亮所經營戎事軍還督將軍張嶷等討汶山郡叛羌十一年南夷豪帥劉胄反擾亂諸郡徴庲降都督張翼還以忠代翼忠遂斬胄平南土加忠監軍奮武將軍封博陽亭侯初建寧郡殺太守鄭昴縛太守張裔於吳故都督常駐平夷縣至忠乃至味縣處民夷之間又越嶲郡亦久失土地忠率太守張嶷開復舊郡由此就加安南將軍進封彭鄉亭侯延熙五年還朝因至漢中見大司馬蔣琬宣傳詔㫖加拜鎮南大將軍七年春大將軍費禕北禦魏敵留忠成都平尚書事禕還忠乃歸南十二年卒子修嗣忠為人寬濟有度量但詼啁大笑忿怒不形於色然處事能斷威恩並立是以蠻夷畏而愛之及卒莫不自致喪庭流涕盡哀為立廟祀王平字子均宕渠人本養外家何氏後復姓王隨杜濩朴胡詣洛陽假校尉從曹公征漢中因降先主拜牙門將禆將軍建興六年屬參軍馬謖先鋒謖舍水上山舉措煩擾平連規諌謖謖不能用大敗於街亭衆盡星散惟平所領千人鳴鼓自持魏將張郃疑其伏兵不往逼也於是平徐徐收合諸營遺併率將士而還丞相亮既誅馬謖及將軍張休李盛奪將軍黃襲等兵平特見崇顯加拜參軍統五部兼當營事進位討冦將軍封亭侯九年亮圍祁山平别守南圍魏大將軍司馬宣王攻亮張郃攻平平堅守不動郃不能克十二年亮卒於武功軍還魏延作亂一戰而敗平之功也遷後典軍安漢將軍副車騎將軍吳一駐漢中太守十五年進封安漢侯代一督漢中延熙元年大將軍蔣琬往潯陽平更為前護軍署琬府事六年琬還住涪拜平前監軍鎮北大將軍統漢中七年春魏大將軍曹爽率步騎十萬向漢中前鋒已在駱谷時漢中守兵不滿三萬諸將大驚或曰今力不足以拒敵勢當固守漢樂二城遇賊今入比爾閒涪軍足得救關平曰不然漢中去涪垂千里賊若得關便為禍也今宜先遣劉護軍杜參軍據興勢平為後拒若賊分向黃金平率千人下自臨之比爾閒涪軍行至此計之上也惟護軍劉敏與平意同即便施行涪諸軍及大將軍費禕自成都相繼而至魏軍退還如平本䇿是時鄧芝在東馬忠在南平在北境咸著名迹平生長戎旅手不能書其所識不過十字而口授作書皆有意理使人讀史聽之備知其大義遵理法度言不戲謔端坐徹日無武將之態然性狹自輕以此為損十一年卒子訓嗣張嶷字伯岐南充人弱冠為縣功曹先主定蜀之際山冦攻縣縣長捐家逃亡嶷冒白刃携負夫人夫人得免由是顯名州召為從事建興五年丞相亮北征漢中時廣漢綿竹山賊張慕等鈔盜軍資劫掠吏民嶷以都尉將兵討之度其烏散難以戰禽乃詐與和親尅期置酒酒酣嶷身率左右因斬慕等渠帥五十餘級赦其餘類旬日清泰後得痼病而家貧不能延醫是時廣漢太守何祗雖名通厚然嶷宿與疏濶乃自輿詣祗託以治病祗傾財醫療數年除愈拜牙門將屬馬忠北討汶山叛羌南平四郡蠻夷初越嶲郡自丞相亮討髙定之後蠻夷數反殺太守龔祿焦璜是後太守不敢之郡只住安定去郡八百餘里時除嶷為越嶲太守嶷將所領往郡誘以恩信蠻夷皆服惟比徼最為驍徑不承節制嶷乃往討生縛其帥魏狼又解縱之使招懷餘類表拜狼為邑侯於是種落三千餘户皆安土供職諸種聞之皆降嶷以功賜爵關內侯蘇祈邑君冬逄逄弟隗渠等已降復反嶷誅逄逄妻旄牛王女嶷以計原之而渠逃入西徼渠剛猛捷悍為諸種所畏憚遣所親二人詐降實取消息嶷覺之許以重賞使為反間二人遂合謀殺渠渠死諸種皆安又斯都耆帥李求承昔手殺龔祿嶷求募捕得數其宿惡而誅之始嶷以郡郛宇頺壞更築小塢在官三年徙還故郡繕治城郭夷種男女莫不致力定莋臺登卑水三縣去郡三百餘里舊出鹽鐡及漆而夷徼久自固食嶷率所領奪取署長吏焉嶷到定莋率豪狼岑槃木王舅甚為蠻夷所信任忿嶷見侵不自來詣嶷使壯士數十直往收致撻而殺之持尸還種厚加賞賜喻以狼岑之惡且曰無得妄動動即殄矣種類咸面縛謝過嶷殺牛饗宴重申恩信遂獲鹽鐡器用周贍漢嘉郡界旄牛夷種類四千餘户其率狼路欲為姑壻冬逄報怨遣叔父離將逄衆相度地勢嶷遣親迎齎牛酒勞賜又令離姊逆逄妻宣暢意㫖離既受賜并見其姊姊弟歡悅悉率所領將詣嶷嶷厚加賞待遣還旄牛由是輒不為患郡有舊道經旄牛中至成都既平且近自旄牛絶道已百餘年更由安上既險且逺嶷遣左右齎貨幣賜路重令路姑喻意路乃率兄弟妻子悉詣嶷嶷與盟誓開通舊道千里肅清復古亭驛奏封路為旄牛㽛毗王遣使將路朝貢後主於是加嶷撫戎將軍領郡如故嶷初見費禕為大將軍恣性泛愛待信新附太過作書戒之曰昔岑彭率師來歙杖節咸見害於刺客今明將軍位髙權重宜鑒前事少以為警後禕果為魏降人郭修所害吳太傅諸葛恪以初破魏軍大興兵衆以圖攻取侍中諸葛瞻丞相亮之子恪從弟也嶷與書曰東主初崩帝實幼弱太傅受寄託之重亦何容易親以周公之才猶有管蔡流言之變霍光受任亦有燕蓋上官逆亂之謀賴成昭之明以免斯難耳昔每聞東主殺生賞罰不下人又今以垂沒之命卒召太傅屬以後事誠實可慮加吳楚剽急乃昔所記而太傅離少主履敵庭恐非良計長算之術也雖云東家綱紀肅然上下輯睦百有一失非明者之慮邪取古則今今則古也自非郎君進忠言於太傅誰復有言者也旋軍廣農務行德惠數年之中東西並舉實為不晚願深採察恪竟以此夷族嶷識見多如是類在郡十五年邦域安穆屢乞求還乃徵詣成都夷民戀慕扶轂泣涕過旄牛邑邑君襁負來迎及追尋至蜀郡界耆帥督率隨嶷朝貢者百餘人嶷至拜蕩冦將軍延熙十七年魏狄道長李簡密書請降衛將軍姜維率嶷等因簡之資以出隴西既到狄道簡悉率城中吏民出迎軍前與魏將徐質交鋒嶷臨陳隕身然其所殺傷亦過倍既亡封長子瑛西鄉侯次子護雄襲爵南土越嶲民夷聞之無不悲泣為嶷立廟四時水旱輒祀之黃權字公衡閬中人少為郡史州牧劉璋召為主簿時别駕張松建議迎先主使伐張魯權諫曰左將軍有驍名今請到欲以部曲遇之則不滿其心欲以賔客禮待則一國不容二君若客有泰山之安則主有纍卵之危可但閉境以待河清璋不聽竟遣使迎先主出權為廣漢長及先主襲取益州分下郡縣郡縣望風景附權閉城堅守劉璋稽服乃詣降先主假權偏將軍及曹公破張魯魯走入巴中權進曰若失漢中則三巴不振此為割蜀之股臂也於是先主以權為護軍率諸將迎魯魯已還南鄭北降曹公然卒破杜濩朴胡殺夏侯淵據漢中皆權本謀也先主領益州牧以權為治中從事及稱尊號將東伐吳權諌曰吳人悍戰又水軍順流進易退難臣請為先驅以嘗冦陛下為後鎮先主不從以權為鎮北將軍督江北軍以防魏師自在江南及吳將軍陸遜乘流斷圍南軍敗績先主引退而道隔絶權不得還故率將所領降于魏有司執法白收權妻子先主曰孤負黃權權不負孤也待之如初魏文帝謂權曰君捨逆效順欲追跡陳韓邪權對曰臣過受劉主殊遇降吳不可還蜀無路是以歸命且敗軍之將免死為幸何古人之可慕也文帝善之拜為鎮南將軍封育陽侯加侍中使之陪乘蜀降人或云誅權妻子權知其虛言未便發喪後得審問果如所言及先主薨問至魏羣臣咸賀而權獨否文帝察權有局量欲試驚之遣左右詔權未至之間纍催相屬馬使奔馳交錯於道官屬侍從莫不碎魄而權舉止顔色自若大將軍司馬宣王深器重之問權曰蜀中有卿輩幾人權笑而答曰不圖明公見顧之重也宣王與諸葛亮書曰黃公衡快士也每坐起嘆述足下不去口實景初三年蜀延熙二年權遷車騎將軍儀同三司明年卒諡曰景侯子雍嗣雍無子絶權留蜀子崇為尚書郎隨衛將軍諸葛瞻拒鄧艾到涪縣瞻槃桓未進崇屢勸瞻宜速行拒險無令敵得入平地瞻猶豫未納崇至於流涕㑹艾長驅而前瞻却戰至綿竹崇帥厲軍士期於必死臨陳見殺譙周字允南西充國人父字榮始治尚書兼通諸經及圖緯州郡辟皆不應州就假師友從事周幼孤與母兄同居既長耽古篤學家貧未嘗問産業誦讀典籍欣然獨笑以忘寢食研精六經尤善書札頗曉天文而不以留意諸子文章非心所存不悉遍視也身長八尺體貌素朴惟推誠不飾無造次辨論之才然潜識內敏建興中丞相亮領益州牧命周為勸學從事亮卒於敵庭周在家聞問即便奔赴尋有詔書禁斷惟周以速行得逹大將軍蔣琬領刺史徙為典學從事總州之學者後主立太子以周為僕轉家令時後主頗出游觀增廣聲樂周上疏諫其略曰夫挽大重者其用力苦不衆拔大艱者其善術苦不廣且承事宗廟非徒求福祜所以率民尊上也至於四時之祀或有不臨池苑之觀或有仍出臣之愚滯私不自安夫憂責在身者不暇盡樂先帝之志堂構未成誠非盡樂之時願省減樂官後宫所增造但奉修先帝所施下為子孫節儉之教徙為中散大夫猶侍太子于時軍旅數出百姓雕瘁周與尚書令陳祗論其利害退而書之謂之仇國論後遷光祿大夫位亞九列周雖不與政事以儒行見禮時訪大議輒據經以對而後生好事者亦咨問所疑焉景耀六年冬魏大將軍鄧艾克江油長驅而前而蜀本謂敵不便至不作城守調度及聞艾已入隂平百姓擾擾皆迸山野不可禁制後主使羣臣㑹議計無所出或以為蜀之與吳本為和國宜可奔吳或以為南中七郡阻險斗絶易以自守宜可奔南惟周以為自古以來無寄他國為天子者也今若入吳固當臣服且政理不殊則大能吞小此數之自然也由此言之則魏能併吳吳不能併魏明矣等為小稱臣孰與為大再辱之恥何與一辱且若欲奔南則當早為之計然後可果今大敵已近禍敗將及羣小之心無一可保恐發足之日其變不測何至南之有乎羣臣或難周曰今艾兵不逺恐不受降如之何周曰方今東吳未賔事勢不得不受受之後不得不禮若陛下降魏魏不裂土以封陛下者周請身詣京都以古義爭之衆人無以易周之理劉氏無虞一邦蒙賴周之謀也晉室踐阼纍下詔所在發遣徵周周輿疾詣洛泰始三年至以疾不起就拜騎都尉五年周語陳夀曰昔孔子七十二劉向楊雄七十一而沒今吾年過七十庶慕孔子遺風可與劉揚同軌恐不出後嵗必便長逝不復相見矣六年冬卒凡所著述撰定法訓五經論古史考之屬百餘篇三子熙賢同少子同頗好周業亦以忠篤質素為行舉孝廉除錫令東宫洗馬召不就周羣字仲直閬中人父舒字叔布少學術於廣漢楊厚名亞董扶任安數被徵終不詣時人有問春秋䜟曰代漢當塗髙此何謂也舒曰當塗髙者魏也鄉黨學者私傳其語羣少受學於舒專心候業於庭中作小樓家富多奴常令奴更直於樓上視天災才見一氣即白羣羣自上樓觀之不避晨夜故凡有氣候無不見之者是以所言多中州牧劉璋辟以為師友從事先主定蜀署儒林校尉先主欲與曹公爭漢中問羣羣對曰當得其地不得其民也若出偏軍必不利當戒慎之羣卒子巨頗傳其術鐔承字公文郪人厯郡守州石職為少府太常時費姜秉政孟光來敏皆棲遲承以和獨立特進之也常璩讃曰優游容與特進太常馬勳字盛衡馬齊字承伯皆閬中人楊戲季漢輔臣贊云盛衡承伯言藏言時勳為别駕從事齊為廣漢太守遷尚書皆以才幹自顯其後同邑有姚胄字子緒纍官尚書僕射諸葛亮稱之曰忠益莫大於進人進人各務其所尚今姚掾並存剛柔以廣文武之用可謂博雅矣晉陳夀字承祚安漢人少好學師事譙周仕蜀漢為觀閣令史宦者黃皓專弄威權大臣皆曲意附之夀獨不為之曲由是被譴黜者屢蜀平以父喪使婢丸藥坐沉滯者多年司空張華愛其才舉為孝廉除著作郎領本郡中正撰三國志凡六十五篇時人稱其善叙事有良史才是時夏侯湛方著魏書見夀所作遂壞其書而罷張華尤重之欲舉為中書郎荀朂忌華而疾夀乃諷吏部除夀長廣太守華復薦之于帝授御史治書以母憂去職母遺命葬洛陽夀遵其志乃坐不以母歸葬被貶議初譙周嘗謂夀曰卿必以才學成名但當被損折宜深慎之夀至此再致廢辱皆如周言後數嵗起為太子中庶子元康七年卒詔下河南尹洛陽令就家寫其三國志兄子符字長住亦有文才繼夀著作佐郎上廉令符弟蒞字叔度梁州别駕驃騎將軍齊王辟掾卒洛下蒞從弟階字逹之州主簿察孝廉褒中令永昌西部都尉建寧興古太守辭章燦麗馳名當世凡夀所述作二百餘篇符蒞階各數十篇閻纘字續伯安漢人祖囿為張魯功曹勸魯降魏封平樂鄉侯父璞嗣爵仕吳牂柯太守纘博覽墳典父卒繼母不慈纘事之彌謹而母疾之愈甚乃誣纘盜父時金寶訟于有司遂被清議十餘年纘無怨色孝謹不怠母後意解更移中正乃得復品為太傅楊駿舍人轉安福令纘棄官歸感駿被誅要其故主簿崔基等共葬之衆懼冢未成各逃散惟纘以家財成墓乃去河間王顒引為西戎校尉有功封平樂鄉侯愍懷太子之廢也纘輿棺詣闕上書理太子之寃書御不省及張華遇害賈謐伏法朝野震竦纘獨撫華尸慟哭曰早語君遜位而不肯今果不免命也夫過斥賈謐尸曰小兒亂國之由誅其晚矣皇太孫立纘復上疏其言欲使著令東宫加設兵衛嚴重詔㫖以安後嗣擇宫臣如丙吉拒詔書周昌不遣王行者以固儲副并劾賈謐潘嶽等二十四人朝廷嘉其忠烈擢漢中太守趙王倫死既葬纘以車轢其冢時張華兄子景後徙漢中纘又表宜還之故鄉纘慷慨好大節卒于官有五子俱開朗有才力龔壯字子偉巴西人潔已自守與鄉人譙秀齊名父叔皆為李特所害壯積年不除喪力弱不能復仇及李夀戍漢中與僞主李期有嫌期特孫也壯欲假夀以報乃說夀曰節下若能並有西土稱藩晉朝人必樂從且捨小就大以危易安莫大之䇿也夀然之遂率衆討期果克之夀仍襲僞號無歸晉意壯即辭去其官爵賂遺一無所受㑹天久雨百姓饑墊壯又上書說夀以歸順聖朝允天心應人望永為國藩福流子孫夀省書內愧祕而不宣乃遣使入胡稱藩于石虎壯力諫之夀俱不納壯謂百行之本莫大忠孝既假李夀以殺李期父叔之仇既雪而又能提全蜀以歸朝廷臣節不益明乎狼子野心竟莫之從壯乃稱聾又云兩手不制物終身不復至成都惟研考經典覃思文章至李勢時卒壯每嘆中夏多經學而巴郡鄙陋兼遭李氏之亂無復學徒乃著邁德論譙秀字元彥西充人祖周父熙為周長子生秀秀性清靜不交于世知天下將亂預絶人事從兄弟及諸親戚皆不與相見州郡辟命一切不就氐人李雄盜蜀安車徵秀雄叔父驤驤子夀咸共致聘俱不應常冠鹿皮躬耕山藪永和三年安西將軍桓溫平蜀表薦秀曰竊聞巴西譙秀植操貞固抱德肥遁揚清渭波于時皇極遘道消之㑹羣黎蹈顛沛之艱中華有顧瞻之哀幽谷無遷喬之望凶命屢招奸威仍逼身寄虎吻危同朝露而能抗節玉立誓不降辱杜門絶跡不面僞庭進免龔勝亡身之禍退無薛方詭對之譏雖園綺之棲商洛管寧之默遼海方之于秀殆無以過若秀蒙蒲帛之徵足以鎮靜頑風軌訓囂俗幽遐仰流九服知化矣及蕭敬叛亂避難宕渠山中鄉人宗族馮依者以百數秀年八十衆人以其篤老欲代之負擔秀拒曰各有老弱當先營救吾氣力自足堪此不以垂朽之年纍諸君也後十餘年卒于家譙登秀之弟少以公亮義烈聞領隂平太守後以李特亂登父為李雄巴西太守馬脫所殺乃東詣鎮南劉公請兵討之三年不能得兵但表拜登揚烈將軍梓潼內史登乃募巴蜀流士得二千人是時鎮西將軍羅尚住巴郡登因從尚求益軍討雄尚不許登乃往攻宕渠斬馬脫食其肝復詣尚求軍尚復不許登乃徑至涪城雄自攻登為登所破賊已向困而尚不供登軍食雄知登乏食遣李驤攻登兵窮士饑誓死不退衆亦餓死而無去志永嘉三年為驤生得致於雄言辭不屈雄乃殺之六朝龔頴遂寧人少好學益州刺史毛璩辟為勸學從事璩為譙縱所殺故佐吏並逃亡頴號哭奔赴殯送以禮縱後設宴延頴不獲已而至樂奏頴流涕曰北面事人亡不能死何忍聞舉樂蹈跡逆亂乎縱大將譙道福引出將斬之道福母則頴姑跣出力救之得免縱既僣號備禮徵又不至乃收頴付獄脅以兵刃執志彌堅至于蜀平終不屈節其後刺史至輒加辟引厯府參軍别駕從事史宋文帝元嘉二十四年刺史陸徽上表薦之于朝竟不被命子原平襲原平字長恭有至行養親必以己力傭賃主人設食原平自以家貧父母不辦肴味已有惟餐鹽飯家或無食亦不獨飽須日暮作畢受直糴買然後舉㸑父篤疾彌年原平衣不解帶口不嘗鹽菜身未嘗睡卧父亡慟絶數日方蘇塋壙不以假人儉而當禮葬畢詣傭主執役與諸奴分務讓逸就勞既搆父冢遂善其事每至吉嵗求者盈門原平所起必自貧始取其賤直及母終毁瘠彌甚父母墓前有田數十畝每至農月原平不欲耕者裸袒以慢其墓乃罄家資貴買此田束帶垂泣躬自耕墾每賣物裁求平價人輒加價與之彼此相讓必賤直然後乃取宅上種竹夜有盜其笋者原平遇見之盜者奔走墜溝平乃作小橋於溝上鄉里慚愧無復來取宋文帝崩原平號慟日食餅一枚如此五日人問曰誰非王臣何獨如此原平曰吾家見異先朝不能報恩故私心感痛耳李膺字公輔梓潼人梁益州刺史劉季連反刺史鄧元起討之糧食乏㑹蜀民投附者三萬餘人元起欲檢籍以科其資膺諌曰前有嚴敵後無繼援山民始附於我觀德若糾以刻薄衆心必離膺請出圖之乃出率富民上軍資得米三萬斛膺後為蕭淵藻主簿使至都梁武帝悅之謂曰今李膺何如昔李膺對曰彼事桓靈之主今逄堯舜之君上嘉其對擢益州别駕仕至太僕卿侯􅖰南充人梁時纍平蜀賊後以誅侯景有功遷南豫州刺史纍功都督五州封零陵郡公唐陳子昻字伯王射洪人父元敬世擁髙資嵗饑出粟萬石以賑鄉里舉明經調文林郎子昻十八未知書以富家子尚氣决弋博自如他日入鄉校感悔即痛修飭文明初舉進士髙宗崩將遷梓宫長安是時關中無嵗子昻盛言東都勝塏可營山陵上書曰臣聞秦據咸陽漢都長安山河為固而天下服者以北假朝宛之利南資巴蜀之饒轉關東之粟而收山西之寶長羈利䇿橫制宇宙耳而今則不然燕代迫胸奴巴隴嬰吐蕃西老千里贏糧北丁十五乘塞嵗月奔命秦之首尾不完所餘獨三輔間耳頃遭荒饉百姓薦饑薄河而右惟有赤地循隴以北不逄青草父兄轉徙妻子流離賴天悔禍去年薄稔羸耗之餘幾能保命然流亡未還白骨縱橫阡陌無主至于蓄積猶可哀傷陛下以先帝遺意方大駕南驅按節西京千乘萬騎何從仰給山陵穿復必資徒役率癯敝之衆興數萬之軍調發近畿督扶稚老鏟山輦石驅以就功春作無時何望有秋雕氓遺噍再罹艱苦有不堪其困則逸為盜賊揭梃大呼可不深圖哉且天子以四海為家舜葬蒼梧禹葬㑹稽豈愛裔夷而鄙中國示無外也周平王漢光武都洛陽而寢廟山陵並在西土實以時有不可故遺小存大去禍取福也今景山崇秀北對嵩邙右盻汝海祝融太昊之故墟在焉園陵之美復何以加且太原廥巨萬之倉洛口儲天下之粟乃欲捨而不顧儻鼠竊狗盜西入陜郊東犯虎牢取敖倉一杯粟陛下何以遏之武后竒其才召見金華殿子昻貌柔野少威儀不稱其文學而占對慷慨乃擢靈臺正字垂拱初詔問羣臣調元氣當以何道子昻因是勸太后興明堂太學后召見賜筆札中書省令條上利害子昻對三事其一言九道出大使巡按天下申黜陟求民瘼宜擇仁可以恤孤明可以振滯剛不避強禦知足以照奸者然後以為使故輶軒未動而天下翹然待之矣今宰相奉詔書有遣使之名無任使之實使愈出而天下愈敝徒令百姓治道路送往迎來不見其益也臣願陛下更選有威望風概為衆推者因御前殿以使者之禮禮之諄諄切勑所以出使之意乃授以節務登拔賢良宣上德意令若家見而戶曉者若不得其人不如少出使彼煩數而無益于化是烹小鮮而務撓之也其二言刺史縣令政教之首陛下布德澤下詔書必待刺史縣令謹宣而奉行之茍非其人則委棄有司掛墻壁耳百姓安得而知之一州得才刺史則十萬户被其福得不才刺史則十萬户受其困縣令之於民其禍福亦然今吏部調縣令但計資考不求賢良故庸人皆任縣令為害滋甚三言軍旅之弊夫妻不得安父子不相養五六年矣尚賴陛下憫其失職凡兵戎調發一切罷之又數年則天欲開蜀山由雅州剪生羌因以襲吐蕃子昻上書以七驗諫止后召見頷之因使論為政之要子昻乃奏八科一措刑二官人三知賢四去疑五招諫六勸賞七息兵八安宗子遷右衛胄曹參軍以母喪去官服終擢右拾遺子昻多病不樂居職聖厯初以父年老自表解官侍養父喪廬塜每哀慟聞者為之涕泣縣令假簡貪暴聞子昻富欲害子昻家人納錢二十萬緡簡薄其賂捕送獄遂死獄中子昻資褊躁然輕財好施篤于友誼唐興文章天下祖尚徐庾餘風子昻始獨變正作感遇詩三十八章王適見之曰是必為海內文宗子昻所論著當時皆以為法子光亦以文名官終商州刺史光子易甫簡甫皆侍御史趙㽔鹽亭人好學不仕著書屬文隱于梓州長平山博考六經諸家異同之旨𤣥宗屢徵不就李白嘗就學焉鮮于仲通字向之新政人與弟叔明皆博學輕財務施仲通舉天寶進士為京兆尹厯劔南節度使以忤楊國忠坐貶李叔明字晉之仲通之弟本姓嚴氏與兄少孤養於鮮于家因冒姓鮮于大厯末叔明為東川節度使或言于上詔叔明還姓嚴叔明醜之表求賜國姓從之叔明初起擢明經乾元中為司勳員外郎副漢中王瑀使回紇回紇遇瑀甚薄叔明讓之曰大國通好使賢王持節可汗唐之壻也恃功而倨可乎可汗為之加禮復命拜洛陽令招來遺民號能吏擢京兆尹繼其兄仲通長安歌曰前尹赫赫具瞻允若後尹熙熙明瞻允思久之除太子右庶子㑹崔旰擾成都以叔明為卭州刺史旰入朝即拜叔明東川節度使徙治梓州建中初吐蕃襲火井掠龍州陷扶文逺三州叔明分五將邀擊走之以功加檢校戶部尚書遷右僕射德宗興元之幸叔明出家資以助軍悉衣幣獻宫掖加太子太傅封薊國公初東川承兵盜鄉邑雕破叔明治之二十年撫循有力華夷遂安後朝京師以病足賜錦輿令宦者肩輿以見拜尚書左僕射乞骸骨改太子太傅致仕卒貞元三年諡曰襄叔明素惡道佛之弊上言曰佛空寂無為者也道清虛寡欲者也今迷其內而飾其外使農夫工女隳業以避役故農桑不勸兵賦日屈國用軍儲俱為耗斁臣請本道定寺為三等觀為二等上寺留僧二十一上觀留道士十四每等降殺以七皆擇有行者餘還為民德宗善之以為不止本道可為天下法乃下尚書省雜議議雖上竟未行子升以少卿從德宗幸梁州叔明嚴勑以死報國故升有功擢禁軍將軍貞元初遷太子詹事嚴震字遐聞鹽亭人至德乾元中數出資助邊得為州長史西川節度使嚴武知其才署押衙遷恆王府司馬委以軍府重務東川節度使李叔明表為渝州刺史又表為鳯州刺史母喪解起興鳯兩州團練使好興利除害建中中劒南黜陟使韋􅐃狀震治行為第一乃賜上上考封鄖國公號稱清嚴逺邇咨美遷山南西道節度使朱泚反遣腹心穆廷光等遺帛書誘之震即斬以聞是時李懷光與賊連和奉天危蹙帝欲徙避山南震聞馳表奉迎遣大將張用誠以兵五千扞衛用誠至盩厔有反計帝憂之㑹震續遣牙將馬勳至帝告以故勳曰臣請歸取節度符召之即不受斬其首以復命帝悅使計日往勳還得符請壯士五人與偕出駱谷用誠以勳至未知其謀也以數百騎迎勳館之左右嚴侍勳未發隂令焚草館外士寒爭附火勳從容出符示之曰大夫召君用誠懼將走壯士自後擒之用誠子砍勳傷首左右扞刀得免遂仆用誠而格殺其子勳即入其軍見士皆擐甲乃昌言曰若等父母妻子皆在梁州今棄之而反何所利也大夫取用誠耳若等無與乃服不敢動即縳用誠送于震杖殺之而拔其副以統師始勳赴行在踰半日期帝頗憂比至大喜翌日發奉天既入駱谷懷光以騎追襲賴此兵斷後獲免尋加檢校戶部尚書馮翊郡王實封二百戶天子至梁州宰相以為地貧無所仰給請進幸成都震曰山南密邇畿輔李晟鋭于收復方藉六師為聲援今引而西則諸將顧望責功無期帝未决㑹晟表亦至請駐蹕梁洋議遂定然梁漢間刀耕火種民採稆為食雖領十五郡而賦入才比東方數縣安史後山賊剽略戶口流散震隨宜勸課鳩斂有法民不煩擾而行在供億具焉車駕將還加檢校尚書左僕射詔改梁州為興元府即用震為尹加實封二百户久之進同中書門下平章事貞元十五年卒于京師年七十六加贈太保諡忠穆章全益涪城人少孤鞠於兄全啓母病全啓割股膳母而愈及全啓亡全益服斬衰又斷手一指以報兄之割股終身不娶妻不蓄僮僕獨居一室賣藥於成都貧者不取其一文人但呼為章孝子或云全益能作黃金年九十六無疾怡然而逝李湛鹽亭人其先本饒陽曾祖為射洪丞因家永泰父義府流嶲州死上元初赦還張柬之與李多祚謀誅二張以湛為羽林將軍總禁兵斬關入白武后曰諸將誅逆臣易之昌宗恐漏泄大謀不敢豫奏頓首歸死后病卧顧湛曰我於爾父子不薄亦為是耶遂誅二張遷湛大將軍封趙國公宋陳省華字善則閬中人孟昶時為西水尉入宋纍遷樓煩令端拱三年太宗親試進士長子堯臾登甲科首占謝辭氣明辨太宗問誰子王沔以省華對即召省華為太子中允纍官右諫議大夫乞骸骨不許手詔存問親檢藥方賜之卒贈太子少師子堯臾堯佐堯咨陳堯叟字唐夫解褐光祿寺丞直史館父子同日賜緋纍官兵部侍郎知樞密院事大中祥符初東封加尚書左丞詔撰朝覲壇碑進工部尚書獻封禪聖製頌帝作歌答之祀汾隂進戶部尚書時詔王欽若為朝覲壇頌表讓堯叟加特進賜功臣又以善草𨽻詔書途中御製歌詩刻石五年以本官檢校太傳同平章事充樞密使從幸太清宫加開府儀同三司以有足疾屢請告表求避位優拜右僕射知河陽卒贈侍中諡文忠母馮氏性嚴家本富祿賜且厚不許諸子華侈堯叟尤以孝謹稱陳堯佐字希元以進士歷開封府推官坐言事忤旨降通判潮州㑹鱷魚尾食州人堯佐命二吏拏小舟操網往捕一市皆笑及舉網鱷即弭耳受捕堯佐因作文烹之于市一市皆驚召還直史館歷官吏部侍郎初太后遣宦者起浮圖前守盡毁古碑為磚甓堯佐奏曰唐賢墓石今亡十六七矣子孫深刻大書欲傳之千載乃一旦欲同於瓦礫誠可惜也其未毁者願勑州縣完護之於是乃存一二後以太子太師致仕卒贈司空兼侍中諡文惠堯佐少好學父授堯叟經堯佐竊聽輒先成誦雖已貴猶讀書不輟善古𨽻八分尤工於詩性儉約戒殺生物嘗自志其墓曰夀八十二不為天官一品不為賤使相納祿不為辱三者粗可歸息於父母之域矣陳堯咨字嘉謨舉進士第一歷官翰林學士武信軍節度使知天雄軍卒贈太尉諡康叔堯咨以意氣自任工書善射然豪侈不循法度用刑慘急而兄弟子孫同時貴顯稱為盛族蘇易簡字太簡銅山人父協孟蜀進士入宋纍官光祿寺丞易簡少聰敏好學風度竒秀弱冠舉進士太宗臨軒覆試易簡所試三千餘言立就上特稱賞擢冠甲科歷知制誥翰林學士續唐李肇翰林志二卷以獻上賜詩嘉之又以輕綃大書玉堂之署賜易簡榜於庭㑹韓伾畢士安李至等往觀上聞遣中使賜宴甚盛俄掌吏部選給事中參知政事以禮部侍郎出知陳州卒年三十九贈禮部尚書母薛氏上嘗召入禁中賜冠帔命坐問曰何以教子成此令器薛曰幼則束以禮讓長則教以詩書上顧左右曰真孟母也易簡雅善筆札妙于談笑旁通釋典所著作頗多詳本記成象渠州人以詩書教授里中事父母以孝聞母病割股及父母死廬墓側未嘗食肉衣帛有燕百餘集於廬中禾生墓側而發九穗太宗詔賜束帛醪酒其後割股食親者東關有馮伯瑜負土成墳而廬其側者梓州有何保之永泰有王奭蓬州有狄承嗣嶽池有周八行通泉有黃嘉猷中江有茍允中又有楊榆則事嫡母而孝行純至廣安有陳君節生數嵗母為元兵俘去君節稍長萬里尋訪三年而得之此皆有至性者也王省普成人太宗時廷對稱旨辭爵不受賜號清虛山人其後果州有王充避地黔南與黃庭堅友善庭堅稱其質度溫粹誠心不疑循禮不競蓬州有張先自南渡後每讀徐孺子傳而嘆曰危邦不入亂邦不居如孺子斯可矣遂終身不入城市汝顔安嶽人舉進士調鳯州幕請致仕仁宗喜其髙尚特授太子舍人其後蓬州有鄭修和七嵗日誦萬言登元祐進士知梁州軍祿有餘悉代小民輸稅未及引年即謁歸結茅以居扁曰飯牛菴鄰水有彭戢元祐進士奉祠載雙鶴以歸普成有陳槩乾道進士與兄栗皆隱居不仕名重一時安嶽有杜孟少遊太學時童貫蔡京用事即引歸訓子孫曰忠孝吾家之寶經史吾家之田鮮于侁字子駿閬中人舉進士唐介稱其賢交章論薦侁乃盛言李景陽髙汝士之美乞移與之神宗詔近臣舉所知范鎮以侁對擢利州轉運判官初王安石有重名侁語人曰是人若用必壞天下至是上書論時政可為憂者一可為太息者二其他逆治體而召民怨者不可槩舉其意專指安石也助役法行詔諸路各定所役緡錢利州轉運使李瑜定四十萬侁爭之曰利州民貧地瘠半此可矣各以事聞上是侁議升侁副使仍提舉常平部民不請青苗錢安石詰其故侁曰青苗之法願取則與民自不願豈能強之哉故事二稅當輸絹帛侁奏聽民以畸零納直其後有李元輔者變法多取父老流涕曰奈何改我老運使之法乎蘇軾自湖州赴獄親朋皆不敢通問獨侁往見或勸侁宜焚與軾往來書札不然且連坐侁曰欺君賣友吾不忍為若以忠義獲譴願也哲宗立以侁使京東司馬光言於朝曰以侁之賢不宜居外顧齊魯之區凋敝已甚須侁往救之耳安得如侁者百輩分布天下乎士民聞其重臨如見慈母召為太常少卿未幾以疾求去除集賢殿修撰知陳州卒侁刻意經術注詩斷易孫復嘗與侁論春秋以為學者皆不能及作詩平淡淵粹尤長於楚詞姚煥普州人登進士監益州父子務發奸隱萬緡主者與吏皆當死煥曰戮人以干澤非吾志也義不蔽奸而已請於使者願勿聞於朝第令隂償其數吾寧不受伐奸之賞可也使者曰不隱奸公也不盡法仁也不徼賞義也可謂君子矣欣然從之徙知涪州州有賔化夷多犯境煥施恩信撫納其酋於是相率羅拜庭下訖煥去郡無所犯煥終光祿寺卿卒馮山安嶽人熙寧末為祕書丞通判梓州鄧綰薦為臺官以不諳新法辭不就退居二十年范祖禹薦於朝官至禮部郎中子澥馮澥以進士歷官資政殿學士為文師蘇軾論西事與蔡京忤郡人張庭堅以言事斥象州死澥力賑其妻子及入諫省為白其寃馮如晦安嶽人登進士第時范純仁帥懷慶有訟純仁不法者詔置獄寧州命如晦往訊如晦力辨其誣富弼韓縝皆有詩以美之文同字與可永泰人方口秀眉以學名世自號笑笑先生善詩文篆𨽻行草飛白文彥博守成郡竒之致書於同曰與可襟韻灑落如晴雲秋月塵埃不到同又善畫竹初不自貴重四方持縑素來請者足相躡于門同舉進士元豐初知湖州明年至陳州宛邱驛忽留不行沐浴衣冠正坐而卒崔公度嘗與同同館職最厚一日遇同於京南逆旅都無所言但將别乃辟左右謂公度曰吾聞人不妄語者舌可過鼻即吐其舌三疊之如餅狀引之則至眉間公度大驚及至京師人言同死於陳州蓋即相見之日也同有丹淵集四十卷行于世張天珏嶽池人舉元豐進士纍官諫議大夫蒞官盡職志節甚偉立朝敢言不避權貴景泰安嶽人舉進士歷知寧原二州以竒兵敗元昊於彭陽取鎮戎軍賊不敢犯子思忠為左藏使亦纍立戰功馬從政南部人初未有子買一妾詢知其父卒子官母以貧故鬻女歸鄉從政乃還其女并以直贈之後夢一翁謝曰我妾父也聞之上帝矣當令君家富貴涓涓不絶後生子以涓名登元祐六年狀元上疏忤蔡京罷歸雍孝聞新井人元符末獻䇿詆紹聖用事者時相誣以謗毁先烈亟加流竄終身張庭堅字才叔廣安人登進士髙第歷樞密院編修文字坐拆柬送鄒浩免後召對擢右正言庭堅在職踰月數上封事大要言世之論孝必曰紹復神考夫前後異宜法亦隨變而欲纎悉必復則將敝于一偏必有不便於民而招怨者如此而可謂之孝乎司馬光因時變革以便百姓人心所歸陳瓘執義論諍以去小人多以繼志述事勸陛下者臣恐必有營私之人欲主其言以自售謂復先烈非其徒不可將假名繼述而實自肆矣庭堅每言司馬光吕公著之賢又薦蘇軾兄弟頗忤旨出為京東轉運判官任伯雨言庭堅立身有本末不應罷言職不聽初蔡京守蜀庭堅在幕府與相好及京還朝欲引附己令人諭意庭堅不肯往京大恨遂因事擠之徙象州卒後贈徽猷閣學士諡節愍官其一子蒲卣字君錫閬中人母任氏知書通經號任五經卣舉進士歷通判文州有議欲開文州徑路逹陜西卣言洮岷積石至文甚邇自文出江油此鄧艾取蜀故道也異時鬼章欲從此窺蜀為其阻隘而止夏人志此久矣可為之通道乎議者乃塞纍官中大夫安堯臣廣安人宣和初上書言宦官權臣倡議北伐臣恐唇亡齒寒也徽宗嘉之補承務郎後又上書論女真不可結燕雲不可取書極抗直馮康國字元通本名轓遂寧人為太學生負氣節建炎中苗傅劉正彥作亂張浚外倡諸將致討念二凶居中欲得辨士間之母令有投鼠之忌時轓客浚所慷慨請行浚遣之杭說苗劉曰自古宦官亂政根株相連今二公一旦為國家除數十年之患天下蒙福甚大然主上鼎盛不聞其過豈可遽傳位於襁褓之子且名為傳位其實廢立二公本心為國奈何以此負謗天下傳按劒大怒轓詞氣不屈正彥乃為善詞遣轓還約浚來杭轓再為傳書往返訟言二凶之罪傅黨告轓二公大怒謂轓君尚敢來耶轓曰畏則不來來則不畏轓竟以計得免及勤王之兵大至轓乃說宰相朱勝非以令日當以淵聖為主睿聖復為大元帥少主為皇太姪太后垂簾勝非令與苖劉議皆許諾髙宗遂得反正詔補轓奉議郎守兵部員外郎更名康國歷右司員外郎直顯謨閣知䕫州丁內艱復起提舉川陜茶馬卒于官姚邦基嶽池人舉進士知尉氏縣㑹劉豫僣竊邦基遂棄官去聚徒教授隱于山林及豫敗紹興中徴補京秩張行成字文饒劒門鄉人與兄少成俱登紹興進士而行成得易數之詳著有通變經世翼𤣥通靈等書傳于世楊輔字嗣勳遂寧人乾道二年進士纍遷戶部郎中總領四川財賦㑹利西安撫使吳挺病輔以吳氏世帥武興恐久生變密白二府早擇人望以鎮方面仍移書四川制置使邱崇言統制官李奭乃吳氏腹心緩急不可令權軍崇是其言及挺卒崇乃檄輔權帥事輔不敢輕往乃索印即益昌領事久之以敷文閣待制權知成都府兼本路安撫使時加吳曦宣撫副使假以節制財利之權輔知曦有異志因托言他事遣人以􅈨書告于朝上意輔必能誅曦密詔授輔寶謨閣學士四川制置使許以便宜從事及曦反輔自以不習兵事且內郡無兵遷延不敢發曦移輔知遂寧府輔遂委印於通判而去曦既誅詔進輔為宣撫使輔乃上言臣以衰病軟弱而居元功之上恐牽制敗事乞以事任付丙乃復以為制置使兼知成都久之除兵部尚書以龍圖閣學士知建康兼江淮制置使卒于官諡莊惠安丙字子文安廣人淳熙進士開熙初程松為四川宣撫使吳曦副之是時丙通判隆慶陳十可憂於松言曦必誤國松不省既而曦欲結丙奏為隨軍轉運使居河池金奪和尚原守將棄甲而走曦皆不問而遣客密獻四川求封於是金詔至封曦蜀王曦密受之以書諷程松遁去曦遂稱王建號置官屬加丙中大夫丞相長史權行都省事丙以事起倉卒徒死無益乃陽與而隂圖之遂與楊巨源李好義等謀誅曦事見巨源傳初朝廷聞變莫知所為乃召宇文紹節議之紹節言安丙必不附逆討賊者此人也於是密降帛書與丙帛書未至而露布已聞乃加丙端明殿學士知興州安撫使兼四川宣撫副使歷進觀文殿學士湖廣安撫使俄授崇信軍節度使開府儀同三司丙三辭還蜀㑹董居誼帥蜀大失士心金人乘之直搗梁洋至大安宋師所至輒潰乃以聶子述代居誼未幾紅巾賊張福莫簡叛入利州所過無不殘滅四川大震魏了翁移書宰執謂安丙不起則賊未即平蜀未可定於是詔起丙為四川宣撫使尋授保寧軍節度使兼知興元府利東安撫使丙乃至遂寧賊猶負固於果州之茗山丙下令諸軍合圍絶其樵汲之路以困之未幾張威李貴俘獲張福等十七人以獻後數日盡俘其黨千餘人皆殺之詔賜丙保寧節度使印加丙之子癸仲三秩文華閣學士明年進丙少保居無何卒贈少師賜沔州祠額曰英慧諡忠定游仲鴻字子正南充人淳熙二年進士李昌圖總蜀賦竒其才曰吾董餉七年惟得一士遂薦于朝擢四川制置司幹辦公事時趙汝愚為副使一見即敬之紹熙初赴召至闕下適汝愚在樞密欲親出經略西事仲鴻曰宥密之地幹旋為易獨不聞吕申公經略西事當在朝廷之語乎汝愚悟而止光宗以疾久不朝重華宫仲鴻貽汝愚書陳宗社大計有伊周霍光之語汝愚大駭立焚之不答又貽書曰大臣事君茍利社稷死生以之既不死曷不去汝愚又不答孝宗崩泣謂汝愚曰令惟有率百官哭殿廷以請親臨耳及宰相留正以病去仲鴻亟簡汝愚曰禫日不决禍必至矣汝愚又不答後三日嘉王即位於重華宫拜汝愚右丞相奏遣仲鴻核實淮東西總賦改監登聞鼓院㑹侍講朱熹以論事去國仲鴻上疏曰陛下宅憂之時御批四出不由中書宰相留正之去去之不以禮諫官黃度之去去之不以正令講官朱熹之去去之不以道自古未有舍宰相講官諫官而能自為聰明者也願亟還熹毋使小人得志以養成禍亂慶元初汝愚罷相力丐外除知洋州再擢利州路提㸃刑獄尋豫祠歸卒劉光祖表其隧道曰嗚呼慶元黨人遊公之墓紹定中賜諡曰忠子似游似字景仁嘉定十四年進士纍遷禮部尚書兼修國史入侍帷幄帝問唐太宗治效何速如是似曰人主一念之烈足以旋轉乾坤一日歸仁朞月而可王道曷嘗不速乃托唐太宗事以陳且謂太宗矜心易起漸弗克終僅止貞觀之治願陛下益加聖心治效必速淳祐五年拜右丞相兼樞密使十一章乞歸田里不許十年進國公轉兩官致仕卒贈少保姚希得字逄原潼川人舉嘉定進士歷通判福州徒步就任人不知為通判也屢遷太府寺丞沂靖王府教授時帝斥逐權奸收召名德舉朝相慶希得以為外觀形狀似若清明之朝內察脉息有類危亡之證乃上疏言堯舜三代之時無危亡之事而樂聞危亡之言秦漢以來多危亡之事而常諱危亡之言夫危亡之事不可有而危亡之言不可無後世人主履危如履坦諱言如諱病又言君子非不收召而意向猶未調一小人非不斥逐而根株猶未痛斷大權若操握而不能無旁蹊曲徑之疑大勢若更張而未見有長治久安之道廷臣之所諷諫封囊之所奏陳非不激切而陛下固不之罪亦不之行又言內小學之建人皆知陛下之有意建儲也然嵗月逾邁未見施行邸第之盛人皆知陛下之篤于親愛也然依憑者衆輕視王法請託之行捷於影響女冠者流衆共指目近璫小臣時竊威福此皆陛下之心乍明乍晦之所致豈不謂之危乎國有善類猶人之元氣善類一敗一消元氣一病一衰善類能幾豈堪數消消極則國隨之矣陛下明於知人公於用人固無權奸冉用之意然道路之人往往竊議此元祐紹聖將分之機也禍根猶伏而未决不幾於安其危乎帝改容曰朕决不用史嵩之度宗即位授同知樞密院事參知政事力請致仕授資政殿學士金紫光祿大夫封潼川郡公卒贈少保希得忠亮平實清儉自持好引善類不要虛譽知廣西時官署以錦為㡩幕希得曰我起家書生安用此以繒易之蜀之親族相依者數十家廪餼婚喪竭力以給晚年計口授田有差所著有續言行録橘州文集吳泳字叔永潼川人嘉定二年進士歷官著作郎直舍人院上言願陛下養心以清明約己以恭儉進德以剛毅發強毋以旨酒違善言毋以嬖御疾莊士毋以靡曼伐天性杜漸防微澄源正本使君心之所自立者先有其地然後移所留之聰明以經世務移所分之精神以強國政移所用之心力以恤疲民移所損之浮費以犒邊戍不惟可以消弭災變攘除奸凶雖以是建久安長治之䇿可也纍進寶章閣學士知溫州奏蠲各邑租稅二十餘萬市藥以濟病者帝喜賜衣馬未幾卒所著有鶴林等書弟昌裔吳昌裔字季永早孤與兄泳痛自植立得程頤張載朱熹書輒研繹不倦嘉定七年舉進士聞漢陽守黃幹得熹之學往從之調閩中尉改眉州教授與弟子講說諸經祠周程張朱揭白鹿洞學規倣潭州釋奠儀簿正祭器士習丕變監察御史彈劾無所避丸上躬缺失宫庭嬖私廟堂除授將帥方命女寵私謁舊黨之用邊疆之禍無不盡言嘗言朝廷之上言論多於施行浮文妨於實務右族王宫之冗費列曹坐局之常程羣工閒僈之差除諸道非泛之申請以至土木經營時節宴遊神霄祈禱大禮賜賚藻飾治具無異平時至於治兵足食之方修車備馬之事乃闕略不講且援靖康之弊痛哭言之出為大理少卿屢疏引去乃以權工部侍郎宣撫四川中道病帝憫之改嘉興力辭又改贛州又改婺州婺民日夜望其至乃不忍終辭既至減騶從供帳召邑令周行阡陌蠲租八萬餘錢二十餘萬緡加集英殿學士卒諡忠肅昌裔剛正莊重遇事敢言典章多所間習嘗輯至和紹興諸臣奏疏本末名儲鑑又輯周漢至宋蜀道得失名蜀鑑初昌裔與徐清叟杜範三人一日同入臺皆天下正士人稱為至和三諫作詩以侈之云蒲叔獻南部人為成都漕民歌之曰運使姓蒲民力可蘇召為宗正卿以韓托胄用事請去時論壯之蹇彛通泉人嘉定二年進士纍官通判金州端平三年北兵攻蜀彛堅守戰不能敵被擒不屈而死子永叔復力戰城破舉家死焉弟維之紹定五年進士利州都統辟行參軍事亦迎敵力戰而死特官其子賈子坤字伯厚潼川人嘉定十三年進士為西和推官攝通判關外被兵子坤與郡守陳寅誓死城守城陷子坤朝服與其家十二口死之子純孝以咸淳七年進士為揚州教授文天祥辟佐其幕歷朝散郎崖山師敗純孝抱二女偕妻牟氏同蹈海死張山翁字君夀普州人登景定進士為荆湖宣慰司幹官鄂守張晏然議降元山翁以書責之晏然既降山翁被執元人諭之曰若降不失作顯官山翁不屈元人義之貸不殺後居黃鵠山聚徒教授而終所著有南紀緇林藏雲山相鋤等集宇文百之新井人數世不異居庭前六燕同巢紫荆異本合幹是時中江有牟敏中三世同居通泉黃氏兄弟九人同居終身友愛皆表其閭賈氏中江人淳熙進士楊榆之嫡母夫死不嫁事舅姑以孝聞舅姑皆年九十餘無疾而終賈氏追悼喪葬盡禮有芝草生於墓側榆事賈亦極其孝敬賈年八十康健不衰詔旌其門元范均保儀隴人至正中母疾革均保割股和藥以進母疾遂愈詔立孝感坊以表之許維楨遂寧人為淮安判官屬縣鹽城有二虎為患維禎禱於神祠一虎去一虎死祠前境內旱蝗維禎禱而雨蝗亦息嵗無雪民因多疾維禎復禱雪深三尺朝廷聞其事詔褒奬焉陳君節廣安人當元之末君節生數嵗而兵起母為俘去幾三十年君節寢食不安乃挾家資北往物色經三載得母奉歸孝養不怠韓氏閬中人年十七遭明玉珍之亂慮為所掠乃僞為男子服飾混處民間既而被料為兵居於行伍者七年人莫知其為女子也後從玉珍掠雲南道遇其叔父遂贖歸成都以適尹氏稱為韓貞女蜀中廣記卷四十四
