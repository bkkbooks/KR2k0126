body:
  text: 蜀中廣記卷三明曹學佺撰名勝記第三川西道成都府三北門之勝武擔山子雲宅金馬祠太玄城玉局觀升仙橋萬嵗池學射山其最著者寰宇記云武擔山在府城西北一百二十步一名武都山蜀記云武都山精化為女子美而艷蜀王納為妃不習水土欲去王必留之作東平之歌以悅之無幾物故王乃遣武丁于武都擔土為塜蓋地數畝高七尺上有一石圓五寸徑五尺瑩徹號曰石鏡王見悲悼遂作臾邪之歌龍歸之曲路史曰開明妃墓今武擔山也有二石闕石鏡武陵王蕭紀掘之得玉石棺中美女容貌如生體如氷掩之而寺其上鏡周三丈五尺杜甫題石鏡詩蜀王將此鏡送死置空山冥漠憐香骨提携近玉顔衆妃無復歎千騎亦虛還獨有傷心石埋輪月宇間按武擔山今在藩司門右守西道設焉祗一壞土耳揚子雲賦所謂武擔鎮都刻肖成王基既夷蜀堠尚叢也昔有呪土寺東西二臺西臺有暑雪軒諸勝唐王勃遊武擔山序云若夫武丘仙鎮吳王殉歿之墟驪嶠崇基秦帝升遐之宅雖珠衣玉匣下賁窮泉而廣岫長林終成勝境亦有霍將軍之大隧逈寫祁連樗里子之孤墳竟開長樂豈如武擔靈嶽開明故地蜀夫人之葬迹任文公之死所岡巒隱隱化為闍崛之峯松柏蒼蒼即入秪園之樹引星垣於杏嶂下布金沙棲日觀于長崖傍臨石鏡瑶臺玉甃尚控霞宫寶剎香壇猶分仙闕雕櫳接映臺疑夢渚之雲璧題相輝殿寫長門之月美人虹影下綴虬幡少女風吟遙喧鳳鐸羣公以玉津豐暇傃林壑而延情錦署多間想巖泉而結興于是披桂幌厯松扉梵筵霞屬禪扄煙敞雞林俊賞蕭蕭鷲嶺之居鹿苑仙談亹亹龍宫之偈于時金方啓序玉律驚秋朔風四面寒雲千里層軒回雪齊萬物于三體綺席乘雲窮九垓于一息碧雞靈宇山川極望石兕長江汀洲在目龍鑣翠轄駢闐上路之遊列榭崇闉磊落名都之氣眇眇焉洋洋焉信二蜀之奇觀也昔者升高能賦勝事長存登嶽長謡清標未逺敢扳盛組下揆幽襟庶旌西土之遊逺嗣東平之唱云爾蘇頲武擔山寺詩武擔獨蒼然墳山下玉泉鱉令時共盡龍女事同遷松柏銜哀處幡花種福田詎知留鏡石長與法輪圓段文昌題武擔寺西臺詩秋天如鏡空樓閣化玲瓏水暗餘霞外山明落照中鴈行看漸逺松韻聽難窮今日登臨意多歡語笑同姚向和云開閣錦城中餘間訪梵宫九層連晝景萬象寫秋空天半將身到江長與海通提携出塵土曽是穆清風溫和和云桑門煙樹中臺榭造雲空眺聽逢秋興篇辭變國風坐愁高鳥起笑指逺人同始愧才情薄躋扳繼韻窮楊汝士和云清淨此禪宫層臺復倚空偶時三伏外列席九霄中平視雲端路高臨樹杪風自憐榮末座前日别池籠李敬伯和云臺上起涼風乘間覽嵗功自隨台席貴盡許羽觴同樓殿斜暉照江山極望通賦詩思共樂俱得詠時豐姚康和云松徑引清風登臺古寺中江平沙岸白日下錦川紅疏樹山根淨深雲鳥迹窮自慚陪末席便與九霄通薛濤有段相國遊武擔寺病不能從題寄云消瘦翻堪見令公落花無那恨東風儂心猶道青春在羞看飛蓬石鏡中宋蒲瀛遊呪土寺西臺詩偶到城西寺人言呪土墳夕陽臺半出秋草徑才分地下無紅粉天邊有碧雲徘徊追往事風急葉紛紛又東臺詩城郭層臺逈祗園細路通小亭虛白日老樹足秋風閲世年年改傷心處處同黃泉魂在否紅粉亦成空喻汝礪遊西臺院暑雪軒觀石鏡詩城中苦伊鬱兹軒獨高騫連甍動參差錯畦橫阡眠雪嶠政孤峙若與我周旋逺翠浮蕩漾輕鷗下聫軒密竹罥幽徑新蒲淡清漣初遊愜餘懷既久幽念攢慨彼泉下人灼灼夸令顔忽焉墮榛莽窈窕不可援一鏡空復情况乃塊石頑哀哉彼愚子婉孌情可牽差勝茂陵公更詠方士言吳栻題暑雪軒詩呪土臺頭寺披襟笑語間千年雲抱石六月雪彌山酒熟篘嘗外茶新碾試間要須時點筆來此賦躋扳周燾和云崇臺窮石照氣味樂偷間南陸朱明馭西闌白雪山茶甌回舌本麈尾落談間欲綴風煙句彌高不可扳田望和云聖福軒重敞偶來心地間因談丁士冢知是武擔山人在氷壺裏天垂玉壘間賡歌白雪句巴客強追扳孫俟和云地僻宜逃暑官曹幸頗間虛傳力士擔始信蜀妃山嶺雪青霄畔城煙密樹間清談容欵接妙句獨難扳王澧和云望處疑蓬島天長碧海間雲霞收玉宇煙浪湧銀山茶入清談裏風生兩腋間詩成似西嶺高嶮不容扳宋京補亡詩云君不見蜀王妃子墓突兀城中若山積墓頭寒鏡澀無光妬月欺煙化為石鴻荒無根憑野史直謂山妖化妃子臨終未免懷首丘運土山中葬于此山名武擔錦江邊用是得名千萬年如今佛閣倚空翠老木盤鬱摩蒼天晴雲入冗西山出捲簾坐見嵐光滴安得丈如汲冢書免使後人疑往昔按唐明皇幸蜀從行妃子亦有葬此山者古今集記云望妃樓在子城西北隅明皇以妃墓在武擔山為此樓以望之矣陸遊行武擔西南村落有感詩騎馬悠然欲斷魂春愁滿眼與誰論市朝遷變歸蕪沒澗谷􅞛呀互吐吞一徑松楠遙見寺數家雞犬自成村最憐高冢臨官道細細煙莎遍燒痕注云有大冢高數丈旁又一冢差小莫知何代人也俗號太子墓成都文類云武擔山循城而西有前蜀王光圖墓墓前有永寧佛宫王氏拜掃之所多榿木國志云成都四出大道道實二十里有衢今言十八里者昔蜀王女未嫁年二十亡王哀悼不忍言二十故言十八也王女墓在城北今王女陌是也寰宇記云子雲宅在少城西南角一名草玄堂何涉讀易堂記云楊雄有宅一區在錦官西郭隘巷著書墨池在焉按今在藩司西南隅屬城之北與郡縣俱移來者墨池二字舊是米顛書扁刻于石矣古今詩話唐馮涓字信之信都人大中初舉進士登宏詞科時危隱商山十年昭宗以為眉州刺史陳田拒命涓棄郡於成都墨池灌園自給焉王勃詩亂竹開三徑飛花滿四鄰從來楊子宅别有尚玄人岑參詩吾悲子雲居寂寞人已去娟娟西江月猶照草玄處精怪喜無人睢盱藏老樹宋祁詩宅廢經池在人亡墨溜乾蟾蜍兼滴破科蚪共書殘蠧罷藝猶翠蒸餘竹自寒它揚無可問撫物費長嘆蒲瀛詩寂寞一區宅沈冥千載豪但輕執戟賤誰識草玄高蝌蚪猶翻墨提壺欲載醪著書端有意不必反離騷卲博詩自負天人學甘居寂寞濱却憐載酒客似識草玄人三世官應拙一區宅更貧千年尋故里感涕獨沾巾喻汝礪詩讀書豈不好憂憤還自兹書中見古人隱閔惻餘思遇險理有激尋分意多隨娟娟感姱容戚戚念幽棲曾是無間然孰為愜所宜覽之不自聊悵焉起遙悲宋京補亡詩云君不見子雲草玄西郭門一徑秋草間朝昏何須筆冡髙百尺池墨黯黯今猶存童烏侯芭竟零落玄學無人終寂寞漢家執戟知幾年垂老身投天祿閣俗兒紛紛重劉向思苦言艱動嘲謗漢已中天雄亦亡不較空文從覆醬如今却作給孤園吐鳳亭前池水寒安得斯人尚可作會有奇字令君看按野客叢談劉棻嘗從雄學作奇字者古文之變體也自秦壞古文有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書王莽時使甄豐改定古文復有六書一曰古文孔氏壁中書也二曰奇字即古文而異者三曰篆書秦篆書也四曰佐書即隸書也五曰繆篆所以摹印也六曰鳥書所以書幡信也袁説友成都文類云益州中興寺內有墨池揚子雲讀書處畫像存焉圖經云中興寺有子雲載酒亭是矣成都記云唐髙僧智浩嘗於中興寺誦法華經鄰有龍女祠龍每夜聽之一夕施一寶珠浩曰僧家無用此龍以神力化大圓石榴而去今以水澆之則龍宫石室四字隱隱可見岑參詩龍女何處來來時乘風雨祠堂青林下宛宛如相語蜀人競祈恩捧酒仍擊鼓輿地紀勝云金馬碧雞祠在金馬坊前漢宣帝聞益州有金馬碧雞之神遣諫議大夫王褒持節醮祭而致之宋朝賜為昭應廟封其神為靈光侯漢祭金馬碧雞文曰持節使者王褒敬移南崖金精神馬縹縹碧雞處南之荒深溪回谷非土之鄉歸來歸來漢德無疆廣于唐虞澤配三皇黃龍見兮白虎仁歸來歸來可以為倫歸兮翔兮何事南荒也按今北門內石馬巷有石馬足陷入地金馬祠在巷內碧雞坊則在城之西南杜甫詩云時出碧雞坊西郊向草堂是矣古今集記云髙駢以成都土惡城嵗壞易以磚甓凡負城邱陵悉平之以便農桑訖功筮得大畜之彖曰畜者養也濟以剛健篤實輝光日新吉孰大焉文為以下存上因名太玄城詩話總龜載五五復五五五五逾重數浮世若浮雲金石一如故與君相見時杳杳非今土右詩見於成都羅城北門壞石上有乾符三年髙駢名銜餘字斷缺莫知其為何詩也成都記髙駢展築羅城下令縱民遊觀有孕婦至城北樓免一女駢聞之曰此城他日代代客人為主其後牧守果皆京師所命碑目云髙駢築城記唐中和四年翰林王徽作在城中信相院宋祁題信相院默菴詩對言方有默因默乃名菴菴留默不遣一物遂為三龜掃泥中痕正恐力弗堪自問呵默者了然成妄談景文又題北樓詩云少城西北之髙樓此地蒼茫天意秋驚風白日忽已晚落葉長年相與愁極塞雲物自慘淡趨林鳥雀時啁啾纓上朔塵久不洗安得手弄滄江流按今北門謂之大安門亦王建武成所命也華陽國志城北十里升仙橋有送客觀司馬相如初入長安題市門曰不乘赤車駟馬不過汝下也唐咸通中雲安進士李逺駟馬橋賦所謂題記數行寂寥千載者矣按李膺記云升仙水起自始昌堰有兩又中流即升仙成都記云城北有升仙山升仙水出焉相傳三月三日張伯子道成得上帝詔駕赤文於莵于此上升也岑參升仙橋詩長橋題柱去猶是未達時及乘駟馬車却從橋上歸名共東流水滔滔無盡期羅隱詩危梁枕路岐駐馬門前時價自友朋得名因婦女知直須論運命不得逞文詞執戟君鄉里榮華竟若為江遵詩漢朝卿相盡風雲司馬題橋衆又聞何事不如楊得意解搜賢哲薦明君元虞集歸蜀詩云我到成都住五日駟馬橋下春水生過江相送荷子意還鄉不留非我情鸕鷀輕筏下溪足鸚鵡小窗呼客名賴得郫筒酒易醉夜深衝雨漢州城益州記云升仙亭夾路有二臺一名望鄉臺在縣北九里成都記曰望鄉臺蜀王秀所作杜甫詩神交作賦客力盡望鄉臺蓋指此也升仙橋北長林蒼翠曲澗潺湲大非人世間境乃昭覺禪寺髙僧傳云圓悟禪師宏振法席于此臨終書偈有萬緣遷變渾間事五月山房冷似氷之句矣李畋昭覺寺紀略唐僖宗幸蜀放隨駕進士三榜題名記陳太師塑六祖像蕭相國遘建寺碑俱在寺內又有孫位張南本畫壁長安頒來昭覺寺額經亂而毁范鎮遊昭覺寺詩炎蒸無處避此地忽知寒松砌行無際石房禪自安鴛鴦秋沼漲蝙蝠晚庭寬登眺見田舍衡茅半不完陸遊飯昭覺寺暮歸作云自墮黃塵每慨然携兒蕭散亦前緣聊憑方外巾盂淨一洗人間匕箸羶靜院春風傳浴鼓畫廊晚雨濕茶煙濳光寮裏明窗下借我逍遙過十年方輿勝覽萬嵗池在府北十里華陽國志張儀築城取土處去城十里因以養魚謂之萬嵗池郡國志云龍壇在萬嵗池唐開元中有僧誦法華經感老叟來聽僧問之曰我池中龍也僧曰今方旱何不降雨叟曰凡雨須天符不爾天誅之今當為師降雨師其葬我是夕大雨質明見池邊大蛇斬而雨僧取焚之為立塔呼龍壇録異記云成都至真觀道士黎元興龍朔中於學射山創造觀宇夜夢神人引升髙山大殿之中謁見黃老君身長數丈髭鬚皎白戴鳳冠著雲霞衣侍衛十餘人顧謂元興曰吾近有材木可搆此觀無煩憂也如此數日有人於萬嵗池中乘舟取魚忽見水色清徹池底大木極多以告元興元興令人取之得烏楊木千餘段至有長百尺者用以起觀作黃老君殿依夢像塑之又制三尊殿下及講堂齋壇房廊門宇皆足用焉盧照鄰集云至真觀者隋開皇二年所立有天尊真人石像大小萬餘軀石壇三級周回百步銅鐘一口重七十斤按至真觀後周所立觀側小蠻橋下掘得古碑云始青之下月與日雨半同升合為一大如彈丸甘如蜜出彼玉堂入金石子若得之慎勿失此度世古玄歌也隋辛德源記略云前臨逸陌却負長瀛蕙樓接登景之房瓊臺帶蕩真之室矣今此觀尚存通志云成都萬嵗池廣袤十里溉三鄉田嵗久淤澱王剛中知府日集三鄉夫共疏之纍土為防上植榆柳表以石柱州人指曰王公之甘棠也嵗華紀麗稱三月三日張伯子于學射山上升巫覡賣符于道遊者佩之以宜蠶辟災太守出遊日晚宴于萬嵗池唐司空曙晦日益州北池陪宴詩云臨泛從公日仙舟翠幕張七橋通碧水雙樹接花塘玉燭收寒氣金波隱夕光野間歌管思水靜綺羅香遊騎縈林逺飛橈截岸長郊原懷灞滻陂溠寫江黃常侍傳花詔偏禆伺羽觴豈令南峴首千載播餘芳宋范成大上巳日萬嵗池坐上呈提刑程詠之云降春酒暖絳煙霏漲水天平雪浪遲緑岸翻鷗如北渚紅塵躍馬似西池麥苗剪剪嘗新麵梅子雙雙帶折枝試比長安水邊景秪無飢客為題詩寰宇記云學射山一名斛石山在縣北十五里李膺益州記斛石山有兩女冢矣田况三月三日登學射山詩麗日照芳春良會重元已陽濱修袚除華林程射技所尚或不同兹俗亦足喜門外盛車徒山半列鄽市彩堋飛鏑逺醉席歌聲起回頭望城郭煙靄相表裏秀色滿郊原遙景落川涘目倦意猶逺思餘情未已登髙貴能賦感物暢幽旨宜哉賢大夫由斯見材美趙抃次蘇寀遊學射山詩錦川風俗喜時平上已家家出郡城射圃人稠喧畫鼓龍湫波淨照紅旌迎真昔詫登天虎命侣今聞出谷鶯勉為逺民同樂事使臺仍是得賢明楊甲寒食遊學射山詩疾風吹沙天茫茫日落未落原野黃山空無人不碌碌路長馬飢石齧足荒臺古林翳雲族何人刳嵒縳層屋當時萬騎填山谷至今拾寶多遺鏃故國山川愁逺目人世悲歡風雨速凌髙舉酒天為蹙手扳巖岫扣雲木何人唱我凄涼曲興亡一眼冥冥緑野水平蕪飛鴈鶩范鎮有仲逺龍圖見邀遊學射詩幾年魂夢寄西州春晚歸逢學射遊十里香風塵不動半山晴日雨初收指麾武辨呈飛騎次第紅粧數勝籌夾道綺羅瞻望處管絃旌斾擁遨頭自注云故事往來皆呈馬騎設射堋衆賓皆射遣官妓記籌按學射山者以劉主禪于此學射故名蜀檮杌云王衍乾德二年秋北巡后妃出餞於升仙橋于時旌旗戈甲百里不絶判六軍諸衛事者宰相王鍇也後主戎裝披金甲珠帽錦袖執弓挾矢百姓望之謂如灌口神焉是從來講武備于斯矣今為蜀府墳墓此遊遂絶志云府北三十里有天回山揚雄蜀記以杜宇自天而降號曰天隳及元宗幸蜀返蹕之後土人呼曰天回今謂之天回鎮也寰宇記云玉局壇在城北柳堤玉局觀內按今往新繁路自堤上行十二里有賽雲臺足以當之其側仍有一小觀存方輿勝覽道經二十四化上應二十四氣六十甲子分隸之玉局化其一也彭乘玉局記云後漢永壽元年李老君與張道陵至此有局腳玉床自地而出老君升座為道陵説南北斗經既去而座隱地中因成洞穴故以玉局名之雲笈七籤成都玉局化洞門石室昔老君降現之時玉座局腳從地而湧老君升座傳道既去之後座隱地中陷而成穴遂為深洞與青城第五洞天相連天師以為玉局上應鬼宿恐開穴通氣不利分野乃刻石以閉之因為石室髙六七尺廣一步中鏤玄元之像焉節度使長史章仇兼瓊開元中遍修觀宇崇顯靈迹欲開洞門使人究其深淺發掘之際晴景雷震大風拔木因不敢犯按續博物志玉局觀洞髙駢帥蜀時取罪人以繩絆其腰令探淺深繩兩月方絶出青城山洞天觀門矣靈驗記云天寶嵗玉局觀前江內往往夜中有光從水而出髙七八尺上赤下白其末如煙明皇幸蜀有人於光處得玉像老君以進髙餘一尺天姿瑩潔寶相圓明殆非人工所製駕回留鎮太清宫今聖容壩是其處也亦名玉女壩與金沙泉古迹連接矣宋史祥符七年六月十八日申時玉局化老君洞中忽有五色光出見髙三尺以來移時方散太守凌策畫圖具表以聞趙抃贈玉局李垂應太師詩云坐觀山水地幽清恬淡沖虛樂性情迹混光塵宗老氏術通仙俗似君平欣逢真侣論根本耻向權門叩利名濟世金丹得傳授先生髙隱在青城司馬光送羅郎中登管勾玉局觀詩官名為玉局已與俗塵疏鐘出寒松逈香凝古殿虛鄉閭非甚逺俸祿豈無餘誰道神仙樂神仙恐不如范鎮送羅勝卿同年提舉玉局觀詩匹馬西歸去知君得意偏人情重鄉里官職更神仙曉後無衙喏旬頭有俸錢何須駕白鶴辛苦上青天宋京補亡詩云君不見青陽老人飛下天口宣至道朝羣仙地中神仙捧玉局異事祕怪于今傳龜城坤隅地有穴俗説西與岷山連嵯峨古觀森偉像老柏慘淡含風煙令威已去城郭在人物自改名依然亳州宫庭煥星斗真皇行幸祥符年所託得地近京邑此獨隱晦遐方偏安得老人洗此心還我淡泊同古先蘇軾送戴蒙赴成都玉局觀詩拾遺被酒行歌處野梅官柳西郊路聞道華陽版籍中至今尚有城南杜我欲歸尋萬里橋水花風葉暮蕭蕭芋魁徑尺誰能盡榿木三年已足燒百嵗風光定何有羡君今作峩眉叟縱未家生執戟郎也應世出埋輪守莫欺老病未歸身玉局他年第幾人會待子猷清興發還須雪夜去尋君按子瞻自昌化軍貶所移廉州又移舒州乃敕提舉成都玉局觀他年老焉之讖竟驗然有謝表未赴蜀中廣記卷三
