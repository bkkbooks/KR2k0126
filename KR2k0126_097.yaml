body:
  text: 蜀中廣記卷九十七明曺學佺撰著作記第七集部蜀國文英八卷王蜀嘉州司馬劉贊編見宋經籍志成都文類五十卷宋慶元中制置使建安袁說友編其自序曰天地之祕藏發而為名山大川山川之秀靈斂而為文章華藻二者相為頡頏而光明焉者也兩京三都之賦摹寫天地繪繡山川絢道德掞天庭潤金石諧韶濩與乾坤造化周流盛大於宇宙之間千百世而下知有兩京三都者以此文也然則天地山川而可無此文哉而可以不傳此文哉益故大都㑹也有江山之雄有文物之盛竒觀絶景仙游神跡一草一木一邱一壑名公才士騷人墨客窺竒吐芳聲流文暢散落人間何可一二數也凡此者豫來三年亦既略睹矣或曰兩京三都以賦而傳使無傳焉斯文泯矣然則繇漢以來其文以益而作者今獨無傳可乎有益都斯有此文此文傳益都亦傳矣爰屬寮士托諸方䇿裒諸碑識流傳之所膾炙友生之所見聞大篇雄章英詞綺語折法度極炫耀其以益而文者悉登載而彚輯焉斷自漢以下迄於淳熙其文篇凡一千有竒類為十一目釐為五十卷益之文於兹備矣嗟乎後世之士豈無浮沅湘由巴蜀作史記如司馬子長者乎豈無上瞿唐過䕫梓賦雪錦如杜少陵者乎又豈無自西蜀歷荆楚棲遲山水間如田游巖者乎儻復得如二三公者而訪斯益攬斯文焉則知清寧闔闢至大至廣之內而有所謂蜀蜀六十州亘五千里之內而有所謂益益都無量江漢炳靈之內而有所謂文者其不在此書乎是書也而有傳焉庶幾乎無負於益矣固陵集二十卷宋廣都費士戣達可著嘉定中為䕫守編集管內山川建置碑文記頌為二十卷多半䕫門之書在旁縣者十之二三成都古今詩集六卷章楶編人代未詳出宋史經籍志嘉定詩王象之輿地碑目云岑參為嘉州時編漢司馬相如集二卷後人取其上林賦難蜀父老文及封禪頌諸作編輯為上下卷今刻在漢魏叢書文心雕龍曰相如含筆而腐毫上林繁類以成艷又云相如之難蜀父老文曉而喻博有移檄之骨焉又云相如封禪蔚為倡首爾其表權輿序帝王炳𤣥符鏡鴻業驅前古於當今之下騰休明於列聖之上歌之以禎瑞贊之以介邱絶筆兹文固維新之作也王子淵集王褒字子淵資中人漢書益州刺史王襄使褒作中和樂職詩以宣風化因薦之於朝詔徵褒獻聖主得賢臣頌宣帝嘉之令待詔備歌頌數從行幸受賜為多褒嘗作洞簫頌元帝為太子時令後宫貴人皆誦讀之又微時客湔上戲為僮約一篇劉協云王褒髯奴劵之楷也楊子雲集五卷别傳一卷朝氏曰古無雄集宋談愈好雄文患其散在篇籍離而不屬因綴繹之得四十餘篇又云從父詹事公以道雜取諸書所載雄逸事為一編系之以贊文心雕龍曰子雲屬意辭人最深觀其涯度幽逺搜選瑰麗而竭才以鑽思故能理贍而辭堅矣反離騷一章漢書雄每作賦嘗擬司馬相如以為式又怪屈原文過相如至不容作離騷自投江而死乃作書往往托離騷文而反之自岫山投諸江流以弔屈原名曰反離騷又旁離騷作重一篇名曰廣騷又旁惜誦以下至懷沙一卷名曰畔牢愁畔牢愁廣騷文多不載獨載反離騷二十四針一卷雕龍云子雲稽古始範虞針朝氏曰今廣德所刋本校集中無司空尚書博士太常四針集中所有皆據古文苑而此四針或云崔駰或云崔瑗疑不能明演連珠一卷雕龍云揚雄覃思文濶業深綜述碎文璅語肇為連珠其事雖小而明潤矣漢何汶集汶郫縣人何英之孫也集有世務三十篇李伯仁集二卷李尤字伯仁廣漢雒人也少以文章顯漢和帝時侍中賈逵薦尤有相如揚雄之風召詣東觀受詔作賦拜蘭臺令史安帝時稍遷為諌議大夫受詔與謁者僕射劉珍等同撰漢記後帝廢太子為濟隂王尤上書諫爭順帝立遷樂安相年八十三卒所著詩賦銘誄頌七歎哀典凡二十八篇尤同郡李勝亦有文才為東觀郎著詩誄頌論數十篇文章流别云李尤自山河都邑至於刀筆笇契莫不有銘李密述理論十篇晋書密字令伯犍為武陽人治春秋左氏傳博覽多所通涉皇甫士安雅善之𤣥鳥賦密長子賜少能屬文作𤣥鳥賦舉秀才為汶山太守龔壯邁德論晋書壯字子偉巴西人潔已自守與鄉人譙秀齊名以父叔為李特所害終身不至成都惟研考經典覃思文章每歎中夏多經學而巴蜀鄙陋兼遭李氏之難無復學徒乃著邁德論文多不載何妥文集十卷隋書妥字棲鳯郫縣人傳稱又著孝經義疏二卷陳子昻文集十卷别傳曰子昻字伯玉梓州射洪人始以豪家子馳俠使氣至年十七八未知書嘗從博徒入鄉學慨然立志因謝絶門客専精墳典數年之間經史百家罔不該覽尤善屬文雅有相如子雲風骨年二十一以進士對䇿髙第文明初上書帝覽而異之敕曰梓州人陳子昻地籍英靈文稱偉曄可麟臺正字時洛中傳寫其書市肆閭巷吟諷相屬乃至轉相貨鬻飛馳逺邇拜右拾遺卒年四十二其文章散落多得之於人口今所存者十卷嘗著江上丈人論將磅礴化機而與造物者逰遭家難亡之故人范陽盧藏用集其遺文為序傳識柳宗元撰楊評事文集後序略云文有二道辭令褒貶本乎著述者也導揚諷諭本乎比興者也著述者流出於書之謨訓易之象系春秋之筆削其要在於髙壯廣厚詞正而理備謂宜藏於簡冊也比興者流蓋出於虞夏之詠歌殷周之風雅其要在於麗則清越言暢而意美謂宜流於謡誦也兹二者考其㫖義乖離不合故秉筆之士恆偏勝獨得而罕有兼者焉厥有能而専美命之曰藝成雖古文雅之盛世不能並肩而生唐興以來稱是選而不作者其梓州陳拾遺乎閭邱均集均成都人唐初與杜審言齊名為安樂公主所薦起家太常博士公主被誅均坐貶循州司户卒其孫閭邱師與杜甫通家來往李義府集三十卷唐書義府本瀛州饒陽人其祖為射洪縣丞因家於永泰今之鹽亭也嘗獻承華針見文部李翰林集二十卷一云草堂集朝氏曰李白集舊十卷唐李陽氷序咸平中樂史别得白歌詩十卷凡七百七十六篇又纂雜著為别集十卷宋次道治平中得王文獻及唐魏萬所纂白詩又裒唐類詩洎石刻所傳者通陽氷樂史集共一千一篇雜著六十五篇曽子固乃考其先後而次第之云白蜀人天寶初至長安明皇召為翰林供奉頃之不合去安祿山反明皇在蜀永王璘節度東南白時卧廬山迫致璘敗坐繫潯陽獄崔涣宋若思驗治白以為罪薄釋白囚使謀其軍乾元元年終以璘事長流夜郎遇赦得釋過當塗以卒始終更涉如此此白之詩所自序可考者也舊史稱白山東人為翰林待詔又稱白在宣城謁見永王璘遂辟為從事而新書又稱白流夜郎還潯陽坐事下獄宋若思釋之者皆不合於白之自序蓋史誤耳豫按杜甫詩亦以白為山東人而蘇子瞻嘗恨白集為庸俗所亂則白之自序亦未可盡信而遂以為史誤近蜀本又附入左綿邑人所裒白隱處少年所作詩六十篇尤為淺俗白天才英麗其辭逸蕩雋偉飄然有超世之心非常人所及讀者自可别其真僞也唐宣州當塗令李陽氷序云李白字太白隴西成紀人梁武昭王皓九世孫蟬聯圭組世為顯著中葉非罪謫居條攴易姓與名然自窮蟬至舜五世為庶纍世不大耀亦可歎焉神龍初始逃歸於蜀之彰明復指李樹而生伯陽驚姜之夕長庚入夢故生而名白以太白字之世稱太白之精得之矣不讀非聖之書耻為鄭衛之作故其言似天仙之辭凡所著述言多諷喻自三代以來風騷之後馳驅屈宋鞭撻揚馬千載獨步唯公一人故王公趨風列嶽結軌羣賢翕習如鳥歸鳯盧黃門云陳拾遺橫制頽波天下質文翕然一變而今朝詩體尚有梁陳宫掖之風至公大變掃地併盡今古文集遏而不行唯公文章橫被六合可謂力敵造化歟天寶中明皇下詔徵就金馬降輦步迎如見綺皓坐之七寶牀御手調羹以飲之謂曰卿是布衣名為朕知非素蓄道義何以及此置於金鑾殿出入翰林中問以國政潛草詔誥人無知者醜正同列害能成謗格言不入帝用疏之公乃浪跡縱酒以自昏穢詠歌之際屢稱山東人與賀知章崔宗之等號為八仙時又稱公為謫仙朝列賦謫仙之詞凡數百首多言公之不得意天子知其不可留乃賜金歸之遂就陳留採訪使彥允請北海髙天師授道籙於齊州紫極宫將東歸蓬萊訪羽人駕丹邱耳陽氷試絃歌於當塗心非所好公遐不我棄乘扁舟而相顧臨當挂冠公又疾亟草藳萬卷手集未修枕上授簡俾令為序論關雎之義始愧卜商明春秋之詞終慚杜預自中原有事公避地八年當時著述十喪八九今所存者皆得之他人焉時寶應元年十一月乙酉也前進士魏皓序云自盤古劃天地天地之氣艮於西南劔門上斷橫江下絶岷峨之曲别為錦川蜀之人無聞則已聞則傑出是生相如君平王褒揚雄降有陳子昻李白皆五百年矣白本隴西缺放形因家於綿身既生蜀則江山之英秀也伏羲造書契後文章濫觴者六經糟粕離騷糠粃建安七子七子至白中有蘭芳情理宛約詞句研麗白與古人爭長三字九言鬼出神入瞪若乎後耳白久居峨眉與丹邱子因持盈法師逹白亦因之入翰林名動京師大鵬賦詩家藏一本故賔客賀公竒白風骨呼為謫仙子由是朝士作歌數百篇上皇豫游召白時為貴門邀飲比至半醉令製出師詔不草而而成許中書舍人以張垍讒逐游海岱間年五十餘尚無祿位祿位拘常人橫海鵾負天鵬豈池籠榮之皓始名萬次名炎萬之日不逺命駕江東訪白游天台還廣陵見之眸子炯然哆如餓虎或時束帶風流醖藉曽授道籙於齊有青綺冠帔一副少任俠手刃數人與友自荆徂揚路亡權窆回棹方暑亡友糜潰白收其骨江路而舟又長揖韓荆州延飲白誤拜韓讓之白曰酒以成禮荆州大悅白始娶於許生一女一男男曰明月奴女既嫁而卒又合於劉劉訣次合於魯一婦人生子曰頗黎終娶於宋門携昭陽金陵之妓迹類謝康樂世號為李東山駿馬美妾所適二千石郊迎飲數斗醉則奴丹砂撫青海波滿堂不樂白宰酒則樂皓平生自負人或為狂白相見泯合有贈之作謂余爾後必著大名於天下無忘老夫與明月奴因盡出其文命皓為集皓今登第豈符言耶解携明年四海大盜宗室有某者白陷焉謫居夜郎罪不至此屢經昭洗朝廷忍白久為長沙汨羅之儔路逺不存否極則泰白宜自寬吾觀白之文義有濟代命然千鈞之弩魏王大瓠用之有時議者奈何以白有叔夜之短儻黃祖過禰晋帝罪阮古無其賢所謂仲尼不假蓋於子夏也經亂離白章句蕩盡上元末皓於綘偶然得之沉吟纍年一字不下今日懷舊援筆成序首以贈皓作皓酬白詩不忘故人也次以大鵬賦古樂府諸篇積薪而録文有差互者兩舉之白未絶筆吾其再刋付男平津子掌其他事跡存於後序李太白藁書跋云藁書世傳李太白遺文或謂謝氏子弟誑武功蘇才元所書更不復詳考所出而推與過重便謂不減魯公然此書雖少繩墨不可考以法度要是軒前輊後度越陵突令人想見酒酣賦詩時也王僧䖍論書或以其人可想或以其法可存世人愛李太白名至僞書一卷亦聲價增重豈以其人可想故耶朱巨川集唐朱灣字巨川西蜀人貞元元和間為府從事髙仲武間氣集云朱君率履貞素放情江湖郡國交徵潛耀不起有唐髙人也詩體清逸興用宏深因詞寓意放詠尤工符載集十卷唐符載字厚之岐襄人幼有宏達之志隱居廬山聚書萬卷不為章句學貞元中李巽江西觀察薦其才授奉禮郎為南昌軍副使繼辟西川韋臯掌書記歷監察御史元和中卒假文昌為墓志附於後集皆雜文末篇數詩而已集前有崔羣王湘送符處士歸覲序皆云載蜀人以比司馬王揚云雍陶集十卷陶字國鈞成都人太和中進士為簡州刺史有詩名見詩話李逺集一卷唐建州刺史雲陽李逺求古撰太和五年進士終御史中丞有集傳唐求集一卷唐嘉州處士唐求與顧非熊齊名詳見詩話孫光憲鞏湖編玩三卷荆臺集四十卷筆傭集十卷光憲字孟文陵州人王衍降唐避地荆南髙從誨辟掌書記三世皆在幕府歸宋授黃州刺史在郡有聲乾德中卒光憲博通經史聚書數千卷或自抄寫孜孜讎校老而不廢好著撰自號葆光子所著荆臺集鞏湖編玩筆傭集橘齊集北夢瑣言蠶書又撰續通歷紀事頗失實太平興國初詔毁之皂江漁翁集後唐張立著立新津人少博學尤長詩什隱居山谷中孟蜀明德間詔赴闕立詐病不就先是知詳入蜀中外騷動明宗頗以蜀人為疑凡有勢力資産之族悉遣入洛立嘗為詩諷曰朝廷不用憂巴蜀稱霸何曽是蜀人宰相李昊聞而重之復薦於昶亦托病不就有詩數百篇號皂江漁翁集行世後徙居雙流唐英商英皆其孫也梓潼集二十卷五代李堯夫著詳見詩話玉壘集十卷唐僧可朋著丹稜人煙花集五卷蜀後主王衍集豔詩二百篇且為之序三家宫詞三卷唐王建蜀花蘂夫人宋丞相王圭三人所著花蘂夫人詩一卷青城費氏女詳見詩話蜀中廣記卷九十七
