body:
  text: 蜀中廣記卷七十四明曹學佺撰神仙記第四川南道山海西經皇人之山皇水出焉又有中皇西皇之山按峨眉圖經皇人中皇西皇山即所謂三峨矣五符經曰皇人在峨眉山北絶岩之下蒼玉為屋黃帝往受真一五牙之法焉路史曰泰一氏是為皇人開圖挺紀執大同之制調大鴻之氣正神明之位者也是故九皇傳授以素其自然之所生復自然之解與天地之所始昔者神農常受事於泰一小子而黃帝老子皆受要於泰一元君蓋范元形嘗元味要會久視操法攬而長存者有兵法雜子陰陽雲氣黃冶及泰一之書兵法雲氣書傳間出而黃冶雜子漢後不復見其書言黃帝謁峨眉見天真皇人拜求玉堂三一之道皇人曰而既已君統矣又咨三一無乃朗抗乎古之聖人盍三辰立晷景封域以判邦國山川以分陰陽寒暑以平嵗道執以衛衆交質以聚民備械以防姦車服以章等皆法乎天而鞠乎有形者也天地有啓閉日星有薄失治亂有運會陰陽有期數賢愚之蔽壽夭之質貴賤之事吉凶之故一成而不變類氣浮於上而精氣萃於下性發乎天命成乎人使聖人以為之紀是以聖人欲治天下必先身之立權以聚財葵財以施智因智以制義繇義以出信仗信以著衆用衆以行仁安仁以輔道迪道以保教善教以政俗從俗以育質崇質以恢行勤行以典禮制禮以定情原情以道性復性以一德成德以敘命和命以安生而天下自爾治萬物自爾得神志不勞而真一定矣子以蕞爾之身而百夫之所為備故天和莫至悔吝屢庚生殺失寒暑之宜動靜戾剛柔之節而貪欺終無所用無乃已浮乎黃帝乃終身弗違而天下治其為教也至矣水火大淵之事曷足言哉真文經曰昔天真皇人於峨眉山中告皇帝曰一人之身一國之象也胸腹之位猶宫室也四肢之列猶郊境也骨節之分猶百官也神猶君也血猶民也能知治身則知治國矣夫愛其民所以安其國吝其氣所以全其身民散則國亡氣竭則身死亡不可復存死不可復生至人消未生之患治未病之疾堅守之於無事之前不追之於既逝之後民難養而易散氣難保而易失審威德者保其理割嗜欲者保其無得不勤哉得不成哉道迹經曰越嶲郡卭都縣有小山名濛治山其高無踰伊尹於此學道上有芝英金液草服之度世治應奎宿黎州圖經昔人有駕牛採樵入蒙秦山見二老奕棊其人係牛坐斧而觀局未終老人謂曰非汝久留之所樵者起而斧柯已爛枯矣按蒙秦治道家下品第七治也云伊尹趙升俱得道於此彭祖古陸終氏第三子籛鏗也自堯厯夏殷時封於天彭周衰始浮遊四方晚復入蜀抵武陽家焉按神仙傳彭祖姓籛名鏗帝顓頊之玄孫也殷末已七百六十七嵗而不衰專好恬靜不恤世務不營名譽不飾車服唯以養生治身為事殷王聞之以為大夫常稱疾不與政事善於補𨗳之術恆有少容然性沉重終不自言有道亦不作詭惑變化鬼怪之事又有采女者亦少得道知養性之方年二百七十嵗視之如五六十殷王奉事之於掖庭乃令采女往問道於彭祖請延年益壽之法具授采女以教王王試之有驗屢欲祕之乃下令國中有傳祖之道者誅又欲害祖以絶之祖知之乃去其後七十餘年有人于流沙國西見之按今彭山縣有彭祖塜蘇軾題詩曰猖狂戰國古神仙曵尾泥塗老更安厭世乘雲人不見空墳聊復葬衣冠又有燒香盤在縣治儀門外以石為之其形四方有臺高八尺許相傳為祖燒香祝延之地列仙傳葛由者羌人也周成王時常刻木為羊賣之一旦騎羊入蜀蜀中王侯貴人追之上綏山綏山在峨眉山西南其高無極隨之者不復還皆得仙道故里諺曰得綏山一桃雖不得仙亦足以豪山下立祠數十處靈仙篇云犍為郡東十餘里有道觀名東觀在深巖中石壁四壅有顔道士居之觀殿有石函長三尺餘其上鏨出鳥獸花卉文理纎妙鄰於鬼工而緘鎖極固泯然無毫縷之隙里人相傳云是尹喜石函真人事迹顯於紀傳詳矣將上升之日以石函付門弟子約之曰此函中有符籙慎不得啓啓之必有大禍於是郡人盡敬之唐大厯中清河崔君為犍為守素以剛果自恃既至郡聞有尹真人函笑謂屬官曰辛垣平之詐見矣即詣之且命破鎖顔道士曰真人遺教云啓吾函者且有大禍幸君侯勿輕犯之崔君怒曰尹真人死千嵗安得獨有石函在乎吾不信於是命破其鎖久之而堅然不可動崔君怒又以巨絙係函鼻用數十牛拽其絙鞭而驅之石函遂開中有符籙數十軸以黃縑為幅丹書其文炳然如新崔君既觀畢顧謂顔道士曰吾向者意函中有竒寶故開而閲之今徒有符籙而已於是令緘鎖既歸郡是夕暴卒後三日而寤其官屬將吏輩悉詣門訊焉崔君曰吾甚戅未嘗聞神仙事前者偶開尹真人石函果為𡨕官追攝初見一人衣紫衣至寢謂吾曰我吏於𡨕司者也今奉命追君君固不可拒拒則禍益大矣宜疾去吾始聞憂欲以辭免然不覺與使者俱出郡城僅行五十里至𡨕司其𡨕官即故相吕諲也於吾友善相見悲泣已而謂吾曰尹真人有石函在貴郡向為輒開今奉上帝命召君按驗將如之何吾謝曰昏俗聾瞽不識神仙事故輒開真人函罪誠重然以三宥之典不識不知者俱得原赦儻公寬之庶復自新耳諲曰帝命至嚴地府卑屑何敢違乎即招按掾出崔君籍有頃至白曰崔君餘位五任餘壽十五年今上帝有命折壽十三年盡奪其官諲曰折壽削官則固不可逃然可以為足下致三年假職優其廪祿用副吾子之託乃載拜謝言粗畢忽有雲氣藹然紅光自空而下諲及庭掾僕吏驚而起曰天符下遂揖吾於一室中吾於隙間潛視之見諲具巾笏率庭掾分立於庭咸俯而拱雲中有一人紫衣金魚執一幅書宣道帝命於是諲及庭掾再拜受書便駕雲而上頃之始沒諲命吾出坐啓天符視之且歎且泣謂吾曰子識元三耶吾曰乃布衣之舊耳諲曰血屬無噍類可悲夫我雖然與元三為友至是亦無能拯之徒積悲歎而已語罷又泣既而命一吏送歸再拜而出與使者俱行入郡城廨中已身卧于榻妻孥輩哭而環之使者俱行俯於榻魂與身翕然而合遂寤家中云卒三日矣本郡以白廉使崔即治裝盡室往蜀具告於寧寧遂署攝副使月給俸錢二十萬時元載方知國政寧與載善書遺甚多聞遺之言懼其連坐因命親吏賫五百金賂載左右並得其書百餘幅皆焚之後月餘元載籍沒又二年崔亦終矣列仙傳云陸通者楚狂接輿也好養生食橐盧木實及蕪菁子遊諸名山住蜀峨眉山上人世世見之厯數百年也按晉皇甫謐作高士傳宋劉孝標注世説唐陳子昂賦感遇詩皆以接輿為避楚入蜀隱于峨眉今有接輿歌鳯臺焉列仙傳曰丁次卿者欲還峨眉山語主人丁氏云當相為作漆以罌十枚盛水覆口從次唾之百日乃發皆成漆也秦馬成子扶風人志欲修道棄家訪師遇黃蓋童子授以胎元煉氣之法乃入蜀之鶴鳴山石洞中復遇異人授以神丹曰氣為內丹藥為外丹今授子此丹服之當列高真矣成子遂白日升天方輿勝覽白鶴山在卭州城西八里常璩曰臨卭名山曰四明亦曰羣羊即今之白鶴也漢胡安嘗於山中乘白鶴仙去弟子即其處為白鶴臺司馬相如從胡安先生授易於此列仙傳宿山圖隴西人馬踏折腳山中道人教服地黃當歸羌活玄參一年病愈身輕追道人問自云五嶽使也能隨吾汝便不死山圖追隨六十餘年歸來行母服復去莫知所之按華陽國志宕渠縣出石蜜是山圖所採也蜀都賦云丹砂蜜房山圖采而得道矣輿地紀勝劉景鶴者漢景帝弟也性好修煉安期生謂之曰南溪平蓋山有洞深數十里洞中冰結倒垂如玉笋山之木葉上作符文汝往居焉景鶴遂來修道及魏武帝時始跨鶴仙去宋王宰於洞中見拋下琴劒作詩有騎鶴仙人去不還却留琴劒在人間之句南溪志景鶴仙人洞中琴國朝正德間猶藏在民間景氏及流賊亂遂被擕去青神志云漢光武時有史通平者自會稽來蜀謁天皇真人得授三一之法及五行訣結廬於縣之北平山頂煉大丹龍虎成形餌之白日升舉宋蒲江令郭賢長秋觀石蟾記云縣東十里山名長秋觀號太清按圖志漢唐王楊二真人栖隱之所觀有龍洞洞有石蟾鄉老相傳漢時縣主簿王興好道一旦遇白蟾引至此山升仙而去後人以白石琢蟾像置於洞中眉州志云東南五十里大旺山頂有井現一物圓赤如斗形狀活動剖之甘香異常得一臠者即時羽化臨卭主簿聞之乘騊駼上山僅剩少許食之羽化騊駼舐餘瀝亦化去後人呼為主簿山寰宇記云瞿君字鵲子後漢犍為人入峨眉山四十年得仙乘白龍還家於平岡治白日上升有繫龍橋在新津縣東七里會安鄉尚存記稱瞿君得仙與家人别乘龍於此按新津志謂鵲子上升在縣東南雪峰頂今太清宫是其處又按繫龍潭在彭山縣北四里舊經以為瞿君武也龎籍詩云巢鳯閣邊勞逺夢繫龍灘下認前題洞仙傳云徐道季者少住鵠鳴山後遇真人謂曰夫學道當巾天青詠大厯跖雙白徊二赤此五神道之祕事其語隱也大厯者三皇文是矣道季乃修行而得道焉紫陽真人姓周諱義山字季通汝陰人也周丞相勃之七世孫登峨眉山入空洞金府遇寧先生受大丹隱書八稟十訣退登岷山遇陰先生受九赤班符又退登鶴鳴山遇陽安君受金液丹經九鼎神丹圖晉葛玄字孝先句容人天才超軼名振江南州郡辟為掾固辭乃從左慈精思學道慈有異術能縮地脈得不死藥玄欣受之嘗居昌州之峰腦山修煉餐松實咽黃精自謂曰一炷清香一卷經一輪明月一張琴吾以此自老焉忽謂人曰吾將不久此山招山下人宴以冰桃碧藕乃去而之武都山得雄黃色如鶴冠喜曰吾丹砂可成也後至洪雅之花溪居嵓洞下道成乃上升洞仙傳云郭志生字通明朱提郡人晉元帝時云已四百嵗見之如五十許人有短卷書滿兩篋中常負之多止烏傷張績家每歎曰兵荒方至毒流生民將以溝瀆為棺材蒼蠅為孝子必然之期可為痛心後二年孫恩妖亂冬夏殺害及餓死者十不遺一忽謂績曰應亡為吾備粗材器殯不須釘材亦不須埋但送山巖中以石鎮材上後少日而死績謹依斯教經數日績親人自富陽還見志生騎白鹿山中行作書與績也周天和間合江有道士王法興者以補氣絶粒為事登安樂山捫蘿陟險至絶頂昂而立默而坐甚愛之遂居焉四方請謁甚衆舟車絡繹有齎金帛而獻者先生曰金帛世重豫無用此至拜饋甚勤不得已留之以經葺佛宇偶夜半羣盜持刃入室左右奔駭竄匿先生儼然安坐羣盜揮刃迫脅厲聲恐動先生瞑目不對羣盜異之凝湛頃刻顧謂盜曰爾輩斯來必有圖也藏中金帛非欲私諸已將為聖境修造之費爾輩欲取豫無吝也羣盜挈諸物將奔散先生又曰聽吾一言而去此金帛將歸養父母給親戚可也茍為酒肉費久而耗竭必復有覬覦人神赫怒自陷憲章彼時欲改過自新無由得也豈若留負販以保厥身羣盜驚顧相謂曰逼之不懼取之不吝又訓我以慈愛誠真人矣遂投金帛於地拜伏而去一日與諸弟子訣吾當向綿竹去復來脫一舄置榻下端坐解面如生弟子為具棺殮積薪將化之舉棺覺輕乃復啓視惟所脫舄在衆驚歎暮有樵夫自山前來逢道士去聞者愕然已道士後身生漢州綿竹縣劉氏是為劉真人隋劉真人諱珍字善慶綿竹人前身即合江道士王法興也齠齔風神秀異未嘗作兒戲逮十餘嵗即慕道父母不能止嘗厭㕓市乃曰非雲岩石竇無以養神非金虎木龍無以升天內藥既成外丹必應曽憶安樂山峰巒峭峻神仙境也將復往焉厯戎瀘至合江顧瞻安樂曰戎之平蓋山濁而不清瀘之方山清而不秀此地清秀可託因謁邑大夫洎耆舊詢安樂已事一叟曰安樂自王法興大化後堂殿荒落不可往先生拊髀曰吾全真故處也雖蹈水火不避遂傍溪徑披荆棘而上遍登遺址完葺彌月芟藤蔓闢舊洞以居焉邑之宿儒耆獻深入煙蘿尋至絶頂謁之有老人起而曰吾少時從父老遊此山謁王真人儼若先生先生頷之劉即王也絶粒垂數十年一日召左右請耆庶士人皆至先生曰吾纍生積功今已畢矣四月十五日吾當升天設棚高二丈七尺四面懸絶無梯先生至其所一躍而上北面拜而跪如有伺候須臾東方紫雲縹眇有音樂聲乘雲而去時開皇十九年四月十五日也是日降於隋文帝殿帝驚訝曰何神降於此先生具言其所來言訖辭去帝下殿仰祝之迤邐不見駭嘆異事敕使馳騎合江縣問實本縣實録以聞帝令出省庫錢於仁壽間修成上中下三觀仍賜田土禁樵採天復元年元濟奉詔來牧因覽圖經知安樂山在合江縣乃劉先生修道之處具狀奏乞聖旨蒙降敕命依奏施行元濟據圖籍之所傳慮勝事之或泯次為傳記用廣其聞天祐四年瀘州守張元濟撰按瀘州圖經開皇中劉真人在瀘州安樂山忽取所齎道經鐘磬封于石室曰後六十年當有聖君取之及唐高宗天寶間果遣使取丹經鐘磬以進顯慶中李淑撰三觀記韙其事隋趙昱字仲明與兄冕俱隱青城山從事道士李珏大業末煬帝聞其名徵召不赴督讓益州太守臧賸強起昱至京師縻以上爵不就乞蜀郡從之拜嘉州守時犍為潭中有老蛟為害截沒舟船蜀人患之昱蒞政五月方欲除之會使人往青城山製藥渡江溺原缺燩迅乎電騶倐煉景逝飄滭星遊是日下還只此丹邱舒闡荼壘轡䇿靈州太空逸麟羈絡豈由閬圃間羽羅絙不由洞天皓朗爐鞴經秋此即真人所書矣按酉陽雜爼玄宗幸蜀夢思邈乞武都雄黃乃命中使齎雄黃十斤送於峨眉頂上中使上山未半見一人幅巾被褐鬚鬢皓白二童青衣丸髻夾侍立屏風側以手指大盤石曰可致藥於此上有表録上皇帝中使視石上朱書百餘字遂録之隨寫隨滅寫畢石上無復字矣須臾白氣漫起因忽不見又按法苑珠林王蜀時有僧居成都大慈寺恆誦法華經嘗入青城大面山採藥沿溪越險忽然雲霧四起不知所適有頃見一翁揖之序寒暄翁曰莊舍不逺略迂神足得否僧曰甚願少頃雲散見一宅字陰森既近翁曰且先報莊主人僧入門覩事皆非凡調問曰還齋否曰未遂焚香且覺非常鬱浡請念所業經此僧朗聲誦經翁令誦徹部所饋齋饌皆大慈寺前食物齋畢青衣負竹器以香草薦之乃施錢五貫為師市胡餅之費翁合掌送出問人或云孫思邈先生此僧到寺已經月餘矣其錢將入寺則黃金貨泉也王主聞之收金錢别給錢五百貫其僧散施之後嘉州羅目縣復有人遇孫山人賃驢不償直訴縣乞追攝縣令驚怪出錢代償其人居山下及出縣路見思邈先生取錢二百以授之曰吾元伺汝於此何遽怪乎集仙録云黃觀福者雅州百丈縣民之女也自幼不食葷血好清淨家貧無香取柏子焚之每凝然靜坐經日不以為倦或食柏葉飲水自給不嗜五谷既笄父母欲嫁之忽謂父母曰門首水中極有異物隨往看水果洶湧不息乃自投水中良久不出父母撈摝得一木像天尊古昔所製金彩已駁狀貌與女無異水即澄清無復他物便以木像置於路側號泣驚異而歸其母時來視之憶念不已忽有彩雲仙樂導衛觀福與女伴三人下其庭中謂父母曰女本上清仙人也有小過謫在人間年限既畢復歸上天無至憂念同來三人一是玉皇侍女一是大帝侍晨女一是上清侍女也今年此地疾疫死者甚多幸移家益州以避凶嵗即留金數餅升天而去父母如其言移之蜀郡其嵗疫毒雅地尤甚十喪三四即麟德之年矣今俗呼為黃冠佛蓋以不識天尊像仍是相傳語訛以黃觀福為黃觀佛也總志云唐景雲中京兆道人楊昭慶篤尚玄虛入蜀巡遊至北平化嘆曰史先生得真一之道修之于已白日升天後豈無繼者乎遂居青神之遊仙觀三十餘年感五嶽丈人希受真君授以朱明龍文得尸解唐成無為者開元間丹稜女道士也自幼慕道出家誓死不嫁卜居龍鶴山下調形鍊骨却粒茹芝年踰知命升仙而去栖隱之處有龍洞遺迹羽士趙仙舟奏進其衣履見松柏山碑記本記又載眉山李煉師天寶九載得道在松柏山云集仙録云楊正見者眉州通義縣民楊寵女也幼而聰悟雅尚清虛既笄父母字同郡王生王亦巨富好賔客一旦舅姑會親舊市魚使正見為鱠賔客博戲於廳日昃而盤饌未備正見憐魚之生盆中戲弄之竟不忍殺既晡矣舅姑促責食遲正見懼竄於鄰里但行野徑中忽數十里至一山舍有女冠在焉具以其由白之女冠曰子有仁愍好生之心可教也因留止之山舍在蒲江縣主簿化側其居無水常使正見汲澗泉女冠素不食為正見故時出山外求糧以贍之如是數年正見恭慎勤恪執弟子之禮未嘗虧怠忽於泉所有一嬰兒潔白可愛才及嵗餘見人喜且笑正見抱而撫之以為常矣由是汲水歸遲者數四女冠疑怪而問之正見以事白女冠曰若復然必抱兒徑來吾欲一見耳自是月餘正見汲泉此兒復出因抱之而歸漸近家兒已殭矣視之但若草樹根重數斤女冠見而識之乃茯苓也命潔甑以蒸之會山中糧盡女冠出求糧給正見柴三小束諭曰甑中之物但盡此三束柴火勿輒視之女冠出山期一夕而還是夕大風雨山水溢道阻數日不歸正見食盡餓甚聞甑中物香因竊食之數日都盡女冠方歸聞之歎曰神仙固當有定分向不遇雨水壞道汝豈得盡食靈藥乎吾師常云此山有人形茯苓食者白日升天吾伺之二十年矣汝今遇而食之真得道者也自是正見容肰益異光彩射人常有羣仙降其室與之論真宫天府之事嵗餘白日升天即開元二十一年壬申十一月三日也嘗謂其師曰得食靈藥即日便合登仙所以遲回者幼年之時見父母揀稅錢輸官有明淨圓好者竊藏二文玩之以此為隱藏官錢過罰居人間更一年耳其升天處即今卭州蒲江縣主簿化也汲水之處存焉按臨卭圖經楊正見鄉民楊寵之女年三十無家開元時入蒲江長秋山修煉墾田艱水忽見白牛語曰我伏地下有神水可穿丈餘得水正見如其言果有湧泉後得道上升羽士趙仙甫以事聞進其衣履井迹見存仙傳拾遺云許老翁者不知何許人也隱於峨眉山唐天寶中益州士曹栁某妻李氏容色絶代時節使章仇兼瓊新得吐蕃安戎城差栁送物至城所三嵗李在官舍重門未嘗啓忽有裴兵曹詣門云是李之中表丈人李云無裴家親門不令啓裴固言李小名兼説其中外氏族李方令開門到拜因致餐裴人質甚雅因問栁郎去幾時答云已三載矣裴云三載義絶古人所言今欲如何且丈人與子業因合為伉儷願無拒此禮也而竟為裴丈所妻似不由人可否裴兵曹者亦既娶矣而章仇公聞李之姿容亦欲窺覘乃令夫人特設筵會屈府縣之妻罔不畢集唯李以夫壻在逺辭焉章仇之妻必得一見云但來無苦辭李懼責遂行著黃羅銀泥裙五暈羅銀泥衫子單絲羅地銀泥帔子蓋益部之盛服也裴顧衣而歎曰世間乃華如此衣服顧謂小僕可歸開箱取第三衣來李云不與第一而與第三何也裴曰第三乃非人世所有矣須臾衣至異香滿室裴再視笑謂小僕衣服當須爾耶老章仇何知但恐許老翁知耳乃登車詣節度家既入夫人乃坐客悉皆降階致禮李既服天衣貌益殊異觀者愛之坐定夫人令白章仇章仇徑來入院戒衆勿起見李服色歎息數四因借帔以觀之知非人間物試之水火亦不焚汙因留詰問之李具陳本末使人至裴居處則不見矣兼瓊乃易其衣而進并奏許老翁之事敕令以計須求許老章仇意疑仙者往來必在藥肆因令藥師候其出處居四日得之初有小童詣肆市藥藥師意是其徒乃以惡藥與之小童往而復來且囑云大人怒藥不佳欲見捶撻因問大人為誰童子云許老翁也藥師甚喜引童白府章仇令徑捷百人卒更五十人隨童詣山且申敕令山峰巉絶衆莫能上童乃自下大呼須臾老翁出石壁上問何故領爾許人來童具白其事諸吏叩頭求哀云大夫深慕翁已表矣久之翁亦至焉章仇見之再拜俯伏翁無敬色勤􅈤不已以親吏隨侍許謂吏曰返府我亦隨至及吏問娶李者是誰翁曰此是上元夫人衣庫之官俗情未盡耳章仇求謁帝許云往亦不難乃與奏事者剋期至長安先期而至有詔引見玄宗致禮甚恭敬既坐問云庫官有罪天上知否翁云已被流作人間一國主矣又問之竟何如許云設席施衣於清淨之所當有人來取上敕如其言初不見人俄有旋風卷衣入雲顧矚之間亦失許翁所在靈驗經云嘉州刺史張評士中年已來夫婦俱患瞽疾求方術者不能致退居别墅杜門自責唯禱醮星辰以祈所祐嵗久家業漸虛精誠不退元和七年壬辰八月十七日有書生詣門請謁家人曰主公夫婦抱疾不接賔客久矣書生曰吾雖是書生亦醫術人聞使君有疾故此來爾家人入白評士欣然曰久疾不接賔客客既有方藥願垂相惠書生曰但一見使君自有良藥評士聞之扶疾相見已書生曰此疾不假藥餌明日請丁夫十人鍬鍤之屬為開一井眼當自然痊愈評士如其言而備焉書生即選勝地自晨穿一井至夕見水令評士齋潔焚香志心取水洗之評士眼疾即時明淨平復如初夫婦感而謝之厚遺金帛書生辭曰焉用為吾非世間人太白星官也以子抱疾數年不忘於道精心禱醮上感星辰五帝星君使我降授此術以答子修奉之心金帛之遺非吾所要因留此法令傳教世人以救疾苦用增陰德其法曰子午之年五月酉戌日十一月卯辰日丑未之年八月戌亥日十二月辰巳日寅申之年七月亥子日正月巳午日卯酉之年八月子丑日二月午未日辰戌之年三月寅丑日九月未申日巳亥之年十月申酉日四月寅卯日取其方位年月日時即為福地浚井及泉必有良效評士再拜受之言訖書生上升而去神仙感遇傳云僧悟玄不知何許人也雖寓迹緇褐而潛心求道自三江五嶺黔楚諸名山無不遊厯每遇洞府必造之焉入峨眉山聞有七十二洞自雷洞外諸崖石室邃冗之間無所遺焉偶歇於巨木下有老叟自下而上相挹而坐問其所詣悟玄具述尋訪名山靈洞之事叟曰名山大川皆有洞穴不知名字不可輒入訪須得洞庭記嶽瀆經審其所屬定其名字的其里數必知神仙所居與經記相合然後可遊耳不然有風雷洞鬼神洞地獄洞龍蛇洞誤入其中害及性命求益反損深可戒也悟玄驚駭謝教因問曰今峨眉洞天定可遊否叟曰神仙之事吾不敢多言但謁洞主自可問耳悟玄又問洞主為誰叟曰洞主姓張今在嘉州市門屠肉為事中年而肥者是也語訖别去悟玄復至市門求之張生在焉以前事告之張曰無多言也命其妻烹肉與悟玄為饌以肉三器與之悟玄辭以不食肉久矣張曰遊山須得氣力不致飢乏然後可行若不食此無由得到勉之再三悟玄亦心自計度恐是神仙所試不敢拒命食盡二器厭飫彌甚張又勸之固不能食矣食訖求去張伏地拾一瓦子以授之曰入山至某峰下值某洞門有長松下有回溪上有峭壁此天真皇人所居也以瓦扣之三二十聲門開則入每遇門即扣之則神仙之境可到矣依教入山果得洞與所指無異以瓦扣之良久峭壁中開洞內高廣平穩可通車馬兩面皆青石瑩潔時有懸泉流渠夾路左右凡行十餘里又值一門扣之復開大而平濶往往見天花夾道及禽鳥花卉之異人物往來之盛多是名姝麗人仙童玉女時有仙官道士部伍車騎憧憧不絶又遇一門扣之彌切瓦片碎盡門竟不開久之聞震霆之音疑是山石摧陷惶懼而出奔走三五十步已在洞門外無復來時景趣矣復訪洞主已經月餘屠肆宛然而張生已死十許日自此志棲名山誓求度世入峨眉不知所之感遇傳云宋文才者眉州彭山縣人也少年時與鄉里數人遊峨眉山已及絶頂偶遺其所齎巾履步求之去伴稍逺見一老人引之徐行皆廣陌平原竒花珍木數百步乃到宫闕玉砌瓊堂雲樓霞館非世人所覩老人引登蕚臺顧望羣峰棊列於地有道士奕棊青童採藥清渠瀨石靈鶴翔空文才驚駭問老人曰此為何處答曰名山小洞有三十六天此峨眉洞天真仙所居第二十三天也揖坐之際有人連呼文才名老人曰同侣相求不可久住他年復求可耳命侍童引至門外與同侣相見回顧失仙宫所在同侣曰相失已半月矣每日來求今日乃得相見文才具述所遇之異焉太平廣記昔有叟遇一道人於息臺山攜酒偕其子共飲之道人因取籍檢視謂其子壽年止十八叟哀求之遂舉筆改為八十其後子壽果如其言按息臺山在眉州冶西東館鎮之北志云牟羅漢眉山人名安以廂兵隸倅廳如岷山陟上清坂苦飢忽遇髯者顧笑曰汝飢何不食柏子邪摘柏子投其口顧髯者不復見矣遂不火食亦往往通老莊偶一日江水暴漲舟不可行或戲指其笠曰乘此渡可乎牟遂置笠水面趺坐其上截江以濟觀者異之張逺霄眉州人一日見老人持竹弓一鐵彈三質錢三百文張無靳色老人曰吾彈可辟疫癘宜寶而用之再見老人遂授以度世法熟視其目中各有兩瞳子後往白鶴山垂釣西湖峰上見一老人叩之不答旁一人指曰此君之師四目老翁也不記授竹弓鐵彈時耶張大悟按輿地紀勝仙人張逺霄故宅在眉州治西北宋時園中雙檜猶存李石詩野草間花不記年亭亭雙檜欲參天讀書却得騎鯨老買藥來尋跨鶴仙又按臨卭志白鶴山盧舍那院異時張逺霄仙迹俱在逺霄生眉山自號四郎以靈符神彈救世病苦忽一日書符於壁如四目老翁狀符就落壁隱身不見人即其地立祠焉江安志胡羊道人容貌竒異美髯明眸唐季在縣東南七里山峰絶頂屏世事專志修煉自號胡羊嘗適梓州見獄吏王昌遇有陰德投以仙訣丹成戒以百日後方可服昌遇如其言未幾郡遣來瀘南計事畢夜遇道人於江濵投以馬使乘之馬行如飛比雞鳴落梓州五里石崖上馬化為龍入江去至州檄印尚未乾守疑之繫獄遣人驗明始釋果百日乃餌丹賦詩舉家於大中末白日飛升道人尋亦仙去後人因名其山為胡羊山所棲處曰胡羊觀灶迹見存今重修為青雲觀潼川有馬落崖古碑存感遇傳云王從玘者宦官也蜀主初節制卭蜀黎雅為永平軍從玘為監軍判官自是收剋成都罷鎮為郡從玘栖寓蜀中十餘年食貧好善不常厥居適卭市有老叟睨而視之曰將有大厄濵于死所探懷袖中小瓢以丹砂十四粒與之曰餌此旬中而髯生勿為怪也可以免難矣服之三五日髯果生焉丹餘詔誅宦官從玘亦在其數人或勸其遁去答曰君父之命豈可逃乎俯首赴縶太守哀而上請蜀王特乞宥之視其狀貌且于思乃放還録異記云嘉州夾江令檢校工部尚書朱播嘗居官得疾四支不能運用每轉側皆須數人扶舁以為風廢藥餌攻之不效忽眼痛且瘇晝夜煩楚又數日俄而渴作嗜水及湯飲不知石斗之量又數日狂憤憤若有所覩賴其沉頓不能轉動若不然亦將披髮倮走無所畏憚矣旬日之中四疾相屬風露之危期在旦夕忽見七仙人列坐在前才長五六寸衣帔冠服眉目髭髮厯厯分明五人相倚而坐二人兩畔橫坐播心自思之正坐即有橫坐如何忽聞側畔空中有人應曰既為仙人無所不可何怪橫坐聞訖亦不見所語之人七仙人亦復不見自此常覺有人為握搦手足捫拍背膊所疾漸損其日所嗜冷水湯飲頓減一半如是三五日便能主持公事祇附賔客所疾全愈因畫北斗七星真人供養焉東坡志林云吾八嵗入小學以道士張易簡為師童子幾百人師獨稱吾與陳太初者太初眉山市井人子也余稍長學日益遂第進士制䇿而太初乃為郡小吏其後余謫居黃州有眉山道士陸惟忠自蜀來云太初已尸解矣蜀人吳師道為漢州太守太初往客焉正嵗日見師道求衣食錢物且告别持所得盡與市人貧者反坐於戟門下遂卒師道使卒舁往野外焚之卒罵曰何物道士使吾正旦舁死人太初微笑開目曰不復煩汝步自戟門至金雁橋下趺坐而逝焚之舉城人見煙焰上眇眇焉有一陳道人也東坡陸道士墓志銘云道士陸惟忠字子厚眉山人家世為黃冠師子厚獨狷潔精苦不容於其徒去之逺遊始見余黃州出所作詩論內外丹指略蓋自以為決不死者然余嘗告之曰子神清而骨寒其清可以仙其寒亦足以死其後十五年復來見余惠州則得瘦疾骨見衣表然詩益工論內外丹益精曰吾真坐寒而死矣每從事於養生輒有以敗之類物有害吾生者余曰然子若死必復為道士以究此志余時適得美石如黑玉曰當以是志子墓子厚笑曰幸甚久之子厚去余之河源開元觀客於縣令馮祖仁而余亦謫海南是嵗五月十九日竟以疾卒年五十祖仁葬之觀後蓋紹聖四年也銘曰嗚呼多藝此黃冠詩棊醫卜內外丹無求於世宜堅完龜飢鶴瘦終難安哀哉六巧坐一寒祝子復來少宏寬毋復清詩助痟酸龍虎丸成無或姧往駕赤螭驂青鸞東坡衆妙堂記云眉山道士張易簡教小學常百人豫幼時亦與焉居天慶觀北極院豫蓋從之三年謫居海南一日夢至其處見張道士如平昔汛治庭宇若有所待者曰老先生且至其徒有誦老子者曰玄之又玄衆妙之門豫曰妙一而已容有衆乎道士笑曰一已陋矣何妙之有若審妙也雖衆可也因指灑水剃草者曰是各一妙也豫復視之則二人者手若風雨而步中規矩蓋煥然霧除霍然雲消豫驚歎曰妙蓋至此乎庖丁之理解郢人之鼻斫信矣二人者釋技而上曰子未覩真妙庖郢非其人也是技與道相半習與空相會非無挾而徑造者也子亦見夫蜩與雞乎夫蜩登木而號不知止也夫雞俯首而啄不知仰也其固也如此然至蛻與伏也則無視無聽無飢無渴默化於荒忽之中候伺於毫髮之間雖聖知不及也是豈技與習之助乎二人者出道士曰子少安須老先生至而問焉二人者顧曰老先生未必知也子往見蜩與雞而問之可以養生可以長年廣州道士崇道大師何德順學道而至於妙者也故榜其堂曰衆妙書來海南求文以記之因以夢中語為記紹聖六年三月十五日蜀人蘇軾書輿地紀勝云富順太平興國觀相傳山有異人紹興中玉籍彥室嘗行山間遇道人款話以腹枵告歸道人笑以肘捫其腹三彥室頓覺異常歸即辟穀踰年復夢見道人啖以棗呼之過溪彥室曰吾親在此乃止紀勝云李夔字虞卿既葬父母廬墓有白兔白烏馴擾遇異人與夔語夔不答題墓石云口口思量到此間先知巽六下南山生來自秀培來秀到底恩深有分攀世人曉得斯言者去會蓬萊寶洞間蜀中廣記卷七十四
