body:
  text: 蜀中廣記卷五十六明曹學佺撰風俗記第二上下川南道屬華陽國志云綏和五年犍為上寶磬十六劉向以為美化所降用立辟雍而士多仁孝女性貞専王莽改曰西順郡人不會更始都南陽逺奉貢職及公孫述有蜀郡拒守述伐之郡功曹朱遵逆戰衆寡不敵遵絆馬死戰遂為述所并而任君業閉户費貽素隱光武帝嘉之曰士大夫之郡也嘉州教授任熙明題名記云蜀為西南巨屛繇漢以來號為多士莫盛於眉益二邦而嘉定涎之張剛通義圖序云後世以蜀學比齊魯而蜀之學者亦獨盛於通義政和御筆西蜀惟眉州學者最多修譙樓記云其民以詩書為業以故家文獻為重夜燃燈誦讀聲琅琅相聞矣蘇軾逺景樓記云吾州之俗有近古者三其士大夫貴經術而重氏族其民尊吏而畏法其農夫合耦以相助蓋有三代漢唐之遺風而他郡莫之及也始朝廷以聲律取士而天聖以前學者猶襲五代之弊獨吾州之士通經學古以西漢文詞為宗師方是時四方指以為迂闊至於郡縣胥吏皆挾經載筆應對進退有足觀者而大家顯人以門族相尚推次甲乙皆有定品謂之江鄉非此族也雖貴且富不通婚姻其民事太守縣令如古君臣既去輒畫像事之而其賢者則記録其行事以為口實至四五十年不忘富商小民常儲善物而别異之以待官吏之求家藏律令往往通念而不以為非雖薄刑小罪終身有不敢犯者嵗二月農事始作四月初吉榖稚而草壯耘者畢出數十百人為曹立表下漏鳴鼓以致衆擇其徒為衆所敬畏者二人一人掌鼓一人掌漏進退坐作惟二人之聽鼓之不至至而不力皆有罰量田計功終事而會之田多而丁少則出鈔以償衆七月既望斬艾而草衰則仆鼓決漏取罰金與償衆之錢買羊釃酒以祀田祖作樂飲食醉飽而去嵗以為常其風俗蓋如此故其民皆聰明才智務本而力作易治而難服守令始至視其言語輒了其為人其明且能者不復以事試終日寂然茍不以其道則陳義秉法以譏切之故不知者以為難治云寰宇記云嘉州金燈山即至樂山其趾有淵每嵗人日郡守於此修油卜故事謂以油灑水面觀其紋驗一嵗之豐歉眉州志云人日州人遊重瞳觀觀有仙翁洞云重瞳真人淘丹處洞出靈蟹色白見者生貴子老泉曽禱之在蟇頤山下子瞻詩云春風陌上驚微塵人物初樂嵗華新時間正好路傍飲麥短未怕逰車輪城中車馬厭城郭喧闐競出空四鄰歌舞驚山草木動簞瓢散騎烏鳶馴何人聚衆稱道人遮道賣符色怒嗔宜蠶使汝繭如甕宜畜使汝羊如麕路人未必信此語強為買服禱新春道人得錢徑沽酒醉倒自謂吾符神子由和云江上冰消岸草青三三五五踏青行浮橋沒水不勝重野店壓糟無復清松下寒花初破蕚谷中幽鳥暫嚶鳴洞岩泉胍龍睛動宫觀丹墀鴨舌生山下瓶􅎆霏稚孺峰頭鼓樂聚簮纓縞裙紅袂臨江影青蓋驊騮踏石聲曉去爭先心蕩漾暮歸誇後醉縱橫最憐人散兩軒靜坐愛斜陽著樹明劉繢霏雪録云踏青之逰惟在春時未聞指某月日者蘇潁濵踏青詩序云眉之東門十數里有山曰蟇頤山有亭榭松樹下臨大江每正月七日士女相與嬉逰飲酒於其上謂之踏青也通義志云二月十五村人鬻田器於市因作樂縱觀以為蠶市子瞻和子由蠶市詩云蜀人衣食常苦艱蜀人逰樂不知還千人耕種萬人食一年辛苦一春間間時尚以蠶為市共忘辛苦逐欣歡去年霜降斫秋荻今年箔積如連山破瓢為輪土為釡爭買不翅金與紈憶昔與子皆童丱年年廢書走市觀市人爭誇鬬巧智野人喑啞遭欺瞞詩來使我感舊事不悲去國悲流年霏雪録云眉之蠶市見頴濵詩序坡有荻箔瓢輪土釡等語蓋箔即曲薄薦蠶者也破瓢為輪土為釡者繅所用具耳後漢書曰岑彭至武陽蜀刺客詐為亡奴降夜刺殺彭蜀人憐之為立廟嵗時祠焉眉州志云五月二十三州人賽土主祠祀岑彭其日蓋岑死事也必有霖雨之應眉人諺云天乾不繫乾但看五月二十三上南志云不午日競渡而六月二十四日競渡二郎川主誕辰也樂以賀之七月祭先用蒻頭謂之鬼蒻楊徽之嘉州詩云俗遇臘辰持藥獻吏逢衙日隔花參耆宿因來問封部竹籬西畔是雲南眉俗嵗晚相與餽問曰餽年節東坡詩云農工俱已收嵗事各相佐為歡恐無具假物不論貨山川隨出産貧富稱小大置盤巨鱗橫登籠雙兔卧富人事華靡綵繡光翻座貧者愧不能微贄出舂磨官居故人少里巷佳節過亦欲舉鄉風獨唱無人和眉俗除夕守嵗酒食相過名曰别嵗東坡詩云故人適千里臨别尚遲遲人行猶可復嵗行那可追問嵗安所之逺在天一涯已逐東流水赴海歸無時東鄰酒初熟西舍彘亦肥且為一日歡慰此窮年悲勿嗟舊嵗别行與新嵗辭去去勿回頭還君老與衰已上嘉眉古有輶軒之使以采風俗惟嚴君平與臨卭林公孺知之皆為揚雄所師豫觀陳子昻冬夜臨卭李録事宅集序云下官逰京國久矣接軒裳衆矣池臺鐘鼓雖有會於終朝琴酒管絃未窮歡於永夕豈非殊我親愛異我風俗而使臨堂有懷聞樂增歎者也何功曹舊州耆老迹尚於沉𡨕李録事吾土賢豪義多於遊俠樓臺若畫臨故國之城池軒蓋如雲總名都之車馬於是而興自此而遊安得不放意留歡遺老忘死者歟文同桂花閣記略云卭為要州地物繁縟俚師陋士亦備文采章逢彬蔚實逾於他邦矣華陽國志云秦惠文始皇充定六國輒徙其豪俠於蜀資我豐土家有鹽銅之利户専山川之材居給人足以富相尚故卓王孫家僮千數程鄭各八百人簫鼓歌吹擊鐘肆懸富侔公室豪過田文漢家食貨以為稱首蓋亦地沃土豐奢侈不期而自至也宋張上行曰此郡昔有四利今有四害曰茶曰鹽曰酒曰鐵他郡或有其一或有其二而吾卭獨全昔以為利民競豪富今以為害民皆貧薄矣卭州志云州人插秧所擊鼓曰長腰以木為身首尾蒙皮泥塗其面繫以長纒擊以大槌和以俚歌所以侑勤今則藐矣嵗旱祈雨有打泉之説田至百十丈髙逺者接長竹引水溉之或接至六七十竹者又有戽水者編竹簍如舟中戽斗狀繫二繩其耳二人峙立執繩取水溉之田髙七八尺一丈以上用此亦桔橰之屬也梁益志云大小漏天在雅州西北山谷髙深沉晦多雨舊説黎州常多風雅州常多雨故謂黎風雅雨九州要記云沉黎縣即諸葛武侯征羌之路也每十里作石樓令鼓聲相應今夷人效之所居悉以石為樓地多長松而無雜木孫漸清嘯樓記云襟帶卭笮羈縻諸畨郡縣志云宋初曹光實父子以忠義奮逮皇祐始有登科者雅州志云西郭有聖母廟出靈關道天聖八年西戎叛神默相戎潛遁賜號金蟬聖母紹興間金將侵蜀甚急宣撫吳玠及弟璘夢聖母傳九曲陳法後戰一晝夜十一捷兩敗金兵再奏封焉舊俗每嵗上元日插竹隙地排點九曲蓮燈歌謡鼓舞以表九曲之陳報神功也榮經蘆山亦然志又云宋時雅安景自芳破賊有功常以二月十二作寒食今州人多從之號景村寒食寰宇記云黎州畨部與漢人博易不使見錢漢用紬絹茶布畨用紅椒鹽馬又云卭雅之夷獠婦人娠七月而産産畢置兒水中浮者取養沉者棄之千百無一沉者長則拔去上齒加狗牙以為華飾今有四牙長於諸牙而唇髙者别是一種能食人無長齒者否俗信妖巫擊銅鼓以祈禱至今蘆山縣新安鄉五百餘戶即其遺人也已上卭雅敘南古戎州取西戎即敘之義蜀人呼敘為遂不知何所本華陽國志稱其民徴巫好鬼妖圖經云夷夏雜居風俗各異蓬戶茅簷髽髻詭服頓首拊掌而歌杜甫宴戎州楊使君東樓詩勝絶驚身老情忘發興竒坐從歌妓密樂任主人為重碧拈春酒輕紅擘荔枝樓髙欲愁思橫笛未休吹蘇子瞻過敘州詩江水通三峽州城控百巒亂山圍古郡市易帶羣蠻瘦嶺春耕少孤城夜漏闌往時邊有警征馬去無還自頃方從化年來亦欵關頗能貪漢布但未脫金環何足爭強弱吾民盡玉顔司馬君實送張寺丞知富順監詩漢家五尺道置吏撫南夷欲使文翁化兼令孟獲知盤堆蒟醬實歌雜竹枝詞韓繹詩山髙地笮江水惡刀耕火種黎民疲解旦詩亭臺處處垂楊影街巷家家小酒旗此皆敘述風景之大槩也江陽土地雖迫山川特美鹽井魚池一郡豐沃華陽國志云俗好文刻少儒學多朴野蓋天性也漢光武時被謫不使冠帶者數世其後文風則自宋尚書楊汝明始創五峰書院以為士友會課之所而士翕然興起矣宋都巡檢使鄧巽陽江安安濟廟記曰邑城外汶江淯溪滙流之處隂崖峭峙下臨深潭有神宅焉號曰五龍凡水旱疫癘人有急難丐休於神隨禱輒應形於夢卜惟姓氏末由可考豫按雲笈七籖云人皇之後五龍氏興焉降於開明之國以道治世蒼生於中化生是後運動隂陽作為五行四微世欲生死之業於是而起人乃任性混朴茹毛飲血男女無别夏則巢居冬則穴處此固風俗之權輿也尹吉甫誦清風穆如州人建祠祀之即取清穆之名生子伯竒至孝後母譛之自投江中衣苔帶藻忽夢水仙賜以美樂揚聲悲歌船人學之吉甫聞其聲援琴作子安之操尚有遺音焉孝子傳云僰道縣孝子隗通為母汲江裔水天為出平石生江中今石在馬湖江縣民多踞此石以汲水又有吳順養母至孝赤烏巢其門人皆化之益部耆舊傳引諺云符有先絡僰道張帛帛子廟在鴛鴦圻有飛霞井赤颷自井中出貫日觀者如堵因建飛霞閣焉漢時太守圖先絡之象懸於州門以風來庶戎瀘皆有諸葛武侯廟每嵗蠻人貢馬相率拜於廟前慶符有順應廟乃祀馬謖者嵗以三月二日致祭馬湖之夷嵗暮百十為羣擊銅鼓歌舞飲酒窮晝夜以為樂其所儲蓄弗盡弗已謂之諸葛窮夷法黃魯直初謫涪州别駕自號涪翁量移戎州邦人好事者多從之遊其後溪山悉號曰涪黃太史祠堂記云戎州以涪翁重詩書禮義之澤漸漬至今唐庚子西自眉來居於瀘之安夷門外有瀘川六言詩云百斤黃鱸鱠玉萬戶赤酒流霞餘甘渡頭客艇荔枝林下人家又詩云歌唱竹枝終日楚笛吹梅弄數聲羌蓋瀘州自宋時已為商賈輻輳五方雜處者矣已上敘馬瀘岑參招北客文云其南則有卭崍之關天設險難少有平地連延長山橫亘瀘江傍隔百蠻吁彼漢源上當漏天靡日不雨四時雱然其人如魚爰處在泉終年霖霪時復日出㹞㹞諸犬向天吠日人皆隰寢偏死腰疾復有陽山之路毒瘴下凝白日無光其氣瞢瞢暑雨下濕黃茅上蒸南方之人兮不敢過豈止走獸踣兮飛鳥墮吾不知造化兮何致此方些蜀之南兮不可以居北客歸去來兮蜀中廣記卷五十六
