body:
  text: 蜀中廣記地理類八雜記之屬提要臣等謹按蜀中廣記一百八卷明曺學佺撰學佺有易經通論已著録學佺嘗官四川右參政遷按察使是書蓋成於其時目凡十二曰名勝曰邊防曰通釋曰人物曰方物曰仙曰釋曰遊宦曰風俗曰著作曰詩話曰畫苑搜採宏富頗不愧廣記之名其中如敘州府之髙州明史地理志云洪武五年由州改縣正德十三年復為州珙及筠連三縣𨽻焉此書仍稱髙州為縣二縣亦不為之屬又成都府之資陽縣明史地理志屬簡州此書不繫簡州而别於仁夀井研二縣後皆未免編次偶疏王士禎古夫于亭雜録曰丹鉛録載東坡贈青神楊棟詞云允文事業從容了要岷峨人物後先相照見説君王曽有問似此人才多少而引小説髙宗問馬騏蜀中人才如允文者有幾云云按允文采石之功在南渡後東坡之歿久矣安得先有此詞而曺能始蜀中十志亦載之略無駁正又曰蜀中十志以物類相感志十八卷為東坡撰謬甚則舛訛抵牾亦時時間出蓋援據既博則精粗畢括同異兼陳亦事勢之所必至要之不害其大體談蜀中掌故者終以全蜀藝文志及是書為取材之淵藪也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3912d63903d7516d2d4b40f9e3c97ea25e59313bf0e39cbb456845bc5a54ac08
