body:
  text: 蜀中廣記卷五十九明曹學佺撰方物記第一鳥嚴君平道德指歸云羽者翔虚而神鳯王之揚子雲草𤣥夢吐白鳯于𤣥上蓋鳯有文章而神明者不易見之物也予讀山海經曰都廣之野鸞鳥歌焉則鳯在蜀中己見之矣北周書武帝天和之年渠州上言鳯凰集于楓樹羣鳥列侍者以萬數又唐書天福七年六月鳯凰見萬歲縣即今之開縣也水經註云越巂郡之廢葉榆縣有鳥弔山山上有鳥千百羣飛其㑹時鳴呼啁唽歲必一度大集云鳯凰死於此雲笈七籖云雲頂山鐵像天尊是則天朝濛陽匠人廖元立所鑄初鑄時有紫雲如城其上吐五色以捧日衆共瞻禮間忽有靈鶴數隻引一大烏翼廣丈餘通身赤色其形如鳯衆鶴繞鑪盤旋嘹唳相應大鳥飛勢迅疾徑入鑪中忽起火焰高三五十丈其聲如雷邐迤屬天迸散流溢直遍山上衆皆奔駭已聞異香之氣彌日方散朝野僉載劒南彭蜀間有鳥大如指五色畢具有冠似鳯食桐花每桐結花即來花落即去不知何之俗謂之桐花鳯極馴善止於婦人釵上客終席不飛人愛之無所害也寰宇記云桐花色白至春有小鳥色蕉紅翠碧相間生花中惟飲其汁不食他物花落遂死人以蜜水飲之或得三四日性多跳擲抵觸便死土人畫桐花鳯扇即此也按桐花鳯扇唐李衞公有賦矣瑯嬛記云桐花鳯小于𤣥鳥春暮來集桐花一名收香倒掛又名探花使性馴好集美人釵上出成都疑即東坡詞所謂綠毛么鳯名倒掛耶唐僧隱巒詩五色毛成比鳯雛深藏花裏只如無美人買得偏憐惜移向金釵重幾銖劉言史題蜀客楊生亭云垂絲蜀客涕沾衣歲盡長沙未得歸腸斷錦城風日好可憐桐鳥出花飛李之儀阮郎歸詞詠倒掛云朱唇玉羽下蓬萊佳時近早梅探花情味久安排枝頭開未開魂欲斷恨難裁香心休見猜果知何遜是仙才何妨入夢來宋祁贊云金花之露俗曰鳯類綠羽纎爪藻背翠尾花落則隱以是見貴益州方物略云紅桐嘴出永康軍山谷中絳體若赭惟羽間差黒人亦蓄之然不能久也贊曰絳質剛喙孱黒于衿因網就羇亦馴厥心又云䕶花鳥青城峩眉間徃徃有之至春則啼其音若云無偷花果髣髴人言贊曰茜首黒裳黄駁其羽厥鳴嚶嚶若禁若䕶名而不情盜者猶懼又云百舌鳥出蜀山谷間毛采翠碧蜀人多蓄之一名翠碧鳥善效他禽語凡數十種非東方所謂反舌無聲者徃徃亦矜鬭至死不解然捕者告罕故惜之不使極其擊云贊曰綠衣紺尾一啼百囀可樊而蓄爲世嘉玩拾遺記曰呉黄龍元年越巂之南獻背明鳥止不向明巢常對北多肉少毛聲音百變聞鐘磬笙竽之聲則奮翅揺頭時人以爲吉瑞及遷都建業呉人語訛呼背明爲背亡鳥國中以爲大妖不及百年當有喪亂滅亡之事果如斯言爾雅巂周燕子巂鳥出蜀中説文云蜀王望帝化爲子巂今謂之子規也師曠禽經云江左曰子規蜀右曰杜宇甌越曰怨鳥又云杜鵑出蜀中狀如雀鷂而色慘黒赤口有小冠春暮即鳴夜啼達旦鳴必向北至夏尤甚晝夜不止其聲哀切田家候之以興農事惟食蟲蠧不能爲巢居他巢生子冬月則藏蟄矣揚雄蜀記曰望帝杜宇者蓋天精也稱王時荆州有人化從井中出名曰鼈靈於楚身死屍反泝流上至汶山之陽忽復生乃見望帝立以爲相其後巫山龍鬭壅江不流蜀民墊溺鼈靈乃鑿巫山開三峽降丘宅土民得陸居蜀人住江南羌住城北始立木柵周三十里令鼈靈爲刺史號曰西州後數歲望帝以其功高遂禪位焉號開明氏望帝脩道處西山而隱化爲杜鵑鳥或云化爲杜宇鳥亦曰子規鳥至春則啼聞者悽惻焉酉陽雜俎以杜鵑知陽相推而鳴先鳴者吐血死初鳴時先聽者主離别瑯嬛記昔有人飲于錦城謝氏其女窺而悦之客聞子規啼心動即謝去女恨甚後聞子規啼則怔忡若豹鳴也使侍女以竹枝驅之曰豹汝尚敢至此啼乎故名子規爲謝豹亦主離别也宋鮑照擬行路難詩愁思忽而至跨馬出北門舉頭四顧望但見松栢園荆棘鬱蹲蹲中有一鳥名杜鵑言是古時蜀帝魂聲音哀苦鳴不息羽毛憔悴似人髠飛走樹間啄蟲蟻豈憶徃日天子尊念此死生變化非常理中心惻愴不能言杜甫詩君不見昔日蜀天子化爲杜鵑似老烏寄巢生子不自啄羣鳥至今爲哺雛雖同君臣有舊禮骨肉滿眼身羇孤業工竄伏深樹裏四月五月偏號呼其聲哀痛口流血所訴何事常區區爾豈摧殘始發憤羞帶羽翮傷形愚蒼天變化誰料得萬事反覆何所無萬事反覆何所無豈憶當殿羣臣趨温庭筠詩蜀魄千年尚怨誰聲聲啼血向花枝滿山明月東風夜正是愁人不寐時羅隱詩銅梁路逺草青青此恨那堪枕上聽一種有寃猶可報不如銜石疊滄溟陸龜䝉詩碧竿微露月玲瓏謝豹傷心獨呌風高處已應聞滴血山榴一夜幾枝紅又蜀客春城聞蜀鳥思歸聲引未歸心那知夜夜愁相似爾正啼時我正吟胡曽詩杜宇曽爲蜀帝王化禽飛去舊城荒年年來呌桃花月似向春風訴國亡鷓鴣蜀䕫州郡皆有之宋布衣陸士規入蜀詩云東風吹草綠萋萋路入黄陵古廟西帝子不知春又去亂山無主鷓鴣啼揚雄賦有鷤䳏註云伯勞也蜀童謡有陽雀呌鷤䳏笑之語一名鵙音鴂蜀中名駕鵹滇中名醡油郎好掠人冠巾衆鳥畏之俗又名鳯凰皁𨽻性好獨易緯鵙必單栖樂府東飛伯勞皆一物曹植惡鳥論云昔尹吉甫用後妻譛殺其子伯竒後悟悲傷出遊于田有鳥鳴于桑聲然吉甫動心曰伯勞乎是吾子棲吾輿伯勞尋聲而棲于蓋吉甫乃射殺後妻以謝之故俗惡伯勞鳴言所鳴之家必有尸也錄異記王蜀刑部侍郎李仁表將入貢春官時薛能尚書爲鎮先繕所業詩五十篇以爲贄濡翰成軸於小亭凭几閲之未三五首有戴勝自簷飛入立於案几之上馴狎良久伸頸嚲翼而舞向人若將語久之又轉又舞如是者三超然飛去翼日投詩薛大加禮待以其子妻之爾雅曰鷄大者蜀蜀子䳜郭璞注曰蜀今蜀鷄也䳜鷄子名廣雅云辟䲭鷄也杜艾季蜀皆鷄名禽經云吐綬鷄出巴峽山中人多蓄玩大如家鷄小者如鴝鵒頭頰似雉羽色多黒雜以黄白圓㸃如真珠斑項有嗉囊内藏肉綬常時不見每春夏晴明則向日擺之頂上先出兩翠角二寸許乃徐舒其頷下之綬長濶近尺紅碧相間采色煥爛踰時悉斂不見或剖而視之一無所覩此鳥生亦反哺行則避草木亦謂之避株鳥按食物本草謂之吐錦鷄古今注謂之錦囊蔡氏詩話謂之真珠鷄倦游錄謂之孝鳥詩經謂之㫖鷊巴卭有㫖鷊是矣墨莊澷錄云中官陳彦和言宣和中掌禽苑見蜀中貢一鳥狀如鷰色紺翠尾甚多而長飛則尾開裊裊如雙旗其名曰王母老杜𤣥都壇歌王母晝下雲旗翻即此山海經曰岷山其鳥多鶾鷩郭註云鶾白鷩赤汲冢王會云巴人以比翼鳥蜀人以文鶾文鶾者若臯鷄註爾雅云鶾天鷄赤羽也文若翬雉一名鷐風周成王時蜀人獻之蜀都賦􅳷蛦山栖註鳥名也如今之所謂山鷄其雄色斑雌色里出巴東郡按華陽國志孟獲激其屬反曰官欲􅳷腦三斗即此物也西京雜記成帝時越巂獻長鳴鷄伺鷄晨即下漏驗之晷刻無差每鳴則一食頃不絶長距善鬭蜀都賦碧鷄儵忽而曜儀地理志曰碧鷄在越巂青蛉縣禺同山漢宣帝時方士言益州有碧鷄神可以醮祭而致也使諫議大夫王褒持節徃求之褒道病竟不能致成都有碧鷄坊蓋祠所也老杜詩時出碧鷄坊其後西川校書薛濤營宅于碧鷄坊老焉漢書元始元年正月王莽白太后下詔以白雉薦宗廟蓋莽風益州令塞外蠻夷所獻也災祥志云蜀建興九年十月江陽至江州有烏從江南飛渡江北不能達墮水死者以千數是時諸葛亮連年動衆志吞中夏而終死渭南所圖不遂又諸將分爭頗喪徒旅烏北飛不能達墮水死者皆有其象也蜀李雄書曰武皇帝雄泰成三年白烏赤足來翔帝以問范賢賢曰烏有反哺之意必有逺人懷惠而來果闗中流民請降宋書孝武大明五年六月赤烏見蜀郡益州刺史劉思考以獻周書武帝保定天和等年益州獻三足烏者凡數次按相如大人賦以三足烏爲之使矣山海經崌山江水出焉有鳥狀如鴞而赤身白首其名曰竊脂可以禦火郭璞註云今呼小青雀曲嘴而肉食者爲竊脂疑非按本草云蜀徼有火鴉能啣火是也人家多避之山海經乃謂其可以禦火是必以焚灼之具而作威福于人者黔中有山胡鳥善鳴一作山呼東坡過涪州得山胡詩云終日鎖筠籠囘頭惜翠茸誰知聲㗲㗲亦自意重重夜宿烟生浦朝鳴日上峯故巢何足戀鷹隼豈能容蜀都賦彈言烏於森木註言鳥鸚鵡也南方異物志曰鸚鵡有三種青大如烏臼者白大如鴟鴞者五色大於青雀者交州巴南盡有之凡鳥四指三向前一向後此獨兩指向後性好食芝麻劉艾漢獻帝傳興平元年詔曰徃者益州獻鸚鵡三枚夜食三升麻子今穀價騰貴此鳥無益有損可付安西將軍楊定令歸本土是矣予武擔署園中有松樹數株每花熟時此鳥羣過而掠之颯颯有聲綠雲蔽天登時花爲之盡采摘稍遲惟有悵惜唐節度使韋公臯常蓄一鸚鵡其夫人河東裴氏教以念佛他日奄化用闍維法葬之有舍利十餘粒乃作塔記云元精以五氣授萬類雖鱗介羽毛必有感清英純粹者或炳耀離火或稟竒蒼精皆應乎人文以奉若時政則有革彼禽類習乎能言了空相於不念留真骨於已斃殆非元聖示現感於人心同夫異緣用一真化前歲有獻鸚鵡者曰此鳥聲容可觀音中華夏有河東裴氏者志樂金􅋖之道聞西方有珍禽羣嬉和鳴演暢法音以此鳥名載梵經智殊常類意佛身所化常狎而敬之始告以六齋之禁比及辰後非時之食終夕不視固可以矯激流俗端嚴梵倫或教以持佛名號者曰當由有念以至無念則仰首奮翼若承若聽其後或俾之念佛則黙而不答或謂之不念即唱言阿彌陁歴試如一曽無爽異余謂其以有念爲緣生以無念爲真際緣生不答以爲緣起也真際離言定本空也每虚室戒曙發和雅音穆如笙竽靜鼓天風下上成文念念相續聞之者莫不洗然而嘉善矣於戲生有辰乎緣有盡乎以今年七月悴爾不懌已日而甚馴養者知其將盡乃鳴磬告曰將西歸乎爲爾擊磬爾其存念每一擊磬一稱彌陀佛洎十擊磬而十念成斂翼委足不震不仆奄然而絶按釋典十念成徃生西方又云得佛慧者殁有舍利知其説者固不隔於殊類哉遂命火以闍維之法焚之餘燼之末果有舍利十餘粒烱爾燿日瑩然在掌識者驚視聞者駭聽咸曰茍可以誘迷利世安徃而非菩薩之化歟時有高僧慧觀常詣三學山巡禮聖迹聞説此鳥涕淚悲泣請以舍利於靈山用陶甓建塔旌異也余謂此禽存而由道殁有明徵古之所以通聖賢階至化者女媧虵軀以嗣帝中衍鳥身而建侯紀乎䇿書其誰曰語怪而况此鳥有𢎞於道流聖證昭昭胡可黙已是用不愧直書于詞貞元十九年八月十四日記韋又蓄一孔雀鑿池以居之武公元衡來繼任此鳥猶在使宅因作詩傷之一時屬和皆名士焉韓愈詩云穆穆鸞鳯友何年來止兹飄零失故態隔絶抱長思翠角高獨聳金華煥相差坐䝉恩顧重畢命守堦墀白居易詩云索莫少顔色池邊無主禽難收帶泥翅易結著人心頂毳落殘碧尾花銷闇金放歸飛不得雲海故巢深王建詩云孤號秋閣隂韋令在時禽覓伴海山黒思鄉橘柚深舉頭聞舊曲顧尾惜殘金顦悴不飛去重君池上心建又有傷韋令孔雀詞可憐孔雀初得時美人爲爾别開池池邊鳯凰作伴侣羌聲鸚鵡無言語雕籠玉架嫌不栖夜夜思歸向南舞如今憔悴人見惡萬里更求新孔雀熱眠雨水饑拾蟲翠尾蟠泥金彩落多時人養不解飛海山風黒何處歸武相國在蜀又有春曉聞鶯詩韓愈和云早晩飛來入錦城誰人教解百般鳴春風紅樹驚眠處似妒歌童作艶聲王建和云侵黑行飛一兩聲春寒囀小未分明若教更解諸餘語應向宫花不惜情予按成都文類武公元衡中秋登錦城樓詩席客和者至十許人皆知名士公亦節鎮之有文而好事者與盛𢎞之荆州記曰雁塞北接梁州汶陽郡其間東西嶺屬天無際雲飛風翥望崖迴翼惟一處爲下朔雁達塞矯翮裁度故名雁塞同於雁門也梁州記曰梁州縣界有雁塞山傳云此山有大池水雁栖集之故因名曰雁塞成公綏雁賦云奔巫山之陽隅兮趍彭澤之遐裔矣方物略云荏雀每歲荏熟則羣至食其實性好鬭人捕之裒錢使决勝負閭里曹觀至一雀直數千錢官司惡民贅聚每下符禁叱之賛曰緇綠厠彩喜荏充膒奮頸毰顋矜健于咮里人裒貲以佐其鬬按荏菽今之胡豆也傅𤣥蜀都賦曰鷹則流星耀景奔電飛光青骹素羽飄雪繁霜范鎮東亝記事云嘉陵江上見二鶻擲卵相上下以接之蓋習其飛也其胎教之意乎又翅羽未成躍出穴巢徃徃墜崖下死其天性峻勇是亦躁進之類也予今歲在錦城立秋後一二日親見此種物盤空搶地作得意狀蓋非搏擊則不能躁進勢相因矣山海經云梁渠之山有鳥焉名曰囂其音如鵲食之止衕郭註治洞下也盛𢎞之荆州記曰巫縣有鳥如䳄鷄其名爲鴞楚人謂之鵩青城外史云梟鳥晝不見泰山夜則察秋毫此徃志所載也灌縣最多梟形如楚梟而小遇五更則鳴人鮮忌之然晝則目明夜則反暗此可以補記載之遺按梟鳥不宜晝明而晝明者以時尚伺察白晝公行故耳何足異云蜀都賦風胎若鶂註風胎鳥名未詳按莊子曰鶂相視眸子不運而風化即此物也蜀人呼鶺鴒爲連㸃七五代時有問洪杲禪師曰如何是連㸃七師云屈指數不及地上無蹤迹廣志曰野鴨雄者赤頭有距鶩生百卵一日再生有露華鶩以秋冬生卵並出蜀杜甫花鴨詩云花鴨無泥滓堦前每緩行羽毛知獨立黒白太分明不覺羣心妒休牽衆眼驚稻梁霑汝在作意莫先鳴甫又有鸂䳵詩云故使籠寛織須知動損毛看雲莫悵望失水任呼號六翮曽經翦孤飛卒未高且無鷹隼慮留滯莫辭勞蓋多自况之意也獸李膺益州記云張道陵登仙之所常有麒麟白鶴遊翔其上武陽志云漢朱褒獲麒麟於馬頰嶺故界有麒麟橋也唐書元和七年冬東川觀察使潘孟陽奏龍州平武縣嘉禾生有麟食之麟之來羣鹿環之光彩不可正視使畫工圖獻焉張仲素表賀曰伏見劒南東川觀察使潘孟陽奏龍州寳華山中有麟見獨角馬蹄遍身光耀并嘉禾二十二莖至八十九穗麟見與鹿每來同食各畫圖函盛封進者臣聞六合同歸則麒麟至天下和一則嘉禾生伏惟陛下昭事上帝凝情衢室宵興滌慮申旦忘倦大敷至化以永時邕故得希世之祥應我皇運異質卓犖竒彩光明顧步幽巖發聞郡國神物自生於聖日靈編徒載其嘉名况大田之中衆穗斯茂沐以膏澤扇其祥風而後呈彼珍羣承兹共觝必生長畝之秀以期王者之瑞因緣所驗鄭重合符有以識上聖之心兆至和之本德超千古慶洽無疆日月所均無思不服臣等幸覩休異喜萬恒情無任抃躍之至按蜀檮杌王建武成年麒麟屢見則皆僞物不足書也漢神爵中方士言益州有金馬神詔資中王褒徃祠之蜀都賦所謂金馬騁光而絶景也今成都治内有金馬坊坊側有祠宋賜額名昭應云華陽國志曰㑹無縣有天馬河天馬日行千里死於蜀葬江原小亭今天馬塚是也縣有天馬祠民家馬牧於山下或産駿駒云天馬子今有天馬徑厥跡存焉元微之曰德宗皇帝以八馬幸蜀七馬道斃唯望雲騅來徃不頓貞元中老死天廏臣稹作歌以記之憶昔先皇幸蜀時八馬入谷七馬疲肉綻筋攣四啼脱七馬死盡無馬騎天子䝉塵天雨泣巉嵒道路淋漓濕峥嶸白草𦕈難期謥洞黄泉安可入朱泚圍兵抽未盡懷光寇騎追行及嬪娥相顧倚樹啼鵷鷺無聲仰天立圉人初進望雲騅衫色顦顇衆馬欺上前噴吼如有意耳尖卓立節踠竒君王試遣迴胷臆撮骨鋸牙駢兩肋蹄懸四跼腦顆方胯聳三山尾株直圉人畏誚仍相惑此馬無良空有力頻頻嚙掣轡難施徃徃跳趫鞍不得色沮聲悲仰天訴天不遣言君未識亞身受取白玉羈開口銜將紫金勒君王自此方敢騎似遇良臣久悽惻龍騰魚鼈啅然驚驥盼驢騾少顔色七聖心迷運方厄五丁力盡路猶窄槖駝山上斧刃堆望秦嶺下垂頭石五六百里真符縣八十四盤青山驛掣開流電有輝光突過浮雲無朕跡地平險盡施黄屋九九屬車十二纛齊映前導引騅頭帝自奉天奔梁道險澁齊映為帝御㑹馬駭突帝命捨轡映曰馬奔踶不過傷臣捨之或驚清蹕嚴震迎號抱騅足時震為山南西道節度使聞帝徙蹕馳表奉迎路傍垂白天寳民望騅禮拜見騅哭皆言𤣥宗當時無此馬不免騎騾來幸蜀雄雄猛將李令公李晟也収城殺賊豺狼空天旋地轉日再中天子却坐明光宫朝廷無事忘征戰校獵朝回暮毬宴御馬齊登擬用槽厩中號乗輿之馬曰擬用槽君王自試宣徽殿圉人還進望雲騅性強歩闊無方便分騣擺仗頭太髙擘肘廻頭項難轉人人共惡騅廻跋潛遣飛龍減芻秣銀鞍繡韂不復施空盡天年御槽活當時鄒諺已有言莫依功髙浪開闊登山縱似望雲騅平地須饒紅叱撥長安三月花垂草果下翩翩紫騮好千官煖熱李令閒平朱泚之後天子既厭兵患將臣生事而張延賞當國復與李晟有隙勸帝奪其兵柄百馬生獰望雲老望雲騅爾之種類世世竒當時項王乗爾祖分配英豪稱覇主爾身今日逢聖人從幸巴渝歸入秦功成事遂身退天之道何必隨羣逐隊到死蹋紅塵望雲騅用與不用各有時爾勿悲資暇集云成都府出小駟以其便於難路號爲蜀馬今宣城郡亦有小馬時人皆呼爲宣州蜀馬也晉史明帝密知王敦將舉兵内向乃乘巴滇駿馬微行至于湖隂察敦營壘敦覺而追帝帝乃馳去馬有遺糞處輒以水灌之北魏李孝伯宣㫖語張暢曰若須大馬魏主當送脱須蜀馬亦有佳者唐人嘲武懿宗曰長弓度短箭蜀馬臨階騗蓋以蜀馬之低尚須臨階乃得上其無超距之勇自見字書騗音匹轉躍而上馬也大都蜀馬短小精悍俯仰便捷亦地勢使之然耳予閲後梁春秋武陵王紀在蜀器甲殷積有馬八千匹元和郡縣志劒南節度唐都管兵三萬四千七百人馬三千匹蜀檮杌王建武成二年講武於星宿山步騎二十萬官馬八千私馬四千雖各侈其盛而神駒名駿未常旦暮遇之者及觀渝州志載謨烈輯遺云洪武四年明昇以全蜀降獻良馬十其一色正白蓋得之於羅鬼國養龍坑牝馬與龍交而生者身長十有一尺首高數尺足之高比首殺其二尺有肉隱起項下約厚五寸廣三寸餘貫脉絡腹至尾閭而上精彩明晃振鬛一鳴萬馬爲之辟易韉勒近前則作人立而吼上謂天既生此英物必有神以司之親撰祝册詔有司以牲醪祀于馬祖然後勅典牧副使高敞囊沙四百斤壓之人跨囊沙上使之游行苑中久之性漸柔馴適八月癸巳上將行朔月禮於清凉山壇於是乘之而出如躡雲而馳一塵弗驚皇情悦豫賜名飛越峯復命御用監馬晉臣繪其行藏焉斯蓋不世出之物以待不世出之主也噫其神哉鄭棨開天傳信記云𤣥宗將登封泰山益州適進白騾潔朗豐潤權竒偉異上遂親乘之柔習安便不知登䧏之倦也告成禮畢復乘而下至山㘭少休有司奏白騾無疾而殪上歎異久之諡曰白騾將軍命有司具槥櫝以葬之疊石爲墓在封禪壇北里許華陽國志秦昭襄王時白虎爲害自秦蜀巴漢患之乃重募有能殺虎者邑萬家金帛稱之於是夷朐忍廖仲藥何射虎秦精等乃作白的弩於高樓上射虎中頭三節白虎常從羣虎瞋恚盡搏殺羣虎大呴而死按天官書參爲白虎蜀當井參分野故白虎常爲害也朝野僉載周武后永昌中涪州多虎暴有一獸似虎而大逐虎噬殺之錄奏檢瑞應圖乃酋耳也不食生物有虎則殺之蜀記文翁在蜀日常言少力田方聚柴爲陂未就夜有百十野猪鼻載土著柴中比曉塘成稻常倍收又嘗欲斷一大樹指斷處去地一丈八尺祝曰吾得二千石斧當着此處因擲之正着欲砍處爾雅犘牛註云犘音麻重千斤出巴中犩牛註云牛之大者出蜀中山海經曰岷山多犪牛犀象晉興元年此牛出上庸郡人弩殺之得三十擔肉博物志曰越巂國有牛稍割取肉經日必復生如故按𤣥中記云割而復生名曰反牛矣莊子云犛牛大若垂天之雲註云出荆䕫間角向前毛白如雪今人常以爲拂子方物志云犛牛出西羌尾長而動中國以爲纓人或射之則自斷其尾若左氏所謂雄鷄也闞駰十三州志云旄牛縣屬蜀郡出旄牛歲貢其尾以爲節旄宋孔甯子犛牛賦曰惟兹獸之攸生亦棲遐而憑阻遁綿野於岷隅挹清源於庸渚奔逸躅而倫載賁首而亂羜茸長氂之髤䰄戾狼情而首鼠邁羔羊之如膏侔蜉蝣之楚楚既作表於禮樂又爲容於軍旅奉藩岳之休明被戎荒而既序班琛賂而來庭超笻蒟乎其所矣爾雅云南方之美者有梁山犀象焉巴浦之犀其可遇乎常璩云㑹無土地時産犀牛江表傳曰諸葛亮討賊還成都孫權遣勞問之送馴象一頭與劉禪予觀國史傅征虜圍成都僞相戴壽等驅象出戰而今不可得也爾雅云麢大羊疏略曰西域多兩角有一角者爲勝角甚多節蹙蹙圍繞别有山羊角極長惟一邊有節節亦疎大而不入用羌夷云此即名麢羊一名龍羊益州方物略龍羊出吐蕃及威茂州形似蓄羊而大其角繚繞重八九兩黒質而白文可以爲帶胯其用亂犀賛曰羊質而大角繚于首以角之珍軀殘獵手按本草麢羊質堅可碎金剛一絲貫頂持入耳邊自鳴能清肝肺熱夜眠倒掛于樹上人覔之不可得禪家有麢羊掛角之喻也市所鬻者山羊耳益部談資云羚羊皮毛色青兵中卧之有警則自動又云羊名蟠者其角年久而蟠皮可坐數人恐亦祗可作談資也唐書張説爲相時𤣥宗意欲討吐蕃説密奏許其通和以息邊境𤣥宗不從及𤓰州失守王君㚟死説因獲巂州鬭羊上表獻之以申諷諭其表云臣聞勇士冠鷄武夫戴鶡推情舉類獲此鬭羊逺生越巂蓄性剛决敵不避强戰不顧死雖爲微物志不可挫伏惟陛下選良家於六郡求猛士於四方鳥不遁才獸不藏伎如䝉効竒靈圃角力天場却鼓怒以作氣而躑躅以奮擊趹若奔雲之交觸碎如轉石之相叩裂骨賭勝濺血爭雄敢毅見而衝冠鷙狠聞而擊節冀將少助明主市駿骨揖怒蛙之意也若使羊能言必將曰若鬬不解立有死者所賴至仁無殘量力取勸焉臣緣損足未堪履地謹遣男詣金明門奉進𤣥宗深悟其意賜絹及雜綵一千匹是則以鬭止鬭以羊活人賢于大宛馬卭竹杖逺矣韻㑹云益州有鹿䴧乃鹿之美者蜀州古有鹿市之説今不能有也蜀都賦云射噬毒之鹿註云有神鹿兩頭主食毒草名曰食毒鹿出雲南郡此魏宏南中所記然汶山亦有之九州要記云汶山有食藥鹿其腸中糞亦療毒疾是矣晉史泰始年白鹿見梁州刺史杜幼文以聞游梁雜記榮經山中畋人得一白鹿將以獻邑侯其鬛如銀兩角透明角尖挂一銅牌上有數字磨勩莫辨惟一唐字稍現邑侯命釋之蜀中亦徃徃有白兔嘉靖初獲自梁山者守臣導諛以獻不久尋斃而建亭豎碑焉今謂之白兔亭也酉陽雜俎引韋絢云巴州兔皆作貍斑寰宇記云蜀中舊無兔鴿隋王秀鎮益州命左右齎徃鴿尚稀而兔已衆矣詩話云川北山中多麝絶愛其臍每爲人所逐勢且急即自投高巖舉爪裂出其香就縶而死猶拱四足以保其臍李商隱詩投巖麝褪香以此青城外史載嵇康云麝食栢而香今吐蕃山中最多麝但此獸好食蛇中散之言未爲實錄也然今之名存而實亡者何必麝然猿蜀郡山中多有之惟三峽最著酈道元云魚復縣廣陵峽多猨猨不生北岸非唯一處或有取之放著北山中初不聞聲將同狢獸渡汶而不生矣此三峽之首也荆州記曰峽中猨鳴至清諸山谷傳其響泠泠不絶行者歌之曰巴東三峽猿鳴悲猿鳴三聲淚霑衣然其通臂善緣騰空攬蔓能於空中輪轉以磊礫擲于下舟人避之陳蕭詮詩桂月影才通猿啼迥入風隔巖還嘯侣臨潭自響空挂藤疑欲飲吟枝似避弓别有三聲淚霑裳竟不窮杜甫詩云裊裊啼虚壁蕭蕭掛冷枝艱難人不免隱見爾應知慣習元從衆全生或用竒前林騰每及父子莫相離曹松詩云曽宿三巴路今來不願聽雲根啼片白峰頂擲尖青䕶果憎禽啄栖霜覷葉零唯應卧嵐客憐爾傍嵒扄此皆狀其輕便險絶之致也馬戴詩云日飲巴江水還啼巴岸邊秋聲巫峽斷夜影楚雲連露滴青楓樹山空明月天誰知泊船者聽此不能眠皎然詩云萬里巴江水三聲月峽深何年有此路幾客共沾襟斷壁分垂影流泉入苦吟淒淒離别後聞此更傷心此皆觸其别離羇旅之緒也岑參在郡邸聽猿詩云峨眉烟翠新昨夜秋雨洗分明峰頭樹倒挿秋江底久别二室間圖它五斗米哀猿不可聽北客淚如涕崔塗在僧舍聽猿詩云哀猿聽未休禪景夜方幽暫得同僧靜那能免客愁影搖雲外樹聲裊月中秋曾向巴江宿當時淚亦流段成式在書亝聽猿詩云却憶書齋値晩晴挽枝閒嘯激蟬清影沈巴峽夜巖色蹤絶石塘寒瀨聲是境雖不同而調則皆苦矣王周集施南太守以猿兒爲寄云得之黔中頭生即白者作詩答之云虞人初獲酉江西長臂難將意馬齊今日未啼頭已白不堪深入白雲啼此白頭猿也禹貢梁州貢熊羆狐狸織皮西京雜記熊羆毛有綠光長二尺者直百金卓王孫有百雙詔使獻二十枚西山經云西百七十里曰南山多猛豹似熊而小毛淺有光澤能食蛇及銅鐵按子虚賦有鋋猛氏格蝦蛤孟康曰皆獸名郭璞曰今蜀中有猛氏獸似熊而小毛淺有光澤也蜀都賦㦸食鐵之獸註貊獸毛黒白臆似熊而小以舌舐鐵須臾便數十斤出建寧郡其皮毛麄厚中蓐席爾雅貘即白豹唐世多畫作屏白傅有贊序之抱朴子東方識啖鐵之獸寔賴神禹之書大荒之籍矣游梁雜記云僰夷有火獸形如黒羊兩角尖舉火夜光燭夫出没不常僰人一見即合村户鳴鑼逐之獸驚入井即以犬血投入遲則火從井中出焰及禾苗田畦屋舍盡成焦土其地三年不植博物志云蜀中南高山上有物如獼猴長七尺能人行健走名曰猴玃一名化或曰猳玃伺行道婦女美者輒盜去人不得知行者每過其傍皆以長繩相引然故不免此得男女氣自爾故取女也取去爲室家其年少者終身不得還十年之後形皆類之意亦迷惑不復思歸有子者輒俱送還其家産子皆如人有不食養者其母輒死故無敢不養也及長與人無異皆以楊爲姓一作羊馬姓此唐䝉所記矣珙志有獸曰野千似猿髮長過面欲有所視則搖頭以手披之方物略云玃出卭蜀間與猿猱無異但性不躁動肌質豐腴蜀人炮蒸以爲美味也贊曰玃與猿猱同類異種彼美豐肌登俎見用吕氏春秋曰禹年三十未娶行塗山恐時暮失嗣辭曰吾之娶必有應也乃有白狐九尾而造於禹禹曰白者吾服也九尾者其證也於是塗山人歌曰綏綏白狐九尾龎龎成子家室我都悠昌乃娶塗山氏山海經曰武都之山黒水出焉其上有𤣥狐蓬尾註大尾也蜀地志曰涪陵南界榛險中有果然獸形如狗子頭似虎尾柔滑白黒色皮以爲裘輕煖可珍其身不過三尺尾長四尺餘脇邊皆斑集十皮可得一褥繁紋麗好細厚柔澤段氏遊蜀記云戎州進果然褥皁褐碧三色相間云出馬湖江石門兩路蠻界内宋樂史子正作蜀中詩云又聞猓然獸死不相棄遺按國史補得一猓然則數十可得蓋此獸不忍傷其類雖殺之不去獸狀而人心者也益州方物略狨威茂等州南詔夷多有之大小正類猿惟毛爲異朝制内外省以上官乘馬者得以狨爲藉武官則内客省使宣徽使乃得用贊曰狀實猿類體被金毳皮以藉焉中國之貴李廌師友談記云狨座文臣兩制武臣節度使以上許用每歲九月乘三月撤無定日視宰相乘則皆乘之撤亦如之狨似大猴生川中其脊毛最長色如黄金取而縫之數十片成一座價値錢百千杜詩云狨擲寒條馬見驚即此郡國志戎州僰道縣有獸名獑猢似猿而四足短一騰一百五十步如迅鳥之飛取此皮爲狐白之用盈百方成按猢黒身白腰手有長白毛者是蜀都賦皛貙氓於葽草註謂貙氓虎豹之人也博物志江漢有貙人即此楊大年談苑淳化中綿州貢羅江犬常循於御榻前太宗不豫犬不食及上􅋖號呼涕泗以至疲瘠見者隕涕參政李至作桃花犬歌以寄史館錢若水末句云白麟赤雁且勿書願君書此驚浮俗按羅江縣西雲蓋山之桃花溪出此犬毛赤白相間若桃花色傳以爲桃神所萃即能改齋所云綿州八子之一也宣室志云郭司空釗太和中自梓潼移鎮西京命閽者爲市綾繪絲帛百餘段其價倍以爲欺即囚於獄用致其罪獄具命笞之忽有十餘犬爭擁其背吏卒莫能制釗大異之且訊其事閽者曰某好閲金剛經自㓜稚常以食飼羣犬不知其他釗歎曰犬尚能感人惠吾安可以不施恩遂釋之噫此二犬者真可以媿人蜀中廣記卷五十九
