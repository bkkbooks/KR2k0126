body:
  text: 蜀中廣記卷五明曹學佺撰名勝記第五川西道成都府五新都縣華陽國志蜀以成都廣都新都為三都號名城古語云廣漢有二雒新都為上雒建寧中江為下雒也寰宇記云新都縣本漢舊縣屬廣漢郡後置新都郡故城在今縣東太康中又為縣隋移理於此按晉史武帝咸寧二年封子該為新都王以新都郡為新都國矣唐張説新都南亭送郭元振盧崇道詩竹徑女蘿蹊蓮洲文石隄靜深人俗斷尋玩往還迷碧潭秀初月素林驚夕棲褰幌納蟾影理琴聽猿啼佳辰改宿昔勝寄坐暌攜長懷賞心愛如玉復如圭歐陽詹新都行云縹眇空中絲蒙籠道傍樹翻兹葉間吹惹彼花上露悠揚絲意去苒弱花枝住何計脫纒綿天長春日暮宋陸遊早發新都驛詩喔喔江村雞迢迢縣門漏河漢縱復橫繁星明如晝愛涼趣上馬未曉閲兩堠髙林起宿鳥絶澗落驚狖寺樓插蒼煙沙泉瀉幽竇我行忽萬里坐歎關河富官如廣文冷面作拾遺瘦今年盍歸哉勿落春雁後新都驛有逺平軒劉望之題云霜晴木落送歸鞍袖手微吟此慰顔賸欲憑欄招白鳥更煩剪樹出青山晚悲薄祿非三釡賴許清時見一斑看到逺平才得恨我寧歸臥尺椽間自注云軒有外氏周次元帥蜀詩也本志云治北半里寶光寺後有柱礎圍丈二尺圓徑二尺髙尺八寸唐僖宗避黃巢至蜀遣御史賫璽書召知元國師憩息其處掘地得石函中有如來舍利尋建浮圖以瘞之仍創精藍曰寶光寰宇記云麗元山在縣北八里平地特起四絶髙三丈有雙石鏡廣五尺嘗掘其下至水而未臻其極本志云縣北十五里二石闕各髙丈三尺一題云漢故兖州刺史雒陽令王君稚子之闕一云漢故先靈侍御史河內縣令王君稚子之闕闕兩角有斗又作重屋四壁刻神像人物牛馬之類今已漫滅詳畫苑中寰宇記云八陳圖在縣北三十里彌牟鎮蜀志亮推演兵法作八陳圖咸得其要李膺益州記云稚子闕北五里有武侯八陳圖土城四門中起六十四魁八八為行魁方一丈髙三尺緯略曰八陳圖在新都者峙土為魁植以江石四門二首六十四魁八八成行兩陳並峙周凡四百七十二步魁百有三十也陸遊九月十日如漢州小獵於新都彌牟之間投宿民家詩云適從卭州歸又作漢州去天底慘欲雪遊子悲嵗暮十年辭京國匹馬厭道路野火炎髙岡江雲暗空戌角弓寒始徑霜鶻飢更怒邂逅成小獵尺箠聊指呼北連武侯祠南並稚子墓合圍蹙窮鹿設伏截狡兔壯哉帶箭雉耿介死不顧吾寧暴天物戰法因得寓黃昏過民家休馬燎裘袴割鮮盛燔炙毛血灑庭戶老姥亦復奇汛掃邀我駐丈夫倘未死千金酬此遇古今集記云新都南十七里有宋興戍山髙百四十丈周三十餘里山色赤岸邊若有火光又名赤岸益州記云赤岸山頂有湧泉周回數丈深八九尺澄徹不竭龍門山在縣南二十里趙抃次孫直言九日登龍門山詩皇祐二年秋九月九日龍門遇佳節新都大夫孫隱之報政優遊共民悅升山髙會賓主俱滿頭黃菊泛茱茰遙開醉眼極千里身髙氣爽胸懷舒遲時感物以次發詩成落落傾璣珠初言府政好太守化行嵗稔民力蘇喜聲協氣遨以狂稚子負老老者扶又言登臨風景異澄川秀野如披圖殊方真賞到奇處未來空只誇江湖得之獨善不在已逺遣遺我開煩紆嗟我江原亦民長周遭百里平如掌簿書役役甚囚拘聞有岷峨無計上及聞治邑茲山奇腳力不到神魂馳誰知我亦好山者篋中時復觀君詩西南十五里有繁陽山與新繁接録異記云繁陽山麻姑洞即二十四化之第一陽平之别名也在繁水之陽因以為名本際經云天師張道陵所遊太上説經之處在成都府新都縣南渡江十五里衆山連接孤峰特起是也神武皇帝潛龍之時光化二年已未五月四日丙申山土摧落洞門自開縣吏時康道士張守真等以事申府云自洞門開後每日有百姓往來者府差縣典楊澤畫工任從與守真同往檢覆畫圖申上稱把燈燭入洞看檢其第一門對北髙二尺濶三尺五寸入至第二門約五尺已來第二洞門方一尺六寸入內並是黑處長一丈二尺濶六尺有石窟兩處在東畔并西南有洞門兩路南畔一路圓濶一尺六寸入內長一丈二尺濶一丈高四尺南畔有石窟三處西畔兩路入內通繞門圓濶一丈七尺內各濶五尺髙六尺已來門相去一丈門屋一所髙五尺濶四尺從內往來有刻枓栱􅝕瓦約山作石日月兼作日字月字隔子房一所濶二尺五寸髙一尺五寸刻枓栱􅝕瓦石竈一所髙一尺濶一尺五寸門濶五寸石窟三處各濶七尺又西入洞門圓濶一尺七寸灣曲入向南門屋一所髙六尺濶四尺從內來往有石枓栱􅝕瓦又有竈模兩所共一牀髙一尺濶二尺三寸門濶八寸有石枓栱西北角又有一門方一尺六寸內方二丈已來南畔西畔北畔各窟一所南角又有一洞圓濶一尺六寸已來將燈燭近前有黑氣出燈火即滅更入不得其洞連接繁陽本山相去三里已來據諸生張贇等狀稱繁陽是古迹山每準勑祭祀其洞亦是元有往往閉塞元和中南康王韋臯蒞蜀洞忽開時人咸云洞開即年豐物賤尋又閉塞至是復開其後果逺近豐稔洞本名麻姑山側有麻姑宅墓蓋修道之所也雙流縣華陽國志云廣都縣在蜀郡西三十里漢元朔二年置有漁田鹽井之饒江有魚漕梁山有鐵礦江西有安稻田穿山崖過水二十里唐司空曙送柳震還蜀詩白日雙流靜西看蜀國春桐花能乳鳥竹節競祠神蹇步徒相望先鞭不可親知從江僕射登榻更何人宋李新廣都道中詩萬花織籬凡幾曲繡屏處處圍茆屋家貧張日無羅幕東風吹開莫吹落居人應笑行客癡春去春歸殊不知豫以庚戌暮冬過此作詩云萬里橋方度雙流徑即存薄寒成翠色疏雨點黃昏竹柏密他樹水雲平過村林烏棲欲盡才到縣西門古迹有盤古祠徐整三五厯記云天地渾沌如雞子盤古生其中八萬四千嵗天地開闢清陽為天濁隂為地盤古在其中一日九變神於天聖於地天日髙一丈地日厚一丈盤古日長一丈如此滿八萬四千嵗天極髙地極深盤古極長後乃有三皇數起於一立於三成於五盛於七處於九故天去地九萬里也此寰宇記所引羅泌路史亦云于廣都得盤古之祀矣有大塔山隂宏道益州山川圖云阿育王使鬼兵造八萬四千塔廣都有其一有商瞿里本志云治東十里瞿上鄉有孔子弟子商瞿上墓時有錦雞白鷴見焉丈明之德未艾也有宜城山寰宇記云宜城山在縣東南十里李膺益州記云宜城在牛飲水南今按紫草山岡阜相屬髙百餘步連入陵州貴平縣界是矣周地圖云清水在縣北十里改名牛飲水李膺記云水名客舍昔程鄭家於此每羣牛飲江為之竭故名按蜀漢尚書蔣琬宋布衣李甲宅俱在宜城山下茂林清泉致可喜也有公孫述墓寰宇記云在西四十里髙三丈墓內銅作網結雖遭亂世莫能侵毁有葛陂本志云治北十里龍池舊名葛陂道漢費長房至此以杖擲陂中化龍去天師觀紀勝云在廣都縣北張道陵祠也壇下有井名伏鬼井趙閲道記華陽縣衡山有井妖怪藏其中道陵運石以鎮之鬼妖乃絶邑人為立祠植杖井旁今為喬木曰戒鬼木矣有朱辰墓華陽國志云漢時縣民朱辰字元燕為巴郡太守甚著德惠辰卒官郡獽民北送及墓獽蛋鼓刀劈踊感動路人於是葬所草木頃許皆倣其曲折迄今蜀人莫不歎辰之德靈為之感應今朱氏為首族也有牧馬川寰宇記云在陵州北一百二十五里蜀先主于此置籍田牧馬在江中俗因名牧馬川今割屬廣都縣本志云在縣東南八里有龍華山唐詩紀事段文昌字墨卿别業在廣都縣之南龍華山嘗杜門力學于此俗謂之段公讀書堂長慶初朝議文昌少在西蜀諳詳利病詔授劍南節度使有邑人贈詩曰昔日騎驢學忍飢今朝忽著錦衣歸等間畫虎驅紅斾可畏登龍入紫微富貴不由翁祖致文章生得羽毛飛廣都再去應惆悵猶有江邊舊釣磯文昌還别業有尋龍華山寺廣宣上人詩云十里惟聞松桂風江山忽轉見龍宫正與休師方話舊風煙幾度入樓中郭震題龍華山詩云昔年曽到此山回百鳥聲中酒一杯最好寺邊開眼處段文昌有讀書臺何耕題文昌讀書臺詩云段公曾此讀羣書讀破應須萬卷餘家禮一傳為雜爼稗官收採附虞初按方輿勝覽文昌讀書堂在廣都縣順聖寺南碑目云龍華院山門路記後唐天復七年立今為觀音院矣何耕題龍華佛閣詩云西川鑿山三大像突兀皆在江之湄修覺九頂見略盡獨此恨未瞻容儀朅來勝地了疇昔輕軒瘦馬相追隨百尺金軀信雄傑三乘寶閣何瑰奇然犀不用照幽鬼擊鼓自合趨馮夷前人開創願力廣下與舟楫扶傾危六月灘濤劇奔吼一分性命爭毫釐篙工落膽行者泣彈指乞活天人師人心狎水水多禍佛力在人人不知年來蜀産坐朘削夜半有力真能移峩舸大艑去不絶綵鷁破浪風揚旗佛慈只作布施想江神雖怒將何為又題龍華山寺云傑閣山為佛精廬地布金水涵空濶淨路繞翠微深鳥下窺齋鉢龍歸識梵音城中塵眯目那得此幽尋又龍華大像蓋冀國夫人所作因成絶句云慧性元從戒定薰百花潭水浣僧裙箇中力量真超絶故老尚傳娘子軍有郭信可隱居即郭印也何耕題其雲溪詩云幽居定何如頗恨未見之主人向我言喜色融雙眉修篁流翠隂寒溪漾清漪領略非一狀幽妍發餘姿主人信妙士得此固所宜又題浮翠橋詩云隔溪蒼翠各西東架竹為梁路始通缺月罅林凝淨緑斷霞明水抹殘紅芒鞋步步幽深處藜杖聲聲屈曲中回首忽驚橋已逺冷然身御圃田風寒碧亭詩云憑欄日日俯清湍洗竹年年斬惡竿十頃琉璃秋色淨一林竽籟曉聲寒涼風有意生天末明月無邊照水端誰謂過清難久處愚溪元自不相安逺色閣詩云小小樓居著散仙淵明真趣本悠然招呼雲月闌干曲顧揖江山拄杖前獨鳥倦歸翻落日誰家晨㸑起疏煙根塵應接無留礙笑殺胡僧面壁禪假山詩云空庭幻出小嶙峋假外應須别有真只恐話頭成兩橛若為融攝主和賓蓮塘詩云色香無比出西方何物妖狐號六郎手折一枝聊供佛前身定是老柴桑蘭坡詩云蘭與髙人臭味同含薰聊復待清風紛紛蕭艾毋相笑爾輩敷榮轉眼空龍淵詩云門前大江何渺漫昔人飲牛水為乾水乾龍逝亦其理近在咫尺聊泥蟠魚蝦玩侮獱獺笑縱有靈怪誰當看德人問舍壓吾境便爾築室相遮欄坐令異類皆屏伏恃有此耳差少安却紆朱紱去監郡遣我守舍良獨難昨來過門恍如夢龍致此語催歸鞍先生不信反大笑謂我饒舌狂豐干虛舟詩云君不見江臯車馬紛相送巨艑峩峩船載重西南使者解官歸水淺著沙牽不動如君材具豈多得合侍明光參法從胡為淺瀨著虛舟頗肖胸中太虛洞問君此意竟安在欲説向人誰與共山林鐘鼎本同轍繫岸截江隨所用八窗窅窅淨無塵一水泠泠清可弄何當抱被過君眠分破江天幽夜夢忘機臺詩云太虛生微雲機事日夕繁兼忘豈不佳尚有忘者存稽首老龎翁妙處希一言請觀堂上月萬古無昭昏和光亭詩云枯木倚寒巖三冬無暖氣達人定汝笑胸中太涇渭不妨聲色海徑造佛祖地所以亦樂翁花前時一醉郫縣華陽國志張儀城郫周回七里髙六丈上置樓觀射圃與成都同制晉元康三年民謡曰郫城堅盎底穿郫中細子李特細蓋李特自稱益州牧治此城也寰宇記云犀浦縣周垂拱二年割成都之西鄙置蓋因李氷所造石犀以名杜甫詩南京犀浦道指此在縣東二十里本志云縣治儀門下穿洞直通犀浦極深敞髙可十尺許每夜月中天洞中曙光如晝古謂之明月洞又云治內東土臺墳起下有池其底有井謂之郫筒井井畔産巨竹刳為筒汲水而釀包以蕉葉纒以藕絲信宿香達于外或云山濤治郫以筠釀酴醿酒旬日香聞百步今池井俱存竹則不産一云池中土臺突起列方圓二井名鴛鴦井也成都文類諫議司馬池尉郫之明年生子光於官廨字之曰岷以山稱也於是諌議公手植柟樹一本于庭及溫公殁後若干年郫邑李丞作堂祀公且以護樹張行成記之揚雄蜀紀云杜宇一名杜主代魚鳬王蜀徙都于郫即杜鵑城也後傳其位于鱉靈宋陳臯記云杜宇鱉靈墓在郫縣南一里二塜對峙若邱山俱𨽻淨林寺二里勝覽云郫縣有子雲讀書堂本志云縣南二十里外子雲亭即葬所也亭北半里有拜臺相傳為拜子雲墓而築寰宇記云郫縣有漢司空何武宅武之弟攀從刺史王濬伐吳有功歸家闔門治疾不預世事武之後隨有養竹園人盜其筍隨遇見之恐盜者怖走或傷其手足因挈履徐步而歸矣紀勝云郫縣有張白雲先生故居范鎮留題張少愚屋壁詩云髙隱郫城下平時仍往還門開值冠蓋簾卷為江山沛雨人間待片雲天外間泥封詔不起朝夕奉慈顔文同題張少愚書院詩云澗水浸斷橋車馬不得通飛嵐積庭礎秋蘇垂紫茸窗紙爛溪雨簾衣折林風主人殊未歸使我煙景空水經注云江水又東北徑郫縣下縣民有姚精者為叛夷所殺掠其二女二女見夢於兄曰當以明日自沈江中喪後日當至可伺候之果如所夢得二尸於水郡縣表異焉古語云郫縣七十寺分布四郊內其最著者法定寺髙僧傳云法定寺是漢永平年佛法初入中國時建後晉惠逺寓居著神異至隋始改為法定焉寺有彌勒聖像乃江流枯查所製唐貞觀長史髙士廉蓋殿以安之有僧泛愛者樹其浮圖獲巨蟹身長二尺餘此塔嘗被霆擊而復合為釋惟忠所禱云新繁縣水經注云成都江北則左對繁田文翁又穿湔㳛以溉灌之凡一千七百頃蜀漢延熙十年涼州胡率衆降增戶于此俗間謂之新繁也禹貢曰岷山導江東别為沱孔安國注云江東南流沱東行鄭注云此沱尾入江不於江出晉太康地記云江沱在繁縣蕭廣濟注江賦云觸玉壘山東回為沱據漢書溝洫志此江即秦守李氷所鑿非禹貢之江沱明矣本志云李氷導水見水勢橫突乃鑿九井象九宫以厭之元末井堙塞新建石橋存志云衛湖蜀漢縣令衛常所開在學宫後又有東湖李德裕為宰日將開此湖夜夢一老父曰某濳形其下幸庇之明府富貴今鼎來七九之年當相見於萬里外也明日於土中得一蟇徑尺餘乃投之水後德裕果至宰相六十有三卒於朱崖應其夢焉按宋佾衛公堂記略繁江令舍之西有文饒堂者舊矣前植巨楠枝幹奇怪父老言唐李衛公為令時鑿湖于東植楠于西堂之所為得名也志又曰宋蘇實治平間為繁令有異政嘗厭衛湖蛙鳴令人取一大者以硃點之戒曰毋再喧囂已果不鳴及湖中涸羣蛙結聚成團啓視之則硃點者居中羣蛙若擁翼焉蘇令悉放于江終其任湖蛙無一鳴者唐初隱士朱桃椎茅茨賦云若夫虛寂之士不以世務為榮隱遁之流乃以間居為樂故孔子達士仍遭桀溺之譏叔夜髙人尚被孫登之笑况復尋山玩水散志娛神隱卧茅茨之間志想青雲之外逸世上之無為亦處物之髙致若乃覩余庵室終諸陋質野外孤標山旁逈出壁則崩剝而通風簷則摧頺而㵼日是時間居晚思景媚青春逃斯澗谷委此心神削野藜而作杖卷竹葉而為巾不以聲名為貴不以珠玉為珍風前引嘯月下髙眼庭惟二徑琴置一弦散誕池臺之上逍遙巖谷之間逍遙兮無所託志意兮還自樂枕明月而彈琴對清風而緩酌望嶺上之青松聽雲間之白鶴用山水而為心玩琴書而取樂谷幽偏覺鳥聲嬌聲髙韻細盡相調見許毛衣真亂錦聽渠聲韻宛如歌調絃乍緩急向我茅茨集時逢雙燕來屢值遊蜂入氷開緑水更應流草長階前還復濕吾意不欲世人交我意不欲功名立功名立也不須髙總知世事盡徒勞未會昔時三箇士無故將身殞二桃贊曰先生知足離居盤桓口無二價日惟一餐築土為室卷葉為冠斫輪之妙齊扁同觀文苑云新繁朱桃椎茅茨薛稷為之賦序略云穩臥茅茨之間屬想青雲之外逸世上之煩襟遂明時之髙志而已矣宋楊甲謁朱真人祠詩云一濯巖下溪再拜巖中庭清風瀟然來吹我衣上腥仙人芙蓉冠乘月下雲軿山空雜佩響靜夜朝百靈似聞客欲去小語猶丁寧肅肅上松柏急以兩耳聽寂寥古壇外但見斗與星天明恐是夢恍惚遺心形去飲石上水再讀幽人銘青山無行迹霧雨空冥冥又有勾氏者隱于盤溪成都文類勾景泰詩云黃塵沒車轂平地得林邱花木風光早陂池煙雨秋不彈長劍鋏甘賦大刀頭九軌利名痼逢君應少瘳又從俗鮮所得九牛中一毛強牽麋鹿性要學豹龍韜野服顔常好晴窗首自搔回來誤應聘塵土汙吾袍又客至輒命酌為言花已開青山長委髻白骨舊生苔不飲固癡絶能詩宜數來頗憂明日雨紅紫落成堆又勝簪不肯黑浮白故能紅心寄塵埃外春歸杖屨中徑松青謖謖庭草碧茸茸無術繫白日年光如轉蓬按盤溪主人勾友于字信卿李石記云有樓以藏書堂以教子臺以賦詩榭以置酒自誓曰俗子汚我不我門凡士門我不我室清風肅尸明月贊席抱琴之童挾卷之士照映几杖之側徜徉筆硯之間溫江縣華陽國志魚鳬王田于湔山忽得仙道蜀人思之為立祠成都文類孫松壽觀古魚鳬城詩野寺依修竹魚鳬迹半存髙城歸野壠故國藹荒村古意憑誰問行人謾苦論眼前興廢事煙水又黃昏注云在溫江縣北十里有小院存按漢文苑資中王子淵以宣帝神爵三年有事湔上作僮約文即此縣也寰宇記云皂水在溫江縣李膺記相林寺前清皂二水是矣任慥渠堰志云九廾口堰其源出於皂江至郫之柵頭别流為溫江口而九升口者實兩江之滙也杜甫陪李七司馬皂江上觀造竹橋詩伐竹為橋結構同褰裳不涉往來通天寒白鶴歸華表日落蒼龍見水中顧我老非題柱客知君才是濟川功合歡却笑當年事驅石何時到海東趙抃早離溫江夜泊白沙步詩曉與諸孫别依然頗動懷去乘蘭棹穩行得綵衣偕漁父遙連市村扉半掩柴夜來溪上宿夢已在髙齋宋史哲宗紹聖四年夏四月八日有芝生于溫江縣觀音院齋廳之楹一本而數結煙縷氤氲閲月不散邑令孫漸扁其處曰芝堂而為之頌云西母薦祉金精效奇是生神草雲英瓊㽔給園之中湔水之湄地其幽矣芳而孰知陟彼岷宫真人頎頎夜授祕訣謂余搴之沃之醴泉濯之天池羞以石髓茹而忘飢黃綺為侣喬松可期盍獻天子以薦神祗古今集記治西三里之金烏池唐髙宗曾夢金烏集于益州巨木上遣使訪至此見烏三足而金色浴于此池志云今有金烏觀存集記溫江治西三十五步有女郎祠張天師孫靈真之女名玉蘭者幼不茹葷十七夢吞赤光感孕為母所責一夕無疾而卒有一物如蓮花自腹中出開視之乃本際經十卷葬百餘日雷雨晦冥失經所在墳壙自開而飛升棺蓋挂于巨木之上此三月九日事鄉人至今如期齋祭之按郡國志梁州女郎山張魯女浣衣石上感赤光之祥而懷孕生二龍及女死將殯柩車忽騰躍升此山遂葬焉其浣衣石猶在因謂之女郎山其説略同彭縣志云縣西北三里有劉宋時晉燾郡城梁東益州西魏天水郡後周九隴郡唐武德之濛州垂拱之彭州皆理此寰宇記云濛陽縣唐儀鳳年于濛江之北置故曰濛陽蓋彌濛水源出九隴縣來經當縣南二百五十步本志云東二十里之濛陽鎮有故縣址志又云北三十里之二郎鎮乃九隴縣址以九隴山為名寰宇記云九隴山自永昌縣連亘至縣界屈曲而九折也方輿云九隴者古彭州之西山一伏隴二豆隴三秋隴四龍奔隴五走馬隴六駱駝隴七千秋隴八較車隴九橫擔隴故有九隴之名陸放翁云天彭號小西京以其俗好植牡丹有京洛之遺風古今雜記孟氏以牡丹名苑于時彭門為輔郡典州者多其戚里得之上苑此彭門花之始也天彭亦謂之花州而牛心山下謂之花村云治內有東湖元符中袁隲記云九峰髙峙濛水濬發樓閣亭軒隱見于茂林修竹間又有西湖元和中守王潛蕭祐創進士鄧衮記云二公陶奇撰幽不乏心匠于西湖臺島花竹布置罔不宛妙也勝覽云南樓在郡圃中范百祿有記文同彭州南樓詩云百尺壓城端飛簷欲上摶湖光搖埤堄山影轉欄干秀野含春煦喬林擁暮寒回頭大岷雪千仞正巑岏勝覽又云望雪樓在子城上唐彭州守建以望雪山太和進士鄧衮銘曰維蜀之鄙截如巨砥厥郡維彭西北天屏危碧峭青戞霄摩冥鯨跳虬奔限蠻隔畨上排雪峰延疊萬重鶴甃瑶軿月積綃鮮振古不􅘧四節一色皎皎披飄寒涸隂膠光涵二水冷射千里往哲所嘉名之玉壘也髙適為州刺史彭州山行詩云峭壁連崆洞攢峰疊翠微鳥聲堪駐馬林色可忘飢怪石時侵徑輕蘿乍拂衣路長愁作客年老更思歸且悅巖巒勝寧嗟意緒違山行應未盡誰與玩芳菲蘇頲贈彭州權别駕詩雙流脈脈錦城開追餞年年往復回秪道歌謡迎半刺徒聞禮數揖中台黃鶯急囀春風盡班馬長嘶落景催莫愴分飛岐路别還當奏最掖垣來集古録載秦李氷為蜀守鑿山導江以去水患其神怒化為牛出沒波上君操刀入水殺之因刻石以為五犀立之水旁與江誓曰後世淺無至足深無至肩謂之誓水碑立在彭州馬端臨云彭州掘地得絳帖舊本字畫清徑頗類舊武岡而差優也寰宇記云九隴縣灌口鎮之城西有玉女祠祠西有蜀守李氷祠存五代史補蜀王衍與其太妃遊青城山遂至彭州陽平化志云今金城山之仙居觀是其駐蹕所也金城山形如城上應角宿即二十四化之陽平治矣志又云治北五十里白石溝即漓沅治也上應房宿治有鴻都觀下觀名曰響石寰宇記以漓沅作麗元云范蠡學道於此又云五龍山有神溪水仙人李伯陽登山嗽之今為溪源山髙數百丈延袤二十餘里山麓有洞旱時祈雨巫者初入握火燭之行少頃跂足而望懸崖中有斧鑿痕如井深數十百丈牖一線之明而煙熖裊然上衝謂之天生眼至此少偃息復入第三四五六洞洞下重淵深不可測盛夏水冷如氷以編竹筏寢其上逡巡蟻附而入抵第七洞龍所穴也始用符呪取水盛竹筒而出離洞口即有風雷隨之而雨作焉間值洞中水壅巫者多不得出勝覽云葛仙山有崇真觀在濛陽北四十里二十四化之第五化也葛仙翁璝楊仙翁升賢於此得道大同中蒲仙翁高遠復於此白日上升梁武錫名上清觀劉孝先作碑以紀其事按成都記韋臯夢神人謂曰異日富貴無忘葛璝也後尹成都再夢乃復新觀宇臯自為記雲笈七籖云葛璝化周回巖巒左右嵌穴地靈境秀逈絶諸山故有二十四峯八十一洞觀下有磎泉深在谷底汲之非便此宫之西過崖磴十五步巨石下有丁東水出於崖腹滴入窪石竅中中和年刺史安金山準詔投龍郡縣參從者三百餘人忽有汚觸其水者頃刻乃竭安公與道流頗懷憂懼夜至泉所拜手焚香叩祈良久涓涓而滴雖從騎之衆食之充足每年三月三日蠶市之辰衆逾萬人宿止山內飲食之外水常有餘矣勝覽云至德山在郡西三十里上有廣明院蜀王衍専事遊幸嘗登是山患其髙險令於福唐寺東别開一徑凡數里廣可二丈栽松砌石以達于寺從官悉騎以從松枯石怪尚有存者本志云至德山有三昧泉自石竇噴冽方大如斗不竭不溢俗傳即知玄國師洗人面瘡之處至今疾者澆之多效按髙僧傳釋羅僧者蜀聖寺中得果位人也嘗寢疾於五臺山同會僧衆俱不之測悟達國師獨善視之將及九旬病愈别去云所苦今遂平復由師之力我住在劎外九隴郡之茶籠山爾異日遊方無忘相訪也悟達暮嵗至蜀厯訪羣峯訊老樵輩皆以未嘗聞兹山名乃嘆曰噫病禪之妄也將回遇一山童曰某是彼巖之聚沙者前導而去俄覩殿塔儼空房廊環肅果值昔之病僧迎門敘故日將暮矣而謂之曰兹寺非得漏盡通不能至爾以宿緣一諧遘止言寄寓乎斯為未可爾其克勤修證詣果胡難乃命舊童送師歸去回望之頃但見巖壁峭峻杉檜莾蒼而已則開成中事也時知元著傳之次得僧可思尤間地理為元作塋兆于丹景前峰其山若雉堞狀雖高低起伏而中砥平俄有里人耆老曰古相傳云茶籠山矣志云縣北三十里丹景山舊志以為山蒔牡丹春時紅艷照人故名其前為彭門山兩山對峙懸崖絶壁相去數百步如門即天彭門也或曰彭祖遍遊洞府以窺聖迹嘗往來于其中五代史補偽蜀太后徐氏題丹景山金華宫詩云碧煙紅霧撲人衣宿露蒼苔石徑危風巧解吹松上曲蝶嬌頻採臉邊脂同尋僻境思攜手暗指遙山學畫眉好把身心清淨處角冠霞帔事希夷太妃徐氏和云丹景山頭宿梵宫玉輪金輅駐遙空軍持無水注寒碧蘭若有花開晚紅武士盡排青嶂下內人皆在講筵中我家帝子傳王業積善終期四海同寰宇記云白鹿山在九隴縣北五十里周地圖記云宋元嘉九年有樵人於山左見羣鹿引弓將射之有一麛所趣險絶進入石穴行數十步則豁然平博邑屋連接阡陌周通問是何所有人答曰小成都後更往尋之不知所在勝覽云白鹿山有大乘金覺禪寺本晉佛圖澄所建上有洗腸池按大同志晉太安二年羅尚殺隱士劉敞敞故州牧劉璋曾孫也隱居白鹿山髙尚皓首未嘗屈志尚信妖言而殺之矣輿地紀勝云彭縣大隋山之景德寺大業中神照禪師投錫之所有木禪菴白龍井山生竹若龍頭俗呼龍頭竹勝覽云大隋去堋口鎮三十五里神照所居有瀑布張天覺記云西山之勝在彭門者大隋為甲郭印詩云我聞大隋名夢寐猶記録得檄天彭道喜氣知可掬出城六十里崎嶇轉江曲山門忽斗上危步依笻竹崩石帶煙雲異草羅澗谷寂鳥下窺人纍猿時挂木路窮才見寺金碧焕雙目祖師古定光燈冷無人續開公生異世大事如付囑僧言山長隂朝暮雲容蹙兹辰為我晴疊岫堆濃緑虛閣倚秋風一洗塵土俗舉手揖丹景橫身跨白鹿十年勞問訊親到心始足坐久燭漸微借榻雲間宿山寒寐不成窗外泉鳴玉髙僧傳彭州土溪智陀子言菴主綿州人也初至大隋聞舉石頭和尚示衆偈倏然領旨歸隱土溪懸崖絶壑間有石若蹲異獸師鑿以為室中發異泉了無涸溢四衆訝之居三十年化風盛播初室成日作偈曰一擊石菴全縱橫得自然清涼無暑氣涓潔有甘泉寬廓含沙界寂寥絶衆緣箇中無限意風月一牀眠勝覽云中隋山在大隋之後上山三十里至光相閣三月半間掃去積雪下視葛仙白鹿大隋真培塿也碑目云九隴縣龍懷寺碑唐王勃撰略云龍懷山者井絡之所交會岷隅之所控帶攢峰北走吐香嶂於玄霄巨壑南馳噴洪濤於赤岸香城寶地左右林泉碧岫丹岑往來煙樹隋開皇五年始賜額為龍懷寺因嶂為壁憑崖列户地鄰綿左遂均綿上之恩山似龍盤即建龍懷之剎矣按彭州寺觀特盛故豫隨類而詮次之則山川亦可見焉崇寧縣唐之唐昌縣宋初之永昌縣也熙寧間狄道李子忠來牧是邑構堂于其所居之西北隅而命之曰治已修筠珍幹羅立環擁寒溜滚滚渠行沼畜公事既休即來其間此文與可記之矣唐咸通中御史中丞吳行魯出知彭州於州之唐昌縣心置草市歇馬亭及靈岩報恩院陳溪為之作記立碑建德鄉其詞曰聖上以南夷不虔邊塵坌起候旦授執政意俾擇要郡以良能而牧之遂命御史中丞渤海吳公行魯持節出剌雅安公松筠植心金石勵志雅安實邊之衝東入嶮隘應援由此公至止一顧屹如巨防當危疑之秋瞬息無事郡人以考秩將滿預懷去思接武陳誠願借綏撫丞相隴西公以公功業昭著飛章上聞請充節度參謀兼諸軍行營副都知兵馬使東路行營都知兵馬使仍兼知黎州巡邊制置公遂於大渡河創置一橋亘五百尺自干戈未寧士馬旁午饋運往復商旅經過曾無覆溺之憂永絶滯留之患至今行者見必歸恩異迹奇謀繁難具紀由是復升于犍為雅之南千里縣道烽堡相躅早夕軍食跂俟於犍為公智出事先機生料外風波助意舟楫如飛是得闔境無虞諸軍飫飽實公之功也由是天子以彭門名郡而償其重勳公軔車之日即究風俗民之憂苦已明其重輕事之興廢已熟其利病從便革弊幽顯愜心郡內既肅施及支邑以唐昌縣中界接導江郫城東西綿逺不啻兩舍雖有村落僻在荒塘昔置郵亭廢毁將久行役者野食而泉飲貿易者星往而燭歸􅐁􅜙公行投告無所深溝雨漲古陌橋摧跬步難踰艱苦寧述况輸役責限徵斂有程而欲罪其稽逋者乎公惻然凝想即日計成遂陳於連帥於縣心置草市因其鄉名便以建德為號自此四來者旋踵而迓迎中望者舉目而知歸老幼攜挈倏忽而至萬家歡笑共事修營不旬日而告就今則百貨咸集蠢類莫遺旗亭旅舍翼張鱗次榆楊相接桑麻漸繁如此牧人可謂移風易俗矣昔武侯以蜀脞脆故令鄰邑翊日而市意在習其筋力而俟之征徭又每及上春以蠢為名因定日而有知所往公亦約之以期而候之其日商旅輦貨至者數萬珍纎之玩悉有受用之具畢陳想人之心豈待詢問而知其歡悅也復以路由諸部疊迹輪蹄徘徊一息無稅駕之所遂出俸錢建長亭崇軒邃室外廄內厨帷薄精新器物充足則往來者非止晝食而卜夜可矣人既繁會俗已豐饒又置一鎮抽武士三十人而禦之創立廨署早暮巡警盜將竄迹人遂髙眠不感晨雞無聞夜犬皆云康泰不可比儔又兹地會昌之前有佛寺數所因廢而未興鄉閭求福無處禮敬像設之儀莫識鐘磬之聲不聞僻野深郊轉為聾俗復置靈巖報恩院修北方天王及侍從奇工妙飾相好無雙髙墉環合門廡揭立又度僧住持行道無有虛日斯人也非只豐足而永逃夭札之患得不紀其盛迹而垂於無窮者哉蜀中廣記卷五
