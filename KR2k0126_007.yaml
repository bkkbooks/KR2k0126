body:
  text: 蜀中廣記卷七明曹學佺撰名勝記第七川西道成都府崇慶州王勃送杜少府之任蜀州詩城闕輔三秦風煙望五津與君離别意同是宦遊人海内存知己天涯若比鄰無為在岐路兒女共霑巾宋之問送趙少府之蜀州詩餞子西南望烟綿劍道微橋寒金雁落林曙碧鷄飛職拜輿方逺仙成履㑹歸定知和氏璧遙掩玉輪輝崇慶在唐稱蜀州也碑目云天章雲篆碑在蜀州唐開元夀王清書又云蜀州刺史􅈦壁記大厯年間作以張柬之鍾紹京李峴王縉四公皆牧是州故有四相堂唐詩紀事云貞元十四年皇甫澈刺蜀州時賦四相詩序云居相位者前後四公謨明弼諧遷轉厯比顧已無取忝跡於斯景行遺烈嗟歎不足也謹述其行事詠其休美庶将来君子知聖朝之徳云爾本志云州治判官廨後池即罨畫池趙抃有蜀倅楊瑜邀遊罨畫池詩占勝芳菲地標名罨畫池水光菱在鑑岸色錦舒帷風碎花千動烟團栁四垂巧才吟不盡精筆冩徒為照影搖歌榭分香上酒巵主人邀客賞和氣與春期勝覽云文潞公祠在判官㕔盖公之父在天禧時来作判官令公受業於晋原大夫張錫之客任君後為立祠紀勝云西湖在郡圃盖皂江之水皆導城中環守之居因瀦其餘以為湖也范成大吴船錄云蜀州郡圃内西湖極廣袤荷花正盛覓湖船泛之繫䌫修竹古木間景物甚野㳺宴繁盛為西州勝處陸㳺劍南詩藁云蜀人謂唐安有三千官栁四十琵琶故詩云歸心日夜逆江流官栁三千憶蜀州致能詩云閒隨渠水来偶到湖光裏仍呼水月舟徑度雲錦地誰云不觧飲我已荷香醉湖隂玉蜎蟬􅞅立紅粧外何須東閣梅悠然自興思驚風入午暑水竹有秋意采菱不盈掬興與蓴鱸㑹遙知新津宿魂夢亦清麗碑目云范公鎮留題在府城之太平院范遊岷山過此題紀院之經閣上云熙寧八年三月遊青城間四日趨峨眉俱過此與百世相見百朋百嘉侍行蜀郡公記志云西南附郭龍門街是晋原縣治寰宇記云白馬江自晋原縣入新津縣界即杜甫詩白馬江寒樹影稀者碑目云蜀先主碑在晋原縣西南二里唐房琯文又云唐開元碑天寳八年立在晋原常清觀鮮于仲通文周地圖記云晋原西五十六里蟇頤山上有鹿市百步平坦諸山之鹿曰一聚於此寰宇記云鶴鳴山在晋原縣西八十里絶壁千尋李膺益州記張道陵登仙之所嘗有白鶴遊其上北與卭州交界又云臨卭故城俗名公孫述城益州記云盖李雄據蜀李夀從䍧柯引獠入蜀境自象山以北盡為獠居臨卭舊縣因兹置也志云蜀州有東亭杜甫和裴廸登蜀州東亭送客逄早梅相憶見寄詩東閣官梅動詩興還如何遜在揚州此時對雪遙相憶送客逄春可自由幸不折来傷歳暮若為看去亂鄉愁江邉一樹垂垂發朝夕催人自白頭志云東三十里江原鎮即漢江原縣治華陽國志江原縣郡西渡大江濵文井江水經云文井江亦李氷所導井上有守捉三十里上有天馬祠李膺益州記寧州有馬元河河邉牧馬産駿駒一日千里至此斃乏岸南人為立祠於此水經註小亭山有天馬塜是也寰宇記云􅗪江出麩金一名皂里水自永康軍青城縣百丈水南流入江源界志云皂江逕江原至新津入河昔張道陵投墨于江其水盡黒故名皂江有北橋杜甫詩云望極春城上開筵近鳥巢白花簷外孕青栁檻前梢池水觀為政厨烟覺逺庖西川供望眼唯有此江郊勝覽云杜工部祠在江原縣邑宰趙抃建昔杜甫依髙適寓於此寰宇記云公孫述女塚在江原縣東一十三里髙三丈周廻二十步故老傳云此冡銅作絞絡五里故亂離發掘莫之䧟也碑目云唐李百藥碑在江原縣之萬歳寺唐樊知遷碑在江原縣浄居寺顔師古文今俱殘缺又云唐太平公主出家勅在天慶觀按魏了翁江原縣天慶觀雲層臺記略云開禧三年春蜀盗未平江原道士吕元素語其徒曰吾儕小人羣居族食無益縣官今逆氛若此又不能剸刄賊腹膏首原野盍姑杜門以需底定乃相與校藏書見其書有為九層之臺可以為民禳沴祝釐者則用其法而封之名以雲臺列天地日月星辰岳瀆之象而禱祠焉宋皇祐間趙閲道為江原令其二弟揚抗與俱有引流聫句序云江源縣江繚治廨址而東距三百步瀧湍馳激朝暮鳴在耳使人聴愛弗倦遂臿渠通民田来囿亭堦廡間環迴遶旋溝行沼渟起居觀遊清快心目公暇事休與弟揚抗坐東軒怡然盤桓共為詩章云别𣲖從江垠邀流入農畎淙淙来源深㶁㶁度溝淺園穿蕭艾芟塹斷荆芝剪疏功浹晨流溉利千步逺田觀疑澤瀦坎聴類瓴建北溟歸鑿池幽岳漾裝巘瀉堺縠微駛廻珠細轉過實石眼窺經虚吐口吮流行值落葉浸長浮生蘚孤鶴眼怪覘纎魚鬛跳展申沉無穢淤底静有紋堧映葦色莫分喧琴韻難辨増霖夕閙蛙涵月夜驚犬侵篁鞭起萌逼水抵垂菌憐黄澆菊籬惜紫沃蘭畹吏治窰甓甃童戱芒車卷灌攜合手勞潄掬致腰俛庭秋臨加涼軒夏向消炟我矜近濟能僮賀遙沒免貯戺理巨甔歸厨架修筧供淘飯盎糧給澳羔鼎臠調藥修舊餌剪茶試蘿荈坐客頻泛觴蹲兒屢洗硯聆寒心脫煩挹冷酒除面閒眺笻步隨静看髭吟撚髙懐造文攄清興團詩遣瑰章非俗成怪句自幽選湧詞波翻瀛綿意緒抽蠒書丹字𨽻行欵碣石磨琬題為引流篇記耳非自衒新津縣張天覺以古三墳書得於縣北陽民家墳皆古文傳乃𨽻書天覺新津人范成大新津道中詩雨後郊原浄村村各好音宿雲浮竹色清溜走榿隂曲沼擎青盖新畦藝緑針江天空濶處不受暑光侵予以萬厯庚戍過此詩云結束為津口分明作秀顔雪峰俱暎水天社舊名山客自荆呉外民其卭蜀問昔賢有佳句磊落動人寰壬子歳再過此詩云風日何淒𦂳予行在仲冬平林烟已盡近郭渡猶重古市沙中火僧樓水際鐘東西雖不辨彷彿認前峰盖指修覺山也志云南一里修覺山神秀禪師結廬於此唐明皇駐蹕為題修覺山三字寺有左右二井春夏汲東秋冬汲西水則甘洌反之則否名曰林泉殆靈泉云其下為三江渡因岷江皂水白馬三江並列而名其上為寳華山横跨江表俯瞰平川取物華天寳之義也峰頂多雪又曰雪峰杜甫新津寺寄王侍郎詩何限倚山木吟詩秋葉黄蟬聲集古寺鳥影度寒塘風物悲遊子登臨憶侍郎老夫貪佛日隨意宿僧房又遊修覺寺詩野寺江天豁山扉花竹幽詩應有神助吾得及春遊徑石相縈帶川雲自去留禪枝宿衆鳥漂轉暮歸愁又寺憶曽遊處橋憐再渡時江山如有待花栁更無私野潤烟光薄沙暄日色遲客愁全為減捨此復何之志又云南二里四安寺亦神秀剏杜甫暮登四安寺鐘樓寄裴十詩暮倚髙樓對雪峰僧来不語自鳴鐘孤城返照紅将斂近市浮烟翠且重多病獨愁常閴寂故人相見未從容知君苦思緣詩瘦太向交逰萬事慵碑目云唐開元皇帝送趙仙甫尊師歸蜀詩碑見在新津縣寳真觀志云南二里平岡治下第八治也上應參宿蜀人李阿瞿君於此學道有杜天師詩勝覽云投龍觀在新津縣南六里枕夜郎溪及白木水上有龍六祈禱皆應又云稠稉山在新津南八里有草名稠稉服之長生不死上有丹竈古碑宫闕天池軒轅帝於此得仙中第四稠稉治也上應危宿予友竟陵鍾伯敬遊修覺山記云辛亥十月十有九日早發新津叔弟恬不知隔江者為何許山也與童騎疾驅過之予與艾子後坐舟中指江干削壁千仞竹樹榱桷出没晴嵐雪浪外者異焉問之則修覺山子美游修覺寺詩明皇幸蜀大書修覺山三大字嵌石壁今猶存者即其處也决䇿登焉所從徑裒山石之複者為磴亂整枉直各肖其理登者屢憇憇處每平平處每當竹樹隙隙處必從其下左方見江江錯磧渚或圓或半或逝或返去留心目間土人縳竹為亂若童子置葉盎中以度蟻設身處地頗危之從上視下輕且駛甚適也度磴去頂可四五之一行住坐立更端者數矣其傍乃有石級齒齒蜿蜒壁間者往修覺寺道也曰姑舎是尋中徑數折上有亭翼然祠杜工部李供奉蘇端明方正學方有石刻詩可讀亭後數武為寳華寺禮佛畢反自亭出山門左行竹樹純駁夾砌數折即修覺寺寺前雙井一井直一塔唐物也明皇書嵌佛殿左側巖壁上字方廣三四尺一字各專一石飛翥沈着且甚完好予入蜀所見唐碑獨此耳出寺無所見欲返寺僧指石隙一小徑才容足出此徑乃有平田大陸復緣磴數折上矗然頫江者曰雪峰兩寺乃在其下始悟所云磴去頂四五之一者第可指修覺耳非此峰也左眺稠稉山如旅行而稍居其傍下憑欄視江則已正無所不見不若初所見江之從其下左方也然從下上修覺去江稍逺從修覺上雪峰視江乃反近舟中所指江干削壁者即着脚處也降自雪峰復遶井塔下屈曲一二里許不復見所由寳華寺徑矣乃忽得所謂石級齒齒壁間往修覺寺道者則今還道也與初所從徑合徑窮登輿是日扺彭山宿茂州史記曰南越破後冉駹等皆震恐請臣置吏武帝元鼎六年以冉駹為汶山郡守華陽國志汶山郡有六夷羗胡羗虜白蘭九種之戎牛馬旄氈斑罽青頓毲羊羖之屬特多雜藥名香土地剛鹵不宜五榖惟種菽麥而多氷寒盛夏凝凍不釋故夷人冬則避寒入蜀傭賃自食夏則避暑反落歳以為常蜀人謂之作五百石子也禹貢岷山導江註曰江水出蜀西南徼外東至岷山而禹導之郡縣志岷山在茂州西北最後畨曰列鵞村村有岷山名曰鐡豹一曰羊膞則分水之上源也一自西南入大渡河一自正南入溢村經石紐過汶川水經曰岷山在蜀郡氐道縣大江所出東南過其縣北又曰江水自天彭闕東逕汶闗而厯氐道縣北註云岷山即瀆山也水曰瀆水矣又謂之汶阜天彭闕亦謂之天谷也秦昭王以李氷為蜀守氷見氐道縣有天彭山兩山相對其形如闕謂之天彭門亦曰天彭闕江水自此已上至微弱荀卿曰江出於岷山其始出山也其源可以濫觴焉益州記曰大江泉源始發羊膞嶺下緣崖散漫小大百數殆未濫觴東南下百餘里至白馬嶺又自白馬嶺廻行十餘里至龍涸又八十里至西陵縣又西北二十里至汶山故郡乃廣二百餘步又西南百八十里至濕坂江稍大矣河圖括地象曰岷山之精上為井絡帝以㑹昌神以建福古蜀謠云汶阜之山江出其腹帝以㑹昌神以建福郭璞岷山贊曰岷山之精上絡東井始出一勺終至淼溟作紀南夏天清地寧漢書注岷山一名鴻冡一名沃焦在隴山南首故稱隴蜀山直上六十里括地志云中國山川東北流其維首在隴蜀正義曰岷江發源隴山東北流入渤海水經注漢延平中岷山崩壅江水三日不流揚雄自岷山投賦江流以弔屈原名曰反騷也王羲之與周益州書云想足下鎮彼土未有動理要欲及卿在彼登汶嶺峩眉而還實不朽之盛事又與謝安書云周益州書述蜀山川如岷山夏含霜雹校之所聞崑崙之伯仲也山海經云岷山神馬首龍身祠用雄鷄瘞用黍則風雨可致焉郡國志岷山俗謂之鉄豹嶺陵陽李新詩在昔岷峨神龍文而馬首即鐡豹之形也華陽國志宣帝地節元年武都白馬羗反使駱武平定之因慰勞汶山吏及百姓詣武自訟謂歳再度更賦至重邉人貧苦無以供給求省郡郡建以来四十五年武以狀上遂省汶山郡復置都尉唐茂州都督府壁記云貞觀初置覊縻州九曰維翼筰塗炎徹向冉穹維州今威州翼州今叠溪所筰以下則皆白狗羗矣其時一州所領不過數十里而已寰宇記云梁普通年於此置繩州取桃闗之路以繩為橋也繩橋之法先立兩木於水中為橋柱架梁於上以竹為絙乃宻布竹絙於梁繫於兩岸或以大竹落盛石繫繩於上又以竹綆布於繩夾岸以木為機繩緩則轉機収之智猛法師所謂氷崖皓然百千餘仞飛絙為橋乗虚而過窺不見底仰不見天寒氣慘酷影戰魂慄是也又有度索尋橦之橋大江水峻極如箭兩山之脇繫索為橋中刳木為橦拴繫行人於上以手自緣索到彼岸則旁有人為解其系尤極危險陸㳺詩度索臨千仞梯山躡半空即此方輿云相公嶺亦名茂濕州之主山也州治内有雪峰堂又有列岫堂鄭微列岫堂記云九頂列於南屏風臺盤列於西巨人橐駞列於東又有練光亭王咨留題云汶江自徼外東繞汶川郡西北出極目可百里許每朝陽舒彩夜月流天之際一望水光若萬丈長虹夭矯其上而吐吞之也舊有亭曰觀瀾據城之隅不與景㑹因取少陵賦岷山沲江圖川蜺飲練光之句以練光題其額云碑目唐刺史黄堂梁記為寳厯元年刺史竇季餘大中三年刺史劉成思咸通三年刺史盖巨源題又云張延賞修城記載唐大厯十四年吐蕃大下火焚郊館興元元年張延賞重修其後别駕大夫修建城宇堡壁雉堞又云唐廻車院碑刺史盖巨源撰大中十三年立又云茂州治平寺碑寺舊在外緣叛羗董阿丹焚毁元豐初移剏城中勝覽云巨人山在州南三十里山頭有石如人立面南元宗幸蜀時以石人背立勅令鞭之一百下有九池俗傳是九龍湫其湫四山環遶百二十里又云雞宗山在州西四十里扼羗人出入之路熙寧元年置鎮羗寨按宋史熙寧九年静州楊文緒導番董阿丹作亂聲援俱絶至書木牌投于江以告急朝廷遣内使王中正将兵旁出鷄宗山擊之文緒等伏誅碑目云政和丁酉倅貳跨鼇先生李新目擊静州之變記載其事甚詳名更生碑今在更生閣演繁露云蘇易簡言本朝使人至西番見有老人消縮如小兒伏梁上鷄窠中乃其見在子孫九代祖也其説甚怪丙申十月十六夜寓直玉堂閲史見貞元間韋臯攻吐蕃其所攻州名有維保松及鷄栖老翁城予欣然自笑曰易簡之説豈因此二城名而増餙之耶按寰宇記茂州西北至吐蕃栖鷄城下或即此處汶川縣華陽國志漢嚴季后為汶江尉成都人仲少受學於季后及為汶江以書呼許十月徃㑹夷反斷道期必往經渡六十㡬死數四卒得至汶江乃為季后陳䇿俱得免難近欽之按漢武置汶山郡即置縣曰汶江矣水經註曰江水又逕汶江導汶出徼外岷山西玉輪坂下而南行又東逕其縣而東注於大江水經又云江水厯氐道縣北有湔水入焉註曰水出綿道亦曰綿虒縣之玉壘山吕忱云一曰半浣水也下注江按汶川本漢綿虒縣地矣寰宇記云玉壘山在縣南三里又有玉輪坂其下汶水所經謂之玉輪江山出璧玉即郭景純所謂玉壘作東别之標者勝覽云七盤山去汶川縣九里志云即玉壘闗也賈島送𤣥巖上人歸西蜀詩玉壘山中寺幽深勝槩多藥成彭祖搗頂受七輪摩去臘催今夏流光等逝波㑹當依糞掃五嶽徧頭陀勝覽云慈母山在青城山東導江人馮大量與神仙相遇入隠此山外史云滋茂龍池在汶之尤溪萬山叢立中有方池週四十里廣㡬百畆清水鏡開芳草四積真靈境也登真書云滋茂龍池一曰慈姥在益州西南四百里有靈藥可以已疾山無毒害猶慈姥焉故曰母田况益州龍祠記云蜀之西山有池曰滋茂亦曰慈母以其能興雲雨救旱暵楙養百榖而名唐開元中章仇兼瓊既得平戎城夢一女子謂曰我此城之龍也今弃戎歸唐願有以居我章仇異之表為立祠按總志慈母山在縣南百五十里昔有婦人引子采藥山中虎負其子去母逐虎不得因長號而絶見者哀之曰慈母也則其所載又不同矣碑目云滋茂池善應廟碑張商英無盡處士文其神或傳姓呉或傳姓郭頗有異同勝覽云龍洞在牛溪鎮入洞數步向南石壁有穴可通無路可陟掌洞道人附巨竹一枝於穴内令遊人扳竹而上可達龍池文同茂州汶川縣勝因院記云繇玉壘南下過笮迤西循皂江左折越太平渡行深入曲無慮六十里至茂之汶川有地曰柘平羣山却立大陸初露畦麻疃稻杳逺空濶披壖帶麓壤土鮮潤景物瓌麗人物純篤就其佳處有院曰羅漢昔有頭陁徳欽戒操甚嚴歳臘居久其徒委散是身獨在常懼其所将底墮落願擇髙行屬以香火得永康軍大中祥符寺僧義海者付之至惟簡師凡五世也惟簡性顓潔所趣端慎守僧律作佛事癯形晦面不避風雨逺近四衆咸宗仰之既至此地乃圖崇餙伐木䥴崖大輯材礎搆廣厦設尊像儲秘典納浄侣凡所欲有一一完具殆逾一紀功力方絶以名上列乃錫今號庭堂虚敞檐宇飄動丹明碧照繢繡岩谷誠歸嚮之福地而莊嚴之道塲也惟簡余之邑人逺來求紀其事間嘗謂余曰青城諸峰惟大岷最為髙厚然丈人上清之望者乃世俗之所能見爾如吾所居正向其面脉終表裏披歛出没澗壑鈎蔓巒嶺曲折髙林巨樾巍崗險頂晨霞夕靄染漬輝耀湍瀑淙激禽虫啼響一日萬狀無有窮極嵬眼傾耳不知厭倦此方外清絶之境世間竒偉之觀而惟簡輒擅有之山林之人所獲多矣安得君之車馬一至其地以幸吾言之不誣余聴其説衮衮令人喜聞回視此身若處泥穽何時濯洗以從師傲兀於其間哉因命筆綴次其事使歸琢諸岩石遂以為記云熙寧二年十月十五日威州漢徼外冉駹之地蜀劉禪時姜維馬中等討汶川叛羗其屯兵之處號為姜維城唐武徳七年白狗羗首領鄧賢佐内附於姜維故城置維州以統之至上元之後河西隴右州縣皆䧟吐蕃贊普更欲圖蜀州累急攻維州不下乃以婦人嫁維州門者二十年中生二子及蕃兵攻城二子内應城遂䧟吐蕃得之號無憂城外史云古維州在今保縣之外可八十里其對面有無憂城三面臨江巋然峰頂實諸夷之襟㗋中國之要塞也李文饒籌邉樓故址存焉今棄為外徼矣按偽蜀永平二年改維川郡為保寧縣徙就中州城即今治也州治後即玉壘山蜀後主觀湔江至此親書玉壘山三字於州署其大盈丈左有龍洞焉湔水自玉壘峽出而注為泉有魚長可徑尺州人以為神魚無敢捕者本志云州城原為汶川縣址城内之民半屬汶川城以外純屬汶矣碑目云鼓角樓記唐維州軍事判官髙測文乾符五年十月十五日維州刺史李光置又云天寳寺碑唐咸通六年建軍事判官陶師文又云伏波廟碑咸通八年左武衛兵曹參軍崔遂文俱在維州張舜民畫墁錄云凡自岷州趨宕州㳂水而行稍下行大山中入棧路或百十步復出略崖嶔崟不可乗騎必步至臨江寨得白江至階州須七八日其所經皆使傳所不可行攷之山水秀絶天下無有也臨江寨上望一處當大山中西望雪山日晃如銀其髙無際出衆山上居人曰此雪山佛居也有獅子人常見之非西域雪山是蜀所記無憂城東北望隴山積雪如玉耳保縣志云姜維築維州城遂築下邑其舊址在南溝之西李徳裕築無憂城重築薛城戍舊址在縣東葬墳壩又云縣四里編户七姓耳通化鹽溪已併入州所存者玉山箭上二里皆畨也近亦叛去按通化縣本唐咸亨二年刺史董弁招慰生羗置小封縣在西蕃通鶴軍垂拱二年城為北畨所没今置在威戎軍西宋宣和封西岳神勑詞云維彼通化地當西極金天氏之分域也即隋之金川縣矣今屬州為通化里鹽溪縣隋之定廉縣與金川同置者唐貞觀初改為鹽溪縣以村有鹽溪縣得採漉今演化禪師所居之地玉山夜静恒有霞光冉冉横山前東北半壁天皆丹色照林木如畫至旦方滅俗名為筆架山箭上在縣東里許一岡斗直而下如矢曰箭嶺又云箭上即唐之守捉城也亦不屬内地蜀中廣記卷七
