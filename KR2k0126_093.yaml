body:
  text: 蜀中廣記卷九十三明曺學佺撰著作記第三史部蜀鑑中江吳昌裔撰其書萃周漢以來至宋蜀道得失興師取財之所郭允蹈蜀鑑一卷序曰蜀在禹貢一梁州爾文王興於岐西而從武王牧野之師者乃庸蜀羌髳微盧彭濮人説者謂文王化行江漢之所被信矣三代以來秦得蜀以并諸侯漢髙由蜀漢以定三秦諸葛孔明三分天下僅有其一而伸大義於季漢非以其地西接崤函南連荆吳扼關河之勝則為天府之固合吳蜀之長則據上流之重險要雖控制一隅而形勝實關於天下歟中興南渡首吳尾蜀有常山之勢前褒後劍得金城之險乃眷西顧謢蜀如頭目保蜀如元氣世歷百年嵗經三卯外有虎噬之虞內懷赬勞之憂而蜀之為蜀非全盛時比矣文子久仕於蜀身履目擊而動心焉燕居深念紬繹前聞因俾資中郭允蹈緝為一編起自秦取南鄭迄於王師平孟昶凡地形之厄塞山川之險阻邇雍而鄰荆者稽之舊史按之圖志悉紀于篇西南夷為蜀後户未形之憂難忽而已事之鑒可師則又條其本末而附之間又論其得失之要者定為十卷凡千三百年蜀事之大凡亦可以概見於此噫蜀在宇內九之一爾得之則安失之則危竊之則亡覽是書者可以鑒焉端平三年十月朔旦昭武李文子序劍南須知十卷巽巖李氏曰眉山宋如愚撰第一卷第二卷但編集舊史棄取或不倫第三第四第五第六凡四卷盡出唐樊綽蠻書第七卷以下乃如愚自為之文及所書計䇿耳如熙寧買馬事誠西南要害異時或可補國史之闕云宋王禹玉文武賢臣治蜀編年志一卷楊備恩蜀都故事二卷梁皓蜀坤儀令一卷薑虔嗣蜀雜制勑三卷俱見宋史經籍志晉王崇蜀書崇字幼逺梓潼人學問淵博蜀亡與陳夀同入京洛為三川標凖所著蜀事微與夀不同仕蜀郡太守有詩賦名伐蜀記桓溫撰東晉建元中溫平李勢後作李雄據蜀書江原常璩道將撰崔鴻十六國春秋表略曰惟常璩所撰李雄父子據蜀時書尋訪不獲所以未及善成輟筆私求七載於今此書本江南撰録恐中國所無非臣私力所能終得其起兵僭號事之始末乃亦頗有但不得此書懼簡略不成久思陳奏乞敕緣邉求採焉明皇幸蜀記三卷唐李匡文宋臣周宋居白撰初匡文記盡明皇崩臣周記止於歸長安敘事互相詳略居白合此記以宋為本析李為注取二序冠篇復撰遺事增廣焉僖宗幸蜀記一卷王坤撰見宋史咸通庚寅解圍録一卷唐成都少尹張雲景之撰言南詔圍城扞禦事前蜀記事二卷偽蜀學士毛文錫平圭撰起廣明庚子盡天福甲子凡二十五年文錫唐太僕卿龜範之子十四登進士第入蜀仕王建至判樞密院隨衍入洛而卒蜀武成永昌歷三卷宋經籍系孫光憲名下武成王建年號也後蜀記事十卷直史館太常博士董淳撰惟記孟昶事蜀記一卷宋張守約撰載孟昶初降至薨事蜀廣政雜記十五卷蒲仁裕撰廣政昶年號野人間話五卷成都景焕撰記孟蜀時事乾德三年序蜀書二十卷李昊撰昊字穹佐仕王衍至中書舍人翰林學士歷事孟知祥父子纍官門下侍郎同平章事監修國史自知祥領蜀凡章奏書檄皆出昊手至是集為百卷曰經緯略以獻廣政十四年修成昶實録四十卷昶欲取觀昊曰帝王不閲史不敢奉詔昊自言唐相紳之後昶與江南李景通好遣其臣趙季札至江南購得唐李紳武宗朝拜相制書還以遺昊昊喜甚大會賔客宴飲所費無算以帛二千匹謝季札蓋極奢侈云外史檮杌十卷張唐英次功撰自序云嘗觀自古姦雄竊據成都者皆因中原多故而閉關恃險以茍偷一時之安譬夫穿窬之人利於昏暝之夕至於白晝皎然則無能為也且韋臯守蜀二十餘年其材智機權過於王孟逺矣止欲求兼兩川節鉞而不能得劉闢惑術士之言自謂才過項羽不數月已就檻車之縛蓋是時朝廷清明刑政修舉賢智在位紀綱整葺彼雖欲不臣勢不能為也使臯闢在五代時其為惡必有過於王孟者以此知朝廷治則蜀不能亂朝廷不治則不惟蜀為不順其四方藩鎮之不順亦有不下於蜀者當王衍之入洛也三蜀之人盡喜中國之有聖人而莊宗總制失馭中外繼叛蒲禹卿慟哭曰觀天下事勢如此蜀人豈有安泰之期耶必重不幸爾洎知祥入蜀之後明宗頗以蜀人為疑凡髙資有力者盡令東徙張不立嘆曰蜀中之叛非蜀人為之也皆朝廷所委用之臣所為也其言蓋有激而云爾善乎田龍遊之論曰僭偽之主改廳堂為宫殿改紫綬為赭袍改僚佐為卿相改前驅為警蹕改妻妾為后妃何如常稱成都尹永無滅族之禍耶茲可謂藥石切至之言也王孟父子四世凡八十年比之公孫述輩最為久逺其間善惡之迹亦可為世之鑒戒然編録者如耆舊傳鑑戒録野人間話之類皆本末顛倒鄙俗無取真宗時知制誥路公振修九國書有前蜀後蜀世家列傳然而煩簡失當尚多疏略如張扶馮涓張士喬段融蒲禹卿張雲陳及田淳之徒諫諍章疏皆有益於世教盡棄而不録此觀者所以惜其有未備也豫家舊藏前蜀開國記後蜀實録凡百三十卷嘗欲焚棄而不忍今因檢閲始終削去煩冗編年敘事分為十卷其間事實未顯如髯須肥遺逺望績長禹糧蒲騷之類各為解其失誤凡五代史及皇朝日厯所載者皆略而不書名曰蜀檮杌蓋取楚史之名以為記惡之戒非徒衍其小説亦使亂臣賊子觀而恐懼云耳陸昭逈後序曰治平四年夏六月兩當縣鄧君惟良顯甫自京師歸傳殿中侍御史裏行張唐英次功前在閬中監征時所編蜀春秋十卷豫嘗得而觀之其編年敘事之體若荀悅漢紀之例至於褒貶善惡本末貫穿駸駸乎馳於漢魏作者之間有古良史風正召試祕閣在仁宗時上大水災異書時政十四事又在英宗朝上慎始書水災封事二道皆究極乎治亂之變而探索乎天人之際今天子特排羣議而擢為御史以其勇於敢言也次功舊有國體論十卷唐史誅姦發潛論五卷總要監今論五卷渝南集十卷補楚書十三篇樂府歌詩千餘篇皆祕而不傳於人而春秋最後出顯甫好事密購以歸豫因為刋行之昔人得王充論衡藏之以自衒其辨豈豫之志哉金行啓運録二十卷青宫載筆記十五卷並孟蜀學士庾傳昌著見檮杌平蜀寶録一卷左藏庫副使康延澤撰宋平蜀後延澤以內染院使為鳯州路馬軍都監王全斌等既得罪延澤亦貶唐州團練使按本傳載蜀軍二萬七千人諸將慮其為全師雄內應欲盡殺之延澤請簡老弱疾病七千人釋之餘以兵衛浮江而下諸將不能用此書敘述甚詳邯鄲書目云不知作者館閣書目亦然考王元之所撰延澤墓志知其所為也蜀冦亂小録一卷平蜀録一卷俱張逵撰靖蜀篇四卷安丙自撰平吳曦事西陲泰定録九十卷李心傅撰記吳曦叛逆以及削平本末起嘉泰辛酉迄嘉定辛未為三十七卷其後蜀事益多又增修至辛巳之冬通為九十卷仍頗用史遷年表例并記國家大政令邉防大節目首尾凡二十年丁卯實編一卷成忠郎李珙撰誅曦之功楊巨源為多安丙忌而殺之珙為作傳上之於朝以昭其功而雪其寃蜀中廣記卷九十三
