body:
  text: 蜀中廣記卷九十二明曺學佺撰著作記第二史部古史考蜀漢光禄大夫譙周撰樂史寰宇記引之後陳夀作古國志五十篇蘇轍作古史六十卷其書皆本允南之舊古史子由自序畧曰太史公始易編年之法為紀傳世家記五帝以來然不得聖人之意余因遷之舊始伏羲訖秦始皇為七本紀十六世家三十七列傳謂之古史追録聖賢之遺意以示後世云通鑑釋文三十卷左宣義郎眉山史炤見可撰馮時行序蘇軾兄弟以師事之者通鑑論篤三卷廣漢張栻敬夫撰取通鑑中言論之精確者表而出之多或全篇少至一二語去取甚嚴通鑑類編十卷國典二十卷中江呉之巽先之著巽有家學教授於廣漢值逆曦欲以季春䀻士吏詣巽請書行藝年籍巽叱曰此何時耶因作詩云固窮何用怕鬼笑暴貴不免干天刑卒不為所撓巽於歴代史數四校讐凡國朝故實天文地理之書罔不精洽為文沉涵而有致士大夫稱之通鑑綱要趙介胄全叔著簡池人經世紀年二卷張栻撰序曰太史遷作十二國世表始紀甲子起於成周共和庚申之嵗庚申而上則莫紀焉歴世寖逺其事雜見於諸書靡適折𠂻則亦傳疑而已嘉祐中康節邵先生雍出於河南窮往知來精極於數作皇極經世書上稽唐堯受命甲辰之元為編年譜如云外丙仲壬之紀康節以數知之乃合於尚書成湯既没太甲元年之説成湯之後盖實傳孫孟子所説特以太丁未立而卒方是時外丙生二年仲壬生四年耳又武王伐商已嗣位十一年故書序稱十有一年而復稱十有三年者其誤可知是類皆自史遷以來傳習之謬一旦使學者曉然得其真萬世不可改易者也栻不自揆輒因先生之厯攷自堯甲辰至皇上乾道改元之嵗凡三千五百二十有三年列為六圖命曰經世紀年以便觀覧間有鄙見則因而明之大節目有六如孟子謂堯舜三年之䘮畢舜禹避堯舜之子而天下歸之然後踐天子位此乃見帝王奉天命之大㫖其可䦣而弗彰故於甲申書服堯之喪乙酉書踐位之實丙戌書元載格於文祖自乙酉至丁巳是踐位三十有三載也則書薦禹於天與尚書命禹之辭合自丁巳至癸酉是薦禹十有七年也與孟子之説合於禹受命之際書法亦然然而書稱舜在位五十載陟方乃死則是史官自堯崩之明年通數之耳夏后相二十有八載寒浞弑相明年少康始生於有仍氏凡四十年而後祀夏配天不失舊物寒浞豈可使間有夏之統故缺此四十載不書獨書少康出處而紀元載於復國之嵗以見少康四十年經營宗祀絶而復續足為萬代中興之冠冕於新莾之纂缺其年亦足以表光武之中興也漢吕太后稱制既不得係年而所立他人子名為少帝者又安得承統故復缺此數年獨書曰吕太后臨朝稱制亦范太史祖禹繫嗣聖紀年意也漢獻之末曺丕雖稱帝而昭烈以王義立於蜀不改漢號則漢統烏得為絶故獻帝之後即係昭烈年號書曰蜀漢逮後主亡國而始繫魏凡此皆節目之大者妄意明㣲扶正不自知其愚也其他如夏以上稱載商稱祀周始稱年皆攷之書可見而周書洪範獨稱祀者是武王不欲臣箕子尚存商立箕子之志也由魏以降南北分裂而統獨係於江南五代迭糅則都中原者不得不繫云帝王年代州郡長厯二卷古今類聚年號圖一卷並五代杜光庭撰光庭偽蜀青城道士三家史論華陽梁鼎二十篇眉山王當十三卷任諒三卷俱見本志傳史記刪文外傳十二卷漢書楊終字子山蜀郡成都人永平中詔諸儒白虎觀論考同異終與焉後受詔刪太史公書為十餘萬言後史記盧藏用作陳子昻傳曰子昻常恨國史蕪雜乃自漢武之後以迄唐初為後史記綱紀粗立筆削未終而嬰段簡之禍漢徳春秋十五卷漢何英著英郫人何武弟也與成都楊申俱通經緯每事有先見之明西漢雋永唐安文正倫著西漢發揮十卷簡池劉涇巨濟撰漢書筆記後漢纂言簡州趙介胄著三國志六十五卷晁氏曰晋陳夀撰魏四紀二十六列傳蜀十五列傳呉二十列傳宋文帝嫌其畧命裴松之補注博採羣説分入書中其多過本書數倍王通數稱夀書今細觀之實髙簡有法如不言曺操本生而載夏侯惇及淵於諸曺傳中則見嵩本夏侯氏之子也髙貴鄉公書卒而載司馬昭之奏則見公之不得其死也他皆類此但以魏為紀而稱漢呉曰傳又改漢曰蜀世頗譏之若謂其衘諸葛孔明之髠父而致貶辭求丁氏米不獲而不立儀廙傳亦未必然也王隠晋書曰陳夀卒詔下河南尹華澹遣吏齎紙筆就夀門下寫三國志常寛泰恭撰蜀後志楊戯季漢輔臣贊陳夀志戯字文然犍為武陽人少知名丞相亮深識之仕射聲校尉以延熙四年著季漢輔臣贊其所頌述多載於蜀書余皆註疏本末於其辭下三國人物論三卷東蜀楊天恵祐甫撰諸葛武侯傳一卷廣漢張栻撰以陳夀作史私且陋裒集他𫝊及裴松之所注為之而削去管樂自許一則朱晦翁以為不然又為後論以達其意南北朝七書紹興十四年井憲孟為四川漕始檄諸州學官求政和中所頒沈約宋書時四川五十餘州皆不被兵書頗有在者然往往亡缺不全收合補綴獨少後魏書十許卷最後得宇文季䝉家本偶有所少者於是七史遂全因命眉山刋行焉後梁畧十卷北史隋姚最僧坦之子也通經史好著述為太子門大夫隋蜀王秀鎮益州遷秀府司馬秀後隂有異謀隋文帝令公卿窮其事開府慶整郝瑋等並推過於秀最獨曰凡有不法皆最所為王實不知也榜訊數百卒無異辭竟坐誅論者義之撰梁後略十卷行於世紀聞談三卷陳氏曰蜀潘逺撰館閣書目按李淑作潘遺今考邯鄲書目亦作潘逺其曰遺者本誤也所記隋唐遺事新唐書列傳宋嘉祐末年端明殿學士宋祁子京知成都府帶唐書於本任刋脩每宴罷盥潄畢開寢門垂一簾燃二椽燭媵婢夾侍和墨伸紙逺近觀者皆知尚書脩唐書望之若神仙焉唐書辯證二十卷晁氏曰成都呉縝撰縝字廷珍仕至郡守數新唐書初修之時其失有八類其舛誤二十門凡四百餘事縝不能屬文誤有詆訶如新書張九齡𫝊云武恵妃䧟太子瑛遣官奴告之曰廢必有興公為援宰相可常處九齡奏之故卒九齡相而太子無患縝以為時九齡已相而太子竟以廢死以為新書似實而虚按史之文謂終九齡在相位日太子得不廢也豈謂卒以九齡為相太子終無患乎初名紏謬其後改為辯證實一書王氏揮麈録曰嘉祐中詔宋景文歐陽文忠諸公重修唐書時有蜀人呉縝者初登第因范景仁而請於文忠願預官屬之末上書文忠言甚懇切文忠以其年少輕佻拒之縝鞅鞅而去逮夫新書之成廼従其間指摘瑕疵為糺謬一書至元祐中縝遊宦蹉跎老為郡守與五代史纂誤俱刋行之紹興中福唐呉仲實元美為湖州教授復刻於郡庠且作後序以謂鍼膏肓起廢疾杜預實為左氏之忠臣然不知縝著書之本意也唐九朝實録後唐史記曰都官郎中庾傳美充三州搜訪圖籍使傳美偽蜀王衍舊寮家在成都便於歸計且言成都具有本朝實録故有是命及使囬所得纔九朝而已其餘殘缺雜書益不足記唐鑑二十卷華陽范祖禹醇夫撰醇夫為温公通鑑局編脩官十五年分掌唐史以其所自得著成此書取武后臨朝二十一年繫之中宗其言曰此春秋公在乾侯之義也雖得罪於君子有所不辭凡三百六篇孫之翰唐論丹鉛録云之翰名甫蜀人所著唐論筆力在范祖禹之上與青神王當所編春秋名臣傳皆有史遷之風今罕傳於世惜哉中宗景龍四年睿宗即位未踰年而改元景雲之翰書去其元字而書景雲年慎謂前若書景龍四年正月至五月自五月後直書景雲六月至十二月庶得其實而貶亦在其中矣之翰之論曰古之人君即位必踰年而改元者先君之年不可不終也後君繼位不可無始也一年不可二君也不終則忘孝矣不始則無本矣一年二君則民聴惑矣故書景雲年戒無禮而正不典也噫凛凛乎春秋之筆也唐録備闕十五卷五代歐陽逈著見宋史逈益州人常事蜀王衍及知祥父子累官門下侍郎平章事性坦率無檢操雅善吹笛太祖常召至便殿令奏數曲逈為歌詩甚富掌誥命非其所長但蜀之卿相奢靡相尚逈能守儉素此乃可稱唐書辯疑眉山蘇軾著見人物便覽唐史發潛六卷蜀州張商英撰唐史發揮十二卷華陽鄭少㣲撰唐書補註二百卷卭州李繒撰志云繒舉八行不就以文史自娯唐史囊括四卷唐安文正倫撰唐書韻記十卷簡州趙全叔著鑑誡録十卷後蜀東海何光逺輝夫撰又云證聖中纂輯唐以來君臣事迹可為世鑒者前有劉曦度序李獻臣云不知何時人考之不詳也續通歴十卷陵州孫光憲輯唐洎五代事跡續為總歴叅以黄巢李茂貞劉守光安巴堅呉唐閩廣胡越兩蜀事迹宋太祖詔毁其書以所紀多失實也北夢𤨏言二十卷晁氏曰蜀孫光憲従陽玭元證逰多聞唐世賢哲言行因纂輯之且附以五代十國事取傳田於江南之夢自以為髙氏従事在荆江北故命編云五代史纂誤五卷雜録一卷晁氏曰呉縝撰凡二百餘事皆歐陽永叔新五代史牴牾舛訛也按通鑑考異證歐陽史差誤如莊宗還三矢事之類甚衆今此書皆不及之特證其字之脱錯而已又善本未必皆然九國志補二卷宋路振子發撰雜記呉越唐前後蜀東漢南漢閩楚凡十國各為世家列傳凡四十九卷末二卷為北楚言髙季興事張唐英補撰者開談録二卷宋蘇耆撰易簡之子舜卿之父也記五代以來雜事下帙多載馮道行義續通鑑長編一百六十八卷續通鑑長編舉要六十八卷隆興元年知榮州李燾奏臣嘗盡力史學於本朝故事尤切欣慕毎恨學士大夫各信所傳不攷諸實録正史紛錯難信如建隆開寳之禪授涪陵岐魏之遷殁景徳慶厯之盟誓曩霄諒祚之叛服嘉祐之立子治平之復辟熙寜之更新元祐之圖舊此最大事家自為説臣輒發憤討論使衆説咸㑹於一敢先具建隆迄開寳凡十七年為十有七卷上進乾道四年禮部郎官李燾上言臣准朝㫖取臣所著續資治通鑑自建隆迄元符令有司繕寫投進今先次寫到建隆元年至治平四年閠三月五朝事迹共一百八卷投進治平以後文字増多容臣更加整齊節次投進臣竊聞司馬光之作資治通鑑也先使其寮採摭異聞以年月日為叢目叢目既成乃脩長編唐三百年范祖禹實掌之光謂祖禹長編寜失於繁無失於畧今唐紀取祖禹之六百卷刪為八十卷是也臣今所纂集義例悉用光所創立錯綜銓次皆有依憑顧臣此書詎可便謂續資治通鑑姑謂續資治通鑑長編可也旁采異聞補實録正史之闕畧叅求真是破巧説偽辯之紛紜益以昭明祖宗之豐功盛徳區區小恵或在可録所有續資治通鑑長編一百八卷隨表上進淳熙元年知瀘州李燾上言臣先次投進續資治通鑑長編自建隆迄治平今欲纂輯治平以後至中興以前六十年事迹庶幾一祖八宗之豐功盛徳燦然具存無所闕遺顧此六十年事於實録正史外頗多所増益首尾畧究端緒合為長編凡六十年年為一卷以字之繁畧又均分之總為二百八十卷然熙豐祐聖符靖崇觀和康之大廢置大征伐關天下之大利害者其事跡比治平以前特異寜失之繁無失之畧必湏睿明稱制臨决如兩漢宣章故事無使各自為説乃可傳信無窮淳熙九年知遂寜府李燾上言臣累次進所為續資治通鑑長編今重别寫進共九百八十卷計六百四冊其修換事總為目一十卷又縁一百六十八年之事分散為九百八十卷之間其字繁文冗本末頗難立見畧存梗槩庶易檢尋今創為建隆至靖康舉要六十八卷并後總目共五卷已上四種通計一千六十三卷六百八十七冊投進者紀一祖八宗之盛徳至善義寜止於百篇聚九朝三世之各見殊聞事或傳於兩説惟折諸聖廼得其真臣網羅収拾垂四十年綴葺穿聯踰一千卷牴牾何敢自保精力幾盡此書非仰託大君之品題懼難逃乎衆人之指目漢孝宣稱制决疑故事最髙於甘露我神考錫名冠序治鑑莫徹於元符豫席恩言比迹先正臣死且不朽乾道六年奉㫖降付續資治通鑑長編一百七十六冊秘書省令依通鑑紙様繕寫進納本傳李仁甫如霜松雪栢無嗜好無姬侍不殖産平生生死文字間長編一書用力四十年孝宗謂無愧司馬遷葉適謂春秋以後纔有此書也兩朝國史一百二十卷宋仁宗英宗兩朝國史也史官王珪等撰珪字禹玉華陽人詳見本集仁皇訓典六卷侍講范祖禹撰元祐八年經筵所上凡三百十七條大畧亦用寳訓體仁宗政要四十卷王氏揮麈録曰殿中侍御史張唐英嘗述仁宗政要四十卷上之請盟録二十卷宋史陳堯叟久典機密軍馬之籍悉能周記乃著請盟録凡三集神宗正典六卷蜀州張商英著通鑑巨編蒲江髙載著宋史載讀禮於家以其暇覽前朝史牒嘆熙豐祐聖迄於隆乾淳熙黨論屢變國勢僨起不常慨然有感乃取制詞之褒貶廷論之是非萃成巨編而自以己意識其後大抵以國史實録長編㑹要為之據依而一時詔㫖訓詞封章奏疏則於先賢文集私史簡稽叅質凡百數十年治亂開卷瞭然重脩徽宗實録二百卷思陵大事記三十六卷阜陵大事記一卷並丹稜李燾撰建炎以來繫年要録二百卷建炎以來朝野雜記十一卷工部侍郎陵陽李心傅㣲之撰盖與巽巖長編相續亦嘗自隆興後相繼為之㑹蜀亂散失不可復得心傅又有孝宗要畧初草二十二卷建炎復辟平江實録一卷中興備覽四十一篇並綿竹張浚著中興十三處戰功録一卷叅政眉山李壁季章撰中興以來禦冦立功惟此十三處編為一書所謂司勲藏其貳者也開禧乙丑北事將作其書成宋朝通典二百卷陳氏曰不著名氏或言魏鶴山所為似方草創未成書也凡通典㑹要前書及館閣書目皆列之類書按通典載古今制度沿革㑹要専述典故非類書也四朝㑹要總類五百八十八卷李心傅所編合三書為一刻於蜀中宋朝治迹統類七十三卷眉山彭百川叔融撰畧用袁樞本末條例為前集四十卷中興後事為後集三十三卷宋朝事類樞要二百五十卷陳氏曰蜀人張和卿編集為一百五十門盖舉子荅䇿之具也國史對韻十二卷國朝事始一卷蜀公范鎮撰呉仲庶嘗稱景仁憫諸後學雖渉書傳而問以今代典故則懵然不知乃自太祖開基迄於仁宗朝摭取事實可為規矩鑒戒者用韻編次之即此書也御覽三百六十卷御屏經史切要十卷宋史田錫表聖嘉州人嘗奏真宗曰陛下即位以來治天下何道臣願以皇王之道治之舊有御覽臣請鈔畧四部别為御覽三百六十篇萬㡬之暇日覽一卷可經嵗而畢又請采經史切要之言為御屏風十卷置扆座之側則治亂興亡之鑒嘗在目矣詔史館以羣書借之帝學編范祖禹醇夫纂自古賢君迄於宋代祖宗務學事迹為一篇以勸講淳夫元祐時在講筵八年詰旦當講前一夕正衣冠儼然如在上前命子弟侍坐先按講其説平時語若不出口及當講開列古義仍參之時事以為勸戒其音琅然聞者興起東坡常曰淳夫講書言簡義明燦然成文章為今講官第一歴代宰相年表李燾撰其自序畧曰古之所謂相者一而已初未嘗使他人參貳乎其間堯相舜舜相禹禹相臯陶臯陶既没乃相益湯相伊尹𫝊所謂仲虺為湯左相者不足信也周家並建三公而一公實兼冢宰故旦奭夾輔成王而誕保文武受命者専屬之旦旦歸於豐奭乃専政盖其名三公實一相耳自秦以降名實漫失間有瓌偉絶特負賢相之稱功烈赫然著見於一時者亦必得君之専歴年之久而莫或參貳之故也權出於一而莫或參貳之雖姦雄或得以肆其惡攘竊天下傾國敗家不可禁遏然而一相之任終不可分者唐虞夏商之成法也彼徒見趙髙王莾曺操司馬懿其禍如此之酷也而不察夫帝王之所以隆盛其為利盖亦溥哉不能還治其本而反疑其末並列兼制使相牽引而相遂失其職矣夫任相不獲其利而䝉其禍是君之不明非相之權果不可使出於一也既奪其職分其權則所謂相者特一大有司耳其何以總百官治萬事而亮天功耶凡相取其徳耳故曰惟尹躬暨湯咸有一徳而舜禹臯陶之胥命必孜孜以徳為言彼誠知所本者歟本之不知則其選用益雜而多端矣選用雜而多端故其稱號亦顛倒錯亂無有定制或居其位而不得聞其政或當軸秉鈞而身乃為他官名實紏紛賢不肖溷淆其或多至十三四人而其少猶不下四五軰古所謂相寜若此乎然而治亂安危所係今猶古也其所以得相及所以失相者要不可不知按諸舊史惟前漢及唐頗有譜牒其他率皆不具脱畧牴牾迷失真本乃旁捜逺取推究前後悉用司馬遷經緯之法追為年表起漢元訖周顯徳昔之參機務執樞要者莫不咸在事有本末附見於下否則畧之使其人與其官皆相傳而不絶觀宰相之出處進退何如而天下安危治亂在目中矣其足以補前代之缺文掲當今之逺鑑乎合一千五百三十四年離為三十四卷天禧以來御史年表仁甫自序曰御史法官也其責不専於言而天禧選用則與諌官俱任言責臺雖有等級也而義所當繫則卑者亦得徑行其權勢氣力又出諫官上祖宗之聖筭神術備矣今亦斷自天聖以來取丞雜三院姓名悉列之表若其人必天子自擇而宰相優容之乃能有濟猶諫官也天禧以來諫官年表仁甫自序畧曰古者自公卿大夫士至於工商莫不皆有言責輻凑並進而天子斟酌焉未嘗以言責専付一官以言責専付一官則由漢武帝失之武帝誠不喜諫者初置諫大夫猶未限員東京循舊弗改後乃寖㣲晋洎江表省其官拓跋魏復置其員亦不可知髙齊縁孝經之文始有七人之限夫以天下之衆而敢言者纔七人尚足為治耶恭惟祖宗明目逹聰協於虞舜任言責者不一天禧别置諫院禮秩優異他官莫擬崇廣言路諫官御史權勢氣力乃與宰相等盖當時所用諫官御史必取天下第一流非學術才行俱備為一世所髙者莫在此位或誤選試旋加汰斥言而當者曽不十年徑登台輔其名迹皆可考見嗚呼盛哉今斷自天禧置院以來作諫官年表并列古今之變為二説以附著之職官記一卷陳氏曰大理少卿蜀人張縯季長撰専載新舊遷轉之異亦以寄禄為未然也亷吏傳十卷成都費樞伯樞撰自秦至唐凡百十有四人宣和乙巳為序嘉祐名臣傳五卷張唐英集仁宗朝賢臣五十餘人各為之傳即仁宗政要中之一門耳續宋名臣言行録潼川姚希得逢原著蜀中廣記卷九十二
