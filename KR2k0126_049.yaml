body:
  text: 蜀中廣記卷四十九明曹學佺撰宦遊記第三川東後漢吳資字元約泰山人永建中巴郡太守有惠政郡境連歲豐穰百姓歌之曰習習晨風動澍雨潤乎苗我后恤時務我民以優饒及遷去又為之歌曰望逺忽不見惆悵嘗儃佪思逺實難忘悠悠心永懷但望字伯闔泰山人初為并州刺史桓帝永興二年來守巴郡郡境廣逺給吏兼將人從冬往夏還憂喪吉凶不得相見加以水陸俱艱山多猛獸迫於期會隕身江河投死虎口但察知之上疏極陳民瘼欲分巴為二一治臨江一治安漢事格不行及劉璋分巴郡為三其議本此百姓賴之朱辰字元燕蜀郡廣都人巴郡太守甚著德惠卒於官郡獽民北送及墓獽蛋鼓刀劈踊感動路人於是葬所草木成頃餘皆倣之曲折晉羅獻襄陽人後王時為巴東郡太守蜀平仍其官加拜凌江將軍領武陵太守泰始二年吳大將步闡唐咨侵巴東獻保城拒之不能入乃西侵至朐忍獻出擊闡大破之朐忍得全步唐乃退遷監軍假節安南將軍封西鄂侯入朝加錫御蓋朝服五代李遷哲字孝彥安康人周文帝時授侍中驃騎大將軍除直州刺史與田宏同討信州時信州為蠻酋向五子王等所圍宏遣遷哲赴援比至信州已陷五子王等聞遷哲至狼狽奔走遷哲入據白帝追五子王等破之及田宏還軍文帝令遷哲留鎮白帝信州先無倉儲軍糧匱乏遷哲乃收葛根造粉兼米以給之遷哲亦自取供食時有異膳即分賜兵士兵士有疾患親為醫藥以此軍中感之人思效命黔陽蠻田烏度田烏唐等每抄掠江中為百姓患遷哲隨機出討殺獲甚多由是諸蠻畏威各送糧餼遣子弟入質者千有餘家遷哲乃於白帝城外築城以處之并置四鎮以靜峽路自此寇抄頗息民獲寧宇唐長孫無忌字輔機河南洛陽人顯慶四年以忤楊國忠安置黔州逼令自縊而死至今有戍守其墓李祠客廣武人貞觀中為渝州刺史誠信亷介民懷其惠罷政之日家無餘財唐次并州晉陽人貞元間以禮部員外郎貶開州刺史久滯蠻荒孤心抑鬱乃採自古忠臣賢士罹讒放逐遂致殺身而君猶不悟者著書三篇謂之辨謗略上之德宗愈怒謂左右曰唐次乃方吾為古昏君遂改次夔州刺史憲宗即位乃召還劉禹錫字夢得中山人為夔州刺史上言民情利害及本州公務二表極中時宜李吉甫字宏憲趙郡人初以中書侍郎為陸贄所疑出知明州及贄貶忠州時宰欲殺之起吉甫為忠州刺史使甘心焉吉甫並不以前事介意與之歡若平生時論以吉甫為長者劉晏字士安曹州人初與楊炎不相得及炎入相貶晏忠州刺史炎欲誣搆晏罪知庾準與晏有隙舉為荆南節度以伺晏動靜準乃奏晏與朱泚書祈其救解言多怨望炎又證成其事誅之天下莫不稱寃陸贄字敬輿嘉興人為裴延齡所讒貶忠州别駕既放荒逺常闔户人不識其面政惟簡靜士民懷服又避謗不敢著書但集今古經驗藥方五十卷帝後稍思之以薛延為忠州刺史諭旨慰勞順宗立召還會卒年五十六諡曰宣柏貞節大厯中鎮夔門按唐文苑英華有授柏貞節制其略曰柏貞節雅有氣幹深於戎律藴三略以經武秉一心而事君可使持節都督夔州諸軍事充夔忠萬歸涪等州防禦使兼御史中丞杜甫詩曰柏公鎮夔門滯霧兹一掃李萆忠州臨江令時有中官被旨奉御容還闕乃挈西州一妓而下所在肆橫毆吏取庸萆徑入舟取妓縛岸上草奏將劾之其人怖懼遜謝遂不敢為害白居易字樂天太原人元和十三年冬由江州司馬量移忠州刺史郡居峽中稱險陋樂天以簡靜為政風流暇豫郡人樂道之其遊賞遺迹若東坡東澗鳴玉溪諸勝至今存韋處厚字德載京兆人元和中為考功員外郎時宰相韋貫之以議兵不合旨出官處厚坐與貫之善出為開州刺史有盛山詩集名流屬和韓退之序之楊端太原人乾符中南詔陷播州端應募領兵復播州授安撫使諭以威德縻以恩信蠻人懷服子孫世襲宋開禧中贈太師宋卞震成都人工詩舉蜀進士為渝州判官入宋仍其舊職會賊杜承褒攻圍州城厚賄誘震震斬其使與刺史分部士卒夾攻之賊遂平秦傳序江寧人淳化五年充夔峽巡檢使李順之亂城中乏食傳序出囊槖服玩盡市酒肉以犒士卒慰勉之城壞傅序赴火死其家寄荆湖間子奭遡峽求父尸溺死奏至太宗嗟惻録其次子賜錢十萬單煦平原人初知洛陽縣轉知昌州時詔城蜀煦以蜀負山帶水一旦毁籬垣而興版築其費巨萬非民力所堪請但築土城轉運使即移檄諸郡悉如其議後徙清平軍擢御史左遷知濮合二州合居涪漢間夏秋患水淫潦煦築東堤禦之纍官光祿卿唐介字子方江陵人擢第調奉節令有政聲召試御史衷行周執羔字表卿弋陽人歷官知夔州兼安撫使時秦播蠻叛執羔責豪帥曰朝廷任爾為長一方騷動責將誰歸豪懼擊斬叛首以獻夷患遂息周雍永康人知達州講學訓士儲粟惠民有社倉説約法一十八條鄉社法四條民甚便之後以事忤上恬然引去丁謂字謂之更字公言長洲人夔州路轉運使蠻地饒粟常乏鹽謂聽以粟易鹽蠻人大悅由是屯兵之州不須轉餉清江諸寨皆可給足特遷秩賜金李承約黔南節度使以恩信撫夷落勸農桑興學校及當代黔南人詣京師乞留懇至詔許留二年程頥字正叔皓之弟紹聖追貶元祐諸臣頥坐竄涪州北山有洞讀易其中至今崇祀程師孟字公闢吳人舉進士提點夔路刑獄夔部無常平粟建請置倉迫凶歲賑民不足即矯發他儲不俟報吏懼白不可師孟曰必俟報餓盡為殍矣竟發之楊旬夔紹聖中任夔州推官處心正直積纍隂功有子當入試夢神告旬曰汝隂隲有感汝子必貴若應科舉可改名楊椿旬覺如其言果中第六名王夢璽雲南人任達州學正出入道誼不愧師模嘗權州縣事苦節自持卒之日無以為斂士林惜之石恕衡州人靖康中為總潼關夔路兵馬攝南平軍事聞二帝北狩率勤王兵徑抵南京高宗立以軍事任之恕凡三守兹土甚得民心周敦頥字茂叔道州營道人歷合州判官部使者趙抃惑於讒言臨之甚威敦頥處之超然通判虔州抃守虔熟視其所為乃大悟執其手曰吾幾失君矣今而後乃知周茂叔也查籥字元章隆興初以御史出為夔路運判調停輸運之法務以便民為事措置揠折以寬民力蠲一路積賦十餘萬緡後轉成都運使王十朋字龜齡樂清人乾道元年知夔州時夔苦於馬綱十朋兩上狀請罷之歲旱為文禱於廟不踰時雨大降其誨士以忠孝與思無邪為主民輸租者使自概量去之日士民攀轅不忍舍李浩字德逺臨川人以祕閣修撰知夔官兼夔路安撫使奉法循理律己甚嚴時施川蠻酋起兵相攻夔民大恐浩草檄諭化之邊境乂安踰年以疾卒於官屈堅忠州防禦使建炎初金人圍陜府堅引兵救之圍解金人執堅堅曰吾來為解圍也城茍全吾死何憾叱金人使速殺之余玠字義夫蘄州人以功纍官兵部侍郎四川安撫制置使兼知重慶府四川總領四川轉運使玠大更前人敝政遴選守宰築招賢之館於府之左供帳一如帥所居下令曰集衆思廣忠益諸葛孔明所以用蜀也豪傑之士趨期立事今其時矣播州冉氏兄弟璡璞有文武才隱居蠻中前後閫帥辟召堅不起聞玠賢詣府上謁刺入玠即出見與分廷抗禮賔館之奉冉居之若素有居數月請見曰某兄弟辱明公禮遇思有以少禆益為今日西蜀之計其在徙合州城乎蜀口形勝之地莫若釣魚山請徙諸此若任得其人積粟以守之賢於十萬師逺矣巴蜀不足守也玠大喜曰吾固疑先生非淺士先生之謀玠不敢掠以歸己遂不謀諸衆密聞于朝請不次官之詔以璡為承事郎權發遣合州璞為承務郎權通判州事徙城之事悉以任之卒築青居大獲釣魚雲頂天生凡十餘城皆因山為壘碁布里分為諸郡治所屯兵聚糧為必守計且誅潰將以肅軍令又開屯田於成都蜀以富實十年冬玠率諸將巡邊直搗興元兵大戰十三年又大戰于嘉定初利司都統王夔素殘悍號王夜又恃功驕恣桀驁不受節度朝廷雖知其不法在逺不能詰也大帥處分少不嗛其意則百計撓之使不得有所為玠夜召夔計事潛以楊成代領其衆夔至斬之戎帥欲舉統制姚世安為代玠素欲革軍中舉代之弊遣都統金某往代世安世安閉關不納因結丞相謝方叔讒玠於帝玠鬱鬱不樂寶祐初聞召命愈不自安一夕暴下卒蜀人悲慕如失父母張與字君玉隴西人年十八從軍以戰功纍官四川制置副使知重慶府五月加檢校少保徵其兵入衛蜀道斷不得達而瀘敘長寧富順開巴渠諸郡不一月皆降元元合兵圍重慶援絶糧盡珏屢以死士間入城許以赴援且為之畫守禦計二年正月遣其將趙安襲青居執安撫劉才參議馬嵩歸二月遣張萬以巨艦載精兵斷內水橋入重慶四月合重慶兵出攻鳯頂諸寨與結瀘士劉霖先坤朋為內應六月遣趙安破神臂門執梅應春殺之復瀘州重慶兵漸解去圍瀘州十二月趙定應迎與入重慶為制置瀘州圍經年食盡安撫王世昌自經死元兵會重慶駐佛圖關招降與不從元兵破咸淳皇華城軍使包深巷戰死既而元兵破紹慶府與率兵出薰風門與元將伊蘇岱爾戰扶桑壩珏兵大潰城中糧盡趙安以書説珏降不聽安乃與帳下韓忠顯夜開鎮西門降與率兵巷戰不支歸索鴆飲左右匿鴆乃以小舟載妻子東走涪中道大憾斧其舟欲自沈舟人奪斧擲江中與踊躍欲赴水家人挽持不得死明日萬户特穆爾追及於涪執之重慶降制機曹琦自經死與至安西趙老庵其友諭以盡節亦自經死琦蜀進士也有趙立者字德修亦蜀人第進士以上書忤賈似道被謫德祐初起為大社令湖北提刑使蜀趣諸將入衛至重慶則咱萬壽已降與方城守為後圖立無以復命還至涪沈水死時制幕趙酉泰亦自殺孟珙字璞玉棗陽人元大將塔爾海圖薩帥師入蜀號八十萬珙遣張舉提兵間道抵均州防遏元兵度萬州湖灘施夔震動珙兄璟時為湖北安撫副使知峽州急以書謀備禦珙請于督府帥師西上璟調金鐸一軍迎拒于歸州大寨劉義捷于巴東縣之清平村珙弟璋選精兵二千駐澧州防施黔路四年進封子諜知元兵於襄樊隨信陽招集軍民布種積船材於鄧之順陽乃遣張漢英出隨任義出信陽焦進出襄分路撓其勢遣王堅潛兵燒所積船材又度師必因糧於蔡遣張德劉整分兵入蔡火其積聚制拜寧武軍節度使四川宣撫使兼知夔州招集沿邊經戰之士號寧武軍令璋領之進封漢東郡侯兼京湖安撫制置使回鶻阿里巴圖爾帥壯士老稚人馬來降創飛鶻軍改阿里名父忠孝充總轄乞補以官黎守閻師古言大理國請道黎雅入貢珙報大理自通雍廣不宜取道川蜀卻之兼夔路制置大使兼屯田大使軍無宿儲珙大興屯田上屯田始末與所減募食之數降詔奬諭淳祐二年淮東受兵樞密俾珙應援遣李得帥精兵四千赴之元兵至三川珙下令應出戍主兵官不許失棄寸土權開州梁棟乏糧請還司珙曰是棄城也棟至夔州使高達斬其首以徇由是諸將稟令惟謹元兵至瀘珙命重慶分司發兵應援遣張祥屯涪州拜檢校少保進封漢東郡公余玠宣諭四川道過珙珙以重慶積粟少餉屯田米十萬石遣晉德帥師六千援蜀珙奏襄蜀蕩析士無所歸蜀士聚於公安襄士聚於郢渚臣作公安南陽兩書院𨽻以沒入田廬俾有所教養請帝題榜以賜之王仙者蜀都統也守涪州北兵攻圍無虛日勢孤援絶宋既亡之二年城始破仙自刎斷其吭不殊以兩手自摘其首墜地乃死蜀中廣記卷四十九
