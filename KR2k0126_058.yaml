body:
  text: 蜀中廣卷五十八明曹學佺撰風俗記第四川北道屬應劭風俗通云閬中有渝水賨民多居水左右天性徑勇初為漢前鋒陷陳鋭氣喜舞帝善之曰此武王伐紂之歌也乃令樂人習學之今所謂巴渝舞也隋書地里志稱其風俗與漢中不别質朴無文不甚趨利雖蓬室柴門食必兼肉好祀鬼神尤多忌諱家人有死輒離其故宅崇重道教猶有張魯之風焉每至五月十五日必以酒食相饋賔旅聚㑹有甚於三元時按蒼溪志北八十里有岐平鎮每五月初間四方商賈輻輳貿易以萬計號為岐平㑹亦古今相沿之槩也宋太守李獻卿南樓詩序云地暖氣清民淳事簡馮忠恕記云其地平衍而沃其民恭儉而文在西南為佳郡不減成都唐薛能詩蜀音連井絡秦分隔褒斜陸遊詩遨樂無時冠巴蜀語音漸正近咸秦閬中人以譙君黃為土主元陳友慶祠記云侯墓在縣北十里譙壩廟在街東邦人旱潦災疾禱之隨應宋嘉熙間封寧福忠祐侯賜靈惠額杜甫南池詩峥嶸巴閬間所向盡山谷安知有蒼池萬頃浸坤軸呀然閬城南枕帶巴江腹清源多衆魚逺岸富喬木南有漢王祠終朝走巫祝歌舞散靈衣荒哉舊風俗滕王亭子詩云君王臺榭枕巴山萬丈丹梯尚可攀春日鶯啼修竹裏仙家犬吠白雲間清江碧石傷心麗嫩蘂濃花滿目斑人到於今歌出牧來逰此地不知還已上俱為邦人逰集之所利州圖經呼為小益對成都為大益也舊志云自城以南純帶巴音由城以北雜以秦語唐歐陽詹集貞元中吳興沈公長源牧利州其為政五年豫旅逰乎利覩人安俗阜思所以美之作益昌行詩云驅馬至益昌倍驚風俗和耕夫壟上謡負者途中歌處處川復原重重山與河人煙遍餘田時稼無閒坡問業一何修太守德化加問身一何安太守恩懷多漢李充蜀記蜀山自綿谷葭萌道徑險窄北來擔負者不容易肩謂之左擔道故少陵愁坐詩云葮萌氐種逈左擔犬羊存晉張載劒閣銘惟蜀之門作固作鎮世濁則逆時清斯順唐歐陽詹棧道銘云秦之與蜀也人一其性物同所宜嗜欲無餘門教化無餘源可貿遷可親昵擘坼地脉暌離物理豈造化之意乎華陽國志云梓潼縣有善板祠一曰惡子民嵗上雷杼十枚嵗盡不復見云雷取去按即今梓潼帝君也誦讀家奉祀之鄭谷梓潼嵗暮詩江城無宿雪風物易為春酒美銷磨日梅香寂寞人巴州振文堂記惟兹巴土實壁集二州之地風俗安於簡儉樂於歌舞本州志有僧問演和尚曰如何謂之巴州答云灰界勾絲地雲垂插繭天薛能嘉陵驛詩雹凉隨雨氣江熱傍雲根蠶月繅絲路農時碌碡村觀察使定原吕顓先蠶祠詩花纈冰紈寸寸絲箇中消息幾人知掇桑試語巴江女好爇名香報爾師宋彭永上元詩云巴人最重上元時老稚相携看㸃詩行樂歸來天向曉道旁聞得喚蠶絲注云巴俗元宵三夜兒童皆唱巴音徹曉謂之喚蠶絲然其俗又以三月三日晴雨為蠶先兆諺云三月三日晴樹上掛金瓶言是嵗蠶熟也保寧一府四月新絲出輸縣官緡過此則逋負矣俗因謂之蠶糧豫按陳宗虞城門歌效閬人機杼聲也一解云城門開羣胥夜來徑赴我機取我繒我言織未成羣我憎二解云夜未央彼胥者胡强掠我織裂我裳疑爾盜也則執牒亦有章嗟胥須臾壺漿來壺漿來三解云嗟胥爾嗔繒實難寧其身而縶以赴爺其忤既楚以贖誰爾數鬻爾妻孥爾寧輸四解云我有役有租繒非我輸嗟爾絲天産我祟我身則寒繒寧我被毋樹桑貽我殃嗟貽我殃蓋深以蠶為纍也是在司土者不擾之耳已上保寧華陽國志云宕渠郡先漢以來士女賢貞縣人車騎將軍馮緄大司農𤣥賀大鴻臚龎雄桂陽太守李溫等皆建功立事有補於世緄溫各葬所在常以三月二子之靈還鄉里水暴漲縣吏民莫不於水上祭之順慶圖經云每嵗二月二日郡人隨太守出郊謂之迎富邵博果州詩云從昔遨逰盛兩川充城人物自駢闐萬家燈火春風陌十里綺羅明月天郡志自邵伯溫守此邦名山勝景題品無遺至以小成都目之宋郡守楊濟開漢樓記自號小益不復數潼遂也魏了翁安少保丙祠堂記云初公未仕時常逰學於果州習其土風與其州之人士每過其州眷焉弗忍去及是被命再鎮滅賊還報適在是州州人滋不忘於是肖公像祠焉果之先有瓦棺葬者偶牧童於插旗山掘地見小孔其內深廣各數丈內有瓦棺萬餘以告太守乃令瘞之此近時事也臣白居易敕授吳暐蓬州刺史王計萊州刺史制云敕吳暐等咸以材略載筆從戎藝學智謀濡然足用多厯年紀備嘗艱危進退周旋不聞失道司徒𢎞正詳奏以聞因以竹符分命試吏而蓬萊二郡各介一方牧人者但不擾其心不奪其力則雖華夷南北土物不同皆可以自足自遂矣宜用此道往安養之蓬州志云城南開元寺有五如來殿為一郡之最元宵燈火最盛山谷之民畢出太守為華嚴㑹以領略逰人者五日號為蠶叢之勝蠶事自三月起至九月乃止謂之九熟蠶宋廣安志近世以來儒風尤勝人物間出不減果遂方輿勝覽云世謂廣安有十似紙似池席似蘇梨似耿魚似嘉猶之可也他未必然若所謂金羮玉飯紅臘紫梨則非溢美矣憲使何志熙詩欲說賨城好先誇萬物妍金羮收稻後紅臘落梅前照座梨偏紫堆槃荔更鮮雪藤尤異産應不數花箋已上順慶十道記云廣漢之地有鹽井銅山之富蔬食果實之饒此後漢馮灝刺奢之說所由作也玉堂遺範授髙璩劒南東川節度使制云梓潼奧區賢彥徊翔者矣舊經稱其俗好勝尚氣不恥貧賤士通經學古罕為異習豈非相沿以使之然與文獻通考載石慶緒有梓潼風俗譜甚備豫觀栁仲郢杜濟之敕一則云在訓師旅以恢武經厚風俗以闡文教一則云有被山帶江之險藉安人禦侮之能蓋重之也王維送梓州李使君詩萬壑樹參天鄉音聽杜鵑山中一夜雨樹杪百重泉漢女輸橦布巴人訟芋田文翁翻教授不敢倚先賢亦因晉末李雄夷獠之亂文教有待而興起者乎潼川志云唐末天下貨藥者皆於九月初集梓州王杞龍冲地貨其所齎藥八日夜始散俗因謂之藥市及宋燕肅知郡事又增三日至十一日而罷按夷堅志王杞字昌遇大中十三年九月九日舉家仙去郡人即其處祠之杜甫詩云五載客蜀郡一年居梓州時遊於鹽亭通泉之間其涎鹽亭詩云馬首見鹽亭髙山擁縣青雲溪花淡淡春郭水泠泠全蜀多名士嚴家有德星登臨意無限好為老夫聽其涎通泉詩云溪行衣自濕亭午氣始散冬溫蚊蚋集人逺鳬鴨亂驛樓衰栁側縣郭輕烟畔一川何綺麗盡日窮壯觀亦俱曲盡其致陸務觀云射洪陸使君廟俗以少陵詩為籖往往有驗豫遣僧則華求籖得遣興詠龎德公詩顧迫貧從仕又十有二年負神之教多矣華陽國志德陽縣有青石祠山原肥沃有澤漁之利士女貞孝望山樂水土地易為生事車騎將軍鄧芝雅有終焉之思後遂葬其山即今遂寧縣是刺史李繁制云遂居蜀腹馬咸記云人物富繁江山灑落也楊炯遂州長江縣先聖孔子碑鄉閭少事風月多懷命童子於雲臺就門人於相圃冬禮春詩之化再造雙川淹中稷下之風一匡二蜀蓋文學彬彬盛矣魏了翁題普慈率錢建貢院疏普於東蜀為士大夫郡而公私財力反出諸郡下繕營之費亡所從出是以建一門閭遂致斂民而給用幾以啓訟其工役之不可輕議蓋若此文同樂閒堂記中江為梓之三萬戶縣生齒既衆分地既狹其爭鬬之辨侵越之訴畨已遽作紛午交衍鞭之庭而械之獄者亡虛日所決一未厭其願則號寃唱屈奔走跳蕩於勸農使前者絶復續焉士大夫以無可奈何而適為之令者何嘗不望名而起畏河南廖君自福昌移治於此聞其所以為政之大抵也無急擊無緩縱棼以櫛之結以觽之摩撫柔願規厲陶突善端姦幾觀聽而盡民自戒告無敢欺瀆曽未逾嵗已底無事云已上潼川岑參招北客文云其北則有劒山巉巉天鑿之門二壁谽谺髙崕嶙峋上柱南斗榜鎮於坤下有長道北逹於秦秦地神州中有聖人左右伊臯能致我君雙闕峨峨上覆慶雲千官鏘鏘朝於紫宸玉樓鳳凰金殿麒麟布德垂澤搜賢修文皇化欣欣煦然如春蜀之北兮可以往北客歸去來兮總録顔之推曰吾在益州與數人同坐初晴日明見地上小光問此是何物有一蜀竪就視答云是豆逼耳相顧愕然命取將來乃一小豆也窮訪蜀土呼粒為逼時莫之解吾云三蒼說文此字白下呼為匕皆訓粒通俗文音及反雞肋編云蜀人諱雲以其近風也李膺益州記云蜀人謂嶺為棟子虛賦行乎洲淤之浦郭璞注曰淤亦洲名蜀人云亦見方言蜀人呼平川為壩字從貝非從具呼水洲曰㵨俱見韻寶蜀江自成都至荆門名灘險地舟人一一數之不能悉記聊書其總名淺而急流曰灘水流沙上曰瀨水出尾下曰瀵水疾崕傾曰碥水漫石流曰沱石積水淺曰漬灘漬相凑曰沝水如轂轉曰漕見益部談資鼻始也嘼之初生謂之鼻人之初生謂之首梁益之間謂鼻為初或謂之祖祖居也出方言蜀人謂母曰姐又曰西蜀呼人叟叟是頑愚之稱出韻㑹蜀人稱尊者為波祖及外祖皆曰波出吳船録蜀人親愛之辭曰么以小兒女為么又愛其子曰犬子司馬相如字犬子又以壻為門客續博物志蜀人以痎瘧為奴婢瘧巴濮之人自呼曰阿陽陽之言我也爾雅引魯詩有美一人陽如之何言我奈之何也子兮子兮如此良人何亦此意出丹鉛録尋長也梁益之間凡物長謂之尋跂􅛕登也梁益之間曰􅛕或曰跂抵􅥚㑹也雍梁之間曰抵凡㑹物謂之􅥚踦竒也梁楚之間凡全物而體不具謂之踦雍梁之郊凡嘼支體不具者謂之踦已上俱方言揚雄謂目瞳子曰清盧揚眉曰揚衡出曽公類說益州謂瞋目曰矔說文矔目多精也益梁之間謂聾為䏁俱出韻㑹梁益之間凡言人盛及其所愛諱其肥謂之䑋出方言又呼某事某物必重一字如訓小兒然蜀人擊拂以初入為孟入有徐延璚者王衍舅也其作私第華侈衍常幸之瀕去於壁上戲題孟字蓋蜀中以孟為不佳故也他日孟知祥到蓋先兆云出外史檮杌老學菴筆記蜀人見物之可誇者則曰嗚呼可鄙者則曰噫嘻宋景文云李白蜀道難曰噫嘻蜀人發語辭也髙僧傳云蜀人以太甚為太力譎權詐也梁益曰謬出韻㑹格升也梁益之間曰格出爾雅肖類法也西楚梁益之間凡言相類者則謂之肖肖者似也㥏恧慙也梁益之間言心內慙矣私纎小也梁益之間凡物小者謂之私小或曰纎繒帛之細者謂之纎已上俱方言成都一槩呼求事官人為乞措大按王氏見聞録成都有丐者詐稱落泊衣服藍縷常巡市鄽見人即展手希一文云失墜文書求官不遂人皆哀之為其言語悲嘶形容憔悴故也居升仙橋側後有勢家於所居傍起林亭欲廣其池館遂强買之及闢其圭竇則兩間大屋皆貯散錢滿計數十萬鄰里莫知魏略云新城孟太守道蜀猪豚雞鶩味皆淡故蜀人作食喜煮飴蜜以助味蜀人二月好以豉雜黃牛肉為甲乙膏非尊親厚知不得而預其家小兒三年一享杜甫在蜀日以七金買黃兒米半籃細子魚一串籠桶衫柿油巾皆蜀人奉養之粗者俱雲仙雜記蔽膝西南蜀漢謂之曲領或謂之𥜗禈出方言蜀山谷間民皆冠帛言為諸葛孔明孝服所居深逺者後遂不除出乙卯避暑録今蜀人謂之戴天孝屝履粗履也西南梁益之間或謂之或謂之䋀履其通語也出方言爾雅不律謂之筆注云蜀人呼筆為不律也語之變轉爼几也西南蜀漢之郊曰杫出方言蜀人言摋曰𣙗讀如涅周禮注曰無𣙗而固出韻寶蜀人謂糊􅙘為泥􅙘花蘂夫人宫詞云紅錦泥􅙘繞四廓非曽逰蜀亦所不解出老學菴筆記蜀中廣記卷五十八
