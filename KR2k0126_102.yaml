body:
  text: 蜀中廣記卷一百二明曹學佺撰詩話記第二劉賔客嘉話云陸暢謁韋臯於蜀獻蜀道易詩首句曰蜀道易易於履平地臯大喜贈羅八百匹臯薨朝廷欲繩其既往之事復開先所進兵器其上皆刻之秦二字不相與者欲文成罪名暢上疏理之云臣在蜀日見造所進兵器之秦者匠人名也乃得釋按此則暢乃有心人豈徒事干謁者耶高相國崇文渤海人本荆門將校尉以平劉闢功授西川節度一日雪下集諸從事吟賞謂賔客曰某雖武夫亦有一詩乃口札云崇文崇武不崇文提戈出塞號將軍那箇􅐴兒射落雁白毛空裏亂紛紛蓋渤海鄙言呼箭為􅐴兒高太尉駢崇文曽孫也鎮蜀日以蠻夷侵暴乃築羅城四十里朝廷雖加恩賞亦疑其固護一日奏樂聞樂聲知有改移兆乃題風箏寄意曰夜靜絃聲響碧空宫商信任往來風依稀似曲才堪聽又被風吹別調中旬日果移鎮渚宫俱北夢瑣言聞說邊城苦如今到始知好將筵上曲唱與隴頭兒此薛濤在高駢宴上聞邊報樂府也又諷諭而不露得詩人之妙使青蓮見之亦當印可元白流紛紛停筆不亦宜乎出升菴詩話元稹聞西蜀薛濤有辭辨及為監察使蜀以御史推鞫難得見焉嚴司空潛知其意每遣薛往洎登翰林以詩寄曰錦江滑膩蛾眉秀幻出文君與薛濤言語巧偷鸚鵡舌文章分得鳯凰毛紛紛詞客多停筆箇箇公侯欲夢刀别後相思隔烟水菖蒲花發五雲高白居易有詩與薛濤云峨眉山勢接雲霓欲逐劉郎此路迷若似剡中容易到春風猶隔武陵溪出古今詩話豫初入蜀見當事者梓薛濤詩一卷云係新都楊家抄本喜以為祕書也及觀之只五七言絶句而已此在洪邁萬首絶句之內且江南有一抄本亦與之同大抵從萬首內抄出但蜀本多酬人雨後看竹五言律一首又少江南抄本絶句數首亦可互校豫叔汝載搜閲簡池志載其江月樓詩秋風倣佛吳江冷鷗鷺參差夕陽影垂虹納納卧譙門雉堞耽耽俯漁艇陽安小兒拍手笑使君幻出江南景又西嵓詩憑䦨却憶騎鯨客把酒臨風手自招細雨聲中停去馬夕陽影裏亂鳴蜩此二首抄本所無致可喜也五溪論事云蜀尚書侯繼圖本儒士一日秋風四起偶倚欄于大慈寺樓有大桐葉飄然而墜上有詩云拭翠斂雙蛾為鬱心中事搦管下庭除書成相思字此字不書石此字不書紙書向秋葉上願逐秋風起天下有心人盡解相思死天下負心人不識相思意有心與負心不知落何地侯貯小帖凡五六年方卜任氏為婚嘗諷此詩任氏曰此是妾書葉詩爭得在公處曰向在大慈寺閣上倚欄得之即知今日聘卿非偶然也侯以今書較之與葉上無異元稹為御史鞫獄梓潼樂天昆仲送至城西而别後旬日昆仲與李侍郎建閒遊曲江及慈恩寺飲酣作詩曰花時同酌破春愁醉折花枝作酒籌忽憶故人天際去計程今日到梁州後旬日得元書果以是日至褒仍寄詩曰夢君兄弟曲江頭也到慈恩寺裏游驛吏喚人排馬去忽驚身在古梁州千里魂交合若符契白有感夢記備敘其事秭歸繁知一聞白樂天將過巫山先於神女祠粉壁大書云蘇州刺史今才子行到巫山必有詩為報高唐神女道速排雲雨候清詞及白公覩詩急遣邀知一比至曰中山劉郎中禹錫三年理白帝欲作一詩於此怯而不為罷郡經過悉去舊題千餘但留四章而已此四章者乃古今之絶唱也而今造次不合為之四章謂沈佺期王無競李端皇甫冉也雲溪友議楊六尚書白樂天妻兄也初除東川節度使白代妻以詩賀楊云劉綱與婦共升仙弄玉隨夫亦上天何似阿哥領崔嫂碧油幢引向東川又寒食寄詩云不知楊六逢寒食作底歡娛過此辰兜率寺高宜望月嘉陵江近好遊春蠻旗如火行隨馬蜀妓如花坐繞身不使黔婁夫婦看誇張富貴向何人出本集段文昌太尉鎮益州有還别業尋龍華山寺廣宣上人詩云十里惟聞松柏風江山忽轉見龍宫正與休師方話舊風煙幾度入樓中郭震亦有題龍華山詩曰昔年曽到此山回百鳥聲中酒一杯最好寺邊開眼處段文昌有讀書臺太尉李德裕出鎮渚宫嘗謂賔侣曰余偶欲賦巫山神女一詩下句云自從一夢高唐後可是無人勝楚王晝夢宵征巫山似欲降者何如段記室成式曰屈平流放湘沅椒蘭久而不芳卒葬江魚之腹為曠代之悲宋玉則招屈之魂明君之失恐禍及身遂假高唐之夢以惑襄王非真夢也我公作神女之詩思神女之㑹惟慮成夢亦恐非真李公退慚其文不編集於卷也出雲溪友議該聞録云段文昌鎮成都子成式好獵丞相患之成式以所獲雉兔分送幕僚各致書援引故事甚悉幕僚多不曉其義以呈丞相方知其子博學成式酉陽雜爼云豫在城因說故相牛公賞揚州秀才蒯希逸詩蟾蜍醉裏破蝴蝶夢中殘每坐吟之豫請客各吟近日佳句因記蜀中客龎季豫每云寒雲生易滿秋草長難高之句唐詩記事載樊宗師綿州越王樓詩序云綿之城帝猲掀明威瀰石硝馳涪瀨左陵凌紅稊簮天地送行癸壬且掬跎踢于西北蟠紅頠青越王貞故為樓重軒疊飛門窗蒙傘蹇豫始登謂日月昏曉可窺其背電雷合風雲遘霜辛露酸星辰介行鬼神變化草木顯繡髻銜蓑芰皆可察極既縈視其江帶又極視其土岡斷暴逺近山嶮嶮若閿之東皇天原開見荆山我其黃河瞷然為曲直淚雨落不可掩因口其心曰無害若其日杲星星過歸尚悲不能解重為詩以釋益不可顧謂郡中諸君能無有意綴以華艷其念蓄云危樓倚天門如星辰宫榱題薄龍怪洄洄繞雷風徂秋試登臨火靄屯喬空不見西北路老懷益雕窮石瀨薄濺濺土山杳穹穹昔人愴為逝所適酡顔紅今我兹之來猶校成嵗功輟田植科畝游圃歌芳叢地財無聚厚人室安取豐既乏富庶能千萬慚文翁宗師字紹述襄陽節度使澤之子韓退之志其墓曰為文必出於已不襲蹈前人一言一句此之謂也然紹述此等詩文實不能佳楚水巴山烟雨多巴人能唱本鄉歌今朝北客思歸去回入紇那披緑蘿此劉禹錫竹枝詞也紇那當時曲名劉詩翻南調為北調二字皆叶平聲此隨方轉言也楊栁枝詞有三條陌上拂金羈萬里橋邊映酒旗此日令人腸欲斷不堪將入笛中吹此郎中滕邁之作而劉采春歌之也藕花衫子栁花裙多著沉香慢火薰惆悵粧成君不見空教緑綺伴文君此李餘臨卭怨也玉輪江上雨絲絲公子遊春醉不知剪渡歸來風正急水濺鞍帕嫩鵝兒此餘寒食詩也餘成都人元微之稱蜀士李餘劉猛工為新樂府餘詩傳者僅此已上俱絶句演義按汶江謂之玉輪江李章武學識好古有名於時太和末勑僧尼試經若干紙不通者敕還俗章武時為成都少尹有山僧來謁云禪觀有年未嘗念經今被追試前業棄矣願長者宥之章武贈詩曰南京尚許通方便何處心中更有經好去苾芻雲水畔何山松柏不青青主者見詩免之而去出本事詩緗素雜記及禹錫嘉話載賈島事一謂纍舉不第文宗時坐飛謗貶長江簿一謂島為僧居法乾寺宣宗微行於案上取詩卷覽之島攘臂奪去帝慚恧遂除島長江簿唐宋遺史所載略同程錡有奪卷忤宣宗之句出鼠璞賈浪仙主長江簿有題長江詩云歸吏封宵鑰行蛇入古桐桐在縣㕔前大觀中縣令胡同老惡其枯枿砍去出能改亝漫録李王孫洞避亂入蜀作詩師賈島以銅鑄島像而禮事之李洞集有贈龍州李郎中先夢六赤後因打葉子因以詩上其詩云紅蠟香烟撲畫楹梅花落盡庾樓清光輝圓魄銜山冷彩鏤方牙著腕輕寶帖牽來獅子鎮金盆引出鳯凰傾徵黃喜兆莊周夢六赤重新擲印成六赤者古之瓊畟今之骰子也葉子如今之紙牌酒令鄭氏書目有南唐李後王妃周氏編金葉子格此戲今少傳見品外録䕫雲陽人李逺字求古咸通間省元進士有省試萬里橋賦初令狐綯擬逺刺杭州上曰吾聞逺詩有長日惟消一局棊之句安能理人綯曰此詩人托興之言耳上曰姑令往試之後轉建州刺史出古今詩話唐南蠻侵軼西川僖宗幸蜀慮為患以女下降蠻喜姻聯大國遣宰相趙降眉楊竒鯤段義宗來朝行在高駢自淮海飛章云南蠻心膂唯此數人請異待之迄僖宗還京無虞用駢計也楊趙輩各有詞藻途中詩云風裏浪花吹更白雨中山色洗還青海鷗聚處窗前見林狖啼時枕上聽出詩話高駢築羅城多發掘古冡取甎甃城指揮使姜知古者當掘一冡夜有鬼嘯於冡上獻一書曰冥司趙􅭶謹以幽昧致書於守禦指揮端公閣下竊以趙氏之寃搏膺入夢良夫之枉被髮呌天是以有怨必讎無道則見流於往史載在前文如􅭶也一介遊魂九泉罔象德不勝饗禱不勝人無廟貌於世間遂湮沉於泉壤自䝉天譴使掌冥司雖叨正直之官未得聰明之理未嘗以威服衆唯知以禮依人頃至本朝叨為上相不無濫德敢有害盈今者伏審渤海高公令君毁􅭶墳闕􅭶謫居幽府天賜佳城平生無戰伐之讎邂逅起誅夷之釁得不撫銘旌而憤志託觚染以申懷伏希端公俯念無依逈垂有鍳特於萬雉免此一壞倘全馬鬛之封敢忘龍頭之庇謹吟五言四句詩一章後幅上聞不勝望德之至謹白詩曰我昔勝君昔君今勝我今人生一世事何用苦相侵出成都文類神女初離碧玉階彤雲猶擁牡丹鞋應知子建憐羅襪顧步徘徊拾翠叉此何兆在章仇公席上詠真珠姬也章仇兼瓊為成都節度使何兆蜀之詩人羅鄴嘉陵水詩嘉陵南岸雨初收江似秋嵐不煞流此地終朝有行客無人一為棹扁舟不煞流不甚流也殺音近厦今京中諺猶然謂癡曰煞瓜肥曰煞大宋孝宗見容亝隨筆云殺有好處是也已上二則俱出絶句演義孫定字志元與涪州大戎之族子儲某同學儲長于定定數舉矣儲方欲就貢訪于定定謔曰子儀表堂堂好將軍材何必以科第為資儲銜之後儲貴達未嘗言定過定晚年喪志放意酒杯昭宗景福二年下第遊京西宿開逺門醉中走筆寄儲詩曰行行血淚灑塵襟事逐東風渭水深秋跨蹇驢風尚緊靜投孤店日初沉一枝猶挂東堂夢千里空馳北巷心明月影前愁又去滿城烟樹噪春禽定詩歌千餘首多委於兵火竟無成而卒出唐詩紀事蜀人雍陶以進士第為簡州牧自比謝宣城栁吳興忽有馮道明者下第請謁告閽者曰道明與員外有舊及見呵曰與公昧平生何方相識道明曰誦員外詩仰員外德遂吟其白鷺詩曰立當青草人先見行傍白蓮魚未知又曰江聲秋入寺雨氣夜清樓又曰閉門客到嘗疑病滿院花開不似貧陶聞之歡狎如曩昔之友出雲溪友議馬相植罷安南都護與時宰不通又除黔南殊不得意維舟峽中古寺寺前長堤畔有林木夜月甚明見人白衣緩步堤上吟曰截竹為筒作笛吹鳯凰池上鳯凰飛勞君更向黔南去即是陶鈞萬彚時厯厯可聽吟者數四遣人邀問即已失之後自黔南入為大理卿遷刑部侍郎判鹽鐵遂作相出本事詩唐彥謙絶句詩用事隱僻而諷喻悠逺似李義山如奏捷西蜀題沱江驛云野客乘軺非所宜況將儒服報戎機錦江不載臨卭酒幸免相如渴病歸即李義山相如未是真消渴猶放沱江過錦城之意也出升菴詩話唐球有詩名如臨池洗硯云恰似有龍深處卧被人驚起黑雲生又有漸寒沙上鷺欲暖水邊村亦佳句也居蜀中味江山方外之士也嘗以詩藁撚為丸納之大瓢中後臨病投瓢於江曰斯文茍不沉沒得者方知吾苦心耳流至新渠有識者曰唐山人瓢也接得之十才二三其題某處士隱居云不信最清曠及來愁已空數㸃水泉雨一溪霜葉風業在有山處道成無事中酌盡一尊酒老夫顔亦紅贈行如上人云不知名利苦念佛老岷峨衲補雲千片香焚篆一窠戀山人事少憐客道心多日日齊鐘罷高懸濾水羅題青城范賢觀云數里緣山不厭難為尋真訣問黃冠苔鋪翠㸃山橋滑松織香梢古道寒晝傍緑畦薅嫩玉夜開紅竈燒新丹孤鐘已斷泉聲在風動瑶花月滿壇出古今詩話紀事載僧陸海奉國寺詩新秋夜何爽露下風轉凄一磬竹窗外千燈花塔西按海與陳子昂盧藏用為方外十友者奉國寺在閬中盧延遜入蜀頗為蜀人所易作詩有云莫欺零落殘牙齒曽吃紅綾餅餤來延遜光化中放進士第二人燕於曲江勑大官賜十八人餅餤蓋唐御食以紅綾餅餤為上品也出紀事歐陽詹云蜀門與林藴分路後屢有山川似閩中因寄林藴藴亦閩人也詩云村步如延壽川源似福平無人相與識獨自故鄉情自注延壽福平皆閩中川源之名延壽藴之别墅在焉福平即豫之别墅在焉出本集按藴仕西川節度推官不從劉闢有竒節唐學士元庭堅左遷遂州參軍讀書郊外忽見有人身而鳥首來造者曰吾衆鳥之主也聞君好音律故來見君因留數朝教以音律清濁庭堅後遂著韻英今遂寧鳯臺鋪有遺迹也出本志唐人白行簡以瀘水羅賦得名其警句云焦螟之生必全有以小為貴者江漢之流雖大蓋可一以貫之靈一詩曰濾泉侵月起掃徑避蟲行濾水蓋僧家戒律有此欲全水蟲之命故濾而後飲今蜀中深山古寺猶有此規白居易送文暢詩山宿馴溪虎江行濾水蟲出丹鉛録唐僧隱巒蜀中送人遊廬山詩君遊正值芳春月蜀道千山皆秀發溪邊十里五里花雲上三峰五峰雪君上匡廬我舊居松蘿擲地十年餘君行試到山前問山鳥只今相憶無唐女郎廉氏峽中即事詩清秋三峽此中去鳴鳥孤猿不可聞一道水聲多亂石四時天色少晴雲日暮泛舟溪漵口那堪夜永思氛氳已上一首衲子女郎之竒作也金堂三學山盤陀石上刻詩一首云拔地山巒秀排空殿閣斜雲供數州雨樹獻九天花夜月摩峰頂秋鐘徹海涯長松拂星漢一一是仙槎不注作者名姓年代要非唐人不能辦也本刻九天二字提頭想必隨駕入蜀者唐張蠙字象文清河人乾寧中進士為犀浦令王建開國拜膳部員外郎又為金堂令王衍與徐太后游太慈寺見壁間有墻頭細雨垂纎草水面回風聚落花之句給札令進詩蠙以三百首獻召知制誥不果蠙生而頴秀幼時作登單于臺詩有白日地中沒黃河天上來之句為世所賞出古今詩話徐耕成都人生二女皆國色教之為詩有藻思王建入蜀聞之納於後房生衍及衍嗣位尊為太后太妃同衍禱青城山遊丈人觀𤣥都觀金華宫丹景山至德寺各有倡和詩刻石次至漢州三學山夜看聖燈太后賦詩曰周遊靈境散幽情千里江山暫得行所恨風光看未足却驅金翠入龜城太妃詩曰翠驛江亭近蜀京夢魂猶是在青城比來出看江山景却被江山見出行出檮杌李珣梓州人事王宗衍有詞名瓊瑶集其妹為昭儀亦有詞藻摘文類僧貫休入蜀上王建詩曰一瓶一鉢垂垂老萬水千山得得來建大悅賜號禪月因名為得得和尚出五代史補僞蜀武成二年王建游龍華禪院召貫休賜坐及茶藥綵段仍令口誦近詩時諸王貴戚皆在貫休欲調之因誦公子行曰錦衣鮮華手擎鶻閒行氣貌多輕忽稼穡艱難總不知五帝三皇是何物建稱善貴幸皆惡之貫休本蘭溪人善詩與齊已齊名有西嶽集闕卷王蜀樞密使潘𡵻字凝夢溺于美妾解愁夙恙成疾解愁姓趙氏其母夢吞海棠花蘂而生有國色善為新聲及工小詞建嘗至𡵻第見之謂曰朕宫無如此人意欲取之𡵻曰此臣下賤人不敢以薦于君其實靳之弟峭謂曰緑珠之禍可不戒耶𡵻曰人生貴於適志豈能愛死而自不足於心耶人皆服其有守俱檮杌王蜀僞相周庠初在卭南幕中留司府事臨卭縣失火人黃崇嘏才下獄貢詩一章周遂召見崇嘏自稱鄉貢進士年三十許祗對詳敏立命釋之薦攝府司户參軍胥吏畏服周既重其聰慧又美其風采欲以女妻之崇嘏乃就封狀謝仍貢詩一首落句有曰幕府若容為坦腹願天速變作男兒周覽詩驚愕遂召詰問乃黃使君之女亢未從人周益仰其貞潔亢旋乞罷歸臨卭後不知所終出玉漏編五代眉山楊義方舉進士仕蜀長于詩自以才過羅隱嘗有春詩云海邊紅日半離水天外暖風輕到花出本志乾德二年王衍北巡泛舟閬中舟子皆衣錦繡衍自製水調銀漢曲令樂工歌之僞蜀嘉王宗壽每諫諍衍不樂燕㑹衍命宫人李玉簫歌其所撰宫詞送宗壽酒宗壽懼禍乃飲佞臣潘任迎曰嘉王聞玉簫歌即飲請以玉簫賜之衍曰王必不納其歌詞曰輝輝赫赫浮五雲宣華池上月華新月華如水浸宫殿有酒不醉真癡人乾德五年重陽王衍宴羣臣于宣華苑夜分未罷衍自唱韓琮栁枝詞曰梁苑隋堤事已空萬條猶舞舊春風何須思想千年事誰見楊花入漢宫內侍朱光溥詠胡曽詩曰吳王恃霸棄雄才貪向姑蘇醉緑醅不覺錢塘江月上一宵西送越兵來衍聞之不樂於是罷宴已上三則出檮杌僞蜀丁元和詩九重城闕人中貴五等諸侯閫外尊爭似布衣雲水客不將名利挂乾坤前蜀楊勛好道術後主以其妖怪戮之西市臨刑有詩具言後主失國曰聖主何曽識仲都可憐社稷在須臾市西便自神仙窟何必乘槎泛五湖已上二則出成都文類後梁秦隴間謡􅥫􅥫引黑牛天差不自由但看戊寅嵗揚在蜀江頭朝野僉載曰竹䶉生深山取之甚艱秦隴之地此物爭出或穿墉壞城或自門闥而入犬食不盡則並入人家房內秦民之口腹飫焉故童謡云云庚午嵗劉知俊叛梁入秦天水破入蜀王建殺之粉其骨揚入蜀江正戊寅嵗也出五代史朝野僉載永平末劉知俊奔蜀王建雖加寵待然心疑之常曰劉知俊非能駕馭者也有嫉之者作謡曰黑牛無係絆棕繩一朝斷以知俊丑生而黑建諸子皆以宗承為名也竟致猜疑而殺之王建據蜀之後有一僧常持大帚每過即汛掃人以掃地和尚目之掃畢輒寫云水行仙怕秦川其後王衍秦川之禍人方悟水行仙衍字也出風謡衍在蜀時童謡曰我有一帖藥其名為阿魏賣與十八子乾德末衍兄宗弼果賣國歸唐而宗弼乃王建養子本姓魏氏此其應也出青箱雜記孟蜀廣政元年上已昶遊大慈寺宴從官于玉溪院賦詩十二年遊浣花溪御龍舟觀水嬉珠翠綺羅名花異卉羅列十里人望之如神仙之境昶曰曲江金殿鎖千門逮未及此兵部尚書王廷圭賦詩十字水中分島嶼數重花外見樓臺昶稱善之廣政十四年孟主宴後苑放士庶入觀時俳優有唱康老子者昶問李昊等其曲所出皆不能對徐光浦曰康老老而無子故制此曲唐英按康老子即長安富家子開元中落拓不事生業好與梨園樂工遊一旦家資蕩盡窮悴而卒樂工歎之因此為曲又一名曰得至寶光浦不知而妄對也已上二則出檮杌古人詩句不知其用意用事妄改一字便不佳孟蜀牛嶠楊栁枝詞吳王宫裡色偏深一簇烟條萬縷金不分錢塘蘇小小引郎松下結同心按古樂府小小歌有云妾乘油壁車郎乘青驄馬何處結同心西陵松柏下牛詩因詠栁而貶松唐人所謂尊題格也後人改松下作枝下語意索然矣出丹鉛録孟蜀後王崇尚六經恐石經本傳流不廣乃易為本板宋世稱刻本書始於蜀也昶嘗曰我不效王衍作輕薄小詞乃敕史館集古今韻會數百卷惜不傳今所傳昭武黃公劭者乃輯略耳吳曽能改齊漫録云徐匡璋納女于孟昶拜貴妃别號花蘂夫人意花不足擬其色似花蘂翾輕也又升號慧妃以號如其性也王師平蜀太祖聞其名命别將護送入京陳無已以夫人姓費誤也曽子固云蜀花蘂夫人者本青城費氏女以才色嬖于後主嘗效王建作宫詞百首國亡入後宫太祖聞之召使陳詩誦其國亡詩云君王城上揭降旗妾在深宫那得知十四萬人齊解甲更無一箇是男兒太祖悅蓋當時蜀兵尚十四萬耳此陳無己所書也王平甫在崇文院録其宫詞十數篇因敘之曰熙寧五年臣安國奉詔定蜀民秦民秦民三家所獻書可入三館者令令史李希顔料理之其書多剝脫而得一敝紙所書花蘂夫人詩筆書乃出于花蘂手而詞甚竒與王建宫詞無異建詞自唐至今誦者不絶口而此獨遺棄不見取前受詔定三家書者又斥去之甚可惜也臣令令史郭祥繕寫入三館而歸口誦數篇於丞相安石明日與中書語及之而王圭馮京願傳其本於是盛行於時花蘂者僞蜀孟昶侍人事在國史平甫所敘云爾按平甫稱花蘂事見國史今國史乃無花蘂事不知平甫何所見也宫詞才二十八首今附左方亦以見當時游衍僭侈云余按王平甫所敘實三十二首刻在成都文類中楊用修尋得其逸詩六十六首又補入宫詞三首共一百一首其末首鴛鴦瓦上自然聲者趙與時賓退録云不知名李珣瓊瑶集以為王衍宫人李玉籌作實只一百首花蘂夫人宫詞之外尤工樂府蜀亡入汴道經葭萌題驛壁云初離蜀道心將碎離恨綿綿春日如年馬上時時聞杜鵑書未畢為軍騎催行後人續之云三千宫女皆花貌妾最嬋娟此去朝天只恐君王寵愛偏花蘂見宋祖時猶作更無一箇是男兒之詩焉有隨昶行而書此敗節語乎續之者不惟虛空架橋而詞之鄙亦狗尾續貂矣出丹鉛録唐世蜀之詩人射洪陳子昂彰明李白成都李餘雍陶裴廷裕岑倫符載雍裕之苑咸朱桃椎雙流栁震青城杜光庭嘉州唐球青神陳詠丹稜僧可朋綿州布衣王嚴鄉貢進士劉暌及李渥田章巴州張曙若劉灣鹿䖍扆毛文錫俱蜀人若劉蛻張蠙韋莊牛嶠歐陽炯劉猛李季蘭張演薛濤張窈窕杜羔妻皆他方流寓而老於蜀者嘗欲裒集其詩為一帙而未暇焉出升菴詩話蜀中廣記卷一百二
