body:
  text: 蜀中廣記卷五十四明曹學佺撰蜀郡縣古今通釋第四川北道屬保寧府管二州八縣古巴國地秦置閬中縣後漢建安劉璋自安漢徙巴西郡於此唐宋則稱閬州矣元改今稱沿後唐保寧軍之目廢北巴西郡宋元嘉置廢南梁州梁天監置皆因李雄之亂理無定處廢隆州廢盤龍郡皆西魏平蜀置盤龍者以郡南盤龍岡為名隆州者取其連岡地勢髙隆為名後魏典畧云此州故有隆城謂之南隆唐先天避𤣥宗諱改為閬州廢保寧軍節度使後唐天成置廢安徳軍宋初置按十道錄云果閬二州貞觀中屬劒南道天寳中屬同開元中屬山南道乾元中屬同若據地勢言之嘉陵江既在劒門之外流厯果閬合三州而入涪江且三州同是漢巴郡之地合屬山南道閬中縣髙門曰閬閬山四合邑居其中而水遶之廢奉國縣梁大同中於此置白馬義陽二郡後魏恭帝二年廢義陽郡改為奉國縣以此地來附於魏故名元省入閬中縣志東百里有奉谷鄉國谷音同而譌蒼溪縣東漢漢昌縣也今縣隋改取蒼溪谷為名南部縣梁之南隆縣也今縣亦隋改以部分在郡之南廢西水縣梁大同中於此置掌天戍因掌天山為名後周閔帝元年改戌為西水縣以界内西水為名元省入南部按府志城南五十里有西水橋是南部界廢晉安縣按四夷縣道記梁於此置金遷戍後周改為郡仍置晉安縣郡所理也元省入南部縣志北九十里有晉安堡廢新政縣唐武徳中於此置新城縣後以隱太子諱改為新政縣元省入南部縣志今之積善鄉是廢新井縣唐武徳中置縣界頗有鹽井因立斯名元省入南部縣志今之政教鄉是廣元縣元置廣元猶漢之廣漢也古葭萌地葭萌苴侯名蜀侯之弟續事始曰葭茶也蜀人以茶字郡廢綿谷縣東晉太元中於此置興安縣隋開皇中改為綿谷縣以東南綿谷為名總志廢綿谷縣在廣元之烏奴城北廢平蜀縣後魏恭帝二年於此置義城縣隋改義清唐改𦙍山宋乾徳三年平蜀改為平蜀縣且避諱也元併入廣元廢嘉川縣宋武帝於此置與樂縣後魏恭帝改為嘉川縣取嘉陵水所經為名後併入廣元憲綱有嘉川鄉是昭化縣古葭萌白水地秦使司馬錯自劒閣道伐蜀之所由也劉宋為宋安唐為益昌矣昭化舊屬利州利州葢嘗稱昭武者宋開寳敕改今縣沿其舊名廢景谷縣本漢白水縣宋武帝於此置平興縣即元和志楊難當克葭萌分白水置平興者隋開皇中改平興為景谷縣即華陽國志隂平郡自景谷有步道徑江油左擔行出涪者按昭化憲綱縣北百里有白水鎮周圍五里俗稱沙州城也先主斬楊懷髙沛於此廢葭萌縣本漢葭萌地蜀先主改為漢夀晉武帝改為晉夀隋開皇始復舊名元省入昭化志云栢林鋪是葭萌縣故址廢岐坪縣宋武帝於此立宋安縣後魏廢帝改為岐坪取岐坪川為名宋改入昭化按晉書作岐愜未詳劒州蜀漢立梓潼郡霍峻之所守也諸葛武侯以大劒山至此有隘束之路故曰劒門唐始以之名州廢南梁州廢安州俱梁時立廢始州西魏時立以先下安州始通巴蜀也廢隆慶府宋時立以孝宗潜邸也廢普安縣本郡也廢為縣今廢為驛在城廢下辨縣宋元嘉中以武都流人於此安置因立縣大明二年改為武連縣今併入州治西百里上亭驛是又二十里有武連橋廢劒門縣今為劒門驛華陽國志云劒閣三十里至險有閣尉桑下兵民也廢臨津縣舊圖經云梁天監於此置相原縣隋開皇改為臨津縣以其俯臨潼水為名今州南二百五十里有義津即此地廢普成縣周地圖云梁於此置梁安縣天和中改為黄安縣唐末改為普成縣今州有普成鄉是按本志云故縣南一里紫霄觀舊名普成觀晉宋間有李隱君名普成者煉形於此上昇廢華陽縣廢茂陵縣已上俱舊廢者益州志云宋大明年置此二縣一𨽻南安郡一𨽻扶風郡後魏俱廢廢七盤縣唐久視年於七盤山東南置山在廢武連縣之西俱併入州梓潼縣蜀古志云禹於尼陳山伐梓其神化為童子漢所為名縣也蜀晉之梓潼西魏之潼川郡理按此語出翰墨全書方輿勝覽引之巴州管南江通江二縣江流如字西魏實始稱州唐迄國初不改洪武九年降縣正徳十年平山冦復為州廢漢昌縣東漢時立廢歸化郡廢北水郡俱劉宋立以領獠戸廢木門郡梁時立廢大谷郡後魏立廢清化郡隋大業立廢静州唐武徳立廢化成縣梁普通年於此置梁大縣後周地圖云大象二年改為化成縣以化成山為名州志舊化成縣在治西五十步廢恩陽縣梁普通年於此置義陽縣以義陽山為名隋開皇年改為恩陽縣按義陽山古名三峯山下有巴蛇洞即摭遺所載静州知州王鶚子讀書義陽山而遇梅仙者静州即巴州也廢曽口縣梁普通年置以曽口谷為名今州東五十里有曽口渡廢其章縣梁普通年置以其章山為名郡志舊其章縣在巴州東八十里有古蓮池是其故址本志作竒章以為即牛僧孺封邑未詳廢始寧縣亦梁普通置宋初併入其章廢清化縣梁普通年於此置伏强縣隋開皇年改為清化縣州志舊清化縣在州西北六十里廢盤道縣後魏恭帝置因龍腹山道路盤屈為名宋初併入清化南江縣後周之難江縣也唐沿西魏置集州矣宋廢州存縣國初易難為南廢集州以東北集川水為名今縣學即集州址廢符陽郡唐天寳立廢符陽縣後魏正始年置取符水為名本志東南隅廣濟橋銘有符陽縣字開元中刻也廢大牟縣唐武徳年立取大牟山為名宋初併入難江通江縣治枕巴江也唐時壁州理此國初徑屬府正徳改𨽻巴州廢諾水縣後魏大統年置按諾水潮聲聽之若諾應也此即宕水所激廢壁州唐武徳年置以縣西壁山為名今縣治即州故址廢廣納縣以縣界廣納溪為名宋初併入通江廢巴東縣唐開元年於此置太平縣以太平川為名天寳改為巴東縣以處巴江之東為名宋初併入通江廢白石縣後魏廢帝立以白石川為名本志縣東百里有舊白石古城周遭石壁可容萬人四隅石門亭址俱存有淳熙間題詠下為白石寺利州衛葭萌國梁承聖中為利州也前後曰漢夀者漢曰晉夀者晉曰小益者後魏曰義成者隋曰益昌者唐曰昭武軍者偽蜀曰武寧軍者宋衞與廣元縣同城廢址見前順慶府管二州八縣安漢充國二縣地唐置果州取充實之義也一曰以郡南果山為名宋寳慶初寧宗潜邸遂有今號廢巴郡劉璋立廢南宕渠郡劉宋立廢永寧軍五代蜀立按本志充國在城南安漢在城北各三十五里南充縣漢充國縣蜀増南字隋減國字是以有今稱也西充縣唐武徳年析南充置西溪水出焉廢流溪縣唐開耀年置即西溪也元省入西充蓬州管營山儀隴二縣梁天監中置相如縣長卿桑梓也今名後周所改圖經云兩蓬髙峙屹然雲霄廢伏虞郡梁初置廢咸安郡唐天寳置廢相如縣梁置兼立梓潼郡於此李商隱詩梓潼不見馬相如是也相如故宅今為州治廢蓬山縣梁大同中於此置綏安縣唐至徳中改為蓬山縣今省入州營山縣分相如置朗池始梁終唐皆然宋祥符避諱改今名以治有山如營壘也廢良山縣梁大同於此置安固縣唐開元改為良山縣元省入營山志云三十里有良山鎮縣址為興福寺廢朗池縣以臨古朗池為名唐貞元年移於營山歇馬館為理儀隴縣梁天監置在大儀山之坂坂大曰隴山有石銘儀隴二字廢隆城郡梁置兼立儀隴縣縣城在金城山頂四面懸絶石壁髙八十丈周迴五里惟西南稍通人馬唐開元年移於山下平溪即今理也廢伏虞縣隋開皇置以伏虞山為名元省入儀隴故址在縣東六十里廢蓬池縣梁天監於此置大寅縣取大寅山為名唐廣徳改曰蓬池取蓬水為名元省入儀隴廣安州管渠鄰水大竹岳池四縣宋合果渠三州地開寳初於濃洄鎮置廣安軍取安輯之義矣元為府國朝降為州廢渠江縣後漢為賨城縣有古賨城在焉一名始安城梁於此置始安縣唐至徳年改為渠江縣宋割屬廣安軍總志渠江舊縣在廣安州北五里渠縣漢宕渠縣也石過水為宕水所居為渠蜀漢晉隋皆置郡於此廢流江縣周明帝立今為縣治鄰水縣水出鄰山中有大磧懸流十丈者也梁置廢鄰山縣亦梁置鄰山者其山重疊鄰比相次也隋併入今縣有鄰山鎮大竹縣唐則天時析鄰水縣置紀勝曰逹州之地有大竹小竹葢與縣接壤者本志云地産大竹砍伐時有白兎走出始剏白兎寺因以名邑此邑舊省鄰山宋紹興復置岳池縣寰宇記云岳安山在縣東三十五里髙六百丈岳池之水出焉唐析南充相如所置也潼川州直𨽻管七縣左倚梓林右枕潼水隋曰梓州五代蜀重和以後槩曰潼川廢東廣漢郡蜀先主立廢新都郡晉時立廢新州梁蕭紀立廢昌城郡西魏時立廢東川節度使唐肅宗立廢武徳軍蜀王建立廢静戎軍安静軍俱宋立乾道間又陞瀘南為潼川府路安撫使而潼川守臣兼果渠懷安廣安等郡兵馬事廢郪縣常璩云漢髙帝六年置舊縣在今縣南九里臨江郪王城基址見存又謂之郪郎也蜀志姜維等聞諸葛瞻破乃引軍由廣漢郪道以審虚實即此地今在州治東廢涪城縣本漢縣後漢初吳漢入蜀禆將臧宫拔涪城即此邑東晉立始平郡於此隋初郡廢縣存州志元省入郪郪復省入州又云涪城在州西北六十里廢富國監本梓州郪縣富國鎮新井煎鹽場也宋置監以董其事兼領通泉飛烏等鹽井地去梓州九十里今併入州射洪縣西魏始置取射江為名土音以江為洪後周改之從俗也廢通泉縣西魏於此置湧泉縣隋開皇改為通泉縣取其交注通流下即黄滸川也元省入射洪志云治南五十里通泉古驛即杜甫題詩處今為大浸寺鹽亭縣秦亭也梁大同始縣有鹽井廢方安縣李膺蜀記云靈江東鹽亭井古方安縣也周地記梁大同元年於此立亭因為縣而方安廢矣廢髙渠郡周保定初置以臨梓潼水也隋開皇年廢為縣縣尋亦廢廢西宕渠郡在安樂村李膺蜀記宋元嘉置領縣四宕渠宣城漢初東闗是也梁天監廢廢永泰縣唐武徳年置元省入鹽亭縣志永泰舊基在縣東北六十里廢東闗縣本鹽亭雍江草市也偽蜀明徳以地去縣逺遂立招輯院宋初陞為縣元省入鹽亭志云治東百里有東闗市中江縣後周為𤣥武縣隋唐因之宋祥符初勅崇真武併易今名以神泉涪城江流所㑹縣治當其中也在蜀為五城縣華陽國志云𤣥武漢時立倉發五城縣人尉部主之一曰五成按爾雅注成猶重也即𤣥武山廢懷歸縣李膺蜀記云宋元嘉九年置後周併入𤣥武縣廢凱州隋開皇置宋省入潼川府廢銅山縣本蜀道銅山之北漢文帝賜鄧通鑄錢即此唐貞觀年置監上元廢為縣元省入中江憲綱離城百七十里伏獅山乃銅山舊址廢飛烏縣故郪王城也隋開皇置取飛烏山為名元併入中江總志廢飛烏縣在潼川州西南百三十里遂寧縣東晉置郡稱遂寧以其遂寧兹土也宋宣和初潜藩陞府元降州國朝降縣廢廣漢縣漢髙帝置以屬廣漢郡廢徳陽縣蜀先主置以屬東廣漢郡按徳陽縣有二其一在川西者先主以屬梓潼郡廢石山郡後周武帝立廢總管府都督府及東川防禦使俱唐武徳貞觀等年立廢武信軍節度宋初立廢小溪縣晉永和年置後魏恭帝改為方義縣宋太平興國避諱復為小溪元省入遂寧本志小溪廢縣附北郭廢遂寧縣在東南一百里今稱下縣蓬溪縣本遂州地唐開元中置唐興縣於此天寳中改今名以蓬萊溪在其界内廢青石縣晉孝武帝於此置晉興縣後魏武帝改為始興縣隋改為青石縣以青石山為名九州要記云此山天下青石無佳於此可為鐘磬元省入蓬溪廢長江縣本東晉巴興縣後魏恭帝改為長江縣即涪江也唐賈島簿此縣元省入蓬溪今長江壩是安岳縣李雄之亂没於獠梁普通始置郡曰普慈後周曰普州隋改今縣以地在山上險而即安之義也洪武初尚名普州九年乃為縣廢普康縣周武帝於此置永康縣隋開皇改為隆唐縣唐避𤣥宗諱改為普康縣今併入安岳縣本志普康鎮是廢崇龕縣在今之古龕寺沿革未詳樂至縣唐武徳三年置取樂至池為名廢多葉縣周建徳年置以有神曰多岳也宋併入樂至在今之茗山鎮廢石羊縣元時析置今為石羊鎮蜀中廣記卷五十四
