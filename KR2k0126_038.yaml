body:
  text: 蜀中廣記卷三十八明曹學佺撰邊防記第八上川東南平平茶邑梅酉陽史記髙帝為漢王發夷人還伐三秦秦地既定乃遣還巴中復其渠帥羅朴咱鄂度夕龔七姓不輸租稅餘戶乃嵗入錢口四十宋史渝州蠻者古板楯七姓蠻唐之南平獠也其地西南接烏蠻昆明哥蠻大小播州部族數十居之治平中熟夷李光吉梁秀等三族據其地各有衆數千家間以威勢脅誘漢戶有不從者屠之沒入土田往往投充客戶謂之納身稅賦皆里胥代償藏匿亡命數以其徒偽為生獠劫掠邊民官軍追捕輒遁去習以為常密賂黠民覘守令動靜稍築城堡繕器甲逺近患之熙寧三年轉運使孫固判官張詵使兵馬使馮儀辨簡杜安行圖之以禍福因進兵復賓化寨平蕩三族以其地賦民凡得租三萬五千石絲綿一萬六千兩以賓化寨為隆化縣𨽻涪州建榮懿扶歡兩寨其外銅佛壩者𨽻渝州南川縣地皆膏腴自光吉等平他部族據有之朝廷因補其土人王才進充巡檢委之控扼才進死部族無所統數出盜邊朝廷命熊本討平之建為南平軍以渝州南川涪州隆化𨽻焉渝州志云黔涪徼外有西南夷部漢牂牱郡唐南寧州牂牱昆明東謝南謝西趙充州諸蠻相為聨屬宋初以來有龍蕃方蕃張蕃石蕃羅蕃者號五姓蕃皆常奉職貢受爵命治平四年十二月知靜蠻軍蕃落使守天聖大王龍異閣等入見詔以異閣為武寧將軍其屬二百四十一人各授將軍及郎將熙寧元年有方異三年有張漢興各以方物來獻授異靜蠻軍漢興捍蠻軍並節度使六年龍蕃羅蕃方蕃石蕃八百九十人入覲貢丹砂氊馬賜袍帶錢帛有差其後比嵗繼來龍蕃衆至四百人往返萬里神宗憫其勤詔五姓蕃五歲聽一貢人有定數無輒增及别立首領以息公私之擾命宋敏求編次諸國貢奉録客省四方館撰儀皆著為式元豐中張蕃乞添貢奉人至三百詔不許故事以七十人為額不許七年西南程蕃乞貢方物願依五姓蕃例注籍從之元祐二年西南石蕃石以定等齎表自稱西平州武聖軍禮部言元豐著令以五年一貢為限今年限未及詔特令入貢五年八年紹聖四年龍蕃皆貢方物龍氏於諸姓為最大其貢奉尤頻數使者但衣布袍至假伶人之衣入見蓋實貧陋所兾者恩賞而已元符二年又有牟為蕃入貢詔以進奉人韋公憂憂市公利等為郎將諸蕃部族數十獨五姓最著程氏韋氏比附五姓號西南七蕃云酉陽宣撫司隋圖經集語云黔中是武陵郡酉陽也按漢酉陽在今溪州大鄉界與黔州約相去千餘里今之三亭縣西百九十餘里别有酉陽城乃劉蜀所置非漢之酉陽也貞觀地志言劉蜀所置酉陽為漢酉陽蓋誤認漢涪陵之地也寰宇記云酉陽古蠻夷地春秋屬楚地秦昭王取之𨽻黔中郡漢以酉陽縣地置武陵郡尋置牂牱郡吳分置黔陽郡隋以縣屬巴東郡唐武德初徙縣治務川四年招慰司冉安昌以務川當牂牱要路須置郡以撫之復於縣理置務州領務川涪川扶陽三縣至貞觀元年以廢夷州之伏逺寧夷思義髙富明陽丹川六縣廢思州之丹陽城樂感化恩王多田五縣來屬其年省思義明陽丹川五縣二年又省丹陽一縣四年改務州為思州以界內思卭水為名其年以涪川扶陽二縣八年又以多田城陽二縣俱割入費州又廢感化縣十年又以髙富縣割入黔州十一年又省伏逺縣但領務川思王寧夷三縣開元四年又以州東立思卭縣二十五年割寧夷縣夷州天寶元年改為寧夷郡乾元元年復為思州黃巢之亂酉陽蠻叛駙馬冉人才征之有功留守其地五代時中國無主冉氏遂據之按志宋正和六年復于務川縣置思州領縣三酉陽𨽻焉復升為州知州冉守忠善於撫字酉人懷之元季冉氏世知本州明玉珍僣據以酉陽州為沿邊溪洞軍民宣慰司國朝洪武初冉如彪納土歸附仍為酉陽州後升為酉陽宣撫司令冉氏子孫世襲領石耶洞長官司永樂中改𨽻重慶府建立學校俾漸華習三年入覲十年大造略比諸郡縣志云司西北百八十里酉陽山入黔江縣界郡國志云小酉山入龍標界即王昌齡謫處也水經注云酉水北岸有陽縣許慎曰溫水南入蓋鄨水以下津流注之通稱故縣受名焉西鄉溪口在遷陵縣故城上五十里左合酉水酉水又東際其故城北又東徑酉陽故縣南而東出也兩縣相去水道可四百許里於酉陽合志云司東南九十里三江山江源出酉陽與小溪會合平茶水東注辰州大江其地廣袤七百里東至保靖宣撫司界西至彭水縣界南至平茶長官司及思南沿河界各三百里北至大田軍民千户所界四百里當思南之要衝接荆湘之邊境山磎阻深易為憑藉古號難治人分三種曰犵獠曰冉家曰南客暖則捕獵山林寒則散處巖穴借貸以刻木為契婚姻則纍世為親編戶十三里其屬有九溪十八洞蠻惟是九江後溪西南一帶近為鎮筸苗殘破境土日削莫克恢復常告急于我焉石耶長官司酉陽屬地也先朝自宋楊昌安者竊據其地昌安太原楊業之裔宣和間征伐有功蠻人畏服因世為石耶土知府洪武初楊金隆歸附改立長官司設長官二員皆楊氏世職别設流官吏目一員主其租稅附庸酉陽覲貢不親至京師人織斑布以為衣佩長刀而捕獵編戶二里鎮蠻洞而帶五溪連黔彭而接荆楚東至石凱子界西至平茶司界南至邑梅沙子凹北至酉陽石間囤與鎮筸苗密邇地勢孤懸不減于二酉也志云石耶人呼石版為巴治南一里巴山言此山多版石也又二里有石崖土人呼為密那崖崖下有洞世傳有道人修行其中每以餅餌獻遊者在洞中猶見熟麵持出洞外則石矣平茶長官司秦屬黔中郡三國屬吳為黔陽縣地隋屬巴東郡唐武德初屬思州天寶間屬寧夷郡五代陷于番宋政和間始得其地置平茶洞元初改溶江芝子平茶等處長官司𨽻思州安撫司以其地授楊大雷為土知府洪武間楊抵剛歸附改授長官司𨽻酉陽宣撫後改𨽻渝州覲貢賦稅大略與酉陽同編户三里所屬有五種夷言語侏離性好捕獵火炕焙榖野麻緝布巫禱治病歌唱送殯號為南客其地廣袤一百二十里東至石耶長官司界一十里西至貴州烏羅長官司界一十里南至銅仁府界一百里北至酉陽宣撫司界五十里以二酉為籓籬石耶為襟帶也志云治南諸葛洞相傳武侯征九溪蠻信宿洞中石床存焉又云侯於洞中以一握粟秣馬化為石粟至今神之西三十里白歲山髙聳插天土人言此山白則有年積雪為白也山之水一流入東南名哨溪以溪聲如鳴哨一流入西南為滿溪以其水常溢不流治北有髙秀山丹崖翠壁如畫圖土夷考所謂地多秀山聳插翠雲者矣其人驍悍善戰萬厯初年馬湖之役長官楊光祖之功為多邑梅長官司宋末太原楊光甫據其地元改為拂鄉洞以楊氏為土知府明玉珍僣據改為邑梅沿邊洞軍民府洪武初楊金奉歸附立為長官司編戶五里初𨽻酉陽永樂初改𨽻渝州其地廣九十里袤三百三十里東至湖鎮溪千戶所界七十里西至貴州烏羅長官司界二十里南至平頭著可長官司界一百里北至酉陽宣撫司界一百三十里其人語異蠻音衣穿斑布用木浪槽為臼而舂稻粱􅅹苦蒿水代鹽而鮓宿肉婚姻以牛隻為等疾病以巫祝為醫競私鬬昧公義雖有勇敢徒以偕亂然不能禁筸苗之蠺食也志云司西南六里夀山林木叢茂屹立層漢蒼煙翠靄四時不凋東三里黃牛山相傳土官楊四舟髙殿始自烏羅過此見土地膏腴宜耕稼因喜椎黃牛以享衆故名司南八里有韭山昔人遺韭于山顛因蕃衍生韭長丈餘四時皆有土民米食之西北二十里凱歌河行者至此必謳而渡俗呼凱過河河干有凱子寨焉蜀中廣記卷三十八
