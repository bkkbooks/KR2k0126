body:
  text: 蜀中廣記卷十二明曹學佺撰名勝記第十二上川南道眉州賈島送穆少府知眉州詩劍門倚清漢君昔未曽過日暮行人少山深異鳥多狖啼知峽雨棧盡到江波一路白雲裏飛泉灑薜蘿李頻眉州别李使君詩回首雪峯前朱門心杳然離人自嗚咽流水莫潺湲毒草通蠻徼秋林近漏天一生從此去五字有誰憐薛濤送鄭眉州詩雨暗眉山江水流離人掩袂立髙樓雙旌千騎駢東陌獨有羅敷望上頭趙抃按獄眉山舟行詩攜琴曉出錦官城千里秋原一望平放舸急流身覺快披雲孤嶼眼增明農田雨後畦畦緑漁笛風前曲曲清訊獄逺邦先滌慮恤哉休戚在民情蘇軾寄黎眉州詩膠西髙處望西川應在孤雲落照邉瓦屋寒堆春後雪峨眉翠掃雨餘天治經方笑春秋學好士今無六一賢且待淵明賦歸去共將詩酒趂流年黃庭堅次韻子瞻寄眉山王宣義詩參軍但有四立壁初無臨江千木奴白頭不是折腰具桐帽棕鞋稱老夫滄江鷗鷺野心性隂壑虎豹雄牙鬚鷫鸘作裘初服在猩血染帶鄰翁無昨來杜鵑勸歸去更得把酒聽提壺當今人材不乏使天上二老須人扶兒無飽飯尚勤讀婦無復禈且著襦社甕可漉溪可漁更問黃雞肥與癯林間醉著人伐木猶夢官下聞追呼萬釘圍腰莫愛渠富貴安能潤黃壚郡有孫氏書樓魏了翁記曰孫氏居眉以姓著自唐迄今人物之懿史不絶書而為樓以儲書則由長孺始樓建於唐之開元至灮啓元年僖宗御武德殿書書樓二字賜之今石本尚存自偽蜀毁於災乃遷魚其居為佛氏所廬今所謂傳燈院是也若里巷則固以書樓名長孺之五世孫降衷嘗遊河洛識藝祖皇帝於龍濳建隆初召至便殿賜衣帶圭田特授眉州别駕因市監書萬卷以還然樓尚未復也别駕之孫闢乃入都傳東壁西雍之副與官本市書捆載而歸即所居復起重樓藏之魚之有樓則昉乎此又嘗除孰為師徒講肄之所號山學於是士負笈景從而書樓山學聞名於時矣方樓之再建也在天聖初闢之從兄直講君堪嘗為作記錢內翰希白宋景文子京皆賦詩闢性倜儻不耐衣冠衣方服其卒也從弟文懿公為識其竁有不儒其身而儒其心之語故里人又以儒心名之比歲樓又燬於火書僅有存者儒心之六世孫曰某懼忝厥世乃更諸爽塏以唐僖宗所書樓刻揭之樓視舊增拓焉且病所儲之未廣走行闕下傳抄貿易以補闕遺竭其餘力山學載興以余二十年雅故請書厥顛末余因惟昔人藏書之盛鮮有久而弗厄者梁隋之盛或壞於火或覆於砥柱唐太玄文昭之盛或毁於盜或散於遷徙本朝之初如江源叔所藏合江南吳越之書凡數萬卷而子孫不能有之為臧僕盜去與市人裂之以藉物者不可勝數余偶過安陸亦得其省中所藏晉史則佚於他人者可知安陸張氏得江書最多其貧也一篋之富僅供一炊王文康初相周世宗多得唐舊書李文正所藏亦為一時之冠而子孫皆不克守宋宣獻兼有畢文簡楊文莊二家書可敵中祕之藏而元符中蕩為煙埃朝文元纍世之蓄校讐是正視諸家為精自中原無事時已有火厄至政和甲午之災尺素不存劉壯輿家於廬山之陽所儲亦慱今其子孫無聞焉南陽开氏積書凡五十篋則盡歸諸朝氏嗚呼斯非天地神人之所靳者耶而孫氏之傳獨能於三百年間屢絶而復興則斯不亦可尚矣夫雖然余嘗聞長老言書之未有印本也士得一書則口誦而手抄惟恐失之其傳之艱蓋若此惟傳之艱故誦之精思之切辨之審信之篤行之果自唐末五季以來始為印書極於近世而閩浙庸蜀之鋟梓遍天下加以傳説日繁萃類益廣大綱小目彪列臚分後生晚學開卷瞭然茍有小慧纎能則皆能襲而取之噫是不過出入口耳四寸間爾若聖賢所以迭相授受若合符節者果為何事而學之於人果為何用則謾不加省然則雖充厨牣几於我何加焉可不甚懼矣夫按書樓復興雖在魚江而始創則在州城也今蜀中書賈之家往往稱書樓蓋本諸此有石氏畫苑蘇軾記曰石康伯字幼安眉之眉山人故紫微舍人昌言之幼子也舉進士不第即棄去當以蔭得官亦不就讀書作詩以自娛而已不求人知獨好法書名畫古器異物遇有所見脫衣輟食求之不問有無居京師四十年出入閭巷未嘗騎馬在稠人中耳目謖謖專求其所好長七尺髯而黑如世所畫道人劍客而徒步塵埃中若有所營不知者以為異人也又善滑稽巧發微中旁人抵掌絶倒而幼安淡然不變色與人遊知其急難甚於為已有客於京師而病者輒舁置其家親飲食之死則棺斂之無難色凡識幼安者皆知其如此而余獨深知之幼安識慮甚逺獨口不言耳今年六十二狀貌如四十許人須三尺郁然無一莖白者此豈徒然者哉為亳州職官與富鄭公俱得罪者其子夷庚也其家書畫數百軸取其毫末雜碎者以册編之謂之石氏畫苑幼安與文與可遊如兄弟故得其畫為多而余亦喜其畫古木叢竹因以遺之使置之苑中有三蘇祠在紗線街即蘇氏故宅也門前榆樹云老泉手植竒怪碨礧人爭取去為假山魏了翁知眉時祭公文曰眉號士大夫郡聖天子不以某不肖奠守此土其在境內凡百辟卿士有益於民夙夜承祀無忒矧惟山川炳靈世載蘇氏一翁二季先後相望文章事業在太史之典䇿今居郡滿歲顧歲時奉嘗闕然弗諧非所以風境律我有民也用修圭薦展於廡下以內翰太師文忠公黃門太師文定公從祀既齊既稷神保攸歆敢不永與多士承斁斯文以無忘德有觀蓮亭在祠西池中環臺皆蓮中有碑刻東坡小像李龍眠畫山谷頴濱贊今移入寢方輿勝覽云臨風閣在州治內宋沈逈詩煙霞生座右林沼匝城隈州園十詠邵博著環湖在署後魏了翁築翠羽書臺逺景樓在州治北太守黎錞建蘇軾記通志云雪臺在逺景樓前亦希聲築本志云東北二里有洛城後漢時築蜀漢廢齊通城在城北南齊建武置隋開皇廢碑目云唐眉州創羅城記大順二年盧拯撰文略云象耳鎮於後峩眉列乎前勝覽云嘉祐閣枕羅城繪三蘇於上刻東坡和陶詩於壁間宋史唐末山行章攝眉郡守值四方驛騷乃合五縣之力築城周遭八里有竒計一千八百六十五丈名卧牛城淳化中李順之變攻圍不下及順誅守者以城完受賞焉通義志云昔人評吾州山不髙而秀水不深而清列眉通衢平直廣衍夾以槐柳緑隂翳然小南門城村家多竹籬桃樹春色可愛橋之下流皆花竹楊柳泛舟其間鄉人謂之小桃源蘇子瞻詩清江入城郭小圃生微瀾子由詩倣佛城南路繁香撲市橋通志云醴泉山在治西八里環繞州城山半有八角井清甘如醴松江在治東南自蜀江分𣲖西南流至州城與醴泉江合方輿云蜀江在城外一名玻璃江水色清徹似之陸遊詩云玻璃江水千丈深不如江上離人心君行未過青衣縣妾心先到峨眉隂金尊共釂不知曉月落煙渚天橫參車輪無角留不住馬蹄不方何處尋空慿尺素寄幽恨縱有緑綺誰知音愁來只欲掩屏睡無奈夢斷聞踈砧范成大和云玻璃江頭春流深别時沄沄流到今祇言日逺易排遣不道相思翻苦心烏頭可白我可去菖花易青君易尋人生若未免離别不如碌碌無知音蘇軾送楊孟容詩我家峩眉隂與子同一邦相望六十里共飲玻璃江後人因立共飲亭又改為江鄉館在津口矣陸務觀詩玻璃江上栁如絲行樂家家要及時只怪今朝空巷出使君人日宴蟇頤蟇頤山在江東七里狀如蟇頤因名有至德觀有爾朱淘丹泉傳記所載以為軒轅氏丹宅山腹有穴曰龍洞傳者以為四目老翁唐末有楊太虛得道於此今祠中有三仙象四目居中焉人日出東郊渡江遊蟇頤山眉之故事也春風樓明霞閣俱在山上蜀檮杌云僖宗幸蜀政事悉出內侍田令孜之手左拾遺孟昭圖上疏論事坐貶令孜遣人投之蟇頤津後人為立祠裴徹詩云一章何罪死何名千載惟君與屈平從此蜀江煙雨夜杜鵑應作兩般聲本志云孟拾遺祠在蟇頤山上今廢志又云老翁泉在蟇頤山東二十里蘇明允嘉祐集云十數年前月夜有一老翁蒼頭白髮偃息泉上就之則隱而入於泉洵甃以石建亭覆之而為之銘曰山起東北翼為南西涓涓斯泉湓溢以彌斂以為井可飲萬夫里無斯人將此為誰山空寂寥或嘯而嘻更千萬年自潔自好誰其知之乃訖遇我惟我與爾將遂不泯無竭無濁以永千祀梅聖俞寄蘇明允詩泉上有老人隱見不可常蘇子居其間飲水樂未央淵中必有魚與子自徜羊淵中茍無魚子特玩滄浪日月不知老家有雛鳯凰百鳥戢羽翼不滯彼泉傍蘇軾送賈訥倅眉二首云當年入蜀歎空回未見峩眉肯再來童子遙知頌襦袴使君先已洗樽罍鹿頭北望應逢雁人日東郊尚有梅我老不堪歌樂職後生試覔子淵才又云老翁山下玉淵回手植青松三萬栽父老得書知我在小軒臨水為君開試看一一龍蛇活更聽蕭蕭風雨哀便與甘棠同不剪蒼髯白甲待歸來自注先君葬於蟇頤山之東二十餘里地名老翁泉君許為一往感歎之深故及之也外史玄羽張大齡志云歐陽永叔為明允作志銘云公葬於彭山之安鎮鄉可龍里在今蟇頤山之東地名石龍栁家溝老翁泉之側或石可二字易誤嘉靖壬子臺史喻公按眉問老泉墓檄有司求所在而修復之上下彭眉間數月竟無所得於是從老翁泉之傍設一虛塜青神余修撰承勛記其事於石又有廣福寺者乃敕賜門下侍郎蘇轍香火院也宋故事宰相得賜寺院薦福文定入相時有賜貶官後章吕盡追奪之復官手詔再賜自為文記之人以為墳必在賜院之近又乃就寺之後山更作一塜顧頴濵記中云墳之西南十餘步有泉焉廣深不及尋晝夜瀵湧又曰墳東南四里許有故伽藍轍以請於朝則前所修泉傍者差是而廣福之墳非也但廣福傍有古桂樹橫隂一畝大十圍亦非近代物若明允之族譜亭則在州西南古修文鄉蘇氏祖塋側今亭廢刻石亦不存矣碑目云天池院去眉山縣十里蘇文忠公嘗過之今柱上有手書云自老翁井還偶憩治平丁未十二月七日子瞻凡十八字勝覽云石佛山在眉山之南蘇子瞻寄子由詩石田向何許石佛山下路下有爾家山千畦種粳稌山泉宅龍蜃平地流膏乳志云豬龍泉在治南石佛鎮曽有乳豬伏於此化二鯉蓋豬龍也詳見怪異記中志又云孫抃墓在石佛鎮乾明寺前按乾明寺在魚耶鎮孫學士書樓山學碑藏寺中即宋賜孫公抃薦福地也志又云大旺山在東南五十里自蟇頤山南趨或起或伏至此峰巒屹立回拱州城蓋與三峩氣接矣勝覽云息臺山在治西四十里東館鎮北太平廣記載眉州有叟嘗携子入此山遇一道人指其子曰夭叟飲道人已長跪求夀道人取簿檢視曰夀止十八叟與其子懇求不已乃舉筆改為八十後子夀果如數焉志云大明寺近東館鎮隋建有九樓十八殿屋厦三千井亦四十八眼基迹猶存又有燈壁寺在東館鄉宋紹興建有東館書院紹興初眉州學者甚多州學不能容東館鄉士大夫吕君玘倣古鄉校創為學廟春秋釋奠以鄉士大夫居家者主之丹稜令馮時行為之記志又云連鰲山在西南九十里山形如鰲傍即栖雲寺東坡少時讀書寺中嘗於石崖上作連鰲山三字大如屋宇雄徑飛動其畫專車今存青神縣益州記曰青衣神號為雷塠廟班固以為離塠也蜀江至此始有峽之稱華陽國志望帝以熊耳為後户熊耳峽即今之縣治矣郡國志云漢武帝使唐蒙破西南夷路始於此邑也志云青州城梁置在治南十五里古青神郡縣皆治此自熊耳山視之今當為百花鎮黃山谷集云青神尉廳葺城頭舊屋作借景亭下瞰史家園水竹終日寂然了無人迹又當緑隂之間戲作長句云當官借景未傷民恰似鑿池取明月蓋尉乃雅安張禮介卿山谷之中表也志云縣東門外有青羊橋相傳老子騎青羊過此而入成都又云長泉鎮有麒麟橋王蜀時麒麟見於此因立麒麟院又云縣西瑞草橋橋崩得殘碑乃蘇東坡與丈人丈母書也東坡外家在是所謂相望六十里共飲玻璃江矣後洪雅主簿王宣義謝事家居於此東坡贈之詩云歸來瑞草橋邉路獨遊還佩平生壺縣之名勝在乎三巖三巖者上巖中巖下巖也今惟稱中巖焉自縣解維始由芙蓉溪以兩岸多芙蓉也繼由五渡溪以溪水曲折凡五渡也又過慈姥磯有石刻李壁詩云洗盡一春歌酒塵滄江吹破碧粼粼韶華過眼都如夢祇有三峯是故人泊舟直抵下巖有題名云子瞻子由與侃師至此院僧以路險見止不知僕之所厯有百倍於此者矣丁未正月二十日書沿溪數折有喚魚潭上即慈姥巖也篆刻中巖二大字徑可四尺河南邵博書陸務觀詩云春枕悠然夢何許兩枝筇杖喚魚潭又跋程伯正誼所藏山谷帖云此卷不應携在長安逆旅中亦非貴人席帽金絡馬傳呼入省時所觀程子他日幅巾筇杖渡青衣江相羊喚魚潭清泉翠樾之間與山中人掃石置風爐煮蒙頂紫茁然後出此卷共讀乃稱爾過潭循山三里始至寺為中巖其傍有羅漢洞即牛頭僧以木鑰叩石笋處此地懸崖峭壁上刻千佛石覆如屋中有卧仙之迹有玉泉坎黃山谷銘云玉泉坎坎來自重險發源無所龍口琬琰我來峽中初酌蛙頷靈湫世鮮百泉莫與比甘山僧淳拙煮餅馨香逺拂瀹茗泉味不掩行為白虹止為方鑑口題此德用勒蒼廣其上巖去中巖一里許唐末有佛剎號垂拱寺相傳巖下有龍聽僧講經於此由是建寺有三石筍唐無盡禪師伏虎在石筍下所謂伏虎臺也范成大詩赤巖倚竛竮翠邏森成削岑蔚嵐氣重稀間暑光薄聊尋大士處往扣洞門鑰雙撑紫玉關中矗翠雲幄應供華藏海歸坐寶樓閣無法可示人但見雨花落不知龍湫勝何似魚潭樂夜深山四來人靜天一握驚看杯桂白月影到林壑門前六月江世界塵漠漠寶缶有甘露一滴洗煩濁捫天援斗杓請為諸君酌山谷題名云元豐庚辰歲秋多雨其八月戊午晴遊慈姥巖禮諾巨那尊者巖下有泉發山足奔突色如乳而味甘取之不竭豈巨那所奉供耶余因竭其舊水涫滌見石少焉復盈坎㶁㶁投澗中喚魚潭投齋餘飯魚出食者數百見人不驚眉山程逢時跋余玠詩云相公平賊後攜吏上峥嶸裴晉公以後無此竒遇醉翁行樂處草木皆可敬歐陽子而後世無此樂先生晉公德業文忠詞章書史精妙視鍾王有逸氣而於山林悠然心會殆伯仲之間有裴歐也試語山靈自有宇宙便有此山幾曽有此客耶邵漙來紹興元年五日旦從其弟博任也資中張方自漢川易節益部將母遊弟嵩午猶子觀復二子知復甥何杓侍眉山蘇禮偕來嘉定壬午二月既望金華楊緯被命赴闕艤舟巖下敬修尊者香火而去紹熙壬子孟冬九日弟綜及男師復師晉同至河陽郭忠得之行部嘉眉艤舟岩下携子遊中巖瞻拜尊者過憩石笋庵厯覽勝境竒哉政和八年六月三日里人任逄被旨赴闕長子商輅侍行親友送别笋峯者三十有九人嘉定丁丑十月癸酉邑人楊大全被旨進朝將家來修淨供宗黨親朋會别於此者五十五人紹熙三年九月旦谷居翁大丞相趙公留題淳祐壬子鄉貢方於此題名巖寺奎書適從天來是秋楊巽冠外省史夢錫在選中以山英靈發越愈大浚儀趙公握奎平岡繼偕南宫第一之客明年端午合邑士楊興仁申錫柄仲夢炎懌森孫侯國史朝瑞彪錫王鉞文起之巽已程方何明磨崖大書以侈盛舉以開方來慶元戊午冬髙公純遣姪魏了翁赴龍飛䇿試艤舟來遊男載夏卿文卿定子姪遊侍行越三年載定子裭褐行都復侍親過此弟夏卿文卿林卿長弟淞同山下飲作伴留又二年癸丑秋十月了翁蒙恩召除侍東去舍于眉信于青衣明日孫真勤飲餞於此兄弟之偕行者如戊午獨伯仲不與紹定己丑六月丙午郡人蘇薰侍諸父率四弟以嘉定戊寅上元日遊誦坡翁江山風月本無常主間者便是主人語信然也弟黨書愁霖貫序人心久鬱秋季之旦晴景開霽草木悅茂江山清新太子宫史籍聖源命前王穆伯恭及前進士楊頴臣廷芳進士程戩景貺羽衣李有慶仲祥出邑東津亭方舸南下登石徑數里逰中巖僧居清晏薄暮間道而歸試校書郎領簿馮越石君玉俾識其時乃嘉祐丁酉之歲也景貺題辛亥歲豫友楚人鍾惺來逰作記云去青神西南十五里江色盡緑玉中邉皆見隔岸坐立數山若架閣者中巖也巖下上連延可十數里許回流峻壁冥壑復磴竹樹蒙籠大要向背往復皆與此巖終始渡江即水月樓樓趾齧江寺冠之由樓視江則已俯由寺登樓乃反降階垂窮與樓湊階代樓為梯者強半揣本齊末度樓之腰猶未能至乎寺趾也降自樓出山門右行不見江則摩磴如蟻屢折為喚魚潭魚聽掌出石壁百仞立而微俯潭潄其脛石無完膚有邵伯溫大書可模並壁行數武為羅漢洞洞低曲僂而入如行牛角中隙處稍右則為伏虎巖鑱巖為百千萬億佛如恆河沙數巖之半跨壑為一小石橋銜木其壁為閣若居人架竹梁上以承燕巢者人屈曲行其下沿緣洞壑俯仰竹石者數里曰此走井研富順道也巖又半為流杯池一曰太極池有屋數楹屋後為泉泉流洞中石壁四周有黃魯直大小三石刻壁間宋元刻頗多每兩石縫接處往往上下各截其半中嵌俗筆亦有居石隙茍完者出洞緣磴行輿步斁代去所謂羅漢洞伏虎巖者度可四三里乃復覩前鑱巖佛像須眉厯厯可數才隔一壑尋橦可度疑前此一假途徑可省矣大扺喚魚潭以往行皆壑石壁夾之若岸壑若溪藤蘿虧蔽壑中若荇藻老樹如槎根若石猿鳥往來若遊魚特無水耳諸峯映帶時讓時爭時違時應時拒時迎裒益避就凖形匠心橫竪參錯各有妙理不可思議又行里許蹭蹬拾級乃睹古中巖題額去三石笋不逺所謂諾詎那尊者引牛頭僧持鑰扣石笋笋開得低頭佛盜珠是也鍾子曰自中巖至尊者巖從下視上頂踵腹背其石胍皆當為笋笋隙且平處則置屋仄則鑿磴斷則為橋處危臨深則設石欄欄則復見江從江中望岩上僧舍佛剎雖一居之內前軒後寢纍纍綴髙壁上下疊而不覺其前後通也登岩行屋中皆磴道乃稍得其要領趾後竟即摩前頂石笋中分處如一門尊者像處其中右旋復為佛殿殿傍一笋屹若浮屠與中分者而三實一笋也人直指其巋然三峰者為石笋耳笋上宋元刻亦多俗書災石者亦復倍之萬厯辛亥十月二十一日晚霽與弟恬及艾子登於中岩焉禮諾詎那尊者畢説偈偈曰偶爾喪珠復返急時扣鑰相求未免勞勞多事世尊不合低頭又曰未必衣珠真失總緣岩石當開自供羅漢遊戲不管山僧往來説偈訖返豫凡三過中岩皆有詩其一云中巖如化出秀色類煙含到鳥無歸路遊魚或泳潭泉聲隨地有石笋與天參若作此山長於心無不堪其二云再識中岩好彌添乍到情泉流因委曲雨氣益淒清橋險必當度樓虛何所成惟應石笋上安坐學無生其三云莫謂客來數聊無塵俗牽岩光浮落日梅意入初年手拓碑文古身行洞穴連白魚灘最急且宿在灘前蓋豫最後遊同青神令康君視拓山谷諸碑刻又自梓州牛頭洞來故及之彭山縣揚雄蜀記秦惠王遣張儀司馬錯伐蜀蜀王開明拒戰不利退走武陽獲之即此地也郡國志云漢元光四年益洲刺史任安城武陽周圍千三百丈本志云今之舊土城是有任公橋後漢朱褒獲麟於馬頰嶺因改名為麒麟橋漢犍為郡理本志云治西北五里犍為城漢建元中築碑目云漢犍為太守楊洪碑在彭山縣北小板橋五十年前餘楊洪碑三字今皆磨滅華陽國志云郡去成都百五十里渡大江昔人作大橋曰漢安橋廣一里半每秋夏水盛斷絶歲歲修理百姓苦之建安二十一年太守南陽李嚴乃鑿天社山尋江通車道省橋梁三津吏民悅之嚴因更造起府寺觀壯麗為一州勝宇其地東接江陽南接朱提北接蜀郡西接廣漢按晉永和中於此置西江陽郡矣初唐沈宇武陽送别詩云菊黃蘆白雁初飛羌笛胡琴淚滿衣送君斷腸秋江水一去東流何日歸郭璞江賦云流二江於崌崍注崌山北江所出崍山卭崍山也中江所出皆東注於大江寰宇記云崌崍山在縣東北十二里導江從山南合流下有漢張綱墓志云墓在崌崍山東北五十步漢書綱字文紀犍為武陽人仕廣陵太守平賊黨張嬰有恩卒之日嬰率其徒五百人送喪還武陽負土成墳而去按崌崍二山在漢嚴道界其尾入江雲笈七籖云第五北平治在眉州彭山縣上有池水縱廣二百步昔越人王子喬得仙處碑目云此山有大書北平山治之碑餘不可讀碑隂書大唐上元二年道士施仕衡等字本志云北四十里北平治應室宿上有天柱峰夜常見五色燈山下有王喬墓唐杜光庭詩桐柏真人曽此居焚香崖下誦靈書朝回時宴三山客澗盡間飛五色魚天柱一峰凝碧玉神燈千點散紅蕖寶芝常在知誰得好駕金蟾入太虛南中八郡志云犍為有魚鳬津數百步一名彭女津在彭亡山南導江皂江等水會處彭祖塜及祠在此後漢岑彭為刺客所中而死又名彭亡山亦名平模山郡國志謂之朝女山云昔有朝祖女於此山得道今足迹尚存故名志云山距治北十二里曰彭女彭模平模平無皆一山神異記云犍為有一白虎出則衆黑虎隨之不傷人物漢王褒招碧雞神詞黃龍見兮白虎仁蓋指此也寰宇記引秦昭王射白虎事非李膺益州記云周德既衰九鼎淪散一沒於此或見其鼻故名鼎鼻山一名打鼻山上有城亦名鼎鼻打鼎音近也大江過於山下有灘宋將朱齡石伐蜀立寨於此括地志云鼎鼻山北有龍洲東接導江水按已上即常璩所稱王喬升其北山彭祖家其彭蒙白虎仁於廣德寶鼎見於江溉也漢書綏和五年犍為人上寶磬十六此地因謂之寶磬洲益部耆舊傳朱遵武陽人仕為功曺率兵拒公孫述絆馬死贈復漢將軍有祠後漢建安二十四年黃龍見武陽赤水九日劉氏以為瑞應因立廟在長江村導江東岸碑目云漢刻黃龍甘露之碑在彭山黃龍鎮今移於繫龍橋周地圖記云彭山縣北四里有潭水後漢漢安元年仙人瞿君武入峨眉山得道每年繫龍於灘龎籍詩巢鳯閣邉勞逺夢繫龍灘下認前題按已上即常璩所稱犍為上寶磬十六劉向以為美化所降後漢朱遵拒公孫述光武以為士大夫郡建安末年黃龍見武陽赤水蜀人以為劉氏之瑞應也寰宇記云金華山在彭山縣東五里有丈六佛像夜多神燈紀勝云彭山東北六里盤石山普照寺藏有宋太宗真宗仁宗御書崖之半有石室范鎮詩云窮幽訪盤石細徑入荒涼踏葉履屨濕觸花衣𬒮香方輿云平蓋山在彭山縣北二十四化之一也七籖云山下有玉人長一丈三尺昔吳郡崔孝通於此學道得飛仙本志云平蓋治上應婁宿治前洗墨池唐隱士羅公逺題詠之處有清暉滌覽二亭提刑張方記以為在鼎鼻山椒而勾氏之逍遙軒恰與之相對也杜光庭詩云勢壓長江空八陳吳都仙客此修真寒江向晚波濤急深洞無風草木春江上玉人應可見洞中仙鹿已來馴龍車鳯輦非難遇只要塵心早出塵亡名氏詩云平蓋山髙古木踈昔人曽此築仙居井通八角寒泉湧觀燬三清劫火餘洗墨池邉丹竈冷繫龍岩畔石潭虛吟成獨坐荒苔上間看蝸牛學篆書七籖云本竹觀在彭山治北相傳以為竹林黃帝所手植者杜光庭詩云樓閣層層觀此山雕軒朱檻一躋攀碑刊古篆龍蛇動洞接諸天日月間帝子影堂香漠漠真人丹澗水潺潺掃空雙竹今何在只恐投波去不還楊祐甫彭山十事記一曰象耳山二曰彭祖宅三曰大悲道埸四曰寶現磨針二溪五曰太白書臺有石刻太白留題云夜來月下卧醒花影零亂滿人襟袖疑如濯魄於氷壺也杜光庭詩山中猶有讀書臺風掃晴嵐畫障開花月氷壺依舊在青蓮居士幾時來六曰師悟志棲二大士會昌寺七曰薛范二詩八曰龍池蟹泉九曰千歲松柏十曰石恪畫護法神志云縣東北二十五里有磨針溪在象耳山下相傳李白讀書山中學未成棄去適過是溪逄老媪方磨鐡杵問何為曰欲作針耳白感其言遂還卒業媪自言武姓傍有武氏崖薛能過象耳山詩一色青松幾萬栽異香熏路帶花開山門欲别心濳願更到蜀中還到來又到處逄山更欲登自疑身作往來僧徒行至此三千里不是有緣應不能文同題象耳山寺詩轉谷縈岩路始窮隔林遙望一門通溪山俱在見聞外臺殿盡藏懷抱中像閣罘罳明海日經幢瓔珞撼天風勞生又逐輕舠去珍重髙僧解苦空碑目云縣北四十里有古塔刻云唐中和三年浴佛日知玄禪師自成都遊峨眉還至此山愛其幽僻遂立庵於上名曰知玄庵按已上即酈道元所稱武陽龍尾仙者羽化之所神棲白雲屬想芳流藉念泉鄊遺詠在兹也寰宇記云馮翊王廟在縣五里古老相傳有漢馮翊王郭子明墓按漢書功臣非賜姓者不得封王恐此非實又漢武帝遣拔胡將軍郭昌再度入蜀討南夷昌字子明漢紀云武帝元封六年益州昆明反使將軍郭昌擊之或即是此人碑目云彭山縣東三十里有宋師中碑云梁武陵王蕭紀寓此練兵欲東下故後人為立武陵寺方輿記云縣界有樂黎城唐開元十道要略云漢何斌為蜀郡太守理於此時郡邑凋殘人物窮困乃以已祿米施惠百姓此數城之民由是獲存臨别百姓以白米倍填曰荷君父之恩無以報後之州郡有職田始於此矣丹稜縣志云赤崖山在治北二十里髙聳赤色如鳥斿之狀拱翼縣治雖林木叢茂不能蔽之縣以此得名也其下即多稜川矣漁隱叢話云花卿冡在丹稜之東館鎮至今猶顯英氣血食其鄉按花欽字敬定本關中人唐至德間從崔光逺入蜀討假子璋有功後平冦亂單騎鏖戰喪其元猶操戈至東館鎮下馬沃盥適遇浣紗女謂曰無頭何以盥為遂自僵仆居民葬之溪上廟祀不絶宋封為忠應公邵博云州西有花將軍廟廟史以匣藏唐至德元年十月鄭丞相誥云花敬定將軍也謝臯羽花卿冡行云濕雲糢糊埋秋空雨青沙白丹稜東莓苔隂隂草茸茸云是花卿古來冡花卿舊事人所知花卿古冡知者誰精靈未歸白日西廟鴉啄肉枝上啼綿州柘黃魂正飛本志云縣北十五里龍鵠山三大字宋孝宗書也有松柏山碑記云山有三宫九觀乃成無為楊正見李鍊師成道處唐天寶年建杜光庭題龍鵠山詩抽得間身伴瘦笻亂敲青碧喚蛟龍道人掃徑收松子缺月初懸天柱峯李燾詩曰已作清時鳥倦飛杜鵑何事更催歸似嫌住處猶城郭不解携家隱翠微其子壁詩云蕭條白日閉岩扄留作遊人萬古情猶有山中舊時鹿舉頭如聽讀書聲此縣有楊素翁者竒士從黃魯直遊盡刻杜子美兩川詩於眉山所謂大雅堂也魯直記曰余謫居黔州盡書子美夔峽兩川諸詩以遺丹稜素翁俾刻諸石使大雅遺音久湮沒而復盈三巴之耳素翁乃作髙屋廣楹以庇此石因請名焉余名之曰大雅堂仍為作記其略云由子美來四百餘年斯文委地文章之士隨世所能傑出時輩未有升子美之堂者况家室之好耶余嘗欲欣然會意箋以數語終以汩沒世俗初不暇給雖然子美詩妙在無意於文而意已至非廣之以國風雅頌深之以離騷九歌安能咀嚼其意味闖然而入其門耶故使後輩自求之則得之深矣使後之登大雅堂者能以余説而求之思過半矣彼喜穿鑿者棄其大指取其發興於所遇林泉人物草木魚蟲以為物物皆有所託如世間商度隱語者則子美之詩委地矣蜀中廣記卷十二
