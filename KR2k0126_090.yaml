body:
  text: 蜀中廣記卷九十明曹學佺撰高僧記第十附録經驗果報等任昉述異記宋羅璵妻費氏寧蜀人父恱寧州刺史費少敬佛誦法華經數年勤至不倦後忽得病苦心痛垂命闔門惶懼屬纊待時費私心念我誦經勤苦宜有善祐庶不於此遂致死也既而睡卧食頃如寤如夢見佛於窗中授手以摩其心應時都愈一堂男女童僕悉覩金光亦聞香氣璵從妹即琰外族曽祖尚書中兵郎費愔之夫人也惟時省疾牀第亦具聞見於是大興信悟䖍戒至終法苑珠林宋馬䖍伯巴西閬中人也少信佛法嘗作宣漢縣宰以元嘉十二年七月夜於縣得夢見天際有三人長二丈餘姿客嚴麗臨雲下觀諸天伎樂盈牣空中告曰汝厄在荆楚戊寅之年八月四日若處山澤其禍剋消人中齊戒亦可獲免若過此期當悟道也時俯見相識楊暹等八人並著鎖械又見道士胡遼半身土中天際神人皆記八人命盡年月惟語遼曰若能修立功德猶可延長也暹等皆如期亡遼聞益懼奉法山居勤勵彌至䖍伯後為梁西曹州將蕭思話也蕭轉南蠻復命為行參軍䖍伯耳荆楚之言心甚懷懼求蕭解職將適衡山蕭堅不許十五年即戊寅嵗也六月末得病至八月四日危篤守命其日黃昏後忽朗然徹視遙見西面有三人姿質金曜儀相端備䖍伯委悉詳視猶是前所夢者頃之不見同居小大皆聞香氣因而流汗病即小瘥䖍伯所居廨宇卑陋于時自覺處在殿堂廊壁瓌耀皆是珍寶於是所患悉以復宋太原人王球字叔達為涪陵太守以元嘉元年于郡失守繫在刑獄防鎖堅固球先精進用心尤至獄中百餘人並多飢餓球每食皆分施之日自持齊至心念觀世音夜夢升高座見一沙門以一卷經與之題名光明按行品併諸菩薩名球得而披讀忘第一菩薩名第二觀音第三勢至又見一車輪沙門曰此五道門也既覺鎖斷脫球心知神力彌增專志因自釘治其鎖經三日而被原宥唐武德中都水使者蘇長為巴州刺史長將家口赴任渡嘉陵江中流風起船沒男女六十餘人一時溺死惟有一妾常讀法華經船中水入妾頭戴經函誓與俱溺妾獨不沉隨波泛濫頃之著岸逐經函而泊開視其經了無濕汙後嫁為人婦逾舊篤信唐貞觀元年蓬州儀隴縣丞劉弼前任江南縣尉時忽有一鳥於弼房前樹上鳴土人云是惡鳥不祥之聲家逢此鳥殺主不疑劉弼聞懼思念欲修功德禳之不知何福為勝夜夢一僧偏讃金剛般若經令讀誦百遍依命即讀滿至百遍忽有大風從東北而來拔此鳥樹隔舍遙擲巷裏其拔處坑縱廣一丈五尺過後看其風來處小枝大草並隨風回靡風止復起如故故知經力不可思議唐遂州人趙文信貞觀四年暴死三日復蘇自說云初死有人遮擁驅逐將行同伴十人並共相隨至閻羅王所其中見有一僧王先喚師問云師一生已來修何功德師答云貧道從生已來惟誦金剛般若王聞此語忽即驚起合掌讃言善哉善哉師諗誦般若當得升天出世何因錯來至此王言未訖忽有天衣來下引師上天去後喚遂州人前汝從生已來修何功德其人報王言某一生已來不修佛經唯好庾信文章集録王言庾信者是大罪人現此受苦汝見庾信頗曽識否其人報云雖讀渠文章然不識其人王即遣人引出庾信令示其人乃見一龜身一頭多龜去少時現一人張口云我是庾信為生時好作文章妄引佛經雜糅俗書誹謗佛法謂言不及孔老之教今受罪報龜身苦也此人活已具向親說遂州之地人多好獵採捕蟲魚逺近聞見者共相鑒戒永斷殺業各發誠心受持般若焉唐貞觀五年隆州巴西縣令狐元軌者信敬佛法欲寫法華金剛般若涅槃等經無由自檢憑彼土抗禪師檢校抗乃為在寺如法潔淨寫訖入袠還岐州莊所經留在莊并老子五千文同在一處忽為外火延燒堂宇是草覆一時灰蕩軌於時任馮翊縣令家人相命撥灰覔金銅軸既撥灰開其內諸經宛然如故黃色不改惟箱袠成灰又覔老子便從火化于時聞見之者莫不嗟異其金剛般若經一卷題字焦黑訪問所由乃初題經時有州官能書其人雜食行急不獲潔淨直爾立題便去由是色焦觀者起信瑞經亦存京師西明寺任自信嘉州人唐貞元十五年曽往湖南常持金剛經潔白無㸃過洞庭湖忽有異物如雲冒舟上俄頃而散舟中遂失自信不知所在久之凌波而出云至龍宫謁龍王四五人命升殿念金剛經與珠寶數十事二僧相送出宫一僧曰憑附小信至衡嶽觀音臺結真師付之云是汝和尚送來令轉金剛經至南嶽訪真師云汝和尚滅度已五六年矣唐貞元十七年段文昌自新入蜀應南康王韋臯辟命洎韋之暮年為賊嬖讒搆遂攝尉靈池縣韋尋卒賊闢知留後文昌舊與不合聞之連夜離縣至城東門闢尋有帖不令諸縣官離縣其夕陰風及返出郭二里見火兩炬夾道百步為導初意縣吏迎候怪其不前高下逺近不差欲及縣郭方滅及問縣吏向來知府帖矣時文昌念金剛經已六年數無虛日信乎志誠心堅有感必應向夾道左右乃經所著跡也後闢逆節漸露詔以袁滋為節度使文昌從弟少從軍知左營事懼及禍與監軍定計以蠟丸帛書通謀於袁事旋發悉為魚肉賊謂文昌知其謀於一時念經夜久素覺困寐門户悉閉忽聞開户而入言不畏者再三若物投按嚗然有聲驚起之際言猶在耳顧視左右吏悉睡俾燭樺四索初無所見向之門扄已開矣唐元和初漢州孔目典陳昭因患見一人著黃衣至牀前云趙判官喚爾昭問所因云至自冥間劉闢與竇懸對事要召為證昭即留坐逡巡又一人手持一物如毬胞前吏怪其遲答曰只緣此候屠行開因笑謂昭曰君勿懼噉生人氣須得猪胞君可面東側卧昭依其言不覺已隨二吏行路甚平可十里餘至一城大如府城甲士守門及入見一人怒容可惡駭即趙判官也語云劉闢取東川竇懸捕牛四十七頭送梓州稱准開判殺闢又云先無牒君為孔目典合知事實未及對隔壁聞竇懸呼陳昭好在及問兄弟妻子存亡昭即欲參見冥吏云竇使君形容極惡不欲相見昭乃具說殺牛實奉劉尚書委曲非牒也紙是麻見在漢州其私房架上即令吏領昭至漢州取之門館扄鎖乃於節竅中出入委曲至闢乃無言趙語昭爾自有一過知否竇懸所殺牛爾取一牛頭昭未及答趙曰此不同人間不可抵也須㬰見一卒挈牛頭而至昭即恐懼求救趙令檢格合决一百考五十日因問昭曽作何功德昭即自陳曽設若干齊畫某像趙云此來生福耳昭又言曽於表兄家讀金剛經趙曰可合掌昭如言有頃見黃襥箱經自天而下住昭前昭取視之即表兄所借本也標有燒處尚在又合掌其經即滅趙曰此足以免便放回令昭往一司向生祿簿檢其修短吏報云昭本名釗是金旁刀至某年改為昭更得十八年昭聞惆悵趙笑曰十八年大得作樂事何不悅乎乃令吏送昭至半道見一馬當路吏云此爾本屬可乘此即騎乃活死一日半矣蜀左營卒王殷常讀金剛經不茹葷飲酒為賞設庫子前後為人誤纍合死者數四皆非意得免至唐大和四年郭釗鎮蜀川性嚴急小不如意皆死王殷因呈綿纈郭嫌其惡弱令袒背將斃之郭有番狗隨郭卧起非使宅人逢之輒噬忽吠聲立抱王殷之背驅逐不去郭異之怒遂解趙安成都人唐大和四年在家常持金剛經日十遍會蠻冦退歸安於途中見軍器輒收置於家為仇者所告吏捕至門涕泣禮經而去為獄吏所掠遂自誣伏罪將科斷到節帥㕔枷杻自解乃詰之泣曰安不為盜皆得之巷陌每讀金剛經恐是其力節帥叱之不信及過次忽於按名下書一於字後即云餘並准法竟不知何意也及還洗浴禮經開匣視之其經揉裂折軸若壯夫之拉也妻曰某日聞庫中有聲如有斫撲乃安被考訊之時無差跌矣唐太和五年漢州什邡縣百姓王翰常在市日逐小利忽暴卒經三日却活云冥中有十六人同被追十五人散配他處翰獨至一司見一青衫少年稱是已姪為冥官㕔子遂引見准還又云是已兄貌皆不類其兄語云有寃牛一頭訴爾燒畲枉燒又曽賣竹與殺狗人作箜簇殺狗兩頭狗亦訴爾爾今名未注死籍猶可以免為作何功德翰請日持金剛經七遍與之其兄喜曰足矣及活遂捨業出家唐太和五年梓州人倪勤以武略稱因典涪州興教倉素持金剛經倉有㕔事面江甚為勝槩乃設佛像而讀經其中六月九日江水大漲惟不至此㕔下勤讀益勵洎水退周視數里室屋盡溺此㕔略不沾漬倉亦無傷人皆禮敬唐南康王韋臯鎮蜀時有左營伍伯於西山行營同大寺學念金剛經性鈍初一日才得題目其夜堡外拾薪為畨騎縛去行百餘里乃止天未明遂踣之於地以髮繫橛覆以駝罽寢其上此人唯念經題忽見金一鋌放光止於前試舉首動身所縛悉脫遂潛起逐金鋌走計行未得十餘里遲明不覺已至家家在府東市妻兒初疑其鬼具陳來由到家五六日行營將方申其逃初韋不信以逃日與至家日不差始免之唐李琚成都人大中元年四月十六日忽患疫疾恍惚之際見一人稱行病鬼王罵琚云抵犯多我來領汝云明日後共三女人同來速設酒食皆我妻也琚亦酬卒曰汝何得三妻但聞河北啾唧不覩人也及期果來至二十一日辭去琚亦拜送却回便覺身輕於佛堂作禮將喫粥却行次忽被風吹去住足不得乃至一大山見江海無涯人畜隨流琚立岸邊不知所向良久有黃衫人問曰公是何人隨我來方四五步已見江山甚逺又問作何善事若無適足於水上作猪羊等也細說恐王問琚云在成都府曽率百餘家於淨衆等造西方功德一堵於大聖慈寺寫大藏經已得五百餘卷使者讃歎引去約五十里見一大城入門數里見殿上僧長六七尺語王云此人志心造善無有欺諂王詰黃衫人於何處得文帖追平人來答云山下見領來無帖追王云急送去便見所作功德在殿上碑記分明石壁造廣利方在後使者領去又入一院令坐向琚說緣漢州刺史韋某亡欲令與作須州刺史琚都不諭六七日歸凡過十三處皆云王院悉有侍衛總云與寫一卷金剛經遂到家使人臨别執手亦曰乞一卷金剛經便覺頭痛至一塔下聞人云我是道安和尚作病卓頭兩下願得你道心堅固遂醒見觀音菩薩現頭邊立笑自此頓寤妻貌環泣云沒已七日唯心尚暖寫經與所許者自誦不怠張政卭州人唐開成三年七月十五日暴亡初見四人來捉行半日至大江濶甚渡深三尺許細看盡是膿血便小聲念金剛經使者便入城見胡僧長八尺餘罵使者何不依帖亂捉平人盡皆驚拜及領見王僧與對坐曰張政是我本宗弟子被妄領來王曰待略勘問僧色怒下判放去見使者四人皆著大枷僧自領政出城不見所渡之水僧曰吾是汝所宗和尚汝識我否我是須菩提乃知是持經之力再三拜禮僧曰弟子合眼僧以杖一擊不覺失聲乃活巴南宰韋氏忘其名常念金剛經唐光化中赴任至泥溪遇一女人著緋衣挈二子偕行登山前嶺行人相駐呌噪見是赤狸大蟲三子母也逡巡與韋分路而去韋終不覺蓋持經之力云唐姚待梓州人常持金剛經并為母造一百部忽有鹿馴戲見人不驚犬亦不吠逡巡自去有人宰羊呼待同食食了即卒使者引去見一城門上有額遂令入見王王呼何得食肉待云雖則食肉此元持經王稱善曰既能持經何不斷肉待為母寫經有屠兒李回奴來請一卷焚香供養回奴死後有人見於冥間枷鎖自脫亦生善道唐陳文達梓州郪縣人常持金剛經願與亡父母八萬四千遍多有祥瑞為人轉經患難皆免銅山縣人陳納曽為冥司所追見地下築臺問之云此是般若臺築之待陳文達其為冥司所敬如此唐薛嚴忠州司馬蔬食長齊日念金剛經三十遍至七十二將終見幢蓋音樂來迎其妻崔氏即御史安儼之姑也屬纊次見嚴隨幢蓋冉冉升天而去呼之不顧一家皆聞有異香氣前蜀王氏乾德初有小軍使陳公娶高中令駢諸孫女若人持不殺二十餘年後為男女婚娶禮須屠宰親戚言自已持戒行禮酒筵將何以娛賔也依違之際遂多庖割俄未浹旬得疾頗異口但慌言已而三宿還蘇述冥間事初被黑衣使者追攝入岐府城隍廟廟神峨冠大袖與一金甲武士晤坐使者領高見神武士言語紛紜扼腕罵曰吾護戒神將也為汝二十年食寢不遑豈期忽起殺心頓虧戒檢命雖未盡罪亦頗深須送冥司懲其故犯城隍神問高曰汝更修何善追贖過尤乎白曰誦得三傷頌一鉢和尚歌遂合掌向神厲聲而誦神與武士聳耳擎拳立聽顔色漸怡及卒章神皆涕淚乃謂高曰且歸人間宜切營善拜辭未畢颯然起坐備陳厥事自此三傷一鉢之歌人皆傳寫諷誦焉晉杜願字永平梓潼涪人也家巨富有一男名天保篤愛念年十嵗泰元三年暴病而死經數月日家所養猪生五子一子最肥後官長新到願將以作禮捉就殺之有一比邱忽至願前謂曰此㹠是君兒也方前百餘日而相忘乎言竟忽然不見四顧尋視見在西天騰空而去香氣充滿彌日乃歇東川牙將者其子嘗瘖忽一日畫地告其父曰兒宿瘴深重被兹業病聞大聖院神通欲舍身出家依止供養兾消除罪根耳父許之由是䖍潔焚修夙夜無怠經數載倐爾能言抗音清辨超於羣輩後有跛童子者觀兹竒異發願於大聖院終身苦行懴悔求福未逾期嵗忽能起行筋骨自伸步驟無礙事悉具本院碑殿右東廡有瘖僧跛童子二畫像並存山居録云黃山谷謫涪夢一女子語之曰妾生前誦法華經願身後為男子得大智慧為時名人今學士妾後身也學士年來患腋氣緣年久棺朽蟻穴兩腋故有此患能起而除之則愈矣既覺訪得其墓如言收掩其疾果愈涪翁自記于江壁普州樂至縣有臨水精舍主僧夜夢一貴人跨馬而入曰我山神也今暫還不久當復往歸寤而有金堂縣尉令狐習輿病適至信宿而卒習父撝家居初未聞習病一夕夢習緣檄歸喜甚亟迎門及下馬楫而言曰習不孝不得終事父母今當為眉山楊氏子名虞仲後二十三年仍以直言中甲科官職顯於今世矣辭訣而去父驚愕而寤其日訃至撝痛悼甚它日物色眉山楊氏實以是嵗生子及長名虞仲登第之年正習死後二十三年也提刑何慤作習墓表述其事甚詳虞仲倅遂寧日令狐氏有訟事自它郡送遂寧慮不得直乃以墓表墨本因虞仲賔達之虞仲亦隱其事然蜀人多知之者表弟沈作肅録其墓表見遺出暌車志僞蜀廣都縣百姓陳宏泰者家富於財嘗有假貨錢一萬宏泰徵之甚急人曰請無慮吾先養蝦䗫萬餘頭貸之足奉償泰聞之惻然已其債仍别與錢十千令悉放蝦䗫於江中經月餘泰因夜歸馬驚不進前有物光明視之乃金蝦䗫也出警戒録僞蜀渠陽鄰山有富民王行魁嘗養一馬甚愛之芻粟餵飼倍於他馬一日因乘往本郡遇夏潦暴漲舟子先渡馬回舟以迎王氏至中流風起船覆其馬自岸奔入駭浪接其主蒼茫之間遽免沈溺唐貞觀中有一人任嶲州於寺得一真珠像至京師諸大寺卻與千貫錢買之不肯遂毁破賣得一千三百貫後日餘患重寤寐間見一僧云何因毁壞尊像遂遣人拔其舌長尺餘苦痛呻吟數日而死德安縣令薛逵備知此事出廣古今五行記僞蜀大慈寺賜紫慈照大師昭明主持文殊閣常募化錢物稱供奉菩薩聖像積有星嵗所獲大半入已後染疾但見火燒頂至足周而復始不勝其苦悔過懴謝唱施衣物竟不獲免僞蜀金堂縣三學山開照寺夜羣冦入寺劫掠緇徒罄盡寺元有釋迦藕絲袈裟為千載之異物也賊曹令取與其妻拆而易之夫妻當時手指節節隨落鬚鬢俱墜尋事敗戮于市僞蜀潼江軍起攻取閬州兵火燒劫閭里蕩盡佛寺有一大鐘在有一卒揮大石擊鐘令碎而鬻之鐘旋破裂流逆正中卒脛雙折而死已上三則出警誡記宋元嘉初益州刺史遣三人入山伐樵路迷忽見一龜大如車輪四足各躡一小龜而行又有百餘黃龜從其後三人叩頭請示出路龜乃伸頸若有意焉因共隨逐即得出路一人無故取小龜割以為臛食之須㬰暴死唯不噉者無恙出異苑唐武德中遂州總管府記室參軍孔恪暴病死一日而蘇自說被收至官所問何故殺牛兩頭恪云不殺官曰汝弟證汝殺何故不認因呼恪弟死已數年矣既至枷械甚嚴官問汝所言兄殺牛虛實弟曰兄前言招慰獠賊使某殺牛㑹之實奉兄命非自殺也恪曰使弟殺牛㑹是實然國事也恪有何罪官曰汝殺㑹獠以招慰為功用求官實為己利何為國事因謂恪弟曰汝以證兄故久留汝兄既遣殺汝便無罪放任受生言訖弟忽不見亦竟不得言敘官又問恪因何復殺兩鴨恪曰前任縣令殺鴨供客豈恪罪耶官言曰客自有料殺鴨供之將求美譽非罪而何又問何故殺雞卵六枚曰平生不食雞卵唯憶九嵗時寒日母與六枚因煮食之官曰然欲推罪母耶恪曰不敢但說其因耳官曰汝殺他罪自當受之言訖忽見數十人來執恪將出去恪大呼曰官府亦大枉濫官聞之呼還曰何枉濫恪曰生來有罪皆不遺生來修福皆不見記者豈非濫耶官問主司恪有何福何為不録主司對曰福亦皆録量罪多少若福多罪少先令受福罪多福少先令受罪然恪福少罪多故未論其福官怒曰雖先受罪何不唱福示之命鞭主司一百倏忽鞭訖血流濺地既而唱恪生來所修之福亦無遺者官謂恪曰汝應先受罪我更令汝歸耳可勤造福因遣人送出遂蘇恪大集僧尼行道懴悔精勤苦行自說其事至七日家人辭訣俄而命終也出冥報記唐蜀郡法曹參軍曹惟恩當章仇兼瓊之時為西山運糧使甚見委任惟恩白事於兼瓊瓊與語畢令還惟恩妻生男有疾因以情告兼瓊請留數日兼瓊大怒叱之令出集衆斬之其妻聞之乘車擕兩子與之訣惟恩已辮髮束縛兼瓊出臨斬之惟恩二男叩頭謝之來抱馬足馬為不行兼瓊為之下泣云業已令矣猶未釋郡有禪僧道行至高兼瓊每師之禪僧乃見兼瓊曰恩命且盡請不須殺免之兼瓊乃赦惟恩明日使惟恩行瀘府長史事賜緋魚袋專知西山轉運使仍許與其妻行惟恩至瀘州因疾夢僧告之曰曹惟恩一生中負心殺人甚多無分毫善事今寃家債主將至為之奈何惟恩哀祈甚至僧曰汝能度兩子為僧家中錢物衣服盡用施寺仍合家素餐堂前設道場請名僧晝夜誦經禮懴延旬月之命如不能即當死矣惟恩曰諸事易耳然苦不食問口之不食若之何僧曰取羊肝水浸加以椒醬食之即餐矣既覺具告其妻妻贊之即僧二子又如言置道場轉經且食羊肝即飯矣如是月餘晨坐其亡母亡姊皆來視之惟恩大驚趨走迎候有一鬼子手執絳幡前引升自西階植幡焉其亡姊不言但於幡下儛僛僛不輟其母泣曰惟恩在生不知罪殺人無數今寃家欲來吾不忍見汝受苦辛故來視汝惟恩命祭母母食之其姊舞更不與交一言母食畢與姊皆去惟恩疾轉甚於是羊肝亦不食常卧道場中盡日眠覺有二青衣童子其長等焦僥也一坐其頭一坐足惟恩問之童子不與語而童子貌甚間暇口有四牙出於脣外明日食時惟恩見所殺人或破頭潰腸斷截手足或斬首流血盛怒而來詬惟恩曰逆賊與我同事急反殺我滅口我今訴於帝故取汝來則升階而二童子推之不得進但慢罵日中乃去惟恩知不免具言其事如此每日常來皆為童子所推不得至惟恩病月餘忽失二童子惟恩大懼與妻子别於是死者大至衆見惟恩如被曵狀墜於堂下遂卒惟恩少時有千牛備身為澤州相州判司常養賊徒數十人令其所在為盜而館之及事發則殺之以滅口前後殺百餘人故禍及也唐天寶後有張某為劒南節度使中元日令郭下諸寺盛其陳列以縱士女遊觀有華陽李尉者妻貌甚美闐於蜀人張亦知之及諸寺嚴設傾城皆至其從事及州縣官家人看者所由必白於張唯李尉之妻不至異之令人潛問其鄰果以貌美不出張乃令於開元寺選一大院遣蜀之象工絶巧者極其妙思作一鋪木人音聲關捩在內絲竹皆備令百姓士庶恣觀三日去三日滿即將進內殿百里車輿闐噎兩日李君之妻亦不來三日欲夜人散李妻乘兜子從婢一人而至將出宅人已奔走啓于張矣張乃易其衣服先往於院內一脫空佛中坐覘覷之須㬰到先令探屋內都無人乃下張見之乃神仙之人非代所有及歸潛求李尉之家來往者浮屠尼及女巫更致意焉李尉妻皆驚而拒之㑹李尉以推事受贓為其僕所發張乃令能吏深文按之奏杖六十流於嶺徼死于道張乃厚賂李尉之母强取之適李尉愚而陋其妻每有庸奴之恨遂肯置于州張寵敬無與倫比然自此後亦常髣佛見李尉在於其側令術士禳謝竟不能止嵗餘李之妻亦卒數年張疾病見李尉狀益甚明忽一日覩李尉之妻宛如平生張驚前問之李妻曰妾感公恩深思有所報李某已上訴於帝期在此嵗然公亦有人救拔但過得兹年必無虞矣彼已來迎公若不出必不敢升公之堂慎不可下言畢而去其華山道士符籙極高與張結壇場於宅內言亦略同張數月不敢降階李妻亦同來皆教以嚴慎之道又一日黃昏時堂下東廂有叢竹張見一紅衫子袖於側招已者以其李妻之來也都忘前所戒便下階奔往赴之左右隨後呌呼止之不得至則見李尉衣婦人服拽張於林下毆擊良久云此賊若不著紅衫子招肯下階耶乃執之出門去左右如醉及醒見張仆於林下矣眼鼻皆血唯心上暖扶至堂而卒出逸史南楚新聞唐黔南廉使秦匡謀以蠻寇大舉兵力不敵奔江陵節度杜悰既謁見怒其不趨庭退而使吏讓之曰汝鳯翔一民也悰兩為鳯翔節度汝今靡認桑梓耶匡謀報曰謀雖家世岐下少離中土太傅擁節已忝分符實不曽趨走台階此日況在荆南乎悰怒遣縶之發函與韋相云匡謀擅棄城池不能死王事請誅之韋奏請依悰處置敇既降悰乃親臨都市監戮之匡謀將就法謂其子曰今日之死實寃枉無狀奈申訴非及但多焚紙墨於泉下理之耳行刑觀者駕肩接踵揮刃之際悰大驚驟得疾遂輿而返俄有旋風大作飛卷塵埃直入府署乃散是夕獄吏發狂自撲而殞旬日悰卒議者以悰恃權貴枉刑戮獲兹報焉北夢瑣言成汭鎮荆州有墊江縣令崔與主簿李矩不協鄰於水火一旦羣盜劫縣殺令崔賊過後矩入宅檢校有一㕔子方避賊見矩以為與賊通明日言鎮將衆咸知矩崔失歡頗疑之執送中州推問不伏遂解送江陵禁右廂獄廂吏速於具獄催吏常某言於判官范某曰李矩詆讕須栲竟之范固不許常竟鍛鍊以成之矩臨刑戒家人多燒紙筆訟於地下才一月常某暴亡後李矩白日見身范驚仆矩曰某受判官深恩非敢造次但冥府只要為證耳及妻子以誠祈之乞容旬月區分家事雖無痛苦飲食如常但困憊踰月而卒王蜀時杜判官妻張氏士流之子與杜齊休數十年誕育一子壽過六旬而殂殁洎殯於家纍旬後卜窆于外啓墳之際覺祕器搖動謂其還魂剖而視之化作大蛇蟠蜿其中骨肉舍散俄頃徐奔林莽而去又興元靜明寺尼曰王三姑亦於棺中化為大蛇其杜妻至晚年不敬其夫夫老病視聽步履皆不任持凍餒而卒人以為化蛇其應也出玉堂閒話乾德中僞蜀御史李龜禎久居憲職嘗一日出至三井橋忽覩十餘人摧頭及被髮者呌屈稱寃漸來相逼龜禎懾懼回馬徑歸說與妻子仍誡其子曰爾等成長筮仕慎勿為刑獄官以吾清慎畏懼猶有寃枉今欲悔之何及自此得疾而亡僞蜀御史陳潔性慘毒讞刑定獄嘗以深刻為務十年內斷死千人因避暑行亭見蟢子懸絲面前公引手接之成大蜘蛛銜中指拂落階下化為厲鬼云來索命驚訝不已指漸成瘡痛苦十日而死僞蜀有尋事團亦曰中團小院使蕭懷武主之蓋軍巡之職也懷武自入內捕捉賊盜年多官位甚隆積金巨萬第宅亞于王侯聲色妓樂為一時之冠所管中團百餘人每人各養私名十餘輩或聚或散人莫能別呼之曰狗至於深坊僻巷馬醫酒保乞丐傭作及販賣童兒輩並是其狗民間有偶語者官中罔不知又有散在州郡及勳貴客當庖看廄御車執樂者皆是其狗公私動靜無不立達於懷武是以人懷恐懼蜀破之初有與已不相叶及積金藏鏹之夫日夜捕逐入院盡殺之寃枉之聲聞於街巷後郭崇韜入蜀人有告懷武欲謀變者一家百餘口無少長戮于市出王氏聞見録僞蜀華陽縣吏郝溥因追缺稅户街判司勾禮遣婢子阿宜赴縣且囑溥云不用留禁殘稅請延期輸納郝溥不允留阿宜五日仍納稅子放出明年縣司分擘百姓張瓊家物業郝溥取錢二萬張瓊具狀論訴街司追勘勾禮見溥太笑曰你今日來也莫望活千萬一死令司吏汝勳成罪遂殺之不數月汝勳見郝溥來索命翌日暴卒勾禮晨興忽見郝溥升堂羅拽毆擊因患背瘡而死僞蜀寧江節度使王宗黯生日部下屬縣皆率配財貨以為賀禮巫山令裴坦以編户羇貧獨無慶獻宗黯大怒召裴至誣以他事生沈灧澦堆水中三日尸不流宗黯遣人撑流而下經宿逆水復上卓立波面正視衛門宗黯頗不自安神識煩撓竟得疾暴卒韋承臯者僞蜀時將校也有待詔僧名行真居蜀州長平山嘗於本州龍興寺立塔十三級費鎮銀萬計尋為天火所焚第三次營立方就人說其有黃白之術也及承臯典眉州召行真至郡有盧敬芝司馬者以殖貨為業承臯常謂之曰某頃軍中與行真同入幕遇一韋處士授以作金術適來鄙夫老矣故召行真同修舊藥藥成當得分惠為吾子罷商賈之業可乎盧敬諾藥垂成韋牧坐罪貶茂州參軍臨行盧送至蟇頥津韋牧沈藥鼎於江謂盧生曰吾罪矣先是授術韋處士者吾害之而滅口今日之事藥成而禍及其有神理乎蜀郭景章豪民也因醉以酒注子打貧民趙安注子瞥入腦而死安有男景章厚與金帛遂隱其事人莫知之後景章腦上忽生瘡可深三四分見骨膿血不絶或時覩趙安瘡透喉遂死蜀錦浦坊民李貞家養狗名黑兒貞因醉持斧擊殺之李貞臨老與鄰舍惡少白昌祚爭競昌祚乘醉以斧擊貞死焉時昌祚年十九嵗與殺狗年正同昌祚小字黑兒寃怨顯然不差絲髮蜀金鴈橋有韓立善製釣鈎積有年也因食魚鯁喉成瘡脫死宇文氏僞蜀之富家也孀居國之東門嘗聞寢室上有人行命僕子升屋視之獲得野狸三頭并狸母宇文氏殺狸母而存其子焉未朞嵗宇文氏適護戎王承丕丕殺判官郭延鈞一家宇文氏并前夫一男二女下獄定罪赦男女斬宇文氏吁得非殺狸母之所報也蜀郡大慈寺律師修凖雖云奉律性甚𥚹躁庭前植竹多蟻子緣欄檻凖怒伐去竹盡取蟻子棄炭火中焚後忽患癬瘡遍頭面醫者云蟻漏瘡不可醫後竟卒王氏聞見録有沈尚書失其名常為秦帥親吏其妻很戾而不謹又妬忌沈常如在狴犴之中後因閒退挈其妻拏寄于鳯州自往東川遊索意是與怨偶永絶矣華洪鎮東蜀與沈布衣之舊呼初兄既至郊執手敘其契濶待之如骨肉遂特創一第僕馬金帛器玩無有闕者送姬僕十餘輩斷不令歸北沈亦微訴其事無心還家及經年家信至其妻已離鳯州自至東蜀沈聞之大懼遂白於主人及遣人却之其妻致書重設盟誓云自此必改從前之性願以偕老不日而至其初至亦甚柔和涉旬之後前行復作諸姬僕悉鞭箠星散良人頭面皆拏擘破損華洪聞之召沈謂之曰欲為兄殺之如何沈不可如是旬日後又作沈因人衙精神沮喪洪知之密遣二人提劒牽出帷房刃於階下弃尸於潼江然後報沈沈聞之不勝驚悸遂至失神其尸住急流中不去遂使人以竹竿撥之便隨流來日復在舊湍之上如是者三復使繫石縋之沈亦不逾旬失魂而逝得非怨偶相仇也秦民有王行言以商賈為業常負鹽鬻于巴渠之境路由興元之南曰大巴路曰小巴路危峰濬壑猿徑鳥道路眠野宿杜絶人煙鷙獸成羣食啖行旅行言結十餘輩少壯同行人持一拄杖長丈餘銛鋼鐵以刃之即短鎗也才登細徑為猛虎逐及乃露宿于道左虎忽自人衆中攫行言而去同行持刃杖逐而救之呼喊連山於數十步外奪下身上拏攫之蹤已有傷損平旦前行虎又逐至其野宿衆持鎗圍使行言居當心至深夜虎又躍入衆中攫行言而去衆人又逐而奪下則傷愈多行旅復衛而前進白晝逐人略不暫捨或跳於前或躍於後時自道左而出於稠人藂中提行言而去竟救不獲終不傷其同侣須得此人充其腹不知是何寃報逃之不獲出玉堂閒話蜀青石鎮陳洪裕妻丁氏因妬忌打殺婢金巵潛於本家埋沒仍榜通衢云婢金巵逃走後遷居夾江因夏潦漂壞舊居渠岸見死婢容質不變鎮將具狀報州追勘擬伏其婢尸一夕壞爛遂置丁氏于法録異記郫縣有民於南郭渠邊得一小蛇長尺餘刳剔五藏盤而串置於烟火之上焙之數日民家孫子數嵗忽遍身腫赤皮膚炮破呻吟痛楚異常因自語曰汝家無故殺我刳剔腸胃置於火上且令汝貌知此痛苦民家聞之驚異取蛇剗竹以水灑之焚香祈謝送於舊所良久蜿蜒而去民家兒亦平愈劍州永歸葭萌劍門益昌界嘉陵江側有婦人年五十已來自稱十八姨往往來民家不飲不食每教諭於人但作好事莫違負神理居家和順孝行為上若為惡事者我常令猫兒三五箇巡檢汝來語畢遂去或奄忽不見每嵗約三五度有人遇之民間知其是虎所化也皆敬而懼之出録異記唐末蜀人攻岐師還次于白石鎮禆將王宗信駐于普安禪院僧房時值嚴冬房中有大禪爐熾炭甚盛宗信擁妓女十餘各據僧牀寢息夜半宗信忽見一姬飛入爐中宛轉於熾炭之上忙遽救之比及離火衣服並不燋灼已又一姬飛入如前又救之頃之諸妓繼踵而入宗信亦迷悶沃水數石其火不息諸妓或出或入各迷悶失音有親吏踰隔驛墻告都招討王宗儔至則徐入房中一一提臂而出視其衣裾纎毫不燬但驚悸不寐訊之云被胡僧提入火中所見皆同宗信大怒悉索諸僧立於前令妓識之有周和尚者身長貌胡皆曰是此也宗信鞭之數百疑其有幻術而此僧實一村人新落髮一無所解耳又縛其手足取熾炭爇之亦不承宗儔知其屈遂解之使逸出王氏見聞録蘇軾作外曽祖程公逸事公諱仁霸眉山人以仁厚信於鄉里蜀平中朝士大夫憚逺宦官缺選土人有行義者攝録參軍眉山尉有得盜蘆蔔根者實竊而所持刃誤中主人尉幸賞以劫聞獄掾受賕掠成之太守將慮囚囚坐廡下泣涕衣盡濕公適過之知其寃咋謂盜曰汝寃盍自言吾為汝直之盜果稱寃移獄公既直其事而尉掾爭不已復移獄竟殺盜公坐逸囚罷歸不及月尉掾皆暴卒後三十餘年公晝日見盜拜庭下曰尉掾未伏待公而决前此地府欲召公暫對我叩頭爭之曰不可以我故驚公是以至今公壽盡今日我為公荷擔而往暫對即生人天子孫壽祿金紫滿門矣公具以語家人沐浴衣冠就寢而卒軾幼時聞此語已而外祖父壽九十舅氏始貴顯壽八十五曽孫皆仕有聲同時為監司者三人𤣥孫宦學益盛而尉掾之子孫微矣或謂盜德公之深不忍煩公暫對可也而獄久不决豈主者亦因以苦尉掾也歟紹聖二年三月九日軾在惠州讀陶潛所作外祖孟嘉傳云凱風寒泉之思實鍾厥心意悽然悲之乃記公之逸事以遺程氏庶幾淵明之心也是嵗九月二十七日惠州星華館思無邪齊書邵博字公濟洛陽人康節先生之孫紹興二年為眉州守郡有貴客素持郡縣長短通脉謝為業二千石來者為曲法奉邵雖外盡禮而凡以事來請輒不答客銜之㑹轉運副使吳均從襄陽來多以襄陽人自隨分屬州取俸邵獨不與客知吳已怒乃誣邵過惡數十條以啖吳吳大喜立劾奏之未得報即逮邵繫成都獄司理參軍韓汴懦不及事吳擇深刻吏簽判楊均主鞠之極其羅織先是眉州都監鄧安民以謹力得邵意主倉庾之出入首録置獄中數日掠死其家乞收葬不許裸其尸驗之邵懼每問即承如是半月許凡眉之吏民連繫數百死者十餘輩提㸃刑獄縉雲周彥約才知其寃亟自嘉州親詣踈决邵乃得出閲實其罪無有也但得其以酒餽游客及用官紙劄過數等事方具獄楊生即死獄吏數人繼之明年命上邵坐貶三官歸犍為西山其秋眉山士人史君正燕處見有邀迎出門從者百餘繡衫花帽馭卒控大馬甚神駿上馬絶馳目不容啓到一甲第朱門三重洞開馬從中入史欲趨至客次馭者不可徑造聽事坐上緋緑數十皆揖史君東向辭曰身是布衣安得對尊客如此其一人曰今日之事公為政何必辭吏首白曰帝君命公治鄧安民獄今來也俟君登科畢即奏迎矣史不獲已就坐缺伸而寤不為家人言密書之又明年赴廷試過荆南時吳均適帥荆得疾親見鬼物往來其前避正室不敢居無幾而死史調官還䕫峽小疾語同舟者曰吾當死君歸為報吾家人取去年秋所書觀之可也是夕果卒又二年所謂貴客者暴亡於成都驛舍又明年邵見安民露布自持文書來曰安民寃已得伸陰獄已具須公來證之公無罪也指牘尾請書名已而進曰有名無押字不可用邵又花書之始去邵知不免盛具延親賔樂飲踰六日正食間覺腸中微痛却去醫藥且衣冠待盡中夜卒家人不能舉柩歸洛於犍為之翠屏山藁葬焉蜀中廣記卷九十
