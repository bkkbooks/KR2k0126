  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0126_WYG_053-1a, image: WYG0591/WYG0591-0722c.png}
body:
  text: 蜀中廣記卷五十三明曹學佺撰蜀郡縣古今通釋第三上川東道屬重慶府管三州十七縣周巴子國秦使張儀滅巴立巴郡遂城江州二漢因之獻帝時巴分為三江州實永寧郡理梁改楚州以地鄰乎楚也隋改渝州以江受渝水也唐天寶之南平郡宋崇寧之恭州又因而屢改矣後以光宗潛邸始升府名重慶重慶者以介乎順紹二慶之間也紹慶府為今之彭水縣巴縣水經注云巴水至江州城下與岷江合也江州實縣名秦漢至南齊皆因之永明初移置僰溪口始有巴名江津縣地居江之津也南齊移江州縣於僰溪口即此西魏曰江陽後周又增置七門郡改陽為津自隋始南川縣唐初割渝州東界置六縣其一也以地枕𤏡溪南云長夀縣長夀山名寰宇記云山下有老人村也縣國初置實秦漢之枳唐之樂溫地矣志云縣東北五十里有樂溫灘即故縣址元立涪陵巡檢司於此大足縣唐乾元二年與昌州同置取豐足之義也或云縣之寶頂山有巨人迹永川縣亦唐乾元置地枕侯溪水山川濶永故以為名榮昌縣乾元間於此立昌州及昌元縣今名洪武四年改介於榮州也府志舊州埧有昌州巡檢司又云榮昌治西昌元里即唐昌元縣址亦嘗充靜南軍使綦江縣夜郎之境古綦市也舊𨽻南平軍明玉珍始置今縣國朝因之萬厯二十七年楊應龍叛入其郛踰月乃復此縣舊名賔化屬南平軍元時為綦江長官司壁山縣寰宇記云界有孤山壁立西北險峻東南削平號為重壁唐至德初置縣於此因以為名合州管銅梁定逺二縣在涪漢二水會合處秦漢及晉之墊江縣也今州西魏始置而墊江之名徙入忠州矣廢涪陵郡隋大業置志云今州治即隋之涪陵郡蓋與州同理者廢石鏡縣魏恭帝置志云涪江中有石鏡如月水落時髙可三丈有唐人題刻廢漢初縣隋大業置寰宇云即魏之清居郡也廢赤水縣隋開皇置寰宇云界有赤水之源也志曰廢赤水址在州西北百三十里廢漢初址在州西北百九十里銅梁縣蜀都賦外負銅梁唐武后長安三年置縣以界有是山也廢巴川縣寰宇云唐開元年割石鏡之南銅梁之東置巴川縣以地在巴川為名至元併入銅梁今縣有宋時巴川社倉碑定逺縣本合州之石鏡縣地宋開禧中增置河溪縣元立武勝軍行河溪安撫事尋改名定逺言永逺安定矣後改為縣國朝因之安居縣周武之柔剛縣也隋改今名屬安居郡以其地可安居矣唐宋屬普州國初併入銅梁成化中復析置廢隆龕縣在縣西二里隆龕山下唐避諱改隆為崇此縣與安嶽各有其半乃舊安居云忠州管酆都墊江二縣二漢之臨江縣梁改為郡兼置臨州矣唐改今名取巴蔓子嚴顔之節也樂子正曰地邊巴徼當懷惠而忠信矣宋以度宗潛邸升咸淳府蓋在改元之初云本志治東百里北岸有臨江城元置臨江鎮巡檢司今仍又云東南二百里廢龍渠縣宋置元省入酆都縣本巴郡枳地也漢永元二年分枳置平都縣蓋山名云改平為豐自隋始豐傍加邑國初始廢南賔縣唐武德置以屬南賔郡者郡併忠州而縣併酆都也今縣治前有南賔渡墊江縣古墊江今合州是後魏恭帝三年始置於此取漢之舊名也墊下也與昏墊同仰水下流皆得稱之蜀中見者凡三一為合州蜀志先主自墊江入涪是也一為劒州漢書地里志云梓潼江水南流四里至墊江入涪水是也一為今縣縣界有桂溪乃唐桂溪縣址涪縣管武隆彭水二縣集韻涪漚水泡也水出牂柯費州外南至黔江入州本漢涪陵縣西魏置合州乃移今州名矣按涪水咅聲在十一尤韻而七虞無此字雖古韻相通蜀人舍本從他不知何謂郡隋廢為鎮唐武德初復武隆縣漢枳地唐武德初置縣因山名曰武龍國初易隆彭水縣彭鼓聲峽水澎湃似之隋開皇中與黔州同置宋紹定間升為紹慶府以慶雲見於境也太宗時事蓋追改云廢洪杜縣洋水縣俱唐武德置今之洪杜溪洋水鄉是廢信寧縣隋大業置即今之信寧巡檢司也廢都濡縣唐貞觀置即黃山谷所稱都濡月兔茶也黔江縣秦黔中郡地隋開皇中於此置石城縣唐天寶中改名因郡舊也酉陽宣撫司秦得楚地因置縣於大酉山之陽屬黔中郡漢置郡為武陵牂柯矣唐徙治婺川縣蓋今思州是黃巢之亂酉陽內訌駙馬冉人才征之留守其地即今理也宋元升州冉氏世知州事國初改今官𨽻重慶府以石耶洞屬石耶洞長官司其洞有大石也宋宣和中楊昌安者太原楊業之裔也討平蠻亂蠻人畏服因世其地元時尚稱土知府國初歸附𨽻酉陽後邑梅洞長官司邑以樹稱在酉陽之內宋末有楊光甫者亦楊業後據其地元改為柫鄉洞矣明玉珍改邑梅軍民府國初改今官𨽻酉陽永樂初改𨽻重慶平茶洞長官司吳之黔陽縣地也五代沒於畨宋政和中得之置平茶洞猶乎葭萌以茶氏矣元改今官𨽻思州安撫後立軍民府授楊大雷為世官國初改今官屬酉陽改𨽻重慶下川東道屬夔州府管一州十二縣春秋時子國秦漢巴郡地也獻帝初平中置固陵郡尋為巴東矣唐初曰夔天寶至德之載皆稱雲安郡乾元以後復稱夔至今按山海經岷山多夔牛注爾雅犩牛即犪牛也肉數千斤出蜀山或地有此獸或山形似之如犍為之類江關都尉兩漢立漢書地里志云江關都尉理魚復是也白帝城公孫述立郡國志云述至魚復有白龍出井中因號魚復為白帝城是也永安郡蜀先主立三國志云先主伐吳不利自夷道還改白帝為永安郡是也三巴校尉宋太始年立寰宇記云山峽險隘多盜賊乃立三巴校尉以鎮之是也信州梁天監年立方輿云梁置信州治白帝城周移治永安宫南是也其後王孟二蜀以施夔忠萬置鎮江軍後唐改寧江軍節度使宋因之南渡後升為帥帶歸峽州兵甲司公事今下關城即江關瞿唐右所設白帝城學宫即永安宫址而材官屯戍皆𨽻楚以示犬牙相制之義奉節縣春秋時魚邑漢晉魚復縣也西魏易為魚人屬信州唐貞觀中改今名州廢而節存不忘信矣巫山縣楚為郡秦漢為縣皆曰巫矣加山字自隋始治南有山如其字也晉曽置建平郡於此大昌縣本巫地晉置建昌縣尋改泰昌矣今名後周以避諱也後周宇文泰大寧縣晉北井縣周併入大昌矣宋開寶中始以鹽井地置大寧監與治側永安城相對取安寧之義也宋升為州領縣五其一為大昌國朝降縣與大昌俱隸夔其四縣割入陜之漢中雲陽縣朐䏰舊縣地在縉雲山之陽也宋張灝記形勝東有瞿塘西有縉雲矣後周為雲安縣宋置軍監元改今名萬縣梁置萬州於宣漢縣云其地有萬頃紀數也蜀漢之南浦縣以浦名後周之萬川郡以川名俱在縣治距治西百二十里武寧巡檢司則隋武寧縣之故址梁山縣西魏有魚泉縣分胊䏰所置今縣又分自魚泉矣以髙梁山為名張載所謂巖巖梁山者也尾入岷江開縣今理舊漢豐縣亦析胊䏰置也後魏末年置開合二州以對待立義矣其曰盛山郡者以山名曰開江縣者以江名曰萬嵗縣者以谷名曰新浦縣者以浦名盛山開江俱在治前萬嵗新浦相距兩舍新寧縣宕渠之地西魏廢帝始置取寧靜之義也建始縣漢巫縣地吳孫休改巫為建平郡始置今縣依郡立名也唐以後𨽻施州本朝𨽻夔達州管東鄉太平二縣宕渠之東界朐䏰之西界其地居四逹矣後漢之宣漢縣梁之萬州西魏隋唐之通州通川郡更迭為稱宋改今名以别於淮南之通州也廢井州廢石城縣俱後魏廢帝立廢永睦縣廢三岡縣俱梁大同立井州石城即宣漢地永睦三岡相距百里東鄉縣梁有新安縣析宕渠西界置西魏再析而為今縣與漢中西鄉分界故别之縣有巴渠里即舊巴渠縣址太平縣國朝正德十年割東鄉之太平里置因以為名石砫宣撫司漢屬牂柯郡後周以之置施州矣唐改曰清江郡重慶志以為宋之南賔縣也景定中有馬什用破元兵授鎮國上將軍石砫安撫領銅牌鐵印世守其地國朝初改為宣撫按宋地志南賔縣舊屬忠州寰宇記牂州有賔化建安二縣賔化無事迹建安下載石潼柱蒲二關其殆合之以成義耶砫字韻不載疑即柱𨽻夔州府遵義道屬遵義軍民府管一州四縣漢夜郎且蘭二縣地屬牂柯郡唐貞觀始置郎州尋改播州乾符中沒於南詔太原人楊端收復之遂世有其地曰安撫司宋大觀改遵義軍取唐縣名也元升播州宣撫司國朝改宣慰萬厯二十六年楊應龍反蕩平改府仍取唐名遵義縣唐貞觀中與郎州同置初名恭水再改而為今名即元之播州鎮撫也國朝改長官司萬厯二十六年平楊酋改置桐梓縣亦平播置唐武德中以梓潼縣為充州開元改夜郎縣即此也縣曰桐梓存其半驛曰夜郎仍其舊真安州唐貞觀中置播川鎮尋改珍州以界有降珍山也宋乾德中刺史田遷乞改為西髙州元復珍州明玉珍據蜀改為真州自諱也國朝因之為長官司播平改流加安字綏陽縣隋大業中置屬思州宋大觀中於此置承州宣和中州廢地𨽻珍州今縣蕩平後置志云治在斤竹里又云黔之龍泉縣有綏陽場名本此仁懷縣唐貞觀五年置芙容縣從山名也地有仁水今縣從水名蜀中廣記卷五十三
