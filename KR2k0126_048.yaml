body:
  text: 蜀中廣記卷四十八明曹學佺撰宦游記第二川南道屬三國鄧方南郡人以荆州從事隨先王入蜀為犍為屬國都尉章武三年卒史臣贊曰揚威才幹欷歔文武當官理任衎衎辦舉圖殖財施有義有叙陳震南陽人昭烈時拜犍為郡建興中遷尚書令奉命使吳孔明與兄瑾書曰孝起忠純之志老而彌篤及其贊述東西歡樂和洽有足貴者入吳與權㰱盟定好還封城陽亭侯晉周楚字元孫廬江潯陽人起家參征西軍事從父撫入蜀拜鷹揚將軍犍為太守父卒以楚監梁益二州軍假節襲封建城縣公世在梁益甚得物情時梁州刺史司馬勳作逆楚與朱序討平之廣漢妖賦李宏與大寇李金銀為亂僞稱李勢子當王又隴西人李高亦詐李雄子破涪城梁州刺史楊亮失守楚遣其子討平之是歲卒子瓊嗣徑烈有將略歷數郡代楊亮為梁州刺史建武將軍初氐人竇衝求降朝廷以為東羌校尉後衝反欲入漢川以安定人皇釗京兆人周勳等謀納衝瓊密知收釗勳等斬之而難熄瓊亦尋卒子虓嗣六朝張允濟青州北海人隋大業中為武陽令務以德教訓下百姓懷之𤣥武縣與之鄰有人以㹀牛依其妻家者八九年牛孳産至十餘頭及將異居妻家不與縣司纍政不能決其人乃詣武陽質於允濟允濟曰爾自有令何至此也其人垂泣不止具言所以允濟遂令左右縳牛主以衫䝉其頭將詣妻家村中云捕盜牛賊召村中牛悉集各問所從來處妻家不知其故恐被連及指其故所訴牛曰此是女壻家牛也非我所知允濟發䝉謂其妻家人曰此即女壻可以牛歸之妻家乃叩頭服罪𤣥武縣司聞之皆大慙又嘗道逢一老母種葱者結菴守之允濟謂母曰但歸不煩守也若遇盜當來告令老母如其言歸居一宿而葱大失母以告允濟悉召葱地十里中男婦畢集允濟呼前驗問果得盜葱者曽有行人候曉先發遺衫於路行十數里方覺或謂曰我武陽縣內路不拾遺但能回取物必在如言果得唐馮元常相州安陽人高宗時纍遷監察御史為劒南道巡察使興利除害蜀土賴焉俄而天下嶽牧集乾陵㑹葬則天不欲元常赴陵所中途改授眉州刺史劒南先時光火賊夜掠居人晝潛山谷元常至喻以恩信許其首露仍切加捕逐賊徒捨器杖面縳自陳者相繼韋仁壽萬年人高祖入關遣使定巴蜀使者承制拜仁壽巂州都督府長史時南寧州內附朝廷每遣使安撫類皆受賄邊人患之或有叛者高祖以仁壽素有能名令檢南寧州都督寄聽政於越巂使每歲一至其地以慰撫之仁壽將兵五百人至西洱河承制置八州十七縣授其豪帥為牧宰法令清肅人懷歡悅及將還酋長號泣曰天子遣公鎮撫南寧何得便去仁壽以城池未立為辭諸酋長乃相與築城立廨舍旬日而就仁壽又曰吾奉詔但令巡撫不敢擅住及將歸蠻夷父老揮涕相送因遣子弟隨之入朝貢方物高祖大悅仁壽復請徙居南寧以兵鎮守有詔特聽以便宜從事令益州給兵送之刺史竇軌害其功託以蜀中山獠反叛未遑逺略不時發遣經歲餘仁壽病卒李百藥唐貞觀中為夾江令有文學士子化之嘗撰北齊書五十卷岑參南陽鄧州人天寶間進士杜甫薦之遷侍御史出拜嘉州敏于政事有嘉州詩集劉贊蜀王衍時仕為嘉州司户時衍學士韓昭等為狎客陪宴後宫宫女雜坐為宴歌謔浪鄙褻贊獻陳後主三閣圖并作歌以詠衍雖不罪不能用也栁玭京兆人龍紀三年自渝州刺史徙瀘州操行亷直綽有家風薛能汾州人咸通中以監郡攝嘉州事為政嚴察杜絶私謁有江山集行於世宋袁繼忠并州人乾德中征蜀𨽻大將劉廷讓麾下既克蜀除嘉州監軍死之日家無餘財縉紳稱之張宗誨齊賢之次子天聖間為富順監守有治行赤崖蠻感其德化納地請降羅拯祥符人知榮州時州介二江每水漲輒犯城郭拯作東西二堤以除其患後歷轉運使所至有惠政張逸天禧中知青神縣多異政縣有松柏灘歲恆溺死人逸禱神不踰月徙數里自是無溺者吕由聖河南人知雅州八年去之日傾城人擁馬攀留皆垂涕不忍釋弟由誠繼知州事亦稱精敏有惠政燕肅字穆之青州人第進士知臨卭縣削木為牘民訟有連逮者書其姓名使自召之皆如期至判尚書刑部建言州郡疑獄及情可憫者皆得覆奏石介魯人為嘉州判官樂善惡惡遇事敢為州人立祠祀之魏了翁作記段思恭晉城人蜀平通判眉州時亡命集衆攻逼州城思恭募軍士先登者厚賞於是諸軍賈勇大敗賊思恭矯詔以上供錢帛給之度支請按其罪太祖憐其果幹不許張及知臨卭時太守遣吏於縣决堰值農事方興及曰涸民田引水以事嬉遊可乎令可去水不可導守斂容謝之張價淳熙間知榮州崇尚風教清介卓立有興學講道之功諸生塑其像于學宫曹友聞字允叔栗亭人彬十二世孫也積官眉州防禦使左驍衛大將軍利州駐劄弟萬差知同慶府董仙駐劄友聞引兵扼仙人關諜聞元兵合西夏女真回回吐蕃渤海軍五十餘萬大至友聞語萬曰國家安危在此一舉衆寡不敵惟當乘高據險出竒匿伏以待之元兵攻武休關敗都統李顯忠軍遂入興元欲衝大安制置使趙彥呐檄友聞控制大安以保蜀口友聞馳書彥呐曰吾重兵在此敵有後顧之憂必不能越沔陽而入蜀又有曹萬王宣首尾應援可保必捷大安平曠無險可守正敵騎所長步兵所短况衆寡不敵豈可於平地控禦彥呐不以為然一日持小紅牌來速者七友聞議以為寡擊衆非乘夜出竒內外夾擊不可乃遣萬及仲弟友諒引兵上雞冠隘多張旗幟示敵堅守友聞選精鋭萬人夜渡江密往流溪設伏約曰敵至內以鳴鼓舉火為應元兵至萬出逆戰矢石如雨萬身被數創令諸軍舉烽友聞遣諸將分擊前後隊友聞親帥精兵三千人疾馳至隘下先遣保捷軍統領劉虎帥敢死士五百人衝前軍前軍不動虎衆銜枚突戰㑹大風雨諸將請俟少霽友聞斥曰緩必失機遂擁兵齊進友聞入龍尾頭萬聞之五鼓出隘口與友聞㑹內外兩軍皆殊死戰血流二十里黎明元兵益增乃以鐵騎四面圍繞友聞嘆曰此殆天乎吾有死而已於是殺所乘馬以示必死血戰愈厲與弟萬俱死軍盡沒元兵遂長驅入蜀先是紹定中有陳寅知西和州元兵圍州城援不至城陷寅顧其妻杜氏曰若速自為計杜厲聲曰安有生同君祿死不共王事者即登高堡自飲藥二子及婦俱死母傍寅斂而焚之乃朝服登戰樓望闕焚香泣曰臣始謀守此城為蜀藩籬城之不存臣死分也臣不負國臣不負國再拜伏劒而死賔客二十八人俱死一子後至亦欲自裁軍士抱持之曰不可使忠臣無後與俱縋城亦折足死時推官賈子坤潼川人攝通判協力城守城陷子坤朝服與其家十二口死之子仲武仲武子昌忠純孝純孝至朝散郎崖山師敗抱二女偕妻牟同蹈海死俞興理宗時守嘉州元兵圍城五旬興夜開關力戰而圍解詔俞興一十六人各官五轉尋以興為四川制置副使知嘉定府事兼成都安撫副使理宗曰俞興嘉定城下之捷尤為竒偉賜金帶有差蜀中廣記卷四十八
