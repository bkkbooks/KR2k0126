body:
  text: 蜀中廣記卷七十八明曹學佺撰神仙記第八附録方術任文公巴郡閬中人也父文孫明天官風星祕要又曉遁甲能役使鬼神文公少修父術州辟從事哀帝時有言越嶲大守欲反刺史大懼遣文公等五從事檢行郡界潜伺虛實共止傳舍時暴風卒至文公遽起白諸從事促去當有逆變來害人者因起駕速驅諸從事未能自發郡果使兵殺之文公獨見免後為治中從事時天旱白刺史曰五月一日當有大水其變已至不可防救宜令吏人豫為其備刺史不聽文公獨儲大船百姓或聞頗有備防者到日日甚烈又急命促載使白刺史刺史笑之日將中天北雲起須臾大雨至晡時湔水涌起十餘丈突壞廬舍所害數千人文公遂以占術馳名辟司空掾平帝即位稱疾歸家王莽篡後文公推數知當大亂乃課家人負物百斤環舍趨走日數十時人莫知其故後兵冦並起其逃亡者少能自脫惟文公大小負糧捷步悉得完免遂奔子公山十餘年不被兵革公孫述時蜀武擔石折文公曰噫西州智士死我乃當之自是常㑹聚子孫設酒食後三月果卒故益部為之語曰任文公智無雙後漢書楊由字哀侯蜀郡成都人也少習易并七政元氣善風雲占候為郡文學掾時有大雀夜集於庫樓上太守廉范以問由對曰占郡內當有小兵然不為害後二十餘日廣柔縣蠻夷反殺傷長吏郡發庫兵擊之又有風吹削哺太守以問由對曰方當有薦木實其色黃赤頃之五官掾獻橘數苞由嘗從人飲敕御者曰酒若三行便宜嚴駕既而趣去後主人舍有鬬相殺者人問何以知之由曰向社中木上有鳩鬬此兵賊之象也其言多驗著書十餘篇名曰其平按益部耆舊傳文學令豐持雞酒以奉由時有客不言客去豐起欲取雞酒由止之曰向風吹削胏當有持雞酒來者度是二人豐曰實在外須客來取耳顔氏家訓曰削胏削札牘之柿耳古者書誤則削之風角書曰庶人風者拂地揚塵轉削也段翳字元章廣漢新都人也習易經明風角嘗告大度守津吏曰某日當有書生二人荷擔問翳舍處者幸為告之後竟如其言又有一生來學積年自謂略究要術辭歸鄉里翳為合膏藥并以簡書封於筒中告生曰有急發視之生到葭萌與吏爭渡津吏撾破從者頭生開筒得書言到葭萌與吏鬬頭破者以此膏裹之生用其言創者即愈生歎服乃還卒業翳隱居竄跡終於家門人稱為段夫子王符論曰郭玉者廣漢人也初有老父不知何出常漁釣於涪水因號涪翁乞食人間見疾者時下針石輒應時而見效乃著針經診脉法傳於代弟子程髙尋求積年玉乃授之髙亦隱跡不仕和帝時玉為大醫丞多有效應帝竒之乃試令嬖臣美手腕者與女子雜處帷中使玉各診一手問所疾苦玉曰左陽右隂脉有男女狀酷異人臣疑其故帝歎息稱善玉仁愛不矜雖貧賤厮養必盡其心力而至療貴人時或不愈帝乃試令貴人羸服變處一針即差召問狀對曰醫之為言意也腠理至微隨意用巧針石之間毫芒即乖神存於心手之際可得解而不可得言也大貴者處尊髙以臨臣臣懷怖懾以之其為療也有四難焉自用意而不任臣一難也將身不謹二難也骨節不强不能使藥三難也好逸惡勞四難也針有分寸時有破漏重以恐懼之心加以裁慎之志臣意且猶不盡何有於病哉此其所為不愈也帝善其對年老卒官論衡曰廣漢陽翁偉能聽鳥獸之音乘蹇馬之野而田間有放馬者相去數里鳴聲相聞翁偉謂其御曰彼放馬目眇其御曰何以知之曰罵此轅中馬曰蹇馬蹇馬亦罵之曰眇馬御者不信使往視之馬目竟眇益部耆舊傳曰楊宣為河內太守行縣有羣雀鳴桑樹上宣謂吏曰前有覆車粟此雀相隨欲往食之行數里果如其言拾遺記云周羣字仲直巴西閬中人也入岷山采藥見一白猿從絶峰下對羣而立羣抽所佩書刀投猿猿化為一老翁手握玉版長八寸羣駭問曰翁是何年生答曰已衰邁也忘其年月猶憶軒轅之時始學厯數風后容成皆黃帝之史就余授厯術至顓頊時考定日月星辰之運尤多差異及春秋時有子韋子野禆竈之徒權略雖驗未得其門邇來世代興亡不復可記因以相襲至漢洛下閎頗得其㫖也言訖以版授羣忽然不見羣由是精勤算術及考校年厯之運驗於圖緯知蜀應滅及明年歸命奔吳之兆蜀人稱為後聖沈約蜀闖公傳曰梁天監中有蜀闖公者以術謁武帝帝見之甚恱因命沈隱侯約作覆將與百寮共射之時太史適獲一鼠約匣而緘之以獻帝筮之遇蹇之噬嗑帝占成羣臣受命獻卦者八人有命待成俱出帝占決置諸青蒲中命闖公揲蓍對曰聖人布卦其象告矣依象辨物何取異之請從帝命卦時八月庚子日巳時闖公奏請沈約舉帝卦上一蓍以授臣既撰占成置於青蒲而退讀帝占曰先蹇後噬嗑是其時內艮外坎是其象坎而盜其鼠也居蹇之時動而見嗑其拘繫矣噬嗑六爻四無咎一利艱貞非盜之事上九荷校滅耳凶是因盜獲戾必死鼠也羣臣蹈舞呼萬嵗帝自矜其中頗有喜色次讀八臣占詞或辨於色或推於氣或取於象或演於爻或依鳥獸龜龍隂陽飛伏其文雖𤣥逺然皆無中者末啓闖公占曰時日王相必生鼠矣且隂陽晦而入文明從靜止而之震動失其性必就擒矣金盛之月制之必金子為鼠辰與艮合體坎為盜又為隱伏隱伏為盜是必生鼠也金數於四其鼠必四離為文明南方之卦日中則昃況隂類乎爻之九四死如棄如置其事也日殺必死既見生鼠百寮失色而尤闖公曰占辭有四今者唯一何也公曰請剖之帝性不好殺自恨不中及至日昃鼠且死矣因令剖之果妊三子是日帝移闖公於五明殿西閣示更親近其實囚之唯朔望伏臘得於義賢堂見諸學士軍國疑議亦莫不參預焉袁天綱蜀郡成都人父璣梁州司倉祖嵩周朝厯犍為蒲江二郡守車騎將軍曾祖逹梁朝江黃二州刺史天綱少孤貧好道藝精於相術唐武德中為火井令貞觀六年秩滿入京太宗召見謂曰巴蜀古有嚴君平朕今有爾自顧何如對曰彼不逢時臣遇聖主臣當勝也隋大業末竇軌客逰劒南德陽縣與天綱同宿以貧苦問命天綱曰君命上伏犀貫玉枕輔角又成就從今十年後必富貴為聖朝良佐右輔角起兼復明當於梁益二州分野大振功名武德初軌為益州行臺僕射既至召天綱謂曰前於德陽縣相見忘耶深禮之更請為審天綱瞻視良久曰骨法成就不異往時然目色赤脉貫童子語亦浮面為將多殺人願深自戒後果多行殺戮武德九年軌被徴詣京謂天綱曰更得何官對曰面上家上坐位不動輔角右畔光澤更有喜色至京必蒙聖恩還來此任其年果重授益州都督天綱初至洛陽在清化坊安置朝野歸湊人物常滿是時杜淹王圭韋挺三人來見天綱謂淹曰蘭臺成就學堂寬廣必得親紏察官以文藻見知謂圭公法令成就天地相臨從今十年當得五品要職謂挺公面似大獸文角成就必得貴人攜接初為武官又語淹二十年外重恐三賢同被責黜暫去即還後淹遷侍御史武德中為天策府兵曹文學館學士王圭為太子中允韋挺自隋末隱太子引之為率武德六年俱配嶲州淹等至益州見天綱請曰袁君前日洛邑之言皆如髙㫖今形勢如此更為一看天綱曰公等骨大勝往時不久即回終當俱享榮貴至九年六月俱追入又過益州造之天綱曰杜公至京即得三品要職年壽非天綱所知王韋二公在後當得三品兼有壽然晚途皆不深遂韋公尤甚及淹至京拜御史大夫檢校吏部尚書贈天綱詩曰伊吕深可慕松喬定是虛乘風終不得脫屣欲安如且珍紈素美當與薜蘿踈歸逢楊得意非復久閒居王圭尋為侍中出為同州刺史韋挺厯蒙州刺史並卒於官皆如言貞觀八年敇詣九成宫於時中書舍人岑文本來見天綱曰舍人學堂成就眉覆過水文才振於海內頭有生骨猶未大成後視之全無三品前視三品可得然四體虛弱骨肉不相稱得三品恐是損夀之徴後文本官至中書令尋卒房𤣥齡與李審素同見房曰李君恃才傲物書生得相何官答云五品未見若六品已下清緊官有之李不復問云視房公得何官天綱云此大人富貴公若欲得五品即求此人李初不信後房公為宰相李為起居舍人卒髙宗往言令房贈五品官房奏贈諫議大夫焉侍御張行成馬周同詣天綱天綱曰馬侍御伏犀貫腦兼有玉枕文背如負物當富貴不可言近古以來君臣道合罕有如公者但面色赤命門色黯耳後骨不起且又無根恐非壽者後位至中書令兼吏部尚書卒年四十八謂行成曰公五嶽四瀆成就下亭豐滿得官雖晚終居宰相之地行成後至尚書右僕射申公髙士廉謂天綱曰君後更何官天綱曰自知相祿已絶不合更有恐今年四月大厄不過四月果卒矣先是蒲州刺史蔣儼幼時天綱為占曰此子當纍年幽禁後大富貴從某官位至刺史年八十三其年八月五日午時祿絶儼後征遼東沒賊囚於地牢七年髙麗平定歸得官一如天綱所言至蒲州刺史八十三謂家曰袁公言我八月五日祿絶其死矣設酒饌與親故為别果有敕至放致仕遂停祿後數年乃卒李義府僑居於蜀天綱見而竒之曰此郎貴極人臣夀不長耳因請舍之指其子謂李曰此子七品相願公挈之義府許諾因問夀對曰五十二外非所知也義府後為安撫使李大亮侍中劉垍等連薦得召見自門下典儀超拜監察御史其後位夀皆如天綱之言贊皇公李嶠幼有清才昆弟五人皆年不過三十而卒唯嶠已長成矣母憂之益切請天綱天綱曰郎君神采清秀而壽恐亦不出三十其母大以為戚嶠時名振咸望貴逹聞此言不信其母盛饌延袁坐細診視云定矣又請同嶠書齊連榻而寢袁登牀穩睡嶠獨不寢至五更忽睡袁適覺視嶠無喘息以手覆之鼻下氣絶初大驚怪良久偵候其出入息乃在耳中撫而告之曰得起賀其母曰數候之皆不得今方得之郎君必大貴夀是龜息也貴夀而不富耳後果如其言則天朝拜相而家常貧是時帝數幸宰相宅見嶠卧青色帳帝歎曰國相如是殊乖大體賜御用繡羅帳焉嶠寢其中逹曉不安覺體生疾遂自奏曰臣少被相人云不當華故寢不安焉帝歎息久之又陜州刺史王當有女集州縣文武官令天綱揀壻天綱曰此無貴壻唯識果毅姚某者有貴子可嫁之中必得力當從其言嫁之時人咸笑焉乃元崇也時年二十三喜獵都未知書常詣一親飲有相者謂之曰公後富貴言訖而去姚追而問之相者曰公甚貴為宰相歸以告其母母勸令讀書崇遂割放鷹鷂折節勤學仕竟至宰相則天之在襁褓也士彠令袁相妻楊氏天綱曰夫人當生貴子乃盡召其子觀之謂元慶元爽可至刺史終亦屯否見韓國夫人曰此女大貴不利其夫則天時在懷抱衣男子衣服乳母抱至天綱大驚曰龍睛鳳頭貴之極也若是女當為天下主矣已上俱出感定録能改齊漫録云隋末袁天綱築室於閬州蟠龍山岐陽李淳風聞其名齎金自逺師之他日同行郊野見牛迹袁語淳風曰此牛迹能知牝牡否淳風曰不知袁曰乃牝而有孕者又左目必傷當産一牡犢淳風尋問之皆驗以為有術袁曰非術也牛之有孕左重牡也右重牝也吾視牛迹左足深必牡也惟食右邊草必左目傷也淳風歎曰君術可及智不可及也定命録天綱有子容師傳其父業所言亦驗官為廪豨令顯慶中與賈文通同供奉髙宗以銀合盛一鼠令諸術數人射之皆言有一鼠容師亦曰鼠也然入一出四及開合鼠已生三子矣容師常與一書生同過江登舟訖遍視舟中人顔色謂同侣曰不可速也遂相引登岸私語曰吾視舟中數十人皆鼻下黑氣大厄豈可知而從之少留舟未發間忽見一丈夫神色髙朗跛一足負杖驅驢登舟容師見此人乃曰可行矣貴人在內吾儕無憂也登舟至中流風濤忽起危懼雖甚終獲濟焉驅驢丈夫乃婁師德也後位至納言又云張柬之任青城縣丞年六十二矣有善相者云後當位極人臣衆莫之信後應制策被落值則天怪中第人少令於落人中更揀有司奏一人策好緣書寫不中程律故退則天覽之以為竒才召入問策中事特異之即收上第拜王屋縣尉後至宰相封漢陽王朝野僉載周長安初前遂州長江丞夏文榮者能判冥事張驚時御史出為處州司倉暫歸往問焉榮以杖畫地作栁字曰君當為此州後半年除栁州乃改德州平昌令又蘇州喜興令楊庭玉則天之表侄也貪賄無厭著詞曰回波爾時庭玉打僚取錢未足阿姑婆見作天子傍人不得掁觸差攝御史康𧦬推奏斷死其母在都見文榮榮索一千張白紙一千張黃紙為祭祝曰後十日來母如言至榮曰且免死矣後六日內有進止果六日有敇楊廷玉改盡老母餘年又天官令史栁無忌造榮榮書衛漢栁字曰衛多不成漢栁二州交加不定後果唱衛州録事間重又唱漢州録事時鸞臺鳳閣令史唱栁州進狀訴天官注擬不平則天責侍郎崔𤣥暐暐奏臣注官極平則天曰若爾吏部令史鸞臺令史交換遂以無忌為栁州平陽主簿鸞臺令史為漢州録事焉松囱雜録𤣥宗幸東都偶秋霽與僧一行共登天宫寺閣臨眺久之上遐顧悽然發歎數四謂一行曰吾甲子得終無患乎一行進曰陛下行幸萬里聖祚無疆及西幸至成都前望大橋上舉鞭問左右曰是橋何名節度使崔圓躍馬前進曰萬里橋上因追歎曰一行之言果符吾無憂矣酉陽雜爼云房琯太尉祈邢和璞算終身之事邢言若來由東南止西北祿命卒矣降魄之處非館非寺非途非署病起於魚飱休於龜兹板後房自袁州除漢州及罷歸至閬州舍紫極宫適道士雇工治木房怪其木理成形問之道士稱數月前有賈客施數假龜兹板今治為屠㢝也房始憶邢之言有頃刺史具鱠邀房房歎曰邢君神人也乃具白於刺史且以龜板為託其夕病鱠而終河東記云唐進士吕羣元和十一年下第逰蜀性粗偏不容物僕使者切齒恨之時過褒斜未半所使多逃去唯餘一厮養羣意悽悽行涎山嶺歇鞍放馬策杖尋徑不覺數里杉松甚茂臨溪架木有一草堂境頗幽逈似道士所居但不見人步入後齊有新穿土坑長可容身其深數尺中植一長刀傍置二刀又於坑傍壁上大書云兩口加一口即厭矣羣意謂術士厭勝之所亦不為異即去行一二里問樵人向之所是者誰氏樵人曰近地無此處因返窺之則不見矣後但遇衆㑹之所必先訪其事或解曰兩口君之姓也加一口品字也三刀州字亦象也君後位刺史二千石矣羣心然之行至劒南界計州郡所獲百千餘遂於成都買奴馬服用行李復泰成都人有曰南豎者凶猾無狀貨久不售羣則以二十緡易之既而鞭撻毁罵奴不堪命遂與其傭保潜起戕殺之心伺便未發羣至漢州縣令為羣致酒晏時羣新製一緑綾裘甚華潔縣令方然蠟淚數滴汚羣裘上戲曰僕且拉君此裘羣曰拉則為盜矣復至眉州留十餘日逗宿正見寺奴欲害之適遇寺僧有老病將終待燭不絶其計不行羣此夜忽不樂乃於東壁題詩二篇其一曰路行三蜀盡身及一陽生賴有殘燈火相依坐到明其二曰社後辭巢燕霜前别蒂蓬願為蝴蝶夢飛去覓關中題訖吟諷久之兩行淚下明日冬至扺彭山縣縣令相訪羣形貌索然謂令曰其殆將死乎意緒不堪寥落之甚縣令曰聞君有刺史三品之說是得自寬也即為置酒極歡至三更羣大醉舁歸館中奴等已於羣寢牀下穿一坑大深數尺羣至則舁置坑中斷其首又以羣所攜劒當心釘之覆以土訖各乘服所有衣裝鞍馬而去後月餘奴黨至成都化鬻衣物略盡有一奴分得緑裘徑將北歸却至漢州街中鬻之遇縣令偶出見之識其蠟淚所汚擒而問焉即皆承伏時丞相李夷簡鎮西蜀盡捕得其賊乃發羣死處於褒中所見如影響焉杜悰在西川日厚待門下術士李生時馬植罷黔南赴闕取路至成都李見之謂悰曰受相公恩久思有以效答今得矣黔中馬中丞非常人也相公當厚遇之悰未信一日又密言於悰曰相公將有甚禍非馬中丞不能救乞厚結之悰感其意乃發厚幣贈植仍令邸吏為植於闕下買宅生生之費無闕焉植心感悰不知其㫖尋除光祿寺卿報狀至蜀悰謂李生曰貴人作光祿勳矣曰姑待之稍進大理卿又遷刑部侍郎充鹽鐵使悰始驚憂俄而作相懿安皇后宣宗幽崩悰懿安子壻也忽一日內榜子索檢責宰臣元載故事植喻㫖翌日御延英為萬端營救且素辨博能回上意事遂寢出感定録西川節帥段文昌字景初父鍔為枝江宰後任江陵文昌幼少好屬文長自渚宫困於塵土乃逰成都謁韋南康韋與奏釋褐道不甚行遂去南康之府值金吾將軍裴邠鎮梁州辟為從事轉假廷評裴公府罷因抵興元城西四十里有驛曰鵠鳴後濵漢江前倚巴山有清僧依其隈不知何許人也常默其詞忽復言未嘗不中公聞之徑詣求宿願知前去之事自夕逹旦曽無言忽問蜀中聞極盛旌斾而至者誰公曰豈非髙崇文乎曰非也更言之公曰代崇文者武黃門也清公曰十九郎不日即為此人更盛公尋徴之便曰害風阿師不知因大笑而止由是頗亦自負戶部員外韋處厚出為開州刺史段公是時任都官員外判鹽鐵案送出都門語處厚過鵠鳴先訪清公因問還期曰一年半嵗一年半嵗又問終止何官對曰宰相須江邊得又問段十九郎何如答已說近也及歸朝正三嵗重言一年半嵗之驗長慶初段果自相位節制西川惟處厚不喻江邊得宰相廣求智者解焉或有旁徴義者謂必除浙西夏口而入拜及文宗皇帝踐祚自江邸首命處厚為相至是方驗乃與鄒平公發役修清公塔因刻石記其事戎幕間談蜀川有費雞師者善知將來之事為人禳救多在卭州時有一僧言雙流縣保唐寺有張三師者因巡寺有空院將欲住持率家人掃灑之際座上得一小瓶子有蛇在瓶內覆而出之約長一尺文彩斑駁五色備具令人策送於寺外當棖掇之際隨觸隨大以至丈餘如屋椽焉二人擔之方舉置處距寺約三二里撼動之時猶增長不已衆益懼遂擊傷至於死明日有虹霓亭午時下此寺中有至臨卭見雞師說之雞師曰殺龍女也張三師與僧徒皆當死後卒如言其他應驗類此竟不知是何術韋約長兄為杜元頴從事弟妹皆識費師在京中已曽知有此事及到蜀詢訪其術凡病者來告師即抱一雞而往及其門乃持咒其雞令入於內抵病者之所雞入而死病者差雞出則病者不起矣時人遂號為費雞師又石子置病者腹上作法結印其子斷者其人亦不起也又能書符先焚為灰和湯水與人吞之俄復吐出其符宛然按酉陽雜爼云唐蜀費雞師目赤無黑晴本濮人成式長慶初見之已七十餘或為解疾必用一雞設祭於庭又取江石如雞卵令疾者握之乃踏步作氣噓叱雞旋轉而死石亦四破成式舊家人朱安初不信嘗謂曰爾有厄因丸符逼令吞之復去其左足鞋及襪展視符文在足心矣又謂奴滄海爾將病令袒而負戶以筆再三畫於外大言曰過過黑跡遂透其背焉北夢瑣言東川顧彥朗以蔡叔向為副使感微時之恩雖為戎卒而嘗加敬其弟彥暉嗣襲酷好潔淨嘗嫌奴臭左右薰香而備給使幕僚皆中朝子弟亦涉輕薄韋太尉昭度收復蜀城以彥暉為招討副使在軍中每旦率幕客同謁常武而蜀先主預焉共輕忽之雖昭度亦嫌其不恭後為蜀主所破手刃一家郎官溫術等斃焉先是蔡叔向職居元寮乃顧氏之心膂與所辟朝士優遊樽爼自不相侔小顧既是尊崇兼其掣肘故先主舉軍伐之左蜀士有朱洽者常謂人曰二顧雖位尊方鎮生無第宅死無墳墓人莫喻之蓋二顧自泰德軍小將際㑹立功便除東川弟兄迭據大顧卒遺命焚骸歸葬豐州㑹多事未果至小顧狼狽之日送終闕焉朱洽之言於斯驗矣荆南節判司空薰與京兆杜無隱即滑臺杜慆常侍之子洎蜀人梁震俱稱進士謁成中令欲希薦送有薛少尹者自蜀沿流至於渚宫三賢常訪之一日薛謂薰曰閣下與京兆求名必無所遂杜亦非壽相惟閣下為人縶維官至朱紫梁秀才此舉必捷然登第後一命不霑也後皆如其言梁公第後却思歸蜀重到渚宫江路梗紛未及西泝值淮師冦江陵渤海王邀至府衙俾草檄書欲辟於府幕堅以不仕為志渤海敬諾之二紀依棲竟是麻衣也出北夢瑣言僞蜀有趙溫主善袁許術占人災祥無不神中蜀謂之趙聖人武將王暉事蜀先主纍有軍功而性獷悍至後主時為貴臣擠抑久沉下位王深銜之一日於朝門逢趙公趙驚愕屏人告曰今日見君面有殺氣似有隂謀但君將來當為三任郡守一任節制自是晚逹不宜害人以取殃禍王大駭乃於懷中探一匕首擲於地泣而言曰正欲刺殺數子便自引決不期逢君指示請從此止拜謝而退王尋為郡遷秦州節度蜀亡老於咸陽宰相范質親見王話其事出玉堂閒話僞王蜀葉逢少明悟以詞筆求知常與光憲偕詣術士馬處謙問命通塞馬曰四十已去方可圖之未及而茍得即夀不永於時州府交辟以多故參差不成身事後充湖南通好判官未除前夢見乘船赴任江上候吏旁午迎入石窟覺後話於廣成先生杜光庭涎忽報敇下授檢校水部貟外郎廣成曰昨宵善夢豈此謂乎自是解維覆舟於犍為郡青衣灘而死光憲自蜀㳂流一夕夢葉云子於青衣亦不得免覺而異之洎發嘉州取陽山路乘小舟以避青衣之險無何篙折為逆流吸入青衣幸而獲濟豈鬼神尚能相戲哉扶風馬謙病瞽厥父俾其學易以求衣食居於安陸鬻筮自給有一人謁筮謂馬曰子之筮未臻其妙我有祕法子能從我學乎馬生曰諾隨往境內陶仙觀受星算之訣凡一十七行馬請爵里云胡姓名恬且誡曰子有官祿壽五十二幸勿道我行止於王侯之門馬生得訣言事甚驗趙匡明棄荆入蜀因隨至成都王先主嘗令杜光庭先生密問享壽幾何對曰主上受元陽之氣四斤八兩果七十二而崩四斤八兩即七十二兩也豫官中郎金紫五十而殞僞王蜀時閬州人何奎不知何術而言事甚效既非卜相人號何見鬼蜀之近貴咸神之鬻銀肆有患白癩者傳於兩世矣何見之謂曰爾所苦我知之也我為嫁聘少鐶釧叉篦之屬爾能為致即立愈矣欣然許之因教之曰爾家必有他人舊功德或供養之具在焉亡者之魂所依故遣為此祟但去之必瘳也患者歸視功德堂內本無他物忖思久之老母曰佛前紗窗乃重圍時他人之物得非此乎遽徹去仍修齊懺疾遂痊何生末年自布衣除興元少尹金紫妻兼邑號子亦賜緋不之任便歸閬州而卒蓋預知死期也僞蜀道士李皓唐宗姓也生於徐州而遊三蜀詞辨敏捷粗有文章因棲陽平化為妖人扶持上有紫氣乃聚衆舉事而敗妖輩星散而皓獨罹其禍先是皓作書召玉局揚得輝赴齊有老道士崔無斁自言患聾有道而託算術往往預知吉凶德輝問此行如何崔令書地作字乃書北千兩字崔以千插北上成乖字曰去即乖楊因不果赴而皓以齊日就擒道士多罹其禍出北夢瑣言嘉州夾江縣人孫雄號卯齊其言事亦何奎之流僞蜀主歸命赴洛時內官宋愈昭等當從行舊與孫相善咸問將來升沉孫俯首曰諸官此去無災禍但行及野狐泉已來稅駕又曰孫雄非聖人耶此際新舊使頭皆不見矣諸官咸疑之爾後量其行邁合在咸京左右後主罹僞詔之禍莊宗遇鄴都之變所謂新舊使頭皆不見也甘節精術數言無不中常恐人薦逹每見人即作鄉音曰我但能蜀語耳順均賊亂雷太尉召使隨軍一日忽言曰太尉少避有賊至雷命備之良久有刺客從地道出唐濮間有相者彭克明號彭釘斤以其言事必中也九隴村民唐氏子家殷富彭謂唐郎即世當不挂一縷唐曰我家粗有田隴衣食且豐可能裸露而終哉它日江水漲唐望潭上有一兔在水中央乃脫衣泅水捉之為泛波漂沒而卒老學庵筆記李順獻馘非真者有蜀人言順逃至荆渚一寺有僧熟視曰汝有異相為百日偏霸主何在此耶今年不死尚有數十年夀又云方順亂作有術士折順名曰只有一百八日有西川耳安能久也如期而敗史延夀嘉州人以善相逰京師貴人爭延之視貴賤如一坐輒箕踞爾我人號曰史不拘又曰史爾我吕文靖公嘗邀之延夀至怒閽者不開門閽者曰此相公宅雖侍臣亦就客涎延夀曰彼來者皆有求於相公我無求於相公自欲見我耳不開門我竟還矣閽者走白公開門迎之延夀挾術以逰無心於用舍故能自重如此出王闢之澠水燕談蜀有術士精於談天尤善戲謔或以五行試其術答云此人必食祿異時官至五馬咸强其筆於楮為證驗於是索筆書云目今斂板鞠躬已見二千石在後衆譁然哂之且誚是乃挽米舟水手何謬言如是曰請細思之衆方悟為之一笑遊宦紀聞于世尊遂州人與一女皆預知吉凶數州敬奉捨財山積鏨鑿岩壁列為佛像所費莫知紀極節度使許公存以其妖妄召至府衙俾射覆不中殺之神色不變於其所居得五色文麻百䭾其他錢帛稱是集記清獻公知成都秩滿玉局化道士李垂應送至彌牟鎮曰後六年再當來此相迎清獻强之至漢州不肯前曰漢州守聶友仲欲占命其人天獄星動故不敢見未幾聶果以公事下獄比清獻再守成都又六年矣李復至彌牟相迎志林至和二年成都人有費孝先者始來眉山云近逰青城山客老人村壞其一竹床孝先謝不敏且欲償其直老人笑曰子視其下字云此床以某年月日造至某年月日為費孝先所壞成壞自有數何以償為孝先知其異乃留師事之老人授以易軌革卦影之術前此未知有此學者後五六年孝先以致富今死矣然四方治其學者所在而有皆自託於孝先真僞不可知也聊復記之使後人知卦影之所自耳按志云孝先安仁人以經術顯名宿董正圖學舍壞其竹床也丹淵集道士袁惟正字行之閬中人也其所住觀與余永泰山居相距才百里豫昔在鄉里時已聞袁君能用六十四卦推五行配六神使七十二煞言人禍福已發未兆之應一一若目見然竟未識袁君之面也後余典校中祕書幸與士夫逰近日往往有為豫言道士自蜀來者善以爻象消息休咎嘗與某人占某事某事約時指日無不如其說郭景純管公明之流也豫雖舊聞袁君之術甚精而未敢以是必為袁君以對之暇日納涼於城南道宇有道士出西廡下髙顴廣顙狀貌怪偉肅豫入坐堂上豫因問所從來曰來自蜀問何以居此曰往年嘗以占驗得權貴人意遂喜以紫服奏我館我於是問其術誰師而如此曰自在蜀時已得異人授祕記後復走天下東西南北殆遍聞某所有某人善此術者雖數千里必往咨焉質吾所學而遂無疑凡今所言若牛刀虱鏃見則洞然矣問其姓曰袁氏乃豫昔在鄉里時所聞與近日士大夫為豫言者袁君是矣遂與之往還一日詣豫言諸友皆以字相稱我獨無敢以字請豫曰惟正者君名歟夫正者道之所由立也凡在天地間涉形迹該事為者莫不保之以全其用者也或失之則傾側邪辟龎雜乖盩於不善無不至矣今君方以是術有名于時為人信嚮如能正以行之守之以固不為利欲撓其心若莊遵季主之所為君之道髙矣宜以行之為字袁君跽而言曰方外之人未聞此語幸而君子字我又因而規我敢不佩服以終世書以贈之嘉祐五年僧海淵蜀人也工針砭天禧中入吳楚逰京師寓相國寺中書令張士遜疾國醫拱手淵一針而愈由是知名既老歸蜀范景仁賦詩餞之曰舊鄉山水繞禪扃日日山光與水聲歸去定貪山水樂不教魂夢到神京治平二年化去張唐英貽以偈曰言生本不生言滅本不滅覺路自分明勿與迷者說劉季孫銘其塔曰資身以醫有聞於時餘幣散之拯人於危此士君子所難嗟吁乎師志林蜀人單驤者舉進士不第顧以醫聞其術雖本於難經素問而别出新意往往巧發竒中然未能十全也仁宗皇帝不豫詔孫兆與驤入侍有間賞賚不資已而大漸二子皆坐誅賴皇太后仁聖察其非罪坐廢數年今驤為朝官而兆已死矣宋史皇甫坦夾江人善醫術髙宗召見問何以治身坦曰心無為則身安人主無為則天下治為太后治目疾立愈帝厚賜之一無所受復問以長生久視之術坦曰先禁諸欲勿令放逸丹經萬卷不如守一帝善之書清靜二字以名其菴且繪其像禁中隆興初入朝孝宗稱為先生而不名坦又善相嘗言荆南帥李道中女必母儀天下後果為光宗后蜀中廣記卷七十八
