body:
  text: 蜀中廣記卷八十明曹學佺撰神仙記第十附録鬼怪夷堅志馮時行守萬州州有舞陽廟馮以樊噲從髙祖入蜀而萬州落南非噲所至是必夷鬼假托以取血食耳即日撤其祠未幾出視事見偉丈夫被甲持戟坐於公庭馮叱之掀髯而怒曰吾乃漢舞陽侯廟食千嵗君見毁撤吾無所歸馮厯詆其平生所為不少懾神奄奄而滅大寧圖經云漢永平七年嘗引此縣鹹泉至巫山用鐵牢盆盛之水化為血長老云果州嘗飢有客糴穀於敘瀘雇船載至境謂舟師曰吾先往以待子來問城西陳夀即我家也米至城下舟師訪之乃知其為陳著作之神驚聞於官官為給船賃以米賑貧民蜀李勢宫人張氏有妖容勢寵之一旦化為大斑理蛇長丈餘逰於苑中夜復來寢牀下勢懼乃殺之復有所寵鄭美人化為雄虎一夕來食勢寵姬有馬生駒一頭而兩身相著六耳一牝一牡有馬氏婦妊身兒從脅下出母子無恙其年勢為桓溫所滅出廣古今五行記廣漢王瑗之為信安令在縣忽有一鬼自稱蔡伯喈來見議談詩賦揆之古今靡所不諳王問是昔日蔡雍否答云非也與之同姓字耳問前伯喈今何在云在天上作仙人受福甚快樂非復疇昔也出齊諧記異苑文帝元嘉初益州王雙忽不欲見明常取水沃地以菰蔣覆上眠息飲食悉入其中云恆有一女子著青裙白􅔮一作領巾來就其寢母聽聞薦下有聲厯厯發之見一青色白癭蚯蚓長二尺許又云此女常以奩香見遺氣甚清芬奩乃螺殼香則菖蒲根於時咸謂雙暫同阜螽矣明月峽中有二溪東西流宋順帝升明二年溪人微生亮釣得一白魚長三尺投置船中以草覆之及歸取烹見一美女在草下潔白端麗年可十六七自言髙唐之女偶化為魚遊為君所得亮問曰既為人能為妻否女曰冥契使然何為不得乃為亮妻後三年忽曰數已足矣請歸髙唐亮曰何時復來答曰情不可忘有思復至其後一嵗三四往來不知所終太平廣記廣五行記曰梁末蜀人費祕割麥值暴風雨隱於岩石間避雨去家數里遙見前路有數婦人皆著紅紫襴衣歌吟而來私謂野外何因有此心異之漸近寂然無聲去祕數步乃各住立少時悉轉向祕看之其面並無七孔唯垂鳥毛而已祕驚怖仆地至二更祕兒怪父不至把火尋覓見祕卧在道傍左側有十餘刺蝟見火即爭散走祕至家百餘日死録異記蜀州晉原縣山亭中有二大石各徑二尺已來出地七八寸人或坐之心痛往往不救又云是落星石東邊者生西邊者死石與他石無異只色帶青白耳有巴卭人不知姓家有橘園霜後盡收採餘二橘大如三四斗盎巴人異之即令攀摘輕重亦如常橘剖開每橘有二叟長尺餘鬚眉皤然肌體紅明見人不怖但相對象戲談笑自若決賭訖一叟曰君輸僕龍神第七女髮十兩智瓊額黃十二枚紫綃帔一副絳臺山霞實散二貼瀛洲玉塵九斛阿母療髓凝酒四鍾阿母女態盈娘子躋虛龍縞襪八緉後日至王先生青城草堂還我者一叟曰王先生許來竟待不得橘中之樂不減商山但不得深根固蒂耳一叟曰僕飢虛矣須龍根脯袖中抽出一根草方圓徑寸形狀宛然如龍毫釐悉具因削食之隨削隨滿食訖噀之化為一龍四叟共乘之足下泄泄雲起須臾風雨晦冥不知所之巴人相傳此百五十年事似在隋唐之間但不知指的年號耳出玄怪録廣古今五行記髙宗光宅中李崇貞任益州長史廳前柑樹結一實大如雞子晚熟露小孔如針羣咸異之久而剖得一蛇赤斑色長尺餘崇貞竟以罪死大唐竒事云長安有貧僧賣一小猿會人言堪馳使虢國夫人欲之問其由僧曰本住西蜀居山二十餘年偶羣猿過遺此小猿憐而養之才半載識人意會人言語指顧實不異一弟子今至都城資用乏而無計故鬻之夫人償與綵帛僧謝而去此猿旦夕在夫人左右甚憐愛之它日貴妃遺夫人芝草小猿看玩良久倒地立化為一小兒狀貌端妍年可十四五夫人怪而問之小兒曰本姓袁隨父入蜀山採藥居林下三年父常以藥苗啖我忽一日自不覺變身為猿父懼棄我去幸此僧收養得至夫人宅中口雖不能言心中之事略不遺忘每至深夜唯自泣下今不期却還人身也夫人竒之遂衣以錦衣使侍從常祕密又二年容貌轉美夫人恐人見奪因不令出安於别室以一婢供飼藥食從所嗜也一日小兒與此婢俱化為猿懼而射殺之視其尸仍復人身軍將陳守規者性剛猛嘗坐法流信州寓一公館此館素凶始至鬼物晝見其形變化倐忽乃持弓矢刀杖與之鬬久之聞空語曰吾鬼神不欲與人雜居君既堅正願以兄交可乎守規許之自是常與交言有吉凶輒先報求飲食與之輒得錢物既久頗為厭倦因求方士手書章疏奏之上帝翌日鬼乃大罵曰吾與君為兄弟奈何上章訴我大丈夫結交當如是耶守規云安得此事即於空中擲下章疏紙筆宛然又曰君謂我無所處耶吾今往蜀川亦不下於此矣由是遂絶出稽神録蜀大理少卿李冰嘗歸郫城别墅見橋側一嬰兒以蕉葉薦之冰憐其相貌收歸哺養為子六七年能讀書善談笑愛之過於親生至十二嵗經史未見者皆如夙習人謂其神智嘗獨居一室中閲書父母偶潛窺之見一人持簿書復有二童子接引呈過其子便大書數行却授之去父母異之來日因侍立冰欵曲謂之曰吾夜來竊有所覩汝得非判隂府事乎曰然重問則唯拜不對冰曰隂府人間事自不同吾不欲苦問汝宜善保子父母却後六年一旦白父母兒只合與少卿夫人為兒一十八年今則事畢來日申時却歸冥司因泣下久之父母亦為之出涕冰自問官祿答曰大理少卿也來日申時兒果卒未久冰坐事遂罷出野人間話開元末渝州多虎暴居人設機穽待之月夜登樹候望見一倀鬼如七八嵗小兒無衣輕行通身碧色來發其機及過人又下樹上之須臾一虎跑過為陷機所中死久之小兒行哭而返因投虎口而沒及明開視有碧石大如雞子在虎喉中天寶中章仇兼瓊為劒南節度數載將入朝蜀川有張夜叉者狀如狂人而言事多中乃呼而問之夜叉云大使若住蜀有無涯之夀若必入覲不見其吉兼瓊初甚惶懼久之曰安有是耶遂行至漢州入驛墜馬身死惟心上微暖先是彭州刺史令濛陽尉馬某送藥酒一器兼附起居濛陽去漢州五十里奉命便行至驛未到兼瓊所忽然顛倒而卒頃之兼瓊氣蘇言地下所司以馬尉見代也馬魂便至其家家人驚異問適爾奉命還何遽也不言視天太息遽揮使去因流涕謂妻子已代章仇大使死適於地下苦論地下所司並為他爭奈何自念到官日淺逺客孤弱故還取别舉言悲號又謂妻無苦我代其死彼亦當有深恤無憂不得還鄉但倉卒死生永隔以此為恨耳言訖不見妻子猶恍然驚疑而舁尸至矣兼瓊翌日還成都􅉠馬氏錢五百萬又令彭州􅉠五百萬兼還四年秩祿云新繁縣令妻亡召女工作凶服中有婦人婉麗殊絶令恱而留之數月甚見寵愛一旦慘悴言辭哽咽令怪問之曰本夫將至身方逺適所以悲耳令曰我在此誰如我何苐自飲食無苦也後數日復求去止之不可留銀酒杯一隻為别謂令曰幸甚相思以此為念令贈羅十匹去後恆思之持銀杯不捨手每至公衙即置案上忽得報前尉已罷還其妻神柩尚在縣逺來移轉投刺謁令令欸待之尉見銀杯駭愕數視之令問其故云此是亡妻柩中物不知何得至此令歎息因具言始末及形狀音旨留杯贈羅之事尉憤怒終日後開棺見婦人尚抱羅而卧怒甚積薪焚之已上三則出廣異記開元初巴人百餘輩上褒中隨山伐木至太白廟廟前松樹百餘株各大數十圍止而伐之已倒二十餘株有老人戴冠拄杖至其所曰此神樹何故伐之羣巴初不顧老人曰若然已倒者取之未倒者無伐何如又不止老人曰吾太白神若不止必當俱死無益也又不信老人乃登山呼斑子倐爾有虎數頭相繼而至噬巴殆盡惟五六人獲免老人曰汝輩略有良心不令殺宜速去也其倒樹至天寶末尚存適詔修理內殿楊國忠令人至山宣敕取樹作板以進神竟與之章仇公鎮蜀日佛寺設大會百戲在庭有十嵗童兒正舞於竿杪忽有物如雕梟掠之而去羣衆大駭因罷樂後數日其父母見兒在髙塔上梯而取之神形如癡久之方語云見如壁畫飛天夜叉者將入塔中飼以果實飲食諸味亦不知其所自旬日方精神如初出尚書故實玄怪續録云薛偉者唐乾元年任蜀州青城主簿與丞鄒滂尉雷濟裴寮同時偉得病七日忽奄然若往連呼不應而心頭微暖家人不忍即斂環而伺之經二十日忽長吁起坐謂其人曰吾不知人間幾日矣曰二十日矣與我覷羣官方食鱠否言吾已蘇甚有竒事請諸公罷筯來聽也僕走視羣官實欲食鱠遂以告皆喜而來偉問諸君使司戶僕張弼買鯉於趙幹以付王士良鱠乎曰然何以知之曰向殺之鯉即我也衆愕曰願聞其説偉曰吾初疾惡熱求涼忽策杖而去不知其夢也既出郭其心欣欣然若籠禽檻獸之得逸莫我如也漸入山行益悶遂下遊於江潭有思浴意遂脫衣於岸跳身便入自幼狎水成人已來絶不復戲遇此縱適暫契宿心且思人浮不如魚快也安得攝魚而縱逰乎傍有一魚曰顧足下不願耳正授亦易何况求攝當為足下圖之決然而去俄頃有魚頭人長數尺騎鯢來𨗳從數十魚宣河伯詔曰城居水逰浮沉異道茍非其好則昧通波薛主簿意尚浮深迹思間曠樂浩汗之域放懷清江厭巘崿之情投簮幻世暫從鱗化非遽成身可權充東潭赤鯉嗚呼恃長波而傾舟得非在晦昧纎鉤而貪餌易傷於明無或失身以羞其黨爾其勉之忽而自顧即已魚服矣於是放身而逰意往斯到波心潭底莫不從容三江五湖騰躍將遍然旦留東潭暮必復回俄而飢甚求食不得循舟而行忽見趙幹垂釣其餌芳香心亦知戒有頃飢益甚思曰我是官人戲而魚服縱吞其釣幹豈殺我固當送我歸縣耳遂吞之趙幹收綸以出幹手之將及也連呼之不聽而以繩貫我腮繫於葦間既而張弼來曰裴少府買魚須大者幹曰未得大魚秪有小者弼曰奉命取大魚安用小為乃自於葦間尋得我而提之我謂弼曰我是汝縣主簿化形為魚何得不拜弼不聽提之而行入縣門見吏坐者奕棊者大聲呼之略無一應既而入階鄒雷方博裴啖桃實皆喜魚大促命付厨弼言幹藏巨魚先以小者塞命可恨裴鞭幹已令鱠我我乃呼曰為公同官見不相捨反促殺之仁哉大呌而泣三君不顧而付鱠手王士良士良礪刃投我於機上我大呌曰王士良因何殺我可執我白於官人士良若不聞者按吾腮於砧上而斬之彼頭適落此亦醒悟遂奉召爾言訖諸公遞相訊之一如所云莫不驚駭生愛忍想於是投鱠咸終身不食偉亦平愈後纍遷華陽丞乃卒太平廣記貞元初陳郡袁生任唐安參軍罷秩逰巴川舍逆旅氏忽有白衣丈夫來謁與之語聰辨敏博逈出於人竒之丈夫曰某又善算能知君平生事生訊以往事一一如寫益竒之是夕夜深丈夫密謂袁曰我實赤水神也有祠在新明縣南去嵗淫雨數月居舍盡圯為風日樵牧侵侮知君來嵗當補新明令倘為重建祠宇以時奠祀幸甚生諾之已又曰子初至時屛人獨入廟中冀盡一言耳生曰謹奉教是冬果補新明及至訊之果有赤水神廟旬餘遂詣之未至百餘步屛車吏獨詣廟中見其簷宇摧毁佇望久之有一白衣自廟後來即向丈夫也敘寒溫少頃與生偕行至階下有老僧桎梏生問此何為者神曰此縣東蘭若道成有殃吾攝其魄繫之一嵗矣旬餘當解之且謂生曰君昔諾我建廟可疾圖之生曰不敢忘既歸貧無以為資因念神所繫道成既旬餘當解今假以他語俾建廟又安有疑乎因使問縣東蘭若果有道成師病甚因謂曰我能愈疾師能以緡貨建赤水神廟乎道成曰疾果愈又安以緡貨為辭生因紿語以故道成曰敬受教後旬餘果愈道成召弟子曰吾少學浮屠今年五十不幸沈疾向者袁令謂我師之病赤水神所為也不為福而反害人安得不除之因與其徒持鍤詣廟盡去神像及祠宇無一遺者又明日道成謁袁袁曰可疾修赤水廟也不然且懼為禍道成曰夫神所以賴於人者以其福可延戾可弭旱則雩之以澤潦則禜之以霽故天子詔郡國邑里以建祠為民福也若赤水神無以福人且加害焉已盡毁其廟矣袁且驚且懼而謝之道成氣益豐居無何袁生以事坐徙端溪行至三峽忽見白衣立於路左曰向托君修我祠宇奈何致道成毁我之舍棄我之像使一旦無所歸君之罪也君棄窮荒職此報耳生謝曰毁君者道成也何為罪我神曰道成福甚盛吾不能動今君祿與命衰故我得以報言已不見生惡之後數日竟以疾卒申屠澄者貞元九年自黃衣調補漢州什邡尉之官至真符縣東十里許遇風雪大寒馬不能進見路旁茅舍中有煙火甚溫乃往就之有老父嫗及處女環火而坐女年方十四五雖蓬髮垢衣而雪膚花臉舉止妍媚父嫗見澄來遽起曰客甚衝寒雪請前就火澄欣謝之坐良久天色已暝風雪不止澄曰西去縣尚逺借宿於此可乎父嫗曰但蓬室為陋耳敢不承命澄遂解鞍施食秣馬其女方修華靚飾自帷箔間復出而間麗之態尤過向時有頃嫗自外挈壺酒至於火前暖飲謂澄曰以君冒寒且進一杯以禦凝洌澄起揖讓曰始自主人翁即巡某當婪尾因曰坐上尚欠小娘子父嫗皆笑曰田舍家所育豈可備賔主女郎回眸斜視曰酒豈足貴謂人不宜預飲也母即牽裙使坐於側澄欲舉令以觀女意執盞曰請徴書語屬目前事乃曰厭厭夜飲不醉無歸女低鬟微笑曰天色如此歸亦何往哉俄巡至女哂曰風雨如晦雞鳴不已澄愕然歎小娘子明慧若此某幸未婚敢請自媒如何翁曰是雖寒賤亦常嬌保之頗有過客以金帛為問意不忍别未許也不期貴客又欲援拾豈是分耶願以為託澄遂修子壻禮祛囊以遺之嫗悉無所取曰但不見寒賤何事資貨明日又謂澄曰此孤逺無鄰又復湫隘不足以久留女既事人便可行矣又一日從容為别澄乃以所乘馬載女而行既至官俸祿甚薄妻力贊成家交結賔客旬月之內大獲名譽至於厚親族撫甥姪洎僮僕厮養無不歡心後秩滿將歸已生一男一女亦甚明慧澄尤加敬焉嘗作贈內詩曰一尉慙梅福三年愧孟光此情何所喻川上有鴛鴦其妻終日吟諷似默有知者然未嘗出口每謂澄曰為婦之道不可不知書倘更作詩反似嫗妾耳澄罷官即盡室歸秦過利州嘉陵江畔臨衆石藉草憩息妻忽悵然謂澄曰前者見贈一篇尋即有和初不擬奉示今遇此景物不能終默乃吟曰琴瑟情雖重山林志自深常憂時節變辜負百年心吟罷澘然良久若有慕焉澄曰詩則麗矣然山林非弱質所思倘憶賢尊今則至矣何忽悲泣乎後二十餘日復過妻家草舍依然但不復有人矣澄與妻俱止其舍妻思慕之深盡日涕泣忽於壁角故衣之下見一虎皮塵埃盡滿妻見之忽大笑曰不知此物尚在耶披之即變為虎哮吼拿攫突門而去澄驚走避之携二子尋其路望林大哭數日竟不知所之出河東記太平廣記元和中荆州崔商上峽之黔秋水既落舟行甚遲江濵有溪洞林木絶勝商因杖策徐步不三四里忽有人居石橋竹扉板屋茅舍景象殊逈因前詣焉有尼衆十許延客姿貌言笑非岩􅊤中有也即升其居見舍上多曝果栗及窺其室堆積皆滿須臾則自外齋負果纍纍至商以深山疑為妖異忽遽辭返衆尼援引留連詞意甚懇商竟登舟謝之訪於舟子皆曰此猿猱耳非速返幾為所殘即聚僮僕挾兵杖亟往尋捕無蹤迹漢州西四十五里有富叟王瑶所居水竹園林占一州之勝往來人多迂道以經瑶亦盡誠接待有賣瓦金石生者常言住在西山每來必休於此積十數年率五日一至瑶密視其所買又非山中所需異之一日又來因竭力奉之石亦無愧將去瑶曰思至貴居為日久矣今者幸願偕焉石生曰窮僻山居不足為訪瑶不顧徑隨之行至數里將暝石生曰可還矣固辭之瑶追從不已石生忽以拄杖畫地登為巨􅊤而身亦騰為白虎哮吼顧瞻瑶驚駭惶怖因蒙面匍匐而走明日再往曽無人迹自是石生不復經過矣出集異記録異記鄒平公段文昌嘗佐太尉南康王為成都郵巡忽失韋意逐之使攝尉靈池蒼惶受命羸僮劣馬奔迫就縣去靈池六七里日已昏黑路絶行人忽有兩炬前引更呼曰太尉來既及郭門兩炬皆滅扣關良久令長差人延之然後得入自郵巡奉韋使入長安得交劉禹錫時禹錫為禮部員外公往謁之禹錫與日者從容之際公遽至日者匿於箔下公既去日者謂禹錫曰員外若圖省轉事勢殊逺須待十年後此客入相方轉本曹正郎耳自是禹錫失意連授外官十餘年鄒平入相方除禹錫禮部郎中歸闕太尉中書令南康王韋臯節制成都於萬里橋隔江創置新南市發掘墳墓開拓通街水之南岸人逾萬戶鄽閈樓閣連屬宏麗為一時之盛然每至昏暝則人多驚悸投礫擲石鬼哭嗚咽蓋其喪失墳壠無所依栖故俗謂之虛耗焉人居不安市亦不甚完葺韋公知之請道流置黃籙道場精誠懴謝至第三日鬼哭之聲頓息夢神人曰公營南市使幽鬼失其所居喪其骸骨相與悲怨幾為分野之災賴黃籙功為其遷拔上帝許窮魂三萬餘輩皆乘此福託生諸方矣居人自此安堵勿復為憂也公深異之自製黃籙碑立於真符觀焉戎幕間談杜元頴鎮蜀年資州方丈大石走行盤礴數畝新都縣大道觀老君旁泥人鬚生數寸拔之俄頃又出都下諸處有栗樹結實食之味如李鹿頭寺泉水湧出及貓鼠相乳之妖南蠻將圍城西門有人見一龍與水牛鬬俄頃皆滅又李樹生木瓜而空中不實大道觀即玉皇觀在東門外五十步成都景雲觀舊在新北市因節度使崔公安潛置新市日遷於大西門之北觀有三將軍堂頗靈應毁撤之後唯柱礎一枚穿掘不動掩手足其上熱愈於火逡巡應心側近居人有犯觸者立有徴應今猶存馬舉為山南步奏官由間道入蜀時兵後僻路絶無人煙夜至一館聞東廊下有人語聲因往告之有應者云中堂有牀自往宿去舉至中堂唯有土塌又求火答云無火求席隔屋擲出一席可重十餘斤舉亦壯士殊不介意睡至中夜有一物如猴升榻而來舉以鐵椎急擊之呌呼而走及明呼告别聞人怒聲更云夜來見伊獨處令兒子往伴打得幾死舉推其門不可開自隙窺之了無人物但有積壤而已舉後為太原將官淮南節度使出稽神録渠州刺史李黃夏日憩於小廳見鼠穴中有一人長數寸執篲掃穴前而入頃有二人亦長三二寸舁一鑊添水爨薪須臾鑊沸有一夜叉執鐵扠叉一人披紫袍執象笏長三二寸形色狀貌猶已身也雖懼而不敢驚之夜義咄紫袍脫衣入鑊中須臾而出仍自服衣而入穴中又見一婦人出穴中似黃之姊孀婦寓嶽州久矣主鑊者又扠黃姊入鑊中須臾又出姊服衣亦入穴中主鑊者繼入舁鑊二人亦入擁篲者掃其灰燼而入數日皆如此黃大憂遣訪其姊亦無恙黃後十餘年方卒出聞竒録唐司空嚴震梓州鹽亭縣人所居枕釡戴山但有鹿鳴嚴氏必一人殞忽日震與親表對坐聞鹿鳴其表曰釡戴山中鹿又鳴矣嚴曰此際當應表兄其表遽對曰表兄不是嚴家子合是三兄與四兄不日嚴氏果亡一人出北夢瑣言髙駢築成都羅城時令人發古冡取甎以資甃砌有牙將薑姓者當掘一冡先夜見一鬼嘯於冡上且獻詩求免其文亦可觀以白於髙乃免之詳見詩話寶厯三年明經范璋夏日居梁山讀書深夜忽聽厨中有拉物聲范慵省之至明見束薪長五寸餘齊整可愛積於竈傍地上纍蒸餅五枚又一夜有物叩門因拍掌大笑聲如嬰兒如此經三夕璋素有膽氣乃乘其笑曳巨薪逐之其物狀如小犬連郤擊之變成火光照滿山而滅出酉陽雜爼進士楊藴中得罪下成都府獄夜夢一婦人雖形容不揚而言詞甚秀曰吾薛濤也頃幽死此室乃贈藴中詩曰玉漏深長燈耿耿東墻西墻時見影月明窗外子規啼忍使孤魂愁夜永進士李菌襄陽人嘗見紅葉自御溝流出上題詩云流水何太急深宫盡日間殷勤謝紅葉好去到人間菌收貯書囊後僖宗幸蜀菌奔竄南山民家見一宫娥自云宫中侍書名雲芳子有才思因與之款接見紅葉歎曰此妾所題也同菌詣蜀具述宫中事至錦官逢內官田大人識之曰書家何得在此逼令上馬與之前去李甚怏悵其夕宿逆旅雲芳子復至曰妾已重賂中官永得從君矣乃與俱歸襄陽數年菌疾有道士言其面有邪氣雲芳子自陳往年綿竹相遇實已自經而死感君雅意故久相從人鬼殊途何敢貽患於君置酒賦詩告辭而去出北夢瑣言趙尊師者本遂州人飛符救人疾病於鄉里間年深矣又善役使山魈令挈書囊度帽有民阮瓊女為精怪所惑每臨夜即别梳粧似有所伺頃之迎接欣喜言笑自若召人醫療即先知姓名瓊乃令請尊師救解趙取素白絹朱書大符與瓊貼於戶牖更初聞有巨物中擊之聲如氷墜地遂攢燭照之乃一巨鼉宛轉在地逡巡而死符即不見女乃醒悟驚駭涕泣瓊遂碎鼉之首棄於􅊤間却詣尊師備陳其事趙又與小符令女吞之自後無恙出野人間話唐故吏部員外張升隨僖宗幸蜀以年少未舉遂就攝涪州衙推州司差里正遊章當直他日告辭問何往章但云有老母及妻男乞為存問言訖而去所居近鄰夜聞章家大哭翌日問其由言章昨夜辭其家入山變為虎矣二三日又聞章家大驚呌又問則曰章昨夜思家而歸自上半身已變虎而尚能語出聞竒録王道珂者居雙流縣南笆當僖宗幸蜀之時常以卜筮符術為業行坐常誦天蓬咒每入市貨符卜得錢喫酒至醉方歸雙流郭外有白馬將軍廟曉夕有人祈賽長日垂簾簾內往往有光及聞吹口之聲祈禱酒食忽忽不見愚民畏懼無有輒敢正視者道珂因酒醉歸入廟朗誦神咒則廟堂悄然傍人視之無不驚駭異日晨雞初呌忽隨村人擔蒜趂市夜行至廟前忽然倒地蒼惶之間見野狐數頭眼如火炬銜拽入廟聞堂上呵責曰你何得恃酒入我廟念咒驚動我眷屬道珂心中默持天蓬逡巡却蘇蓋緣其時與拿蒜人同行神兵逺穢臭而不衛其身耳既蘇之後遂歸家沐浴清潔却來廟內大詬而責曰我是太上弟子不獨只解持天蓬咒常誦道經云天得一以清地得一以寧神得一以靈爾若是神明只合助道行化何以惡聞神咒我知非白馬明神定是精怪傍附幻惑生靈今日我決定於此止泊持咒為民除害遂志心朗念不歇廟中寂然無聲亦無光透簾幕唯聞自撲呻吟之聲至明呼喚鄰近居人視之唯見老野狐五頭頭破血流死於階下自後廟祀遂廢天蓬將軍是北帝上將制服一切鬼神不止誅滅狐狸也靈驗記合州有壁山神鄉人祭之必以太牢不爾則致禍嵗烹宰不知紀極蜀僧善曉者早苦州縣官調選乃剃削為沙門堅持戒律雲水參禮行經此廟聞之乃曰天地郊社薦享有儀況牛者稼穡之畜爾以為祀無乃過乎命斧擊碎土偶數軀最後一偶廟祝哀祈曰此一神從來蔬食由是存之軍州以為異申聞本道而僧亦端然無恙出北夢瑣言校書郎張仁寶素有才學年少而逝自成都歸葬閬中權殯東津寺中其家寒食日聞扣門甚急出視無人唯見門上有芭蕉葉上題曰寒食家家盡禁煙野棠風墜小花鈿而今空有孤魂夢半在嘉陵半錦川至端午又聞扣門聲其父於門罅伺之乃見其子長三丈許足不踐地門上題五月五日天中節題未畢其父開門即失所在太平廣記益州西門內石笋街百姓有李萬夀者年五十餘景福元年壬子三月中值兵亂城門盡閉家道罄竭親屬二十餘口悉皆淪沒萬夀一身窮悴俟至城開遂往漢州投託親知行至新都縣覺日色猶早乃更前去不覺昏黑遙見西山之下隔橋茅齋四向似有人居萬夀至門投宿扣扉良久一女子出年才及笄見萬夀驚問曰是何人因何至此萬夀曰欲往漢州至此抵夜求寄一宿女子曰君宜速去此不可住萬夀再三懇告乃曰妾夫壻非人即行病鬼王妾即新都縣藍闕行內王萬回家女也偶然被攝至此無由得歸萬壽自陳至此山路險惡去亦死住亦死願得一處藏匿或可免難當為娘子通報本家令知在此女子良久欣然遂引萬夀入大甕中以物蒙之萬夀既喜又懼不敢喘息但志心密誦太上天童護命經而已四更以來忽聞大風拔樹走石飛沙俄見鞍馬鏗訇旗隊震耀入於堂內須臾而風止俄又聞鼾睡之聲如雷吼逹於屋外夜未曉女子潛至甕間語萬夀曰我王與羣鬼睡矣然王問妾云適來忽見宅四面金剛力士遍滿空中紫雲之內白鶴仙童羅列前後吾急歸復遇一老翁四目部領兵使逐吾去大鐵圍山吾奔逆竄避直候兵散﨑嶇至此今大困乏豈有術人至此乎妾但答云無也君若有術為妾言之萬夀曰吾無所能適但志心密誦天童護命經耳女子曰君試誦之我願聞也萬夀遂密誦經一遍女子稽首跪聽移時讃歎必是此經靈驗言訖復入室內寂然無物但聞香風颯颯覺在土穴中仰見天色皎然遂奔至甕所驚告萬夀同尋香氣而出天色漸曉方知身在大古墓中相顧悚懼萬夀遂引女子至新都縣尋其本家父母聚族悲喜問其事逺近傳説驚歎女家以錢十萬莊一所為謝萬夀即於嚴真觀入道女子父王萬回即於萬夀處傳受天童經於玉皇觀中入道併下靈驗記李邵者葭萌令也自云其妻亡已八九年身素未逰京國因參選始到僦居三洞觀側客陀之中偶見其家亡婢小玉自鄰居而出熟視之果是也以名呼之斂衽而至問其故則云某隨娘子在此已嵗餘矣今暫出買物即回報與娘子邵待之食頃即至買得果實茶餅之屬奔馳還家良久亡妻延邵相見敘及存殁或泣或悲且頻令小玉去看時節久之小玉報云來矣顔色慘悴語聲哽咽揖邵請去邵未出門見一少年冠大帽張蓋而入小玉即引邵避於簾後見其妻出迎少年少年不顧擲蓋於地化為大鑊水滿火起煙熖蓬勃少時即沸已去大帽即牛頭也持叉立於鑊前叉其妻拋鑊中號呌痛楚不久即爛骨肉分張火尋亦滅復叉其骨排於庭中已張蓋而去其妻身旋復舊蘇而徐起泣謂邵曰平生罪孽合受三年今已一年餘矣每日如此痛苦難言邵見其變化苦楚亦深悲歎問妻曰今既相見所須何物莫要作功德救拔否妻曰適令小玉相邀全無功德相託爾此中鄰里受苦者畫太乙天尊一身便得免罪知之數月無託人處今得君來將有離苦之望矣邵驚駭辭出即於三洞觀中訪問太乙天尊之像得殿上古本已剝落乃以金帛召工畫訖復就觀設齋表祝三日內事事周畢躬自檢校無暇到妻所居功德既了方得往報見其所止已空屋矣鄰母曰夫人託謝郎君深荷太乙功德已得解脫往生矣昨日辰已間與小玉俱去也邵每勸人作太乙天尊像以此瀟湘記云益州刺史張某有駿馬甚保惜之每令三人曉夕以専飼飲忽日化為一婦人美麗竒絶立於廄中左右遽白張親至察視婦人前拜言曰妾本家燕中因僻好駿馬每覩之必歎美其駿逸如此數年忽自醉倒俄化成馬遂奔躍出門隨意南走近將千里被人收之以至於君廄今偶自追恨淚下入地地神上奏於帝遂有命再還舊身思往事如夢覺耳張大驚異安存於家經十餘載其婦人忽堅求還鄉張公尚未允婦人號泣仰天自撲忽復化為馬奔突而出不知所之迎仙觀在開縣東一里神仙山頂舊傳觀中道士每嵗一人登仙以入道先後為序屆期觀中老幼叢遝焚香拜祝音樂闐咽燈火輝煌自上垂下長橋如虹煙雲五色當仙者升橋而去莫知所之一異僧來看知其為妖也按劒以俟須臾橋成即揮劒斬之有物墜地長丈許如牛舌狀血流滿地莫知何為既而於溫湯井後石洞中見一巨蟒舌斷而死西蜀有僧惠進者姓王氏居福感寺一日早出行至資福院門見一人身長靛色迫之漸急奔走避之至竹簀橋馳入民家此人亦隨至撮拽牽頓勢不可解僧哀鳴求救此人問汝姓何答曰姓王此人曰名同姓異乃捨之而去僧戰懾投入民家移時稍定方歸寺中是夕有與之同名異姓者死焉出録異記蜀昌州牧任彥思家忽聞空中有樂聲極雅麗悲切竟日不休空中言曰與吾飲食來任問是何人竟不肯言本末乃於靜室設食如人食無遺自此以為常或時不與即致破什器蟲飛入人耳中烈火四起彥思惡之移住他處怪輒先至如此凡七八年忽日不聞樂聲置食無所饗廳舍栿上血書詩曰物類易變遷我行人不見珍重任彥思相别日已逺彥思惡其題以刀剗之而字沁入木終不知是何鬼也偽蜀建虎四五年間有百姓譙本者為人凶率衆皆惡之少無父常毁罵母母常含忍一旦歸自晚其母倚門而迎本遙見母便罵母曰我只有子一人憂汝歸夜汝返罵我也遂撫膺大哭且歎且怨本居在城巷為母數恨便出門近城踏上坐忽大呌一聲脫其衣變為一大赤虎直上城去至來日猶伏在城上人報蜀主命趙庭隱射之一發正中其口衆分而食之蜀主初霸一方天雨毛人變虎地震者再出野人間話廣異記云利州飯肆有子婦為虎所取經十二載而還自説攫入深山相與寢處窟中有四虎妻婦人最老虎也恆持麋鹿等肉還哺婦人或時含水吐其口中婦人欲出輒為驅入窟積六七年後漸失餘虎惟老者獨在老虎自有婦人未嘗外宿忽一夜不還婦人心怪之欲出而不敢如是又一日乃徐出窟數十步不復見虎乃極力行五六里聞山中伐木聲徑往就之伐木人謂是鬼魅以礫石投擲婦人大言其故乃相率詰問自言是某家新婦中有是其鄰里者先知其事衆方信之鄰人因脫衫衣之與俱還其夫已死翁姥憫而收之婦人亦憨戅乏精神恆為往來者狎昵劉全白親見之録異記趙燕奴者合州石鏡人也居近大雲寺初其母孕數月産一虎棄於江中復孕數月産一巨鱉又棄之又孕數月産一夜叉長尺餘棄之復孕數月而産燕奴眉目耳鼻口一一皆具自項已下其身如斷瓠亦有肩胛兩手各長數寸無肘臂腕掌於圓肉上各生六指才寸餘爪甲亦具其下有兩足各一二寸亦皆六指既産不忍棄之及長只長二尺餘善入水能乘舟性甚狡慧詞喙辨給頗好殺戮以捕魚宰豚為業每鬬船驅儺及歌竹枝詞較勝必為首冠市肆交易必為牙保又髠髮衣緇衣民間呼為趙師晚嵗但秃頭白衫而已或拜跪跳躍倒踣於地形必祼露人多笑之或乘驢逺適只使人持之橫卧鞍上若衣囊焉有二妻一女衣食豐足或擊室家力不可制乾德初年僅六十腰腹數圍面目與常人無異其女右手無名指長七八寸亦異於人吕申公夷簡嘗通判蜀中忘其郡召廨字中素有鬼物號榆老姑乃榆木精也其狀乃一老醜婦常出厨間與羣婢相偶或時不見即見之亦不以為怪公或呼問之即下階拜云妾在宅日久雖然非人然不為人禍公亦置而不問嘗謂公他日必大貴一日忽懷妊羣婢戲之自言非久當産遂月餘不見忽來云已産矣請視之指後園榆木西南大贅是麒麟石在榮昌治北八十里相傳昔有人偶見石平地自躍起及追剖之中有石麒麟頭角毛甲俱備一云𢎞治中曽有麒麟自水而出里人爭觀之遂入水疑即此石所化也行石亦在榮昌治北二十里地名伍家岩嘉靖中偶見一石如倉平地自行一里乃止後書行石二字於上蜀中廣記卷八十
