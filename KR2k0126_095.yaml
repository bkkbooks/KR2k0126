body:
  text: 蜀中廣記卷九十五明曺學佺撰著作記第五內典彭門光化寺石經髙僧傳云唐初釋道因于彭門山寺習道安居以九部微言三界式仰緬維法盡將翳龍宫遂於寺之北巖刻諸經典窮多羅之祕帙盡毗尼之正文縱堯世之洪水襄陵任趙簡之北山燎狩必無他慮與劫齊休既而追赴京邑止大慈恩寺與玄奘法師翻譯校定梵書兼充證義奘師偏獎賞之每有難文同加參酌宋板藏經圓悟禪師刻于昭覺院豫在遂寧廣德寺見之又僧道先言大慈寺尚存十之二三銅梁縣石洞遺經志云縣北十五里華嚴山絶壁岩洞裂出古遺經數千卷因建寺藏之晉慧持龍淵寺經典髙僧傳慧持乃廬山逺之弟也以晉隆安三年辭逺入蜀止龍淵寺講説齋懴義熙八年卒于寺中以東間經籍付弟子道泓西間法典囑弟子曇蘭泓業行清敏蘭神悟天發並係軌師蹤焉釋道安譯維摩法華等經隋經籍志晉石勒時常山沙門衛道安稟性聰敏誦經日至萬餘言以胡僧所譯維摩法華未盡深旨精思十年心了神悟乃正其乖舛宣揚解釋時中國紛擾四方隔絶道安乃率門徒南逰新野欲令玄宗所在流布分遣弟子各趨諸方法往詣揚州惠逺之襄陽法和入蜀道焉如來藏經會釋疏二卷大無量夀經疏二卷勝鬘經疏四卷般若心經金剛經疏義俱釋知玄著髙僧傳玄眉州洪雅人著如來藏經疏命僧徹撰法鑑以照象若十翼焉大無量疏經命僧徹撰法燈闕類章指焉勝鬘經疏四卷命僧徹撰法苑以錯綜猶緯書焉又般若心經金剛經各有疏義此外作釋氏雜文外篇二十餘卷釋法泰書法華經髙僧傳法泰眉州隆山人俗姓吕氏為道士十餘年回心正覺因而剃除始誦法華經尋即通利乃精勤繕寫一部數有靈瑞欲向益州裝演令人擔負一頭以籠盛錢二千經置錢上一頭是衣服行至地名筰橋橋忽斷負擔者墜水中人浮得出擔沒不見泰於岸上捶胸號哭曰錢衣間事何忍溺經如能為漉得者賞錢兩貫時有一人入水沒得錢與衣襆而不得經泰轉悲泣近岸上下望小洲上有一襆取之乃原經也草木所擎宛無濕處泰不勝歡喜即以三千錢償所漉人其人曰法師悲號劇喪父母故為急覔非是貪錢弟子雖庸夫亦知福報請以此錢充莊嚴具言訖遁去既至成都裝演訖將還誦持不輟時彪法師在彼開講夜欲看讀恆嫌泰誦課聲髙自往請之見泰前有大衆皆胡跪合掌驚駭流汗而退金字法華經七卷元至正末年平江路女人鄒氏所書字畫端楷趙國師畫引首佛像甚工緻今在合州某生家豫及見之惜第五卷非故物引首猶全法華玄箋十卷髙僧傳唐梓州慧義寺神清三教俱曉該玄鑒極受業弟子黑白千餘前後撰得法華玄箋十卷併釋氏年志三十卷新律疏要訣十卷初學儀一卷有宗七十五法疏一卷亦名法源記又識心論澄觀論俱舍義鈔數卷北山參玄語録十卷銀字圓覺經新都志云元大德中西川成都府録事玉壘坊女子王潮捨在縣西五里華嚴菴圓覺經疏鈔十三卷疏略二卷髙僧傳唐圭峰禪師宗密果州人初齋次受經得圓覺十二章深達義趣誓傳是經在漢上因病僧付華嚴句義未嘗隸習即爾講之由是乃著圓覺華嚴及涅槃金剛盂蘭法界觀行願經等疏鈔及法義類例禮懴修證圖傳纂略又集諸宗禪言目為禪藏金紫光祿大夫同門下平章事裴休序曰夫血氣之屬必有知凡有知者必同體所謂真淨明妙虛徹靈通卓然而獨存者也是衆生之本源故曰心地是諸佛之所得故曰菩提交徹融攝故曰法界寂靜常樂故曰涅槃不濁不漏故曰清淨不妄不變故曰真如離過絶非故曰佛性護善遮惡故曰總持隱覆含攝故曰如來藏超越玄閟故曰密嚴國統衆德而大備爍羣昏而獨照故曰圓覺其實皆一心也背之則凡順之則聖迷之則生死始悟之則輪回息親而求之則止觀定慧推而廣之則六度萬行引而為智然後為正智依而為因然後為正因其實皆一法也終日圓覺而未嘗圓覺者凡夫也欲證圓覺而未極圓覺者菩薩也具足圓覺而住持圓覺者如來也離圓覺無六道捨圓覺無三乘非圓覺無如來泯圓覺無真法其實皆一道也三世諸佛之所證蓋證此也如來為一大事出現蓋為此也三藏十二部一切修多羅蓋詮此也然如來垂教指法有顯密立義有廣略乘時有先後當機有深淺非上根圓智其孰能大通之故如來於光明藏與十二大士密説而顯演潛通而廣被以印定其法為一切經之宗也圭峰禪師得法於荷澤嫡孫南印上足道圓和尚一日隨衆僧齋於州民任灌家居下位以次受經遇圓覺了義卷未終軸感悟流涕歸以所悟告其師師撫之曰汝當大𢎞圓頓之教此經諸佛授汝耳禪師既佩南宗密印受圓覺懸記於是閲大藏經律通唯識起信等論然後頓轡于華嚴法界宴坐於圓覺妙場究一雨之所霑窮五教之殊致乃為之疏解凡大疏三卷大鈔十三卷略疏兩卷小鈔六卷道場修證儀一十八卷並行於世其序教也圓其見法也徹其釋義也端如析薪其入觀也明若秉燭其辭也極於理而已不虛騁其文也扶於教而已不茍飾不以其所長病人故無排斥之説不以其未至蓋人故無胸臆之論蕩蕩然實十二部經之眼目三十五祖之骨髓生靈之大本三世之達道後世雖有作者不能過矣其四依之一乎或淨土之親聞乎何盡其義味如此也或曰道無形視者莫能覩道無方行者莫能至况文字乎在性之而已豈區區數萬言而可詮之哉對曰噫是不足以語道也前不云乎統衆德而大備爍羣昏而獨照者圓覺也蓋圓覺能出一切法一切法未嘗離圓覺今夫經律論三藏之文傳於中國者五千餘卷其所詮者何也戒定慧而已修戒定慧而求者何也圓覺而已圓覺一法也張萬行而求之者何衆生之根器異也然則大藏皆圓覺之經此疏乃大藏之疏也羅五千軸之文而以數卷之疏通之豈不至簡哉何言其繁也及其斷言語之道息思想之心忘能所滅影像然後為得也固不在詮表耳嗚呼生靈之所以往來者六道也鬼神沉幽愁之苦鳥獸懷獝狘之悲修羅方瞋諸天正樂可以憗心慮趣菩提唯人道為能耳人而不為吾末如之何也已矣休常遊禪師之閫域受禪師之顯訣無以自效輒直讚其法而普告大衆耳其他備乎本序新繁縣空中般若經法苑珠林益州新繁縣西四十里許有王李村隋時書生有姓茍者在此教學大工書而不顯迹人欲其書終不肯出乃毆之亦不出嘗以筆於前村東空中四面書金剛般若經數日便了云此經擬諸天讀之人初不覺其神也後忽雷雨大澍牧牛小兒於書經處住而不澆濕其地乾燥可有丈許村人怪之爾後每雨往驗皆然唐武德中有非常僧語村人曰此地空中有金剛般若經諸天於上設蓋覆之不可輕汚村人因此四周欄楯至今天雨其地恆乾每齋日常聞天樂聲振繁會盈耳石刻尊勝幢呪一章唐大中間馬繼武書於石幢上幢似柱髙三四尺其式如觚萬歷初年金沙寺僧修砌掘得完全可拓朱郎中血字經蘇文忠集云朱夀昌郎中少不知母所在刺血寫經求之五十年去嵗始得於蜀中作古風以賀楞嚴經資中疏恆沇法師者蜀人也因京師惟慤疏楞嚴經義乃作義章開釋此經號資中疏金字華嚴經唐開元中蕃王子譯進今在遂寧廣德寺華嚴合論髙僧傳眉州中嵓華嚴祖覺禪師幼聰慧書史過目成誦著書排釋氏惡境忽現悔過出家未幾疽發膝上五年醫莫愈因書華嚴合論畢夜感異夢旦即捨杖步趨一日誦至現相品曰佛身無有生而能示出生法性如虛空諸佛于中住無住亦無去處處皆見佛遂悟華嚴宗旨府帥請講于千部堂詞辨宏放衆所歎服因號為華嚴禪師云本事經七卷譯經圖記四卷髙僧傳釋靖邁梓潼人貞觀中玄裝法師西回敕令翻譯師預其選同棲玄明濬等執筆綴文譯本事經七卷又著譯經圖記銓序古今經目譯人名位單譯重翻疑偽等科一皆條理編于藏唐藏經音義四卷朝氏曰未詳撰人分四聲以類相從蜀中印本也起信論注一卷馬鳴大士造僧宗密注原人論一卷亦宗密撰斥執迷褊淺直顯真源通本末凡四篇為一卷三教圓通論任夀龍昌期著護法論蜀州張無盡嘗見梵册整齊嘆吾儒之不若夜方執筆抒思妻向氏問何作曰欲作無佛論向曰既曰無又何論公駭其言而止後閲藏經悚然有悟乃作護法論見唾玉集水懴文唐悟逹國師法諱知玄初逰學時寓一寺結夏有鄰僧患迦摩羅疾衆皆惡之玄獨時為將理久而益勤夏竟分袂疾僧謂曰感君髙誼昭佩不忘吾舊居蜀彭州九隴山有二長松為門之表君他日榮遇後將罹宿障之疾能一見尋或可療治言已登途玄師學行既充聲德昭著居京師安國寺宏開法席咸通十二年懿宗駕幸安國賜以沉香寶座署為國師恩渥隆厚忽生大瘡於膝上眉目唇豁狀如人面動轉艱難疼不可忍遍召名醫莫之能為也因憶前約逺詣成都抵九隴山時值晡晚四顧倣徨見二長松鬱乎蓋張挺立雲表遂趨而入崇樓廣殿金碧交輝昔之鄰僧門迎而入禮貌勤至延佇止宿詢問所來遂告厥苦彼曰無傷引至巖阿有泌其泉清湛可愛試令洗之以愈其疾方將掬水瘡作人語揚聲大呼未可洗濯試聼厥由公今博識必達古今曽讀西漢書見袁盎殺鼂錯事否錯當趨避東廂心知袁盎之進言乎載赴東市受刑寧不大興怨恨盎即公也錯即我也其寃為何如哉以公十世皆為髙僧戒律精嚴故吾不得伸其銜今膺異寵損德以奢方能爾及既蒙迦諾迦尊者慈悲三昧之水濯我積世讎挾之心自今與公兩釋無憾也掬浣之初痛徹心膂殆絶而蘇其瘡即愈方知彼僧乃應真之化現也遂即其地樹剎以表之深思積寃遇聖而釋因此興念彼或皆然遂述懴文以為楷式取慈悲水能滌寃愆詒厥將來普令深省名曰水懴厥軌可遵因起若斯覽者宜悉杭州沙門若訥序道一禪師語録即馬祖也漢州什邡人見髙僧傳為四家語録之首惠禪師語録師名山人元符間屢舉不第郡守吕由誠戲與僧敕明日即削髮有語録行世長松長老顯禪師語録蘇元老序云頃嵗吾蜀佛教惟講席律壇之為尚蓋人自以為無等等法矣而未始知有祖道之髙晚得真覺勝禪師自黃蘖歸闡化於成都昭覺寺初會易之廣大變動周流六虛者又圓道之微妙混成先天地生者遂言曰吾之法函蓋乾坤不為大消殞虛空不為難當體見成隨用立具于時西南緇素之士驟聞之率多聽熒瞪矒不入久之各憮然為間曰異哉此故吾家物也胡歷劫遺之乃今獲之莫不失喜落涕恨遭遇之晚勝禪師既殁紹禪師繼之其法猶勝禪師也而化度之衆加多焉紹禪師既沒顯禪師繼之其法猶紹禪師也而緣合之法加盛焉前住長松今住保福其皈依之侣未可計而濟拔之功未有艾也時會下髙弟有法安者盡能記禪師兩地為人言句録而刋之離為二通其保福之語則平等居士已為冠篇矣而長松之録猥委元老承之嗚呼釋迦别傳迦葉親授西天祖師之所護念中華耆宿之所承襲邈哉遐矣不圖今日及吾身親見之然以吾觀於禪師微言奧句關鍵幽密假令合天下禪盡眼微睇窺之吾知其不得髣佛直羞澀匍匐歸耳顧某何敢妄談聊舉其粗以曉吾黨新發意者蘄與之交臂作舞同趣師門云禪喜集蘇東坡作載與緇宿往復語刻在吳中褒善録一卷朝氏曰王蕃撰嘉祐中巴縣簿黃靖國死而復蘇道其冥中所見廖生嘗傳之而蕃刪取其要為此書樂善録十卷陳氏曰蜀人李昌齡伯崇撰以南中勸戒録增廣之多是因果報應之事吉凶影響録十卷朝氏曰中江岑象求編象求熙寧末間居江陵披閲載籍見善惡報應事輒刪潤而記之間有聞見者難于備載亦采摘著于篇僧史一百卷僧祖覺撰即華嚴禪師也中嵓石笋上祖覺臺是其説法處釋氏指心書六十四卷簡州趙介胄著南紀緇林宋末普州張山翁君夀撰益部寺記劉悛撰齊人成都大悲寺集二卷大慈寺記二卷並李之純編玄書峩眉山洞石經二十字雲笈七籖峩眉山北洞中石室户樞刻石書字鬱儀引日精結璘致月神得道處上宫位稱大夫真凡二十字不解其意義是何等事如此仙人不見其篇目者多矣皆不得飛行上清欲行此道不必賢愚但地上無此文三十九章經七籖云太無晨中君刋此峩眉山中洞宫玉户曰太無在洞景之表太素在幽玄之上九宫列金門於太素之表丹樓沓七重於太無之庭乃三元君所逰也八道命籍七籖云東海小童四極真人西城王君封此籍於峩眉山西室中萬劫一傳有玄名帝簡紫字青宫玉藏之文千年之內聽得三傳上學不得此文虛困山林終不得道所謂八道者日月四時八節所行也日行赤道月行黃道黃赤二道隂陽之所恆行至於立春春分日月行青道二出黃道東立夏夏至日月行赤道二出黃道南立秋秋分日月行白道二出黃道西立冬冬至日月行黑道二出黃道北此八道也天真皇人九仙經一卷朝氏曰天皇人為黃帝説一行羅公逺葉法靜注崇文書目按九仙經興廢記云此經黃帝留峩眉山石壁漢武帝時得之大中初嘗禁絶三一經元氣論云黃帝求道於皇人皇人問所得者凡一千二百事乃曰子所得皆末事也子欲長生三一當明夫三一者乃上皇黃籙之首篇也能知之者萬禍不能干矣上真內經集仙記云禹治水至巫山見雲華夫人夫人謂禹曰子之功及於物矣勤逮於民矣善格乎天矣而未聞至道之要也吾昔於紫清之闕受書於我師三元道君曰上真內經天真所寶封之金臺佩入大微則雲輪上征神武抱關振衣瑶房遨宴希林長招仙公右栖白山而下眄太空泛乎天津則乘雲騁龍逰此名山則真人詣房萬神奉衛山精伺迎動遊八景玉輪靜則宴處金堂亦謂太上玉佩金璫之妙文也汝將欲越巨海而無飈輪渡飛沙而無雲軒陟厄塗而無所輿涉泥波而無所乘陸則困於逺絶水則懼於漂淪將何以導百谷而濬萬川也危乎悠哉太上愍汝之志亦將授以靈寶真文陸䇿虎豹水制蛟龍斬馘千邪檢馭羣凶以成汝之功也其在乎陽明之天耶吾所受寶書亦可以出入水火嘯吒幽冥收束虎豹呼召六丁隱淪八地顛倒五星久視存身與天相傾也因命侍女陵容華出丹玉之笈開上清寶文以授禹拜受而去黃表丹經一通神仙傳曰隂長生裂黃表寫丹經四通其一通以黃金之簡刻而書之封以白銀之函置蜀綏山天元度人經文獻通考富順監有太平觀二十四化殿唐貞觀八年建宋嘉定七年重修石砌中得經一卷曰天元度人妙經道家未嘗見者凡六百餘字見板行云日月玄樞論一卷朝氏曰唐劉知古撰明皇朝為綿州昌明令時詔求通丹藥之士知古謂神仙大藥無出參同契因著論上于朝參同契分章通真義三卷明鏡圖訣一卷陳氏曰真一子彭曉秀川撰蜀永康人也序稱廣政丁未以參同契分十九章而為之注且為圖八環謂之明鏡圖曩在麻姑山傳録其末有秀川傳汪綱會稽所刻本其前題祠部員外郎彭曉蓋據祕閣本云爾麻姑本附傳亦言仕蜀為此官張隨注參同契三卷朝氏曰隋皇祐中居青城山注魏伯陽書列十數圖於其後壺中集三卷三教論一卷大寶論一卷二十四化詩一卷圖一卷道教靈驗記二十卷録異記十卷並杜光庭撰王氏神仙傳四卷朝氏曰杜光庭纂集王氏男真女仙五十五人以諂王建又有王虛中續纂三十人附其後授道心一篇朝氏曰真宗朝楊谷常遇仙於成都藥市自授其道本李氏書目亦載云谷自號純粹子通玄祕要悟真篇一卷朝氏曰張用成平叔撰天台人熙寧中隨陸師閔入蜀授道於隱者因成律詩八十一首養生丹訣一卷岷山道士皇甫士安撰太上洞玄靈寶修真論一卷成都李道士撰宋史載不詳名代鬼神感應大義九卷隋郫人何妥受詔與沈重撰文昌化書七十三則宋淳熙重光赤奮若至日降筆神為晉越嶲張雱夫諱亞續化書二十一則紹熙閼逢攝提中秋日降神之季筆也略見神明傳蜀中廣記卷九十五
