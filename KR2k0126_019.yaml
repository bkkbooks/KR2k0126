body:
  text: 蜀中廣記卷十九明曹學佺撰名勝記第十九上川東道重慶府三涪州華陽國志巴子時雖都江州先王陵墓多在枳又云涪陵郡巴之南鄙從枳南入折丹涪水與楚商於地接司馬錯昔取商於繇此道也漢時恆有都尉守之蜀延熙中車騎鄧芝以江州都督治陽關于此陽關者巴子所置三關之一水經江水東至枳縣西延江水從牂柯郡北流西屈注之又云江水至巴郡涪陵縣注更始水酈注曰水東徑陽關巴子梁江之兩岸猶有梁處寰宇記云岑彭破公孫述將侯丹於黃石黃石者橫石灘也謂之石梁水經注曰江水東至梨鄉厯雞鳴峽江之兩岸有枳縣治故華陽國志謂枳縣治涪陵水會庾仲雍謂有别江出武陵者也又曰更始水即延江枝分之始也延水北入涪陵水王莽更名巴亭張堪為縣會公孫述來擊于時同心義士選習水者筏渡堪於小别江即此水也其水北至枳縣入江方輿勝覽云涪江者自思州之上費溪發源經五十八節名灘方至黔州溉自黔州溉與施州江會流九十里經彭水武隆二縣凡五百餘里與蜀江會于州之東以其出於黔州又呼黔江亦名內江其水淵澄清徹可鑒毛髮底見苔石魚蝦可數張祐送李長史歸涪州詩涪江江上客歲晚却還鄉暮過高唐雨秋經巫峽霜急灘船失次疊嶂樹無行好為題新什知君思不常戴叔倫漸至涪州先寄王員外使君縱詩文教通夷俗均輸問火田江分巴字水樹入夜郎煙毒瘴含秋氣陰崖蔽曙天路難空計日身老不由年將命寧知逺歸心詎可傳星郎復何意出守五溪邊陸遊詩古壘西偏曉繫舟倚闌搔首思悠悠欲營丹竈竟無地不見荔枝空逺遊官道近江多亂石人家避水半危樓使君不用勤留客瘴雨蠻煙我欲愁方輿云黔江東岸有龜山州治其上元和志舊州在岷江南今州在涪江西蜀漢涪陵太守龎肱有惠政輿地碑目淳熙中左綿任子宣過涪陵於民家見漢𨽻石闕上書漢涪陵太守龎肱闕闕製如碑東渡高峯之上與州治相對為石甕磧方輿勝覽云太守吳侯嘗遊石甕磧遇一女繖蓋步磧上曰吾父居此瀕去解一玉環付廂吏為我謝使君異日當厯顯任子孫復守此州言訖不見按志吳光輔為涪守後三十年其孫仲復又守是邦今吳公溪吳公山所為得名也舊經云吳君山一名鐵匱山橫亘江北與涪陵縣相望雄壓衆山俯臨長江屹立如匱相傳武侯屯兵于此舊城猶存勝覽云鐵匱之南為北岩王真人修煉處也紹聖丁丑程伊川謫涪即普淨院闢堂傳易再閲歲為元符庚辰乃徙夷陵碑目云涪陵江北普淨院記治平間校書郎傅耆撰北岩書院記嘉定丁丑簡池劉光祖撰普淨院鉤深堂榜别駕黃庭堅書又有淳祐辛丑三月既望古綿劉濟川三山林元成都杜庭燮三瀘何清題名又有汴陽吳克舒以紹興癸未書雲日舉家來遊阱掾侍行諸刻輿地紀勝云開寶四年黔南上言江心石魚見上有古記云廣德元年二月大江水退石魚見部民相傳豐稔之兆按其處在近州鑑湖中央石上刻雙魚一銜蓂草一銜蓮花各三十六鱗傍有石稱石斗或十年或三五年一出唐大順元年鐫詩甚多方輿勝覽州西一里白鶴灘爾朱真人沖舉之處志云爾朱既浮江而下漁人有白石者舉網得之擊磬方醒遂於涪西灘前修煉後乘白鶴仙去因以名灘又云爾朱先生種松山在州東二里種時松影映石石皆有松紋至今呼松屏石採者禱於先生乃得佳不煩人力自然成文華陽國志延熙二年馬忠定越嶲置赤甲軍常取涪陵之民蜀丞相諸葛亮亦發徑卒三千人為連弩士按志有赤甲戍與黃草峽相近在李渡之上藺市之下杜甫詩云黃草峽西船不歸赤甲山下行人稀即此地也碑目云許雄山有古廣漢縣令神道碑俗呼為誓虎碑偶碑仆遂有虎入城縣官設祭復豎碑虎害乃止按山在州西南七里山之東有馬援壩志云馬援壩在治南四里伏波祠在治東十里相傳將軍征武陵蠻駐兵之處寰宇記涪陵江中有銅柱灘最峻急昔人維舟于此見水底有銅柱云灘之東為錦繡洲九域志云此洲人業織錦罽也宋翰詩錦繡洲猶在熊羆夢已無文風齊兩蜀仙洞接三都白石從天設青崖見地圖荔枝妃子國不復曩時輸方輿勝覽云域西十五里有妃子園其地多荔枝昔楊妃所嗜當時以馬遞駝載七日七夜至京人馬多斃於路百姓苦之故杜牧之過華清宫詩云長安回望繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔枝來華陽國志涪陵郡有丹興縣以山出名丹也蜀時省李特傳范長生一名延久又名九重涪陵丹興人按史記巴寡婦清之先得丹穴而擅其利家富不資清能守其業用財自衛秦皇帝以為貞婦而為築女清臺括地志云女清臺山在永安城東北七十里為涪陵南平二郡界武隆縣漢涪陵枳二縣地唐武德元年分涪陵縣立以邑界武隆山為名本志云枳縣故址在治東上流二十里李膺益州記云內江水自萬寧西北二百八十里至關頭灘灘長百步懸崖倒水舟楫莫通寰宇記云內江一名涪陵江一名巴江在縣南屈曲北流又云蜀江門灘在縣前巴江水中志云縣西一里古渡頭有斷石中白䀶如劒光芒燭天名為天劍又云南二十里有信水在峽口其泉如沸水與江等日有三潮每至則高尺餘又云龍寶潭在縣東北七十里古箐凄其人鳥兩絶杖藤而入幽徑可十里忽平沙廣野曲壑清泉别一世界四夷考云武隆之地東鄰黔楚西接牂柯北枕巴江南通貴竹又三面界土司為酉陽之咽喉石砫之頂臂至若真州則撲胸之患矣所謂難先全蜀險厄諸蠻者也彭水縣史記秦司馬錯取楚商於之地為黔中都即此寰宇記云即劉璋之漢葭縣矣隋開皇十三年蠻帥內屬故于此地設彭水屬黔州亦州之所理也本志云舊理在壺頭山之麓今移於紹慶府基按宋史太平興國八年黔州摩圍山慶雲出通判黃仲震圖頌以獻中興小厯理宗始追封為紹慶府焉權載之黔州觀察使廳記云黔中為楚西南徼道在漢為武陵莊蹻循江以略地唐蒙浮􅊑以制越舊經地近荆楚候如巴蜀五溪襟束蠻蛋聚落陰雨多晦草木少凋寰宇記云五溪謂酉辰巫武沅等五溪古老相傳楚子城巴巴子兄弟五人流入五溪各為一溪之長一説五溪蠻皆盤瓠子孫自為統長故有五溪之號古謂之蠻蛋聚落也三國志劉先主于五溪蠻之地置黔安郡即此地樂史以為郡後周設誤矣劉長卿送任侍郎黔中充判官詩不識黔中路今看遣使臣猿隨萬里客鳥似五溪人地逺官無法山深俗易淳須令荒徼外亦解懼埋輪司空曙送龎判官赴黔中詩云天逺風雲異西南見一方亂山來蜀道諸水出辰陽堆案青油暮看棊畫角長諭文誰可製記室有何郎李嘉祐送上官侍御赴黔中詩莫向黔中路令人到欲迷水聲巫峽裏山色夜郎西樹隔朝雲合猿窺曉日啼南方饒翠羽知爾飲清溪許棠寄黔南李校書詩從戎巫峽外吟興更應多郡響蠻江漲山昏蜀雨過公筵饒越味俗土尚巴歌中夜懷吳夢知經灔澦波顧非熊送皇甫司録赴黔南幕詩黔南從事客祿利向來饒官受外臺屈家移一舸遙夜猿聲不斷寒木葉微凋遠别因多感新郎倍寂寥杜荀鶴送人尉黔中詩盤山行幾驛水路復通巴峽漲三川雪園開四季花公庭飛白鳥官俸請丹砂知尉黔中後高吟采物華許琳黔中書事詩巴蜀水南偏山窮塞壘寬歲時將近臘草樹未知寒獨狖啼朝雨羣牛向暮灘更聞蠻俗近烽火不艱難竇羣黔中書懷詩萬事非京國千山擁麗譙佩刀看日曬賜馬傍江調言語多重譯壺觴每獨謡沿流如著翅不敢問歸橈李頻黔中酬同院韋判官詩平生同所為相遇偶然遲各著青袍後無歸白社期江流來絶域府地管諸夷聖代都無事從公且賦詩碑目云漢故孝亷栁莊敏碑在州廨內字迹銷訛唐黔南節度使趙國珍德政碑上元二年立在州南隔江崔能神道碑集古録以為長慶二年立在州治山谷刀筆云宋左藏庫副使東南第八將秦世章自長沙買石摹僧寶月古法帖十卷載回黔安壁之紹聖院庭堅為之跋按世章秦子明涪州人也丹鉛録謂寶月帖又在隋開皇帖南唐升元帖之前比之金薄匱紙銀錠痕者優劣當懸矣紀勝云魯直謫居有涪翁晚䇿杖至此觀江漲雨餘天欲涼十五字墨迹在州之嘉禾堂又黔中與人帖云庭堅頓首竊觀鎮靜足以安夷獠清節足以服吏民郡閣宴間時與僚佐歌舞以謝江山當亦無不樂時别後未嘗不思英對也齋中小宴歌舞中更得新進否此邦樂籍似皆勝渝瀘微有成都之風也本志載宋冉木震黔州倅衙月山岩銘云黔號古郡地居極邉倅治倚山其山刺天有曰月巖古老相傳視事纍月遍求茫然偶濬溝渠巨石中填深掘視之厥狀巑岏中竇一穴透明而圓皎如秋月翳絶雲煙旁補三隙如星之聫抆拭細觀古識存焉善命僕夫挽置座前負以層石映以灣泉日對其側卷舒簡編凡物遭遇皆有夤緣高岸深谷知幾變遷惟我月巖存千萬年又飛來峯銘云黔山角逐雲空相摩疊石其間如戟如戈否則蹲伏橫立攢阿千狀萬怪知名幾何惟飛來峯涪翁相遭有筆如椽三字衮褒一經品題聲價倍高譬如人乎何地無材不遇知音均混草萊有送吹噓清冥路開一飛沖天逈絶塵埃噫歟兹石千古皚皚四維整植如出剪裁日炙雨澆蒼然生苔不動惟汝何從飛來因涪翁重汝何能哉志云緑陰軒在治南一里石軒下平曠可容十數人黃魯直過此手書緑陰軒三字鐫于石壁至元年紹慶總管向午鳳重修有臥佛巖與緑陰軒相近巖石欹懸生一竅甚圓仰窺之又生一竅其中虛明有橫石一塊眉目宛然如來佛曲肱枕臥時也紀勝云西南過江五里有摩圍山夷獠呼天為圍以其高摩于天也道家謂之洞天福地昔有樵者攀緣入洞見二老圍碁其中回復尋之了不可得魯直安置黔中寓開元寺號摩圍老人有石泉在山頂山勢壁立泉從石竇中流出寺僧以甕接之為朝夕清供碑目載摩圍山唐人石刻云巴黔路途濶遠亦無館舍凡至宿泊多倚溪嵓就水造餐鑽木出火山谷集云丙子仲秋黔守席上客有舉杜少陵中秋詩曰今夜鄜州月閨中只獨看遙憐小兒女未解憶長安因戲作詞云舉頭無語家在月明生處住擬上摩圍最上峯頭試望之偏憐鍾秀苦炎同甘誰更有想見牽衣月到愁邉總未知又丙子仲秋奉陪黔陽曹使君伯達玩月作減字木蘭花兼簡施州張使君仲謀云中秋多雨常是樽罍狼籍去今夜雲開須道姮娥得得來不知雲外還有清光同此會笛在層樓聲徹摩圍頂上頭九州要記云黔州有彭水在信寧縣即古之黔中地志云唐長孫無忌墓在信寧西岸岐山之麓按史無忌洛陽人纍官太子少傅同中書門下三品高宗時諫立武后許敬宗誣奏無忌反削其官爵謫黔州安置沒葬是鄉居人歲以三月三日致祭云黔江縣隋之石城縣也志云城東二十五里為舊縣矣又云歌羅驛在治東百九十里黃魯直竹枝歌七首題于驛壁其一云浮雲一百八盤縈落日四十九渡明鬼門關外莫言逺四海一家皆弟兄志云四十八渡水在治西二十里發源柵山溪水折流四十八灣夾于兩岸之間春月百花飄落隨水可愛又云治西五十里峭壁中有木匱人迹不到曰匱子崖在四十八渡之中李頻泛黔江詩野梅將雪競江月與沙寒即此水也忠州譙周三巴記曰臨江縣後漢初平六年立在永寧郡東四百里臨江南古城水經曰江水又東徑臨江縣南注謂王莽之鹽江縣也郡國志云梁于此立臨江郡隋置臨州貞觀始改為忠州忠之名以巴蔓子或云嚴顔按華陽國志周之季世巴國有亂將軍蔓子請師於楚許以三城楚王救巴巴國既寧楚使請城蔓子曰藉楚之靈克弭禍難誠許楚王城將吾頭往謝之城不可得也乃自刎以頭授楚使楚王歎曰使吾得臣若巴蔓子用城何為乃以上卿禮葬其頭巴國葬其身亦以上卿禮今治西北一里有蔓子冡三國志劉璋使嚴顔守巴郡為張飛所擒欲降之顔曰有斬頭將軍無降將軍飛怒命斬之顔從容曰斫頭便斫頭何必怒耶今臨江縣西南二十里有嚴太守碑及詞蘇軾詩云先主反劉璋兵意頗不義孔明古豪傑何以為此事劉璋固庸主誰為死不二顔子獨何賢談笑傲砧几國亡君已執嗟子死誰為何人刻山石使我空涕淚蘇轍詩云古碑殘缺不可讀逺人愛惜未思磨相傳昔者嚴太守刻石千歲字已訛嚴顔平生吾不記獨憶城破節最高被擒不辱古亦有吾愛善折張飛豪軍中生死何足怪乘勝使氣可若何斫頭徐死子無怒我豈畏死如兒曹匹夫受戮或不避所重壯氣吞黃河臨危間暇有如此覽碑慷慨思橫戈自注云碑在忠州本志州西五十里江中高阜名唐土洲有嚴顔墓碑及祠九域志云臨江郡有古屈原碑王象之碑目亦引之東坡謂屈原古塔在忠忠不當有此意者後人追思為之其詩曰楚人悲屈原千歲意未歇精魂飄何處父老空哽咽至今滄江上投飯救飢渴遺風成競渡猿呌楚山裂屈原古壯士就死意甚烈世俗安得知眷眷不忍決南賓舊屬楚山上有遺塔陸遊詩云我遊南賓春暮時蜀船曾繫挂猿枝雲迷江岸屈原塔花落空山夏禹祠塔在江之南岸紹聖四年王闢之知忠州建四賢閣於治後四賢者故相司徒鄭州刺史南華劉晏士安故相贈兵部尚書嘉興陸贄敬輿中書侍郎平章事贈司徒安邑李吉甫宏憲刑部尚書致仕贈右僕射下邽白居易樂天皆有像設今移在學宫輿地碑目云忠州學宫有漢江原君石闕闕上延熹等二十七字可拓自州西十五里移來者又有晉王右軍半月橘帖經涪翁題跋又云州治有漢建初中修道碑字已漫滅餘建初等十二字可辨治內議道堂有唐率更柘漿帖碑太守王聖凃購自臨江農民瞿氏命男宗摹刻紹聖四年七月二十四日後有山谷題跋又云州儀門下有漢延熹嚴孝子碑按華陽國志元初中貢孝子嚴永即此碑矣字已漫蝕餘延熹二年等八十餘字自城西二十里移來者文苑英華唐蘇頲有授忠州刺史上騎都尉王守亷制陳子昻有忠州江亭喜遇吳參軍見牛司倉序略云江亭回瞰羅雜樹于階基山榭遙臨列羣峯于戶牖丹藤緑篠俯映長筵翠渚洪瀾交流合坐者矣杜甫宴忠州使君姪宅詩出守吾家姪殊方此日歡自須遊阮舍不是怕胡灘樂取長歌送杯饒旅思寬昔曾如意舞牽率強為看李端送濮陽録事赴忠州詩成名不逐雙旌逺空印還為一郡雄赤葉黃花隨野岸青山白水映江楓巴人夜語孤舟裏越鳥春啼萬壑中聞説古書多未校肯令才子久西東白居易郡中春宴因贈諸客詩僕本儒家子待詔金馬門塵忝親近地孤負聖明恩一旦奉優詔萬里牧逺人可憐島夷帥自稱為使君身騎牂柯馬口食巴江鱗暗淡緋衫故斕斑白髮新是時歲一月玉厯布春分頒條足皇澤命宴及良辰冉冉趨府吏蚩蚩聚州民有如蟄蟲鳥亦應天地春薰草席鋪座藤枝酒注樽中庭無平地高下隨所陳蠻鼓聲坎坎巴女舞蹲蹲使君居上頭掩口語衆賓勿笑風俗陋勿欺官府貧蜂巢與蟻穴隨分有君臣樂天刺史兹邦風流暇豫日事遊賞其蹤迹最著者有東樓荔枝樓鳴玉溪龍昌寺巴子臺東坡東澗諸勝黃魯直為王聖凃作記云樂天東樓以燕賓佐西樓以瞰鳴玉溪登龍昌上寺以望江南諸山張樂巴子臺以會竹枝歌女東坡種花東澗種栁皆相傳識其舊處焉東樓即城東樓也白公東樓詩云山束邑居窄峽牽氣候偏林巒少平地霧雨多陰天隱隱煮鹽火漠漠燒畬煙賴此東樓夕風月時翛然憑軒望所思目斷心悁悁又東樓竹詩云瀟瀟城東樓繞之多修竹森然一萬竿白粉封青玉捲簾睡初覺欹枕看未足影轉色入樓牀席生浮緑空城絶賓客向夕彌幽獨樓上夜不歸此君留我宿荔枝樓在治西南隅即西樓也公既作荔枝圖以寄親友又建樓以賞之其詩曰鄉路音信斷山城日月遲欲知州近遠階前摘荔枝又西樓詩云悄悄復悄悄城隅隱林杪山郭燈火稀峽天星漢渺年光東流水生計南枝鳥月沒江沈沈西樓殊未曉寰宇記云鳴玉溪在州西十里上有懸岩瀑布高五十餘丈潭洞幽邃古木蒼然前刺史房式嘉其幽絶特置蘭若凡有五橋以渡長慶集云鳴玉溪上木蓮穠茂元和十四年夏命道士母邱元志寫之本志云溪在治西二里發源西崖水聲如珮玉其傍有古刻亦名西溪又云西北五里有木蓮洞宋錢求之詩云鳴玉溪邉堪寓目木蓮洞下更關情忠州好景無人説袛得孤城小市名今治內有木蓮樓相沿其名非故處也龍昌有上寺下寺俱唐建在西山頂者為上寺即巴臺寺也與翠屏山相對故云可以望江南志謂之巴子臺巴子所築也唐宋詩刻存焉下寺即治平寺寰宇記曰龍昌寺在臨江縣東今為治平寺白公嘗於寺旁植栁栁盛則寺興栁衰則寺廢寺僧愛此栁比之甘棠白傅登城東古臺詩迢迢東郊上有土青崔嵬不知何代物疑是巴王臺巴歌久無聲巴宫沒黃埃志云巴王廟在州東一里神即蔓子將軍也歲三月七日太守以豕帛致祭先期土人具千鈞蠟祠之宋為永順祠今為忠貞祠王象之碑目云漢丁房雙石闕在巴王廟前按左闕高可二丈覆以飛甍層觀最上琢雙扉一美人現半身倚立中層琢車馬人物旁刻文螭糾蟠長可三四尺金石古文云此漢畫之始也正面漢𨽻十行行三十字強半剝落惟漢都尉丁房五字相聫可讀它無恙者尚三二十字闕陰鐫云紹聖丁丑五月戊午知忠州軍州事齊國王闢之軍事推官荆南李鑑兵馬監押雒陽田缺巡檢安化楊中孝監稅濟南蓋犧逸録事高陽張復臨江縣令竟陵張微司戶參軍楊安文同司理參軍雲安常彥臨江縣主簿東武缺同遊永順王祠坐東軒面巴峽臨岷江望東溪之龍潭崇山峻嶺激湍清流真山陰之蘭亭也於是賦詩酌酒極一時適將歸共觀石闕之上讀漢都尉丁房碑欲重加刋刻而文字磨滅竟不可辨相與嘆息而去右邉闕就圯近日為有司者新之了非故物巴臺下江中有石圓光如鏡旁有五石笋簇之呼為仙人照鏡臺勝覽云東坡在南賓郡圃有亭名東亭白公詩緑樹為間客紅蕉當美人又何處殷勤重回首東坡桃李種新成又最憶東坡紅爛熳野桃山杏水林檎蘇子瞻東坡之號實始於此其詩云平生自覺出處老大粗似樂天非東坡之名偶爾同也志云東澗在治西開元寺側亦樂天時鑿公有東澗種栁詩云野性愛栽植植栁水中坻三年未離郡可以見依依水經曰江水又徑虎鬚灘灘水廣大夏斷行旅今州西二里有石梁三十餘丈橫截江中俗呼倒鬚灘即其處輿地碑目塘土洲有貞元十七年假文昌撰耆老思舊碑有唐刺史房公式善狀碑志云塘土洲在治西五十里有景德寺善狀碑立在普寧院中水經曰江水又東得黃華水口左徑石城南志云即皇華洲在東五十里江浦周回可二十里碑目云有宋忠州貢院碑參軍安元白立金魚堡碑升忠州為咸淳府碑俱在此洲上咸淳碑詔文敕門下皇天畀付有家敢怠繼承之敬乾元首出庶物聿懷潛躍之初念聖考之貽謀擇價藩而錫履嚴陵龍水之鎮受節齋永嘉忠南之封分茅主社眷言屏翰之重允協謳歌之歸漢輿地之上圖若規先憲周舊邦之新命並錫府名以壯萬年之觀亦尚一人之慶其改升溫州為瑞安府嚴州為建德府宣州為慶遠府忠州為咸淳府咸淳元年八月二十九日午時急速按寰宇記石城在臨江縣東百里岷江之北岸李雄之亂巴西郡寄理于此城四面懸絶亦謂之巴子城矣華陽記曰臨江縣有鹽官在監凃二溪一郡所仰按凃溪在州東八十里發源蟠龍洞來經凃井井神為漢楊伯起井廟碑云神嘗刺史荆州遡江至此憩于南城寺謂人曰江北二三里間安得有寶氣耶至蟠龍洞見周柱下史丹爐曰此地有龍無虎宜其丹不就也至凃山見白鹿飲泉曰寶氣在此矣土人從所指處鑿磐石而得鹽泉廟在治東一里志云東南八十里方斗山以形名也山有龍洞其神號方斗龍王所謂凃山與蟠龍洞者此是又云東二十里香爐堆北有石碑云處士楊佐墓漢楊伯起之裔孫南山即翠屏也在對岸二里山中有禹廟陸宣公墓玉虛觀朝真洞望夫臺仙履迹諸勝白傅作樓以望之其詩云江上新樓名四望東西南北水茫茫又有望南山寄行簡詩臨江一嶂白雲間紅緑層層錦繡斑不作巴南天外意何如昭應望驪山輿地碑目禹廟有唐碑字畫漫滅不可讀宋碑乃張俞作杜甫詩云禹廟空山裏秋風落日斜荒庭垂橘柚古屋畫龍蛇雲氣噓青壁江聲走白沙早知乘四載疏鑿控三巴度禹廟緣山行可里許為玉虛觀輿地碑目云玉虛觀有唐人修建碑四方輿勝覽云玉虛觀南三十步有陸宣公墓舊經陸宣公贄藁葬于此或曰宣公已歸葬檇李忠南特虛塜耳然子美已歸葬偃師而耒陽之墓自若太白已移殯青山而采石之塜猶在則敬輿此基宜封植之矣玉虛亦名紫極觀通志云忠州南十里有望夫臺未詳其事按東坡忠州望夫臺詩云山頭孤石逺亭亭江轉􅊑回似石屏可憐千古長如昨船去船來自不停浩浩長江赴滄海紛紛過客似浮萍誰能坐待山月出照見寒影高伶俜本志仙履迹石在治北八十里相傳昔有真人立此飛升今足迹尚存宋秦東詩仙人雙赤腳踏石如踏泥泥痕尚可沒石痕不可迷杜甫嘗居龍興寺有題院壁詩云忠州三峽內井邑聚雲根小市常爭米孤城早閉門空看過客泪莫覓主人恩淹泊仍愁虎深居賴獨園陸遊龍興寺弔少陵寓居詩中原草草失承平戍火胡塵到兩京扈蹕老臣身萬里天寒來此聽江聲注云寺門外江聲甚壯在州北八十里又二十里有拔山寺與龍興寺俱漢永平間建宋馮時行寶華寺詩雨宿初收草木濃羣鴉飛去法堂空長廊無事僧歸晚盡日門前只看松即漢之普明寺也已上三寺志云在州北九十里志云東北三十里大成寺漢初平建西北四十里寶珠寺晉永和建西北百里雙龍寺唐貞元建張詠雙龍寺詩未踏陽關已見山木鯨時吼翠微間老僧隨隊看雲起居士忘緣共鶴間入眼煙光依砌濕倚空霧氣繞山環三朝寶訓神明護大讀經章祝玉顔酆都縣水經曰江水又徑東望峽東歷平都注謂峽對豐民洲舊巴子别都也華陽國志巴子雖都江州或治平都即此續漢書永元二年分枳置平都取界內平都山為名方輿勝覽云自酆都縣東行二里許始登山石徑縈回可一二里平瑩如掃林木邃茂夾徑翠柏黃葛殆萬株有數十株是千年物此即平都山也酈道元曰平都有天師治兼建佛寺甚清靈道書號為平都福地輿地紀勝云仙都觀在平都山唐建宋改景德又名白鶴觀有陰長生詩天成四年書也通考云陰真人祠刻詩三章乃貞元中刺史李貽孫書元豐四年轉運判官許安世過祠下閲石定為陰仙之作乃屬知夔州吳師孟書石送置觀中詩見神仙記百川學海云治平末蘇東坡泝峽泊舟仙都山下道士持陰長生石本金丹訣就質真贋東坡答曰不知也然士大夫過此必以請久久自有知之者按古今詩謡云蜀道觀中泄井得一碑其文曰有物有物可大可久採乎蠶食之前用乎火化之後成湯自上而臨下夸父虛中而見受氣應朝光功參夜漏白英聚而雪慚黃酥凝而金醜轉制不已神趨鬼驟金歟玉歟天年上壽無著於文訣之在口此即陰仙所著丹訣也勝覽云陰長生以延光元年於平都山白日升天山頂五雲洞中嘗有雲氣從丹井中出洞有五雲樓壁上瑶池樂部四字段文昌書輿地碑目云仙都觀有二仙公碑李虔撰二仙銘薛湜撰俱景雲二年立陰真人影堂碑王真人碑俱李吉甫撰貞元年立其石瑩潤而白號為玉石碑又有商比干銅盤銘開元間掘自偃師縣翻刻于此文曰右林左泉後岡前道萬世之銘兹焉是寶又有中和元年忠州刺史陳侁三官碑丞相段文昌修觀碑段少監修齋記天尊石像記老君石像記張大理詩杜光庭石函記按今皆不存志云總真羣仙之府道山洞天等刻或𨽻篆或真行大徑尺吕純陽書見存純陽登平都有訪仙詩云盂蘭清曉過平都天下名山總不如兩口單行誰解識王陰空使馬蹄虛又云一鳴白鳥出青城再謁王陰二友人口口惟言三島樂擡眸已過洞庭春宋蘇軾詩足躡平都古洞天此身不覺到雲間擡眸四顧乾坤濶日月星辰任我攀又平都天下古名山自信山中歲月間午夢任隨鳩喚覺早朝又聽鹿催班蘇轍詩山前江水流浩浩山上蒼蒼松柏老舟中去客日紛紛古今換易如秋草空山樓觀何崢嶸真人王逺陰長生飛符御氣朝百靈悟道不復誦黃庭龍車虎駕下來迎去如旋風轉太清真人厭世不回顧世間生死如朝暮學仙度世豈無人飱霞絶粒常辛苦安得獨從逍遙君泠然乘風駕浮雲超世無有我獨行范成大詩云神仙得者王方平誰其繼之陰長生飄然空飛五雲軿上賔寥陽留玉京石爐丹氣常夜明寵光萬柏森千齡峽山逼仄岷江縈洞宫福地古所銘云有北陰神帝庭太陰黑簿囚鬼靈自從仙都啓巖扄高霞流電飛伏精暉景下墮爍九氷寒絶苦道升無形至今臺殿棲岑􅱼隋圬唐堊留丹青十仙怪寄溪如清瑶池仙仗紛娉婷琅璈赴節鏘欲鳴我來秋暑如炊蒸汙流吁氣扶枯藤摩挲衆迹不暇評聊記梗槩知吾曾段文昌修平都觀記云平都山最高頂即漢時王隂二真人蟬蛻之所也峭壁千仞下臨湍波老柏萬株上插峯嶺靈花綵羽皆非圖志中所載者昏旦萬狀信非人境貞元十五年余西遊岷蜀停舟江岸振衣虔潔詣諸洞所石嵒靈竇蒼然相次苔龕古書依稀可辨時與道侣數人坐於下須臾天籟不起萬竅風息山光耀於耳目煙霞拂於襟袖相顧神竦若在紫府玄圃矣牽於行役不得淹久瞻眺惆悵書名而去邇來已三十四年太和庚戍歲自淮南移鎮荆門有客由峽中來者皆言當時題記文字猶在觀宇歲久臺殿荒毁不三數年必盡摧沒於巖壑矣乃捨一月秩俸俾令修葺子來同力浹旬報就去年冬十一月詔命換麾幢再領全蜀泝三峽厯舊遊依然景物重喜登覽聞泉聲而緩步愛松色而難别遂命筆硯志於巖谷時太和七年正月五日道經云老子騎青牛度函谷將息駕于平都今縣二里有青牛山在平都之左方輿勝覽云景德觀前鹿麂時出沒林間與人狎志云自平都西去一里林樹叢密者白鹿山也霏雪録云蘇老泉將遊仙都觀知縣李長官云故知君之將至也問何以知之曰此山巨鹿鳴輒有客至屢驗輒未一失老泉亦嘗為人言之東坡白鹿山詩云日月何促促塵世苦拘束仙子去無迹故山遺白鹿仙人已去鹿無家孤悽悵望曾城霞至今聞有遊仙客夜來江浦呌平沙長松千樹聲蕭瑟仙客去人無咫尺夜鳴白鹿安在哉滿山秋草無蹤迹山之翠微有玉鳴泉響作琴音清澄玉色其麓有流杯溪溪凡七出相傳平都之仙常燕集于此華陽國志巴子又立市於龜亭北岸今新市里是也注水經曰平都縣有市肆四日一會東坡詩我生飄蕩去何求再過龜城歲五周身行萬里半天下僧臥一菴初白頭題云過石龜山作也舊志石龜山在縣東五十里其下有村墟志云縣在豐民洲登平都山望岷江西來繞之而去其支流派别名為溪者可得而數焉稂溪在治東山上有魏國夫人墓未詳年代葫蘆溪在西南邃窈莫測蛟龍是宅青螺緑髻上下相映志謂之月鏡潭也碑溪以古碑名不知何代物去縣稍遠望途溪在古南賔縣地今為南賔里舊屬忠州鄰石砫司志又云龍渠縣今名縣壩屬散毛宣撫司縣有引藤山出藤大如指可以吸酒白樂天詩間拈枯葉題詩句悶折藤枝引酒嘗亦近南賓界愚按豐民洲在平都山下隋兩取之以名縣自豐旁加邑而羅酆地府之説始行今引真誥廣記二文附此真誥曰羅酆山在北方癸地注此癸地未必以六合言當是於中國指向正在幽州遼東之北北海之中去岸不知幾千萬里又曰六天宫是鬼神六天之治也洞中六天宫亦同名相像如一世有知酆都六天宫門名則百鬼不敢為害陶宏景曰此應是北酆鬼王決數罪人住處其神即經所稱閻羅王矣太平廣記曰東都豐都市在長壽寺之東北初築市垣掘得古冢土藏無磚甓棺木陳朽觸之便散尸上著平上幘朱衣得銘曰筮道居朝龜言近市五百年間于斯見矣當時達者參驗是魏黃初二年所葬也然范成大詩云有北陰神帝庭太陰黑簿囚鬼靈則酆都之説亦不起于近代墊江縣唐通典曰魏恭帝始置忠州墊江縣後周改名魏安隋開皇十八年復為墊江蔡松年南史補曰漢之墊江今之合州也合州置自西魏及隋煬帝改合州為涪陵郡於是移墊江之名于桂溪縣桂溪溪旁多桂樹也縣以樹名寰宇記曰桂溪縣有清水有容水在桂溪南三里清水唐縣名猶開州之清濁二水矣縣又有鹽溪今治北小溪上有古碑乃宋淳熙中物孟康注地理志曰墊江之墊音重疊之疊晉太康地記曰墊江因李雄之亂移置于陽闕陽闕未詳疑即陽關為三關之一碑目會仙洞榜在治北四十里之鳳凰山李太白書羅王洞榜在治北五十里之西山李唐勑賜也按西山磐石上有巨人迹或羅王榜之始名志云東北二十里有古寺曰秋月禪關唐馬祖修淨之所即峯頂山也又二十里有古洞飛湍喧豗如雷聲聞十餘里久晴聞之則雨久雨聞之則晴段氏遊蜀記曰忠州墊江縣以蘇薰為席絲為經其色深碧渝志云明玉珍僭號以墊江為雞鵝食邑亦猶巴子以東突硤為畜牧沮矣蜀中廣記卷十九
