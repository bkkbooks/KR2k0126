body:
  text: 蜀中廣記卷六十二明曹學佺撰方物記第四牡丹陸游云牡丹在蜀天彭爲第一天彭之花皆不詳其所自出土人云曩時永寧院有僧種花最盛俗謂之牡丹院春時賞花者多集於此其後花稍衰人亦不復至崇寧中州民宋氏張氏蔡氏宣和中石子灘楊氏皆嘗買洛中新花以歸自是洛花散於人間花户始盛皆以接花爲業大家好事者皆竭其力以養花而天彭之花遂冠兩川今惟三井李氏劉村毋氏城中蘇氏城西李氏花特盛又有餘力治亭館以故最得名至花户連畛相望莫得其姓氏也天彭三邑皆有花惟城西沙橋上下花尤超絶由沙橋至堋口崇寧之間亦多佳品自城東抵濛陽則絶少矣大抵花品近百種然著者不過四十而紅花最多紫花黄花白花各不過數品碧花一二而已今自狀元紅至歐碧以類次第之所未詳者姑列其名於後以待好事狀元紅祥雲紹興春臙脂樓玉腰樓金腰樓雙頭紅富貴紅一尺紅鹿胎紅文公紅政和春醉西施迎日紅彩霞疊羅勝疊羅瑞露蟬乾花大千葉小千葉右二十一品紅花紫繡毬乾道紫潑墨紫葛巾紫福嚴紫右五品紫花禁苑黄慶雲黄青心黄黄氣毬右四品黄花玉樓子劉師哥玉覆盆右三品白花歐碧右碧花轉枝紅朝霞紅灑金紅瑞雲紅壽陽紅探春毬米囊紅福勝紅油紅青絲紅紅鵞毛粉鵞毛蹙金毬間綠樓銀絲樓六對蟬洛陽春海芙蓉膩玉紅内人嬌朝天紫陳州紫袁家紫御衣紫靳黄玉胞肚勝瓊白玉盤碧玉盤界金樓樓子紅右三十一品未詳洛花見紀於歐陽公者天彭徃徃有之此不載載其著於天彭者彭人謂花之多葉者京花單葉者川花近歲尤賤川花賣不復售花之舊栽曰祖花其新接頭有一春兩春者花少而富至三春則花稍多及成樹花雖益繁而花葉減矣狀元紅者重葉深紅其色與輕紅淺緋相類而天姿富貴彭人以冠花品多葉者謂之第一架葉少而色稍淺者謂之第二架以其高出衆花之上故名狀元紅或曰舊制進士第一人即賜茜袍此花如其色故以名之祥雲者千葉淺紅花妖豔多態而花葉最多花户王氏謂此花如朶雲狀故謂之祥雲紹興春者祥雲子花也色淡泞而花尤富大者徑尺紹興中始傳大抵花户多種花子以觀其變不獨祥雲耳臙脂樓者深淺相間如臙脂染成重趺累蕚狀如樓觀色淺者出於新繁勾氏色深者出於花户宋氏又有一種色稍下獨勾氏花爲冠金腰樓玉腰樓皆粉紅花而起樓子黄白間之如金玉色與臙脂樓同類雙頭紅者並蔕駢蕚色尤鮮明出於花户宋氏始秘不傳有謝主簿者始得其種今花户徃徃有之然養之得地則歲歲皆雙不爾則間年矣此花之絶異者富貴紅者其花葉圓正而厚色若新染謝時他花皆落獨此抱枝而槁亦花之異者也一尺紅者深紅頗近紫色花面大幾尺故以一尺名之鹿胎紅者鶴頂紅子花色紅微帶黄上有白㸃如鹿胎極化工之妙歐陽公花品有鹿胎花者乃紫色與此頗異文公紅者出於西京潞公園亦花之麗品其種傳蜀中遂以文公名之政和春者淺粉紅花有絲頭政和中始出醉西施者粉白花中間紅暈狀如酡顔迎日紅與醉西施同類淺紅花中特出深紅花開最早而妖麗奪目故以迎日名之彩霞者其色光麗爛然如霞疊羅者中間瑣碎如疊羅紋勝疊羅者差大於疊羅此三品皆以形而名之瑞露蟬亦粉紅花中抽碧心如合蟬狀乾花者粉紅花而分蟬旋轉其花亦異大千葉小千葉皆粉紅花之傑者大千葉無碎花小千葉則花蕚瑣碎故以大小别之此二十一品皆紅花之著者也紫繡毬一名新紫花蓋魏花之别品其花開正如繡毬狀亦有起樓者爲天彭紫花之冠乾道紫色稍淡而暈紅出未十年潑墨者新紫之子花也單葉深黒如墨歐陽記有葉底紫近之葛巾紫花圓正而富麗如世人所戴葛巾狀福嚴紫亦重葉紫花其葉小於紫繡毬莫詳所以得名按歐陽所紀有玉版白出於福嚴院土人云此花亦自西京來謂之舊紫花豈亦出於福嚴耶禁苑黄蓋姚黄之别品也其花閒淡高秀可亞姚黄慶雲黄花葉重複郁然輪囷以故得名青心黄者其花心正青一本徃徃有兩品或正圓如毬或層起成樓子亦異矣黄氣毬者淡黄檀心花葉圓正腹背相承敷腴可愛玉樓子者白花起樓高標逸韻自然是風塵外物劉師哥者白花帶微紅多至數百葉纎妍可愛莫知所以得名玉覆盆者一名玉炊餅蓋圓頭白花也碧花止一品名曰歐碧其花淺碧而開最晩獨出歐氏故以姓著大抵洛中舊品獨以姚魏冠天彭則紅花以狀元紅爲第一紫花以紫繡毬爲第一黄花以禁苑黄爲第一白花以玉樓子爲第一然花户歲益培接新特間出將不止此而已好事者尚屢書之天彭號小西京以其俗好花有京洛之遺風大家種至千本花時自太守而下徃徃即花盛處張飲帟幕車馬歌吹相屬最盛於清明寒食時在寒食前者謂之火前花其開稍久火後則易落最喜隂晴相半時謂之養花天栽接剔治各有其法謂之弄花其俗有弄花一年看花十日之語故大家例惜花可就觀不敢輕剪蓋剪則次年花絶少惟花户則多植花以牟利雙頭紅初出時一本直至三十千祥雲初出亦直七千八千今尚兩千州家歲常以花餉諸臺及旁郡蠟蔕筠籃旁午于道予客成都六年歲常得餉然率不能絶佳淳熈丁酉歲成都帥以善價私售於花户得數百苞馳騎至成都露猶未晞其大徑尺夜宴西樓下燭焰與花相映影搖酒中繁麗動人嗟乎天彭之花要不可望洛中而其盛已如此使異時復兩京王公卿相築園第以相誇尚予幸得與觀焉其動蕩心目又宜何如也明年正月十日山隂陸游書胡元質成都牡丹記云大中祥符辛亥春府尹任公中正宴客大慈精舍州民王氏獻一合歡牡丹公即命圖之士庶創觀闐咽終日蜀自李唐後未有此花凡圖畫者唯名洛陽花僞蜀王氏號其苑曰宣華權相勲臣競起第宅上下窮極奢麗皆無牡丹惟徐延瓊聞秦州董成村僧院有牡丹一株遂厚以金帛歴三千里取至蜀植于新宅至孟氏於宣華院廣加栽植名之曰牡丹苑花至盛矣有深紅淺紅深紫淺紫淡黄鏂黄潔白正暈倒暈金含稜銀含稜旁枝副摶合歡重臺至五十葉面徑七八寸有檀心如墨者香聞至五十步蜀平花散落民間小東門外有張百花李百花之號皆培子分根種以求利每一本或獲數萬錢宋景文公祁帥蜀彭州守朱君公綽始取楊氏園花凡十品以獻公在蜀四年每花時按其名徃取彭州送花遂成故事公於十種花尤愛重錦被堆嘗爲之賦蓋它園所無也牡丹之性不利燥濕彭州丘壤既得其中又土人種蒔偏得法花開有至七百葉面可徑尺以上今品類幾五十種繼又有一種色淡紅枝頭絶大者中書舍人程公厚倅是州目之爲祥雲其花結子可種餘花多取單葉花本以千葉花接之千葉花來自洛京土人謂之京花單葉時號川花爾景文所作贊别爲一編其爲朱彭州賦牡丹詩有蹄金㸃鬂璋玉鏤跗之句今西樓下數欄花不甚多而彭州所供率下品范公成大時以錢買之始得名花提刑程公沂預㑹歎曰自離洛陽今始見花爾程公故洛陽人也彭守朱公綽與宋景文公唱酬牡丹詩仁帥安全蜀祥葩育至和地寒開既晩春曙力終多翠帟遮蜂蝶朱欄隔綺羅殷勤憑驛使光景易蹉跎宋祁答云珍蘤分清賞飛郵附翠籠蹄金㸃鬢密璋玉鏤跗紅香惜持來逺春應摘後空玩詩仍把酒恨不與君同范成大牡丹詩西樓第一紅多葉東苑無雙紫壓枝夢裡東風忙裡過蒲團藥髩成絲又清明日試新火作牡丹㑹詩再鑚巴火尚浮家去國年多客路賖那得青烟穿御栁且將銀燭照京花香鬟半醉斜枝重病眼全昬霧障遮錦地繡天春不散任教簷雨捲泥沙按天彭牡丹今已寥寥成都惟汶川郡邸好植牡丹已累世矣故此花特盛而蜀藩不敢與之較黄碧二色絶無紅者曰魚血紅播州紅最著然亦隣于紫有平頭紫者頭有九合爲一朶可得徑尺有五樹高亦可得丈計者予江南所未見也醉西施則與江南同之紅者一種曰寉翎紅亦有斑㸃大抵如譜中所稱鹿胎紅耳白者一種與鶴翎俱單葉其神不王也予以庚戌歲汶川府中看牡丹作詩一首去歲入川花事闌今年花發倍尋看王家好客來浮白國色傾城是牡丹風景不輸洛陽盛雪澌遙映汶江寒沈沈歌舞日向夕璧月金鐙明畫欄又蜀府園中看牡丹云錦城佳麗蜀王宫春日遊看别苑中水自龍池分處碧花從魚血染來紅平臺不到林間日曲岸時迴洞口風盡道今年當大有何妨行樂與人同龍池即古摩訶池也海棠寰宇記云成都海棠樹尤多繁艷未開如朱砂爛漫稍白半落如雪古今記府治西海棠樓唐李囬建監司花時燕集吟賞于兹益部方物略海棠大抵數種又時小異惟其盛者則重葩疊蕚可喜非有定種也始濃稍淺爛若錦章北方所植率枝强花瘠殊不可玩故蜀之海棠誠爲天下竒豔云贊曰修柯柔蔓濃淺繁總盛則重蘤不常厥種嘉州志云海棠花以紫綿色者爲正餘皆棠棃耳産嘉州者有香而本大有黄海棠色黄貼榦海棠花小而鮮垂絲海棠色粉紅向下皆無子非真海棠也冷齋夜話云有人調官都下踰年始得昌守已而求易便郡有彭淵才者聞而徃謁曰昌佳郡也聞官欲易地誤矣曰俸給優乎曰否訟簡乎曰否然則奚誤淵曰海棠患無香獨靜南者有香非佳郡而何故昌號海棠香國土人云地宜此花易植易蕃郡治香霏堂一老樹重趺疊蕚每花或二十餘朶花氣醲郁餘不能及也孔平仲談苑載淵才詠海棠有雨過温泉妒妃子露濃湯餅試何郎之句宋沈立海棠記序云蜀花稱美者有海棠焉而記牒多不録嘗聞真宗御製後苑雜花十題以海棠爲首章賜近臣唱和則知海棠足與牡丹抗衡稱獨步於西州矣因摉擇前志惟唐相賈元靖躭著百花譜以海棠爲花中神仙誠不虚美耳近世名儒巨賢發于歌詠清辭麗句徃徃而得立慶厯中爲縣洪雅春多暇日地富海棠幸得爲東道主惜其繁艷爲一隅之滯卉作海棠記敘其大槩好事者幸無誚焉棠之稱甚衆詩有蔽芾甘棠有枤之杜爾雅釋木曰杜甘棠郭璞註今之杜梨也杜赤棠白吕氏春秋曰果之美者棠實又俗説有地棠棠梨沙棠味如李無核較是數説俱非謂海棠也酉陽雜俎引李贊皇言花名中之帶海者悉從海外來故知海㯶海栁海石榴海木瓜之類俱無聞於記述豈以多而無稱耶亦非多也誠恐近代始得之于海外耳又杜子美海㯶行云欲栽北辰不可得惟有西域胡僧識若然則贊皇之言不誣矣海棠雖盛稱於蜀而蜀人不甚重今京師江淮尤競植之每一本價不下數十金勝地名園目爲佳致而出江南者復稱之曰南海棠大抵相類而花差小色尤深耳棠性多類梨核生者長遲逮十數年方見花都下接花工多以嫩枝附梨而贅之則易茂種宜壚壤膏沃之地其根色黄而盤勁其木堅而多節其外白而中赤其枝柔密而修暢其葉類杜大者縹綠色而小者淺紫色其紅花五出初極紅如臙脂㸃㸃然及開則漸成纈暈至落則若宿粧淡粉矣其蔕長寸餘淡紫於葉間或三蕚至五蕚爲藂而生其蕋如金粟蕋中有鬚三如紫絲其香清酷不蘭不麝其實狀如梨大如櫻桃至秋熟可食其味甘而微酸兹棠之大概也唐羊士諤謝成都從事蕭員外寄海棠花詩云珠履行臺擁附蟬外郎高步似神仙陳詩今見唐風盛從事遥瞻衞國賢擲地好辭凌綵筆浣花春水膩魚箋東山芳意須同賞子著囊盛幾日傳唐呉融詩太尉園前兩樹春年年奔走探花人今來獨傍荆山看囘首長安落戰塵又雲綻霞鋪錦水頭占春顔色最風流若教更近天街種馬上多逢醉五侯融出蜀後追詠棠梨花詩蜀地從來勝棠梨第一花更因無軟弱别自有妍華不貴綃爲霧難降綺作霞移須歸紫府駐合餌丹砂密映彈琴宅深藏賣酒家夜宜紅蠟照春稱錦筵遮連廟魂棲望飄江字遶巴未饒酥㸃薄兼妒雪飛斜舊賞三年斷新期萬里賖長安如種得誰定牡丹誇唐薛能詩酷烈復離披𤣥功莫我知青苔浮落處暮栁間開時帶醉遊人揷連隂被叟移晨前清露濕晏後惡風吹香少傳何許妍多畫半眉島疏漣水脉庭綻粒松枝偶汎因沈硯閒飄欲亂棊遶山生玉壘和郡徧坤維負賞慙休飲牽吟分失飢明年應不見留此贈巴兒鄭谷擢第後入蜀見海棠盛開詩云上國休誇紅艷杏深溪自照綠苔磯一枝低帶流鶯睡數片狂和舞蝶飛堪恨路長移不得可無人與畫將歸手中已有新春桂多謝烟香更入衣又詩濃澹方春滿蜀鄉半隨風雨斷鶯腸浣花溪上堪惆悵子美無心爲發揚自註杜工部老於西蜀詩集中無海棠故云薛濤和李太尉棠梨花詩呉均蕙圃移嘉木正及東溪春雨時日晩鶯啼何所爲淺深紅膩壓繁枝崔塗題海棠圖海棠花底三年客不覺海棠花盛開却向江南見圖畫始慙虚到蜀中來沈立海棠詩序云英韶在前徒矜下里之曲風雅未喪豈係擊轅之音不圖綴綺靡之辭抑將導温厚之㫖耳詩曰岷蜀地千里海棠花獨妍萬株佳麗國二月艷陽天叢蕚匀如布修𬎼巧似編彤雲輕㸃綴赤玉碎雕鐫瑟瑟光輸瑩猩猩血借鮮淺深相向背疎密遞勾牽輕蒨重重染丹砂細細研蘂纎金粟拱鬚嫩紫絲拳紅蠟隨英滴明璣著顆穿初莖爭裊娜翹榦共蹁蹮絶代知無價生香不減分靈應桂苑鍾粹定星躔木帝經邦相花王入室賢祥飇加翦拂卿靄共陶甄真宰隂推轂勾芒與著鞭不須憂薄命好爲惜流年贊翼施生柄扶持煦嫗權主張韶令正調夑淑威宣和氣高低洽芳心次第還金釵人十二珠履客三千雲雨迷巫峽風波怨洛川娉婷宜住楚妖冶合居燕綉被通宵展華燈徹曙燃横披前檻外半出假山巔暗羨游蜂採偷輸蟻穴沿瘦嫌蛛網織柔怯女蘿纒蓄恨憑誰訊無言只自憐文君酒壚畔揚子草堂前品格生來别風流到老全繁中生悵望衆裏見喧闐暄暖精神出晴明意態便闗闗鶯對語兩兩燕高騫天上宜封殖人間偶佇延共㯶圍别館與杏擁斜阡清曉簾爭卷黄昬幕尚褰低籠金轣􅣗高映畫鞦韆忽認梁園妓深疑閬苑仙匆匆來蕙圃逺逺别芝田羞隱㝠濛霧輕如淡蕩烟乍逢開羽扇初喜下雲軿髣髴迴星靨依稀帶翠鈿五銖衣宛轉七寳帳翩翾獨立挨霓節成行列彩旃困宜欹琥枕步好襯金蓮舞定休迴袖粧濃不傅鈆蓋張松鬱鬱茵藉草芊芊馥郁蘭供夢扶疎栁伴眠軀輕彌綽約腰細更便嬛婭姹常顒若幽柔自洒然侍兒羅白芷婢子列芳荃口口濃檀注腮腮薄粉填解圍施葉幄買咲有榆錢旖旎環瑤席婆娑匝玳筵嬌依屏曲曲泣對露涓涓南陌輕埃蔽東郊夕照連幾時休縹緲從此識嬋娟是處遺簮珥誰家不管絃妒姬貪恐失戲稚惜何顛折閃搔頭褪擎摐約腕揎戴遮鬟上鳯妝壓鬂邊蟬汲引新懽聚消磨宿忿蠲縱觀須倒襶命宴必加籩翻曲教歌媛更詞送酒船鄉心須暫解病眼當時痊迢遞來油璧從容駐錦韉雅宜交讓比穠與棣華聮不分參朱槿寧甘混木綿酴醿潛失色躑躅敢差肩素柰思投迹夭桃恥備員梧桐愧金井芍藥濫花磚併壓辛夷俗潛排寳馬蔫天恩無久恃人寵莫長專布影交三徑敷榮遍一廛凝眸方的的迴首旋翩翩可忍驚飇挫胡煩急景煎珊瑚隨手碎綘雪繞枝旋拂漢霞初散當樓月自圓飄零隨䘊蠓散亂逐漪漣灼灼龜城外亭亭錦水邊抱愁應慘蹙有淚即潺湲午影迷蝴蝶朝寒怨杜鵑物情元倚伏人意莫拘攣擢秀高羣木稱珍極八埏未開猶脉脉憂落固悁悁莫著新文紀重尋舊譜箋共知紅艷好誰辨赤心堅實可陪朱李根宜灌醴泉栽須隣竹栢樹莫繞烏鳶恥託膏腴茂常隨富貴遷爲多猶底滯因逺尚迍邅客思易成亂心期未省愆畫思摩詰筆吟稱薛濤牋醉目休頻送詩情豈易緣薛能誇麗句鄭谷賞佳篇止感芳姿美那憐託地偏山經猶罕記方志未多傳巧詠憂才竭㝠搜得意顛遐陬寡真賞僻境忍輕捐抽秘慙非據探竒敢讓先援毫敘名卉聊用放懷焉宋子京詩序云蜀地海棠繁媚有思加膩榦豐條苒弱可愛北方所未見諸公作詩流播西人予素好玩不能自黙然所道皆在前人陳跡中如國風申章亦無愧云蜀國天餘煦珍葩地所宜濃芳不隱葉併艷欲然枝襞綵分羣蕚匀霞㸃萬𬎼迴文錦成後夾煎燎烘時蜂蘂迎銜密鸎梢向坐危淺深雙絶態啼笑兩妍姿綘節排煙竦丹缸落帶垂童容翻畏薄便面到邊遲王晉卿詞錦城春色花無數排比笙歌留客住輕寒輕㬉夾衣天乍雨乍晴寒食路花雖不語鶯能語莫放韶光容易去海棠開後月明前縱有千金無買處右調玉樓春按晉卿時爲漢州刺史范致能詩云手開花逕錦城窠浩蕩春風載酒過來歲遊人應解笑甘棠終少海棠多又詠蜀中垂絲海棠春工葉葉與絲絲怕日嫌風不自持曉鏡爲誰籹未辦沁痕猶自濕臙脂又海棠詞云馬蹄塵撲春風得意笙簫逐欵門不問誰家竹秪揀紅粧多處燒銀燭碧鷄坊裏花如屋燕王宫畔花成谷不須悔唱闗山曲直爲海棠也合來西蜀陸游詠范希元園海棠詩云誰道名花獨故宫東城盛麗足爭雄横陳錦障闌干外盡吸紅雲酒醆中貪看不辭持夜燭倚狂直欲擅春風拾遺舊詠悲零落瘦損腰圍擬未工按故宫謂蜀燕王宫也又於驛舍見故屏風畫海棠有感云成都二月海棠開錦繡裹城迷巷陌燕宫最盛號花海霸國雄豪有遺跡又張園賞海棠詞園即故宫也浪迹人間喜聞猿楚峽學劒秦川虚舟汎然不繫萬里江天朱顔綠鬂作紅塵無事神仙何妨在鶯花海裏行歌閒送流年休笑放慵狂眼看閒房深院多少嬋娟燕宫海棠夜宴花覆金船如椽畫燭酒闌時百炬吹煙憑寄語京華侣幅巾莫換貂蟬右調漢宫春又詞云錦里繁華壊宫故邸疊蕚竒花俊客妖姬爭飛金勒齊駐香車何須幙障幃遮寳杯浸紅雲瑞霞銀燭光中清歌聲裏休恨天涯自註故蜀燕王宫海棠之盛爲成都第一今屬張氏魏華父燕王宫海棠詩云二十四畨花信風川原何處着繁紅逢人漫説燕宫舊廢址荒營暝靄空又次虞永康十月海棠韻冷淡庭梅儼玉顔孤高翠竹聳修鬟如何富貴天然質猶欲尋盟二友間其二春意何曽間四時芸芸靜處錦成帷非闗造化呈新巧鈞播無心自不知又次黄侍郎疇若滄江海棠云妙處東皇可得知溶溶生意不停機雨寒日曝渾無賴憑仗陽和爲解圍其二沙暖花香弄午晴苦撩詩思浩難禁偷閒不辨追年少只有春風㑹此心其三爲憐一片曉雲紅未放千絲暮雨濃調夑隂陽賢岳牧滿川花意得舂容其四慣踏郊原浩蕩春重來春雨物俱新渠雖自有生生意把握天機是主人其五帝恐嘉花不易成好風遲日故來承繁紅錯眩漁人眼不識滄江有武陵其六指麾紅紫思無濵抵當丹青筆有神百樹花間一編易主人意韻鎮長新又次虞萬州滄江海棠韻維摩老子苗生菴門外滄江綠正涵夜雨村村折花栁春風日日長桑蠶晩粧才記海棠睡朝色俄看禁藥酣造化新功鎮如此撫詩徃徃發余慙又次王茶馬韻三首一春風雨亂書堆挂口林間未放開浩蕩和風褰客袂來看火樹簇池臺又善惜花人盡倚闌不將榮悴等閒看繁華奪目春如醉獨有懷人問考槃右二首清淑堂海棠又宅在道傍如寳坊一奩明玉颺新妝當年共賞人何在萬里相思夢寐香右一首王氏花屋海棠李燾云成都施氏園海棠方盛覔酒徑醉時二月九日詩云染根着色謝天公破睡猶禁一再風爲此徑須浮大白老夫元自愛深紅蜀人鎦夢炎題秋日蜀棠絶句野棠青子來青鳥霜日清妍欲近人忽見嬌然紅數蕚故鄉愁思不勝春白玉蟾垂絲海棠詞一夜清寒千紅曉燦春不曽知細看何如醉時西子睡底楊妃盡皆蜀種垂絲晴日暖薫成錦圍説與東風也須愛惜且莫吹飛蜀中廣記卷六十二
