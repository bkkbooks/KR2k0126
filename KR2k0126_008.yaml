body:
  text: 蜀中廣記卷八明曹學佺撰名勝記第八川西道成都府金堂縣水經注云新都縣有金臺山水通於巴漢以水出金沙因以名山蜀記云金泉縣古有金船沈江之東岸鋭底民於水中往往見之矣寰宇記云縣即漢處士段翳宅也輿地碑目云段翳宅治內天慶觀是有假隱居李真人二像碑字磨滅不可讀又云如舜禪師塔銘在金堂龍槐院唐節度使杜悰撰文宋之問送楊六望赴金水詩借問梁山道嶔崎幾萬重遙州刀作路絶壁劍為峰惜别路窮此留歡意不從憂來生白髮時晚愛青松勿以西南逺夷歌寢盛容台階有髙位寧復久臨卭宋勾龍行父送孫太冲詩金淵春三月桃李照城郭石峽赬鯉魚時時醉賔幕金淵志云懷安蕞爾國而有雲峰月峽之勝山之雄峙從梁劍而來江水洪深自堋灌洛而至朝公武作雨零堂記云堂依雲麓而中江縈之氣象葱鬱巖壑洲渚之美映帶左右矣按中江在軍西北源從漢州彌牟洛水毗橋等三水㑹為一江志云東十二里曰前河即彌牟水又三里曰後河即雒水也碑目云有幽州刺史牂柯太守漢張子陽墓在沿江五里許其碑表載順帝永建四年造又云放生記誓文唐太和二年令狐紃撰亦在中江岸上圖經懷安軍縣二而鎮九以縣而言金堂為大以鎮而言古城為富諺謂軍不如縣縣不如鎮舊縣在峽口距東南四十里鎮在北一里下為古城河水由灌子灘入斜潭也志云峽口相傳鱉泠所鑿又云金灌口東枕雲頂南披峽口水出山下如岷江之狀上有李冰祠金川在其下流稍寬平處又云金灌口之東有七織溪白沙清流文理如織又有栁溪在舊縣南七里常有栁葉在穴中出華陽國志李氷導洛通山洛水或出瀑口經什邡郫别江㑹新都大渡志云東南十里有大度鄉漢書新都王忳有隂隲署大度亭長初到日有馬與繡被馳至後為郿令行至漦亭有鬼夜見稱其夫為涪令之官過此全家見殺召遊徼按之悉伏辜而還其喪時人為之謠曰信哉少林世為遇飛被走馬與鬼語有廟在山麓志云北十五里昌利山有石室三門容數十人俗呼為三龍門碑目云唐昌利山有延祥觀碑開元中金堂尉沛國武捷撰寰宇記云銅盤山在西北二十里北接雒縣南接新都山形如盤洛水彌牟水毗橋水經此山下合中江也名山志云金堂三學山乃漢州北山一名雲頂一名石城亦名棲賢開照其實一山也志云東三十里三學山李八百三度學仙於此故亦名棲賢其下隘口壁立千仞惟一路可通人騎謂之三學隘寰宇記云雲頂山舊名石城山其狀如城在縣西十五里頂上平可十畝有神泉方丈澄清如照雲霞常興唐天寶六載改為雲頂山西幸略云唐明皇至劍門山神見形迎駕稱姓李氏後陟武擔東臺逺望祥雲紫氣盤結空界問左右曰此何處對曰石城山乃悟山神扈衛之意遂改雲頂為慈雲焉髙僧傳唐開元年鑑源禪師於此山講華嚴感聖燈現菩薩放光大松林後有寺額篆書三學字其山四方面各三十里因謂之開照山矣勝覽云三學山有佛迹石理堅潤瑩白如玉非世間槌琢所能又有碧玉佛龕藕絲袈裟錦字心經貝葉金字涅槃經寺前後檜柏皆隋唐故物又有飛石乃自雲頂飛來先是寺有楠樹已枯石離而為二有王頭陀語曰五百年後寺當廢若楠再生石再合然後復興果如其言碑目云王頭陀塔銘在雲頂塔院貞元十五年薛倕撰又云三學山飛石記邑宰張西撰又云支提石塔記在三學山唐節度使假文昌撰又云鸚鵡舍利塔記在三學山韋臯撰又云李義山為八戒和尚謝復三學精舍表略云三學山夜有神燈朝明佛足風飄雨濕且無金燼落時蘚剝苔侵尚有寶花承處又云杜光庭功德記在三學山隋僧智炫遊三學山詩秀嶺接重烟嶔岑上半天絶巖低更舉危峰斷復連側石傾斜澗回流瀉曲泉野紅知草凍春來鳥自傳樹錦無機織猿鳴詎假弦葉密風難度枝踈影易穿抱裘依閒沼䇿杖戲荒田遊心清漢表置想白雲邉榮名非我顧息意且蕭然唐王勃遊梵宇三學寺詩杏閣披青磴雕臺控紫岑葉齊山路狹花積野壇深蘿幌棲禪影松門聽梵音遽欣陪妙躅延賞滌煩襟薛能自廣漢遊三學山詩殘陽終日望棲賢歸路携家得訪禪世缺一來因薄命雨留三宿是前緣詩題不忍離巖下屐齒難忘在水邉猿鳥可知僧可㑹此心常似有香烟又題開照寺云盡室遍相將中方上下方夜深楠樹逺春氣柏林香聖跡留岩險靈燈出混茫何因將慧劍割愛事空王僞蜀太后徐氏漢州三學山看聖燈詩䖍禱遊靈境元妃夙志同名香焚靜夜銀燭炫遼空泉潄雲根月鐘敲樹杪風印金標聖迹飛石頌神功偶望天涯極臨看日腳紅猿來齊室上僧集講筵中頓覺超三界渾疑證六通願成修偃事社稷保延洪太妃徐氏和云聖燈千萬炬旋向碧雲生細雨瀝不暗好風吹更明磬敲金地響僧唱梵天聲若說無心法此光如有情宋王雍題雲頂山詩五色琉璃白晝寒當年佛腳印旃檀藕絲織出三衣妙貝葉經傳一偈難夜看聖燈紅菡蓞曉驚飛石碧琅玕更聞鸚鵡因緣塔八十山僧試說看簡州華陽國志犍為郡牛鞞縣受新都江去郡三百里漢元鼎置相陽明鹽井即牛鞞井也南齊牛鞞戍設在州城西岸即古簡縣址三國志姜維聞鍾㑹入犯表守陽安關關在西南三里上流井依山為之舊陽安縣及今陽安驛本此名水經注云晉羅尚乘牛鞞水東征李雄發自陽安關矣九州要記陽安縣南七十步有赤水如絳源出隆州今治西二里絳溪是也溪上龍門洞有石如龍壁上龍門二字州人許奕書傍刻栁子厚鈷鉧潭諸記乃宋臨歐陽詢書又云陽安有雁水源出廣漢曹榮諲詩城下水流金雁月亭中人弄玉絃琴是也雁赤二水之間有江月樓薛濤江月樓詩憑欄却憶騎鯨客把酒臨風手自招細雨聲中停去馬夕陽影裏亂鳴蜩方輿勝覽簡郡設㕔棟宇盡唐制梁上題寶厯元年刺史張炎建抵嘉定之壬午已二百九十有八年矣碑目郡守壁記名氏始唐貞觀十三年見劉左史折栁亭記亭在朝天門外舊名情盡橋刺史雍陶詩從來只說情難盡何事教名情盡橋自此改名為折栁任教離恨一條條方輿云紹興中建西州道院在州治南黎持記云陽安鄰於㑹府而有江山之勝處於髙仰而有魚稻之饒民事獄訟比之旁郡十無一二凡隱於吏者樂趍焉人目之為西州道院又云望湖樓在州治道院之後湖光山色交相輝映輕舟小艇時時撑出栁隂中不謂重岡疊嶂間乃有瀟湘苕霅之景也志云簡縣忠清門外有唐太子誦書記功碑甚巨元和二年朝議郎使持節簡州諸軍事守簡州刺史李維勒石碑目云南康郡王紀功碑乃憲宗撰文太子誦書貞元十三年建原在龍興寺宋天聖五年移在州衙門外頒春亭側又云在郡市心居民室下紹興丁巳穴土見碑石太守命工取之重撤民屋不果上録其文乃唐御製紀功碑銘并序皇太子書碑面殘缺不全惟碑隂乃開成元年臯從孫鋌為本州守日紀述其文俱全遂覆之按此碑已取出今存志云城內雙市街有叢桂樓以宋紹興中朱熹同榜李繳如李進修范時中袁炎牟子正俱州人也太守郭由中為樓記方輿勝覽景德觀在郡南一里山谷集云簡池覺範道人城東道友也住景德院其家風十二時似趙州東院西池種竹兩枝於宴坐軒中山谷老農作頌曰往在江南住竹山道人兩歲三來訪聽風聽雨看成龍牛羊折角入朝餉簡州城東刮地寒手種檀欒三兩竿竹成要作無孔笛若有靈龜一任鑽魯直又有題其也足軒詩詳詩話中圖經簡有四岩東西南北也三溪東南前也三池栁鳯賴簡也劉涇云三溪號一郡之勝前溪在陽安治後亦稱後溪文同後溪晚步詩云隂隂芳樹暗回堤路入䝉籠轉野溪澤雉應媒髙復下林鴉引子歇還啼青蒲宛宛全淹水紫竹斑斑半出泥倚杖風前感時節亂烟斜日一蟬嘶巨濟又云南溪夀昌寺前水是也由南溪沿隄一里許為東溪李良臣詩簡州何處景最佳東溪清絶人所誇溪上有碧波亭宋姚孳詩賴簡池臺兩蜀誇東溪别是一仙家令人却憶康王谷坐看珠簾濺雨花志云劉文節墓及讀書樓俱在東溪上今東林寺是其樓址一名東溪菴志云栁池折栁橋下水也鳯池在治南三里水自北一里鳯翅山來賴簡山接金堂山郡池名皆因之勝覽云東山在東江之外州治之左志云在城東五里岩髙數丈刻東岩二大字有東巖院智通禪師卓菴處地居兩山之問溪流其中下有懸溜清音不絶旁有洞又有古柏大可二十圍為一郡之望剎也志云即天王講寺貞元初施頭陀創近巖有雙牙山兩石對峙如牙上有井及石箱人見兩金鵝其側晝浴於井夜棲於箱蜀志補罅云西巖在簡州湧泉鎮有石刻大悲像光相屢現志云在治西五里巖洞深三丈五尺濶如之洞門刻西巖二字宋嘉定甲子王武卿結菴於此題名近巖有石柱山孤髙獨立上有石像百餘石室數間有仙人楊氏養丹爐鼎尚存登其巔可望逍遙山勝覽云逍遙洞在𤣥都山去城三十里景德間有楊用晦者隱居此山其上有層崖命工發之得東西二室西室後刻二竈若養丹之所又鑿二窟中可坐五七人東西二壁鐫二孔雀二神人有漢安元年四月十八日㑹仙友十二字漢𨽻也今存按用晦簡池人有仕才能詩任心自適不求當世樂隱洞中時太原王載京兆金惟吉南陽鄧曦度杜審嗣劉旻逺來尋訪刻詩壁間志云南巖在治南一里有洞深三丈闊二丈五尺方輿勝覽南巖有光孝寺前敞飛閣盡覽江山之勝左有洞可容數十人即淳風洞也石刻無名氏詩烟飛嵐翠撲衣裘落日牛羊下巄頭莫道山中生意薄江邉桃李自風流簡州學記李淳風生於州之乾封鎮有故宅及墓按今銅鐘寺即報恩光孝寺舊址宋孝宗隆興二年陽安尉歐陽獬建疏請衡山和尚住持寺前髙敞有㑹勝亭趙抃知益州時寺僧有能琴者見知於公作琴軒詩贈之云輟飲支笻㑹勝亭溪山佳處古琴橫憑君傾耳殷勤聽一弄清風四座生諌議大夫張方詩早向溪山得趣深建亭今復寄餘音紛紛塵市無閒地獨有斯人物外尋志云北巖在治北二里洞深三丈闊五尺有坐榻茶竈傍開石窗窗下有泉清泠不竭有寺舊名白馬院開元中馬祖建倚壁有丈六金身無名氏詩云一帶江烟半倚巖檻前時眺黑龍潭低昻竹影踈明月屈曲松枝拂像龕樹老硬根穿石罅草生懶葉入禪菴西來白馬無踪跡寒鵲昏鴉暮景含碑目云院有唐碑其歲月乃大厯時重修石壁刻云郡守潼川王武卿攜家渡江過唐氏園偶泛舟泊山下登劉氏江閣因上北巖禮大佛開禧改元二月十有三日書近巖有洞曰朝陽深三丈餘髙丈有八尺廣一丈內有石牀額篆石室二字蓋昔人煉丹之所志云四巖附郭之勝也其稍逺者有玉華池天光觀覺林寺又逺則為分棟長松諸山寰宇記陽安縣北二十里玉女靈山東北有泉西北兩岸各有懸崖腹有石乳房一十七眼狀如人乳流下土人呼為玉華池每三月上已日有乞子者漉得石即是男瓦即是女自古有驗山為仙人李八百修煉處勝覽云李八百居棲賢觀一名天光觀碑目云天光觀在陽安縣東二十里有唐碑可讀者云太和初三洞道士王道賜因張文舉施地基創建按今為明教寺志云甕亭山在治南四十里石甕鋪有覺林寺在大道傍王欽若題覺林寺詩暫拂塵襟思倍清竹風山色亂泉聲安民功淺君恩重又䇿羸蹄向古城趙抃詩古寺無碑刻僧云不記年自余安所問惟是愛林泉志云分棟山在州西七十里寰宇記曰山北連秦隴南入資瀘東北入靜戎軍在靈池縣東上十五里劉涇分棟山少休亭記云自成都趨陵簡如在蜀必由靈泉過分棟其山周數百里髙大阻險以石次第為步暑雨冬雪則馬不進僕亦以病告欲少休於是建亭名少休焉志云西北七十里長松山為州斧扆界內諸山皆發脉於此長松寺本蠶叢廟址開元中馬祖行空和尚乃建寺明皇召對賜額長松衍慶寺又賜名香為亭以貯之曰御香亭宋賜名嘉福寺今名靈峰唐鄭谷集云谷自亂離之後在西蜀半紀餘多寓止精舍與圓昉上人為净侣昉公住長松山舊齊嘗約他日訪㑹勞生多故遊宦對年曩契未諧忽聞謝世愴吟四韻以弔之詩曰每思聞靜話雨夜對禪牀未得重相見秋燈照影堂孤雲終負約薄宦轉堪傷夢繞長松塔遙焚一炷香志云蟠龍山與長松相接大厯四年郡大夫傅耆造大佛建院曰石門以山石分開似之院門又有石形如䕫刻字其上曰䕫石楊甲遊長松寺宿石門僧舍以石門霜露白為韻得露字詩云疾風吹輕衣駕我雲脊路人問一回首驚絶不敢顧鳥投虛無底渺渺不知處蜂窠蟻丘垤與世同所騖試看一蒼莽誰有不平處尚憐野僧屋佛靣荒苔蠧斷崖劃呀吻洶洶崩石怒我來得竒觀拄杖叩巖樹青山有驕色斯客不能句平生二三子慰我一相遇娟娟松間月幽夕亦可度夜闌更小語風逼遺響去酌君無多酒繼以木蘭露諸公綽石門院詩云搖空栁色金猶嫩傍道梨花雪未開只尺長松烟霧裏石門頂上暫徘徊碑目云周文王廟碑在陽安縣西北七十五里即後周髙祖文帝之廟舊碑題額云大周植元年歲次丁丑造元年即後周閔帝之初元也今石刻存志云去郡治五十里山曰賴簡自賴簡西亘潛渡雁江而直走龍泉又曰隆泉在治北八十里以澗水隆盛為名寰宇記云靈泉在靈池縣南三十五里隋初縣傍出湧泉因置平泉縣於此唐改靈泉志云廢靈泉縣在州西北七十里隆泉驛之右楊甲靈泉山中詩云小縣相籠合濛濛數百家果蔬爭晚市樵牧亂晴沙落日平林逈青山去路賖偶居無事在隨意問桑麻又野色山圍盡風烟更可憐客情牛鐸外農事藕花前聚汲松根井寬愁石底泉雲安須斗水詩興亦超然又勝地仙靈宅微官也謫居焚香他日夢隱几向來書小睡便山雨長齊稱野蔬逄人問無恙滿意說樵漁又日下叢林薄芊芊肅晚暉閉門成小隱飲水亦生肥醉著溪藤杖歸來木葉衣狂歌有虎兕吾道只應非又何處長松寺雨花雲外臺山從百曲轉路入九關回老檜成龍盡殘柯借鶴來人間斤斧亂風壑夜聲哀又靈泉山上晚望詩云野曠樹還亂林深烟更微天隨殘日盡雲掣斷山飛玉壘風烟闊秦樓草木非憑髙千萬事今夜客沾衣蒲瀛宿靈泉無我軒懷次山詩幽軒著無我居此合何人聞道東山隱當時此地親心源將止水世事甚浮塵今日尋微跡空餘淡墨春自注云壁間有次山題字也成都文類益部十縣多引江水溉田咸為沃壤惟靈池疏决不到須候天雨俗謂之雷鳴田縣東山下有朱真人洞洞北岡嶺連屬逾草里得禇聖母祠化跡尤異民咸事之祈禱獲應潘洞詩云錦里城東邑髙原十六鄉江流分不到天雨降為常節及三春後晴逾兩月强龍乖尋穴蟄魚困入泥藏樹影全虧緑苖姿半吐黃耕夫皆慘戚市户亦倉忙濳慮寃無雪深疑政有傷推恩慙睿主引咎謝虛皇磬折真人宇星奔聖女堂先時蠲玉饌隔夜浴蘭湯洞口焚香逺山椒作梵長幽誠期必逹元應果旋彰雷振南峯下雲飛北嶺傍聲稠喧竹塢勢迫瀉銀潢飄灑連三晝雱𩃱遍一方稻畦烟漠漠蓮沼水泱泱物態涵優渥民情遂樂康洪施周庶品餘潤浹他疆稔歲還堪待隂功詎可忘明靈何以報奮藻紀遺芳按朱真人祠即安靜觀也楊甲宿安靜觀詩青山轉龍脊矯首西南天上有仙人祠臺殿飛後前下見雲雨興樹色暗平川仙人兩黃鵠一去無歸年向來道上屨人著幾何錢一朝聞羽化悵望空流涎却揮囊中金瓦礫來投捐巖巖化金碧香火通雲烟人間萬事爾旦暮有愚賢而况爭奪場轉手分媸妍仙人一回首破隴與荒阡紛紛不足道哀此區中緣石泉瀉幽潔意寂不肯喧夜聞松風露起坐心寥然又云一濯巖下溪再拜巖中庭清風肅然來吹我衣上腥仙人芙蓉冠乘月下雲軿山空雜佩響靜夜朝百靈似聞客欲去小語猶丁寧蕭蕭上松柏急以兩耳聽寂寥古壇外但掛斗與星天明恐是夢恍惚遺心形去飲石上泉再讀幽人銘青山無行迹霧雨松冥冥古今集記云靈泉縣界有瑞應院唐永平中假文昌來攝靈泉尉手植四松於此院有石刻云乾坤毁則無以見寺寺不可毁四松其逺乎松至天福初止存其一縣令張松復補植三株有栽松記刻於石今不存楊甲詩云木落石出荒山臺上有佛寺孤崔嵬斷椽坼瓦無四壁古佛已倒何人推野蜂占窠挾肩背山鼠出穴銜髯䰄老僧見我欲愁哭野葛蔽路官能來文昌種松有斷刻石柱半裂荒莓苔老翁鼻祖無一在獨樹晚出非耆鮐乾坤未變已先滅幾見賊火翻狂雷至今野叟鑿山破石窟尚有龍斤骸當時手種意已逺欲與草木為渠魁仁夀縣寰宇記云陵州漢武陽之東境晉初西城戍也州南有陵井周武帝因以為州名陵井監圖經漢張道陵經兹地有山神稱十二玉女指陵上開鹽井監以陵名志地也文同奏疏謂因張陵以名井復因陵井以名州矣大觀四年改為仙井避其諱云郡國志曰仙井隂氣襲人入者輒死投以火則烟氣上冲濺泥漂石沸吼如雷今玉女祠是其處王象之碑目云張天師靈廟碑元和十五年知陵州李正卿撰文咸通十五年邱沖書又云黃帝隂符碑在州城至道觀宋京記云此中江山瑰竒自古王公貴人詞客才士未嘗一至故不得見於歌詠而為浮屠老氏之學者往往擅而有之方輿勝覽云艷陽洞在州城北至道觀之後昔天師既誓玉女於井因藏去其衣鎖之石室或謂之藏衣洞洞在重巖下㟏岈幽窈晦明變化千態萬狀雖距闤闠不數武而若與世隔蓋道陵修煉之區也杜光庭録異記云熖陽洞古老相傳在陵州陽山之下從來隱蔽人莫知其處乾德三年辛巳正月十六日癸卯井監史保義軍使太保馬全章夢一紫衣束帶巍冠者狀若道流揖之俱行至崖壁所告曰此熖陽洞也閉塞多年能開發護持可以福利邦國又指其地近開小徑曰可斷之勿使常人踐踏言訖而去及旦往尋其所果見土勢微陷以杖導之深不可測即令本軍節級侯廣之勾當人夫斸地漸獲蹤由相次開掘見三重石門洞內並是細砂一無蟲蟻他物其洞自東入西深三丈九尺闊五尺三寸洞門三重第一重髙六尺闊五尺二寸第二重髙五尺五寸闊三尺七寸第三重從頂至底一向髙六尺一寸三門相去各只三四尺鐫鑿精巧殆非人工三門內南畔别有石房闊七尺四寸髙四尺八寸深四尺二寸其後别有一小洞洞門有片石遮掩旁通一縫以燭照之深不知其底北畔亦有石房深四尺闊七尺三寸髙五尺房內有石牀一西畔又有小石房深二尺闊三尺五寸髙三尺一寸西北畔有石牀長三尺八寸闊二尺八寸有石竈模長二尺三寸額闊七寸竈深八寸周圍三尺五寸計從洞門向東一直至鹽井西相去可四十一丈八尺井在洞門正東也全章乃召當井監天師院主內大德費省真問之答云天師院見有元和年刺史李正卿著天師聖德碑云天師以東漢建安二年自沛遊蜀占犍為分野見陽山氣象指謂弟子此山直下有鹹泉焉今驗此洞正當井上即夢中所指者也碑目云洞顔𨽻書艷陽仙洞四字字體兼篆不知何代書旁有款識歲久磨滅東南賈人見此碑本寶而藏之以為真漢𨽻志謂有東漢仙都四字在天師洞未詳碑目又云仙井監有蔡君謨法帖蘇東坡心經帖文與可書千字文陸務觀跋蔡帖云近嵗蘇黃米芾書盛行前輩如李西臺宋宣獻蔡君謨蘇才翁兄弟書皆廢此兩軸君謨真行草𨽻皆備石在仙井可寶也淳熙元年九月八日蜀州手裝勝覽云艷陽洞前有蓬萊閣秦少遊詩雄簷傑檻跨崢嶸席上風雲指顧生千里勝形歸爼豆七州和氣入簫笙人遊晚岸朱樓逺鳥度晴空碧嶂橫今夜請看東越分藩星應帶少微明程公闢次韻云半天鐘鼓宴崢嶸早晚晴隂景旋生湖暖水香春載酒月寒雲迥夜聞笙金鰲破海頭爭並玉雁排烟陳自橫我是蓬萊東道主倚欄先占日初明按蓬萊閣在治東百許步又有含暉閣近五十步趙閲道詩曉川嘉樹照雙扉披豁幽軒景盡歸自喜吾懷已虛白三嵎山色更清輝輿地紀勝云平雲閣在郡圃文與可詩陵陽郡事全稀少懶守長贏半日閒晚後須來上髙閣就中無厭是雲山與可在州送通判喻郎中詩可笑山州為刺史寂寥都不似州城若無書籍兼圖畫便不教人白髮生又云近日簿書全簡少吏人惟聽兩衙休歸來便只尋冠履繞遍林亭山上頭與可又有自然水石記云陵陽守居負山悉石西左砌層崖餘地丈許平夷可屋因植四楹面午橫楣闢幽軒正對大林髙株缺間視逺峰若畫工引淡墨作巒嶺嶷嶷時與烟雲相蔽虧愛此有佳趣復靜密公事少休即至宴坐伏息日計數取多乃去外俗不得知旁頺巨礓如瘤宜鑱刻遂磨治將紀建置嵗月沃水蕩拭見黝理若髮狀傾灘平波瀰漫骫迤復疊先後倫次窪淵聳浪左右役目自非天寫神摹人巧孰能為是必由融結固已有堅包厚藏待豫始發章物蓋顯晦信在時人理疑亦然茍逹此與知命何逺雖爾既有形必復壞倘後人加護則傳久未易泐也李膺益州記云東西南三山相對州治居其中去陵井各一里謂之三嵎山按古謠云三嵎青陵陽榮三嵎翠陵陽貴郡守何耆仲嘗於東山之下作青榮臺以表之張紹祖山扉記曰有岡北來莫窮所自不亟不徐勢趍東南欲薄城下岐而為三行且五里虎踞盤礴不復去此陵陽之所謂三山也西嵎曰跨鼇即州衙坐山李石超覺寺記云州以跨鼇名者居三嵎山之槩也去治半里方輿勝覽云跨鼇山上有跨鼇亭每嵗上元重九太守率僚屬燕其上有石姥在山頂歲旱里人轉徙之天即黯靉雨四注文同賦云上簪岑之飛泉兮披薈蔚之榛莽爰有石之跂跂兮旁無他而相伍其逺睨之若人兮迫猶疑其蹲虎里俗神而甚恭兮號相尊而曰姥又云印山在其坳即捫膝先生喻汝礪故居南嵎曰翳嘶頂上有翳嘶廟相傳神即巴郡太守嚴顔也宋何㮚作碑記併書山前有霄漢堂紹定中隆州軍事推官文太虛為碑記俱存山之麓有更生寺宋丞相虞允文為其父秦國公建碑云紹興十八年六月二十六日鄉人鮮于逑既死復蘇言地府有更生佛故秦國虞公祺也明日以告丞相正秦國小祥之期丞相因言秦國屬纊時微疾耳忽睨坐客古佛俱來吾當歸允文泣下公顧曰身得為佛有何不可含笑而逝按寺在縣東南數百步秦國又有功德院在城西玉屏山元虞集仁夀寺僧報更生佛祠前生瑞竹詩云聞道故園生瑞竹令人歸興滿江干扁舟不畏瞿塘險匹馬誰云蜀道難杜甫溪頭花匼匝孔明廟裏柏闌珊新堂題作歸歟字定得臨江把釣竿伯生丞相裔孫也有還鄉詩云還鄉思速去鄉遲王事相縻敢後期里父留看題壁字山僧打送捨田碑胡桃笻竹南方要盧橘枇杷上國知此日君親俱在望徘徊三顧欲何之又云未忍他鄉作故鄉故因使騎入陵陽鄉人共訝聲音似客路疑將鬢髮蒼親老長懷鄉里思孫多宜置墓田旁治生自可依諸葛數頃膏腴八百桑東嵎曰飛泉上有超覺寺按圖經隋仁夀元年獠反百姓城於山頂避難遂有飛泉湧出獠平泉涸因呼為飛泉山文與可詩東城兀髙峰爽氣浮翠微霞光射巖壁中有寒泉飛碑目云飛泉院碑唐神龍元年立超覺寺碑廣明二年陵州刺史蕭兟記志云超覺寺有爾朱仙影刻二片一全影一半影也有乾道中虞丞相書碑勝覽云飛泉山下蟠溪丞相何公㮚所居何公始生六日瑞雲山當夜半紅霧亘天此山東去蓋四十里碑目云佛龕山有唐貞觀中率更令歐陽詢書金剛經磨崖碑按即佛崖山也在縣東二十五里志云山有三石像背虛面巖俗呼倒坐寺碑目又云東北石城山平等寺有天寶四載薛兼金撰道超和尚精德碑勝覽謂石壁如城絶頂望見峩眉也寰宇記云州南一里鼎鼻山隆然特起又曰隆山隋大業改陵州為隆山郡本此郡國志云周之九鼎淪一於此往往見鼎耳因名南七里一泉水碧色投銀其中成色即變孕婦飲之墜胎俗以為聖泉矣圖經云南二十里有麗甘山山下鹽井是十二玉女故迹以玉女美麗井水味甘合而為名也又云古鹽井號聶甘井井傍有神祠號曰聶社又二十里有儒社山虞允文書碑云紹興癸酉十月八日允文來遊知先世種德本末感愴久之石刻今存佛子寺郡國志云縣西朝女山昔有女子居山悟道肘脛之蹟印石上猶存碑目云後唐同光三年靈泉院碑在本院山上按即談子池也亦名天池宋進士郭周藩詩云靈泉在山頭酌之不盈巵試詢陵陽叟何云談子池一叟為我言郡有談叔皮在唐開元末生兒名阿宜墜地解言笑九歲森髯髭不食且不飲超然忘渴饑十五鋭行走敻若神駒馳二十入山林人莫知所之父母念不泯鄉人為立祠大厯元年春此兒忽來歸頭簪鳯凰冠身著霓裳衣再拜向父母一吐心中詞兒乃仙子流塵市不可羈鄉人意雖厚立祠將焉為妖魅一朝據作祟無休期急為告鄉人毁之勿遲遲祠下多金藏不知始何時盡取濟不給幸勿藏於私言訖即辭去仙袂風披披於焉撤祠宇突兀成平夷果獲千黃金貧匱得所資金盡泉繼湧湛若青琉璃不滿亦不涸旱潦恆若斯禱之立有應翕如塤協箎由來羽化人出處同鬱儀去今數百載跡在名還垂志云天池山麓有顯忠院宋尚書僕射何㮚藏主處㮚從徽欽北狩死沙漠華表柱猶存又有寶籙院宋寶謨待制陳咸葬所號寶謨阡已上在北二十里宋故事名位顯者得於墳側建剎度僧以薦先福焉志云陵州梵宇多以龍名若龍興龍居龍泉龍崖是也龍崖者鐫石為龍卧崖下即文與可鐫怪石墨竹處跨鼇山人李新題云淺梢疏節似瀟湘正向祁寒敵曉霜清興未窮僧已老自餘山色與溪長雅安僉判程壬孫詩風雨勞先别敢辭尊酒深一梢牆上竹留作歲寒心俱在寺壁龍興即報恩寺寺有大悲堂大悲閣王象之碑目云龍興寺大藏經碑開成五年吳商撰古大悲堂碑乾符三年周宋莒撰俱在報恩寺篆字心經碑咸通七年仇漙撰并書修大悲堂碑景福二年僧承徽記俱在小大悲閣又云僧曉微碑在寶林院西蜀明德元年立又有顯教大師碑廣政四年立鐵騎將軍碑在歸安鎮孟蜀廣政二年立寰宇記云貴平縣漢廣都之東南境後魏時與平井縣同置舊治和仁城開元十四年移治祿川一統志云元憲宗時併當縣按圖經祿川距貴平縣三十步發源簡州下注資江而東水多魚蝦縣人利之過祿川有蘭溪唐隱士張鴻居其上按益州記平井縣兩竈二十八鎮日收鹽四石如霜雪是也碑目云貴平縣文宣王廟碑長慶五年陵州刺史李正卿撰尹泰階書按碑在縣址後百步可搨而聖賢石像委榛莽中近方瘞之碑後巖下寰宇記云唱車廟在貴平縣南九里漢朱辰為巴郡守有恩於巴吏人送辰到蜀回至此為辰立廟以其山近鹽井聞推車唱歌之聲為名今鹽井推轆轤皆唱為號令焉碑目唱車山開國王碑貞元元年貴平令王覺撰牟尚書墓記同光五年領州事陳貴民撰又云貴平西北四十里寶峰院有唐人撰寶峰院記院內有王羲之記王氏廬墓銘按志邑王氏女至孝親沒廬於墓側三年有司立碑表之王羲之為作廬墓銘剝蝕殆盡寰宇記梁天監置席郡隋廢為縣里語訛為籍縣志云在縣百七里今為鎮又籍田公館近華陽界縣南有地畝餘踏之軟動有泉淵濔旱不涸湧不溢名曰息壤魚蛇水在其北導江水在其南丹砂山在其西也碑目漢黃龍甘露之碑在籍縣江口上鋭下方其狀如鐘大書漢黃龍甘露之碑七字餘不可讀其可識者羣臣將軍位號蓋為龍紀也井研縣寰宇記云縣本漢武陽地有彭山彭首獠姓在始建鎮之東志云後魏置蒲亭縣今縣東一里黃丞相池是也池中生蒲起亭以存古意周地圖云蒲亭縣有鐡山諸葛亮取為刀劍宇文度封鐡山侯即此志謂鐡山一名茆香山在縣東六十里舊始建縣東寰宇記云井鑊山在縣北其山俯臨井鑊因以為名元宗幸蜀井鑊山神見即此山也碑目云唐節度使楊公墓碑在隆州井研縣道傍有石刻云唐銀青光祿大夫檢校御史中丞上柱國節度使楊公墓旁多楊姓乃其子孫也又有宋何㮚撰陳德用墓碑銘在縣南四十里木龍鄉宣和六年立又有青陽仲廣塔記在縣之天王寺其略云寺有塔以藏舍利為層十三此釋迦氏殊勝莊嚴僧祖逄創始於隆興壬午基就力不繼邑人憫焉願續其事邑之利源以鹽自層一至九費所取者三之一施心殊未厭又合力為第十層工徒甎瓦之供自十而上合尖有期矣鳴呼事有一人營之百人終之者不營於始無以開其先不續於終無以卒其功百人者一人之繼是塔之興雖多厯年所然終於有成者百人之助也掌化任剛乞文刻石置層上以紀歲月云資陽縣華陽國志資中縣受牛鞞水寰宇記縣本漢資中縣後周武成於資中故城置資陽縣以資水為名志云城西二里資溪縈紆九曲合流雁江近掘得宋張方題資溪橋詩有資水右旋江㑹合之句也王巖資陽江詩淡雲殘雪簇江千䇿蹇遲徊客興闌持鉢老僧來咒水倚船商女得搬灘沙翹白鷺非真靜竹映繁梅奈苦寒阮籍莫嗟岐路異舊山溪畔有漁竿范祖禹月夜船行入資川詩憶昨卧碧山蒼蒼叢桂間白雲為屛石為枕緑蘿長掛明月閒忽乘輕舟泛江水山月隨人還在此白鷺驚飛宿靄間青山倒卧蒼波底此時孤棹發中流川後停波聽棹謳不學子猷中夜返欲乘明月向資州志云漢王褒故宅即今縣理廨中八卦井三字子淵筆也輿地碑目云西漢王褒宅在資陽縣西駟馬里今改為靈仙觀有觀碑二說微有不同舊圖經云資陽南五里書臺上豐碑草餘片刻聖主得賢臣頌山是王子淵讀書處有洗硯池一勺又云縣之延夀寺漢董鈞故宅也志以為宋張方宅按亨泉墓在縣北草里有石獸存其宅未詳方輿勝覽資山在縣西南三里迥然秀拔即寰宇記之獨秀山也范祖禹資山詩云醮壇巖谷仙鸞車鳯輦隨飛烟神女瀟瀟來暮雨浮邱往往下雲軿碑目云資陽有三仙磨崖石在三江鎮刻云貞元十四年十月十日杜錫崔熊席䕫三人同遊郡國志資陽有鐶溪百丈池所謂溪流如鐶池深百尺也志云學宮前有星月池有井傍池如星東一里有放生池有碑碣顔真卿書南二十里有孔子溪石壁上鐫孔子字云其地昔有鄉校祀夫子刻記猶存資縣禮記萇𢎞氏孔子嘗問樂焉死之三年而血化為碧按圖經萇𢎞資中人有祠在青泥坊數里之內土色尚青又云王子淵墓在縣東二十里墓前石碣髙丈餘碑目云王褒墓右有河相𢎞農碑未詳人代唐元和中羊士諤為資州守風流文采照耀一時其詩云洛陽歸客滯巴東處處山櫻雪滿叢峴首當時為風景豈將官舍作池籠登郡前山作也一雨東風晚山鶯獨報春淹留巫峽夢惆悵洛陽人栁意籠丹檻梅魂覆錦茵年華行可惜瑤瑟莫生塵郡中早春作也腰章非逹士閉閣是濳夫匣劍寧求試籠禽但自拘江清牛渚鎮酒熟步兵厨唯此前賢意風流似不孤郡中詠懷作也二毛非騎省朝鏡忽秋風絲縷寒衣上霜華舊簡中承明那足厭車服愧無功日日山城守淹留豈桂叢郡中見白髮作也又郡齊讀經作云壯齡非濟物柔翰誤為儒及此齊心暇翛然與道俱散材誠獨善正覺豈無徒半偈蓮生水幽香桂滿爐息隂慙蔽芾講義得醍醐跡似桃源客身嬰竹使符華夷參吏事巴漢混州圖偃草懷君子移風念嗇夫翳桑俄有績宿麥復盈租圓寂期超詣凋殘幸已蘇解空囊不智滅景谷何愚幾日遵歸轍東菑殆欲蕪竇叔向雨後月下寄懷羊二十七資州云夕霽凉飊至翛然心賞諧清光松上月虛白郡中齊置酒平生在開襟願見乖殷勤寄雙鯉夢想入君懷碑目云羊士諤在郡有毗沙門天王贊碑歲久陷於城北隅紹興中邵博為守始掘得之又云青松亭記在郡治唐乾符四年西山節度使成都尹髙駢文併書又云瀛洲亭在郡圃繪唐十八學士鮮于侁文併書又云聚書樓記李石文博雅堂記張震文俱乾道七年立碑聚書樓記略曰國家渡江以來脫五厄之㑹收四部之富頒詔首降三館所儲兩學所集分錫郡國州有書樓侈其賜也自宣和辛丑前太守魏侯潤博以州號多士請於朝减他州之賜以益此州宛乎如韓宣子所見周書之在魯矣歲久鼠穿魚蠧且為有力者夜半負去今守宇文侯為州起發手書之家傳人市殘缺散逸者咸綴録焉比舊目增千餘卷因舊樓徙故葺新復為厨肆貯之博雅堂記略曰宇文紹奕為資守風清事簡則歎曰自吾承先大父右丞相公餘烈以詩書發身凡二十年聚書上自孔氏下至厯代諸史稗官小說與夫國典名公之文合萬餘卷手所校録者幾半之不為不多矣顧猶有遺恨者嘗見前漢文字之奧篆𨽻之工鏤金石而傳後世尚有可考乃其在中原者淪於草澤後生不可復見吾家故所貯吾幸得之不欲擅而有也盍傳之是邦以與學士大夫共之於是摹刻漢石經及他碑凡五十四卷覆以石柱大厦名其堂曰博雅登斯者如入太廟見尊罍彝鼎簠簋盂豆之陳聞咸韶濩武雲和箜篌之音列天球河圖寶玉大弓之器饗太羔𤣥酒昌歜酡糝之味莫不咨嗟歎息以為君侯好古博雅之士矣方輿勝覽云企仙閣居郡治北憑髙視下得一郡之要李石為記以李傅侯張各據一山合四山而拱揖之故曰企仙亦曰蓬萊志云州北二里醮壇山李阿修煉處肖像猶存杜光庭有醮壇山北帝院記以為張道陵居焉山畔有洞鑿石七十二級逺望之如入雲中范祖禹詩醮壇髙倚碧天開中有清都白玉臺霧湧雲旌乘月去風吹仙樂下天來方輿云縣西三里平岡山傅仙宗所宅也崔中吉崔逵亦居此志云玉清山上可以瞰平湖在州南二里侯真人遺迹存焉又云得道山在州西十五里張開光於此得道也碑目陳圖南得道山詩鐫於石壁邵傅跋宋京云東蜀領郡十六而江山瑰竒資中為最資中勝遊十四而北巖為最謂縣有東西南北四巖也圖經距州城東三里曰東巖形若剖㼜側立千尺溪壑深杳石壁上刻中興頌顔魯公書縱廣盈丈去磨崖五里有唐明渡以明皇所經矣巖上鐫宋承議郎鄭鋼詩云徑轉得幽谷雲巖屹相向谽谺偃重簷灣環依疊嶂緬想融結初鐫鑱自天匠了無斧鑿跡但覺盤根壯深可數千尺廣逾八九丈洞穴既窈窕松門亦昭曠廓舍三千界中列五百像巨楠布幢蓋翠蔓垂帷帳木靈不知名境幽或難狀我時馳征軺奔走倦塵鞅獲此一假竒欣然愜微尚欲去興未闌行行重回望末云宣和壬寅題又鐫云丞相大觀文沂國趙公以東川鎮鉞晝繡來歸弭節鄉郡為父老大夫士七日留乃歸內江之府第郡守楊槱執門生禮敬餞於東巖一時賔客直祕閣新利路運副韓炳新巴州趙伯總新恭州趙善詔新大寧監黃中前昌州黃圖南新富順監黃裳制幕勾龍復成與俱語出林杪慷慨與坐客盡醉公抗大節於天下而略位貌於鄉黨於是氣凌八極矣槱請磨翠壁紀盛事共託公為不朽咸曰然淳熙壬寅二月十七日題方輿勝覽城西六里為西巖山行不踰百步石壁夾道如城如峽又云城南五里為南巖按即重龍山也􅍶崒盤屈隱若龍轉有亭閣梵剎跨其上江山城市厯厯可觀又云江山去郡城半里等慈寺之東唐盧并詩地靈無俗草巖靜有仙禽者此也郡志崖巔古像半蝕苔蘚乳泉滴瀝四時不絶蜀志補遺唐李渭為刺史有遊山詩云淮陽清淨理永嘉山水心刻於等慈寺壁碑目云邵泰修北巖寺碑洗公石馬塔院碑滴水巖結界碑俱在本寺又云盧并及張公瑾北巖詩俱刻在龍水縣寰宇記云龍水縣本資中地隋置在龍龜溪資陽西界依龜山隴為城今縣三十里龍水鄉是也溪水屈曲蟠擁猶龍亦曰龍潭石壁有古刻云積雨新霽灝爽澄空寓異探幽人生行樂殊不易得縣令任聖用挈鄉人蒲君勉楊述美泊邑士張和叔飲於龍吟亭風味相投山樹巖石咸助意氣且移樽潭上醉歡歌笑見月乃歸乾道辛卯仲秋丁未述美書范祖禹知龍水縣公餘紀興詩云縣門倚巖谷終日對青峰初仕借為宰讀書過三冬忘機狎鷗鳥觀稼親老農訟庭可羅雀銅印苔蘚封續古今記龍水縣有昭烈皇帝碑形如方柱頂如蓬壺文剝落三之一紹興丙寅孫原濟書碑目云龍川邑小而江水環秀距邑不三里曰靈巖又其傑出者端平乙未夏五月十有八日東川撫屬古渝李粹甫來酬供於此邑令眉山孫子山警曹烏山馮亨叔相與訪古靈湫載酒酌其上午暑正劇樹林隂翳巖氣襲人恍若此身在氷壺絶不知人間炎熱之苦竟日徜徉興殊未盡而景已晡矣遂拂翠崖而書以紀歲月云前蜀馮銖靈巖秋月詩青松崖上紫雲生崖下仙人約舊盟駐馬看碑驚化鶴暮雲回首萬家城銖仕前蜀武城為盤石令也寰宇記云盤石在州城北二里狀若盤陀後周以之名縣遂寧傅耆盤石遷治記云珠江流其前丹神隱其北醮據其左靈巖蟠其右劉光祖記云資號珠江以地之靈而産瓌異相傳江中有夜光如燭方輿勝覽云丹神山在盤石西北五里山之神靈值旱告之即雨寰宇記之丹山縣因此名也按魏書保定二年資州盤石人反殺郡守據險自守州軍不能制總管陸騰率軍討擊破斬之而蠻子復反所在蜂起山路險阻難得掩襲遂量山川形勢隨便開道蠻獠畏威承風請服所開之路多得古銘並是諸葛亮桓溫舊道是年鐡山獠抄斷內江路使驛不通騰又進軍討之一日下其三城招納降附者三萬户今資陽之丹山鎮入其縣界圖經廢銀山縣在州東四十里山形如錠今銀山鎮是其處古今集記云唐田遊巖入蜀居於銀山聚弟子歌雅詩以為樂今山有雅歌臺石刻存志云銀山候館因掘地得一小碣石乃黃山谷與門生戴經弟綱尺牘云七二郎氣秀而有骨他日學問仕宦皆當過人要須得一佳士與逰養其忠厚之源此最為先務涪翁書贈戴六六七二秀才伯仲志云鎮之杜家溝池水一泓清泠澄徹下即龍泉洞也天將雨則雲生竅穴霧彌空谷前有石柱殿相傳龍出毁殿止存二柱崖上鐫二龍土人懼其飛去摧去兩角山谷曽遊此碑目云龍泉洞壁刻有淳熙丁未三月九日何少虛少明從成都張無咎來汲深晤坐因訪舊題數丁亥仲春六日字書與當時人物磨去已六七草年間幾風雨矣少虛且老日有倦遊之歎方為涪翁釣磯之行益起丘壑之念故山猿鶴其能忘情哉又有王齊賢李若水王簡熊九能濯凡塵步武而去寫韻樓記資州古碑有祝融氏祝誦氏之號學齊呫嗶云資州掘地得漢碑有伏羲倉頡初造工業畫卦結繩以理海內等語碑目云隋敕改羅漢院碑在法雲院唐開元棲神山略記在法鉢池前刺史房渙文崇夀觀碑天寶二年建元宗書額御史中丞宋渾文已磨滅裴晉公自贊在靈虛院左僕射裴瞻墓在盤石縣北五里有世譜碑記藏於寶靈院馬端臨通考云資州以新絳帖十卷刻石豫家多有之前有目録元刻麻石上續搨者不逮舊所得本遒徑已上皆不可考內江縣華陽國志江陽郡漢安縣郡東五百里土地雖迫山水特美好冝蠶桑有鹽井魚池以百數家家有焉一郡豐沃水經注云雒水又徑漢安縣謂之綿水口又寰宇記云周天和中於資中地置漢安戍在水濵尋改為中江縣隋開皇避先諱改為內江仍徙治於漢安故城即今縣也勝覽云中江水經盤石縣自十字水流入縣界又云內江有水深百丈實羣川總㑹之所矣晉郭璞城䜟云山行依舊合水去復還來沈約宋書云中江為內水涪江為外水按志中江源出汶山自灌口分支經懷口入簡縣厯資江而下為中江經三堆山下西折而東至縣復東折而南至椑木鎮又南折而西至黃市市距三堆十五里一水周環九十餘里而縣當其中故曰中江江去城不百武與城內桂湖相通以盈縮清濁知之也按湖在西北街宋黃思莊大書二字于岸石上旁植桂樹影可婆娑矣碑目云漢永建五年陳君為漢安長失其名有陳君德政碑在獠井􅄵層崖之腹字雖磨滅然尚可考又有漢永建五年漢安修棧道記俱在內江縣本志云宋紹興於內江縣置安夷軍董昌齡時為令移徙新市平縣基得小碣一片刻詩云戰馬向風嘶荒雞隔水啼終日隨征斾何時罷鼓鼙志云城東半里東林寺紹興中建有石佛按即東津寺也范祖禹資州路東津寺詩云山行無晨暮日暝崖谷昏哀猿落客淚永路驚旅魂憑陵髙山巔俯視大江奔回環島嶼合縈轉洲渚屯行雲赴炎天飛鳥下蜀門地遐怪物聚寺古深殿存憶昔李氏末烟塵暗中原奸雄競草竊割據窮海根干戈百年後見此敗屋垣我來屬清秋登覽無俗喧山深虎豹歸水靜蛟鼉騫臨風獨笑叱浩蕩欲飛翻自注云寺有石佛殿唐乾寧元年建志云城南銀杏鋪江邉有放生碑欵為宋都護校尉周仲亨立有寶光洞壁上鐫雲塞浴溪口金波光明久十字紹興進士邑人閻執中書又云銀杏鋪之隂江所繞也渡江對岸為葛仙山相傳吳郡葛孝先曽棲其上今有巨人跡編户葛仙里之名本此志云治南二十里有髙峰山瀕江有洞曰㑹真中刻大士羅漢甚古唐大姓閻氏所闢者洞幽邃時或撫掌聲若鳴蟬中多斷碣志又云城西二里化龍山麓舊縣址也有長生觀凌風龕及泠然洞咸淳中郢有朱真人者棲其中修煉有吐納之術其泠然洞記略曰豫落迹安夷有長生池丹臺泠然洞青眼不逄揭籃而去因有容迹安夷尋達者無緣寄語共乘風之句也咸淳癸酉九月五日記又留題化龍山云郭外郊西柳已芽東流注目浩無涯江明白白紅紅樹春在三三兩兩家幾度來臨逄社燕一樽相對到昏鴉此邦物色吟成畫髙謝山中景致嘉刋碑在長生觀中正嘉之間山崩得古鏡及劍印石刻䜟云有宋之始化龍為記日月相均永逺不墜亦疑朱仙所留又五里為聖水寺寺有靈湫古碑紹興庚申水觀禪師所創邑尉蔡逸詩云二月春事半縣花無數開江頭連騎行江霧結紅埃下馬坐清䕃觀魚大江隈行行厯山寺金碧森樓臺拂石有唐碑字老生莓苔緬想古今事悠然一傷懷解榼醉泉石倣徨不忍回辭徑下扁舟重開賸樽罍江烟瞑川谷氷輪出崔嵬水面映金波流光浮玉杯蕩漾洲渚間往來恣徘徊一棹轉圓沙燈火來相催髙歌賦厭厭㑹須期再來又云盡日苦征賦公餘來放懷霽雲生怪石宿雨溜懸崖鳥倦晨猶伏僧眠午未齊髙人莫相笑仙尉亦吾儕又云城西草餘里三堆山三峰插漢髙閣憑空有古石像土人多遊焉昔耕者於山掘得小銅版上鐫詩云塵世不我留身寄白雲浮若問真遊處三山與十洲不知為何代物志云西北十五里有華蕚山有寺臨江崖上鐫滙瀾有斐四字唐范崇凱書方輿勝覽華蕚山距內江縣十里許唐范金卿讀書處按范崇凱𤣥宗時獻花蕚樓賦為天下第一鄉人榮之以賦名其山也其弟元凱亦能文時稱為梧岡雙鳯李太白贈范金卿詩云君子枉清盻不知東走迷離家未幾月絡緯鳴中閨桃李若不言攀花願成蹊那能吐芳惠好鳥相招攜我有結緑珍久藏濁水泥時人棄此物乃與燕珉齊拂拭欲贈之申眉路無梯遼東慚白豕楚客羞山雞徒有獻芹心終流泣玉啼祗應自索莫留舌示山妻又范宰不買名絃歌對前楹為邦默自化日覺氷壺清百里雞犬靜千廬機杼鳴浮人少蕩析愛客多逄迎遊子覩佳政因之聽頌聲白集又有青山橫北郭白水繞東城此地一為别孤蓬萬里征浮雲遊子意落日故人情揮手自兹去蕭蕭班馬鳴一首志云亦送崇凱作也金卿所居故址有卧碑鐫華蕚樓賦剝落殆盡山之後灣有金卿墓志云石笋山治東南七十里有石如笋者三下圓上鋭聳峙漢表清影沉江則長虹滿地新月初上則眀燭當天形家謂為邑之地軸以三堆為天關云蜀中廣記卷八
