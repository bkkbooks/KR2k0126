body:
  text: 蜀中廣記卷六十五明曹學佺撰方物記第七茶譜茶經略云巴峽川有兩人合抱者伐而摐之其樹如瓜蘆葉如梔子花如白薔薇質如栟櫚葉如丁香根如胡桃其字或從草或從木其名一曰茶二曰檟三曰蔎四曰茗五曰荈其具有名穿者巴川峽山紉榖皮為之以百二十斤為上穿八十斤為中穿五十斤為小穿其器有火策者一名筯蜀以鐵或熟銅製之在漢揚雄司馬相如之徒皆飲焉滂時浸俗盛于兩都并荆渝間矣爾雅云檟苦茶也郭璞注早取為茶晚取為茗或曰荈蜀人名之為苦茶故𢎞君舉食檄有茶荈出蜀之文而揚子雲方言謂蜀西南呼茶為蔎也本草經曰茗生益州川谷一名游冬凌冬不死味苦微寒無毒治五臟邪氣益意思令人少卧毛丈錫茶譜云蜀中晋源洞口橫源味江青城俱産橫源有雀舌鳥嘴用麥顆嫩芽造成蓋取形似又云彭州有蒲村堋口灌口茶園名仙崖石花等其茶餅小而布嫩芽如六出花者尤妙又云綿州龍安縣生松嶺關者與荆州同西昌昌明神泉等縣連西山生者並佳生獨松嶺者不堪采擷吳曾漫録云茶之貴白東坡能言之獨綿州彰明縣茶色緑白樂天詩云渴嘗一盞緑昌明今彰明即唐昌明也彰明志治北有獸目山出茶品格亦髙謂之獸目茶山下有百滙龍潭凡三長流不竭豫詢諸安縣令則以此地上下四旁俱屬彰明獨中間一寺屬安縣出茶名香水茶晉劉琨與兄子羣書曰前得安州乾茶二斤吾患體中煩悶恆仰真茶汝可信信致之即此茶也華陽國志云什邡出好茶茶經云漢州綿竹縣生竹山者與潤州同生蜀州青城縣丈人山者與綿州同又云劒南以彭州為上生九隴縣馬鞍山至德寺堋口鎮者與襄州同味又云青城縣有散茶末茶尤好遊梁雜記云玉壘關寶唐山有茶樹懸崖而生芽茁長三寸或五寸始得一葉或兩葉而肥厚名曰沙坪乃蜀茶之極品者文選注峩山多藥草茶尤好異於天下華陽國志犍為郡南安武陽皆出名茶茶經云眉州丹稜縣生鐵山者與潤州同又云眉州洪雅昌闔丹稜之茶用䝉頂製餅茶法其散者葉大而黃味頗甘苦亦片甲蟬翼之次也茶經云臨卭數邑茶有火前火後嫩緑黃等號又有火蕃餅每餅重四十兩党項重之如中國名山者其味甘苦大邑志霧中山出茶縣號霧邑茶號霧中茶茶經云雅州百丈山名山者與金州同雅安志云蒙頂茶在名山縣西北一十五里䝉山之上白樂天詩茶中故舊是䝉山是也今按此茶在上清峯甘露井側葉厚而圓色紫赤味略苦發于三月成于四月間苔蘚庇之漢時僧理真所植嵗久不枯九州記云䝉者沐也言雨露常沐因以為名山頂受全陽氣其茶香芳按茶譜云山有五峯頂有茶園中頂曰上清峯所謂䝉頂茶也為天下所稱朝氏客話李德裕丞相入蜀得䝉餅沃於湯瓶之上移時盡化以驗其真方輿勝覽䝉頂茶常有瑞雲影相現故文潞公詩云舊譜最稱䝉頂味露牙雲液勝醍醐志云䝉山有僧病冷且久遇老父曰仙家有雷鳴茶俟雷發聲乃茁可併手於中頂採摘用以袪疾僧如法採服未竟病瘥精健至八十餘入青城山不知所之今四頂園茶不廢惟中頂草木繁茂人跡希到云山谷戎州與人啓云庭堅再拜喜承起居清安閣中小閣皆佳勝東樓碾茶豈作􅟠閘處耶尚阻參承千萬珍重茶經云瀘州夷獠采茶常擕瓢穴其側每登樹採摘茶芽含于口中待葉展放然後置瓢中旋塞其竅還置暖處其味極佳又有粗者味辛性熱飲之療風通呼為瀘茶馮時行云銅梁山有茶色白甘腴俗謂之水茶甲於巴蜀山之北趾即巴子故城也在石照縣南五里茶譜云南平縣狼猱山茶黃黑色渝人重之十月採貢黃山谷答聖從使君云此邦茶乃可飲但去城或數日土人不善製度焙多帶煙耳不然亦殊佳今往黔州都濡月兔兩餅施州八香六餅試將焙碾嘗之都濡在劉氏時貢炮味殊厚恨此方難得真好事者耳又作茶詞云黔中桃李可尋芳摘茶人自忙月團犀胯鬭圓方研膏入焙香青箬裏絳紗囊品高聞外江酒闌傳碗舞紅裳都濡春味長都濡縣今入彭水開縣志云茶嶺在縣北三十里不生雜卉純是茶樹味甚佳劒州志云劒門山顛有梁山寺産茶為蜀中竒品南江志縣北百五十里味坡山産茶方輿勝覽詩鎗旗爭勝味坡春即此廣雅云荆巴間採茶作餅成以米膏和之欲煮飲先炙令色赤搗末置瓷器中以湯燒覆之用葱薑芼之即茶之始說也按今蜀人飲擂茶是其遺制唐書吳蜀供新茶皆於冬中作法為之太和中上務恭儉不欲逆物性詔所貢新茶宜於立春後造曽公類說云蘇才翁與蔡君謨閗茶君謨用惠山泉蘇茶小劣用竹􅅹水煎遂能取勝才翁舜元字僞蜀時毛文錫撰茶譜記茶事甚悉末以唐人為茶詩文附之晉張載成都樓詩芳茶冠六清溢味播九區杜育荈賦曰靈山惟嶽竒産所鍾厥生荈草彌谷被岡承豐壤之滋潤受甘露之宵降月惟初秋農功少休結偶同旅是采是求水則岷方之注挹彼清流器澤陶簡出自東隅酌之以匏取式公劉惟兹初成沫沈華浮煥如積雪燦若春敷唐孟郊憑周況先輩於朝賢乞茶詩道意忽乏味心緒病無悰䝉茗玉花盡越甌荷葉空錦水有鮮色蜀山饒芳藂雲根才剪緑印縫已霏紅曽向貴人得最將詩叟同幸為乞寄來救此病劣躬白傅謝李六郎中寄新蜀茶詩故情周匝向交親新茗分張及病身紅紙一封書後信緑芽十片火前春湯添勺水煎魚眼末下刀圭攪麴塵不寄他人先寄我應緣我是别茶人又謝蕭員外寄新蜀茶詩蜀茶寄到但驚新渭水煎來始覺珍滿甌似乳堪持玩況是春深酒渴人薛能謝蜀州鄭使君寄鳥嘴茶八韻鳥嘴擷渾芽精靈勝鏌鎁烹嘗方帶酒滋味更無茶拒碾乾聲細撑封利穎斜銜蘆齊徑實啄木聚精華鹽損添常誡薑宜著更誇得來拋道藥擕去就僧家旋覺前甌淺還愁後信賒千慙故人意此物敵丹砂鄭谷蜀中嘗茶詩簇簇新英摘露光小江園裏火煎嘗吳僧謾說鴉山好蜀叟休誇鳥嘴香合座半甌輕泛緑開緘數片淺含黃鹿門病客不歸去酒渴更知春味長施肩吾蜀茗詞越碗初盛蜀茗新薄煙輕處攪來勻山僧問我將何比欲道瓊漿却畏嗔成文幹煎茶詩嶽寺春深睡起時虎跑泉畔思遲遲蜀茶倩箇雲僧碾自拾枯松三四枝宋文與可謝人寄䝉頂新茶詩蜀土茶稱盛䝉山味獨珍靈根托高頂勝地發先春幾樹初驚暖羣籃競摘新蒼條尋暗粒紫蕚落輕鱗的皪香瓊碎䰐鬖緑蠆勻慢烘防熾炭重碾敵輕塵無錫泉來蜀乾崤盞自秦十分調雪粉一啜咽雲津沃睡迷無鬼清吟健有神氷霜疑入骨羽翼要騰身磊磊真賢宰堂堂作主人玉川喉吻澀莫惜寄來頻魏鶴山卭州先茶記曰昔先王敬共明神教民報本反始雖農嗇坊庸之蠟門行户灶之享伯矦祖纛之靈有開厥先無不宗也至始為飲食所以為祭祀賓客之奉者雖一飯一飲必祭必見其所祭然況其大者乎眉山李君鏗為臨卭茶官吏以故事三日謁先茶告君詰其故則曰是韓氏而王號相傳為然實未嘗請命於朝也君於是撤舊祠而增廣焉且請于郡上神之功狀于朝宣錫號榮以侈神賜而馳書於豫命記成役豫於事物之變必迹其所自來獨於茶未知所始蓋古者賓客相敬之禮自饗燕食飲之外有間食有稍事有啜湆有設梁有擩醬有食已而酳有坐久而葷有六清以致飲有瓠葉以嘗酒有㫖蓄以御冬有流荇以為豆菹有湘蘋以為鉶芼見於禮見於詩則有挾菜副瓜烹葵叔苴之等雖葱芥韭蓼堇枌􅎵瀡深蒲菭筍無不備也而獨無所謂茶者徒以時異事殊字亦差誤且今所謂韻書自二漢以前上泝六經凡聲御暮之同是音本無它訓乃自音韻分于孫沈反切盛於羌胡然後别為麻馬等音於是魚歌二音併入于麻而魚麻二韻一字二音以至上去二聲亦莫不然其不可通則更易字文以成其說且茶之始其字為荼春秋書齊荼漢志書荼陵之類陸顔諸人雖已轉入茶音而未敢輒易字文也若爾雅若本草猶從草從余而徐鼎臣訓荼猶曰即今之茶也惟自陸羽茶經盧同茶歌趙贊茶禁以後則遂易荼為茶其字為草為入為木陸璣謂椒似茱萸吳人作茗蜀人作茶皆煮為香椒與茶既不相入且據此文又若茶與茗異此已為可疑而山有樗之疏則又引璣說以樗葉為茗蓋使讀者瞀亂莫知所據至蘇文忠始為周詩記苦茶茗飲出近世其義亦既著明然而終無有命茶為荼者蓋傳注例謂荼為茅秀為苦菜豫雖言之誰實信之雖然此特書名之誤耳而豫於是重有感於世變焉先王之時山澤之利與民共之飲食之物無征也自齊人賦鹽漢武𣙜酒唐德宗稅茶民之日用飲食而皆無遺算則幾於陰復田賦潛奪民産者矣其端既啓其禍無窮鹽酒之入遂埒田賦而茶之為利始也嵗不過得錢四十萬緡自王涯置使抅𣙜由是嵗增月益塌地剩茶之名三說貼射之法招商收稅之令紛紛見於史冊極於蔡京之引法假託元豐以盡更仁祖之舊王黼又附益之嘉祐以嵗課均賦茶户嵗輸不過三十八萬有竒謂之茶租錢至熙寧以後嵗入之息驟至二百萬緡視嘉祐益五倍矣中興以後盡鍳政宣之誤而茶法尚仍京黼之舊國雖賴是以濟民亦因是而窮是安得不思所以變通之乎李君字叔立文簡公之孫文簡嘗為茗賦者熙寧七年始遣三司幹當公事李杞入蜀經畫買茶於秦鳯熙河博馬以著作佐郎蒲宗閔同領其事諸州創設官場嵗增息為四十萬而重禁𣙜之令自是蜀茶盡𣙜至李稷加息為五十萬陸師閔又加為百萬元祐元年侍御史劉摯奏疏曰蜀茶之出不過數十州人賴以為生茶司盡𣙜而市之園户有茶一本而官市之額至數十斤所給錢靡耗於公者名色不一給借保任輸入視驗皆牙儈主之故費於牙儈者又不知幾何是官於園户名為平市而實奪之園户有逃亡而免者有投水而免者而其害猶及鄰伍欲伐茶則存禁欲增植則加市故其俗論謂地非生茶也實生禍也願選使者考茶法之弊以蘇蜀民右司諫蘇轍繼言造立茶法皆傾險小人不識事體且備陳五害吕陶亦條上利害既而摯又言陸師閔恣為不法不宜仍任事師閔坐罷未幾蒲宗孟亦以附㑹李稷罷稷卭州人以父絢蔭厯管庫提舉蜀部茶場甫兩嵗羡課七十六萬緡與李察皆以苛暴著時人為之語曰寧逢黑煞莫逢稷察紹聖元年復以蒲師閔都大提舉成都等路茶事凡茶法並用元豐舊條初神宗時熙河運司以嵗計不足乞以官茶博糴每茶三斤易粟一斛朝廷謂茶馬司本以博馬不可以博糴於茶馬司嵗額外增買川茶兩倍茶朝廷别出錢二百萬給之令提刑司封樁又令茶馬司兼領轉運使由是數嵗邊用粗足建炎元年成都轉運判官趙開言𣙜茶買馬五害請用嘉祐故事盡罷𣙜茶而令漕司買馬或未能然亦當減額以蘇園户輕價以惠行商如此則私販衰而盜賊息遂以開主管秦川茶馬二年開大更茶法按中興小厯建炎軍興令商旅園户自行買賣官給茶引白取息錢所賣茶引一百斤計取息錢六貫五百文改成都茶場為合同場仍置茶市交易者必由市引與茶相隨此即開之法也酒譜譙周巴蜀異物贊云文章作酒能成其味按本草文章草即五加皮别名今蜀人重府酒一名皮酒即此齊民要術云蜀人作酴酒法十二月朝取流水五斗漬小麥麯二斤密泥封至正月二月凍釋發之漉去滓但取汁三斗投米三斗炊作飯調强軟合和復密封數十日便熟合滓餐之甘辛滑如甜酒味不能醉人人多啖溫溫小暖而面熱也唐書劒南嵗貢春酒十斛采蘭雜志云卓文君井在卭州白鶴驛世傳文君嘗取此水以釀酒按五代詞有卓女燒春濃美之句注燒春酒名也又國史補注劒南貢燒春即是物矣盛𢎞之曰永安宫西有巴鄉村善釀酒名巴鄉清郡國志曰南鄉峽西八十里有巴鄉村善釀酒故俗稱巴鄉酒也今其地屬雲陽老杜詩聞道雲安麯米春本此嘉州大佛峽人家白酒舊有名蘇東坡送張嘉州詩但願身為漢嘉守載酒時作凌雲遊笑談萬事真何有一時付與東岩酒是也岑參狂歌行贈四兄云今年思我來嘉州嘉州酒重花繞樓樓頭吃酒樓下卧長歌短歌還相酬陸游詩平羌江水接天流凉入簾櫳已似秋公事無多厨釀美此身端不負嘉州古郫志縣人刳大竹傾春釀其中號郫筒酒相傳山濤為郫令用筠管釀荼䕷作酒兼旬方開香聞百步方輿云龍渠縣東十五里有山出藤可以引酒曰引藤山出釣藤酒又杜詩黃羊飯不羶蘆酒還多醉蓋以蘆筒吸酒亦引藤之類也珙志縣有木曰酸桶夷人漬其葉㸃豆汁為腐又有麻栁其葉似楠夷人粉以作酒云西京雜記司馬相如初與卓文君還成都居貧愁悶以所著鷫鸘裘就市人陽昌貰酒與文君為歡既而文君抱頸泣曰我平生富足今乃以衣裘貰酒遂相與謀於成都賣酒相如親著犢鼻褌滌器以恥王孫王孫果以為病乃厚給文君漢書揚雄以疾免復召為大夫家貧嗜酒人希至其門時有好事者載酒從之學焉蜀志曰先主以天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰簡雍與先主遊觀見一男女行道雍曰彼人欲行淫先主曰何以知之雍曰彼有其具與欲釀者同先主笑而原之揚雄酒賦曰子猶瓶矣酒醪不入口藏水滿懷自用如此不如鴟夷鴟夷滑稽腹大如壺盡日盛酒人復藉酤常為國器托於屬車出入兩宫經營公家由是言之酒何過乎庾信䝉趙王賚酒詩曰正旦辟惡酒新年長命杯柏葉隨銘至椒花逐頌來流星向碗落浮蟻對春開成都已救火蜀使何時回駱賓王春酒詩朔空曽紀厯帶地舊疏泉色泛臨卭瑞香流赴蜀仙欵交欣散玉怡友悅沈錢無復中山賞空吟吳㑹篇高適春酒詩故人美酒勝濁醪故人清詞合風騷長歌滿酌惟吾曹高談正可揮麈毛半醉忽然持蟹螯洛陽告捷傾前後武侯腰間印如斗郎官無事時飲酒杯中緑蟻吹轉來甕上飛花拂還有前年持節將楚兵去年留司在東京今年復拜二千石盛夏五月西南行彭門劒門蜀山裹乍聞軍人劫奪我到家但見妻與子賴得飲君春酒數十杯不然令我愁欲死李崇嗣絶句聞道成都酒無錢亦可求不知將幾斗銷得此來愁杜少陵謝嚴中丞送青城山道士乳酒詩山瓶乳酒下青雲氣味濃香幸見分鳴鞭走送憐漁父洗盞開嘗對馬軍自注云軍州謂驅使騎為馬軍按韓持國謝邵堯夫九日逺寄新酒詩云有客忽傳龍坂至開樽如對馬軍嘗自注云錦屛山題名有記河南府使馬軍送新酒即是杜詩出處蘇東坡蜜酒歌西蜀道士楊世昌善作蜜酒絶醇釅余既得其方作此遺之云真珠為漿玉為醴六月田夫汗流泚不如春甕自生香蜂為耕耘花作米一日小沸魚吐沫二日眩轉清光活三日開甕香滿城快瀉銀瓶不須潑百錢一斗濃無聲甘露微濁醍醐清君不見南園採花蜂似雨天教釀酒醉先生先生年來窮到骨問人乞米何曽得世間萬事真悠悠蜜蜂大似監河侯陸游蜀酒歌漢州鵝黃鸞鳯雛不鷙不搏德有餘眉州玻瓈天馬駒出門已無萬里塗病夫少年夢清郡曽賜虛皇碧琳腴文德殿門晨奏書歸局黃封羅百壺十年流落狂不除遍走人間尋酒壚青絲玉瓶到處酤鵝黃玻瓈一滴無安得豪士致連車倒瓶不用杯與盂琵琶如雷聒坐隅不愁渴死老相如黃山谷云廖致平送緑荔支王公權送荔支緑酒俱為戎州第一因作詩以紀之王公權家荔支緑廖致平家緑荔支試傾一杯重碧色快剝千顆輕紅肌潑醅葡萄未足數堆盤馬乳不同時誰能同此勝絶味唯有老杜東樓詩又荔支緑頌為王公權作云王牆東之美酒得妙用於六物三危露以為味荔支緑以為色哀白頭而投裔每傾家以繼酌忘魑魅之躨觸見醉鄉之城郭揚大夫之拓落陶徵君之寂寞惜此士之殊時常生塵於尊勺又示知命弟詞云乍晴秋好黃菊欹烏帽不見清談人絶倒更憶添丁小小蜀娘謾㸃花酥酒槽空滴真珠兄弟四人别住他年同插茱萸又於戎州答唐彥道庭堅比因三家作酒皆美以飲客因作三頌謾往一笑有金桃粽二頌熱倦未暇録也宋初諸州城內皆置務釀酒縣鎮鄉閭或許民釀而定其嵗課三京官造麴聽民納直以取川峽承舊制賣麴價重開寶二年詔減十之二既而頗興𣙜酤言事者多陳其非便太平興國七年罷仍舊賣麴自是惟䕫達開施瀘黔涪黎威州梁山雲安軍及河東之麟府州荆湖之辰州福建之福泉汀漳州興化軍廣南東西路不禁建炎三年總領四川財賦趙開遂大變酒法自成都始先罷公帑實供給酒即舊穙買坊場所置隔釀設官主之民以米入官自釀斛輸錢三十頭子錢二十二明年遍下其法於四路嵗遞增至六百九十餘萬緡凡官槽四百所私店不預焉於是東南之酒額亦日增矣朝野雜記云建炎中總為緡錢一百四十萬趙開變法置隔釀民願釀者米一斛輸錢三十遍四路行其法於是增至六百九十餘萬緡王瞻叔為潼川漕請罷監槽務許穙賣四川酒課纍減之餘猶為緡錢四百五十餘萬䕫路自祖宗以來不𣙜酒趙應祥始𣙜之嵗取錢四萬二千九百餘引鄭剛中為宣撫奏除之眉州志云范成大帥四川議減鹽酒課以蘇蜀民朱時敏白范曰榜賣之法不除則今日之惠有時而盡後時敏為都司奏曰陛下眷念全蜀嵗捐上供對減酒課四十八萬德至渥也未減之前元管酒額五百五十萬既減之後今甫七年又增近五百四十餘萬矣欲乞罷榜賣之法而用推排孝宗可其奏蜀中廣記卷六十五
