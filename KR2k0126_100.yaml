body:
  text: 蜀中廣記卷一百明曺學佺撰著作記第十集部宦逰于蜀及蜀中所輯刻者諸葛氏集二十四篇晉陳夀表曰臣前在著作郎侍中領中書監濟北侯臣荀朂中書令關內侯臣和嶠奏使臣定故蜀丞相諸葛亮故事亮毗佐危國負阻不賔然猶存録其言耻善有遺誠是大晉光明至德澤被無疆自古以來未之有倫也輒刪除復重隨類相從凡為二十四篇篇名如右亮少有逸羣之才英霸之器身長八尺容貌甚偉時人異焉遭漢末擾亂隨叔父玄避難荆州躬耕于野不求聞達時左將軍劉備以亮有殊量乃三顧亮於草廬之中亮深謂備雄姿傑出遂解帶寫誠厚相結納及魏武帝南征荆州劉琮舉州委質而備失勢衆寡無立錐之地亮時年二十七乃建竒䇿身使孫權求援吳會權既宿服仰備又覩亮竒雅甚敬重之即遣兵三萬人以助備備得用與武帝交戰大破其軍乘勝克捷江南悉平後備又西取益州益州既定以亮為軍師備稱尊號拜亮為丞相録尚書事及備殂沒嗣子幼弱事無巨細亮皆専之于是外連東吳內平南越立法施度整理戎旅工械技巧物究其極科教嚴明賞罰必信無惡不懲無善不顯至于吏不容姦人懷自厲道不拾遺強不侵弱風化肅然也當此之時亮之素志進欲龍驤虎視包括四海退欲跨陵邉疆震蕩宇內又自以為無身之日則未有能蹈涉中原抗衡上國者是以用兵不戢屢耀其武然亮才于治戎為長竒謀為短理民之幹優于將略而所與對敵或值人傑加衆寡不侔攻守異體故雖連年動衆未能有克昔蕭何薦韓信管仲舉王子城父皆忖已之長未能兼有也亮之器能政理抑亦管蕭之亞匹也而時之名將無城父韓信故功業陵遲大義不及邪蓋天命有歸不可以智力爭也青龍二年春亮帥衆出武功分兵屯田為久駐之基其秋病卒黎庶追思以為口實至今梁益之民咨述亮者言猶在耳雖甘棠之詠召公鄭人之歌子産足以逺譬也孟軻有云以逸道使民雖勞不怨以生道殺人雖死不怨殺信矣論者或怪亮文彩不豔而過于丁寧周至臣愚以為咎繇大賢也周公聖人也考之尚書咎繇之謨略而雅周公之誥煩而悉何則咎繇與舜禹共談周公與羣下矢誓故也亮所與言盡衆人凡士故其文指不得及逺也然其聲教遺言皆經事綜物公誠之心形于文墨足以知其人之意理而有補于當世伏惟陛下邁蹤古聖蕩然無忌故雖敵國誹謗之言咸肆其辭而無所革諱所以明大通之道也諸葛氏集目録開府作牧第一權制第二南征第三北出第四計算第五訓勵第六綜核上第七綜核下第八雜言上第九雜言下第十貴和第十一兵要第十二傳運第十三與孫權書第十四與諸葛瑾書第十五與孟達書第十六廢李平書第十七法檢上第十八法檢下第十九科令上第二十科令下第二十一軍令上第二十二軍令中第二十三軍令下第二十四右二十四篇凡十萬四千百一十二字泰始十年所進武侯十六䇿一卷朝氏曰序稱謹進便宜十六事一治國二君臣三視聽四納言五察疑六治民七舉措八考黜九治軍十賞罰十一喜怒十二治亂十三教令十四斬斷十五思慮十六隂察陳夀録孔明書不載此䇿疑依託者按此板翻刻在大梁李獻吉序郤令先序蜀漢郤正字令先河南偃師人安貧好學博覽墳籍弱冠能屬文仕為祕書郎淡於榮利而耽意文章自司馬王揚班傅張蔡之儔遺文篇賦及當世美書善論益部有者則鑽鑿推求略皆寓目蜀亡後主東之洛陽大臣無翼從者惟正及殿中督汝南張通舍妻子單身隨侍後主賴之所著述詩論賦之屬垂百篇其釋譏一篇詳見本傳陳夀以其可繼崔駰達旨吕雅格論十五篇陳夀志雅蜀尚書令吕乂之子南陽人也仕蜀為謁者清厲有文才向朗集蜀志朗字巨達襄陽宜城人少師事司馬德操與徐元直韓德龎士元皆親善仕諸葛丞相長史隨征漢中以馬謖逃亡朗與之善知情不舉免還成都少時涉獵文學然不治素檢以吏能見稱自去官優遊無事垂三十年乃更潛心典籍孜孜不倦年踰八十猶手自校書刋定謬誤積聚篇卷於時最多開門納賔誘納後進但講論古義而已陶靖節年譜一卷年譜辨證一卷雜記一卷陳氏曰吳仁傑斗南為年譜張縯季長辨證之又雜記晉賢論靖節語此蜀本也季長蜀人和陶集十卷蘇軾兄弟追和共注唐三百家文粹四百卷眉山成叔陽編後溪劉氏序略曰往時有唐文粹百卷姚鉉之所銓纂已倍于古今眉山成君乃增益之至三百家為四百卷嗚呼何其多也文之多者可以察治言之富者可以觀德眉士鄉多藏書叔陽所以盡力乎其間豈徒然哉唐六十家集陳氏序王右丞集云大抵蜀刻唐六十家集多異于他處又玄集三卷五代韋莊選唐人詩才調集十卷後蜀韋縠選唐人詩以李青蓮白樂天居首海虞趙玄度有抄本花間集十卷陳氏曰孟蜀趙崇祚著崇祚字宏基仕至衛尉少卿其詞自溫飛卿而下十八人凡五百首此近世倚聲填詞之祖也詩至晚唐五季氣格卑陋千人一律而長短句獨精巧髙麗後世莫及此事之不可曉者放翁陸務觀之言云爾歐陽炯序曰鏤玉雕瓊擬化工而逈巧裁花剪葉奪春艷以爭鮮是以唱雲謡則金母詞清挹霞醴則穆王心醉名髙白雪聲聲而自合鸞歌響遏青雲字字而偏諧鳯律楊柳大堤之句樂府相傳芙蓉曲渚之篇豪家自製莫不爭髙門下三千玳瑁之簮競富樽前數十珊瑚之樹則有綺筵公子繡幌佳人遞葉葉之花箋文抽麗錦舉纎纎之玉指拍按香檀不無清絶之辭用助嬌嬈之態自南朝之宫體扇北里之倡風何止言之不文所謂秀而不實有唐已降率土之濵家家之香徑春風寧尋越艷處處之紅樓夜月自鎖嫦娥在明皇朝則有李太白應制清平樂詞四首近代溫飛卿復有金筌集邇來作者無愧前人今衛尉少卿字宏基以拾翠洲邉自得羽毛之異織綃泉底獨殊機杼之功廣會衆賔時延佳論因集近來詩客曲子詞五百首分為十卷以炯粗預知音辱請命題仍為序引昔郢人有歌陽春者號為絶唱乃命之為花間集庶以陽春之曲將使西園英哲用資羽蓋之歡南國嬋娟休唱蓮舟之引時大蜀廣政三年夏四月日序唐章懷太子摘瓜辭本傳名賢字明允數嵗讀書一覽輒不忘常招集諸儒注後漢書永隆年武后譖廢為庶人徙于巴州作黃瓜辭有臺見存王勃入蜀紀行詩自序云總章二年五月癸卯余自長安觀景物于蜀遂出褒斜之隘道抵岷峨之絶徑超玄溪歷翠阜逮彌月而臻焉山川之感召多矣余能無情哉爰戒文律用宣行唱編為三十首投諸好事者杜工部集二十卷年譜一卷宋嘉祐中華陽王琪君玉刻而序之以微仲在成都時常為譜其年月杜詩集注三十六卷陳氏曰蜀郭知達所集九家注世有稱東坡杜詩故事者隨事造文一一牽合而皆不言其所自出且其辭氣首末出一口蓋妄人依托以欺亂流俗者書坊輒剿入集注中殊敗人意此本獨削去之朱晦菴曰子美自稱詩入夔而神然子美詩好處亦是倣選詩夔州諸作不然也杜詩補遺正謬注宋安嶽杜田撰岑嘉州集十卷朝氏曰岑參南陽人嘉州刺史杜鴻漸表置幕府為職方郎中兼侍御史罷終于蜀集有杜確序陸遊曰豫自少時絶好岑嘉州詩往在山中每醉歸倚胡牀睡輒令兒曺誦之至酒醒或睡熟乃已嘗以為太白子美之後一人而已今年自唐安别駕來攝犍為既畫公像齋壁又雜取世所傳公遺詩八十餘篇刻之以傳知詩律者不獨備此邦故事亦平生素意也韋述集本傳述京兆萬年人淡于榮利家廚書二千卷張説薦為直學士典掌圖書祿山反述抱國史藏南山陷賊汙偽官賊平流渝州元子十卷琦玕子一卷文編十卷陳氏曰元結次山著蜀本但載自序江州本以李商隱所作序冠其首蜀本拾遺一卷中興頌五規二惡之屬皆在焉江本分置十卷江山集唐咸通中汾州薛能以監郡攝嘉州刺史政暇題詠甚多編為江山集洞庭集一卷陳氏曰唐薛瑩撰文宗時人集中多蜀詩其曰壬寅嵗者在前則為長慶四年後則為中和二年未知定何年也觀者考之韓文公志五卷外集一卷陳氏曰金堂樊汝霖澤之撰汝霖嘗為韓集譜注四十五卷又集其碑志祭文序譜之屬為一編此是也外集但據嘉祐蜀本劉燁所録二十五篇而附以石刻聯句詩文之遺見於他集者李文公集十卷蜀本分二十卷有蘇舜欽序文唐李翺習之也孟東野咸池集朝氏曰蜀人蹇濬用退之贈郊句纂咸池集二卷凡一百八十篇東野自有集十卷李紳追昔遊集朝氏曰唐李紳字公垂亳州人與元稹李德裕同時號三俊追昔遊者蓋賦詩紀其生平所遊歷謂起梁漢歸諌署播越荆楚分務東州守蜀鎮梁也賈長江集十卷朝氏曰唐賈島浪仙詩共三百七十九首唐書稱島范陽人纍舉進士不第文宗時坐飛謗謫長江主簿終普州司倉參軍今長江祠堂中有石刻大中九年墨制大中宣宗年號也與傳不合陳氏曰韓退之有送僧無本詩無本即島也後返初舉進士不第會昌初為普州參軍今遂寧刋本首載大中墨制云比者禮部奏卿風狂遂且養疾關外今却擕卷軸潛至京城遇朕微行聞卿諷詠觀其志業可謂屈人是用顯我特恩賜卿墨制宜從短簿别俟殊科與傳所稱飛謗不同蓋宣宗好微行小説載島應對忤旨好事者撰此制以實之也安有微行而顯著訓詞者乎首稱奏卿風狂尤為好笑當以本傳墓志為正唐貴進士科故志言責授長江如溫飛卿亦謫方城尉當時謂鄉貢進士不博上州刺史則簿尉固宜謂之責授使今世進士得罪而責授簿尉則惟恐責之不早耳元微之寄白樂天詩二十卷時在通州與樂天書云稹九嵗學賦詩長者往往驚其可教年十五六粗識聲病時貞元十年已後德宗皇帝春秋髙理務因人最不欲文法吏生天下罪過外閫節將動十餘年不許朝覲死於其地不易者十八九而又將豪卒愎之處因喪負衆橫相賊殺告變絡繹使者迭窺旋以狀聞天子曰某邑將某能遏亂衆寧附願為帥名為衆情其實逼詐因而可之者又十八九前置介倅因緣交授者亦十四五由是諸侯敢自為旨意有羅列兒孫以自固者有開道蠻夷以自重者省寺符篆扃固几閣甚者礙違詔旨視一境如一室刑殺其下不啻僕畜厚加剝奪名為進奉其實貢入之數百一焉京城之中亭第邸店以曲巷斷侯甸之內水陸腴沃以鄉里計其餘奴婢資財生生之備稱之朝廷大臣以謹慎不言為朴雅以時進見者不過一二親信直臣義士往往抑塞禁省之間時或繕完隤墜豪家大帥乘聲相扇延及老佛土木妖熾習俗不怪上不欲令有司備宫闥中小碎須求往往持幣帛以易爵餌吏緣其端剽奪百貨勢不可禁僕時孩騃不慣聞見獨於書傳中初習理亂萌漸心體悸震若不可活思欲發之久矣適有人以陳子昻感遇詩相示吟玩激烈即日為寄思玄子詩二十首故鄭京兆於僕為外諸翁深賜憐奬因以所賦呈獻京兆翁深相駭異祕書少監王表在座顧謂表曰使此兒五十不死其志義何如哉惜吾輩不見其成就因召諸子訓責之僕亦竊不自得由是勇於為文又久之得杜甫詩數百首愛其浩蕩津涯處處臻到始病沈宋之不存寄興而訝子昻之未暇旁備矣不數年與詩人楊巨源友善日課為詩性復僻懶人事常有間暇間則有作識足下時有詩數百篇矣習慣性靈遂成病蔽每公私感憤道義激揚朋友切磨古今成敗日月遷逝光景慘舒山川勝勢風雲景色當花對酒樂罷哀餘通滯屈伸悲歡合散至於疾恙躬身悼懷惜逰凡所對遇異於常者則欲賦詩又不幸年三十二時有罪譴棄今三十七矣五六年之間是丈夫心力壯時常在間處無所役用性不近道未能淡然忘懷又復懶於他欲全盛之氣注射語言雜糅精粗遂成多大然亦未常繕寫適值河東李明府景儉在江陵時僻好僕詩章謂為能解欲得盡取觀覽僕因撰成卷軸其中有旨意可觀而詞近古往者為古諷意亦可觀而流在樂府者為樂諷詞雖近古而止於昑寫性情者為古體詞實樂流而止於摹像物色者為新題樂府聲勢沿順屬對穩切者為律詩仍以七言五言為兩體其中有稍存寄興與諷為律諷不幸少有伉儷之悲撫存感往成數十詩取潘子悼亡為題又有以干教化者近世婦人暈淡眉目綰約頭鬢衣服修廣之度及匹配色澤尤劇怪豔因為豔詩百餘首詞有今古又各爾體自十六時至是元和七年矣有詩八百餘首色數相從共成十體凡二十卷自笑冗亂亦不復置之於行李昨來京師偶在筐篋及通州司馬行盡置足下僅亦有説僕聞上士立德其次立事不遇立言凡人急位其次急利最下急食僕天與不厚既乏全然之德命與不遇未遭可為之時性與不慧復無垂範之言兀兀狂癡行近四十徼名取位不過於第八品而冒憲已六七年授通之初有習通之熟者曰通之地濕墊卑褊人事稀少近荒札死亡過半邑無吏市無貨百姓茹草木刺史以下計粒而食大有虎貘蛇虺之患小有蟆蚋浮塵蜘蛛蛒蜂之類皆能鑽嚙肌膚使人瘡痏夏多隂霪秋為痢虐地無醫巫藥石萬里病者有百死一生之慮夫何以僕之命不厚也如此智不足也又如此其所詣之憂險也又復如此則安能保持萬全與足下必復京輦以須他日立言事之驗耶但恐一旦與急食相扶而終使足下受天下友不如己之誚是用悉所為文留穢箱笥比夫格奕摴塞之戲猶曰愈於飽食僕所為不又愈於格奕摴塞之戲乎昨行巴南道中又有詩五十一首文書中得七年已後所為尚二百篇繁亂冗雜不復置之執事前所為寄思元子者少嵗云為文不能自足其意貴其起豫之始且志京兆翁見遇之由今亦寫為古諷之一移諸左右僕少時受吹噓之術於鄭先生病懶不就今在開處思欲怡神保和以求其病異日亦不復費詞於無用之文矣省視之煩庶亦已於是乎白長慶集五十卷年譜一卷陳氏曰蘇本蜀本編次不同知忠州漢嘉何友諒以樂天舊治既刋其文集又作年譜刻之集首云始豫為譜既成妹夫王泳叔永守忠録寄之則忠已有此譜視豫譜詳略互見亦各有發明李觀後集二卷朝氏曰唐李觀元賔貞元八年進士中宏詞科終太子校書郎為文不襲前人時謂與韓愈相上下者有文編三卷外集二卷其後蜀人趙昻又得其安邉書至朝錯論一十四首為後集二卷李洞集洞字才江京兆人唐諸王孫也慕賈島為詩因入蜀以銅鑄浪仙像事之如神昭宗時不第還蜀卒陸龜蒙笠澤叢書四卷陳氏曰叢書為甲乙丙丁詩文雜編政和中朱衮刋之吳江未有四賦用蜀本增入蜀本七卷郫人樊開所序辨謗略三篇唐開州刺史唐次在任十年不遷乃撰辨謗略三篇上之改夔州憲宗立召還薛洪度詩一卷薛濤字洪度工為詩當時名人多與酬贈武元衡奏為校書郎太和中卒李肇云樂妓而工詩者濤亦文妖也韋莊浣花集五卷箋奏四卷朝氏曰偽蜀韋莊字端已仕王建至吏部侍郎平章事集乃其弟藹所編以所居即杜甫草堂舊址故名偽史稱莊有集二十卷今止存此王鍇集前蜀王氏朝偽相王鍇字鱣祥家藏書數千卷一一皆親札并寫藏經每趨朝於白藤擔子內寫書書法尤謹張蠙詩一卷朝氏曰偽蜀張蠙字象文清河人唐乾寧中進士為校書郎櫟陽尉犀浦令王建開國拜膳部員外郎後為金堂令王衍與徐太后逰大慈寺見壁間書墻頭細雨垂纎草水面回風聚落花愛之問知蠙句給札令以詩進蠙以百首獻衍頗重之將召為知制誥宋光嗣以其輕傲止賜白金而已蠙生而頴秀幼能為詩作中有與韋莊杜光庭貫休詩唐末三人皆在蜀疑其同時避亂入蜀云寶月詩一卷朝氏曰唐僧貫休撰字德隱姓薑氏婺州人後入蜀號禪月大師初吳融為之序其弟子曇域削去别為序引偽蜀乾德中獻之盧延讓詩一卷朝氏曰偽蜀盧延讓子善范陽人唐光化九年進士為朗陵雷滿所辟滿敗歸王建及建僭號授水部員外郎纍遷給事中卒官刑部侍郎延讓師薛能詩不尚竒巧人多誚其淺俗獨吳融以其不蹈襲大竒之牛嶠歌詩三卷朝氏曰偽蜀牛嶠字延峰隴西人唐相僧孺之後博學有文以歌詩著名乾符五年進士歷拾遺補闕尚書郎王建鎮西川辟判官及開國拜給事中卒集本三十卷自序云竊慕李長吉所為歌詩輒效之出麾小集西州猥藁宋祁出守益州所著朝氏曰景文通小學故其文多竒字蘇子瞻稱其集淵源皆有考竒險或難句張忠定公語録四卷朝氏曰張詠守蜀有善政門人李畋紀其語論可以垂世者三好詩三十章閬州志載熙寧中遂寧守向公著遂寧好十章寄閬守鄭公申鄭答以南隆好十章薛奎為成都太守亦有春逰好十章忠嘉集宋汝為著汝為豐縣人建炎初使諭劉豫為兀术所得亡歸秦檜將械送於金以修好乃徒步遁入蜀青城山而卒清獻集三卷趙抃字閲道為蜀中御史琴鶴自隨有詩集三卷刻在成都西征小集范成大著陸遊序曰石湖居士范公待制敷文閣來帥成都兼制置成都潼川利夔四道成都地大人衆事已十倍他鎮而四道大抵皆帶蠻夷且北控秦隴所以臨制捍防一失其宜皆足致變故於呼吸顧盻之間以是幕府率窮日夜力理文書應期會而故時巨公大人亦或不得少休及公之至也定規模信命令弛利惠農選將治兵未數月聲震四境嵗復大登幕府益無事公時從其屬及四方之賔客飲酒賦詩公素以詩名一代故落紙墨未及燥士女萬人已更傳誦被之樂府弦歌或題寫素屏團扇更相贈遺蓋自蜀置帥守以來未有也或曰公之自桂林入蜀也舟車鞍馬之間有詩百餘篇號西征小集尤雋偉蜀人未有見者盍請於公以傳屢請而公不可彌年乃僅得之於是相與刻之而屬某為序淳熙三年上已日趙祕閣文集陸遊序曰漢孝武帝好文淮南王安以髙帝孫為諸侯王而學問文辭在漢庭諸儒甲乙中其所著大小山至與雅頌離騷並魏陳思王唐太白長吉則又以帝子及諸王孫落筆妙古今冠冕百世河出崑崙墟首四瀆經天下以入于海彼源委固自不同無足異也宋興宗室深居宫中不與外庭接故雖博學軼材不得著見然以詩文飛白書詔藏祕府者亦不乏人熙寧元豐間始與羣臣並進于朝積數十年而德麟伯山屬文英妙䆮見推於諸公間矣漢王五世孫祕閣公諱不拙字若拙少以進士奮主司及流輩皆伏其工初家貧無以養乃教授諸生以自給其勤苦殆有非窶人子所堪者既得第猶不廢也晚入蜀為州遂持使者節學益不厭文益妙豫行南充閬中小益至成都歷山郵津亭及浮屠老子之廬見穹碑巨版多公遺文每觀之至忘食已而尚書孫公仲益端明汪公聖錫侍御王公龜齡文益出於世往往見公名字於其間許與甚至然後知天下自有公論也公之子善發善零皆取世科善發字正已尤以文學稱其為漢州判官也囊公之文萬里請豫於山隂澤中曰願有以冠篇右顧公平生知已久已凋落豫材下徒以後死不得讓愧可量哉慶元六年三月丁巳王荆公詩注十五卷陳氏曰參政眉山李壁季章謫居臨川時所作也魏鶴山序黃山谷詩注二十卷陳氏曰新津任淵子淵注鄱陽許尹序大抵不獨注事而兼注意用工為深劔南詩藁續藁八十七卷華文閣待制山隂陸遊務觀撰遊左丞佃之孫也紹興末召對賜出身隆興初為密院編修官鄉用矣坐漏泄省中語阜陵以為反覆斥逺之後以夔倅入蜀益自放肆不護細行自號放翁在蜀九年乃歸陸遊東樓集詩自序余少讀地志至蜀漢巴僰輒悵然有逰歷山川攬觀風俗之志私竊自怪以為異時或至其地以償素心未可知也嵗庚寅始泝硤至巴中聞竹枝之歌後再嵗北遊山南憑髙望鄠萬年諸山思一醉曲江渼陂之間其勢無繇往往悲歌流涕又一嵗客成都唐安又東至于漢嘉然後知昔者之感蓋非適然也到漢嘉四十日以檄得還成都因索在笥得古律三十首欲出則不敢欲棄則不忍乃敘藏之乾道九年六月二十一日昭德朝公文集六十卷四川制置使侍郎朝公武子止撰後溪劉氏序略曰國家丙午之變中原衣冠不南渡則西入于蜀其入于蜀有能言當時理亂興喪之由而明乎得失之迹歷歷道往事誦京洛之遺風者鮮矣藉令有之而能達之乎文辭可使耳目尚接乎而後之人有傳焉者亦又鮮焉昭德朝公蓋能言當時理亂興喪之由而明乎得失之迹道往事誦遺風而又能達之乎文辭以傳焉者也其經事之多嘗艱之久而學日益強文日益力猶以為未足其答進士劉興宗書曰僕少時貫穿羣書出入百氏旁逮釋老恢詭之學一再終星其勤亦至矣亡得焉反而求之六藝似於道有見也乃願師董仲舒心竒賈生而病其雜也則公之學可觀矣朝氏具茨集三卷朝沖之叔用著乾道間其子公武為四川安撫制置翻刻于成都喻汝礪序云豫嘗從叔用商近朝人物嘉言善行朝章國典禮文損益靡不貫洽由叔用之學而達諸廊廟溫厚足以代言淵博足以顧問則以詩鳴者是豈叔用之志也哉雖然叔用既已油然棲志於林澗曠逺之中遇事寫物形於興屬淵雅疏亮未嘗為悽怨危憤之音豫於是有以見叔用於消長用舍之際未嘗不安而樂之者也嗟乎所謂含章內奧而深於道者非耶秦漢以來士有抱竒懷能流落不遇往往操心汗筆有怨誹沉抑之思氣候急刻不能間逺古之詞人皆是也所以往往無所建立於天下唯深於道者遺於世而不怨發於詞而不怒君子是以知其必能有為於世者也嗟乎吾於叔用豈直以詩人命之哉朝文元集二十一卷朝公武曰豫五世祖文元公諱逈字明逺澶州人也自公徙家彭門登太平興國五年進士以太子少保致仕終少傅年八十四諡文元集皆自有序自經兵亂六世圖書焚棄無孑遺法藏碎金十卷世傳最廣先得之于趙郡蘇符昭德新編三卷則得之於丹稜李燾道院集要十五卷則得之於知閬州王輔耄智餘言三卷則得之於眉山程敦厚云吕東萊集二十卷汪玉山曰應辰頃知成都始得東萊吕正獻公著集蓋散逸之餘裒輯補綴非當時全書矣然見所未見亦不為少方全盛時士大夫家集之藏未必輕出中更黨禁愈益閟匿故一旦紛擾遂不復見而此雖殘缺不全未易得也蜀中廣記卷一百
