body:
  text: 蜀中廣記卷六明曹學佺撰名勝記第六川西道成都府六灌縣成都記云江水出羊膞山北連甘松至于灌口永康軍志漢文翁為守穿湔江水堰流以灌平陸春耕之際需之如金號曰金灌口也李膺益州記曰湔水路西七里灌口山古所謂天彭闕也華陽國志望帝之時㑹有水災其相開明决玉壘以除水害遂委以政事已而禪位於開明之西山隱焉按今灌口鎮有望帝祠存道將又云秦李氷為蜀守知天文地理謂汶山為天彭門乃至湔及縣見兩山相對如闕倣佛若有神見遂於水上立祠三所祭用三牲圭璧沉瓚漢興數使使者祭之按揚雄蜀記李氷以亡者過天彭闕精靈數見焉元和志灌口鎮在導江縣西二十六里後魏置自灌口坂迄千頃山五百里間兩崖壁立有瀑布飛流十里而九昔人以為井陘之地寰宇記云唐貞觀於灌口鎮立鎮靜軍宋改為永康軍矣杜甫野望因過常少仙詩野橋齊度馬秋望轉悠哉竹覆青城合江從灌口來入村樵徑引嘗果栗園開落盡髙天日幽人未遣回岑參聞崔十二侍御灌口夜宿報恩寺詩聞君尋野寺便宿支公房溪月冷深殿江雲擁回廊燃燈松林靜煮茗柴門香勝事不可接相思幽興長蘇軾送鮮于都曹歸蜀灌口舊居詩薾盡霜鬚照碧銅依然春雪在長松朝行犀浦催收芋夜渡繩橋看伏龍莫歎倦游無駟馬要將老健敵千鍾子雲三世惟身在為向西南說病容水經注曰江水又厯都安縣即汶山郡治劉先主所置也有桃關及漢武帝祠李氷作大堰於此立碑六字曰深淘灘淺包􅋣􅋣者於江作塴塴有左右口謂之湔塴江古今集記曰李氷使其子二郎作三石人以鎮湔江五石犀以厭水怪鑿離堆山以避沫水之害穿三十六江灌溉川西南十數州縣稻田自禹治水之後氷能因其舊跡而疏廣之今縣西三十三里犍尾堰索橋有李氷祠按即崇德廟也宋扈仲榮仕為監永康軍崇德廟即此范石湖離堆詩序云沿江兩崖中斷相傳秦李氷鑿此以分江水上有伏龍觀是氷鎖孽龍處蜀漢水涸則遣官致祭壅都江水以自足謂之攝水民祭賽者率以羊歲殺羊四五萬計其詩云殘山狼石雙虎臥斧跡鱗皴中鑿破潭淵油油無敢唾下有猛龍拴鐡鎖自從分流注石門西州粳稻如黃雲刲羊五萬大作社春作伐鼓蒼烟根我昔官稱勸農使年年來激西江水成都火米不論錢絲管相隨看蠶市注水經曰江水由湔塴江入郫江撿江以行舟益州記曰江至都安堰其右撿其左其正流遂東郫江之右也因山頺水坐致竹木以溉諸郡又羊摩江灌江西於玉女房下作三石人於白沙郵郵在堰官上立水中刻要江神水竭不至足盛不沒腰是以蜀人旱則藉以為溉雨則不遏其流故記曰水旱從人不知饑饉沃野千里世號陸海謂之天府也俗謂都安之堰亦曰湔堰又謂之金堤左思蜀都賦云西踰金堤者也諸葛亮北征以此堰農大國之所資以征丁千二百人主護之有堰官李膺記云玉女房鑿山為穴深數十丈有廊廡堂室屈曲殆若神功非人力矣蜀志後主登觀坂看汶江旬日始還成都華陽國志益州刺史皇甫晏至都安屯兵觀坂從事何旅曰今所安營地名觀坂上反在下其徴不祥不從果為牙門張和所殺隄堰志曰粵自神禹導江正源至石紐出汶川而南其北無水秦昭襄王時蜀守李氷鑿離堆虎頭於江中設象鼻七十餘丈首濶一丈中濶一十五丈後一十三丈指水一十二座大小釣魚護岸一百八十餘丈橫瀦洪流故曰都江以分岷江之水北折而東灌溉蜀郡田疇以億萬計蜀用富饒號稱陸海於所逼處又設護岸蓋籠石附岸水不蠧土而渠可堅久指水數十餘處如象鼻狀以扞之皆冰之所作也都江口舊有石馬埋灘下凡穿淘必以離堆石記為凖號曰水則其下淘深二丈二尺而水則下亦深七八尺石渠水口橫一丈五尺從一百二十丈深六尺石洞水分為三曰灌田水口橫一丈從一百二十丈深六尺曰彭州水口橫三丈又分為二其一從十有五丈深五尺其一從四十丈深三尺曰將軍橋水口橫二丈三尺從四十丈深三尺外應水口橫四丈從一百四十丈而中分之上流深六尺下流二尺保堂水口橫一丈五尺從一百三十丈深四尺倉門水口橫八尺從五十丈深二尺馬騎水口橫六丈從二百九十丈深二尺鼓兜石趾水口橫二丈五尺從六十丈深二尺東穴水口橫三尺從一百五丈深五尺投龍水口橫五丈從八十丈深三尺北水口橫四丈從一百八十丈深三尺鐡溪水口橫一丈從六十丈深三尺撙下水口橫五丈從一百二十丈深三尺五徙水口橫三丈從六十丈深一尺歲以為度過與不足其害立見由漢以來數千百年或因舊葺治或因時疏築而功實原於秦守氷故厯代廟祀之所謂馬騎水口者東南六七里間冇堤名上馬騎下馬騎各長二百餘步世傳氷駐馬於此督工後訛以騎為隄也宋史曰沫水出蜀西徼外今陽山江大皂江皆為沫水入西川嘉眉蜀益間夏潦洋溢必有衝决可畏之患自秦李氷鑿離堆以分其勢一𣲖南流于成都以合岷江一𣲖由永康至瀘州以合大江一𣲖入東川而後西川沫水之害减耕桑之利溥矣皂江支流迤北曰都江口置大堰疏北流為三曰外應溉永康之導江成都之新繁而逹於懷安之金堂東北曰三石洞溉導江與彭之九隴崇寧濛陽而逹於漢之雒東南曰馬騎溉導江與彭之崇寧成都之郫溫新都新繁成都華陽三流而下派别支分不可悉紀其大者十有四自外應而分曰保堂曰倉門自三石洞而分曰將軍橋曰灌田曰雒源自馬騎而分曰石址曰鼓兜曰道溪曰東穴曰投龍曰北曰撙下曰五徙而石渠之水則自離堆别而東與上下馬騎乾溪合凡為堰九曰李光缺膺村曰百丈曰石門曰廣濟曰顔上曰弱水曰濟曰導皆以隄攝北流注之東而防其决離堆之南實支流故導以竹籠石為大隄凡七壘如象鼻狀以捍之離堆之趾舊鑱石為水則則盈一尺至十而止水及六則流始足用過則從侍郎堰减水河泄而歸諸江歲作侍郎堰必以竹為繩自北引而南凖水則第四以為髙下之度江道既分水復湍暴沙石填委多成灘磧歲暮水落築堤壅水上流春正月役工濬治謂之穿淘有碑刻熙寧制書云凡創水磑碾有妨灌溉民田者以違制論元史曰蜀堰舊為李冰作厯數千百年所過衝崩蕩嚙又大為民患有司以故事歲至隄防一百三十有三所役兵民多者萬餘人少者千人其下充數百人役凡七十日不及七十日雖事治不得休息不役者日出三緡為庸錢由是富者屈於資貧者屈於力上下交病㑹其費歲不下巨萬緡大抵出於民者什九藏於吏而利之所及不足以償其費元統二年僉四川肅政廉訪司事吉當普巡行周視得要害三十有二處餘悉罷之召灌州判官張宏計曰若甃以石歲役可罷民力可蘇宏遂出私錢為小堰堰成暴漲不動乃具白行省及䝉古軍七翼之長郡縣守宰下及鄉里之老各陳利害咸以為便於是徴工發徒即都江舊蹟而治之鹽井關限其西北水西關據其西南分江導水因勢瀦堰以鐡六千斤鑄大龜貫以鐡柱鎮其江源然後諸堰皆甃以石範鐡以關其中以桐油石灰雜麻絲搗熟密苴罅漏岸善崩者築江石以護之上植楊柳旁種蔓荆櫛比鱗次賴以為固所至或疏舊渠以導其流或鑿新渠以殺其勢遇水㑹則有石門泄蓄自是水利省臺上其功詔揭傒斯記之是役石工金工皆七百人木工二百五十役徒三千九百䝉古居二千糧千石有竒石材萬餘灰六萬餘斤油半之鐡六萬五千斤麻五千斤共四萬九千有竒緡工畢官積餘二十萬一千八百緡責灌守以貸於民歲取其息以備祭祀淘灘修堰之費仍免灌之兵民常役俾專力堰事焉舊經云太初蜀王征西畨野人以壺漿為獻王使投之江中三軍飲之皆醉因名味江寰宇記云味江水出青城長樂山下江中有大石髙數丈號大坎又有小石在其下亦髙數丈為小坎水激其上洶湧聞于數里古老傳云味江水甘美人爭飲之因名青城外史云即今漩口江也江口石有名大險小險或即坎之轉音大坎石磴逶迤其傍深林老樹猿猴纍纍掛樹間春夏水至則沒路矣水經注云都安縣渡江有笮橋按所謂索橋溜筒皆其遺制也唐獨孤及笮橋贊曰相引一索人綴其上如猱之縳轉帖入淵如鳶之落尋橦而上如魚之躍頃刻不戒霣無底壑志云縣西二里有橋曰珠浦即索橋也其制兩岸塹石為穴揵石為籠夾植巨木屹砥湍流編竹繩跨江橫濶一丈離水面五尺長百二十丈方輿勝覽云繩橋前有翠圍山山上道院古王仙柯燒丹之處在永康縣西八里范成大過青城題索橋詩織簟勻鋪面排繩彊架空染人髙曬帛獵户逺張罿薄薄難承雨翻翻不受風何時將蜀客東下看垂虹志云溜筒橋在縣西六十里兩岸石柱以竹繩橫牽斫木為筒狀似瓦覆繫繩上渡者以麻繩縳懸筒下仰面緣繩而過南通滋茂鄉與汶川界今易為繩橋古今集記云縣西十餘里有虛閣棧道二十五里有石笋閣道三十里龍洞閣道碑目云距紫屏山二里許道旁有漢石刻三皆治道記也其一曰建平五年孝哀時刻也其二曰永平元年孝明時刻也在范公平磨崖之西成都記云古魚鳬國治導江縣寰宇記曰導江縣本都安縣地太康地志云都安劉先主置屬汶山郡周武帝併入益州之郫别於灌口置汶山縣唐武德元年改為盤龍縣尋改為導江李膺記云山土色黃盤回有龍形故曰盤龍外史云盤龍山不言所在今學宫之右有金龜山壤黃而形蜿蜒者是也志云導江廢縣在東二十里導江鋪元為巡檢司時土城尚在今悉平為田初孟蜀改導江為灌州宋改永康軍尋廢熙寧七年趙抃知成都乞復永康軍嘉定二年知軍虞剛簡上五事曰本軍近接威茂并青城一帶山不五七十里即是夷界唐吐蕃入冦自此途出又距成都百二十里而近其為緊切甚於雅黎方輿勝覽云玉壘堂致爽軒俱在軍治范至能詩夕陽塵外漲郊墟六六峰頭夢覺餘竹色喚人來下馬亂蟬深處有圖書陸務觀和云黃塵赤日汗沾裾竹裏煎茶喜有餘堪笑放翁窮意巧就君池館讀君書子焞和云團團竹色繞郊居勾引清風百畝餘憶昔敲門蘇內翰而今下馬范中書紀勝云廣莫亭在軍北朝天門太守吕汲公建李壁記曰危簷飛檻負城四出觀覽之勝甲于東南出金馬門過朝天寺登廣莫亭憑欄下視一目千里矣又有花洲在軍城南百步王子俊為賦魏華父記碑目云唐貞觀十三年韋作觀魚碑在軍城五里北山朝天寺又云唐人徐浩書金剛經在導江天宫院今刻之石又云導江縣北迎祥寺鐘樓內有刻字不記年月觀其有節度押衙字即為唐末五代間刻也寺有老泉為記東坡書碑刻俱存志云縣西二里崇德廟李文饒鎮蜀時重建假全暐為記廟內有八分書聖水池碣近年掘地得之移入成都墨池按方輿勝覽聖水池在永康縣西一舍妙真觀觀昔有女子上升仙洞藥爐尚存不知碣何以在崇德廟碑目云唐吳行魯碑在導江縣北鬬雞臺有古碑刻字畫磨滅蓋唐大中十一年治𨽻彭州時吳為長史所建又云僞蜀王建之子嘉王宗夀與能仁院僧卯往來書劄二十餘簡存于龍門院墨迹宛然如新按張商英龍門院本末記院在永康縣六里青城大面三十六峰嵯峨萬仞盡在軒檻間其詩云四時積雪瞻岷嶺三𣲖飛泉出洞天即此地寰宇記云司馬相如墓在導江縣東十里又有楊妃池今為唐氏之居按太真外傳楊元琰為蜀州司戶生貴妃於此妃兒時嘗誤墮此池志云在縣東二十里今為邱洪二姓宅陳後山云王蜀花蕊夫人姓費氏青城人也圖經相傳有花蕊舊宅不知其處費氏尚有裔存詳見詩話方輿勝覽云蠶崖關在導江縣五十里以振西山之走集外史云關去縣二十里實汶川地有巨石髙丈餘峙山之麓土人云此蠶崖石也關以此得名志云關當縣西岷江之北松茂驛路之衝周武天和二年創立石路巉稜如簇蠶因名杜少陵詩蠶叢鐡馬瘦灌口米船稀即此宋熙寧五年重建元末燬于兵火今置巡司關外有市謂之蠶崖市宋史韓忠憲公子紺繼知成都日所遷以為夏夷互易之地蓋絶西羌窺伺之端云金部格曰勑松當悉維翼等州熟羌每年十月已後即來彭州互市法司差上佐一人於蠶崖關外依市法至市場交易勿令百姓與往還志云玉壘山去縣三百里衆峰叢擁逺望無形惟雲表崔嵬稍露山石瑩潔可為器亦碔砆之類唐貞觀創關於其下名玉壘關亦曰七盤關乃畨夷往來之衝也碑目云玉壘關碑唐大中十年白敏中帥蜀日建關旁有大碑即幕府陳可度頌功德之碑岑參酬崔十三侍御登玉壘山思故園見寄詩玉壘天晴望諸峰盡覺低故園江樹北斜日嶺雲西曠野看人小長空共鳥齊髙山徒仰止不得日攀躋崔信眀送金敬陵入蜀詩金門去蜀道玉壘望長安豈言千里足方尋九折難西上君飛蓋東歸我挂冠猿聲出峽斷月影落江寒從今與君别花月幾新殘李膺益州記云齊永明初置齊基縣於青城山東築土城周五里周地圖記云武帝改齊基為青城縣因山名也志云廢青城在今縣西四十里散入大樂其亭二鄉名山記曰益州西南青城山一名青城都山形似城其上有崖舍赤壁張天師所治處南連峨眉亦有洞天諸靈書所藏不知當是第幾洞天也玉匱經曰青城山為第五大洞寶仙九室之天一名赤城山對蜀郡之西北在岷山之南杜光庭記云岷山連峰接岫千里不絶青城乃其第一峰耳髙三千六百丈周匝五千里霛仙所宅祥異則多於是有瑤林瓌樹金沙玉田甘露芝草天池醴泉之異焉福地記中國名山以青城峨眉為西嶽佐理又三佐命山及十大洞天皆有青城之名楊用修蜀志補罅云青城山有一百八景風日佳時登儲福宫望之厯厯可數曰彭祖峰曰石鑑峰曰龍牙峰曰野雲溪曰藏雲塢曰齊雲榭曰垂虹亭曰捎雲閣曰觸石軒曰臥雲庵曰青溪曰碧桃溪曰芙蓉溪曰躑躅溪曰海棠溪曰溪光亭曰過溪橋曰乳泉曰滴珠泉曰檻泉曰清風湖曰鑑湖曰荻花洲曰蓼嶼曰碧霞洞曰斜川曰曲水曰紫霞洞曰鑑橋曰藥圃曰紫薇洞曰酴醿洞曰清隂橋曰緑篠橋曰玉微亭曰紅霞塢曰爛柯亭曰灌稻泉曰翠光亭曰茅堂曰紫陽洞曰桃源曰暗香亭曰金華堂曰舸齊曰蕙谷曰黃梅嶺曰煎茶溪曰芹浦曰鸚鵡林曰葦廬曰野人澗曰柘坪曰寶遂社曰妙髙峰曰娑羅坪曰木蘭岫曰桂香亭曰石寶曰白蘋洲曰藻壑曰望岷􅼍曰豹谷曰百花潭曰鹿關曰瑞香嶺曰芝畦曰瑞荷塘曰蒹葭渚曰黃浦曰菱灣曰芭蕉谷曰直釣亭曰和芳隴曰金棖徑曰橘徑曰鑑雉泓曰芙蕖島曰歲寒洞曰葦杭曰棲真洞曰望仙坡曰黃葵坡曰鳯簫樓曰跨鳯亭曰牛關曰馭鶴峰曰化城洞曰望闕臺曰凝碧溪曰玉女潭曰寶陀岩曰蓴坡曰藏春島曰桂子谷曰九曲池曰華海曰江梅島曰水仙匯曰薝蔔岡曰丹臺曰浴丹池曰曝藥臺曰芳草渡曰采薇汀曰金絲堤曰菖蒲谷曰種茶岩凡一百有八也唐耿湋送崔眀府赴青城縣詩清冬賔御出蜀道翠微間逺霧開羣壑初陽照近關霜潭浮紫菜雪棧繞青山當似遺民去柴桑政自間錢起賦得青城山送楊杜二郎中赴蜀軍歌蜀山西南千萬重仙經最說青城峰青城嶔岑倚空碧逺壓峨眉吞劍壁錦屏雲起易成霞玉洞花眀不知夕星臺二妙逐王師阮瑀軍書王粲詩日落猿聲連玉笛晴來山翠傍旌旗緑蘿春月營門近知君對酒遙相思岑參寄青城龍溪奐道人詩五嶽之丈人西望青瞢瞢雲開露崖㠐百里見石稜龍溪盤中峰上有蓮花僧絶頂小蘭若四時嵐氣凝身同雲虛無心與溪清澄誦戒龍每聽賦詩人則稱杉風吹袈裟石壁懸孤燈久欲謝微祿誓將歸大乘願聞開士說庶以心相應崔塗寄青城山皓禪師詩懷師不可攀師住杳冥間林下誰聞法塵中只見山終年人不到盡日鳥空還曽聽無生說應憐獨未閒賈島送靈應上人詩遍參尊宿遊方久名嶽竒峰問此公五月半間看瀑布青城山裏白雲中宋紫微孫處士送青城丈人詩深羡青城好洞天白龍一覺幾千年鋪雲枕石長松下朝退看書盡日眠趙抃入蜀先寄青城張遨先生詩踰年青社得徘徊一日皇華下詔催蜀道五千馳驛去秦關百二拂雲開不同參政初時入也似尚書兩度來到日先生應笑我白頭猶自走塵埃又遊青城詩三十六峰峻維岷在蜀竒方行刺史部重欵丈人祠凍雪諸蕃隔晴雲大面披訪仙窮寶洞敕鬼覘豐碑泉落寒崖響蘿依古木垂良工存舊筆老叟琢新詩陟險齊雙屐逄幽鼓七絲盤桓不忍去還作更來期范成大青城山詩萬里清遊不暇慵雙旌換得一枝笻來從井絡直西路上到江源第一峰海內閒身輸我佚山中佳氣為人濃題詩試刻巖前石付與他年蘚暈重李膺記云入山七里至赤石城有羊馬臺三師壇上五里至瀑布水澗二百步有二石梯有一石笋髙三丈過二石門絶崖數百丈下起常道觀髙峰下有水六時灑落東北有二石室名龍宫可容百餘人從龍宫過石室至石梯名龍橋又有一石梯洞穴深邃莫知所極西北有石室宛然見存又有黃帝壇石法天地上圓下方濶一丈二尺有十二角觀東石刻日月各濶五尺厚一尺二寸相對柱上烏兔輝爍方圓磅礴可觀五嶽真形圖云洞天所在之處其下别有日月分精以照其中龍橋處二山相去百餘步峯巒危竦相對橋在峰首橋之半漸漸促小可六七寸長一丈五尺兩邉懸崖俯臨不測山旁有誓石天師張道陵與鬼兵為誓朱筆畫山青崖中絶今驗斷處石並丹色濶二十丈深六七丈望之赩然也青城甲記黃帝封青城山為五嶽丈人乃嶽瀆之上司真仙之崇秩一月之內羣嶽再朝焉續慱物志青城縣嵗春秋以蔬饌享丈人山令躬行禮蓋蜀之望山也有丈人觀在青城北二十里碑目云丈人觀四碑大殿右功德碑鄭敖書殿上祝文碣進士任璠文三門下置觀碑徐大亨文三門右紀符瑞碣甘遺榮八分書杜甫詩云自為青城客不唾青城地為愛丈人山丹梯近幽意丈人祠西佳氣濃緑雲擬住最髙峰掃除白髮黃精在君看他時氷雪容李真六言詩春凍曉韉露重夜寒幽枕雲生豈是與山無素丈人著帽相迎真蓋唐末仙人也陸游謁丈人觀詩黃金篆書榜朱門夾道巨竹屯蒼雲岩巔劃若天地分千柱耽耽壓其根纓冠笑謁丈人君廣殿空庭吹寶薰摩挲畫牆手為皴異哉山䕫與土羵物怪齾齾冠邱墳仙人佩玉雜帨帉手整貂冠最不羣欲去不忍恨日曛道翁採藥晝夜勤松根茯苓獲兼斤人芝植立强骨筋枸杞羣吠聲狺狺山爐小甑炊幽芬朱顔不飲常自醺我亦宿誦五千文一念之差墮世紛逝將從翁走如䴢隱書祕訣何由聞又題丈人觀道院詩斷雲浮月磬聲殘木影如龍布石盤偶駕青鸞塵世窄閒吹玉笛洞天寒竒香滿院晨炊藥異氣穿巗夜浴丹却笑飛仙未忘俗金貂猶帶侍中冠按務觀二作多詠范長生事其劍南詩稿云青城山有孫太古畫碧落侍中范長生舉手整貂蟬像特妙其詩又有浮世深沉何足計丹成碧落珥貂蟬之句方輿勝覽云碧落觀即長生觀在青城山北二十里昔有范寂字無為劉先主時棲止青城山中以修煉為事先主徴之不起就封為逍遙公得長生久視之道劉禪易其宅為長生觀觀有古柟髙數十尋圍三十尺世傳長生手植胡叔豹詩更斸盤根藏大藥也令嘉樹得長生即此觀有赤城閣臨眺甚逺外史云唐眀皇登青城於長生觀駐輦故志謂長生是𤣥宗别殿雖就傾圯遺砌儼然唐求長生觀詩數里緣山不厭難為尋真訣問黃冠苔鋪翠㸃仙橋滑松織香梢古道寒晝傍緑畦薅嫩玉夜開紅竈燃新丹鍾聲已斷泉聲在風動茅花月滿壇乙記云上清宫上皇殿延慶宫皆眀皇幸蜀時造吳船録云上清宫在最髙峰之頂以板閣插石作堂殿下視丈人峰直墻堵耳岷山數百峰悉在欄檻下如翠浪起伏勢皆東傾孫知微詩臺殿壓平青嶂頂松杉插破白雲根者此也勝覽云晋朝起天宫於髙臺山丈人祠側號曰上清宫其東北麓即天師種栗之處上有天池夜則神燈飛行遍空或謂草木之精所為王叔瞻詩神燈㸃㸃光可燭星斗熒熒低欲捫即此宫庭又出瑞聖花見方物記晉時又於丈人峰前建上皇觀蜀志補罅云亦名𤣥真觀神芝異草嘉樹名花皆生於此芝草如稻苖食之可仙唐章孝標上皇觀詩烟霞華蓋七星壇想像先朝駐禁鑾輦路已平栽藥地皇風猶在步虛壇樓臺蜃氣晴蕭索杉檜龍身老屈蟠翻感惠休並李郭劍門空處望長安延慶宫即常道觀也勝覽云自㑹慶宫西行一二里有常道觀乃古黃帝祠址隋建甲記云大業七年太常博士隂道碑在常道觀軒轅石龕下軒轅臺獨秀霞表下望衆山若蟻垤連抱之樹若薺志云石龕今呼天師洞有張天師像及唐碑字畫完好可搨碑文曰敕益州長史張敬忠頃者西南阻化徭役殷繁山川既接於夷戎縣道有勞於轉輸自卿鎮撫百姓咸安革弊遷訛良多慰沃歲隂寒極比安好今賜卿衣一副至領之蜀州青城先有常道觀其觀所置元在青城山中聞有飛赴寺僧奪以為寺州既在卿節度檢校勿令相侵觀還道家寺依山外舊所使道俗兩所各有區分今使內品官王懷景道士王仙卿往蜀川等州故此遣書指不多及右敕明皇行書開元十二年歲次甲子閏十二月十五日下十三年正月一日至益州二日至蜀州專撿挍移寺官節度使判官彭州司倉參軍楊夀蜀州刺史平嗣先青城縣令沈從簡常道觀主白遺榮勒字右款八分書碑目云延慶移觀手詔碑在觀後絶峰之上石龕中韓擇木八分書記銘在延慶靈寶真人五符神幢下開元十二年立志云延慶觀亦名昭慶文與可昭慶觀詩琳崖盤玉霄彩翠接步武雲霞不可畫泉石固難譜神幢逾百尋帝轍厯萬古靈瀑誰與窮長飛六時雨所謂神幢即五符幢也碑目唐𤣥宗真容碑在六時岩下按志眀皇像亦在天師洞或以為孟昶像也録異記云六時水在宗𤣥觀南二里對觀有峭崖髙五百餘尺崖上授道壇昔寧真君與軒轅帝傳道之所每日六時有自然水從崖上灑入澗底有石龕刻𤣥宗皇帝御容勝覽云常道觀南有六時水云六時灑水以代晷漏隂時即飄然而灑陽時則無吕汲公詩巖輝萬古照泉漏六時飛京鏜詩八千里隔東西境十二時分晝夜泉即此又有石日月日在延慶觀東北月在溪西崖中並徑五尺六寸半一曰石天地天形有十二角地形正方濶六七尺或云即誓鬼壇也方輿云鬼城山在丈人觀西北又云常道觀北有張天師誓鬼壇志云漢時龍穴出水暴害禾稼張道陵立石臺以鎮之名誓鬼臺甲記曰壬子七月十三日鬼城山崩瀑水大至山髙百餘丈丈人觀居其下將憂摧壞俄有大石墜下堰水向東竟免漂陷初觀中資溪水日用負汲為勞自瀑水之後流泉直注厨下甘美不竭碑目云昔天師自鬼城山驅鬼於絶域有鬼界古碑字盡磨滅不知年代又云天師戒鬼筆迹在大龍橋側深一十三丈濶十三丈輿地紀勝云清都觀在延慶上二三里一名洞天觀唐道士薛昌浴丹井杜光庭墓俱在觀後薛昌即飲昌陸酒得道者文潞公鎮蜀日市觀側隙地以贈張俞所謂白雲隱居也其下白雲溪出焉任宗易詩懶隨六詔上丹闕髙臥一峰藏白雲少愚自題云欲作外臣誰是友白雲孤鶴在岩扉杜廣成曰延慶觀南天倉山神仙以為帑庫有三十六峰前十八曰陽峰後十八曰隂峰河圖括地象白沙一百八景青城三十六峰謂此也朝公遡詩天峰夜半剪氷花三十六峰如玉立趙雄詩三十六峰如不到青城還似不曽遊勝覽云天倉下儲福宫有唐睿宗女玉真公主像宫有天峰閣望三十六峰如列屏沈少南詩割盡齊封奉魯元更開泌水占名園何如帝子空山外落日騎驢芳草原胡叔豹詩弃形如遺但養神阿兄爛醉梨園春人百撼之耳不聞何物女子乃獨醒徑來空山臥白雲不見漁陽胡馬塵文同天倉山威儀觀詩羣峰削瓊瑤老蘚抹古緑應朝大岷去簮笏儼相逐珠宫祕仙仗錦笈藏寶籙上帝此為倉其田堪種玉蜀檮杌咸康元年九月王衍與其母太后太妃同禱青城宫人畢從皆衣雲霞之衣衍自製甘州詞令宫人歌之住山中旬曰設醮祈福太后太妃又謁王先主鑄像已幸丈人𤣥都二觀及金華宫夫人李舜絃隨駕詩曰因隨八馬上仙山頓隔埃塵物象間只恐西追王母宴却憂難得到人間志云金華在丹景玉華在青城陸遊青城山夜登玉華樓木蘭花慢詞云閲邯鄲夢境歎緑鬢早霜侵奈華嶽燒丹青溪看鶴尚負初心年來向濁世裏悟真詮祕訣絶幽深養就金芝九畹種成琪樹千林星壇夜學步虛吟露冷透瑤簮對翠鳯披雲青鸞遡月宫闕蕭森琅函一封奏罷自鈞天帝所有知音却過蓬壺笑傲世間歲月駸駸乙記云青城有天國寺玉匱經云青城一名青城都一名天谷山谷音近國即天國也方輿勝覽天國山在永康縣左連大面右連鶴鳴前臨獅子後枕大隋上有龍池及融照寺按即天國寺也云是黃帝築壇封寧封處未詳唐真人張令問隱居於此號天國山人以詩寄杜光庭曰試問朝中為宰相何如林下作神仙一壺美酒一爐藥飽聽松風清晝眠山有玉女洞亦曰素女碑目隋刺史薛道衡磨崖碑在玉女洞後矣五嶽圖曰青城山七十二小洞應七十二候八大洞應八節玉女其一也𤣥中記曰青城洞穴分三孔西北通崑崙外史言有李氏好道嘗率丁夫持炬賫糧入山下古洞行三日至一大溪不得涉而止比出洞口石自合迷不知處寰宇記云聖母山髙二千餘丈周三十餘里其南有深洞在八大洞之數傍便山髙下與青城相接當吐蕃之界溪谷深邃夏積氷雪所以限夷夏也大面山在三溪北杜光庭曰前號青城後曰大面其實一耳按此溪水色黑又名黑水溪雲笈七籖隋禇聖母黑水溪人悟逹國師題其居為聖母院山亦從而名之宋時山中有二隱士一曰譙先生定字天授建炎初召至揚州留入講筵不可拜通直郎致仕百三十餘歲猶存巢徑險絶人不能到先生數年輒一出山前人亦罕有見之者一曰姚太尉平仲字希晏靖康初在圍城中夜率將士攻賊營不利騎駿驢逸去建炎初所在揭榜以觀察使召之不出淳熙間有于丈人觀道院見之年近九十紫鬚長委地蓋皆得道於山中也録異記青城縣西北二里有老君觀門東上有一泉號馬跑泉水味甘美四時不絶春夏如氷秋冬反溫昔老君與天真皇人㑹真之所其泉是老君所乘馬跑成即冲妙觀也碑目冲妙觀記杜光庭撰勝覽云飛赴寺在青城縣飛赴山下舊名昌聖院乃唐左軍容使嚴君美捨宅有四望亭吕汲公詩最勝西峰下林梢四望亭江山觀掌握梁益布丹青文陵州詩平林露層巘上獨置孤寺羣仙馭飛駕往往赴於此風光幡影亂日落鐘聲起誰可謂詩豪與來吟萬紙志云香積山寺即靈岩寺也有瀑布及雞骨禪師塔即周地圖之通靈山寺又云今縣東南四十里承天寺有馬祖靈骨塔髙丈六尺俗呼為馬祖寺有碑云大厯間靜照頭陀建雲峰道場至宋宣和奪以豫黃冠者於是師之靈谷與塔俱遷建炎三年復還舊物建塔於故址柟生石合䜟記冥符焉紹興元年立石碑目云青城寶幢院記元和十四年立觀音院記乾符二年立改海晏寺記中和二年立俱在海晏殿中艾子云蜀青城山老人村有五世孫者道極險逺生不識鹽醯而溪中枸杞根如龍蛇飲其水故夀近歲道漸通漸能致五味而夀亦益衰方輿勝覽老人村在大面山之北昔人避難其中多享年夀故名或云潛夫張不羣入山採藥浹旬不返見一叟致敬而問答曰本丞相范賢之裔知李雄之祚不永挈吾輩居此為終焉之計圖經云即老澤也在青城北百三十里昔諸葛亮遷羣獠於山下故名碑目云獠澤水石記在路次石門崖壁上吳行魯大中七年奉使巡邉行所鐫按志獠澤關在縣西南百里乃董卜胡通華捷徑也古今記云老人村有牡丹坪王溉序謂牡丹髙數十丈花開盈一尺范至能詩十丈牡丹如錦蓋人間姚魏敢爭春即此方輿勝覽云牡丹坪者自青城之長平山捫蘿而上厯鳥道三十里許有平阜數十畝髙樹蔽天春深先花後葉狀如芙蕖香類牡丹譙定天授季浩太素二先生隱其中云蜀中廣記卷六
