body:
  text: 蜀中廣記卷十五明曹學佺撰名勝記第十五下川南道敘州府宜賔縣附郭水經云江水又東南過僰道縣北若水淹水從西來注之華陽國志云僰道縣治馬湖江會輿地廣記云馬湖之上源曰若水出旄牛徼外南徑三縫淹水注之又東徑越嶲之馬湖縣為馬湖水又東北至朱提縣與瀘水合至僰道入大江夷裔考云僰人者其先世本華人有罪貶逺方以棘圍之故其字從棘從人漢制郡縣有蠻曰道故曰僰道其俗每歲六月草四日為星回節競舉火把盈野居傍城郭與漢人無異水經注引地理風俗記曰僰人夷中最仁有仁道故字施而秦紀所謂僰人之富也者其邑漢髙后六年城之武帝感相如之言使縣令南通僰道費功無成唐蒙南入斬之乃鑿石開閣以通南中迄于建寧二千餘里山道廣丈餘深三四尺其鑿之迹猶存王莽更曰僰治也郡國志云僰在施夷中最賢者多以荔枝為業園植萬株歲收百五十斛益州記云荔枝潭在僰道縣山頂有一家惟生女貞樹樹上常有白猿棲息古謂之玉女冢志云即峯巖也在宜賓西百里山坡荔枝連袤今多屬廖氏黃魯直詩廖致平家緑荔枝即此圖經云僰道縣故址有三漢武帝時在中方鄉即今西南與長寧界接唐太宗徙于蜀江之右二江口即今府治武宗會昌中以大水復徙于蜀江北岸即今舊州輿地紀勝云西漢僰道即漢武遣唐蒙鑿石以通南中者今石門是也本志云石門江在府西南百三十里俗呼橫江又名小江唐書韋臯傳石門即隋史萬歲南征之道古有詩云石城門峻誰開闢更鼓誤聞風落石界天白嶺勝金湯鎮壓西南天半壁按本傳萬歲入南中見諸葛亮碑銘曰萬歲後勝我者過此方輿勝覽云蘭山在僰道縣界圖經云蘭生于深林石門尤多有春蘭秋蘭崇蘭鳯尾蘭竹蘭石蘭諸名春蘭花生于葉之下崇蘭花生于葉之上黃魯直幽芳亭記一幹兩三花而香有餘者蘭一幹十數花而香不足者蕙水經注云僰道縣有蜀王兵蘭其神作大難江中崕峻岨險不可穿鑿李氷乃積薪燒之故其處懸崕猶有赤白玄黃五色照水魚從楚來至此而止言畏崕嶼不更上也本志云西北二十里朝陽崕是華陽國志有孝子隗通為母汲江裔水天為出平石于江中今石在馬湖江口益部耆舊傳曰張員妻黃氏女也名帛員乘船覆沒求尸不得帛至沒處灘頭仰天而歎遂自沉淵積十四日帛持員手于灘下出時人哀之語曰符有先絡僰有張帛者也寰宇記曰僰道縣有貞婦石在縣七里舊州岸古老相傳昔有貞婦夫沒無子事姑甚孝姑抑使嫁竟不從終姑之世身沒所居室有一大石湧出後人號為貞婦石黃魯直跋王荆公書云熙寧中金陵丹陽之間有盜發冢得隱起甎于冢中識者買得之讀其書蓋山中宰相陶隱居墓也其文尤髙妙王荆公常誦之因書于天慶觀齋房壁間黃冠遂以入石豫常欲摹刻于僰道有李祥者聞之欣然礱石來請斯文既髙妙而王荆公書法竒古似晉宋間人筆墨此固多聞廣見者之所欲得也李君字聖祺僰道人喜炎黃岐雷之書嗜好酸鹹與世殊絶嘗從軍得守國子四門助教歸而杜門家有山水竒觀教諸子讀書而宴居自如從其所好不喜俗人一再見輒罵絶之此孟子所謂有所不為者也朱提漢舊縣屬犍為郡東漢屬犍為都尉蘇林云提音時晉太康地志云章武元年先主以犍為屬國為朱提郡鄧方為都尉先主因易名太守領漢陽等五縣朱提縣治有千秋池今府西南六十里有朱提山山下有大池曰瑞蓮池是又有朱提村今即立郡處也諸葛武侯云漢嘉金朱提銀采之不足以自食古志云朱提西猶有鳩鵲以南則無矣志云瑞蓮池在府西南六十里馬湖江側故老傳云江有石生魚常遊聚漁者甚利之一日獲巨鯉衆分食之翌日又至俄見江中有三石室各長丈許廣七尺人咸異之顧見對岸石亦有三穴如鑿去者其長短與此無異而向之食魚者所居皆陷沒為池矣巨鯉蓋龍子也池有無種蓮或間十數歲一花花開則國家有大吉事舊志朱提縣有千秋池疑即此今在朱提山麓按華陽國志云湖江多魚此之謂矣寰宇記云開邊縣在州西南六十里亦僰道地隋開皇六年于此置縣以開拓邊疆為名在馬湖朱提兩江口大黎山小黎山在此縣界四時霖霪不絶俗以為大漏天小漏天其諸山自嘉州以來每峯相接髙低隱伏奔走三峽石狀難名本志即今之開邊鄉也寰宇記又云宜賓縣本漢南安縣地屬犍為郡蜀諸葛南征于此置􅛿䣕戍後改為􅛿䣕縣唐開元十七年為義賓縣後移于狼川即今理也宋朝開寶九年改為宜賔縣通志云宣化縣在宜賓縣境本唐之義賓宋之宣化今省入者舊址在當縣之宣化鄉水經注云存水出犍為􅛿䣕縣王莽之孱鄢也夷率雍闓繫馬於枊而枊成林故曰存馬本志云縣西北百六十里為􅛿䣕灘蜀志補遺云可無山古宜賔縣也今訛名可盧方輿勝覽云夷牢山在宣化縣南夷人祭社於此飲酒歡樂夷語以牢為樂故也二蘇有過宜賔見夷牢亂山詩輿地紀勝云宣化縣南山叢秀中一峰突出為菩薩頂故老嘗見聖燈碑目云宣化上流三十里吳季成所卜築在山之阿有山谷老人所書盤谷序虔州學記碑刻本志云復魚池在府西北百七十里故宣化縣東宋皇祐間白雲先生張俞為記寰宇記云梁武帝使先鐵討定夷獠乃立戎州以鐵為刺史方輿云宋紹聖四年戎倅蘇時上書曰今車書同聲教一而州名戎是夷其名也請易之遂改名敘州矣唐劉兼秋夕書懷呈戎州郎中詩素律初回枕簟涼松風飄泊入華堂談雞寂默紗窗靜夢蝶蕭條玉漏長歸去水雲多阻隔别來情緒足悲傷霜砧月笛休相引只有離襟淚兩行碑目唐都督李通破賊碑在州南百里今亦殘缺又云唐古戎道記在州治之對天蒼山崖壁間筆畫徑正乃乾封二年詹君秀修復此道為之記并書又云定誇湖碑在戎州城外有唐人所立碑曰山蒼蒼兮煙際橫波渺渺兮湖水平其餘漫滅不可考古迹考云縣有張儀同城古老相傳以為張儀同祠也不知何義魏鶴山集有僰道諸葛武侯碑又有答馮敘州邦佐謝武侯廟碑啓本志云府城南薑維屯一峰突起髙千仞其頂平相傳薑伯約于此駐軍勝覽云敘州有東州道院在州治內碑目云治東墨妙亭貯黃庭堅筆迹杜甫宴戎州楊使君東樓詩勝絶驚身老情忘發興竒坐從歌妓密樂任主人為重碧拈春酒輕紅擘荔枝樓髙欲愁思橫笛未休吹劉兼重陽感懷詩重陽不忍上髙樓寒菊年年照暮秋萬疊故山雲總隔兩行香淚血和流黃茅莽莽連邊郡紅葉紛紛落釣舟歸計未成年漸老茱茰羞戴雪霜頭勝覽云東一里花臺寺即今夀昌寺也東殿石壁露立大像其地內外石間鐫有萬佛即刺史張九宗撰記處又云東山在州城東門外有報恩寺塔髙二百尺南望七星山七峰團秀狀若連珠即南山也方輿記云西樓在州治陸務觀詩畫船衝雨入戎州縹眇山橫杜若州須信時平邊堠靜傳𤇺夜夜到西樓碑目云韋南康紀功碑在江西舊州治岸溉元和五年刺史張九宗立碑隂載南康謝表大半磨滅又云唐黎幹墓表在州西岸石馬溪之上今石馬尚存本志云馬鳴溪在府西十九里俗稱龍馬溪源出慶符之西會馬湖水達于蜀江昔土人鄭氏牧馬于溪上産龍駒四蹄利爪朱騣赬尾髙可七尺州聞之將以貢行在所載至溪口攘鬛長鳴躍于江溪因以口寰宇記滇池在州西二十里一名天池一名波淩池其池長五十里闊七里風吹一動波浪淩山中有芰荷按秦惠王破滇池始通五尺道者即此也志云滇池與天池相連大者廣一里長五里小者廣一里長三里其中有石橫亘南北如橋梁狀往來由之唐韋臯天池晚棹詩雨霽池塘生意足花間誰詠採蓮曲舟浮十里芰荷香歌發一聲山水緑春暖魚拋水面綸晚晴鷺立波心玉扣船歸載月黃昏直至更深不假燭宋牟孔錫詩天池十里如鑑湖荷花可折魚可鱠本志云縣西五十里水濱昔有浮舟者見空中飄然降一道人止於峯頂土人呼其處為師來山後訛為書樓山勝覽云無等院在州南門外魯直以元符間寓居作稿木寮死灰庵今猶存其寺額亦魯直筆迹陸務觀詩文章何罪觸雷霆風雨南溪自醉醒八十年間遺老盡壞堂無壁草青青李嘉謀記紹興初章蔡用事山谷以前史官得罪安置黔州二年移戎州方公之遷以涪州别駕因自號為涪翁放浪山水間初不知有遷謫困窮之意城南有溪公遊而樂之命曰涪溪其後溪山悉以是名本志云舊戎州南門外里許金魚井山谷品其水為第一寰宇記云鎖江在城北兩岸大石屹立因置鐵絙橫截其處控扼夷羌黃魯直鎖江亭酌酒詩西來雪浪如炮烹兩崖一葦乃可橫酒杯未覺浮蟻滑茶鼎已作蒼蠅鳴又云山繞樓臺鐘鼓晚江觸石磯砧杵鳴鎖江主人能致酒願渠久住莫終更又云鎖江亭上一樽酒山自白雲江自橫李侯短褐有長處不與俗物同條生蓋同李仔任道也又安樂泉頌云鎖江安樂泉為僰道第一姚君玉取以釀酒甚清而可口食之令人安樂故豫兼二義名之曰安樂泉并為作頌姚子雪麴杯色爭玉得湯郁郁白雲生谷清而不薄厚而不濁甘而不穢辛而不螫老夫手風須此晨藥眼花作頌顛倒淡墨本志云北二里鬱姑臺相傳宋楊仙遇鬱姑于此又云蘇溪在府北二里以蘇子瞻常遊于此故名輿地紀勝云自州治泝流十里有前後潭瀑布自懸崖千尺而下本志又云水簾洞在府北十五里瀑布㵼出兩峯間垂數十丈如珠簾狀其側有亭黃山谷扁曰竒觀何師心滿江紅詞一水飛空揭起珠簾全幅不須人捲不須人軸一點不容飛燕入些兒未許遊魚宿向山頭欵步聽踈音清如玉三峽水堪人掬三汲浪堪龍浴更兩邊瀟灑數竿修竹晚倩碧煙為純緣夜憑新月為鈎曲問當年題品是何人黃山谷又云北百二十里真溪源出于匍山舊有姓真者居之今為真溪驛又云北百七十浞溪有阿浞者居其傍故名今之月波驛是余以壬子暮秋宿此驛書懷作云月波來夜宿月色似波明遇景一相湊觀空聊復情寒蟬吟似懶水鳥去何輕借問渝州路還家近幾程蓋亦情見乎詞矣南溪縣漢地理志武帝太初元年置南廣縣隸犍為郡蜀志後主延熙中立為郡以常竺為太守元和郡國志晉分朱提郡置南廣縣齊郡廢後周于此置南武戍隋改龍源戍又改為南溪縣在僰道之南水經注云自僰道至朱提有水步道有黑水羊官水三津俱險極難行故行人語曰楢溪赤木盤蛇七曲盤羊烏櫳氣與天通禹貢華陽黑水惟梁州注云出南寧州南廣縣汾關山北至僰道縣入江一名皂水矣郡國志犍為郡故城在青衣江七里舊經云青衣江在南溪縣南十五里古有青衣國與敘州相鄰其人因賈至蜀見漢衣冠遂求內屬因以名焉其地名龍騰溪即隋之龍源戍今之龍騰驛是也按青衣蜀中見者凡三其一在漢嘉者即大渡河所經漢書公孫述僣據青衣人不賓是也其一在青神者以蠶叢衣青而教民農事人皆神之是也其一在當縣以古有青衣國慕義來賓云志云龍騰山半有洞深四丈李八百所鑿額鐫曰李公洞八分體字畫遒徑可觀洞前有折梅亭宋楊萬里詩李真宅子故依然道院西遍石洞前一日身遊八百里三畨花落九千年龍騰山下有岑參别業參從明皇幸蜀尋守嘉州置缺國朝成化中掘得斷碑有南溪州三字傍題嘉缺人岑參缺詩曰築室依青嶂開軒對翠疇樹成花兩色溪合水重流竹徑春來掃蘭樽夜不收逍遙自得意鼓腹醉中逰志云溪北有橋曰黃渡魯直每遊龍騰山必經此橋故名唐韋莊詩大江西面小溪斜入竹穿松似若耶兩岸嚴風吹玉樹一潭明月照銀砂因尋野渡逄漁舍更泊前灣上酒家去去不知歸路逺棹聲煙裏獨嘔啞蘇軾南溪對雪詩南溪得雪真無價走馬來看次未消獨自披榛尋履迹最先犯曉過朱橋誰憐破屋眠無處坐覺村居語不囂惟有暮鴉知客意驚飛千片落寒條皆此橋中景物寰宇記云馬湖江從州西南流出東郭與蜀江合諸葛武侯五月渡瀘則此水之上流也郡國志云乞子石在馬湖南崖東石腹中懷之僰人乞子于此有驗因號乞子石寰宇記乞子有二石夾青衣江樹對立如夫婦古老相傳東石從西乞子將歸魚鳬津按郡國志云南溪縣西三十里有津津南有鴛鴦圻是也鴛鴦圻者以烈婦黃帛得名詳見僰道今縣有帛廟子在飛霞閣西阜上阜有飛霞井嘗有赤飈自井中貫日觀者如堵因建飛霞閣焉祠廟記云南溪琴山有忠利廟祀漢牂柯太守陳立廟中有制祠古碑張鼎修所記負山濱江地勢險阻志云治西彈琴臺唐楊發彈琴于此瘞琴其下父老言每夜靜人或時聞琴音發亦家于此有南溪書院詩云茅屋住來久山深不置門草生垂井口花落擁籬根入院將雛鳥扳蘿抱子猿曽逄異人説風景似桃源志又云隔江琴山橫洲渚間俗云無徽則琴不鳴元時熊萬户者乃聚土為徽依岩閣鐫刻羅漢諸像以成其勢輿地紀勝云東南逾江七里有隱山唐李涉詩如雲不厭蒼梧逺似雁逄春又北飛惟有隱山溪上月年年相望兩依依又云銅鼓灘在縣東十里大江之右波浪極險縣治坐乾此水出辰為不利近歲灘之上流生石磧髙十數丈蔽壅下流水從巽出自是文物稍振寰宇記云西南十五里平蓋山山有九隴惟此特出衆山之上頂圓似蓋一名瑪瑙山漢真人劉景鶴隱此至魏武時始跨鶴仙去有石洞深邃不測中有小穴圓如盞有水出焉山上有木生葉其紋如篆謂之符葉也志云西七十五里桂輪山昔涪翁書大桂輪山四字于其岸壁是山惟中秋見月故名有桂輪山寺長寧縣圖經西徑馬湖南控烏蠻東介安溪北接綿水趙招討平夷表云左連阿水右連石門也碑目云長寧志嘉定己邜教授賀寅東序亦云祥符平夷本末慶歷皇祐平夷略元豐平乞弟本末嘉祐三年給長寧頭首斗蓋充土刺史誥熙寧七年范中書百祿誓夷文皆有可考十道志云長寧淯井監供輸紫竹本志云縣西北七十里古賢鄉宋時鐫崕曰紫竹山是也方輿引舊郡志今夷衆開箐路殳去笻竹惟冬蒟醬可以入藥寰宇記寶屏山軍治之主山也與棫山諸峯相對登雲亭在寶屏山上每歲九日登髙于此紀勝云牛心山在軍治山形崒嵂如牛心然硯石溪在牛心山後岸石如磬可以為硯東溪發源白崖山與嘉魚泉者去城一里馬鞍山之趾泉激石湧出小魚四時如一不增不長故以名之邦人釀酒必用山後秫及嘉魚泉則味甘冽王章嘉魚泉記兵厨之酒冠于東州矣上有臨流閣流杯池諸勝志云南一里金龜山四面平疇中突一阜如龜狀又名松子山輿地紀勝以其上有波瀹殿舊志邑人于四月八日取嘉魚泉浴佛故曰波瀹也勝覽云介湖在郡治西城下中植荷芰有西溪發源越王山與桃源溪合相傳有耕者得一銅版鐫曰小桃源其隂有詩云綽約去朝真仙源萬木春要知竊桃客定是滑稽人其水發源筆架山在軍城冷水溪上嘉㝎己巳太守張公市民田種植桃李創置亭榭橋曰仙津洞曰桃源亭曰蒸霞堂曰詒然通志云萬松嶺在長寧縣西宋趙使君詩清溪狹徑小橋東春日桃花處處同我為日長無一事偶然來此聽松風紀勝云小離堆在城北岸溪上崇德廟前溪中有怪石似離堆之象因作亭于此榜曰小離堆燕崖去軍北三里許在棲真洞路旁石峰巉巉森列者數百虞易簡有記本志東西二溪至淯井合流名淯溪至武寧寨為武寧溪至安寧寨為安寧溪碑目載王蜀武成三年牒淯井鎮羈縻十州五團上都虞候羅元審又牒淯井鎮羈縻淯井土刺史羅元楚文俱在本監歸田録載蘇子瞻常得淯井監夷人所賣蠻弓衣其紋織成梅聖俞春雪詩蓋當時名重傳落蠻獠故也本志云東十五里武寧溪上有巨石橫截中流虞允文鑿之以通舟楫石上大鐫虞公峽三字溪左涇灘有瀑布自山頂飛流而下數十丈為深潭輿地記云越王墓在寧逺岩髙廣各數丈以花磚砌有合抱古柏故老傳為越王墓或云唐太宗子越王貞為綿州刺史卒葬此志云治東九十里有凌家崖有水流寺逺眺敘瀘之景大江如帶矣富順縣華陽國志云江陽富義有鹽井郡國志劍南鹽井惟此最大舊日為額八百餘斤今日額千五百餘斤楊光清操堂記云三榮冨順産鹽其地號為貪泉韓子華詩土瘠事力耕家無終歲蓄所資鹽井利持易他州粟方輿云宋太宗朝置監有榕齋在監治以榕木名也水經注綿水湔水與洛水會徑牛鞞資中又東徑江陽縣方山下入江按此水至富順神龜山下縈紆向西而去謂之洛源以源出洛通江也後周于此置洛源縣矣謂之金川以綿洛湔三水會于金堂峽也秦時于此設金川祠亦謂之釡川則以其盤繞縣治有若釡形然寰宇記云雞足山同心山俱在城東隔水三五里教授錢士開記翠巘絡繹張其前大江繚繞環其下也輿地紀勝云神龜山下有湖嘗見大龜出小龜從之不可勝數山背有讀易洞里人李睍讀易其中李昌金川驛記南距戎瀘北走普資舊制等于諸縣嘉祐以新例擬于列藩本志云金川神廟在縣西二百餘步有十像莫知姓氏相傳秦惠王時擒鰲治水有功即此神也勝覽云凌雲山在監西與養秀山相接大江前橫一峯突兀瑪瑙山亦與凌雲相接西北諸山惟此最髙又云西湖在監之西相傳有此監即有此湖皇祐間周侯延雋記仍有亭榭輿地紀勝云西湖周回三里有洞窈邃昔有入洞者見二女櫛髮于竇間遺以石鏡其人致富百倍碑目西湖洞前崖上鐫觀音大士像天禧元年刻石記云六月甘露降像前明日又降紹聖元年又降瑩潔如珠程驤富順西湖詩云春風楊栁曉藏鴉秋水芙蓉晚著花細數一年湖上景天涯行客忍思家志云西五里中江之右有峰峭拔數丈如佛像傍有二石如侍者對立因鐫成之藤蘿繞身而不上其面輿地紀勝謂之聖佛有磨崖碑皇祐七年知監張齊古題云西山城郭沿灘數里羣峯重疊一佛獨立容相端正真如塑出髙聳數丈古代留迹後倚林翠前瞰江碧西疇在縣西南七里輿地紀勝云由城南絶江而上西行六七里廣六十畝萬松森列嘉樹離立為李氏西疇朝公武記云有亭臺齋館泉石花木盤據一山之上方輿云聖燈山在監西五里碑目云山址有董孝子墓表云漢益州刺史廣平郡侯董孝子紀勝云中崖山在西北二里山勢盤薄林木蔥茂有叢林氣象有霧隱堂資中趙丞相沂公謁中崖大士或以夢告明年舉于鄉公為文記之後人為建斯堂碑目中崖普覺院天禧丁丑賜名康定二年翰林學士李淑撰碑志云中崖以北崖山居左瑪瑙山居右此居其中故名唐咸通中依崖鐫大悲佛像宋初僧自悟架屋三百楹天聖丁丑賜名普覺院藏兩朝宸翰後林靈素毁佛法欲壞其像圍繞鑿之不損乃以泥覆之罷禁將水洗去依然如新岑象求中崖詩瀟灑監城隈聊驅俗駕回世塵飛不到山色翠成堆太常博士周延雋詩兹辰始休沐夙駕出公府往造釋子居嶔﨑僅容戶雲林信樂耽安問非吾土衆香才發春微雲忽蔽午敲石煎佳茗忘囂搴芳杜徘徊仍少留歸泛凌前浦却顧衣上塵猶霑山際雨志又云北崖在縣北二里隋大歷中建資國寺有彌陀崖足容數百人有五百羅漢洞有水簾並元祐八年李元淵記慶符縣漢置屬犍為郡蜀先主置朱提郡以縣屬焉華陽國志云有漢水入延江本志云漢陽山在縣北八十里漢武通西南夷自此山之南皆漢地故云諸葛武侯征蠻過此今崖壁上鐫武侯征蠻故道六字猶存縣有順應廟乃祀馬謖者我明永樂中尚書宋禮奏神有隂助運木之功賜萬貫葺其廟命有司每歲三月二日致祭也碑目晉張麟夫人墓表在慶符縣南百六十里又云大唐南詔王碑在石門界貞元七年袁滋題云此石門即隋史萬歲南征之道志云祥州故址在縣西一里初本南廣地宋改名祥州置慶符來附二縣而南廣為鎮宣和中省州止存慶符縣黃山谷所書戒石銘尚存今來附縣為來復鋪矣筠連縣漢定川縣唐之筠連州也其地南通芒部西控烏蒙四山皆竹一色相連因謂之筠連矣志云舊州黃牛山距縣南三十里髙山石壁有人作驅牛狀因呼為黃牛山也又云縣西南孔雀溪有孔雀巡檢司土舍主之髙縣志云唐髙州故址在縣南百二十里正州鄉縣有宋水勢如之玄有騰山常孕霧雨俱在西南五十里外珙縣唐羈縻薩鞏二州也薩州今之下羅計鞏州今之羅星渡矣志云治南北五十步即珙溪也多石似玉民以筒引車入田中得灌溉之利又云落哨山有生成石鼓二石鼓垇下有仙洞石乳凝聚如人如獸千態萬狀至洞頂黑質白章如雲如篆又云縣北四十里芙蓉山有九十九峯其南三峯突起謂之小芙蓉興文縣戎州故址在寧逺坊之西唐晏州羅陽郡領思峨牱隂新賓扶來思晏多岡羅陽七縣今皆屬夷南五里有南夀山宋時夷酋卜漏據山為寨一豆一蠻數有五斗故名五斗夷又十五里有丹霞箐旦暮霞彩浮于木杪也隆昌縣隆昌新設之地古迹無聞豫問諸劉給事有金鵝洞焉溪水東來繞城西折里許孤山柱立水環其趾下為懸崖壁立千尺飛流下墜常時如匹練如散珠及至溪水暴漲倒立懸垂雷聲衝激聞數十里細霧麯塵飛灑千步亦竒觀也峭壁中有洞方廣丈許人迹難至疑鬼工所鑿名曰金鵝不知所本俗傳有藏金鵝其中或以銅鵝换之故又名换鵝洞其編戶亦有换鵝里馬湖府屏山縣附郭龍湖去郡三百里許四圍皆峻崖長二十里廣七里中有堆如螺髻去大江二里其水與江同消長日夕作潮相傳有龍馬見于此四夷考云馬湖江發源西蕃流至打沖河入會川衛與安寧河合經雲南與浪滄河合至武定與金沙江合經東川烏蒙始達于蠻夷司界經府前流出與敘州江合志云馬湖鎮舊城唐乾符中髙駢築按馬湖所轄地漢之鄨縣平夷縣唐之滈浪州沐川寨也漢書鄨有不狼山鄨水所出隋志平夷縣有䂪津宋史寇瑊祥符中為轉運使多剛夷斗望叛瑊集滈浪刺史箇松李紹等平之志云平夷東百二十里有書樓山編戶為書樓鄉又云府西三百八十里雷畨山隋史萬歲征西南夷過此書雷畨山三字鐫于石壁山中有毒經過牲畜必籠其口行人必緘默若或吐聲雖冬月必起雷霆碑目沐川古碑唐垂拱三年玉津令馬元慶等破馬湖夷紀功者張無盡沐川寨記略云南蠻東北接境常挾吐蕃以為中國患蓋其路一出大渡河一出沐川源一出馬湖江其狹邪之徑曰榮涇曰八面箐曰黑水曰中鎮曰賴因曰龍水曰隂川而沐川之路常為嘯集之地也蜀中廣記卷十五
