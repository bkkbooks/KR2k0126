body:
  text: 蜀中廣記卷九十九明曺學佺撰著作記第九集部范蜀公集一百十二卷汪玉山序按蜀公墓志云文集一百卷諌垣集十卷内制集二十卷外制集十卷正書二卷樂書三卷刀筆八卷公成都人也應辰守成都凡三十年求公文集雖摉訪殆徧来者不一而竟無全書盖公之没距今八十年矣竊意嵗月愈久則雖此不全之書亦或未易得也於是以意類次為六十二卷曰樂議曰使北録不見於墓誌亦恐其初文集中未必載也樂議或特出於世俗所裒輯今皆存之又以諫疏内制外制正書樂書附之通為一百十二卷正書所得止一卷今分為二司馬温公論正書其間有云舜無焚廪浚井之事而今之正書無此語豈亦非全書耶公名鎮字景仁成都人舉進士為禮部第一仁宗朝知諌院後言王安石新法不便乞致仕居頴昌元祐初詔召不赴封蜀郡公年八十一諡忠文東齋紀事十二卷景仁自序云元豐中既謝事日於東齋燕坐追憶在朝時交㳺言語與夫里俗傳記因纂集成書崇觀間以其談及國事禁之榮國集五十卷中書侍郎范百禄子功著鎮兄鍇之子也第進士復舉才識兼茂科范太史集五十五卷家傳八卷遺事一卷翰林學士范祖禹淳夫撰鎮従孫也太史遺事後人所編輯者潛齋詩眼一卷范温元實著祖禹之子學詩於黄山谷潛齋其别號云李畋文集一百卷歸田録十卷知命録十卷華陽李畋渭父撰張公詠客也不樂仕進詠敦勉之遂登第累官知榮州熙寜中致仕歸與門人賔客燕談忘倦門人請編録之又名該聞録有雜詩十二篇係於後陵陽集五十卷陵陽先生詩草一卷陵陽正法眼一卷中書舍人仙井韓駒子蒼撰自㓜能詩黄太史稱其超軼絶塵蘇文定以比儲光羲政和初獻書召試出身後入西掖坐蘇氏鄉黨曲學罷後村劉氏曰子蒼蜀人學出蘇氏與豫章不相接吕公仁彊之入派子蒼殊不樂磨淬剪截之功終身改竄不已有寫寄人數年而追取更易一兩字者故所作雖少而可觀建中治本書一卷眉山任諒子諒著年十四冠鄉書登髙第為懐州教授徽宗見其所作新學碑曰文士也擢提舉䕫路學事卒官京兆尹張大中集通川人宣和中舉進士羣經百氏一覽不忘時人號為黒漆書厨以其黧色也呉待制文集臨卭呉時伸道著初舉進士得學究出身再試中甲科歴太僕少卿道君時為徽猷閣待制屬文落筆即就未嘗屬槁兩學目為立地書厨勾景山文集十卷西掖制書十卷奏議十卷勾濤字景山成都人崇寜中登進士第史館脩撰重脩哲宗徽宗實録丞相趙鼎諭㫖宜婉辭紀載燾曰崇寜大觀大臣誤國以稔今禍藉有隠諱如天下野史何髙宗嘗語相秦檜曰勾濤久閒性喜泉石可進職與一山水近郡檜對永嘉有天台鴈蕩之勝帝曰永嘉太逺以湖州命之琴軒集一卷陳氏曰題南榮浪翁李有慶撰與石昌言任師中同時卷末有贈答十二絶闕其六其曰癸巳嵗者殆皇祐中岷山百景詩二卷王寀著寀字道輔華陽人少有詩名世謂其詩初若不經意然遣辭屬意清麗絶人自號南陔居士宣和中以狂譎被譖伏誅東嵓野老集八十卷建炎中唐安文正倫濟道撰漢守文翁之後也第進士為朝請大夫生平力學為文宏贍博洽一時稱之又括諸書重復者為小名録玉臺集東都事略一百三十卷眉山王賞著當之弟稱之父也累官禮部侍郎直學士以忤秦檜出知利州左右氏釋疑譜學一卷讀書日録五卷廣安黎良能著錞之孫也縉雲集四十三卷馮時行著字當可巴縣人讀書縉雲山中紹興狀元歴官奉禮郎以沮和議被廢小醜集十二卷續集三卷直秘閣眉山任盡言元受撰元符諫官伯兩之孫紹興従臣申先之子中甲科仕為太常寺主簿終於閩憲楊誠齋序謂其詩文孤峭而有風稜雄健而有英骨忠慨而有義氣盖將與唐之貞元元和本朝之慶歴元祐諸公並轡而先終非近世陳陳相因累累隨行之作也宇文肅愍公文集贈開府儀同三司宇文虚中撰後溪劉氏序略曰公覊絶域者十五年而朝廷悉發其家人北去後四年父子謀覺而闔門被禍矣公弟兄早以才雋皆致位二府公之文章又最見稱於當世余讀其為館職時所與開封尹論事書而壯之使充是書以往足以追古人而並駕公既亟見用於尚文之日潤色太平黼藻休烈則余所謂繫一時所遇而作非公之所欲充而不已者也故公答曽晦之書云僕長而游太學為科舉所使及得一官又屢為應制代言之文皆非得已而為者去嵗得罪杜門於此閒取箧中書史卧而讀之日盡數卷乃知古人之未嘗為文也惟其無意於為文而遇事乃言則其優㳺舒泰奮迅豪蕩盖無施而不可昔嘗謂西漢制詔妙絶於元成間而章疏奏對至谷子雲而工極無以復加矣迨今思之則不然惟髙帝立長沙王令諸吏善遇髙爵及省賦舉賢等詔吕后孝文賜匈奴單于書楚王信以下上尊號相國何等議天子所服此等數篇卓然渾成非司馬相如王褒軰㝠搜巧繪所能至也公之此書至論古之人成徳為行隠然出處之大致亦非有意於其間又觀所與趙慶長論文書亦曰不若清明寥邈之為愈也挺臣欲表其先大父之文即二書所言余又何加焉劉韶美詩集普州劉儀鳯著登進士十年始赴調為蓬溪尉歴官國史編脩秘書少監兵部侍郎奉入半以儲書凡萬餘卷國史録無遺者御史論其私録四庫書斥歸儀鳯苦學至老不倦尤工於詩老學菴筆記云劉韶美在都下累年不以家行得俸専以傳書書必三本雖數百卷為一部者亦然出局則杜門校讎不與客接既歸蜀亦分作三船以備失壊已而行至秭歸新灘一舟為灘石所敗餘二舟無他遂以歸普慈築閣貯之虞雍公詩文十卷虞允文字彬甫仁夀人建炎紹興間出入將相垂二十年忠勤不二嘗注唐書及五代史蔵於家又有經筵春秋講義奏議内外制行於世諡忠肅封雍國公後溪劉氏曰余讀雍國忠肅虞公奏議二百二十有七篇而慨然有感世但知采石之戰以七千卒郤金兵四十萬其功甚偉然忌者猶曰適然豈知公於紹興辛巳之前已因輪對面奏金必叛盟兵必分五道正兵必出淮西竒兵必出海道宜令良將勁卒備此二境其先事之識已絶出乎衆人之表矣及金叛盟上令従臣集議公獨言金兵必出兩淮丞相善其言而未必行及遣公勞師采石事已大壊公以書生収合亡卒激勵諸將施置於倉卒之際而破金於俄頃之間嗚呼非胸中素所蓄積忠誠足以動天地感人心而作士氣未易成此偉績也而曰適然可乎自昔狃勝者必忽其餘憂公又令設備於瓜洲其他區畫悉各精密而不茍金遂遁去乃徐請車駕還行都皆歴歴見於奏疏也余切妄論本朝多議論少成功雖盛時猶然也况積習消靡之餘夫人皆喜逸而惡勞圖安而懼危中興以來前有張魏公後有虞雍公為國家任其勞當其危者也彼不少愧焉而又忍短毁之乎張君説文集二十卷綿竹張咸著咸字君説登元豐進士元祐初詔復六科哲宗親擢第一卒官成都節度判官其於學六藝百家歴代文史無不該貫為文長於序事稽古証今披文相質歴歴可觀即張魏公之父也張忠獻文集十卷奏議二十卷張浚字徳逺綿竹人靖康進士孝宗時力主恢復拜尚書僕射同中書門下平章事兼樞密使卒贈魏國公諡忠獻所著又有詩解尚書解等書南軒文集三十卷奏議十卷侍講廣漢張栻敬夫撰忠獻公之長子當孝宗朝以任子不賜第入西掖者韓元吉劉孝韙其入經筵則栻也别著有詩説尚書説義又有語録十二卷蔣邁所記沂庵集四十卷註山谷詩二十卷註後山詩六卷新津任淵子淵撰紹興元年乙丑類試第一人仕至潼川憲嘗註山谷後山詩行於世新津有天社山故稱天社任淵也梯雲集三十卷趙逵撰逵字莊叔别號梯雲内江人讀書數行俱下尤好聚古書紹興辛未對䇿第一他日髙宗謂曰秦檜日薦士未嘗一語及卿以此知卿不附權貴真天子門生也帝又謂逵文章似蘇軾稱為小東坡于湖集四十卷中書舍人張孝祥安國撰甲戌冠多士出思陵親擢秦相孫塤遂居其下秦忌惡之以他事下其父子大理獄明年秦卒上既素眷不五年登法従阜陵尤眷之卒年纔四十餘上嘗有用不盡之嘆其文翰皆超世才也原簡池人徙居歴陽因號于湖捫膝先生文集十四卷尚書郎三嵎喻汝礪撰後溪劉氏序略曰靖康之難金議立偽楚以絶民望先生捫其膝曰此膝豈可屈哉即日挂冠神武門遂自號捫膝居士由是名重海内先生之於學不古不好於文不古不嗜於事不古不惬故其餘名節不古不止也既没六十三年而文集始出嗚呼此豈如時花候禽可悦一時耳目之比宜其愈久而愈難泯也盖先生之文一字不肯茍於下筆毎篇率能馳騁上下濤起阜湧力有餘而氣不竭辭既工於理與事又欲明白而深切其得無傳乎觀堂集合江劉望之著紹興進士宰相沈該薦其文無塵埃氣召除學官遷秘書省正字畏亝集廣安游桂著隆興進士其學主窮理盡性卒官制置機宜文字毛伯玉集瀘州毛璞著乾道中進士仕至利州路所著有三餘録六經解自號方山子蒲江集一卷永嘉盧祖臯申之撰樂章甚工方州集五十卷後集二十卷資陽李石知幾撰石有盛名於蜀少嘗客蘇符尚書家紹興末為學官乾道中為郎歴麾節皆以論罷趙丞相雄其鄉人也素不善石石以是晩益困其自序云宋魋魯倉今猶古也李知幾主石室四方従學之士如雲其題名者至三千人他日送其姪浩成都學官詩云我集四庫書琬琰藏洛河此外有石經叅酌正舛訛亦可以見當日収藏之盛也知幾又有續博物志二卷開成承詔録二卷世系手記一卷樂善録十卷傳於世許沆文集三十卷沆瀘州人累官太府少卿性至孝該博能文有章奏賦詠雜著凡三十卷與里人史扶同以詩鳴號瀘南詩老兼山集四十卷端明學士劔門黄裳文叔撰裳乾道進士為嘉王府翊善在邸最久備盡忠益甲寅御極方將大用以病不能朝士論惜之别著有春秋講義杜起莘文集殿中侍御史杜莘老起莘撰杜少陵之後也後溪劉氏序略曰公學術之正文辭之典氣節之剛與王龜齡大略相似而公奮起孤逺為尤難余嘗得公奏疏而讀之其言五榖藥石也公卒四十餘年余守眉陽又得公他文閲之嘆曰善哉窮之言達之行也今年又得公經論千餘篇信乎公之學得於孟子者歟世益降士之為文益浮噫無復斯文也已桃溪集一百卷崇慶州李蘩清叔著歴官太府少卿講學臨政皆有源委所著書凡十八種失其名浩齋退槁四十卷飛烏楊子謨伯昌著淳熙七年就外省試胡文靖得其文以為有格君氣象入對擢甲科著五要七目皆時務蜀帥楊輔以聞召對留棘寺半年所薦蜀士知名者四十人毫芒集石正著本眉人徙居江安登淳熙進士力學不倦尤工書有黄庭經法自號曰唉齋性善堂文集合州庹正周卿著紹熙進士歴官禮部侍郎同脩國史李全將反在朝諸臣知之多不敢言惟正極論之且獻斃全之䇿前溪集劉涇字巨濟别號前溪簡州人張雨撰中岳外史傳云米元章平生與㳺率天下士蜀郡劉涇長安薛紹彭好竒尚古是其一流人也後溪集十卷寉林詞一卷山堂疑問一卷劉光祖著字徳修號後溪一號山堂巨濟之子官華文閣學士諡文節王景文名臣奏議景文名質號雪山富川人所著奏議質文甚竒李文簡公集一百二十卷巽岩奏議三十卷敷文閣學士丹稜李燾仁父撰葉水心序曰自有文字以來名世數十大抵以筆勢縱放淩厲馳騁為極工風霆怒而江河流六驥調而八音和春輝秋明而海澄嶽靜也髙者自能餘則勉而效之矣雖然此韓愈所謂下逮莊騷其上無是也觀公大篇詳而正短語簡而法初未嘗藻黼琢鏤以媚俗為意曽㸃之瑟方希化人之酒欲清又非以聲色臭味自怡悦也獨於古文墜學堂上之議起虞造周如挈裘領振之焉固遺其下而獨至其上者歟蜀自三蘇死公父子兄弟後起兼方合流以就家學綜練古今名實之際有補於世天下傳以繼蘇氏云志稱巽嵓所著又有五經傳授一卷易學大傳雜説五卷詩譜三卷尚書百篇圖一卷併文集通鑑奏議凡三百餘卷李壁鴈湖集消塵録中興奏議内外制援毫録臨汝閒書共數百卷壁字季章燾之第三子官資政殿學士嗜學如饑渇羣經百氏捜抉靡遺尤習典章制度卒諡文懿壁弟􅐉所著有悦齋集十卷續漢官儀二卷季章謫居臨川時註荆公詩十五卷曽景建魏鶴山序鶴山文集一百卷蒲江魏了翁字華父年數嵗日誦千言過目不再覽時稱神童登慶元進士召試學士院遷校書郎補外知嘉定府韓侂胄誅朝廷収召諸賢了翁與焉㑹丁生父憂觧官心䘮築室白鶴山下授徒學者稱為鶴山先生卒贈太師諡文靖傳言了翁所著九經要義凡二百餘卷又有井田圖説一卷師友雅言數十卷讀書日記二十卷雜藁十卷魏文翁著蒲江人登慶歴進士知敘州府别號果齋了翁之弟也縮類稿三十卷蒲江髙稼南叔著魏了翁之兄也髙乃了翁本姓魏者従出繼云稼登嘉定七年進士闗外四州安撫司公事措置元兵下沔州死節諡曰忠子斯得號恥堂有恥堂文集及詩膚説李心傅領史事辟為史館累官叅知政事稼弟定子登嘉泰進士官至學士博通六經所著有北門類藁李舜臣文集三十卷鏤玉餘功録二卷江東十鑑一卷舜臣字子思井研人四嵗知讀書八嵗能屬文稍長通古今推迹興廢洞見根本慨然有志於天下中乾道二年進士遷宗正寺主簿重脩裕陵玉牒當曽布吕恵卿初用必謹書或謂非執政除免格不應書舜臣曰治忽所關何可拘常法他所筆削類此子性𫝊道𫝊心𫝊皆以家學顯世有陵陽李氏東窻李氏井研李氏之稱褎然為一代儒宗以性傳官二府贈太師追封崇國公史稱所著又有羣經講義八卷尚書小傳四卷李心傅詩文一百卷道命録五卷辨南遷録一卷朝野雜記甲乙集四十卷舊聞証誤十五卷誦詩訓五卷心傅字㣲之舜臣第三子也慶元年薦於鄉既下第絶意不復廷舉閉户著書晩因崔與之許奕魏了翁等合前後二十人薦自制置司敦遣至闕下為史館校勘進士出身専修中興四朝帝紀甫成其二添差通判成都府尋遷著作佐郎兼四川制置司叅議踵修十三朝㑹要端平三年成書召赴闕為工部侍郎存􅙕集十卷井研牟子才存􅙕著舉進士對䇿詆史彌逺調洪雅尉有詔李心傅即成都修四朝㑹要及中興國史辟兼檢閲文字以資政殿學士致仕卒史稱所著又有四尚易篇春秋輪輻内外制奏議經筵講義口義故事等書師伯渾文集山隂陸游序曰乾道癸巳予自成都適犍為識隠士師伯渾於眉山一見知為天下偉人予既行伯渾餞予於青衣江上酒酣浩歌聲揺江山水鳥皆驚起伯渾飲至斗許予素不善飲亦不覺大醉夜且半舟始發去至平羌酒解得大軸於舟中則伯渾醉書紙窮墨燥如春龍奮蟄竒鬼搏人何其壯也後四年伯渾得疾不起余懐祖集伯渾文章移書走八千里乞予為序嗚呼伯渾自少時名震秦蜀東被呉楚一時髙流皆尊慕之願與交方宣撫使臨邉圖復中原制置使并䕶梁益兵民皆巨公大人聞伯渾名將聞於朝而卒為忌者所沮夫伯渾既决不肯仕即無沮者不過有司嵗時奉粟帛牛酒勞問極則如孔􅌈徐復軰加散人號書其事於史而已於伯渾何失得而忌之如此鄉使伯渾出而事君為卿為公則忌者當益衆排撃沮撓當不遺力徙比景輸左校殆未可知安得如在眉山躬耕婦織放意山水優㳺以終天年耶則伯渾不遇未見可憾也歸去來文青神杜叔才著魏文靖公䟦云三馬食曺叔夜有宜去之書一龍禪宋淵明興歸來之嘆然従容不廹若將㣲罪行者視叔夜之姱直而輕愠殆有間矣史載淵明之去在義熙三年以其時考之盖宋髙祖殺劉仲文之嵗昭明所謂耻復屈身異代者為得其心夫豈以一督郵為此悻悻哉而古今䍐有能發之者杜君此文作於蜀盗未平之日其尚淵明之心乎了翁昔嘗守君之郡不及識君嘉定十五年九月邂逅其子安石於臨安始見是作因推本昔人所未發者識諸篇末而歸其書於杜氏老圃遺文青神楊虞仲著魏了翁序曰人言尚辭章者乏風骨尚氣節者窘辭令某謂不然辭章雖末技然根於性主於氣發於情止於道非無本者能之且孔明之忠忱元亮之進退不以文辭自命也若表若辭肆筆落口無復雕繪之工人謂可配訓誥雅頌此可强而能哉唐之辭章稱桞韓元白而桞不如韓元不如白則皆於大節觀之蘇文忠論近世文章之浮靡無如楊大年而大年以文名則以其忠清鯁亮大節可考不以末技為文也眉山自蘇長公以辭章自成一家歐尹諸公頼之以變文體後來者相望人知蘇氏為辭章之宗也孰知其忠清鯁亮臨死生利害而不易其守此蘇氏之所以為文也老圃楊公自盛年射䇿甲第直聲勁氣響撼當時有文忠之遺風迨其觀風作牧風裁清峻屢詔不入老不待年徜徉泉石幾二十載蜀人髙其風某之生後猶及拜公又辱與公之季子大理少卿叔正為友叔正甚似其先人諤諤朝端言人所不敢言叔正既卒公之諸生裒老圃遺文若干卷鋟諸梓請予敘所以作嗚呼世俗狹隘矜力炫才言語以為華富貴以為事求其脱然聲利之塲如公者既不可得今觀公退休以後之文猶多雍雅自得之趣盖辭心之聲也易曰脩辭立其誠辭非易能所以立誠也公居官以不欺名堂自號不欺子則其為辭之本既在此是宜其發越著見非浮姱纎麗者可同年語也後之賢者當於是考徳焉公名虞仲字少逸眉之青神人晩號老圃出處顛末見諸不欺子自志云克齋文集楊泰之叔正著虞仲之子也少刻志於學十年卧不設榻宣撫使安丙疏曰蜀中名儒楊虞仲之子當逆曦變時勉有位者毋動言不用拂衣而去使得尺寸之柄必能見危致命卒官大理少卿知重慶府奉祠史載叔正所著有詩名物編及大易要言平舟文集崇道集青神楊棟元極著紹定中進士歴樞密院編脩官史謂其學本於周程負海内望獨以彗星為蚩尤旗為世所少云卒官叅知政事見山集楊文仲時發著棟之従子也七嵗而孤以胄試入太學升内舍時言路壅塞因季冬雷震率同舍叩閽言時事有曰天本不怒人激之使怒人本無言雷激之使言一時傳誦之寳祐初登進士恭宗即位權侍郎兼給事中元兵渡江朝士多棄去者侍従班惟文仲一人鈍齋集六十卷著作郎楊濟濟道撰淳熙五年進士京鏜帥蜀上已出遨濟為樂語首云三月三日豈無水邉麗人一詠一觴亦有山隂禊事又云良辰羙景賞心樂事四者難并崇山峻嶺修竹茂林羣賢畢至一時傳誦京為相召入館出知果州以終懐親詩十三篇何麗天著南充人宦㳺中都久未得歸賦懐親十三篇如毛詩體隨表上進以求外補朝廷嘉其志因詔嶺南逺官皆許迎養皛然集廣安安丙子文著初第進士知大安軍辟呉曦隨軍轉運以誅曦功進資政大學士四川制置使方山集四卷蒼溪嚴大猷著呉曦僣蜀大猷憤而作詩有笏未到身難擊泚兵如入手易擒呉之句特奏授隆慶司李叅軍方山在縣東八十里大猷所居近之故以名集亨泉遺藁一百卷四川制置叅議張方著方字義立資陽人登慶元進士號亨泉子三作州持節所在有聲何炎寅集炎寅通江人嘉定間舉進士綽有時名舊志列於著作橘洲文集續言行録奏藁共十三卷潼川姚希得逢原著一字叔剛登嘉定進士歴端明學士太子賔客史稱其清儉自持好引善類不要虚譽有薦誦於上久而人莫知者鶴林集潼川呉泳叔永著嘉定二年進士歴著作郎讀書於州鶴林寺故以名集杜甫所謂牛頭望鶴林也弟即昌裔呉季永集苦言十篇昌裔字季永第進士歴秘閣修撰多習典故與徐清叟杜範同日入臺四方想其風采作三諫詩侈之苦言則通判眉州時作也塵缶文集内外制奏議掖垣繳奏金華講議宣化程公許著字季與一字希頴第嘉定進士歴國史編脩實録檢討忤鄭清之出知隆興府晩年惟一僮侍食無重肉一裘至十數年不易家無羡儲蜀方兵難族姻奔東南者多依公許以居許學士奏議雜文簡州許奕著奕字成子以任為涪城尉寜宗親擢進士第一歴寳謨閣學士論諫甚多帝稱其骨鯁提舉崇福宫還家草遺表曰本非衰病初染㣲痾當湯熨可去之時臣以疾而為諱及鍼石已窮之後醫束手而莫圖静言膏肓所致之由大抵脉絡不通之故寓諷諌焉性孝友通籀𨽻所著有毛詩説論語尚書周禮講解及文集行于世歸全録巴縣母夢牛著咸亨中進士屢主試院仕終承直郎蔵雲山集相鋤集普州張山翁著景定中進士為荆州宣慰幹官元兵臨鄂守張晏然降山翁以書噍讓之遂被執山翁酬對不屈元人義之後居黄鵠山聚徒教授而終見宋史家鉉翁傳蟠龍集蜀僧希演著東坡柬云䝉恵蟠龍集向已盡讀數冊廼文筆力竒健深増歎服僕嘗觀貫休齊已詩尤多凢陋而遇知得名赫奕如此盖時文凋弊故使此二僧為雄强今吾師老於吟詠精敏豪放而汩没流俗豈亦有幸不幸耶然此道固亦澹泊寂寞非以蘄人知而鼓譽也但鳴一代之風雅而已既承厚貺聊奉廣耳女子王安之詩一卷簡池王亢之女名安之未嫁而死有詩一卷鄧文肅集元綿州鄧文原著仕集賢直學士兼國子祭酒諡文肅志稱其博學能詩僉浙西亷訪事多異政人以為神道園學古録虞集仁夀人隨父汲徙居臨川天性孝友𢎞才博學累遷奎章閣學士日取經史中切心徳治道者陳進經筵凡承顧問必隨事規諌而一時大典冊咸出其手其論薦人才必先器識平生為文萬篇有道園學古録行世卒贈仁夀公諡文靖子安民知安福州弟槃著非非國語行於世寵溪詩集元支渭興著長寜人至順間仕四川行省叅政寵溪其别號也賈先生集賈長卿涪州人有文學凡使蜀還京者人必問曰得賈先生文章否題觀瀾閣歌撰文廟御碑記鄉人重之雲山詩集壁山縣有雲山翁者力學豪放不著姓名結廬於五峰山下明玉珍以萬户詔之不起有雲山集行世導江先生文集灌縣張䇓著元末避亂僑居江左潛心道學至元中行臺中丞呉曼慶延至江寜逺近翕然師之稱導江先生有經説及文集行於世泉石子詩文納谿蕭子雲善詩文偽夏屢徵不就避跡紫囤谷中號泉石子有詩行世蜀中廣記卷九十九
