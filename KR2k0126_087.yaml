body:
  text: 蜀中廣記卷八十七明曹學佺撰高僧記第七川東道光明遍照寳藏菩薩化身高僧傳云僧寳崖姓牟氏祖居涪陵人也晋義熈九年朱齡石伐蜀涪陵獽三百家隨軍平討因止於廣漢金淵山谷崖童幼少言不雜俳戲毎遊山泉必先禮而後飲或諦觀不瞬坐以終日人問其故荅曰是身可惡我思之耳後必燒之及年長從戎毅然剛正嘗隨伴捕魚得已分者用投諸水謂伴曰殺非好業我今舉體皆現生瘡誓斷獵矣遂燒其獵具時獽首領數百人共築池塞竇以養魚崖率家僮往彼觀望忽有異蛇長尺許頭尾皆赤須臾長大乃至丈餘圍五六尺獽衆奔散蛇頭趨水舉尾入雲赤光遍野久之乃滅衆㝷爾具論前事崖曰此無憂也但斷殺業蛇不害人又勸停池堰衆未之許俄而隄防無故決壞矣時依悉禪師施力供侍雖充驅使而言語訥澁舉動若癡至𤣥冬之月禪師患足冷命之取火乃將大爐炎炭直頓於前禪師責之曰癡人何煩汝許多火乃正色荅曰須火却寒得火嫌熱孰是癡人情性若斯何以得道禪師謂曰汝不畏熱試將手置火中崖即應聲將指置火中振吒作聲青煙涌出都不改容禪師陰異之他日諸弟子曰崖耐火共推之火爐被燒之處皆並成瘡而欣笑自如竟無痛色諸弟子等具諮禪師禪師喚來問曰汝於此學佛法更莫謾作舉動惑亂百姓荅曰若不苦身焉得成道如得出家一日便足禪師遂許剃度鬢鬚易除猶如自落禪師置刀於地攝衣作禮曰崖法師來為我作師我請為弟子崖謙謝而已既法衣著體四軰尊崇歸命輸誠無所恡惜三十年間大𢎞救濟年踰七十心力尚強周武成元年六月於益州城西路首以布裹左右五指燒之有問燒指可不痛耶崖曰痛由心起心既無痛指何所痛時人同號以為僧崖菩薩或有問曰似有風疾何不治之荅曰身皆空耳如何所治又曰根大有對何謂為空荅曰四大五根復何住耶衆服其言如是經日左手指盡火次掌骨髓沸上涌將滅火焰乃以右手殘指挾竹挑之有問其故崖曰緣諸衆生不能行忍今勸不忍者忍不燒者燒耳兼又説法勸勵令行慈斷肉雖烟焰俱熾以日繼夕並燒二手眉目不動又為四衆説法誦經或及諸切詞要義則頷頭㣲笑時或心怠私有言者崖顧曰我在山中初不識字今聞經語句句與心相應何不至心靜聽若乖此者則空燒此手何異燋頭耶於是大衆懔然莫不專到其後復告衆曰末劫輕慢心轉薄淡見像如木頭聞經如風過馬耳今為寫大乗經教故燒手滅身欲令信重佛法也闔境士女聞者皆來遶數萬帀崖夷然澄靜容色不動頻集城西大道談論法化初有細雨殆將霑漬便欣心入定雲散月明而燒臂掌骨五枚如殘燭燼忽然各生並長三寸白如珂雪僧尼僉曰若菩薩滅後願奉舍利起塔供養崖乃以口嚙新生五骨拔而折之吐施大衆曰可為塔也至七月十四日忽有大聲狀如地動大裂人畜驚駭於上空中或見犬羊龍蛇軍器等像少時還息人以事問崖曰此無苦也警睡三昧耳吾欲塗身可辦供具時孝愛寺導禪師戒行精苦耆年大德捨六度錫杖并及紫被贈崖入火犍為僧淵逺送斑納意願隨身於時人物諠擾施財山積初不知二德所送物也至明日平旦忽告侍者法陁曰汝往取導師錫杖紫被及納袈裟來為吾著之便往造焚身所先在成都縣東南積柴壘以為樓高數丈許上作乾麻小室以油潤之崖緩步至樓遶旋三帀禮拜四門便登其上憑欄下望令念般若留以一心有施主王撰懼曰我若放火便燒聖人將獲重罪崖陰知之告撰上樓臂摩頂曰汝莫憂造樓得罪乃大福也促命下火人皆畏之置炬著地崖以臂挾炬先燒西北次及西南麻燥油濃赫然熾合於盛火中向空設禮比第二拜身面焦坼重復一禮身踣炭上及薪盡火滅骨肉皆化唯心尚存赤而且濕肝腸脾胃猶自相連更以四十車柴燒之膓胃雖卷而心猶如木兊法師乃命收取葬於塔下今在寳園寺中初未燒前有問者曰菩薩滅度願示瑞相崖曰我身可盡心不壞也衆謂心神無形不由燒蕩及後心存方知先見然崖自生及終頻現異相有數十條曽於一家將欲受戒無何笑曰將捨寳物生疑慮耶衆相推問有楊氏婦欲施銀釵恐夫責及因決捨之有孝愛寺僧佛與者偏嗜飲噉流俗落度隨崖轝後私發願曰今值聖人誓斷酒肉及返至寺見黄色人曰汝能斷肉大好汝若食一衆生肉即食一切衆生肉若又食者即食一切父母眷屬肉必欲食者當如死屍中䖝䖝即肉也又曰日有六時念善大好若不能具一時亦好如是一念其心亦好皆能滅惡也於是佛與翹心精進遶塔念誦又聞空中聲曰汝勤持齋願令衆生得不食身又令餓鬼身常飽滿觀其感被皆崖力矣初登柴樓沙門僧育在大建昌寺門見有火光高四五丈廣三四丈從地而起上衝樓邊久久乃滅又初焚日州寺大德沙門寳海問曰等是一火何故菩薩受燒都無痛相崖曰衆生有相故痛耳又曰常云代衆生受苦為實得不荅曰既作心代受何以不得又曰菩薩自燒衆生罪熟各自受苦何由可代荅曰猶如燒手一念善根即能滅惡豈非代耶時普法師又問曰二家共諍大義終未之決一云佛智緣無相理理是緣境智是能緣一云除倒息妄即是真諦何者為定崖曰佛即無相無别異相海法師曰佛即無相無相之相本無異相若如此者菩薩即釋迦觀音崖曰我是凡夫誓入地獄代苦衆生願令成佛耳海曰前佛亦有此願何故早已成佛荅曰前佛度一時衆生盡也又問藥王等聖何故成佛今菩薩獨未成佛而救衆生是則前佛殊塗荅曰前段衆生已得藥王意今衆生未得我意由我始化如將落之花也故其應對一時皆此之類乃謂侍者智炎曰我滅度後好好供養病人並難可測其本多是諸佛聖人乗權應化自非大心平等何能恭敬此是實行也座中疑崖非聖人者乃的呼其人名曰諸佛應世形無定方或作醜陋諸疾乃至畜生下類檀越慎之勿妄輕視及將動火皆覩異相或見圓葢覆崖有三道人處其葢上或見五色光如人形像在四門者或見柴樓之上如日出形並雨諸花大者如兩斛篼許小者如鍾乳片五色交亂紛紛而下接取非一棖觸皆消又聞天鼓殷殷深逺久久方息及崖滅後郫縣人於江邊見空中有油絡轝崖在其上身服斑納黄偏袒紫被捉錫杖後有五六百僧皆罩竹傘乗空西没又潼州靈果寺僧慧榮者承崖滅度乃為設大齋在故市中於食前忽見黒雲從東南來翳日廕會仍雨龍毛五色分明長者尺五短猶六寸又雨諸花幡香煙滿空繽紛大衆通見又初收心舍利至常住寺中皆見花叢含盛光榮庭宇又阿迦膩吒寺僧慧勝者抱病在床不見焚身心懷悵恨夢崖將一沙彌來帊裏三斛許香并檀屑分為四聚以遶於勝下火焚香勝怖曰某甲凡夫未能燒身也崖曰無怖用熏病耳煨燼既息旋覺爽健又請現瑞荅曰我在益州詭名崖也真名光明遍照寳藏菩薩勝從覺後力倍於常有時在外村為崖設會勝自唱導曰潼州福重道俗見瑞我等障厚都無所見因即應聲二百許人悉見天雨如雪紛紛滿天映日而下至中食竟花形漸大如七寸盤皆作金色明淨耀目四衆競接都不可得或緣樹登高望欲取之皆飛上去又成都民王僧貴者自崖焚後舉家斷肉後因事故將欲解素私自証論時屬二更忽聞門外喚檀越聲比至開門見一道人語曰慎勿食肉言情酸切行啼而去從後走趂似近而逺忽失所在又焚後八月中獽人牟難當者於就嶠山頂行獵搦箭聲弩舉眼望鹿忽見崖騎一青麞獵者驚曰汝在益州已燒身死今那在此崖曰誰道許誑人耳汝能燒身不射獵得罪也汝當勤力作田便爾别去又至冬間崖兄子於溪中忽聞山谷喧動若數萬衆舉望見崖從以兩僧執錫杖而行因追及之欲捉袈裟崖曰汝何勞捉我乃指前雞猪曰此等音聲皆有詮述汝等語他人不解餘國言音汝亦不解人畜有殊皆有佛性但為惡業故受此形汝但力田莫養禽畜言極周委故其往往現形預知人意率皆此也具如沙門亡名集及費氏三寳錄益部集異記蜀僧悟詮號覺海有慧性峽中富人程夷伯年二十九一夕夢其父曰汝今年當死可問覺海其人茫然不曉一日有僧説相號覺海子程請一相問云我壽幾何覺海曰老僧皆無求但覔水一盃呵氣入水中令程飲之曰今夜有吉夢可相報即夜夢至一官府左廊下男子婦人衣冠嚴整皆相忻悦右廊盡枷鎖縲紲之人哀號涕泗傍有人云左廊是修捨橋路人右廊是毁橋路人若爾要福壽可自擇取程即夢覺發心凡百里之内橋梁路道一一修整工畢覺海復來云汝作此事可延十年程自是於道路上用工不倦壽九十二五世昌盛隋涪州相思寺無相禪師者不知何來忽至山寺隨衆而已不異恒人其寺在涪州上流大江水北崖側有銘方五尺許字如掌大都不可識下有佛迹相去九尺長三尺許蹈石如泥道俗敬重相以一時渡水齋返無船乃鉢安水中曰何為常擎汝汝可自渡水便取芭蕉葉搭水立上而渡鉢隨後來須㬰達岸時採樵者見之相語覺知己便辭去徒衆苦留不住至水入船諸人禮請不與篙檝乃捉船舷直爾渡水不顧而去即令尋逐莫測所往心珠會傳云波崙禪師名智通什邡栁氏子生七嵗握拳不語唐𤣥宗召而問之即為説經時大旱勑詔祈雨有應帝稱聖僧留入大内師辭歸賜金劍寳鉢師擲劍於空隨劍行落寺址帝賜萬金建大刹時有金鴨浮寺池上寺名慧劍焉唐幽谷淨滿禪師本浙江人姓莊氏幼受業於鏡無垢禪師及叅禮無見覩禪師指示往蜀貞元中偶至縉雲山下因悟曰吾師有囑云逢縉則止遇雲則住此山非耶隨欲登山詣崇教寺居民曰是寺年久無僧有毒蛇甚大嚙人切不可往師竟登山數日不下或疑且死聚衆尋求師安然無恙蛇亦滅跡人皆以為竒遂供齋糧師戒行嚴謹居三十年如一律致門衆六十餘一日召弟子曰吾當西歸令取水沐浴更衣結跏敷座隨作偈曰禪不會叅道不曽悟打破虚空從新錮鏴咦佛子頭邊佛魔驚怖端坐而化唐釋清公居巴山之隈不知何許人常嘿其詞忽復一言未常不中西川節帥段文昌父鍔為支江宰後任江陵文昌少好屬文長自渚宫困於塵土客遊成都謁韋南康與奏釋褐道不甚行毎以事業自負與遊皆高明之士遂去南康謁金吾裴邠之及裴鎮梁州辟為從事轉假廷評得聞清公之異徑請求宿願知前去之事自夕達旦曽無一詞忽聞段蜀中極盛旌斾而至者誰公曰豈非高崇文乎對曰非也更言之公曰代崇文者武黄門也清曰十九郎不日即為此人更盛更盛公尋徵之便曰害風妄語阿師不知大笑而已公由是頗亦自負户部員外韋處厚出任開州刺史處厚素深於釋氏洎到鵠鳴先訪之清喜而迎處厚處厚因問還期曰一年半嵗一年半嵗又問終止何官對曰宰相須江邊得又問終止何處僧遂不荅又問段十九郎何如荅曰已説矣近也近也及處厚之歸朝正三嵗矣長慶初段公自相位節制西川果符清公之言處厚唯不喻江邊得宰相廣求智者解焉或有傍徵義者謂處厚必除浙西夏口從是入拜及文宗皇帝踐祚自江邸首命處厚為相至是方驗與鄒平公同發使修清公塔因刻石紀其事焉又趙宗儒節制興元日問其私動遂命紙作兩句詩云梨花初發杏花初甸邑南來慶有餘宗儒遽考之清公但云害風阿師取次語明年二月除檢校右僕射鄭餘慶代其位云唐釋懷濬者不知何許人也憨而且狂乃逆知未來事其應如神乾寧中無何至巴東且能草書筆法天然或於寺觀店肆壁書佛經道法以至歌詩鄙俚之詞靡不集其筆端矣與之語阿唯而已里人以神聖待之刺史于公患其惑衆繫獄詰問乃以詩通狀辭意在閩川之西東然章句靡麗州將異而釋之又詳其㫖疑在海中為杯渡之流行旅經過必維舟而謁辨其上下峽之吉凶貿易經求之利鈍客子懇祈惟書三五行終不明言事後多驗時荆南大校周崇賔謁之書遺曰付皇都勘爾後入貢因王師南討遂縶南府終就戮也押牙孫道能謁之書字付竹林寺其年物故營葬於古竹林寺基皇甫鉉知州謁之畫一人荷校一女子在傍尋以娶民家女遭訟錮身入府有穆昭嗣者波斯種也幼好藥術隨父謁之乃畫道士乗雲提一匏壺書云指揮使高某牒衙推穆生後以醫術有効南平王高從誨令其去道從儒簡攝府衙推也王師伐荆州濬乃為詩上南平王曰馬頭漸入揚州路親眷應須洗眼看是年高氏輸誠於淮海遂解重圍其他異迹多此類也嘗一日題庭前芭蕉葉云今日還債業州縣者殊不介意忽為人所害身首異處刺史為其茶毘焉唐忠義傳李澄之子源自以父死王難不仕隠洛陽惠林寺年八十餘與道人圓觀遊甚密忽約觀自峽路入蜀觀曰予久不入繁華之域固請不獲已許之塗間觀見錦襠女子浣泣曰所以不欲自此來者以此女也然業影不可逃明年某日君自蜀還可相臨以一笑為信吾已三生為比邱居湘西岳麓寺寺有巨石林間嘗習禪其上遂不復言而化源如期至錦襠家則兒生始三日源抱臨明簷兒果一笑却後十二年源至錢塘孤山月下聞扣牛角而歌者曰三生石上舊精魂賞月臨風不要論慚愧情人逺相訪此身雖壞性常存此僧賛寧所記而東坡以為圓澤按萬州之東瀕江四十里地名周溪乃唐僧圓澤化處再生為南浦人其詩曰身前身後事茫茫欲話因緣恐斷腸吳越山川尋已遍却迴烟棹上翟唐冷齋夜話云嘗欲以異同質之叔黨即此事也萬州之下巖唐末有劉道者定州無極人聞道於雲居膺禪師為開巖第一祖法號道㣲自鑿石龕曰死便藏龕中不用日時門人奉其命二百年來遊者題詩不可勝讀莫能起此開巖者山谷作詩表之詩云寺古松楠老嵓虚塔廟開僧緣蠶麥去官數荔支來石室無心骨金鋪稱意苔若為劉道者拽得鼻頭迴又有莫道蒼岩鎖靈骨應時持鉢到諸村之句宋釋行滿者萬州南浦人棲禪天台華頂峰下智者院知衆僧茶竈所居房檻外有巨松横枝之上寄生小樹毎遇滿出坐寄生木必嫋嫋而側時謂此樹作禮茶頭也四十年内人未見其便溺以開寳中預向人説我當行矣令衆僧念文殊名號相助黙然坐化春秋計可八十餘滿雖茶頭多作偈頌以助道化宋荆門軍玉泉窮谷宗璉禪師合州董氏子也開堂日問荅已乃曰衲僧向人天衆前一問一荅一擒一縱一卷一舒一挨一拶須是具金剛眼睛始得若是念話之流君向西秦我之東魯於宗門中殊無所益這一段事不在有言不在無言不礙有言不礙無言古人垂一言半句正如國家兵器不得已而用之横説竪説秪要控人入處其實不在言句上今時人不能一徑徹證根源秪以語言文字而為至道一句來一句去喚作禪道喚作向上向下謂之菩提湼槃謂之祖師巴鼻正似鄭州出曹門雖直指不傳之宗與諸有情盡未來際同得同證猶未是泊頭處僧問保壽開堂三聖推出一僧保壽便打意㫖如何師曰利動君子曰為復捧頭有眼為復見機而作師曰獼猴繫露柱曰秪如三聖道伱恁麽為人瞎却鎮州一城人眼又作麽生師曰錦上鋪華又一重問行脚逢人時如何師曰一不成二不是曰行脚不逢人時如何師曰虎咬大䖝曰秪如慈明道釣絲絞水意作麽生師曰水浸鋼石卵問三聖道我逢人則出出則不為人意㫖如何師曰兵行詭道曰興化道我逢人則不出出則便為人又作麽生師曰綿裹秤鎚問不落因果為甚麽墮野狐身師曰廬山五老峰曰不昧因果為甚麽脱野狐身師曰南嶽三生藏曰秪如不落不昧未審是同是别師曰倚天長劍逼人寒僧問只如昔日楊岐和尚因僧問如何是佛楊岐荅云三脚驢子弄蹄行意㫖如何師曰過蓬州了便到巴州大約師談心要如空中鳥跡水底魚蹤不容湊泊也按宗璉石照人嗣潭州大溈山善果有僧過其家指燈示之曰燈照汝耶汝照燈耶荅曰燈亦不照我我亦不照燈扁其室曰窮谷劉錡鎮荆南問窮谷義璉曰心盡曰窮性凝曰谷隨響應聲不疾而速宋南康軍雲居德㑹禪師重慶府何氏子上堂舉教中道若見諸相非相即見如來作麽生是非相底道理佯走詐羞偷眼覷竹門斜掩半枝花宋䕫門卧龍破庵禪師諱祖先廣安王氏子嘗分座杭之靈隠有道者請益曰猢孫子捉不住願垂開示師曰用捉他作什麽如風吹水自然成紋時無凖侍傍大悟有示楞嚴座主偈曰見猶離見非真見還盡入還無可還木落秋空山骨露不知誰識老瞿曇宋顯嵩禪師李姓居巴川之宣密院逾三十年足跡不出門紹興間集衆告以將逝作偈曰八十年中常浩浩宏開肆貨摩尼寳也無一箇共商量不是山僧收舖早端坐而寂宋石頭和尚號囘祖師合州人自幼入景德寺為僧有戒行因鑿石出火遂大悟作偈曰是石頭和尚咬嚼不入打破露空虚些子迹復囘州紹興間聞釣魚山建䕶國寺自甃石二十四片為龕全身入門自掩端坐而逝作草庵歌其末有老僧不知輪甲子一葉落知天下秋之句淨業合州石照人姓文氏少業屠有羊既乳將殺之二羔啣刀伏門後業感嘆棄家為僧忽大悟作頌曰昨日羅刹心今朝菩薩面羅刹與菩薩不如一條線遂作如是觀焉智通什邡人生數十年不語元明宗聞而召之即啓口説經後還蜀居于安居之波崙寺飛錫卓劍乃多異跡妙高和尚太足人住邑之妙高寺一室獨處未嘗出户一夕忽謂僧衆曰吾將逝矣可置吾桶中覆之三十年始開僧衆依之盛以木桶以竹篐之届期桶自開端坐如生乃移置龕中事之幻身尚存蜀中廣記卷八十七
