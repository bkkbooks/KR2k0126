body:
  text: 蜀中廣記卷十明曹學佺撰名勝記第十川西道龍安府平武縣附郭顧野王輿地志云隂平縣本漢梓潼縣地晉人流寓於蜀者仍於益州立北隂平郡西魏廢帝二年定蜀改北隂平為龍安魏志景元四年諸軍攻蜀鄧艾自隂平行無人之地七百里鑿山通道作橋閣山髙谷深至為險難艾以氊自裹縛而下将士攀木縁崖魚貫而進先登至江油即此地晉於此置平武縣志云唐宋之龍州在雍村埧梁李龍遷築城於此魏置州遺址尚存雍村埧者宋紹定進士郡人雍繁孫有文學見所製文昌祠碑村因此名今之郡治則樂平鎮也蒲規修造記云通階秦路嚴禁出入與劍門闗為比矣唐許棠送龍州樊使君詩曽見卭人説龍州地未深碧溪飛白鳥紅斾映青林土産唯宜藥王租只貢金政成閒宴日誰伴使君吟李洞送龍州田使君詩御札軫西陲龍州出牧時度闗雲作雪挂棧水成澌劍淬號猿岸弓懸宿鶴枝江燈混星斗山木亂槍旗鎻庫休秤藥開樓又見詩無因陪宴集吟苦憶京師項斯龍州與韓将軍夜㑹詩庭綠草纎纎邉州白露沾别歌縁劍起客淚是愁添見月猿啼樹廻風雪滿簾将軍盡尊酒樓上賦星占李洞亂後龍州送鄭郎中兼寄鄭侍御詩侍車登疊嶂經亂集鴒原省壊蘭終潔臺寒栢有根縣晴江入峽樓静雪連村莫隠匡山社機雲受晉恩又龍州送裴秀才詩違拜斾旗前松隂路半千樓衝髙雪㑹驛閉亂雲眠牓掛臨江省名題赴宅筵人求新蜀賦應貴浣花牋宋邵稽仲詩峭壁隂森古木稠亂山深處指龍州猿啼鵶噪溪雲暮不是愁人亦自愁方輿勝覽龍州倅㕔有吏隠堂僉判趙衆詩滿耳江聲滿目山此身疑不在人寰民含古意村村静吏束刑書日日閒司馬君實和云四望逶迤萬疊山微通雲棧訪雲鬟誰知吏道堪棲隠未必人間有此閒范景仁和云花隂掃榻常欹枕月色侵門不下闗因諷君詩想佳景夜凉依約夢魂閒寰宇記云龍穴山在隂平縣東北五十里古老相傳此山有龍闘死血變為石宋齊於此置龍血戍李膺益州記云龍血東有龍像巖絶壁約萬餘丈有四石龍在壁間今尤可驗巖之東北有洞穴莫測深淺泉出其下又云馬閣山在隂平縣北六十里北接梁山西接岷峨昔鄧艾伐蜀從景谷路徑龍州江油縣至此懸崖絶壁乃束馬懸車作棧閣方得路通因名馬閣山龍門志云竇子明遇仙處在縣西北九十里今仙女舗是宋理宗寳祐間有人於小溪山下見二女子冉冉升雲而去異香經日不散龍安新志又云仙女洞在治南江村口山勢盤旋巖洞深邃水自中出百里流入劍南故老相傳每風日清和遙見仙女靚粧遊行巖上或理髪或浣衣於洞壑中隠顯不常人跡罕到洞中石乳融結状甚竒怪色如碧玉取可供玩也道教靈驗記云梁武陵王紀理益州使李龍遷築城於牛心山龍遷既殁便葬山側鄉里立祠號李古人廟唐初改為觀其後武氏革命鑿斷山脉明皇幸蜀有老人蘇坦奏曰龍州牛心山國之祖墓今日䝉塵之禍乃則天掘鑿所致明皇即令刺史蘇邈併工修填如舊明年誅祿山復宫闕至徳二年乃升龍州為都督府號靈應郡僖宗幸蜀宗子李特請遣道士醮山祈福禮有加焉按唐書髙祖紀七世祖曰暠為梁昭武王生歆歆生重耳重耳生熙熙生天錫天錫生虎虎生昞昞生淵是為髙祖虎當西魏時賜姓大野氏是虎祗仕西魏亦非仕梁也此説不知何據隂平修路記云龍安棧閣在治東者曰石城曰佛崖曰麻園曰蟇頤曰黄林曰三店原曰七里即左擔也曰飛仙已上凡八在東南者曰石回曰興文即袁烈婦投崖處曰猿臂在東北者曰秦隴曰東閣已上凡五在治東者曰金鼓以形肖也曰芭蕉曰楮株曰盧厓監司盧姓者所修曰天井曰桑坪曰兠索曰木蕊曰飛泉已上凡九在治西北者曰金匱曰桐油曰隆奉曰胡空曰黄梗曰劉村曰鵝頂曰禪峰曰石門曰仙女曰馬桑曰溪壩曰黒水曰羅漢曰羊腸已上凡十有五江油縣古江油郡及縣今平武之江油舖是以江水所由矣元遷江油於武都興教鎮則今縣也方輿勝覽云太白臺在江油縣太白與江油尉往来故有臺在尉亭蒲翰為之記其贈江油主簿詩云嵐光深院裏傍砌水泠泠野燕巢官舎溪雲入古㕔日斜孤吏過簾捲亂峰青五色神仙尉焚香讀道經為米芾書刻在縣衙志云縣西三里有山接彰明界髙聳亭亭形如匡字此大匡山也又云南二十里㸃燈山即彰明之小匡山上有太白祠矣寰宇記云涪水在縣北一里自松州崆峒山出西北至州界南入綿州界益州記云隂平縣有左擔道其路至險擔在左肩不得度右肩也鄧艾由此伐蜀勝覽云左擔路上涪水崖壁有閣道六曰青崖曰蟇頥曰石回曰七里曰東閣曰石城即隂平所記者又縣有二閣曰猿臂曰黄林不在左擔之數寰宇記云石門在江油縣東百里有石門戍漢水記云與氐分界於石門仇池戍去石門四百餘里左思蜀都賦云縁以劍閣阻以石門顧野王輿地志云石門在褒中之北漢中之西今按其山兩邉有石壁相對望之如門鄧艾伐蜀厯此寰宇記云天池山在州南百三十里髙九十二丈上有池周廻二十三步其水常滿號曰天池本名石人山天寳六年勅改為靈液山勝覽云太華山在江油縣南百四十里有三峰竒怪碑目云𢎞真觀古碑在江油縣南百三十四里太華山之登真觀此碑最古不記撰人姓名按此山即羣仙錄所載黄奉仙隠處石泉縣漢靈帝以汶江蠶陵廣柔三縣立汶山郡廣柔即今之石泉也志云縣北二里有泉甘冽崖上刻甘泉古蹟四字此縣名之始矣唐屬茂州宋神宗時静州夷寇邉攻茂州窒隴東以孤石泉成都守孫羲叟經畫事宜以石泉為邑介綿茂之間道里闊逺緩急不相應非扼其衝要不足捍外患於是詔改石泉縣為軍按新編張上行字道從漢州徳陽人登元豐第習於邉計後㑹石泉夷犯邉朝廷命羲叟帥蜀召公問計公引唐王涯傳云吐蕃有兩道一由龍安青川縣一由綿州威蕃柵取抵鷄城皆虜之險要今石泉三十里威蕃亭地名柵底即唐之威蕃柵宜先築堡寨以禦其来次陞石泉為軍以重其權然後調思黔義軍以制其暴則取功一時為利後世不然蜀之憂未艾也羲叟盡用其䇿石泉圖經國乎衆山之隈林巒叢箐樵蘇恣取不食地利而生計亦足寰宇記縣蜀山史記黄帝子昌意娶蜀山氏女盖此山也郡國志云石紐山今在石泉縣南帝王世紀以為鯀納有莘氏胸臆坼而生禹於石紐郡人以禹六月六日生是日熏修祼享歳以為常水經注云石紐夷人共營之地方百里不敢居牧有罪逃野捕之者不逼能藏三年不為人得則共原之言大禹之神所祐也碑目云禹穴二字大徑八尺李太白書刻在絶壁上又云石泉縣有周萬歳通天碑前内供奉書手王恵元書其石擊之清亮全類玉音碑隂有叚文昌留題在報恩光孝觀又云誓水柱在治西四十五里河岸柱髙丈許圍五尺前人恐水衝縣故立此誓之未詳年代蜀中廣記卷十
