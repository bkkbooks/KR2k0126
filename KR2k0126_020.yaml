body:
  text: 蜀中廣記卷二十明曹學佺撰名勝記第二十遵義道遵義府遵義縣附郭漢書唐䝉上書說武帝曰竊聞夜郎國所有精兵可得十萬浮船牂柯出其不意此制越一奇也上乃拜䝉為中郎將從巴筰關入見夜郎侯厚賜諭以威德約為置吏夜郎傍小邑皆貪漢繒帛以為漢道險終不能有也乃且聽䝉約還報乃以為犍為郡發巴蜀卒治道自僰道指牂柯江司馬相如又往諭意皆不聽命數反叛及南越反上使馳義侯同犍為發南夷兵且蘭君乃反殺使者會越已破引兵誅且蘭遂平南夷唐書云天下山河之象在乎兩戒南戒自岷山迤邐及北地上郡西南至巴蜀漢中東及牂柯今遵義之區雖四塞為固而襟帶之脈則牂柯江水矣郡志云碧雲峯在治西四峯並峙中央逈出青碧如雲按神君張亞播州玉皇碑云城西碧雲峯下公府西北隅夷衍清勝隱然神仙窟宅志又云城外桃源洞石乳天垂見者眩目沈德元詩云亭跨桃源石溪山真美哉笑同今日上醉去幾時來環野誰堪據寸心當自裁丈人千古意倚望一銜杯後人因立美哉亭四夷傳宋淳熙中遷遵義軍於穆家川志云穆家川源出龍岩山流經湘山一名湘川李白詩云洛陽才子謫湘川元禮同舟月下仙記得長安還一笑不知何處是西天白詩又云石笋如掉筆懸于山之巔誰謂不平者與之書青天志云今樓山關石笋參天是白題詩處也志云海龍囤為楊酋穴壘在治北三十里四面斗絶後有側徑略一線今居人尚不知通於何所故老相傳昔白龍太子據此今為白龍寺又城外福光寺有銅佛像初人見之荒莽中欲取者數風雷輒作不敢近有異僧率土人齊戒乃得今在寺中又有龍山鐘黑達樹皆異物也播平鐘為水西持去樹猶存志又云城北門有廖孝亷故宅城東郭有二冉故宅司北有苖齊郎故宅按齊郎太廟執事之官也人代未詳寰宇記謂齊郎水源出蒿芰里楚米陂經小溪里入瀘江本此二冉宋末播州名士冉璡冉璞也有文武才前後辟召皆不赴余玠安撫四川築招賢館兄弟往謁玠與分庭抗禮久無所試使人窺之惟相對據地以堊畫地為山川城池狀因獻城釣魚山之䇿者廖孝亷事不可考寰宇記云貞觀九年分牂柯北界置郎州領恭水高山貢山柯盈􅣵施釋燕六縣十一年省十三年又於其地置播州取播川為名仍復六縣其明年改恭水為羅䝉縣高山為舍月縣貢山為胡江縣柯盈為帶水縣􅣵施為羅為縣釋燕為胡刀縣十六年又改羅䝉為遵義縣二十年以夷州之芙蓉瑘川二縣來屬顯慶五年廢舍月胡江羅為三縣景龍三年升播州為都督府先天二年罷天保元年改為播川郡乾元元年復為播州寰宇記云畲陵山在遵義縣東四十五里夷牢水西自帶水縣來東流經縣北一里又屈曲南流入廢胡刀縣界帶水源出舊縣西大山東流經帶水縣城北又東流至廢胡刀界注胡江水按唐永徽中廢帶水縣在府北三十里宋大觀建遵義軍於白綿堡亦在府北三十里似同一地隋楊素贈薛播州詩凡十四首即薛道衡也汾陰人少孤專精好學甚著才名隋高祖除為內史纍遷上儀同其為播州疑在煬帝之世詩云在昔天地閉品物屬屯䝉和平替王道哀怨結人風麟傷世已季龍戰道將窮亂海飛羣水貫日引長虹干戈異革命揖讓非至公又兩河定寶鼎八水域神州函關絶無路京洛化蓬邱漳滏爾連沼涇渭余别流生郊滿戎馬涉路起風牛班荆疑莫遇贈縞竟無由又五緯連珠聚千載濁河清金亡潛虎質閏盡自蛙聲聖期伊旦暮天祿啓炎精霧生三日重星飛五老輕禋宗答上帝改物創羣生又道昏雖已朗政故猶未新刳舟洹水際結網大川濵出遊迎釣叟入夢訪幽人植林雖各樹開榮豈異春相逢一時泰共幸百年身又束帛賁邱園生芻自幽谷塵芳金馬路瀾清鳳池澳零露既垂光清風復流穆傾蓋如舊知彈冠豈新沐利心金各斷芬言蘭芙馥又自余厯端揆緝熙恧時彥及爾陪帷幄出納先天眷高調發清音縟藻流餘絢或如彼金玉歲暮無凋變余松待爾心爾筠留我箭又荏苒積歲時契濶同遊處閶闔既趨朝承明還宴語上林陪羽獵甘泉侍清曙迎風舍暑氣飛雨凄寒序相顧惜光陰留情共延佇又滔滔彼江漢實為南國紀作牧求明德若人應斯美高臥未褰帷飛聲已千里還望白雲天日暮秋風起峴山君儻遊淚落應無已又漢陰政已成嶺表人猶蠧借寇北方新還珠總如故楚人結去思越俗歌來暮陽烏尚歸飛别鶴還回顧君見南枝巢應思北風路北風吹故林秋聲不可聽雁飛窮海寒鶴唳霜臯淨含毫心未傳聞音路猶敻唯有孤城月徘徊獨臨映弔影余自憐安知我疲病又養病願歸閒居榮在知足棲遲茂陵下優游滄海曲古人情可見今人遵路躅荒居接野窮心物俱非俗桂樹方叢生山幽竟何欲又所欲棲一枝禀分豐諸已園樹避鳴蟬山梁遇時雉野陰冒叢灌幽氣含蘭芷悲哉暮秋别春草復萋矣鳴琴久不聞屬聽空流水又秋水魚遊日春樹鳥鳴時濠梁莫共往幽谷有相思千里悲無駕一見杳難期山阿散瓊蘂庭樹下丹滋物華不相待遲暮有餘悲又銜杯向南浦寒色黯沈沈風起洞庭險煙生雲夢深獨飛時慕侶寡和乍孤音木落悲時暮時暮感離心離心多苦調詎假雍門琴唐韓愈作柳宗元墓志略云初子厚自柳州召至京師而復為刺史也中山劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將拜疏願以柳易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕恱酒食遊戲相徴逐詡詡彊笑語以相取下握手出肝肺相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髮比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也此宜禽獸夷狄所不忍為而其人自視以為得計聞子厚之風亦可以少愧矣桐梓縣華陽國志夜郎郡古夜郎國也屬縣二千戶治夜郎縣有遁水通廣鬱林有竹王三郎祠甚靈響劉敬叔異苑云漢武帝時夜郎竹王神者名興初有女子浣於豚水見三節大竹流入足間推之不去聞其中有號聲持破之得一男兒及長有才武遂雄夷獠氏自立為夜郎侯以竹為姓所破之竹棄於野即生成林王嘗與從人止石上命作羹從人曰無水王以劒擊石泉便湧出今竹王水及破竹成林並存後漢使唐䝉開牂柯郡斬竹王首夷獠咸訴以竹王非血氣所生甚重之求為立後太守吳霸以聞帝封三子為侯死配食父廟今夜郎縣有竹王三郎祠是其神也本志云夜郎里有竹王洞是其故處九州要記云夜郎自古非臣服州郡之地昔漢武帝開拓南邉始置夜郎縣後漢書曰夜郎者臨牂柯江江廣百餘步足以行船唐䝉發巴蜀卒治道自僰道抵牂柯江即此地十三州志云牂柯者江中山名晉永嘉二年分牂柯置夜郎郡兼置充州寰宇記唐武德二年以梓橦縣為充州開元十五年改為夜郎縣又云充州故夜郎侯邑牂柯都尉居之南中八郡悉夜郎之西陲也其屬縣有梓橦思王思渝底水按梓橦即今之桐梓縣矣志云編户夜郎里中有李太白故宅白坐永王璘之禍南流于此按蔡寬夫詩話云太白之從永王璘世頗疑之唐書載其事甚略亦不為明辨其是否獨其詩自序云半夜水軍來潯陽滿旌㫋空名適自誤迫脅上樓船從賜五百金棄之若浮煙辭官不受賞翻謫夜郎邉以此觀之則太白豈從人亂者哉太白集有流夜郎題葵葉云慚君能衛足歎我遠移根白日如分照還歸守故園其流夜郎聞酺不預詩云北闕聖人歌太康南冠君子竄遐荒漢酺聞奏鈞天樂願得風吹到夜郎寄內詩云夜郎天外怨離居明月樓中音信疏北雁春歸看欲盡南來不得豫章書流夜郎贈辛判官云昔在長安醉花栁五侯七貴同杯酒氣岸遙凌豪士前風流肯落他人後夫子紅顔我少年章臺走馬著金鞭文章獻納麒麟殿歌舞淹留玳瑁筵與君自謂長如此寧知草動風塵起函谷忽驚胡馬來秦宫桃李向胡開我愁遠謫夜郎去何日金雞放赦回寄韋南陵氷云胡驕馬驚塵沙起蕃兒飲馬天津水君為張掖近酒泉我竄三巴九千里天地再新法令寬夜郎遷客帶霜寒西憶故人不可見東風吹夢到長安竄夜郎憶秋浦桃花舊遊云桃花春水生白石今出沒搖蕩女蘿枝半挂青天月不知舊行徑初拳幾枝蕨三載夜郎還於兹煉金骨又夜郎承恩放還兼欣克復京師示息秀才云黃口為人羅白龍乃魚服得罪豈怨天以愚陷網目鯨鯢未剪滅豺狼屢翻復悲作楚地囚何日秦庭哭遭逢二明主前後兩遷逐去國愁夜郎投身竄荒谷半道雪屯䝉曠如鳥出籠遙欣克復美光武安可同天子巡劒閣儲皇守扶風揚袂正北辰開襟攬羣雄胡兵出月窟雷破關之東左掃因右拂旋收洛陽宫回輿入咸京席卷六合通叱咤開帝業手成天地功大駕還長安兩日忽在中一朝讓寶位劒舄傳無窮愧無秋毫力誰念矍鑠翁弋者何所慕高飛仰冥鴻棄劒學丹砂臨爐雙玉童寄言息夫子歲晚陟方蓬唐李嘉祐送上官侍御詩莫問黔中路令人到欲迷水聲巫峽裏山色夜郎西張籍送蠻客詩借問炎州客天南幾萬程江連惡溪路山繞夜郎城按志夜郎城在桐梓驛二十里有碑坊字已剝蝕明楊慎元夕桐梓驛詩云載石孤峯古驛門清羌吹笛報黃昏三家村裏無燈火千樹梅花作上元夜郎曲云夜郎城桐梓源東堞壘平村民如野鹿猶說翰林名夜郎溪槃木陰中半景西漁舟投樹宿水鳥繞花啼夜郎歌漢宫曾取教秦娥竹枝傳窈紏楊栁轉猗儺志云夜郎里有廢扶歡縣址按寰宇記扶歡縣唐貞觀十七年與榮懿縣同置以縣東扶歡山為名也屬溱州唐書貶韓偓為榮懿尉即此地又有廢溱溪郡按寰宇記溱州土地所屬與夷州同亦貞觀十七年置天寶元年改為溱溪郡志又有廢鼎山縣在治西十里不知何代設城壘猶存仁懷縣寰宇記云芙蓉縣唐貞觀五年置屬􅣵州尋屬牢州十六年牢州廢改屬夷州又改屬播州初置在芙蓉山上後移於縣東南三里之芙蓉江側此芙蓉縣之所由名也寰宇記又云仁水在縣西南一里東南流注􅣵水志云仁水在宣慰司東南五十里此仁懷縣之所由名也圖經云廢舍月縣在州東南九十里唐貞觀九年於縣理置高山縣旋改為舍月縣以界內舍月山為名涪陵江在其東九十里廢胡江縣在州東南四十里貞觀九年於縣置貢山縣旋改為胡江縣以界內胡江為名有巴水在其南三十四里廢羅為縣在縣西南二百里貞觀九年置􅣵施縣旋改為羅為縣以界內羅為水為名水源自縣西百里羅為山出流經縣南又東流至胡江入涪陵水也顯慶五年廢城址猶存廢胡刀縣在縣西南五十里貞觀九年置釋燕縣旋改為胡刀縣因胡刀以為名水在縣南一里東流合胡江開元二十六年廢真安州圖經云本夷州之境與黔思犬牙其地山溪竦秀岡巒連綿竹樹茂林千里不絶物産頗饒與渝之南川武隆彭水相接壤寰宇記云唐貞觀十七年廓闢邉夷置播川鎮後因其處有降珍山乃以鎮為珍州取山名也長安四年改舞州開元十三年又改鶴州十四年復為珍州宋乾德四年刺史田遷上言自給賜珍州郡名已來連遭火災乞改州名詔改為高州尋以嶺南有高州加西字元復為珍州僞夏明玉珍避諱因改為真州圖經云唐太宗開山洞始置珍州時并置夜郎麗皋樂源三縣寰宇記云其縣并在州側近或十里或二十里隨有畲田處為寄理移轉不定方輿云珍州有麗皋白崖思義安定壽山五堡官軍所駐也夜郎今桐梓縣樂源廢縣在治西六十里有樂道書院漢尹珍建又云尹珍以俗敦稼穡併建務本堂紀勝云珍州有東松西松豹子羅䝉四山按二松俱在州南三百二十五里豹子在州北八里山多産豹羅山在州西南三百里內唐志有羅䝉縣言此山高遠可瞰羅䝉也勝覽云三江者去州三十里即明溪又曰虎溪在州東十七里思溪在州西北百八十里出南平軍與明溪合又有貫珠溪按在今治西八十里源出虹轉山下屈曲會合三江矣志云楊六郎寓白鳩亭亭在古城其憩休處在三塊石足迹猶存按六郎宋太原楊業之子楊延昭也事跡不可考又云僞夏僭號其將江中立築城以守舊州城是也真州將鄭昌孫據石城抗之今南山寨是也宋兵初至昌孫執中立以獻命得世其地按平播之後真州始加安字州判官有鄭駱二姓鄭即昌孫後也駱氏未詳方輿勝覽云宋徽宗時大駱解上下族帥駱世華駱文貴等獻地立珍州亦曰樂源郡或即駱之始云綏陽縣寰宇記云夷州義泉郡理綏陽縣在漢為牂柯郡境厯代恃險不聞臣附隋大業七年始受招慰置綏陽縣屬明陽郡今寧夷縣西北八十里舊明陽郡是也唐武德四年罷郡置夷州於思州寧夷縣領夜郎神鳳豐樂綏養雞翁伏遠明陽高富寧夷思義丹川宣慈慈嶽十三縣六年廢雞翁縣貞觀元年廢夷州仍省夜郎神鳳豐樂三縣以伏遠明陽高富寧夷思義丹川六縣𨽻務州宣慈慈嶽二縣𨽻溪州綏養縣屬智州四年於黔州都上縣復置夷州六年復分置雞翁縣十一年以義州之綏陽黔州之高富二縣來屬其年又自都上縣移於今理領綏陽都上高富雞翁四縣十七年又以廢牢州義泉洋川二縣來屬天寶元年改為義泉郡乾元元年復為夷州按今貴州石阡府所轄多係夷州地以綏陽為舊理所故詳及之圖經綏陽縣有波利山在北二十里有安微水一名孤微水西自綏養故縣來東流經縣南八里又東入都上縣界涪江水在縣東十八里南流注安微水方輿云綏陽故城在今縣西三里貞觀十二年移於今理廢城存按縣志今綏陽又移治斤竹里在真州長官司西北二百五十里外志云縣北十里碧霄洞濶數十丈懸石嶙峋天成萬態如刻如畫又二十里有三張水即羅甘溪也其源出於古井每日辰午申三潮不爽焉古蹟考云趙家里之望魚樓旁有三撫墓按楊酋家廟碑三撫姓趙氏鄱陽人乾符初播有白龍太子之亂其父當寨團練使偕楊祖平之遂插草為標于杉木堂入籍而生三撫既長有神異讀書於趕水鎮嘗騎馬歸韉下拖砂石兩片今趙廟前上馬石是也刻有壬戍年等字墓存廟後二十丈許有隙可窺見其槨以鉤懸去地二尺許古蹟考云朗水里之溪源地有柳宗元書院按子厚以柳易播尚未得請不知何以有祠曰重其義也志云宋大觀初於綏陽縣置承州廢都上縣在其南二十五里廢義泉縣在西南百里廢洋川縣在西北百里寰宇記云都上縣隋置唐武德元年屬黔州貞觀四年置夷州縣為理所十一年州始移綏陽有涪水一名洑野水西元自綏陽縣界流入經縣西十四里又折西南流入費州雞翁縣界義泉縣本牂柯地隋大業十一年置初屬明陽郡唐武德二年改屬義州貞觀十一年於縣理置牢州十七年牢州廢縣屬夷州有支離水東北自廢綏養縣流入流經縣西又東南流入廢樂安縣界洋川縣亦牂柯地武德二年於縣東北七十里置屬義州貞觀元年改屬思州開元二十五年屬夷州有小水西南自廢高富縣流入東北經縣七十里又北入務川縣界寧夷縣舊屬思州開元二十五年屬夷州廢高富縣在今州東北百里隋大業七年於廢縣南三十里置屬明陽郡末年陷夷獠唐武德四年再置屬夷州貞觀元年改屬務州十年又改屬黔州十一年復屬夷州有小水在其縣南三十里東入寧夷縣界廢雞翁城在縣西南七十里武德四年置屬夷州有洑野水東自都上縣界流入經縣南三里又南入費州城樂縣界永徽後與高富縣同廢蜀中廣記卷二十
