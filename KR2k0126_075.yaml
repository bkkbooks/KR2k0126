body:
  text: 蜀中廣記卷七十五明曹學佺撰神仙記第五川東道集仙傳云雲華夫人王母第二十三女太真王夫人之妹也名瑶姬受徊風混合萬景鍊神飛化之道嘗遊東海還過江上有巫山焉峰巖挺拔林壑幽麗巨石如壇留連久之時大禹理水駐山下大風卒至崖振谷隕不可制與夫人相值拜而求助即敕侍女授禹䇿召鬼神之圖書命其神狂章虞余黃魔大翳庚辰童律等助禹斬石疏波決塞導厄以循其流禹拜而謝焉禹嘗詣夫人崇巘之嶺顧盻之際化而為石或倐然飛騰散為輕雲或油然而止聚為夕雨或化遊龍或為翔鶴千態萬肰不可親也禹疑其狡獪怪誕非真仙也問諸童律童律曰天地之本者道也運道之用者聖也聖之品次真人仙人矣其有禀氣成真不修而得道者木公金母是也蓋二氣之祖宗陰陽之原本仙真之主宰造化之元先雲華夫人金母之女也昔師三元道君受上清寶經素書於紫清闕下為雲華上宫夫人主𤣥教童真之士理玉映之臺隱見變化蓋其常也亦由凝氣成真與道合體非寓胎禀化之形是西華少陰之氣也且氣之彌綸天地經營動植大包造化細入毫髮在人為人在物為物豈止於雲雨龍鶴飛鴻騰鳯哉禹然之復往詣焉忽見雲樓玉臺宫闕森然暨夫靈官侍衛不可名識師子抱關天馬啓塗毒龍電獸八威備軒夫人宴坐於瑶臺之上禹稽首問道召禹使坐而言曰夫聖世肇興剖太混之一朴散為億萬之體發大藴之一苞散為無窮之物故步三光而立乎晷景封九域而制乎邦國刻漏以分晝夜寒暑以成嵗紀兊離以正方面山川以分陰陽城郭以聚人民器械以衛衆志章服以表貴賤禾黍以備凶歉凡此之制上禀乎星辰而取法乎神真下以養於有形之物物也是故日月有幽明生殺有寒暑雷電有出入之期風雨有動靜之常類氣浮乎上而衆精散於下廢興之數治亂之運賢愚之質善惡之性剛柔之氣壽夭之命貴賤之位尊卑之敘吉凶之感窮達之期凡此者禀之於道懸之於天而聖人為之紀也性發乎天而命成乎人立之者天行之者道道存則有道去則無非道而物不可存也非修而道不可致也𤣥老有言致虛極守靜篤萬物將自復復謂歸於道而常存也道之用也變化萬端而不失其一是故天參𤣥𤣥地參混黃人參道德去此之外非道也哉長久之要者天保其𤣥地守其物人養其氣所以全也則我命在我非天地殺之鬼神害之失道而自逝也志乎哉勤乎哉子之功及於物矣勤逮於民矣善格乎天矣而未聞至道之要也吾昔於紫清之闕受書寶而勤之我師三元道君曰上真內經天真所寶封之金臺佩入太微則雲輪上征神武抱關振衣瑶房遨宴希林長招仙公右栖白山而下盻太空泛乎天津則乘雲騁龍遊此名山則真人詣房萬神奉衛山精伺迎動遊八景玉輪靜則宴處金堂亦謂之太上玉珮金璫之妙文也汝將欲越巨海而無飊輪渡飛砂而無雲軒陟厄塗而無所輿涉泥波而無所乘陸則困於逺絶水則懼於漂淪將何以遵百谷而濬萬川也危乎悠哉太上愍汝之志亦將授以靈寶真文陸䇿虎豹水制蛟龍斬馘千邪檢馭羣凶以成汝之功也其在乎陽明之天耶吾所受寶書亦可以出入水火嘯咤幽冥收束虎豹呼召六丁隱淪八地顛倒五星久視存身與天相傾也因命侍女陵容華出丹玉之笈開上清寶文以授禹拜受而去又得庚辰虞余之助遂能導波決川以成其功奠五嶽别九州而天錫𤣥圭以為紫庭真人也其後楚大夫宋玉以其事言於襄王王不能訪道要以求長生築臺於高唐之館曰陽臺之宫以祀之宋玉作神女賦以寓情荒淫託詞蕪穢高真上仙豈可誣而降之耶有祠在山下世謂之大仙隔岸有神女之石即所化也復有石天尊神女壇壇側有竹垂枝若篲有槁葉因風落壇上竹則因風掃之終嵗瑩潔不為所汚楚人世祀焉咸通末嵗今翰林舍人蘭陵蕭公遘自右史竄黔南秋八月二十七日泝三峽次秭歸時蜀水方漲橫濤蔽目公積悸而寢夢神人赤髮碧眸且云險不足懼公異之再寐又夢公詰其所自則曰我黃魔神也居紫極宫之西北隅將祐助明公出於北境公曰吾斥去荒徼危殆末已神能惠祐之或以朝夕期幸與吾俱遊息吾不敢忘亟言之神許諾自是抵於黔又遷於羅每陟險艱神恍如在洎公遷於朝神夢告歸公曰將設廟列塑於宫之傍丁酉嵗公從弟兟自灃陽尹亞西蜀路出祠下以囊金致公意謂前制不專請别修敬太守清河公承命感異親營之心匠既陳層軒以新神樂來斯靈儀蹲蹲按靈寶經南方有大魔其中央曰黃天魔王橫天擔力謂能力扶昊蒼周覆萬有天其或者以公有𢎞濟之業將扶危定傾作鎮天步俾黃魔降鑒為公之兆朕乎噫天為功必藉於大賢神之靈固輔於有德是必有鴻猷盛績萃於公之身未可知也循以學官謫秭歸奉太守命弗敢讓所記乾符丁酉嵗仲春九日司户參軍袁循記按黃魔神即雲華夫人之使也故得附見真誥云秦時有巴陵侯姜叔茂者來往句曲山下種五果并五辛菜今名此地為姜巴注云秦時未置巴陵縣此是巴蜀之巴也後漢王逺字方平東海人舉孝廉除郎中明天文圖䜟學桓帝問以灾祥題宫門四百餘字帝令人削之墨入板裏後去官隱去魏青龍初飛升於平都山見廣成先生神仙傳按平都山今之酆都縣也又新都志方平常採藥於縣之真多山有題名云王方平採藥此山童子歌玉爐三澗雪信宿乃行獨角者巴郡人也年可數百嵗俗失其名頂上生一角故謂之獨角或忽去積載或纍旬不語及有所說則㫖趣精微莫能測焉所居獨以德化亦頗有訓導一日與家辭因入舍前江中變為鯉魚角尚在首後時時暫還容狀如平生與子孫飲宴數日輒去按渝州圖經仙池在州西南江津縣界岷江南岸其池周回二里水深八尺流入岷江古老傳聞有仙人姓然名獨角自揚州來居此池邊起樓聚香草置樓下獨角忽登樓命僕自下起火乃飛空而去因名仙池見有石巖一所向岷江西面在司馬紫微集七十二福地第四十五平都山在忠州是陰真君上升之處雲笈七籖云陰長生者新野人漢和帝永元八年三月己丑立皇后陰氏即長生之曽孫也少處富貴之門而不好榮位潛居隱身專務道術延光末聞有馬明生得度世之道入諸名山求之到南陽太和山中得與相見乃執奴僕之役親運履舄之勞明生但與之高談榮華當世之事治生園圃之業十餘年長生未嘗懈怠同時有共事明生者十二人皆怨恚歸去獨長生禮敬彌肅而明生數因言語得失之際屢罵之長生乃和顔悅心奉謝不及如此積二十年後清閒之日明生問其所欲長生跽曰惟乞生爾今以糞草之身委質天匠不敢有所汲汲憚於遲速也明生哀其語乃告之曰子真能得道者也乃將長生入青城山中煮黃土為金以示之立壇㰱血即日以太清金液神丹授之欲别去長生乃叩頭陳謝暫留仙駕拜辭曰弟子少長豪樂希執卑遜刻身勵已若臨冰谷不能𢎞道讃德宣暢妙味徒尸素壁立而老耄及之是以心存生契捨世尋真天賜嘉㑹有幸遭遇自執箕帚二十二年常懼毁替恩養不酬夙夜感慨告以更生頓受靈祕是將灰朽質蒙延續之年炎林燋草惠膏澤之霑若絶氣獲其蘇息瞽暗開其視聽感荷殊戴非陋詞所謝昔太嵗庚辰聞先生與南嶽真人洪崖公雲成公瀛洲仙女數人共坐論傳授當委絹之誓有交帶之盟應祭九老仙都九氣丈人諸君禱祠授之大藥乃靈不祭而受為之不成弟子預在曲室嘗侍帷側亦具聞諸仙起末得道之言說昔受丹節度矣先生今日見諭不復陳此或非先生所受之不盡將恐是弟子困窮爾馬明生慰諭之曰非有不盡汝性耽𤣥味專氣而和靈官幽鑒已久相察不復煩委為俗人之信耳於是長生入武當山石室中合丹但服半劑不即升天而大作黃金數萬斤以布施天下窮之不問識與不識周行天下與妻息相隨舉門皆壽後委之入平都山白日升天其臨去作詩二篇書九篇詩曰維余之先佐命唐虞爰逮漢世紫艾重紆豫獨好道而為匹夫高尚其志不事王侯貪生得生亦又何求超迹蒼霄乘飛駕浮青要乘翼與我為仇入火不灼蹈波不濡逍遙太極何憂何慮遨戲仙都顧閔羣愚年命之逝如彼波流奄忽未幾泥土為儔馳走索死不肯暫休豫之聖師體道知真升騰變化松喬為鄰又云維豫同學一十三人寒苦求道厯三十年中多怠惰志放六經辟世自匿二十餘年名山之側寒不遑衣飢不暇食思不敢息奉事聖師承顔悅色面垢足胝乃見哀識遂傳要訣恩深不測妻子延年咸享無極黃白已成貨行不慳痛乎諸子命也自天天不妄授道不缺歸賢勤加精研勿投幽壤何時可還嗟爾流俗富貴所牽神丹一成乘彼九天壽同三光何但億千又維豫垂髮少好道德棄家隨師東西千億役使鬼神玉女侍側豫得度世神丹之力黃庭堅題其後云忠州平都山仙都觀朝金殿西壁有天成四年人書陰真君詩三章余同年許少張以為真漢人文章也余考之信然因試筆偶得佳紙為鈔此詩與王瀘州補之季子觀陰君所學守尸法耳猶須擇師勤苦如是乃能得之何況千載之後尚友古人求知道德之真宰者乎陰仙自序其書略曰上古仙者多矣不可具記而論但漢興已來高士得仙者四十五人逮豫為六矣二十人見尸解去餘者白日升天焉弟子丹陽葛洪曰諺言不夜行則不知道上有夜行人今不得仙者亦安知天下山林間密自有學道得仙者耶陰君已服神藥雖未升天然方以類聚同聲相應便自與仙人相尋求聞見故知此近世諸仙人之數爾而俗人謂為不然已所不聞則謂之無有不亦悲哉夫草澤閒士以隱逸得志經籍自娛不耀文彩不揚名聲不修求友不營聞達猶不能識之又況仙人亦何急令朝菌之徒知其所云為哉按仙都山陰君洞驗記云君將欲升天謂門人劉𤣥逺曰此山孤峙勢若龍蟠其首東向必當吐雲送我言訖有五色雲從地湧出乘雲升天出雲之處呀成洞穴水旱祈禱立有感通大厯九年七月十五日邑人宇文萬年女人阿仵等一十五人以元節之晨奉香花於洞門禮拜忽見洞中波濤湧溢出一金手一玉手其大如扇良久乃隱水波亦不復見長慶元年江陵人傅緗聞洞中雷吼之聲咸通初道士王芳芝聞洞中聲如羣烏飛異香紛郁遍於山頂鄉人常以之占嵗鶴翔必致於年豐鹿鳴必致於嵗歉不棲凡鳥每有二烏廣明辛丑嵗刺史陳侊修置道場有祥雲天樂之應甘露泫於叢林寵詔褒美中和甲辰年賜紫大德曹用言准詔齊醮有卿雲瑞雪之祥時既畢黃録道場未撤門纂有神人見曰雲山齊醮必命神祗主張我即近廟之神差衛壇壝齊功既畢門纂未移我不敢輒還本廟道衆聞言覩異遽折門纂其神見形愧謝而去列仙傳䢴子者蜀人也好畋獵知相犬犬走入山穴中䢴子隨入十餘宿行度數百里乃至一山上有臺殿宫府松柏森然仙吏侍衛甚嚴見故婦主洗魚與邗符一函使還與成都令橋君君發函有魚子也著池中養之一年皆為龍邗復送符還山上其犬色更赤有長翰常隨䢴往來百餘年遂留止山上時下來護其宗族蜀人立祠穴口常有鼓吹傳呼聲西南數十里共奉祠焉按道籥記昔蜀䢴子已成丹不能出神有仙童來告曰月生之月君之親族猶有不禁者陰德未逺故遲君成仙期耳䢴子於是家書一紙與之明年蜀大疫䢴子親族無一人染者豫考緝栁編所載雞生於寅正月食雞者奪算豕生於卯鴨生於辰魚生於已蟺生於午蝦生於未鱉生於申鵝生於酉犬生於戌蟹生於亥羊生於子牛生於丑當其月食之俱不利此即仙童月生之說也華陽國志巴郡名山有石書䢴山即䢴仙逐犬處也華陽國志江州郡塗山有禹廟及塗后祠祠北水有銘書祠云漢犍為張君為太守忽得仙道從此升渡今民曰張府君祠涉正者字𤣥真巴東人也說秦始皇時事了了似及見漢末從數十弟子入吳而正常閉目雖行猶不開弟子隨之數十年莫有見其開目者有一弟子固請之正乃為開目目開有聲如霹靂而光如電照於室宇弟子皆不覺頓躓良久乃能起正已復還閉目正道成莫見其所服食施行而授諸弟子皆以行氣房室及服石腦小丹云李八百呼正為四百嵗兒萬縣志云楊卓者魏文帝時人居木櫪山修煉山有池水色如乳卓飲之上升一云卓菴道人在西山絶塵龕上修道蛻去有巨人鎖子骨在焉梁山蟠龍洞碑云張卞者為蜀先主將因諫先主伐吳不聽入山遇樵叟自稱鴟夷人授以丹訣修煉洞穴莫知所終晉杜蘭香别傳曰杜蘭香自稱南陽人以建興四年春數詣張傳傳年十七望見鈿車在門外婢通言阿母所生遣授配君君何不敬從傳先改名碩碩呼女前視可十八九說事邈然久逺其婢子二人大者萱支小者松支鈿車青牛上飲食皆備作詩曰阿母處靈嶽時遊雲霄祭衆女侍羽儀不出墉宫外飄輪送我來豈復恥塵穢從我與福俱嫌我與禍㑹至其年八月旦復來作詩曰逍遙雲霧開呼吸發九嶷流沙不稽路弱水何不之出薯蕷子三枚大如雞子云食此令君不畏風波辟寒溫碩食二欲留一不肯令碩盡食言本為君作妻情無曠逺以年命未合小乖太嵗東方卯當還求君征途記曰張碩與杜蘭香相别後於巴縣見一青衣云蘭香在白帝君所若聞白帝野寺鐘聲隨風而來則蘭香亦隨風而至際夜果聞鐘聲蘭香亦至焉重慶志云徐神翁者常居樂溫之北真觀相傳神翁於此飛升去今觀之右有飛仙臺仙人跡尚存後人有仙翁去後留蹤跡丹灶沉沉鎖翠烟之句題咏甚多宋岑象萬州虛鑒真人岑公洞記云周文王異母弟耀之子渠成王封諸岑古梁國岑亭是也漢魏而下𨽻南陽棘陽縣今唐州胡陽西北四十里有棘陽城蓋岑世家於此黨錮起公避地鹽官又為鹽官人其後去梁居江陵隋末天下亂公泝江逃難至南浦愛龕巖遂止其下片衣粒米悉無所營晏坐凡二十年兀然逝去郡人慕之塑像龕間世世奉侍無懈唐獨孤霖段文昌皆為文記公之德熙寧十年夏五月大旱靡神不舉久靳膏澤守臣詣公懇禱即日雨大霔一境霑足部刺史表其事天子嘉之優詔賁飾贈公虛鑒真人公之道遂大昭著竊原公去世餘六百嵗名迹幾泯一旦神靈顯發稱謂與莊老文列等其故何也請以宗姓言之光武起宛葉征南以才武奮兵行如神所向無不風靡位參四七之列梁武苦於奉佛寶唱以術業敷揚祕典首載僧史東晉僧猛以孤節卓行冠比邱尼唐太宗經營洪業中令景仁以清材奧識為房杜亞夫或迹耀清簡或名標寶藏皆事暴一時譽高當世岑公趣向惟清虛靜默未嘗有一言垂後寂滅已久而隱德升聞膺此褒録聲實暴白與嶺雲江月輝映三峽品目高逺逮非偶然蓋征南以功唱以學猛以行中令以才而公以道修藴涵蓄深淺不同故其報有崇卑久近之異無足怪也郡守蓋君休璟謂豫忝預末𣲖使來求文故為述其由來繫以贊云虛造冲漠兮鑒察幽隱秉德既然兮錫號惟允靜無所營兮動無所藴稽神靈之顯發兮庸詎非道力之强睯公居此巖二十年兮萬人奉公也甚莊公去此巖二十世兮萬人思公兮未央孤雲投壑兮謂公之袂落霞垂岫兮想公之裳公乎曷歸兮儼遺像於岩房望崆峒之遼邈兮謾傳廣成之修煉顧石室之依然兮深悵赤松之弗見念餘𣲖涓涓其不泯兮振起奚望於孤生惟真迹之綿綿兮無預海田之變元符元年六月三日朝請大夫知襄州軍州兼管內勸農事兼提舉房隨郢州兵馬巡檢公事柱國借紫岑象象求撰按蜀志補遺云岑公洞在萬縣隋末岑道願尸解於此陸游詩大業征遼發閭左軍興書檄煎膏火此時也復有閒人自引岩泉拾山果黃姑者唐貞觀家於萬嵗縣古城東五里白馬渡南岸乃黃道士之女也因洗菜江干見青衣數童子持青旄白馬揖請攬轡者數姑却歸語其嫂嫂異之翌日姑嫂偕至舊所童馬亦然嫂曰試諸姑方攬轡上馬即登天而去俄頃五色雲氣結於東山郡人皆知遂號東山曰神仙山唐太常卿吉於渠為守作小姑步虛詞十九篇唐閭邱師姓杜氏開元中居銅梁山得𤣥修靜養之術山上有洞深丈餘內有石床可坐十餘人傍有石室丹臺靈泉邱寓此十餘年訪其所善蓬州太守於公署越三日告還行十餘里不見惟有笠蓑懸樹是日已在銅梁山矣尋脫化去今石室丹臺棊局石磴尚存宋周茂叔程伊川及眉州三蘇相繼遊之多題咏唐女冠范志𤣥天寶間修煉於合州北之純陽山時朝使任安至慕其姿容命盧姓者通好志𤣥不從任君怒欲焚其廬陽許之擇日具禮親迎至山麓至𤣥化為男子騰雲而去人追至十餘里外望入雲門不及而還按宋劉儀鳯詩云誰家游冶郎門首窺香闥但見臉如花不知心似鐵一夕變其軀雪質映紺髮昔為桃李花今作松篁節韋昉蜀人嘗夜渡涪江忽遇龍女遣騎迎入宫後昉登第知簡州罷歸日龍女復遺書相迎勑命昉充北海水仙見景煥閒話紫房真人世傳壁山人未詳其名氏唐時隱居茅來山得𤣥修之術後遊方外莫知所終今茅來恭天觀之側有恭天洞存按重慶志云趙延之大厯中為巴州令時資瀘夷冦掠縣境延之率民兵襲破之以功授合州刺史兼渝合資瀘經略安撫使其後挈家入茅來山恭天洞修煉今銅梁縣西有望仙橋志言土人於此望延之仙去也一說延之死為壁山神今廟在巴縣重壁山宋時封感烈侯而壁山縣靈壁廟亦祀之仙傳拾遺云翟乾祐雲安人也龎眉廣顙巨目方頥嘗於黃鶴山師事來天師盡得其道能行氣丹篆陸制虎豹水伏蛟龍雲安井自大江泝别𣲖凡三十里近井十五里澄清如鏡舟楫無虞近江十五里皆灘石險惡難於沿泝乾祐念商旅之勞於漢城江上結壇考召逺近犀龍凡一十四處皆化老人應召而至乾祐諭以鴻浪之險害物勞人使皆平之一夕之間風雷震擊十餘里盡為平潭矣唯一灘仍舊龍亦不至乾祐復嚴敕神吏追之又三日有一女子至焉因責其不服應召之意女子曰某所以不來者欲助天師廣濟物之功耳且富商大賈力皆有餘而傭日負運者力皆不足雲安之貧民自江口負財貨至於井潭以給衣食者衆矣今若輕舟利涉平坦無虞則邑之貧民無傭負之所絶衣食之路所困者多矣所以不至者理在此也乾祐善其言因使諸龍各復其故風雷頃刻而長灘如舊唐天寶中詔赴上京恩遇隆厚嵗餘還故山尋得道而去按酉陽雜爼云翟天師峽中人長六尺手大尺餘每揖人手過胸前卧常虛枕晚年往往言將來事常入䕫州市大言曰今夕當有八人過此可善待之人不知悟其夜火焚數百家八人乃火字也每入山虎羣隨之曽於江岸與弟子數十玩月或曰此中竟何有翟笑曰可隨吾指觀弟子中兩人見月規半天瓊樓金闕滿焉數息間不復見又按唐韋德融雲安洞靈觀翟天師記天師姓翟名法言字乾祐䕫州雲安西縣玉石鄉人也本命乙卯生於有唐開元三年少好𤣥門性親道藝茹清素不食五辛住山院而齊潔焚修逺世寶而纎塵不染天寶十四載乙未嵗年四十一矣四月七日夜因溪水泛漲柴木併流雨歇多時爽然晴朗法言夢見䨥童來報曰二真人傳語三洞來日辰巳間可來溪畔相尋自有靈丹祕籙相奉事須在留意無使過日言訖天師驚覺猶見童形驚嘆不已乃獨擕一斧尋溪求薪二真人已在溪側石盤上東西而坐對碁同喚曰法言來也西坐仙語東坐請分付法言祕籙東坐答曰時未至法言稽首設禮次二真人拂袖而起曰汝但來雲升宫相趂傳汝三般祕籙俄頃雲霧冥晦忽然不見後三召而役使乃賜藥一貼內有一百二十餘丸以一小合盛之云此藥每遇正旦以酒服一丸可如數壽命又於石盤上新畫碁盤處遺一黑二白碁子三枚須㬰二真騰空而去法言遂歸本家香湯沐浴尋時便赴雲升朝禮尊像只聞房內有人談經之聲稱云法言已來可付祕章也法言設禮畢二真人云此山西池有五龍居之仰領肘後召祕章一冊計百二十通缺法言既得二物再拜禮謝二真人語之曰吾亦非妄要傳子緣汝名標仙籍近檢靈異經記分明具載汝但服食此藥更能修真煉氣即可上朝諸天真君有間大須努力又當普濟貧乏是為妙行既而曰弟子可歸他日有請即來也勉志修煉於是法言獨於殿內開覽所得祕章三科一是三將軍祕術二是紫虛祕術三是太上正一明威畢法其內各有醮煉科儀兼題云法言得此祕籙便當捨棄俗宅别建淨宅潔志修行方與道契於是遂置一小院居玉石村側依所注科儀七祭七煉感二真人與日月星辰夜降其户從此道行驅役鬼神護民救世至慶德三年乙巳嵗荆南節度使王玘親至雲安傳授祕籙乃令縣司立小壇并所指館舍斯觀是焉先是雲安鑿五井成衆迎天師作頌誓其水曰雲升五龍付吾管領分之一龍治此一井雖有大江清濁無定衆所共需龍宜護淨用善一方天地同永誓訖特召一龍專治觀前之井故其水甘冷異常一境之人賴焉初王玘以十月朔日半夜升壇拜受天師祕法是夕感太宗皇帝夢荆南節度使王玘將三神人周遊天下其明日特差中使馬承靜急徵王玘歸闕問以所夢之因玘奏言臣近屬之內䕫州西縣有𤣥士姓翟名法言善三將軍祕籙臣要保命是夜傳度斯法非敢他謀帝嘆其神仍賜玘錢一百貫綾絹各二十匹又頒手詔曰朕為六甲殿門失去金鑰纍令冶工開之不得緣內有金箱玉簡其殿宇係七寶合成不欲毁損卿既稱管內道士翟法言藝術孤高可為朕遣至以術開之也玘既准敕命與監押使胡匡祚馳歸差人船就雲安軍迎天師到荆南與前同行赴闕法言既登塗感長安土地神差鬼使以朱鬛白馬至七日程逺迎天師將至敕㫖令道侣郊候歸大內安下是日朝見畢乃賜坐帝問曰朕為六甲殿門不開已是二百餘年道人可開得否奏曰此是小事不難於是以酒噀殿門廓開其日金箱玉簡俱現函上有一篆是金縷書之題云此殿遇翟者開帝大悅賜號通虛天師及頒章服旬日後辭歸䕫駕禮餞郊外天師復奏曰伏見殿內有少微灾請以炭萬斤燒赤於殿上作河置炭其中令后妃太子俱渡河可禳也後如法禳有驗是日京城佩章服大師皆隨駕祖餞天師以所將淨巾放在御食案上諸大師曰翟法言是巴峽小師擅將淨巾放在御食案事當不敬乞陛下裁決法言曰𤣥門之內法高為先若今日對御諸大師能捻得法言淨巾起即當北面禮大師或捻之不起則當為法言弟子帝乃令諸大師揭其淨巾若粘在案併力揭之不得法言自揭應手而起諸國師奉帝命禮法言為師次各粘在本坐處起身不得默而不言帝乃大笑謂天師曰如何法言奏曰令起不難略與諸大師小戲耳乃喝令起諸大師始起立遂皆跪禮天師願為弟子既離長安止三日到荊南玘復馳奏之乃敕加通天大師之號修傳籙之壇永為陰陽靈山之瑞也方天師在京日慈母何氏為虎所傷既歸至雲安乃親詣雲升西北大歇堂傍是母被傷處結壇三晝夜行符布召殺母之虎是夜土地神領虎而至白天師曰母何氏宿生合管八難之數去年十二月九日奉閻羅王敕命令獸來畢師母之命非敢自專天師曰我母既係八難奉天符而殺只合過命豈得便食其肉據此合有罪無遂以鐵鞭決虎數十放去其地因名伏虎岡焉自後天師專以救民為務行符籙而除疫癘煉黃白以施貧家大和七年癸丑嵗十二月一日召衆弟子謂曰將取今月五日升遐朝謁諸天真君可與法言疊一石墳拜造方棺一具上蓋一片帳應曰諾師仍留下水符一百二十道令貼在身者可壽一百二十也至日沐浴了處分但於五日指揮及不得閉蓋墓門一日三時須得揭棺看吾顔色於是弟子冉善之等一依天師囑付葬送未逾一日至黃昏時忽聞半天有鐘鐸聲喧闐宣祭拜見五色之雲繚繞天際師在其上語弟子曰汝等修煉至道宜在勉旃言畢而沒不復可見遂往墳內揭棺視之止遺所著履一隻墳今在觀之東北焉天師既謝世經一十二年有舊識李文盛往西川見天師於市肆中置酒共話宛然如故云吾暫往青城飄然而去德融學雖淺薄久附師顔一依目擊躬際緣由直書永以為記讃曰天師仙籍名標係方得真人來感契付度祕章三要科件件依收陳七祭日月真人同降户二物遺條明示誨因兹道法轉孤高逺近居人皆頂戴立壇傳法授王臣夢感聖君人警戒徵書直入內宫中百辟迎逢加禮待一噀六甲殿門開并渡炭河消怪害金箱玉簡顯然逢兼有篆文明所載蒙恩賜紫號通靈頒及章衣親禮拜辭天命駕返䕫門聖主躬親送郊外不逾三日到荆南奏上方知促地界重加帝澤號通天法藝精金誰可㑹忽然鐘鐸逺來迎獨步綵雲朝上帝酉陽雜爼有道士佯狂俗號為灰袋翟天師晚年弟子也翟每戒其徒勿欺此人吾所不及嘗大雪中衣布褐入青城山暮投蘭若求僧寄宿僧曰貧僧一衲而已天寒如此恐不能相活但言容一牀足矣至夜半雪深風起僧慮道者已死就視之去牀數尺氣蒸如炊流汗袒寢僧始敬異天未明不辭而去多住村落不逾信宿曽病口瘡不食數月狀若將死人素神之因為設道場齊散忽起就謂衆人曰試窺吾口中有何物也乃張口如箕五藏悉露同類驚異作禮問之唯曰此足惡此足惡後不知所終北夢瑣言唐乾寧中雲安縣漢城宫道士揚雲外常以酒自晦行止異常前進士錢若愚甚敬之一旦薰沐詣其山觀宿於道齊翌日䖍誠斂衽而白之曰師丈小子凡鄙神仙之事雖聆其說果有之乎楊曰有之我即其人也尋示以飛空躡虛履水蹈火之術於是郡日千萬人來就看因騰躍上升冉冉在空中良久而下若愚稽顙自是信有神仙事按唐商真君飛升記雲安風俗淳厚陶染真風如瞿法言楊雲外之徒繼出故琳宫祕館獨盛它處唐姚道真合州石照人捨家得道俗謂之姚仙自言咸通末從吕洞賔往來傾藥十二丸授之得仙也五代史補云爾朱先生忘其名蜀人也功行甚至遇異人與藥一丸先生欲服異人曰今若服必死未若見浮石而後服之則仙道成矣先生如其教自是每遇石必投之水欲其浮如此者殆一紀人皆以為狂或聚而笑之而先生之心愈堅居無何因遊峽上將渡江有叟艤舟相待先生異之且問曰叟何姓氏對曰石氏此地何所答曰涪州先生豁然悟曰異人浮石之言斯其應乎遂服前藥即輕舉矣按李石續博物志爾朱先生僞蜀廣政中飲酒食猪臟渝川刺史謂其幻惑以竹籠沉之江至䕫為漁人所得上升又按張商英爾朱仙傳先生名通微自號歸元子一日遍遊成都新都廣都間至暮仍還丹室有日遊三都夜宿金雞之諺東坡志林云爾朱道士客涪州愛其所産丹砂雖瑣細而皆矢鏃狀瑩徹不雜土石遂止煉丹數年竟於涪之白石仙去北夢瑣言僞蜀時巫山高唐觀道士黃萬户本巴東萬户村民學白虎七變術又云學六丁法於道士張君常持一鐵鞭療疾不以財物介懷然好與鄉人爭訟州縣不知重也戎州刺史文思輅亦有戲術曽翦紙魚投於盆內而活萬數復授符化獺而食之其鐵鞭為文思輅收取歸至涪州亡其鞭而却歸黃矣有楊希古來傳其術坐未安忽云子家中已有喪穢不果傳俄得家訃母亡又蜀王建召入宫列諸子示之俾認儲后萬户乃指後主其術他皆倣此唯一女為巫山民妻有男傳授祕訣將卒戒家人勿殮經七八日再活不久即殞也青城縣舊有馬和尚宴坐三十五年道德甚高萬户將卒謂家人曰青城馬和尚來遂長逝矣是年馬師亦遷化録異記云黃萬祜者修道於黔南無人之境纍世常在每三二十年一出成都賣藥言人災福無不神驗蜀王建迎入宫盡禮事之問其服食皆袐而不言曰吾非神仙亦非服餌之士但虛心養氣仁其行鮮其過而已問其齒則曰吾只記夜郎侯王蜀之嵗蠶叢氏都郫之年時被請出爾後烏兔交馳花開木落竟不記其甲子矣忽一日南望嘉州曰犍為之地何其火炎請遣人赴之如其言使至嘉州市肆已為瓦礫矣後堅辭歸山建泣留不住問其後事皆不言既去於所居壁間題曰莫交牽動青猪足動即炎炎不可撲鷙獸不欲兩頭黃黃即其年天下哭智者不能詳之至乙亥年起師東取秦鳯諸州報捷之際宫內延火珍寶帑藏並為煨燼乃知太嵗乙亥是為青猪應焚爇之期也後三年嵗在戊寅土而建殂方知寅為鷙獸戊寅納音俱是土土黃色是以言鷙獸兩頭黃也按萬祜疑即萬户音同而事頗類録異記云䕫州道士王法𤣥舌大而長呼文字不甚典切常以為恨因發願讀道德經夢老君與剪其舌覺而言詞輕利精誦五千言頗有徵驗一本作王法朗未詳王帽仙不知何許人寓居涪州嘗出入闤闠為人修敝冠號王帽子暮則宿於天慶觀一夕尸解而去道士為葬之月餘自果山貽書來謝人始知為仙覃佺忠州人幼在洞真觀學道清苦得解悟年八十過倚天山仙洞之西見水渺語二童子曰此吾休息之所遂刻珉為室越二年擕友至室歌咏暢飲羽衣而化按倚天山在忠州東南六十里宋趙覺者未詳何許人修煉於合州之東山嘉祐中冲舉而去今山頂有飛龍觀石寶丹井井不盈尺常乾水可愈疾人欲取之以淨巾覆口默禱少頃水自滿又有禮斗臺今石上衣佩履跡見存酆都道士未詳何許人元大德戊戌棲隱雪峰山嵗乙卯召集道友曰吾化矣大道坦然皎如日月雖由人𢎞豈隨人往諸生宜遵道而行毋令半途而廢偈曰朴庵寄住有年東西南北依然裏面渾無一物只有𤣥文數篇今日草茅朽腐須要改換棟椽眼底風波太惡不容久住山巔選得幽居去處和區移上六天端坐而逝蜀中廣記卷七十五
