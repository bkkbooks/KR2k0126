body:
  text: 蜀中廣記卷七十七明曹學佺撰神仙記第七附録道證雲笈七籖云昔有精進賢者夏日過蜀山栖息於古樹下嘆曰日已向中何由得食樹忽應聲當為賢者設供無憂也須臾出食食訖賢者謝曰不審大神可暫相見否答曰我昔為工匠役於道觀道人授我戒使日中食行之數年為婦所壞死去天罰我主本山千嵗樹精每至日中輒給食惟無緣遷去耳我姓名家居某所賢者過彼幸傳語家人建齋三日使此身脫離便得生天矣賢者如言訪至其家具告之他日復過樹見神曰承賢者傳信建齋某即得飛行景霄之上受署為散仙人矣言訖而隱靈驗記云隋室王謙以後周舊臣勳名素重恐禍及身遂據三蜀圖變文帝出師征之不克兵士多病死者相枕乃於內殿修黃籙道場祈天請祐三日夜夢神人降曰帝王上承天命下順人心天人合符然後有國今陛下革周立隋天所命也王謙一人之力安能敵四海乎帝曰克蜀弔民誠不獲已但主帥疾疫以此為憂爾神曰北人不堪瘴毒故多疾疫壇中法水可以救之即取禁水向西南噀曰雨至即愈無煩聖慮也子日進軍必克軍中奏某夜雷雨灑於營壘之上三軍皆蘇其後王謙傳首三蜀底寧果是子日矣玉局化西王母塑像多年因南詔薄城燒燬廊屋雖頽而儀像不損殆有靈焉居人范彥通者患風癩眉鬚漸落因入觀發願疾較損即竭力修裝是夕夢一玉女手執花盤以衣袖拂其身曰王母令我救汝覺而起數日之間瘡腫皆息眉鬚復生遂造紗窗裝金彩通簷兩楹煥然一新觀中有三將軍者亦古所塑居人閻士林卧疾月餘逮將不救夢三將軍以戟揮其身上穿一物去狀如黑犬自此疾愈乃捨衣物重加彩繢焉青城山丈人觀真君像冠蓋天之冠著朱光之袍佩三亭之印以主五嶽威制萬神開元中明皇感夢乃夾紵製像送至蜀中自天國山移觀於今所蓋取春秋祭祀去縣稍近也數十年來冠色宛如新製有村人無知以賦稅所迫徴促鞭箠一夕走投觀中齎三數錢神香抵觀燒爇告以其故乞真君頭冠賣以充稅因睡忽夢真君謂曰我頭冠非純金乃金箔耳賣無所直縱售亦為官中所責其禍不小山門廟前有十千錢埋碑傍木葉下可取去官稅之外資汝家産其人喜謝訖乃掘山得錢上租既畢家亦漸富至今真君頭冠低俯向前傳云神令此人驗冠非純金所以然矣成都楊閙兒父母崇道奉事老君極精勤閙兒以軍伍中在金堂把截為敵擒至南山寨囚之晝夜常念老君願再見父母忽夢老君賜雲一朵令童子引之送於平地曰可以歸矣及覺身已出寨奔走到家父母為其作百日亝訖果州開元觀接郡城頗為爽塏以形勝之美選立觀額雖州使旋具結奏而制置之內猶闕大殿州司差工匠及道流將泝嘉陵江於利州上遊採買材木臨行夢神云朱鳳潭中有木可足用如此者三因聚議曰夢兆如斯必有大商貨木沿江而至或可免逺適耶乃往山下尋候之徘徊岸旁隱隱見潭底有木因募工鈎求得梓木千段竟構成大殿鐘樓經閣三門廊宇咸得周足又市磚甃壇內有黃赤色者疑其火力未足棄而不用信宿皆化為金起觀之費過於豐資殿宇既成將塑尊像又於白鶴山觀掘地得鐡數萬斤因鑄像三尊髙二丈今謂之聖像也定州人趙業開成中為閬州晉安令因疾暴卒三日乃蘇云初為𡨕官追急問所以但云為欠債抵諱事自思無有也必是誤追行三五十里過一山有宫闕崇麗人物甚多一青衣童前問非道士趙太玄乎答云非也童笑曰豈得便忘耶又一童云太上令喚趙太玄追事人一時散去自與童子到宫闕但見一道流云汝六嵗時有疾受正一八階法籙名為太玄豈得流於俗官併忘此事太乙有命放還却須佩籙修真行功及物居官勿貪瀆輕人性命言訖而去既疾蘇於思依山參受法籙纍置壇場廣成功德復名太玄唐太中年合州慶林觀多年摧朽殿宇不修穿漏尤甚刺史楊師謨夢太上示現而左目有淚䀶乃巡謁諸觀朝禮及至慶林方驗尊像左目前雨漏滴䀶宛若垂淚因剗剃荒蕪恢張制度創兩殿二樓重門邃宇壯麗於時既夢太上曰子以崇葺之功上簡玄府當流化十郡矣其後師謨纍典符竹果如神言志云即奉真觀也李瓌咸通中為王府長史以勳貴之族不慣食貧居間力闕鬱鬱不得志忽夢入深山窮谷棧閣縈折流水潺湲如此者不知其幾千百里又見闤闠雜遝城闉爽塏飛宇橫樓摩霄槩日不知其幾千萬家縱神逰目熙熙自得又出郊甸涉岡原荒榛茂草小松巨木間以果林厠以筠篠山嶺危峭或迂或平山回徑盡抵一小郡茅棟縱橫隘路欹側傍有公署署內白氣屬天其大如屋中有悲歌號呼之聲見一青童引瓌即路躡危磴步石梯入門甚峻門內古樹芳草若古觀宇焉瓌素崇玄教頗為慰恱俄而升殿見像設尊儀笑而謂之曰爾來耶吾待久矣入天門潄玄泉古人所修也注丹田存白元上士所修也混而合之子其行之隂功及人隂德濟物千百之家待子而字之勉哉勉哉明年之春瓌再拜稽首受其言而覺是冬頻訴於宰執復希入用乃授陵州刺史之任所厯山川郡邑神思惝恍皆如常所經行抵郡乃謁天師升階及門至於殿所覩其真像侍衛屋宇布列醒然而悟叶昔夢矣乃以俸金修天師堂加以丹雘立為碑志其白氣屬天乃鹽井之所也悲歌之聲乃轉車之人也瓌即西平王孫録異記云仙人許君居世時嘗因修觀工用既畢欲刻石為記因剗去古碑舊文刋勒新記自是恍惚不安暇日徐步庭砌聞空中語曰許君許君速詣水官求救不然即有不測之災許愕然異之問其事杳不復答乃炷香虔祝願示其因良久復聞曰所刻碑舊文雖已磨滅而當時為文之人見詣水官相訟奪我之名顯彼之名水官將執對矣宜速求之許君乃訪得舊文重為立石一夕夢人謝云再顯名氏無以相報請作水陸大醮普告山川萬靈得三官舉明可以證道也君依教修之成都道士楊景昭説此范希越成都人虔事北帝雕天蓬印以行教祭醮嚴潔尤逾於常廣明庚子三月不雨至五月人心燋然穀稼將廢希越願於萬嵗池試行神印為生靈祈請先詣至真觀致齋是日庚辰以戍時投印池中隂風遽起雲物周布亥時大雨逹曉及辰至已少霽乃歸升􅋖橋水漸及馬腹羅城四江平岸流溢螟蝗之屬淹漬皆死自是遂有年僖宗駐成都召對問以逆冦誅鋤宫城克復之事命持印於內殿奏醮積雨之中雲霽月朗是夕上夢神明告之佳兆因大恱授太常寺奉禮郎纍遷主客員外衛尉少卿錫以朱紱黃巢捷至果符聖夢焉希越自言初居煮膠巷印篆初成而蠻冦凌突居人奔散藏印於堂屋瓦中蠻去之後四鄰焚燼其所居獨存彭城劉存希自幼於唐興觀瞻禮天師圖寫絹本出入護持雖祗命遠行奉使南北未嘗一日闕香火黃巢犯闕時在內署蒼惶之際隨駕不及唯捲天師幀捧持而行同伍三十餘或為虜捉或被殺傷身獨得免將奔入南山夜深村落行涎遇被難人偶語而聞妻在其間因得同往洋州大巖山深處結草庵居況素無骨肉唯夫婦而已既免支離決志林谷不復有名宦之望野麋山鹿性已成矣山下居人以其口食不多時亦助其糧儲饋其鹽酪此外拾柏子焚香禮敬天師而已無何舊交宋開府入掌樞務知其在洋山中強之使出加以品位固辭不獲黽俯從焉值駕出石門因復奔竄投匿莎城山中數月有軍士搜山谷不得安居夫婦棄繒帛之衣夜行四十餘里出及平陸遙見馬軍十餘騎兩面交至已擒虜行人數輩存希夫婦驚恐而立馬軍過其側似若不見由是得免後數年奉使西川携天師幀而至為言此事成都賈瓊三嵗時其母因看蠶市三月三日過龍興觀因衆齊受籙遂為瓊受童子籙一階十餘年後因女兄有疾其母請處士吳太玄為入冥看檢致疾之由仍看瓊年命凶吉經宿太玄還言疾在江瀆求之即差籍中不見有賈瓊名父母愈憂復請看之太玄每與人入冥檢事必鎖於一屋中安寢而往不許人驚呼候其自醒喚開門乃出厯厯説冥中事有如目擊言必信驗或兩宿然後回及再往檢瓊名字云三嵗上已日於龍興觀受正一籙名係天府不屬地司乃於天曹黃簿之內檢得其名雲溪友議云唐西川節度使韋臯少逰江夏止於薑使君館薑氏孺子曰荆寶已習二經雖兄呼於韋而恭事之禮如父也荆寶有小青衣曰玉簫才年十嵗常令祗侍韋兄玉簫亦勤於應奉後二載薑使君入關而家纍不行韋乃居上頭陀寺荆寶亦時遣玉簫往役給奉年稍長大因而有情時廉使常侍得韋季父書云姪臯久客貴州切望發遣歸覲廉使啓緘遺以舟楫服用仍恐淹留請不相見泊舟江瀨篙工促行韋拭淚裁書以别荆寶頃刻寶與玉簫俱來既悲且喜欲命青衣從往韋以違覲日久不敢俱行乃固辭之遂與約少則五載多則七年來取因留玉指環一枚并詩一首遺之暨五年不至玉簫乃靜禱於鸚鵡洲又逾年不至玉簫歎曰韋家郎君一别七年是不來耳遂絶食而終薑氏愍其節操以玉環著於中指而用殯焉後韋鎮蜀到府三日詢獄囚輕重之繫近三百餘人其中一輩五器所拘偷視廳事私語云僕射是當時韋兄也乃厲聲曰僕射僕射憶薑荆寶否韋曰深憶之曰即某是也公駭然曰犯何罪而重繫答曰某别後尋以明經及第再選青城縣令家人誤爇廨舍庫牌印等韋曰家人之犯固非已尤即與雪寃仍歸墨綬乃奏眉州牧敇下未令赴任遣人監守且留賓幕時屬大軍之後草創事繁凡經數月方問玉簫何在薑曰僕射維舟之夕與伊留約七載是期既逾乃絶食而終因吟留贈玉環詩云黃雀銜來已數春别時留解贈佳人長江不見魚書至為遣相思夢入秦韋聞之益增悽歎乃廣修經像以報夙心且想念之懷無由再會時有祖山人者治少翁之術能令逝者相親但令府公齋戒七日齋已清夜玉簫乃至謝曰承僕射為造經像之力旬日便當託生却後十三年再為侍妾以謝鴻恩臨别微笑曰丈夫薄情令人死生隔矣後韋以隴右功終德宗之代理蜀不替年深纍遷中書令天下響附瀘僰歸心因作生日節鎮所賀皆貢珍竒獨東川盧八座送一歌姬未當破瓜之年亦以玉簫為號諦觀之乃真薑民玉簫也中指有肉環隱出不異留别之玉環焉韋歎曰吾乃知存殁之分一往一來皆不爽矣北夢瑣言章孝子名全益東蜀涪城人少孤為兄全啓養育母疾全啓割股肉以饋而瘳他日出逰殂於逆旅全益感天倫之思制斬衰之服以兄割肉飼母遂以火煉指用申至痛仍寫銀字法華經一部日夕諷誦粗通大義後於成都府樓巷築舍其間傍有丹竈不畜童僕塊然一室鬻丹得鏹數萬兩以金刻母像今華亭禪院即居士髙樓之所也嘗言於道友曰點水銀一兩止一兩銀假若作丹三百粒每粒百兩銀三十千矣其利溥哉居士製土偶於丹竈之側以代執熱之用護惜不毁殆四十年大順中物故年九十八寺僧寫真於壁節度判官眉州刺史馮涓讃之野人間話云利州市鄽中有一人被髮跣足衣短布襦與人語多是天上事或遇紙筆則欣然畫樓臺人物執持樂器或雲龍鸞鳳之像夜則宿神廟中人謂之天自在州南有市人甚闐咽一夕火起天自在於廟中獨語曰此一方為惡日久天將殺之遂以手探階前石盆中水望空澆灑逡巡有異氣自廟門出變為大雨盡滅其火掌廟者見之聞於人天自在遂潛遁去其後居人果為大水漂蕩始信前言有徴唐雅云會昌中蜀青城山邢道士者妙於方藥會穆宗患心熱醫療罔效遣使召之邢既至以肘後緑囊中青丹兩粒及紫梨數枚絞汁而進服之疾尋愈旬日內所賜萬金加號廣濟先生帝從容問丹何物先生曰赤城山頂有青芝兩株太平南溪有紫花梨一樹臣昔嵗曽逰二山偶獲兩實合煉成丹五十年來服食殆盡唯餘兩粒幸逢陛下服之更欲此丹須求二物也經數月辭歸帝後疾復作再詔之不知何適閬中雍孝聞政和中以道士入宫説法徽宗謂其得林靈素之半時人因呼為木先生宋史鄭榮者本禁軍也戍壁州還夜遇神人謂曰汝有道氣勿火食因授以醫術救人上賜名自清度為道士居上清宫所傳藥能愈大風疾求之者皆刺臂血和餅給焉明道雜志云張文定以端明學士尹成都值藥市日其門醫李生因市藥遇一老人相與問訊曰張公已再鎮蜀矣文定實始一至老人似言其前身事也又曰今有藥二粒君為我逹於公或公疑不肯餌則以一粒烹水銀俟汞成金可無疑也李生以藥獻公公素好道聞之甚喜乃於府第小亭躬取水銀搆火投藥一粒烹之聲如粥沸有紅光自鼎中起俄頃光罩一亭而鼎中聲亦屢變火滅視鼎中爛然餅金矣公即取餘一粒服之夀八十五終身無疾坐而逝殯後柩有大聲豈其尸解乎不然神丹在腹豈與常人同腐也先時公子恕説藥金一兩許公令作四指環其一公以奉其父其一與其夫人其一長子其一以自服父夫人長子皆前沒金亦隨葬獨公者猶在恕言此時公尚無恙意今亦葬之矣某嘗問恕以公居常𨗳養之方恕亦不盡知其深妙處但言公自中年後即清居獨坐一堂每旦起即徐步周環約五里所日以是為常不見别有施為也少時服朱砂又服天門冬既老亦罷之公年八十餘時某猶見之視其頤頰白膩如少年然喜飲酒量絶人晚年病目亦其毒也公言頗得彭老御內之術屢以試用唯一涎實覺精氣上遡至腦耳他時不覺也輿地紀勝云漢州人羅天祐來遊長安若顛若狂善言人得失嘗隱語書解榜封以寄人及撤棘無不驗後於成都司戶薛紱坐上化去蜀中廣記卷七十七
