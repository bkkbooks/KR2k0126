body:
  text: 蜀中廣記卷八十六明曹學佺撰高僧記第六川南道二眉州中巖慧目藴能禪師本郡吕氏子年二十二於村落一富室為校書偶遊山寺見禪冊閲之似有得即裂冠圓具一鉢遊方首叅寳勝澄甫禪師所趣頗異至荆湖謁永安喜真如喆德山會造詣益高迨抵大溈溈問上座桑梓何處師曰西川曰我聞西川有普賢菩薩示現是否師曰今日得瞻慈相曰白象何在師曰牙爪已具曰還會轉身麽師提坐具繞禪床一匝溈曰不是這箇道理師趨出一日溈為衆入室問僧黄巢過後還有人收得劍麽僧竪起拳溈曰菜刀子僧曰爭奈受用不盡溈喝出次問師黄巢過後還有人收得劍麽師亦竪起拳溈曰也秪是菜刀子師曰殺得人即休遂近前攔胸築之溈曰三十年弄馬騎今日被驢子撲後還蜀庵於舊址應四衆之請出住報恩上堂龍濟道萬法是心先諸緣惟性曉本無迷悟人秪要今日了師曰既無迷悟了箇甚麽咄上堂舉雪峯一日普請搬柴中路見一僧遂擲下一叚柴曰一大藏教秪説這箇後來真如喆道一大藏教不説這箇據此二尊宿説話是同是别山僧則不然竪起拂子曰提起則如是我聞放下則信受奉行室中問崇真氊頭如何是你空刧已前父母真領悟曰和尚且低聲遂獻投機頌曰萬年倉裏曽饑饉大海中住儘長渴當初㝷時尋不見如今避時避不得師為印可一日與黄提刑奕棊次黄問數局之中無一局同千著萬著則故是如何是那一著師提起棊子示之黄佇思師曰不見道從前十九路迷殺幾多人師住持三十餘年凡説法不許錄其語臨終書偈趺坐而化闍維時暴風忽起煙所至處皆雨舍利道俗斸其地皆得之心舌不壞塔于本山建康華藏密印安民禪師嘉定府朱氏子初講楞嚴於成都為義學所歸時圓悟居昭覺師與勝禪師為友因造焉聞悟小叅舉國師三喚侍者因緣趙州拈云如人暗中書字字雖不成文彩已彰那裏是文彩已彰處師心疑之吿香入室悟問座主講何經師曰楞嚴悟曰楞嚴有七處徵心八還辯見畢竟心在甚麽處師多呈藝解悟皆不肯師復請益悟令一切處作文彩已彰會偶僧請益十𤣥談方舉問君心印作何顔悟厲聲曰文彩已彰師聞而有省遂求印證悟云以本色鉗鎚師則㒺措一日白悟曰和尚休舉話待某説看悟諾師曰尋常拈槌竪拂豈不是經中道一切世界諸所有相皆即菩提妙明真心悟笑曰你元來在這裏作活計師又曰下喝敲床時豈不是返聞聞自性性成無上道悟曰你豈不見經中道妙性圓明離諸名相師於言下釋然悟出蜀居夾山師罷講侍行悟為衆夜叅舉古帆未挂因緣師聞未領遂求決悟曰你問我師舉前話悟曰庭前栢樹子師即洞明謂悟曰古人道如一滴投於巨壑殊不知大海投於一滴悟笑曰奈這漢何未幾令分座悟説偈曰休誇四分罷楞嚴按下雲頭徹底叅莫學亮公親馬祖還如德嶠訪龍潭七年往返遊昭覺三載翺翔上碧巖今日煩充第一座百華樷裏現優曇師未幾開法保寧遷華藏旋里領中峯上堂衆賣華兮獨賣松青青顔色不如紅算來終不與時合歸去來兮翠藹中可咲古人恁麽道大似逃峯赴壑避溺投火爭如隨分到尺八五分钁頭邊討一箇半箇雖然如是保寧半箇也不要何故富嫌千口少貧恨一身多冬至上堂舉玉泉皓和尚云雪雪片片不别下到臘月再從來年正月二月三月四月五月六月七月八月九月十月依前不歇凍殺餓殺免教胡説亂説師曰不是罵人亦非賛嘆高出臨濟德山不似雲居羅漢且道玉泉意作麽生良久曰但得雪消去自然春到來師後示寂於本山闍維舍利頗賸細民穴地尺許皆得之光明瑩潔心舌不壞眉州象耳袁覺禪師郡之袁氏子出家傳燈試經得度本名圓覺郡守填祠牒誤作袁字戲謂之曰一字名可乎師嘆曰一字已多郡守異之既受具出蜀往大溈依佛性頃之入室陳所見性曰汝忒煞逺在然知其為法器俾充侍者掌賔客師毎侍性性必舉法華開示悟入四字令下語又曰直待我竪㸃頭時汝方是也偶不職被斥制中無依寓俗士家一日誦法華至亦復不知何者是火何者為舍乃豁然制罷歸省性見首肯之紹興丁巳眉之象耳虛席郡守謂此道塲非名流勝士莫能起廢諸禪舉師應聘嘗語客曰東坡云我持此石歸袖中有東海山谷云惠崇烟雨蘆雁坐我瀟湘洞庭欲喚扁舟歸去傍人謂是丹青此禪髓也眉州華嚴祖覺禪師嘉州楊氏子幼聰慧書史過目成誦著書排釋氏惡境忽現悔過出家依慧目能禪師未幾疽發膝上五年醫莫愈因書華嚴合論畢夜感異夣旦即捨杖步趨一日誦至現相品曰佛身無有生而能示出生法性如虚空諸佛于中住無住亦無去處處皆見佛遂悟宗㫖洎登僧籍府帥請講于千部堂詞辯宏放衆所嘆服適南堂靜禪師過門謂師曰觀公講説獨步西南惜未解離文字相耳倘問道方外即今之周金剛也師欣然罷講南游依圓悟於鍾阜一日入室悟舉羅山道有言時踞虎頭收虎尾第一句下明宗㫖無言時覿露機鋒如同電拂作麽生會師莫能對夙夜叅究忽然有省作偈呈悟曰家住孤峯頂長年半掩門自嗟身已老活計付兒孫悟見許可次日入室悟又問昨日公案作麽生師擬對悟便喝曰佛法不是這個道理師復留五年愈更迷悶後於廬山棲賢閱浮山逺禪師削執論云若道悟有親疎豈有旃檀林中却生臭草豁然契悟作偈寄圓悟曰出林依舊入蓬蒿天網恢恢不可逃誰信業緣無避處歸來不怕語聲高悟大喜持以示衆曰覺華嚴徹矣住後僧問最初威音王末後樓至佛未審叅見甚麽人師曰家住大梁城更問長安路曰只如德山擔䟽鈔行脚意在甚麽處師曰拶破你眼睛曰與和尚悟華嚴宗㫖相去幾何師曰同途不同轍曰昔日德山今朝和尚師曰夕陽西去水東流上堂舉石霜和尚遷化衆請首座繼踵住持䖍侍者所問公案師曰宗師行處如火燒氷透過是非闗全機亡得喪盡道首座滯在一色侍者知見超師可謂體妙失宗全迷向背殊不知首座如鷺鷥立雪品類不齊侍者似鳯翥丹霄不縈金網一人高高山頂立一人深深海底行各自隨方而來相㑹九重城裏而今要識此二人麽竪起拂子曰龍卧碧潭風凛凛垂下拂子曰鶴歸霄漢背摩天僧問如何是一喝如金剛王寳劍師曰血濺梵天曰如何是一喝如踞地獅子師曰驚殺野狐狸曰如何是一喝如探竿影草師曰驗得伱骨出曰如何是一喝不作一喝用師曰直須識取把針人莫道鴛鴦好毛羽常德文殊心道禪師眉州徐氏子年三十得度詣成都習唯識自以為至同舍詰之曰三界唯心萬法唯識今目前萬象摐然心識安在師茫然不知對遂出闗周流江淮既抵舒之太平聞佛鑑禪師夜叅舉趙州栢樹子話至覺銕嘴云先師無此語莫謗先師好因大疑提撕既久一夕豁然即趨丈室擬敘所悟鑑見來便閉門師曰和尚莫謾某甲鑑云十方無壁落何不入門來師以拳獨破窻紙鑑即開門扭住云道道師以兩手捧鑑頭作口啐而出遂呈偈曰趙州有個栢樹話禪客相傳徧天下多是摘葉與尋枝不能直向根源會覺公説道無此語正是惡言當面罵禪人若具通方眼好向此中辨真假鑑深然之毎對客稱賞後命分座襄守請開法天寧未幾擢大别文殊上堂曰師子嚬呻象王哮吼雲門北斗裏藏身白雲因何喚作手三世諸佛不能知狸奴白牯却知有且道作麽生是他知有底事雨打梨花蛺蝶飛風吹栁絮毛毬走上堂拈拄杖直上指曰恁麽時刺破憍尸迦脚跟卓一下曰恁麽時卓碎閻羅王頂骨乃指東畔曰恁麽時穿過東海鯉魚眼睛指西畔曰恁麽時塞却西王母鼻孔且道摠不恁麽時如何今年雨水多各宜頻曬㫰宣和改元下詔改僧為德士上堂祖意西來事今朝特地新昔為比邱相今作老君形鶴氅披銀褐頭包蕉葉巾林泉無事客兩度受君恩所以道欲識佛性義當觀時節因緣且道即今是甚麽時節毘盧遮那頂戴寳冠為顯真中有俗文殊老叟身披鶴氅且要俯順時宜一人既爾衆人亦然大家成立樷林喜得羣仙聚㑹共酌迷仙酒同唱步虚詞或看靈寳度人經或説長生不死藥琴彈月下指端發太古之音棊布陣前妙著出神機之外進一步便到大羅天上退一步却入九幽城中秪如不進不退一句又作麽生道直饒羽化三清路終是輪迴一幻身二年九月復僧上堂不掛田衣著羽衣老君形相頗相宜一年半内閒思想大底興衰各有時我佛如來預䜟法之有難教中明載無不委知較量年代正在於兹魔得其便惑亂正宗僧改俗形佛更名字妄生邪解刪削經文鐃鈸停音鉢盂添足多般矯詐欺㒺聖君賴我皇帝陛下聖德聖明不忘付囑不廢其教特賜宸章頒行天下仍許僧尼重新披削實謂寒灰再焰枯木重榮不離俗形而作僧形不出魔界而入佛界重鳴法鼓再整頹綱迷仙酎變為甘露瓊漿步虚詞飜作還鄉曲子放下銀木簡拈起尼師壇昨朝稽首擎拳今日和南不審秪改舊時相不改舊時人敢問大衆舊時人是一個是兩個良久曰秋風也解嫌狼籍吹盡當年道教灰建炎三年春示衆舉臨濟入滅囑三聖因緣師曰正法眼藏瞎驢滅臨濟何曽有是説今古時人皆妄傳不信但看後三月至閏三月賊種相叛其徒欲舉師南走師曰學道所以了生死何避之有賊至師曰速見殺以快汝心賊即舉槊殘之血皆白乳賊駭以席覆之而去臨安府靈隠慧逺禪師生於眉山金流鎮彭氏年十三投藥師院僧宗辨出家祝髮受具即往成都習經論還峩眉雲岩寺時徽禪師住焉徽黄龍南四世孫知見甚高師初入門值徽飯罷於庭廡間閒行師纔見即放包問曰文殊為七佛祖師未審什麽人為文殊之師徽云金沙溪畔馬郎婦時有起銕拂者為首坐師亦往親近起嘗誘掖之兩嵗未有所得一日靜坐次有僧獨行自語云假四大以為葢覆緣六塵而生心忽遇六塵頓息喚什麽作心師聞之忽有省遽起告首座首座可之上方丈告徽徽亦可之明日即告行同志挽留師不聽曰吾師以為可而我終未釋然也時圓悟自雲居歸蜀住昭覺師造焉毎問話請益辭㫖峭硬圓悟深器之一日圓悟普説舉龎居士問馬祖不與萬法為侣者是什麽人馬祖云待汝一口吸盡西江水即向汝道師聞舉豁然大悟仆於衆中衆以為中風共掖起之師乃曰吾夢覺矣至夜圓悟小叅師出問曰淨躶躶空無一物赤骨律貧無一錢户破家殘乞師賑濟荅云七珎八寳一時拿師曰爭奈賊不入謹家之門荅云機不離位墮在毒海師隨聲便喝悟以拄杖擊禪床云喫得棒也未師又喝圓悟連喝兩喝師禮拜悟大喜以偈贈師有舊銕舌轉闗棙之語衆目之為銕舌逺自此機鋒峻發無所牴牾矣紹興乙夘春眉守延居象耳山不赴是嵗圓悟示寂嘆曰哲人云亡繼之者誰乎師自發明心要即得遊戲大自在三昧嘗因開爐升坐曰天無門地無壁葫蘆棚上種冬𤓰兩手扶犂水過膝跳金圏吞栗棘氊拍板對無孔笛屈屈獨脚山魈解雙趯去年冬裏無炭燒今年定是無火炙饑時饑到眼睛黄窮時窮到赤骨立屈屈且道屈個什麽叵柰監寺副寺維那典坐直嵗等却與泥水匠商量放出兩頭鴟吻咬殺佛殿脊奉詔住高亭山崇先寺未幾再奉詔住靈隠開堂中使降香祝聖罷拈香曰此一炷香天也莫能覆藏佛眼莫能窺測舉處衆生種族拈來鈍置殺人累我三十年荒草裏横身至令一平生作個不唧𠺕漢就中有些子謷訛對衆也須説破山僧二十年前被業風吹到岷峩山下荆棘林中撞著個無孔銕錘被他一擊半醉半醒將謂啞却口一生開不得二十年後又被業風吹去濯錦江頭葛藤堆裏逢著個焦尾白額是時親遭一口直得喪膽忘魂開得口至今受用不盡且道此香為二十年前見底知識即是為二十年後見底知識即是一鶴不棲雙木一客不煩兩家不見道先行不到末後太過而今賊身已露贓物見前奉為前成都府昭覺先圓悟禪師大和尚不重他對御談空横行海上只重他胸中無物肚裏無禪爇向爐中用酬法乳于時孝宗皇帝屢詔入内賜號佛海禪師上堂説偈曰淳熈二年閠季秋九月旦閙處莫出頭冷地着眼看明暗不相干彼此分一半一種作貴人教誰賣柴炭向你道不可毁不可賛體若虚空没崖岸相呼相喚歸去來上元定是正月半于是都下喧傳頗疑師當以正月十五日遷化遂達上聽至期無疾陞坐祝聖如常儀又俗官詣寺修齋再陞坐訖即語知事頭首分伴官客及施主齋齋時侍者並赴堂是日都下人競集上亦密遣中使伺師起居皆見師往來如常時迭歸奏齋罷侍者與俗官同上方文但見門扄閉甚密師素蓄一黒猿頗馴能知人意因衣以布䄌命之曰猿行者至是求師不見因窺於窻隙中但見猿手持一卷書人立於床前遂亟從後路至榻前撥開帳子而師已化矣取猿手中書觀之乃辭世頌曰抝折秤鎚掀翻露布突出機先鵶飛不度留十日顔色不變壽七十四坐五十九夏宋祖鑑黄龍肅禪師法嗣也住月珠山僧請筆書語要師曰達磨西來单傳心印曹溪六祖不識一字今日諸方出世話句如山重増繩索乃拍禪床曰於斯薦得猶是鈍漢若也未然白雲深處從君卧切恐寒猿中夜啼僧法輝宜賓人結草菴居號山栖菴主妙於易學作幽顯大㫖及僧史等書與韓子蒼徐師川為方外友後至遂寧而卒偈曰六十六年雷奔電激臨行一句青天白日嘉州能仁黙堂紹悟禪師結夏上堂最初一步十方世界現全身末後一言一㣲塵中深鎖斷有時提起如倚天長劍光耀乾坤有時放下似紅爐㸃雪虚含萬象得到恁麽田地天魔外道拱手歸降三世諸佛一時稽首便可以大圓覺為我伽藍於一毫端現寳王刹如是則朝往西天暮歸東土亦是禁足百花樷裏坐媱坊酒肆行亦是禁足雖然如是不曽動着這裏一步恁麽則九旬無虚棄之功百劫有今時之用堪報不報之恩以助無為之化此即是湼槃妙心金剛王寳劍敢問大衆作麽生得到這田地去如人上山各自努力上堂舉趙州訪二菴主公案頌曰一重山盡一重山坐斷孤峯子細看霧捲雲收山嶽靜楚天空濶一輪寒慶元東山齊已禪師卭州謝氏子上堂舉修山主偈曰是柱不見柱非柱不見柱是非已去了是非裏薦取召大衆曰薦得是移華兼蝶至薦得非擔泉帶月歸是也好鄭州棃勝青州棗非也好象山路入蓬萊島是亦没交涉踏着秤錘硬似銕非亦没交涉金剛寳劍當頭截呵呵呵㑹也麽知事少時煩惱少識人多處是非多蓮社會道友請上堂漸漸雞皮鶴髮父少而子老看看行步躘蹱疑殺木上座直饒金玉滿堂照顧白牯賊豈免衰殘老病正好着精彩任汝千般快樂渠儂合自由無常終是到來杭州靈隠法薰禪師號石田眉山彭氏子也師生而慧敏三四嵗時見佛僧即知禮敬年十六往從丹稜石龍山法寳院智明出家二十二薙髮受戒具遂游方至石霜禮雷遷塔述偈曰一念慈容元不隔何須特地肆乖張平高就下婆心切惱得雷公一夜忙師名因是大著聞吳門穹窿破庵先禪師道望遂往依焉一見知為法器室中舉世尊拈花迦葉㣲笑師云焦磚打著連底凍赤眼撞著火柴頭破庵陰竒之毎於日用語黙故起其疑師於是決志依棲隨時咨詢與無凖範日相激勵辭去遍遊諸老門庭見靈隠松源岳淨慈肯堂充華藏遯庵演咸謂其從作家爐鞴中出自不同也俄出住蘇州之高峯次遷楓橋鍾山虚席乃以師補處寳慶初遷淨慈端平二年遷靈隠淳祐甲辰三月望示徒云但得本莫愁末喚恁麽作本喚恁麽作末松栢千年青不入時人意牡丹一日紅滿城公子醉山僧恁麽道若有不肯底是我同叅弟子師俊繪師像求讃有云末後一句分付厨山衆頗訝之明日忽示疾而逝蜀中廣記卷八十六
