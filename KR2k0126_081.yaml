body:
  text: 蜀中廣記卷八十一明曹學佺撰高僧記第一川西道一文殊菩薩化身宋宣和五年史相作成都石長者院記曰石賴長者石其姓也賴其名也地曰石賴以長者得名也長者族系家世無文記可考蜀父老相傳有一僧遊五臺山踰年不覩文殊光相忽逢山中老人語曰菩薩出遊蜀今以旃陀羅身寄業於笮橋南乃其化現非有二文殊也僧然其言至成都物色之果於橋南見長者風姿竒偉如老人所説遂往造見長者延入室與語意㫖宻契歡喜踴躍長者復化文殊刀化為如意飛出屋蜀人異其事因以其所居易為道塲今所葺院是也初長者操刀於屠肆几上肉經大屠無臭腐飛蠅過者弗集輕重多寡一割無毫釐差盖得手應心進乎技者非有道也歟問者曰破戒犯律日以殺為事有道者如是乎余發其蔀曰汝以持守戒律動有所礙為道邪抑超出戒律動無所礙為道邪長日遊戲屠宰間視身如物視物如身物與身皆非真實相也清濁淨穢隨所寓而適又奚擇焉道固如是也昔之得道者類多埋照混迹於酒肆屠門故解牛有養之妙理屠羊有輕賞之高義雖食蜆捕魚不害其為道何獨於長者而疑之問者形解心釋始信鼓刀逰刃間道有在於是也院遭五季兵火遺址蕪没過者興歎聖夀寺僧自淳懼靈迹湮滅無聞以願力再新之自元祐經始迄宣和辛丑而工告休安佛有宫處僧有堂炊爨有厨㑹集有㕔廊廡門面亦略具體矣余書其事已復為長者説偈言稽首孤峯妙湛尊高卑淨穢了不分奏刀砉然道所存託此豁開不二門晉釋慧持者慧逺之弟也沖黙有逺量善文史巧裁製年十八出家與兄共事道安法師及安在襄陽惠逺東下持亦俱行初憩荆州上明寺後適廬山皆隨逺共止持欲觀瞻峨眉振錫岷岫乃以晉隆安三年辭逺入蜀逺苦留不止歎曰人生愛聚汝獨樂離如何持亦悲曰若滯情愛聚者本不應出家今既割欲求道正以西方為期耳於是兄弟枚淚憫黙而别行達荆州刺史殷仲堪桓𤣥二人苦欲留之持與𤣥書曰本欲栖病峨眉之岫觀化流沙之表不能負其發足之懷便束裝首路到蜀止龍淵精舎井絡四方慕徳成侣刺史毛璩雅相崇挹耆宿惠巖僧恭皆望風推服有升持堂者號登龍門焉後因譙縱為亂殺璩及巖公等持避難之郫縣中寺縱有從子道福凶悖尤甚將兵往郫討戮入寺人馬浴血衆僧大怖一時驚走持在房前盥洗神色無忤道福直至持邊持彈指漉水淡然自若福愧悔流汗出寺門謂左右曰大人故與衆異後境内清恬還止龍淵講説齋懴老而愈篤以晉義熙八年卒于寺中春秋八十有六臨終遺命務朂律儀謂弟子曰經言戒如平地衆善由生汝等行住坐卧宜其謹哉按宋時嘉州道左大樹因風吹折穴中有一定僧頭髮蓋身爪甲圍腰一匝有司以聞取至都令西僧總持擊金磬再拜乃出定叩之曰吾逺法師弟也再叩曰吾將往陳留入定遂去陳留予在金陵同年金礪為予言近日陳留古廟因取土修理掘其下有三缸盖底皆俯其中仰者有定僧坐焉爪甲亦圍繞身羣衆喧譁不已聊一開眸問曰是何時答者曰萬厯某年也曰吾尚早仍閉目縱合力搖之亦不動懼遂覆之如初此不知即嘉州樹内者否鷄骨禪師不知何許人也晉時習禪于香積寺坐化塔存方輿勝覽云青城縣之香積山有瀑布及雞骨禪師塔張孝芳詩雞骨埋龍塔靈山對佛龕李仁父詩斷碑唐日寺遺像晉時僧晉釋僧生姓袁郫人少出家以苦行致稱成都宋豊等請為三賢寺主誦法華習禪定嘗於山中誦經有虎來蹲其前誦竟迺去後毎至諷詠輒見左右四人為侍衛年雖衰老而翹懃彌厲後微疾便語侍者云吾將去矣於後可為燒身弟子謹依遺命南宋釋法期姓向蜀郡郫人十四出家從智猛諮受禪業與靈期寺法林共習禪觀後遇元暢復從進業及暢下江陵期亦隨從十住觀門所得已九有師子奮迅三昧唯此未盡暢歎曰吾自西涉流沙北履幽漠東探禹穴南盡衡羅唯見此一子特有禪分後卒於長沙寺春秋六十有二神光映屍體更香潔時蜀龍華寺又有釋道果者亦以禪業顯焉南宋釋道汪姓潘長樂人年十三投廬山逺公出家研綜經律雅善涅槃嘗行梁州為羌賊所圍垂失衣鉢汪與弟子數人誓心共念觀世音有頃覺如雲霧覆汪等身羣盜推索不見由是獲免旋於成都徵士費文淵初從受業乃立寺於州城西北名曰祇洹化行巴蜀譽洽朝野梁州刺史申坦與汪有舊坦後致政汪將往省之仍欲停彼費文淵乃上書刺史張悦曰道汪法師識行清白風霜彌峻近聞梁州遣迎承教㫖許去闔境之論僉曰非宜鄙州邊荒僧尼出萬禪戒所資一焉是賴豈可水失其珠山亡其玉願鑒道俗之誠令四輩有憑也悦即敦留不果行悦還都具向宋孝武述汪徳行帝勅令為中興寺主汪固辭獲免於是謝病下帷絶窺人世後劉思考臨州大設法事請汪講説迺應請或問法師常誓守靖何以虧節荅曰劉公篤信方欲大法憑之何辭小勞耶先是峽中人每於石岸側見神光夜發思考以大明中請汪於光處起寺即崖鐫像因險立室行途瞻仰咸發淨心後王景茂請居武擔寺為僧主勗衆清謹白黒歸依泰始元年卒顧命闍維思考為起塔於武擔寺門之右景和元年蕭惠開西鎭成都承汪高譽思共講道行至中途聞其已逝迺歎曰惜也吾不及其人文舉之追康成曽何足道其為時賢所惜如此時蜀江陽寺普明長樂寺道誾並戒徳高明學兼内外吳國張裕請為戒師云南宋釋道法姓曹燉煌人棄家入道專精禪業亦時行神呪後遊成都王休之費鏗之請為興樂香積二寺主訓衆有法常行分衛不受别請及僧食乞食所得常減其分以施蟲鳥每夕輒脱衣露坐以飼蚊蟲如此者累年後入定見彌勒放齋中光照三途果報於是深加篤勵常坐不卧元徽二年於定中滅度平坐繩牀貌如恒日南宋羅江縣釋僧羣清平守節蔬食持經居縣之霍山搆立茅屋孤在海中上有石池如盂水深六尺常出清泉古老相傳是神仙所宅羣因絶粒其菴舎去石盂一小澗日夕往還以木為梁由之汲水年至一百三十忽見一折翅鴨舒翼當梁頭就唼羣不得過欲舉錫杖撥之恐有轉傷因此遂回絶水經數日死臨死向人説年少時曽折一鴨翅驗此以為現報此劉敬叔異苑所載南宋尼釋曇輝蜀郡成都人也本姓青陽名白玉年七嵗便樂坐禪每坐輒得境界意未自了亦謂是夣耳曽與姊共寢夜中入定姊於屏風角得之身如木石亦無氣息姊大驚怪喚告家人互共抱扶至曉不覺奔問巫覡皆言鬼神所憑至年十一有外國禪師畺良耶舎者來入蜀輝請諮所見耶舎者以其既有禪分欲勸化令出家時輝將嫁已有定日法㫖未展聞説其家潜迎還寺家既知將逼嫁之輝遂不肯行深立言誓若我道心不果遂被限逼者便當投火飼虎棄除穢形願十方諸佛證見至心刺史甄法崇信尚正法聞輝志業迎與相見并石綱佐有懷沙門互加難問輝敷演無屈坐者難之崇乃許離夫家聽其入道元嘉十九年臨川康王延至廣陵終于所住南宋釋普恒姓郭蜀郡成都人也為兒童時嘗於日光中見聖僧在空中説法向家人叙之後苦求出家止安樂寺獨處一房不立眷屬習静業禪善入出住與韜律師為同志自説入火光三昧光從眉直下至金剛際於光中現諸色像先身業報頗亦明了宋昇明三年卒春秋七十有八其日微有病相唯俗家一奴看之明旦平坐而卒奴不解强取卧之尸竟不伸衆僧來見更令坐之手屈三指衆僧試取捋之亦隨手即伸伸已復更屈生時體淨死更潔白於是依得道法闍維之薪積始然便有五色煙起殊香芬馥州將王元載乃為之讚曰大覺𦕈無像懸應貴忘靖一念㑹道場空過萬刼永信心虚東想遇聖藻西影妙趣澄三界傳神四禪境俗物故參差真性理恒炳韜光寄浮世遺徳方化迥梁青城山寺釋植相姓郝氏梓潼涪人嘗任巴西郡吏大守鄭貞令相齎獻物下楊都見梁祖王公崇敬三寶便願出家及還決誓家屬妻子同志一時翦落專習苦行一食常坐正心佛理以命自期時南武都今孝水縣也有法愛道人高衒道術相往觀之愛於夕中自以呪力現一大神身著衣冠容相瑰偉來舉繩牀離地四五尺相誦戒神即馳去斯須復來舉牀僅動一角如前復去俄爾又來在相前立相正意貞白初無微動尋爾復去於屋頭現面舎棟破裂其聲甚大相亦無懼神見不動便來禮拜求哀懴悔至旦語愛曰汝所重者此是邪術非正法也可捨之相後往外聽講因行路寄宿道館道士素聞相名恐化徒屬拒不延之其夜羣虎遶院相吼道士等通夕不安及明追之從受菩薩戒焉又曽行𢎞農水側見人垂釣相勸止之不從其言即唾水中忽有大蛇擎頭四顧來趣釣者因即歸命投相出家時梁道漸衰而涪土軍動與彖法師分飛異域彖入靜林山相入青城山聚徒習業梁王蕭撝素相欽重供給獠民以為營理未暇經始便感重疾知命不救謂弟子曰常願生淨土而無勝業雖不生三塗亦不生天堂還生涪土作沙門也汝等努力行道方與吾㑹跏坐儼然奄便遷化時年三十有四其山四面獠民見其坐亡皆來嘆異禮拜供養改俗行善弟子銜命露屍松下初相置足於綿州城西栢林寺院宇成就於堂頭植梧桐一株極為繁茂忽以四月十五日無故葉落又維那之旦打鐘初不發聲大小疑怪莫測所以上座僧起謂有大變執錫逃避須㬰信報相已終矣樹枯鐘噎表其遷化之辰也梁潼州沙門僧林吳人深有徳素行能動物大同中上蜀至潼州城西北百四十里豆圌山上有神祠土民敬之每往祭謁林往居焉禪黙累日忽有大蟒縈繩牀前如揖讓者林為授三歸授已便去自爾安帖卒無災異其山北涪山之陽素來無猿自林栖託已來便有兩頭依林而住有初見者云度水來及後林出山門猿還泅渡如此非一年月淹久字乳産生乃至數十有時送林至龍門口竚望而返後往赤水巖故寺中屋宇並摧止有叢林便即露坐有虎蹲於林前低目視林乃為説法良久便去爾後孤逰雄悍不避惡獸常行仁濟感化極多末卒於潼郡梁益州沙門尚圓姓陳氏廣漢雒人出家以呪術救物武靈王蕭紀宫中鬼怪魅諸婇女或歌或哭紛然亂舉王乃令善射者控弦擬之鬼乃現形即放箭射鬼便遙接還返擲人乆而不已聞圓持呪請入宫中諸鬼競前作諸變現龍蛇百獸倐忽前後在空在地怪變多端圓安坐告曰汝小家鬼能變我身則可自變萬種秖是小鬼可住聽我一言諸鬼合掌住立圓始發云南無佛陀鬼皆失所自爾安靜武帝聞召大蒙賞遇值梁顛擾圓復行至蜀年八十一終所住治城梁蜀郡龍淵寺釋慧韶姓陳本穎川太丘後避亂居丹陽之田里十二厭世出家具戒便逰京揚聽莊嚴旻公講釋成論纔得兩遍記注略盡謂同學慧峰曰吾沐道日少便知㫖趣斯何故耶將非所聞義淺為是善教使然乎乃試聽開善藏法師講遂覺理與言𤣥盡心讃仰著義高卓時以為有神思也武陵王出鎮邀之至蜀於龍淵寺講論開導如川流嘗靜坐中感見一神青衣帢服致敬曰願法師常在此𢎞法當相擁衛言訖而隱遂接席數遍清悟繁結昔在揚都苦氣疾綴慮恒動及至蜀講衆病皆除識者以為寺神所䕶云于時成都講席恒並置三四法鼓齊振競敞𤣥門而韶聽徒濟濟莫斯為甚焉韶性不乗騎雖貴勝請講逢值泥雨輒自䇿杖戴笠履芒屩而赴㑹後遇時患藥雜猪脂拒而不服非時漿飲故絶僧常候病者仰觀顔色怡悦禮誦不替當似微差乃告曰吾今無處不痛如壞車行路常欲摧折但自强耳恨所營尊像未就吾將去矣遺屬道俗憑為莊嚴便洗浴剃剪禮拜潄口卒於摩訶堂中春秋五十有四即天監七年七月三日也時成都民應始豐者因病氣絶而心尚温五日方醒云被攝至閻王所聞處分云迎韶法師須㬰便至王下殿合掌頂禮更無言説惟畫文書作大政之字韶便出外坐於曠路樹下見一少童以漆栁箕擎生袈裟令韶著之有數十僧來迎豊惟識和慈二禪師旛花列道騰飛而去又當終之夕有安浦寺尼久病悶絶及後醒云送韶法師及五百僧登七寶梯到天宫殿講堂中其地如水精牀席華整亦有麈尾几案蓮華滿池韶就座談説少時便起送别者令歸其生滅㝠祥感見類此魏益州五層寺釋法建廣漢雒縣人也俗姓朱氏日誦經一千卷仍多閒暇遨逰偶俗無所異焉忽復閉門則累日不出無所食矣唯聞誦經然小聲吟諷音不外徹有人倚壁竊聽臨響但聞斖斖溜溜似伏流之吐波時乃一出追從無聞武陵王東下令弟規守益州魏遣將軍尉遲迥來伐規既降欵城内名僧皆被拘禁至夜忽有光明迥遣人尋光乃見諸僧並睡唯法建端坐誦經光從口出迥聞自到建所頂禮坐聽至旦始休迥問曰法師昨夜所誦名作何經荅曰華嚴經下袠十卷迥曰何不從頭誦之荅曰貧道誦次到此耳迥曰法師誦得㡬許荅曰貧道發心欲誦一藏情多懈怠今始得千卷迥驚疑不信將欲試之曰屈總誦一遍應不勞損耶建報曰讀誦經典沙門常事豈憚勞苦乃設高座令諸僧衆並執本遂聽法建登座為誦七日七夜數已滿千猶故不止迴起謝曰弟子兵將不得久停請從此辭諸僧因並釋散迥既出歎息曰自如來稱滅之後阿難號為總持豈能過此蜀中乃有如此人所以常保安樂竒哉竒哉建年八十終宇文周時青城縣有異僧者出入井中赴供長安頃刻復返廣明中乃賜名為飛赴寺焉寺在縣東南四十里周亡名釋本姓宋氏南郡人弱齡遁世吟嘯丘壑梁元帝深見接待梁亡逺客巴岷齊王憲鎮蜀素加禮供秩滿還雍遂勒歸長安朝議將徵拔之雅量卓然終不易節周釋香闍梨者莫測其來以梁初至青城山飛赴寺欣然有終志時俗每至三月三日必往山逰賞多將酒肉共相酣樂前後勸喻曽未能斷後年三月又如前集列坐已了香令人於座穿坑方丈人莫知意謂人曰檀越等恒自飲噉未曽與香今日為衆須餐一頓諸人爭奉肴酒隨得隨盡若填巨壑識者怪之至晩曰我大醉飽扶我就坑不爾汙地及至坑所張口大吐雞肉自口出即能飛鳴羊肉自口出即馳走酒食亂出將欲滿坑魚䱉鵞鴨游泳交錯衆咸驚嗟誓斷宰殺迄今酒肉永絶上山此香之風徳也益州别駕羅研入朝誌公謂曰益州香貴賤荅曰甚賤初不謂是人也誌曰既為人所賤何為久留研亦不測此語為有識者説之或曰將不指青城香闍梨乎遂往山具述香曰檀越逺來固非虚説其夜便化弟子等營墓將殯怪棺太輕及開止見几杖而已周益州多寶寺猷禪師者姓楊氏勤讀誦四十餘年日夕不捨房後院壁圖九想變露置繩牀椶被覆上晝依僧例夜則寢中亘一日方出一食如是漸増七日方食僧以為常不知怪也如此又經二十餘年忽經一月而不出者不畜侍人僉議不出祇是入定不勞看之忽一夜風雨盛畫壁廊倒旦共往視試撥椶被一無所見唯繩牀坐褥存焉周益州沙門僧度不知何人去來邑野略無定所言語出没時有預知號為狂人周趙王在益州有郫人與王厚便欲反時有告者王未信之至旦郫兵果至王厚者為主在城西大街方牀上坐時僧度乃戴皮靴一隻從城西遺糞走至盤陀塔棄靴而回衆怪之而莫能測也又復將反者將紙筆請度定吉凶便操筆作州度兩字反者喜曰州度與我斯為吉也擇日往亡我往彼亡重必尅之時趙王據西門樓令精兵三千騎往始交即退隨後殺之至盤陀斬郫兵千餘為京觀今塔東特高者是於後方驗度戴皮靴皮郫聲同遺糞而走散於塔地所言州度反即斫頭目前取驗定後人聞於王遣人四追遂失所在隋釋道基姓吕氏河南東平人也年甫十四負帙遊於彭城博聽衆師隨聞成徳隋太守尚書令楊素負材經國任總權衡常奉清猷躬申禮敬顧諸宰伯曰基法師佛法之後寄也自見名僧罕儔其匹於是四海遞相師述大業五年勅召來止遂即對揚元論允塞天心百辟卿士咸異響而共嗟焉後鼓錫南鄭張教西岷巴蜀奔飛望煙來萃莫不廓清逰霧邪正以分教閲大乗𢎞揚攝論釐改先轍緝纉亡遺道邁往初名高宇内故覽卷履軾者若登龍門但以世接無常生涯有寄將修論疏溘爾而終以貞觀十一年二月卒於益部福感寺春秋六十有餘矣時彭門蜀壘復有慧景寶暹者並明攝論譽騰京國景清慧獨舉詮暢𤣥津文疏抽引函發英彩暹神志包總高岸倫儔談論倚伏態出新異數術方藝無學不長自預比肩莫有淪溺末年耽滯偏駁遂掩徽猷故不為時匠所班列宋蘓惲靈泉縣聖母堂記云靈泉邑北直嚮馳道俯僅一舎聚落市鎭相為映帶越距半里拔秀衆山瞰若百雉城隅崛竦天外復乃挺設平岡方秩千步中搆佛宫領僧刹迨百室有古禇氏聖母祠堂在焉謹按隋開皇中禇氏名信相本唐安郡青城縣黒水溪人也黄冠草帶幼悟佛心葛帔練裙夙㕘法要先逰方外首卜此山偃息禪梵韜秘聲味勤事大雄氏教本為空寂師表日遞月進精一無怠當時聞見亦未甚悉適值嵗歉田稼民傷饑饉則持龍頭小鐺散粥而飼之救拯生衆千萬活命厥後以圓明相空俗身委化奉之者指其故地置祠塔焉習傳號曰米母院俄㑹昌例毁大中九載白丞相敏中首謀興築得法潤禪師主之刻石繪像逮咸通中悟達國師寓此僑隱亦繼住持因題為聖母院云隋灌口山竹林寺釋道僊一名僧僊本康居國人以逰賈為業梁周之際往來吳蜀江海上下集積珠寶乃滿兩船時或計者云直錢數十萬貫猶恨不多取驗吞海行賈達于梓州新城郡牛頭山值僧逹禪師説法曰生死長久無愛不離自身尚爾况復財物仙初聞之欣勇内發深思惟曰吾於生多貪志慕積聚向聞正法此説極乎若失若離要必當爾不如沈寶江中出家離著索然無擾豈不樂哉即沈一船深江之中又欲更沈衆共止之令修福業仙曰終為紛擾勞苦自他即又沈之便辭妻子又見達房凝水滉瀁知其入定信心更重投灌口山竹林寺而出家焉初髮落日對衆誓曰不得道者不出此山即迥絶人蹤結宇巖曲禪學之侣相次屯集每覽經卷始開見佛在某處無不哽咽我何不值但見遺文或有造問學方者皆荅對善權𡨕符正則自初入定一坐則以四五日為恒惟客到其門潜然即覺起共接晤若無人往端坐靜室寂若虚空有時預告明當有客至或及百千皆如其説曽無欠長梁始興王澹褰帷三蜀禮以師敬攜至陜服于時道館崇敞巾褐紛盛屬相呵斥甚寄憂心焉僊乃晏如曽無所屑一夕道士忽見東岡火發恐野火焚害僊也各執水器來救見僊方坐大火中猛焰洞然咸嘆火光神徳道士李學祖等捨田造像寺塔逺近歸信十室而九州刺史鄱陽王恢躬禮受法天監末始興王𡨕感於同泰寺造四天王像毎六齋晨常設淨供僊後赴㑹四王頂上放五色光仙所執爐自然熖發太尉陸法和昔微賤日數載在山供僊給使僧有肆責者僊曰此乃三台貴公何縁辱罵時不測其後貴也和果遂昇衮服僊或勞疾見縹衣童子從青溪水出椀盛妙藥跪而進服無㡬便愈居山二十八年復逰井絡化道大行時遭酷旱百姓請祈僊即往龍穴以杖叩門數曰衆生何為嗜睡如此語已即𤣥雲四合大雨滂注民賴斯澤咸來禱賽欽若天神有須舎利即為祈請應念既至如其所須隋蜀王秀作鎭岷絡尋遣追召全不承命王勃然動色親領兵仗往彼擒之必若固執將即加刃僊聞兵至都無畏懼索僧伽㴝披已端坐念佛王達山足忽雲雨雜流雹雪崩下水涌滿川藏軍無計事既窘迫乃遙歸懴禮因又天明雨霽山路清夷得至僊所王躬進敬便為説法重發信心乃邀還成都之淨衆寺厚禮崇仰舉國恭敬號為僊闍梨焉開皇年中返于山寺道路自淨山神前掃年百餘嵗端坐而卒益州今猶有木景白疊尚存云是聖人仙闍梨物隋益州孝愛寺智炫者成都人也俗姓徐氏初生室有異光少小出家入京聽學數年請令覆講若瀉瓶無遺㑹周武帝廢佛法欲存道教乃下詔集諸僧道士試取優長者留庸淺者廢於是詔華野髙僧方岳道士千里外有妖術者大集京師於太極殿陳設高座帝自躬臨勅道士先登時有張賔最為首長高唱言曰原夫大道清虚淳一無雜祈恩請福上通天曹白日昇仙夀與天地同畢風教先被中夏無始無終含生賴之以得長生洪恩厚利不可校量豈如佛法虚幻言過其實不容本土客寓中華百姓無知信其詭説今日欲定臧否可出頭來看襄城公何妥自行如意座首少林寺等行禪師發憤而起諸僧止之曰今日事大天帝在此不可造次知禪師為佛法大海然應對之間復須機辯若非蜀炫無以對揚共推如意以將付炫炫既為衆所推安詳而起徐昇論座坐定執如意謂張賔曰先生向者所陳大道清虚淳一無雜又云風教先被中夏者未知風教之起起自何時所説之教於何處説又言佛法不容本土客寓中華可辯道是何時生佛是何時出賔曰聖人出世有何定時説教興行有何定處道教舊來本有佛法近自西來炫曰若言無時亦應無出若無定處亦應無説舊來本有非復清虚上請天曹豈得無雜夀與天地同畢豈得無始無終賔曰道人浪語為前王無識留汝等輩得至于今今日聖帝盡湏殺却帝惡其理屈令舎人謂之曰賔師且下賔既退帝自昇高座言曰佛法中有三種不淨納耶輸陀羅生羅睺羅此主不淨一也經律中許僧受食三種淨肉此教不淨二也僧多造罪過好行婬泆佛在世時徒衆不和遞相攻伐此衆不淨三也主法衆俱不淨朕意將除之以息虚幻道法中却無此事炫應聲謂曰陛下所陳並引經論誠非謬言但見道法之中三種不淨又甚於此案天尊處紫微宫恒侍五百童女此主不淨甚於耶輸陀羅之一人道士教中章醮請福必須鹿脯百柈清酒十斛此教不淨又甚於三種淨肉道士罪過代代皆有千古亂常姜斌犯法此又甚於衆僧僧衆自造罪過乃言佛法可除猶如至尊享國嚴設科條逆子叛臣相繼而出豈以臣逆子叛遂欲空於大寶之位耶今欲廢佛存道猶如以庶代嫡耳帝動色而下因入内羣臣僧衆皆驚曰語觸天帝何以自保以周武非嫡故炫曰主辱臣死就戮如歸有何可懼乍可早亡逰神淨土豈與無道之君同生於世乎衆皆壯其言明旦出勅二教俱廢仍相器重許以㛰姻期以共政法師志操愈勵與同學三人走赴齊都時周齊之界皆被槍布棘彼有富姥姓張鋪氈三十里令炫得過至齊盛為三藏名振東國武帝破鄴先遣追求帝弟越王宿與法師厚善恐帝肆怒横加異責乃鞭背成痕俗服將見越王先為言曰臣恨其逃命已杖六十令脱衣見帝帝變色曰恐其懷慚逺逝以至死亡所以急追元無害意責越王曰大丈夫何得以杖捶相辱待遇彌厚與還京師武帝崩隋文作相大𢎞佛法兩都歸趣一人而已嵗景將秋懷土興念又以蜀川迥逺奥義未宣援首西歸心存敷暢蜀王秀未之知也時長史周宣明入朝赴考文帝謂之曰炫法師安和耶宣明驚惶莫知所對文帝曰一國名僧卿遂不識何成檢校宣明稽首陳謝死罪及還先往寺㕘禮寺舊在東逼於苑囿又是鄱陽王葬母之所王既至孝故名孝愛寺宣明移就今處供養無闕至大業改為福勝寺法師宣揚覺倦入隱三學山觸目多感游山詩曰秀嶺接重煙嶔岑上半天絶巗低更舉危峰斷復連側石傾斜澗迴流瀉曲泉野紅知草凍春來鳥自傳樹錦無機織猿鳴詎假絃葉宻風難度枝疎影易穿抱袠依閒沼䇿戲荒田逰心清漢表置想白雲邊榮名非我顧息意且蕭然年一百二嵗不病而卒隋益州沙門富上者莫測何人恒依益州淨徳寺宿埋一大笠在路晝日坐下讀經人雖去來不喚令施有擲錢者亦不呪願每於靜路不入閙中雖在多年過無所獲有信心者曰城西城北人稠施多在此何為答曰一錢兩錢足養身命復用多為陵州刺史趙仲舒者三代之酷吏也甚無信敬聞故往試騎馬直過佯墮貫錢富但讀經目未曽顧去逺舒令取錢富亦不顧舒乃返來曰你見我錢墮地不曰見問曰錢今何在曰見一人拾將去舒曰你終日在路唯乞一錢豈有貫錢在地而不取者見人將去何不止之答曰非貧道物何為浪認仲舒曰我欲須你身上袈裟富曰公能將去復有與者可謂得失一種即疊授與仲舒下馬禮謝曰弟子周朝人官歴三代大與衆僧往還少不貪者聞名故謁本非惡意請往陵州富曰大善然貧道廣欲結縁願公助國安撫即是長相見受供養也舒徐歎曰巴中有人不可輕慢爾後不見益州人薊相者從揚州還見之亦埋笠路側顔狀如常隋益州長陽山釋法進新繁人白衣之時不噉辛腥在田農作以鏵刃為鍾磬步影而齋有送食晩便飲水而已所犂田地不損虫蟻一時空中聲曰進闍棃出家時到如是四五聲合家同聞進因詣洛口山出家行頭陀不居寺舎時蜀王秀聞名知難邀請遣參軍郁九閭長卿往便將左右十人辭王曰承有道徳如請不來當申俗法王曰不須威逼但以理延明當達此長卿出郭門顧曰今日將你輩往兠率天請彌勒佛亦望得何况山中道人有何不來初至長陽山下日暮見虎道蹲命人射之馬皆退走欲投村恐違王命俄見一僧負襆上山長卿命往為伴餘從并留步至寺所召入至床又見虎在床下怖不自安進遣虎出具述王意雖有荅對而怖形于相狀進曰檀越初出郭門一何雄勇今來至此一何怯憚長卿頂禮黙然因宿至旦令先往益貧道後來行至望鄉臺顧視進行已及與同見王入内受戒即日辭出所獲䞋施一無所受令往法聚寺停王顧諸佐曰見此僧令寡人毛豎戒神所䕶也後更召入城王遙見即禮進曰王自安樂進自安樂何為苦相惱亂作無益之事耶諸僧諌曰王為地主應善問訊何為訶責進曰大徳畏死須求王意眼見惡事都不諫勉何名𢎞教進不畏死責過何嫌乎時雖盛飾床筵厚味重結而但坐繩床噉麄餅而已乃至妃姬受戒切責放逸不念無常又辭入山重延三日限滿便返諸清信等咸設食而邀之至時諸家各稱進到總集計㑹乃分身數十處焉初王門師慈藏者為州僧官立政嚴猛瓶衣香花少闕加捶僧衆苦之而為王所重無敢諫者以事白進請為救濟荅曰其威力如此豈能受語耶苦請不已進造藏房門藏走出謂曰法門未可如是爾亦大力也還返入房蜀人以大甚為大力自此藏便息言僧侣獲安開皇中卒年九十六隋法進不知氏族住益州綿竹縣響應山玉女寺為輝禪師弟子後於定法師所受十戒精恪為務唯業坐禪寺後竹林常於彼坐有四老虎繞於左右師語勿泄其相也後教水觀家人取柴見繩床上有好清水拾兩白石安著水中進暮還寺彌覺背痛問其家人云安石子語令明往可除此石及旦進禪家人還見如初清水即除石子所苦即愈因爾習定不出此山開皇中蜀王秀臨益州妃患心腹諸治不損有綿州昌隆白崖山道士文普善者能昇刀禁火鵠鳴山有二道士能呼䇿鬼神符印章醮入水不溺並治無効乃使長史張英等往山請出為妃治病報曰吾在山住向八十年與木同性徐更苦邀進荅曰盡命於此可自早還信返具報王使六司官人犢車四乗將從百人重往迎請進曰王雖貴勝命有所屬執志如初信還王大怒自入山將手加罪既至山寺禮佛見進不覺身戰汗流王曰奉請禪師為妃治病禪師慈悲願救此苦荅曰殺羊食心豈不痛苦一切衆生皆是佛子因何於妃偏生此愛王慚愧懴悔仍請出山乃曰王命既重不可不行王自先行貧道後去王曰弟子步從與師同行報曰出家人與俗異但前行應同到王行兩日進已早達徑入妃堂見進流汗因爾除差施絹五百段衲衣袈裟什物等進令王妃以水盥手執物呪願總用迴入法聚寺基業即辭還山王與妃見進足離地可四五寸以大業十三年正月八日終此山中龍吟猿呌喧寺者三日隋慧琳姓薛綿州神泉人初隱於建明寺清虚守靜與物不羣寺有塑像常在供養像為生鬚三十六枚大業末年掃一古墳豎二竹竿云是天眼後忽拔一云宏農王為魔所拔也不久義寧嗣厯矣雒縣先有育王浮圖琳忽一時歴村借車三百乗云欲向迎浮圖於此安置未經旬日遂被火燒武徳年終潜伏草野人莫知也彼有楊祜師不測何人直往草中相見曽生未面宛若舊朋各云别來八百年矣曽為人呪病得荖病者令女賫裙以施女遂留衣送直琳遙見謂曰但將裙來我不須錢女驚其聖以貞觀四年示衆物故隋釋智方資中人童稚出家止龍淵寺輪法師所早與寶海周旋同往揚都雲法師講下機辨爽利商略詞義清雅泉飛故使士俗執紙抄撮者常數百人初講法華至塔品高妙序至釋義了乃曰何必昔佛國土有此高妙即揚都福地亦甚莊嚴至如彌天七級共日月爭光同泰九層與煙霞競色方井則倒垂荷葉圓桶則側布蓮花似安住之居南類尼佉之鎮北耳聞目見庶可聮衡録得者秘以齎歸益部吁嗟嘆為驚絶故其語出成章狀如宿構寶海頻來擊難發其聲采故海問曰三變此方改穢成淨亦能變凡成聖不荅曰化佛甚多狹故須廣凡聖自爾何勞改變又難若爾則六十小劫謂如食頃但是聖覩凡不能覩凡聖俱覩凡聖俱聖方笑曰高座何曽道此乃是自道自難耳海覺言失乃調曰三隅木斗何謂智方尋聲報曰瓦礫洿池那稱寶海衆大笑而散及疾甚海恒來看慰乃謝曰智方不能攝養致此沈痾仰勞仁者數來垂問願生善處常與同遊俄而異香滿室中夜卒年九十餘隋益州招提寺釋慧恭成都人也俗姓周氏周末廢佛法時與同寺惠逺結契勤學逺詣長安恭徃荆揚逺於京師聽得阿毗曇論迦延拘舎地持成實毗婆娑攝大乗並皆精熟還益講授卓爾絶羣道俗欽重䞋施盈積恭後從江左來還二人相遇欣懽共叙離别三十餘年同宿數夜語説言談逺如泉湧恭竟無所道逺問恭曰離别多時今得相見慶此歡㑹伊何可論但覺仁者無所説將不得無所得耶恭對曰為性闇劣都無所解逺曰大無所解可不誦一部經乎恭荅曰唯誦得觀世音經一卷逺厲色曰觀世音經小兒童子皆能誦之何煩大汝許人且仁者童子出家與逺立誓望證道果豈復三十餘年唯誦一卷經如指許大是非闇鈍懶墮所為請與斷交願法師早去無煩惱也恭曰經卷雖小佛口所説尊敬者得無量福輕慢者得無量罪仰願暫息瞋心當為法師誦一遍即與長别逺大笑曰觀世音經是法華經普門品逺已講之數過百遍如何始欲閙人耳乎恭曰外書云人能𢎞道非道𢎞人但至心聽佛語豈得以人棄法乃於庭前結壇壇中安高座繞壇數匝頂禮昇高座逺不得已於簷下據胡床坐聽恭始發聲唱經題異香氲氲遍滿房宇及入文天上作樂雨四種花樂則嘹亮振空花則雰霏滿地經訖下座自為解座梵梵訖花樂方歇惠逺接足頂禮淚下交流謝曰惠逺臭穢死屍敢行天日之下乞暫留賜見教誨恭曰非恭所能諸佛力耳即日拂衣長揖沿流而去蜀中廣記卷八十一
