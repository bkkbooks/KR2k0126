body:
  text: 蜀中廣記卷二十八明曹學佺撰名勝記第二十八川北道順慶府二廣安州治有秀屏樓霄漢閣皆顔魯公書擬峴亭南峰寺皆張商英詠圖經云右倚秀屛左瞰渠水志云秀屏山昔有石土地像宋太祖以筆㸃此山立軍治其像因自墜今郡治即石土地所在通志張無盡題擬峴亭詩英雄往事堪歎息闌干徙倚情何極學取山公醉似泥不同羊祜謀人國又題南澤寺詩孤雲飛逺岫落日滿平川寺據南山頂僧傳北祖禪碑目云大唐三聖碑睿宗御製文俱在州學內道德經碑在城北紫極觀唐咸通中州刺史程壽立公府建置碑宋開寶三年張琪記乾德六年許允修創也州立于濃洄鎮濃洄二水名寰宇記云濃水出龍扶速山東流入渠江洄水即渠水縈洄為潭者耳按唐地里志嶽池有龍扶速山環水出焉非濃水也州志云濃水即西溪水水色常不澄故曰濃發源距州治百二十里蓬州之綿埧流至橡樹埧二溪相合經龍扶速山下龍棲灘與環水合又至城南五里東折入渠江與洄水合是龍扶速山乃三溪合流處非源也渠江有三十六灘水之灌輸其間者渦渟渠别莫知其幾中兩渠相距二尺廣深半之可受流觴天巧致然非人力疏鑿碑目云篆水在州東北五里渠江曲尺灘下石磧平坦冬月水涸磧露仲春水生磧沒深不盈尺日光照映金波透徹其年若登則紋宛成篆籀瀠洄波面其見不常邦人以之卜歲云宋石刻故事以三月三日至河曲過渠江流杯大觀乾道淳熙紹興嘉定間知軍宇文能承務郎張廷堅德州參軍李桃陶彥逺何溫叔游伯畏何宋卿楊次臯安康民各同時髦游賞其中有連游二三日者如崇慶杜鵬舉奉親挈家來遊有龍鏡潭水圓如鏡宋刻龍鏡二字于石有琉璃淵兩水相映其一紫碧痕如羅帶其一深清淵如琉璃俱在篆水左右江中沱磧有若鸕鷀若龜蛇若繫縧若張繖有如明月之團圓有如神仙之遊戲皆以形似得名名賢韻士每過其處為之流連題詠唐元稹詩云渠江明淨峽逶迤船到名灘拽􅜺遲櫓窡動搖妨作夢巴童指點笑吟詩畲餘宿麥黃山腹日背殘花白水湄物色可憐心莫恨此行都是獨行時宋張無盡詩濃洄江水瀉髙灘中有神龍久屈蟠衆樂妙音時響亮雙娃長袖忽斕珊世間變化無非幻閣上登臨正好歡觀幻見真真亦幻谷花岩草謾憑欄何行中宕渠廣安駐泊記南連巴徼北接通川復嶺東橫清江西下林深箐密岩穴幽邃信為奇觀也其有姜山則以伯約屯兵而名山有姜山寺唐僖宗時建下有飛泉二字僧可徹書志云在州東二十里皛然山則以皛然山龍祠之神得名碑目云勑賜孚惠靈公廟碑在皛然山有晉太康八年碑文志云在州東南四十里按安子文有皛然集指此子仙山則以神仙馮勝得名志云馮緄有子修煉于嶽門山一日辭父母謂當仙去以來晨白鶴飛翔為候緄登此山望之已而果然又名望子山吳薦廣安志曰子仙觀在州治西二十里子仙山上五代時居人將軍馮勝之子修煉于此一日仙去將軍立堂數楹于得仙處則所謂將軍者馮勝也非漢車騎將軍馮緄也緄傳子鸞舉孝廉為郎中並無得仙之事鶴棲山則以謝自然得名碑目云鶴棲山在冀都鎮有古碑字雖漫滅尚髣佛可認其略云唐貞元十年歲在甲戌果州女子謝自然白日升仙刺史李堅以狀聞又為之傳于時先有雙鶴棲宿此山然後飛迎自然駕之而去自是俗呼為鶴棲山按自然升仙在果州金泉山李堅上其事唐德宗賜詔今刻于金泉年月日與此碑所載不差通志云在州東之新明鎮西南十里故宕渠城古之賨國都也晉中興書曰賨者廩君之苖裔巴氏之子務相乘土船而浮衆異之立為廩君子孫布列于巴中秦并天下以為黔中郡薄其賦稅人出錢四十巴人謂賦為賨因名大小良城石崖四絶天險之地宋史淳祐四年制置使余玠移渠州治于此已上二則志云俱在州東北五六十里其為名賢芳躅則有孝義臺通志云唐陳子昻之後有遷居于此者七世同居唐旌表之宋時臺尚存故縣鎮顔魯公碑碑目云舊傳邑宰有姓顔者魯公之先魯公之刺湖州也過道院因有碑銘今碑磨滅存命除湖州刺史顔真卿勒銘于道院凡十四字乾道中移置軍城有張唐英墓志云在州西三十里按唐英新津人慶厯三年進士歷官殿中侍御史卒葬雙流之三珠里紹聖三年其子庭玉徙居廣安改葬於嶽門山東南峰下其弟商英往來常居於此山水名勝多所品題有安丙墓志云在州南五十里宋史吳曦僣叛丙矯密詔誅之除四川安撫使有張庭堅墓志云在州北宋史廷堅廣安人元祐進士為右正言逾月數上封事訟司馬光吕著之寃疏蔡京章惇之罪有黎錞鄉志云渠江人任直講宋英宗以蜀士問歐陽修對曰文行蘇洵經術黎錞也嶽池縣寰宇記云嶽安山在縣東三十五里髙六百丈嶽池之水出焉上有音聲鳥也唐何少卿讀書在龍穴山方輿云嶽池之封山也去縣五里宋元豐間張諫議廷堅讀書在羊角竹洞志云北三十里梁天監中有講道德經者感二羊跪聽故名慶厯間狀元蒲信讀書在金隴山志云碑見存碑目云龜山碑在嶽池縣東六十里鑿地得斷碑乃唐人經行所記又云杜甫山寺詩刻在縣北三十里嵎山上有象王獅石左右龍洞書岩四景又云老君山舊碑載唐天祐間有道士乘馬至此馬化為石道士亦不見其寺名之佳者志云西三十里酉溪源自舊縣流入平灘有酉溪寺又云西二十里鴨山昔人見雙鴨飛入山池化為石因名上有鴨山寺唐乾元中建又云南二十里雲鈎寺唐貞觀建每晨有白雲鈎其棟宇舊名毗盧也然豫過縣西千佛崖古觀寺峻級長林烟蘿下垂拂人車馬致可恱耳按畫苑以為唐開元僧元應鐫舊額栖岩寺渠縣周書曰渠州言鳯凰降于楓樹百鳥列侍志云東北百里鳯凰山梓潼化書之第五十二鳯山化也今為鳯來里有清河寺古清河縣學基有二石柱刻蟠龍甚工華陽國志秦始皇時有長人二十五丈見宕渠太史胡母敬曰是後五百年外必有異人為大人者及李雄之王祖世出自宕渠識者以為應之寰宇記云宕渠山一名大青山圖經云在州東五十里其山東西兩門延連相接山澗長狹有似溝渠蜀都賦外負銅梁而宕渠也碑目云有石刻宕渠及花果園大字志云渠水有三源一出達州明通鎮一出巴山一出羅娛山至三㑹鎮過宕渠山㑹潜水至縣北㑹渝水經廣安南渠口㑹嘉陵江至合州㑹涪水入江按潜水亦發源于宕渠山麓酈道元謂宕渠縣有大穴潜水出焉通罡山下而南入于江是也寰宇記云渝水即流江也夾水上下皆賨民所居華陽國志宕渠故賨國今有賨城盧城碑目引九域志云流江古賨城有古碑文字磨滅唐鄭谷渠江旅思詩云流落復蹉跎交親半逝波謀身非不切言命欲如何故楚青田廢窮巴瘴雨多引人鄉泪盡夜夜竹枝歌天寧寺記曰宕渠古郡依山為城自珠嶺東下至石門伏而特起隱隱隆隆由郡北直南而下為馬鞍為登髙為西岩擁蔽坤維升虛降原始得郡治岡分嶺别俯首東向為袁氏之岩迤邐南轉為瞿氏之山下瞰巴江舒翼展脛直趨水濵而後已由瞿山之北袁岩以南川原開曠形勢之勝與郡治相埒是為天寧寺按賀知章題袁氏别業云主人不相識偶坐為林泉莫漫愁沽酒囊中自有錢即袁氏岩也志亦收之隋書地里志通川宕渠其地皆接連漢中有八濛山寰宇云在縣北七里起伏八處有水環之不匝者一里常有煙霧濛其上故名三國志張郃自漢中進軍宕渠之䝉頭蕩石與張飛相拒五十餘日飛率精兵萬餘人從他道邀郃軍交戰山道狹前後不得救飛遂破郃巴土乃安志云上有張飛廟碑目有流江縣題名云漢將張飛率精卒萬人大破賊首張郃于八濛立馬勒石碑目又云唐末中原為黃賊扇亂前進士崔塗避地于渠州春日獨遊沖相寺由此登眺翌日北歸題名于石按沖相寺距城四十里乃定光佛道場也崔塗本集詩云水流花謝本無情送盡春風過楚城蝴蝶夢中家萬里杜鵑枝上月三更故園書動經年絶華髮春催滿鏡生自是不歸歸便得五湖煙景有誰爭方輿又載鄭谷渠州汧江寺詩云起居瀟灑寄禪關髙掛朝簮淨室間孤島暫留雙鶴歇五雲爭放二龍閒輕舟共泛花邉水野屐同登竹外山仙署金閨虛位久夜清應夢近天顔按古汧江寺在縣東起文峰下宋改為祥符寺矣他若山中之沼四時常緑洲上之魚肖像皆黃亦勝與境㑹云鄰水縣寰宇記云鄰水出鄰山南流中有大磧懸流十丈奔急若驚湍電瀉又云龍穴在鄰山之金盤山下入龍門鎮有瀑布百八十尺號為散水也此山出鐵鄰比相次華陽國志云宕渠郡治有鐵官石蜜山圖所采耳志云杜工部寓居此縣之善慶里昔建有書院岩上大鐫少陵二字又云郭璞游此遺碣云日出照華山金銀對馬鞍鴛鴦池裏宿石版響三潺蓋天池山下溪河中有石一方每擊則響聲三應今謂之響石板也大竹縣昔治在鳯來鄉接渠縣界今治在木門鎮志云縣東門城內二小岡上有兩木對生交合形如闕門元徙縣治于此二岡雖連土色則逈别矣傳記所稱九盤七石昭其數也榮城亢谷别其象也巴河漢墓記其跡也馮碑沈闕銘其勛也九盤者治西十里有山髙峻盤旋九折行者憚之七石者鴈平里有七石參差並立若碑林然榮城者仙門里有榮城四圍險峻髙阜寬平宋鮮史君吕保相禦元兵之所亢谷者編戶西里有亢谷石長數丈髙五尺厥形若鰌巴河者榮安鄉有巴王河相傳巴王經此今為鎮漢墓者平池里有王平墓土人掘得銅香爐安漢侯銀牌等器有漢王將軍字額馮碑者廷尉馮緄此縣人墓在縣北古賨城雙石闕西南闕髙丈二尺額篆云漢車騎將軍馮公之銘文作隸書字猶可辨沈闕者亦雙石闕在縣北一里其一鐫云漢謁者北屯司馬左都侯沈府君其一鐫云漢新豐令交趾都尉府君其闕上各鐫出屋宇禽獸飛走之像又有單石闕二相去雙石闕一里其上鐫雕物像與此同蓬州圖經環蓬皆山而北山為之主溪壑奇秀兩蓬髙峙屹然雲霄多神仙隱士又多崇蘭黃花每春秋開時清香滿山谷間方輿云大蓬山在州東南七十里狀若海中蓬萊因以為名小蓬山一名秀立與大蓬對峙相去二里綏山即大蓬之始號也按列仙傳云葛由者蜀之羌人周成王時刻木為羊賣之一旦乘木羊入蜀蜀中王侯賔之追上綏山山在安固縣東三十里隨之者皆得仙術本志云宋元符進士何格非遊大蓬山詩注引葛仙翁云兹山狀類海中之山是蓬山名由此而改山有透明岩孔穴相連宛如穿鑿之狀方輿云亦名棲真岩在大蓬山前俯瞰縣郭天氣清明渠達諸山隱隱可數碑目云透明岩下有爾朱真人書隔凡石三大字又云唐人知事任惠琳所書透明崖三大字橫直各二尺餘楷法遒徑石刻宛然志云隋爾朱真人修煉于透明宕成道唐懿僖間抵蓬州客安漢館張氏十二年州守以為惑衆沉于江二漁者得之釋其縳三人白日升天有仙閣岩夜出聖燈志云聖燈現處凡五北山鳯凰山連翹山大蓬山小蓬山其在大蓬者尤靈異有降香碑志云宋元豐間此州陳才人宋充媛為皇子公主祈福立降香碑在大蓬山邑人元祐進士雍沿蓬州十三景詩有云元豐天子太平時宫掖賢明有二姬能就此山爇龍炷至誠為國長金枝小蓬山下有仙女墳志云元時普安里民家女及笄一日父母他出有道士叩門求火女不啓戶道士大書閉門不納四字而去女手擦之不去舌餂之乃滅因感而娠父母疑而責之不自白遂投江死其尸逆流親戚相與撈葬之忽自腹中裂出肉印方驚駭間水暴漲湧沙成一大墳于江中水左右夾流若神力焉今名仙女墳舊縣以相如名嘉陵江繞之周地圖記云司馬相如故宅在縣南二里本地有相如坪相傳云相如别業在此西濵漢水藂薄鬱然其基亦名琴臺髙六尺周四十四步碑目云相如故宅碑在相如縣西南光聖寺漫滅不可讀陳子昻文又云唐相如縣石龕佛像記在縣治縣令陳子良撰按子良伯玉之兄也今州有相如祠宋王儔以舊本長卿像圖于祠壁祠成為記略云伏念長卿傑出于西京文章極盛之際至今薄海內外人無賢愚皆知有長卿言語之妙若揭日月儔嘗過縣之琴臺乃圖經所謂長卿故宅者一時遺跡倣佛尚在又謂縣雖僻左而江山風物可樂也從其人遊皆好學能文章亦有所自來矣今之從政者祖律令所有乃敢知至于風化謝非已事否則日不暇也鄧侯獨以自任不辭其為政知所先務矣按元時祠圯延祐四年驛丞苖成者重建志云嘉陵江畔有石佛寺建于晉魏間有一僧以解龍困獲寶盆弟子爭之龍取盆去元喬西雪歌詳其事今有驛名龍溪或取此志又云嘉陵江有龍宫昔有鮮于氏子見人從雲霧中引入龍宫覽諸怪異歸述家人云云志又載鮮于氏之子遊學錦官偶老翁丐通一家信道次石門取書置石上忽有人引生前行見一王侯曰荷君寄音乃以藥數粒授生後生壽至百歲按石門在治北六十里右有石梁橫卧嘉陵江中甚險元至正壬午龍斷其梁水由中行下有深潭魚龍之巢穴也酈道元注水經云縣有漢車騎將軍馮緄桂陽太守李溫冢二子之靈常以二月還則漢水暴長郡俗于水上祭之有雞卸神祠益州記云雞卸祠在相如縣以神在雞卸溪側故為祠號有芳溪館元稹感夢詩云蓬州三十里有館名芳溪已上三則俱在水傍若夫岩峙東西之勝泉分金玉之形樓著文明之盛宫開紫極之祥守以真卿始為勝地禪因宗密大振家風皆可述焉方輿云東岩在龍章山俯瞰大溪前眺歌陽安固諸山歷歷可考西岩在報恩寺西南隅前有閣曰松風謖謖來吹人本志云咸安郡西資聖院金錢井每月明輒有金錢影浮水上又云州治內有玉環井形如玉環也文明樓額志云郡人何弱翁建臨卭魏了翁書里豪藏之家為雷所擊移之書院雷復擊之凡三震而木不傷今懸在北門外樓上按弱翁宋進士也了翁即魏華父丞相志云紫極宫在州南泮宫之側東岩中峰巍然峙起後殿上有金鑄𤣥宗像官中老君殿題字乃蜀王建永平年號顔魯公本傳唐上元元年李輔國遷明皇于西宫真卿率百僚上表請問起居輔國惡之貶蓬州長史宋唐子西贈杜守詩云去天一尺古蓬州除守年來得勝流志云圭峰禪師名宗密相傳州之鷺鷥山有井井側有巨人跡師母履之而孕已免師以為不祥弃之野牛馬避弗踐鷺鷥羽覆之母乃收撫及長出家于青蓮山講經地湧青蓮八龍聽講今有八龍池營山縣咸安在蓬州曰郡在營山曰縣若大蓬山則兼得而有之州之北山即縣之南山也說者以為大蓬之秀士岩飛仙岩朝陽洞魯公祠皆當縣界按秀士岩乃李特讀書處俗名天子讀書臺岩下石室刻雲屋二字志云登封縣令應真人諱靖唐僖宗時為登封令後弃官學道得仙紹興中何格非見之于大蓬飛仙岩東自是數至格非第又云大蓬山有朝陽洞空濶可容數百人封塞已久萬厯中重開續碑目云營山縣顔祠有米元章書仙真事石刻乃近日南充王隆吉得於費縣草莽中者翻刻于此其東四十里則青羊山有青羊宫元人建真武古像碑刻存焉鳯院山頂有鳯凰臺相傳鳯凰曾棲其上有龍馬槽石形隱隱如龍鱗之狀宋郡守吳幾復詩蒼石皴紋龍跡在清泉涵泳海源通西南六十里則披衣山天將雨山上雲霧馳曵如披衣焉山上有雲山寺寺中有池去果州嘉陵江三十里江水或淺其池亦淺江水或漲其池亦漲號天生池其山又有青溪之水出焉北百二十里則孔雀洞洞門如圭竇其中宏敞左右有石床洞盡處有石孔雀水出喙中儀隴縣石銘儀隴洞勒金堆乃晉張英遇仙處也石門雙扇痕迹宛然事詳神仙記中古方州置在方城山下今縣之主山也為抱朴子結菴之處有抱朴菴三字刻諸石壁圖經葛洪詩云酒盡君莫沽壺傾我當發城市多囂塵還山弄明月即此山作矣志云古伏虞縣置在伏虞山下宋僧道澄結菴于此孫諤贈以詩曰聞說虞山有道澄白雲深處不開扄自言古佛何為者只是無心一老僧刻石于本山之奉國寺若夫龍車之穴四時花發六澗之水相扶合流火井天寒焰從地出龍鮫聖水浴蠶倍利則皆以秀特聞矣蜀中廣記卷二十八
