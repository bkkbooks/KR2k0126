body:
  text: 蜀中廣記卷一百六明曹學佺撰畫苑記第二李升者成都人也小字錦奴弱冠工山水天縱生知不從師授初得張藻員外山水一軸玩之數日棄去曰未盡妙也遂出意寫蜀中境山川平逺心思造化意出先賢數年中創一家之能盡山水之妙每含毫素必有新竒如桃源洞圖武陵溪圖青城山圖峨眉山圖二十四化山圖好事者得之為箱篋珍明皇朝有李將軍思訓者擅名山水稱李將軍蜀中乃呼升為小李將軍蓋其藝相匹云悟達國師自京入蜀請于聖壽寺本院同居數年於殿壁畫三峽圖一堵霧中山圖一堵又于大聖慈寺真堂內畫漢州三學山圖一堵彭州至德山圖一堵時稱悟達國師真堂有四絶常粲寫真僧道盈書額李商隱題讃李升畫山水今見存出益州畫録古寺名筆大聖慈寺四絶堂畫壁二堵為彭州至德山金堂縣栖賢山壽寧院有三峽圖及霧中山二堵俱唐李升筆評為妙上孫位東越人也僖宗南巡自京入蜀號㑹稽山人性情疏野襟抱超然好飲酒未嘗沉酩禪僧道士常與往還豪貴禮有少慢縱千金不屑唯好事者時得其畫焉光啓年應天寺無智禪師請畫山石兩堵龍水兩堵寺門東畔畫東方天王及部從兩堵昭覺寺休夢長老請畫浮漚先生松石墨竹一堵倣潤州高座寺張僧繇戰勝一堵兩寺天王部衆人鬼相雜豫㦸鼓吹縱橫馳突交加戛擊欲有聲響他若鷹犬之類皆三五筆而成弓弦斧柄並掇筆而描如從繩而正矣其作龍拏水洶湧千狀萬態勢欲飛動松石墨竹筆精墨妙莫可記述非天縱其能情高格逸孰能與於此邪悟達國師請於眉州福海院畫行道天王及松石龍水兩堵並存不知其後有何所遇改名遇成都玉局觀有孫位畫龍釋貫休詩云我見蘇州崑山佛殿中金城柱上有二龍老僧相傳道是僧繇手尋常入海共龍鬬又聞蜀國玉局觀有孫遇蹟蟠屈身長八十尺遊人爭看不敢近頭覷寒泉萬丈碧景朴者蜀人也蜀廣政年於應天寺門西畔畫西方天王及部從兩堵以對孫遇筆識者比之蹄涔巨浸未得萬分之一慮誤後人因附政之出名畫録五代歐陽炯應天寺門左壁天王畫歌曰錦城東北黃金地古昔何人興此寺白眉長老重名公曽識㑹稽山處士寺門左壁畫天王威儀部從來何方鬼神怪異滿壁走當簷颯颯生秋光我聞天王分理四天下水晶宫殿琉璃瓦綵仗時拂琳琅裝金鞭頻䇿麒麟馬毗沙大像何光輝手擎巨塔凌雲飛地神對出寶瓶子天女倒披金縷衣唐朝說著名公畫周昉毫端善圖寫張僧繇是有神人吳道子稱無敵者竒哉妙手傳孫公能於此地留神蹤斜窺小鬼怒雙目搘倚越狼高半胸寶冠動總生威容趨蹌左右來傾恭臂橫鷹爪尖纎利腰纚虎皮斑剝紅飄飄但恐入雲中步驟還疑歸海東蟒蛇拖得渾身墜精魅搦來雙眼空當時此藝實難有鎮在寶坊稱不朽東邊畫了空西邊留與後人教敵手後人見者皆心驚盡謂名公不敢爭誰知未滿三十載或有異人來間生匡山處士名稱朴頭骨高竒連五嶽曽持象簡纍為官又有蛇珠常在握昔年長老遇竒蹤今日門師識景公興來便請泥高壁亂搶筆頭如疾風逡巡隊仗何顛逸散漫竒形皆湧出交加器械滿虛空兩面劃然如鬬敵聖王怒色覽東西劒刃一揮皆整齊腕跟獅子咬金甲腳底夜叉擎絡羇馬頭壯健多筋節烏嘴彎環如屈鐵遍身蛇虺亂縱橫繞頷髑髏乾碎裂眉粗眼豎髮如錐怪異令人不可知科頭巨卒噉生鬼半面女郎安小兒況聞此寺初興置地脉沉沉當正氣如何請得二山人下筆忽成千古事君不見明皇天寶年畫龍致雨非偶然包含萬象藏心裡變現百般生眼前後來畫品列名賢唯此二人堪比肩人間是物皆求得此樣欲於何處傳常憂筆底生雲霧揭起寺門天上去出野人閒話畫品云春龍起蟄圖蜀文成殿下道院軍將孫位所作山臨大江有二龍自山下出一龍蜿蜒驤首雲間水從雲氣布上雨自爪鬛中出魚蝦隨之或半空而隕一龍尾尚在穴前踞大石而蹲舉首望雲中意欲俱往怒爪如腥草木盡靡波濤震駭澗谷瀰漫山下橋路皆沒山中居民老小聚觀扶户闞牖人人驚畏若屋顛墜筆勢超軼氣象雄放非其胸中磊落不凡神物變化未易能也位後名異蓋遇異人得度世法云李畋昭覺寺記寺有孫位畫行道天王像及浮邱先生松竹蘇東坡云古今畫水多作平逺細皺其善者不過能為波頭起伏唐處士孫位始出新意畫水之變號為神逸其後蜀人黃筌孫知微皆得其筆法常於大慈寺四壁作輸瀉跳蹙之勢洶洶若奔崕也知微死法遂中絶東坡雪浪齊銘豫於中山後圃得黑石白脉如蜀孫位孫知微所畫石間奔流盡水之變又得白石曲陽以大盆盛之激水其上名其室曰雪浪齊銘云畫水之變蜀兩孫與不傳者歸九原異哉駮石雪浪翻石中乃有此理存玉井芙蓉丈八盆伏流飛空漱其根東坡作銘豈浪言四月辛酉紹聖元年道士張素卿者簡州人也少孤貧性好畫在成都主譙國夏侯公孜宅多見隋唐名畫藝成之後落拓無羈遂衣道士服唯畫道門尊像豪貴之家少得其跡乾符中居青城山常道觀焚修至中和元年僖宗遣使與賜紫道士杜光庭封丈人山為希夷公癸卯嵗素卿上表五嶽既已封王丈人位居五嶽上不可稱公是嵗敕改封五嶽丈人為希夷真君詔賜紫素卿有老子過沙圖五嶽朝真圖九皇圖五星圖老人星圖二十四化真人像太無先生像天分敏速落錐之後下筆如神自始及終更無改正龍興觀多其畫壁年深皆頽損餘張伯子堂板龕內門龍虎兩軀見存王蜀先主修青城山丈人觀命於丈人真君殿上畫五嶽四瀆十二溪女山林溪沼樹木諸神及嶽瀆曹吏詭怪之質生於筆端上殿見者無不恐懼又於簡州開元觀畫容成子董仲舒嚴君平李阿馬自然葛元長壽仙皇初平葛永璝竇子明左慈蘇耽等十二仙君像及諸仙賣卜賣藥書符導引時事筆蹤灑落彩色妍麗當代名流皆推妙手蜀檢校太傅安公思謙好古博雅時得名畫皆獻之如黃筌滕昌祐石恪在其門館賔禮優厚甲寅嵗十一月十一日為蜀主誕辰安公進素卿所畫十二仙真形十二幅蜀主耽玩歎賞者久之因命翰林學士禮部侍郎歐陽炯次第讃之翰林待詔黃居寶八分書題凡有醮奏輒於玉局開懸供飬乾德三年蜀平吏部侍郎吕公餘慶鎮蜀並將進呈出益州畫録朱景𤣥云張南本不知何許人中和八年寓蜀工畫佛像人物龍王神鬼有金谷園圖勘書圖詩㑹圖白居易叩齒圖高麗王行香圖今聖壽寺中門賔頭盧變相東廊下靈山佛㑹大聖慈寺華嚴閣下東畔大悲變相竹溪院六祖興善院大悲菩薩八明王孔雀王變相並其筆相傳南本于金華寺大殿畫明王八軀才畢有一老僧入寺驚蹶而仆已言初不知是畫但見大殿遭火所焚當時孫位畫水南本畫火代無及者水火之畫皆無定質唯此二人冠絶今古李方叔云始南本與位並學畫水皆得其法南本以為同能不如獨勝遂專意畫火獨得其妙今此辟支佛結跏趺坐火周其身筆氣焱鋭得火之性觀者以煙飛電掣烈然有焚林燎原之勢佛以定慧力坐其間安然不動則豈毫末小利害足以動其心乎豫為之偈曰大士坐禪心若水月火周其身威焰炎烈靜觀無始火本不熱與火相忘何生何滅吾觀若人孰懼燒劫名畫録僖宗駕回之後府主陳太師於寶厯寺置水陸院請張南本畫天神地祗三官五帝雷公電母嶽瀆神仙及古帝王於蜀中諸廟百二十餘幀千怪萬異神鬼龍獸魍魎魑魅錯雜其間時稱大手筆也至孟蜀時被人模搨竊換真本鬻之荆湖高氏今所存贋本耳淳化年亦遭搓劫散失成都古寺名筆華嚴閣窗外大悲像一堵保福院殿後海山觀音一堵彌勒院壁十六羅漢及文殊普賢皆待詔張南本筆妙格中品也海山自昭覺移來者按李畋昭覺寺記有張南本畫水月觀音或即保福院物石恪字子專成都人也幼無羈束長乃博綜儒學好畫工古體人物斆張南本筆法有田家社㑹圖鱉靈開峽圖夏禹治水圖新羅人較力圖陳子昂盧藏用宋之問高適畢構李白孟浩然王維賀知章司馬承禎仙宗十友圖嚴君平拔宅升仙圖五星圖南北斗圖三教圖道門三官五帝圖壽星圖城中寺觀亦多其筆兵燹後餘聖壽寺經閣院𤣥女堂六十甲子神像及龍興觀仙遊閣下龍虎君並存益州畫録劉道醇名畫評石子專成都郫人性輕率尤好淩轢人常為嘲謔之句略協聲韻與俳優不異有雜言傳於世初事張南本學畫才數年已出其右多為古僻人物詭形殊狀以蔑辱豪右西川人患之嘗畫五丁開山及巨靈擘太華圖其氣韻剛峭為時所稱今蜀㑹秦川及闕下尚多恪筆畫品云玉皇朝㑹圖蜀石恪所作凡天仙靈官金童玉女三官太乙七元四聖經緯星宿風雨雷電諸神嶽瀆君長地上地下主者皆集於帝所玉皇大天帝南面端扆而坐衆真仰首承望清光見之者神爽超然如在通明殿中也其作水府官吏腰間繫魚蟹蓋以侮觀者恪性不羈滑稽玩世故畫筆豪放出入繩檢之外而不失其竒所以作形相或醜怪竒崛以示變頃見其作翁媪嘗醋圖搴鼻撮口以明其酸又見作鬼百戲圖鍾馗夫婦對案置酒供張果肴作執事諸鬼皆學其情態前有大小鬼數十合樂呈伎倆曲盡其妙此圖玉皇像不敢深戲然猶不免懸蟹欲調後人之一笑也喻汝礪玉局洞石恪畫天仙四壁歌曰真人何年下紫清目睛飄墮如流星至今玉洞通杳冥蕭然紫室之威靈杖屨而來六月望赤旱裂石風淒泠歘然四壁呀欲動神怪夭矯目喪睛道與之貌非丹青馭風而行誰使令雲飛電掣集帝所超然得意皆天人異哉石子偉丈夫胸中磊磊怪所儲𤣥圃之山帝所居子游其間墜雙鳬不然安知天上有此樂禿筆一掃凌方壺細看毛骨分錙銖偉形傑狀人人殊古來列真誰所摹前稱關同後張圖近之豪者郭忠恕落筆拂捩如奔瀦兩公軼蕩不拘束筆力磊砢相劘扶我來憑欄聊一呼隨翁聯軒上清都昌州惠因院藏經殿後壁有石恪作水墨文殊偕維摩問疾一堵出雜記古寺名筆成都白馬院佛堂十六羅漢石恪筆宋楊祐甫有眉州十事記石恪畫護法神是其一也見輿地紀勝中江縣志有響壁在寧國寺殿北隅今毁祕書丞萬當世記云中江縣耆舊相傳縣署東有寧國寺寺之大雄殿北隅有古畫西方變相音樂壁一堵若人盡心以瞻舉手而拍則壁中有管絃之聲肆發於外豫自蒞邑熟聞斯言心竊疑之㑹雪山嗣中懿因謂曰邑大夫語我響壁實耶虛耶吾將聽之乃以孟春上旬顓造金地首窺玉毫設席以禮之馨爐以祝之企其高壁覽其妙畫非古非今或明或暗百佛雖具五彩微潰引掌大拍和音載生始則杳杳然若細流之發深谷也終則錚錚然若涼颸之振逺空也若然則瓠巴之琴蒙恬之箏孔偉之琵琶師涓之箜篌何雜沓于中而悠揚于外也又不知我大雄氏出無何之鄉化有緣之俗發兹名筆警此殊方也按其畫乾符四年季夏所作四朝變現迄今於斯信矣噫非畫之精則神之靈非佛之明則人之誠何感應如是之通已亦不自知其然也視夫登孔子之堂而聞金石絲竹之音從汗漫之遊而見雲軺風馭之彩者又何逺乎此三教之所以鼎盛垂於無窮也因為之贊曰寧國梵宫在邑之東壁有妙畫畫西方中五彩彌暗百靈肇通潔心一禱沉檀靄空舉手一拍管弦鏘風其聲何若秋夜高松其聽何若春曉逺鐘非神之變即墨之工非佛之力即人之崇百九十載唐宋昭融無記無贊何以永終吕嶢者京兆人也唐翰林待詔隨僖宗至蜀授將仕佐郎守漢州雒縣主簿賜緋魚袋今大聖慈寺華嚴閣上天王部屬諸神及王波利真並其筆見存竹度者雍京人也工畫人物佛像聞成都新修大聖慈寺欲繪吳道元地獄變相于中道逺莫致逮廣明年隨僖宗入蜀則左全已在多寶塔畫竟遂於華嚴閣下後壁西畔畫丈六天花瑞像一堵施焉右二則益州畫録成都名筆載華嚴閣當面四壁有王波利小像吕嶢筆也又云華嚴閣影壁之後近西壁上有畫天花瑞像一堵待詔竹䖍筆也滕昌祐字勝華本吳人隨僖宗入蜀以文學從事不婚不仕惟書畫是好性情高潔不肯趨時常於所居樹竹石杞菊種名花異草以資其畫殁年八十有五初攻畫無師唯寫生物以似為工而已有蟲魚圖蟬蝶圖生菜圖折枝花圖折枝果圖雜竹樣造夾貯生果隨類傅色並擬諸生又工書時呼滕字今大聖慈寺文殊閣普賢閣蕭相院方丈院多利心院藥師院天花瑞像數額並昌祐筆也其畫蟬蝶草蟲謂之㸃畫蓋陸果劉褒之類也畫折枝花下筆輕利用色鮮妍邊鸞之類也出益州畫録畫評云趙昌劒南人性傲易雖遇强勢亦不肯下之游巴蜀梓遂間善畫花果初師滕昌祐後過其藝時州伯郡牧爭求筆迹昌不肯輕與故得者以為珍玩大中乾符中丁朱崖奉白金五百為壽昌感其意親往謝之朱崖延於東閣求生菜數窠及爛瓜生果等命筆遽成而去晚年還蜀尤有聲譽多出金購其舊畫以自祕有門生王友亦知名又云菡蓞圖趙昌作昌善畫花設色明潤筆跡柔美國朝以來有名於蜀時稱徐熙畫花傳花神趙昌畫花寫花形言比熙則差劣耳其後鐔宏王友之輩皆弗逮也蓮花生泥汙之中出于水而不著水昌作此花標韻清逺能識此意又云王友字仲益蜀人師趙昌畫花木不由筆墨專尚設色得其芳艷之態今豪貴家得友筆往往目為趙昌以其親切故難辨也達守時道宏廣叔家有艾宣棘鶉圖徐高魚圖王友折李草蟲圖出銘心絶品大聖慈寺六祖院羅漢閣上有峨眉青城羅浮霧中四山四堵昭覺寺大悲堂內四天王兩堵堂外觀音一堵寺門後東西天王兩堵並中和年畫不記名姓出益州畫録張詢者南海人也中和年隨駕到蜀與昭覺寺休夢長老有故遂依托焉于本寺大慈堂後畫壁三堵一早景一午景一晚景謂之三時山僖宗駕幸兹寺盡日歡賞王蜀太子簡王欲遷壁於東宫為壁泥通枋移損不全乃止出益州畫録趙德齊者溫竒子也王蜀乾寧初精舍未嚴禪室未廣先主於大聖慈寺大殿東廡起三學延祥之院請德齊於正門西畔畫南北二方天王兩堵院門舊有盧楞伽畫行道高僧三堵六身賴德齊遷移獲全至今光化年先主受勑置生祠命德齊與高道興同畫西平王儀仗旗纛旌麾車輅法物及朝真殿上皇姑帝戚后妃嬪御真百堵已授翰林待詔賜紫金魚袋光天元年戊寅先主殂後主復命與道興畫陵廟鬼神人馬及車輅儀仗宫寢嬪御一百餘堵今大聖慈寺竹溪院釋迦十弟子开十六大羅漢崇福禪院帝釋及羅漢崇真禪院帝釋梵王及羅漢堂文殊普賢皆其筆見存高道興成都人攻雜畫尤善佛像蜀光化中授待詔賜紫及畫儀仗陵廟具德齊傳中别畫大慈寺兩廊高僧六十餘軀華嚴閣東畔丈六天花瑞像並存右二則益州畫録名畫記高道興事王蜀為內圖畫庫使工佛道雜畫用筆神速觸類皆精諺云高君墜筆亦成畫子從遇事孟蜀為翰林待詔嘗於宫中大安樓下畫天王對佛圖成都古寺畫記華嚴閣影壁後東壁上天花瑞像乃高道興筆與竹䖍相對者也成都聖壽寺東廊下維摩詰堂內畫居士本像方丈內畫花竹芭焦山水松石風候雲氣三堵昭宗景福年物不留姓名趙德𤣥者雍京人也天復年入蜀工畫車馬人物屋木山水佛像鬼神筆無偏擅隨事皆長其樓殿臺閣向背低昂代無比者有朱陳村圖豐稔圖漢祖歸豐沛圖盤車圖皆臺閣樣初入蜀將梁隋唐名畫百本自隨至今相傳以為楷式裴孝源公私畫録云自魏晉以來終於貞觀祕府并人間畫共集二百九十八卷二百三十卷是隋唐官本十三卷是左僕射蕭瑀進二十卷得自楊素家三卷許善心進十卷高平縣書佐女張氏所獻四卷安福進十八卷光在祕府無得處人名唯有天和年月集賢校理張懷瓘云昔梁武帝博雅好古鳩集名畫令鍳者數人共詳名氏兼定品格以供御玩及侯景作亂江陵府將陷元帝先焚內庫書畫數萬卷深可歎息其後帝王兼愛進獻又盈祕府天后朝張易之奏召天下名工修諸圖畫因竊換真本以私家收藏僞本繳還殁後為薛稷所得稷殁入於岐王府復慮上知乃盡焚之當時天府所藏多涉於贋人間所蓄或反是真蜀因二帝駐蹕昭宗遷幸自京將到圖書名畫散落民間固亦多矣杜天師在蜀收集道經三千卷儒書八千卷而德𤣥所擕梁隋及唐畫百本或自模搨或是粉本或是墨跡無非祕府散逸者流傳在蜀信後學之幸也今福慶禪院隱形羅漢變相一堵德𤣥筆見存刁光𦙍亦雍京人性高潔交游不雜工畫湖石花竹猫兔鳥雀天復中入蜀前輩有工此者頓減價矣黃筌孔嵩二人師之親受其訣孔尚升堂黃得入室刁公居蜀三十餘年筆無暫暇非病不休非老不息卒年八十大聖慈寺熾盛光院明僧録房小壁四堵四時雀竹是其蹟也廣政中黃居宷重粧雀蝶精竒轉甚三學院㕔小壁花雀兩堵亦其耄年之筆按劉道醇畫評以刁為蜀郡人麻居禮者蜀人也幼師張南本深得其訣光化天復年聲跡已喧畫資簡卭蜀等州寺觀甚多今見存聖壽寺偏門北畔八難觀音一堵禪月大師貫休婺州金溪人也俗姓姜氏字德隱天復年入蜀王先主賜紫衣有詩名兼善草書畫圖時人比諸懷素師閻立本畫羅漢十六幀龎眉大目者朵頥隆鼻者倚松石者坐山水者胡貌梵相曲盡其態或問何以知其形答云休自夢中所覩爾又畫釋迦十弟子亦如此類人皆異之當時卿相皆有歌詩求之可見而不可得也太平興國初太宗搜訪古畫時給事中陳公羽牧蜀以其羅漢十六幀進焉僞翰林學士歐陽炯禪月大師應夢羅漢歌云西嶽高僧名貫休才情峭拔凌清秋天教水墨畫羅漢魁岸古容生筆頭時或大綃泥高壁閉目焚香坐禪室忽然夢裏見真儀脫下袈裟㸃神筆高握節腕當空擲窣窣毫端任狂逸逡巡便是兩三軀不似畫工虛費日碎石安排嵌復枯真僧列坐連跏趺形如瘦鶴精神健骨似伏犀頭角粗兀倚松根傍巖縫曲碌腰身長欲動看經弟子擬同聲磕睡山童欲成夢不知夏臘幾多年一手搘頥偏袒肩口開或若共人語身定復疑初坐禪案前卧象低垂鼻崕裏老猿斜展臂芭蕉花裏刷輕紅苔蘚文中暈深翠硬笻竹杖矮松牀雪色眉毛一寸長繩關梵策兩三片線補衲衣千萬行林間落葉紛紛墮一印殘香斷煙火皮穿木履不曽拖笋織蒲團鎮長坐休公逸藝無人加聲譽喧喧遍海涯五七字詩一千首大小篆字三十家唐朝厯厯多名士蕭子雲并吳道子若將書畫比休公只恐當時浪生死始自江南來入秦于今到蜀多交親詩名畫手皆竒絶覷你凡人事事精瓦棺寺裏維摩詰舍衛城中辟支佛若將此畫比量看最是人間為第一右五則益州名畫録吕大防觀政閣記載太守刺史節度使畫像李冰文翁王尊張堪第五倫廉范种皓李膺高眹諸葛亮王濬高儉陸象先蘇頲嚴武崔寧韋臯高崇文武元衡段文昌李德裕楊嗣復杜悰魏謨牛叢夏侯孜高駢陳敬瑄凡二十八人張𤣥者簡州金水石城山人也工畫人物尤善羅漢當王氏偏霸聲迹赫然時呼為張羅漢荆湖淮浙皆令人入蜀縱價市歸前輩畫佛像羅漢相傳曹樣吳樣二本曹謂曹弗興吳謂吳棟曹畫衣紋稠疊吳畫衣紋簡略今昭覺寺孫位戰勝天王曹畫也大聖慈寺行道高僧吳畫也𤣥則師吳有大聖慈寺灌頂院羅漢一堂十六軀見存益州畫録遂寧志縣北三十里顯教院唐咸通中建有張金水畫十八羅漢像張景思者張𤣥之裔也張之族世傳佛像羅漢王建永平年景思於聖壽寺北廊下畫降魔變相一堵見存益州畫録畫繼云成都楞嚴院壁畫六祖彌勒院壁故事山水一堵錦津院壁釋迦佛及十六羅漢俱劉國用筆國用漢州人名亞于張𤣥楊元真者張𤣥外族也工畫佛像羅漢兼善粧鑾武成中善塑像者簡州許候東川雍中本二人時推妙手今聖興寺天王院天王及部屬熾聖光佛九曜二十八宿天長觀龍興觀龍虎宫并雍中本塑大聖慈寺熾聖光佛九曜二十八宿華嚴閣下西畔立釋迦像并許候塑皆元真粧肉色髭髮衣紋錦繡備著竒巧時輩罕及今四天王寺壁畫五臺山文殊菩薩變相一堵是其筆見存道士陳若愚者左蜀人也師張素卿遂衣羽衣受其筆法王建永平中廢興聖觀為軍營觀有金鑄天尊五及明皇御容一移在大聖慈寺供養餘道門尊像殿堂皆就龍興觀起立今精思院北帝殿是也殿上壁畫有青龍白虎朱雀𤣥武四君像是其筆存房從真者成都人也工甲馬人物鬼神冠絶當時有寧王射獵圖羌人移居圖陳登斫鱠圖冷朝陽王昌齡常建冒雪入京圖蒲師訓師其筆法王蜀先主於浣花龍興寺修佑聖夫人堂合水津起通波侯廟各令從真畫甲馬旍旗從官鬼神於壁授翰林待詔賜紫金魚袋今寶厯寺五丈天王閣下天王部屬諸神並其筆後人重粧已損蒲師訓因再修之右三則黃休復畫録名畫記房從真工人物畨馬嘗於王蜀宫中畫諸葛渡瀘圖甲馬如生兼善潑墨鬼神阮知誨者成都人也工畫女郎筆蹤妍麗又善寫真王氏乾德年寫少主于大聖慈寺三學院經樓下孟氏明德年寫先主于三學院真堂內又寫福慶公主玉清公主于內庭厯事兩朝渥澤纍授翰林待詔銀青光祿大夫檢校尚書左僕射兼御史大夫上柱國見益州畫録成都名筆壽寧院土地堂有孟蜀主像古迹也宋藝者蜀人工寫真王蜀時充翰林寫貌待詔模寫大唐二十一帝聖容及當時供奉道士葉法善禪僧一行沙門海㑹內侍高力士四真於大聖慈寺元宗御容院壁上見存益州畫録名畫記毛文昌蜀郡人工畫田家風物有江村晚釣村童入學郊居豐稔等圖傳於世畫評毛文昌字則之好畫郊野村堡人物逼真又為村童入學圖行步動止拜立誦寫備其風槩杜齯龜者其先本秦人以避祿山之亂居蜀齯龜涉獵經史後師常粲寫真雜畫而妙於佛像羅漢王蜀少主念高祖受唐深恩以興元節度使唐道襲私第為上清宫塑王子晉為逺祖於殿命齯龜寫二十一帝御容於殿之四壁每三㑹五獵差太尉公卿薦獻殿堂行禮其齊宫職掌並依太清宫故事又命寫先主太妃太后真於青城山之金華宫授翰林待詔賜紫金魚袋今嚴君平觀杜太師光庭真大聖慈寺華嚴閣東廊下祐聖國師光業真並其筆見存右二則益州畫録古寺名筆大聖慈寺鮮于院小閣上壁毗盧佛吉安院十二面觀音揭諦院釋迦佛二菩薩觀音勢至十六羅漢四處俱待詔杜齯龜筆孔嵩一名景蜀人也幼工花雀師刁處士筆法至晚年巾裹衣服言論動止俱斆刁公在蜀公侯門四十餘載圖畫甚多一枝一翎人皆寶之先是黃筌於石牛廟畫龍一堵黃居宷亦畫於諸葛廟嵩乃呈技於廣福院之壁蜿蜒怪狀不與常同逼視逺觀勢欲攫躍于時異之此三人畫龍宗孫位位宗顧愷之曹弗興阮惟德與父知誨同時入內供奉厯年所畫貴公子夜宴圖宫中賞春圖宫中戲鞦韆圖宫中七夕乞巧圖宫中尉帖圖宫中按舞圖宫中按樂圖皆盡當時宫苑亭臺花木之巧皇妃帝后富貴之事授翰林待詔試太常寺齊郎賜緋廣政初荆湖商賈入蜀競請所畫川樣美人卷軸將歸本道以為竒物右二則益州畫録蜀中廣記卷一百六
