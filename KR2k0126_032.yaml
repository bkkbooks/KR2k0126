body:
  text: 蜀中廣記卷三十二明曹學佺撰邊防記第二川西二威州保縣茂州疊溪威茂道開府茂州轄威保疊茂諸將領而參將一員駐劄茂州遊擊將軍一員駐劄疊溪實左右之威州通志曰禹貢西戎即叙今松茂威保以接於吐蕃是也亦謂之西畨先本羌屬凡百餘種散處河湟江岷間其酋發羌唐旄等居析支水西南涼禿髮利鹿孤之後也利鹿孤有子曰樊尼初利鹿孤卒時樊尼尚幼弟傉檀嗣位以樊尼為安西將軍後魏神瑞元年傉檀為西秦乞佛熾盤所滅樊尼招集餘衆投沮渠蒙遜以為臨松太守及蒙遜滅樊尼乃率衆西奔濟黃河逾積石居跂布川或邏婆川於羌中建國開地千里樊尼威惠夙著為羣羌所懷皆撫以恩信歸之如市遂改姓為窣勃野以秃髮為國號語訛謂之吐蕃其國都城號為邏些城隋開皇中有論贊索者居牂柯西唐貞觀中始通中國既而滅吐谷渾盡有其地焉按吐谷渾鮮卑種也沈約宋書曰譙縱亂蜀之嵗鮮卑阿豺遣其從子西疆攻吐谷渾敕來泥拓土至龍涸平康元嘉二十七年鮮卑慮索虜復生遣使上表云若不自固者欲率部曲入龍涸越雋門并求牽車獻烏丸帽女國金酒器胡王金釧等物太祖賜以牽車者也唐初貞觀八年吐蕃弄贊奉表求婚不許乃進兵攻破党項及白蘭諸羌率其衆二十餘萬頓松州西境遣使貢金帛云來迎公主又謂其屬曰若大國不嫁公主與我即當入冦遂進攻松州都督韓威輕騎覘賊反為所敗邊人大擾太宗遣吏部尚書侯君集牛進達等率步騎五萬以擊之進達先鋒自松州夜襲其營斬千餘級弄贊大懼引兵而退遣使謝罪因復請婚太宗許之弄贊乃遣其相祿東贊致禮獻金五千兩其餘寶玩數百事儀鳯三年令益州長史李孝逸嶲州都督拓王奉等發劎南山南兵幕以防禦之往劎南兵幕於茂州之西南築安戎城以壓其境俄有生羌為吐蕃鄉導攻陷其城遂引兵守之時吐蕃盡收羊同党項及諸羌之地東與涼松茂嶲等州相接南至婆羅門西又攻陷龜兹疏勒等四鎮北抵突厥地方萬餘里自漢魏以來西戎之盛未之有也開元二十四年散騎常侍崔希逸為河西節度使於涼州鎮守時吐蕃與漢樹栅為界置守捉使詔以岐州刺史蕭昊為户部侍郎判涼州事代希逸為河州節度使鄯州都督杜希望為隴右節度使太僕卿王昊為益州長史劍南節度使分道經略以討吐蕃仍令毁其分界之碑二十六年四月杜希望率衆攻吐蕃新城拔之以其城為威武軍發兵一千以鎮之其年七月希望又從鄯州發兵奪吐蕃河橋於河左築鹽泉城吐蕃將兵三萬人以拒官軍希望引衆擊破之因於鹽泉城置鎮西軍時王昊又率劍南兵攻其安戎城先於安戎城左右築兩城以為攻拒之所頓兵於蓬婆嶺下運劍南道資糧以守之其年九月吐蕃悉鋭以救安戎城官軍大敗兩城并為賊所陷昊脫身走免將士以下數萬人及軍糧資仗等並沒于賊昊坐左遷括州刺史以華州刺史張宥為益州長史劍南防禦使主客員外郎章仇兼瓊為益州司馬防禦副使宥既文吏素無攻戰之䇿兼瓊遂專其戎事俄而瓊入奏盛陳攻取安戎之策上甚悅徙宥為光祿卿拔瓊知益州長史事代宥節度二十八年春兼瓊密與安戎城中吐蕃翟都局及維州别駕董承宴等通謀都局等遂翻城歸欵因引官軍入城盡殺吐蕃將士使監察御史許逺率兵鎮守之上聞甚悅中書令李林甫等上表曰伏以吐蕃此城正當衝要憑險自固恃以窺邊積年已來蟻聚為患縱有百萬之衆難以施功陛下親紆祕䇿不興師旅頃令中使李思敬曉喻羌族莫不懷思翻然改圖自相謀陷神算運於不測睿略通于未然纍載逋誅一朝蕩滅又臣等今日奏事陛下從容問臣等曰卿等但看四夷不久當漸摧喪德音才降遽聞戎捷則知聖與天合應如響至前古以來所未有也請宣示百寮編諸史䇿手制答曰此城儀鳯年中羌引吐蕃遂被固守嵗月既久攻伐亦多其地險阻非力所制朝廷羣議不合取之朕以小畜無知事須處置授以竒計所以行之獲彼戎心城守有足為慰也其年十月吐蕃又引衆冦安戎城及維州章仇兼瓊遣禆將率衆禦之仍發關中彍騎以救援焉時屬凝寒賊久之自引退詔改安戎城為平戎城大厯三年劍南西川亦破吐蕃萬餘衆五年五月徙置安悉拓靜恭五州于山陵要害之地以備吐蕃大厯十一年正月劍南節度使崔寧大破吐蕃故洪等四節度兼突厥吐渾互變羌党項等二十餘萬衆斬首萬餘級生擒噶城兵馬使一千三百五十人獻于闕下牛羊及軍資器械不可勝紀十二年九月入冦坊州掠党項羊馬而去十月崔寧破吐蕃望漢城十四年八月命太常少卿韋倫持節使吐蕃統蕃俘五百人歸之十月吐蕃率南蠻衆二十萬來冦一入莽州過汶川及灌口一入扶文過方維白壩一自黎雅過卭崍關連陷郡邑乃發禁兵四千人及幽州兵五千人同討大破之十二月崔寧復奏於西山破吐蕃十萬斬首八千生擒九百人德宗之世萬年韋臯為西川節度使城龍溪築西山堡以納降羌臯以雲南蠻衆數十萬與吐蕃和好蕃人入冦必以為前鋒四年臯遣判官崔佐時入南詔蠻說令向化以離吐蕃之助佐時至蠻國羊咀咩城其王異牟尋欣然接遇請絶吐蕃遣使朝貢其年遣東蠻鬼王驃傍苴夢衝苴鳥等相率入朝南蠻自嶲州陷沒臣屬吐蕃絶朝貢者二十餘年至是復通五年臯遣大將王有道簡習精卒以入蕃界與東蠻於故嶲州臺登北谷大破吐蕃青海臘城二節度斬首二千級生擒籠十五人其投崖谷而死者不可勝計貞元八年臯攻吐蕃于維州敗之獲其大將論贊熱獻于京師先是鹽州城為吐蕃所毁塞外無保障九年詔城鹽州䇿敵且來襲令臯出師牽圍之臯命大將董勔張芬分兵出西山靈關破峩和城通鶴軍定廣城踰滴博嶺遂圍維州摶拪雞攻下羊溪等三城取劍山屯焚之南道元帥論莽熱來援與戰破其軍拔白崖焚定廉故城凡平栅堡五十餘所斬首二千八百級乃城鹽州由是西山羌八國酋長皆請入朝十年臯復敗吐蕃克峩和城獨維州不下十六年臯纍破吐蕃一萬餘衆於黎州嶲州吐蕃遂大搜閲築壘造舟潜謀冦邊臯悉挫之於是吐蕃酋帥兼鹽臘城等九節度嬰籠官馬定德與其大將八十七人舉部落來降定德有計略習知兵法及山川地形吐蕃每用兵定德常乘驛計事蕃中諸將稟其成算至是自以扞邊失律懼得罪而歸心焉十七年吐蕃昆明城管麼些蠻千餘户又降贊普以其衆外潰遂北冦靈朔陷麟州德宗遣使至成都府令臯出兵深入西山以紆北顧臯乃令鎮靜軍兵馬使陳洎等統兵萬人出三竒路威戎軍使崔堯臣兵千人出龍溪石門南路維保二州兵馬使仇冕保霸二州刺史董振等兵二千趨吐蕃維州城中北路兵馬使邢玭等四千趨吐蕃棲雞老翁城都將高周王英俊兵二千趨故松州隴東路兵馬使元膺等復分兵八千人出南道雅黎嶲路又令鎮南軍使御史大夫韋良金兵一千三百續進雅州經略使路惟明等兵三千趨吐蕃逋租偏松等城黎州經略使王有道兵二千人過大渡河深入吐蕃界嶲州經略使陳孝陽兵馬使何大海韋義等及麼些蠻東蠻三部落主苴那時等兵四千進攻昆明城諾濟城自八月出軍齊入至十月破蕃兵十六萬拔城七軍鎮五户三千擒生六千斬首萬餘級遂進攻維州救軍再至轉戰千里蕃軍連敗於是冦靈朔之衆引而南下贊普遣論莽熱以內大相兼東境五道節度兵馬都統羣物大使率雜虜十萬來解維州之圍蜀師萬人據險設伏以待之先出千人挑戰莽熱見我師少悉衆來追發伏掩擊鼓譟雷駭蕃兵自潰吐蕃十萬殱夷者半生擒論莽熱獻諸朝進臯檢校司徒中書令南康郡王御製紀功碑褒賜之臯治蜀十三年凡破吐蕃四十八萬斬首五萬餘級後自南詔入冦敗杜元穎而郭釗代之病不能事事文宗太和四年以李德裕檢校兵部尚書成都尹劍南西川節度副大使知節度事管內觀察處置西山八國雲南招撫等使德裕乃大葺關防繕完兵守又遣人入南詔求其所俘工匠得僧道工巧四千餘人歸成都扶殘奮懦皆有條次成都既南失姚協西亡松維由清溪下沫水而左盡為蠻有始韋皋招徠南詔復嶲州傾帑以結蠻好教之戰陳文法裕以皋啓戎資盜養成癰疽苐未決耳至元穎時遇隙而發故長驅深入跋剔千里蕩無孑遺今瘢痍尚新非痛矯革不能刷一方恥乃創籌邊樓按南道山川險易與蠻相出入者圖之左與吐蕃密邇者圖之右其部落衆寡饋餫逺近曲折咸具乃召習邊事者與之指畫商訂凡敵之情僞盡知之又料擇伏瘴舊獠與州兵之任戰者發遣獰耄十三四士無敢怨又請甲人於安定弓人於河中弩人於浙西由是蜀之器械皆犀鋭率户二百取一人使習戰勿貸事緩則農急則戰謂之雄邊子弟其精兵曰南燕保義保蕙兩河慕義左右連弩騎士曰飛星鷙擊竒鋒流電霆擊突騎總十一軍築伏義城以制大渡清溪關之阻作禦侮城以控榮經犄角之勢作柔逺城以扼西山吐蕃復卭崍關徙嶲州治臺登以奪蠻險要簡去屬兵羸弱者四千餘人復募少壯得千人募北兵得千五百人與土兵參居轉相訓習日益精練初蜀人多鬻女為人妾德裕為著科約凡十三而上執三年勞下者五嵗及期則歸之父母以繁生齒威惠大振太和五年吐蕃維州將悉怛謀以城降維距成都四五百里因山為固東北由索叢嶺而下三百里地無險走長川不三千里直吐蕃之牙異峕戍之以制寇入者也其地南界江陽岷山連嶺而西不知其極北望隴山積雪如玉東望城都若在井底一面孤峰三面臨江是西蜀控吐蕃之要也至德後河隴陷蕃唯此州尚存吐蕃利其險要將婦人嫁與此州閽者二十年後婦人生二子成長及蕃兵攻城二子內應其州遂陷吐蕃得之號曰無憂城貞元中韋皋鎮蜀經略西山八國萬計取之不獲至是悉怛謀遣人送欵德裕疑其詐遣人送錦袍金帶與之託云候取進止悉怛謀乃盡率郡人歸成都德裕乃發兵鎮守聞之于朝時牛僧孺沮議言吐蕃之境四面各萬里失一維州未能損其勢比來修好約罷戍兵中國禦戎守信為上彼若來責曰何事失信養馬蔚茹川上平涼坂萬騎綴回中怒氣直辭不三日至咸陽橋此時西南數千里外得百維州何所用之徒棄誠信有害無利此匹夫所不為况天子乎上以為然詔德裕以其城及悉怛謀等悉歸之吐蕃僇之于境上極其慘酷德裕終身以為恨㑹監軍使王踐言入朝盛言悉怛謀死拒逺人向化意帝亦悔之武宗朝牛僧孺出為淮南節度德裕面奏曰臣在先朝出鎮西蜀其時吐蕃維州首領悉怛謀雖是畨人久樂皇風將彼堅城降臣本道臣尋差兵馬入據其城飛章以聞先帝驚嘆其時與臣不足者望風嫉臣遽獻疑言上罔宸聽以為與吐蕃盟約不可背之必恐將此為辭侵犯郊境詔臣還却此城兼執送悉怛謀等令彼自戮復降中使迫促送還昔白起殺降終于杜郵致禍陳湯見徙是為郅支報仇感歎前事愧心終日今者幸逢英主忝備台司輒敢追論伏希省察且維州據高山絶頂三面臨江在敵人平川之衝是漢地入兵之路初河隴盡沒此州獨存吐蕃潜將婦人嫁與此州門子二十年後兩男子長成竊開壘門引兵夜入因兹陷沒號曰無憂因併力於西邊遂無虞於南路憑陵近甸宵旰纍朝貞元中韋臯欲經略河湟須以此城為始盡鋭萬旅急攻纍年吐蕃愛惜既甚遂遣舅論莽熱來援雉堞高峻臨衝難及於層霄鳥徑屈盤猛士多糜於礧石莫展公輸之巧空擒彼將而還及南蠻負恩掃地驅劫臣初到西蜀衆心未安外揚國威中緝邊備其維州執臣信令乃送欵與臣臣告以須俟奏聞所冀探其情僞其悉怛謀尋率一城之兵衆并州印甲仗塞途相繼空壁歸臣臣即大出牙將受其降禮南蠻在列莫敢仰視况西山八國隔在此州比帶使名都成虛語諸羌久苦蕃中征役願作大國王人自維州降後皆云但得臣信牒帽子便相率內屬其蕃界合水棲雞等城既失險厄自須抽歸可減八處鎮兵坐收千里舊地臣見莫大之利乃為恢復之基繼具奏聞請以酬賞臣自與錦袍金帶顒俟詔書且吐蕃維州未降已前一年猶圍魯州以此言之豈守盟約况臣未嘗用兵攻取彼自感化來降又沮議之人不知事實犬戎遲鈍土曠人稀每欲乘秋犯邊皆須數嵗就食臣得維州逾月未有一使入疆自此之後方應破膽豈有慮其後怨鼓此游詞臣受降之時指天為誓寧忍將三百餘人性命棄信偷安纍表上陳乞垂矜赦答詔嚴切竟令執還加以體披桎梏舁于竹畚及將就路寃呌呼天將吏對臣無不流涕其部送者便遭蕃帥譏誚曰既以降彼何須送來乃却將此降人戮於漢界之上恣行殘害用固攜離乃至擲其嬰孩承以鎗搠臣聞楚靈誘殺蠻子春秋明譏周文外送鄧叔簡冊深鄙况乎大國負此異類絶忠欵之路快凶虐之情從古以來未有此事臣實痛悉怛謀舉城受酷由臣陷此無辜乞慰忠魂特加褒贈帝意傷之尋詔贈悉怛謀右衛將軍初贊皇作西南備邊録其序略云吐蕃開釁河隴失險締從南詔協以謀我井絡坤維我圍孔棘守臣韋臯鑿清溪道要結蠻好犄鹿效順乃纂集事狀為卷十七質幣結轍闔户誨盜爰命德裕改紀其政乃建籌邊樓立雄邊子弟作仗義禦侮柔逺三城以扼虜衝猶慮敵去而備弛也凡兵將糧械之數城鎮種落之名嵗計經用之目講求利病輯為一書諸郡虛實外夷情狀條分縷析燦如指掌創立陴壘咸以朱書圖之仍總繪小圖標之首卷焉按備邊録第四卷叙維州本末尤詳唐末吐蕃衰弱種類分散入內屬者謂之熟户餘謂之生户薄示羈縻而已宋時朝貢不絶其首領唃厮羅始居鄯州後徙青塘即青塘嶺也青羌所居矣宋史吐蕃青羌首領奴兒結等為邊害十餘年制置使留正以計擒殺之盡殱其黨趙汝愚代為制置使奴兒結弟三開復叛汝愚縣重賞以間羣蠻三開不能孤立憂死汝愚以定青羌功加秩即此種元憲宗始於河州置吐蕃宣慰司都元帥府云保縣志云出縣循南岸行一日又北渡大江至雜谷安撫司可八十里又十里為無憂城故址尚存按雜谷即古維州唐太和中陷於吐蕃其酋即悉怛謀種矣國初有阿漂者以捍寇功授勑印為雜谷安撫同知嵗輸薄糧於維州畨倉三年一貢其地有上碉下碉去無憂城百里去縣倍之前臨沱水後倚高山南接三姐西接孟董南抵達思北抵東布又東至八稜碉與敵界密邇嵗終發畨兵萬餘備糧械入碉防守至次年除夕更班保邊敉寧以雜谷為之保障也達思蠻長官金川禪師及打喇兒草坡六寺龍山以西諸寨皆𨽻焉達恩蠻長官司在雜谷西五十里其先嚴泰與阿漂同功給印信授為長官寰宇記云隋開皇六年以石門鎮近白狗羌故于金川鎮置金川縣唐武德七年以屬維州貞觀初廢三年復置按今金川寺其故處也寺僧巴槖監藏及莽葛剌以有戒行得稱蕃都綱永樂初黃毛畨犯界金川僧招麻喇防禦有功事聞賜號演化禪師及敕命銀印俾其徒世守焉地居雜谷安撫之東管十五寨東北至八稜碉西至保縣南至稜城百五十里後漸衰弱見驅於雜谷遷其族于董卜界上志云教場是金川寺地未詳打喇兒寨土舍居威南路在文鎮河西先曽糾黑虎夷為邊害正德間歸順奏准納貢頒賜敕書冠帶無印信遇貢赴雜谷起文又有只臺寨蕃保志云西北生畨有孟董十八寨三國孟獲董卜之裔也謂之孟董畨亦名董卜韓胡唐時哥鄰君董卧庭等求內附處其衆于維壩等州居小鐡圍山去縣可七八日程東抵雜谷八稜碉模坡河在東如卜河在北即古之孫水也南流雅州以牛皮為船既渡則曝皮于岸上候乾復用焉永樂八年歸附進貢授宣慰使司都指揮同知貢道有三一由雜谷八稜碉出保縣一由清溪口出崇慶州一由靈關出雅州近與雜谷不睦故直由雅安又曰松茂威疊大勢如一身然松潘首也疊溪項與喉也茂州腹也東之土門西之威與汶保其手足也然餘皆在江內惟保獨居江外縣以東為舊畨即箭上里之編戶叛去者地土相連樵採共路懷異志而漏華情莫此若矣又云縣北熟畨二股一路為水田星上龍山等寨向背不常一路為近縣玉山十二寨稍稍易馴正北野畨有梁荒梭城五十餘寨直連松州黑水號為野菅明初御史大夫丁玉用色銀鑄錠以誘之即此夷也維州志曰白狗嶺與大雪山連後有白狗羌居之寰宇記曰白狗國者西羌之别名與㑹州連接勝兵一千唐武德六年有使朝貢開元二十九年十月白狗國四品籠官蘇唐封及狗冉川五品籠官薩阿封等至京各賜金紫玉帛以遣之貞元九年七月其王陀羅忽與女國等詣劍南西川節度使韋臯內附詔授試太常卿兼保州司馬至今子孫承襲其爵云按白狗國女國俱在西山八國之數韋皋使銜兼節制西山八國即此也杜甫西山詩夷界荒山頂蕃州積雪邊築城依白帝轉粟上青天蜀將分旗鼓羌兵助鎧鋋西南背和好殺氣日相纒又云子弟猶深入關城未解圍蠶崖鐡馬瘦灌口米船稀辨士安邊䇿元戎決勝威今朝烏鵲喜欲報凱歌歸四夷考曰維州路生畨最多有名色可考者曰孟董梁黃梭城月上星上龍山龍溪大寺小寺等寨設一關六堡以戍之關曰鎮夷堡曰保縣曰新安曰乾溪曰西平曰壩州曰坡底而坡底附近龍山竹打大寺小寺蒲穵太子憤等寨而龍山最强舊有龍山戍有城唐書廣德元年吐蕃陷維州籠山城是也按唐薛逢送西川渠常侍之新築龍山城錫賚兩州刺史及部落酋長詩云聖主憂夷貊屯師剪束欽皇家恩眷裕星使忽登臨用命期開國違天必釁砧化須均草樹思不間飛沈束馬凌蒼壁捫蘿上碧岑瘴川風自熱劍閣氣長隂迅瀨從天急危橋入地深仰觀唯一徑俯瞰即千尋水作新城帶山為故壘襟東開洞君聽南闢納蠻心渥澤濡三部衣冠化兩林帶文雕白玉符理篆黃金鳥道經卭僰星躔過觜參回軒如睿奬休作苦辛吟蓋指此也壩州堡附近龍溪卜南木上諸寨與北路黑苦三姐生畨相通每嵗耕穫既有蓋藏輒以礪兵劫奪為事按即保霸蠻也方輿云威州保霸蠻者唐保霸二州天寶中所置後陷沒酋董氏世有其地與威州相錯因羈縻焉嘉祐熙寧中常請朝命政和初知成都龎恭孫建言開拓置官吏乃以保州地為祺州霸州地為亨州授其酋刺史團練使按宋史董氏世知保州太平興國六年保州刺史董竒死以其子詔重繼之又云董仲元者襲職二十餘年安靜無事嘉祐中益州鈐轄司表其善撫蠻夷乃真命為刺史其時有鶼州亦遣人貢馬鶼州未詳疑即古定廉縣今之金川寺故史謂西南邊地有鶼州保州矣四夷風俗記曰維州諸畨日務射獵夜宿碉房炙羊膀以卜吉凶分善惡以為黑白以戰死為善終以相殺為厮打父子兄弟大則讐殺轉眼相背不知骨肉有大小姓猶言大小族也董卜金川俱屬小族雜谷達思俱屬大族志云其生一産雙子乳右者為小又云射旄牛者為大射綿羊者為小二姓相間而居丁大夫玉克復其地始分之蓋使犬牙相制云耳嵗時不用官厯知嵗時者為端公如辰年則畫十二龍或卧或行因形而推之他象亦然畨僧依佛經推算日月蝕及甲子建除毫釐不差大率以十月為一嵗嫁娶富者以猪羊毛氊布匹粟麥為禮其賠裝資必須生子之日數人俟於路口其女潜出要至其家方焚香宰羊牛㑹親人死則坐尸於水架上置之倉舍衣帽弓矢俱如生佩服端公呪經獻以猪羊用火燒之男子剪髮止留其頂髮下垂服用作力麻不穿褲不洗面婦人俱編髮如縷飾以海巴硨磲茂州華陽國志冉駹國漢時筰以東北君長十數冉駹最大武帝元封四年所開以為汶山郡至宣帝地節三年夷人以立郡賦重帝乃省并蜀郡為北部都尉其山有六夷七羌九氐各有部落其王侯頗知文書後漢靈帝時復分蜀郡北部為汶山郡蜀建興十年汶山平康夷反姜維討之始服寰宇記云石室冉駹夷人所造者十餘丈山巖之間往往有之宋史茂州羌蠻地方數十里舊領羈九州皆蠻族蠻自推一人為州將常在茂州受處分舊州無城惟植鹿角蠻以昏夜入州掠人畜貨賣遣州將往贖之習以為常宋神宗熙寧八年范百常知茂州民請築城既而蠻酋訴稱城侵其地乞罷築百常不許九年三月始興工靜蠻數百奄至百常率州兵擊斬數人蠻乃退百常遷民入牙城明日蠻數千人四面焚鹿角及廬舍引梯衝攻牙城矢石雨下百常悉衆乘城拒守二酋長為木儡所殺蠻兵乃却茂州南有雞宗關通永康軍北有隴東道通綿州皆為蠻所據百常募人間道詣成都又書木牌數百投江中告急蜀綿兵救之蠻始解圍誓和自是蠻人稍定百常亦以築城生患坐奪一官既而生羌合羣蠻復至相距七十日詔遣內押班王中正將陜西兵來援入恭州宕州誅殺頗衆蠻遂降政和五年有直州將郅永夀陽延俊董承有等各以地內屬詔以永夀地建夀寧軍延俊承有地置延寧軍然與亨祺二州皆非扼控之所未幾皆廢一統志云洪武設茂州以統羌民設茂州衛以統軍伍軍居城內民居城外羌凡和誓輸牛羊棘耒耜各一乃縛劍門於誓場酋豪皆集引於劍門下過刺牛羊豕血㰱飲之掘地為坎縳羌婢坎中加耒耜及刺於上投石擊婢以土埋之巫師咀云有違誓當如此婢土夷考云茂州東路生畨白草最强大而白草又與松潘黃毛吐畨相通桃紅青片板舍次之白苦水磨岐山又次之有把守官轄桃坪神溪夾山等凡七關堡桃坪者去白草青片諸番不四五十里志謂古桃關也見水經注關通西城之路北當風穴一二里間晝夜沙石飛揚不息寰宇記云故桃關在汶南八蠻界公私之路俱從於此有繩橋渡江認守桃坪者為隴木司隴木頭長官司茂之隴木里也國初以酋長歸附授承直郎世襲長官嵗常貢馬二匹所屬玉亭神溪十二寨俱為編氓有保長統之又有靜州長官司茂之靜州里也襲官貢馬與隴木同正德間與嶽希蓬節貴為亂攻茂城斷水道七日節貴弟車平潛引水以活我軍事平使車平襲職管法虎核桃溝八寨編戶為氓有保長統之認守北定門至關子堡按靜州即唐之悉唐縣矣宋史曰塗靜當真時飛宕恭等九州蠻皆羈縻州也環茂州而居州不過數十里而已按唐茂州都督府羈縻州九靜州其一已見前矣維翼二州後進為正州即今疊溪所也第其名與宋史不同附載之以俟考焉塗州唐武德元年臨塗羌歸附置領臨塗端源婆覽三縣貞觀元年州縣俱省三年又分茂州之端源戍置塗州縣有端源臨塗悉鄰三縣與州同置炎州貞觀五年生羌歸附置西封州八年改為炎州縣有大封慕仙義川徹州唐貞觀五年西羌首領董州貞歸化置縣有文徹俄耳文進向州唐貞觀五年生羌歸化置縣有俱左向二冉州本徼外斂才羌地貞觀六年置西冉州九年去西字縣有冉山磨山玉溪金水穹州貞觀五年生羌歸附置西博州八年改為穹州縣有小川徹當壁川當博恭耳筰州貞觀七年白狗羌降附置西恭州八年改為筰州縣有遂都亭勸北思恭州開元二十四年分靜州廣平縣置恭州仍置博恭烈山二縣天寶元年改為恭化郡乾元元年復為恭州本屬隴右道後割屬劍南道其屬縣有和集博恭烈山土夷考曰茂州南路生番惟曲山三寨界在西南兩路之間稱强惡餘皆熟畨有把守官轄鴈門文鎮七星宗渠四關堡河以外則屬嶽希蓬也嶽希蓬長官司國初歸附賜襲長官三年貢馬二匹正德間長官坤卜作亂伏誅使其弟坤元襲職管波西水西渴渴勒都等七寨隸茂州衛當差編戶於州水西里有保長統之認守勒都龍嘴等地方土夷考曰茂州北路有長寧安撫司其先厯日寨首也國初歸附屢有從征功賜敕印世為安撫使月俸四石三年一貢久未襲官使王舍護印而已姓蘇氏管鑿溪章貢等六寨有把守官轄長寧實大韓胡椒園松溪等八關堡長寧堡實大關附近巴豬五族及大小厯日稱最强悍韓胡堡附近恰列寺韓胡碉水磨溝等寨而恰列寺皆畨僧也原給有敕書三年一貢椒園堡附近後溝烏都及河東之法虎插共六寨俱靜州屬羌也往來茂地貿易與居民伍松溪堡附近黑苦七族番衆二千有竒嘉靖間攻圍堡城絶我餉道要我重賂乃解至今尚嵗費撫賞四百金有竒經略志云正德十三年巡撫都御史宋滄克平壩底白草諸寨諸夷獻侵地二千餘頃又克平茂州雞公寨十五年長寧等處深淺諸寨畨蠻聲言復讐求索賞需兵備副使朱紈督同𠫭將遊擊將軍提兵搗巢擒其首惡餘黨俱以次降年例賞需盡行裁革至今西陲妥靖諸蠻不復弄兵開邊隙矣紈有茂邊紀事其詞曰嘉靖丙申季春乙丑護林之北來逺之南長寧古驛之墟穆肅兩河之㑹有戎不軌倡自三溝羣醜弗威陰連二姓稔凶殘於殺越肆睥睨于轉輸神矣梟鵂作慝惟窺日入祕如鬼蜮欺人至擬天驕急峽鯨奔呼吸繫千人之命重關櫛比安危引一髮之鈞天意伐謀地鄰告變周郎分閫府傳銅虎之符龔尉名家早試金蒲之鏃羣叨太沮一芥不遺兕出柙而猖狂豕負塗而躑躅嬰此方張之冦四路無雙動皆以律之師三城有恃警聞參府建節星馳令下嶽希刻期雲合纍官都督何無忌之䇿勳獨將遊兵杜祁公之敵愾松州遣騎臨翼移屯乃控上游互為䇿應蜀犬吠日百爾隨聲用徹驚霆紾如怒臂外結河西諸部日擾邊陲內要山後諸酋徑趨我闥積威攸劫競傳市井訛言故態復萌追咎轅門惜賞所賴九重神算炳在琅函時惟兩院英名茂流錦里才兼將相河陽潘嶽之孫風樹紀綱吳郡陸機之裔芻蕘並採臂指相通遂收渙而定疑聿勸忠而鼓鋭三溪設險可塹可城六哨分工且矛且鍤臺因山澤圖永逸於暫勞陳寄鳥雲鎮大棼於至靜應兵隴木一戰枯摧梟俊黑橋羣奔瓦解核桃再熾達觀花水之遺龍觜夾持進扼燕崖之隘先人默奪劇冦潜逋伺間道于夜泅坐收要害獲細姦于時出巧中機宜旌旗與白日交輝號令為雪山增重縱橫應敵三軍不損一人逺近執俘一月豈惟三捷腰金貴介獨馳不測之巔手刃元凶兩奪羣攻之具膚公尢烈脅從皆降惟彼深溝猶茲跋扈千仞翔而弗下藺石為驅萬夫葸爾莫前常山阻絶老師非計密使與權昭物采以犒軍侈壺漿而屬道狼貪可笑甘心葛伯之邀鴆毒胥懷駢首中山之卧荆棘介然成路叱咤生風桑榆藉此收功譸張虧簣光韜巨闕言㦸爭銛敵樹蕭牆筆鋒禦侮斷案得中丞之斧辨失儀秦突圍迎驃騎之韉歡交平勃既參而伍乍合而離虛實相形正竒互用鑿山通徑故左道以傳疑卷甲銜枚忽中宵而乘懈懸崖壁立未遑鄧氏之氊分部蟻登亟樹漢家之幟盡連碉于一炬燭萬劫之遺寃數雜虜於橫戈刷千工之深恥淺渾伊邇一夕忘唇老稚相攜四山稽首事懲姑息恢張擒縱之規亂問厥由克制短長之命衆輸心而悔罪爭縛渠魁至斷指而祈恩一遵約束刳牛泉杪飼馬雲端鼾息仰天之窩勒銘張口之石月初建未日則先庚黑水再清溪關重闢壯士歌而崑崙應妖氛淨而牛斗光偉哉主帥之功展也多賢之輔智慧信惟乘勢號咷終有同人徵調無煩旁縣不聞金革公私大省居民盡仰帡幪彼媢嫉者何為竟捷幡乎何益嗟乎夷狄古無深治兵家未有常形處置得宜韓輿取捷忠邪易位陳塹為夷愼蕭氏之金甌白茅斯重碎范增之玉斗瓦礫何殊語要無他任人而已遡歷年之多難慨當事之寡謀舍耕織於專門玉人受教狃採樵於近利天險爭雄千里徵兵驅市人而浪戰一言遣將率子弟以輿尸野心從此日驕士氣至今不振或吹虀而過計每破釡而失聲吝出納於平時急撫和於臨陳堂堂中國不羞城下之盟赳赳武夫盡剜心頭之肉校人飾詐謂彼昏而不知祈父招尤慘多瘠而罔詔馴致邇年之禍無如五寨之深江山助彼金湯道路出其門户防秋死别一戌數千來嵗生還什無四五擢髮已窮於甲士禠衣不免於户侯彼美督軍呈身三宿有雄驍騎遮道千金魏磨覘我垣墉白若戕人肘腋有山如障來則高巢有坎如隍履同平地孤城鞏固誰開近賊之門福將尊榮莫究折衝之志蒙茸北郭牧唱吞聲咫尺西橋鬼門騰號狗彘貴於人命貔貅賤同草菅章璽稔凶神人共憤仵勳死事日月為昏上帝聞腥旋轉廓清之運元臣秉鉞鑿開混沌之天罪惡貫盈宜俾根株悉拔險膚起信乃惟旦夕邇圖猩血猶爭虞旌倐下倉皇失措馬高已死之金喪亂既平人惜有功之袴健兒解體髦士弛擔乏承殊類杞憂環視漠如越瘠言猶在耳戎復生心試觀四起之塵夫豈一朝之故及今不戒尚事因循厥禍長流將何紀極彼其之子束高閣乎幾年亦獨何心壞長城乎萬里塞胸諸難未聞決䇿聳人銷骨巧詞祗見幸災樂禍身如謀國何嫌殿上之爭賊已渡河尚作道傍之舍百年之算肯斂手以推棊六月之師但駕言於揮扇肩山欲蹶腹劍反攻太阿不識倒持宏詞何用手板已看倒執高論猶存嗟乎內有讒夫外多勍敵阪高難合息壤無盟肘雖掣而力自前踵未旋而亂遄沮人見田單厲氣遂收三月之功孰知神禹至誠㑹奏七旬之格豎儒幾敗乃事炎德方隆蔡功惟斷乃成名賢在位匪人匪地惟動惟天蓋忠良不病於扼腕斯夷虜無憂於猾夏天冠地履自循萬古之常秋殺春生孰爽四時之令是非如鏡賞罰快人英雄有樂死之心沙漠盡宣威之地嗟乎室家安枕所重藩籬匕劑奏功寧辭瞑眩靡盬莫非王事匪躬乃見王臣紫塞歸驂耆老垂漢官之涕清萍長價將軍全報主之身柏府持衡宏啓清平之宴玉堂秉筆大書全勝之樓白面何能躬逢盛世彤弓載咏共醉佳辰念一時共事之情成百折不回之義有痛更深於定惟亡乃保其存爰紀諸艱用酬同志陳子昂蜀川安危書云臣伏見四月三十日敕廢同昌軍蜀川百姓每見免五十萬丁運糧實大蘇息然松茂等州諸羌首領二十年來利得此軍財帛糧餉致富已潤屋今一旦停廢失其大利必是勾引生羌詐作警固以恐動我若松茂等州無好都督則此詐必行旦夕警固必有發者一發之後警動蜀州朝廷不知徵兵赴救兵至賊散靡弊更甚伏乞選擇茂州都督嚴加斥堠乃命御史一人專在按察若有詐妄即録奏稱加法以徵其姦庶可久長安帖不然受其弊者不勝勞瘁已夫蜀川運糧既停百姓更無重役至於租庸合富府庫今諸州逃走戶有三萬餘在蓬渠果合遂等州山林之中不屬州縣土豪大族阿隱相容徵斂驅役皆入國用其中遊手惰業亡命之徒結為光火大賊依憑林險巢穴其中若以甲兵捕之則鳥散山谷如州怠慢則劫殺公行比來訪聞有人說逃在其中者攻城劫縣徒衆日多誠可特降嚴加敕令州縣長官與吏人設法大招此戶則劫賊徒黨自然除殄其三萬戶租賦即可富國若縱而不括以養賊徒蜀州大弊必是未息天恩允此請乞作條例括法聖厯元年五月十四日通直郎行右拾遺陳子昻狀豫分守川西詢諸有司議戍軍曰夫戍軍之設蓋謂邊地空虛人烟稀少故令漢彭雙溫等處抽丁充戍其法誠為至善然嵗久月易其中有當調停者何也戍軍每年九月撥發十月到邊往往非死則病非病則逃毫無實用試言其故蓋漢彭等處風氣溫和即冬無霜雪而蔬菜俱備茂疊塞垣風沙慘烈雖夏不消氷而百物不産以故戍軍到邊寒暖不合飲食不調多生疾病當有司促迫上道哭别父兄妻子若永訣者至殷實之戶强壯之丁多有展轉規避惟無告窮民不獲已就列或又闔户共雇一乞丐無賴之徒以充數比及到邊身無完衣腹無飽食囊無半粒手無寸鐡奄奄扶杖而行致使畨夷倚山而笑曰戍軍來也病者病死者死逃者逃邊隘曾不得借其一臂之力嗟嗟似此景象在安常處順猥云有餉有兵倘一旦羌夷竊逞而欲其斬將搴旗撻伐用張得乎是至苦者莫若戍軍至無用者亦莫若戍軍也然則奚術而可亦惟是裁省抽發召募土著乃為常勝之兵焉何也茂疊不産五榖不養蠶桑人所為命者惟恃軍餉耳且如五口之家須應軍二名方得溫飽不然而應軍一名且見菜色如無軍可應則無生可度動見逃竄如今之灌郫漢廣往往有茂疊逃民蓋以此也倘以職言為不謬將戍軍之糧召募土著之民人人有糧人人可兵不出三年逃避者必回故里地方之集聚日益衆邊塞之軍兵日益精在平常無事足以壯國威茍一旦臨戎則人自為家家自為守可必其用命在內地無戍軍之苦在邊庭有敢勇之卒竊意羌畨雖狡亦無所用其謀矣職書生也不敢言知兵但此明白易見斷斷乎其可行者通變宜民是在今日耳隨經移㑹該道轉行成都府茂汶保灌等州縣回覆間適豫署司篆看得戍軍之議或因或革非止一次每盈廷不決者蓋由行月二糧全改半改未得其肯綮故也何則月糧者祖軍之額不可移動者也行糧專為更畨戍守設耳若免其戍邊而不動其月糧則人皆樂從矣且衛所得裕差操之役軍户永免津貼之纍而所利更廣矣查威茂一帶班軍以三十六七等年計之各該一千二百餘名折支司府民屯實米并布花銀共五千五百二十餘兩此其大較也合無比松邊例裁去班軍前項銀兩支發該邊自行召募每名工食每日給銀二分共募兵七百七十名與主軍分認地方差使不得紊亂仍附官兵㑹計之後請發不得别立名色增補是尺籍雖稍虧而邊方得實用也時如議行之曹學佺曰戍軍裁革已三年矣而求復者未嘗一日忘焉蓋不便于將領之唆削及主軍之陵虐耳而上之人不為動也欲動之必如陳子昻所云勾引生羌詐作警固者有一言破之良家子弟不足以雄邊必外來客作乃習戎事防秋死别一戍數年來歲生還什無四五前備兵使者朱紈之言可念也疊溪古氐羌地漢為蠶陵縣屬蜀郡晉屬汶山郡後周置翼斜郡隋初廢郡以縣屬㑹川大業初屬汶山郡寰宇記唐武德元年復改汶山郡為㑹川領翼斜翼水左封凡三縣其年即以三縣置翼州五代至宋元皆為羌人所據不置州縣逮至洪武十一年平羌始置疊溪右千户所𨽻茂州衛二十五年改守禦軍民千戶所其地東西廣六十五里南北袤九十五里東至氂牛山五里西至黑水生番六十里南至茂州界三十里北至松潘界六十五里圖經性獷勇悍不習詩書近漸染聲教習尚衣冠逺者不通漢語衣皮褐喪不棺而火化耐饑寒疊石為􅠼以居所名本此其土産犛牛毛毯酥油射香香豬白蜜犏牛馬雞其山北有蠶陵東有犛牛南有排栅東北有雲峰各去所城五六里城西三里即渂江也源出松州與黑水合流入茂州城南有玉津泉甃以鐵瓦接引至城下居人汲之不竭有古積雨臺今為觀在治南有石輪寺沿崖皆佛相志云唐貞觀中李將軍廣所鐫也在治北四里廢翼州城在治南寰宇記云唐武德元年置取郡南翼水為名六年自左封移州治於翼斜咸亨三年置都督府移就悉州城內上元二年罷都督移還舊治天寶元年改為臨翼郡乾元元年復為翼州廢蠶陵縣在治北漢治蠶陵縣屬蜀郡莽改為步昌也寰宇記衛山縣本漢蠶陵縣地注漢書蠶陵故城在翼州翼水縣西有蠶陵山隋改為翼斜縣治七頃城唐貞觀十七年移埋於七里溪二十三年以英國公李世績為疊州都督天寶元年改為衛山縣又曰翼水縣亦蠶陵縣地隋初置取縣西南翼河為名按後周之龍水縣隋改翼水水在所治南五十里一出松潘一出黑水翼如也即汶江矣廢悉州城在治東南四十里唐顯慶三年割左封縣界內悉唐川因立為悉州領悉唐左封識臼三縣以羈縻羌人其首領有董係比射任刺史自後射卒以左封縣令董俱悉凍任刺史兼敕以父死子繼咸亨元年移治左封載初元年移治匪平川廢左封縣址同悉州寰宇記云左封縣本屬翼州在當州東南四十里唐顯慶元年乃於縣治悉州焉廢歸城縣唐垂拱二年置廢真州唐天寶五載分臨翼郡之昭德雞川兩縣置昭德郡乾元元年改為真州取真符縣為名其一曰真符縣唐天寶五年分雞川昭德二縣置真符縣州所治也其二曰雞川縣唐先天二年割翼州翼水縣置天寶五載改屬真州其三曰昭德縣舊識臼縣屬悉州天寶元年改屬翼州仍改名昭德縣五載改屬真州按通典有雞川昭德二縣唐書云開生獠新置即不述年月今茂州雞宗關名本此地亦相近四夷考曰疊路生畨最惡而五巴豬為尤甚牛尾麻搭楊栁麥兒次之凡四十八寨其地南連黑苦西通黑水北接松潘頻年虜去漢人多賣入黑水加兵征之即逃入黑水黑水蓋廣饒之地逺近莫知所紀極也志云疊溪千户所領長官司二曰疊溪司在治北一里曰鬱即在治西十五里疊溪郁氏洪武十年以土酋歸附世其官永樂中頒給印信除流官吏目一員凡三年貢馬四匹今長官郁孟賢轄河東熟畨八寨皆大姓及馬路小關七族土舍郁從智轄河西小姓六寨此六寨素梟黠地土廣逺牛羊稷麥露積名雖熟畨與生畨等耳鬱即長官噉保萬厯十八年與黑水松坪攻我新橋明年伏誅先是漢關墩附近勒骨諸小姓屬於鬱即至是改屬郁氏新堡附近為巴豬大寨衆逾千數其人形如魍魎性喜黠盜雖受嵗賞月糧縻耗而已自嘉靖二十三年以來屢經渡河䖍劉我官軍攻掠我城堡稔惡不悛數將貫盈議者欲於舊關腦搭橋進兵及馬路堡後長寧沙壩潛師繞其後上下夾攻可大創也永鎮堡附近為牛尾寨萬厯八年十二年與麻搭濟惡頗肆殺掠十四年征之逃入黑水獻出畨牌投降埋奴為誓乃免太平堡附近為楊栁溝河西强種也與松潘之大小耳别同枝向稱猾梗萬厯十四年征之不獲後四年乃糾松坪白泥黑水三千餘番同陷新橋十九年復大征亦埋奴求免灌縣汶川西邊志云灌縣獠澤關景泰七年立去董卜韓胡可千里番民至關市易唯大黃茶藥而已去關七十里為惹龍關加渴瓦之地也加渴瓦寺亦董卜韓胡支派正統中調征草坡宣慰司遣僧鎖南列思巴來赴賜號崇教翊善國師給敕印使分管摩多集塔藏裏舊寺等十三寨都綱麻喇者成化間董孟梁黃之亂調發協征遂就汶川塗裏山巔居焉國師久未承襲以土舍護印而已獠澤等關是其認守汶路生番惟草坡鷔黠有三寨在河西山外一徑通董卜宣慰一徑通孟董梁黃向以假道騷動十八年征之始震讋輸蕎荍於汶川聽約束於寒水矣寒水土巡檢司高氏其先曰銀兒直隸霸州人洪武七年授職防守河西住蘇村寨三年貢馬二匹正統七年草坡攻汶川司印為所劫景泰間重頒授之調征龍溪卜南諸寨屢立戰功隆慶間草坡復攻破蘇村寨遂移住河東蜀中廣記卷三十二
