body:
  text: 蜀中廣記卷一百七明曹學佺撰畫苑記第三杜措者蜀人也慕小李將軍山水學之草年晝夕不捨今大聖慈寺六祖院地藏菩薩竹石山水一堵羅漢閣上小壁翠微寺禪和尚真三學院經堂太子捨身餵餓虎一堵善惠仙人布髮掩泥一堵並其筆益州畫録名畫記杜措成都人畫山水多作老木懸崖回阿逺岫有秋日并州路詩意圖傳世廣都宇文時中季䝉龍圖家有杜措佛圖及徽宗皇帝水墨花禽圖王維雪山圖董奴子雞冠花圖李伯時高僧圖及嘶驤二馬圖明皇八馬圖水晶宫明月館圖韓退之見大顛圖江貫道飛泉怪石圖江居圖銘心絶品成都古寺名筆西林院殿內羅漢一堵六祖院門北壁地藏一堵俱杜措筆妙格上品升菴志補云壽聖院在灌縣西二十里趙抃守成都日命教授侯溥為之記院有畫十六羅漢皆杜楷筆按杜措惟此一則稱杜楷杜宏義蜀州晉原人也工畫佛像羅漢今寶厯寺東廊下一堵文殊西廊下一堵普賢及行道高僧十餘堵是其作見存蜀人相傳杜老朱羅漢老朱宏義小字也杜子瓌成都人也擅於傅彩拂淡偏長王蜀時於龍華泉東禪院畫毗盧佛據紅日輪乘碧蓮花座每誇同輩云某粧此圓光如日初出淺深瑩然無筆玷之迹見存右二則益州畫録成都古寺名筆承天院吕相真堂後佛像四堵杜子瓌筆不下金繩閣諸佛如意輪觀音等像又云東律院壁八明王西方變相釋迦如來十六羅漢亦子瓌筆又云中寺佛殿內釋迦佛二堵待詔杜懷玉筆懷玉子瓌字嶽池志縣西六十里東觀舊名集虛相傳吕洞賔常宿于此畫一蝙蝠于壁其處至今無蚊劉贊仕王衍為嘉州司户時學士韓昭狎宴後宫謔浪鄙䙝贊繪陳後主三閣圖併作歌以諫衍不能用亦不罪之出本志郭若虛畫論載其名張玫者成都人父某授蜀翰林寫貌待詔賜緋玫有超父之藝尤精貌婦人鉛華姿態綽有餘妍議者比之張萱儔也孟先主明德年於大聖慈寺三學院置真堂欲使玫畫以玫曽與故東川董太尉璋寫真惡之乃命阮知誨獨寫己真而文武臣僚則玫之筆也授官如父玫有自漢至唐治蜀君臣像三卷蒲師訓蜀人也幼師房從真後唐明宗長興年值孟令公改元興修諸廟使師訓畫江瀆廟諸葛廟龍女廟及殂又使畫陵廟鬼神人物旗幟兵仗車馬禮服儀式縱橫浩瀚莫不周至授翰林待詔賜紫金魚袋甲寅嵗春末蜀主夜夢一人破帽故襴龎眉大目方頥廣顙立于殿階跂一足曰請修理之翌日因檢他籍見一古畫是前夕所夢者故絹穿損畫之左足遂命師訓驗是唐吳道𤣥筆明皇之時此畫見夢為痁神也因令修綴呈進後蜀主復夢前神謝曰吾足履矣慮為祟焚之青城山丈人觀真君殿內五嶽四瀆部屬諸神為張素卿筆廣政中山水泛溢衝損數堵蜀主謂師訓曰素卿之筆君往繼之今新圖四堵其筆也先主祠堂東畔正門鬼神一堵及寶厯寺天王閣天王部屬為房從真筆後人粧損至是師訓再修之兼自畫兩堵及畫大聖慈寺南廊下觀音院兩金剛鄰壁請塔天王存右二則益州畫録畫評云蒲師訓蜀人曉音律善談論幼師房從真學畫才十年從真自以為不及仕孟蜀為待詔長於車服冠冕旌旗器械神鬼等畫子延昌亦能畫名亞師訓又云師訓筆法雖細其勢極壯黃筌凡欲揮灑必澄思慮故其彩繪精緻形物偉廓居宷有父之風可謂善繼矣孟顯能作猛風之勢瘦形圓面識者猶以為疵周文矩用意深逺於繁富尤工並列妙品中黃筌成都人也幼有畫性長負竒能刁處士入蜀授之竹石花雀又學孫位龍水松石斆李升山水竹樹皆曲盡其妙筌早與孔嵩同師嵩但守師法别無新意筌既兼宗孫李學力因是博贍損益刁格遂超師藝後唐莊宗同光年孟令公知祥到府厚見禮重及改元授翰林待詔權院事賜紫金魚袋至少主廣政甲辰嵗淮南通聘信幣中有生鶴數隻蜀主命筌寫於偏殿之壁警露者啄苔者理毛者整羽者唳天者翹足者精彩體態更愈於生往往致生鶴立於畫側蜀主歎賞遂目為六鶴殿尋加至內供奉朝議大夫檢校少府少監上柱國先是蜀人未曽得見生鶴皆傳薛少保所寫為竒及筌寫此鶴之後而少保聲價頓減矣廣政癸丑嵗新搆八卦殿又命筌於四壁畫四時花竹兔雉鳥雀其年冬五坊使於此殿前呈雄武軍所進白鷹誤認殿上畫雉為生掣臂者數四蜀主歎異久之遂命翰林學士歐陽炯撰壁畫竒異記以旌之筌有春山圖秋山圖山家晚景圖山家早景圖山家雨景圖山家雪景圖山居詩意圖瀟湘圖八壽圖今石牛廟龍水一堵見存出益州畫録竒異記夫龍圖鳯紀初宣上古之文帝室皇居必藴非常之寶是以書美鍾張之翰畫稱顧陸之蹤代有其人朝無乏事今上睿文英武聖明孝皇帝御極之十九載九功惟叙七政斯齊化溢升平俗登仁壽天惟行健動則總覽萬幾道法自然靜則無遺二物將欲權衡三代拱揖百王宸襟所適諒超化表嘗於大殿西門創一小殿藻井之上輪排八卦故以為號焉御座几案圖書之外非有異於常者固不關於聖慮其年秋七月上謂內供奉檢校少府少監黃筌曰爾小筆精妙可圖畫四時花木蟲鳥錦雞鷺鷀牡丹躑躅之類周於四壁庶將觀矚焉筌自秋及冬厥工告畢間者淮南獻鶴數隻尋令貌於殿間上曰汝工逼真其精彩則又過之筌以下臣末技降階曲謝而已至十二月三日上御斯殿有五坊節級羅師進呈雄武軍先進者白鷹其鷹見壁上所畫野雉連連掣臂不住再三誤認為生類焉上嗟歎良久曰昔聞其事今見其人遽令所進呈者引退無至搦損兹壁仍令宣付翰林學士歐陽炯紀述竒異微臣拜手因得敘其事焉伊昔大舜垂衣作繪乃彰於象物宗周鑄鼎觀形可禦於神姦漢號靈臺唐稱煙閣圖畫之要史䇿攸傳公私雖見於數家今古皆言乎六法六法之內惟形似氣韻二者為先有氣韻而無形似則質勝於文有形似而無氣韻則華而不實筌之所作可謂兼之不然者安得粉壁之中奮霜毛而欲起綵毫之下混朱頂以相親而又觀彼白鷹盻乎錦雉儼丹青而可測狀若偎叢掣絛鏇以難停勢將掠地遂契重瞳之鑒假以好生俄回三面之仁真疑害物舉斯二類兼彼羣花四時之景堪觀千載之名可尚稽諸往牒少有通神圖海獸以騰波秦朝賈譽畫池龍而致雨唐室垂名至於誤㸃成蠅徒成小巧不成似犬安可勝言況兹殿也逈架昭回高臨爽塏瑶池水滿浮鏡裏之樓臺玉樹風輕鎖壺中之日月聖上以勤詠墳典親講政刑崇制禮作樂之名極侍膳問安之孝允文允武無怠無荒故士有一技一藝皆升陟褒賞如筌者焉激東海之波濤難方聖澤拱北辰之光耀永固皇基誠非末士之常談可紀至尊之所御臣職叨翰苑譽乏儒林因廣聖謨聊同畫品恭承宣命實愧非辭時廣政十六年嵗次癸丑十二月記畫評云黃筌字要叔蜀中人少開悟不肯與羣兒語年十三事郡人刁處士學丹青尤好花竹翎毛操筆輒迫真時稱異之十七從其師同仕王衍十九賜朱衣銀魚監都麴院洎孟知祥僣立進三品服子昶承襲遷待詔檢校少府監寫僞后袁氏真張於别殿嬪御屬目更深攀慕纍加如京副使檢校户部尚書兼御史大夫藝祖開朝昶銜璧入覲筌與子居寀皆從赴都下改授太子左贊善大夫仍厚賜之筌以亡國之餘動成哀戚遘疾於乾德辛丑九月二日卒子五人居寶亦能丹青死于蜀居宷自有傳門生夏侯延祐亦知名又云筌松石學孫位山水學李升皆過之尤能寫花竹翎毛於孟昶殿畫六鶴當時為之語曰黃筌畫鶴薛稷減價廣政中昶命筌與其子居宷於八卦殿畫四時山水及諸禽鳥花卉等至為精備其年冬昶將出獵按鷹犬其間一鷹離韝奮舉臂者不能制遂縱之直入殿搏其所畫翎羽昶甚嗟賞召其學士歐陽炯作八卦殿畫壁記仍付史館以表能事太宗朝參政蘇公易簡得筌所畫墨竹圖李公宗諤見之賞其神異作黃筌墨竹贊序曰工丹青狀花竹者雖一蘂一葉必須五色具焉而後見畫之為用也蜀人黃筌則不如是以墨染竹獨得意於寂寞間顧彩繪皆外物鄙而不施其清姿瘦節秋色野興具於紈素灑然為真固不知墨之為聖乎竹之為神乎惜哉筌去世久矣後人無繼者蜀亡二十年蘇公易簡得筌遺迹兩幅寶之如神懼恐化去唯樂安村民得一觀焉噫清瀟碧湘㑹稽雲夢有竹萬頃去我千里鮮碧蔽野寧得而窺曷若此圖虛堂靜敞滿目烟翠行立坐卧秋光拂人又何必雨中移來窗外種得霜庭月檻蕭騷有聲然後稱子猷之高興乎豫歎筌圖之入神美翰林之好事抽毫抒思敢為之讃曰猗歟黃生畫竹有名能狀竹意是得竹情一毫揾筆匪丹匪青秋思野態混然而成背石枕水蒼蒼數莖森然如活颯若有聲湘江坐看嶰谷隨行大壁高展清陰滿庭又詩曰惜哉黃公不可覩空留高價傳千古向非精賞值蘇公時人委弃如泥土李方叔畫品云寒龜曝背圖蜀黃監所作即黃筌也筆墨老硬無少柔媚監平時所作雀竹魚龍亦皆淡色鮮華以示其巧此獨為水墨枯林之下一龜盤跚曵尾而行若春雷已動餘寒未去負朝陽以曝其背有舒緩彎跧之態其趣甚樂頃在丞相尤公家見監一龜筆與此無異但其色光澤水旁之草方茂蓋方自水中出又非寒時其狀不得不殊故觀者當審其畫時用意處也郭若虛畫論諺云黃筌富貴徐熙野逸不惟各言其志蓋亦耳目所習得之於手而應於心也何以明其然黃筌與其子居宷始並事蜀為待詔筌後纍遷如京副使既歸朝筌領真命為宫贊居宷復以待詔録之皆給事禁中多寫禁禦所有珍禽瑞鳥竒花怪石今傳世桃花鷹鶻純白雉兔金盤鵓鴿孔雀龜鶴之類是也徐熙江南處士志節高邁放達不羈多狀江湖所有汀花野竹水鳥淵魚今傳世鳬雁鷺鷥蒲草蝦魚叢艷折枝園蔬藥苖之類是也春蘭秋菊各擅重名下筆成珍揮毫可範復有居宷兄居寶徐熙孫崇嗣崇矩蜀有刁處士劉贊滕昌祐夏侯廷祐李懷衮江南有唐希雅希雅之孫曰中祚曰宿及解處中輩都下有李符李吉之儔及後來名手間出跂望惟徐生與二黃繇山水之有正經也注云黃筌之師刁處士猶關同之師荆浩或曰筌到關未久物故今之遺迹多是在蜀日所作故往往有廣政年號宫贊之命亦恐傳誤銘心絶品云玉牒趙中太保士俾家鶴圖文元公孫賈通判公傑家鼯捕鼠圖汝州令狐中奉之子陳古諷家偷倉雀圖中山劉寶賢瓌提刑家花竹馴雉圖叔父符寶叔誼家海棠金雞圖遂寧王灼晦叔撫幹家鶴壁阿陽陳古與權家撫家牡丹馴狸圖又雪梅凍雀圖成都王稑茂先大夫家秋山圖雙流趙延修仲知縣家竹雀圖又蘆鴨圖雙流王焞子中縣尉家竹鶴壁宇文子震子友主簿家花竹禽兔圖遂寧客館鎮張衍知縣家三教圖廣安黎希聲博士孫邦基家竹鶴竹雀圖皆黃筌真迹古寺名筆云成都保福院避暑宫二小堵竹雀生動黃筌筆也張乖崖鎮蜀時郡有王氏所建西樓樓前有堂堂之回廊有暖㕔㕔之屛有黃筌畫雙鶴花竹怪石甚衆名曰雙鶴㕔次南涼㕔壁上有黃氏畫湖灘山水雙鷺二畫妙格冠於西川蓋因毁王孟逾制壞壁所得而移置者合而名曰畫㕔黃筌畫屛已失其左右獨中一山水屏在耳石到官驗問所失月日申府蓋紹興三十年三月二十九日也府下兵司捕賊不獲出李石十詠詩說黃居寶字辭玉筌之次子也畫性最高風姿俊爽前輩畫太湖石皆以淺深墨淡嵌空而已居寶以筆端摤擦文理縱橫夾雜砂石稜角峭硬如虬虎將踴厥狀非一其畫松竹花雀變態大都如是授翰林待詔賜紫金魚袋早卒出益州畫録居宷字伯鸞筌少子也畫藝敏贍不讓於父蜀前後四主崇奢宫殿苑囿池亭世罕其比居宷父子入內供奉逮四十年殿庭墻壁屏幃圖畫之數不可勝紀授翰林待詔將仕郎試太子議郎賜紫金魚袋淮南通好之日居宷與父同時畫四時花雀圖青城山圖峨眉山圖春山圖秋山圖用答國信使命將發秋山全未及畫蜀主令取在庫秋山圖一角充數居宷與父奉命别畫經月方畢更愈於前翰林學士徐光溥進秋山圖歌以紀之廣政甲子嵗蜀主令居宷往璝仙山修葛仙化回至彭州棲真南軒畫水石一堵自未至酉而畢敏妙兼之居宷有四時野景圖湖灘水石圖春田放牧圖當時卿相及好事者得黃氏父子圖幛卷軸家藏户寶為稀世之珍今衙㕔餘理毛啄苔鶴兩堵水石兩堵龍門圖一堵武侯廟龍水一堵並居宷筆見存蜀亡居宷赴京頗為翰長陶尚書榖殊禮因收得名畫數件令辨驗之居宷指其中秋山一圖是故主答淮南國信絹縫之內自有銜名陶公亦云此是淮王所遺果符其說授翰林待詔朝請大夫寺丞上柱國賜紫金魚袋淳化四年充成都府一路送衣燠使時年六十一矣於聖興寺新禪院畫龍水一堵天台山圖一堵水石兩堵工夫雖少大體宛存徐光溥秋山圖歌云天與黃筌藝竒絶筆精逈感重瞳悅運思潛通造化工揮毫定得神仙訣秋來奉詔寫秋山寫在輕綃數幅間高低向背無遺勢重巒疊嶂何孱顔目想心存妙尤極研巧核能狀不得珍禽異獸皆自馴竒花怪木非因植﨑嶇石磴絶游蹤薄霧冥冥藏半峰娑蘿掩映迷仙洞薛荔纍垂繳古松月檻參差錦鱗躍星壇斑駁翠苔封傍岸牛羸行嚼草過橋僧老坐搘笻屈原江上嬋娟竹陶潛籬下芳菲菊良宵祗恐鷓鴣啼晴波但見鴛鴦浴暮煙羃羃鎖村塢一葉扁舟橫野渡颭颭白蘋欲起風黯黯紅蕉猶帶雨曲沼芙蓉香馥郁長汀蘆荻花蓛雁過孤峰帖逺青鹿傍小溪飲殘緑秋山秀兮秋江靜江光山色相輝映雪迸飛泉濺釣磯雲封落葉擁樵徑張藻松石徒稱竒邊鸞花鳥何足窺白旻鷹逞凌雲勢薛稷鶴誇警露姿方原畫山空巉巖峭壁枯槎人見嫌孫位畫水多洶湧驚湍怒濤人見恐若教對此定妍媸必定伏膺懷愧悚再三展向冕旒側便是移山回澗力大李小李減聲華獻之愷之無顔色髣佛垂綸渭水濵吾皇覩之思良臣依稀荷鍤傅巖野吾皇覩之求賢者從茲反展復懸旌宵衣旰食安天下才當老人星應候願與南山俱獻壽微臣稽首貢長歌丹青景化同天和畫評云黃居宷字伯鸞事孟昶為待詔隨昶入朝復真命陶尚書穀在翰苑因曝圖畫乃展秋山圖令品第之居宷斂容再拜曰此宷父子所作孟蜀時以答楊渥國信者彌縫處有某父子名姓當在裂之如其言詢諸庫吏乃朱梁開平中楚將張浩殺楊渥籍沒得者居宷父子事蜀三世凡圖帳屏壁多出其手愚嘗於唐紫薇第見居宷畫西伯獵渭圖及其父筌像皆極神妙李文才者華陽人工畫人物屋木山水寫真亞於周昉蜀廣政中荆南高大王令邸務丁晏入蜀請文才寫興義門內雙石笋既畢兼徴其故實將歸本道文才問道士范德昭曰或云真珠樓基或云是海眼未審孰是對曰吾聞諸至人斯乃蠺叢啓國鎮蜀之碑中以鐵柱貫之下以橫石相連埋於地際上有文字言嵗時豐儉兵革水火之事諸葛亮曽掘驗之以為真珠樓基海眼者皆非也云出圖方記未詳廣政末蜀主置真堂於大聖慈寺華嚴閣後命文才寫諸親王文武臣僚等真授翰林待詔將仕郎試太子司議郎賜緋魚袋畫未畢宋朝平蜀盡已除毁今三學院經樓下西天三藏真定惠國師真華嚴閣迎廊下奉聖國師真應天寺無智禪師真並文才筆見存出益州畫録野人閒話云李司議文才繼閻立本寫真書畫妙絶當代費著曰孟氏據蜀之日有西班將軍黎湘昭者以畫鶴圖來獻因授雅州刺史趙忠義者德𤣥子也德𤣥自雍京襁負入蜀及長習父之藝宛若生知孟氏明德年與父同手於福慶禪院畫流傳變相一十三堵位置鋪舒樓殿臺閣山水竹樹蕃漢服飾佛像僧道車馬鬼神王公冠冕旌旗法物皆盡其妙冠絶當時蜀主知忠義妙於鬼神屋木遂令畫關將軍起玉泉寺圖於是忠義畫自運材斸基以至丹楹刻桷疊栱下㭿皆役鬼神為之圖成蜀主令內作都料看此畫圖枋栱有凖的否對曰此畫覆較一座分明無缺其妙如此授翰林待詔賜紫金魚袋故事每年杪冬末旬翰林工畫鬼神者例進鍾馗丙辰嵗忠義所進以第二指挑鬼眼睛蒲師訓所進則以拇指剜之鍾馗相似而用指不同蜀主問黃監孰為優劣筌優師訓蜀主曰師訓力在拇指忠義力在食指也二者筆力相敵難議升降並厚賜之今衙北門大安樓下天王院自濮陽吳公行曽鎮蜀缺興其中有唐時名畫數堵及高道興杜齯龜房從真趙德齊畫佛像羅漢經驗變相至是忠義與黃筌蒲師訓合手畫天王變相十堵於中各盡所能愈於前輩淳化五年甲午兵火焚盡只餘王蜀先主祠堂正門西畔神鬼大聖慈寺正門北墻上西域記圖石經院後殿天王變相中寺六祖院傍藥師經變相並忠義筆見存益州畫録成都古寺名筆六祖院南壁佛㑹變相一堵待詔趙忠義筆妙格上品蒲延昌者師訓養子也廣政中進畫授翰林待詔賜緋魚袋時福感寺禮塔院僧摸寫宋展子䖍獅子於壁延昌見之曰但得其樣未得其筆爾遂畫獅子圖獻進時王昭逺公有嬖妾患痁以之懸於卧內其疾頓減怪而問之對云宋展氏子䖍於金陵延祚寺殿壁畫二獅患者坐壁下或有愈者又梁昭明太子以張僧繇獅子愈疾名曰辟邪其來久矣按展氏古本獅子一則奔走奮迅一則回擲咆哮僧繇之畫獅子翻身側視鬃尾俱就八分爪牙似二龍拿珠之狀至今傳焉延昌畫於諸葛廟壁為多兵火蕩盡餘聖壽寺青衣神廟鬼神人物數堵見存益州畫録趙才者蜀人也工人物鬼神甲馬廣政年與蒲師訓子父敵手其筆在浣花甘亭侯廟頗多資福寺門南北一方天王像甲午兵燹燬盡今惟諸葛廟第三門內鬼神兩堵存程承辨眉州彭山人也工畫人物鬼神當孟氏廣政年與蒲師訓蒲延昌趙才遞相較敵皆推妙手承辨兼善雕刻機巧人物鬼神怪異禽獸之類竒絶當時今彭山縣洞明觀畫天蓬黑殺𤣥武火鈴一堂象耳山堂遊變神鬼一堵見存姜道隱綿竹人也年才齠齓盡日不歸父母尋之多得於神佛廟中有畫處及長木訥不務農桑唯畫是好無妻孥孑然一身常戴一竹笠隨身布衣草履筆墨而已雖父母兄弟亦罕測其行止人皆呼為猱頭僞相趙國公昊聞之使畫屏風因問姓名則蜀語對云姜姓無名公曰既無名是以道隱也自此名為道隱焉宋王趙公廷隱於淨衆寺創一禪院請道隱於方丈畫山水松石數堵王與諸侍從觀其運筆道隱未嘗回顧旁若無人畫畢贈之十縑置僧堂前拂衣而去今綿竹諸山寺觀多其畫壁已上三則益州畫録野人閒話載張道隱不事談論不與人交往不冠帶不拜跪入謂之猱頭相國李昊為名道隱常居綿竹山中喜讀莊老暇則好圖龍興思忽至即畫百尺之狀飄飄然雲陰雨氣作蜿蜒勢已而擲筆撫掌常以此為適意撰集龍證筆訣三卷傳於家丁未年旱彭州倅鄭昭請圖龍於州城之西門泰山府君祠為民致雨於是與二道士數僕夫秉燭以畫使人槌鼓噴笛掌祠者頓足起舞其夕三更風雨大沛一時之戲亦濟農事云有蔣貽恭留題詩曰世人空解競丹青惟子通元得墨靈應有鬼神看下筆豈無風雨助成形威疑噴浪歸滄海勢欲拏雲上杳冥靜閉緑堂深夜後曉來簾幕似聞腥按姜張二姓未詳孰是邱文播漢州人也後改名潛工畫山水人物佛像神仙今新都乾明禪院六祖漢州崇教禪院羅漢紫極宫二十四化神仙皆其筆見存有子餘慶善花雀弟文曉亦工是業今淨衆寺延壽禪院天王祖師及諸高僧竹石名花二十餘堵乃廣政癸卯與僧令宗合畫者益州畫録成都古寺名筆華嚴院觀音勢至五髻文殊慧日院佛堂內十六羅漢皆文播筆能格上品僧令宗文播異姓弟也有大聖慈寺三學院經樓下兩畔四天王兩堵放生池揭諦堂內六祖等像見存益州畫録黃庭堅曰浴室院有蜀僧令宗畫達磨西來六祖師人物皆妙絶其山川草木毛羽衣盂諸物畫工能知之至於人有懷道之容投機接物目擊而百體從之者未易為俗人言也此壁列於冠蓋之㑹而湮伏不聞者數十年得蜀人蘇子瞻乃發之物不係於世道興衰亦有數如此此寺井泉甘寒汝師碾建溪茶常不落第二故人陳季常林下士也寓棊簟於此蘇子瞻范子功數來從之故余過門必稅駕焉浴室院在成都聖壽寺周行通者蜀人工畫人物鬼神蕃馬戎服器械氊帳鷹犬羊雁之類及川原放牧盡得其妍有李陵送蘇武圖奪馬圖三困圖射鵰圖陰山七騎圖蜀人皆傳周胡畨馬為妙行通多髯故也益州畫録蜀志補聖壽寺僧楚安妙畫山水須一季以來方就一扇好事者求得之目為筆寶焉僧楚安什邡人俗姓句氏工畫人物樓臺有明皇幸華清宫避暑圖吳王宴姑蘇臺圖此二者多畫於墻壁卷軸團扇之上小大雖殊工緻無減當時重之其避暑圖見存大聖慈寺三學院大㕔後僧惠堅蜀人好圖畫而最謬廣政中為三學院僧畫姑蘇臺一堵對楚安避暑圖識者以為無鍳之甚亦存恐後人誤認故附正之道士李壽儀者卭州依政人壯年慕道出家於縣之有德觀齊醮之外專精畫業人呼為李水墨往來青城山丈人觀宗張素卿筆法每㸃簇五嶽四瀆部屬歸家習學之如此數年又聞簡州開元觀有素卿畫十二仙君一堂往彼焚香齊潔模寫將歸試筆於卭州天師觀西院壁上窮其精粹雖筆力因於素卿而神彩氣韻或過之一堂六堵見存已上三則益州畫録畫評云趙元長字慮善蜀中人通天文厯仕僞蜀孟昶為靈臺官亦善丹青凡星宿緯象皆命畫之國破從昶赴闕下太祖引僞署官屬凡學天文之類皆不赦元長當死遽呼曰臣以畫仕昶所寫者周天象耳符䜟之學非其所知上特原之配文思院為匠人常備禁中之役畫馴雉於御座㑹五坊人按鷹有離韝欲舉者上命縱之徑入殿宇以搏畫雉驚賞久之召入圖畫院為藝學詔督畫東太一宫貴神等像及命摸寫王齊翰應運國寶羅漢深得其法又云孟顯字坦之華池人骨氣清楚語論通博畫佛像人物車馬等出於己意自成一家筆無少滯轉動飄逸觀者不能窮其來去之迹嘗於本郡孟氏舍揮數壁皆有精思又云夏侯延祐字景休蜀中人師黃筌翎毛花竹略有聲譽仕孟昶為待詔國亡隨至京師得圖畫院藝學為流輩推重又云蜀人高文進太宗時入圖畫院為祗候上萬幾之暇留神繪事文進與黃居宷常列左右賜豫優腆相國寺有高益畫壁經時圯剝上惜其精將營治之詔文進曰丹青誰如益者對曰臣雖不及請以蠟紙摸其筆法後移於壁上毫髮無差遂與李用及李象坤翻傳舊本盡得益之骨氣文進自畫後門裏東西二壁五臺峩眉文殊普賢變相及後門西壁神大殿後北方天王等以其能遷待詔仍賜宅相國寺東年老卧病上宣醫療之仍戒曰文進之命實繫卿手功不可緩也注意如此比愈敕同畫東太一宫貴神列位大中祥符初董羣工計度玉清昭應宫壁今景德寺後九曜院羅漢及東壁藥師琉璃光佛皆文進所畫又云王道真字幹叔新繁人幼頴悟有節操善丹青太宗朝待詔高文進甚有聲望一日上問民間誰如卿者對曰新繁人王道真出臣上遂召入圖畫院為祗候與文進等傳移相國寺高益畫壁及于大殿西偏門南面東壁畫寶志化十二面觀音相又與文進對畫寺庭北門東面大神遷待詔又同計度玉清昭應宫壁當時稱之蜀中廣記卷一百七
