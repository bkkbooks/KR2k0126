body:
  text: 蜀中廣記卷六十明曹學佺撰方物記第二鱗介常璩云魚復縣有澤水神天旱鼓其傍即雨故蜀都賦云潛龍蟠於沮澤應鳴鼓而興雨也公孫述據蜀殿前井中有白龍出以為瑞應因自號白帝改元曰龍興即此地矣後漢書桓帝永康元年八月巴郡奏黃龍見郡池中吏傅堅言于時民以天熱欲就池浴見池水濁因戲相恐此中有黃龍語遂行人間郡欲以為美故上言及建安二十三年黃龍見犍為武陽之赤水九日昭烈以為己受命之祥立廟赤水溪上以祀之有碑曰黃龍甘露之碑晉書泰始二年七月黃龍見巴西閬中咸寧二年十月黃龍二見于漢嘉靈關水經注越巂靈道縣有銅山山人有劉慈者晉泰始九年黃龍二見于慈池縣令董𤣥之率吏民觀之以白刺史王濬濬表上之因改護龍縣也任豫益州記云嘉魚蜀郡處處有之狀似鯉而鱗細如鱒肉肥而美大者五六斤食乳泉出丙穴者二三月隨水出穴八九月逆水入穴郡國志嘉魚蜀中謂之拙魚亦謂之魚舅也録異記曰嘉魚䱓魚也形如鱒人以芭蕉葉隔火炙之肥美莫及宋祁方物贊云南有丙穴厥産嘉魚鯉質鱒鱗為味珍腴楊慎異魚贊云南有嘉魚出於丙穴黃河味魚嘉美相頡最宜為䱓隔以蕉葉不爾脂腴將滴火滅又云嘉州魚舅載新厥名鱗鱗迎媵夫豈其甥其文實鯦江圖可徵方物略云黑頭魚形若鯶長者及尺出嘉州歲三月則至惟郭璞臺前有之里人欲怪其說則言璞著書臺下魚吞其墨故首黑贊曰黑首白腹修體短額春則羣泳促罟斯獲嘉州又有客朗魚似鰣肉嫩而美不恆有也荆州記魚復古縣名土人謂鱏鰉至此復回不再上也水經注魚復縣巴鄉村側有溪溪中有魚其頭似羊豐肉少骨美於餘魚矣韻㑹云鮪魚蜀曰䱴䲛出鞏山穴中三月遡河上能度龍門則為龍李竒注子虛賦周洛曰鮪蜀曰䱴毛詩義疏曰鮪似鱣而色青黑頭小而尖如鐵兜鍪口在頷下大者七八尺益州人謂之鮪鱨大者王鮪小者叔鮪也注爾雅曰鱣大魚也似鱏而短鼻口在頷下體有邪行甲無鱗肉黃大者長二三丈江東人呼為黃魚酉陽雜俎曰蜀中每殺黃魚天必隂雨南中八部志曰卭河縱廣岸二十里深百餘丈有大魚長一二丈頭特大遙視如戴鐵釡狀越巂志衛北二十五里魚洞河源出吐蕃合羅羅河八大渡河其中出大魚漢志卭部河長魚是也方物略云􅫀魚出蜀江背鱗黑而膚理似玉蜀人以為鱠味美贊曰比鯽則大膚縷玉瑩以膾諸庖無異􅖿永又云沙緑魚魚之細者生隈瀨中狀若鰡大不五寸美味蜀人珍之贊曰長不敷寸有駮其文淺瀨曲隈唯泳而羣又云石鱉魚狀似􅻚䰲而小上春時出自石間庖人取為竒味贊曰鯫鱗么質本不登俎以味見録雖細猶捕魏武食制云蜀有蒲魚其形如粥出于郫縣蒲村之麓廣志曰武陽小魚大如針號一斤千頭蜀人以為醬也酉陽雜俎鯢魚如鮎四足長尾能上樹天旱輒含水上山以草葉覆身張口鳥來飲水因吸食之聲如小兒峽中人先縳之於樹鞭之身上白汗出如溝汁去此方可食不爾有毒鯢志作䱱范鎮東齊筆録作魶方物略云魶魚出西山溪谷及雅江狀似鯢有足能緣木其聲如兒啼蜀人豢之贊曰有足若鯢大首長尾其啼如嬰緣木弗墜蜀都賦石䲛水螭注石䲛石魚也如石燕巴郡志溫泉峽有魚生長溫湯中不可食洪雅志有人魚其手足似人寰宇記魚蛇水在青神縣水有魚似蛇即魚耶江也又云維州産魚虎有舌口如棘能食魚東坡云豫别業前泉水相傳有二牝豬潛其中化為二鯉蓋豬龍也一日偶見之以告妻兄王願疑豫誕同禱於泉見二鯉躍出今眉州南石佛鎮是其處丹淵集史少訥見許江豚未得以詩戲之云霜重水落岸有冰江豚乘寒弄晴日搖波拍浪乍羣起尾厚喙長鬐鬛赤漁人清曉橫巨舟一舉大網凡數頭想君盤筯已厭足何不略遣來陵州是時與可守陵州故云揚雄蜀本紀云張儀城成都輒頺壞時見大龜出於江回旋而行儀以問巫巫曰循龜迹築城功可就乃從之至今蜀人呼為龜城戎幕閒談曰豫未至郡日嘗聞龜殼猶在成都昨詢訪耆舊有軍資庫官宇文遇者言比常在庫中元和初節度使高崇文命工人截為腰帶胯具自張儀至崇文千餘載古物尚在而武臣泯之深可惜也爾雅注云涪陵出大龜緣中叉似玳瑁即今觜􅏲龜一名靈􅏲能鳴譙周異物志曰涪陵龜其甲可以卜即此魏元帝奐之世獻靈龜于相府因名其地為龜溪矣劉敬叔異苑云元嘉初益州刺史遣三人入山伐樵迷路忽見一龜大如車輪四足各躡一小龜而行又有百餘黃龜從其後三人叩頭請示出路龜乃伸頭若有意焉因共隨逐得出有捉小龜歸家以為臛者須臾暴死録異記云有於蜀江之上獲巨鱉者長尺餘其裙朱色煮之經宿遊戲自若又加火一日水涸而鱉不死舉家驚懼以為龍類也乃投於江中浮泛而去山海經曰岷山江水出焉其中多鼉郭注鼉似蜥蜴大者長二丈有鱗彩皮可以冒鼓元和郡縣志利州綿谷縣穿山一名胡頭山有山鼉伏於空處皮可為甲刀箭所不能入琅嬛記云王吉夜夢一蟛蜞在都亭作人語曰我翌日當舍此吉覺異之使人于都亭候之司馬長卿至吉曰此人文章當橫行一世天下因呼蟛蜞為長卿卓文君一生不食蟛蜞蟲本草金蠶始于蜀中狀如蠶金色日食蜀錦四寸寰宇記成都聖壽寺有青衣神祠神即蠶叢氏也相傳蠶叢氏始教人養蠶時家給一金蠶後聚而弗給瘞之江上為蠶墓宋魯應龍閒窗括異云金蠶色如金食以蜀錦取其遺糞置飲食中毒人必死善能致他財使人暴富遣之極難雖水火兵刃不能害多以金銀藏篋置其中投之路隅人或收之以去謂之嫁金蠶也爾雅獨者蜀也蜀蟲名此蟲大如指似蠶而無羣故云蜀山海經云巴蛇食象三歲而出其骨君子服之已心腹之疾其為蛇青黃赤一曰黑蛇青首在犀牛西郭璞贊曰象實巨獸有蛇吞之越出其骨三年為期厥大何如屈生是疑玉堂閒話云有遊於瞿塘峽者冬月草枯野火燎其峰巒連山跨谷紅焰照天忽聞巖岸之間大石摧墜輷磕有聲遂駐足伺之見一物圓如大囷䃂至平地細看乃一蛇也遂剖而驗之乃吞鹿於腹因野火燒而墮耳元稹巴蛇詩序云巴之蛇百類其大蟒其毒褰鼻蟒人常不見褰鼻常遭之毒人則毛髮皆豎起飲溪澗而泥沙盡沸驗方云攻巨蟒用雄黃烟被其腦則裂而鷣音淫鷂屬鳥能食其小者巴無是物其民常用術禁之尤效詩曰巴蛇千種毒其最鼻褰蛇掉舌翻紅焰盤身蹙白花噴人豎毛髮飲浪沸泥沙欲學叔敖瘞其如多似麻又越嶺南濵海武都西陷戎雄黃假名石鷣鳥逺難籠詎有隳腸計應無破腦功巴山晝昏黑妖霧毒濛濛又漢帝斬蛇劒晉時燒上天自兹繁巨蟒往往壽千年白晝遮長道青溪蒸毒烟戰龍蒼海外平地血浮船大荒南經曰滎山黑水之南有𤣥蛇食麈郭璞注今南方蚺蛇吞鹿亦此類風俗通曰車騎將軍巴郡馮緄為議郎發綬笥有二赤蛇可三尺分走南北大用憂怖卜云此吉祥也當為邊將以東為名後五年果為大將軍拜遼東太守北夢瑣言王蜀先主時修斜谷閣道鳯州衙將白某掌其事至武休潭見一婦人浮沈水面意其溺者命役夫鉤致岸濵忽化為大蛟沒於潭中白以為不祥因而致疾豫誦岑參招北客賦云瞿塘之東下有千歲老蛟化為婦人祇服靚粧游於水濵白聞之方悟其為蛟也疾尋瘳岑賦所言斯足為證又云蛟之為物不識其狀非有鱗鬛四足乎或曰虬蜧蛟蝹狀如蛇南僧說蛟如馬蟥即水蛭也涎沫腥粘掉尾纒人而噬其血蜀人號為馬絆蛇頭如猫鼠有一㸃白漢州古城潭底有蛟人伐之乃躍于沙內蟠蜿力困里人歡噪以助竟斃之故見斯狀玉堂閒話云巴賨之境民居溪壑以弋獵為生有一嵌空洞穴深不能測獵師縱犬於此多呼之不回瞪目搖尾時有彩雲垂下迎犬而升如是者纍年呼為狗仙山一獵師獨不信遂絏一犬挾藥弧往觀至則以粗繩繫犬縶于拱木然後退身覘之及彩雲下犬縈身不能上嘷呌者數四旋見有物頭大如瓮雙目如電鱗甲光明冷照溪谷漸垂身出洞中顧其犬獵師乃張毒矢射中之其物不復見經旬日臭穢滿山獵師乃自山頂縋索下觀見一大蟒腐爛于岩間狗仙之事遂絶川東山南五溪黔中皆有毒蛇烏頭反鼻蟠草中以尾倒鉤人去數步直來疾如激箭螫人立死中手斷手中足斷足不然則全身腫爛百無一活謂之蝮蛇又有黃喉蛇好蟠舍上無毒不害人唯善食毒蛇食飽垂頭直下沫滴地噴起變為沙虱中人為疾額上有大王字衆蛇之長常食蝠蛇又有碎蛇見人則分身為數段人去復續如故遊梁雜記云富順縣去城三十里有羅漢寺乃宋景祐間建橫踞石梁水激之噴蹙注射浪湧濤翻嘗有一白蛇逆波而來遊入隙竇間初隱隱若匹練俄而蜿蜒丈許如牽玉繩且時巨時細時修時短倏忽不可控搏聞人笑語及梵唄聲愈逐響而來如抃如舞少頃不知所歸土人謂是神物隱溪中已數百年一名銀蛇溪戎州志有蟲曰蝍蛆食蛇即莊生所謂即且甘帶也噫蛇之為物毒矣其種類亦繁矣而尚有食之者此事之不可知也博物志云食巴豆之鼠三年重三十斤本草云鼫鼠蜀人謂之􅥨鼠取其毛作筆􅥨亦大也劉敬叔異苑云成都有義鼠形如鼠短尾每行遞相咬尾三五為羣驚之即散俗云見之者當有吉兆梁州記曰唐公房登仙於聟鄉山山有易腸鼠一月三吐易其腸束廣微所謂唐鼠者也博物志云唐公房升仙雞狗並去惟以鼠惡棄之鼠悔恨一月三吐其腸寰宇記利州産鰿子按􅜽小貝也鮒也音與積同周禮注疏􅜽小而橢他果切蜾匾也東坡論字詩云壁美何妨橢徐季海作字多匾坡公效之或謂之石壓蝦蟆景渙牧豎閒談云知卭州事龔穎建溪人即真君靖之逺孫真君升天之後渙嘗病耳聾龔曰恨蜀中無紫粉為子修藥餌之立差因以尋常紫粉畀之龔笑曰此非真紫粉紫粉乃蘇枋樹間自然蟲糞也是渙錯認紫粉五十年矣嘉祐雜志峨眉雪蛆治內熱陸游云豫至蜀乃知此物實出茂州雪山雪山四時常有積雪彌遍嶺谷蛆生其中雪時得之能蠕動雪消蛆亦消益部談資曰雪蛆産岷峨深澗其形如蝟但無刺肥白長五六寸腹中惟水身能申縮取食之須在旦夕間否則化矣北夢瑣言曰陳藏器本草砂俘即倒行蚼子也蜀人號曰俘鬱旋穴乾土為孔常睡不動取致枕中令夫妻相悅愚遊成都止于逆旅與賣草藥李山人相熟見蜀城少年往往欣然而訪李生仍以禮物酬酢詰之人曰客敬李生媚藥耳徵其所用乃砂俘也朐䏰音蠢潤地下濕則多此蟲劉禹錫嘉話云朐䏰蚯蚓也常至夜江畔出其身半跳於空中而鳴上音屈下音忍說文曰朐䏰從肉旬聲黃朝英云考其義當作潤蠢朐如順切䏰尺允切與禹錫音不同按朐䏰漢縣名今梁萬間是其地爾雅土蜂地中作房啖其子即馬蜂今荆巴間呼為蟺方物略云金蟲出利州山中蜂體緑色光若金里婦取以佐叉鐶之飾贊曰蟲質甚微翠體金光取而槁之參飾叉梁酉陽雜俎蜀中有竹蜜蜂好於野竹上結窠窠大如雞卵有蒂長尺許窠與蜜並紺色可愛甘倍於常蜜方言云蠀螬蟲梁益之間謂之蛒元稹蛒蜂詩三首序云蛒亦蜂類而大巢在褰鼻蛇穴下故毒螫倍諸蜂蠆中手足輒斷落及心胸則圮裂用它蜂中人之方療之不能愈巴人往往持禁以制之則差詩云巴蛇蟠窟穴穴下有巢蜂近樹禽垂翅依原獸絶蹤微遭斷手足厚毒破心胸昔甚招魂句那知眼自逢又梨笑清都月京師開元觀多梨花蜂蜂游紫殿春搆脾分部伍嚼蘂奉君親翅羽頗同類心神固異倫安知人世裏不有噬人人又蘭蕙本同畹蜂蛇亦雜居害心俱毒螫妖焰兩吹噓雷蟄吞噬止枯焚巢穴除可憐相濟惡勿謂禍無餘方言曰蚍蜉西南梁益間謂之𤣥蚼陶宏景曰地膽出梁州狀如大馬蟻有翼太平廣記忠州墊江縣吏冉端唐開成初父死有嚴師者善山岡為卜地云合有王氣羣聚之物掘深丈餘遇蟻城方數丈外重雉堞皆具子城譙櫓工若雕刻城內分徑街小垤相次每垤有蟻數千憧憧不絶徑甚淨滑樓中有二蟻一紫色長寸餘足作金色一稍小有羽細腰白翅翅有經脈疑是雌者衆蟻約有數斛城隅小壞以堅土為蓋故中樓不損既掘露蟻大擾若求救之狀吏遽請縣令李𤣥之詣觀已勸吏改卜嚴師伐其卜驗為得地請遷蟻于巖側狀其所為仍布石粟覆之以板經旬嚴師忽得病若狂或自批觸穢詈大呼數日不已令素厚嚴因為祝蟻療以雄黃丸方愈元稹蟻子詩三首序云巴蟻衆而善攻􅟝棟往往木容完具而心節朽壞屋居者不省其微而禍成傾壓詩云蟻子生無處偏因濕處生隂霪煩擾攘拾粒苦譻􅘱音能牀上主人病耳中虛藏鳴雷霆翻不省聞汝作牛聲又時術功雖細年深禍亦成攻穿漏江海噆食困蛟鯨敢憚榱􅟝蠧深防柱石傾寄言持重者微物莫全輕又攘攘終朝見悠悠卒歲疑詎能分牝牡焉得有蝝蚔音緣池蟻卵也徙市竟何意生涯都幾時巢由或逢我應似我相期微之又有蜘蛛詩三首序云巴蜘蛛大而毒其甚者身邊數寸而踦長數倍其絲網羅竹柏盡死中人瘡痏潗音集濕且痛癢倍常用雄黃苦酒塗所囓仍用鼠婦蟲食其絲盡輒愈療不速絲縈心而無及矣詩云蜘蛛天下足巴蜀就中多縫隙容長踦虛空織橫羅縈纒傷竹柏吞噬及蟲蛾為送佳人喜珠櫳無奈何又網密將求食絲斜誤著人因依方託緒挂罥遂容身截道蟬冠礙漫天玉露頻兒童憐小巧漸欲及車輪又稚子憐圓網佳人祝喜絲那知緣暗隙忽復囓柔肌毒腠攻猶易焚心療恐遲看看長妖緒和扁欲漣洏微之又有虻詩三首序云巴之山谷間春秋常雨自五六月至八九月雨則多虻道路羣飛噬馬牛血及蹄角旦暮尤極繁多人常用日中時趣程逮雪霜而後盡其囓人痛劇浮蟆而毒不留肌故無療術詩云隂深山有瘴濕熱草多虻衆噬錐刀毒羣飛風雨聲汗粘瘡痏痛日曝苦辛行飽爾咀殘腹安知天地情又千山溪沸石六月火燒雲自顧生無類那堪毒有羣搏牛皮若截噬馬血成文蹄角尚如此肌膚安可云又辛螫終非久炎凉本遞興秋風自天落夏孽與霜澄一鏡開潭面千峰露石稜氣平蟲豸音雉死雲路好攀登微之又有蟆子詩三首序云蟆蛟類也其實黑而小不礙紗縠夜伏而晝飛聞柏煙與麝香輒去蛟蟆與浮塵皆巴蛇鱗中之細蟲耳故囓人成瘡秋夏不愈膏楸葉而傅之則差詩云蟆子微於蚋朝繁夜則無毫端生羽翼針喙唶肌膚暗毒應難免羸形日漸枯將身逺相就不敢恨非辜又晦景權藏毒明時敢噬人不勞生詬怒祗足助酸辛隼眥看無物蛇軀庇有鱗天方芻狗我甘與爾相親又有口深堪異趨時詎可量誰令通鼻息何故辨馨香沈水來滄海崇蘭泛露光那能枉焚爇爾衆我微茫蜀中廣記卷六十
