body:
  text: 蜀中廣記卷五十一明曹學佺撰蜀郡縣古今通釋第一四川布政司說文川者穿也水穿地而流曰川桑欽水經云大江出蜀是矣唐分劒南道為東西二川宋析為益梓利䕫四路元為四川行省國朝因之為四川布政司或稱三川者非三川伊洛之地司馬錯勸秦伐蜀曰周自知失九鼎韓自知亡三川是也漢武帝元鼎年以蜀郡廣漢犍為為三蜀獻帝建安年分巴東巴西永寧郡為三巴巴蜀雖别猶可槩稱川西道屬成都府管六州二十五縣帝王世紀云周太王從梁山止於岐下一年成邑二年成都蜀本梁州之域毛詩奕奕梁山惟禹甸之尋江源記云梁山首跨劍閣而尾入江矣故秦置縣曰成都人皇之世九囿而蜀囿居其一黃帝之子昌意娶蜀山氏女生帝嚳封其支庶於蜀始為蜀國爾雅釋山蜀者獨也言不與他相連屬也漢武帝置益州益者厄也以其地險厄而益廣也唐𤣥宗西幸始改成都府升號南京以地當長安之南矣其時長史實稱尹而知府則起於王蜀武成云昔者州郡之分猶今之道府也州曰庸部郡曰導江則在王莽時州曰司隸郡曰成都則在公孫述時益州置牧蜀郡置守則在先主時刺史治太城太守治少城則在東晉時益州總管府劍南節度使則在唐開元前一路安撫使四路制置使則在宋南渡後成都縣秦司馬錯張儀滅蜀置釋同郡華陽國志云縣有十二鄉五部華陽縣禹貢華陽黑水惟梁州梁彊梁也西方金氣彊梁之義周有天下併梁於雍二州俱以華山為主雍之有華隂猶蜀之有華陽也唐初為蜀縣析成都置乾元中易今名郫縣杜宇名蒲卑都於此邑冡至今存秦因以卑名邑也唐垂拱初割成都之西鄙置犀浦縣取李冰所創石犀為名宋熙寧中廢為鎮今為鋪在郫縣東二十五里闕稱益州牧始此新都縣漢髙六年與廣漢郡同置三都之一也亦曰新郪邑界有王稚子墓稚子郪人遂有斯目按後漢書注郪故城在今梓州郪縣西南而此曰新以别之又地理志汝南郡有新郪後漢改曰郪丘章帝徙宋公之處也韵書廣漢之郪千咨切汝南之郪先稽切溫江縣江水至此始溫也濯絲有色後魏時立矣漢曰湔氐道隋曰萬春今縣之長春鄉是其故址新繁縣秦曰繁以界有繁江也謂之繁田蜀姜維徙凉州降胡於繁遷其民於新縣故曰新繁雙流縣李善注文選江水出岷山分為二經成都東南故左思曰帶二江之雙流也漢曰廣都即蜀三都之一隋避煬帝諱改今名廣都水驛在今華陽縣東南國朝隆慶初廢志云蠶叢故都城距縣南十八里崇慶州管新津一縣蜀州也三國志云益州之地仰給於蜀宋髙宗大觀元年封蜀國公至紹興中乃升為崇慶府元降為州國朝因之漢曰江原以江水所由也有江源祠莽曰卭原以與臨卭近也濵文井江晉曰晉原以有晉原山也即鶴鳴山唐曰唐安以獲安唐室也近西巡時今唐安為驛而江原為鎮矣新津縣李膺益州記云皂里江津之所曰新津市周地圖記云閔帝元年於此立新津縣也彭縣周彭國也武王伐紂彭人與焉又云籛鏗之封邑矣華陽國志則以兩山對闕有天彭之號也梁天監中立東益州以在益州之東益州記云彭號小郫土地肥良比之郫邑也袁隲記云九峰髙峙濛水濬發後周之九隴隋之濛州取諸此矣志云今縣西二十里之三郎鎮即九隴故址縣東二十里之濛陽鎮即濛州故址崇寧縣析郫導江九隴三縣所置也唐曰唐昌宋曰永昌道君崇寧初改為崇寧灌縣李冰傳江水堰流以灌平陸謂之灌口貞觀曰灌寧孟蜀曰灌州也上古為魚鳬氏之國今有魚鳬故城三國曰都安水經注云即都安堰也諸葛亮北伐以此堰農大國之所資發征丁千二百人主護之有堰官宋勑永康軍兼管堰事國朝尤慎重焉冬閉時修春開時祀水利道主其事間行别駕及灌令代齊曰齊基曰青城唐曰盤龍曰導江宋曰永安軍又改永康軍青城山杜光庭記云岷山連峰接岫千里不絶青城乃第一峰也盤龍山益州記云山土色黃盤回有龍形導江水經注云岷山徼外江水之所導也永安軍寰宇記云宋初沿貞觀鎮靜軍之號也志云青城廢縣在治南六十里盤龍廢縣即治內導江廢縣在治東二十里今為導江鋪永康廢址今為永康驛威州管保縣一縣蜀後主時姜維馬忠等討汶川叛羌此其地也自晉以後羌夷叛服不常以其地置薛城戍唐初白狗羌首領鄧賢優內附乃於姜維故城置維州以統之後改為維川郡焉王孟二蜀繼有其地徙就中州城即今治也宋平蜀後以京遞發濰州誤至維州因改曰威州取威制西羌之意維威音亦相近云廢通化縣唐咸亨二年刺史董辨招慰生羌於此置小封縣在西蕃通鶴軍垂拱二年城為北蕃所沒改置在威戎軍西本志云在州之通化里與金州演化禪師相近保縣唐天寶中置天保郡乾元中改保州孟蜀復改保寧縣也國朝洪武十八年去寧字以避保寧府茂州管汶川一縣禹貢岷山導江發迹於此水經注云岷山即瀆山也水曰瀆水矣冉駹氏之國按白馬黑面曰駹駹夷名也史記南越破後冉駹等皆震恐請臣置吏漢武帝元鼎六年以冉駹為汶山郡汶當作渂古字汶岷通用王羲之游目汶嶺是也按地里表云汶山在茂州汶山縣岷山在西北如此則汶岷乃二山梁曰繩州普通三年置桃關之路以繩為橋因作州稱隋曰㑹州謂其為西夷之交㑹也唐貞觀始改茂州以茂濕山為名言山之草木叢茂雲霧潤濕矣汶川縣漢之綿虒縣也虎有角曰虒行水中地有此獸矣晉置汶川州於此周武帝保定四年移汶川州於廣陽縣州廢乃置汶川縣簡州蜀漢簡雍為先主鎮牛鞞牛鞞漢縣名牛鞞之水出焉山曰賴簡池曰簡池皆民懷雍政也隋始於此置簡州矣西魏之陽安以山名今為驛隋之平泉以泉名今為鎮驛在治前鎮距西南五十里資縣陳留風俗傳及姓纂云資姓黃帝後在益州資中今邑之山川皆曰資從賜姓也寰宇記云廢銀山縣在資州東南三十八里以山名龍水縣在龍龜溪之左以水名志云今之銀山鎮龍水鄉是也資陽縣邑當資水之陽齊建元間置又曽於此縣立資州矣通志云盤石廢縣在縣北三里有石狀如盤陀月山廢縣在縣境宋析入者有山形如明月內江縣本中江也與外江别入瀘州合流縣為後周所置隋室之先諱忠改曰內江周以前曰漢安戍宋别名安夷軍按今中江縣之水本內水蜀志先主從內水入涪是也而內江縣之水本中水以在內外水之中也沈約宋書云資江為中水涪江為內水恐因縣名而反混水名故特表之仁夀縣西魏之隆山郡也即鼎鼻山其山隆起又曰隆山矣周閔帝元年於此置陵州蓋因張陵而名陵井又因陵井而名陵州也陵置縣曰仁夀從文帝年號廢貴平縣後魏恭帝與平井可曇二縣同立以隸和仁郡也今之貴平鎮入簡州界廢籍縣梁天監置席郡隋廢郡為縣後訛席為籍也今籍縣址入雙流界廢陵井監宋大觀四年改為仙井俱併入當縣井研縣隋置古之善計者曰研計然亦名計研也此邑鹽井之利出於心計乃以研系井而為名與寰宇記云有山俯臨井鑊名曰井鑊山方言關東呼鑊為鹵研魏之蒲亭隋之始建皆在鐵山界上周地圖云蒲亭縣有鐵山諸葛亮取為刀器因封宇文度為鐵山侯即此金堂縣西魏置金淵縣唐避諱改金水咸亨中析立今縣曰堂者地寬平處也漢之牛鞞縣地宋併懷安軍入焉又名懷口今為懷口巡檢司去縣東南五十里古縣附金沙水舊屬簡池今縣連金臺山舊屬新都漢州管什邡德陽綿竹三縣漢髙帝六年置廣漢郡於乘鄉一名繩鄉廣大也言能廣大漢業也東漢益州刺史治唐初立漢州天寶中於此立德陽郡華陽國志郡治雒縣以洛水所㑹也源出洛通山矣元至正中省廢址在州北三里寰宇記湔陽故城漢陽廢城俱在城南什邡縣漢雍齒封邑年表作汁邡土地譜云廣漢領縣十以應十幹縣當酉位酉十數也古碑邡水流為十故名什邡今雒江出關口東枝六西枝四而縣居其中矣後周改方亭縣今為里德陽縣漢曰德陽以德水之陽也晉曰旌陽以旌水之陽也孝德旌異皆因姜士游士游綿竹人當縣後漢析綿竹所置綿竹故城在治北三十五里諸葛瞻戰敗處綿竹縣漢縣也劉焉徙益州治於此地里志云紫嵓山綿竹所出後周改孝水以姜詩宅在沉鄉為名至隋仍舊沉鄉一曰泛鄉何武封邑綿州管彰明羅江二縣左綿也地居綿江之左漢為涪縣以涪水所經矣曰巴中即巴西也曰潼州即金山也曰鹽泉即魏城也今名隋改州治內有金山驛治東五里有巴西渡東北六十里有魏城巡檢司彰明縣後魏之昌隆縣唐避諱改昌明後唐改曰彰明矣李太白之所生也羅江縣左水自安縣來右水自綿州來合於縣之東北蹙成羅紋又謂之紋江也唐天寶置晉初曰萬安李膺記云晉於梓潼水尾萬安故城置萬安縣是矣今為驛晉末亂移就潺亭水經注云潺山石下有泉曰潺水今縣北三里有潺亭廟碑磨滅潺亭字見存安縣唐武德置以界有龍安山云元為安州國初為安縣即隋之神泉縣也郡國志云縣三十里有泉十四穴甘香異常飲之已痼疾故曰神泉唐永淳年復置西昌縣取西昌山為名矣今縣三十里有西昌市南五十里有神泉廢縣址龍安府管三縣西漢北部都尉治東漢之隂平郡也水經注曰岷山之西有龍冡按梁普通中武陵王蕭紀僣據土人李龍遷保此畨漢德之西魏平蜀始置龍州保其名矣向為龍門州郡元棄為龍州宣慰司國朝嘉靖四十五年改流系以安字平武縣晉於隂平郡置隂平平廣二縣隋改龍州為平武郡也與龍州改流之年並設江油縣以江水所由也後加水旁矣蜀漢馬邈守江油即此初屬保寧嘉靖末改屬本府石泉縣汶山郡之石紐村禹所生也漢廣柔縣矣城北岩下有甘泉乃石泉軍之始初隸成都嘉靖末改屬本府青川所有青川溪源出畨界又啼胡山水出清美謂之清水也天寶中置清川縣於此國朝洪武四年置所在龍安府東百二十里隸焉松潘衛地出甘松後魏以之名縣矣唐改松州潘吐蕃姓也洪武初設松州潘州二衛尋合為一置軍民指揮使司唐天寶為交川郡後周為龍涸郡水經注云自白馬嶺回行二千餘里至龍涸是也小河所涪江支河也古曰涪陽國朝宣德四年置在松潘衛東百九十里隸焉疊溪所氐羌之地漢蠶陵縣後周置翼斜郡唐曰翼州以夷水繞其地分流如翼也國朝洪武十一年置取圖經疊石為巢置所蜀中廣記卷五十一
