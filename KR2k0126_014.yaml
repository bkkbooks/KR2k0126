body:
  text: 蜀中廣記卷十四明曹學佺撰名勝記第十四上川南道雅州史記秦始皇二十五年滅楚徙嚴王之族以實此地故曰嚴道漢為縣属蜀郡文帝徙淮南王之族於此楊用脩蜀志補遺引蜀本紀以為許由之友嚴僖所隱地也漢髙六年分置青衣縣水經青衣水出青衣縣西䝉山東與沫水合註云縣故有青衣羌國竹書紀年孝惠成王十年瑕陽人自秦道㟭山青衣水來歸漢武帝天漢四年分沈黎郡置西部都尉主青衣公孫述之有蜀也青衣不服世祖嘉之建武十九年以為郡安帝延灮元年置蜀郡属國都尉青衣王子心慕漢制上求内附順帝陽嘉二年改曰漢嘉得此良臣也本志又有卭榖王任君貴越嶲人新莽之亂奮集英雄起越嶲殺莽所立太守枚根而自立保全一方見西南夷傳按州城隅有任使君廟矣晉末李䧺竊據夷獠雜居西魏僑立䝉山縣後置雅州郡國志云漢源縣有離堆蜀守李氷所鑿離即古雅字也州以此名圖經州治舊在雅安山上大中祥符間國子博士何昌言為守以地多嵐瘴徙于山之麓本志云州治後雅安山又名月心山山形如月象心字州治左㸃所治右㸃文廟居中皆倚山也禹貢蔡䝉旅平和夷底績葉少藴解云蔡在嚴道䝉在漢嘉漢嘉即嚴道也舊傳諸葛亮于此夢見周公因立文憲王廟遂號周公山按文憲王廟記軍事推官王育撰叅軍李夢徴書矣周公山半有石筍移之即雨寰宇記云山勢屹然有龍穴常多隂雲李燾遊蔡山序蜀惟岷山蔡䝉二山雅獨兼有之本志云旅平者禹治水成功旅祭于此俗呼為落平山頂有萬壑亭在焉寰宇記云和川路在縣界西去吐蕃大渡河五日程從大渡河西郭至吐蕃松城四日程羌蠻混雜連山接野鳥路沿空不知里數即禹貢所謂和夷底績也本志云東北有和夷壩是矣大唐新語云陸象先為益州長史奏嘉卭路逺請鑿岷山之南以從捷近發卒從役居人不堪道亡瘉死行旅無算左拾遺張宣明監姚嶲諸軍事兼招慰使親騐艱險移牒益州曰此路髙山臨雲深谷無景至有斗絶巨險不通人蹤經之者必摶壁傍崖脅息而度雖竟日登頓二十許里木人猶堪淚下鐵馬亦可蹄穿象先覽之兢惕遽罷役仍舊路以聞蜀人賴焉孫漸昭應廟記云其山蔡䝉其闗卭崍水經注云岷山東北百四十里曰崍山中江所出東注于大江崍山卭崍山也在漢嘉嚴道縣一曰新道又東百五十里曰崌山北江所出東注于大江故郭景純江賦曰流二江于崌崍也圖經云嚴道山在縣南五里本名鹿角山唐天寳六年勅改為嚴道山山下有丙穴出嘉魚方輿云萬勝岡在州西有龍觀寺其趾曰百丈山自卭崍或起或伏環遶州治本志云諸葛武侯擒孟獲旋師至此岡下人聚觀之因建亭于上為龍觀亭碑目云髙孝㢘墓碑在嚴道縣東二十里按其碑有年月乃漢建安十四年立髙君兄弟皆孝㢘有二石闕其一曰故益州太守武隂令上計吏舉孝㢘諸部從事髙頥字貫方其一曰漢故益州太守隂平都尉武陽令北府丞舉孝㢘髙君實字貫光又一大碑其首云故益州太守髙君之碑本志云漢孝㢘髙君墓在金雞山下孝㢘橋墓跡蕪沒惟二石坊在田中坊亦以大石堆垜而成非石柱也其一方𨽻云漢故益州太守隂平都尉武陽令北府丞舉孝亷髙君仍有數字剥落方輿云金雞山在嚴道北三十五里俗傳有金雞鳴于此循金雞山而上二百歩有石室中有石像為爾朱眞人宋嘉泰中刻尚存碑目又云羊竇道碑在嚴道縣東三十里金雞山下漢永初六年碑也梁益記云大小漏天在雅州西北山谷髙深沉晦多雨而黎州常多風故謂黎風雅雨宇文漙新路賦惟天下之至險有嚴道之漏閣焉孤峯上絶于青天湍波下走于長川斷厓横壁立之岸飛溜濺千尺之泉洪造𨽻釋云蜀郡太守何君閤道碑光武中元二年刻此碑蜀中近出東漢八分斯為之首字法方勁古意有餘如冠章甫而衣縫掖使人起敬不暇雖敗筆成冡末易窺其藩籬也碑目云平羌江䋲橋碑在嚴道縣平羌橋有唐咸通十年上官朴所撰碑字亦𨽻體今在江瀆廟方輿云平羌江源出西徼遶西北郭謂武侯平羌夷於此又云沫水自盧山發源注于平羌江與沉黎之陽山江合流本志云州西北一里曰清源橋東北十里龍門橋三十五里道逺埧橋五十里魚喜河橋西七里曰銅頭河橋近多功路曰大䋲橋已上皆索橋也凡橋每歲仲春于兩岸各樹兩臬長二丈有竒臬上横穿二栒上布竹䋲亘兩岸䋲之餘者屈垂向下轆轤絞束復横以木梯布以篾笆周以欄索其髙低闊狹視江為度唐獨孤及索橋賛曰笮相引一索人綴其上如猱之縳轉帖入淵如鳶之落尋橦而上如魚之躍頃刻不戒霣無底壑即此橋也録異記云唐王果謫雅州刺史經平羌江中望岩腹有銕棺欲墜緣崖視其碑曰地裂山摧水漂我臨及長江危欲墮欲墮不墮遇王果五百年後改葬我乃改葬之本志云州北百四十里山谷中湧泉深不可測一日三潮風浪如雷昔時白馬自泉出田野間雲擁之復沒名曰白馬泉又曰龍淵又曰龍門有宋紹興間祈雨碑猶存此州韵事有雙鳯亭在署㕔後為蘇子瞻子由設至和中老泉携二子謁太守雷簡夫雷以書薦于張文定公及韓魏公歐陽文忠公其後大守樊汝霖作堂以表其事無絃亭在州學南長濆江側隱士王潜所居潜好琴趙清獻公為榜其亭曰濯纓文同書黄魯直木蘭歌帖梁甫吟帖俱在郡治竹溪在郡西三十里隱士胥九鼎所居陶仙洞在焉有林泉之勝魏了翁寄題胥園詩云胥君頎然來錦嚢背奚奴探嚢發詩卷一一卿大夫夫識胥園面詩卷自畫圖掃石卧石影長鍤􅓯芋區胥君于此時林泉傲金朱名山縣禹貢蔡䝉旅平蔡屬雅州而䝉属當縣矣九州記云䝉者沐也言雨露常䝉也山有五頂最髙者名上清峯有甘露井水極清冽四時不涸相傳漢僧理真所鑿後日隱化井中圖經云䝉頂茶受陽氣全故芳香獨烈方輿云虞九文嘗為名山監茶今清溪橋頭北㕔猶在有梅及槐栁皆雍國手植壁間遺墨尚存水經注曰縣有䝉山青衣所發東逕其縣與沫水㑹于靈闗道寰宇記平羗水上源曰卭崍水又名平鄉水西北自嚴道縣流入自眉州洪雅縣界下又名青衣水本志云五頂山下青衣河流遶縣前下田水口入嘉州寰宇記云羅䋲山在縣西五里從䝉山西流入盧山縣又北接卭州大井縣又云鷄棟山在縣西南十七里地里志以蜀有雞鳴山俗傳金鷄鳴天下太平也紀勝云鷄鳴山即古之名山因為名山戍碑目云名山治東一里許有紫府飛霞洞開禧丁夘邑人茍洙于梓潼觀後甃一洞穴刻神之父母像併鑿石龍蟠于其中請神作記親書于石今石龍書院是也本志云東北三十四里古土城周七十二丈乃武侯征蠻所築遺址見存寰宇云大慕山在縣東四十里南接河羅戍北入卭州髙七十里上聳天際靈恠錯雜之所九州要記云百丈縣本嚴道縣地李膺記臨卭縣南百二十里至百丈即其地圖經云有一穴口方圍百尺深如之山有九折坂夏則凝氷冬則毒寒漢王陽為益州刺史行部至此興歎因之棄官唐武德元年置百丈鎮貞觀八年改鎮為縣今之驛曰百丈里曰安賢矣本志云百丈河在東北六十里源自蓮花山來經百丈驛東與卭水合流至新津入白馬河又名千尺潭又云百丈縣南五里銅鼓山為漢唐戍守之地寰宇記云泉池山在百丈縣東四十里山四面縣絶上有泉池因名本志又云東南七十里佛鼻山左石有二目謂之天目元時於左目下建寺曰天目有大石甕小石甕之名榮經縣寰宇記榮經縣本嚴道縣地東西連接大山並無州縣巖巒阻絶不辨疆界唐武德二年置縣因界内有榮經水口戍為名本志云榮水在城北一出相公嶺一出畨境經水在城南一出瓦屋山一出改丁河一出汶川按相公嶺者以諸葛丞相征蠻所經也改丁河源出黒石汶川源出卭崍馬耳榮經水北流入擒孟渡即孔明七擒孟獲之地方輿云瓦屋山在榮經縣東北二十里形如瓦屋上有念佛鳥娑羅花其岩朝現辟支午現普賢夜有神燈或問禪惠大師瓦屋何故却以木皮葢師曰錦府豈從機上織劍門寧自匣中開李燾詩瓦屋如廡平金仙闢光景雅安志云榮經西北三十里紫眼闗以紫眼畨人僑寓得名即甕溪闗寰宇記卭崍闗在縣西南七十里隋大業十年置約山據險當雲南大路以扼畨夷之要害碑目云卭崍闗開路記天寳六年章仇兼瓊撰又云漢蜀郡太守治道記碑在榮經縣西三十里建武中元二年立又云尊徤閤碑建武中元二年物亦在縣西三十里景峪懸崖間巽岩李燾有跋以辨正年譜且引後漢紀建武二十三年夏四月改為中元無建武字又按祭祀志改建武二十三年為建武中元元年以此知記與志合而紀失之矣又云神水閤記碑在榮經縣東三十里銅山峽中碑久磨滅不可考古老相傳其體大率如尊徤閣云蘆山縣寰宇記云盧山縣亦嚴道縣地晉書地理志姜維于此置城隋仁夀元年重開此地遂于姜維古城置盧山縣以界内盧奴山為名按紹興二十三年徐閎中記土人祀姜伯約有廟額曰平襄志云治有開明王城故址華陽國志蜀王開明以靈闗為前門寰宇記靈闗山在縣北二十里峯嶺嵯峨傍夾大路下有山峽口闊三丈長二百歩俗呼為重闗通蠻貊之鄉入白狼夷界漢書通靈山有眼孔四一名鏤靈山文選註靈闗山名在成都西南漢夀縣界陳隂堅蜀道難云王尊奉漢朝靈闗不憚遥髙岷長有雪隂棧屢經燒輪摧九折路騎阻七星橋蜀道難如此功名詎可要隋孔德紹送蔡君知入蜀云靈闗九折險蜀道二星遥乗槎若有便希泛廣陵潮按張揖注史記曰漢鑿開靈山道于此置靈道縣矣寰宇記云盧奴山在縣東五里與始陽山相接始陽山在縣東七里本名䝉山唐天寳六年勑改為始陽山髙八里束道控川歴嚴道縣横亘入卭州火井縣界又云大渡水從生羌界來流入浮圖水浮圖水在縣五里從生羌界來水中有孤崖狀如浮圖出貢金志云蘆山南十里三江渡通天全六畨下注多功峽入雅之平羌江多功河上飛仙閤為木棧道即古漏閣也方輿云龍頭山在盧山縣前後峽綿亘四十里夭矯如龍控接畨部實為要害又云崖鉢山在縣西三百里上聳雲漢莫測其高志云漢樊敏墓在縣南七里前有二石馬𨽻碑在石馬東碑目云漢故檢校巴郡太守樊府君碑建安十年三月上旬造又云兩面碑在盧山縣南五里與府君碑甚近碑面與背皆有篆文歳乆訛闕不可識或辨其文曰盧山縣碑宋趙明誠金石錄云右漢巴郡太守樊君碑其文云君諱敏字叔達肇祖虙戲遺苗后稷為堯種樹舍漆從岐天顧亶甫乃萌昌發周室衰微雲伯匡弼晉為韓魏魯分為楊充曜封邑厥土河東肆漢之際或居于楚或集于梁君纉其緒華南西畺又云總角好學治穀氏經貫䆒道度無文不睹于是國君備禮招請濯冕題冠傑立忠謇有夷史之直卓虙之風鄉黨見歸察孝除郎永昌長史遷宕渠令大將軍辟光和之末京師擾攘雄狐綏綏冠履同嚢封挾長驅卑走枕北國復重察辭病不就再奉朝聘七辟外臺嘗為治中諸部從事又云季世不祥米巫虐姦狡並起䧟附者衆君執一心頼無洿耻復辟司徒道辭不徃牧伯劉公表授巴郡以助義都尉養疾閭里又辟奮義都尉年八十有四歲在叶洽紀驗期臻奄忽藏形其後有銘題建安十年二月上旬造他漢碑類多刓缺而此碑首尾完存故載其大畧于此所謂米巫凶虐者謂張角也宋成都丘常跋云此碑相傳名魏受禪碑為世絶出而其欵乃建安十年又在黄初之前雖暴露中埜而字畫醇古文尚可讀豈非所寓僻逺而人無知者歟然而千餘年間霖雨之所濯盛陽之所暴有獸已倒有門已摧而此碑將仆是可憫也余因扶其既倒植其將仆又為屋以庇之庶㡬永其傳也崇寧壬午知縣丘常題宋程勤跋云皇上勵精更化以揚祖宗之大烈屬當京師父老流涕太息思欲復見漢官威儀之時而僕仕于盧山天下最窮處廼得建安十年巴郡太守樊君故碑於深山榛莾間亟作大屋覆其上表而出之目其顔曰巴郡太守樊侯之墓嗚呼碑隂所記崇寧壬午距今五十八年而遥任斯邑者皆吾鄉人扶倒植仆偶相似然豈物之廢興固有數耶紹興己邜眉山程勤懋傳書國朝李一本跋云此碑踞于道周迨今㡬千有餘歲矣在宋以前訛為魏受禪碑大明一統志謂其字文漫滅不可攷以故惑于聞見者不為注目予捧檄竊祿于茲屢經過焉見其荒于荆榛蝕于莓苔亦謂信然越𢎞治己未仲冬因偕門生白應清駱琰陳宣宋萬全等訪故偶過其下因束篠為帚掃拂之倐見字畫隱隱而出皆醇古逈異從者進曰此商彛周鼎復出也殆竒遇乎亟為磨洗尋具楮蜡如法摹搨得墨本有三葢以防字畫之同異者而考正之然其糢糊不可讀者亦過半矣既而歸置軒次校以𨽻本叅以衆目就其可識者僅得什之九其疑誤者則傍為㸃注以俟慱古者正焉載攷古文苑所紀樊毅樊安等碑亦靈獻中所作其屬辭比事與此文勢相類或者當時史遷之徒為之也夫文選所集皆秦漢以來古文而此碑獨不見錄古文苑乃補文選而作又不見載母亦此地僻在遐荒而人不知歟抑惑于聞見之似而不及錄歟吁是碑雖不見錄于古幸而石不泐壞延有今日得以附入邑志以永其傳亦竒矣匪徒為斯邑之光實斯文之幸也然則世之為志者茍徒據耳之所托而不慱歴以致審焉則雖有石鼓之文其不至于湮沒無聞者㡬希矣是月十一日長至蜀忠南李一本識蘆山廣文也蜀中廣記卷十四
