body:
  text: 蜀中廣記卷三十五明曹學佺撰邊防記第五上川南道黎州水經注曰江水自筰道與濛溪分至蜀郡臨卭縣與布僕水合布僕自徼外成都西沈黎郡來按沉黎即筰道寰宇記云夷人於大水之上置藤為橋謂之筰也蜀記周赧王三十年誅蜀侯綰置守蜀守張若因取筰及其江南地史記筰都古西南夷自越嶲以東北君長以十數筰都最大秦時常為郡縣至漢興而罷自唐䝉使略通夜郎而卭筰之君請為內臣及漢誅且蘭卭君并殺筰侯乃置筰都縣注漢書曰旄牛縣嵗貢旄牛尾以為節旄也元鼎六年以為沉黎郡至天漢四年并蜀為兩部置兩都尉一居旄牛主徼外夷一居青衣主漢人後漢永平中益州刺史梁國朱輔慷慨有大略宣示漢德威懷逺夷自汶山以西前代正朔所不加白狼槃木唐叢等百餘國户百三十餘萬口六百萬以上舉種奉貢稱臣僕輔上疏曰臣聞詩云彼徂者岐有夷之行傳曰岐道雖僻而人不逺詩人誦詠以為符驗今白狼王唐叢等慕化歸義作詩三章路經卭來大山零高坂峭危峻險百倍岐道繦負老幼若歸慈母逺夷之語辭意難正草木異種鳥獸殊類有犍為郡掾田恭與之習狎頗曉其言臣輒令訊其風俗譯其辭語今遣從事史李陵與恭護送詣闕并上其樂詩昔在聖帝舞四夷之樂今之所上庶備其一帝嘉之事下史官録其歌焉逺夷樂德歌詩曰大漢是治與天合意吏譯平端不從我來聞風向化所見奇異多賜繒布甘美酒食昌樂內飛屈申悉備蠻夷貧薄無所報嗣願主長壽子孫昌熾逺夷慕德歌詩曰蠻夷所處日入之部慕義向化歸日出主聖德深恩與人富厚冬多霜雪夏多和雨寒溫時適部人多有涉危歷險不逺萬里去俗歸德心歸慈母逺夷懷德歌曰荒服之外土地燒埆食肉衣皮不見鹽穀吏譯傳風大漢安樂擕負歸仁觸冒險峽高山岐峻緣崖磻石木薄發家百宿到洛父子同賜懷抱匹帛傳告種人長願臣僕肅宗初輔坐事免是時郡尉府舍皆有雕飾畫山神海靈奇禽異獸以眩耀之夷人益畏憚焉和帝永元十二年旄牛徼外白狼樓薄蠻夷王唐繒等遂率種人十七萬口歸義內屬詔賜金印紫綬小豪錢帛各有差安帝永初元年蜀郡三襄種夷與徼外汙衍種并兵三千餘人反叛攻蠶陵城殺長吏二年青衣道夷邑長令田與徼外三種夷二十一萬口賫黃金旄牛毦舉土內屬安帝增令田爵號為奉通邑君廷光二年春旄牛夷叛攻零關殺長吏益州刺史張喬與西部都尉擊破之于是分置蜀郡屬國都尉領四縣如太守桓帝永壽二年蜀郡夷叛殺略吏民延熹二年蜀郡三襄夷冦蠶陵殺長吏四年犍為屬國夷冦郡界益州刺史山昱擊破之斬首千四百級餘皆解散靈帝時以蜀郡蜀國為漢嘉郡十六國春秋曰李雄有蜀置沉黎漢源二郡周地圖記天和初破羌夷得此土因立黎州及沉黎縣矣寰宇記云隋開皇改黎州為登州煬帝初廢州併其地入臨卭郡唐置南登州大足元年割漢源飛越二縣及嶲州之陽山縣置黎州神龍三年廢開元三年又置天寶元年改為洪源郡乾元元年復為黎州領羈縻五十五州僖宗又置永平軍宋復為黎州繼升平陽軍節度領漢源通望二縣治在漢源通志云元屬吐蕃等處宣慰司國初洪武八年省漢源縣改為黎州長官司十一年升安撫司并置大渡河守禦千戶所𨽻四川都司屬上川南道元和志曰黎州之地關沫若而徼牂柯處越嶲卭蜀之中樊柔直侯寶堂記云全蜀五十餘州沉黎為襟喉地以南鄰六詔而西接吐蕃也後漢書筰都夷其人披髮左袵言語多好譬類居處略與汶山夷同土出長年神藥仙人山圖所居也蜀郡記曰諸山夷獠子娠七月生生時必臨水兒出便投水中浮則取養沉乃棄之按沉黎之名或取此而樂子正以為黑水所經矣宋史黎州諸俗尚鬼以主祭者為鬼主其酋長號曰都鬼主宋郡守余授朱纓堂記蠻商越駔氊裘椎髻交錯于闤闠中寰宇記蕃部蠻夷混雜之地元無市肆每漢人與蕃人博易不使見錢漢用綢絹茶布蕃部用紅椒鹽馬之類志云國初安撫副使馬芍德築沉黎城今司治也沉黎驛在其北二里而漢唐宋之黎州則理在漢源縣今廢為鎮去司南二十五里寰宇記云漢源縣漢沉黎縣地宋立郡于此隋仁壽四年置縣以大川之源為名長安四年巡察使殷祚奏置黎州後刺史宋乾微奏廢入雅州開元三年又置黎州以縣來屬按此即舊黎州也方輿勝覽云黎城中有漢越嶲太守任貴蜀漢姜維趙雲馬忠諸祠又有玉淵書院宋開禧初知縣薛紱建志云廢漢源縣東有唐三王墓唐史卭黎間有三蠻王使伺南詔卒葬于此蓋恭化王劉志遼和義王郝全信遂寧王楊清逺也北夢瑣言卭黎之間有淺蠻焉世襲王號曰劉王楊王郝王嵗支西川衣賜三千金俾偵雲南動靜雲南亦資其覘成都盈虛恆持兩端而求利焉遇元戎下車即率界上酋長詣府庭號曰參元戎不察自謂威惠所致其來參必潛稟于都押衙以候可否或元戎慰撫稍至乖方即教其紛紜于時帥臣多文儒不欲生事都押衙席其利亦要姑息故蠻夷得以憑凌無忌王建始鎮蜀絶其舊賜斬都押衙山行章以徇卭峽之南不立一堠不戍一卒十年不敢犯境末年命大將許存征徼外蠻為三王泄漏軍機于是召而斬之時號英斷邊患屹然矣勝覽云州治靜鎮堂𢎞敞邃深為郡之冠冕左右有藏春留香二亭及思仙臺圖經云昔人有駕牛採樵入䝉秦山見二老人奕棋其人繫牛坐斧而觀局未終老人謂曰非汝久留之所樵者起而斧柯已爛牛已枯矣詩云思仙亭上望䝉秦此間昔有避秦人不應棋罷却歸去再見桃花且問津勝覽云郡圃東湖方廣十丈架橋其中芙蓉萬蓋錦鱗千尾橋上有喚魚亭又云州宅之白雲泉從白塔谷前取水穴城東以入始以槽承之分於四大井焉藜㕔在小㕔東隅世傳唐三藏師遊西域經行值藜杖于地曰他日州治在此果如師言杖成株高五十尺圍九尺天聖間回祿人取其枝以接他枝矣有梵音水亦云三藏至此持梵音而水湧出故名水色如米瀋而甘在今治南半舍按𤣥奘西域記取經由涼州出塞似未入蜀而三藏者乃僧之通稱也孫光憲瑣言云唐咸通中有天竺三藏僧經過成都曉五天胡語通大小乘經律論以北天竺與雲南接境欲假途而還為蜀察事者識之縶于成都府其得所記朝廷功第文字蓋曾入內通場者或即其人耶今治西有搖香亭在兵馬司外荼醿芙蓉之勝甲于內地有海棠池在城南三十里昔時太守賓僚燕賞之地沿地植海棠花爛熳如錦也輿地紀勝云黎州初設茶馬買馬兩務成都則市于文黎珍叙等州號川馬五代王建大閲于星宿山官馬八千私馬四千建起家騎士有國之後于文黎雅茂等州市胡馬十年之間逺及兹數按通略韓億知益州移永康鬻馬場于黎州境上以灌茂地接蕃部嵗來互市覘我西川故徙于此舊載在川南以今度之與大渡河相近但今市馬者由川北之中江縣而轉販入黎雅其時勢與事不同如此志云聖鐘山下有古城昔人于山中聞鐘聲及五色光掘之而得巨鐘故曰聖鐘山城即古黎州城也又云古黎州城在大渡河外按元和志南唐以來徙治大渡河內而水源在城外韋臯始築今城東西南三面鄰絶澗惟北面稍平地多井泉與諸城鎮戍烽火相通誠西南之險要矣志云韋臯所築土城國初安慶侯即故址砌為石城今大渡河守禦千户所是也在司治西北隅大渡河源出吐蕃經黎州城南九十里東注嘉定入於江臨河有大渡巡檢司戍之隋大渡縣設焉今廢為鎮若唐之大渡縣則接蘆山縣界方輿云唐時大渡之戌一不守則黎雅卭嘉成都皆擾宋初建隆三年王全斌平蜀以圖來上議者欲因兵威復越嶲藝祖以玉斧畫此河曰外此吾不有也于是為黎之極邊昔時河道平廣可通漕船自玉斧畫後河之中流忽陷下五六十丈水至此澎湃如瀑從空而落舂撞號怒波濤洶湧船筏不通名為噎口殆天設險以限中外也父老云舊有寨將欲載杉木板由陽山入嘉定貿易以數片試之板至噎口為水所舂沒須臾片片自沫水浮出蠻人聞之益不敢窺伺矣寰宇記云大渡河在通望縣南一十五里自吐蕃界經雅州諸部落至當州東流入縣界志云廢通望縣在司治東南九十里其北有羅目溪水入峨眉有通望山自大渡河南與衆山相連入嶲州按通望本漢旄牛縣地在大渡河北漢水西今有古旄牛城在俗呼為牛頭城語訛也隋大業二年改為陽山縣因縣南朝陽山為名矣志又云大渡鎮西有陽山廢縣唐初屬登州後屬黎州也十道志云隋仁壽四年罷大渡鎮置登州大業二年廢登州又立陽山鎮唐武德元年改置陽山縣屬登州貞觀二年割屬嶲州開元初改為登臺縣貞元五年十月劍南節度使韋臯遣將王有道等與東蠻兩林苴那時勿鄧夢衝等帥兵於故嶲州臺登北谷大破吐蕃青海獵城二節度殺其大兵馬使乞臧遮遮悉多楊朱斬首二千餘級其投崖谷赴水死者不可勝數生擒籠官四十五人收獲器械一萬餘事馬牛羊一萬餘頭匹遮遮者吐蕃驍勇者也或云尚結贊之子頻為邊患自其死也官軍所攻城柵無不降下蕃衆日却數年間盡復嶲州之境貞元十三年五月十七日吐蕃於劍南山馬嶺三處開路分軍下營僅經一月進軍逼臺登城嶲州刺史豐高任率領諸軍將士并東蠻子弟合勢接戰自朝至午大破犬戎生擒大籠官七人陳上殺獲三百人餘被刀箭者不可勝紀收獲馬畜五百餘頭匹器械二千餘事太和六年李德裕復修卭崍關移嶲州於臺登城以扞蠻夷華陽國志云臺登縣有孫水一曰白沙江入馬湖水水經注孫水出臺高縣即臺登縣也南流徑卭都縣又南至㑹無入若水志云孫水俗謂之長河天全長河西以在孫水之西也九州要記曰臺登縣有奴諾川鸚鵡山黑水之間若水出其下即黃帝子昌意降居處水經曰若水出蜀郡旄牛徼外東南至故關酈善長注曰按山海經南海之內黑水之間有樹名曰若木有若水出焉又云灰野之山有樹焉青葉赤華厥名若木生崑崙山西附西極也淮南子曰若木在建木西木有十華其光照下地故屈原離騷天問曰羲和未陽若華何光是也然若水之生非一所黑水之間厥木所植水出其下故亦受其稱焉若水沿流間關蜀土黃帝長子昌意德劣不足紹承大位降居斯水為諸侯娶蜀山氏女生顓頊於其野有聖德二十登帝位承少皥金官之政以水德膺厯矣水經注又云大度水出徼外至旄牛道南流入于若水又徑越嶲大筰縣入繩山海經曰巴遂之山繩水出焉東南流分為二其一枝東徑廣柔縣注於江其一南徑旄牛道至大筰與若水合自下亦通謂之繩水矣寰宇記云廢飛越縣本沉黎之地唐儀鳳四年分漢源於飛越水置縣屬雅州大足元年屬黎州按志飛越山下有唐時三雕城即三交城也疑即古飛越縣矣又云唐飛越縣在舊縣西北百里飛越山下其山兩面接羌夷為沉黎西境要害之所方輿云漢水發源自飛越嶺寰宇記云漢水在漢源縣西百二十里從和姑鎮山谷中經飛越縣界至通望縣合大渡河不通舟船每至春冬有瘴氣中人為瘧疾志云漢水俗呼流沙河源出越山流經司南二里東入于江方輿云廢琉璃城在大渡河南太和五年節度使李德裕築以蠻界琉璃溪為名也贊皇又築伏義城以制大渡清溪之險按今司南九十里有古清溪關乃韋臯所鑿以通好南詔者自此出卭部經姚州而入雲南謂之南路在唐為重鎮焉五代孫樵云田在賔將軍刺嚴道三年能條悉南蠻事為樵言曰巴蜀西通于戎南逼于蠻宜其有以制之者當廣德建中間西戎飲馬于岷江其衆如蟻前鋒魁健皆擐五蜀之甲持倍尋之㦸徐呼按步且戰且進蜀遇鬭如植橫堵羅戈如林發矢如虻皆拆創吞鏃不能斃一戎而况陷其陳乎然其戎兵踐吾地日深而疫死者日衆即自度不能留亦輒引去故蜀人為之語曰西戎尚可南蠻殘我自南康公鑿清溪道以和羣蠻俾由蜀而貢又擇羣蠻子弟聚于錦城使習書算業就輒去復以他繼如此垂五十年不絶其來則其學於蜀者不啻千百故其國人皆習知巴蜀土風山川要害文皇帝三年南蠻果能大入成都門其三門四日而旋其所剽掠自成都以南越嶲以北八百里之間民畜為空加以敗卒貧民持兵羣聚因緣劫殺官不能禁由是西蜀十六州至今為病自是以來羣蠻常有屠蜀之心居則息畜聚粟動則練兵講武而又俾其習於蜀者伺連帥之間隙察兵賦之虗實或聞蜀之細民苦於重征且將啓之以幸非常吾不知羣蠻此舉大劍以南為國家所有乎每嵗發卒以戍南者皆成都頑民飽稻飫豕十九如瓠雖知鉦鼓之數不習山川之險吾嘗伺其來朔風正嚴緩步坦途日次一舍固已呀然汙矣而況歷重阻即嚴程束甲而趨拔㦸而鬬耶加之為將者刻薄以自入餽餫者縱吏以鼠竊縣官當給帛則以苦而易良當賑粟則以砂而易粒如此則邊卒將怨望之不暇又安能殊死而力戰乎此巴蜀所以為憂也樵曰誠如將軍言茍為國家計者孰若詔嚴道沉黎越嶲三城太守俾度其要害按其壁壘得自募卒以守之且兵籍於郡則易為役卒出於邊則習其險而又各於其部繕相美地分卒為屯春夏則耕蠶以資其衣食秋冬則嚴壁以俟其冦虜連帥即能督之嵗遣廉白吏視其卒之有無劾其守之不法者以聞如此則縣官無餽餫之費奸吏無因緣之盜兵足食給卒胥無怨於將軍則如之何田將軍曰如此何患遂書以記之按豫議撤威茂戍軍聽其自募實本此䇿而日後有求復者讀是書庶幾瞭然矣寰宇記云諸葛武侯祠在州城北三里志云州北三里有武侯城侯築故壘壕塹猶存紹興中重建侯祠名天威廟又作二室以祀唐韋臯李德裕二節使碑目云黎州西林寺壁間題云回道人日行一千五百里謁全菴上人不遇而去志云陶道人得道處在司東北百里獅子山按道人黎州卒蓋知龍妖者詳見畫苑方輿勝覽云州東十里蘭若寺前有龍池方廣十數丈池上有龍祠水中有枯楂三株隱然如龍狀觸之則暴風卒雨變於俄頃嵗旱取湫立應按志有渥窪池在州之蠻部內池産龍馬其前後之田高腴可耕疑即此處矣又有馬跑泉相傳肉齒和尚乘白馬至一山馬渴跑地泉為之湧人稱其地為和尚山云勝覽以為山在州東南百里與峨眉瓦屋號為三乘山常現五色毫光也志云司治五里有卭徠山言卭筰之人入蜀從此山而來也亦界山矣漢書作郲華陽國志作崍水經作來開路記作萊其說不同方輿勝覽距州七十里卭崍關昔有楊氏婦造閣其上傍有閣道碑水經注云漢武元封四年以蜀郡西部卭筰縣理旄牛道天漢四年置都尉主外羌在卭來山表自蜀西渡卭筰其至嶮有弄棟八渡之難楊母閣路之岨是也漢書王陽為益州刺史行部至卭崍九折坂歎曰奉先人遺體奈何數乘此險後以病去及王尊為刺史至其坂問吏曰此非王陽所畏道耶吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣今有祠在山下又有叱馭橋在司境內太守李石為碑記云九折坂峻絶造天曲回九折乃得度其巔九夏凝氷冬絶行迹也志云卭崍山靈應將軍洞不知何神有錦文巨蛇蟄其中人恆見之按九折坂地里諸書以為在百丈驛想必後人移置近界矣勝覽云笋筤山在州西北五十餘里有前筤後筤以山多笋故名春時州人百十為羣入山斸取紹興間始立笋租以贍學嵗收緡錢八十千土人名為錢筤山勝覽又云白崖山在州西北二百五十里山外即生畨界嶮峻不通人跡志云在西北二十里山之右有風穴如井不知淺深穴口四圍津津如汗間有氣出騰空如白雲須臾風起怒號如雷里人見雲即知風氣散則風定細則風小盛則風猛窒其穴風雖少而民多瘴開之風如故而瘴亦衰山之北又有穴大如車輪俯而入其中空濶數十步泉聲琮琤石體凝結其幽致不可名狀俗呼仙人洞即此張華博物志云蜀南沉黎髙山中有物似猴長七尺能人行名曰玃路見婦人輒盜之入穴俗呼為夜義穴西蕃部落最畏之按寰宇記謂在漢源縣境或即卭崍山中耶記又謂山峽有一石洞壁間有夜又像土人祠之號穿崖將軍洞按在今慶歷鄉唐李義府奉使招諭有懷贈同行人詩云逺遊冒險阻深入勞存諭春去辭國門秋還在邊戍軒車行未返節序催難駐陌上悲轉蓬園中想芳樹蜀山自紛紏岷水恆奔注臨泛多苦懷登攀寡歡趣永夕飛淫雨崇朝蒸毒霧不求綏嶺桃寧美卭鄉蒟白狼行欲靜驄馬何常驅願接軺斾塵聨翩來北騖宋知郡余授詩絶塞卭崍外偏城越嶲東山含初夏雪林偃夕陽風提刑李師錫詩窮冬按部極西陲鳥道盤空積雪迷報國憂民寧憚逺萬重山裡到沉黎寰宇記唐乾元中黎州所統五十五州皆徼外生獠羈縻而已其名曰羅巖州索古州秦上州輒榮州劇川州合欽州下蓬州柏坡州博盧州明川州胣䏢州蓬矢州大渡州米川州木屬州河東州諾筰州甫嵐州昌明州歸化州象川州藂夏州和良州和都州附樹州東川州上貴州滑川州北川州古川州甫蕚州北地州蒼榮州野川州卭陳州貴林州護川州牒琮州浪彌州郎郭州上欽州時蓬州儼馬州撅查州卭川州護卭州腳川州開望州上蓬州北蓬州剝重州久護州瑤劍州明昌州按只五十四州少一州承舊唐書之誤也時代已逺或鞠為邱墟或荒為部落或為關堡别名皆不可考經略志曰黎雅諸夷即天全六畨諸部散居二州之間者宋時屢為邊患孝宗乾道四年威州保寧縣探知風流等部欲入抄掠知縣張文禮閉絶蛇浴山路不許來往蕃從蛇浴嶺後斫生路至村攘劫宣撫司委知永康軍李繁等討之蕃部來降十一月砂平蕃首高志良至碉門互市與居民鬭山鷓不勝乃詣寨官喻炳陳訴炳决責之志良銜恨去明年正月來攻碉門制置司遣李俊禦之兵未至志良已有悔意欲償還所燒廬舍更以錢贖罪守臣不能身任其事付之兵官兵官既欲邀功而喻炳亦覬報怨遂潛入砂平焚其屋廬蕃人初皆潛伏官軍乘勢虜掠蕃鳴角聚衆以出遂失利蕃人追至榮經蘆山而還乾道九年青羌吐蕃奴兒結等坐黎州負其馬價侵掠安靜寨推官黎商老等禦之敗死安撫司委鈐轄李彥堅往援始赴州悔罪買馬如故十一月復犯安靜至大小壩殺虜軍民千餘黎州守邵降年及通判吕宜之招卭部川蠻兵併力擊之乃遁淳熙二年五月奴兒結等同元人漢人詣州州犒之然以互市久不得通方怨望而白水寨將王文才又與婚姻誘之搶掠知黎州陸東之計梟文才于市我明於黎州設安撫司天全六蕃設招討司蓋以夷治夷之意也自洪武至今邊方以靜雅州所屬與招討夷人或時有爭訟者蓋境土相連勢使然耳四夷考云洪武初黎州長官司土舍馬芍德征討有功加升安撫司以芍德為安撫副使萬厯十九年副使馬祥無後其妻瞿氏掌司事取瞿姓子撫之將有他志祥姓土舍應龍居松坪遂興兵攻城取印畨衆因而乘㑹剽劫于時參將吳文傑方有征東之役移師剿平之二十四年奏將該司降為土千户所安撫降為千户於司南三十里大田山壩立千户所俟應龍之子新受承襲司署改為黎雅遊擊府上七枝編為民户屬大渡河千户所當差下七枝仍舊屬松坪馬氏約束焉大抵司東三十里為天冲山險絶無路止通樵採而已唐古木碑所云沉黎界上山林參天嵐霧晦日者也西二十里為黑崖關關外係本司管轄上七枝等夷又一路由椒子岡至泠磧寨直抵長河則為大西天烏思藏進貢路南去大渡河可八十里中立文武銷瘴香樹黑石流沙等堡直抵瀘河近河有避瘴山夏秋之交境多嵐瘴飛鳶羣集至立冬前瘴已乃飛去土人避瘴恆以鳶為候故名銷瘴山也東南則安撫所轄下七枝熟夷之界其名曰落凶曰吽哄曰沙罵曰俺立曰母姑曰阿輝曰他他又自炒米城以抵松坪寨連接峨眉凡三百六十里高山峻坂密樹深箐為安撫族人居之按九州志黎州石樓之地多長松不生雜木即松坪寨是也志云司南百里臨大渡河有韋臯所築要衝城俗呼沙米寨亦作炒米城矣峨眉峨眉縣邊鄰松坪木瓜大小赤口等處原設六鄉西南二面臨夷三十里至高橋十里至土地關二十里至龍池場二十里至大圍關及中鎮巡檢司五里至鐵索橋五里至射箭下坪三里至射箭上坪此縣之舊界也坪外八里至黑龍溪四里至虎皮岡始分兩岐右路由上馬勝溪至金口厰為卭部司新附籍之民名歸化鄉有陽化堡設焉由金口厰二十里至楠木園五十里至天池八十里至萬家石三十里至松坪則黎州土舍馬應龍所居矣左路由下馬勝溪至古金寺渡中鎮河有中鎮巡檢戍之又十七里而至太平墩墩又兩岐右路過楊村行百里乃至玀􅉰玀􅉰亦新附夷種也左路上蠻鬼岡岡勢險峻樹木叢雜入冬徂春煙霧不收雨雪層積即夷人亦鮮踪跡又十五里至空木即永寧墩八里乃至栖雞坪今築平夷堡處城池候館咸備焉由栖雞五里至泠溪二十里至熱水河十里至四百囤又二十五里而至西河設有鎮逺墩過墩四十里為殺馬溪懸崖峭壁中逼河流人過此者兩頭牽索緣索而步至下山處名為溜馬漕又五十里則木瓜夷種之巢穴也木瓜有二有小木瓜旁通西赤口去暖歹只二日過木瓜橋頭稍前十里為大木瓜即今三枝降夷處所一枝凶瓜一枝匪瓜一枝卜特瓜過大木瓜五十里為利濟山極高峻與大涼山相接又五十里至大赤口口外則馬湖之地矣原闕之先分自大赤口凡十二枝膩乃卜特其最著者世居西河屬馬湖土官安氏鈐轄自改流日諸瓜叛入卭部歸嶺氏其地自西河至大小赤口涼山雪山等處周圍蟠據北連建越西接嘉峨南通馬湖窟穴蹊徑四藏而八達焉嘉靖末諸瓜畜牧蕃盛心懷內擾卭部長官嶺柏已不能馭及死其妻馬氏為政膩乃虐柏等叛出涼山㑹同西河匪瓜白祿出沙坪於是嘉峨犍為一帶鄰邊居民不能安枕建昌上下南三道督卭部發兵至茜雞坪截殺之我師未集潛從泠溪而渡直搗茜雞坐制我死命而瓜鋒於是益熾矣乃議大征分為建越馬湖中鎮三路而進直搗巢穴瓜始惶駭請降㰱血自誓不復反主將檄令各推酋長納貢罷兵於是凶瓜推牛撒為長匪瓜推阿書為長卜特推阿魁為長願各約束其部落永作屬夷嵗貢良馬三匹匹輸三金峨眉縣為進之十三枝瓜夷積聚虛實牛多不過六七十頭馬四五十匹羊二三百隻耳嵗費官兵糧餉三千二百五十兩有奇恢復侵占田地自七盤子至米麻嶺共四千八百六十四畝嵗徴租可四百四十七石有畸說者謂其常圖恢復云雅州禹貢和夷底績雅安志云和水在州南四十里源出蠻界羅巖州而入平羌江圖經云和川路在嚴道縣界西去吐蕃大渡河五日程從大渡河西郭至吐蕃松城四日程羌蠻混雜連山接野鳥道蟠空不知里數寰宇記云雅州管和川夏陽等羈縻四十六州其首曰羅巖州去當道四百八十里曰當馬三井東鋒名配鉗恭斜恭畫重羅林籠羊林波林燒龍蓬索古敢川驚川蝸眉木燭百坡以上十八州去雅州近者四百餘里逺者不及五百里去羅巖自一里至六十里為極惟當馬去羅巖二百里焉曰當品嚴城中川鉗矢昌磊鉗并百頗會野以上八州去雅州近者二百六十里逺者六百三十里去白坡近者三里逺者六十里曰當仁推海作重禍林諾筰金林平恭布嵐缺馬羅蓬以上十州去雅州近者五百七十里逺者六百二十五里去㑹野近者三里逺者六十里通羅巖共三十七州和川路之界也其次曰論川州去當道五百八十里曰逺南州去讓川州二十五里至州五百六十里卑盧州去䕫龍州二十里至州五百六十里䕫龍州去卑盧州二十里至州五百六十里耀川州去金川州一十五里至州五百六十里金川州去耀川州一十五里至州五百六十五里東嘉梁州去金川州二十里至州五百六十里西嘉梁州去東嘉梁州一十五里至州五百六十五里通論川共九州夏陽路之界也寰宇記云貞元中吐蕃七部落來降界近雅州因安置於和川等路其名曰吐蕃籠官楊矣蓬貴東君等部落六十人在蠻宿川安置吐蕃業城首領籠官劉矣本等部落在本部安置吐蕃㑹野首領籠官髙萬唐等部落在本部安置吐蕃逋租城首領籠官馬東煎等部落在夏陽路安置吐蕃國師馬定得并籠官馬德唐等部落在缺馬州安置吐蕃嘉梁州降户首領籠官劉定等部落在夏陽路安置吐蕃嵬籠城首領鑠羅莽酒等部落在和川路安置按宋史雅州西山路蠻有部落四十六唐以來皆為羈縻州太平興國初首領馬令膜等來貢并上唐朝敕書告身凡七通咸賜冠帶其首領授以官上南志云雅州通西番路有三曰靈關碉門始陽也而碉門最為要害按靈關鎮在盧山縣北八十二里蜀都賦廓靈關而為門是矣四夷考云碉門等處安撫司元時設在雅州尋改吐蕃宣慰使司國初宣慰余思聰王德貴歸附始降司為州又碉門百戶所設近天全六番之界所有茶課司以平互市之官也志云始陽山在蘆山縣東十里俗呼羅繩山寰宇記以為䝉山西魏置始陽縣於此楊用修云史記西南夷傳自巂以東北君長以十數斯筰都最大注斯及筰都二國名也徙音斯相如難蜀文略斯榆謂斯與楪榆也此斯即南西夷之徙玉篇作注狄國夏為防風氏周為髳漢之賨叟地在蜀之邊也圖經盧山縣新安鄉五百餘家獠種也其婦人娠七月而産置兒向水中浮者取養沉者棄之千百無一沉者長則拔去上齒加狗牙各以為華飾今有四牙長於猪牙而唇高者别是一種能食人無長齒者不能食人俗信妖巫擊銅鼓以祈禱焉土夷考云榮經縣界懸崖棧道之間有雜道長官司及飛越廟縣西北有紫眼夷編氓殆半里其地名紫眼關與西畨相接廣可四十里袤百里自甕溪飛水小路直透冷磧畨以上關堡大渡河官軍戍之東西峻嶺中流一河大壩筒車等五姓夷結茆以居五姓各立老人有訟不立公庭惟聽老人處分而已然賦稅亦不後時蓋為茶商捷徑有利存焉正西萬里乾河直通碉門則天全招討之地矣陳子昻諫雅州討生羌書將仕郎守麟臺正字臣陳子昻昧死上言竊聞道路云國家欲開蜀山自雅州道入討生羌因以襲擊吐蕃執事者不審圖其利害遂廢梁鳳巴蜒兵以徇之臣愚以為西蜀之禍自此結矣臣聞亂生必由怨起雅州邊羌自有國以來未嘗一日為盜無罪受戮其怨必甚怨甚懼誅必蜂駭西山西山盜起則蜀之邊邑不得不連兵備守兵久不解則蜀之禍搆矣臣聞吐蕃桀黠之虜君長相信而多姦謀自敢抗天誅以來向十二餘載大戰則大勝小戰則小勝未嘗敗一隊亡一矢國家往以薛仁貴郭待封為暴武之將屠十萬衆於大非之川一甲不歸又以李敬𤣥劉審禮為廟廊之宰辱十八萬衆於青海之澤身為囚虜是時精甲勇士勢如雷雲然竟不能擒一戎馘一醜至今而關隴為空今乃欲以李處一為將驅憔悴之兵將襲吐蕃臣竊憂之而為此寇所笑且夫事有求利而得害者則蜀昔時而通中國秦惠王欲帝天下而并諸侯以為不兼賨不取蜀勢未可舉乃用張儀計飾美人譎金牛因間以啖蜀侯果貪其利使五丁力士鑿山通谷棧褒斜置道於秦自是險阻不關山谷不閉張儀躡踵乘便縱兵大破之蜀侯誅賨邑滅至今蜀為中州是貪利而亡此往事也臣聞吐蕃黠寇愛蜀之珍富欲盜之已有日矣然其勢不能舉者徒以山川阻絶瘴隘不通此其所以頓餓狼之喙而不能竊食也今國家乃亂邊羌開隘道使其收奔亡之種為嚮導是以借冦兵而為賊除道舉全蜀以遺之此危道也蜀西南一都㑹國家之寶庫天下珍貨聚出其中又人富粟多順江而下可以兼濟中國今執事者乃圖僥幸之利悉以委身西羌得西羌地不足以稼穡財不足以富國徒殺無辜之衆以傷陛下之仁糜費隨之無益聖德又恐僥幸之利未可圖也夫蜀之所寶恃險者也人之所安無役者也今乃開其險役其人險開則便冦人役則傷財臣恐未見羌戎已有姦盜在其中矣往者益州長史李崇真將圖此奸利傳檄稱吐蕃欲冦松州遂使國家盛軍以待之轉餉以備之未二三年巴蜀二十餘州騷然大弊竟不見吐蕃之面而崇真贓錢已計巨萬矣蜀人殘破幾不堪命此之近事猶在人口陛下所親知意者必有姦臣欲圖此利復以生羌為計者哉且蜀人尫劣不習兵戰一虜持矛百人不敢當又山川阻曠去中夏精兵處逺今國家若擊西羌掩吐蕃遂能破滅其國奴虜其人使其君長係首北闕計亦可矣若不到如此臣方見蜀之邊陲不守而為羌夷所橫暴昔辛有見被髮而祭伊川者以為不出百年此其為戎乎臣恐不及百年而蜀為戎也天全六畨招討使司古氏羌之地晉以前無聞焉宋齊梁土豪迭相雄長名屬益州西魏為始陽縣地屬䝉山郡後周因之隋初郡廢屬雅州唐為羈縻州𨽻雅州都督府總志云五代王孟之間有高曩閣藏楊夾失朵只見二首歸附始置碉門黎雅長河西魚通寧逺六軍民安撫司宋𨽻雅州元憲宗時復置六安宣撫司屬吐蕃等處宣慰司後改六畨招討司又分置天全招討司國初併天全六畨招討使司𨽻四川都司其地東西廣百九十里袤二百一十里東至雅州界五十里西至長河西司百四十里謂之乾溪南至榮經縣界六十里北至靈關道及董卜韓胡百五十里去成都五百四十里為南詔之咽喉轄部落凡六曰馬村蘇村金村楊村隴東村西碉村或謂六畨之名始此非五代碉門黎雅等六名也上南志云洪武六年詔西夷酋長至京授職賜印因俗為治立都指揮使司二曰烏思藏曰朵甘指揮使司一隴答衛也宣慰司三朵甘及董卜韓胡長河西魚通寧逺也招討司六萬户府四及别思寨安撫司木瓦都指揮葛剌湯千户諸部落是為三十六種以時朝貢焉志云天全招討司設在碉門城即元之碉門安撫司也中有碉門百户所屬雅州千户設在正副二招討及朵甘宣慰界渡河以西又有真官招討司及魚通安撫泠磧十八寨為三十六種畨夷出入之路志又云司治有諸葛武侯廟治東二十里有臥龍山相傳武侯征孟獲駐宿其上又十里有泉從石龍口噴出謂之龍泉其源發大悲寺內寺在司東四十里又十里則多功山也昔大禹疏鑿以通峽水故名志又有鎮西山姜維伯約駐師其下在司東二百十里又二十里有女城山相傳楊招討家女將守此壘石為城尚存又有𤣥白崖皆出聖燈芝草𤣥高峻清絶在東南八十里白崖矗立如雪在司南里餘近白崖又有玉壘窮冬積雪土人以玉堡呼之圖經自長河西至董卜寨二百餘里皆繞雪山而行路由打箭爐而進有哈日寺在烏思藏中元世祖欲郡縣六畨之地以吐蕃僧八思巴為大寶法王帝師領之嗣者數世其弟子賜號司空司徒國公佩金章玉印前後相望大寶法王而下有大乘法王闡教王闡化王護教王護法王通謂之烏思藏六畨也以其地連天竺有大西天小西天之域焉雪山盡處有大鐵圍山山有法佛德行剌麻等寺游梁雜紀云烏思藏所産細畫泥金水幅佛像銅渡金佛像金塔舍利各色足力麻鐵力麻氆氌左髻犀角珊瑚唵叭其貢道由董卜韓胡長河西朵甘思之境自雅州入京大乘大寶二法王差僧徒闡化闡教補教贊善進之志云天全男不習工藝婦不事紡績惟以耕種為業畨漢淆居碉房絶嶺治化漸摩禮義日生元段平章夫人高招討女也能詞賦其勸段氏效順息兵一章見詞話中國朝𢎞治間招討高嵩妻楊氏楊顯昭女二十而寡始終不易志詔旌其門又碉門百夫長姜珏女適於王佐生一女適高昻母子二人俱早寡從一不變人稱雙節之家蓋姜氏女七嵗時隨母赴京奏茶課因進為宫人七日不樂召其母賞鈔令引還鄉即適王佐者閨壼節義可謂盛矣惟是二氏當替襲之期往往告訐申勘動煩郡邑由嫡庶之分不明也如滇之土官宗枝冊貯自藩司則無此事蜀中廣記卷三十五
