body:
  text: 蜀中廣記卷六十一明曹學佺撰方物記第三草山海經高梁之山有草焉狀如葵而赤華莢實白柎可以走馬淮南子曰巫山之上從風縱火紫芝與蕭艾俱死抱朴子曰慮巫山之失火恐芝艾之并焚矣福地記云青城山上有沒溺池産甘露芝草也李膺益州記云江州縣西南有仙池昔有仙人居池側起樓多植香草於樓下忽一夕縱火自焚天降紫雲飄然而去後人尚指此地爲香草樓按列仙傳有園客者種五色香草積十年與妻俱仙去或即此宋祁方物畧長生草山隂蕨地多有之脩莖茸葉色似檜栢而澤經冬不凋損故號長生贊曰色與栢類苒苒其莖冬不甚黄故謂長生又曰瑞草蜀人多種之庭檻蔓延長三四尺珍而愛之故謂之瑞贊曰翠蔓紺苕囘繚可喜蒔之庭堂珍以爲瑞薛濤鴛鴦草詩綠英滿香砌兩兩鴛鴦小但娯春日長不管秋風早宋祁曰鴛鴦草春葉晩生其稚蘤在葉中兩兩相向如飛鳥對翔贊曰翠蘤對生甚似匹鳥逼而觀之勢若偕矯虞美人草亦謂之舞草獨莖三葉狀如决明一葉在莖端兩葉居莖半而相對人或近之抵掌謳曲必動摇如舞也酉陽雜俎益州草木記以爲雅州名山縣出行人唱虞美人曲則應拍而舞蜀志補罅以爲潼川州紫蓋山出動中音節移植他所則否唐人舊曲云帳中草草軍情變月下旌旗亂攬衣推枕愴離情逺風吹下楚歌聲正三更烏騅欲上重相顧艷態花無主手中蓮鍔凜秋霜九泉歸去是仙鄉恨茫茫按此屬詠虞美人事而宋景文獨以虞當作娯意其草柔纎爲歌氣所動故或動搖美人以爲娯樂耳贊曰翠莖纎柔稚葉相當逼而歌之或合或張方物略曰仙人縚與苔同種生岩隂石隈多鮮翠長二三尺叢垂若縚或言深谷有長丈餘者贊曰附陽而生垂若文縚大槩苔類土石所交杜子美有從韋明府續處覔錦竹兩三叢詩黄鶴注云攷竹譜竹紀無錦竹意以其文如錦名之竹紀有蒸竹䈄墮竹其皮類繡豈即此乎余觀錦竹他無見惟杜詩有之劉㑹孟批錦樹行云題曰錦樹使人刮目錦竹亦新惜無拈出者耳近閲梅宛陵集錦竹詩云雖作湘竹紋還非楚筠質化龍徒有期待鳯曽無實本與凡草俱偶親君子室又注其下云此草也似竹而斑始知黄鶴有金注之昬耳出丹鉛錄爾雅云菺戎葵今蜀葵也華如木槿戎蜀蓋其所自出古今注曰戎葵一名芘芣有紅紫青白色莖葉不殊但花色異耳晉傅𤣥曰蜀葵其苗似瓜瓠既大而結鮮紫色耀日也酉陽雜俎云蜀戎葵一名胡葵大者紅可以緝爲布枯時燒作灰藏火火久不滅花有重臺者予聞之蜀人燃其榦作炬雨中猶熾按淳化帖所載唐太宗二十三日勑云卿昨日道服蜀葵可錄方將來亦皆紅葵也宋顔延之蜀葵贊曰井維降精岷絡升靈物淑氣麗卉草之英渝艷衆葩冠冕羣英類麻能直方葵不傾梁王筠蜀葵花賦曰惟兹竒草遷花西道凌金坂之威夷跨玉津之浩浩値油雲之廣臨屬光風之長掃仰椒屋而敷榮値蘭房而舒藻邁衆芳而秀出冠雜卉而當闈既扶疎而雲蔓亦灼爍而星微布濩交加蓊茸紛葩疎莖密葉翠蕚丹華岑參蜀葵花詩昨日一花開今日一花開今日花正好昨日花已老人生不得恒少年莫惜牀頭沽酒錢請君有錢向酒家君不見蜀葵花長樂花今蜀人謂之月月紅也六朝謂之紫花晉傅𤣥紫華賦曰紫華一名長樂花舊生於蜀其東界特饒中國竒而種之余嘉其華純耐久可立冬而服故與友生各爲之賦云有遐方之竒草稟二氣之純精仰紫德之景曜因令色以定名剛莖勁立纎條繁列從囘風以搖動紛蘭暢而蕙潔蔚青葱以増茂並含華而未發於是散綠葉秀紫榮藴若芝草之始敷灼若百枝之在庭獨參差以照燿何光麗之雜形煥煥昱昱而奪人目精下無物以借喻上取象於朝霞妙萬物而比豔莫兹草之可嘉唐蘇頲長樂花賦序曰蜀太守庭際有紫華草秋中始繁英露洗冬早尚直本霜封蕪雜大同於衆卉盛衰小異於羣物余訝而未識吏或告余曰此傅長虞所賦蜀長樂花也故心暗賞焉因口授書吏逐墨而成作恨不見古人所爲得髣髴其㫖耳夫長者以短長之形度其長者則美夫樂者以哀樂之類同其樂者則喜長也樂也吾安得而聞之嘉纎植之並用偉令名兮在兹徒見其豐族苯䔿高標璀璨莖丹外而縞中葉縹分以紅貫綴綠穎之重疊縈紫㽔之爛熳迫而象之君子其常或微或章聳危冠兮纓若綬黙退靜其何望逺以意之佳人欲翔炫炫煌煌重羅綺兮撲瑶翠蹇來思而未嘗匪以幽兮自直匪以直兮自藏匪以晩兮自耀匪以耀兮自强文濁露之均灑庇清舒之汎光本無嫌於散地甘有寓於殊方然則太液初滿上林新霽羊茸灼爍萬品千計搖瑞色而函芝雜竒葩而轉蕙孰與夫玉堂金闕之偏賞白日青雲之特麗歲不與兮時向闌風蕭蕭兮夜漫漫賔逺鴻於沙塞呌離鶴於江干君曽不見三月華矣盡林間之稿木千霜殞矣亦庭下之枯蘭懿此常度凌於早寒假春期而不採雖秋令而不殘衝雨霰之飛薄任雲山之險艱芳弗珍於靃靡節常慕於檀欒吾則知樹背之奚託傾心之可安如後凋之是貴罔獨立其誰觀文學掾起而爲亂曰白露瀼瀼何草不黄紫華的的生君之堂彼不伐兮秋自翳時或珍兮君是惠彤庭赫兮朱草駢交屈軼兮友賔連伊榛莽而荒些君曷爲兮賦旃方物略云旌節花條脩華碧皆層層而擢正類使所持節然故以名見益州圖經贊曰擢條亭亭層層紫丹狀若使節方圖實刋蜀檮杌云王處囘在蜀有道士稱朱桃椎謁于階前以劒撥土取花子二粒種之須臾成花三朶謂處囘曰此仙人旌節花也方物略曰鵝毛玉鳯花本至卑纎蓬如釵股秋開不蘤而鬚狀似禽故曰鳯色白故曰玉以其分輕故曰毛贊曰華而無采狀類翔鳯么質毛輕翩欲飛動又曰添色拒霜花生彭漢蜀州花常多葉始開白色明日稍紅又明日則若桃花然贊云自濃而淺花則常態今顧反之亦物之怪又曰羞寒花蜀地處處有之不爲人所愛依莖綴花蔽葉自隱俗曰羞天花予易爲羞寒花按本草名鬼臼贊云冒寒而茂莖脩葉廣附莖作花葉蔽其上以其自蔽若有羞狀青城志云宋仁宗踐阼之六年縣奏上清宫庭木生異花錫名曰太平瑞聖宋祁方物略瑞聖花出青城山中榦不條高者乃尋丈花率秋開四出與桃花類然數十跗共爲一花繁密若綴先後相繼而開九閲月未萎也蜀人號豐瑞花故程相國琳爲益州年繪圖以聞更號瑞聖然有數種其小者號寳仙淺紅者爲醉太平白者名玉真成都人競移蒔囿中以爲尤玩云贊曰衆跗聚英爛若一房有守繪圖厥名乃章繁而不艷是異衆芳范成大詩雪外捫參嶺烟中濯錦洲密攅文杏蘂高結綵雲毬百世嘉名重三登瑞氣浮挽春同住夏看到火西流圖經云蘭生於深林石門尤多有春蘭秋蘭崇蘭鳯尾蘭竹蘭石蘭春蘭花生於葉之下崇蘭花生於葉之上黄魯直幽芳亭記云一榦兩三花而香有餘者蘭一榦十數花而香不足者蕙按石門在敘府慶符縣古犍爲郡地諺云雅州蘭烏尤蕙則蘭蕙固自有分也蜀中有花名賽蘭香花小如金粟特馥烈戴之髮髻香聞十步經月不散佛經云天末香莫若牛頭旃檀天澤香莫若詹糖薫陸天華香莫若㯏蒲伊蘭則伊蘭即此花也西域以之供佛後漢書所謂伊蒲之供矣成都府治西園有辨蘭亭爲吕大防李大臨李之純三人倡和處微仲之言曰蜀有草如蘐紫莖而黄葉謂之石蟬而楚人皆以爲蘭蘭見於詩易而著於離騷古人所最貴而名實錯亂迺至於此予竊疑之迺詢諸游仕荆湘者云楚國之有蘭舊矣然鄉人亦不知蘭之爲蘭也前此十數歲有好事者以色臭花葉驗之於書而名始著况他邦乎予於是信以爲蘭攷之楚辭又有石蘭之語蓋蘭蟫聲近之誤蘭其葉冬青其華凌寒其生沙石瘠土而枝葉峻茂其芳不外颺暖風晴日有時而發則郁然滿乎堂室是皆有君子之德此古人之所以爲貴也迺爲小亭種蘭於其旁而名曰辨蘭無使楚人獨識其真者斯命亭之意也方物略云石蟬花始生其苕森擢長二三尺葉如菖蒲紫蕚五出與蟬甚類綠黄相側蜀人名其白者爲玉蟬花贊曰有苕穎然有蕚敷然取其肖象莫類于蟬本草蟬花出蜀中其蟬頭上有一角如花冠狀謂之蟬花方物略蟬花二川山林中皆有之蟬不蜕者至秋則花其頭長一二寸黄碧色治小兒瘈瘲又能已瘧贊曰蟬不能蜕委于林下花生厥首兹謂物化方物略云七寳花條葉大抵玉蟬花類也其生叢蔚花紫質絳贊曰擢穎挺挺盛夏則榮丹紫合英以寳見名又云朝日蓮花或黄或白葉浮水上翠厚而色澤形如菱花而差大開則隨日所在日入輒斂而藏于葉下若葵藿之傾太陽然贊曰素花碧葉浮秀波面日中則向日入還斂能改亝云宋景文筆記謂蜀中有蓮大如雀鷇葉舒如錢榦亦有絲其蕚盛開而向日朝則指東亭午則遡南夕則西指隨日所至蜀人名曰朝日蓮予按鄭熊番禺記海南有向日蓮花似木芙蓉而極香開時東西向至暮而斂一呼夜合即此花也敘志云西番蓮出夷地有黄赤二種榦圍六七寸葉長尺餘花如千葉蓮狀又一種榦如良薑長六七尺葉如芭蕉長三四尺花赤毎花三四十瓣下瓣長四五寸至其端以漸而短瓣直聳不似蓮狀二三月花至冬方厭俗亦呼西番蓮方物略云紅蕉花于芭蕉蓋自一種葉小其花鮮明可喜蜀人語染深紅者謂之蕉紅蓋倣其殷麗云贊曰蕉無中榦花産葉間綠華外敷絳質凝殷金堂志有花名孤燕傳書木山海經曰廣都之野靈壽實華蜀都賦云靈壽桃枝注靈壽木出涪陵郡國志云南鄉峽西八十里有巴鄉村溪中多靈壽木也益州記云僰道縣有荔枝灘灘東南二十里山頂有一冢唯生女貞樹樹上常有白猿栖息郡國志云僰道有玉女冢生女貞處是矣灌縣有秦時紫栢團團如蓋大可蔽畝其鄉名紫栢鄉知縣雷叔聞畫圖見遺因作讚曰有赤甲丈人者居於青城之陽厥生在祖龍之紀歴漢及唐有客伐之鼓鐘鏜鏜維神保䕶爰及我明中懷嘉果鴝鵒來翔其葉如髮其榦如石東榮而西殭圍丈有八尺其高四倍臨於大荒以孔檜爲父以五大夫爲兄九州之内此二三者繄其可相望石室有二古栢見唐宋詩如裴鉶李石蘇軾等集成都古今記中亦載之後有人請于府恐此栢壊屋欲去之李知幾曰屋壊尚可脩栢伐不可復併舉東坡詩蒼苔高联室古栢文翁庭句爭之始得全方舟詩云嬌榮落盡雪霜浮偃蹇空貽社櫟羞濡沫東家雖借潤風烟西爽亦宜秋皮災已覺神明露心在猶懷剪伐憂鐵鎖何當絆龍脚夜深雷雨卷潭湫其二云思人誰復念婆娑窟室崖隂未易磨四十圍間看溜雨三千年後數恒河不堪與世供狙杙尚許遺民占鳥窠從此便名夫子樹康人斤斧奈予何然他日方舟有送浩姪成都學官詩云似聞禮殿栢久已尋斧柯則此栢亦不存矣楊師魯集云綿竹武都山嚴仙觀雙闕内有漢時古栢參雲雁行而立人于蒼翠中行數百步始至栢老而中虚可容六人圍坐夜或有光人稱君平餌丹以餘粒埋栢樹下使然也本草益州諸葛廟中大栢相傳是蜀世所植故人多采以作藥其味甘香異常栢也杜甫詩孔明廟前有老栢柯如青銅根如石霜皮溜雨四十圍黛色參天二千尺君臣已與時際㑹樹木猶爲人愛惜雲來氣接巫峽長月出寒通雪山白憶昨路繞錦亭東先主武侯同閟宫崔嵬枝榦郊原古窈窕丹青户牖空落落盤踞雖得地㝠㝠孤高多烈風扶持自是神明力正直元因造化功大厦如傾要梁棟萬牛囘首丘山重不露文章世已驚未辭剪伐誰能送苦心豈免容螻蟻香葉終經宿鸞鳯志士幽人莫怨嗟古來材大難爲用段文昌題曰是草木有異於草木則靈武侯祠前栢壽千齡盤根擁門勢如龍形含碧太空散霧虚庭合抱在於旁枝駢梢葉之青青百尋及於半身蓄風雷之㝠㝠攅柯垂隂分翠間明忽如虬螭向空爭行上承翔雲孤鸞時鳴下䕃芳苔凡草不生古色天風蒼蒼玲玲曽到靈山老栢縱横亦有大者莫之與京於惟武侯佐蜀有程神其不昬表此爲楨斯廟斯栢實播芳馨長慶二年六月也李義山詩蜀相階前栢龍蛇捧閟宫隂成外江畔老向惠陵東大樹思馮異甘棠憶召公葉凋湘鷰雨枝折海鵬風玉壘經綸逺金刀厯數終誰將出師表一爲問昭融陸龜䝉詩密葉四時同一色高枝千歲對孤峯此中疑有精靈在爲見盤根似卧龍儒林公議云武侯廟前栢圍數丈唐相段文昌有詩石在焉唐末漸枯悴歴王孟二僞國不復生然亦不敢伐之宋乾德五年辛夘夏五月枯柯再榮時人異焉三國迄今千二百餘年矣新枝聳雲枯榦並存夭矯若虬龍陸游劒南藁云唐有節度使取孔明祠栢一小枝以爲手板書於圖志非詆至今則此栢亦稱靈異著聞極矣宋劉望之云雙流縣保國觀古栢其大連九臂乃合較孔明廟中栢正一倍也異時震霆焚其一榦人以爲昔有伏丹其下歲久丹飛去又嘗有雙鶴棲其上因作詩以紀之草木長生亦偶然不須聞此便談仙燒枝競説丹飛日舉世寧知手種年雙鶴不歸秋自冷萬牛囘首句空傳相逢一飲清隂下與子前生定有緣胡宗師題雙流保國觀古栢云孔明廟前古栢竒此木氣象尤過之榦東髣髴煙熖起鐵龍空駕焚一枝真人丹成何所適世傳乘鶴冲天飛求詩道士心彌堅試聽一誦工曹詩唐大中時遂州薦福院僧所植栢數十圍後唐之亂山林一空此栢賴寺僧以二縑逭其害賦咏甚多紹聖丙子李常爲令作詩曰當日雙縑値萬緡買留柯葉拂星辰上巢絶頂繞千鶴下憩清隂可百人見輿地紀勝梓潼志七曲山有應夢臺臺側有栢晉時植龍首虬枝霜皮老榦見者即知爲千年物嘉州志凌雲山清音亭前有栢四株霜皮黛色其葉一則瑣細如翦一則扁仄如片一則垂絲如栁一則蝟刺如毛異于常栢也劒門志縣八十里停船山有冲寂觀唐李真人於此煉丹仙去手植栢十八株或云以䜟唐十八帝有石刻乃宋乾德僧懷義撰蜀都賦楔樅注云楔如松有刺樅栢葉松身方物略竹栢生峩眉山中葉繁長而籜似竹然其榦大抵類栢而亭直贊曰葉與竹類緻理如栢以狀得名亭亭脩直蜀地宜栢而不宜松即見有一二種亦新栽耳少陵覔松樹子詩落落出羣非櫸栁青青不朽豈楊梅欲存老蓋千年意爲覔霜根數寸栽又詩云四松初移時大抵三尺强别來忽三載離立如人長㑹看根不拔莫計枝凋傷幽色幸秀發疎柯亦昻藏所挿小藩籬本亦有隄防終然棖撥損得愧千葉黄敢爲故林主黎庶猶未康避賊今始歸春草滿空堂覽物歎衰謝及兹慰凄凉清風爲我起洒面若微霜足以送老姿聊待偃蓋張我生無根蔕配爾亦茫茫有情且賦詩事迹兩可忘勿矜千載後慘澹蟠穹蒼又詠嚴鄭公堦下新松詩弱質豈自負移根方爾瞻細聲聞玉帳疎翠近珠簾未見紫煙集虚䝉清露霑何當一百丈欹蓋擁高簷大抵蜀地松不能以敵栢也蜀亦不宜于栁太白西巡歌云栁色未饒秦地綠可見矣然予觀三齊略記曰劉悛爲益州刺史獻蜀栁數株柔條甚長狀若絲縷武帝値於太昌靈和殿前常翫嗟之曰楊栁風流可愛似張緒梁元帝折楊栁詩曰巫山巫峽長垂栁復垂楊同心宜同折故人懷故鄉李商隱巴江栁詩巴江可惜栁栁色綠侵江其見于歎賞又如此方物略云楠蜀地最宜者生童童若幢蓋然枝葉不相礙茂葉美䕃人多植之樹甚端偉葉經歲不凋至春陳新相換有花實似母丁香贊曰在土所宜亭擢而上枝枝相避葉葉相讓繁隂可庇美榦斯仰蜀都賦曰楩楠幽藹又曰交讓所植注交讓木名兩樹對生一樹枯則一樹榮如是歲更終不俱生不俱枯也出岷山安都縣任昉述異記黄金山有枏木一年東榮西枯一年西榮東枯張華以爲交讓木宋祁曰即枏也其木直上柯葉不相妨陸慧曉亦謂枏是交讓顔師古曰枏與楠同古今集記犀浦鎮有蘧仙觀爲蘧真人舊隱也有四大楠甚古陸放翁云予在成都嘗以事至沈犀過國寧觀有古楠四皆千歲木也枝擾雲漢聲挾風雨根入地不知幾百尺而隂之所庇車且百兩正晝日不穿漏夏五六月暑氣不至凜如九秋成都固多壽木然莫與四楠比予蓋愛而不能去者彌日有石刻立廡下曰是仙人蘧君手植也文類繁江隆道觀玉帝殿庭有古楠二章分列左右如輔弼然元祐八年一夕風雷大作偃其左偏者邑宰命匠石取之方執柯伐其枝忽聞軋軋聲楠乃稍稍起立匠石攀其上如猿猱然觀者驚駭邑宰降階伏而謝罪繁尉蒲咸臨記之甚詳杜少陵卜居草堂一楠甚古其作詩云枏樹色㝠㝠江邊一蓋青近根開藥圃接葉製茅亭落景隂猶合微風韻可聽尋常絶醉困卧此片時醒又有歎枏樹爲大風所拔歌倚江枏樹草堂前故老相傳二百年誅茅卜居總爲此五月髣髴聞寒蟬東南飄風動地至江翻石走流雲氣榦排雷雨猶力爭根斷泉源豈天意滄波老樹性所愛浦上童童一青蓋野客頻留懼雪霜行人不過聽竽籟虎倒龍顛委榛棘淚痕血㸃垂胷臆我有新詩何處吟草堂自此無顔色嚴武題巴州光福寺楠木詩楚江長流對楚寺楠木幽生赤厓背臨溪挿石蟠老根苔色青蒼山雨痕高枝閙葉鳥不度半掩白雲朝與暮香殿蕭條轉密隂花龕滴瀝垂清露聞道偏多越水頭烟生霽斂使人愁月明忽憶湘川夜猿呌還思鄂渚秋看君幽藹幾千丈寂寞窮山今遇賞亦知鐘梵報黄昏猶卧禪林戀竒響史俊和詩云近郭城南山寺深亭亭竒樹出禪林結根幽壑不知歲聳榦摩天凡幾尋翠色晩將嵐氣合月明時有夜猿吟經行綠葉望成蓋宴坐黄花長滿襟此木常聞生豫章今朝獨秀在巴鄉凌霜不肯讓松栢作宇由來稱棟梁㑹待良工時一盻應歸法水作慈航按季鷹時爲巴州刺史俊其客也蔣堂清隂館種楠詩手植楩楠二千樹時當慶厯五年春還期莫道空歸去留得清隂與後人堂成都太守種楠以二千計亦可謂好事矣異物志楠木年深向陽者凝結花紋俗呼爲鬭栢楠亦有蟠結如山峯者蘇老泉所作木假山即此物也梅聖俞詩空山枯楠大蔽牛霹靂夜落魚鳬洲魚鳬水射幾千秋蠧肌爛隨沙蕩流惟存堅骨蛟龍鎪形侔三峯中雄酋左右兩峯相挾翼尊奉君長無慢尤蘇夫子見之驚且喜買於谿叟憑貂裘因嗟大不爲棟梁又歎殘不爲薪槱雨漫蘚濕得石瘦直與夫子歸隱丘東坡曰先君子嘗蓄木山三峯且爲之記詩人梅二丈聖俞見而賦之今三十年矣而猶子千乘又得五峯益竒因次聖俞韻使併刻于其側詩曰木生不願囘萬牛願終天年仆沙洲時來幸逢河伯秋掀髯見怪推木流蓬萊雪嶺巧彫鎪蟄蟲行蟻爲豪酋阿咸大膽忽持去河伯好事不汝尤城中古沼浸坤軸一林瘦竹吾菟裘二頃良田不難買三年榿木行可槱㑹將白髮對蒼巘魯人不厭東家丘欒城次韻江槎出没浮犀牛波濤掀天谷爲洲江寒水落驚霜秋危根瘦節鳴寒流脆朽吹去誰鐫鎪連峯疊嶂立酋酋吾家此山不易得十年弃置空自尤猿號鶴唳豈無意委虵怪我懷羔裘西歸父老拍手笑笑憶翁子躬薪槱去時三山今有五不問故園惟一丘蜀都賦杞櫹椅桐註引雅詩其桐其椅也劉敬叔異苑云晉武帝時呉郡臨平岸崩出一石鼓打之無聲以問張華華云可取蜀中桐材刻作魚形打之則鳴於是如言音聞數十里華陽國志益州有梧桐木其華采如絲人績以爲布名曰桐華布白傅桐花詩春令有常候清明桐始發何此巴峽中桐花開十月豈伊物理變信是土宜别地氣反寒暄天時倒生殺草木堅强物所稟固難奪風候一參差榮枯遂乖剌况吾北人性不耐南方熱强羸壽夭間安得依時節以蜀中桐花開最早也山海經單狐之山多机木郭注机似榆可燒以糞稻田出蜀中丹鉛錄以爲即今之榿總志云榿古稱蜀木成都爲盛也酉陽雜俎蜀中有木類柞衆木榮時枯枿隆冬方萌芽布隂蜀呼爲楷木方物略云榿木民家蒔之不三年材可倍常薪疾種亟取人以爲利贊曰厥植易安數歲輒林民賴其用實代其薪不棟不梁亦被斧斤少陵憑何十一少府邕覔榿木數百栽詩草堂塹西無樹林非子誰復見幽心飽聞榿木三年大與致谿邊十畝隂自注云蜀人以榿木爲薪三年可燒也予過草堂見榿木隂隂隔岸臨水猶可想見少陵徃來行迹問他樹則不能語云嚮其利者爲有德矣川中桑柘亦稀有惟西北飼蠶蓄之諸葛武侯表云臣家成都有桑八百株子弟衣食供給無患李膺益州記云臨津縣掌天山多柘堪爲弓雖檿絲燕角不能勝也碑目云名山縣土主神姓花乃丹稜花敬定之弟俗呼三郎廟廟有樹一榦桑一榦柘所謂壬子癸丑桑柘木也白蠟樹似冬青而近水蜀人買蠟虫他處以清明時用桐葉包裹掛於枝上至孟秋則樹枝皆如綿刮而熬之成蠟東南州縣多有之白樂天庭槐詩在忠州作南方饒竹樹唯有青槐稀十種七八死縱活亦支離何此郡庭下一株獨華滋濛濛碧煙葉嫋嫋黄花枝我家渭水上此樹䕃前墀忽向天涯見憶在故園時人生有情感遇物牽所思樹木猶復爾况見舊親知按通志云槐榆之植蜀土所宜錦官城中閭巷夾道而植想樂天時未入西川也劒門之左峭巖間有異樹生石縫中大可數圍枝榦純白皆傳曰白檀樹其下常有巨虺蟠而䕶之民不敢採伐出玉堂閒話韻書云黄葛木壽可千歲形如衆藤連理合而爲一大者合抱高數丈葉如橡喜縁厓生擁腫屈曲咸淳府景德觀前有古木大數十圍枝柯盤鬱如蓋山中人云此黄葛樹千年物也寰宇記羅目縣東南三十里陽山江溉兩樹對植圍三尺二寸上引横枝亘二丈相援連理隂庇百夫其名黄葛即嘉樹也蘇子由詩予生雖江陽未省至嘉樹指此方物略云娑羅花生峩眉山中類枇杷數葩合房春開葉在表花在中根不可移故人不得爲玩贊曰聚葩共房葉附華外根不得徙見偉兹世范石湖峩眉行記娑羅樹葉如楊梅又似海桐花有紅白二色春夏間開惟大峩山有此今名其處爲娑羅坪黎州圖經通望縣西一百步内有天王堂堂前有池池南有娑羅綿樹三四人連手合抱方匝其花盛夏方開先花而後葉謝時不背而墮宛轉至地花蘂有綿謂之娑羅綿古老相傳云是肉齒和尚住持靈跡縣界有和尚山云雅安志娑羅花有五色如爛錦照映山谷出瓦屋山中大抵娑羅非名山佛地不能得也杜甫蜀中丁香詩丁香體柔弱亂結枝猶墊細葉帶浮毛疎花披素艷深栽小齋後庶近幽人占晩壓蘭麝中休懷粉身念麗春詩百草競春華麗春應最勝少須好顔色多漫枝條剩紛紛桃李枝處處總能移如何貴此重却怕有人知少陵在蜀久一草一木皆入詠可謂集衆芳者矣方物略月季花即東方所謂四季花翠蔓紅蘤者蜀少霜雪此花得終歲十二月輒一開贊曰花亘四時月一披秀寒暑不改似固常守又云錦帶花蜀山處處有之長蔓柔纎花葉間側如藻帶然因象作名花開形似飛鳥里人亦號鬢邊嬌贊曰苒苒其條若不自持綠葉丹英蔓衍紛垂范石湖詩妍紅棠棣粧弱綠薔薇枝北風一再來飄颻隨舞衣呉下嫵芳檻峽中滿荒陂佳人墮空谷皎皎白駒詩蓋東南以錦帶爲珍峽中蔓生山谷故云方物略錦被堆花出彭州其色一似薔薇有刺不可玩故俗謂薔薇爲錦被堆贊曰花跗芬侈叢刺于梗不可把玩艷以妍整唐裴説詩一架長條萬朶春嫩紅深綠小窠匀只因根下千年土曽葬西川織錦人張祜詩曉風抹盡燕支顆夜雨催成蜀錦機當晝開時正明媚故鄉疑是買臣歸范成大詩誰把柔條夾砌栽壓枝萬朶一時開爲君也着詩收拾題作西樓錦被堆成都古今記荼􅐘花香甚可以爲酒晉山濤爲郫令以此花釀酒竹中所謂郫筒酒也方物略云蜀酴醾多白而黄者時時有之但香減于白花贊曰人情尚竒賤白貴黄厥英略同實寡于香宋臨卭盧申之酴醾詞云蕩紅流水無聲暮煙細草黏天逺低囘倦蝶徃來忙燕芳期頓懶綠霧迷牆翠虬騰架雪明香暖笑依依欲挽春風教住還疑是相逢晩不似梅妝瘦減占人間丰神蕭散攀條弄蕋天涯猶記曲闌小院老去情懷酒邊風味有時重見對枕幃空想東牀舊夢帶將離怨右調水龍吟蜀中茉莉有枝如藤而花瓣稍大盧申之詞云玉肌翠袖較似酴醾瘦幾度熏醒夜窻酒問炎州何許清凉塵不到氷壺剪就晩來庭户悄暗數流光細拾芳英黯囘首念日暮江東偏爲魂銷人易老幽韻清標似舊正簟紋如水帳如烟更奈問月明露濃時候右調洞仙歌杜甫詩梔子比衆木人間誠未多於身色有用與道氣傷和紅取風霜實青看雨露柯無情移得汝貴在映江波野人閒話云蜀主昇平中嘗理花卉有青城申叟進花子兩顆奏云知理苑圃輒進名花以助佳趣詔賜之束帛出至市散帛與貧人遂不知去處已宣令内園子種之二年枝葉婆娑則梔子樹也其花爛紅六出香襲人蜀主甚愛之或令圖入團扇或綉入衣服或以熟帛絹素鵝毛製作首飾謂之紅梔花及結實則顆大於常梔用以染素則成赭紅色甚妍翠于時珍之蜀檮杌廣政十二年十月召百官宴芳林園賞紅梔花此花青城山中進子三粒種成者六出而紅清香如梅當時最重也檮杌云孟㫤廣政十二年令羅城上植芙蓉盡以幄幙遮䕶九月盛開望之如錦繡謂左右曰自古以蜀爲錦城今日觀之真錦城也當時張𤣥作詩曰四十里城花發時錦囊高下照坤維雖粧蜀國三秋色難入豳風七月詩去年今日到成都城上芙蓉錦繡舒今日重來舊游處此花憔悴不如初預歎其不永矣文與可二色芙蓉詩蜀國芙蓉名二色重陽前後始盈枝畫調粉筆分粧處繡引紅針間刺時落晩自憐窺露沼忍寒誰念倚霜籬主人日有西園客得爾方於勸酒宜蓋此花初開色白已變而紅俗號之醉芙蓉也或曰即木蓮花方物略木蓮花生峩眉山谷狀如芙蓉香亦類之木榦花夏開枝條茂蔚不爲園圃所蒔贊曰葩秀木顛狀若芙蕖不實而榮馥馥其敷酉陽雜俎木蓮葉似辛夷花類蓮花色相傍出忠州鳴玉溪卭州亦有白樂天云木蓮樹生巴峽山谷間巴民亦呼爲黄心樹大者髙五丈涉冬不凋身如青楊有白文葉如桂厚大無脊花如蓮香色艷膩皆同獨房蕊有異四月初始開自開迨謝僅二十日生忠州西北十里鳴玉谿者尤穠茂惜其遐僻因題三絶句如折芙蓉栽旱地似抛芍藥挂高枝雲埋水隔無人識唯有南賔太守知紅似臙脂膩如粉傷心好物不須臾山中風起無時節明日重來得在無已愁花落荒巖底復恨根生亂石間幾度欲移移不得天教抛擲在深山白傅又畫木蓮花圖寄元郎中詩花房膩似紅蓮朶艷色鮮如紫牡丹唯有詩人解親愛丹青寫出與君看老學菴云白樂天有忠州木蓮詩予遊臨卭白鶴山寺佛殿前有兩株其高數丈葉堅厚如桂以中夏發花狀如芙蕖香亦酷似寺僧云花坼時有聲如破竹然一郡止此二株不知何自至也成都古今記蕭紀僣號之歲寢殿栢柱上繞節生花如蓮其莖四十有六靃靡可愛識者以爲王敦之杖花明年紀敗年亦四十六云揚雄蜀都賦樹以木蘭左思蜀都賦木蘭梫桂按木蘭大樹也葉似長生冬夏榮常以冬華其實如小柿甘美南人以爲梅其皮可食寰宇記崇慶州産木蘭皮簡池志有木蘭寺以多此物也蜀都賦注梫桂木桂也談資云蜀桂之丹者色亦甲于南中白樂天喜山石榴花開作詩云忠州州裏今日花廬山山頭去年樹已憐根損靳新栽還喜花開依舊數赤玉何人少琴軫紅纈誰家合羅袴但知爛漫恣情開莫怕南賔桃李妒樂天又有戲問山石榴詩小樹山榴近砌栽半含紅蕚帶花來爭知司馬夫人妒移到庭前便不開又以山石榴寄元九詩山石榴一名山躑躅一名杜鵑花杜鵑啼時花撲撲九江三月杜鵑來一聲催得一枝開江城上佐閒無事山下斸得㕔前栽爛漫一欄十八樹根株有數花無數千房萬葉一時新嫩紫殷紅鮮麴塵深痕裛損臙胭臉剪刀裁破紅綃巾謫仙初墮愁在世姹女新嫁嬌泥春日射血珠將滴地風翻火焰欲燒人閒折兩枝持在手細看不似人間有花中此物似西施芙蓉芍藥比嫫母竒芳絶艷别者誰通州遷客元拾遺拾遺初貶江陵去去時正値春山暮啇山秦嶺愁殺人山石榴花紅夾路題詩報我何所云苦云色似石榴裙當時叢畔惟思我今日欄前只憶君憶君不見坐銷落日西風起花紛紛酉陽雜俎山茶似海石榴蜀地有之談資云山茶有雲南紅石榴紅謝萬定數種朶大勝芍藥重瓣如芙蓉土人自能接他處莫匹也寳珠雖有尚拜其下風仁壽志謝萬定者木匠也自雲南大理府負山茶一種歸因以人名花宋王覿集大慈聞海雲山茶合江梅花開遂邀同賞作詩野寺山茶昨夜開江亭初報一枝梅旋邀座上逍遙客同醉花前瀲灧盃秀色霜濃方潤澤暗香風靜更徘徊仙姿莫遣常情妒不帶東山伎女來胡宗師和云錦水黄金密印開東南時望滯鹽梅得隨劒外同爲客幸逐花前醉倒盃白玉蘂高枝瘦碧臙脂蕚嫩葉低徊綺羅不識清詩骨須趂春風摸石來劉缺和云百卉嚴寒未放開山茶映發蜀江梅解顔况有花經眼取醉寧辭酒滿盃照日亂紅光爛漫漾流輕素影徘徊罇前已得春消息不待江南驛使來徐彦孚和云萬蘂山茶傍臘開一番春信入江梅追游共按黄金轡縱賞還傾白玉盃濃艷迎風香斷續疎枝横月影徘徊隼旟不負登臨興更約攜朋載酒來呉師孟和云何處珍叢最早開海雲山茗合江梅忽傳詩帥邀膚使不用歌姬侍宴盃曉艷鮮明供綺靡晩粧清淡奉徘徊此時文酒風流事豈似臨江放蕩來宋蒲瀛次袁升之遊海雲寺鴻慶院賞山茶之什六首山茶兩本上連空疊葉棲枝占佛宫雀尾有金輸紺碧鶴頭無火讓殷紅優於峽茗稱呼異劣與梅花氣候同誰識諸天雨花外道人宴坐雪霜中其二年年花葉炫虚空歲月循環十二宫對植霜天無賴碧特開金地可憐紅長春比並何妨别密雪交加有底同不必傳神呼趙老君詩元在典刑中其三花開似火半燒空熒惑飛來失故宫但見洛人誇魏紫誰知蜀國産真紅肯隨月季無時節應怪梅花有異同逺挈一罇誰伴我還從山裏望城中其四對境那能問色空山茶花發映蓮宫攻餘瑟瑟風搖綠刑盡猩猩日曬紅大雪迷漫元斗異千林搖落不雷同何須誑汝老迦葉分付闍黎一笑中其五臘月寒冰火滿空𤣥㝠移種祝融宫雪霜底事論堅白兒女何知愛軟紅金鼎轉丹應有異玉沙洗水若爲同細思造物元無物顛倒繁華掌握中其六花發今年喜不空遨頭肅客上蕭宫雪殘千丈猶連白風引雙旌欲鬭紅他日勲名三事在先春和氣萬家同等閒草木䝉湔袚况入尋常顧盻中范石湖十二月十日賞海雲山茶詩門巷驩呼十里村臘前風物已如春多年池上經行處萬里天邊未去人客髩花身俱歲晩妝光酒色且時新海雲橋下溪如鏡休把冠巾照路塵蜀都賦椃桃函列爾雅曰椃山桃也劉禹錫竹枝詞山桃紅花滿上頭蜀江春水拍山流花紅易衰似郎意水流無限似儂愁少陵於蕭八明府寔處覔桃栽詩奉乞桃栽一百根春前爲送浣花村河陽縣裏雖無數濯錦江邊未滿園白傅種桃杏詩大抵心安即是家年深兼欲忘京華忠州且作三年計種杏栽桃擬待花又寄題忠州小樓桃花詩再遊巫峽知何日總是秦人説向誰長憶小樓風月夜紅欄干外兩三枝予于錦官署中得一種桃花白而重臺者微露紅色若繪事然此海内所無也放翁云歐陽公梅宛陵王文恭集皆有小桃詩歐詩雪裏花間人未知摘來相顧共驚疑便當索酒花前醉初見今年第一枝初但謂桃花有一種早開者耳及遊成都始識所謂小桃者上元前後即着花狀如垂絲海棠曽子固雜識云正月二十開天章閣賞小桃正謂此也蜀都賦云朱櫻春熟杜甫野人送櫻桃詩西蜀櫻桃也自紅野人相贈滿筠籠數囘細寫愁仍破萬顆匀圓訝許同憶昨賜霑門下省退朝擎出大明宫金盤玉筯無消息此日嘗新任轉蓬白樂天題東樓前李使君所種櫻桃詩身入青雲無見日手栽紅樹又逢春唯留花向樓前看故故抛愁與後人宋何耕曰余承乏成都郡丞官居舫齋之東有櫻樹焉本大實小其熟猥多鮮紅可愛而苦不可食雖鳥雀亦弃之感而賦之云始余至於官居盻兹樹之特竒榦擁腫以上達條扶疎而下披䕃露井其有餘知封植之幾時或告余以含桃出饞涎而流頤意薦廟之珍果必甘滋之若飴幸一熟之得嘗指麥秋以爲期忽春事之已晩訝子結之獨遲初瑣碎以破蕾漸毓稠而着枝聊攀摘以適口乃苦澁而顰眉類置膽於越國異茹薺於周詩謝芳液之津津空殷紅之纍纍誤來集之衆鳥誑無知之羣兒感人事之大謬爲累欷而齎咨或名美而實乖或表盛而裏虧或色厲而内荏或迹公而情私鷙翰假於鳯鳴羊質混於虎皮佞似聖以疇測姦託儒而莫窺莽恭儉以竊國夘博辯以僵尸談仁義其可樂視所履而舛馳儼衣冠於民上爲賈豎之不爲方滔滔以皆是奚一木之足悲本草醋林子生卭州山箐中木高丈餘枝葉繁茂三月開白花九月十月子熟纍纍數十枝成朶生青熟赤略類櫻桃而蔕短熟時采之隂乾連核用土人以鹽醋收藏充果食杜少陵詣徐卿覓果子栽詩草堂少花今欲栽不問綠李與黄梅石笋街中却歸去果園坊裏爲求來白樂天嘉慶李詩東都綠李萬州栽君手封題我手開把得欲嘗先悵望與渠同别故鄉來蜀都賦云荅遝離支張揖曰荅遝似李出蜀也蜀都賦有扶林檎註林檎實似赤柰而小味如梨梁庾肩吾謝賚林檎啓曰丹徒故苑歲綿長而不見峩山雖植路重阻而來難未有徙核圓丘移根閬坂仙厨始摘猶青玉之盤下賤爰頒遂八柚之座洞㝠記云蜀都素柰以夏成梁禇澐柰詩曰成都貴素質酒泉稱白麗紅紫奪夏藻芬芳掩春蕙映日照新芳叢林抽晩蔕誰謂種三珠終焉競八桂不讓圓丘中粢潔華庭際宋祁方物略北方葡萄熟則色紫蜀有綠葡萄熟時其色正綠贊曰西南所宜柔蔓紛衍縹穗綠實其甘可薦蜀都賦云紫梨津潤洞㝠記曰塗山之背梨大如升色紫千年一花亦曰紫輕梨矣梁沈約應詔詠曰大谷來既重岷山道有難摧折非所吝但令入玉盤劉孝綽應令詠曰玉壘稱津潤金谷詠芳菲詎匹龍樓下素葉映華扉後梁宣帝詩曰大谷常流稱南荒本足珍綠葉已承露紫實復含津齊謝朓謝隋王賜梨啟曰味出靈闗之隂㫖介玉津之澨豈徒真定歸美大谷慚滋已上四作皆本左思紫梨津潤之一言也塗山氓山玉壘靈闗玉津皆蜀地普慈志縣介萬山間無土地肥饒之産舟車貨利之聚惟鐵山棗崇龕梨天池藕三者皆陳希夷所種遂寧志宋初遂州栢子鎮龎君厚者與陳希夷善一日訪之華山希夷餉以梨龎乞一種歸植之因蕃衍得名方輿云廣安軍梨有數種入口即化者爲上世謂廣安有十似梨似耿其一也范蜀公詩白巖霜重紅梨曉注曰白巖梨比鳯栖差小而其味過之陸游入蜀記云巫山縣大溪口出美梨大如升張世南游宦紀聞榅桲大者如梨味甜而香用刀切則味損而黒凡食時先以巾拭去毛以巾包於柱上擊碎其味甚佳蜀中有之韻寳云芳無切檻木名生蜀山中子有鹽如霜滇中名鹽霜果方物略天仙果樹高八九尺無花葉似荔枝而小子如櫻桃纍纍綴枝間六七月熟味至甘贊曰有子孫枝不蘤而實薄言采之味埓蜂蜜丹鉛錄優曇鉢花似枇杷無花而實即蜀中無花果也蜀都賦林檎枇杷注枇杷冬花黄實本出蜀中王建贈薛濤詩萬里橋邊女校書枇杷樹裏閉門居掃眉才子知多少管領春風總不如白傅山枇杷花詩萬重青嶂蜀門口一樹紅花山頂頭春盡憶家歸未得低紅如解替君愁文彦博枇杷詩有果産西裔作花凌早寒樹繁碧玉葉柯疊黄金丸上都不可寄咀味獨長嘆然蜀中枇杷不能佳若比閩中猶太白之于月耳蜀都賦有樼栗罅發藝文類聚梁州獻栗徑寸半方物略天師栗生青城山中他處無有也似栗味美惟獨房爲異久食已風攣贊曰栗類尤衆此特殊味專蓬若橡託神以貴青城志上清宫在丈人祠之側晉朝立宫于上夜則神燈遍空其東北麓有天師手植栗十七株文同詩天師攜此種至自上饒逺當時十七樹高榦倚孤巘蒼蓬蒺藜大紫殻㯽榔軟蜀部名果中推之爲上選綿州神泉縣出榛子亦能改亝所云八子之數方物略云餘甘子生戎瀘山中樹大葉細似槐實若李而小咀之前苦後歆歆有味故號爲餘甘核有稜或六或七解硫黄毒即本草所謂菴摩勒也贊曰黄葩翠葉圓實而澤咀久還甘或號菴勒癸辛雜志云涪翁在戎州日過蔡次律家小軒外植餘甘子乞名於翁因名之曰味諌軒其後王子予以橄欖送翁翁賦云方懷味諫軒中果忽見金盤橄欖來想見餘甘有瓜葛苦中真味晩方囘然則二物亦可名之爲諌果也山谷與人書云餘甘乃有一種大者如李其質味甘脆與常見者絶不類或云蠻中有之西域傳云餘甘二種大者生青熟黄小者始終青色蓋信然矣華陽國志犍爲南安縣有柑橘官社廣志曰甘有二十一種成都平蔕甘大如升色蒼黄酉陽雜俎天寳十載上謂宰臣曰近日於宫内種柑子數株今秋結實百五十顆與江南蜀道所進不異大唐新語益州每歲進柑子皆以紙裹之他時長吏嫌紙不敬代以細布既而恐柑子爲布所損每懷憂懼俄有御史甘子布使於蜀驛使馳白長吏有御史甘子布至長吏以爲推布裹柑子事懼曰果爲所推及子布到驛長吏但序以布裹柑子爲敬子布初不之知久而方悟聞者莫不大笑方物略柑生果渠嘉等州結實埓于江南味亦差薄贊曰碧葉素葩厥包之珍丹衷既披香液飴津晉張載詩三巴黄甘瓜州素柰渴者所思銘之裳帶唐杜甫詩春日清江岸千柑二頃園青雲著葉密白雪避衣繁結子隨邊使開筒近至尊後於桃李熟終得獻金門薛濤酬郭簡州寄柑子詩霜規不讓黄金色圓質仍含御史香何處同聲情最異臨川太守謝家郎宋䕫守王十朋謝趙果州元旦遺黄柑金泉酒詩曰元日書來自果州柑三百顆酒新篘賢於齊下六從事好似平陽千户侯老矣惟思醉鄉去歸與且種木奴休使君厚意吾先辱媿乏瓊瑤報所投史記蜀漢江陵千樹橘其人與千户侯等蜀都賦户有橘柚之園注大曰柚小曰橘犍爲南安縣出地理記曰蜀郡嚴道巴東郡朐䏰魚復二縣出橘有橘官傅巽七誨有巫山朱橘周李元操園中雜詠橘詩曰嘉樹出巫隂分根徙上林白華如霰雪朱實似懸金布影臨丹地飛香度玉岑自有凌冬質能守歲寒心文選盧橘夏熟郭璞註曰今蜀中有給客橙似橘而非若柚而芬香冬夏華實相繼或如彈丸或如拳通歲食之即盧橘也蜀中廣記卷六十一
