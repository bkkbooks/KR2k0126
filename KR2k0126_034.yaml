body:
  text: 蜀中廣記卷三十四明曹學佺撰邊防記第四上川南道建昌道開府建昌衛轄行都司三員一署篆一操練一屯局近改屯局為逰擊將軍守備二員一駐鎭西所一駐雅州所近又増設㑹鹽守備一員領衛六曰建昌曰建昌前衛同一治曰㑹川曰鹽井曰越嶲曰寧畨自為治建昌衛本漢卭都國地漢武元封六年以廣漢之西部蜀郡之南部為越嶲郡即此水經注曰嶲山有嶲水言越此水以章休盛也王莽改為集嶲矣嶲水即繩若水似隨水地而更名焉郡領卭都蘓祁闡臺登㑹無大笮定笮三絳卑水安上馬湖十一縣或治卭都或治㑹無遷徙不常十道志云魏晉以還蠻獠恃險鈔竊乍服乍叛至齊復來納欵因為嶲越獠郡以統之按總志作㺐郡即獠也是蜀音之訛㺐種每三年一櫛髮其日宰牛羊以祭天及祖父始加梳世俗㺐頭之説本此寰宇記後周武帝征越嶲開地立嚴州取其嚴敬為稱隋開皇四年改為西寧州又改嶲州唐武徳初嶲州領越嶲卭部可天蘓祁臺登五縣二年又置昆明縣三年置總管府貞觀二年割雅州陽山漢源二縣來屬八年又置和集縣天寶元年改越嶲郡依舊都督府乾元元年復為嶲州至徳後没入畨貞元十二年復太和中徙治臺登縣按漢臺登在今治北百里外隋臺登在大渡河北未詳孰是總志唐懿宗時郡為蒙詔所據改曰建昌府以烏白二蠻實之元至元間置建昌路又立羅羅斯宣慰司以統之國朝洪武間克元將伊嚕特穆爾賈哈喇因罷宣慰司置建昌衛改建昌路為府旋廢改衛為軍民指揮使司編戸通計六十七里其形勝金沙江畫前大渡河界後牛欄江鎮左打沖河禦右其幅員東西廣五百五十里南北袤九百二十里東至烏蒙府界五百里西至常郎堡生吐蕃界五十里南至雲南武定府界七百八十里北至寧畨衛百九十里至越嶲衛二百八十里至鹽井衛三百里至㑹川衛五百里至省城千四百八十里九州要記云嶲之西有文夷人身青而有文如龍鱗於臂脛之間將婚㑹於路歌謡相感合以為夫婦焉又有穿鼻儋耳種瘴氣有聲著人人死著木木折號曰鬼巢也有濮夷在郡界千里常居木上作屋有尾長二寸若損尾立死若欲地上居則預穿穴以安尾亦名尾濮有木耳夷死積薪燒之煙正則大殺牛羊相賀以作樂若遇風煙旁散乃大悲哭本志云東門十部蠻羣居竹籬板舎不事修飾刻木為信裙不過脛或時乗馬則併坐横足酋長死無子則妻女繼之俗尚火葬而樂送以鼓吹為送終有疾者不用醫藥召女巫以雞骨卜事無巨細皆決之巫善製堅盾利刀又能作弩置毒其末沾血則立斃矣上南志云建昌城外二河曰懷逺曰寧逺俱流入瀘水以合金沙江濾水在治南十里外有光福寺舊瀘山寺也元史云其水深廣而多瘴鮮有人行春夏常熱可燖雞豚然諸葛武侯渡處尚在下流與㑹川衛相近志云海子在城東十五里人多游汎其中又東南十五里曰螺髻山以形似名東百三十里曰涼山羣峰競爽四時皆寒近松坪膩乃之界按漢置越嶲郡所領縣十一曰卭都曰闡今越嶲及卭部長官司是曰定笮今之鹽井曰㑹無今之㑹川曰蘓示今之禮州曰大笮今之黎州曰馬湖今之馬湖府曰臺登解已見前曰三綘今屬雲南惟安上縣有水路諸葛武侯由之入越嶲者别將高定元自卑水多為壘守焉孟康註卑水曰班水華陽國志以為或去郡三百里或去郡八百里俱晉時省有名而已是在道將已失攷矣志又云治南一百八十步有徳昌舊府三十里有武侯故城東一里有永定舊州二里有孟獲城東三百里有元時北社縣國初改為碧社東四百里有元時中縣其先曰中州也土夷攷云元至正間置建昌路以其地為建安州𨽻雲南行中書省洪武四年鎭國上將軍羅羅斯宣慰使安普卜之孫配率衆歸附遂命以招安旁夷有功授昭勇將軍子孫世襲尋改授土指揮使帶銜建昌衛不給符印置院於城東郭外里許使居之所屬有四十八馬站火頭吐蕃僰人子伯夷摩些狢􅢱猓玀囬紇諸部各種類散居山谷間北至大渡南及金沙東抵烏蒙西訖鹽井延袤殆千餘里昌普濟威龍三州長官司𨽻之有把事四人世轄其衆皆節制於閫衛諸帥西夷大酋此殆為稱首云配六世孫安忠無後妻鳯氏管事鳯氏死族人安登繼襲復無子妻瞿氏管事以族人世隆嗣世隆復無子繼妻禄氏管事近日禄氏死以族姪安崇業嗣所轄有四驛曰禄馬阿用白水瀘沽各以百里為差併涼山拖郎桐槽熱水等夷亦皆以强弱為向背矣按禄氏與崇業不相能者十數載又養那故為假子其惡奴禄祈從臾之甚力嵗相讐殺無寧宇予以庚戌署司事移㑹該道悉心調停稍就約束因看得夫亡妻繼固諸夷家風也然亦有説焉藉令禄氏者黨逆奴養假子而謀絶安嗣禍之不悔日相尋于干戈其誰能許之今那故殺矣禄祈逐矣安崇業嗣定矣是於復仇之義得而姑姪子母之分明也如此即順夷猓之情奉鈐束之誡其于理法亦未嘗廢也崇業父子承宗祧以他日修職業于兹時如山之固豈俟河之清乎時崇業管土操捕聽繼不久即眞長官司矣禮州千户所二曰後曰中在衛北六十里漢之蘓示縣也顔師古曰示讀如祗後漢書永平中越嶲太守巴郡張翕政化清平得夷人和在郡十七年卒夷人愛慕如喪父母蘓祈叟二百餘人齎牛羊送喪至翕本縣安漢起墳祭祀即此夷也華陽國志漢末蘓示縣夷王及弟隗渠數背叛安南將軍馬忠誘殺之周地圖經云武帝天和三年開越嶲立蘓祁縣於縣置亮善郡志謂隋名蘓祗唐名蘓祈皆一義也唐末吐蕃烏白蠻迭據其地號龍麽城元置禮州今為二所因其名應劭注漢書云蘓示縣西北有尼池按今曲池是也師古曰夷池尼古夷字寰宇記云尼池名本出山海經未詳打沖河千户所在衛西百四十里唐之沙野城元瀘州之地本名黒㑹江又名納夷江源出吐蕃流合金沙江徳昌千户所在衛南百四十里元置定昌路尋改徳昌本朝於此置所因其名昌州長官司在衛南二百里宋之阿屈部也至元中置昌州于此徳昌路總管府居其中洪武元年盧尼姑歸附貢馬使世襲昌州知州二十七年平伊嚕特穆爾之亂改長官司遇朝覲之嵗具所管夷民木册附進普濟州長官司在衛西南二百四十里本坪甸夷也後屬屈部獹魯世居之元置普濟州於此國朝洪武十八年土官吉撤加歸附賜給印勅授普濟州知州後改為長官司威龍州長官司衛東南四百一十里夷名巴率有三部至元中併三部置威龍州屬徳昌路洪武初土官白氏來貢給授印勅世襲與昌州普濟同惟所認糧差多逋負不及二司如約耳上南志云大渡河入雲南之驛途夷名巴翠部又名沙媧部其酋獹荒種也九種志云狢􅢱之人身體矮小居山野草房男女俱用白布纒頭身穿短衣常帶弓弩捕䑕開種雜糧為生病以牛羊猪胎為藥婚姻酒食類西畨喪葬類猓玀獨於燒骸處拔一草根頓小籃内回家以宗祖云㑹川衛上南志云㑹川在漢風琶之蠻臺登之墅而越嶲郡之㑹無縣也寰宇記云㑹川縣本漢卭都縣地唐上元二年移卭都縣於㑹川鎭城内安置以川原並㑹故名南詔得之置㑹川都督府號清寧郡宋時屬大理為㑹川府元置㑹川路治武安州𨽻羅羅所宣慰司國初復立㑹川府領武安永昌麻龍等州尋改為㑹川衛軍民指揮使司領迷易千戸所城週千二百五丈有竒編戸十八里志云武安舊州在衛南十里永昌舊州在衛西五里即㑹同府也麻龍舊州在衛東五十里地名綽羅能元時屬閟畔部東南百里外又有舊通安州舊姜州舊隆州俱元時置華陽國志㑹無縣山色青碧故其東南葛砧蜜勒諸山或産石碌有三色或産石青有四色或産鑛銀志云治内寶藏寺落成未牓而宻勒山銀場始出因以寶藏為名又有勝功寺金碧交輝邊隅之望刹也寰宇記㑹川縣南有大冢諸葛武侯駐師此地士卒多癘疫死設此葬之㑹無川傍川上有深巖巖中多仙人葬莫測其來逺望如牕牖其棺内多碧骨如珠華陽國志㑹無縣路通寧州渡瀘得住狼縣故濮人邑也今有濮人冢冢不閉户其穴多有碧珠人不可取取之不祥本志云衛城東有𤣥泉色近黒民賴以灌田常以仲春月祀之十道記云瀘水出蕃中入黔府歴郡界出拓州至此有瀘津闗闗上有石岸高三千丈四時多瘴氣四五月間發人衝之死故武侯以夏渡為艱水浚急而多巉石土人以牛皮為船方涉津涘水經註云瀘峰最為高秀孤高二千餘丈是山於晉泰康中崩震動郡邑水之左右馬步之徑裁通而特有瘴氣又云晉明帝太寧二年李驤等侵越嶲攻臺登縣寧州刺史王遜遣將軍姚岳擊之戰于堂琅驤軍大敗岳追之至瀘水越水死者千餘人遜以岳等不窮追怒甚髮上衝冠帢裂而卒矣志云㑹川南八十里瀘沽河源出少相公嶺入金沙江又云西南二百五十里金沙江源出吐蕃東流合瀘水至黎溪接馬湖江有嵐瘴隆冬人過雖袒禓皆流汗惟雨中及夜渡無害夾岸皆石江中沙土色黄故曰金一在武定之南一在桃安之左容齋隨筆云淳化間嘉州士人辛怡顯使南詔至姚州其節度使趙公美以書來迎云當境有濾水昔諸葛武侯戒曰非貢獻征討不得渡此水若必欲過須致祭然後登舟今遣本部軍將賞金龍二條金錢三十文並設酒酺請先祭享而後渡焉華陽國志三縫縣一名小㑹無音三播通道寧州渡濾得蜻蛉縣有長谷石時坪中有石豬子母數千頭長老傳言夷昔牧豬於此一朝豬化為石迄今夷不敢牧於此水經注曰蜻蛉水又東注于繩水繩水又逕三縫縣西又逕姑復縣北對三縫縣淹水注之三縫小㑹無也故經曰淹至㑹無注若水水逕㑹無縣縣有駿馬河水出縣東高山山有天馬徑厥跡存焉民家馬牧之山下或産駿駒言是天馬子河中有貝子胎銅以羊祠之則可取也按後漢書安帝紀曰永初六年詔越嶲郡置長利高望始昌三苑皆馬苑矣又令益州郡置萬嵗苑犍為郡置漢平苑云迷易千户所在衛西北八十里元置國初為㑹川千戸所洪武十五年改今名衛志云南六十里有迷郎闗即寰宇記之迷水鎭也有滇池方三百里源深濶下流淺狹有似倒流故名滇池矣土夷考曰迷易土官賢姓也初雲南景東府僰夷頭目阿駭徙其屬來住種洪武十六年歸附以隨征東川芒部二府効勞授世襲副千户該所印信以武弁推選今土官賢氏居城外專理巡捕管束八百戸僰夷而已土夷考云㑹川衛東南十里為石㜑堡又四十里為虎街堡四十里為姜州堡㑹鹽守備司駐劄其中衛西南三十里為箐山口又八十里為火燒腰驛去驛五里為五里坡又十五里為蜜即闗路通紅卜苴夷寨五十里為七墩堡路通黎溪州夷寨按志黎溪舊州在衛南百五十里唐時南詔閣羅鳯徙白蠻戍此即白夷也城後為羅羅蠻所據宋屬大理元始置州九種志云白夷人頭裹黒帕戴笋籜尖帽以傭田為生婦女養蠶收絲織作亦巧謂之白夷錦無論貴賤人有數妻妻妾奉夫甚嚴婦女不妬忌夫宿妻房妻事之如婢飲食凡草木無毒者六畜外鼠蛇蛙蠅及飛生蟲皆㵸食之諺云青青白夷菜動動白夷肉婚姻男家先用碗水澆女足謂之水授婦戰陣所獲謂之王旗婦初生小兒即抱於河中洗之男女日日浴於河中居多近水束裝日如逺行故遷徙無定焉死有棺槨葬埋名墳曰罷休又有一種撲厮夜變為鬼盜人財物及掘新墳尸咒使變魚形市之志云黎溪驛北有荷花池盛夏香來可以辟瘴為夷方勝處驛去七墩十五里又八十里為塔甲渡巡檢司又四十里為松坪闗闗近滇境上金沙江去松坪闗可三十里云鹽井衛治在建昌西三百里城週六百五十丈編戸二十六古定筰縣也華陽國志云筰笮夷也南中曰昆明越嶲曰笮皆一種也縣在越嶲郡西渡渡水賔剛徼曰麽沙夷志謂麽㱔人病則刺肉取血有誓則擊石或撻狗者也寰宇記曰昆明縣本漢定筰縣也唐武徳二年於此置昆明縣盖以南接昆明夷為名天寶中又置昆明軍以鎭撫之通志云唐末南詔得嶲以昆明縣為香城郡宋時為賀頭甸部屬大理國元至元中於黒白鹽井置閏鹽縣又於此置栢興府𨽻羅羅斯宣慰司國初改栢興千戸所旋改今衛又於二井置鹽課司司在治東華陽國志定筰有鹽池積薪以齊水灌而後焚之成鹽漢末夷皆錮之張嶷為太守往争夷帥岑槃木明不肯服嶷擒撻殺之後賞賜餘類皆安官迄有之寰宇記云定笮民取井水先積薪以火燒過以水澆灰即成黒鹽煉之縣又有鐡石山山有砮石火燒之成鐡為劒㦸極剛利此在衛西北七十里矣志云衛南十里栢林山山多松栢其緑㕘天栢興府之名取此西三十里有斛僰和山産金為利竇掲勒蠻所居隋唐之世于此置金州焉土夷考云鹽井之沙坪驛在瀘河西去建昌僅四十里又十五里為紙房堡十里為瀘州治所也河東之高山堡路通馬者馬羅諸夷去高山二十里為沙坪堡通麻科七村牙礦諸夷又十里為徳力堡通禄馬禄曹諸夷又十里為河口驛即打沖河也去驛三里河東為中前所河西為中左所上南志曰衛東北百八十里打沖河索橋兩山壁立水勢汹湧狼牙相拒舟楫不通橋兩崖用大石堆砌樹洞門二座每洞樹將軍柱一百八根洞門外立井口大柱四根上穿篾纜十八條繫於將軍柱上纜上鋪板三十六逗兩旁用小纜掛繫如槽横亘四十二丈邊陲之天險也莊安世渡瀘初畧曰鹽井城池頽壞已久軍民逃散日甚一日今高山箐口之墟人跡跫然衙驛倉庫鞠為荒草推原其故盖由索橋之險難通糧運不及是以皆轉徙而之河西矣迄今聚為室家享成世業計屯田千二百一十八分有竒而附城之屯所出不過荳麥而已瀘州一帶駝運入鹽井必經索橋約路二百八十餘里又夷人阿遮與切兒卜搆禍以來仇殺無虚日不為淵敺魚耶土夷考云去打沖河二十里為梅子堡通禄馬禄曹諸寨又十里為禄馬堡十里為紹興堡又五里為平川驛五里為杭州堡又十里為雙橋堡十里為上功堡又十里為馬蝗堡十里為新添堡又十里為鴛鴦堡十里為涼山堡又十里為高山堡十里為箐口堡又十里則衛治也内有鹽井驛自衛至雲南永寧府界七百八十里麗江府界五百里馬剌長官司在衛南三百里元之落蘭部也其村落多白夷居之鹽井志云白夷之近漢者能知天變遇日月食少長男女爭擊箕杵盆勺成聲仰天拜懇婚姻潑水為媒証産子三日則浴之河死用塊葬名罷休老人婦人穿無摺桶裙謂脂粉為解老又能種綿養蠶以織染為五色絲絨提機作花每段寛尺餘長二丈一尺粗者為錦細者為土夷考曰馬剌又名瓦剌土官姓阿氏國初歸附授職世官舊部落仍俾統管賦本衛秋糧百二十石其地接壤雲南北勝州稱寛饒庶富人亦優馴打沖河守禦千戸所洪武立中左一所今分為五在衛北百六十里唐為沙野城今沙平遞運所其舊址也元為建昌路瀘州之地左所土千户姓剌洪武二十五年征伊嚕特穆爾賈哈喇土人剌他効順來歸其子剌馬非復貢馬赴京授本所副千户永樂十一年陞正以别于四所地與麗江永寧二府為隣麗江土官木氏每來侵之土地夷民失其半右所土千户姓八先年與各所同進馬後議留馬協濟驛遞免貢中所土千户姓剌前所土千户姓阿後所土千户姓卜已上五所俱土著人以國初歸附授官貢馬事例皆同但與麗江接壤為所蠶食不克自振惟日事强免害而已越嶲衛卭都長官司附志云漢卭都及闡二縣地也卭都即當衛治闡縣即卭部長官治在建昌北二百八十里石城週二百九十丈不及四里治北半舎外有舊城寰宇記所謂奴諾城諸葛武侯征蠻所築憩軍之所以奴諾川為名矣其界東至馬湖沐川司南至寧畨小相公嶺西至喇八闗外北至大渡河南岸高山峻嶺居十之九地土瘠薄不産五糓惟畜養牛馬射獵以供饔飱唐書云卭部於諸蠻中最驕悍狡譎招集畨漢亡命侵攘他種閉其道以專利曰大雲南蠻曰小雲南蠻續博物志云蜀蠻卭部川都王蒙備死氣未絶其妻子以錦數疋相續繫死者曳之於地置十數里外高山上令氣絶乃復以錦被裹而埋之㑹其族哭焉名作鬼親守近州蠻人説其事後漢書西南夷傳自滇以北君長十數卭都最大武帝初置卭都縣無㡬而地陷為汙澤因名為卭池南人以為卭河註云卭池在越嶲縣東南寰宇記云隋開皇六年置越嶲縣于此屬西寧州後改屬嶲州李膺益州記云卭都縣下有一老姥家貧孤獨每食輒有戴角小蛇在牀間姥憐而飴之後稍長至丈餘令有駿馬為蛇吸殺因責姥出蛇姥云在牀下令即掘地深無所見益遷怒殺姥蛇乃感人以靈言令何殺我母當為報讐此後每夜輒聞雷風四十許日百姓相見感驚語汝頭那忽戴魚是夜方四十里與城一時俱陷為湖土人謂之為陷河惟姥宅無恙迄今猶存漁人採捕必依止宿每有風浪輒居宅側恬靜無佗風靜水清猶見城郭樓櫓宛然按國朝嘉靖十五年二月二十八日丑時建昌寧畨二衛地震如雷吼者數陣司及二衛公署内外民居城垣一時皆塌壓死都指揮一人指揮二人千夫長四人百夫長一人所鎮撫一人吏三人士夫一人大學生一人土官土婦各一人軍民夷獠不計水湧地裂陷下三四尺衛城内外若浮塊而已震至次月初六猶不休陷河之説殆是實然衛南有羅羅河東流與大渡河合衛北魚洞河源出吐蕃又流與羅羅河合按南中八部志卭都縣東南數里有河縱廣二百里深百餘丈河中魚長一二丈頭特大遙視之如戴鐡釡即魚洞河也或云即是陷河志又云南十五里金馬山文昌帝君降生地有祠焉即化書所稱誕於越嶲之間矣南四十里小相公嶺石磴﨑嶇自麓至頂十五里武侯所開也志又云西五十餘里大雪山四時積雪與小相公嶺接夷名阿露山北三十里石嵓洞中可容十餘人南北厓傍有石版扣之有聲鏗然謂之瓊鐘寰宇記云卭部縣本漢闡縣漢書闡作闌師古註音蘭周武帝天和三年置卭部郡于此隋開皇三年罷郡改為縣仍帶卭部鎮唐書至徳初南詔陷嶲州勿鄧兩林蠻遂羈屬土蕃貞元中復納欵以勿鄧鬼主苴嵩兼卭部團練使封長川郡公而兩林都大鬼主苴那時遣韋臯書乞兵攻吐蕃臯遣將劉朝彩等持兵應之大破吐蕃于北谷詔封苴那時為順政郡王苴夢衝為懷化郡王已而夢衝復附吐蕃臯召至琵琶川斬之元宗天寶初卭部都鬼主阿伏常遣子入貢通志云元初置卭部安撫招討司已改卭部州國初嶺眞伯歸附尚稱招討使於是以為卭部軍民州永樂中改長官司使嶺氏世守之屬越嶲衛土夷考云萬厯初年土官嶺栢死孽子應昇負印去栢庶沙氏爭之不得逆酋阿堆等擁沙氏焚利濟站廬舎擁兵臨城總戎劉顯詣彼勘處沙氏悔禍殺阿堆等自續顯遂以印歸之後沙氏淫於族人阿祭負印去祭死其子嶺鳯起嗾他畨刺殺應昇當事者因平蠻之師誘鳯起縶之收其印而誅行刺者百餘人印無所歸緘而置之庫中所部夷無統肆行為盜乙酉丙戌間黒骨夷阿弓等手刃送哨官於小相公嶺刳其腸而普雄酋姑咱等乘勢蜂起郵傳告絶逺近震恐嵗丁亥動大兵斬馘千數道路始通鳯起旋亦病亡其東近峨眉者數百家相率歸附因置平夷歸化二堡以居焉詳見峨眉三枝爪下他部落乃奉應昇妻李氏為主嵗時起居不絶而玀鐡口普雄三村最桀驁茍駕馭得宜亦足藉其死力以捍野外生畨也土夷考又云大渡河南岸為臨河堡與河北羊肆崖漢水口相對堡之上通大小沖山及海腦壩僰夷村舊僰人聚落也九種志云僰人重儒敬佛居傍城郭與漢人無異相見之禮惟長跪不拜亦有讀書入學者臨河堡之下通鬼皮羅黒麻溪片馬厰諸夷山徑峻絶通望山在其處寰宇記黎州通望軍在大渡河南三十里唐至徳元年在通望山下山自河南與朝陽衆山相連入嶲州界過臨河十里為鎭蠻堡又名大樹堡在兩山峽口北臨大渡河與河北羊腦山相望為大小沖蕃往來之所五里為火燒營五里為李子坪七里至曬經闗志云闗在越嶲衛東三百里高嶺山闗傍廣石即三藏法師晒經處未詳又十里至白馬堡為玀鐡口諸蕃市易處十里至河南驛八里至八里堡路通草八拍橋普馬等寨又十里即平夷堡也在高山峽内路通笋坑紅水黒麻等寨十二里至古隘堡路通那歴洗馬姑乃易集戸水八拍等寨其南隘廣不盈丈兩岸壁立千仞峽内水淙淙奔流即韋臯所置清溪闗也詳見黎州唐琉璃仗義二城俱在其處二十里至平壩堡輶軒于此設食焉有古隘口路通泥水二十户等寨與煖歹諸夷相隣又十里至鎭逺堡東連煖歹椒園燕子窩諸夷西通洗馬姑赤利草必落等寨又十里為鎭夷堡在高山稍平坦處又十五里即鎭西千户所鎭西所寧越守備駐此城城負高阜南臨深坎西通竹麻哨阿迷羅等寨東通煖歹爪羅米頗柯羅回諸夷屹然一要害去所五里為海棠闗又十里為鎭西驛又十五里為清水堡東通戴羅白石乾溝西抵竹麻洗馬姑等畨有兵戍之又二十里為葉堡在峽内平地亦於此飭厨傳焉又十五里為梅子堡路通蠟梅得那補蝦蟆窩等夷焚刼無虚日二十里為利濟驛十五里為青岡闗闗北通兒姑青岡南通廣洪魚洞諸寨越嶲之門戸也魚洞者水入魚洞河矣又十五里通濟堡在嶲水西岸十里為越嶲衛衛在嶲水西廣平之地羣山環遶西通羊圏托鳥雪山東通普雄大小赤口馬湖諸夷卭部長官司舊設治東屬其提調去衛十五里有龍泉山寰宇記云要衝城下有龍泉水出龍泉山也下為龍泉驛又十五里為炒米闗在高山峽内闗即韋臯所築要衝城矣有鎭雄堡者去道五里而近路通普雄兩河口等處十里為通相堡一名小哨十五里為長老坪在小相嶺之北西通羊圏托烏東通普雄黒骨頭諸夷又十里為相嶺闗闗設在小相嶺絶頂又十里為靖邊堡在相嶺南通寧畨衛界三渡水外生畨東通桐槽那沈喳等夷過此有新添九盤白石登相四堡共四十五里以備行者又十里為雙橋堡十里為猓玀闗舊為玀猓窟穴也九種志云玀㺐人性最惡刻木為信男子摘鬚腰繫皮繩名饑飽索以帕裹頭夜不解刀居山頂以板盖屋刀耕火種性喜獵凡有事以艾炙羊膀骨占吉凶出入必以兇器男女紐髮盤頭上下身衣土綉花長衣赤脚無履外披細褶氊衫為上盖饑食蕎麥餅婚姻以牛羊馬禮酒席鋪松毛於地盤脚坐松上男女分席殺牛羊剥皮猪用火燒半割碎和蒜菜謂之喫牲飲泡咂酒木碗木杓即其器皿食肉以竹簽為筯喪禮男女俱無棺槨富家以綿段纒之故謂之㺐郡又謂之羅羅也過闗五里為灣村又八里為巡哨堡地稍寛平又十里則寧畨衛之冕山闗矣寧畨衛元時於卭都之野立府名曰蘓州借蘓示之義以名之也國初土官怕兀它從伊嚕特穆爾為亂于是廢為衛降官為指揮環而居者皆西畨種故曰寧畨城週凡二千丈在建昌北百九十里東連越嶲界北至西天烏思藏西隣三渡月落口編戸僅四里有冕山鎭西禮州等四千戸所相鈐束焉渡瀘初畧曰舊額寧畨一衛為屯者凡九十有二今無一人存矣行數十里雞犬無聲人煙絶跡間有一二存者亦刀鋸之孑遺耳結草為衣虺羸一骨此其狀何可令人見者上南志曰衛南五里曰南山山勢屹然子午針也産白銅華陽國志卭都南山出銅即此志又云衛南三十里西山下響石長七尺濶三尺八寸厚三尺擊之聲如雲板志又云東百二十里有温泉四時皆煖可以療疾華陽國志卭都縣有温泉穴下流可治疾病餘多惡水水神䕶之不可汚穢及沈亂髮照面則使人被惡疾水經註云昔李驤敗李流於温水是也土夷攷云寧畨蠻兇獷强悍刀耕火種遷徙無常不以積藏為事上南志云西畨人身長大勇猛占住山頭性甚惡男子髪結成條面多垢積身帶兇器叛惡不常婦女髮亦結編懸帶珊瑚翠石為飾身著短衣盖以羊皮食以青稞磨麵作餅酥油煎茶為飯風俗女在父家為非無禁嫁後有犯夫永逐之所生男女亦棄去酒席泡咂酒殺牛羊肉食之病不服藥請畨僧誦經殺牛祈禳及死將生前所編氊喜鵲窠㡌弓刀裝歛盛以木桶於山嶺盖一小房停放封閉永不復觀土夷攷曰夷之錯居衛東南東北者頗馴擾惟西去月落三渡水妙竹等一十九寨恃其險隘常引水外生蕃不時入冦自萬厯丁亥建立定蕃堡募兵戍之稍歛跡不敢出没九盤白石瀘沽峽老君闗等舊稱險絶一夫荷鍤千騎辟易其間銅槽鐡厰諸夷尤肆其蜂蠆行者股栗焉冕山橋設千户所一冕山者山形如冕方山也在所西三里所去衛又百里元蘓州地我朝正統七年置以屬寧畨者土夷攷云冕山橋去冕山闗五里在孫水之滸橋因漢址而冠以今名焉按史記司馬相如定西南夷橋孫水顔師古曰于孫水上作橋也孫水源出于臺登俗謂之長河志云衛治東有長河南流㑹瀘水過建昌衛而入金沙江即孫水也冕山闗堡與建昌犬牙相錯建昌之瀘沽驛去冕山所六里與桐槽站同處驛屬建昌而供張騎乗則寧畨土官職也去桐槽八里為太平闗闗在孫水上有渡軍守之十里為鹽井哨路通東山鐡厰軍民雜聚治鑄之所又去建昌之瀘沽闗即瀘沽峽兩山壁立峽深百餘丈濶不盈尋孫水流其中淙淙有聲人行東山嶺上俯視魂搖南北長五里中有觀音巖老君闗棧道危峻設瀘沽巡檢司於瀘河東去巡司五里為鎭夷堡過此歴五十里為平蠻松林深溝龍溪平哨之名又十里則建昌衛之禮州城矣城在瀘河東自禮州行四十里歴安寧北哨青山理經四堡又十里至建昌衛衛在山麓瀘川驛在城西磘山堡在城南十里濾水之上禄馬驛在瀘水北去建昌城兩舎自禄馬東南行歴巴西鹿角凹腦者者黄泥什結諸舖至阿用驛凡一百二十里自阿用至白水站八十里中隔半站營金川堡焉自白水三十里至可郎舗係威龍州地夷猓出没之鄉又二十里為公母石志云兩石相隨人或分之明日復合土人呼為公母石猶言翁姥也又五里為甸沙闗建㑹二衛分界處北接威龍司南近迷易所東連普雄法果等夷又二十里為麽些塘舊麽些夷之壘也上南志云麽些人身長色黒男子髮扭成索白手巾纒頭身著短衣足穿皮鞋身垢不洗常帶兇器内著黒大編氊外披衣甲畜犏牛山羊以艾炙羊骨占婦女紐髮細編短衣赤脚内披短氊尚以羊皮青稞蕎麵乳餅酥油煎茶充饑病不服藥殺猪羊祭鬼求安婚姻亦以牛羊為禮喪葬不用棺槨將猪取去腸肚帶毛用物壓匾名曰猪脿用綾段布疋裹屍同用柴燒化取頂骨并手足四肢掛懸崖絶頂上後三年殺馬延畨僧作佛事盡將骨棄去志云冷水溝夷門木术界在甸沙麽㱔之中時為道路梗又十里為巴松驛又二十里為分水嶺二十里為火燒舗又十里為虎頭闗十里為虎頭舗俱威龍夷之區又十里為周官嘴十里為大龍驛又五里為寒婆營寒婆營乃接鎭西所矣此二十餘里有路通麻龍仲村捲卜法果等夷不時為患萬厯壬子嵗建南告急正值開科當事者䇿諸生而予代為之答曰夫建南者非漢所稱西南夷而唐所稱六詔之屬者哉至我明來部落散處君長不齊約其九種可得而言曰一僰人二猓玀三白夷四西蕃五麽些六狢􅢱七青海八回子九漁人是也而猓玀最猙獰邇時習為邊患矣執事以戰守剿撫機宜下問欲得一當而計安萬全甚盛心也某不敢以臆對語云前事之不㤀後事之師也請遡其開閉之因叛服之狀而後計有以處之者乎粤自洪荒入秦西南夷未常與中國通也通西南夷由漢武帝始武帝之遣唐蒙也從笮闗入見夜郎侯諭以威徳約為置吏其意在渡䍧柯江出竒以制東越耳治道無成巴蜀震驚乃用司馬相如諭告之非上意是時卭笮君長聞南夷得賞賜多欲請吏上問相如相如曰卭笮冉駹近蜀易通置為郡縣愈於南夷于是以卭都為越嶲郡笮都為沈黎郡而除邊益斥矣此開之之始也蜀漢建興之嵗昭烈殂殞益州郡耆帥雍闓等縳太守張裔與吳遣孟獲誘扇諸夷越嶲夷王高定等皆叛應闓諸葛武侯以新遭大喪撫而不討務農積糓閉闗息民民安食足而後用之及將南征參軍馬謖曰南中險逺不服久矣雖今日破之明日復反今公方傾國北伐以事强賊彼窺吾勢内虚而叛亦速若殄盡遺類以除後患恐非仁者之情且又不可倉卒也夫用兵之道攻心為上攻城為下心戰為上兵戰為下願公服其心而已武侯卒用其䇿生擒孟獲使觀營陣之間獲曰向者不知虚實故敗今祗如此即易勝耳乃七縱七擒之獲始拜曰公天威也南人不復反矣侯即其渠率而用之或以為諫侯曰若留外人則當留兵兵留則無所食又夷累有廢殺之罪自嫌釁重若留外人終不能信皆不易也今吾欲使不留兵不糧運而綱紀粗定夷漢粗安故耳于是悉收其豪傑孟獲等為官屬出其金銀丹漆耕牛戰馬以給軍國之用終侯之世夷不復反此撫而剿𠞰而撫之之術也唐開元之嵗南詔强大五詔微弱乃賂王昱求合六詔為一朝廷許之於是以兵威脅郡蠻連擊破吐蕃横行邊郡而鮮于仲通有西瀰河之敗李宓有太和城之敗至全軍皆没令彼築京觀焉而陷越嶲據清溪闗駸駸及瀘水矣韋臯乃屯重兵于嶲州扼西瀘路是時南詔異牟尋欲誘之先攻東蠻臯不可曰嶲州賔往來道扞蔽數州賊百計窺故嚴兵以守之彼東蠻者敢懷貳乎大厯之嵗吐蕃南詔合入寇悉衆二十萬三道而趨曰吾欲取蜀以為東府乃遣神䇿將李晟發邠隴范陽兵亦以三道而環救之晟追擊大破之于大渡河外吐蕃南詔士卒饑寒殞于崖谷死者不勝計吐蕃悔怒殺誘導使之人而南詔始請内附矣臯奏宜招納之以離吐蕃之黨復與異牟尋約築大城于境上置戍相保永同一家出朝廷所賜器物笛工歌女命之曰當子子孫孫盡忠于唐此守而戰戰而復守之之䇿也宋太祖平蜀之後取地圖觀之乃以玉斧畫大渡河曰與夷為界凡我疆吏固守封圻而已此閉之之始也元以蒙古為驅除難建昌㑹同置府卭部栢興置州若内地然至我太祖混一宇内神武不殺其大無外普氏倡之次爭歸順乃兼設夷漢之官並用文武之道為衛所者九為學校者三為長官司者四五而闗堡驛逓盖不啻棋布而星列矣此復開之之由也説者曰漢武帝窮邊極逺逞一時之侈心而基後世無窮之禍患為計失矣然風氣欲開則有以使之不得不開者固非其計失也又曰宋太祖重内輕外不欲以無益之地而損百姓有限之財力為計得矣然風氣閉則有以使之不得不閉者亦非其計得也説者曰今之世患無武侯耳使有侯者出七縱七擒天威所懾北面稽首終身不敢貳然未及十年而夷帥劉胄叛矣至于延熙則太守張嶷始復平定越嶲郡矣安見其兢兢于侯之盟誓約束也又曰今之世患無韋臯李晟耳使有韋李者出提兵轉戰數千里斬首數萬馘斷吐蕃之臂而臣服南詔如指掌然然未及數年益州永昌蜀郡諸夷皆應越嶲叛矣太和咸通之嵗則南詔且再入成都矣又安見其惴惴于昔之救死扶傷也大抵犬羊之性嗜殺而少仁好譎而無信以戰爭為日用以掠刼為耕作其始而請置吏也貪賂耳其有時而乍降服也畏威耳是故或窺中國之虚焉而叛或恃部落之强焉而叛或拊之因循也而叛或責之嚴急也而叛或被人誘使之而叛或自已讐殺而叛或見可欲也而叛或修復舊怨而叛曷嘗有數十年耕鑿山谷間嬉嬉以逰與邊陲共保安靜而無事哉我明開國不煩一鏃之矢一介之使與夫錙銖尺寸之金帛而望風輸誠請為臣妾得報可而拜一官爵攜印綬以誇示于族類保守其封疆以比諸漢宋之為開而黷武閉而損威或致勞民傷財之怨與夫失地退守之辱者其得其失為何如也國初至今二百五十年所矣在寧畨有土酋怕兀他從月魯帖木兒之亂而總兵徐凱定之在越嶲有土官嶺鳯起及黒骨夷阿弓凹乞之亂而總兵劉顯定之所聞大征不過此兩者其他畫地而守聚族而居納租税飭郵傳未嘗輒敢尤而效之夫以將不必忠武南康神䇿也以戰不必七縱七擒殺獲數萬人之衆也而安堵之日多蠢動之日少以比諸唐蜀之今日服之明日復反長吏遭執縛之慘内地受剥膚之虞者其久其暫又為何如也獨此數年間漸不馴于漢法而勾引乎生蕃或跳梁于冕山所或嘯聚乎鄧家灣或利濟站之圍而觧散復合或梅子堡之役而殺戮相當近者南闗之烽火且逼近于大將軍鎭西之梗塞且垂涎乎大渡河亦可謂猖獗之甚滋蔓而難圖者矣以故羽書之告急無虚日孤軍之待援如湯火而煩下執事者憂也生請先言時勢之難易今昔之不同也而後及于剿撫戰守之機宜可乎何謂難夫蜀以國事付諸葛出將入相惟其任之調兵調食如出一手又且積蓄數年民豐用足而後及于師旅今不能也既當倉卒之時又多掣肘之患矣武侯征而服之用其豪帥出其軍資不留兵不糧運但使夷漢粗安專心北伐未嘗再一渡瀘今亦不能也軍民與之錯處行旅出于其途矣何謂易在唐之時六詔合而為一南詔又與吐蕃合而為一動輒數十萬衆勢若常山之蛇彼聲東以擊西我救此則失彼而今無是也南詔隷於滇中吐蕃隔乎松茂若風馬牛之不相及矣李晟之捷特將邠隴范陽兵五千直自卭崍闗追擊之于大渡河韋臯之捷先斷吐蕃為二且借資于異牟尋之兵五千而今無是也如雲之士卒在前天險之瀘河在後我操必勝之勢矣是故蜀漢之所易者而我之所難也李唐之所難者而我之所易也其時勢之不同如此以今日論之非戰不能解圍矣非𠞰不能以讋服矣以他日論之非撫不足為結局矣非守不足為長䇿矣然𠞰之與撫可互用也貴因乎時戰之與守必兼資也貴乗乎勢此固智者能言之耳而𠞰之首務在動兵曰鵰𠞰曰大征多寡則相懸矣其實有可以相通者何則漢河平之嵗西南夷嘗相攻矣遣太中大夫張匡持節往解之不從命乃刻木像漢使立道旁射之杜欽説大將軍王鳯曰蠻夷輕易漢使不憚國威恐議者巽耎復守和解則彼得收獵其衆狂犯守尉逺藏濕暑毒草之地雖有孫吳賁育若入水火往心焦没智勇無所施宜隂勅旁郡守尉練士馬大司農預召穀積要害處選任職太守往以秋涼時入誅其王侯尤不軌者而後可定諸葛武侯之南征也别遣馬忠伐䍧柯李恢向南中而後渡濾生虜孟獲是當其時雖無大征鵰剿之説然必練士馬積糧穀相時而入分道而進其功乃可成也盖非大征則兵食不能厚非鵰𠞰則智勇無所施愚所謂可相通而用者也而戰之先資在饋餉曰主餉曰客餉彼此易推諉矣其實為闕一不可者何則蜀建興之嵗都督張翼用法嚴激夷帥叛丞相亮以㕘軍馬忠代翼令還其人檄召謂翼宜速即罪翼曰吾臨戰塲代人未至當運糧積糓為滅賊之資豈可以黜退之故而廢公家之務乎于是統攝不懈代到乃發忠因其資破賊唐之舊制嵗杪運内粟以贍嶲州起嘉眉道陽山江而達渡乃分餉諸戍常以盛夏之地苦瘴毒輦夫多死後改命轉卭雅粟以十月為漕始先夏而至以佐陽山之運不涉炎月逺民乃安是當其時雖無主餉客餉之説然必自實于内接濟乎外有灌輸之功而無偏倚之患其戍始可飽也盖非主餉則恐道絶非客餉則恐中枯愚所謂實闕一不可者也撫之之説益州刺史張喬常用之矣越嶲夷封離反殺長吏焚掠百姓骸骨委積千里無人喬遣從事楊竦與戰斬首三萬餘級獲生口千五百人資財四千餘萬悉以賞將士封離等惶怖詣竦乞降竦厚加慰納其餘三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆減死由此觀之非誅渠帥之黠惡者與吏士之貪殘者不能聽吾撫也守之之道西川節度使李徳裕嘗用之矣朝廷命徳裕修清溪闗以斷南詔入冦之路徳裕曰通蠻細路至多不可塞惟重兵鎮守可保無虞但黎雅以來得萬人精加訓練則蠻不敢動矣乃請甲人于安定弓人河中弩人浙西器械犀利又率戸二百取一人習戰緩則農急則戰謂之雄邊子弟以制大渡河清溪闗之阻且謂傍人建言者盖由禍不在身望人責一狀留入堂案他日敗事不可令臣獨當國憲朝廷皆從其請徳裕乃練士卒葺堡障積糧儲以備邊蜀人粗安其後李師望請移理卭州于是聲勢不相及南詔復騷動遂入成都由此觀之非臨河之區為屯田之計不能壯吾守也或曰若子之説則師之不可已矣然兵非難而餉為難目前之餉固難久後之餉尤難若必増兵以守之則不㡬嵗嵗而増餉乎曰建南前者無兵也尺籍之士以五萬計不為不多矣一士一田無待取給于外矣今所存者不能十分之一士豈盡失伍乎田豈盡抛荒乎無乃强半實債帥之腹而入豪强之手乎亦無乃所以資冦兵而齎盜糧乎則簡稽而重訓練之胡可已也増募之兵以四千計亦不為少矣游擊材官各以若干隷之矣今用命者不能十分之一豈衆寡不敵乎豈前後牽掣乎無乃貪餌而動失虎豹在山之勢乎亦無乃望風而遁乏鷙鳥必擊之威乎是責成而嚴賞罰之胡可已也此在大渡河以南者言也河北富林至于黎州非所稱笮闗沈黎之地乎漢置兩部都尉一治旄牛主外羌一治青衣主漢民唐李賛皇實屯萬人于雅黎盖重之矣今僅僅一㳺戎提兵不滿五百且控制天全六畨地于河以外不暇指顧無乃太疎乎盖欲援建昌先問越嶲欲援越嶲先問黎州此必然之勢也文武將吏如閫司之簽書威茂之驗糧官皆高坐無事若加以職銜常駐此地練兵理餉造舟治具與雅黎分兩翼與越嶲相表裏有急赴援聲息易通一二日間羽檄竟達成都矣且二十年前全蜀無民兵也大征之後各以其州縣之繁簡為召募之相稱嵗約糜餉十數萬矣播之役割而代彼戍者盖三分之一今播享太平十餘年可分其半于黎成都之免戍西邊者移其戍于黎合之可得客兵三千矣而黎雅之地亦自有軍也自有屯也恐名存而實亡者亦不下于建南所以簡稽而訓練之責成而賞罰之者亦當以建南為例可得主兵數千矣又合而計之則贊皇之萬人其庶㡬乎雖然此善後之慮而永逺之圖也若夫目前將士已渡濾矣衝鋒陷敵之功非有投石超距之勇者不能搗巢入穴之險非其游兵間道之竒者不能總之與其以少而嘗敵也不如厚集于河南北之間與其驅市人而用之也不如預講乎坐作進止之法若夫見可而進相機而動雖呼吸不能喻其神煙雲不能喻其變矣豈搦三寸管作紙上陳言所能逆料哉蜀中廣記卷三十四
