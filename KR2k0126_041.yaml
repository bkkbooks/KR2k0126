body:
  text: 蜀中廣記卷四十一明曹學佺撰人物記第一川西道屬成都龍安二府周萇𢎞資中人事劉文公為其屬大夫孔子嘗問樂焉敬王元年王居狄泉謂之東王時南宫極震𢎞謂文公曰君其勉之先君之功可濟也周之亡也其三川震今西王之大臣亦震是天棄之矣東王必克初晉趙氏范氏不相能而范氏劉氏世為婚姻萇𢎞事劉文公故周與范氏二十八年趙鞅以為討於是周人殺𢎞以謝之藏其血於地三年化為碧按封禪書曰萇𢎞以方事周靈王時諸侯莫來朝周周力少𢎞乃明鬼神之事設射貍首貍首者諸侯之不來也𢎞乃依物怪欲以致之諸侯不從而晉人怒遂執殺萇𢎞西漢雍齒什邡人初從趙王後從楚王素窘辱髙祖晚乃從漢戰滎陽京索俱有大功而髙祖終憾之不置天下既平上大封功臣其未封者日夜爭功不決上在雒陽南宫從復道望見諸將往往相與沙中偶語上曰此何語留侯曰不知乎此謀反耳上曰天下屬安定何故反留侯曰陛下起布衣以此屬取天下今為天子而所封者皆蕭曹故人與所親愛所誅者皆生平仇怨今軍吏計功以天下不足遍封此輩畏陛下不能盡封又見疑平生過失故相聚謀反耳上乃憂曰為之奈何留侯曰上生平所愠羣臣所共知誰最甚者上曰莫如雍齒與我故怨又數窘辱我我欲殺之為其功多故不忍留侯曰今急封雍齒以示羣臣羣臣見雍齒封人人自堅矣上乃封雍齒什邡侯而急趣丞相御史大夫定功行封羣臣以什邡侯封賜宴罷酒皆喜曰雍齒尚侯我屬無患矣張寬字叔文成都人景帝時文翁為蜀郡守遣寬詣博士東受七經還以教授於是蜀學比齊魯武帝時寬從郊甘泉泰畤過橋見一女子裸浴川中乳長七尺帝使問之言後七車知我適得寬車對曰天有乳星主祭祀不齊潔則見女形帝乃感悟以為揚州刺史世稱為七車張嚴遵字君平綿竹人性至孝淡泊寡欲明經博古尤精於易文章𢎞贍以著述為事不就徴辟杜陵李强為益州刺史謂遵弟子揚雄曰吾真得君平矣雄曰君但可見不能屈也强不以為然至州修禮交遵遵始見之强服其清髙竟不敢屈遵隱於成都卜肆有問卜者即知其人心術之隱隨其所問引之忠孝仁義日閲得百錢足具朝暮餔即垂簾焚香靜坐注老子周易以此為常初博望侯張騫使大夏窮河源歸舟中載一大石以示君平君平咄嗟良久曰去年八月有客星犯牛女意者其君乎此織女支機石也博望侯曰然吾窮河源至一處見女子織錦丈夫牽牛吾問此何地女子答曰此非人間也何以到此因指一石曰吾以此石寄汝舟上汝還以問蜀人嚴君平必為汝道其詳君平曰吾怪去年客星入牛女乃汝乘槎已到日月之旁矣遂相與詫異人乃始知成都卜肆中者非常人也年九十卒揚雄稱之曰不慕夷即由矣不作茍見不治茍得久幽而不改其操雖隨和何以加諸司馬相如字長卿成都人少時好讀書學擊劒其親名之曰犬子讀藺相如傳慕其為人乃更名相如以資為郎事孝景帝為武騎常侍非其好也會景帝不好辭賦是時梁孝王來朝從游說之士齊人鄒陽淮隂枚乘吳莊忌之徒相如見而悅之因病免游梁梁孝王命與諸生同舍相如得與諸子居數嵗乃著子虛之賦孝王卒相如歸家貧無以自業素與臨卭令王吉善吉曰長卿久宦遊不遂而來過我於是相如往舍都亭臨卭令謬為恭敬日往朝相如相如初尚見之後稱病使使者謝吉吉乃愈益謹肅臨卭多富人而卓王孫至有家僮八百人程鄭至數百人二人乃相謂曰令有貴客為具召之并召令令既至卓氏客以百數至日中謁司馬長卿長卿謝病不能往臨卭令不敢嘗食自往迎相如相如不得已强往一坐盡傾酒酣臨卭令前奏琴曰竊聞長卿好之願以自娛相如辭謝鼓一再行是時卓王孫有女文君新寡好音故相如謬與令相重以琴心挑之相如之在臨卭從車騎雍容閒雅甚都及飲卓氏弄琴文君竊從戶牖窺之心恱而好之恐不得當也既罷酒相如乃使人厚賜文君侍者通殷勤文君夜亡奔相如相如乃與馳歸家徒四壁立卓王孫大怒曰女至不才我不忍殺不分一錢也或諫王孫王孫終不聽文君久在成都相如病甚文君曰長卿苐俱如臨卭從昆弟假貸猶足為生何至自苦如此相如與俱之臨卭盡賣其車騎買一酒舍酤酒而命文君當壚相如身著犢鼻褌與保傭雜作滌器於市中卓王孫聞而恥之為杜門不出昆弟諸公更為王孫言曰有一男兩女所不足者非財也今文君已失身於司馬長卿長卿故倦遊雖貧其人材足依也且又令客獨奈何相辱如此卓王孫不得已分與文君僮百人錢百萬及其嫁時衣被財物文君乃與相如歸成都買田宅為富人居久之蜀人楊得意為狗監侍上上讀子虛賦而善之曰朕不得與此人同時哉楊得意曰臣邑人司馬相如為此賦上驚乃召問相如相如曰有是然此乃諸侯之事未足觀也請為天子遊獵之賦上令尚書給筆札賦奏天子以為郎相如為郎數嵗㑹唐䝉使蜀言夜郎可通即發巴蜀吏卒千人通夜郎僰中又多為發轉漕萬餘人用軍興法誅其渠帥蜀民大驚恐上聞之使相如責唐䝉因諭告巴蜀民以非上意相如還報唐䝉已略通夜郎因通西南夷道䝉發巴蜀廣漢卒數萬人治道二嵗道不成士卒多物故費以巨萬計蜀民及漢用事者多言其不便是時卭笮之君長聞南夷與漢通得賞賜多多欲願為內臣妾請吏比南夷天子問相如相如曰卭笮冉駹近蜀道亦易通秦時常通為郡縣至漢興而罷今誠復通為置郡縣愈於南夷天子以為然乃拜相如為中郎將建節往副使王然於壼充國吕越人馳四乘之傳因巴蜀吏幣物以賂西南夷相如至蜀蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卭諸公皆因門下獻牛酒以交歡卓王孫喟然而嘆自以為得使女尚司馬長卿晚而厚分與其女財與男等司馬長卿使略定西南夷卭笮冉駹斯榆之君皆請為內臣除邊關邊關益斥西至沫若水南至牂牁為徼通靈山道橋孫水以通卭都還報天子天子大說後有人上書言相如出使時受金免官居嵗餘復召為郎相如口吃而善著書常有消渴疾自與卓氏婚饒於財故其仕宦未嘗肯與公卿國家之事每稱病閒居不慕官爵相如既病免家居茂陵天子曰司馬相如病甚可往從悉取其書於是使諫大夫所忠往而相如已死問其妻曰長卿固未嘗有書也時時著書人又取去然長卿未死時為一卷書曰有使者來以此奏之所忠得書奏於天子其書言封禪事天子異之相如卒後五嵗而封禪他所著若遺平陵侯書與五公子相難草木篇俱未之采采其尤著於公卿者王褒字子淵資中人宣帝時故事講論六藝羣書博盡竒異之好徴能為詞賦髙才如劉向張子僑華龍栁褒等待詔金馬門神爵五鳳之間天下殷富數有􅐃應上頗作歌欲興協律之事益州刺史王襄欲宣風化於衆庶聞褒有俊才請與相見使褒作中和樂職宣布詩選童子令依鹿鳴之聲習而歌之其時汜鄉侯何武等學成歌太學中轉而上聞宣帝召武等歌之皆賜帛謂曰此盛德之事吾何足以當之褒既為刺史作頌又為之傳益州刺史奏褒有軼才上乃徴褒既至詔為聖主得賢臣頌上命與張子僑併待詔金馬門數從至獵所所幸宫館輒為歌頌第其髙下以差賜帛議者多以為淫靡不急上曰不有博奕者乎為之猶賢乎已辭賦大者與古詩同義小者辨麗可喜尚有仁義諷諭鳥獸草木多聞之觀比之博奕逺矣頃之擢為諫大夫其後太子體不安苦忽忽善忘不樂詔使褒等皆之太子宫虞侍太子朝夕誦讀竒文及所自作疾平乃歸太子喜褒所造甘泉賦及洞簫頌諸篇命後宫貴人左右皆誦讀之後方士言益州有金馬碧雞之寶可祭祀而致也宣帝使褒往祠道病卒上閔惜之何武字君公郫人宣帝時天下和平瑞應屢至益州刺史使王褒頌漢德作為詩歌命諸童子共習歌之武與焉習成起至京師歌於太學上聞之召至宣室聽其歌大悅賜武等帛詣博士受業治易以射策甲科為郎與翟方進相友後又舉賢良方正對策為諫大夫厯揚州刺史奏劾長吏必先露章服罪即除之不服乃奏抵罪九江太守戴聖治行多不法武欲劾之聖懼自免後為博士毁武於朝廷武不校而聖子藏盜事發繫廬江聖自以子必死武平心決之得脫聖慙服武每奏事至京聖未嘗不造門謝恩初武為郡吏時太守何壽知武有宰相器甚厚之後壽為大司農其兄子為廬江長史時武奏事在京壽為具密召武弟顯及武故人酒酣以兄子示之曰廬江長史材能駑下不為何公識拔奈何顯等亟言之武曰刺史職在進善退惡不可有私也嵗終畢竟使廬江太守舉之而終不受親識居間也綏和元年始為御史大夫成帝改御史大夫為大司空以武為之封汜鄉侯食邑千戶武為人仁厚好進士奬拔人之善為楚內史厚二龔為沛郡守厚兩唐為司隸進辛慶忌此數人顯於世者何侯力也武為九卿時奏言宜置三公官乂與翟方進奏罷刺史更置州牧俱中時弊其功名比薛宣而才稍不及經術正直則過之武在朝不黨王氏與新都侯莽意相左平帝立誅董賢太后詔舉可大司馬者大司徒孔光以下皆舉莽而武獨舉左將軍公孫祿祿武嘗言外戚秉政幾危社稷親疏相間為國計便故武舉祿而祿亦舉武太后疑其黨竟用莽為大司馬莽諷有司劾武祿二人皆免就國莽竟誣武以謀反武自殺天下寃之何霸字翁君司空武兄也為郡戶曹刺史王尊將之官移諸郡不得遣迎太守惟霸白宜往太守遣霸尊大怒霸對曰太守遣霸非修敬也以去京師久遲知朝廷起居耳尊遽下車持節對之因竒霸容止辟為别駕舉秀才為屬國中郎將霸兄弟五人皆有名楊宣字君緯什邡人少受學於楚國王子張天文圖緯於河內鄭子侯師事楊翁叔能暢鳥言長於災異教授弟子以百數成帝徴拜諫大夫帝無嗣宣上封事勸宜以定陶恭王子為太子帝從之出宣為交州牧太子即位為哀帝拜河內太守徴太倉令上宜封周公孔子後帝從之封周公孫相如為褒魯侯孔子後孔均為褒成侯又薦遼東王綱琅琊徐吉太原郭越楚國龔勝等宜讃隆時雍平帝時命持節為講學大夫與劉歆共校書居攝中卒門生河南李吉廣漢嚴象趙翹等皆作大儒王延世字長叔資中人建始五年河決東郡案圖緯當有能循禹之功在資陽求之正得延世徴拜河堤謁者治河以竹落長四丈大九圍夾小船載小石治之三十六日堤防成帝嘉之改年曰河平封延世關內侯賜黃金百斤李𢎞字仲元成都人隱居不仕德行淳備鄉人化之揚子雲作法言亟稱以為夷惠之儔蜀有富人見子雲貧載米百石餉之求入其名法言中子雲拒之曰吾所稱乃李仲元嚴君平輩君自謂操修可得同乎其人默默而退揚雄字子雲郫人少好學不為章句訓詁通而已博覽無所不見為人簡易佚蕩口吃不能劇談默而好深沉之思清靜無為少嗜欲不修廉隅以徼名當世家産不過十金空乏無儋石之儲晏如也顧常好詞賦每有作嘗擬司馬相如以為式又怪屈原文過相如至不容作離騷自投江而死悲其文蓋未嘗不流涕以為君子得時則大行不得時則龍蛇遇不遇命也何必湛身哉乃作書往往托離騷文而反之自岷山投諸江流以弔屈原年四十始至京師大司馬王音竒其文雅召以為門下史薦雄待詔嵗餘奏羽獵賦遷侍郎給事黃門與王莽劉歆比肩哀帝之初又與董賢同官當成哀平間莽賢皆為三公權傾人主所薦無不拔擢而雄三世不徙官及莽篡位談說之士用符命稱功德獲封爵者甚衆雄獨不侯以耆老久涎轉為大夫好古樂道欲求文章成名於後世以為經莫大於易故作太𤣥傳莫大於論語作法言史篇莫善於蒼頡作訓纂針莫善於虞針作州針賦莫深於離騷反而廣之辭莫麗於相如作四賦皆斟酌其本相與依倣而馳騁云王莽時劉歆甄豐皆為上公莽既以符命自立欲絶其源以神前事而豐子尋歆子棻復獻之莽誅豐父子投棻四裔辭所連及便收不請時雄校書天祿閣上治獄使者來欲收雄雄恐不能自免乃從閣上自投下幾死莽聞之問故乃劉棻嘗從雄學作竒字雄不知情有詔勿問京師為之語曰惟寂寞自投閣爰清淨作符命雄家素貧嗜酒人希至其門時有好事者載酒肴從游學而巨鹿侯芭常從雄居受其太𤣥法言焉劉歆亦嘗觀之謂雄曰空自苦耳今學者有利祿然尚不能明易又如𤣥何吾恐後人用覆醬瓿也雄笑而不言年七十一天鳳五年卒侯芭為起墳喪之三年禽堅字孟由成都人父信使越嶲為夷所得傳賣厯十一種去時堅方妊六月生母更嫁堅長乃鬻力傭賃得碧珠以贖父一至漢中三出徼外周旋萬里經六年冒瘴毒狼虎至夷中得父相見悲感夷人哀之即將父歸迎母共養州郡嘉之辟從事列上東觀太守王商追贈孝廉令李苾為立碑銘祠之劉寵字世信綿竹人明公羊春秋上計闕下除成都令政教明肅是時諸縣難治乃換寵為郫令又換郪安漢皆著績遷牂牁太守一馬之官居郡九年乘之而還羅衍字伯紀成都人也為述郎說述尚書解文卿鄭文伯使諫述降漢為子孫福解鄭從之述怒閉二子於薄室六年二子守志不回遂幽死卒衍察孝廉徴博士王皓字子離王嘉字公卿俱江原人平帝時皓為美陽令嘉為郎王莽篡位俱棄官西歸及公孫稱帝遣使徴皓嘉恐其不至先繫皓妻子使人謂曰速裝妻子可全對曰犬馬猶識主況於人乎遂自剄以首付使者述怒誅其妻子嘉聞之嘆曰吾後之哉亦對使者伏劒死述慙貰其孥皓子廣丁難逃匿述敗州郡察舉皆不往曰吾不能復仇敢當世榮利耶終身不出稱為髙士侯剛字直孟章明字公孺俱繁人事平帝為郎王莽篡位剛佯狂負木升闕號哭莽使人諭以天命剛曰漢承堯緒其祚無窮今乃篡之豈天意乎吾寧蹈仁義而死耳莽遂殺之章明亦自刎曰吾不忍以一身事二主也光武帝表其義烈並歸葬之東漢郭賀字喬卿雒人初為太守黃幸戶曹幸與漢中太守李榮俱被徴賀勸幸星行詣詔獄自歸免榮稽留詔殺之由是顯名太守蔡茂命為主簿表賀明律令厯荆州刺史明帝南巡善其治徴河南尹卒賜錢三十萬楊終字子山成都人年十三已能作雷賦通屈原七諫章初為郡小吏太守竒其才遣詣京師受業習春秋顯宗時徴詣蘭臺拜校書郎建初元年大旱榖貴終以為廣陵楚淮陽濟南之獄徙者萬數又遠屯絶域吏民怨曠乃上疏曰臣聞善善及子孫惡惡止其身百王常典不易之道也秦政酷烈違牾天心一人有罪延及三族髙祖平亂約法三章太宗至仁除去收孥萬姓廓然䝉被更生澤及昆蟲功垂萬世陛下聖明德被四表今以比年久旱災疫未息躬自菲薄廣訪失得三代之隆無以加焉竊按春秋水旱之變皆應暴急惠不下流自永平以來仍連大獄有司窮考轉相牽引掠拷寃濫家屬徙邊加以北征胸奴西開三十六國頻年服役轉輸煩費又逺屯伊吾樓蘭車師戊巳民懷土思怨結邊域傳曰安土重居謂之衆庶昔殷人迫遷洛邑且猶怨望何況去中土之肥饒寄不毛之荒極乎願陛下留念省察以濟元元書奏帝從之聽還徙者悉罷邊屯終又言宣帝博徴羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壞大體宜如石渠故事永為世則王阜字世公成都人也太守第五倫察舉孝廉為重泉令有鸞鳥集於文學十餘日遷益州太守神馬出滇池河甘露降白烏見民懷之如父母任末字叔本繁人少習齊詩遊京師教授十餘年友人董奉德於洛陽病亡末乃躬推鹿車載奉德喪致其墓所由是知名郡辟功曹辭以病後奔師喪於道物故臨命敕兄子造曰必致我尸於師門使死而有知魂靈不慙張霸字伯饒成都人年數嵗而孝讓雖出入飲食自然合禮鄉人號為曾子七嵗通春秋復欲進餘經父母曰汝小未能也霸曰我饒為之故字曰饒後就長水校尉樊鯈受嚴氏公羊春秋遂博覽五經諸生孫林劉固段著等慕之各市宅其旁以就學焉永元中為㑹稽太守表用郡人處士顧奉公孫松等並著名稱其餘有業行者皆見擢用郡中爭勵志節習經者以千數道路但聞誦聲霸始到越賊未解郡界不寧乃移書開購明用信賞賊遂束手歸附不煩士卒之力童謠曰棄我㦸捐我矛盜賊盡吏皆休視事三年謂掾史曰太守起自孤生致位郡守蓋日中則移月滿則虧老氏有言知足不辱遂上病卒年七十遺敕諸子曰昔延州使齊子死嬴博因坎路側遂以葬焉今蜀道阻逺不宜歸塋可止此葬足藏髮齒而已務遵速朽副我本心人生一世但當畏敬於人若不善加已直為受之諸子承命葬於河南梁縣將作大匠翟酺等與諸門人追録本行諡曰文霸妻司馬氏雒陽人既將諸子還蜀及疾革亦遺敕曰舜葬蒼梧二妃不從汝父葬洛吾自葬蜀各行其志耳時人服其達諡曰敬霸中子楷張楷字公超亦通嚴氏春秋古文尚書門徒常百人賓客慕之父黨夙儒偕造門焉車馬填街徒從無所止黃門及貴戚之家皆起倉巷涎以候過客往來之利楷輒避之家貧無以為業嘗乘驢車至縣賣藥足給食輒還鄉里司隸舉茂才除長陵令不至官隱居𢎞農山中學者隨之所居成市華隂山南遂有公超市五府連辟舉賢良方正皆不就漢安元年順帝特下詔告河南尹曰故長陵令張楷行慕原憲操擬夷齊輕貴樂賤竄跡幽髙志確然獨拔羣倫前此徴命盤桓未至將主者玩習於常優賢不足所以難歟郡特以禮發遣楷復告疾不到性好道術能作五里霧關西人裴優亦能作三里霧自以不如楷從學之楷避不肯見桓帝即位優遂行霧作賊事覺被考優言從楷學術楷亦從坐繫廷尉詔獄積二十年恆諷經籍作尚書注後以事無驗見原還家建和二年詔安車備禮聘之辭以篤疾不行年七十卒於家李尤字伯仁雒人少以文章顯和帝時侍中賈逵薦尤有相如揚雄之風召詣東觀作辟雍德陽諸觀賦懷戎頌百二十銘政事七篇善之拜蘭臺令史稍遷諫大夫安帝時受詔與謁者僕射劉珍等共撰漢記後帝廢太子為濟隂王尤上書諫爭順帝立遷安樂相卒尤同邑李勝字茂通亦有文才為東觀郎著詩誄論頌數十篇賈栩字元集什邡人雒孟伯元為父復仇聞祤名往投之雒縣追伯元祤相嘆曰士以義遇我豈可倍哉然雒縣必移什邡負我君乃自殺李勝言之以方虞卿魯之朱家姜詩字士遊雒人事母至孝母欲江水及鯉魚膾又不能獨食須鄰母共之詩嘗供備子汲江溺死祕言遣學不使母知於是有涌泉出於舍側等江水之香朝朝出鯉魚二頭供二母膳其泉灌田六頃施及比鄰公孫述平後東精為賊掠害不敢入詩里時大荒餓精致米肉與詩詩埋之永平三年察孝廉明帝詔曰大孝入朝凡諸所舉孝廉一切平之除江陽符長所居鄉皆為之立祠妻龎行同郡龎盛女也孝順尤篤母好飲江水江去舍六七里妻常泝流而汲後值風不時得還母渴詩責而遣之妻乃寄止鄰舍晝夜紡績市珍羞使鄰母以意自遺其姑如是者久之姑怪問鄰母鄰母具對姑感慙呼還董鈞字文伯資中人習慶氏禮事大鴻臚王臨元始中舉明經遷廩犧令病去官建武中舉孝廉辟司徒府鈞博通古今數言政事永平中為博士時草創五郊祭祀及宗廟威儀禮樂章服輒令鈞參議多見從用當世稱為通儒纍遷五官中郎將常教授門生百餘人後坐事左轉騎都尉年七十餘卒杜撫資中人少師事薛漢治五經教授門徒千人撫沉靜樂道舉動必以禮後為東平王蒼所辟及蒼就國掾史皆自劾歸而撫為大夫不忍去蒼聞賜車馬財物遣之所著詩題約義通學者傳之段恭字節英雒人少周流七十餘郡求師受學經三十年馮翊駱異孫泰山彥之章渤海紀叔陽遂明天文二卷東平虞叔雅學絶髙當世遂遊於蜀恭以朋友禮待之後為上計掾會有司劾太尉龎參兼舉茂才孝廉參性忠正亮直為貴戚所擯以恚發病逺近稱寃恭抗疏表參忠直不當以讒佞傷毁忠正帝悟即日召西曹掾問疾尋羊酒慰勞參忠朱倉字雲卿什邡人受學於蜀郡張寧餐豆飲水以諷誦同業憐其貧資給米肉不受著河洛解辟郡功曹每察孝廉羞以碌碌詣公府試輒不就以諷詠自終王渙字稚子新都人父順安定太守渙少好俠尚氣力數通剽輕少年晚而改節敦儒學習尚書通律令略舉大義為太守陳寵功曹當職割斷不避豪右寵風聲大行入為大司農和帝問曰在郡何以為理寵頓首謝曰臣任功曹王渙以簡賢選能主簿鐔顯拾遺補闕臣奉宣詔書而已帝大悅由此顯名州舉茂才除溫令縣多姦猾積為人患渙以方略討擊悉誅之境內清夷商人露宿於道其有放牛者輒云以屬稚子終無侵犯在溫三年遷兖州刺史繩正部郡風威肅然後坐考妖言不實論免嵗餘拜侍御史永元十五年從駕南巡還為洛陽令以平正居身得寬猛之宜其寃嫌久訟厯政所不斷法理所難平者莫不曲盡情詐壓塞羣疑又能以譎數發摘姦伏京師稱嘆以為渙有神算元興元年病卒百姓匝道嘆嗟男女老壯皆相與賦斂致奠醊以千數渙喪西歸道經𢎞農民庶皆設槃按於路吏問其故云常持米到洛為卒司所鈔恆亡其半自王君在事不見侵枉故來報恩立祠安陽亭西每祀輒絃歌而薦之鐔顯字子誦郪人蔡弓字子騫雒人兩人共學冬則侍親春行受業顯見知於太守陳寵厯豫州刺史光祿大夫弓為廬江太守徴拜郎寧叔字茂泰廣漢人與友人張昌共受業太學昌為河南大豪吕條所殺叔為報仇殺條自拘河南獄順帝義而赦之張鉗字子安廣漢人師事犍為謝裒裒死負土成墳裒子為人所殺鉗復其仇自拘武陽獄㑹赦免段翳字元章新都人明經術妙占未來常告大渡津口曰某日當有諸生二人荷擔問翳舍處者幸為告之後竟如其言又有人從冀州來學積年以精究翳術辭去翳為筒作書封頭與之告曰有急發之至葭萌爭津吏撾從者頭諸生發筒筒中有書曰到葭萌爭津破頭以膏裹之生乃喟然知不及翳還更精學翳常隱匿不使人知門人皆號夫子翟酺字子超雒人四世傳詩酺少事段翳好老子尤善圖緯天文厯算以報舊讐當徙日南亡於長安為卜相工後牧羊凉州遇赦還仕郡徴拜議郎遷侍中時尚書有缺詔將大夫六百石以上試對政事天文道術以髙第者補之酺對第一拜尚書時安帝始親政事追感祖母宋貴人悉封其家又元舅耿寶及皇后兄弟閻顯等並用威權酺疏諫其略曰伏惟陛下應天履阼厯值中興當建太平之功而未聞致化之道蓋逺者難明請以近事徴之昔竇鄧之寵傾動四方兼官重紱盈金積貨至使議弄神器改更社稷豈不以勢尊威廣致斯患乎及其破壞頭䫙墮地願為孤豚豈可得哉夫致貴無漸失必暴受爵非道殃必疾今外戚寵幸功均造化漢元以來未有等比陛下誠仁恩周洽以親九族然祿去公室政移私門覆車重乘寧無摧折而朝臣在位莫肯正議翕翕訾訾更相佐附臣恐威權外假歸之良難虎翼一奮卒不可制故孔子曰吐珠於澤誰能不含老子稱國之利器不可以示人此最安危之極戒社稷之深計也夫儉德之恭政存約節故文帝愛百金於露臺飾帳帷於皂囊至倉榖腐而不食錢貫朽而不可校今自初政以來日月未久費用賞賜已不可算斂天下之財積無功之家帑藏殫盡民力凋傷卒有不虞復當重賦百姓怨叛既生危亂可待也自去年以來災譴頻數地坼山移髙崖為谷修身恐懼則轉禍為福輕慢天戒則其害彌深願陛下親自勞恤研精致思勉求忠貞之臣誅逺佞諂之黨損玉堂之盛尊天爵之重割情欲之歡罷晏私之好帝王圖籍陳列左右心存亡國所以失之鑒觀興王所以得之庶災害可息豐年可招矣書奏不省而外戚寵臣咸畏惡之延光三年出為酒泉太守叛羌千餘騎從燉煌來鈔郡界酺赴擊斬首九百級羌衆幾盡威名大震遷京兆尹順帝即位拜光祿大夫遷將作大匠損省經用嵗息四五千萬屢因災異多所匡正由是權貴共誣酺及尚書令髙堂芝等交通屬託坐減死歸家杜真字孟宗綿竹人少有孝行習易春秋誦百萬言兄事翟酺酺被誣劾繫獄真上章救之笞六百竟免酺難乃以漢道衰微因散家財以施宗族公車纍辟不應王忳字少林新都人遊學京師見客舍一書生疾困愍而視之書生謂忳曰我當到洛陽而被病命在須臾腰下有金十斤願以相贈死後乞藏體骨未及問姓名而命絶忳即鬻一斤營其殯葬餘金悉置棺下人無知者歸數年縣署忳大度亭長初到之日有馬馳入亭中而止其日大風飄一繡被復墮忳前即言於縣縣以歸忳忳後乘馬到雒縣馬遂奔走牽忳入它舍主人見之喜曰今禽盜矣問忳所由得馬忳具說其狀并及繡被主人悵然良久乃曰被墮旋風與馬俱亡卿何隂德而致此二物忳自念有葬書生事因說之并道書生形貌及埋金之處主人大驚號曰是我子也姓金名彥前往京師不知所在何意卿乃葬之大恩久不報天以此彰卿德耳忳悉以被馬還之主人不取因告新都令假忳休息自與俱迎子喪餘金俱存忳由是顯名仕郡功曹州治中從事舉茂才除郿令到官至斄亭亭長曰亭有鬼數殺過客不可宿也忳曰德除不祥何鬼之避即入亭止宿夜中聞有女子稱寃之聲忳囑曰有何枉狀可前求理女子曰無衣不敢進忳便投衣與之女子乃前訴曰妾夫為涪令之官過宿此亭亭長無狀枉殺妾家十餘口埋在樓下悉取財貨忳問亭長姓名女子曰即今門下遊徼者也忳曰汝何故數殺過客對曰妾不得白日自訴每夜陳寃客輒眼不見應不勝感恚故殺之忳曰當為汝理此寃勿復殺人因解衣於地忽然不見明旦召游徼詰問具服即收繫及同謀十餘人殺之遣吏送其喪歸鄉里楊厚字仲桓新都人祖春卿父統皆有著作母與前妻子博不相安厚年九嵗思令和親乃托疾不言不食母知其㫖瞿然改意恩養加篤博仕至光祿大夫厚少學統業精力思述初安帝永初二年太白入北斗洛陽大水朝廷以問統統對年老耳目不明子厚曉讀圖書粗識其意鄧太后使中常侍承制問之厚對以為諸王子多在京師容有非常宜亟發遣各還本國太后從之星尋滅不見又尅水退期日皆如所言除為中郎太后特引見問以圖䜟不合免歸習業犍為不應州郡三公命永建二年順帝特徴詔告郡縣督促發遣厚不得已行到長安以病自上因陳漢三百五十年之厄宜蠲法改憲之道及消伏灾異凡五事制書褒述有詔太醫致藥大官賜羊酒及至拜議郎三遷為侍中特蒙引見訪以政事四年厚上言今夏必盛寒當有疾疫蝗蟲之害是嵗果六州大蝗疫氣流行後又連上西北二方有兵氣宜備邊冦車駕臨當西巡感厚言而止大將軍梁冀威權傾朝遣弟侍御史不疑以車馬珍玩致遺於厚欲與相見厚不答固稱病求退帝許之賜車馬錢帛歸家修黃老教授門生上名録者三千餘人年八十三卒策書弔祭鄉人諡曰文父張壽字伯禧涪人少給縣丞楊放家放為梁賊所得壽求之積六年始知其生存乃賣家鹽井得三十萬市馬五匹往贖放道為羌所劫掠盡凡往三年計道逺不可得數乃單身詣虜涕泣自說虜哀其屢來遣放隨還郡召為中候詔書除巫尉以身佩印所有財物與三弟復為郡掾章平賦役嵗出三百五十萬徙五官掾卒李餘涪人父早世兄夷殺人亡命母慎當死餘年十三問人曰兄弟相代能免母否人曰趣得一人耳餘乃詣吏乞代母死吏以其年小不許餘因自死吏以白令令哀傷言郡郡上尚書天子與以財葬圖畫府庭趙戒字志伯成都人父定以遊俠稱順桓帝時戒厯司徒太尉登時進屢居公輔免憂患於無妄之世告歸於蜀薨於家諡曰文侯子典趙典字仲經父戒為太尉桓帝立以定策封厨亭侯典少篤善隱約建和初四府表薦徴拜議郎侍講禁內再遷為侍中時帝欲廣開鴻池典諫曰鴻池泛溉已且百頃猶復增而深之非所崇唐虞之約已遵孝文之愛人也帝納其言而止父卒襲封出為𢎞農太守轉右扶風又轉大鴻臚與頴川李膺齊名列於八俊時恩澤諸侯以無勞受封羣臣莫敢諫典獨奏曰夫無功而賞勞者不勸上忝下辱亂象干度且髙祖之誓非功臣不封宜一切削免爵土以存舊典帝不從頃之轉太僕遷太常朝廷每有灾異疑擬輒咨問之典據經正對無所曲折每得賞賜輒分與諸生之貧者後以諫爭違㫖免官就國公卿復表典篤學博聞宜備國師㑹病卒使者弔祠諡曰獻侯典兄子謙謙弟溫相繼為三公趙謙字彥信初平元年代黃琬為太尉獻帝遷都長安以謙行車騎將軍事為前置復為司𨽻校尉車師王侍子為董卓所愛數犯法謙收殺之卓大怒殺都官從事而素敬憚謙故不加罪轉為前將軍遣擊白波賊有功封郫侯李傕殺司徒王允復代允為司徒數月病免拜尚書令卒諡曰忠侯趙溫字子柔順桓之世為巴郡太守於時板楯數反溫到郡以恩信降服之百姓樂業於是巖渠出九穗之禾朐忍有連理之木遷京兆丞嘆曰大丈夫當雄飛安能雌伏遂棄官去遭嵗大饑散家糧以賑窮餓所活萬餘人獻帝西遷都以侍中同輿輦至長安封江南亭侯代楊彪為司空免頃之復為司徒録尚書事時李傕與郭汜相攻傕遂虜掠禁省劫帝幸北塢外內隔絶傕素疑溫不與已乃內溫於塢中又欲移乘輿於黃白城溫與傕書切責曰公前托為董公報讐然實屠陷王城殺戮大臣天下不可家見而戶說也今與郭汜爭睚皆之隙以成千鈞之讐人在塗炭各不聊生朝廷仍下明詔欲令和解上命不行威澤日損而復欲移轉乘輿更幸非所此誠老夫所不逹也於易一為過再為涉三而弗改滅其頂凶不如早共和解引軍還屯上安萬乘下全人民豈不幸甚傕大怒欲遣人殺溫董卓從弟應溫故掾也諫之數日乃獲免溫從車駕都許建安十三年以辟司空曹操子丕為掾操怒奏溫辟忠臣子弟選舉不實免官卒年七十二初文侯與李固胡廣議立清河王蒜而梁冀欲立蠡吾侯文侯從之使李固枉死君子以為卓傕之惡甚於梁冀謙摩卓之牙溫弄傕之爪雖逼權勢以道訓陳賢其祖逺矣何英字叔俊郫人學通經緯著漢德春秋十五卷孫汶字景由亦深於學初徴上日食盜賊起有效為謁者京師旱請雨即澍遷犍為屬國著世務論三十篇卒楊由字哀侯成都人為太守廉范文學范稱能治由言當有賊發頃之廣柔羌反冦殺長姚超鄉人冷豐齎酒候之偵客未內由為知多少又言人當致果其色赤黃果有送甘橘者大將軍竇憲從太守索雲氣圖由諫莫與尋憲受誅其明如此著書十篇而卒任昉字文始成都人初為葉令治奸賊七十餘人遷梁相尚書令清身檢下大將軍梁冀憚之出為魏郡徙平原嵗出租稅百萬冀誅復入為尚書令司𨽻校尉遷大司農卒弟愷徐州刺史亦有治名昉父循字伯度為長沙太守得其父時為五官事在精通也趙旗字子鸞資中人初臨甘陵𢎞農郡甚善治民徴尚書遷司𨽻校尉時梁冀子弟放縱旗以法繩之不敢為非京師肅清桴鼓不鳴栁宗字伯騫成都人初結九友共學號九子及為州郡右職務在進賢拔致求次方張叔遼王仲曾殷智孫等終至牧守州里為諺曰得黃金一笥不如為伯騫所議舉茂才為陽夏太守楊凖字伯邳漢安縣人初為郡守太尉李固薦凖纍世忠直拜尚書太傅陳蕃表為河東入為尚書令奏書治南陽太守曹麻潁川太守曹騰濟南太守孫訓等子弟依託形勢淫縱徴廷尉治罪訓梁冀婦家子也於是憚之又薦朱禹盛精滕延為尚書陸稠為郡守皆名士桓帝即位拜河南尹遷司𨽻校尉冀叔父梁忠為執金吾不朝正初劾奏之朝士服其公亮徙將作大匠常洽字茂尼江原人自荆州刺史遷京兆尹侍中長水校尉以兵衛大駕西幸傕等作難常扶天子為傕所害楊珏字仲桓成都人羅衡字仲伯郫縣人俱師事徴士何萇初珏為茂陵令治化浹洽徙西城閬中令號時名宰衡為萬年令路不拾遺人家牛馬皆繫道邊曰屬羅公三府爭辟拜廣漢長二縣皆為立祠陳湛字小伯成都人厯數縣令民皆懷之州辟治中從事廣漢太守遣子詣州修歡交使君欲納湛諫不可失羔羊義使君從之後有言州郡私交者考之無得乃明也任安字定祖綿竹人少遊太學受孟氏易兼通數經又從同郡楊厚學圖䜟究極其術時人稱曰欲知仲桓問任安又曰居今行古任定祖學終還家教授察孝廉及茂才太尉再辟除博士公車徴皆稱疾不就州牧劉焉表薦之時王塗隔塞詔命竟不至年七十九卒於家弟子杜微何宗杜瓊皆知名仕至卿佐董扶字茂安綿竹人少遊太學與鄉人任安同事楊厚學圖䜟還家講授弟子自逺而至前後宰府十辟公車三徴再舉賢良方正博士有道皆稱疾不就靈帝時大將軍何進薦扶徴拜侍中甚見器重扶私謂太常劉焉曰京師將亂益州分野有天子氣焉信之遂求為益州牧扶亦求為蜀郡屬國都尉相與入蜀去後一嵗己巳天下大亂乃棄官還家年八十二卒後劉氏稱帝於蜀皆如扶言諸葛亮問廣漢秦宓以董任所長宓曰董扶褒秋毫之善貶纖芥之惡任安記人之善忘人之過折象字伯式雒人其先張江為武威太守封南陽折侯因氏焉父國為鬱林太守徙廣漢有資財二億奴姬八百人象幼有仁心不殺昆蟲不折萌芽能通京氏易好黃老言事東平虞叔雅以道教授門人時人為諺曰折氏客誰朱雲卿段節英中有佃子趙仲平但說天文論五經及國卒感多藏厚亡之義盡散金帛資産周施親疏或諫象曰君三男兩女孫息盈前當增益産業何為坐自單竭乎象曰昔鬭子文有言我乃逃禍非避富也吾門戶殖財日久盈滿之咎道家所忌今世將衰子又不才不仁而富謂之不幸牆隙而髙其壞必疾也智者聞之咸服焉自知亡日召賓客九族飲食辭訣忽然而終諒輔字漢儒新都人仕郡為五官掾時夏大旱太守自出祈禱山川連旬不雨輔乃自庭中慷慨祝曰輔為股肱不能進諫納忠薦賢退惡和調隂陽承順天意致令天地否隔萬物焦枯百姓喁喁無所訴告咎盡在輔今郡太守改服責已為民祈福精誠懇到未有感徹輔今敢自祈請若至日中不雨乞以身塞無狀於是積薪柴聚茭茆以自環搆火其旁將自焚焉未及日中天雲晦合須臾㴻雨一郡霑足世以此稱其至誠朱普字伯禽廣都人為郡功曹刺史壬冀與太守有隙訐劾之逮普詣新都獄掠笞連月肌肉臭腐以證太守無罪垂死敕其子曰我死載喪詣闕使天子知我心事得請普以烈聞韓揆字伯彥綿竹人為縣主簿㑹黃巾賊至揆扶縣令錡裒避入草中裒遣揆求隱翳處未還裒為賊所得見害揆殯殮葬訖乃詣從事賈龍求兵討賊賊破揆嘆曰本以報令君而茍自活非忠臣也遂自殺左喬雲綿竹人少為左通養子通坐任徒徒逃吏欲破通臏喬雲時年十三喟然憤怒以鋭刀殺吏解通將走令初聞以為壯士及知小兒為之流涕景毅字文堅漠州人靈帝時為侍御史李膺以黨錮見捕毅子顧為膺門徒未有録牒不逮於譴毅慨然曰本謂膺賢遣子師之豈可以漏名脫籍茍安而已遂自表免歸王商字文表廣漢人博學多聞州牧劉璋辟為治中試守蜀郡太守荆州牧劉表大儒南陽宋仲子逺慕其名皆與交好許文休稱商中夏王景興輩也商勸璋攬竒拔俊甚善匡救薦致名士安漢趙韙及陳實盛先墊江龔楊趙敏黎景閬中王淡江州孟彪皆至右職又為嚴李立祠正諸祀典在官一十年卒何宗字彥英郫人師事廣漢任安學問精博先主定益州辟為從事祭酒多所獻替族人何祗字君肅與之齊名初犍為揚洪為太守李嚴功曹去郡數年以為蜀郡嚴在官祗為洪門下書佐去郡數年以為廣漢洪猶在官是以西土咸服諸葛亮之能攬拔秀異也祗徙犍為太守卒王纍新都人州牧劉璋遣法正迎先主主簿黃權諫不納纍為從事乃自刎於州門以明其不可鄭度綿竹人先主自葭萌南攻度說州牧劉璋曰左將軍懸軍襲我野榖是資今急驅巴西梓潼之民自涪水以南一切燒除野榖固壘待之彼請戰不許久無所資不過百日必當回矣璋不納李仁字德賢涪人益部多貴今文而不崇章句仁知其不博乃遊學荆州從司馬德操宋仲豫受古學以修文自終三國彭羕字永年廣漢人姿性驕傲多所輕忽惟敬同郡秦宓子敕薦之於太守許靖羕仕州不過書佐後又為衆人所謗毁州牧劉璋髠鉗羕為徒𨽻㑹先主入蜀泝流北行羕欲納說先主乃往見龎統統與羕非故人又適有賓客羕徑上統床卧謂統曰須客罷當與卿善談統客既罷往就羕坐羕又先責統食然後共語因留信宿至於經月統大善之而法正宿自知羕遂並致之先主先主亦已為竒數令羕宣傳軍事指授諸將奉使稱意識遇日加成都既定先主領益州牧拔羕為治中從事羕起徒步一朝處州人之上形色囂然自矜得遇滋甚諸葛亮雖外接侍羕而內不能善屢密言先主羕心大志廣難可保安先主既敬信亮加察羕行事意以稍疏左遷羕為江陽太守羕聞當逺出私情不悅往詣馬超超問羕曰卿才具秀拔主公相待至重謂卿當與孔明孝直諸人齊足並驅寧當外授小郡失人本望乎羕曰老革荒悖不復道耶又謂超曰卿為其外我為其內天下不足定也超羈旅歸國常懷危懼聞羕言大驚默然不應羕退具表羕詞於是收羕付有司羕於獄中與諸葛亮書曰僕昔有事於諸侯以為曹操暴虐孫權無道振威暗弱其惟主公有霸王之器可與興業致治故乃翻然有輕舉之志㑹公來西僕因法孝直自衒鬻龎統斟酌其間遂得詣公於葭萌指掌而談論治世之務講霸王之義建取益州之策公亦宿慮明定即相然贊遂舉事焉僕於故州不免凡庸憂於罪罔得遭風雲激矢之中求君得君志行名顯從布衣之中擢為國士盜竊茂才分子之厚誰復過此曾一朝狂悖自求葅醢為不忠不義之鬼乎先民有言左手據天下之圖右手刎咽喉愚夫不為也況僕頗别菽麥者哉所以有怨望意者不自度量茍以為首興事業而有投江陽之論不解主公之意意卒感激頗以被酒侻失老語此僕之下愚薄慮所致主公實未老也且夫立業豈左老少西伯九十寧有衰志負我慈父罪有百死至於內外之言欲使孟起立功北州戮力主公共討曹操耳寧敢有他志耶孟起說之是也但不分别其間痛人心耳昔每與龎統共相誓約庶託足下末蹤盡心於主公之業追名古人載勳竹帛統不幸而死僕敗以取禍自我蹈之將復誰怨足下當世伊吕也宜善與主公計事濟其大猷天明地察神祇有靈復何言哉貴使足下明僕本心耳行矣努力自愛自愛羕竟誅死時年三十七秦宓字子敕綿竹人少有才學州郡辟命輒稱疾不往劉璋時宓同郡王商為治中從事與宓書曰貧賤困苦亦何時可以終身卞和衒玉以耀世宜一來與州尊相見宓答書曰昔堯優許由非不𢎞也洗其兩耳楚聘莊周非不廣也執竿不顧易曰確乎其不可拔夫何衒之有且以國君之賢子為良輔不以是時建蕭張之策未足為智也僕幸暴背於隴畝之中誦顔氏之簞瓢詠原憲之蓬戶時翺翔於林澤與沮溺之等儔聽𤣥猿之悲吟察鶴鳴於九臯安身為樂無憂為福處空虛之名居不靈之龜知我者希則我貴矣斯乃僕得意之秋也何困苦之戚焉後商為嚴君平李𢎞立祠宓與書曰疾病伏匿甫知足下為嚴李立祠可謂厚黨勤類者也觀嚴文章冠冒天下由夷逸操山嶽不移使揚子不嘆固自昭明如李仲元不遭法言令名必淪其無虎豹之文故也可謂攀龍附鳳者矣如楊子雲潜心著述有補於世泥蟠不滓行參聖師於今海內談咏厥辭邦有斯人以耀四遠怪子替兹不立祠堂蜀本無學士文翁遣相如東受七經還教吏民於是蜀學比於齊魯故地里志曰文翁倡其教相如為之師漢家得士盛於其世仲舒之徒不逹封禪相如制其禮夫能制禮造樂移風易俗非禮所秩有益於世者乎雖有王孫之纍猶孔子大齊桓之霸公羊賢叔術之讓僕亦善長卿之化宜立祠堂速定其銘先是李權從宓借戰國策宓曰戰國縱橫用之何為權曰仲尼嚴平㑹聚衆書以成春秋指歸之文故海以合流為大君子以博識為𢎞宓報曰書非史記周圖仲尼不采道非虛無自然嚴平不演海以受淤嵗一蕩清君子博識非禮不視今戰國反覆儀秦之術殺人自生亡人自存經之所疾故孔子發憤作春秋大乎居正復制孝經廣陳德行杜漸防萌預有所抑是老氏絶禍未萌豈不信邪成湯大聖覩野魚而有獵逐之失定公賢者見女樂而棄朝事若此輩類焉可勝陳道家法曰不見可欲使心不亂是故天地貞觀日月貞明其直如矢君子所履洪範記災發於言貌何戰國之譎權乎哉或謂宓曰足下欲自比於巢許四皓何故揚文藻見瓌穎乎宓答曰僕文不能盡言言不能盡意何文藻之有揚昔孔子三見哀公言成七卷事蓋有不可默默也接輿行且歌論家以光篇漁父咏滄浪賢者以耀章此二人者非有欲於時者也夫虎生而文炳鳳生而五色豈以五采自飾畫哉天性自然也蓋河洛由文興六經由文起君子懿文德采藻其何傷以僕之愚猶恥革子成之誤況賢於已者乎先主既定益州廣漢太守夏侯纂請宓為師友祭酒領五官掾稱曰仲父宓稱疾卧在茅舍纂將功曹古朴主簿王普厨膳即宓第晏談宓卧如故纂問朴曰至於貴州養生之具實絶餘州矣不知士人何如餘州也朴對曰乃自先漢以來其爵位者或不如餘州耳至於著作為世師式不負於餘州也嚴君平見黃老作指歸揚雄見易作太𤣥見論語作法言司馬相如為武帝制封禪之文於今天下所共聞也纂曰仲父何如宓以簿擊頰曰願明府勿以仲父之言假於小草民請為明府陳其本紀蜀有汶阜之山江出其腹帝以㑹昌神以建福故能沃野千里淮濟四瀆江為其首此其一也禹生石紐今之汶山郡是也昔堯遭洪水鯀所不治禹疏江決河東注於海為民除害生民以來功莫先者此其二也天地布治房心決政參伐參伐則益州分野三皇乘祗車出谷口今之斜谷是也此便鄙州之阡陌明府以雅意論之何若天下乎於是纂逡巡無以復答益州辟宓為從事祭酒先主既稱尊號將東征吳宓陳天時必無其利坐下獄幽閉然後貸出建興二年丞相亮領益州牧選宓迎為别駕尋拜左中郎將長水校尉吳遣使張溫來聘百官往餞衆人皆集而宓未往亮纍遣使促之溫曰彼何人也亮曰益州學士也既至溫問曰君學乎宓曰五尺童子皆學何必小人溫復問曰天有頭乎宓曰有之溫曰在何方也宓曰在西方詩曰乃眷西顧以此推之頭在西方溫曰天有耳乎宓曰天處髙而聽卑詩云鶴鳴九臯聲聞於天若其無耳何以聽之溫曰天有足乎宓曰有詩云天步艱難之子不猶若其無足何以步之溫曰天有姓乎宓曰有溫曰何姓宓曰姓劉溫曰何以知之答曰天子姓劉故以此知之溫曰日生於東乎宓曰雖生於東而沒於西答問如響應聲而出於是溫大敬服宓之文辨皆此類也遷大司農四年卒初宓見帝系之文五帝皆同一族宓辨其不然之本又論皇帝王霸養龍之說甚有通理譙允南少時數往咨訪記録其言於春秋然否論文多故不載杜瓊字伯瑜成都人少受學於任安先主定益州以瓊為議曹從事後主踐祚拜諫議大夫遷大鴻臚太常為人靜默少言闔門自守不與世事蔣琬費褘等皆器重之瓊精于術學初不視天文有所論說後進譙周常問其意瓊曰欲明此術甚難須當身視識其形色不可信人也晨夜苦劇然後知之復憂漏泄不如不知是以不復視也周因問曰昔周徴君以為當塗髙者魏也其義何居瓊答曰魏闕名也當塗而髙聖人取類而言耳又問周曰寧復有所怪耶周曰未逹也瓊又曰古者名官職不言曹始自漢以來名官盡言曹吏言屬曹卒言侍曹此殆天意也瓊年八十餘卒著韓詩章句十餘萬言張裔字君嗣成都人治公羊春秋博涉史漢汝南許文休入蜀謂裔幹理敏捷中夏鍾元常之倫也劉璋時舉孝廉為魚復長還州署從事領帳下司馬張飛自荆州由墊江入璋授裔兵拒於德陽陌下軍敗還成都為璋奉使詣先主先主許以禮其君而安其人也蜀平先主以裔為巴郡太守還為司金中郎將典作農戰之器先是益州郡殺太守正昻耆率雍闓恩信著於南土使命周旋逺通孫權乃以裔為益州太守徑往至郡闓遂趦趄不賓假鬼教曰張府君如瓠壺外雖澤而內實粗不足殺令縛與吳於是遂送裔於權會先主薨諸葛亮遣鄧芝使吳亮令芝言涎可從權請裔裔自至吳數年流徙伏匿未之知也故許芝遣裔裔臨發權乃引見問曰蜀卓氏寡女亡奔司馬相如貴土風俗何乃爾乎裔對曰愚以為卓氏之女猶賢於買臣之妻權又謂裔曰君還必用事西朝終不作田父於閭里也將何以報我對曰裔負罪而歸將委命有司若䝉徼幸得全首領五十以前父母之年也自此以後大王之賜也權言笑歡悅有器裔之色裔出閣即便就船倍道兼行權果追之裔已入永安界數十里追者不能及既至丞相亮以為參軍署府事又領益州治中從事亮出駐漢中裔以射聲校尉領留府長史常稱曰公賞不遺逺罰不阿近爵不可以無功取刑不可以貴勢免此賢愚之所以僉忘其身者也明年北詣亮咨事送者數百車乘盈路裔還書與所親曰近者涉道晝夜接賓不得寧息人自敬丞相長史男子張君嗣附之疲倦欲死其談啁流速皆此類也少與犍為楊恭友善恭早死遺孤未數嵗裔迎留與分屋而居事恭母如母恭之子長大為之娶婦買田宅産業使立門戶撫恤故舊振贍衰宗行義甚至加輔漢將軍長史如故建興八年卒李福字孫德涪人先主初為成都令建興九年遷巴西太守後為江州都督揚武將軍入為尚書僕射封平陽亭侯延熙初以前監軍司馬福同郡梓潼文恭仲寶亦以才幹為牧亮治中從事丞相參軍常璩讃曰孫德果鋭作劉幹臣李撰字欽仲涪人少傳父仁業又從尹默學自五經四部百家諸子無不該覽加博好伎藝算術卜數醫藥弓弩機械之巧皆致思焉始為州書佐尚書令史延熙元年後主立為太子以撰為庶子遷為僕射轉中散大夫右中郎將猶侍太子太子愛其多知甚悅之然體輕脫好戲啁故世不能重也著古文易尚書毛詩三禮左氏傳太𤣥指歸皆依凖賈馬異於鄭𤣥與王氏殊隔初不見其述而意歸多同景耀中卒尹默字思潛涪人少與李仁俱受學司馬徽宋忠等博通五經精専左氏自劉歆條例鄭衆賈逵父子陳元方服䖍注說咸略誦述不復按本先主定益州以為勸學從事及立太子以默為僕射以左氏傳授後主後主踐阼拜諫議大夫丞相亮駐漢中請為祭酒亮卒還成都拜太中大夫卒子宗傳其業為博士杜微字國輔涪人少受學於廣漢任安劉璋辟為從事以疾去官及先主定蜀微常稱聾閉門不出建興二年丞相亮領益州牧選迎皆妙簡舊德以微為主簿微固辭輿而致之既至微自陳謝亮以微不聞人語於坐上與書曰服聞德行饑渴厯時清濁異流無緣咨覯王元泰李伯仁王文儀楊季休丁君幹李永南兄弟文仲寶等每歎髙志未見如舊猥以空虛統領貴州德薄任重慘慘憂慮朝廷主公今年始十八天姿仁敏愛德下士天下之人思慕漢室欲與君因天順民輔此明主以隆季興之功著名於竹帛也以謂賢愚不相為謀故自割絶守勞而已不圖自屈也微自乞老病求歸亮又與書曰曹丕篡弒自立為帝是猶土龍芻狗之有名也欲與羣賢因其邪僞以正道滅之怪君未有相誨便欲求還於山野丕又大興勞役以向吳楚今因多務且以閉境勤農育養民物並治甲兵以待其挫然後伐之可使兵不戰民不勞而天下定也君但當以德輔時耳不責君軍事何為汲汲欲求去乎其敬微如此拜為諌議大夫以從其志常播字文平江原人建興中為縣功曹縣長被誣逋沒官榖當論重罪播詣獄爭辨受數千杖肌骨潰爛更厯三獄幽閉二年終無異詞事遂解縣長得釋王嗣字承宗資中人舉孝廉為汶山太守加安逺將軍綏集羌胡雖素桀惡者皆來降大將軍姜維每出北征輒出馬牛羊及軍糧乃遷嗣鎮軍仍領郡後從維北征為流矢所傷卒戎狄皆㑹葬號呼涕泣隨之凡見嗣子孫皆若見其骨肉云晉任熙字伯逺成都人治毛詩京易博通五經事親至孝察孝廉除南鄭令復授梓潼令辭疾告歸勸農力穡居室致給循訓闔門內則可法開門待賓傾懷下士客無長幼必有供贍太康中除越嶲護軍不往徴給事中終以疾辭而蜀守令每至官為之修謁嵗致羊酒即家拜朱提太守固讓不之官熙好述作詩誄論難文皆燦艷年六十九卒子蕃涪陵太守蕃子迪字叔孤少與巴西龔壯齊名而學業過之壽良字文淑成都人少與犍為張徴費緝齊名良治春秋三傳貫通五經澡身貞素厯官始平太守治政著稱從扶風轉秦國內史溫令李宓表薦武帝以良為公朝英特二州之望云栁隱字休然成都人少與同郡杜禛栁伸齊名隱直誠篤亮交友居厚逹於從政數從大將軍姜維征伐為牙門將巴郡太守騎都尉遷漢中黃金圍督及鍾㑹伐蜀入漢川圍伐多下惟隱堅壁不動後主既降以手令敕隱乃詣會晉文帝聞而義之咸熙元年內移河東拜議郎武帝即位以為西河太守在官三年乞還蜀卒於家杜禛在蜀為凉益二州都督栁伸在蜀為度支入晉並舉秀才何隨字季業漢司空武之後世有名德徴聘入官隨治韓詩歐陽尚書研精文緯通星厯郡命功曹州辟從事光祿郎中主事除安漢令蜀亡去官時土饑荒所在無榖送吏行乏取道旁民芋隨以綿繫其處使足芋直民視芋見綿知必何安漢乃持綿追還之終不受及晉踐阼臺召不詣除河間王郎中不就居貧固儉弊衣蔬食晝耕夕讀鄉族饋遺一切不納目不視色口不語利著談言十篇論道德仁義常有屠牽猪過隨門者猪索斷失之强認隨圂中猪隨便牽猪與之屠人出門尋得其所亡猪謝隨還猪遂以丐之家有竹園人盜其笋隨行見之恐盜者覺怖走竹中傷其手足挈屐徐步而歸太康中即家拜江陽太守民思其政卒於官長子觀字巨忠清公淑慎知名州里察孝廉除平西長史會張昌亂荆州從黨西上郡守無不降下至江陽平西將軍羅尚表觀安逺護軍討賊平之遷巴郡太守㑹病卒何攀字惠興漢何武弟潁川太守顯後也仕州為主簿屬刺史皇甫晏為牙門張𢎞所害誣以大逆時攀實丁母憂遂詣揚州拜表證晏不反故晏寃理得伸王濬為益州辟攀别駕濬謀伐吳遣攀奉表詣臺口陳事機詔再引見乃令張華與攀籌量進討之宜兼遣攀過羊祜面陳伐吳之策攀善于將命帝善之詔攀參濬軍事及孫皓降濬而王渾恚于後機欲攻濬攀勸濬送皓與渾由是事解濬入拜輔國為司馬封關內侯攀轉滎陽令上便宜十事甚得名稱除廷尉平時廷尉卿以攀蜀士輕之及共斷疑獄卿始歎服轉散騎侍郎楊駿執政多樹親屬大開封賞欲以恩澤自衛攀以為非乃與共立議奏之帝不納後以預誅駿功封西城侯邑萬戶賜絹萬匹弟逢平鄉侯兄子逵關內侯固讓所封戶及絹之半餘所受者分給中外宗親略不入已後為揚州刺史遷大司農轉兖州刺史鷹揚將軍固讓不就太常成燦左將軍卞粹勸攀蒞職中詔又加切厲攀竟稱疾不起及趙王倫篡位遣使召攀更稱疾篤倫怒將誅之不得已扶赴召卒于洛陽時年五十八攀居心平允蒞官整肅愛樂人物敦儒貴材為梁益二州中正引致遺滯巴西陳夀閻義犍為費立皆西州名士並被鄉所謗干清議十餘年攀申明屈直咸免寃濫雖居顯職家甚貧素無妻媵伎樂惟以固窮濟乏為事子璋嗣有父風王長文字德睿廣漢郪人父顒字伯元犍為太守長文天姿聰警髙暢敏識治五經博通羣籍弱冠州三辟書佐丁時興衰託疾歸家大同後郡功曹察孝廉不就遂陽愚嘗著綘衣綘帽牽猪過市中乞人與語僞不聞常騎牛周旋郡守至詣門修敬至閭走出請終不還刺史淮南胡羆辟從事祭酒卧在治羆出板舉秀才長文陽發狂疾步擔走出門羆纍遣教請還終不顧還家養母獨講學著無名子十二篇依則論語又著通經四篇亦有卦名擬易𤣥以為春秋三傳傳經不同每生訟議乃據經托傳著春秋三傳十二篇又撰約禮記除煩舉要凡十篇皆行於時長文才鑒清妙㲹愛廣納放蕩濶逹不以細宜廉分為意亦不好臧否人物故時人愛而敬之以母欲祿養咸寧中領蜀郡太守郫有孝子羅偶事親至孝二親將亡時病不能食肉終身不食肉郡察孝廉長文追為立表以旌之宰府辟三司及撫軍大將軍王濬纍辟不詣濬薨以故州將軍弔祭元康初試守江原令縣收盜賊長文引見誘慰時適臘晦皆遣歸家獄先有繫囚亦遣之謂曰教化不厚使汝等如此長吏之過也蠟節慶析歸就汝上下善相歡樂過節來還當為思他理羣吏惶遽爭請不許尋有赦令無不感恩所宥人輒不為惡曰不敢負王君將喪去官民思其政大將軍梁王肜及諸府並辟長文曰吾從其先命者遂應肜招為從事中書郎諸王公卿慕其名咸與之交賈氏之誅從肜有功封關內侯再為中書郎愍懷太子死於許下博士中書論虞祔之禮長文議虞祭宜還東宫以繼太子者為主配食於潁川府君皆施行除洛陽令長文見肜曰主者不庶幾奏長文為洛陽令肜笑答曰卿乃不庶幾非主者也固辭不拜聞益州亂以通經筮得老蠶緣枯桑之卦歎曰桑無葉蠶以卒也吾蜀人殄於是矣拜蜀郡太守暴卒時年六十四李毅字允剛廣漢人祖父朝字偉南州别駕從事父旦字欽宗光祿郎中主事毅少散逹不治素檢年二十餘乃詣郡文學受業通詩禮訓詁為學主事太守𢎞農王濬臨學講試問祭酒姬艷曰學中有可成進幾百人艷對曰可有百人濬怒曰童冠八百而成者百人教少何為毅對曰如艷之言明府之教盛於孔氏不為少也濬竒之命為主簿濬嘗夢得三口刀云人以未益之手持不得以問郡丞與縣吏莫能知毅對曰吉祥也三刀者州字而益之禾持不得禾旁失者秩字明府秩當至益州濬笑曰如卿言當相以為秀才張𢎞殺益州刺史皇甫晏誣奏晏反毅白濬曰皇甫侯起自諸生位極方州反當何求且廣漢與成都密邇而統梁州者襟益州之領須防若今日也益州有禍乃此郡之憂加張𢎞小豎衆所不與宜時赴討濬欲先上後行毅曰大夫出疆茍利社稷専之為賢何況殺主賊急當不拘常宜濬從之發兵與牙門蒲泰等共討𢎞斬之詔書遷濬益州刺史毅復為州主簿别駕舉秀才及濬伐吳與何攀並為參軍吳平封關內侯除隴西護軍以疾去官徙繁令遷雲南太守濬臨薨上表後武帝思濬勳問毅所在徙犍為使持節南夷校尉久之犍為民毛詵李睿與朱提民李孟共逐太守杜俊雍約以叛衆數萬毅討破之斬詵孟首睿走依五茶夷亦叛晉朝復置寧州以毅為刺史加龍驤將軍封成都縣侯夷遂大反破沒郡縣攻圍州城中原亂而李雄寇蜀救援不至疾病薨於窮城懷帝嘉其忠節追贈少府諡曰威侯毅性通博居情雅厚賑恤寒貧篤於故舊人咸愛歸之但好談啁德重猶少從弟苾字叔平少修身砥厲名行數諫毅宜自矜嚴毅笑應之曰吾小來不治名素終杖旄節故可至九卿卿清儉履道卒不失成都令也時毅始受南夷而苾厯城令果作成都遷犍為太守位官不及毅毅子釗以父任為謁者除壽林侯相不就為尚書外兵郎自表赴難至牂牱夷斷道不得進經年以寧州城中無榖父疾病未知吉凶不食榖惟茹草逮及奔喪官至朱提越嶲太守西夷校尉毅女秀適漢嘉太守新都王載有才智父亡後州文武推領州事二載晏然髙玩字伯珍成都人少受學於太常杜瓊術藝微妙博聞强識清尚簡素少與李苾齊名官位相比大同後察孝廉除曲陽令單車之縣移檄縣綱紀不使遣迎以明三才徴為太史令送者亦不出界朝廷稱之方論大用會卒杜軫字超宗成都人父雄為雒令軫少事譙周博涉經書州辟不就為郡功曹史鄧艾至成都軫白太守曰今大將軍來征必除舊布新明府宜避之此全福之道也太守乃出艾果遣其參軍牽𢎞自之郡問前守何在軫正色對曰前守逹去就之機輒自出官舍以俟君子𢎞器之命復為功曹軫固辭察孝廉除建寧令道以德政風化大行夷夏悅服秩滿將歸羣蠻追送賂遺甚多軫一無所受去如初至入除池陽令為雍州十一郡最百姓生為立祠得罪者無怨言屢徙尚書郎博聞廣涉奏議論駁多見施用時涪人李驤亦為尚書郎與軫齊名每有論議朝廷莫能踰之號蜀有二郎軫後拜犍為太守甚有聲譽當遷會病卒年五十一子毗字長基州舉秀才遷尚書郎參太傅軍事及洛陽覆沒毗渡江王敦表為益州刺史與宜都太守栁純共圖白帝杜韜遣軍要之遂遇害毗弟秀字彥頴為羅尚主簿為氐賊李驤所得欲用為司馬不從見害毗次子歆舉秀才軫弟烈舉孝廉厯牛鞞安陽令所居有異績遷衡陽太守軫亡因自表兄子幼弱求去官詔轉犍為太守烈弟良舉秀才除新都令遷涪陵太守本州大中正常騫字季慎江原人治毛詩三禮清尚知名封關內侯以晉政衰固辭去官性泛愛敬友宗族當官修理恕以撫物州鄉以為儀範常寬字泰恭騫之族弟治毛詩三禮春秋尚書尤耽大易博涉史傳而謙虛清素郡命功曹及察孝廉皆不就州辟主簿刺史羅尚舉秀才為侍御史除繁令以蜀將喪去官湘川亂乃南入交州鳩合經籍研精著述元帝踐祚嘉其德行潔白拜武平太守民悅其政在官三年去職卒於交州子長生字彭祖亦有學行州主簿資中令治中從事早亡常朂字修業江原人祖父員牂牱永昌太守父髙廟令從父閎漢中廣漢太守朂少與閎子忌齊名安貧樂道志篤墳典治毛詩尚書涉治羣籍多所通覽州命辟從事入為光祿郎中主事入為尚書左遷郎郡請迎為功曹時州將董軍政置從事職興刑獄以朂清亮復為督軍治訟平當還察孝廉除郫令政簡不煩魏征西將軍鄧艾伐蜀破諸葛瞻於綿竹威振西土諸縣長吏或望風降下或委官奔走朂獨率吏民固城拒守後主檄令乃詣艾故郫榖帛全完刺史袁邵嘉其志節辟為主簿朂善儀容翔集動為表觀言論壯烈州里重之然交友惟賢不交下已者泛愛之恩猶不足云常忌字茂通蜀謁者黃門侍郎喪親以致孝聞察孝廉為郎使吳稱職厯長水參軍什邡雒令大同後刺史邵坐治城被徴忌詣洛陳訴逺國初附君民始結不宜解易又表修治城池居安思危邊將常職事皆中情晉文帝時為相國辟忌舍人武帝踐阼拜騎都尉除河內令州名為難治忌挫折豪勢風教大行縣有姦梗殺兄者羣黨蔽匿前令莫得忌皆窮治入為州都方議為郡守會卒忌為人信道任數不從下人故為貴勢所不善是以作詩著論先攻已短臨喪與樂歡哀俱至為士類所稱忌友人廣漢假宗仲亦有學行蜀時官與忌比袁邵為主簿與忌共理郡事文帝善之梁州辟别駕從事舉秀才相遷官至雲南建寧太守司馬勝之字興先綿竹人學通毛詩三禮清尚虛素不事榮利為郡功曹厯新繁令徴為散騎侍郎以宗室禮之終以疾辭即家拜漢嘉太守固讓不之官閒居清靜謙卑自牧訓化鄉閭以恭敬為先王化字伯逺王商子也治毛詩三禮春秋公羊傳察孝廉為樂涫令縣近邊塞值冦反化率吏民積榖堅守重圍孤絶七年伺冦怠惰出軍擊之民得野掠大軍至冦退以功封關內侯遷朱提太守轉梓潼皆有稱績為人謹重言論方雅臧否允衷州里服其誠亮弟振字仲逺亦有德望為巴東太守少弟崇崇字幼逺學業淵博雅性洪粹蜀時為東觀郎入晉官至上庸蜀郡太守著蜀書與陳壽頗不同元常江原人廣都令常長女適廣漢便敬賔早亡元常無子養賔族子父母欲嫁之乃祝刀誓志而死靡常仲山女適成都殷仲孫家遭疫氣死亡惟靡常在年十八收葬諸喪養遺生子立美成家公乘會妻廣都張氏女也夫早亡無子姑及兄弟欲改嫁之張誓不許而言之不止乃斷髮割耳養會族子事姑終身廣柔長郫姚超二女姚妣饒未許嫁隨父在官值九種夷反殺超獲二女欲使牧羊二女誓不辱乃以衣連腰自沉水中死見夢告兄慰曰姊妹之喪當以某日至溉下慰寤哀愕果如夢日得喪郡縣圖象府庭紀常常侍常洽女趙侯夫人也父遇害在長安二兄皆先殁遣父門生瞿登張順迎喪時冦賊蜂起晝夜悲哀順登得將喪無恙還時人皆以紀常精誠所感正流廣漢李元女楊文妻也適文有一男一女而文殁以織履為業父欲改嫁之乃自沉水中扶救始免太守五方為之圖象敬楊涪人郭孟妻楊文之女也始生失母八嵗父被闕盛所殺敬楊無宗親依外祖鄭氏年十七適孟孟與盛有舊盛數往來孟家敬楊泣謂孟曰惡讐未報未嘗一日忘恐卒狂惑益君禍患君宜疏之孟以告盛盛不納漢安元年盛至孟家敬楊以大杖打殺盛將自殺孟止之與俱逃涪令出追聞其故而止安慰二門㑹赦得免義舊狄道長姜穆女綿竹司馬雅妻也既許婚父坐事徙朔方雅就婚死雇人送其喪尋父母死朔方義舊獨與弟孤居十年士大夫求終不肯乃上疏自訟求還鄉里天子愍悼下朔方使送遂下詔書定律令女已許嫁不得從父母徙紀配廣漢殷氏女廖伯妻也年十六適伯伯早亡配有美色慮人求己作詩三章自誓而求者猶衆父母將許乃斷指明情養子猛終義太守薛鴻圖象府庭彭非廣漢王輔妻也王和新都人便敬妻也李進娥郪人馬季宰妻也輔早亡叔父欲改嫁非乃詣太守五方截髮自誓敬亦早亡和養孤守義蜀郡何玉因媒介求之兄曉喻以公族可憑和恚割其一耳季宰亦早亡父母欲改嫁進娥亦剪髮自誓各養子以終其義相烏德陽人袁稚妻也十五適稚二十稚亡無子父母欲改嫁之便自殺袁福亦德陽人王上妻也有二子上以喪親過哀死福哀感終身父母欲改嫁之遂自殺汝敦妻某敦兄弟共居有父母時財㛐心欲得妻勸送二兄敦盡讓田宅奴婢與兄自出居後敦耕得金一器妻復勸送二兄夫妻共往㛐性吝嗇謂欲借貸甚不悅及見金踊躍兄感悟即出妻讓財還弟弟不受相讓積年後並察孝廉世為冠族涪杜季女者巴郡虞顯妻也年十八適顯顯亡無子季欲改嫁與同縣楊上慈曰受命虞氏虞氏早亡妾之不幸當生事賢姑死就養成室存亡等但欲在終養亡不有恨願不易圗季知不可告而奪也乃密謀與强逼迫之慈縊而死叔紀霸女孫也適廣漢王尊至有賢訓事姑以禮生子商海內名士廣漢周幹古朴彭協漢中祝龜為作頌曰少則為家之孝女長則為家之賢婦老則為子之慈親終溫且惠秉心塞淵宜諡曰化明惠母昭儀新繁張氏女廣漢朱叔賢妻也賢為郡督郵建安十九年劉先主圍劉璋於成都賢坐謀外降璋以昭儀配兵將見逼昭儀自殺三軍莫不哀嘆趙媛姜資中盛道妻建安五年道坐罪夫婦閉獄子翔方五嵗姜謂道曰官有常刑君不得免矣妾在何益君門戶君可同翔亡命妾代君死可得繼君宗廟道依違數日姜苦勸之遂解脫給衣糧使去姜代為應對度道走逺乃告吏自殺後遇赦父子得還道雖仕宦終不更娶貢羅郫羅倩女景竒妻也竒早亡無子父愍其年壯以許同郡何詩貢羅白書誓父不還家父使詩白州州告縣逼遣之羅乃訴州刺史髙而許之玹何郫何氏女成都趙憲妻也憲早亡無子父母欲改嫁之何恚憤自幽不食句日而死郡縣為立石貞玦字瓊玉牛鞞程氏女張惟妻也年十九適惟未期惟亡無子養兄悅子供養舅姑夙夜不怠資中王冲欲娶玦玦叔父肱答以女志不可奪冲為太守李嚴督郵嚴記縣遣孝義掾奉羔雁宣太守命聘之玦乃自投水救援不死後太守蘇髙為立表蜀郡太守遣仁恕掾論曰貞玦太守章陵劉威又為作頌故稱述也蜀中廣記卷四十一
