body:
  text: 蜀中廣記卷十八明曹學佺撰名勝記第十八上川東道重慶府二合州三國志先主詣劉璋取道墊江入涪常道將曰巴子時雖都江州或治墊江又曰墊江在巴郡西北中水四百里有桑蠶牛馬漢時淳于長寧雅有美貌即此地矣圖經云魏之合州石鏡縣隋之涪州涪陵郡唐之合州巴川郡宋之合州石照縣皆理此方輿勝覽州南百步內江水心有石屹立正圓如月其根嶄嵓如雲捧之謂之石鏡冬出水可三丈碑目云涪內水石鏡題名云大厯三年此石出兵甲息黎庶歸六氣調五穀熟刺史兼侍御史王鋋記按石鏡石照縣俱以此名魏華父瑞應山記云景德間合州瑞應山出異木文理成天下太平字志云瑞應山在州後濮子墓在其上光教寺在其下寺今為州理所方輿云張柬之守合州姚崇薦其沉厚具相才故州治有沉厚堂今名景厚本此堂中篆繫辭八字字徑四尺李陽氷書碑隂為孟昶石經周禮數段碑目云李當塗篆龍門鳯穴司馬君實書公生明蘇唐卿篆䝉泉竹鶴等字俱嘉定間李元庚刻在治北薌林岩上治西鶴鳴里有招鶴亭三字宋徽宗書按志宣和間許生舉進士愛其鄰人朱受家羣鶴起亭作詩招之鶴果來集朱憤而訴諸朝上命均之鶴以離羣悲鳴不已道君為書亭額賜焉州有永清里里中有夜雨寺僧智果所居取李義山巴山夜雨之句也又有墊江里里中有龍骨寺為龍蛻處巴中記云墊江多龍矣志云周元公判州事嘗與客奕一老人來觀口流涎而香公驚問曰汝龍也何以至此老人曰安知之公曰以涎知爾忽大雷電起老人化龍泝溪而上公乃令琢方石二十四片以鎮之今通曉橋是其處在城內之明月街朝公武清華樓記曰合州其山龍多銅梁上接岷峨下繞甌越屬海而止所謂南戒者也水則涪水嘉陵合流城下貫江沱通漢沔引衆流入于海所謂南紀也水經注云宕渠水亦名濳水又名渝水俗謂之渠江寰宇記云渠江水在縣北十五里源自萬頃池分來經巴達渠廣安等界至本州東北與嘉陵江合即西漢水勝覽云西漢水在石照縣東百步戰國策所謂漢中之甲輕舟出於巴乘夏水下漢四日而至五渚也其源發西和州徼外徑階沔又徑大安軍利劍閬果與涪水㑹蔡松年南北史補云吐谷渾主登其國西疆觀墊江源問水所經長史曾和對曰此水經仇池過晉夀出宕渠始號墊江至巴郡而入于江度廣陵㑹于海主嘆曰水尚知歸吾獨無所歸乎乃遣使南通于劉宋志云㑹江門樓即唐之㑹江樓也杜詩君今起柂春江流余亦沙邊具小舟幸為達書賢府尹江花未盡㑹江樓范成大詩井陘東出縣山河古合州木根拏斷岸急雨洗江流關下嘉陵水沙頭杜老舟江花應好在無計㑹江樓文苑穆員送合州徐使君序云二月中節時芳為人栁先攀折而垂水待臨泛而滿花迎酒客而笑鶯隨詩人而吟亦㑹于江樓矣方輿勝覽云直郡治之㑹江樓有學士山其髙不能踰傍山而南峰斜崖諸勢班班若出其下亦甚異也山麓有張氏荔枝異本合幹唐文若曲端嘗賦之勝覽又云石照東北七里東臺山漢末薛融讀書處東十里東山趙子伯章别業有東山二字廣丈餘西二十里牟山唐康元良讀書處舊經云合州北崖在州北五里或以古濮國附㑹為濮岩非也岩有古柏數十章率圍八九尺有定林院歲正月九日郡以故事設宴於此遊人盛集又有荔枝閣沿崖鐫象設古意生動及古賢題刻甚多又有濮湖在岩下雖傾圮古隄及岩上刻字猶存岑象求定林院詩野闊蓮宮逈樓臺半倚山地連巴峽近門對濮溪灣柏徑松煙濕岩房雨蘚斑白雲邀客住明月伴僧閒經梵喧譁外香燈杳靄間勝遊成邂逅危搆喜躋攀世路長何極塵心久欲還輶車正催發緩步出重關元祐五年太守劉象功作濮嵓銘其序云距城三里有僧舍依大江林麓樓觀聳出如畫者伏於縑素間其絶俗幽邃厯厯可指子幼時侍先君嘗遊今被命領郡復至其所憮然有感親懷舊之嘆因作銘書諸嵓石云合之二川河漢發源極地通天浩渺東傾奔龍竄鯨吞䕫走荆上有蒼嵓喬松古杉隂晴撲藍飛嵓斷壁烟昏霧塞溟空嶽坼巴濮鄰國氣象相賊為狼為貊劒血初蝕二王滅迹雲閒晝寂世變茫茫山空地荒鳥剿獸藏創業其時鑿髙搆危立剎開基在昔幼冲侍於先公曾步嵓宮帝命惟汝克蹈前武得治兹土馳馬歲久江山惟舊中懷孔疚勒銘其巔子承孫傳與山齊年輿地碑目石照北嵓盧舍那佛題名云敬造盧舍那佛一軀菩薩二軀唐長慶三年歲次癸邜三月十九日銀青光祿大夫使持節合州諸軍事行合州刺史兼御史中丞劉溫溫自幽燕而來從左羽林軍使改授此記之歸正寺岩又云石門彌陀像開元二十三年州别駕張釗為刺史孫希莊作又云關詠永言王晳微之李儀表臣皇祐壬辰寒食日來又云崇寧丙戌歲時雨霑足因觀民田率巡檢髙公綜仲實石照令王叔陵仲升法曹馬師古宗道主簿姜宇定中同行至此早膳重午後一日郡守李樂道題又云馮茂恭邵商民唐立夫紹興乙亥十月癸巳同遊又云宇文休冉德濟閻文叔呂達夫乾道己丑三月草四日來遊又云濮巖東州勝處乾道辛卯立秋杜國光偕趙彥和馮廷式及其弟慶逺酌歲寒亭方輿勝覽云釣魚山在石照縣東十里涪內水在其南西溪上流經其北郡人遊者以舟下涪水艤而上已乃繞山北沿西漢水而歸此遊觀之竒也山南大石砥平有巨人迹相傳異人坐其上投釣江中山以是名下有大剎曰護國寺歲二月八日太守率僚屬宴集于此志云釣魚山東西南三面據江峭壁懸崖安撫使余玠於山建城以禦胡元故又呼釣魚城也上有天池周五百餘步後有石菴凡二十四片石鑿成開山石頭和尚所創西南隅有祠奉李忠宣公德輝蓋安撫王立之義妹李氏在圍中忠宣奏闕得保全其人民云元人登釣魚山詩臺倚層巒萬仞髙魚龍面面湧驚濤振衣更切臨淵想擬選長竿學釣鼇又峰頭借得月為鈎把向江心自不收莫笑山人似緣木磻溪元是釣西周又遺庵故傍唐僧塔荒壘猶餘宋戰場讀罷題詩聊騁望半江寒霧送斜陽輿地碑目眉山王魯望萬里西歸艤舟合陽趙濱甫侯德之定之孫相之載之相與遊釣魚秋雨初霽心意豁然酌酒至明興盡而返又云眉山家漁歸以嘉定乙亥七月九日訪釣魚小供因留詩石上暫脫塵羈入古藍西風送我與禪參漲開二水虬朱鬛嵐隱諸峰玉碧簮兩武深痕墮塵跡一椎打就踏雲庵自憐把釣人多老消息遙遙自渭南又云紹熙改元郡守汲國呂交修無棄以清明日率長安母如愚子發長江杜几伯扶資中馬三捷周臣普慈楊文彥章蓬溪趙君瑞族人郁某既放舟來尋釣魚城之勝積雨初霽放懷舉酒男鑒仁姪近仁明仁與仁偕麟孫住僧侍行其傍有閩人朱涣詩云釣魚磯上著閒身胸次應無一㸃塵偶爾不逢周漢主此心端弗愧前人紹熙辛亥臘月既望又云東沂尉行之輔之約晉國趙資深才父遂寧陳子龍益昌王國秉錦官王正仲乙卯慶元仲冬來遊又云眉山李壁來遊甥劉沖之族子潮俱慶元三年狗日又云新南劍州使君三衢徐公以今春解南昌之組治舟合陽避夏秋水漲以良月甲子解纜西歸攝郡僉李忠父偕同僚史仲立趙季紳梅君用張子信何文振張通叔白德章劉光父朝季子餞别於此郡國志云巴城在漢南江是楚襄王滅巴封其子為銅梁侯故有此城方輿勝覽云石照南五里有巴子城乃周武王封其支庶處在涪江南銅梁山下縉雲馮時行序謂山有茶色白甘腴俗謂之水茶甲於巴蜀元和志謂其多玉蕊花桃竹杖也寰宇記云銅梁山在石鏡縣南九里東西連亘二十餘里山巔平整環合諸峯此其獨秀者圖經有宿雲崖方崖松風閣讀書堂博古齊諸勝趙伯宜之别業也志云山在州南五里石梁橫亘其色如銅崖鐫銅梁山三字有石洞梁深丈餘有石牀可坐十餘人唐閭丘道人居此五十餘年乃化去棋局丹井猶存題名于洞壁者有閬州城南果何在永州淡嵓天下稀使山谷見之當復作何等語紹興癸酉春九日韓國趙善敏濩澤王季䝉普慈馮憲來又梁叔解組舟過合陽奉同登銅梁地主趙周祜鄉人王彥澤梁公行家姪方叔俱來紹興二十九年四月癸巳景和仲書又魯國趙彥博富文從元憲兄造銅梁山觀洞天石室丹臺靈泉茂林修竹之富仙境宛然追思周祜兄清標髙致今已隔世恨不當日得陪杖履周祜乃元憲仲弟其子師美敦書樂善豫子信常與之同僚知有子矣是晚元憲具酒肴於洞靈之道院道京師陜西事談論竑偉衮衮可聽吾宗之英也元憲之子師儒師老侍皆孝友恭儉克其家者日既夕乃歸淳祐二年五月十三日題蜀都賦云外負銅梁劉孝威詩銅梁不可攀孔德紹詩銅梁忽背飛王維送李員外賢郎詩少年何處去負米上銅梁借問阿戎父知為童子郎魚箋請詩賦橦布作衣裳薏苡扶衰病歸來幸可將朝公武將發合州詩銅梁山昏空翠重石鏡水落灘聲遲皆此山也寰宇記云隋析石鏡置赤水縣以赤水出其源也按志州西百餘里有赤水鄉赤水縣址存王象之碑目云唐令長新戒在赤水縣開元二十四年立𤣥宗嘗擇縣令百六十三人賜以丁寧之戒其後為縣者皆以戒刻石集古録取焉景祐中令重刻之今非唐故物矣又云雁塔題名在赤水縣廨宣和間柳瑊始刻置長安慈恩寺此蓋榻本也又云赤水縣龍多山唐人刻字此山髙明窈深變態萬狀下視涪水如帶烟雲出沒山之偉觀也又云祭龍多題名天寶十四載十月十一日大中大夫守巴川郡太守真寧縣開國男上柱國賜紫金魚袋韋藏鋒準制醮祭又云唐孫樵龍多山録舊刻刓闕元祐七年劉象功再書遒徑可喜又云集聖院記在赤水縣之龍多山唐咸通間李稽作又云龍多山鷲臺院紹興三十二年十一月縉雲馮時行記略云龍多山有至道觀觀東大池為則天后放生池中峰有鷲臺佛慧二院院栽萬竹竹徑圍尺有仙柏圍丈有二尺中空而柯葉敷腴有靈山院泉自崖出瀦為方池大旱不竭有駕鶴軒下視涪水如帶處圖經云晉永嘉三年馮仙舉家十七人於龍多山升去按即馮蓋羅也今仙臺觀其燒丹處至道觀壁間其繪像存焉馮時行詩云兒童便讀山中記老大才登記裏山何麟詩世路聱牙赤水過故升天險問龍多彭應求詩一望東川盡數州依崖泉石更清幽不辭挹月披雲卧攬取山房一夕秋注云山逺且髙逶迤如龍蟠故曰龍多也涪江在其下去州百二十里寰宇記青石山在石鏡西二百二十里涪水之南漢時山裂之處至今猶存李膺益州記曰昔巴蜀爭界久而不決漢髙八年一朝密霧青石山為之裂自上及下破處直若引繩焉於是州界始判上有古祠靈於水旱華陽國志所謂青石神矣豫觀孫樵龍多山記云梓潼南鄙越五百里其中有山崛起中天即山之趾得徑委延舉武三十北出其巔氣象鮮妍孕成隂烟屹石巉巉别為東巖槎牙重復爭先角逐若絶若裂若缺若穴突者虎怒企者猿踞橫者木朴挺者碑豎又有似乎飛簷連軒櫨交攢欹撐兀柱懸棟危礎殊狀詭類愕不得視下有畝平砥若戶庭攄乳側脈膏渟泓石俯對絶壑杪臨蘭薄仙臺標異藂石負起屹與山别猿鳥蹟絶腹竇而空路由其中齗齶相望攀緣下上闖然而出曜見白日始時永嘉飛真蓋羅𤣥踪斯存石刻傳聞丹成而仙駕鶴騰天一去遼廓千載寂寞澄泉傳靈别壑絶明風閒境清寂寞無聲佳木美竹岡巒交植風來怒黑雷動岩谷山禽嵓獸捷翮互鶩曉吟暄啼聽之凄凄回環下矚萬類在目因山帶川青縈碧聯莽蒼際天杳杳不分月上于東日薄于泉魄朗輪昏出入目前其或宿霧朝雲糊空縳山漠漠漫漫莫知其端暘曜始浴徹天昏紅輪髙而赤洪流激射濃透薄釋綿裂綺折千狀萬態倐然收霽樵起來而遊泊車而休登降信宿聞見習熟始曰山乎曾未始有得乎無處夸世釣名者汚此巖扄乎且欲聞于潁陽之徒乎銅梁縣川曰巴川以水繞其治前如巴字矣山曰巴嶽以峰髙出雲表如嶽勢矣碑目云古書巖在巴川縣石間隱隱如篆文不可讀又云季札墓銘在巴川縣相傳以為孔子所書紀勝云縣東里許丘曰羅堠名東嵓宋馮倓記云歲星位于泰熒惑位于衡太白位于華辰星位于常鎮星位于嵩而羅堠計都二星位于巴嶽之旁昭然可考也勝覽云南峰在巴川縣東四十里髙五里是為峽山之首兩山復出對峙中廣十里塗左有穴謂之仙洞其深五里竇水流出為澗有嘉魚又云中峰在巴川縣東南六十里山環二十里如盤民錯居如畫有泉自山注下曰天池紀勝云縣南十五里有巴嶽山絶頂蟠螭若爐其下有崑崙洞多蒼玉産仙茅菅唐長慶中采樵者服之得仙又産木蓮花髙五六尺葉如楩楠花如菡萏出山則不植有玉版泉在山上味甘冽不竭相傳昔人斫井得玉版叩之清越如磬聲然碑目云唐永泰二年石刻在巴嶽山之化度院石刻但云永泰二年按永泰齊明帝唐代宗年號齊永泰止五月而唐永泰二年十一月始改大厯故知為唐無疑周茂叔天池詩云清和天氣年能幾短葛輕紗近水涯風似相知偏到袖魚如通信不驚槎笑憑山色傾新甕醉傍汀隂數落花嘯傲不妨明月上一行歸路起栖鴉又有觀巴嶽木蓮詩云仙姿元是華巔栽不向東林沼上開嫩蕊曉隨梅雨放清香時傍竹風來枝懸縞蒂垂金彈瓣落蒼苔墜玉杯若使耶溪少年見定拋蘭槳到嵒隈是時濓溪判合州事來遊二作亦皆輕逸不沾道學氣可喜也志云治西百步有望仙樓為唐刺史趙延之建延之刺合州破賊有功後得道仙去詳神仙記中按少陵巴山詩云巴山遇中使云自峽城來盜賊遂奔突乘輿恐未回天寒召伯樹地闊望仙臺狼狽風塵裏羣臣安在哉又有亡名氏詩云西山頂上最髙樓登眺能消萬古愁奉使客來才十日登仙人去已千秋荒凉巖檜含風雨曲折巴川學字流傍晚蹇驢林下過溪雲潭影兩悠悠皆為延之作也定逺縣縣南江邊有新明寺古斷碑云此晉之新明縣也嘉陵玉溪在其左右中有一岩據大江以西秀拔自雄此即西嵓境而漢初縣設焉碑目云唐趙應龍冢在舊漢初縣上有一坊左右畫彩鳯大書雍侯之居開元乙卯季秋十九日立又云大圓山有光塵子墨迹云三山相接欲飛騰髙下來為半日登合向中間著夫子大員道士小員僧傍書宋乾道壬辰年相傳以為呂仙作矣安居縣陳子昂詩序入峭峽安居溪伐木溪源幽邃林嶺相映有竒致焉其詩曰肅徒歌伐木騖楫漾輕舟靡迤隨回水潺湲泝淺流烟沙分兩岸露島夾雙洲古樹連雲密交峰入浪浮巖潭相映媚溪谷屢環周路逈光逾逼山深興轉幽麕鼯寒思晚猿鳥暮聲秋誓息蘭臺策將從桂樹遊因書謝親愛千歲覓蓬丘此即舊縣之安居壩也今縣别名瓊江以官濺溪平灘一帶流入涪江舊傳有瓊花浮水面而出故號為瓊江矣縣理在波羅川東里許蓋有波崙寺云屑峰峭壁聳插雲霄憑欄而望江山如繡每月白前後皎然氷輪若自頂出而殿閣翬飛悠悠松檜間也三仙石連理樹俱在其趾濟勝者所必由矣又東去為鳯凰山昔人于此得遺碑云朝棲梧桐暮宿此山其山頂巨石平正謂之鳯凰臺而西南對立者曰龍歸山上有龍歸寺山形盤旋如龍亦一方之幽勝也正南則龍門山兩峰壁立如門漢隱士蘇汝礪藏書三萬卷于此此初學記所載舊屬銅梁今割入當縣碑目云龍門山東八里有印土院院有將軍祠石刻云故唐將也逃難山中而死葬山隂或曰戰國時人也歲春夏民以車蓋迎其神至水上張帷致饗矣志云縣太平里有唐柳玭墓玭在景福間刺渝州遷瀘州道卒葬於安居也玭公綽之後善書初任御史大夫在渝時東川節度使顧彥暉請書德政碑玭曰若以潤筆為贈即不敢從命矣其剛正如此綦江縣江發源夜郎作蒼帛色故名綦昔南平軍之長官司也志云治南三舍溪關上有雁塔碑曰此地南平軍舊址南平王墓亦在此關瀛山在縣境去郡百二十里有四十八面壁立髙峻四時青翠望若蓬瀛唐貞觀置瀛山縣於此宋劉望之詩山盤四十八面險雲暗三百六旬秋其上有白雲觀觀前石笋參天有碑名鳥道碑方輿勝覽云南平軍西北有東溪溪上小市有孝感橋紹興甲戌有里婦從姑過溪姑墜水赴救之亦墜漂至灘下皆不溺南川縣陳復亨㕔事記云南平州邊夜郎外控諸酋跨漢二郡唐五州之境寰宇記曰武德二年置南州理隆陽縣取西永隆山為名先天避諱改為南川貞觀四年置南平州理南平縣八年改為霸州又云貞觀十一年涪州置隆化縣亦取永隆山先天改為賓化縣按三地相去密邇俱在渝州南境及涪陵枳縣之舊墟矣通志謂宋初於當縣置南平軍熙寧省入隆化尋復置元併南平軍及隆化入焉者也文苑英華李嶠有敕奉議郎行涪州隆化縣元素履制綰符兩穴游刃三巴賓僚戀仰蠻漢謳吟者矣寰宇記云南平西四里有赤水即丹水也唐置丹溪縣于此丹溪合於僰溪故改南州為僰州焉僰水流入江津縣南界所謂僰溪口也今縣西二里有僰水寺方輿勝覽云僰溪東溪葛溪合流當縣西北故貞觀又置三溪縣焉其所理名為石城在今縣東甚峻險僞蜀毛文錫茶譜云南平縣有狼峱山出茶黃黑色渝人重之寰宇記云狼峱鄉人搆屋髙樹上謂之閣欄不解絲竹惟擊銅鼓祭鬼以祈福一名㺐崖在南平軍西方輿勝覽熊本平木斗夷得地五百里山髙谷深乃奏建南平軍謂即板楯七蠻故地先是劉孝標守南州請置郡縣逺人安之晏殊為孝標撰墓銘尚在劉夷叔雲山堂詩山繞郡樓初過雨月臨池樹晚生烟蒲公孟南川驛詩鶯花非漢舊棟宇尚唐餘趙彥邁歲熟詩蕞爾曾無一掌平由來作郡亦强名雲連萬嶂山橫翠川合三溪水繞城又云風俗連巴楚封疆接播溱方輿勝覽縣去溱溪三十里為鹿洞堡去播州三百里為白錦堡王象之碑目云溱溪寨路西心坎崖上有𨽻書本初三年三月十六日共二十餘字文多殘缺不可讀漢質帝時刻也去南平軍七十餘里又云溱州堡吹角壩上有古磨崖風雨朘剝苔蘚侵蝕惟識其一二曰建安其他不可辨漢獻帝時刻也又云吹角壩有姜維碑始土人開山得一穴穴內有碑姜維字猶可辨又云南川鎮下三里崖上有石佛像近有碑出於其下司法參軍員外郎置司正靳豫撰序云南州城門前右岸盧舍那石像乃開元十八年十二月丙戌中大夫使持節南州諸軍事守南州刺史上柱國晉昌唐虞景所造又云白鵠寺鐘碑字磨滅垂盡尚餘一二可識曰白鵠寺鐘處士彭城劉欣文也又云羅圍城上有古碑名平真碑未詳按志治境上有此城長夀縣華陽國志江州郡樂城縣在州西三百里延熙十七年省按今縣界有樂磧鎮即其地寰宇記曰唐武德置樂溫縣秦時枳地也桓元子别置枳縣在巴之北涪之南至後周省入于巴縣焉樂溫志曰樂溫山下有樂溫灘在縣南四十里元時置涪陵巡檢司因唐縣址也地氣常溫禾稼早熟因之得名志以此山人多耆耉亦名長夀山圖經云昔徐神翁煉丹於枳有丹崖髙二十餘丈下垂瀑布注于江崖下老榕薈翳𢎞敞而隂森者清隂洞也洞中多留題剝蝕不可辨有數行遒楷稍似涪翁及元許衡偕門人趙進真來遊題名志云在學宮右側圖經集仙山為徐神翁飛升處在縣之北真觀搗藥杵臼尚存有臺曰烟霞臺即此志又云白虎山亦名鳯山在涪西一里山麓刻讀書處三字旁識云端平二年鶴山赴樂溫為史子書按眉人史大用讀書子樂溫白虎山作崇德廟碑者也鳯山下有韓村宋開禧中土人韓申之見山坡有緑衣端坐指麾其僕入村酤酒有白騾齕草其旁即文昌書所謂牧騾化矣圖經云白虎山石龕篆風月之臺四字甚古其上石崖桃花水出焉有洞古邃幽深銀鴨石笋杳然人境即桃花洞也志云不語灘在縣東一里相傳客航過此皆相戒不言言則灘加洶湧又云玉溪里在縣西八里宋賢譙定天發㬊淵亞夫所居也譙學于伊川㬊學于考亭云輿地碑目古書山去樂溫縣四十里有大厯年石刻云昔人砌山路見石穴中藏蝌蚪書數軸古書之名起于此宋安剛中張桓侯廟記云漢自建安以來皇綱齊弛神鼎震覆姦雄觀釁實生豕心本初孟德之徒磨牙礪吻血視生靈期於吞噬不留遺臭先主慷慨為國志在援拯一時豪英狥義蜂起相與提挈共成大事諸葛關張實為之最凛冽威風萬夫之雄荆州之役羣盜鼎來公為後拒畢力盡死以抗羣醜奮髯張目橫戈一叱蛇豕異類褫魄逃遁虞淵之日復耀西南繄公之功迄今千歲英靈之氣森聳如在廟食百世在禮固宜樂溫之山下瞰大江公之神爽實茲寓焉自古迄今長載祀典舟行上下與彼士民奔走奉事敢不䖍至九穀嘉生連被原隰舸揖往返安流無恙隂相之功在國與民天朝纍封進爵為王惟是廟宇興建歲久行廊爛頺往來咨嗟力莫能振郡守李公向者趨朝祗謁祠下再拜祈禱厥應如響至郡未幾首議修繕自捐金帛衆趨成之功費雖多了不病民撤去卑陋增飾輪奐開展地基比舊加倍是役也議興於庚午之冬落成於辛未之春焉蜀中廣記卷十八
