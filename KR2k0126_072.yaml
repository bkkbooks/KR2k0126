body:
  text: 蜀中廣記卷七十二明曹學佺撰神仙記第二川西道二𤣥都律云治者性命魂之所屬也張天師二十四治圖序曰太上以漢安二年正月七日中時下二十四治上八中八下八應二十四氣合二十八宿付天師奉行布化天師諱道陵字輔漢禀性嚴直經明行修學道有方先是永平二年拜巴郡江州縣令元和元年三月辛丑拜司空封食冀縣侯以芝草圖經厯神仙為事任漢安元年丁丑有詔書遷改不拜遂解官入益部栖蜀郡臨卭縣渠亭山赤石城中靜思精至五月一日夜半時有千乘萬騎來下至赤石城前金車羽蓋部從龍虎鬼兵不可稱數有五人其一云是周柱下史也一新出太上老君也一太上高皇帝中黃真君也一漢師張良子房也一佐漢子淵即天師外祖也各言子骨法合道又承老君忠臣之後合授子瑰號傳世子孫為國師撫民無期於是道陵親受太上寶敕步綱躡紀統承三天佐國扶命養育羣生整理鬼氣傳為國師依度數開立二十四治十九靜廬復授正一明威之道伐誅邪僞與天下萬神盟第一陽平山治在蜀郡彭州九隴縣去成都百八十里道由羅江水兩岐山口入水路四十里治道東有龍門拒守神木二柏生其上西南有大泉決水歸東貴人發之治王始終正治居第八上品應第一角宿上治無極虛無無形主辰生人屬金按陽平治山中又有主簿嗣師系師三治嗣師天師子也諱衡字靈真志節高亮隱習仙業孝靈帝徵為郎中不就以光和二年正月十五日己巳於陽平山升仙立雙碑在治門名嗣師治主簿是天師門下系師乃嗣師之子諱魯得尸解於此山故皆立治焉第二鹿堂山治在漢州綿竹縣界北鄉去成都三百里上有仙室仙臺古人度世之處桓帝永壽元年太上老君將天師至此治與四鎮太嵗大將軍川廟百鬼共折石為要皆從正一明威之道山有松柏五龍仙穴通船渡持火入穴行三日不盡號長發之治王八十年正治居第七上品應第二亢宿上治無極虛無自然主辰生人屬金第三鶴鳴神山治山與青城天國山相連去成都二百里在蜀郡臨卭縣界徑道三百里世人不知之馬底子何丹陽得道處治前三水共成一帶神龍居之有四金釘二石子金銀蠶三斛亦言尹喜主之神仙傳云天師遇中國紛亂乃入蜀鵠鳴山即此賤人發之治王六十年正治居第六上品應第三氐宿上治無極𤣥元無為主辰生人屬木第四漓沅山治在彭州九隴縣界與鹿堂山相連其間八十里去成都二百五十里有栗松神草服之升仙又有四龍起騎之門范蠡主之庶人發之治王二十年正治居第五上品應第四房宿上治虛白主卯生人屬土第五葛璝山治在九隴縣界與漓沅山相連去成都二百三十里去陽平治水口四十八里昔賢於此得道上有松栗山高六百丈道人發之治王九十年正治居第四上品應第五心宿上治洞白主卯生人屬火第六庚除山治山去平地三百九十丈在廣漢郡綿竹縣西五里去成都二百八十里山上常有仙人來往可以度厄養性昔張力得道之處山有二石室三龍頭雒水繞之當道士發之治王始終正治居第三上品應第六尾宿上治三一主寅生人屬火第七秦中治在廣漢郡德陽縣東五里去成都二百里其山浮昔韓衆於此得仙前有大水東有道徑於漢洛治面有大石銅為志癲人發之治王始終正治居二上品應第七箕宿上治三元主寅生人屬水第八真多治山在懷安軍金堂縣去成都一百五十里有芝草神藥得而服之壽千億山高二百八十丈前有池水水中神魚五頭昔王方平於此與太上老君相見女人發之治王七十年正治居第上品應第八斗宿上治三五主丑生人屬金右上皇元年七月七日無上大道老君所立上品八治上治即正治也內治大治是其别名第一昌利治在懷安軍金堂縣東四十里去成都百五十里昔蜀郡李八百初學道處八百常旦出戲成都市暮還宿於青城山幾數百里故號八百也山南石室容八十人前有三龍門為志狂惑人發之治王五百年正治居第八中品應第九牛宿上治九天主丑生人屬土第二隸上治季主先生學道飛仙之所在德陽縣東二十里山有二石室一神井白鹿鶴鳩時來飲之有石在治前與綿竹相連西有赤石溪溪上三松為志山去平地二千九百丈昔中山衛叔卿於此得道貧賤人發之治王百年正治居第七中品應第十女宿上治五城主丑生人屬火第三涌泉治昔廣漢馬明生學道得仙太上老君化形住此在遂寧郡小溪縣界山上有泉水已病野人發之治世傳為祝水治王三十年正治居第六中品應第十一虛宿上治元神主子生人屬木第四稠粳治在犍為郡新津縣去成都百一十里汶山江水經焉山高去平地千七百丈軒轅學道之處治左右連岡相續西北即味江水有芝草仙藥可養性命貴人發之治王五十年正治居第五中品應第十二危宿上治丹田主子生人屬火第五北平治在眉州彭山縣一名山治去成都百四十里上有池縱橫二百步産神芝藥草食之與天相久昔越人王子喬得仙處道師發之治王四十年正治居第四中品應第十三室宿上治常先主亥生人屬金第六本竹治在蜀州新津縣去成都百二十五里高千三百丈上有白水松香林在治陌北有龍穴地道通峨眉山郭子聲得道之處後有林竹西十五里通鶴鳴山治前水中常有神龍遊戲號龍門吏人發之治王五百年正治居第三中品應第十三壁宿上治金梁主亥生人屬木第七䝉秦治山在越嶲郡臺登縣西去城隔河二十里去成都千四百二十里前有小山後有大山高千丈昔伊尹於此學道上産芝英金液草服之得度世漢中趙升得道處凡人發之治王九十年正治居第二中品應第十五奎宿上治六府主戌生人屬火第八平蓋治在蜀州新津縣去成都八十里前山下有玉人長一丈三尺昔吳郡崔孝通於此學道得飛仙山西有大江南有長山北有平川中有龍門陰人發之治王千年正治居第一中品應第十六婁宿上治太一君主戌生人屬土右無極元年十月十五日真正無極太上立中八品治又云𤣥老治之第一雲臺治在巴西郡閬州蒼溪縣東二十里直上十八里方得山足去成都千三百七十里天師將弟子三百七十人住治上教化二年白日升天後一年夫人雍復升天後三十年趙升王長復白日升天治前有巴西大水山有一樹桃三年花五年實高七十丈下臨無底之谷治有人形師人發之治王五十年正治居第八下品應第十七胃宿上治五龍主戌生人屬木第二濜口治山在漢中郡江陽縣去成都二千九百二十里陳安世於此學道得仙安世京兆人也漢中水過其前山一名平元山西有長山東有流海帝王所住有青龍門治應昴宿俗人發之治王五百年正治居第七下品應第十八昴宿上治隨天主酉生人屬木第三後城治山在漢州什邡縣昔㬊子然於此學仙得道左有大水後有重山上産神芝服之壽千嵗一名黃陵山南有長山北有青龍東有松柏為志凡人發之治王八十年正治居第六下品應第十九畢宿上治六丁主酉生人屬土第四公慕治在漢州什邡縣去後城治百里昔蘇子玉於此學道得仙又名北蓬山南有石坎北有懸流病人發之治王七十年正治居第五下品應第二十觜宿上治十二辰主申生人屬金第五平岡治在蜀州新津縣去成都百里昔蜀郡李阿於此學道白日升天道士發之治王二十年北有三重曹溪南有特山為志正治居第四下品應第二十一參宿上治還身主申生人屬水第六主簿治在卭州蒲江縣界去成都百五十里蜀郡王興於此學道得仙一名長秋山南有石室玉堂松柏生其前徹人發之治王八十年正治居第三下品應二十二井宿上治拘神主未生人屬金第七玉局治在成都南門內漢永壽元年正月七日太上老君乘白鹿張天師乘白鶴至此坐玉局腳床因名玉局治千丈大人發之治王三世正治居第二下品應二十三鬼宿上治無形非人所生屬水又云主未生人第八北邙治在東都洛陽縣梁水在其左務成子於此得道大黃出其東穴有水南流仙聖發之治王六十年正治居第一下品應第二十四栁宿上治聚元主未生人屬土右無上二年正月七日無為大道𤣥真立下八品治又云太上治之第一岡氐治在蘭武山應第二十五星宿上治别形主午生人屬水第二白石治在𤣥極山應第二十六張宿上治保氣主午生人屬金第三鍾茂治在元東山應第二十七翼宿上治五玉主已生人屬水第四具山治在飯陽山應第二十八軫宿上治金堂主已生人屬土右漢安元年七月七日天師立四治付嗣師以備二十八宿之數地圖云四治在京師東北天師又立配治八所平公治屬水配湧泉公慕治屬土配稠粳天台治屬土配本竹瀨鄉治屬金配昌利樽領治屬金配雲臺代元治屬金配雲臺和里治屬火配隸上漓沅治屬金配昌利系師以太元二年正月七日立遊治八所峨眉治青城治黃金治俱在蜀郡界太華治在京兆郡界慈母治在城市山界河逢治在上黨郡界平都治在巴郡界吉陽治在蜀郡界按𤣥都職治律云代元平都是巡遊治也乃知峨眉等亦是遊治太元當是上天之號附録各化事蹟什邡公慕化開山記乃成都名士王汝霖筆也略云山川英靈清淑之氣其磅礴鬱積發而為人詰其所由各有攸主豫嘗觀道蹟靈化草有四其在蜀漢者甘有三在伊雒者一蓋天有三元以生人人有三部部各八景景三八凡二十有四上應天之二十四氣下應地之二十四治蜀於天地間在西南終養之方道家所謂人門者也人生雖受氣於天而實受形於地故山川孕秀上應天象下應人身而靈蹟所在為仙靈之奧區列宿之别府以人門之故在蜀化多宜無足怪而雒為天地之中鍾而為人亦因其所也凡靈治在廣漢者九而公慕之在什邡疊巘崇崖聳秀特立高不可窮其際自蘇子玉飛升之後觀依仙趾立厥下方宫宇頺壞其來已久通直郎知綿竹縣事魏良忠為楊村茶官日命道士李淳然住持此山銖集寸纍鳩材修工至於十有三年創為九皇殿一齊厨廊廡重樓復閣約三百餘間手植松柏望之鬱然過者增敬其有功於斯化亦甚大矣豫觀二十四化節候所厯及星宿所繫人命所屬著之記載差云不同雖杜廣成一手之書亦有差謬豫因而考正别為一書謂之旁通記焉杜廣成記公慕氣應小雪星屬觜而别為嶽瀆記乃云氣應小雪星屬心尾缺人命所屬杜廣成記屬午中而嶽瀆記止屬壬缺中至丙中無所屬戊中又屬鹿堂五嶽名山圖亦缺立午中此其抵牾之大槩也豫既為記其事併以二十四化旁通記與之俾歸而藏諸山中以備往來士夫觀覽云慶元六年閏六月十七日朝議大夫直祕閣知漢州軍州事兼管內勸農事李嘉謀書亡籖云鶴鳴化在大邑西北三十里鶴鳴山山形如覆甃有石如鵠故名又云二十四洞應二十四氣每過一氣則一洞之竅開山頂上清宫天師時所建臨卭墁工謝貞賃作其中竭彼誠敬感一道人身逾九尺神彩異常自門入觀謂貞曰山中難值修葺愧勞用工末由見報以手畫地為符曰可記此畫用救疾病衣食自充忽然不見貞試以治人應手而驗大獲豐給焉貞知道人為天師化身遍訪本山及陵州井中塑像俱非所見後至青城山遇峽中賈客修齊展一小幅供養與授符者同靈驗記唐昭宗時成都張郃妻死三年忽還家下語曰昔聖駕幸蜀時西川進軍興平定國寨以討黃巢其時鄰家馮老父子二人差赴軍前去時留寄物直三十千在某處馮父子殁陳不回物已被破用却於冥中論理追某魂魄對會經今六年矣近奉天曹斷下云自是殁陳不歸非關巨蠧令陪三百貫即得解免緣臘月二十五已後百司交替又須停住經年其錢須是二十五日已前就玉局化北帝天曹庫子送納一張紙作一貫其餘門司庫子本案一一别送與人間無異其家聞之以光化三年臘月二十三日就北帝院奏前件錢訖是夕妻夢中告謝而去又成都縣押司録事姓馮死十餘年其姪為冥司誤追到縣馮怒所追吏放其姪自縣後門倉院路而還見路兩畔有舍六十餘間云是天曹庫收貯玉局化所奏錢幣處先天傳云九隴縣人張守圭家甚富有茶園在陽平化仙居山上召採茶人力百餘男女錯雜有一少年賃為摘茶甚了慧勤願守圭憐之以為義兒又一女子可二十餘亦無親族願為義兒之婦孝義端恪守圭甚喜之一旦山水泛溢市井路絶鹽酪既闕守圭以為憂新婦曰此可買耳取錢出門十數步置錢樹下以杖叩樹得鹽酪而歸後或有所需但令叩樹取之無不得者其夫術亦如此他日出遇鄰婦十數於堋口市買酒一碗與飲衆婦皆醉而碗中酒不竭逺近傳說人皆異之守圭請問其術受於何人少年曰我陽平洞仙人耳因有小過謫人間不久當去守圭曰洞府人間亦相類否答曰二十四化各有一大洞或方千里五百里三百里其中皆有日月飛精謂之伏神之根下照洞中與世間無異亦有仙王仙官仙卿輔相如世之職司有得道之人及積功遷神反生之者皆居其中以為民庶每年三元大節諸天上真下遊洞天以觀其所理善惡人世死生興廢水旱風雨預關於洞中焉其龍神祠廟血食之司皆為洞府所統也二十四化之外青城峨眉益登慈母繁陽嶓冡亦各有洞天不在十大洞天三十六小洞天之數洞之仙曹如人間郡縣聚落耳不可一一詳記之也旬日間忽然夫婦俱去不知所之靈驗記云南康王太尉中書令韋公臯乃成都尹相國張公之愛壻也韋量深器大舉止簡傲不狎於俗張以奕世相承德望清貴其族皆輕侮之韋亦未覺一夕忽夢二神人曰天下諸化領世人名籍吾子名係葛璝祿食全蜀富貴將及何自滯耶勉哉行矣異日富貴無以葛璝為忘也由是韋始有干祿之志謀於其室室以粧奩數十萬資之行既達秦川屬嵗饑久雨因知友所聘得署隴州軍事判官俄而駕出奉天郡守奔難行在韋率土客甲士挽軍儲以申扈衛就拜防禦使復請赴覲德宗望而器之既平冦難大駕還京以功晉檢校右僕射鳯翔節度使懇讓乞改西川乃授西川節度與張公交代焉擁師赴任張假道歸闕以避其鋒既而纍年蜀境大穰金帛豐積南詔內附乞為臣妾威名益重而貢賦不虧朝廷倚注戎蠻懾伏由是請許南詔置習讀院入質子學生習詩書禮樂自公始公文翰之美冠於一時南詔得其手筆輒刻石以榮其國而葛璝之事久已忘矣又夢前神人曰富貴而忘所因其何甚耶公夢覺流汗驚駭久之乃躬詣雲林炷香禱福遂命工度木揆日修崇作南宫飛閣四十間巨殿修廊重門邃宇範金刻石知無不為支九隴租賦于山下列屯輸貯糗糧山積匠石雲趨自製碑刻於洞門之側上構層樓召僰僮七十人以供灑掃良田五百畝以贍齊儲在鎮二十餘年胙土南康公本命丁卯屬葛璝化也感遇傳云于滿川者成都樂官也其所居逺水有一老叟常擔水以供數家一嵗上已滿川於學射山通真觀看蠶市見賣水老人云居在側近引滿川蠶市看訖仍邀過其家入榿竹徑厯渠塹可十里許即見門宇殿閣人物喧闐有像設圖繪若宫觀焉引至大厨中人亦甚衆失老叟所在問人乃葛璝化厨中且云來日蠶市方營設大齊頃刻之間已三日矣老叟自此亦不復賣水又云太和六年壬子節度使贊皇李公德裕差軍將蔡舉等就青城山修齊便令訪尋草藥至六時巖下忽有徑風自谷中出仰見二神人行虛空中一人在前長丈餘著大袖衣平冠一人居後著青衣大袖捧一帙書舉等驚悸問是何鬼神前一人答曰我是竹枝老又指其後人曰此是璝之璪我有密語兩紙可一一記之録與尚書今年西蜀合有水災以修齊故我回後山一峰堰水使東去矣仍授密語多李公吉凶未兆之事舉等一一記之歸至常道觀取筆録於紙上果得兩紙書寫既畢封呈李公是年八月東川水深數丈西蜀無害李公始異之厯問官寮及道流皆不能解忽悟曰竹枝老者丈人也當是丈人真君璝之璪者本命屬葛璝化或是化中靈官示現耳方輿勝覽云庚除山在綿竹縣上有石室三國時有霽雲子者入洞中見樓臺金碧門者呵止之曰子凡骨可亟去不然及禍霽雲子回後再入訪遂迷故道靈驗記云蜀州新津縣平蓋化神仙崔孝通得道之所真像存焉化有玉人長一丈見則天下太平殿左有玉女泉水深三四尺飲之愈疾化之上當山之半有榑木樹徑六七尺居人常聞其下有考楚號呌之聲莫知所以昭宗大順元年丁未山下居人何陸者性凶悍不懼罪福時值干戈化中無道流棲止乃拆殿宇伐林木為樵薪以貨之一旦病狂走詣山前僧舍中求水漿僧聞聲哀切出門視之見其仰面反手如被拘縛喉吻喘急流涕於口自言為毁平蓋化今被黃衣使者追捉繫縳將往榑木樹下地獄中考問去渴甚乞少水相救耳僧與之水良久徑去死於榑樹之下又泉側古跡雕塑二玉女亦被人盜取近化居人夢擒盜者生魂入化中已而其人遂患瘋疾又云金堂縣昌利化𤣥元觀南院𤣥元殿前有九井在平陸上或方或圓大者圍五六尺小者三二尺泉脉相通而水色各異氣味甘香蓋醴泉也無水旱增減之變常涵岸不溢蜀王討東川岐隴之師赴援乘鋭深入來届金堂江側江水泛漲雷雨異常遂不克濟師驚而遁時方盛暑探騎十餘人入化中見井而喜繫馬解衣將赴泉以浴忽有馬絆蛇騰湧而出首如白虎大若車軸噓氣噴毒勢欲噬人騎卒奔迸而去又每嵗三月三日蠶市逺近之人祈乞嗣息必於井中探得石者為男瓦礫為女效驗不爽又云什邡縣鐵像天尊高丈有二三俗謂之烏金像元在金堂峽中崖壁之下大水石摧像仍露現或浮於水上出五六尺其側即中品昌利化也道衆焚香備幡花迎引沉隱不見稍晴又泛泛而出昌利三迎之皆不可致明年夏大水泛濫乃泝流至什邡興道觀後水脉甚小不知其所來由邑人迎引上岸初只百人引拽已及平地欲置於大殿數百人挽之反不能動因立講堂於其處頻經亂離雖堂宇盡焚此像不損録異記云吉陽治在涪州南泝黔江三十里得之有像設古碑猶在物業甚多人莫敢犯涪州禆將藺庭雍之妹因過化中盜取常住物因即迷路數日之內身變為虎前足之上銀纒金釧宛然猶存每見鄉人輒隔樹與語云我盜化中物變身如此欲見我母幸為言之母聞畏而不敢往虎來往郭外經年始去右已上係天師靈化事蹟采摘成篇而多屬缺故編為卷之二蜀中廣記卷七十二
