body:
  text: 蜀中廣記卷十七明曹學佺撰名勝記第十七上川東道重慶府巴縣附郭山海經曰西南有巴國大皥生咸鳥咸鳥生乘釐乘釐生後照後照是始為巴人有國名曰流黃辛氏其域中方三百里其出是塵土有巴遂山澠水出焉又有朱卷之國有黑蛇青首食象郭璞注云今三巴是也後照乃巴人始祖辛氏即鄷氏出是塵土言殷盛也食象即巴蛇也水經注曰江州縣故巴子都也按春秋桓公九年巴子使韓服告楚請與鄧為好實始見傳文公十六年楚人秦人巴人伐庸實始見經及後七國稱王巴亦稱王華陽國志慎王五年蜀苴相攻苴侯奔巴巴為請于秦秦使張儀救苴滅蜀儀貪巴苴之富遂滅巴執王以歸乃城江州而置巴郡焉漢書列傳揚雄之先稱揚侯處于巫山至漢興其族遡江上居巴之江州即此縣矣兩漢巴郡東至魚復北接漢中西連僰道南極黔涪孝桓帝時刺史但望采文學掾趙芬等議上疏曰謹按巴郡圖經境界南北四千東西五千周萬餘里屬縣十四鹽鐵五官各有丞史逺縣去郡千二百至千五百里鄉亭去縣或三四百或及千里刺史行部不到十縣太守行桑農不到四縣且江州以東墊江以西上下殊俗情性不同敢欲分為二郡一治臨江一治安漢朝議未許獻帝初平元年劉璋始以墊江以上為巴郡治安漢以江州至臨江為永寧郡朐忍至魚復為固陵郡巴遂分矣建安六年魚復蹇𦙍白璋爭巴名乃改永寧為巴郡固陵為巴東以治安漢者為巴西於是有三巴之號按今地理沿舊但墊江猶屬巴郡耳巴志曰漢世郡治巴水北有柑橘官今北府城是也後乃徙南城今江北府城今江北南城今南城坪是常道將志云劉先主時都護李嚴大城江州周回十六里欲鑿城後山自汶江通水入巴江使城為州求以五郡置巴州丞相亮不許亮北征召嚴漢中故穿山不逮然造蒼龍白虎門别郡縣倉皆有城按治西十里佛圖關左右顧巴岷二江是李正平欲鑿處斧跡猶存今府城為門十有七九開八閉以象九宮八卦或曰象龜首乃向塗山水經曰江水又東北至巴郡江州縣東强水涪水漢水白水宕渠水合南流注之注曰强水即羌水宕渠即潜水渝水又云巴水出宣漢縣巴嶺山南流厯巴中徑巴郡故城南李嚴所築大城北西南入江庾仲雍所謂江州縣對二水口右則涪內水左則蜀外水是也巴水亦名西漢水寰宇記云巴縣所理岷江之北漢水之南矣李白峨嵋山月歌峨嵋山月半輪秋影入平羌江水流夜發清溪向三峽思君不見下渝州司空曙發渝州却寄韋判官詩紅燭津亭夜見君繁絃急管兩紛紛平明分手空江轉惟有猿聲嘯水雲府治枕金碧山漢時分祀金馬碧雞處也宋淳祐中制置使余玠因舊址纍為臺曰金碧臺嘗草詩餘一闋𨽻友石二字刻在治後式燕堂玠又嘗創招賢館於府東偏下令曰有謀欲以告近則徑詣公府逺則言於郡以禮遣之館中供帳一如帥府焉輿地碑目渝州有漢故益州刺史碑有延熙中嚴孝子碑有漢靈帝時太守張汭頌德碑俱云在郡治有劉宋義熙碑在岷江邊水淺涸始得見之見必有秋又名豐年碑本志云郡學後蓮花壩有石麟石虎相傳為古時巴君冢又云治北康村有小阜二十餘俗呼古陵亦曰巴子冢矣縣學有夫子燕居像有元文宗書萬里歸程四字故猶稱御書樓梁書曰巴郡有地忽自開成井方六丈深三十二丈圖經唐刺史皇甫珣於巴縣南鑿石六丈得泉號為新井以别於舊井也志云城內崇因寺有淨香亭修竹檀欒與金碧臺相掩映又云治平寺有石刻西山佛三字旁刻開山祖月名祖月宋治平時僧也有羅漢先天二洞皆古洞又云城中有東華觀觀後有東華十八洞皆相通今土人呼其處為神仙口相傳東華真君于比得道又云五福宮乃城中最髙處俯窺闤闠坐帶江流矣寰宇記云塗山在縣東南八里岷江之南岸髙七里周回二十里尾接石洞峽先主置關於此峽東西約長二里許華陽國志曰禹娶於塗山今江州塗山帝禹之廟銘存焉又曰山有禹王祠及塗后祠陶宏景水仙賦云塗山石帳天后翠幕夏禹所以集羣臣也按倦游録三門禹廟神儀侍衛極肅後殿一氊裘像侍衛皆胡人云是禹婦翁今不存三巴記云塗山北水有銘書辭云漢初犍為張君為太守忽得仙道從此升度又云縣下有清水穴巴人以此水為粉則膏暉鮮芳貢粉京師因名粉水故世謂江州墮林粉也今山下有清水溪即其處舊有道院名清溪院清水穴左為龍門峭壁中分瀑布下垂春遊汛艇必曲折經此渡江而歸穴之右為海棠溪溪植花木當夏漲時拏舟深入可數里而得幽勝矣水經注云江水又東徑黃葛峽山髙嶮全無人居圖經云塗山之足有古黃葛樹其下有黃葛渡制置余玠詩云龍門東去水和天待渡行人暫息肩自是晚來歸興急江頭爭上夕陽􅊑此黃葛晚渡作也白樂天塗山寺獨遊詩云野徑行無伴僧房宿有期塗山來去熟惟是馬蹄知宋余玠詩木魚敲罷起鐘聲透出叢林萬尸驚一百八聲方始盡六街三市有人行則今之覺林寺矣志云城西雉堞下有洞曰洪崖覆以巨石其下嵌空飛瀑時至亦名滴水崖有元豐時蘇軾任仲儀黃庭堅題刻嘉泰中成繪于中起吏隱亭洪偲又起輕紅亭焉茅盈內傳曰秦始皇三十一年九月庚子茅盈髙祖濛乘雲駕鶴白日升天先是有巴謡曰神仙得者茅初成駕鶴上升入太清時下𤣥洲戲赤城繼世而往在我盈帝若學之臘嘉平始皇聞之于是改臘為嘉平也今治西有棲真洞在大茅峽相傳洞中曽息大茅君云李膺益州記廣陽州東七里水南有遮要之塠石志云治東江滸廣陽壩即廣陽州也字宜從洲此石江中突起俗名遮夫塠華陽國志郡東枳有廣德嶼有明月峽故巴亦有三峽也王維曉行巴峽詩云際曉投巴峽餘春憶帝京晴江一女浣朝日衆禽鳴水國舟中市山橋樹杪行登髙萬井出眺回二流明人作殊方語鶯為舊國聲賴多山水趣稍解别離情杜甫渝州候嚴六侍御不到先下峽詩聞道乘驄發沙邊待至今不知雲雨散虛費短長吟山帶烏蠻闊江連白帝深􅊑經一柱觀留眼共登臨益州記云遮塠石東二里至明月峽峽前南岸壁髙四十丈有圓孔如滿月狀本志明月沱邊有髙冢橫刻伯喈墓三大字按蔡雍曾遷巴郡太守不拜有謝版云巴土長逺江山修隔宣暢聖化道遵和風非臣才力所能供給其墓末詳矣過此有紫金山有寺名金紫寺又過此有古灘城為巴子置津處又二十里有銅鑼峽以水響聲似之是涪岷水㑹處峽有關馮當可葬其上有圓石髙懸志云治西十里石壁繪佛像一徑僅容輿馬即佛圖關也又三十里為多功城宋末築有寺名多功寺門垣尤存寺有天池水又四十里為長安洞秉燭深入可里許見雙石墩猶龍過此則皆渟泓積水矣相傳崇因寺前居民屋內有洞與此通故崇因寺亦謂之長安寺也又二十里為東陽鎮唐置東陽城焉輿地碑目蜀廣政十五碑在東陽鎮市心即此陳子昻入東陽峽與李明府舟前後不相及詩云東崖初解纜南浦遂離羣出沒同洲島沿洄異渚濆風煙猶可望歌笑浩難聞路轉青山合峰回白日曛奔濤上漫漫積浪下沄沄倐忽猶疑及差池復兩分離離間逺樹藹藹沒遙氛孤狖啼寒月哀鴻呌斷雲仙舟不可見遙思坐氤氲又合州津口别弟至東陽峽步趂不及詩江潭共為客洲浦獨迷津思積芳亭樹心斷白眉人同衾成楚越别島類胡秦林岸隨天轉雲峯逐望新遙遙終不見默默坐含嚬念别疑三月經遊未一旬孤舟多逸興誰共爾為鄰峽之隔岸亦名龍門有石刻是江津縣龍門灘矣圖經縉雲山在縣西北百三十里其山髙聳多林木下有溫泉分東西流相傳黃帝於此合藥陶宏景水仙賦曰增城瑶館縉雲瓊闕黃帝所以觴百神也方輿勝覽即謂之巴山矣宋靈成侯廟碑云此山出于禹别九州之前黃帝時有縉雲氏不才子曰混沌縉雲氏高辛氏亦有不才子八人投出于巴賨以禦魑魅名基於此山有九峰寶塔峰最著亦阿育王塔八萬四千之一也迦葉尊者于九峰頂上示一十三足又飭袈裟印文於獅子峰按感通録縉雲寺即古相思寺也以此山有相思崕生相思竹形如桃叉矣吳均春秋渝州西百里相思寺北石山有佛跡十三皆長三尺許闊一尺一寸深九寸中有魚文在佛堂北十餘步貞觀二十年十月寺側泉內忽出紅蓮花面廣三尺遊旅往還無不嘆訝經月不滅髙僧傳隋無相禪師渡笠唐慈應禪師受記二龍處矣縉雲傳勝録云宋初慧歡禪師住持太宗皇帝御誦梵經二百四十函真宗咸平元年迎至寺景德中敕改崇教寺封慧歡為慈印大師有慈印師遺誡碑咸平三年二月二十七日立凡十三則有熙寧三年提㸃䕫州路諸州刑獄江中行立石界約祕書有權渝州事都官宋搆藏經記按宋史仁宗天聖元年三月庚辰涪陵相思寺夜有光出阿育王塔舊址發之得金銅像三百二十有七則此山在宋時稱極盛矣山麓溫泉懸崖湧出四時騰沸中有遊魚數十尾人皆見之宋推官彭應求詩云公程無暇日乍得宿清幽故覺空門客不生浮世愁溫泉喧古洞寒磬度危樓徹曉都忘寐渾疑在沃州周茂叔艤舟其下刻之于石方輿勝覽載縉雲先生馮時行詩云借問禪林景若何半天樓殿冠嵯峨莫言暑氣此中少自是清風髙處多岌岌九峰晴有霧瀰瀰一水逺無波我來遊覽便歸去不必吟成證道歌圖經云西南百里涪江中有魚石鹿石俗呼魚鹿峽以形肖也杜光庭録異記曰江州縣南五十里沱江山下有七里店其處夜常有光十餘枚如流星環石或聚或散石亦有光乃珠胎於此或人見而密識其處遲明尋之便不得志云治南六十里冠山多古寺有仙侶洞洞中石牀石傘儼如刻畫又十里為大華山有荔枝禪院按華陽國志江州縣多荔枝園熟時二千石常設㕑膳命士大夫共㑹樹下食之今樹已烏有而院名無恙也江津縣南齊時為江州縣理寰宇記所稱僰溪口矣今呼南溪溪源在縣東南合岷江繞治如几亦名几水四夷縣道記云自江津路南尋僰溪水路往南平州即此周地圖記七門郡置在僰口今之七門灘也志云在縣西七十里有七石橫江中志又云治西有石門號龍門灘即龍門峽也按陳子昂龍門峽詩曰龍門非禹鑿詭怪乃天功西南出巴峽不與衆山同長竇亘五里宛轉若嵌空伏湍喣濳石瀑水生輪風流動無晝夜噴薄龍門中潭河勢不測藻葩垂彩虹我行當季月煙景共春融江關勤亦甚巘㠋意難窮誓將息機事煉藥此山中志又云縣西十里有古石羊驛其地亦名石門對江壁上鐫大佛有大佛寺故相張無盡所創亦名無盡菴傍有亭翼然據大石而藏茂林修竹中客登之徘徊四顧南有鼎山東有天池北有馬驍其髙各刺天中突一峯名箕星尤竒特邑聚橫前萬瓦鱗列大江從西來委蛇曲折濯流杯池潄挑燈石直注亭下鷗鷺往來在湮波杳靄間清絶不可名狀宋知縣事冉木震碑云㕔事後有合抱荔枝唐人所種每熟時令肅士大夫㑹食樹下猶有漢之遺風荔枝舊有亭亭中碑刻歲久剝落想涪亭即舊址也昔黃魯直過江津與馮夀李仔善其樂間堂記為馮作也魯直與王觀復書云梓州李仔任道流寓江津二十餘年言行有物參道得要老成人也山谷晚號涪翁亭名想涪寄遐思耳圖經縣北有巴子養魚池神龍是濳志云在岷江南十里有長池廣袤五丈四時湛然范景仁墓居其北按流寓傳范蜀公居縣之長池里又云居樓臺山山在治西有范鎮村碑目云剛直御史之墓虞允文為杜莘老書按碑在縣之杜村有紹興乙亥右朝奉郎守司農少卿杜莘老題次乾道丙戌杜宗甫磨崖宗甫即莘老拾遺之後也自青神僑居于此又蘇伯瑜者叔黨之後亦自眉山僑居縣之聖鍾里東坡書歐陽醉翁亭記真跡尚藏其家李膺益州記云江州縣西南有仙池昔有仙人於此池側置樓而居多植香草於樓下一夕忽縱火焚其草天降紫雲飄然而去後人指其地為香草樓志云在今治西南三十里志又云唐大聖寺在縣西七十里按太平廣記東蜀大聖院一木像製度瓌異耆老云像自荆湖泝流而上厯歸峽等郡所過多具舟楫取千夫牽挽不抵岸流至渝州州人焚香祈請應聲而往建此院安置焉異物志云在昔天旱水泉皆涸有姑氏病渴思得甘泉其婦倣徨至周陽山下遇一叟曰能與吾叉則泉可得婦拔叉授之墜于地而泉出至今磧中餘淺水一泓周五六尺有金叉影一雙按在縣西之周溪上婦亦周姓又云昔有飛鳥􅋦僧衣袖僧異之隨至石隙中窺見一金注子手不能及鳥復銜一枝與僧因得取注顧視銜枝乃苦木也其處在治北五里碑目縣南三里挑燈磧石壁上鐫云乾道辛卯正月十九日天水趙宜之陪王屋李希仲太原王直夫同寺首珍况來遊飲不至醉王屋李孝友書按此即蓮花石也在江中不恆見見則歲豐巴中記曰江州縣有峰窮峽按在今縣東七十里珞璜鎮渝志云五十里有西山石壁上刻終古礙新月半邊無夕陽之句志又云近時盜發王居士墓墓中鐫二詩云官無名字私無債架有衣裳廪有儲只此便同天上樂不知天上又何如芳草烟村宿雨收牧童歸去倒騎牛笛中一曲升平樂弄得生來未解愁此墓在縣南一里居士亦不知為誰壁山縣宋李濬壁山普澤廟記云國朝蜀分為四而方各有鎮由劍之裏為七曲劍以東為白崕劍以西為玉壘自蜀而下為渝則有壁山是四山者如蜀之鎮一道生靈之司命也寰宇記云四面髙山中央平田周回二百餘里唐天寶中諸州逃尸多投此營種川中有一孤山西北二面險峻東南削平土人號為重壁山五代史後梁乾化三年五月壁山騶虞見二鹿隨之歐陽永叔嘆以為異也永川縣縣有蓮池壩二巨石崇聳欲合平衍可半里許石竅中出水滙而為小池世傳蓮子從石竅中出而生蓮不由栽植又有石松坪在來蘇鎮有松化石石質而松理或二三尺許大可合抱然不過相望數山有之俗呼雷燒松杜詩所謂萬年松化石者即此志云鐡山鎮在治東三十里趙抃過鐡山鋪寄交代吳龍圖詩暫留山驛又晨興西望旌麾想舊朋三院筆簮曾對直兩川兵印復交承年光頭鬢華如雪世態心情冷似氷境上憑詩馳逺意青泥寒曉入雲登又云六十里有牛尾驛鄭國華留題云龍尾道中退朝客雕鞍寶馬黃金勒誰憐逺使足馳驅夜半孤村牛尾驛榮昌縣談用之榮昌記云巴叢之饒溪交水橫列岫羅巘瓜瓞不斷詩紀云河梁望壟頭分手路悠悠徂年驚若電别日欲成秋黃鵠飛飛逺青山去去愁不言雲雨散更似東西流此梁江總别袁昌州作也勝覽云唐段建中太尉文昌之父嘗典榮昌二郡事見李德裕成都資福寺記唐守之可考者惟建中楊琯李師望韋君集四人而已唐史載大厯中韋君靖為榮昌令值黃巢兵起君靖引兵從征動以信義所向克捷纍官尚書僕射矣碑目云演教院碑在昌州舊基院有斷碑載唐咸通歲縣令唐允中又云六十四卦象碑在昌元縣又云淨土院碑在昌元縣東四十里唐太和五年建又云昌州北二十里亂石灘有唐人碑刻曰龍灘其溪深逺千餘丈世傳古有龍行石裂成溪因名大抵昌州今之舊州埧是昌元里即唐昌元縣地也今榮昌乃古寶蓋鎮志云南一里曰寶蓋山有卧佛寺疊形如皂蓋圓淨明朗聳翠炫竒矣楊子謨顯惠廟記靜南山水竒秀士大夫避地者多居焉仙靈逸迹尚有董葛之遺風按志云縣東二十里曰葛仙山相傳漢葛孝先受左慈術於此修煉又有峰腦山山巔有白石如羣羊狀下有石洞亦葛仙修煉處崖畔有巨石突出石縫中生桃一株髙丈餘葉幹與凡桃異花實不常國朝宣德中桃實各圍尺許紀勝云縣南二十里老鴉山有李戡李戣兄弟故宅二李善棊㑹遼索棊戰詔求天下善奕者蜀帥以戡應詔遼望風知畏不敢措手文潞公贈以詩云昌元建邑幾經春百里封疆秀色新鴨子池邊登第客老鴉山下著棋人大足縣唐光啓以前昌元是昌州光啓以後則昌州理大足矣縣左有碑字畫糢糊大略是昌州郡孔目題名也碑目云六經圖碑在郡學郡人楊甲鼎卿所著又云漢王方平古碑顔魯公書在舊學今徙為别刻字尚在碑隂矣冷齊夜話載有人調官都下踰年始得昌守已而求易便郡有淵才者聞而往見之曰昌佳郡也官欲易地有之乎曰然淵曰誤矣曰奉給優乎淵曰否訟簡乎淵曰否然則奚誤曰海棠患無香獨靜南者有香非佳郡而何故昌號海棠香國土人云地宜此花易植易蕃郡治香霏室一老樹重趺疉萼每花或二十餘瓣花氣穠郁餘不能及也志云縣之東禪寺有宋徽宗手碑西禪寺晉永和建寶頂寺唐栁本曽學吳道子筆意環崕數里鑿浮屠像竒譎幽怪古今所未有也志又云老君洞在治東南三十五里玉口山巔洞𢎞敞可容十餘人內石牀石臼丹竈尚存洞巔一隙透明有泉自石罅中流出山麓惟一小徑可通相傳老子煉丹于此又云寶珠溪在治南四十里唐貞觀時漁人郭福者夜捕魚見水際有光即之有蚌如斗剖得珠徑寸獻之太宗賜以積善井碑碣存又云北巖在治北三里唐韋君靖建寨其上曰永昌有石刻沿巖皆浮圖像輿地碑目云吳季子墓碑在北山相傳以為孔子書開元中殷仲容奉詔摸搨大厯中蕭定移刻潤州有張從申題其後又云髙祖大風歌碑在北山又云古文孝經在北山凡二十二章與今文十八章小異王象之曰今文先出於漢初而古文與尚書同出於孔子壞宅今文已盛而古文獨不列之學宮惟孔安國馬融為之傳及明皇注今文十八章孝經古文益微矣司馬光范祖禹皆曽繳進光謂始藏之時去古未逺其書最真祖禹又為之說亦云古文廣得其正碑目又云唐韋君靖碑在北山乾寧二年靜南令胡密所作按胡密永昌寨碑云永昌寨者君靖韋公所建也頃乾符之際天下騷然旱蝗相仍兵戈四起公覩兹遐僻民不聊生遂合置義兵安户口抑强扶弱務織勸農足食足兵以殺去殺自黃巢侵陷京闕鑾輿出幸成都四海波騰三川鼎沸韓秀升勃亂黔峽侵軼巴渝公乃統率義軍討除逆黨值秀升盡挽舟楫圍逼郡城公乃詳度機宜上下欄截依山排陳背水布兵兩面夾攻從中剪撲賊勢大敗我武維揚渝牧田公備録聞奏乃進忠節檢校御史大夫除拜普州刺史值川師效逆帥臣専征公又收復合州絶其枝蔓加右散騎常侍拜合州刺史洎鄭雄僕射失律廣漢山行章尚書攻圍當州故太尉顧公屢降命㫖頻招延應公統領精鋭二萬餘人䖍告蓍龜申令士卒並破二十七寨殺戮五萬餘人上聞偉績特加檢校工部尚書拜當州刺史充昌普渝合四州都指揮使加刑部尚書右僕射公以臨郡歲久乃思退居上表陳情宸衷未允特㫖量留加金紫光祿大夫檢校左僕射扶風縣開國男食邑三百戶屢銜鳯詔裒剖魚符政懋潁川化隆河內邑有箱倉之咏俗多襦袴之謡求瘼之念彌堅去害之心益切其於駕馭英傑取舍毫釐重仁義如丘山輕金帛如泥滓憐孤恤老濟弱扶危行旅於歸逺邁鄭莊之驛遊人若市悉登漢相之門其拯綏四方乃如此也每遇良辰美景月夕花朝張管絃以追歡啓華筵而召侶周旋有禮揖遜無譁樽爼不空座客常滿王衍之氷壺轉瑩嵇康之玉岫寧頺其禮讓謙恭有如此也至若立功立事為國為民或身提黑槊或坐運𤣥機身先士卒首挫凶徒謀必十全舉無遺算其剛毅果敢又如此也當夫賞功欣罪激濁揚清甄奬功勤黜棄私黨三異感德萬衆歸心其恩威刑賞有如此也公以海濤未息雲陳猶橫常願驅脅安置左綿載實倉庾奔衝遂府使牒呼逼邊檄征行然士馬雖精如栅寨未固何思大易習次之義徴王公設險之辭乃於景福元年歲春月卜築當鎮西北維沿岡山建寨兹山也上摩掩靄下抗平原矗似長雲萃如斷岸崕獻重疉磴道﨑嶇一夫荷戈萬人失據由是芟剃草萊相度地形人力子來畚鍤雲至連甍比屋萬户千門髙亢濬流烟籠粉堞霧捧朱樓龍吟笳角之聲雷動鼓鼙之響而又良工削墨心匠設規築城堡二十餘間建敵樓二十餘所遙瞻天際非龜城之可倫髙倚雲間豈蜃樓之能擬其上則飛泉迸出緑水滂流崢嶸一十二峰周回二十八里蓋造化之凝結豈金湯之比倫況糧儲千年兵屯萬數遐邇徴休軍民胥慶耕織無妨徭役不缺可謂一勞永逸有備無患者矣其軍中節級將校等賢深逹機略博識古今有如同志弟兄異姓骨肉一心報國戮力從軍咸奉渥恩皆沾爵賞或崇帶劍或位専城或榮授金貂或職兼霜憲雅荷際㑹允屬休明請列署石銜庶不墜勳業云爾乾寧二年乙卯十二月朔日癸未十九日辛丑記蜀中廣記卷十七
