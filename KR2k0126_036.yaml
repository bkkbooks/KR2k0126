body:
  text: 蜀中廣記卷三十六明曹學佺撰邊防記第六下川南道敘馬瀘道開府馬湖統轄敘瀘二衛烏蒙烏撒東川鎮雄永寧等府司參將一員駐劄永寧遊擊一員駐劄建武實左右之但永寧者兼貴州迤西等處地方故稱川貴參將云漢書西南夷傳唐蒙至夜郎夜郎旁小邑貪漢繒帛以為漢道險終不能有也乃且聽蒙約還報以為犍為郡治道自僰道至牂牁水經若水又東北至犍為朱提縣西瀘江水酈道元曰朱提山名也應劭曰在縣西南以氏焉犍為屬國也在郡南千八百許里建安二十年立朱提郡郡治縣故城郡西南二百里得所綰堂琅縣西北行上髙山羊腸繩屈八十餘里或攀木而升或繩索相牽而上緣陟者若將階天又有牛叩頭馬摶頰坂其艱險如此也舊志唐置晏髙筠定連蕯鞏等十四州𨽻戎州都督府唐末廢四州存十州宋神宗時十州夷內附𨽻瀘川郡前晏髙等州皆在焉元置戎髙鞏筠連四州𨽻敘州宣撫司至元十三年宣撫使咱順招諭酋長得蘭紐得貢卧等率衆歸附因設大壩總管府得蘭紐授都總管得貢卧充同知其羅星長官以黎川同知李奇為之上下羅計二千户俱得姓者為之輿地志曰敘州三路蠻西北曰董蠻正西曰石門部東南曰南廣蠻董蠻在馬湖江右僰侯國也其酋董氏南廣蠻在慶符縣石門蕃部與監洮土羌接唐興播等卞二州之地其人精悍善戰鬭自馬湖南廣諸族皆畏之蓋古浪稽魯望諸部也志云宋大觀中夷酋羅永順楊光榮李世恭等各以地內屬詔建滋純祥三州在慶符縣西元史四十六囤蠻夷所領豕蛾夷地在慶符南唐定州之支江縣也其長官司在髙縣西三十里落騷鄉文獻通考云獠蠻不辨姓氏所生男女長幼次第呼之其丈夫稱阿謨阿改婦人阿夷阿等之類今稍從漢俗易為羅楊等姓依樹積土以居其上名曰杆欄杆欄大小隨其家之口數杆欄即夷之榔盤也制略如樓門由側闢構梯以上即為祭所餘則以寢焉又云夷有姓氏男織班布纒頭衣裳俱如華製行纒以班布為之女綰髮為髻纒以班帶簮纒用銀兩耳各穿兩孔上貫叉下貫環富者疊貫之衣尚左袵下著桶裙間以組綵長覆膝下初娶不論物采惟通媒妁殺牛豕以為禮即引歸惟老死後方大索婚價飲食喜啖蝌蚪又云僰有姓氏用白練纒頭衣尚青碧背領袂緣俱刺文繡裳袴覆滕亦織班帶以為行纒嘗佩雙刀善使徑弩女綰髮撮髻飾以簮壓衫之前後左右文繡㶷爛長裙細褶膝以下亦刺文繡行纒雜以青紫出則著單履性淫婚則論財喪則戚鄰咸聚撾鼓作樂至夜男女雜遝自有畨書卜日不同于中國李京雲南志云白人者漢武帝開僰道通西南夷道戎州舊縣是也今轉為白人矣白人語著衣曰衣衣吃飯曰煙羮茹樵棌曰折薪帛曰羃酒曰尊鞍䩞曰悼泥墻曰磚垣男女首戴次工製如中原漁人蒲笠差大編竹為之覆以黑氊親舊雖久别無拜跪唯取工以為次男女披氊椎髻婦人不施脂粉酥澤其髮以青紗分編繞首盤繫裹以攢頂黑巾耳金環象牙纒臂衣繡方幅以半身細氊為上服處子孀婦出入無禁居屋多為回簷如殿制食貴生如豬羊雞魚皆生鹽之和以蒜泥而食每嵗以臘月二十四日祀祖如中州上冢之禮六月二十四日通夕以髙竿縳火炬照天小兒各持松明火相燒為戲謂之驅禳又云土獠蠻在敘川南烏蒙北皆是男子及十四五則左右擊去兩齒然後婚娶豬牛同室而居無匕筯手摶飯而食之踏髙橇上下山坂如奔鹿婦人跣足髙髻樺皮為冠耳墜大雙環衣黑布衣項帶鑞牌以為飾出入林麓望之宛如猿猱人死則以棺木盛之置于千仞巔崖之上以先墮者為吉山田薄少刀耕火種所收稻榖懸於草棚之下日旋搗而食多以採荔枝販茶為業云唐書戎州都督府羈縻州九十有二宋初見寰宇記者合敘瀘只載四十餘州而已他不可考樂子正曰羈縻諸州除沒落雲南蠻界一十五州其餘雖有名額元無城邑散在山洞不常其居撫之難馴擾之易動其為刺史父子相繼無子即以其黨有可者公舉之或因春秋有軍設則追集赴州著夏人衣服却歸山洞椎髻跣足或披氊或衣皮從蠻夷風俗無稅賦以供官每年使司須有優賞不拘文法今並存之要知古迹而已悅州在戎州南二百十七里管縣六甘泉青賔臨川悅木夷口胡璠移州在州西南五百八十七里管縣三移當領河湯陵扶德州唐開元十八年七月割入在東南四百五十七里領縣三扶德宋水牱隂筠州在四百一十七里管縣八鹽水筠山羅余臨居澄瀾臨崑唐川尋源連州在州西南四百餘里筠州析出管縣六當為都寧邏遊羅龍加平清坎鞏州儀鳯二年開山洞置天寶元年改為因忠郡乾元元年復為鞏州在南三百十里領縣五哆樓比邱都善播郎婆婆按即珙縣地鞏州者今之羅星渡哆樓者今在城之髙樓坊婆婆今江安縣界之婆婆村比邱今之九塞播郎今貴州界之安靜長官司都善一名都壇今名梅得此本志所載也宋州領縣四户六十九牱龍牱支宋水盧吾輸納半稅按髙縣西五十里有宋水南州在州西五百三十五里盈州析出管縣三播政百榮洪瀘德州在州南五百六十四里管縣二羅連萬崖為州在南四百九十里管縣二扶僧羅洛州在南四百二十七里管縣四臨津賓夷蔥藥曾口志州在西四百五十六里管縣四浮萍雞惟夷賓河西盈州在南五百六十七里管縣四盈州塗賽播陵施燕獻州在南六百六里管縣七名闕武昌州在南一千二百一十七里管縣七洪武羅虹琅林夷郎來賓羅新綺婆婆景州在南三百九十六里管縣七名闕播狼州在南二百八十七里管縣三播勝從顔順化右十七州唐時𨽻戎州南廣溪洞獠協州在州西南八百里天寶中因雲南離叛被破今移置在西南四百九十三里管縣二名缺靖州在西南五百一十里管縣二靖川分協曲州在西南九百里天寶中因雲南破移在開邊縣界去縣一百二十七里管縣二朱提唐興播陵州在南五百七十七里管縣二名缺鉗州在西南四百五十七里元無縣從開邊縣析出哥靈州在西南一千四百里管縣三名缺切騎州在西南一千一百里管縣四栁池奏祿縻託通識品州在西南二千三百九十五里管縣三八稱松花牧口從州在西南二千六百四十二里管縣六茫化昆池武安羅林梯山南寧碾衛州在西南九百九十七里管縣三名缺涪州牱違州俱歸馬湖右十二州管縣三十七唐時在石門路並無稅賦供輸相承在圖經上標名額耳石門今敘州之慶符縣也長寧州領縣四户三十八婆員婆居青盧羅門淯州久視元年置領縣二户一十五新定固城髙州領縣三户二十一牱巴移甫徙西按長寧涓州俱長寧地髙州今之髙縣也晏州儀鳯三年開生獠置天寶元年改為羅陽郡乾元元年復為晏州領縣七戶七十七思峨牱隂新賓扶來哆岡羅陽思晏按興文縣有晏峯即思晏縣也七縣今為寨矣定州領縣二戶一十六支江扶德按筠連有定川溪舊州治在溪南薩州儀鳯二年招生獠置天寶元年改為黃池郡乾元元年復為薩州領縣三枝江黃池按珙縣圖有薩州即上下羅計納州儀鳯二年間山洞置天寶元年改為都寧郡乾元元年復為納州領縣七戶百六十八羅圍播羅施陽羅當羅藍都寧羅掌邊徼溪洞輸納半稅按珙縣有都寧驛與建武相近奉州儀鳯二年置領縣三戶三十九牱里牱巴蓬羅按宋史奉州乃瀘州部西南邊夷思峨州天授元年置領縣二戶三十七多溪洛溪按瀘州憲綱有思峨洞已上供輸涓井鹽紫竹也藍州儀鳯二年置領縣一胡茂順州載初二年置領縣四戶五十九曲水順山靈巖來猿以上輸納半稅能州大定元年置領縣二曲水井泉浙州儀鳯二年置領縣四浙源越賓洛川鱗山以上連接黔府生蠻承前不輸稅右十三州唐時𨽻瀘州建武千户所春秋僰侯故地漢為西南夷部叛服不常諸葛武侯征撫之置銅鼓埋鎮諸山稍就帖然唐儀鳯間開拓夷徼於本部置晏州羅陽郡領七縣宋熙寧間晏州儀夷獻地𨽻瀘州郡政和間夷卜籠謀叛據五斗壩後據九絲天險號九絲山都掌元至正間本部歸附升為戎州統轄水都四鄉山都六鄉本朝改州為縣𨽻敘州府水都則陽順陰逆山都則猖獗日甚先後凡十有二征俱弗克萬厯元年剿平之用兵九閲月告成事始改戎縣為興文水都震懼悉歸編户於山都六鄉適中處建武寧城拓地五百餘里東至永寧宣撫太平長官司八十里西至珙縣百五十里南至鎮雄府安靜長官司八十里北至敘府長定縣百五十里設鎮守總兵安邊同知坐營守備及建武守禦千户所環四山而翠連雲貴襟三水而清派敘瀘招集流移建學育才夷風丕變矣萬厯丙申丁酉間虜酋火落赤率其部入冦松潘乃移總戎之西改設遊擊於建武兵亦移入松而所存無幾焉武寧蠻好著芒心接離名曰苧綏嘗以稻記年月葬時以笄向天謂之刺北斗相傳盤瓠初死置於樹以笄刺之下其後為象臨本志云平蠻城即九絲城壁立萬仭周圍三十餘里上有九岡四水極廣可以播種僅通一徑鳥道真天險也去鎮一十五里為左榜山今立頭腰尾三堡墩矣大壩總管府元至元十三年蠻夷宣撫使咱順遣官招諭戎州酋長得蘭紐得貢卧率斂蠻民歸附十七年朝見遂設大壩總管府得蘭紐授都總管得貢卧充同知其羅星長官以黎州同知李奇為之上羅計夷酋得賴阿當以至元十三年歸順授上羅計蠻夷千户下羅計夷酋得顔箇以至元十三年歸順授下羅計蠻夷千戶馬湖府寰宇記戎州都督更有羈縻州五按即今之馬湖屬也其在唐或𨽻戎州或𨽻石門路馴州在戎州西北七百三十三里管縣五馴祿天池方陀羅藏播騁騁州在西一千三十三里領縣二斛木羅相浪州在西一千三百四十三里貞元十三年五月十七日西川節度使韋臯奏置管縣五名缺右三州在馬湖江滈州在南九百一十二里管縣三拱平掃空羅空牱違州在南九百三里管縣三牱連羅名新戍右二州在石門路土夷考云馬湖即牂牁地也舊有馴浪騁滈牱違五州屬焉髙州在府東南百里外屬敘州府猶有故址可尋而馴浪騁之在西南者計三千里外與建昌卭部相連漫無所考牱違州亦府西界總之昔為羈縻而已國初安濟歸附授土知府五傳至安鰲而叛改流官為𢎞治九年詳靖邊録中仍以泥溪沐川平夷蠻夷四長司𨽻之泥溪平夷皆王姓蠻夷文姓沐川悅姓也環而星列于外萬厯十七年始設屛山縣附郭焉東界敘府百一十里西界建昌千二百里南界烏蒙百四十里北界犍為二百里水經注曰鄨縣故犍為郡治也縣有犍山晉建興元年置平夷郡有鄨水出鄨邑西不狼山東與溫水合溫水一曰暖水出犍為符縣而南入鄨水鄨亦出符縣南與溫水會闞駰謂之闞水俱南入鄨邑鄨水於其縣而東注于延水延水又與漢水合出犍為漢陽道王莽之新通也按鄨縣半屬平夷地矣土夷考云泥溪傍府而居其東西北三面連接烏蒙與玀􅉰雜處所受田賦與華民一體奉征調可得夷兵三百人受寧戎巡檢司約束平夷地土最狹錯於泥溪蠻夷之中相去各四十里東去泥溪三十里有書樓峯我朝薛文清公瑄父為平夷司吏目隨任讀書於此蠻夷司民少夷多故以名司其夷種有四山龍源青岡黃郎磨坡等處與建昌烏蒙沙罵接運有征調可得夷兵千設有檜溪煙溪三堡及龍源巡檢司防守去司治二十里有水海舊有龍生於水中馬湖得名本此沐川司東界宜賓北界犍為南界泥平蠻三司西抵建昌越巂卭部安邊廳守備司皆其轄內地故最廣田土亦饒而民狡好訟離府可三百里過此自西迄北大涼山以外盡皆夷地文法所不能盡拘耳安邊廳在新鄉鎮即賴因鄉也東接犍為南接本府各二百里西接建昌千三百里北接大涼山五百里十六年馬湖改流于此建城垣設安邊同知一員駐劄其間又于煙草峯設守備司以資彈壓北有水池為後營南有大河壩為前營中有兩河為中營三營官兵約千四百四十餘人以成犄角之勢蓋于諸夷所出沒處扼其吭而守之也其水池一帶則界老鶯山大河壩一帶則界大涼山雷坡黃郎等處則界分水嶺庶幾西陲一雄鎮云瀘州衛洪武初調陜西長安衛軍征雲南回使駐守濾州成化初以都掌之亂遷于宋江渡按在州南百里城周三百丈去衛南一舍有洞歸堡兩舍有定逺堡三舍有太平堡東南百里有水峽堡北五十里有江門堡百三十里有太州堡西北百六十里有三層堡又二十里有渠壩堡其地東連羅羅羿子北抵九支挫州西通長戎九姓馬湖建昌南接東川芒部烏蒙烏撒蓋西南夷要害之防也本志東抵永寧衛西至九姓長官司各十里南至太平長官司五十里北至納溪縣界四十里轄左右中前四千户所烏蒙軍民府古為竇地甸漢為牂牁郡地唐時烏蠻仲牟由之裔曰阿統者始遷於此地甸至十一世孫烏蒙始強號烏蒙部宋時封阿杓為烏蒙王元初歸附至元間置烏蒙路𨽻烏撒烏蒙等處宣慰司其時李京景山為宣慰副使兼管軍萬户即著雲南志略者元末彼土有阿普者仕為總管洪武初招集鄰酋效順於是改宣慰司為軍民府用阿普為土知府設流官通判經厯照磨各一員𨽻四川布政司屬川南道編户一里而已其人有羅羅夷人土獠三種錯雜而居男子年十四五則擊去左右兩齒乃娶出入佩刀相見以去帽為禮架木為棚以居東西廣五百一十五里南北袤七百六十里東至烏撒府界二十五里西至建昌衛界四百九十里南至東川府界百三十里北至敘州府界六百三十里至成都千三百里志云鐵爐山在治東三里以形似名涼山在西百里髙廣千尋絶頂平曠蠻人避暑之地也雪山有積雪春夏方消在府西百三十里其西南有撒由河源出淨山北流與龍洞河合龍洞河在司東北一舍源出石洞中以為洞者有龍金沙江在西南二百里外源出吐蕃流入府界與馬湖江合志又云夷語以五為我以橫為未東二十里即我未山有五峯橫列故名以平坦為朴窩東南一舍有朴窩蓋四望平坦也以相對為博特東南十五里有博特山以與府山相對也以陡峻為撒途東北八十里一山峻絶故曰撒途山東川軍民府古東川甸烏蠻仲牟由之裔罵彈得之改曰那札那夷屬南詔蒙世隆置東川郡後烏蠻閟畔強盛自號畔部元初置萬户府至元中改為閟畔部軍官後改為東川府𨽻烏撒烏蒙等處宣慰司洪武初仲牟由之裔祿氏設姑歸附仍授為東川土知府𨽻雲南布政司十六年改為東川軍民府添流官通判經厯照磨各一員立營長六頭目九管攝其間𨽻四川布政司屬川南道編户一里元志云東川有烏蠻白蠻僰人羅羅四種烏蠻富而強白蠻貧而弱居多版屋俗尚戰爭類土蕃之風僰羅通詔之夷人而羅即㸑也性徑而悍摘鬚束髮於頂覆以白布尖巾衣以氊履以革僰人椎髻披氊戴氊笠用氊裹其脛躡皮履以貿易為業東西廣四百二十里南北袤三百七十里東至烏撒界百二十里西至會川界三百里南至雲南尋甸府界二百二十里北至烏蒙界百五十里至成都千四十里志云府治在萬額山下山形上濶下鋭如豬治內有大石如牛卧叩之有聲夷人以為石鼓也治南有白婆山山頂有四時泉西五十里納雄山夜靜時聞人聲以為神也歲五榖熟必於此告成焉東川大王祠蒙氏所建絳雲弄山之神也山髙峻可百里上有十二峯下臨金沙江在府西南二百里一名烏龍山金沙江一名納夷又名黑水源出雲南武定府下流入濟慮郡夷人鑿木為槽以渡此水牛欄江在治東南三舍源出尋甸軍民府下流合金沙江江濶水急夷人用藤索橫江貫以木筒過者縳身筒上遊索以濟土夷考云嘉靖中土官祿信長子天恩死天恩妻阿福自掌府事季子天寵以弟當繼襲有妻設豸與目把私通弒天寵而與阿福爭印妯娌自相攻殺頗稱多事焉蓋府雖𨽻于蜀川而城郭衙舍設在滇黔之中道路嶮巇兵馬素強以是為鷔云烏撒軍民府舊名巴凡兀姑後名的巴甸唐時烏蠻之裔孫曰烏些者居此至阿蒙始得巴的甸其東西又有芒部阿晟二部皆他酋所據宋時烏些之後曰折怒者始并其地號烏撒部元至元中始內附置烏撒路招討司尋改為軍民總管府又改軍民宣撫司後改烏撒烏蒙等處宣慰司元末四川分省右丞那者以其地來歸於是烏撒軍民府以那者知府事𨽻雲南布政司十六年改𨽻四川設官與烏蒙東川同今土官安氏其裔也經略志云烏撒府編户二里耳而富盛甲於諸夷積纍日深有可慮者其産有刺竹及猿山崖險厄襟帶二湖羊腸小徑十倍蜀道也圖經云烏撒之地東西廣四百四十里南北袤三百五里東至播州宣慰司界二百五十里西至烏蒙府界百九十里南至雲南霑益州界九十五里北至芒部府界二百一十里至成都千二百五十里志云七星關在府東南百七十里元馮福可詩點蒼何蒼蒼環如西洱河百年雨露恩詎敢煩天戈轅門振烏撒衣帶踰牂牁巨險久已夷故關尚坡陀云胡七星名亦復垂不磨又云東門之外石駝關有石如槖駝立關下又云有老鴉關善欲關俱在府東三百里貴州畢節衛人戍之志又云東南三里有大隱山東北百四十里有烏門山兩崖相對如門然東二百里有翠屏山元何𢎞佐翠屛山詩云俗山如俗人過眼不相揖踞鞍無好詩羈愁拍胸臆行行見翠屛景意兩相適煙蘿羃青黛崖嶂剷蒼壁雲霞油然生杉檜森以立鳴禽遞清響飛泉散珠吸我疑有幽人巖居喜深密朝飱紫霞英暮啖香松實又云東南百七十里有石洞洞容百餘人窮處又得石竇遊者以炬不知逺近而出盤江在治西百五十里流入敘州養馬川在治東百四十里夷人牧馬之處一名墅馬川治西一舍有七渡河南三舍有可渡河西南百十里有九十九渡水鎮雄軍民府通志云古為屈流大雄甸昔烏蠻之裔阿統與其子芒布居此池其後昌盛因祖名號芒布部宋置西南番部都大巡檢司元至元中置芒布路𨽻烏撒烏蒙宣慰司入木朝改為芒部府初𨽻雲南洪武中升為芒部軍民府隸四川布政司屬川南道𢎞治間土官隴慰先娶水西女沖中生子曰慶與夀繼娶烏撒女沖叔生姦子隴政既而讐殺水西則為隴夀之助烏撒則為隴政之黨嘉靖三年慰死嫡子夀繼職庶子政謀夀殺之都御史王軌奏調官兵擒政及其嫂支祿繫獄死奏改流鎮雄府設經厯照磨教授各一人立懷德長官司於却佐威信長官司於母響歸化長官司於夷良安靜長官司於落角以重慶府通判程洸為試知府明年洸方募民占種夷田於是水西乘機勾引隴夀之黨沙保為亂沙保者故水西媵奴也與夀部下阿得獅子吼等破府城逐洸劫其印川貴會奏動三省官兵勦之沙保詐稱已死主者弗察誤以捷聞各升賞有差七年沙保等復聚冦掠奏聞會議土官土舍或爭襲或讐殺興師問罪甫定之後建議者即欲改設流官及流官再設而土夷隨叛殺人奪地比昔尤甚蓋作惡者不過一二人今乃以一二人之惡而遂致改易一府一州拂其本心違其約信所謂犯衆怒也是以屢勦屢亂而兵革卒無寧日合無凡有土官惡逆被顯戮者通拘所部頭目令其自保應立力足以制服夷衆之人或土官之子孫弟姪族人俱為衆所推服者於是議以隴勝為知府為聘永寧宣撫奢爵女奢氏為妻更名隴安授女官知府安擒獻沙保地方頗寧安死子隴清襲清生子來鳯早卒次子來龍尚幼生母奢氏更名隴髙護印撫子而隴清妻者氏與之爭自把各私所好仇殺二年委官勘處令二婦同掌兵戈始息及後者氏耄而來龍妻祿氏再贅水西安堯臣盤據其地印為携去隴不絶如線萬厯戊申年以永寧之役堯臣發兵助惡始驅之去而蜀中欲立阿克黔中欲立普德相持良久者氏恐一旦填溝壑乃兩廢之差官會勘以夷漢目把所共願立者為主于是始易阿破為土知府而堯臣不敢復垂涎矣圖經云芒布部廣袤二百七十里東南俱抵烏撒不及三十年以阿赫關為界西至烏蒙界二百四十里北至珙縣二百二十里以樂安山為界至成都可千里司北百八十里勿食料溪源出樂安山也司南二十里外苴斗河源出六丈箐經七星關其山川險厄地勢﨑嶇左峙綽忸右繞硌砌其風俗徑而愚朴而野男業耕稼婦絶粉黛崇信巫鬼其土産有石瓜樹生蓏堅如石能已心痛志云芒部司西南有鼠街其俗夷人每遇子日則交易於此又云夷語以首為烏以立為通司北五里烏通山如人翹首而立故名以清氣為綽忸司東二十綽忸山有爽氣也以松為託以沙石為諾司西南二百里外託諾河岸側多松柏沙石故名又有硌砌雄山見通釋永寧宣撫司通志云晉置永寧縣屬雲南郡宋及周隋因之唐改置藺州屬益州宋初州廢為江安合江二縣之境後設永寧路遷至馬口崖漁漕溪側元因之領筠連州騰川縣𨽻四川行省尋改軍民宣撫司明玉珍改設永寧鎮邊都元帥府仍設宣撫司國朝洪武中宣撫使祿照歸附改為永寧長官司割筠連屬敘州後仍升宣撫司屬川南道司治舊在馬口崖即宋乾德所改也開熙間遷於界首國初土官祿照因蠻夷千户所舊址遷焉環城皆山疊翠如屛紅崖鎮北漁溪橫南亦山水之滙也唐書天寶載伐南詔由西路進起瀘州泝永寧走赤水達曲靖古味縣也設郵傳自元始志云普市驛在司東五十里摩尼驛在南九十里為赤水驛又四十里為阿永驛赤水有衛普市摩尼有千户所皆屬黔土夷考云衛西至納溪縣南至鎮雄府各四百里北至合江縣百六十里東至播州界二百五十里職官宣撫仍舊加設土官同知一人流官經厯教授稅課局遞運所大使各一人并九姓太平二長官司編户七里其風俗刻木為信巢居箐寨不事啇賈惟務農業垂髻跣足懸帶弓弩巴蜀耆舊志云永寧即古寧州極西南有閩濮鳩獠僄越裸身毒之民土地沃腴黃金光珠琥珀翡翠孔雀犀象蠺桑綿絹綵帛文繡又有貊獸食鐡猩猩能言其血可以染朱罽有大竹名濮竹節相去一丈受一斛許志云赤水河源出芒部水腦澗流經司東南繞赤水衛衛東二十里有雪山窮冬積雪夏至方消沽溪在司南半舍源出蠻界流入漁漕溪溪在九姓司東馬口崖下司北有海漫山延袤八十餘里起伏不絶如海之汗漫故名西北兩舍有髙瀑自山頂飛來如匹練也西南一山圓瑩如珠曰西珠山有仙婆墓在西山烏降山下銅鼓溪崖相傳有女子名滿者有道行及笄不字能前知吉凶卒葬于此九姓長官司唐宋以前俱蠻地元立夷民羅黨九人為總把至元初稱為九姓羅氏黨蠻夷長官千户國初改九姓長官司編户五里初宣撫奢效忠名其妻曰世統妾曰世續而無子取親枝崇禮者撫之萬厯十九年世續鴆崇禮據印自官又養水西安強臣妻弟阿利為子世統爭之兵連禍結且二十餘年後以崇禮之弟崇明嗣其官追印畀之而印實為安堯臣携之鎮雄矣三十五年都司僉書張神武質世續于庭而印不可得遂拘繫之惡目閻宗傳等請兵水西來襲永寧城中有備不得志而移禍于摩尼普市二所焚劫殆盡摩普乃屬黔省怨蜀甚而大中丞喬公惡堯臣之黨惡也動大兵以驅之詳見鎮雄下藺局亦從此結矣蜀中廣記卷三十六
