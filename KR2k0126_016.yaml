body:
  text: 蜀中廣記卷十六明曹學佺撰名勝記第十六下川南道瀘州漢江陽縣蜀志曰魏武屯漢中諸葛亮出屯江陽是也水經曰江水又東過江陽南洛水東南注之酈道元注曰江陽縣枕帶雙流據江洛會也漢景帝六年封趙相蘇嘉為侯國洛水與綿水合至州西方山下謂之綿水口通志云廢綿水縣在綿水西口汶江水中洲上梁置縣宋省入江安矣洛水徑資中謂之中江又謂之支江支江水從富義縣鴛鴦池屈曲方至城與汶川合流又有赤水源從昌州昌元縣界流入去合支江有合州在州治東蜀江與之溪合流處之溪源出仁懷縣其形曲折如之字有悅江在州治東北源出戎縣渃武箐經悅州因名有思宴江在州治西四里源出古思晏縣有宋江在州治東百步源出大壩兒北洞經宋州故名任汲記云淙流東北貫其隅矣李􅌫西山堂記云郡得名為瀘者蓋始因梁大同中嘗徙治馬湖口置瀘州蓋馬湖即瀘水下流因逺取瀘水以名州也志云宋制置使余玠遷州治于神臂山則在百里外號鐵瀘城矣勾公權瀘川縣廨記云江陽氣候偏陽夏秋多炎燠冬無苦寒每夏秋蒸溽如傍挹火爐鞲孫羲叟修城記瀘控西南諸夷逺逮㸑蠻最為邊隅重地元豐以來用武臣其後始更置儒守錢若水以右贊善拜兹官宋太祖召見于武德殿謂之曰瀘川最近蠻獠尤宜綏撫蓋重之矣方輿勝覽云整暇堂雅歌堂俱宋時建在郡圃之內四香亭在州治淳熙中郡守趙公建自題云永嘉何希深之言曰荼䕷香春芙蓉香夏木樨香秋梅花香冬斯名以之有南定樓取出師表語也陸務觀南定樓詩行遍梁州到益州今年又作渡瀘遊江山重復爭供眼風雨縱橫亂入流一名海觀侍郎閻蒼舒詩雲南之隂大江東二水奔騰如海衝誰能具此壯觀眼南定樓中今卧龍水經注江中有大門小門焉季秋之月則黃鱗死漚也郡國志瀘江水中有大闕季春三月黃龍堆沒闕即平黃龍堆者昔尹吉甫子伯竒至孝後母讃之自投江中衣苔帶藻忽夢見水仙美樂掦聲悲歌􅊑人學之吉甫聞􅊑人之聲欵似伯竒援琴作子安之操按曹植之惡禽論韓愈之履霜操皆指此事志云州東三里歸子山相傳伯竒溺處又云三國董允墓在州治東今名董允壩方輿云東嵓在汶江之東紹興中邦人開創大像依崖不足以庇風雨近歲有庖者祁氏親死廬舍棄俗奉香火于此崖邦人信之不十年重樓復屋佛宫經藏甲於一境碑目黃太史大像記醉僧圖碑刻並在此嵓之開福寺州志云東二十里潭中一小山相傳下有龍窟二水交流清濁不混每春漲其山若浮州人遊賞之處通志云即龍馬潭也唐王昌遇落魄仙授以道術比歸售馬送道童于澤前得馬乘之瞬息至家而馬化龍入潭潭上有沖虛碧梧二觀俱宋建勝覽云龍女洞在城東南二十五里髙崖之畔有二穴俗傳為龍女洞李巽巖嘗遊有留題寰宇記云雙井在城西偏紹興中掘濠塹得碑乃唐乾元中蘇德充所開紀勝云滴乳泉在城西真如寺自崖石中流出味甚甘魯直經行大書此三字碑目云唐真如寺碑在本寺內山谷集云瀘州大雲寺西偏崖石上有甘泉滴瀝一州泉味皆不及也余名曰滴乳泉山谷又跋常山公書云常山公書如霍去病用兵所謂顧方略如何耳不至學孫吳至其得意處乃如戴花美女臨鏡笑春後人亦未易超越紹聖五年五月晦避暑瀘州大雲寺子茂携此書來妄意評之如此寰宇記尹吉甫江陽人有祠在城南又報恩觀建清穆堂以祠之碑目李沆記周尹吉甫實生此地見於圖經舊矣陳帥損之作清穆堂祠焉觀酈道元水經注江陽異聞與華陽國志頗類其載揚雄琴清英敘伯竒流放并子安之操附于江揚雄蜀人也其説必有據勝覽云寶山在城南初名堡子山為巡檢廨陳公損之移廨山西建堂其上袁公説友榜其堂曰江山平逺易堡子為寶山大書揭之下瞰城郭萬瓦鱗集兩江合流郡國志一名瀘峯山髙三十丈地多瘴三四月渡之必死唯五月上旬渡之即無害故諸葛亮云五月渡瀘也李􅌫西山堂記云以常璩華陽國志及辛怡顯雲南録考之諸葛渡瀘乃在越嶲之地非瀘之寶山也木龍崖在寶山之趾有古榕木盤結夭矯如龍黃魯直為題榜通志云瀘州寶山之瀘峯有武侯廟每歲蠻人貢馬相率拜于廟前宋劉光祖詩云蜀人所至祠遺像蠻徼猶知問舊碑紀勝云黃太史書砥柱銘碑在瀘峯髙寺通志云三泉在寶山嵌嵓間昔王大過鑿山濬泉榜曰三泉志云州南玄妙觀有紫房洞唐應靜煉丹于此丹竈石床尚存有煉丹井亦唐真人酌挹之所又云治南二里有懸崖石刻荼䕷洞三字西南有飛雲洞為唐庚讀書處按子西丹稜人徙居瀘之安夷門外自號魯國先生有文集行世寰宇記方山距州南一含許又名回峯其山八面下瞰江流有魏武帝廟唐元宗敕文華陽國志云方山蘭祠昔漢光武微時過江陽有一子望氣者言江陽有貴兒氣王莽求之縣人殺之光武怒為子立祠謫江陽人不使冠帶通志云巔池在方山之頂周圍一里有龍濳其中勝覽云北巖在城北舊有小菴尚書楊汝明創為大剎又創五峯書院以為士友會課之所志云州北二里撫琴臺山石生成周圍七尺昔尹伯竒投江吉甫登其上鼓子安之操焉又云州北有薑亭郡人王綸以母薑氏卒終身不敢食薑因植薑于亭側以志不忘又云東北二十里特凌橋宋治平中有女子因母病歸省溪漲不能渡忽見一木橫凌水面遂舍生以濟既渡失木所在通志州東北有餘甘渡唐子西瀘川六言云百斤黃鱸鱠玉萬戶赤酒流霞餘甘渡頭客艇荔枝林下人家又云拙溪在州東北七里黃山谷過而墜馬自以為拙呼為拙溪書大字于石見存山谷有瀘州中壩葛氏竹林留題云江南黃庭堅自僰道蒙恩放還元符三年十二月道出江安江安宰石諒信道以親親見留作歲建中靖國元年正月丙寅置酒中壩葛氏之竹林而别江安縣漢地里志犍為之漢陽縣也注曰犍為都尉治山有闟谷漢水所出矣今縣南七十里連天山漢水出焉又西南有漢陽山以在漢水之陽也廢漢陽縣當在此二山間寰宇記云涇灘在江安縣南三十里灘上有山刺天瀑布飛灑相傳武侯誓蠻之地此唐涇南縣所為設也縣有綿水鄉即古之綿水縣有思晏江即古之思晏縣矣本志云有縣市有井市宋南渡後置南井監在縣東北監有鳯凰山山上有雁塔刻唐五代以來進士題名勝覽云偶住亭在江安縣之對建中初魯直自僰道還過邑宰石諒同逰此亭書琴操後改為渡瀘亭碑目瀘州平夷記熙寧中范百祿撰今在江安偶住亭志云北城街有渡瀘碑亭宋時范百祿立自載其平夷事迹今碑止存篆額熙寧甲寅平夷之記八字都巡檢使鄧巽陽安濟廟記曰吾邑城外汶江流其東淯溪滙其左溪上隂崖峭峙草木岑蔚下臨深潭蒼黯寒碧有神宅焉號曰五龍紀勝云鏡子山在江安縣南五里又名照山一峰中峙兩峯旁翼二溪交流峯巒蔥菁菴廬梵室金碧交輝旁有二潭為龍所居禱旱輒應山有眠雲石龍淵橋玎璫崖磨鎌溪為一邑勝遊之地納溪縣宋紹定初割江安之地而立納溪則瀘川縣所為廢也納溪水源自阿永蕃部為唐之羈縻納州納水所出矣流至縣之西門與瀘江合通志云縣東一里有樓子山層峰疊嶂若樓閣然三里有掇旗山相傳諸葛武侯豎旗于此以誓蠻人也又其逺者為保子寨倒馬關石虎關則皆通牂柯且蘭交趾諸夷本志云治西有寺其地産青白石似玉曰玉林寺又云治北十里為舊縣基昔人掘得銅犧象樽一太和羹碗二爵三貯于學宫合江縣漢符縣東漢為符節縣水經曰江水東過符縣北邪東南鰼部水從符關東北注之酈道元注曰縣故巴夷地漢武帝建初六年以唐蒙為中郎將從萬人出巴符關者也漢元鼎二年立王莽之符信矣縣治安樂水會水源南通寧州平夷郡鄨縣北徑安樂縣界之東又徑符縣下北入江漢縣長趙祉遣吏先尼和以永建元年十一月詣巴郡沒死成濡灘子賢求喪不得女絡年二十五有二子五歲以還至二年二月十五日尚不得喪絡乃乘小舟至父沒處哀哭自沈見夢于賢曰二十一日與父俱出至日父子果浮出江上郡縣上言為之立碑其鰼部之水所未聞矣寰宇記安樂山在縣東五里八十步羣峯峭拔瀑布千尺天寶六年敕改為合江山圖經安樂山在合江西五里三峯俱秀溪流繞其下有石匱為仙人藏經之所岐而左有爛柯迹後有仙影隱隱在石壁中岐而右歷木楠臺仙人屋十二盤至剪刀峽循山有八洞通南崖有石曰許由瓢又有芙蓉城滴水崖白猿洞此三峯之景也黃山谷記云安樂山劉真人飛升之所真人字善慶初卜居時曰僰道平蓋氣濁而不清江安方山氣清而不秀成山而清秀惟安樂山耳乃居之碑目髙唐宗取丹經詔碑賜進經道士詔碑劉真人藏經碑俱在安樂山志云在本山經書峽中其峽峭削人迹不到世傳蜀有黃澤書在揚子雲之前藏于名山即此峽也吏隱閣記曰宋治平四年鄧太師綰作邑于瀘川曰瀘之合江邑居之南轉清溪而上六七里曰安樂山世傳隋開皇劉珍先生登真之地杜光庭傳李淑記開皇所置三觀其一尚在乃命道士作劉真人祠堂因名其閣曰吏隱志云安樂山俗名筆架山唐神童先汪有記今萟文不載惟載其一絶句云碧峯橫倚白雲端隋氏真人化迹殘翠柏不凋龍骨瘦石泉猶在鏡光寒任伋遊安樂山詩云安樂溪上峯萬木生翠羽孤撑切天心橫拓壓坤股氣勢西吞夷光芒南定楚雲泉出石竇淋漓灑玉宇煙蘿纒林梢搖拽垂翠組山有天符葉樹一夕大風雨拔去後得於容子山葉如荔支而長上有紋宛如蟲篆或以為劉真人仙迹蘇子瞻詩天師化去知何日玉印相傳世共珍故國子孫今尚在滿山秋葉豈能神安樂溪側有吕光廟苻秦時光討李焉之亂于此李垕詩西涼宫闕化灰燼一時壯觀今何許又名登天王祠西南隅有之溪三繞筆架九繞文明過月臺迤邐而去望如秋練形如之字注于江南五里月臺山三溪旋繞山足形如臺面列十二月波上有晉王廟祀唐李克用又五里丁山形如丁字倒峙又曰文明丁火文明之象也有丁公廟其碑乃蕭齊時立趙世延先氏書嵓記云合江之北有神臂山呀然虛開清窈竦深廣袤百十步飛泉簾垂列巘屏矗嵐光林影映帶左右與塵凡逈隔山之麓即先氏書嵓志云鐵瀘城三里讀書嵓父老往往過之聞書聲後神童先汪七歲至其地曰吾讀書故處也遂寢處其中為九經注元虞集跋云涼國公勳業聞望著于天下我國家之蓍龜也年七十餘間居金陵又以文章學問為吾道砥柱其得于天而裕于人何其盛哉讀書崖之記序其源委博贍考據鄉里晚生後進蓋有不及聞者吾蜀百千年故家舊族若先氏崖者多有之矣安得一一表章于大臣元老之手乎然先氏子孫所恃以不朽有不徒在于崖者矣謝端跋云端蜀人也流離江漢間幾十餘年矣某山某水不知幾何所覽讀書崖之記始知先氏世有賢子孫哉端今老矣行於四方欲求一畝之居而不可得吾蜀多異人異書何時扁舟泝江而上從書崖嵐光林影之下求其遺書而讀之庶幾補過以希前修汝礪其尚不吾却也夫蜀中廣記卷十六
