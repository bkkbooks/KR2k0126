body:
  text: 蜀中廣記卷二十三明曹學佺撰名勝記苐二十三下川東道夔州府三達州州以元微之左遷司馬著名方輿勝覽有勝江亭在州西三里乃郡守王蕃讀白樂天寄微之詩云達州猶似勝江州因以名亭也長慶集微之到通州日授館未安塵壁間有數行字乃是僕十五年前初及第時贈長安妓阿軟絶句緬思往事杳若夢中懷舊感今因酬長句呈白居易詩云十五年前似夢逰曾將詩句結風流昔教紅袖佳人唱今遣青衫司馬愁又見樂天詩云通州到日日平西江館無人虎印泥忽向破簷殘漏處見君詩在柱心題其間酬唱甚多未可殫述當時有李景信者自長安來訪周旋少日而别焉微之有李十一景信到詩云何事相逢翻有淚念君緣我到通州留君賸住君須住我不自由君自由又有丁溪館别景信詩云京城每與間人别猶自傷心欲白頭今日别君心更苦别君緣是在通州陳升翠玉軒序通川之境東瀉巴渠西峙鐡嶺南對戛雲北望鳯山寰宇記云巴渠江在石鼓縣南四十步流入通州界江中有南昌灘元微之南昌灘詩云渠江明淨峽逶迤船到名灘拽􅜺遲櫓窡動搖妨作夢巴童指點笑吟詩畲餘宿麥黃山腹日背殘花白水湄物色可憐心莫恨此行都是獨行時志云鐡山在州西二十里石色如鐡上有獅子石和尚岩諸勝蓋迢遞自石城來者山四面絶崖西有一路登頂寰宇記云後魏廢帝二年開拓山南改宣漢為石城從山名也輿地紀勝云翠屏山橫列州南元微之建戛雲亭其上山北又有水流寺巨石刻成殿形餘址蕪沒惟佛像屹立江邉寰宇記云鳯凰山在通川縣北五里山形鳯翅掩映州城有梧桐坪寶芝洞諸勝洞中石乳成峰玲瓏如刻鏤又有砥石縱橫丈餘鑿為曲道可以流觴志云鳯山有吕公堊相傳呂純陽幻形乞食寺僧知而蹤迹之逐雲影冉冉逝矣輿地碑目漢車騎將軍馮緄碑在永睦縣之西八十里緄薨於桓帝之永康元年文尚瞭然可讀其父焕亦有兩碑斷裂不全僅存大槩又云有漢廣漢蜀國侯李翊及蜀國侯夫人墓銘翊以靈帝熹平二年卒夫人不著姓氏疑其為臧字首尾亦不刓缺又云書字巖碑在巴渠縣西十里多斷缺不成文理間存晉昌太守字按晉孝武方立晉昌郡則此必東晉以後人碑耳又云唐處士墓碑在州城北十五里楊斗壩馬腦鼻山下乃唐景龍二年刻字畫遒媚如歐柳可愛又云元稹告畲三陽神文元和志載在通川縣之華陽觀又云廣福院修福殿記在永睦縣即唐福田寺有會昌三年王欽説修福殿記又云瀘潭院鐫佛記在通川縣東富教里岸側石上乃唐人所鐫傍有中和造像人姓名百餘字多漫滅又有黃山谷贈通川令韓廣叔碑文廣叔赴通川日魯直以言贈之曰惟勤能辦公家惟清能律貪吏嚴而信則吏不病民簡而敏則民多在野又有趙節婦碑節婦姓趙氏婺居有凶人欲犯之脅以白刃節婦不為動既而誘以百端終不可遂刺殺之時皇祐二年知州薛俅懋其節為之立碑於達州之西北山上後邑令薛仲侃創祠繪像於中東鄉縣治南有石鼓橫江上為石鼓鎮楚春申君之花果園也寰宇記云唐析石鼓縣之西鄉地在東關水北五十步置巴渠縣紀勝云舊巴渠縣後鹿子山漢樊噲嘗屯兵于此四夷述云唐武德中移東鄉縣治於今縣東一里安養故城寰宇記云萬戶溪在巴渠縣東八十里自開州萬壽縣界北流來合縣溉江水又有成熟溪亦自開州萬歲縣來合文字溪紀勝云西北四十里崖壁間懸二石左類日右類月月中空隙有娑羅樹一株太平縣舊明通縣地也勝覽云丙穴在明通縣井峽中其穴凡十其中皆産嘉魚春社之前魚即出穴秋社旋歸其出也止于巴渠龍脊灘首有黑點謂照映星象相感而成長身細鱗肉白如玉其味自鹹蓋食鹽泉也紀勝云太平東七里有龍潭羣峰環拱凡七十二浦會合凡四十八渚而滙為潭廣餘百畝其深叵測實惟龍湫又云東北八十里萬頃池是春申君故居旁有平田萬頃鄰邑諸水源皆出于此新寧縣寰宇記云故新寧城在縣西北十里後魏恭帝二年於此立縣隋開皇三年廢唐武德二年又置後遷於賨城通志云宋更為三岡縣至道中移治於新安市元至元初復稱新寧矣紀勝云新寧南十里有黃茅嶺即古詩所稱猿聲時下斷月色好平看也梁山縣邑名髙梁又曰都梁皆因山也寰宇記云髙梁大山在縣北四十里尋江源記云髙梁山東尾跨江西首劍閣東西數千里山嶺長峻其峰崔嵬於蜀市望之若長雲垂天一日行之乃極其頂俯視衆山泯若平原劍閣銘所謂巖巖梁山積石峩峩者也張文琮蜀道難詩梁山鎮地險積石阻雲端矣輿地紀勝云都梁又名髙都在縣治北十五里舊有髙都驛乃天寶進荔枝之路也山壤腴而黃其民多業種薑寰宇記云本漢朐䏰地也後魏廢帝分朐䏰置魚泉縣今縣即魚泉縣地以丙穴嘉魚為名尋江源記云丙穴有嘉魚其味甚美水出柏枝山在縣東南十五里是也方輿勝覽云五代偽蜀在今軍治置務曰石氏屯田務宋開寶初土豪石處贇納莊田八所遂廢田務移縣於此因升為軍劉焕題名序稻田蕃膴常多豐年矣紀勝云垂雲樓在子城之北左瞰萬石右倚東山景物奇麗峽中未有又有瑞豐亭陸務觀詩峽中地偏常苦貧政令愈簡民愈淳本來無事只畏擾擾者才吏非庸人都梁之人猶無苦須晴得晴雨得雨父老羅拜豐年賜縱産芝房非上瑞勝覽云峰門山在軍東十五里其山髙大頂有寒泉兩岸對峙如門也又云蟠龍山在城東二十里孤峙秀傑突出衆山之上下有二洞洞有二石龍狀首尾相蟠故名旁曰噴霧岩洞中之泉下注垂崖約二百餘丈噴薄如霧張無盡留題云水味甘腴偏宜煮茗非陸羽莫能辨范石湖以為天下瀑布第一有飛練亭與之相對舊取徐凝詩句東坡以為惡乃易名飛雪亭取歐陽公所稱六月飛雪灑石矼矣魏了翁飛雪亭詩云自荆入蜀路險絶黑猿聲中膽欲折萬州江頭舍舟楫又趣擔簦窮岌嶪危磴連雲如積鐡亂石砭足十九跌僕夫流汗馬止舌遙望蟠龍挂天脅懸瀑落巖噴霏屑中間有亭曰飛雪十里陰風寒入髮人言此地無六月呼取大斗酌甘潔一飲令君消內熱豫以壬子歲再過此作詩云春水三年别寒聲十里聞鶯花流出洞樹石挂成文有意同髙潔無心作使君前車行度險豫且坐斜曛按蟠龍洞古碑云張卞為蜀將先主攻固陵諫不聽乃入山修真遇樵叟自稱鴟夷人授之丹訣得道矣碑目又云舊梁山驛碑在軍東四十里耆舊相傳李唐時有白虎蛟龍為民害民至遷居以避韓昌黎嘗按部經行二害乃去作碑識之今名其地為碑拗碑猶存于溪側字漫滅不可復識又有唐碑題云令長新誡之記乃明皇御製梁山令尹茂元得於萬州守河東裴公而刻之蓋大中十年也嘉定丁卯郡守李錫移於軍治其詞云我求令長保乂下民民之不安必有所因侵漁寖廣賦役不均使夫離散莫保其身徴諸善理寄爾良臣與之革故政在維新調風變俗背偽歸真教化為先惠恤於貧無小無大必躬必親青旌勸農孰不攸遵曷云被之我澤如春此碑原在舊驛中勝覽云書院峽在軍東五十里峽石市之北每風雨𡨕𡨕如聞讀書聲故其中有夫子崖子貢壩峽下有坐卧石塔按夫子子貢韓退之皆未嘗至蜀此必附會之説也勝覽云寒泉洞在軍之西龍鎮十里許有洞曰寒泉紀勝云軍西二十里赤牛山覺林院之東有一石龕琢石為大悲像四十二手皆有所執碑目云赤牛城有石刻淳祐二年上元落成周三百六十步敵樓百四十三座四門各有廢刻壝將臺各基址猶存紀勝又云縣西五十里多喜山時有神光現見之多獲喜事故名陳希夷曾居此丹爐石枕俱存有雌雄泉春夏左盈右竭秋冬左竭右盈古志讖云東有飛龍西有赤牛文必拜相武必封侯按飛龍即蟠龍山赤牛即牛頭寨也宋張無盡拜相漢張卞至唐時始封廣澤侯矣紀勝又云金鳳山拒軍西五十里楊市之北其山之南半崖有罅邃然內皆洞明其石上有若圖仙女狀面貌儼然時若動搖迫而視之則不見又云軍西七十里落雲潭常有雲覆其上他日漁者拋網得一石老君自此不復有雲氣像在永安市民冉氏園中背有字曰天漢二年刻也寰宇記云石瓦山在縣西百一十三里山巔有古人礪刀劍亂石如積瓦焉紀勝云瓦城山在軍西百二十里圖經亦曰石瓦山山下有古欄楯蹤迹屈曲至于山上其巔平坦耕者往往得古銅片紀勝又云軍西百四十里筆山即白雲山也奇峰如筆故云宋張無盡詩白雲山上揖世尊各以願力濟羣生即此豫以萬厯己酉歲登峰上即别寄題詩云似筆挺然秀山川亦好文宕渠花裏出秦嶺竹間分石臼生春水香龕積暮雲經過難久住日後覺離羣壬子歲再過此作詩云霧到此中止分明要客登水田開四野松石閉孤僧步入禪鐘慣詩題綵筆曾稍紓行役苦惟有勝緣能寰宇記有逢溪山云在縣南八十步水西南流入忠州桂溪縣界通川志闕浮蘭碑載梁山軍忠州兩界舊有漢刻石署白虎夷王姓名今其上刻漢時官屬及白虎夷王及時民等姓名尚有可考碑目云五大夫碑在梁山軍界上字雖漫滅然乃漢𨽻也夷堅雜録云梁山有漢武帝祠至今祭時往往有一二百蝴蝶降祠所享其食近之不驚徹饌然後羣去時謂武帝侍從捉之者必致病按常璩云益州刺史毁蜀中山川神祠取其松柏為舟船惟不毁漢武帝祠則蜀之祠武帝久矣紀勝云梁山呂保藏家髙崖峭絶半腹有一穴漢赤眉之亂邑人呂保藏家資巨萬鑿石以居冦不能近後舉家隱焉宋紹熙中有樵夫得一劵於崖側非銅非鐡其聲鏘然上有古篆云西漢之末赤眉邂逅黃金千兩坑埋而走羔豚十祭其財自阜今藏所猶存萬縣華陽國志巴東郡南浦縣在郡南三百里晉初置主夷又云晉武帝平吳之後巴東省羊渠置南浦按南浦在縣南岸蜀志建安二十一年先主分朐䏰之東南界立當縣故其西四里天子城相傳昭烈駐兵于此常璩所云小石城是也三面峭壁惟山後長延一脊容徑尺許纍石為門矣羊渠漢縣也通志云萬縣西五十里羊飛山相傳有道人令童子牧羊戒使勿放一日童子放之其羊沖天而去按蜀鑑羊飛山下有羊渠縣即此縣南百二十里又有廢武寧縣後周建德所立唐王周過武寧縣詩云行過武寧縣初晴物景和岸回驚水急山淺見天多細草濃藍潑輕煙匹練拖晚來何處宿一笛起漁歌輿地紀勝云武寧縣西一里許旌陽舊宅即今之白鶴寺也宋大章未嘗讀神仙傳疑而不信新都宰張澤語之曰許遜本潭人曾任蜀之旌陽令雅顧此山因有别業亦何疑乎一統志載萬縣西百里有木櫪山昔大禹治水過此見衆山漂沒惟此山木櫪不動故名寰宇記云在武寧縣東南十三里山頂有池淺深隨江水漲減以地里合之是矣樂史又云石笋山在縣東北三十五里其狀如笋舟過漕溪瀼塗之間見之恫目焉水經曰江水又東徑瀼塗而歷胡灘又東徑界壇注云是地巴東之西界益州之東界也按瀼塗驛在當縣南六十里江中有石似胡人名曰胡灘飛瀑湍流其勢險急杜少陵詩不是怕胡灘者此矣亦今上下川東之界也經云江水又東南會北集渠注云二溪水涪陵縣界謂之于陽溪北流徑巴東郡之南浦僑縣西溪夾側鹽井三口相去各數十步以木為桶徑五尺修煮不絶水北流注於江謂之南集渠口亦曰于陽溪口北水出新浦縣北髙梁山分溪南水徑其縣西又南一百里入朐䏰縣南入于江謂之北集渠口别名班口又曰分水口朐䏰尉治此按分水驛在當縣西南八十里此水由天生橋而出方輿勝覽云天生橋在州西苧溪上乃一巨石自然成橋長與溪等平濶如履平地溪流出其下矣經云江水又東徑石龍注云水至于博陽二村之間有盤石廣四百丈長六里而復殆于岨塞江川夏沒冬出基亘通渚按即縣西之盤龍磧也江岸中有黃金沱蛾眉磧古練石皆以形似得名碑目云隋朝寶像記在古練岩矣陳子昻萬州曉發放舟乘漲還寄蜀中親朋詩空濛巖雨霽爛熳曉雲歸嘯旅乘明發奔橈騖斷磯蒼茫林岫轉絡繹漲濤飛逺岸孤煙出遙峰曙日微前瞻未能眴坐望已相依曲直多今古經過失是非還期方浩浩征駟日騑騑寄謝千金子江海事多違王周萬州公居詩公居門館靜旅寄萬州城山共秋煙紫霜并夜月清無愁干酒律有句入詩評何必須林下方馳吏隱名劉長卿寄萬州崔使君令欽詩時艱方用武儒者任浮沈搖落秋江暮憐君巴峽深王門多白首蜀郡滿青襟自解書生詠愁猿莫夜吟鄭谷寄南浦謫官詩多才翻得罪天末抱窮憂白首為遷客青山繞萬州醉疑梅幛曉歌壓竹枝秋望闕懷鄉淚荆江水共流范成大萬州詩晨炊維下巖晚酌艤南浦波心照州榜雲腳響衙鼓前山如屏牆得得正當戶西江朝宗來循屏復東去官曹倚巖棲市井喚船渡瓦屋仄石磴猿啼閙人語剔核杏餘酸連枝茶賸苦窮鄉固瘠薄陋俗亦寒窶營營謀食艱寂寂懷甎訴昔聞吏隱名今識吏隱處自注云此萬州之實境非親到者不知其語之工也紀勝云縣西有太白嵓在西山上即絶塵龕也碑目云絶塵龕三字在西山石壁字體清徑類晉宋間人書有唐人詩刻相傳以太白讀書于此岩下有池宋郡守馬元穎魯有開所鑿廣一畝植以芙蕖荔枝雜果凡三百本有勒封院黃魯直記云庭堅蒙恩東歸道出南浦太守髙仲本置酒西山實與其從事談處道俱來西山者由郡西渡大壑稍陟山半松柏薈翳水泉瀦為太湖亭榭環之有僧舍五區其都名曰勒封院樓觀重復出沒煙霏之間而光影在水邦之人歲修褉事於此凡夔州一道東望大壑西盡􅛿䣕林泉之勝莫與南浦爭長者也寺僧文照喜事作東西二堂於茂林修竹之間仲本以為不奢不陋冬燠而夏涼宜於遊觀也建中靖國元年二月辛酉江西黃魯直題張俞宴萬州西山池亭東魯使君詩西嶺鬱盤紆寒泉注原隰下有乖龍池何年此殊極復為黿鼉據亂我清泉色松幹已交摧石牙空鬬立魯侯獨窮勝無事日尋陟蕩滌潢汙流宛如疏鑿力池光復涵徹萬象皆鏡入亭觀出浮雲彤彤映邦域左右浮屠宫巋然爭嶪岌昔乃荆棘荒今為蕙蘭襲密樹低華陰嘉禽弄文翼使君池上宴何減襄陽習又題西山臨江亭詩南浦逢除日天涯有去舟蠻城和雨閉峽水帶春流不負新年感惟多故國愁寧無賀春酒徒此事羈囚勝覽云岑公洞在大江之南廣六十餘丈深四十餘丈石岩盤結如華蓋左右方池有泉湧出巖簷遇盛夏注水如簾松篁藤蘿鬱蔥蒼翠真神仙窟也圖經云岑公名道願本江陵人隋末避地隱此岩下百餘歲肌膚若氷雪積二十年尸解去碑目云岑先生銘唐嚴挺之撰開元二年立又有段文昌銘貞元三年四月十五日鐫唐刺史馬冉詩云南溪有仙澗咫尺非人間泠泠松風下日暮空蒼山宋趙善贛詩真人邈何之恍忽不可見洞居獨嵌空壁澑明珠濺藤蘿含溟濛竹柏鬭蔥蒨至幽合人心逺翠落江面野老乘籃輿使君肆清燕日影砌下倒雲谷坐間變大木岩欲傾邃壑路微轉崢嶸施屏風點綴成彩絢雖云急行樂勝賞殆亦遍欲歸重盤旋拂石看古篆郭印詩岑公來避世甲子十周年夏屋虛岩豁神芝結蘂懸木喬從古種香杳至今傳學道能堅忍何人不得仙宋徽宗政和五年四月二十一日幸徐常廬因念逾期未歸信筆立成一絶可知常詳茲眷意庶速西上也詩云人生何事厭囂塵泛宅浮家冬復春今日暫來猿鶴語他年應召白雲人黃庭堅建中靖國元年三月萬守髙仲本宿約遊岑公洞夜雨達旦戲贈二小詩云肩輿欲到岑公洞正怯衝泥傍險行應是岑公閟清境春江一夜雨連明又蓬窗髙枕雨如澠恰似槽牀壓酒聲今日岑公不能飲吾儕強健可頻傾范仲黼詩石壁虛涵雲氣深水簾䔩䔩墮璆琳客來但愛幽棲好誰識岑公萬古心趙希混詩自有煙雲護石扉更深曉色近清暉岩前老檜吟風處似請仙翁化鶴歸碑目云萬州虛鑒真人贊朝請大夫知襄州軍州兼管內勸農事提舉房隨郢州兵馬巡檢公事柱國借紫岑象求撰文陽翟李豸書丹南京進士戚逵題額奉議郎權知萬州軍州兼管內勸農事武騎尉賜緋借紫蓋休景立石于元符元年又云宣和中道君皇帝御書萬州妙庭觀岑洞碑紹興二十八年二月朔右朝請大夫權發遣萬州軍州主管學事兼管內勸農借紫臣李莘民述記沖妙大師前敕差充萬州道正主管教門公事賜紫臣冉通明立石已上諸碑豫以癸丑嵗二月歸舟遍訪而拓之圖經云峽中漢刻少今萬州報恩寺有碑髙五尺乃漢桓帝延熹間所刻石凡百餘字土人謂之宜子碑紀勝云西南三里壽寧觀有唐太宗明皇銅真像治北集虛觀有唐垂拱時碑碑目云萬利廟碑乾德乙丑白廷誨為刺史重修距今二百三十餘年漫滅不可讀又云白刺史題名記開寶二年九月記同時僚佐姓名在州萬利廟有碑仆草莽中考閲得之字皆漫滅獨白刺史名在碑目又云大雲寺碑有唐僧圓澤傳及元和間萬州守李裁書聖業院碑在周溪大江之濵三生石旁蘚封可見者咸通三年壬子歲十一月建十餘字耳按周溪在縣東四十里忠義傳載李源道人再生事詩云三生石上舊精魂賞月吟風不要論慚愧情人逺相訪此身雖異性常存又身前身後事茫茫欲話因緣恐斷腸吳越山川尋已遍却回煙棹上瞿唐泠齋夜話云此僧贊寧所記東坡以為即圓澤也經云江水又東彭水注之注云水出巴渠郡獠中東南流徑漢豐縣東清水注之水道源出西北巴渠縣東北巴嶺南獠中即巴渠水也西南流至其縣又西入峽檀井溪水出焉又西過山至漢豐縣東而西注彭溪謂之清水口彭溪又入徑朐䏰縣西六十里南流至于江謂之彭溪口按在縣東八十里巴陽驛是俗名小江舊小彭驛設焉紀勝云小彭驛邉有二石虎髙五尺各有四翅石刻詩云巍巍二虎一塵埋巨石鐫成尚有痕只此也須防夜箭灞陵恐遇李將軍蓋一尉題俗稱石麒麟云雲陽縣經云江水又東右徑朐䏰縣故城南注引常璩曰縣在巴東郡西二百九十里縣治故城跨其山阪南臨大江之南岸有方山山形方峭枕側江濆矣輿地紀勝朐䏰城本漢縣在萬戶城西固陵集載李燾朐䏰記云余泊舟雲安之西三十里萬戶驛下橫石灘上土人云今驛之左右則朐䏰故城也仁父又有曲水留題云或言雲安之西三十里許有自然曲水閏月甲午朔泊舟橫石灘上攜子垕􅘊孰垡壁堲及劉甥卞子道子步訪之水極浚急不可流觴岩巔有永和三年及六年刻字十五六行剝落已不可讀細辨其文但昔人捐金以事仙佛識金數于石耳殆非褉飲處也好事者因年號遂增飾之當時必置屋廬像設今變滅無餘然水石要可喜取酒酌其旁賞晤良久乃去輿地碑目云夔州守楊輔去官過萬戶驛故朐䏰縣治泊舟遊古書岩見刻石滿其上意當時或有像設屋室蓋縣人常所往來之地縣徙歲月不復可考而石刻亦漫闕就盡説者但為臆創乃屬雲安大夫劉甲遍摹岩上下石刻試考詳之庶幾其猶有獲也同來者雲安大夫鄭邦基郝奚仲從姪有聲淳熙十五年八月十六日按橫石灘今之橫梁候館設焉萬戶驛即萬戶壩去縣西四十里萬戶驛北有漢城山乃漢扶嘉所居按扶嘉朐䏰人也初嘉母於湯溪側遇龍後生嘉巧發奇中髙祖為漢王與嘉相遇獻定三秦策髙祖以其志在扶翊賜姓扶氏為廷尉臨終有言云三牛對馬嶺不出貴人出鹽井按馬嶺在縣北三十里三牛在縣北二十里皆近鹽井監矣經云江水又徑魚復縣之故陵注云舊郡治故陵溪西二里之故陵村溪即永谷也地多木瓜樹有子大如甒白黃實甚芬香爾雅之所謂楙也經云江水又東為落牛灘徑故陵北注云江側有六大墳庾仲雍曰楚都丹陽所葬亦猶枳之巴陵矣故以故陵為名也有魚復尉戍此江之左岸有巴鄉村村人善釀故俗稱巴鄉清郡出名酒村側有溪溪中多靈壽木中有魚其頭似羊豐肉少骨美於餘魚溪水伏流徑平頭山內通南浦故縣陂湖其地平曠有湖澤中有菱芡鯽鴈不異外江凡此等物入峽所無按故陵者即古陵沱也酈道元以為舊郡治今名舊縣壩矣碑目云漢處士金廣延母子碑初無文字但有人物又有一碑所勒皆車馬人物或云古者修車馬備器械之圖此皆在舊雲安郡也寰宇記云使君灘在軍東二里大江中昔楊亮為益州至此舟覆徴其波瀾蜀人至今猶名之為使君灘一曰博望灘荆州記云張騫奉使西域於此覆舟亦名使君灘乃在今縣之西矣江中又有龍脊灘形如遊龍歲人日邑人遊於上以雞子卜歲豐凶古謠云龍床如拭濟舟必吉龍床倣佛濟舟必沒宋馮時行龍脊灘留題云建炎戊申正月上巳日判官李造道司戶趙執權知縣母邱元望縣尉馮當可陪郡侯謁武烈公祠遂泛江而下散步此磧老杜詩云元日至人日未有不陰時議者謂天寶之季此詩盡之今日天宇清明江國熙然太平之期指日可俟又獲與諸公偕遊所謂人日也馮當可書杜詩東城抱春岑江閣鄰石面崔嵬晨雲白朝旭射芳甸唐詩有硤斷見孤邑江流照飛甍暮色四山起愁斷數猿聲皆雲安景象元和志郡有鹽官橘官今五峰驛前有橘官堂也宋李􅌫雲安橘官堂記云建炎中改軍為縣𨽻于夔猶存使名官儀仍備太守之略而時節得以奏章自達於朝他邑莫比焉治內有杜鵑亭杜詩雲安有杜鵑名本於此杜詩又曰峽裏雲安縣江樓翼瓦齊兩邉山木合終日子規啼按杜鵑子規本一鳥蜀本紀以為望帝所化詳在方物中豫過雲陽題杜鵑亭詩云春林血淚染山青羈客中宵忍淚聽何處蜀山不啼遍雲安偏有杜鵑亭又過雲安絶句之三云也是山青水碧時客懷何事動深悲春林三月無行迹君未前來聽子規蓋兩用之方輿勝覽云飛鳯山與縣治相對古刻鳯凰嵓三字瀑布泉出焉注于白玉池産太乙玄精石按張桓侯祠設在此山之脊馮當可所稱武烈祠也有石如杵黝而澤設在案前即玄精石矣經云江水又徑東陽灘注云江上有破石故亦通謂破石灘荀延光沒處也常璩曰水道有東陽下瞿數灘山有大小石城靈壽木及橘圃也水經注曰江水過下瞿灘左則陽溪水注之水源出縣北六百餘里上庸界南流歷縣翼帶鹽井一百所巴川資以自給粒大者方寸中央隆起形如張傘故因名之曰傘子鹽有不成者形亦必方異於常鹽王隱晉書地道記曰入湯口四十三里有石煮以為鹽大者如升小者如拳煮之水竭鹽成蓋蜀火井之倫水火相得乃佳耳湯溪下與檀溪水合上承巴渠水巴渠南歷檀井溪檀井入湯水湯水又南入于江名曰湯口也唐商真君飛升記云雲安風俗淳厚陶染真風如瞿法言楊雲外之徒繼出故琳宫祕館獨盛他處輿地紀勝云棲霞觀舊名升雲宫在縣北一十里宫據山絶頂下瞰羣峰培塿可數唐瞿法言于此修煉白日仙去巨柏參天皆二仙手植殿左有五龍池能興雲致雨碑目云唐雲外尊師碑在雲升宫杜光庭文見九域志今名棲霞宫又曰縣西四十里集靈觀有碑云象山福地玉華仙館唐商真君飛升之所又曰縣西百里有上下岩黃魯直云唐末有劉道者聞道于雲居膺禪師為開岩第一祖法號道微自鑿石龕曰死便藏龕中不用日時門人奉其命二百年來遊者題詩不可勝讀莫能起此開岩者故豫作詩表見之云空岩靜發鐘磬響古木倒挂藤蘿昏莫道蒼苔鎖靈骨時應持鉢到諸村又云寺古松楠老巖虛塔廟開僧緣蠶麥去官放荔枝來石室無心骨金鋪稱意苔若為劉道者拽得鼻頭回自注云其一用楊子安韻一用王定國韻也按下巖即燕子龕見郭信可詩矣王維贈燕子龕禪師云山中燕子龕路劇羊腸惡裂地競盤屈插天多峭崿瀑泉吼而噴怪石看欲落伯禹訪未知五丁愁不鑿上人無生緣生長居紫閣六時自捶磬一飲尚帶索種田燒白雲斫漆響丹壑行隨拾栗猿歸對巢松鶴時許山神請偶逢洞仙博救世多慈悲即心無行作周商倦積阻蜀物多淹泊巖腹乍旁穿澗唇時外拓橋因倒樹架柵值垂藤縛鳥道悉已平龍宫為之涸跳波誰揭厲絶壁免捫摸山木日陰陰結跏歸舊林一向石門裏任君春草深郭印題雲安下岩云地涉雲安境山名燕子龕簾垂看急溜蓋偃得修楠牢落前賢迹光明有佛菴幽禽知客至一一解玄談趙抃過雲安軍下巖僧舍云幽寺倚巖阿雲扉掩薜蘿老僧中燕息誰問世風波喻汝礪雲安下巖次涪翁韻云徑向山腰轉門從水面開片雲巖下宿一鉢朔方來落日鳥衝樹輕陰花覆苔惟應荔枝熟時躡白雲回又路暗松杉密天空霧雨開山容依檻轉烏影度江來汲水僧歸寺銜花鹿印苔年年蠶麥熟貧道輟齋回宋肇題下巖云古寺依叢壑雲深暗薜蘿山僧眉睫異林鳥語聲和絶壁疑無路長江忽自波暫來還趣駕衰早倦經過又下巖逢雨云地險重樓仄巖虛古殿開泉鳴風處瀨石暗雨邉苔黃葉曾攀柳青梢未折梅居僧因解笑歲晚尚西來又嵐光分碧瓦江影動丹扉林鳥拳晴竹沙鷗印夕霏風幡空自舞雲岫幾時歸石室君無問塵埃萬事非又盡把蕭疏鬢難勝浩蕩愁西風吹落日小雨弄殘秋堙沒千山瘴掀騰萬壑流宦途如客路吾意轉悠悠黃人傑題云十月水痕瘦維舟過下巖鷗行沙作路龍像石為龕風定煙光合霜回日色酣賦詩無好語聊用志瞿曇李燾和黃豫章韻云山與蜀江並嵓從天漢開禪僧若個住詩客幾人來金闕挂白練石龕封緑苔㩦家便堪隱歸楫重徘徊宋永孚詩云江漲桃花後風薰荔子前來瞻千億佛去此十三年嵓澑翠常滴林花紅欲然因知山與石本性亦虛圓又兩山中斷曉天開萬頃無波浸緑醅巖外水簾垂到地坐看煙雨過江來楊邁下巖詩云竹樹藤蘿密復疏路回崖斷見精廬龕藏衲子千年骨神護涪翁半壁書落日紅光浮戶牖曉雲空翠滴衣裾塵勞獨愧山僧靜一飯跏趺不願餘又下巖避暑云古寺重來興轉添舟中午暑正炎炎野僧引客登山閣稚子穿雲放水簾熱得清涼身暫健懶便間靜意難厭人間劫火方撩亂法雨何如為普沾令狐慶譽詩云地逺塵寰不染埃懸崖屈曲寄層臺山頭玉澑隨簷滴巖下金容就石開寺影不妨流水過松香常逐好風來遍遊未盡無窮景為報舟人且莫催杜柬之詩云濤江翻雪捲胡灘晚泊巖扉暫解顔夙有靜緣逢寺古了無生理伴僧間殘雲已斷獨飛雨落日將沉却照山半夜秋聲驚客夢一簾珠貝冷珊珊閩人朱煥下巖次韻云勝地都無一點埃翛翛野竹映樓臺僧同巢鳥林端見佛顯靈巖石面開道者已隨鸞鶴去世人特為水雲來登臨清興無窮盡一下層巒暮色催豫以萬厯壬子暮春過此作詩云病中入寺情相得雨後看山興轉添片石僧寮無結構一春嵓澑自垂簾題名刻像成今古背路臨江恰見潛我已忘機來此地白雲溪鳥莫猜嫌因遍訪諸石刻其可見者遊仲鴻遊季祥來遊時段謙仲適尉此邑邂逅巖中酌酒共坐而去淳熙乙巳四月十四日也軍守張吉監井史澤判官陳奭以嘉祐六年五月二十一日至寺下偶新蓬州司理向宜顔偕遊資郡張良能少穎解褐西泝艤舟來謁尊者拜三先生遺像紹定庚寅仲春念一日男逺卿侍杜世東就銓西歸謾書絶句往年題杜記行色今日支笻還獨來道者相看定相笑若為牽得鼻頭回樂溫缺鐘涪陵尉鄭階平治平乙未六月五日同遊住持本院主僧法能刻石開縣舊漢豐縣也華陽國志云漢豐縣建安二十一年置在巴東郡西北彭溪源寰宇記云後周改漢豐縣為永寧縣今州西四十九里濁水故城是也志云縣南四十里墊江一名濁水源出梁山縣之髙梁山春夏泛漲人多墊溺流至渠口鋪入開江又云清水源出萬歲縣之石塔山西南流經石門山又西南流經巴渠故城東輿地紀勝云巴渠縣劉宋所置宇文氏改為萬歲縣以縣北有萬歲谷也舊址在今縣東北五十里即宋之清水縣矣縣西北一里有盛山以唐刺史韋處厚著名韓愈作盛山十二詩序云韋侯昔以考功副郎守盛山人謂韋侯美士考功顯曹盛山僻郡奪所宜處納之惡地以枉其才韋侯將怨且不釋矣或曰不然得利則躍躍以喜不得利則戚戚以泣若不可生者豈韋侯之謂哉韋侯讀六藝之文以探周公孔子之意又妙能為辭章可謂儒者夫儒者之于患難茍非其自取之其拒而不受于懷也若築河隄以障屋􅋼其容而消之也若水之于海冰之于夏日其玩而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲况一不快于考功盛山一出入息之間哉未幾果有以韋侯十二詩遺余者方且以入溪谷上岩石逐追雲月不足日為事讀而詠歌之令人欲棄百事往而與之遊不知其出于巴東以屬朐䏰也于時應而和者凡十人及此年韋候為中書舍人侍講六經禁中侯名處厚和者通州元司馬名稹為宰相洋州許使君名康佐為京兆忠州白使君居易為中書舍人李使君景儉為諫議大夫黔府嚴中丞武為祕書少監溫司馬造為起居舍人皆集闕下于是盛山十二詩與其和者大行于時聨為大卷家有之焉慕而為者將日益多則分為别卷韋侯俾余題其首云韋處厚詩激曲縈飛箭浮溝泛滿巵將來山太守莫向習家池右流杯渠不資冬日秀為作暑天寒先集誠非鳯來翔定是鸞右竹嵒巉巖雪中嶠磊落標方峭勿謂枕蒼山還當礎清廟右繡衣石榻注為溫侍御置雨合飛危砌天開卷曉窗薺平聨郭柳帶繞抱城江右宿雲亭夾岸凝輕素交枝漾淺淪味調方薦實臘近又先春右梅溪噴日舒紅錦通蹊茂緑陰終期王母摘不羡武陵深右桃塢疏鑿徒為巧圓窪自可澄倒花紛錯繡鑑月靜涵冰右葫蘆沼顧渚吳商絶蒙山蜀信稀千叢因此始含霧紫英肥右茶嶺繚繞緣雲上璘玢甃玉聨髙髙層幾折極目瞰秋鳶右盤石磴褊地堆層疊因崖遂削成淺深嵐嶂色盡向此中呈右琵琶臺綆汲豈無井顛崖愧深浚願灑塵垢餘一雨根莖潤右上士瓶泉注為柳律師置初映鉤如線終銜鏡似鉤逺澄秋水色髙倚曉河流右隱月岫張籍和云獨入千竿裏緣巖踏石層笋頭齊欲出更不許人登右竹巖曲沼春流滿新蒲映野鵝聞齋朝飯後拄杖繞行多右葫蘆沼月出深峰裏清涼夏亦寒每嫌西落疾不得到明看右隱月岫臺上緑蘿春間登不見人每當休暇日著履戴絃巾右琵琶臺清淨當深處虛明向逺開捲簾無俗客應只見雲來右宿雲亭自愛新梅好行尋一徑斜不教人掃石恐損落來花右梅溪山城無别味藥草兼魚果時有繡衣人同來石上坐右繡衣石榻紫芽連白蘂初向嶺頭生自看家人摘尋常觸露行右茶嶺階上一眼泉四邉青石甃惟有護淨僧添瓶將盥潄右上士瓶泉緑酒盈白杯隨流去復回似知人把處各向面前來右流杯渠纍石盤空逺層層勢不危不知行幾里得到上頭時右盤石磴春塢桃花發多將野客遊日西殊未散看望酒缸頭右桃塢此方洞壑聨屬而溫湯洞為最杜光庭録異記云開州後倚盛山東枕清水泝江而北三十餘里至溫湯井井有湯泉在北山上麟德年因雷雨震霹山腳摧裂洞門自開當門有石鐘自然成形如數千斤鐘大懸身去地二尺許外象鐘而中實扣之無聲門兩壁有石如金剛力士之形者數人鐘旁有小徑髙六尺已來行二三丈稍濶有石碑巨龜負之自然而成但無文字而已碑側有巨屏上與頂相連下有一穴側身可入一二尺許自是廣濶中有路徑平坦與常無異路之左右滴乳為石羅列衆形龍鱗鸞鶴頺雲巍山如林如柱似動似躍乍飛乍顧千形萬態不可殫紀僅一里許傍竦蓮臺周回數步髙三四丈層綴重疊皆可攀躋旋生石乳如臂如指者以燭照之通透瑩徹隨折脆斷及出洞門外得風皆白石矣自臺側三四十步有蓮花羅布於地旁有甘泉水色溫白遊洞者烹茗於此前有橫溪湍波甚急其聲喧洶流出洞外溪上有橋長二三丈濶一丈許非石非土功甚宏壯過橋得黃土坡髙四五丈道徑險滑行者纍息方至其頂坡上有巨堂四壁平淨中髙數丈壁上皆有遊山之人題記年月堂之極處曲角有一穴髙四五尺廣三四尺去下丈餘躋攀莫及相傳云昔有遊人攀緣而入纍月之後出于巫山洞中自後無復敢入者大寧縣水經注巫溪水又徑北井縣西東轉歷其縣北井南有鹽井井在縣北故縣名北井建平一郡之所資也鹽水下通巫溪溪水是兼鹽水之稱矣勝覽云寶山在大寧監北十七里半山有穴如瀑泉即鹹泉也山有牡丹芍藥蘭蕙雜花卉圖經云一泉之利足以奔走四方者此矣知監正子申大寧志序云一溪前陳可濯可沿衆峰巉絶如削如畫亦峽郡之桃源也紀勝云觀音巖在監治東鳯凰山郡守張孝芳愛其類湘中山水暇日窮討得月窟雲巖釣雪玉環浮玉寶華之勝又云距城二里兩江合處中有石岩峙如門髙二三丈溪流噴如瀑布謂之南淵鹽官孔嗣宗春日與客泛舟飲于緑陰下商民鼓吹隨之其樂不減于蠶市矣志云二仙洞去鹽場二里一名王子洞山髙百餘丈上下皆削壁惟一徑寬二尺長四五丈許始達中可丈許凡遊者不敢下視洞口寬髙十餘丈深不可測岩上石文生成千字水出石笋四時不絶相傳昔有王子採樵見二人圍棋于此局未終而斧柯已爛其人仰壁留題而去詩曰仙人洞裏無春秋白雲深處心悠悠爛柯樵子半途客安得乘風駕玉虬千年勝事今朝説一一重重心練結從來流水與髙山更有清風共明月王子後不知所終但傳蛻仙骨長丈餘碑目丁晉公謂夔州移城記云開寶伐蜀師分劒巫而入時灔澦激射樓船戰艦難進易退步騎自襄州西山裹糧兼行林麓無際澗壑相接不知道路之所從得蜀民詣王師獻書由大寧路直取夔州平蜀之師實取道於此也景德三年記大昌縣水經注云巫溪水源出宣漢縣南徑建平郡之泰昌縣南即大昌也寰宇記云千頃池在縣西三百六十里波瀾浩渺莫知涯際分為三道一道東流當縣為井源一道西流為雲安縣陽溪一道南流為奉節縣西瀼水杜甫西閣三度期大昌嚴明府同宿不到詩云問子能來宿今疑索故要匣琴虛夜夜手板自朝朝金吼霜鐘徹花催蠟炬銷早鳬江檻底雙影謾飄飄建始縣三國時屬吳之建平郡隋開皇為業州今縣東三十五里有州基山是其處黃山谷馬上口號呈建始李令云驛亭新似眼波明箐路開如掌樣平誰與長官歌美政風搖松竹是歡聲志云縣西三里有石通洞壁刻涪翁二字蓋山谷曾來遊也志又云縣西五十里石乳石層疊多生石乳其上置石乳關蜀中廣記卷二十三
