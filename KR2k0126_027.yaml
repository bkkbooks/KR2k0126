body:
  text: 蜀中廣記卷二十七明曹學佺撰名勝記第二十七川北道順慶府一南充縣附郭嘉陵江既繞當郡流則將滙巴宕之水而下墊江矣華陽國志云劉璋分墊江以上為巴西郡者此也寰宇記云嘉陵江在州東二百步自相如縣界流入南充按十道記云果州左濵西漢水叢薄蔚然有相如琴臺觀此則嘉陵江之為西漢水益明矣韋應物聽嘉陵江水寄深上人詩水性自云靜石中本無聲如何兩相激電轉空山驚按長慶集云韋貫之坐考策收直言者出為果州刺史今嘉陵驛設于此耆舊録云自漢紀信以下三十六人並見學録蒲士龍所編耆舊而趙嗣業趙昌藻游問為之贊此外隱逸王公宇以下十四人併繪像于郡之鄉賢堂又復搜訪王綰以下二十餘士悉繫于左郡志云譙周墓在治後有碑今折碑目云唐王維送楊長史赴果州詩刻在郡治其中聨云官橋祭酒客山木女郎祠唐詩三體注云漢法祭酒上客之稱女郎祠以謝自然上升于果山按常璩云張魯以鬼道立教後乃為祭酒巴漢夷民多便之則祭酒稱上客是矣謝自然升仙乃貞元間事在右丞後不應引此官橋者志云郡西三十五里有西橋舊名官橋也按女郎亦張魯女感孕而生龍者祠在漢中碑目又云唐移縣碑在南充縣門大中年立文字磨滅不可詳辨二良牧碑馬肩孟撰載唐二刺史事碑在郡治醋庫之側永興節度使王彥超重建行成思堂石刻詩不著其姓今附見云作堂在姑孰把麾來果山男子四方志萬里如目前振振佳公子性行純如天既知仁有本自應枝葉繁宣尼語參孝推廣十八篇君能擴充之九思極其全道行身亦立揚名顯其先回觀廬墓人卑卑何足言方輿記云有仙鶴樓在郡城後子城上下瞰大江宋邵博詩春去秋來好風月鶴樓端勝庾公樓郡之東南有開漢樓郡守楊濟記云聖朝褒綸有實開漢業之語因摘二字以名是樓按開漢樓詩序嘉陵大江襟帶於左金泉栖樂諸山雄峙於右宋忠祐廟誥詞云以忠殉國代君任患實開漢業使後世知君為重身為輕雖糜捐不避者侯有力焉之謂也有清居山勝覽云在南充縣南唐姚昻詩天設兩峰南北峭地盤一水古今流內有四亭曰白雲光相吸江五友按五友亭宋游炳題明月清風為道友古典今文為義友孤雲野鶴為自在友怪石流水為娛樂友山果芋栗為相保友是五友者無須㬰不在此間也總志云金塿在清居山髙與山等亭亭如浮圖常有光焰出焉有清泉山方輿云城南十里有古剎下瞰龍門諸山寰宇記云龍城山盤屈若龍絶壁如城蜀志補遺即龍角山道經以為福地有朱鳯山寰宇記在州南十里髙百七十二丈周回二十里昔有鳯凰集于此因置鳯山觀方輿云乃爾朱仙李淳風養煉之地回視郡城如在掌握碑目云唐朱鳯山觀銘長史袁玘文有漢充國城志云在府南三十五里按充國漢永元二年分閬中置巴記曰初平四年復分為南充國也邵博詩云山圍翠合水連雲萬室樓臺照眼明勝地風淳真樂國四州惟說好充城有畫卦石志云在治東四十里其石平如砥上有八卦相傳周柱下史以足畫之足跡尚存有大斗溪志云在治東八十里源出老君山與嘉陵江合傍有大石如斗有都尉壩嘉陵志郡南五十里有都尉墓俗云都尉娘西充女子也代父戍以功授都尉歸為嫂氏所嘲乃刲腹見肝腎以死葬鳯丫山有豐碑社祀今廢其年代姓氏無考墓前翁仲猶存或云即陳壽妻壽嘗為騎都尉故人以稱其妻西北有果山寰宇記在州西八里層峯秀起松柏生焉方輿云果山以郡得名陳壽隱居于此有祠志云陳壽有萬卷樓在山之麓邵伯溫果山即事詩果山仙果秀天香處處圓金樹樹芳謂黃柑也志云果山書院在城北五里蜀譙周建後郡人邉速達以祕書監致仕歸隱于此藏書四千二百七十一冊碑刻為至正八年又云治北五里有譙周觀星臺一云是其故宅有碑存按華陽國志云譙侯修文于前陳君煥炳于後則此山之靈秀有自來矣有金泉山方輿云在城西果山之足唐書貞元十年謝真人名自然於縣界金泉紫極宫白日上升郡郭是夕有虹霓雲氣萬目所共覩焉有青霞觀及真人祠韓愈詩果州南充縣寒女謝自然童騃無所識但聞有神仙輕生學其術乃在金泉山一朝坐空室雲霧生其間須㬰自輕舉飄若風中烟入門無所見冠屣同蛻蟬施肩吾謝自然升仙詩分明得道謝自然古來漫說尸解仙如花年少一女子身騎白鶴遊青天有步虛臺宋鄭芳庭詩云平生酷好退之詩謝女仙踪頗自疑不到步虛臺下看瓊笙玉佩有誰知有靈泉院碑目云謝真人父諱寰所居名謝寰山山有院名靈泉一唐碑字多訛缺通志云靈泉即金泉也唐李淳風于此藏金化為泉宋江萬里書金泉二字于崖上碑目云唐金泉山仙居述太和五年果州刺史韋公肅文唐鄭餘慶詩刻唐誥刻僞蜀刺史徐光溥詩刻俱在金泉山李宏遊金泉觀詩云昔時謝女升天處此日遺蹤尚宛然蟬蛻舊衣留石室龍飛勝地湧金泉碑書故事封蒼蘚殿寫真容鎖翠煙薄暮松巔聽鶴唳猶疑倣佛下神仙有寶臺山在城西與金泉對峙有覽秀亭吕好問覽秀亭記思史竇之遺風弔譙陳之舊蹟想程謝之仙踪慕張閻之英躅謂史謙恕竇泌譙周陳壽程太虛謝自然張嶷閻纘也有舞鳯山志云西北八里舞鳯山三字乃宋人隸刻石有栖樂山志云在西十里相傳謝自然升天之日仙樂振響峯頂故名有栖樂池在山頂甃之以石泉水清潔與嘉陵江相通有安漢城志云在府城北三十五里漢地里志云有魚池在南莽曰安新矣劉宋于此置宕渠郡又云宕渠城在府城北四十里即石茍壩城也有大方山方輿云城北十五里通志云城西三十里又有小方山一峯萬嶺儼若洞天其上有滴乳泉道士何志全飲此水年老面如桃紅樊汝賢詩雲液落山腹脈與崑崙通云何山中叟八十桃顔紅即今之乳泉鋪也有昆井益州記云南充縣西六十里有大昆井即古之鹽井有大耽山與小耽山相對志云西百里大耽山隋楊耽修道于此因名名賢馬鬛有晉譙秀墓按秀譙周之孫隱居不仕躬耕山藪李雄徴之不應晉王逸少書云聞譙周有孫其人髙尚不仕可得見否唐李商隱詩欲向巴西覔譙秀巴西惟是有寒蕪有馮休墓方輿云南充人真宗朝不應辟召歸山著書有何涉墓志云在琉璃山下按涉讀書博古著作甚富明道雜志載其為司馬溫公所推重有游仲鴻墓後漢劉光祖表其道曰於乎慶元黨人游公之墓有趙夫子墓在據德里鄉人稱趙巽也豫遍閲唐人集元稹嘉陵江詩秦人惟識秦中水長想吳江與蜀江今日嘉川驛樓下可憐明練繞明窗其二云千里嘉陵江水深何年重繞此江行只應添得清宵夢時見滿江秋月明微之又宿嘉陵驛詩嘉陵驛上空牀客一夜嘉陵江水聲仍對牆南滿山樹野花撩亂月朧明其二云牆外花枝壓短牆月明還照半張牀無人㑹得此時意一夜獨眠西畔廊白居易嘉陵夜有懷詩露濕牆花春意深西廊月上半牀陰憐君獨卧無言語惟我知君此夜心其二云不明不暗朦朧月非暖非寒慢慢風獨卧空牀好天氣平明閒事到心中武元衡題嘉陵驛詩悠悠風斾繞山川山驛空濛雨似烟路半嘉陵頭已白蜀門西更上青天歐陽詹聞嘉陵越鳥聲呈林藴詩正是閩中越鳥聲幾回留聽暗霑纓傷心激念君深淺共有離鄉萬里情陸龜蒙宿嘉陵館樓詩離思茫茫偏值夜每因風景却生愁今宵難作刀州夢月色江聲共一樓李洞將之蜀别友人詩嘉陵雨色清淡别酌參苓到蜀髙諸嶽窺天合四溟書來應隔雪夢覺已無星若遇多吟友何妨勘竺經薛能嘉陵驛詩江濤千疊閣千層銜尾相隨盡室登稠樹蔽山聞杜宇午烟熏日食嘉陵頻題石上程多緩暫歇泉邊起不能如此幸非名利切益州來日合携僧劉滄春日遊嘉陵江詩獨泛扁舟映緑楊嘉陵江水色蒼蒼行看芳草故鄉逺坐對落花春日長曲岸危檣移渡影暮天栖鳥入山光今來誰識東歸意把酒閒吟思洛陽右嘉陵水閬中廣元皆得稱之雖不知所指然今驛設在果州故并及之西充縣始析南充後乃併流溪而有之仙踪古跡特著其大陵鎮則有扶龍山志在髙陽之扶龍村蓋紀信此縣人祠在紫崕其小陵鎮則有肖巖石竇空潤泉水清潔矣唐盧藏用弔紀信文曰皇綱圯兮帝紐頺王風悲兮霸道衰天運促兮周以覆秦德棄兮漢業開何項王之贔屭作驅除於雲雷豈淵海之飛蕩資拔山之偉才於是左契歸楚羣雄奉職皇矣漢祖獨負其直矧滎陽之圍城兮既孤而迫偉將軍之天誘兮矯奪其識彼見危而授命兮亦各有時考振古以為觀兮罔恢帝基感將軍之墳隧兮壯大義之在兹仰前修以砥節顧車回而馬遲鳴呼身既焚兮業既昌楚歌絶兮漢道光君不旌兮史不揚功不録兮殁不傷奄孤墳以載葬抑千祀而為荒皇周敷訓兮澤及枯胔伊豫寡德兮忝宰兹地奉宣嘉猷兮懼尸厥位思將軍兮允忠且義託神交於萬古兮實獲心志乃斫石於他山兮式幽墳以昭賁詞曰攝提貞歲兮奉揚仁風跋涉草莽兮祠弔紀公善彼勇兮殺身為忠九原不作兮豫將焉同金石刻名兮千萬歲魂魄光烈兮為鬼雄南岷山則有九井十三峰漢何岷之所隱也隋程太虛嘗修煉于此志云太虛自幼好道精修勤苦隱居南岷山絶粒有二虎侍左右九井十三峰皆其修煉處一夕大風雨砌下得碧玉印居人每乞符祈年印以授之輒獲豐稔唐元和中解體後遷神于𤣥宫容貌不變宣宗命人求之使者過商山宿逆旅躡險有居第如公館青童引見一道士自稱程太虛祖居西充且囑曰明歲君自蜀入南岷山無忘我及至蜀熟視畫像與前見者無異宋賜號道濟太師碑目云唐程仙師蟬蛻偈皂莢碑唐仙林觀碑中書侍郎趙彥昭撰俱在本山之降真觀流溪縣則有鐵冠仙人鈐記云大洲連小洲此地出公矦有漢車騎崕石刻郡國志云後漢車騎將軍馮緄於此鐫崖刻石十有餘處寰宇記云在流溪縣按金石録云右漢車騎將軍馮緄碑以范曄後漢書考之史云字鴻卿而碑云皇卿史云初舉孝廉七遷至廣漢屬國都尉拜御史中丞順帝末持節督揚州諸軍事與中郎將滕撫擊破羣賊今據碑自舉孝廉至為廣漢屬國都尉凡十一遷而為中丞與都使徐揚二州討賊皆在為都尉前碑云討賊時坐迫州縣正法而史不載又云為隴西太守坐問吏辜旬不分去官以羌駭動為四府所表復家拜隴西太守而史但言遷隴西太守史云為遼東太守徴拜京兆尹轉司隸校尉遷廷尉太常拜車騎將軍以碑考之緄為遼東太守以前嘗為治書侍御史遷尚書遂為廷尉未嘗拜京兆尹及司隸也史云振旅還京師監軍使者張敞承宦者㫖奏緄會長沙賊復起攻桂陽武陵緄以軍還盜賊復發策免而碑云臨當受封以謠言奏河內太守中常侍左悺弟坐遜位史云復拜廷尉時山陽太守單遷以罪繫獄緄拷致其死遷故車騎將軍超之弟中官相黨遂共誹章誣緄坐輸左校而碑云表荆州刺史李隗南陽太守成晉太原太守劉瑱不宜以重論坐法作左校亦皆不合史又云為河南尹時上言舊典中官子弟不得為牧人職帝不納拜屯騎將軍復為廷尉卒於官而碑云復廷尉奏中官子弟不宜典牧州郡獲過左右遜位永康元年薨亦當以碑為正碑又云緄諡曰桓而史亦不載余嘗謂石刻當時所書其名字官爵不應差誤可信無疑至於善惡大節則當以史氏為據今此傳首尾顛倒錯謬如此然則史之所載是非褒貶失其實者多矣果可盡信耶又云右漢馮使君墓闕銘云故尚書侍郎河南京令豫州刺史馮使君神道按後漢書馮緄父焕安帝時為幽州刺史而緄碑亦云幽州君之元子此字在宕渠緄墓前雙石闕上知其為焕闕也蜀中廣記卷二十七
