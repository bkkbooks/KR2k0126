body:
  text: 蜀中廣記卷八十九明曹學佺撰高僧記第九川北道二宋祖印居訥禪師梓州中江蹇氏子初生有神光滿室年十一依漢州什邡竹林寺僧元昉出家十七試法華得度受具以講學冠兩川㑹有禪者自南方還稱馬祖道被天下應般若多羅䜟蜀之豪俊以經論聞者如亮公而亮公棄徒隱西山如鑒公而鑒公焚疏鈔稱滴水莫敵巨海師憮然良久曰汝知其說乎禪者曰我不能知也師於是出蜀放浪荆楚屢閲寒暑迄無所得西至襄州洞山榮座下留止十年讀華嚴論至曰須彌在大海中高八萬四千由旬非手足攀攬可及以明八萬四千塵勞山住煩惱大海衆生有能於一切法無思無為即煩惱自然枯竭塵勞成一切智之山煩惱成一切智之海若更起心思慮即有攀緣即塵勞愈高煩惱愈深不能至諸佛智頂師豁然有省嘆曰石鞏云無下手處而馬祖云曠劫無明今日一切消滅非虛語也後遊廬山道價日增南康太守程師孟請住歸宗遂嗣榮禪師又住圓通仁宗皇帝聞其名皇祐初詔住十方淨因禪院堅辭不赴於是賜師號祖印禪師師臨衆簡嚴不妄言笑常入定初叉手自如中夜漸升至膺侍者每視以候雞鳴其精進如此既老退居寶積巖時江州牧劉公述每造師問道一日忽辭劉公歸沐浴端坐示寂劉公率緇俗送往茶毗火焰中白氣上貫太陽大衆驚仰歐陽文忠公獨加尊敬每問南來士人曽見訥禪師否又與老蘇明允遊相好云宋雪竇明覺禪師諱重顯遂州李氏子初參智門問不起一念云何有過門召師近前來師才近前門以拂子驀口打師擬開口門又打師豁然開悟遂寧縣志稱師住翠岩菴極有詩名嘗送僧云紅芍藥邊方舞蝶碧梧桐裏正啼鶯離亭不折依依栁況有春山送又迎又送僧之金陵云勝遊生末跡極目狎時羣捲袖消寒木揚帆牽斷雲曙瓶花外汲午磬浪邊聞别後石城月依依逺共分有詩集傳世又著明覺語録六卷宋昭覺純白禪師梓州飛烏人姓支氏父謙聞法於松山道者以死生為戲白衣梵行緇俗無出其右者嘗云吾根純不得入圓頓願有子續佛慧命足矣師少聞父誨諦聽沉思有如夙習一日躍過溪忽有省不覺失笑遂往依峩眉山華嚴寺落髮受具父子相與遍厯成都講肆通性相宗經論去之南遊首謁澧州太平俊禪師俊大竒之謂真吾法子也付以十三條說法大衣師遜却之後詣黃蘖山禮真覺勝禪師親近嵗餘未始一顧師奉事益勤勝一日忽擡眸視之師咄曰這老漢把不定作麼勝大笑乃為印證心地元豐末宗室南康郡王自黃蘖邀勝詣輦下師侍行未幾會太學生上書訟博士者語連勝有㫖放歸蜀門人星散獨師負巾鉢以從㑹成都府帥奏改昭覺為十方問真覺誰可住持真覺以師應請師既領院遵南方規範一變律居上堂示衆有曰不超性海是理事縛不透聲輪是語言縛於是蜀之淨侣靡然向風朝散郎馮敢奉議郎段玘天台山隱者宋放唐安文士祖思昱皆摳衣執弟子禮元祐末白水寺僧正闕丞相蔡京時帥成都命師住師不樂遂併昭覺辭之請歸舊剎建立綱宗久之示疾頌曰風高月冷水逺天長出門無影四面八方怡然而寂俗壽五十九坐三十四夏小師得法出世者曰宗顯宗化嗣法者曰劍州元封常照卭州鐵像子嵩師於昭覺為第一代塔至今存宋大隨元靜禪師後名道興閬之玉山大儒趙公約仲子也十嵗病甚母禱之感異夢捨令出家師成都大慈寶生院宗裔元祐三年通經得度留講聚有年而南下首參永安恩禪師於臨濟棒話發明次聞五祖機峻欲抑之遂謁祖祖乃曰我此間不比諸方凡於室中不要汝進前退後竪指擎拳繞禪床作女人拜提起坐具千般伎倆秪要你一言下諦當便是汝見處師茫然退參三載一日入室罷祖謂曰子所下語已得十分試更與我說看師即剖而陳之祖曰說亦說得十分更與我斷看師隨所問而判之祖曰好即好秪是未曽得老僧說話在齊後可來祖師塔所與汝一一按過始得及至彼祖便以即心即佛非心非佛睦州擔板漢南泉斬猫貌趙州狗子無佛性有佛性之語遍辟之其所對了無凝滯乃曵杖渡江適大水泛漲因留四日儕輩挽其歸又二年祖方許可嘗商略古今次執師手曰得汝說須是吾舉得汝舉須是吾說而今而後佛祖祕要諸方關鍵無逃子掌握矣遂創南堂以居之於是名冠寰海成都帥席公旦請開法嘉祐未幾徙昭覺遷能仁及大隨上堂君王了了將帥惺惺一回得勝六國平寧上堂舉臨濟參黃檗語白雲端和尚頌云一拳拳倒黃鶴樓一躍躍翻鸚鵡洲有意氣時添意氣不風流處也風流師曰大隨即不然行年七十老躘蹱眼目精明耳不聾忽地有人欺負我一拳打倒過關東紹興乙卯秋七月大雨雪山中有異象師曰吾期至矣十七日别郡守以次越三日示少恙於天彭二十四日夜謂侍僧曰天曉無月時如何僧無對師曰倒教我與汝下火始得翌日還堋口廨院留遺誡蛻然示寂門弟子奉全身歸烟霧四合猿鳥悲鳴茶毗異香遍野舌本如故舍利五色者不可計瘞于定光塔之西後住天童天目文禮作師畫像贊曰東山一㑹人唯他不唧𠺕别處著閒房叢林難講究邡水潭蛇出驚人鈍鐵鍋雞啼白晝雜劇打來全火祗候晚嵗放疏慵却與俗和同勒巴子使人勘驗擲香貼便顯家風定光無佛枉費羅籠臨行搖鐸向虛空那知喪盡白雲宗宋宗泰禪師涪城人自出關遍遊叢社至五祖告香日祖舉趙州洗鉢盂話俾參洎入室舉此話問師你道趙州向伊道甚麼這僧便悟去師曰洗鉢盂去聻祖曰你秪知路上事不知路上滋味師曰既知路上事路上有甚滋味祖曰你不知邪又問你曽游浙否師曰未也祖曰你未悟在師自此凡五年不能對祖一日升堂顧衆曰八十翁翁輥繡毬便下座師欣然出衆曰和尚試輥一輥看祖以手作打杖鼓勢操蜀音唱綿州巴歌曰豆子山打瓦鼓陽平山撒白雨白雨下取龍女織得絹二丈五一半屬羅江一半屬𤣥武師聞大悟掩祖口曰秪消唱到這裏祖大笑而歸後還漢州四衆請開法無為遷正法上堂此一大事因緣自從世尊拈花迦葉微笑世尊曰吾有正法眼藏分付摩訶大迦葉以後燈燈相續祖祖相傳迄至于今綿綿不墜直得遍地生華故號涅槃妙心亦曰本心亦曰本性亦曰本來面目亦曰第一義諦亦曰爍迦羅眼亦曰摩訶大般若在男曰男在女曰女汝等諸人但自悟去這般盡是閒言語遂拈起拂子曰㑹了喚作禪未悟果然難難難目前隔箇須彌山悟了易易易信口道來無不是宋丹霞子淳禪師劍州賈氏子弱冠為僧徹證於芙蓉之室上堂乾坤之內宇宙之間中有一寶祕在形山肇法師恁麼道祗解指縱話跡且不能拈示於人丹霞今日擘開宇宙打破形山為諸人拈出具眼者辦取以拄杖卓一下曰還見麼鷺鷥立雪非同色明月蘆花不似他上堂舉德山示衆曰我宗無語句實無一法與人德山恁麼說話可謂是秪知入草求人不覺通身泥水仔細觀來祗具一隻眼若是丹霞則不然我宗有語句金刀翦不開深深𤣥妙㫖玉女夜懷胎上堂亭亭日午猶虧半寂寂三更尚未圓六户不曽知暖意往來常在月明前上堂寶月流輝澄潭布影水無蘸月之意月無分照之心水月兩忘方可稱斷所以道升天底事直須揚却十成底事直須丢却擲地金聲不須回顧若能如是始解向異類中行諸人到這裏還相委悉麼良久曰常行不舉人間步披毛戴角混塵泥僧問牛頭未見四祖時如何師曰金菊乍開蜂競採曰見後如何師曰苖枯花謝了無依宣和已亥春示寂塔全身於洪山之南宋潼川梅山已禪師僧問如何是法身邊事師曰枯木糝花不犯春曰如何是法身向上事師曰石女不粧眉宋䦘州光國文贊禪師僧問如何是佛法大意師曰禍不單行又問諸法寂滅相不可以言宣猊座既登師如何說師曰因風吹火用力不多僧云恁麼則佛佛道同師曰猫兒帶紙帽問不二之法請師速道師曰領僧云恁麼則人人有分也師曰了僧云錦屏天下少光國世間稀師曰退宋雲蓋守智禪師劒州陳氏子遊方至豫章大寧時法昌遇禪師韜藏西山師聞其飽參即之昌問曰汝何所來師曰大寧又問三門夜來倒汝知麼師愕然曰不知昌曰吳中石佛大有人不曽得見師惘然即展拜昌使謁翠岩真禪師雖久之無省且不舍寸陰及謁黃龍於積翠始盡所疑後首衆石霜遂開法道吾徙雲蓋僧問有一無絃琴不是世間木今朝負上來請師彈一曲師拊膝一下僧云金風颯颯和清韻請師方便再垂音師曰陜府出鐵牛上堂緊鞘離水靴踏破湖湘月手把鐵蒺藜打碎龍虎穴翻身倒上樹始見無生滅却笑老瞿曇彈指超彌勒上堂昨日高山看釣魚步行騎馬失却驢有人拾得駱駝去重賞千金一也無若向這裏薦得不著還草鞋錢上堂舉趙州問僧向甚麼處去曰摘茶去州曰閒師曰道著不著何處摸索背後龍鱗面前驢腳翻身筋斗孤雲野鶴呵呵呵示衆不離當處常湛然覔即知君不可見雖然先德恁麼道且作箇模子搭却若也出不得秪抱得古人底若也出得方有少分相應雲蓋則不然騎駿馬繞須彌過山尋蟻跡能有幾人知師居院之東堂政和辛卯死心謝事黃龍由湖南入山奉覲日已夕矣侍僧通謁師曵履且行且語曰將燭來看其面目何似生而致名喧宇宙死心亦絶呌把近前來我要照是真師叔是假師叔師即當胸歐一拳死心曰却是真箇遂作禮賔主相得歡甚及死心復領黃龍至政和甲午示寂時師住開福得訃上堂法門不幸法幢摧五藴山中化作灰昨夜泥牛通一線黃龍從此入輪回宋黃蘖真覺禪師潼川羅氏子居講聚時偶以扇勒窗櫺有聲忽憶教中道十方俱擊鼓十處一時聞因大悟白本講講令參問師徑往黃龍後因瑞州太守委龍遴選黃蘖主人龍集衆垂語曰鐘樓上念讃床腳下種菜若人道得乃往住持師出答曰猛虎當路坐龍大悅遂令師往由是諸方宗仰之上堂臨濟喝德山棒留與禪人作模範歸宗磨雪峯毬此箇門庭接上流若是黃蘖即不然也無喝也無棒亦不推磨亦不輥毬前面是案山背後是主山塞却你眼睛桚破你面門於此見得得不退轉地盡未來際不向它求若見不得醍醐上味翻成毒藥上堂寂兮寥兮蟾蜍皎皎下空谷寬兮廓兮曦光赫赫流四海曹溪路上勦絶人行多子塔前駢闐如市直饒這裏薦得倜儻分明未是衲僧活計大丈夫漢須是向黑暗獄中敲枷打鎖餓鬼隊裏放火奪漿推倒慈氏樓拆却空王殿靈苖瑞草和根拔滿地從教荆棘生宋宗顯禪師潼川王氏子少為進士有聲嘗晝掬溪水為戲至夜思之遂見水泠然盈室欲汲之不可而塵境自空曰吾世網裂矣往依昭覺得度具滿分戒後隨衆咨參覺一日問師高高峰頂立深深海底行汝作麼生會師於言下頓悟曰釘殺腳跟也覺拈起拂子曰這箇又作麼生師一笑而出服勤七祀南遊至京師厯淮浙晚見五祖演和尚於海㑹出問未知關捩子難過趙州橋趙州橋即不問如何是關捩子祖曰汝且在門外立師進步一踏而退祖曰許多時茶飯元來也有人知滋味明日入室祖云你便是昨日問話底僧否我固知你見處秪是未過得白雲關在師珍重便出時圓悟為侍者師以白雲關意扣之悟曰你但且下會取師笑曰我不是不㑹秪是未諳待見這老漢共伊理會一上明日祖往舒城師與悟繼往適㑹於興化祖問師記得曽在郡裏相見來師曰全火秪候祖顧悟曰這漢饒舌自是機緣相契遊廬阜回師以高高峰頂立深深海底行所得之語告五祖祖曰吾嘗以此事詰先師先師云我曽問逺和尚逺曰貓有㰱血之功虎有起尸之德非素達本源不能到也師給侍久祖鍾愛之後辭西歸為小參復以頌送曰離鄉四十餘年一時忘却蜀語禪人回到成都切須記取魯語時覺尚無恙師再侍之名聲藹著遂出住長松遷保福信相僧問三世諸佛六代祖師總出這圈䙡不得如何是這圈䙡師曰井欄唇上堂舉仰山問中邑如何是佛性義邑曰我與你說箇譬喻汝便㑹也譬如一室有六窗內有一獼猴外有獼猴從東邊喚往往獼猴即應如是六窗俱喚俱應仰乃禮拜適䝉和尚指示某有箇疑處邑曰你有甚麼疑仰曰秪如內獼猴睡時外獼猴欲與相見又作麼生邑下禪床執仰山手曰往往與你相見了師曰諸人要見二老麼我也與你說箇譬喻中邑大似箇金師仰山將一塊金來使金師酬價金師亦盡價相酬臨成交易賣金底更與貼稱金師雖然暗喜心中未免偷疑何故若非細作定是賊贓便下座宋南嶽慈感禪師潼川杜氏子上堂古佛心秪如今若不會苦沉吟秋雨微微秋風颯颯乍此乍彼若為酬答沙岸蘆花青黃交雜禪者何依良久曰劄宋歸宗正賢禪師潼州陳氏子幼從三聖海澄為苾芻具滿分戒遊成都依大慈秀公習經論凡典籍過目成誦義亦頓曉秀稱為經藏子出蜀謁諸尊宿後叩佛眼一日入室眼舉殷勤抱得旃檀樹語聲未絶師頓悟眼曰經藏子漏逗了也自是與師商確淵奧亹亹無盡眼稱善因手書真牧二字授之紹興已巳歸宗虛席郡侯禮請堅卧不應寶文李公懋嘗問道於師同屬官强之乃就上堂且第一句如何道汝等若何世界未成時父母未生時佛未出世時祖師未西來時道得已是第二句且第一句如何道直饒你十成道得未免左之右之卓拄杖下座上堂良久召大衆曰作麼生若也擬議賢上座謾你諸人去也打地和尚嗔他祕魔巖主擎箇叉兒胡說亂道遂將一摑成虀粉散在十方世界還知麼舉拂子曰而今却在拂子頭上說一切智智清淨無二無二分無别無斷故還聞麼閻老子知得乃曰賢上座你若相當去不妨竒特或不相當總在我手裏秪向他道閻老子你也退步摸索鼻孔看擊禪床下座僧問久默斯要已泄真機學人上來請師開示師曰耳朵在甚麼處曰一句分明該萬象師曰分明底事作麼生曰台星臨照枯木回春師曰換却你眼睛宋潼川愚邱居靜禪師成都楊氏子年十四禮白馬安慧為師聞南堂道望遂往依焉堂舉香嚴枯木裏龍吟話往返酬詰師於言下大悟一日堂問曰莫守寒巖異草青坐却白雲宗不妙汝作麼生師曰直須揮劍若不揮劍漁父棲巢堂矍然曰這小厮兒師珍重便行出住東岩上堂月生一東岩乍住增愁寂紅塵世路有多端米麵倉儲無顆粒崖為伴泉為匹颯颯清風來入室山王土地暗中忙雲版鐘魚偷淚滴世人莫道守空巖亦有東籬打西壁嘗謂衆曰參學至要不出先南堂道最初句及末後句透得過者一生事畢倘或未然更與你分作十門各各印證自心還得穩當也未一須信有教外别傳二須知有教外别傳三須㑹無情說法與有情說法無二四須見性如觀掌中之物了了分明一一田地穩密五須具擇法眼六須行鳥道𤣥路七須文武兼濟八須摧邪顯正九須大機大用十須向異類中行凡欲紹隆法種須盡此綱要方坐得這曲樣牀子受行天下人禮拜敢與佛祖為師若不到恁麼田地祗一向虛頭他時異日閻老子未放你在間有學者各門頌出呈師師以頌示曰十門綱要掌中施機㑹來時自有為作者不須排位次大都首尾是根基宋劒門南修造禪師淳厚之士也自大隨一語契投服勤不怠歸謁崇化贇禪師坐次贇以宗門三印問之南曰印空印泥印水平地寒濤競起假饒去就十分也是靈龜曵尾宋慧通清旦禪師蓬州嚴氏子初出關至德山值泰上堂舉趙州曰臺山婆子已為汝勘破了也且道意在甚麼處良久曰就地撮將黃葉去入山推出白雲來師聞釋然翌日入室山問前百丈不落因果因甚麼墮野狐後百丈不昧因果因甚麼脫野狐師曰好與一坑埋却住後上堂說佛說祖正如好肉剜瘡舉古舉今猶若殘羮餿飯一聞便悟已落第二頭一舉便行早是不著便須知箇事如天普蓋似地普擎師子遊行不求伴侣壯士展臂不借他力佛祖拈掇不起衲僧願見無門迷悟雙忘聖凡路絶且道從上諸聖以何法示人喝一喝曰莫妄想佛性和尚忌日上堂二腳驢子弄蹄行步步相隨不相到樹頭驚起雙雙魚拈來一老一不老為憐松竹引清風其奈出門便是草因喚檀郎識得渠大機大用都推倒燒香勘證見根源糞掃堆頭拾得寶叢林浩浩謾商量勸君莫謗先師好宋東林道顔禪師潼川人族鮮于氏久參圓悟微有省發洎悟還蜀囑依妙喜仍以書致喜曰顔川彩繪已畢但缺㸃眼耳他日嗣其後未可量也喜居雲門及洋嶼師皆在焉朝夕質疑方大悟住後上堂一葉落天下秋一塵起大地收鳥窠吹布毛便有人悟去今時學者為甚麼却不知自已良久曰莫錯怪人好上堂欲識諸佛心但向衆生心行中識取欲識常住不凋性但向萬物遷變處㑹取還識得麼欲得不招無間業莫謗如來正法輪上堂諸人知處良遂總知良遂知處諸人不知作麼生是良遂知處乃曰鸕鷀語鶴上堂仲冬嚴寒三界無安富者快樂貧者饑寒不識𤣥㫖錯認定盤何也牛頭安尾上北斗面南看上堂一滴滴水一滴滴凍天寒人寒風動幡動雲門扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾不出諸人十二時中尋常受用上堂云圓通門户八字打開若是從門入得不堪共語須是入得無門之門方可坐登堂奧所以道過去諸如如來斯門已成就現在諸菩薩今各入圓明未來參學人當依如是法從上諸聖幸有如此廣大門風不能繼紹甘自鄙棄穿窬墻壁好不丈夫敢問大衆無門之門作麼生入良久云非唯觀世音我亦從中證上堂元宵已過化主出門六羣比邱各從其類此衆無復枝葉純有真實如是增上慢人退亦佳矣麒麟不為瑞鸑鷟不為榮麥秀兩岐禾登九穗總不消得但願官中無事林下棲禪水牯牛飽卧斜陽擔板漢清貧長樂粥足飯足俯仰隨時筯籠不亂攙匙老鼠不咬甑箄山家活計淡薄長情不敬功德天誰嫌黑暗女有智主人二俱不受良久曰君子愛財取之以道上堂去年寒食後今年寒食前日日是好日不是正中偏上堂客舍久留連家鄉夕照邊簷懸三月雨水沒兩湖蓮鑊漏燒燈盞柴生滿灶烟已忘南北念入望盡平川上堂旃檀林無雜樹鬱密深沉師子住所以旃檀叢林旃檀圍繞荆棘叢林荆棘圍繞一人為主兩人為伴成就萬億國土士農工商若夜叉若羅剎見行魔業優哉游哉聊以卒嵗僧問香嚴上樹話意㫖如何師曰描不成畫不就曰李陵雖好手爭奈陷畨何師曰甚麼處去來問如何是佛師曰汝是元固僧近前曰喏喏師曰裩無襠袴無口問如何是佛師曰志公和尚曰學人問佛何故答志公和尚師曰志公不是閒和尚曰如何是法師曰黃絹幼婦外孫虀臼曰是甚麼章句師曰絶妙好辭曰如何是僧師曰釣魚船上謝三郎曰何不直說師曰𤣥沙和尚曰三寶已䝉師指示向上宗乘事若何師曰王喬詐仙得仙僧呵呵大笑師乃叩齒宋劍州萬壽自護禪師上堂古者道若人識得心大地無寸土萬壽即不然若人識得心未是究竟處且那裏是究竟處拈拄杖卓一下曰甜瓜徹蒂甜苦瓠連根苦宋汀州報恩法演禪師果州人上堂舉俱胝竪指因緣師曰佳人睡起懶梳頭把得金叉插便休大抵還他肌骨好不塗紅粉也風流宋智者真慈禪師潼川人姓李氏初依成都正法出家具戒後游講肆聽講圓覺至四大各離今者妄身當在何處畢竟無體實同幻化因而有省作頌曰一顆明珠在我這裏撥著動著放光動地以呈諸講師無能曉之者歸以呈其師遂舉狗子無佛性話詰之師曰雖百千萬億公案不出此頌也其師以為不遜乃叱出師因南游至廬山圓通挂搭時卍庵為西堂為衆入室舉僧問雲門撥塵見佛時如何門云佛亦是塵師隨聲便喝以手指胸曰佛亦是塵師復頌曰撥塵見佛佛亦是塵問了答了直下翻身勸君更盡一杯酒西出陽關無故人又頌塵塵三昧曰鉢裏飯桶裏水别寶崑崙坐潭底一塵塵上走須彌明眼波斯笑彈指笑彈指珊瑚枝上清風起卍庵深肯之宋德山子涓禪師潼川人也上堂見見之時見非是見見猶離見見不能及遂喝曰鯨吞海水盡露出珊瑚枝衆中忽有箇衲僧出來道長老休寐語却許伊具一隻眼上堂橫按拄杖曰一二三四五六七七六五四三二一循環逆順數將來數到未來無盡日因七見一因一亡七踏破太虛空鐵牛也汗出絶氣息無蹤跡擲拄杖曰更須放下這箇始是參學事畢上堂拈拄杖曰有時奪人不奪境拄杖子七縱八橫有時奪境不奪人山僧七顛八倒有時人境兩俱奪拄杖子與山僧削迹吞聲有時人境俱不奪卓拄杖曰伴我行千里擕君過萬山忽然撞著臨濟大師時如何喝曰未明心地印難透祖師關宋淨慈北澗禪師名居簡字敬叟潼川王氏子以其寓北澗日久故人稱北澗云先出家天台報恩光孝寺退居杭飛來峰之陰張公誠子與旴江刺史走書以唐僧紹隆所開山處之江東部使者以東林雲居處之不應後遷至淨慈師頌世尊初生話云一聲哇地便叱哩突出如斯大闡提此土西天起殃害堂堂洗土不成泥又頌楞嚴經六解一亡云六用無功信不通一時分付與春風篆烟一縷閒清畫百鳥不來花自紅嘗闢一室以居名曰䪥室作賦以自見其略曰進則面墻退則坐井柱忽不支壁忽就殞豁然而虛漠然而冏如䝉之擊如震而警又曰如無盡藏如大圓鏡前山送青若壯士之排闥後山回闖擬良工之御駿撫鴻鵠而晚眺入冥冥而逺引笑雲烟之輕去漫悠悠而無定駐落日於西崦延初蟾於東嶺是皆中所得也有北澗集十九卷行世旴江張公誠子序之曰讀其文宗密未知其伯仲誦其詩合參寥覺範為一人不能當也北澗於人不茍合合亦不茍暌取舍去就之際潔如也龍泉葉公水心酬師詩曰簡公詩語特驚人六反掀騰不動身說與東家小兒女塗青染緑未禁春師居天台委羽有二姓爭竹山竭産不肯已仙居丞王君懌來囑師諷之乃作種竹賦一首示二姓而訟遂止宋徑山師範禪師梓潼雍氏子九嵗依陰平山僧道欽出家經書過目成誦紹熙五年冬登具戒明年次成都坐夏正法遇老宿名堯者師請益坐禪之法堯曰禪是何物坐底是誰師受其語晝夜體究一日如厠提前話有省明年辭去謁佛照於育王佛照問師曰何處人師曰劍州人佛照曰帶得劍來麼師隨聲便喝佛照笑曰者烏頭子也亂做貧甚無資剃髮故佛照室中常以烏頭子目之久復還靈隱破庵居第一座未幾以台雁未到拉月石溪同遊至瑞岩時雲巢領住持事留分座忽夜夢偉衣冠者持把茅見授翌日明州清涼專使至師受請入院見所謂伽藍神茅其姓衣冠與疇昔所夢無異云徵入內奏對詳明上為之動色賜金襴僧伽黎仍宣詣慈明殿升座垂簾而聽賜佛鑑禪師號淳祐戊申秋師築室明月池上榜曰退耕乞老於朝而舊疾適作三月旦升堂示衆曰山僧既老且病無力得與諸人東語西話今日勉强出來從前所說不到底盡情向諸人面前抖擻去也遂起身抖衣云是多少十五日集兩班區畫後事親書遺表及遺書十數言笑諧謔如平時其徒以遺偈為請乃執筆疾書云來時空索索去也赤條條更要問端的天台有石橋移頃而逝禀法分化有雪岩欽斷橋倫西岩惠焉蜀中廣記卷八十九
