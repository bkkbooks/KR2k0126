body:
  text: 蜀中廣記卷三十三明曹學佺撰邊防記第三川西三龍安府青川石泉安縣安綿道開府綿州轄龍安青州石泉綿州諸將領守備指揮一人比都指揮體統駐石泉而龍安㕘將同城以居龍州古氐羌地漢曰隂平道註云有夷之地曰道如剛氐道甸氐道之類是也北部都尉治此永平後始稱郡自後或稱江油或稱平武或曰龍州或曰龍門或改靈應郡或改政州時代不同因革亦異宋景定間臨卭人薛嚴以進士來守是州捍衛有功得世襲焉家譜為戰國薛居州之後也國初其裔薛文勝歸附仍授知州時千夫長隴西李仁廣提領官高郵王祥給我餉饋蜀平賜李州同知王州判官宣徳中以征松潘功陞州為宣撫薛氏世宣撫使李為副使王為僉事各統土兵五百分守白馬白草木瓜三畨嘉靖末年薛兆乾謀逆伏誅遂改宣撫司為龍安府割成都之石泉保寧之江油及青川千户所隷焉降兆乾庶弟襲土知事王氏李氏俱襲土通判列銜本府分守如前仍移小河㕘將於府城彈壓之附郭平武縣萬厯十九年始設也江油地雖腹裏然實糧運之咽喉矣益州記曰江水自白馬嶺迴行二千餘里至龍涸又八十里至西陵縣又百二十里而至北部北部即龍州也白馬嶺即白馬畨地隷王通判在府正北三百里北通階文西抵漳臘其生畨號黒人延袤數百里碉房不計有名色可舉者凡十八寨寨多不過四五百人少可百人而已設有散牌總牌等名目以約束之畨僧畨舎諸號以誘化之法甚宻也嘉靖元年白馬跳梁用兵五千分五路而進一由鐡龍堡一由黄羊闗一由三舎堡一由北雄闗一㑹兵陜西由階文入大創之而喘息聽命矣白草畨隷李通判在府西南四百里東抵石泉約七十里西抵南路生畨南抵茂州畨北抵平武縣境蓋唐吐蕃賛普遺種也上下白草凡十八寨部曲素强恃其險阻往往剽奪為患嘉靖二十五年大征用兵三萬七千一由龍州一由石泉一由霸底所斬獲甚多事平增雙溪大魚永平奠邊諸堡革撫賞斷鹽茶予以白旗永塞入龍之路於是霸底河西風村等十一寨永平河東北草等十七寨週數百里男女四千餘人相率來降許其畜髮頂巾送子讀書習學華語嵗輸糧䗶為氓編走馬嶺一帶為十村由平一村以至平十村也射溪溝一帶為八村自一化以至八化村也村立一長長即舊畨牌之號又有風村嶺等二十寨尚仍舊名亦同時歸順者事在萬厯十七年木瓜畨隷薛知事在府上游近小河千户所境土迫促種類不蕃雖有五寨約男女不二三百人先是統於薛氏受其嵗賞嘉靖二十三年勾引白草畨反為之鄉導事平止許嵗至小河領賞不得度大魚闗青川千户所白馬畨之後路東抵白水陽平闗陜西寧羌州界西通白馬路轉古城驛而抵龍安南至椒園堡叢林宻箐多盜賊北通青塘嶺直達階文寰宇記云後魏之馬盤縣也有馬盤山高三千三百丈其形似馬盤旋而上隋改馬盤為青川縣圖經云清水出啼胡山濶五丈東流入利州界其水清美亦云啼胡水矣志作醍醐盖美名之圖經曰青川東三百四十里為白水江鄧艾伐蜀嘗作浮橋於此按華陽國志平武縣有闗尉自景谷有歩道徑江油左擔出涪鄧艾伐蜀道也志云所北十里有大雄山峻極出於雲表即北雄闗也近又設控夷闗牆垣營疊完固堪守稍前為瓦舎壩乃熟番保保住種地其衆怯弱易馴按廣輿考有思曩安撫司設於此矣石泉北隣土永平西連青岡壩底諸畨最稱强悍壩底守備駐劄縣城復土堡在縣西北稍南為青岡各相去十里許介二堡間有青泗口路通壩底河東河西白草青片諸生熟夷隷石泉守備提調東二十里為永平堡設在山崖形勢斗峻控制白草諸畨隘口永平西三里為奠邊闗闗南里許為火草坪火草北十五里為萬安東二十里為喜定俱永平把守指揮提調北四十里為壩底其地東抵通寧西連白草南距石泉北通青片堡其南十五里為石板闗東十五里為石泉堡又五里為白印墩壩底把守指揮提調大印堡設于山阜巍然天險亦白草畨出没之要路也堡西二十里為茒堆又五里為山茅山茅東一舎為徐塘徐塘北一舎為伏羌伏羌北兩舎為大方闗闗與大印相首尾矣故屬大印把守指揮提調安縣東至涪城西極綿竹南通羅江北達石泉境内雖無夷族然而迫隣雎水曲山疊溪諸闗堡則天池大壩白草青片等寨亦其接壤也曲山闗介在當縣石泉平武三路雎水闗為當縣綿州適中之地面山負水平衍沃饒闗西一舎名綿堰堡綿水發源於此闗東一舎名疊溪堡乃白草畨後路形勢孤懸安綿倚為保障設有官軍鄉勇屬雎水闗把守提調蜀中廣記卷三十三
