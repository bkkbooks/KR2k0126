body:
  text: 蜀中廣記卷一百四明曹學佺撰詩話記第四花間集十卷孟蜀衛尉少卿趙崇祚選歐陽炯序內云李太白應制清平樂四首為詞體之祖不知陳隋之玉樹後庭花水殿歌詞已有之矣唐人長短句詩之餘也始於李太白太白以草堂名集故謂之草堂詩餘賈逵曰粱米出蜀漢香美逾於諸粱號曰竹根黃梁州得名以此秦地之西燉煌之間亦産粱米土沃類蜀故號小梁州調名有小梁州為西音唐吕元濟上書比見方邑相率為渾脫隊駿馬胡服名曰蘇幕遮今之曲名取此李太白詩公孫大娘渾脫舞即此際之事也已下出詞品釋典云西域諸國婦女編髮垂髻飾以雜華曰鬘中國佛像瓔珞之飾是其製也彼土稱菩薩鬘調名菩薩鬘取此作菩薩蠻者非太白菩薩鬘詞平林漠漠烟如織寒山一帶傷心碧暝色入高樓有人樓上愁闌干空佇立宿鳥歸飛急何處是歸程長亭復短亭此思蜀之作也禁庭春晝鶯羽披新繡百草巧求花下鬬只賭珠璣滿斗日晚却理殘粧御前閒舞霓裳誰道腰肢窈窕折旋消得君王禁闈秋夜月探金窗罅玉帳鴛鴦噴沉麝時落銀燈香灺女伴莫話孤眠六宫羅綺三千一笑皆生百媚宸遊教在誰邊右清平樂令二闋太白應制作也見吕鵬遏雲集原四首黃玉林以其二首無清逸氣韻止選二首孫光憲蜀之資州人事荆南高氏為從事有文學名著北夢瑣言其辭見花間集一庭疏雨濕春愁秀句也李後主之細雨濕流光本此韋莊訴衷情詞云碧沼紅芳煙雨靜倚蘭橈動玉佩交帶裊纎腰鴛夢隔星橋迢迢越羅香暗銷墜花翹此在成都時作也蜀之妓女至今花勝之飾名曰翹兒花張泌江城子云浣花溪上見卿卿臉波秋水明黛眉輕緑雲高綰金簇小蜻蜓好事問他來得麼和笑道莫多情按小蜻蜓之飾正所謂翹兒花也韋莊有浣花集詞尚綺靡其河傳二首皆浣花溪作也春晚風暖錦城花滿狂殺遊人玉鞭金勒尋勝馳驟輕塵惜良晨翠娥爭勸臨卭酒纎纎手拂面垂絲栁歸時煙裏鐘鼓正是黃昏暗銷魂錦浦春女繡衣金縷霧薄雲輕花深栁暗時節正是清明雨初晴玉鞭魂斷煙霞路鶯鶯語一望巫山雨香塵隱映遙見翠檻紅樓黛眉愁莊又有清平樂調云何處遊女蜀國多雲雨雲解有情花解語窣地繡羅金縷粧成不整金鈿含羞待月鞦韆住在緑槐陰裏門臨春水橋邊古今詞話云王蜀時有王州守門下客栁梢青曉星明滅隴頭殘月一詞蓋贈所遇紅梅仙子作也楊用修以為五代鬼仙所作非太白長吉之流不能及此或未之考耶紅梅仙詩在巴州廢義陽縣乃州守王鶚之子所遇又云在崇慶州有紅梅仙閣崇慶舊名蜀州必沿蜀字之誤耳無名氏後庭怨宋建隆中旭川築城掘得石刻蓋唐人語也詞曰千里故鄉十年華屋亂魂飛過屏山矗眼重眉褪不勝春菱花知我銷香玉雙雙燕子歸來應解笑人幽獨斷歌零舞遺恨清江曲萬樹緑低迷一庭紅蔌旭川今入榮縣檮杌載毛文錫鹿䖍扆歐陽炯韓琮閻選皆蜀人事孟後主有五鬼之號俱工小詞並見花間集楊用修云此集久不傳正德初豫得之於昭覺寺寺乃孟氏宣華宫故址也後傳刻于南方用修百琲明珠選毛文錫一首深相憶莫相憶相憶情難極銀漢是紅墻一道遙相隔金盤珠露滴兩岸榆花白風搖玉佩清今夕為何夕此花間集所無醉公子者孟蜀顧敻辭也河漢秋雲淡紅藕香侵檻枕倚小山屏金鋪向晚扄睡起橫波慢獨坐情何限衰栁數聲蟬魂銷似去年南史王晞詩日驀當歸去魚鳥見留連俗本改驀作暮淺矣孟蜀牛嶠辭驀天空波浪急正用晞語牛嶠有女冠子四闋緑雲高髻㸃翠勻紅時世月如眉淺笑含雙靨低聲唱小詞眼看惟恐化魂蕩欲相隨玉趾回嬌步約佳期又錦江煙水卓女燒春濃美小檀霞繡帶芙蓉帳金叉芍藥花額黃侵膩髮臂釧透紅紗栁暗鶯啼處認郎家按燒春酒名其法始于卓文君又星冠霞帔住在蘂珠宫裏佩丁當明翠搖蟬翼纎袿理宿粧醮壇春草緑藥院杏花香青鳥傳心事寄劉郎又雙飛雙舞春晝後園鶯語卷羅幃錦字書封了銀河雁過遲鴛鴦排寶帳豆䓻繡連枝不語勻珠淚落花時牛希濟次之亦四闋蕙風芝露壇際殘香輕度蘂珠宫苔㸃分圓碧桃花踐破紅品流巫峽外名籍紫微中真侣墉城㑹夢魂通又淡花瘦玉依約神仙粧束佩瓊文瑞露通宵貯幽香盡日焚碧煙籠絳節黃藕冠濃雲勿以吹簫伴不同羣又鳯樓琪樹惆悵劉郎一去正春深洞裏愁空結人間信莫尋竹疏齊殿逈松密醮壇陰倚雲低首望可知心又步虛壇上絳節霓旌相向引真仙玉步搖蟾影金爐裊麝煙露濃霜簡濕風緊羽衣偏欲留難得住却歸天按女冠子起駱賔王代女道士王靈妃贈李榮長篇王右丞集云李榮巴西綿州人也為道士知名蜀路泥溪驛天聖中有女郎盧氏者隨父往漢州作縣令替歸題于驛舍之壁其序略云登山臨水不廢於謳吟易羽移商聊舒乎羈思因成鳯棲梧曲子一闋聊書於壁後之君子覽者毋以婦人竊弄翰墨為罪詞曰蜀道青天煙靄翳帝里繁華迢遞何時至回望錦川揮粉淚鳯叉斜軃烏雲膩鈿帶雙垂金縷細玉佩玎璫露滴寒如水從此鸞粧添逺意畫眉學得遙山翠此墨客揮犀所載也舊志以此詞題劒門作而鈿帶雙垂句作鈿帶香盤微有小異今劍門泥溪驛已廢蘇易簡梓州人太平興國六年狀元所著有文集及文房四譜行世宋世蜀之大魁自蘇始其後閬州三人簡州四人䕫州一人終宋三百年得十六人而陳氏許氏皆兄弟可謂盛矣蘇之詞惟越江吟應制一首見楊用修百琲明珠張孝祥安國宋簡池四狀元之一也遷居厯陽湖濵自號於湖平昔為辭未嘗著稿筆酣興健頃刻即成無一字無來處如歌頭凱歌諸曲駿發蹈厲寓以詩人句法有于湖紫薇雅辭一卷湯衡序其詠物之工如羅帕分柑霜落齒氷盤剝芡珠盈掬寫景之妙如秋淨明霞乍吐曙涼宿靄初消麗情之句如佩解湘腰叉孤楚鬢不可勝載其玉鞭亭滿江紅云千古凄涼興亡事但悲陳迹凝望眼吳波不動楚山空碧巴滇緑駿追風逺武昌雲斾連天赤笑老姦遺臭到如今留空碧邊書靜峰烟息通軺傳銷鋒鏑仰太平天子聖明無敵蹙踏揚州開帝里渡江天馬龍為匹看東南佳氣鬱蔥蔥傳干億按晉明帝本紀帝乘巴滇小駿往覘王敦營壘故詞中及之臨卭重客蜀相如被服容冶人間都上宫烟娥笑迎客繡屏六曲紅氍毹霰珠穿簾洞房晚歌倚瑶琴半羞懶天寒日暮可奈何掛客冠纓玉叉冷叉冷鬢雲晚羅袖拂人花氣暖風流公子來應逺半倚瑶琴羞懶雲寒日暮天微霰無處不堪腸斷右詠文君寒雲夜卷霜倒飛一聲水調凝秋悲錦靴玉帶舞回雪丞相筵前看柘枝河東詞客今何地密寄軟綃三尺淚錦城春色隔瞿唐故華灼灼今憔悴憔悴何郎地密寄軟綃三尺淚傳心語眼郎應記翠袖猶芬仙桂願郎學做蝴蝶子去去來來花裏右詠灼灼右二闋毛澤民調笑白語也蜀中文君人皆知之灼灼乃成都營妓與御史裴質善詞中所詠正其事東坡詞雄海內其憶故鄉者二首卜算子云蜀客到江南長憶吳山好吳蜀風流自古同歸去應須早還與去年人共藉西湖草莫惜樽前子細看應是容顔老河滿子在湖州作云見說岷峨悽愴旋聞江漢澄清但覺秋來歸夢好西南自有長城東府三人最少西山八國初平莫負花溪縱賞何妨藥市微行試問當壚人在否空教是處聞名唱著子淵新曲應須分外含情更有戚氏一首言周穆王賔西王母之事舊刻在眉州併録之玉龜山東皇靈嫓統羣仙絳闕岧嶤翠房深逈倚霏烟幽閒志蕭然金城千里鎖嬋娟當時穆滿巡狩翠華曽到海西邊風露明霽鯨波極目勢浮輿蓋方圓正迢迢麗日𤣥圃清寂瓊草芊綿爭解繡勒香韉鸞輅駐蹕八馬戲芝田瑶池近畫樓隱隱翠鳥翩翩肆華筵間作管鳴絃宛若帝所鈞天稚頭皓齒緑髮方瞳圓極恬淡高妍盡倒瓊壺酒獻金鼎藥固大椿年縹眇飛瓊妙舞命雙成奏曲醉留連雲璈韻響寫寒泉浩歌暢飲斜月低河漢漸漸綺霞天際紅深淺動歸思回首塵寰爛熳遊玉輦東還杏花風數里響鳴鞭望長安路依稀栁色翠㸃春妍蘇叔黨過東坡少子也草堂所載㸃絳唇二首高栁蟬嘶及新月娟娟皆其作也是時方禁坡文故隱其名相傳之久或以為汪彥章非也李邦直與東坡同時小詞有楊花落燕子橫穿朱閣苦恨春醪如水薄閒愁無處著緑野帶江山落角桃杏參差殘蕚厯厯桅檣沙外泊東風晚來惡為坡所稱范元實祖禹之子秦少游壻也學詩於山谷作詩眼一卷為人凝重嘗在歌舞之席終日不言妓有問之云公亦解辭曲否笑答云吾乃山抹微雲女壻也可見當時盛唱此辭草堂詩餘亦有范元實辭蘇養直名伯固東坡之族坡集中有送伯固兄詩是也其清江曲屬玉雙飛水滿塘當時盛傳小辭醉眠小塢黃茅店夢倚高城赤葉樓鷓鴣天中佳句也程正伯號書舟眉山人東坡之中表也其酷相思辭云月挂霜林寒欲墜正門外催人起奈别離如今真箇是欲住也留無計欲去也來無計馬上離情衣上淚各自供憔悴問江路梅花開也未春到也須頻寄人到也須頻寄其四代好折紅英皆佳見本集正伯合江放舟作臨江仙二闋云送我南來舟一葉誰教催動鳴榔高城不見水茫茫雲灣才幾曲折盡九回腸買酒澆愁愁不盡江烟也共凄涼和天瘦了有何妨只愁今夜雨更做淚千行其二濃緑瑣窗閒院靜照人明月團團夜長幽夢見伊難瘦從香臉薄愁到翠眉殘只道花時容易見如今花盡春闌畫樓依舊五更寒可憐紅繡被空記合時歡其愁倚欄三榮道上賦云山無數雨瀟瀟路迢迢不似芙蓉城下去栁如腰夢隨春絮飄飄知他在第幾朱橋說與杜鵑休喚怕魂銷又有彭門道中早起漁家傲二首野店無人霜似水清燈照影寒侵被門外行人催客起因箇事老來方有思家淚寄問梅花開也未愛花只有歸來是想見小橋歌舞地渾舍喜天涯不念人憔悴其二獨木小舟煙雨濕燕兒難㸃春江碧江上青山隨意覔人寂寂落花芳草催寒食昨夜青樓今日客吹愁不得東風力細拾殘紅書怨泣流水急不知那箇傳消息此數首皆佳有所眷戀而然者合江亭芙蓉城俱錦官地也李石字知幾號方舟蜀之資縣人文章盛傳有續博物志小詞亦風致草堂選煙栁疏疏人悄悄其夏夜辭也贈官妓有暖玉倚香愁黛翠勸人須要人先醉問道明朝行也未猶自記燈前背立偷垂淚好事者或改偷為佯朝天子本蜀牡丹花色正紫如金紫大夫之服故名朝天紫後人以為曲名今以紫作子非也見陸游牡丹譜維揚張世文云水龍吟首句本是六字第二句本是七字陸放翁若摩訶池上追遊路則七字下云紅緑參差春晚却是六字又如後篇瑞鶴仙冰輪桂花滿溢為句以滿字叶而以溢字帶在下句他如二句分作三句三句合作二句者尤多然句法雖不同而字數不少妙在歌者上下縱橫取協爾古詩亦有此法放翁水龍吟云摩訶池上追遊路紅緑參差春晚韶光妍媚海棠如醉桃花欲暖挑菜初閒禁烟將近一城絲管看金鞍馳道香車飛蓋爭先占新亭館惆悵年華暗換黯銷魂雨收雲散鏡奩掩月叉梁拆鳯秦筝斜雁身在天涯亂山孤壘危樓飛觀歎春來只有楊花和恨向東風滿放翁又在榮南作水龍吟云樽前花底尋春處堪歎心情全減一身萍寄酒徒雲散佳人天逺那更今年瘴煙蠻雨夜郎江畔漫倚樓橫笛臨窗看鏡時揮涕驚流轉花落月明庭院悄無言魂銷腸斷憑肩擕手當時曽效畫梁栖燕見說新來網縈塵暗舞衫歌扇料也羞憔悴慵行芳徑怕鶯兒見放翁離小益作蝶戀花云水漾萍根風捲絮倩笑嬌顰忍記逢迎處只有夢魂能再遇堪嗟夢不由人做夢若由人何處去短帽輕衫夜夜眉州路不怕銀缸深繡户只愁風斷青衣渡此首與渭南集校對絶不同大抵務觀在蜀有所感屢見之詠前詩話中已及之盧申之名祖臯卭州人有蒲江辭一卷樂章甚工字字可入律吕彭帥於吳江作釣雪亭擅漁人之窟宅以供詩境也約趙子野翁靈舒諸人賦之惟申之擅場如江涵雁影梅花瘦四望無塵雪飛風起夜窗如晝其警句也其賀新郎代妓送太守云春色元無主荷東君著意看承等閒分付多少無情風與浪又那更蝶欺蜂妬算燕雀眼前無數縱使簾櫳能愛護到如今已是成遲暮芳草碧遮歸路看看做到難言處怕去仙槎輕轉旌旗易歌襦袴月滿西樓絃索靜雲蔽崑城閬府便恁地一帆輕舉獨倚闌干愁拍碎慘玉容泪眼如紅雨去與住兩誰訴詳其語意妓必老大而見侮于惡少者太守公護持之耳苕溪漁隱曰東坡云龍邱子自洛之蜀載二侍女戎裝駿馬至溪山佳處輒留數日見者以為異人後十年築室黃岡之北號靜庵居士作臨江仙贈之云細馬逺䭾雙侍女青巾玉帶紅靴溪山好處便為家誰知巴峽路却見洛城花面旋落英飛玉蘂人間春日初斜十年不見紫雲車龍邱新洞府鉛鼎養丹砂龍邱子即陳季常也秦太虛寄之以詩亦云侍童雙濯玉鬢髮光可照駿馬錦障泥相隨窮海嶠暮年更折節學佛得心要鬻馬放阿樊幅巾對沉燎故東坡作詩戲之有忽聞河東獅子吼拄杖落手心茫然之句觀此則知季常載侍女以逺遊及暮年甘於枯寂蓋有所制而然亦可憫笑也哉季常占籍青神縣其孫曰去非南渡後又徙建業詩為高宗所簡注而詞亦佳語意超絶筆力排奡識者謂其可摩坡仙之壘後乃入閩作漁家傲云今日山頭雲欲舉青蛟翠鳯移時舞行到石橋聞細雨聽還住風吹却過溪西去我欲尋詩寬久旅桃花落盡春無數渺渺籃輿穿翠楚悠然處高林忽送黃鶯語宋揚補之别號逃禪自云子雲之後也有傳言玉女詞題云許永之家水仙瑞香黃梅幽蘭同坐名生四和即席賦此小院春長整整繡簾低軸異葩幽艷滿千瓶百斛珠鈿翠珮塵襪錦籠環簇日烘風和奈何芬馥鳯髓龍津覺從前氣味俗夜闌人醉引春蔥競只愁飛去暗與行雲相逐月娥好在為歌新曲又有蝶戀花詞戲矮人者昔在仁皇當極治南極星官曽降為嘉瑞猶有畫圖傳好事身材只恐君今是對酒不妨同看戲他日功名晏子堪為比更願逺孫逢九世安排君在雞窠裏按洞微志李員使瓊州遇楊叟年已八十其祖百九十五尚在頃之雞窠中一小兒出頭下視其祖謂員曰此吾九代祖不語不食不知其年蓋成都多侏儒故以南極晏子雞窠戲之韓駒字子蒼蜀仙井人今井研縣也其中秋念奴嬌海天向晚一詩亞於東坡之作草堂已選詠雪作昭君怨云昨日樵村漁浦今日瓊川銀渚山色捲簾看老峰巒錦帳美人貪睡不覺天花剪水驚問是楊花是蘆花笑林云一達官肅客其日偶然雪下問曰是楊花客對曰楊花又曰是蘆花亦對曰是蘆花言不敢拂之也子蒼用事蓋有所本云何晉之小重山辭云緑樹啼鶯春正濃枝頭青杏小緑成叢玉船風動酒鱗紅歌聲咽相見幾時重車馬去匆匆路隨芳草逺恨無窮相思只在夢魂中今宵月偏照小樓東臨卭高恥菴云玉船風動酒鱗紅之句譬如雲錦月鈎造化之巧非人琢也此等句在天地間有限李公昴名昴英號文溪資州磐石人送太守有有腳艷陽難駐一詞得名然其佳處不在此文溪全集豫家有之其蘭陵王一首絶妙可並秦周辭云燕穿幕春在深深院落單衣試龍沫旋熏又怕東風曉寒薄别來情緒惡瘦得腰圍栁弱清明近正似海棠怯雨芳疏任飄泊叉留去年約恨易老嬌鶯多誤靈鵲碧雲杳杳天涯各望不斷芳草又迷香絮回文强寫字屢錯淚欲注還閣孤酌住春腳便彩局誰忺寶軫慵學階除拾取飛花嚼是多少春恨等閒吞却猛拍闌干嘆命薄悔舊諾張震字東父號無隱居士蜀之遂寧人也孝宗朝為諫官有直聲孝宗稱其知無不言言無不當光宗朝以數直言去位時稱王十朋去省為之空張震去臺為之空一代名臣也而其詞婉媚風流乃知賦梅花者不獨宋廣平也其驀山溪青梅如豆一首草堂入選而失其名氏劉涇字巨濟簡州人有前溪集其夏初臨詞小橋飛蓋入橫塘今刻本飛下落一蓋字簡州劉光祖字德修號後溪有鶴林文集小詞附焉其醉落魄云春風開者一時還共春風謝栁條送我今槐夏不飲香醪孤負人生也曲塘泉細幽琴寫胡牀滑簟應無價日遲睡起簾鈎挂何不歸與花竹秀而野文及翁蜀人登第後期集西湖同年戲之曰蜀中有此景否及翁即席賦詞答之云一勺西湖水渡江來百年歌舞百年酣醉回首洛陽花世界烟渺黍離之地更不復新亭墮淚簇樂紅粧搖畫舫問中流擊楫何人是千古恨幾時洗余生自負澄清志更有誰磻溪未遇傅巖未起國事如今誰仗倚衣帶一江而已便都道江神堪恃借問孤山林處士但掉頭笑指梅花蕊天下事可知矣此即江南所謂煞風景也琅嬛記載紫竹約方喬于望雲門暫㑹久而不至墻陰之下閒履蒼苔不勝悵恨作踏莎行一闋寄之醉栁迷鶯懶風尉草約郎暫㑹門門道粉墻陰下待郎來蘚痕印得鞋痕小花日移陰簾香失裊望郎不到心如搗避人愁入倚屏山斷魂還向墻陰繞方喬長夏讀書于種梅館忽紫竹遺以書大略云欲結朱繩應須素節泣珠成淚久比鮫人流火為期聊同織女春風鴛帳裏不妨鶯語驚寒暮雨雀屏中一任雞聲唱曉喬答以玉樓春云緑陰撲地鶯聲近栁絮如綿烟草襯雙鬟玉面碧囱人一紙銀鈎青鳥信佳期逺卜清秋夜桐樹梢頭明月掛天公若解此情深今嵗何須三月夏又云紫竹與方喬别久而想像難真因綴卜算子序其悲愁眷戀覔銀光箋書之詞云繡閣鎖重門擕手終非易墻外憑他花影搖那得疑郎至合眼想郎君别久難相似昨夜如何繡枕邊夢見分明是注云方喬安嶽士人也安嶽有大雲山望雲門者以此山名楊直夫名棟青神人蘇東坡贈以詞云允文事業從容了要岷峨人物後先相照見說君王曽有問似此人才多少況蜀珍先已登廊廟但側耳聽新詔按小說高宗曽問馬騏曰蜀中人才如虞允文者有幾騏對曰未試焉知允文亦試而後知也蘇與楊馬皆蜀人楊在眉山為甲族直夫有妹通經學比於曹大家嫁虞氏生虞集為巨儒其學無師傳于母氏也此事蜀人亦罕知故著之出丹鉛録李好義宕渠人開禧中殿帥有謁金門詞花遇雨又是一畨紅素燕子歸來衝繡幕舊巢無覔處誰在玉樓歌舞誰在玉關辛苦若使胡塵吹得去東風侯萬户元段平章夫人高氏天全招討女也有玉嬌枝詞云風捲殘雲九霄冉冉逐龍池水雲一片緑寂寞倚屏幃春雨紛紛促蜀錦半閒鴛鴦獨自宿好語我將軍只恐樂極悲生寃鬼哭出南詔事略已上二首皆傷邊務而言蜀中廣記卷一百四
